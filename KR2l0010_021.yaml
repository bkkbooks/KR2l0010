逢明聖萬年春永膺休命華夷蠻獠咸歸正蒼生至老不知兵鼓腹含哺囿太平九有享清寧奏天命有德之舞萬嵗樂太平天子興隆日履初長陽回元吉醴泉芝草休徵集曽聞道五星聚室賀聖朝一人元良百度維新握赤符凝玄應享太清大禮方行祀事孔明感天心億載恆承慶明王慎德四夷咸賓奏纓鞭得勝蠻夷隊舞承應醉太平星華紫殿髙雲氣彤樓繞九夷重譯梯航到皇圖光八表玉宇無塵明月皎銀河自轉扶桑曉平平蕩蕩歸王道百獸舞鳯鳴簫韶看花會普天下都賴吾皇至聖看玉關頻款天山已定四夷效順歸王命天保歌羣黎百姓天下樂九重樂奏萬花開望龍樓雲蒸霧靄仰天工雍熙帝載臣民歡戴溥仁恩遍九垓清江引黃鍾既奏陽和長德盛天心貺人文日月明國勢山河壯衢室民謡頻擊壤奏致語萬民安樂天下太平嵩呼萬嵗再動樂聲清江引鈞天畢奏日方中既醉歡聲動雲章傍衮龍颷勢翔威鳯萬方安樂興嘉頌千秋嵗上下交歡燕禮成一陽奮萬彚咸亨風雲會合開明運紫極轉璇衡宴畢百官行禮朝天子文班武班歡動承明殿禮成樂備頌聲喧真咫尺仰天顔日照龍筵回雉扇翠㽔旋奉仙鑾雲間斗間五色金章燦還宮萬嵗樂天回北極雲成瑞望層霄重華日麗九垓八極樂雍熙祝聖夀萬萬嵗小宴樂永樂間定侑食樂樂器簫二笙二􅌙二樂章一奏本太初之曲朝天子混兮沌兮水土成元龍不分南北與東西未辨天和地萬象包涵其中祕密難窮造化機是陰陽本體乃為之太極兩儀因而立二奏仰大明之曲歸朝歡太極分混然方始見儀形清浮濁偃乾坤定日月齊興照青霄萬象明陽須動陰須靜陰與陽皆相應流行二氣萬物俱生奏百戲承應三奏民初生之曲沽美酒乾坤清宇宙寧六合淨四維正萬象原來一氣生定三才五行民與物共成羣太平令為一類不分人品竟生食豈曉庖烹避寒暑巢居穴遁披樹葉相尋趂如何是愛親世情治生雖混然安其性奏百戲承應四奏品物亨之曲醉大平黎民生世間萬物長塵寰陰陽交運轉循環久逺時庶繁相傳氣候應無間品物交錯慿誰鑒望聖人出世整江山主萬民得安奏百戲承應五奏御六龍之曲清江引人生久仰生聖君天使人生聖聖人受天機體天居中正御六龍聖明登九重碧玉簫君坐神京海嶽共從新民仰君恩聖治有人倫人品分萬物增聖承乾百福臻垂法明尊天命興後朝皆從正奏百戲承應六奏泰階平之曲十二月聖乃有言天天是無言聖聖人臨正萬物亨通恩威盛社稷安仁德感江山定選用英賢興王政分善惡賞罰均平三公九卿左右股肱庶事康寧奏百戲承應七奏君德成之曲十二月皇基以興聖帝修身奉天體道聖德愈明敬天地勤勞萬民立法度上下咸寧堯民歌風俗禮樂厚彛倫爰興學校進儒經賢臣良將保朝廷四野人民頌歡聲用的是賢英賢英定太平寰海皆歸正奏百戲承應八奏聖道行之曲金殿萬年歡三綱既定九疇復興聖道如天嘉禾齊秀寒暑和平聖威無邉皇基穩勝磐石慶雲生景星長現三光輝耀百榖收成萬姓安寧得勝令聖德感皇乾甘露降山川萬邦來朝貢竒珍擺布金玉階下鳴鞭仰聖主升金殿丹墀列英賢讃吾皇豐稔年奏百戲承應九奏樂清寧之曲普天樂萬邦寧皇圖正父君母后天下咸欽君治外永聖明后治內長安靜後聖承乾皆從正德相傳聖子神孫天威浩蕩江山永固洪福無窮沽美酒和氣生滿玉京祥禋起映皇宮明聖開基整萬民風雲會帝庭奏簫韶九韻成太平令紫霧隱金鑾彩鳯祥光罩良將賢臣玉案列珍羞美醖寶鼎爇龍涎香噴至尊永寧儲嗣守成賀萬萬嵗一人有慶奏魚躍于淵承應設立大樂樂器笙一笛二頭管二􅌙二鼓一板一杖鼓八升殿還宮百官行禮樂章萬嵗樂朝天子與前同進膳樂章水龍吟與前同奉天門宴百官止用本太初仰大明民初生三奏樂章進酒進膳樂同惟百官行叩頭禮用天子樂章宴畢導駕還宮用御鑾歌嘉靖間仁夀宮落成宴樂章侑食一奏本太初之曲朝天子帝誠帝明寶位基昌命仙苑開筵歌鹿鳴亭殿天章映我有嘉賓鼓瑟吹笙示周行昭德音日升月恆萬載皇圖正二奏仰大明之曲殿前歡天保定聖人多夀多男慶修和禮樂協中興麗正重明如山阜如岡陵如川方至莫不增協氣生禎禎應百神受命萬國來庭三奏民初生之曲沽美酒黃河清寶露凝瑞麥呈靈鵲鳴諸福來同仰聖明喜萬寶告成占景緯泰階平太平令念農桑衣食之本仰君德獨厚民生事耕鑿羣黎百姓歌鹿鳴神人胥慶明主燕嘉賓承筐鼓瑟吹笙繼自今福增天定四奏品物亨之曲醉太平瑶宮怡聖顔閬苑隔人寰吹笙鼓瑟賓旨酒天開宴鹿鳴歌舞黃金殿賴吾皇錫福萬民安醉歌天保歡五奏御六龍之曲清江引聖王有道樂升平燕會延休慶務本軫民生𢎞化凝天命欣落成萬載開鴻運碧玉簫帝重農桑法駕起明光麟遊鳯翔宴陳天保章開玳筵薦瑶觴既醉頌洋洋聖德巍皇恩蕩世際唐虞上進膳水龍吟寶瑟瑶笙鼓吹喧聖天子御華筵南山萬夀瑞日正中天百榖豐年八方珍膳人樂升平宴太清歌瑞麥嘉禾臻瑞仰荷堯舜主愛育羣黎感天意五風十雨秋報春祈遍爾德歡農桑日用衣食嘉賓和樂開筵地紅雲捧雕盤珍味山呼萬嵗福無疆日升川至上清歌仰賴吾皇參天兩地凝和氣四三王六五帝國家興賢才為上瑞養萬民九域熙百祿咸宜開天門寶殿輝龍虎風雲會瞻丹墀覲紫微周詩歌既醉螽斯麟趾開祥瑞仰飛龍在天位幽風亭宴講官樂章侑食一奏本太初之曲朝天子九重詔傳殿閣門秋宴授衣時節肅霜天禾稼登場遍鼓瑟吹笙升平重見工歌七月篇春酒當筵獻願吾皇萬年嵗嵗臨西苑二奏仰大明之曲殿前歡鳯苑御筵開黃花映玉階鹿鳴天保歌三代古調新裁奉君王萬夀杯日月明乾坤大看年年秋報𢋫太平有象元首明哉三奏民初生之曲沽美酒熙春陽化日長執懿筐采柔桑拾繭繅絲有萬箱染紅黃孔陽為公子翟衣裳太平歌勤樹藝嵗年豐穰九十月禾黍登場為春酒甕浮新釀耕田樂齊歌齊唱饗公堂殺牛舉觴繼進著兕觥祝聖夀萬靈扶相四奏品物亨之曲醉太平納嘉禾滿場釀御酒盈缸公桑蠶績製玄黃服龍衣衮裳螽斯蟋蟀諧清唱水光山色明仙仗豳風亭殿進霞觴祝聖夀無疆五奏御六龍之曲清江引九月風光何處有鳯苑在龍池右農夫稼已登公子衣方授萬嵗君王頻進酒碧玉簫凡我生民農桑最苦辛終嵗經營氣候變冬春田畯欣婦子勤詠豳詩仰化鈞場圃新風雨順宴御丹墀龍顔近進膳水龍吟養老休農敞御筵㵼春酒介耆年刲羊剪韭社鼓正闐闐香粳米顆升堂拜獻此樂真堪羡太清歌九月天開西苑宸居無逸殿講幄張筵集儒流雲蒸星炫璧緯珠纒暏御製焕文章照回雲漢堯天舜日民安宴御廩神倉百榖登金輝玉燦休徵見大有豐年上清歌鳯苑宸居公桑帝籍今方舉躬耕蠶勸士女獻羊羔升堂奏樂舞葵菽棗壺上珍厨萬夀山呼開天門豳風亭共仰吾皇聖百榖登萬國咸寧民康物阜禎祥應仰乾運俯坤靈皇后親蠶宴內外命婦樂章升座天香鳯韶之曲春雲繚繞芳郊曙喜乾坤萬象咸舒蘭皋蕙圃迎仙馭采柔條攀茂樹蠶宮繭館親臨御璧月珠星照太虛開筵還駐翠銷旟萬載垂貞譽進膳沽美酒蠶禮成鳯輦停薦霞觴列雲屏宮妃世婦仰坤寧祥雲映紫冥同頌耀前星回宮御鑾歌維天啓聖皇君耕籍后躬桑身先田織率萬邦天清地寧民康物阜百榖用成四夷來王治化登唐虞世發禎祥東宮宴樂永樂間定樂器簫四笙四􅌙四樂章一奏喜千春之曲賀聖朝開國承天聖感極多總一統封疆濶百姓快活萬物榮光共沐恩波仙音韻合讚升平詠歌齊朝拜千千嵗東宮滿國春和二奏永南山之曲水仙子洪基永固海波清盛世明時禮樂興華夷一統江山靜民通和樂太平讃東宮仁孝賢明秉鈞衡端正順乾坤泰亨坐中華萬世昌寧奏百戲承應三奏桂枝香之曲蟾宮曲曉光融燕享春宮日朗風和氣喜蔥蔥鎮領台樞規宏綱憲禮節正公事聖上柔聲婉容問安寧勤孝虔恭果斷寬洪剛健文明聖德合同奏百戲四奏初春曉之曲小梁州端拱嚴宸事紫微秉運璇璣四時百物總相宜仰賴明君德大業勝磐石皇儲仁孝明忠義美遐方順化朝儀孝能歡慈愛心敬篤上尊卑意禮上和下睦民鼓舞樂雍熙奏百戲承應五奏乾坤泰之曲滿庭芳春和玳筵安邦興國欽聖尊賢文英武烈于民便禮樂成全亨大業中庸不偏順天常節儉為先逹文獻嚴儀訓典孝敬億千年奏百戲承應六奏昌運頌之曲喜秋風文武安軍民樂宴文華會班僚五雲齊動鈞天樂賀春宮讃皇朝奏百戲承應七奏泰道開之曲沽美酒布春風滿畫樓對嘉景鳯凰洲髙捧金波碧玉甌設威儀左右分品從列公侯太平令效聖上誠心勤厚主宗器嚴備春秋諧律呂仙音齊奏欽王政皇天保佑拜舞頓首讃祝進酒千千嵗康寧福夀迎膳樂樂器戲竹二笙四笛四頭管四􅌙二琵琶二鼓三拍板二杖鼓四樂章水龍吟方響笙􅌙鼓樂喧排寶器開玳筵鸞儀旌節錦繡景相連簮纓趨進皆來朝春滿文華殿升座還宮樂章千秋嵗與前同禮部志稿卷二十一
