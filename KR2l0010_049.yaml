body:
  text: 禮部志稿卷四十九明俞汝楫編奏疏學政疏覆行國學三事疏正統三年三月北京國子監助教李洪言三事一國學乃養育天下賢才之所粤自肇建北京南北分為二監例以南人入南監北人入北監原人情所居固適風土之宜論用人任事實有繁簡之異切照北京内外諸司所用監生俱於北監選取不惟北人精通書筭者少抑且在監人數差遣不敷乞勅該部今後南人嵗貢願入北監者許之則賢才遂觀國之心京師獲多賢之用一師儒人才之表率育賢興化實此之繇昔在洪武中本監學官悉如常朝官例給賜牙牌懸帶所以崇國學而重儒臣也其後被言官所論革去乞照洪武中例仍賜懸帶庶俾文教増重禮儀周至一國子監所有膳夫有各州縣糧僉者有為事囚充者其間糧僉者歴年既乆因得隠避差徭囚充者亦有刺字竊盜一概混處國學乞勅該部自後以糧僉者悉准諸司皂隸例令其一年一代以事發充者其係竊盜刺字之徒宜責輪役他所不得槩發本監溷汚學宫上命行在禮部議行之議處教職疏禮部尚書沈鯉題為議䖏教職以飭學政事竊惟教職之親士與有司之親民一也今天下有牧民之官而無教士之官盖所謂教授學政等職者徒取備員實於弟子無分毫授受之益雖亦三年大比毎嵗貢士未嘗乏人而求其成徳達材以著作人之效者則杳乎未之聞也夫人材風俗出自學校為治忽理亂所係可任其廢壊不修至此乎臣等職專風化責有攸歸竊欲稍為振拔使知自奮無所容其督責之法惟慎其選除優其遷轉以示鼔舞作興之意使由科目出身者不薄此而不為貢途出身者不畫地以自限庶幾師道立而學政之修舉有日矣請自萬厯十七年為始新科進士有願就教職者免其自行陳乞止具呈辦事衙門移文吏部代與題准即與除府學教授教授三年查果稱職原係二甲者陞各部主事係三甲者陞推官知縣俟其歴俸三年將前教職舊俸准折有司年半與初選推官知縣歴俸四年半者一體推陞行取其三甲進士有願乆任教職以終作人之效者許於就選之日具呈案候待其六年徑陞各部主事三年者陞國子監博士等官如有雅意作人如塾師之於子弟日課月程多所造就反能賛助有司修明教化有移風易俗之效者遇該内轉與相應部分遇該行取則通論功績所以優進士教職者似應如此夫其守選未及者得免於淹滯之苦而政體未諳者可習見有司之事或遇該鄉試之年則聘取同考不患乏人斯其所以優之者又不在遷轉之間而已㑹試副榜舉人及下第乞恩就教者本為貧而仕者居多乃當臨選之期猶持兩端不決者何也盖年長而願就教職者本利於推陞之速年青而有志進取者又惟恐推陞之速此其情之不同有若是相反者不可不兩從其便也請自今以後凡舉人就教者俱經㑹試一次方與推陞有司如就教之後㑹試不第而仍願乆任教職以終作人之效者許具呈案候准其再一㑹試方與推陞已經三次者不准其餘仍照常推用若有造就人材修明教化如前項所稱功績者三年以上陞司務博士知州九年考滿起送到部者陞各部主事大理寺評府同知所以優舉人教職者似應如此夫進士舉人就教者多則教授學正可悉得科目出身者而用之縣學教諭雖不盡然亦宜選訓導之有賢聲者以充其任盖掌教得人則一方學政有為之綱維者貢士教職視科目出身者常多數倍乃近年以來則一任分教再任掌教槩從劣轉彼既無可欲之勢以誘其前而又有患失之心以隨其後未有不甘心自棄者故學政之壊由貢途居多而鼓舞作興亦宜於此輩加意也合無貢士教官查有稱職者除春秋兩季照常序轉學職外其雙月大選遇該推陞之時亦查其年力精壯考語特優者與一體推陞有司九年考滿起送到部而著有前項功績者陞知州助教其各該撫按薦舉教職者亦特許寛其人數仍於薦本中以其資格分為三段示不相掩如云某以上係進士出身某以上係舉人出身某以上係貢士出身斯不得偏右科目致枉公論以消阻貢士之氣所以優貢士教職者似應如此夫待之優則人知自奮而師道可立學政不患其不修矣至於有司改教近年事例猶有可議者盖凡撫按官論劾有司而欲存一線之路者必曰操守猶未大壊學問尚為可師夫曰守未大壊非果不壊特惜其履任之淺也曰學可為師非真有學特借此以為之名也審如是則教士以貪而已矣何重民而輕士如此也合無自今以後論材力則姑准改教犯操守則降調閒散不許槩與教職以溷學宫亦補偏救弊之一事伏乞勅下吏部議覆施行臣等幸甚題奉聖㫖這教職選任陞遷等項俱依擬行以後撫按論劾有司但操守有議的不許擬改教職欽此題乞正文體疏萬厯十五年禮部尚書沈鯉題為士風隨文體一壞懇乞聖明嚴禁約以正人心事儀制司案呈照得近年以來科塲文字漸趨竒詭而坊間所刻及各處士子之所肄集者更益恠異不經致悮初學轉相視效及今不為嚴禁恐益灌漬人心浸尋世道盖人惟一心方其科舉之時既可用之以詭遇獲禽逮其機括已熟服役在官茍可得志何所不為是其所壊者不止文體一節而亦於世道人心大有闗繫相應題請申飭以遏狂瀾等因案呈到部臣等㸔得言者心之聲而文者言之華也其心坦夷者其文必平正典實其心光明者其文必通達爽暢不然者反是是文章之有驗於性術也如此唐初尚靡麗而士趨浮薄宋初尚鈎棘而人習險譎是文章之有闗於世教也又如此洪武二年詔頒取士條格五經義限五百字以上四書義限三百字以上論亦如之䇿限一千字以上務直述不尚文藻仁宗朝俞廷輔奏准科目取士務求文辭典雅議論切實者進之憲宗諭詹事黎淳曰出題刋文務依經按傳文理純正者為式故今鄉㑹試進呈録必曰中式則典雅切實文理純正者祖宗之式也今士子之為文式乎不式乎自臣等初習舉業見有用六經語者其後以六經為濫套而引用左傳國語矣又數年以左國為常談而引用史記漢書矣史漢窮而用六子六子窮而用百家甚至取佛經道藏摘其句法口語而用之鑿樸散淳離經叛道文章之流弊至是極矣乃文體則恥循矩矱喜創新格以清虛不實講為妙以艱澁不可讀為工用眼底不常見之字道人間不必有之言茍竒矣理不必通茍新矣題不必合斷聖賢語脈以就已鋪叙出自己意見以亂道之經常白日青天之下為杳㝠魍魎之談此世間一恠異事也夫出險僻竒恠之言而謂其為正大光明之士作𤣥虛浮蔓之語而謂其為典雅篤實之人也可乎如謂人自人而言自言也則以文取士者獨以其文而已乎抑孟子之所謂生於其心害於其政者豈無稽之言乎臣等不以文為重而為世道人心計心竊憂之嘗謂古今書籍有益於身心治道如四書五經性理司馬光通鑑真徳秀大學衍義邱濬衍義補大明律㑹典文獻通考諸書已經頒行學宫及著在令甲皆諸生所宜講誦其間寒素之士不能偏讀者臣等不能强博雅之士渉獵羣書者臣等不敢禁但使官師所訓迪提學所課試鄉㑹試所舉進者非是不得旁及焉仍乞容臣等㑹同翰林院掌印官將𢎞治正徳及嘉靖初年一二三塲中式文字取其純正典雅者或百餘篇或十數篇刋布學宫以為凖則使官師所訓迪提學所課試鄉㑹試所舉進者非是不得濫取焉除鄉㑹試已經臣等題奉欽依遇塲屋掲曉後各該提調官即將中式硃卷盡數解部逐一㕘閲有犯前項禁約者隨即指名㕘處外其各省直提學官各持一方文衡手所高下人皆嚮風轉移士習尤為緊切乃往時止於科舉年分稍一申飭其各省直小考則任其變亂程式置之不問是謂濁其源而求其流之清也不可得已合無恭候命下容臣等咨行各該提學仰體朝廷徳意相率以正文體端士習轉移世道為己任而不以厭常喜新標竒攬異取快於口耳聲名為諸士倡始平時訓諭師生惟將前項經書史籍隨其所習考核講究務令貫通至於臨塲較閲品題高下則一以見今頒行文體為式如復有前項險僻竒恠決裂繩尺及於經義之中引用莊列釋老等書句語者即使文采可觀亦不得甄錄且摘其甚者痛加懲抑以示法程仍將考過所屬生員原取優卷前五名或三名以上者嵗終解部科舉年塲屋畢解部臣等逐一考驗不許另有謄改如有故違明㫖沿襲前弊壊亂文體者定將提學官分别卷數多寡題請罰治本生行提學道黜退除名仍乞勅下吏部今後考課提調學校官員一視其能正文體與否以為殿最其解部考卷容臣等閲畢咨送吏部一體考驗施行等因題奉聖㫖是近來文體輕浮險恠大壊士習依擬着各該提學官痛革前弊仍將考取優卷送部稽查如有故違的你部裏摘出開送内閣重㕘治科塲後㕘閲硃卷節年題有定例今後也要着實舉行毋事空言欽此責成正文體疏萬厯二十四年禮部尚書范謙題為嚴禁文體詭異事儀制司案呈照得我朝開科取士其鄉㑹試録必曰中式中式者何依經按傳純正典實而已乃今取士猶故也而式則澌滅無餘矣離經叛道左袒於清虛竊諸子家為談柄矣又或外正題而略無發明影時事而恣為誕妄士習之弊風教之湮從來未有若此之甚者然原其噄緊則在提學各官倘兢兢以依經按傳純正典實為楷模尺寸不爽士非此欲進無繇其孰敢不軌於正初試既正繇兹而鄉試而㑹試不過皆此一時所識拔諸子弟員又孰敢不軌於正乎是乃所謂正式是乃所謂真才若夫炫於俗艶諉於時㑹就士論士尚詭異而弁髦制典則是庠序為異端青衿不復知孔孟祖宗功令其謂之何哉且夫以賢人語發明聖人尚不得形肖況以異端之説竄入吾儒又以時事支離逞臆令人傳哄不已此而不禁竊恐狂瀾濫觴罔所底止祖宗二百年養士三年大比其初似不爾也查得萬厯十五年二月内該本部題為士風隨文體一壊懇乞聖明嚴禁約以正人心事内稱諸士經義之中引用莊列釋老等書決裂繩尺欲提學官將原取優卷歳終解部如有沿襲前弊壊亂文體者定將提學官分别卷數多寡題請罰治本生黜退除名等因奉聖㫖是近來文體輕浮險恠大壞士習依擬着各該提學官痛革前弊仍將考取優卷送部稽查如有故違的你部裏摘出開送内閣從重㕘治科塲後㕘閲硃卷莭年題有定例今後也要着實舉行毋事空言欽此又查萬厯十六年正月内該禮科題本部覆為乞行申飭釐正文體勅㫖以光科塲盛典事内稱考過優卷已經題准解部其到任近地里逺者限二月終旬題㕘若文體違式係提學官造士不端宜從重㕘治以重詔㫖而信命令等因奉聖㫖這釐正文體事宜依議着實行各官如有違明㫖沿襲舊套的你部裏及該科務要指名㕘治欽此大哉皇言昭如日星其為士習文體慮至深逺已以故一時查㕘違慢既嚴而詔令職守愈信乃今歳月滋乆法令漸弛各提學官雅志釐正者固多而茍且竣事者亦復時有試卷解否參差不如徃約文體純疵相較日見可駭其説大都有二提學官掄選諸士不以文體為優劣惟取其才氣筆頭為奬賞及至查閲得出尚靳黜革則士亦何懲之有吏部及夲部考核提學官未及以士習為殿最因仍姑息㕘罰乆虛即有真能以士習為己任亦未立見表異則提學官亦何勸之有科塲不逺似應亟行申飭等因案呈到部㸔得釐正文體責在提學節奉明㫖不啻再三乃今沿襲故套殊非法紀既經該司具呈前來相應題請恭候命下本部通行省直提學院道定如萬厯十五年題准事例各將原卷通限本年十二月終解部其路逺新任者限二十五年二月内解到容臣等查閲字句如有仍前詭異雜用佛老百家違悖註疏者開送内閣覆閲將提學官照例㕘治本生定行黜退不許延緩謄改遲悞一併題㕘學官仍將先後明㫖刋刻告示示曉諸生使知近習在所必禁坊間新刻詭異主意時文轉相蹈襲惑亂初學有妨士習提學官即行查核將板劈毁勿得傳布本部仍行吏部凡提學官陞轉各以轉移士習與否以為殿最庶斯文之統紀不淆祖宗之法紀愈肅諸所得士必光明純正用以成人才維世道所禆益不淺矣題奉聖㫖是近來文體險恠屢經明㫖申飭全無改正這所奏依擬着實舉行以後提學官務查有無轉移士習為殿最不許概擬陞轉吏部知道請增進士名額疏嘉靖三十二年禮部尚書歐陽徳題為照國家求賢惟進士之途尤重而牧民則州縣之官尤親近因邉圉有警内地多灾財貨匱乏民生困蹙而進士所治州縣縁其自待不輕而上官下民視之加重志氣不懾法令易行故其政事猶多可觀於是中外臣工皆謂宜多取進士以備守令之選今尚書萬鏜等先後論奏為之反覆申説無非欲奉宣德意軫恤民艱誠為救時急務況㑹試取士原係臨時請㫖用之多則取宜加多非若鄉試有一定之額者伏望皇上俯採所議今科取士合無查照永樂二年或嘉靖二年名數令備選用庶邉方緊要及腹裏疲敝州縣舊選科貢者亦得間選進士宜於治理有補民生多賴及照奏内要將所増之數以十分為率北卷取五中卷取二南卷取三盖以邉方守令湏得籍貫相近者為之庶風氣相宜土俗易諳誠非劑量通融之道但額數原無預定今日取士上裁難以定擬若干名外為所増之數其南北中分數合無仍遵舊制不必增減均乞聖明裁定勅下遵奉施行題奉聖㫖照嘉靖二年取四百名南北中分數如舊例行宗藩疏宗藩七議疏嘉靖四十四年禮部儀制司郎中戚元佐謹題為議處宗藩事宜事臣聞國家極重之勢慮不可反天下隠憂之伏謀當預圖方今宗藩日盛祿糧不及人皆憂之言官亦嘗屢切陳然而卒未聞有善處之䇿往歳本部㑹議宗藩條例事有畫一之法冒濫不得容其奸宄蠧頓裁時稱一快然天潢繁衍而椒聊𤓰瓞者不可限也國課有額而歳徵難派入者不足供也近因科臣建議事下本部臣係該司職掌也已經通行各藩及兩京各衙門人攄所見得具疏請今已及期止有南京禮部一疏稍擴條格略陳其槩而其他亦未有言及之者盖以宗藩事體動闗祖訓是以議即窒礙法多掣肘然欲不拂祖訓而聊且通融則亦補偏救弊之法而非拔本塞源之道也諺云揚湯止沸不如釜底抽薪今日之事若非大破常格以處之則將來禄糧必不可支有司必不能給宗藩必不能謀生國家必不能無事不出數年而有禍不可勝言者矣今之議者毎曰祖訓在上不可少千而不知祖訓之言祖宗未嘗拘也故欲議宗藩而各得所當先統觀宗藩前後始終不一之故而深察祖宗微意之所在然後可以審其權衡而酌議之耳盖高皇帝雄畧開創首啓宗封衆建諸子周錯要地如北平天險文皇居之北平東盡諸蕃而西瀕大河如大寧遼左上谷雲中則遼寧谷代四王為之保塞鴈門南控河上而西扄嘉峪如太原延慶環靈酒泉張掖則秦晉慶肅四王為之屏蔽如内郡諸王亦皆秉鉞部兵崇權握勢維城維翰棊布星羅此固一時也迨於靖難以後世襲隆平齊谷維譁漢趙旋孽或懲或貸日積猜嫌彛臬益煩兵權盡釋朝堂無懿親之迹府僚無内補之階情親而勢愈疎養弊而防滋密此又一時也嗣是而後驕侈漸盈間作不典荒湎譎暴歳無虛牘亂倫逆節屢犯明條法多圜土之收辟有勒盡之慘況乎邸用繁增經制無畧髖髀莫解尾大為虞仁人悽慘而寒心志士痛哭而不足此復一時也其在於今則人多祿寡支用不敷假貨掲賞朔食望米以致資身無䇿日不聊生乃有共蓬而居分餅而食四十而未婚二十載而不食語及中冓則言之醜而不可詳殍為道殣則狀甚悲而不忍見强梁者彎弓走馬白晝搶奪於郊衢柔輭者執捶盖潛身竄入於輿皂此又一時也夫高皇帝草昧之初列建宗子文皇帝靖難之日思鑒前車用意不同各有攸當至列聖以迄於今時移勢改恩以義裁其分其理自有不能以曲盡者矣即如高皇帝見超一世豈不知宗人之有今日乎但開國之初固當如是至於世逺親降因時損益亦待後善繼述之主變而通之耳夫國初親郡王將軍纔四十九位女纔九位至永樂年間增封親郡王將軍四十一位女二十八位其數尚未盡多也而當時禄入已損於前不能全給今二百年來宗支造入玉牒者共計四萬五千一百一十五位而見存者二萬八千四百五十二位視國初不啻千倍天下王府之禄反多於嵗供京師之米即使盡發上供之輸猶不足王禄之半為今之計欲裁宗藩之禄以分給之則各宗所入刻削已盡而且至於無可裁矣欲加小民之賦以周給之則貧民之業誅求已極而且至於無可加矣夫各宗迫於饑寒而喫喫相聞有司苦於無措而遑遑在慮況乎名封婚禮請乞保勘奏報查駁文移展轉更有甚不易者以㕘之乎夫今日之事已為難處十年之後截長補短毎人而生二子又不知其幾何人也添一人則添一人之封添一封則添一封之禄此而復益以數千百萬禄米國家常賦不足以供豈有神運鬼輸之術以濟之哉議者曰國課不給稍倣漢家分土之意使各宗人自為養生育多寡皆不必顧則冒濫自絶亦可少蘇有司之力為此説者意非不美然以一人論之且如郡王其禄千石倘生十子則毎人而百石三七兼支尚有本色米三十石也又一相傳則或生三四子或生十數子則以三十石米而三四十數分之矣又一再傳亦復如是則愈分而愈微夫婦臧獲少者不下數人朝饔夕餐婚姻死塟其何以贍彼庶民之家亦有薄産而世傳不乏者以其各有營業而日生不窮也今宗室坐食自守而欲人自為生臣固知其不能矣臣謂當今國事之極大者莫如宗室天下之大可憂者亦莫如宗室於此而不開之以生路固不可開之以生路而不善通夫祖宗亦不可盍不觀諸祖宗朝乎彼國親王之禄五萬復有緞絹茶鹽之用亦復萬計不數年而止給禄米不給雜用又不數年而減為萬石又不能給而代肅遼慶寧國諸王且歳給五百石高皇帝令自已出而前後已如此至永樂祿米日殊秦魯唐府各五千石遼韓伊府各二千石肅府僅七百石慶府雖七百五十石而郡王常於數内撥給文皇帝去國初未逺而祖訓之文亦不盡守之矣況親王出城嵗時訓練蒐兵講武祖訓也而靖難以後則寢之郡王子孫任用以官陞轉如常祖訓也而屢葉以來皆無之則高皇帝祖訓列聖已不遵而奉行之矣其在今日事勢愈難尚可膠柱而調瑟乎即使高皇帝而覩今日之困如此文皇而遇今日之難為又如此將援照制禄之初而盡給之乎抑通變其術而别為之議乎況封建同姓世世相傳此古之所有坐食縣官職爵世授則古之所無臣故以為欲善其法必須大破常格不拘祖訓各藩封爵不必盡授有不封者士農工商各從其便一切出城越闗之例盡弛其禁使人人得以力業則各宗有謀身之䇿而國家紓空乏之憂我皇上親親之誼亦庶可以善其後矣臣之此議人非智不及此而不敢以聞於上者良以祖訓難更又恐出城之禁一開萬一有不逞之徒起釁生變則追論首事之臣不免晁錯始禍之誅耳又聞高皇帝時平遥訓導葉伯臣應詔陳言首請裁抑諸王而上輒大怒被逮死獄其後不數年而親王之禄亦遂大減是高皇誅其身而用其言伯臣之身雖戮而有功於國則大矣臣於此時無故而發大難之端非不知其事之可危但今日之事國事也人臣之義茍利於國死生以之臣職掌所闗祸福利害皆所不計即使用臣之言而誅臣之身臣無所悔矣謹僭擬數欵開列於左條議上聞伏乞勅下本部通行各親郡王大集將軍中尉從長計議當今各宗子女見有幾何各處賦税見有幾何自今以後人數向増幾何天下民力足能供億幾何各省錢糧尚可加派與否各宗坐食可為乆計與否將臣之所議與相沿之制彼此㕘酌孰便孰礙何利何害當必有一定之見如於事體人情果為利便即具奏前來聴本部議覆施行至於臣之意見所不及與彼之易地所難行者則化裁通變全在當國者一劑量之耳一限封爵查得嘉靖年間豐林王召瀚奏稱宗室之中其弊難究不必較其妾媵有無止定其子女多少議親王限以五子之外其餘多生者止給冠帶榮身並無爵禄令其自行營運或商或農所行從便郡王以三子為例將軍以下各隨等差已經本部酌議具覆先帝未賜決允遂寢其事臣謂人之子女原有多寡不知限也惟限其生子之數則於人情似為少拂宜乎先帝之未允也然而生不必限封則可限盖帝孫王孫親疎有等恩數禮秩隆殺有差今國朝歴世已二百餘年以親論之亦逓減矣故除初封親王且姑照例襲俟三世而後再加詳議外其屢朝支派之分列各藩者當立為定制以限之如親王嫡長子例襲親王矣嫡庶次子許封其四共五位焉郡王嫡長子例襲郡王矣嫡庶次子許封其二共三位焉鎮輔奉國將軍有嫡子許封其二無嫡子上許以庶子一人請封鎮輔奉國中尉不論嫡庶許封一子以上各爵職如有生子數多不得盡封者請各士農工商使其自便有志讀書者與民間俊秀子弟一體入學應舉登名科甲者一如皇親例止任外官其他力田通工等業從便生理可也或曰親王之子例為郡王郡王之子例為鎮國將軍各將軍中尉之子封者固得其所而不封者竟與齊民等不幸而生稍後則一體所分貴賤貧富逈然懸絶已為不情況讀書必頼燈火之資經商必藉貿遷之本力穡必得乎畎畆之授工藝不能無俯仰之累彼將何以為生耶臣以為宗女宗壻尚有婚資多者則給銀百兩今後合無將親王之子不得封者至十六歳者賜之冠帶仍給銀六百兩郡王之子不得封者至二十歳亦賜之冠帶仍給銀四百兩將軍中尉之子不得封者有志入學賜衣巾若止務生業不必槩賜各子仍給銀二百兩以上各子逓減處給則或仕或不仕咸有所賴似無失所之嘆但於查勘一莭極當詳慎庶無冒濫以滋妄費之弊耳或曰擅出城郭國有明禁今既任其生業則必不能出城郭恐為不可臣嘗稽之祖訓並無禁出城郭之文其所以禁之不使出郭者為近日放縱不法者設也茍能各務生業謹守王度一有不檢稍加繩之雖出城何害也或曰宗室有罪例不加刑今既入仕受職與交易僨事一切貸之則貪婪兇縱凌弱暴寡益多事矣臣愚以為宗室不加刑責原非古道即宗室有罪而有司刑罰不加則大亂之道也夫人情有欲所以平其情而不亂者恃有司之法繩之耳今宗室一有小過不以有司治而動必奏請茍以錙銖斤兩彼必忿争而遽欲聞之朝廷則往來勞費廢時妨業彼小民者豈願為之哉若復不較而姑縱之則錙銖不治千金可攫斤兩不戒則腴田可侵故曰有司之法不行大亂之道也夫常人之愛子弟者必望師傅以夏楚以威之今之有司皆士大夫國朝之外傅也今之宗黨皆皇家之苗裔族属之子弟也與其姑息而養成惡徳以就罪辟孰若教戒而造就成才以歸於正之為愈哉且聞今之貧宗傭工隸卒無所不為匿名執役丼心捶楚是陽諱其名而隂受其辱也若顯拔縉紳之列而均受舉劾之公分授四民之業而平以市官之法此大公至正之道不足以言媿矣臣嘗熟思而酌議如此一議繼嗣查得郡王無嗣止許本支奉祀不得援兄終弟及之例近己申明人知共守惟親王之嗣得以親弟親姪繼襲臣愚以為親王之得封謂其帝胄所以分天子之次子親之欲其貴愛之欲其富故崇之以禮貌不使與兄弟同輩大相懸絶耳今子孫相繼世世富貴固不必言但至乏嗣則統緒已絶即以本支奉祀使香火不滅亦已矣而何為又使親弟親姪繼襲其爵哉彼親弟親姪自有夲等爵職何縁躐進王者之尊乎臣愚以為自今以來有絶嗣者止推倫序相應賢能著聞者一人管理府事雖有親弟親姪不得冒請復繼王爵一别疏屬查得國制郡王六世孫以下世授奉國中尉夫奉國中尉自親王而推則七世矣自郡王而推則六世矣即自奉國中尉而推世世不改則與國終始將萬世攷之古昔典禮莫備於周然周家五世外燕㑹慶問皆弗之及非薄之也親親之殺天秩夲然耳禮固有云五世而免殺同姓也六世親族竭矣今至奉國中尉就非皇家袒免以下親乎且祖廟之制親盡則祧今我朝開國四祖肇基徳懿熈仁皆為藏主則於祖且然矣而況卑屬乎臣於前欵議將中尉止封一子然奉國中尉世世皆封一子則恩數無窮親疎無等揆諸古者六世親竭之説大不侔矣合無今後奉國中尉授封一子再傳而下不必賜封止將所生第一子給銀壹百兩使為資本至五世而止其餘聴自便庶恩義並立而法制亦可逺及矣一議主君查得郡縣主及郡縣鄉君各隨父之差等請封初不限其數之多寡及至選配儀賔各有執事誥命禄米從人等項今男封既有限制合無將親王之女止封其三郡王之女止封其二將軍中尉之女各封其一主君之祿俱各照舊外其選配儀賔既有職事誥命列之官階足為榮寵合將衣禄免給亦無不可以上各女有不盡封者仍各給以婚資使為贍用出自親王者給銀二百兩出自郡王者給銀一百兩出自將軍者給銀八十兩出自中尉者給銀五十兩選配之壻聴其自為生理其應舉入仕者悉授外官宗女宗壻除己前者勿論外以後各宗女壻給銀五十兩之外不必另給冠帶壻資一體聴其自便一議冒費查得冒妾子女擅婚子女革爵子女與一應庶人例雖皆不與封然其各子猶有不等口粮革去尤為便利但前項各宗各庶或有年已長成不堪讀書及無産營運或驕惰逰蕩不能生理者一旦革其口糧恐不聊生似亦聖世之棄人矣合無將以前者俱各照舊遵行外自今以後所生之子各宜預為教訓聴其從便生理不必給以口糧則宗人不致告病而國家亦可以節無益之費矣一議擅婚查得宗室請封選婚必有本部題覆行選各宗選定之日奏結完備本部查明具覆方有勘合行令入府成婚若未經奏請而徑自配偶成雖經奏請未經封號而先以成婚皆為擅婚擅婚之子例不得封嵗給米五十石仍本色折半兼支此定例也但各府擅婚最多皆不顯言其弊或假揑奉到勘合或言遵照相沿舊例原未奏請淑宜安人等號此等名色雖各有不同皆属擅婚例無授封之理然彼既不肯自首其弊而奏抄到部必不能違例題覆則一切立案不行固其法之不得不然也夫各宗格於例而無繇申其願臣等拘於法而難以徇其情乃有老大未婚而饔飱不給種種苦抑不可勝述者矣為今之計莫若使各宗自首明言其為擅婚之子照例給與夲等口糧士農工商仍聴其便自今以後生者止許賜名不必再給口糧聴其從宜生理可也伏候聖裁上下其章禮部尚書髙儀言元佐所奏鑿鑿可行但事體重大臣等不敢擅議請通行各王府將奏内事理虛心評議務求允當條列以聞容臣等再㑹諸臣熟議上請宸斷行上從之覆議亟處宗藩疏隆慶四年禮部覆河南撫按栗永禄楊家相禮科都給事中張國彦等奏其略言今天下之至重而難處者莫如宗藩至急而不得不處者亦莫如宗藩臣等歴考前代未嘗有宗室而坐食縣官者我聖祖獨厚宗親世授爵禄恩至渥也祖宗天潢發原之始故奉以數郡而易供至於今日當宗支極茂之時則竭天下之力而難給以天下通論之國初親郡王將軍纔四十九位今則玉牒内見存者共二萬八千九百二十四位嵗支禄米八百一十七萬石有竒郡縣主君及儀賔不與焉是較之國初殆數百倍矣天下嵗供京師者止四百萬石而宗室禄糧則不啻倍之是毎年竭國課之數不足以供宗室之半也然此特論平時耳萬一遇水旱㐫荒征輸無出將何以處之此特論目前耳將來傳世萬億生齒無筭又何以處之今在國家則苦於供給之無措而意外之變可虞在宗室則苦於禄糧之不及而顛連之狀可憫上下公私兩受其困此無他故己良以恩施寡節而輸供之䇿窮禁縳太嚴而資生之路絶今日之勢有不容不變通者也且祖廟之制親盡則祧而襲封之典曽不稍變是待祖宗者薄而待子孫者厚恩禮不幾於倒施乎今之論者動曰祖制不敢輕議然觀洪武初親王禄米五萬石不數年而後以供給難繼減至萬石其後代肅遼慶寧谷諸王且嵗給五百石是高祖制禄已無定矣永樂間秦唐魯府各五千石遼韓伊府各二千石肅府僅七百石慶府雖七百五十石而郡王常於數内撥給是文皇帝頒禄已變更矣盖二祖酌時通變初未嘗執一定之法以傷民病國也假令二祖復起見國家宗室受困如此其議通變又豈待於今日哉近年諸臣建言俱奉㫖通行各王府酌議而栗永禄等所建白視諸臣尤為剴切明審臣等反覆思之為長計惟有限服制以殺其禄給聴自便以開其生路嚴法制以禁其為非而已盖國家才力既已無措則不得不聴自便以開其生路生路既開則不得不嚴法制以禁其為非盖審時酌變為國家經乆之圖莫過於此者伏乞皇上特加軫念將臣等及諸臣所奏俯賜採擇或視朝後時御便殿宣召輔臣諮求長䇿務求定論本部仍以先後諸臣條議通限各王府一併議覆如違限者治輔導官罪候各王府議至之日本部請大集廷議恭候聖明獨斷以成一代章程以定萬世守法上從之宗藩簡便法疏萬厯二十九年禮部右侍郎李廷機題為條陳宗藩簡便之法懇乞聖明裁定以惠天潢以垂永乆事儀制司案呈得宗藩事例歴年所條議精詳妥當見今遵守無敢踰越然宗室猶告稱困苦至畫圖帖説極訴凍餒顛連之狀且有向隅而泣抱鬱抑不平之恨有後言者毎為之深維其故竊見宗室毎請名封到部備查冊籍來歴少有未明不敢題覆父無爵不與母無封不與無奏報不與母年在五十之外者私婚擅婚濫妾已經另題復來辨者不與年逺無稽復來辨者不與凡所以綜覈裁抑節之者略不少徇此在本部雖嚴而不為苛在宗室雖苦而不敢怨也乃有宗室例所應得本部例所應題者其究未嘗不題未嘗不得而特於轉折之多需索之衆等候之乆未嘗省禄粮之升斗而徒朘宗室之脂膏如宗室子女報生有結矣及請名則又取結及請封選婚則又取結結而又結得無煩難又如五年五嵗過矣而未見請名年十五過矣而未見請封選婚年復一年得無阻格就此似當再斟酌變通其間者相應條陳等因案呈到部竊惟王道本乎人情良法莫如簡便臣自署事以來將歴年題准事例日夕展轉既見前此諸臣體悉我皇上敦庸之篤即如酌例奏請期限欵内過期免勘之擾甚多矻矻然奉以周旋而臣因此細繹引伸偶有一得臣敢為皇上陳之臣閲視册庫宗室名封掲帖位下既註云抄出手本册籍稿俱查同間又註云候結夫既查同應題而以候結未題盖縁宗藩要例第四欵内稱宗室子女名封俱繇各該親郡王及管理府事者審實類奏仍取具宗室五位並長史教授兩隣收生人等丼結一并送部如王奏到三月以外而長史教授等結未到致妨查題者本部查㕘行巡按御史將長史教授等官提問據此則候結例也然臣查要例第三欵内宗室新生子女三日後具啓各該親郡王及管理府事審實取具收生親識官眷人等保結明白按季類奏臣隨取各王府報生奏結觀之有五宗結有長史結有教授結有兩隣收生結及取請名結狀觀之與報生同又取請名選婚結狀觀之亦與報生同是結惟一様取至再三斯已煩矣況兩隣之遷徙不常收生之存亡難必即結不足慿而結又不可自得也計長史教授兩隣收生及長史教授所之書役凡若干人其饋送需索常例不知若干此若干者貧宗何人措置不過預冩禄糧重息稱貸剝膚推髓以博升斗之獲而所為候結者直候長史教授之槖盈衙門吏書腹之饜已即查㕘究問竟自推捱申飭禁防終成虛套於宗室寧有補哉又思宗室所患苦者何也奏請之經繇多而饋送需索之費重也盖必展轉措辦有以充饋送需索之費而後敢請其饋送需索必人人滿其所欲而後得請故均之宗室也而有力得之無力不得非所以為平也均之得也而輒以賄成非所以為法也均之與也而必俟其苦求重費而後與之非所以為恩也且以皇上宗室太祖子孫而令乞哀異姓受制賤胥豈理也哉臣反覆思之惟有簡便之法二焉一曰免重結盖報生一結父母來歴既明白則一結足矣此後除選擇婚配另結外至於請名及請封婚其在今日凡奏到結未到者查果明白應題不必候結便與徑題其俟今日以後請名請封請婚者免其教授長史兩隣收生之結尤恐有殤卒不報以死作生及以生冒死情弊則莫能逃於親支之五宗第令單取五宗一結徑逓各府長史教授啓王據宗結以奏而本部止慿王奏不必結來如有虛冒本部查出或被首告事發將本宗㕘爵級五宗罰革禄米一如條例如此則報生結狀至為要緊如或不到部無慿查題定將長史教授㕘黜以為疎玩之戒莫便於此者一曰定取期盖既有報生奏結而又有玉牒册妾媵册年終攅造册殤卒册具可備查本部復設格眼册將宗室父母來歴生年月日并結某宗某人名姓備書位下而該司呈堂親註其上應名封者註一應字另題者註一另字用印鈐盖毎年挨查其及期者某府某位盡數類行該府長史教授啓王具奏如萬厯十七年報生今年十五嵗為婚封之期則行取請封選婚如二十七年報生今年五嵗為名期則行取請名本部一面類奏請照常而行雖有今法猶循舊規正欲相維以防後弊但今取五宗一結奏内總提五宗結勘明白一句不必結到本部其萬厯十七年以來未及請封選婚二十七年以前未及請名者一槩行令於三十三年之内亦取五宗一結啓王類奏如過兩年限期不來奏請者本部例為立案則是前之未註者查取以完之後之未取者查註以挨之舉一切宗藩所應得本部所應題者悉自我而授之彼無使自彼而求於我本宗既與行取知必在題列則府役何所容其騙詐部役何所容其索掯提綱絜領計莫㨗於此者此二説者於舊章無所變更而煩贅可省於闗防更加嚴密而阻格盡除臣不勝揣切欲以此發前人所未發補前例所未周盖聖主展親仁義并用其囂競而不馴者則裁之以義其困苦而無告者則煦之以仁仁尤在乎義之先畏亦生乎感之後臣區區愚見如此伏祈聖明俯賜裁酌如蒭蕘可採乞將所陳免重結定取期二欵勅下臣部施行仍刋續要例以便遵守宗藩幸甚臣愚幸甚親王之國疏禮部尚書沈鯉題為敬陳親王之國舊例以明職掌事近該工科左給事中陳與郊等相繼上疏請命潞王之國疏乆不下乃外議若委罪於臣等之不先請者臣等不得不明職掌以俟裁定且以為他日持守之據焉盖凡親王之國一切擇日具儀雖係禮官掌行皆由傳奉特㫖無敢輒便題請者歴年事例除年逺文卷無存及禮應避諱者不敢槩舉外查得成化三年正月内本部傳奉憲宗皇帝聖㫖朕弟徳王之國凡諸合行事宜所司詳具以聞欽此自是以後傳㫖之國者秀王係成化六年十月崇王係成化九年十一月吉王係成化十三年八月岐王係𢎞治七年十一月益王係𢎞治八年六月壽王係𢎞治十一年六月衡王係𢎞治十一年十二月汝王係𢎞治十四年閏七月涇王係𢎞治十五年二月榮王係𢎞治十六年六月其時傳奉太監懐恩韋泰蕭敬陳寛也臣等猶恐不的復從史館恭奉屢朝實録歴歴查考凡各親王之國亦止開載儀注不見有本部題請之疏嘉靖三十九年雖具題一次亦縁内閣輔臣奉有御扎傳示所司非敢輒便具題也夫樹屏建藩國家盛典孰不有欣然趨事之心乃自屢朝以來親王之國俱繇上命舊規相沿已二百年其中必有精意臣等職在守法不敢不闕其所疑以存典故此所以不先題請也若以時事而論即使例所當請亦須待秋成以後始於擇日為便焉盖凡親王之國俱水陸二路驂從齊發所經之處勞費不可勝言適今畿南諸郡河南山東與衛輝封國所在連嵗饑荒繼之灾疫皇上嘗多方賑濟之若非稍待秋成聞有豐稔之報而明㫖已下便當擇期逺近緩急何以斟酌此亦事體之不可不慮者也夫論舊例則不敢擅請論時事則不敢輕請總之皆職掌闗心反覆思維遂成迂緩若言官於天下之事無不得言之國之請據理而論乃其職也伏乞查照屢朝事例早賜宸斷以襄盛典臣等不勝幸甚奉聖㫖親王之國既有屢朝事例且地方聞已豐稔朕當奏知聖母於明春擇日舉行一應事宜着該衙門預行措辦請逐藩王羣小疏禮部侍郎何宗彦奏為宗社藩封宜有無窮之慮懇乞聖明思維至計屏逐羣小以安宗社以固藩封事臣聞心病者不能緩聲事急者不能安言福藩邇來舉動外之撫按内之閣部科道諸臣不憚苦爭之此實忠於皇上之格言所宜轉圜而聴者也顧諸臣之爭益力福藩之奏叠來皇上之㫖愈厲臣待罪春曹與聞藩政異日釀大亂搆深釁不可解免臣罪滋大敢披瀝為我皇上陳之自古聖帝明王之治天下必乂安百姓以衛宗社使無土崩魚爛之虞其衆建藩封也必教以義方輔以正人授以節制使樂善循禮世世享食租衣税之利未聞徇情溺愛惟利是務而不顧國家之安危如今日者也盖福王生長深宫貴極富溢豈屑為多寡有無計止縁天下之亡命積猾以之誘内竪内竪以之誘福王而王聴熒矣故請求之牘日新月異竭天下之脂膏不足以填谿壑豈知禍患之中於宗社及福藩者不可救藥哉臣謂此輩危宗社者有六害福藩者有二斷斷乎其不爽也何以言之山東京師左輔也從來易動難安曩時括田令下怨咨之聲已不忍聞今承奉門正率百十餘人所在驛騷此豈忠於福藩者哉不過假丈量之名田邉之田業外之業可以恣行包占而一切殷實之家可誣以隠漏抗違惟其所漁食耳既奪民之生命亦何所顧忌山東如此河南湖廣復然卒致分崩潰爛不可收拾此羣小揺左輔以危宗社者一國家數百萬金錢强半出於鹽筴各有定引各有分地洛陽舊食河東鹽以其壤地相接朝發夕至也今改食淮鹽逆河而上數千餘里又欲開店發賣使河南一府盡食淮鹽夫河南既食淮鹽河東之鹽豈能飛越至於南陽懐慶是河東失三府之分地矣且經繇山東之東兖河東之開歸衛等府内竪積猾必多帶私鹽沿途貨賣私引既多正引停格不惟淮揚山東鹽法盡壊即山東長蘆靡不阻滯正額何以完而經費何以給此羣小壊鹽政以危宗社者二京師與敵為隣三軍枕戈坐甲以扞牧圉者為得糈計耳前日薊永餉稍後時環城鼓噪彼時鹽政未壊出賦之地尚未經福藩騷擾已缺餉數月幾成大變假令鹽法又壊山東各省又經數百豺虎擇人而食民且不能安居賦且何處出辦百萬軍士豈能􅑎腹待死耶輕則脱巾而噪重則勾敵為難不知何以禦之此羣小侵邉餉以危宗社者三古者名山大澤不以封良有深意矧晉都根本重地從來藩封未有睥睨重地者知祖宗法度最嚴不敢以私干也今請蘆洲行且請管蘆洲之業内竪往來羣聚不逞之徒競相羶附不曰某處之為利孔也則曰某處之漏正供也金陵之人必不能安枕而卧而高皇帝之衣冠不致震驚不已此羣小窺陪京以危宗社者四自古爭衡天下者必據荆蜀以占上㳺建瓴之勢昔人云所守或非人化為豺與狼非虛語也今請故相田産諸蜀鹽井羣小之意不過据要路津以括囊財賦或無他慮然一有風塵之警此輩能不易慮乎萬一順流而東則陪京危矣矧牢盆在手易興呉濞之謀租賦如山庸蹈永璘之轍戒之在小念此寒心此羣小規上㳺以危宗社者五馬周有言自古國之興亡不由積蓄多少惟在百姓苦樂盖百姓樂國雖貧興之徵也百姓苦國雖富亡之徵也今福王鼎建雄藩豈不欲傳之世世作聖朝屏翰哉乃孳孳為利請馬店請山厰竹木等厰以親藩尊貴躬為纎嗇之謀其䙝已甚況奪一事之利則百姓失一事之生計奪一日之利則百姓失一日之生計時削月朘吮糠及米挺而走險皆敵國也此羣小失人心以危宗社者六凡此六者事已機芽禍已醖釀茍不改圖雖有智者亦無如之何矣夫使有害於宗社而有利於藩封見小遺大猶云不可矧為藩封之害又有歴歴可言者乎有司征租上不敢失正賦下不忍盡民膏況有撫按監司弹壓其間催征甚易二萬頃田之租可必源源常繼也一属内竪管業正租一金必費民十金甚則十金止充各役私槖一金之拖欠如故也不二三年賣妻賣子非死則徙目前利於羣小日後田盡荒蕪無人領種再數嵗二萬頃田化為烏有若求此輩廉靜是窮竒不飱竊脂不肉萬無是理此羣小虧額租以害福藩者一古人有曰愛子教之以義方不納於邪驕奢淫逸所自邪也又曰富不與驕期而驕自至驕不與罪期而罪自至又曰在上不驕高而不危所以長守貴也制節謹度滿而不溢所以長守富也聖賢垂訓炳若丹青福王之富貴極矣又聴其意之所欲得而即以畀之益以驕志助其邪心一時雖若無傷獨不慮時移勢易之後乎鄭之叔段魏之陳思國家之漢庶人非愛之也適所以禍之也天道虧盈鬼神福謙此不熟思禍可翹足而待此羣小昧大計以害福藩者二夫皇上聰明聖智豈闇於利害興亡之戒第情重則理蔽愛偏則慮移雖有後釁略而不思雖有格言忽而不信誠當清夜平旦之時以古今事一提衡較之則烱戒了然改絃宜決速究羣小撥置之人速止丈量管業蘆洲賣鹽故相田産馬店諸厰之事則百姓安瀾洪基永固不然禍至惙焉嗟何及矣天下之人見皇上於瑞王求遂室家之願不可得獨福藩有求必應有奏必俞遂羣然謂皇上福王之外無親愛貨財之外無政事貂璫之外無信任以皇上英賢冠千古改此何難倘恬然不顧遺譏青史忠藎之心豈忍皇上有此聲稱哉臣受恩思報不避斧鉞之誅以效其愚直惟聖明垂察焉禮部志稿卷四十九
