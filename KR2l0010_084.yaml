body:
  text: 禮部志稿卷八十四明俞汝楫編神祀備考神祗祀初立旗纛廟制洪武元年十二月庚寅立旗纛廟先是禮官奏軍行旗纛所當祭者考之於古旗謂牙旗黃帝出軍訣曰牙旗者將軍之精一軍之形候凡始豎牙必祭以剛日祭牙之日吉氣來應大勝之徴纛謂旗頭也太白隂經曰大將中營建纛天子六軍故用六纛氂牛尾為之在左騑馬首秦置旗頭騎以先驅漢武帝置靈旗為兵禱則太史奉以指所伐孫權作黃龍大牙牌後齊天子親征建牙牌唐宋及元皆有旗纛之祭今宜立廟春秋遣官致祭春用驚蟄日秋用霜降日於是上命京師立廟於都督府治之後仍令天下衛所於公署後立廟京都之祭牲用太牢幣用黑色器用籩豆各八籩實以形鹽魚鱐棗栗榛菱芡鹿脯豆實以韭葅醓醢菁葅鹿醢芹葅兔醢笋葅魚醢簠簋各二實以黍稷稻粱登鉶各一實以太羮和羮犧尊象尊山罍各一實以醴齊泛齊事酒樂用時樂先期獻官及各執事官散齊二日致齊一日獻官以都督充前祭一日獻官公服省牲視鼎鑊滌溉有司陳設如儀至日清晨有司立伏百官具公服侍班皇帝服皮辨御奉天殿奉香授獻官由中道出至午門置龍亭內儀仗鼓吹導引至祭所獻官及陪祭執事官各就位迎神再拜行奠帛禮獻官詣盥洗所搢笏盥帨出笏詣旗纛位前樂作跪搢笏上香奠帛出笏俯伏再拜樂止復位行初獻禮獻官至洗爵位搢笏滌爵出笏詣酒尊所酌醴齊詣神位前樂作跪搢笏上香祭酒奠爵出笏俯伏再拜樂止讀祝讀祝官取祝跪讀訖樂作獻官俯伏再拜樂止亞獻酌泛齊終獻酌事酒儀並同初獻但不用祝飲福受胙獻官詣神位前再拜跪搢笏祭酒飲福酒受胙出笏俯伏興再拜復位陪祭官皆再拜徹豆望燎獻官詣望燎位執事者捧祝帛置燎所燎半禮畢天下衛所祭用少牢儀物視京都殺焉封城隍神洪武元年十二月封京都及天下城隍神上謂中書及禮官曰明有禮樂幽有鬼神若城隍神者歷代所祀宜新封爵遂封京都城隍為承天鑒國司民升福明靈王其在北京開封府者封為承天鑒國司民顯聖王臨濠府為承天鑒國司民貞佑王太平府為承天鑒國司民英烈王和州為承天鑒國司民靈護王滁州為承天鑒國司民靈佑王五府皆正一品餘在各府州縣者府為鑒察司民城隍威靈公秩正二品州為鑒察司民城隍靈佑侯秩三品縣為鑒察司民城隍顯佑伯秩四品其章服京都城隍衮冕十有二章開封府等五府封王及各府封公者九旒九章各州縣封侯伯者七旒七章命翰林詞臣撰制文以頒之京都城隍制曰帝王受天明命行政教於天下必有生聖之瑞受命之符此天示不言之妙而人見聞所不及者也神司淑慝為天降祥亦必受天之命所以明有禮樂幽有鬼神天理人心其致一也朕君四方雖明智弗類代天理物之道實罄於衷思應天命此神所鑒而簡在帝心者君道之大惟典神天有其舉之承事惟謹應天府城隍升福侯宋代所封位號也聰明正直聖不可知固有超於高城深池之表也世之崇於神者則然神受於天者蓋不可知也兹以臨御之初與天下更始凡城隍之神皆新其命眷此興王之郡神相居多宜加封曰承天鑒國司民升福明靈王明者神之體容光必照靈者神之用隨感而通此固神之德而亦天之命也司於我民鑒於我國享兹明祀悠久無疆主者施行開封城隍致詞改其後曰眷此名城天下之中定帝王之宅金湯既甲於列郡神號宜盛於他邦可封曰承天鑒國司民顯聖王顯則著其靈明無不照聖則造其極大而化之此固神之德而亦天之命也臨濠城隍曰眷此鄉邦之地實同豐沛之都朕肇自戎行至成大業皆神默相豈敢忘初可封曰承天鑒國司民貞佑王貞則無二亶明睿而無私佑則垂祥仰感通之如在太平城隍曰眷此名城雄奠江表朕初飛渡首駐其間再四禱祈神告不二宜封曰承天鑒國司民英烈王英則發越精華烈則威靈烜赫和州城隍曰眷此名城雄奠江右王師戾止屢獲成功非神相之何以臻此宜封曰承天鑒國司民靈護王靈則威加於顯著護則福及於保綏滁州城隍曰眷此名城雄奠東淮王師首駐戰勝俱安成此峻功實神相之宜封曰承天鑒國司民靈佑王靈則威之顯著佑則福之保綏各府城隍曰眷此郡城明祇所司宜封曰鑒察司民城隍威靈公威則照臨有赫威則感通無方各州城隍曰眷此州城靈祇攸主宜封曰鑒察司民城隍靈佑侯靈則隨感而通佑則錫善以福各縣城隍曰眷此縣邑靈祇所司威靈丕著福澤普施宜封曰鑒察司民城隍顯佑伯顯則威靈丕著佑則福澤普施其始末之詞則皆與京都城隍同但鑒於我國於各郡則改曰鑒於我郡政於各州縣則改曰州政邑政而享兹明祀於郡州縣則皆改曰享兹祀典云有司祀典洪武元年十二月辛丑命天下凡祀典神祇有司依時致祭其不在祀典而常有功德於民事蹟昭著者雖不致祭其祠宇禁人撤毁城隍神廟式洪武三年京師城隍廟成初城隍舊祀卑隘詔度地營築既而中書省臣及尚書陶凱請以東嶽行祀改為廟上可之修飾既備建左右二司凱復請如前代建六曹曰吏户禮兵刑工二司左曰左司之神右曰右司之神上命罷六曹不必設左右二司止稱曰左司神右司神仍命置神主主用丹漆字以金旁飾以龍文及是始成命凱等迎主入廟用王者儀仗設厲壇洪武三年始命祭無祀鬼神先是上以兵革之餘死無後者其靈無所依命議舉其禮至是禮官奏按祭法王祭泰厲諸侯祭公厲大夫祭族厲泰厲謂古帝王之無後者公厲謂古諸侯之無後者族厲謂古諸大夫之無後者又士喪禮疾病禱於厲鄭氏謂漢時民家皆秋祠厲則此祀又達於民也春秋傳曰鬼有所歸乃不為厲然則鬼之祭享而無所歸則必為害古者七祀於前代前王諸侯卿大夫之無後者皆致其祭豈無為而然哉後世以為涉於淫諂非禮之正遂不舉行而此等無依之鬼乃或依附土木為民禍福以邀享祀者蓋無足怪今欲舉其祀宜於京都王國各府州縣及里社皆祭祀之而天下之淫祀一切屏除使鬼之無所歸附者不失祭享則灾厲不興是亦除民害之一也上然之乃命京都築壇於𤣥武湖中天下府州縣則皆設壇於城北其各里內又立祭壇歲以三月清明七月望及十月朔日長吏率僚佐候晡時致祭牲用羊豕各三以米三石炊飯正壇設城隍位羊一豕一壇下東西各席地焚香列炬各設羊一豕一并設飯羮以祭之壇之南立石刻祭文京都謂之泰厲王國謂之國厲府州謂之郡厲縣謂之邑厲民間謂之鄉厲著為定式祭封內山川洪武五年上諭中書省及禮部曰始天下方定其山川皆統祀於京師然古者諸侯祭封內山川今行省大臣方面重寄視古之方伯連帥無異而其境內山川所當祭者其定制頒行之於是禮部奏五嶽五鎮四海四瀆禮秩尊崇及京師山川皆國家常典非諸侯所得預者其各省惟祭風雲雷雨及境內山川之神宜共為一壇設二神位以省臣初獻都指揮司官亞獻府官終獻祭期春用驚蟄後三日秋用秋分後三日每位牲用羊一豕一籩豆四簠簋二爵三鉶犧象尊各一祝一風雲雷雨帛四山川位帛二凡祭致齊三日可自是定天下十三省山川皆各省自祭舊合祭京師及四夷山川悉罷之四夷山川祭法洪武八年癸已以外夷山川附祭於各省山川之次先是禮部尚書牛諒言京都既罷祭天下山川其四夷山川亦非天子所當躬祀乃命别議其禮以聞至是中書及禮部奏以外夷山川附祭於各省如廣西則宜附祭安南占城真臘暹羅鎖里廣東則宜附祭三佛齊瓜畦福建則宜附祭日本琉球浡泥遼東則宜附祭高麗陜西則宜附祭甘肅朵甘烏思藏京城更不須祭又言各省山川與風雲雷雨既居東南向其外夷山川神位宜分東西同壇共祀上可其奏命中書頒行之將祭則遣官一人往監其祀王國府州縣社稷洪武十一年禮部奏京都大社大稷既同壇合祭其王國各府州縣仍用舊制於禮未一今議亦合同為一壇神主皆依京制用石主埋於壇南木主二祭則設之祭畢收藏其配位舊以勾龍配社后稷配稷今大社大稷既奉仁祖淳皇帝配其王國府州縣無可配者難設配位今議王國社宜稱國社之神稷宜稱國稷之神府則稱府社府稷州則稱州社州稷縣則稱縣社縣稷從之命頒其制於天下祭物非土産聽其缺洪武十三年溧水縣祭社稷以牛醢代鹿醢御史案實奏之上命當其罪而禮部奏云著令凡祭物缺者許以他物代上曰夫祭物所謂缺者以非土地所産溧水固有鹿何得謂缺是有司無誠心於祀神而故為是茍簡也夫百司所以能理其職而盡民事者以其常存敬懼之心耳今溧水之官於神猶怠忽之則於人事又何懼焉命論如律乃敕禮部下天下有司凡祭必備其物茍其物非地産所有又無商賈販鬻則聽其缺可也軍衛設祀壇宣德二年丁丑兵部都督談廣奏天下郡縣俱設風雲雷雨山川社稷壇春秋祭祀為民祈福宣府久置軍衛而無壇所近年風雨不調人多疾病請如郡縣立壇致祭行在禮部言有司祭山川等神宣府邊衛似難比例上曰奉祀神明為人祈福軍衛獨非吾人乎其准所言令於農隙之時為之城隍神不稱爵正統四年十二月山東登州府知府楊頤奏本府原係州治其城隍封靈佑侯今升為府宜加封公爵奏下禮部議尚書胡濙等以為今北京城隍止稱京都城隍之神如五嶽四瀆原有封號洪武間皆已革去可令照例稱登州府城隍之神庶合禮制從之邊衛設壇宣德三年四月總兵官都督談廣奏天下郡縣設風雲雷雨山川社稷壇春秋祭祀為民祈福宣府久置軍衛請如郡縣立壇致祭行在禮部言宣府邊衛似難比例上曰奉祀神明為人祈福軍衛獨非吾民乎其准所言令於農隙之時為之祭嶽瀆違制𢎞治元年正月都察院左都御史馬文升等言嶽鎮海瀆等祠廟皆有前太監陳喜及奸人鄧常恩所造石函周遭有符篆中貯泥金書道經及金銀錢寶石五榖似為魘鎮之術者又有先帝遣陳喜致祭祝文其文不知何人所撰皆刻之石本廟故事凡改元之初及水旱災傷則致祭嶽鎮海瀆之神例命翰林院撰文分遣朝臣以往未聞外官撰文內臣往祭之事况石函魘鎮世無此理今常恩等已正憲典其石函石牌尚存于寧以妖術惑人自言得聚寶盆於桃花洞知州程觀信之事聞俱坐斬既遇赦寧發戍邊逺天下妄言惑衆如寧者尚多請出榜禁約衡山南嶽祀例正統元年湖廣布政司照磨所檢校程富奏衡州府衡山縣古有南嶽廟年久滋敝有失觀瞻請設道士及佃户修整事下行在禮部覆奏因言五嶽五鎮四海四瀆事同一體俱合用道士或十人或五名每廟佃户四户灑掃供役仍令該管府州縣官時加巡視以稱崇祀之禮從之正恆山北嶽祀典𢎞治四年先是太子少保兵部尚書馬文升言恆山北嶽在今大同府渾源州宋有天下未混一北為契丹所有故祭北嶽於真定府曲陽縣逮我太宗文皇帝遷都北平而真定却在京都之南當時禮官亦未建明猶祭北嶽於曲陽臣考周禮載恆山為并州之鎮在正北我朝一統志亦載恆山在渾源州南二十里即北嶽以此觀之則北嶽當在渾源州無疑今本州北嶽廟趾猶存敕禮部詳考移文山西守臣於渾源州恆山舊跡修建北嶽廟以後北嶽歲祭於此行禮下禮部覆議以為祀北嶽恆山於曲陽歷漢唐宋以至國朝上下幾二千年未之有改其渾源州雖有恆山亦名北嶽然祀典不聞碑志無考况今恆山實為畿內巨鎮孕靈已久一旦廢此舉彼恐有窒礙如文升所奏渾源州恆山既為一方之望古跡間存復有洪武年間重修廟宇但恐年久頽敝請下所司量加修葺春秋致祭威靈歆格用垂悠久下禮部覆議行北嶽改祀近地𢎞治十五年吏部尚書馬文升奏嶽瀆之祭自古皆即其近地而廟祭之惟北嶽祭於真定府曲陽縣北海祭於河南濟源縣其地之相去頗逺據大明一統志所載謂山西渾源州原有北嶽祠廟欲行修葺改祭北嶽於此該禮部覆議得自帝舜以來已祭北嶽於曲陽而我太祖復循用不改今請仍如舊典禁淫祠洪武三年禁淫祠制曰朕思天地造化能生萬物而不言故命人君代理之前代不察乎此聽民人祀天地祈禱無所不至普天之下民庶繁多一日之間祈天者不知其幾瀆禮僭分莫大於斯古者天子祭天地諸侯祭山川大夫士庶各有所宜祭其民間合祭之神禮部其定議頒降違者罪之於是中書省臣等奏凡民庶祭先祖歲除祀竈鄉村祈土榖之神凡有災患禱於祖先若鄉厲邑厲郡厲之祭則里社郡縣自舉之其僧道建設齊醮不許進章上表投拜青詞亦不許塑畫天神地祇及白蓮社明尊教白雲宗巫覡扶鸞禱聖書符呪水諸術並加禁止庶幾左道不興民無惑志詔從之附郭縣罷重祭洪武十七年禮部議天下府州縣先師孔子及社稷山川等祀如縣之附府者府既祭縣亦以是日祭誠為煩瀆自今縣之附府者府祭縣罷之詔從其議雜祀祭海洪武元年正月命道士周原德往萊州諭祭海神原德未至前數日並海之民見海濤恬息聞空中洋洋然若有神語者皆驚異及原德至臨祭煙雲交合異香郁然靈風清肅海潮嚮應竣事父老皆欣喜相賀爭至德所曰海濤不息者十餘年矣今聖人應運太平有兆海濱之民何幸身親見之原德還奏上悅以殲賊立江海神廟正德八年三月命立江海神廟於狼山歲時祭初巡撫淮揚都御史張縉言流賊於狼山乘颶風之變實江海效靈宜立廟以昭神貺禮部議江海之神已秩祀典此復立廟幾於煩瀆詔從縉請祀馬祖洪武二年遣官祭馬祖先牧馬步馬社之神初命築壇於後湖祀馬祖諸神敕禮官考其禮儀至是禮官奏言周官牧人掌六馬之屬春祭馬祖夏祭先牧秋祭馬社冬祭馬步馬祖天駟星也孝經說云房為龍馬先牧始養馬之人未聞馬社始乘馬者世本曰相士作乘馬馬步謂神之災害於馬者隋用周祭以四仲之月唐宋因之今擬春秋二仲月甲戊庚日為宜於是遣官行禮為壇四壇用羊一豕一幣一其色白籩豆各四簠簋登象尊壺尊各一樂用時樂獻官齊戒公服行三獻禮祝文曰維神始於天地之初而馬生於世牧養蕃息馭而乘之間廏得所歷代興邦戡定禍亂咸賴戎馬民人是安朕自起義以來多資於馬摧堅破敵大有功焉稽古按儀載崇明享爰申報本以昭神功謹以制幣牲齊式陳明薦尚享申明五祀洪武二年禮部尚書崔亮奏周官天子五祀曰門曰户人之所出曰中霤人之所居曰竈曰井人之所養故杜佑曰天子諸侯必立五祀所以報德也今擬依周官五祀止於歲終臘享通祭於廟門外羣臣則四品以上祀中霤門户三神五品以下祀井竈二神庶合禮意上命著為令祭司馬洪武五年禮部奏舊祭馬祖先牧馬步馬社今擬止設一壇祭司馬一神每歲止於仲春一祭從之祭五祀洪武六年定凡祭五祀户竈門井於四孟月時享太廟日遣內官致祭中霤於季夏土旺戊日遣內官致祭祭五祀壇制日期洪武八年禮部奏五祀之禮考之周漢唐宋其制不一今擬以孟春祀司户之神設壇於皇宫門左司門主之孟夏祀司竈之神設壇於御廚光祿寺官主之季夏祀中霤之神設壇於乾清宫丹墀內官主之孟秋祀司門之神設壇於午門之左司門主之孟冬祀司井之神設壇於井前光祿寺官主之四孟月之祭則於有事太廟之日季夏之祭則於土旺之日牲用少牢制可自是五祀之禮歲率以為常會議釐正神祀𢎞治元年禮科給事中張九功言國之大事在祀與戎祀典正則人心正今聖明御極修明祀典然而朝廷常祭之外尚有釋迦牟尼文佛三清三境九天應元雷聲普化天尊之祭又有金玉闕真君元君神父神母之祭諸宫觀中又有水宫星君諸天諸帝之祭非所以示法於天下也乞敕禮部稽之祀典盡為釐正及一切左道惑人之事通為禁止上是其言命禮部會官考詳何神立於何代何神有功於國何神澤及生民今何神應祀與否明白具奏於是尚書周洪謨等會議謂我太祖高皇帝稽古定制凡前代所加嶽鎮海瀆封號郡縣城隍神號盡行革正其忠臣烈士亦止以當時封號稱之凡異端亂正之術一切有所禁以正風俗曉人心者至矣伏望皇上以祖宗為法敬事天地孝事宗廟嚴事山川百神此外凡有齊醮祀禱之類通行罷免不惟絶異端之姦亦可省無益之費仍敕中外凡宫觀祠廟非有功德於民者不合祀典俱令革去間有纍朝崇建難於輒廢者亦宜釐正名號減殺禮儀庶盡以禮事神之心謹按世俗所謂釋迦牟尼文佛三清三境天尊者蓋西方有國曰中天竺乃釋迦所生之地漢明帝時其法始入中國後之宗其教者遂以釋迦之本性為法身德業為報身并其真身而為三其實本一人耳唐儒韓愈有曰三代之時百姓安樂夀考中國未有佛也自有佛法以來亂亡相繼宋齊梁陳以下事佛漸謹年代尤促梁武帝捨身施佛餓死臺城由此觀之佛不足事明矣至於道家以老子為師宋儒朱熹有曰玉清元始天尊既非老子之法身上清太上道君又非老子之報身設有二像又非與老子為一而老子又自為上清太上老君蓋倣釋氏之失而又失之者也况老聃亦人鬼耳豈可僭居昊天上帝之上哉如宋徽宗躬親祠醮傾心崇奉卒之陷身北國覆亡宗社可為明戒佛老之徒妄相稱述惑世誣民莫之能廢不合祀典莫此為甚伏望自今以始凡遇萬夀千秋等節不令修建吉祥齊醮或遇喪禮不令修建薦揚齊醮俱不先期遣官祭告釋迦牟尼文佛於大興隆寺及三清三境天尊於朝天宫則祀典正矣所謂北極中天星主紫微大帝者蓋北極五星在紫微垣中又曰紫微大帝之座乃朝廷宫殿之象正統初建紫微殿於大德觀東設大帝之像每節令亦遣官祭告夫幽禜祭星古禮也祖宗以來每歲南郊已有星辰壇合祭之禮今乃像之如人稱之為帝以極星之正祠於異端之宫稽之祀典誠無所據其祭告乞罷免所謂九天應元雷聲普化天尊者凡隂陽凝聚陽氣在內不得出則奮擊而為雷霆今道家妄以為玉霄一府總司五雷雷部諸神皆其所主而又以六月二十四日為天尊示現之日故朝廷歲以是日遣官詣顯靈宫致祭夫風雲雷雨每歲南郊已有合祭之禮而山川壇復有秋報之祭况自二月發聲之後無非雷霆震奮之日今以六月二十四日為示現日於義何取設像名稱禮亦何所據哉其祭告亦乞罷免又有所謂祖師三天扶教輔𤣥大法師真君者傳記云漢張道陵光武時人善以符治病至桓帝永夀元年百二十歲而沒人傳白日上升唐天寶宋熙寧大觀間纍號正一靖應真君子孫亦有封號國朝仍襲正一嗣教真人之封秩視二品然宋邵伯溫聞見録云漢建安二十年曹操破張魯定漢中魯祖陵父衡以符法相授受自號師君其衆曰鬼卒曰祭酒大抵與黃巾相類朝廷不能討就拜魯漢寧太守鎮夷中蓋陵本非異人而道家祖陵為天師者特因天寶之稱而云爾今歲以正月十五日為陵生辰遣官詣顯靈宫祭告夫生辰自宜使其子孫祭於家而乃遣官祭告尤非祀典亦乞罷免所謂大小青龍神者記云昔有僧名盧自江南來寓居今京師西山一日有二童子來拜於前盧納之供奉無怠時久旱不雨二童子白於盧請限雨期即委身龍潭須臾化二青龍遂得雨後賜盧號曰感應禪師建寺設像又别設二青龍祠於龍潭之上宣德中敕建大圓通寺加二青龍以封號今春秋祭之夫妖由人興久自衰息况今連年亢旱祈禱二龍杳無應驗則怪誕不足崇奉明矣又有所謂梓潼帝君者記云神姓張諱亞子其先越巂人因報母之仇徙居梓潼之七曲山仕晉戰沒人立為廟唐𤣥宗僖宗宋咸平日屢封至英顯王道家謂上帝命梓潼掌文昌府事及人間祿籍故元加號為帝君而天下學校亦有立祠祀之者景泰中因京師舊廟闢而新之歲以二月三日為帝君生辰遣官致祭夫梓潼神顯靈於蜀則廟食其地於禮為宜祠之京師何也况文昌六星為天之六府殊與梓潼無干乃合而為一是誠附會不經乞并與大小青龍神之祭俱敕罷免其梓潼在天下學校者俱令拆毁庶足以解人心之惑又道家有所謂北極佑聖真君者蓋真武乃北方𤣥武七宿後人乃以𤣥武為真聖而作龜蛇於下宋真宗避諱改𤣥武為真武靖康初加號曰佑聖助順靈應真君及考圖志乃云真武為淨樂王太子得道術修煉武當山功成飛升奉上帝命往鎮北方被髮跣足建皂纛𤣥旗攝𤣥武位此則道家附會誕妄之說再考國朝御製碑謂太祖平定天下兵戈所向隂佑為多嘗建廟南京載在祀典及太宗入靖內難以神有顯相功又於京城艮隅并武當山重建廟宇兩京歲時朔望各遣官致祭而武當山又專官督視祀事至我憲宗嘗範金為神像屢遣內官陳喜安奉於武當山蓋亦承列聖崇奉之意以祈神休耳而喜乃援引左道鄧常恩輩熒惑聖德虐害生民奏請重修京城廟宇改號靈明顯佑宫日進邪術遂使香火之地幾為姦盜之區今常恩輩已服其罪而其所遺蠧國害民之事尚未止息如頻年齎送神像及多給武當道士衣布濫費香爉之類是也請止照洪武間例每年以三月三日九月九日用素羞遣太常寺官致祭其餘祭祀悉皆停免繼後神像再不齎送凡府縣應辦給衣巾并香爉諸物之勞民者俱量為裁省庶幾國用少節而於纍朝崇報之禮亦未嘗廢也所謂崇恩真君隆恩真君者道家相傳以崇恩真君姓薩名堅西蜀人宋徽宗時嘗從王侍宸林靈素輩學法有驗而隆恩真君則玉樞火府天將王靈官也又嘗從薩真君傳符法永樂中以道士周思得能傳靈官法乃於禁城之西建天將廟及祖師殿宣德中改廟為大德觀封二真君成化初改觀曰顯靈宫每年換袍服三年一小焚十年一大焚復易以新珠玉錦綺所費不訾每節候歲時皆遣官致祭夫薩真君之法因王靈官而行王靈官之法因周思得而顯而其法之所自又皆林靈素輩所附會况近年祈禱杳無應驗若以纍朝創建之故難以廢毁其祭告之禮宜令罷免四時袍服更換宜令收貯勿毁此後不必再焚亦不必再製如此則妄費可少省而邪術可貶矣所謂金闕上帝玉闕上帝者志云福建閩縣舊有洪恩靈濟宫即祀今之金玉闕二真人者五代時吳徐溫子曰知證封江王曰知諤封饒王嘗提兵平福州福人德之圖像以祀宋賜今額又考國朝御製碑謂太宗嘗弗豫藥罔效禱神輒應因大新閩地廟宇令春秋致祭易衣給户灑掃又立廟祀於京師加封知證金闕真君知諤玉闕真君正統成化年間纍加號為上帝每朔望節令俱遣官祀及時薦新食四時致皮辨冠紅金雲龍朝衣又加平天冠明黃錦綺服其黃服五年一換焚紅服十年一換焚夫神之世系年代事蹟本非有甚異也而兄弟並稱上帝本處既有春秋祀而京師復一年數祀袍服在京換焚費以不資閩之袍服又數勞人賫送其僭號既宜革正而妄費亦宜節損請仍存閩之廟祀廢京師之諸祀革其帝號與服色止稱真君服舊服其衣服更換俱令本宫收貯不必再焚每歲亦不必再製若在閩而敝者令府縣量為修補不必齎送如此則於禮庶不謂瀆而報功之典亦未嘗不存也所謂神父聖帝神母元君及金玉闕元君者即二徐之父母及其配也宋封父齊王為忠武真人其母曰仁夀仙妃配皆為仙妃我朝永樂至成化間屢加封其父為聖帝母及二妃皆為元君每歲時節令俱遣官祀而金玉闕元君又有誕辰之祭僭瀆一至於此載考徐溫乃五代時吳國專權弒主之人殊無功德可録但緣二徐為子有一時禱應之功故濫恩至此伏乞削去上帝元君之號一切濫祀俱宜罷免所謂東嶽泰山之神者為五嶽之首廟在山東泰安州山下唐宋元皆加號曰王或曰帝若祀人鬼然者我太祖正祀典止稱東嶽泰山之神有司春秋致祭有事則遣官祭告每歲南郊并二八月山川壇俱有合祭之禮蓋以山川靈氣有發生之功故也今朝陽門外有前元東嶽舊廟國朝因而不廢其後歲以三月二十八日及萬夀聖節遣官致祭夫既專祭於封內又合祭於郊壇則此廟之祭實為煩瀆亦乞罷免所謂京師都城隍之神者蓋建國者必設高城深池以保其民人其制自黃帝始今天下府州縣各有城隍廟在京師者謂之都城隍廟舊在順天府西南俗以五月十一日為神誕辰故是日及節令皆遣官祀夫城隍之神非人鬼也安有所謂誕辰者况南郊秋祀皆有合祭之禮則誕辰并節令之祀亦宜罷免議既上上曰卿等言是修建齊醮遣官祭告并東嶽真武城隍廟靈濟宫祭祀俱仍舊二徐真君并其父母妻宜革去帝號止仍舊封號原冠袍等物換回焚毁今後福建冠袍每六年一齎送餘如所議行之祭三清樂章𢎞治八年十二月內閣大學士徐溥等奏近司禮監傳示聖諭遞出祭三清樂章令臣等改補進呈臣等謹按天子祀天地天者至尊無對盡天下之物不足以報其德惟誠意可以格之故禮以少為貴物以簡為誠祭不過南郊時不過孟春牲不過一牛書曰黷于祭祀時謂弗欽禮煩則亂事神則難正此謂也漢祀五帝儒者尚非之以為天止一人豈有五帝况三清者乃道家邪妄之說謂一天之上有三大帝至以周時柱下史李耳當之是以人鬼而加於天之上理之所必無者也若夫樂器之清濁樂音之高下制度節奏毫釐之際不容少差差則反以召禍况製為時俗詞曲以享神明䙝瀆尤甚以此獲福又豈有是理哉我朝天地合祭用正月皆太祖所親定樂器樂章皆太祖所親製足以傳之萬世當此之時豈有三清之祭俗曲之音今所遞出樂章雖云出於永樂大典蓋是書之作博采兼收欲以盡天下之事初未聞以此施之朝廷見諸行事以為後世法也陛下純誠至孝嗣統守成一以太祖為法以上追二帝三王之盛不宜以黷禮事天臣等讀儒書窮聖道道家邪妄之說未嘗究心至於鄙䙝詞曲尤所不習不當以非道事陛下所連日憂惶不敢奉命者實不願陛下為此舉也近數月來凡奉中旨處分其合理者自當仰承德意不敢違越間於民情有干治體相礙亦不敢茍且應命以誤陛下未免封還執奏至再至三迹似違忤情實忠愛似此者多非但樂章一事而已疏入上嘉納之禮部志稿卷八十四
