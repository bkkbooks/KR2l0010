body:
  text: 禮部志稿卷一明俞汝楫編聖訓太祖髙皇帝敬天之訓洪武元年正月上將告祀南郊戒飭百官執事曰人以一心對越上帝毫髮不誠怠心必乘其機瞬息不敬私欲必投其隙夫動天地鬼神惟誠與敬耳人莫不以天之髙遠鬼神幽隱而有忽心然天雖髙所鑑甚邇鬼神甚幽所臨則顯能知天人之理不二則吾心之誠敬自不容於少忽矣今當大祀百官執事之人各宜慎之洪武二年三月翰林學士朱升等奉勑撰齊戒文上曰凡祭祀必先齊戒而後可以感動神明戒者禁止其外齊者整齊其內沐浴更衣出宿外舍不飲酒不茹葷不問疾不吊喪不聽樂不理刑名此則戒也専一其心嚴畏敬慎不思他事茍有所思即思所祭之神如在其上如在其左右精白一誠無須臾間此則齊也大祀齊戒七日前四日為戒後三日為齊中祀齊戒五日前三日為戒後二日為齊既進覽上曰凡祭祀天地社稷宗廟山川等神是為天下生靈祈福宜下令百官一體齊戒若自所禱于天地百神不關于民者恐百官齊戒不致専精則不下令又謂省部臣曰朕每祭享天地百神惟伸吾感戴之意禱祈福祉以祐生民未嘗敢自徼惠也且齊戒所以致誠誠之至與不至神之格與不格皆係于此故朕每致齊不敢有一毫懈怠今定齊戒之期大祀以七日中祀以五日不可太久大抵人心久則易怠怠心一萌反為不敬可止于臨祭齊戒三日務致精専庶幾可以感格神明矣命太常著為令五月夏至祀皇地祗于方丘禮成上御便殿謂侍臣曰上天之命朕不敢知古人有言天命不易又曰天命無常以難保無常之天命付驕縱淫佚之庸主豈有不敗朕嘗披覽載籍見前代帝王當祭祀時誠敬或有未至必致非常妖孽天命亦隨而改每念至此中心惕然十一月冬至祀昊天上帝于圜丘奉仁宗淳皇帝配位禮成上御奉天殿百官行慶成禮既畢出御奉天門謂羣臣曰祭祀在乎誠敬不在乎物之豐薄物之豐矣而誠有未至神不享焉物雖薄而誠至神則享之所謂東鄰殺牛不如西鄰之禴祭嘗聞以德受福未聞以物徼福者也昔陳友諒服衮冕乘玉輅豐牲帛而行郊社之禮彼恣行不道毒虐生靈積惡於己而欲徼福於天可乎朕凡致祭其實為國為民非有私求之福茍誠意未至徒尚禮文而欲徼福於己豈不獲罪於天耶洪武四年十一月冬至祀昊天上帝于圜丘禮成上謂羣臣曰帝王奉天以君臨兆民當盡事天之道前代或三嵗一祀或歷年不舉今朕嵗以冬至祀圜丘夏至祀方丘遵古典制將以報覆載之大德惟夙夜寅威冀精神昭格庶隂陽和風雨時以福斯民羣臣咸頓首曰陛下敬天勤民古未有也洪武二十年正月大祀天地于南郊禮成天氣清明聖情悅豫侍臣進曰此陛下敬天之誠所致上曰所謂敬天者不獨嚴而有禮當有其實天以子民之任付于君為君者欲求事天先必恤民恤民者天之實也即如國家命人任守令之事若不能福民則必棄君之命不敬孰大焉又曰為人君者父天母地子民此職分之所當盡祀天地非祈福于己也實為天下蒼生也嚴祀宗廟之訓甲辰四月中書省臣進京廟祭享及月朔薦新禮儀上覽畢忽悲愴流涕曰吾昔遭世艱苦饑饉相仍當時二親俱在吾欲養而力不給今賴祖宗之佑化家為國而二親不及養追思至此痛何可言因命并録皇考妣忌日嵗時享祀以為常洪武元年正月追尊四代考妣祭訖上曰奉先思孝祭神如在誠敬無間神靈具依茍或有間非奉先思孝之道也洪武三十一年春享太廟畢上步出廟門徘徊顧立指桐梓謂太常臣曰往年種此今不覺成林鳳陽陵樹當亦似此因感愴泣下又曰昔太廟始成遷主就室禮畢朕退而休息夢朕皇考呼曰西南有警覺即視朝果得邉報祖考神明昭臨在上無時不存爾等掌祭祀宜加敬慎旦暮中使供灑掃奉神主恐有不䖍當以時省視務宜齊潔以安神靈尊崇文廟之訓洪武元年二月詔以太牢祀先師孔子于國學仍遣使詣曲阜致祭使行上謂之曰仲尼之道廣大悠久與天地相並故後世有天下者莫不致敬盡禮修其祀事朕今為天下主期在明教化以行先聖之道今既釋奠國學仍遣爾修祀事于闕里爾其敬之洪武十五年四月詔天下通祀孔子賜學糧增師生廩膳上諭禮部尚書曰孔子明帝王之道以教後世使君君臣臣父父子子綱常以正彛倫攸叙其功恭于天地今天下郡縣廟學並建而報祀之禮止行京師豈非闕典卿與儒臣其定釋奠禮儀頒之天下學校令以每嵗春秋仲月通祀孔子興學之訓洪武二年四月命博士孔克仁等授諸子經功臣子弟亦令入學上諭之曰人有積金必求良冶而範之有美玉必求良工而琢之至于子弟有美質不求明師教之豈愛子弟不如金玉耶蓋師所以模範後學者使之成器因其才力各俾造就朕諸子將有天下國家之責功臣子弟將有職任之寄教之道當以正心為本心正則萬事皆理矣茍導之不以正為衆欲所攻其害不可勝言卿等宜輔以實學毋使效文士記誦詞章而已洪武十一年十一月命禮部給賜國子生鈔北平陜西山西山東廣東廣西四川福建之人在監三年以上者人五錠二年人二錠俾製冬衣復命工部于國子監前造别室一區凡百餘間具灶釡牀榻以處諸生之有疾者令膳夫二十人給役侍臣進曰陛下作興學校推心憫下無所不至從古未有上曰諸生去鄉土離親戚逺來務學日久衣敝或有疾無人具湯藥朝廷作養之必使之得所然後可必其成材蓋天生人才皆為世用人君育材當有其實惟能有以作養之則未有不成材者也洪武十四年三月頒五經四書于北方學校上謂廷臣曰道之不明由教之不行也夫五經載聖人之道者也譬之菽粟布帛家不可無人非菽粟布帛則無以為衣食非五經四書則無由知道理比年自喪亂以來五經殘缺學者雖有美質無所講明何由知道今以五經四書頒賜之使其講習夫君子而知學則道興小人而知學則俗美他日收效亦必本于此也十一月上命禮部臣修治國子監舊藏書板諭之曰古先聖賢立言以教後世所存者書而已朕每觀書自覺有益嘗以諭徐達達亦好學親儒生囊書自隨蓋讀書窮理于日用事物之間自然見得道理分明所行不至差謬書之所以有益于人也如此今國子監舊藏書板多殘缺其令諸儒考補仍命工部督匠修治之庶有益于學者洪武二十四年六月命禮部頒書籍于北方學校上諭之曰農夫舍耒耜則無以為耕匠氏舍斤斧則無以為業士子舍經籍則無以為學朕嘗念北方學校缺少書籍士子有志于學者往往病無書讀向嘗頒與四書五經其他子史諸書未賜豫宜于國子監印頒有未備者遣人往福建購與之教太子諸王之訓吳元年十月上遣世子標次子樉往臨濠謁陵墓因諭之曰世稱商髙宗周成王為賢君者汝知之乎髙宗舊勞于外知民疾苦成王早聞無逸之訓知稼穡之艱難故其在位不敢暇逸能修勤儉之政為啇周令主汝諸子生于富貴未涉艱難人情習于宴安必生驕惰况汝他日皆有國家不可不戒今使汝等于旁近郡縣逰覽山川經歷田野因道途之險易以知鞍馬之勤勞觀小民之生業以知衣食之艱難察民情之好惡以知風俗之美惡即祖宗陵墓之所訪求父老問吾起兵渡江時事識之于心以知吾創業之不易也于是命中書擇官輔導以行洪武三年十二月禮部尚書陶凱請選人専任東宫官屬罷兼領之職庶于輔導有所責成上曰古者不備其官惟賢能是用朕以廷臣有才望勛德者兼東宫官非無謂也嘗慮廷臣與東宫官屬有不相能遂成嫌隙或生姦謀離間骨肉其禍非細若江充之事可為明鑑朕今立法令省臺都督府官兼東宫贊輔之職父子一體君臣一心庶幾無相搆之患也厚風俗之訓洪武四年六月上退朝御東閣從容與羣臣論及禮樂之事謂廷臣曰世之治亂本乎人情故忠信興則俗競淳朴佻巧作則習尚詐僞京師天下之統㑹萬民之瞻仰四方所取則者也而積習之弊卒以奢侈相髙浮藻相誘情日肆而俗日偷非所以致理也禮部尚書陶凱對曰仲尼有云道之以政齊之以刑今欲整齊風俗使佻巧不得作必以政刑先之然後教化可行上曰教化必本諸禮義政刑豈宜先之茍徒急於近效而嚴其禁令是欲澄波而反汩之也凱頓首稱善洪武二十年閠六月上謂禮部尚書李原吉曰尚齒所以教敬事長所以教順虞夏商周之世莫不以齒為尚而養老之禮未嘗廢是以人興于孝悌風俗淳厚治道隆平曩者朕詔天下行養老之政凡耆民年八十以上鄉黨稱善貧無産業者月給米三斗肉五斤九十以上嵗加帛一匹綿一斤若有田産能自贍者止給酒肉絮帛其應天鳳陽二府富民九十以上賜爵社士八十以上賜爵里士咸許冠帶復其家尚慮有司奉行不至爾禮部以朕命諭之儀禮之訓洪武元年十一月中書省及禮部定奏天子親祀圜丘方丘宗廟社稷若京師三皇孔子風雲雷雨聖帝明王忠臣烈士先賢等祀則遣官致祭郡縣宜立社稷有司祭里社土榖之神及祖父母父母并得祀竈載諸祀典餘不當祀者並禁之上因諭羣臣曰凡祭享之禮載牲致帛交于神明費出已帑神明歆之如庶人陌錢瓣香皆可格神不以菲薄而不享者何也所得之物皆已力所致也若國家倉廩府庫所積乃生民脂膏以此為尊醪俎饌充實神庭徼求福祿以私于身神可欺乎惟為國為民禱祈如水旱疾疫師旅之類是也又上欲舉行耕藉田禮諭廷臣曰古者天子藉田千畝所以供粢盛備饋饎自經喪亂其禮已廢上無以教下無以勸朕蒞祚以來悉修先王之典而藉田為先故首欲舉而行之以為天下勸洪武二年六月上讀叔孫通傳至魯兩生不肯行因謂侍臣曰叔孫通雖云竊禮之糠粃然創制禮儀于煨燼之餘以成一代之制亦可謂難矣如兩生之言不無迂耶若禮樂必待百年而後可興當時朝廷之禮廢矣朕聞先王之禮因時制宜孔子亦曰朞月三年必世蓋亦因時制宜之謂必待百年則誠迂矣洪武三年八月上諭廷臣曰古者帝王之治天下必定禮制以辨貴賤明等威是以漢髙初興即有衣錦繡綺縠操兵乘馬之禁歷代皆然近世風俗相承流于僣侈閭里之民服食居處與公卿無異而奴僕賤𨽻往往侈肆于鄉曲貴賤無等僣禮敗度此元之失政也中書省其以房舍服色等第明立禁條頒布中外俾各有所守洪武五年三月上謂禮部臣曰禮者所以美教化而定民志成周設大司徒以五禮防萬民之僞而教之中夫制中莫如禮修政莫如禮齊家莫如禮故有禮則治無禮則亂居家有禮則長幼叙而宗族和朝廷有禮則尊卑定而等威辨元興變易典章民染其俗先王之禮幾乎熄矣而人情狃于淺近未能猝變今命爾稽考典禮合于古而宜于今者以頒布天下俾習以成化庶幾復古之治也洪武六年三月禮官上所定禮儀上謂尚書牛諒曰禮者國之防範人道之紀綱朝廷所當先務不可一日無也自元氏廢棄禮教因循百年而中國之禮變易幾盡朕即位以來夙夜不忘思有以振舉之以洗汚染之習故嘗命爾禮部定著禮儀今雖已成宜更與諸儒恭詳考議斟酌先王之典以復中國之舊務合人情永為定式庶幾愜朕心也九月禮部奏定百官常朝班次及奏事等禮儀上謂中書省臣曰朝廷之禮所以辨上下正名分不以賤加貴不以卑踰尊百官在列班序有倫奏對雍容不失其度非惟朝廷之尊抑亦天下四方瞻仰所在也今文武百官朝恭奏事有未間禮儀者是禮法不嚴于殿陛何以肅朝廷乎自今凡新任官及諸武臣于禮儀有不間習者令侍儀司官日于午門外演習之且命御史二人監視有不如儀者紏舉之百官入朝失儀者亦紏舉如律洪武十二年正月合祀天地于南郊大祀殿禮成勑中書省臣曰立綱陳紀治世馭民斯由上古之君立至今相承而法則焉凡有國者必以祀事為先祀之禮起於古先聖王其周旋上下進退奠獻莫不有儀然儀必貴誠而人心叵測至誠者少不誠者多暫誠者或有之若措禮設儀文飾太過使禮煩人倦而神厭弗享非禮也故孔子曰禘自既灌而往者吾不欲觀之矣朕周旋祀事十有一年見其禮儀太煩乃以義更其儀式合祀社稷既祀神乃歡今十二年春始合天地大祀而上下悅若有肹蠁答于朕心爾中書下翰林令儒臣紀其祀事以彰上帝皇祗之昭格而錫黔黎之福朕與卿等尚夙夜無怠以答神明之休佑焉洪武十四年二月命禮部申明鄉飲酒禮上謂禮部臣曰鄉飲之禮所以序尊卑别貴賤先王舉以教民使之隆愛敬識廉耻知禮讓也朕即位以來雖以舉行而鄉閭里社之間恐未遍習今時和年豐民間無事宜申舉舊章其府州縣則令長官主之鄉閭里社則賢而長者主之年髙有德者居上髙年淳厚者次之以齒為序其有違條犯法之人列於外坐同類者成席不許雜于善良之中如此則家識廉耻人知禮義而父慈子孝兄愛弟敬夫和婦順之道不待教而興所謂宴安而不亂和樂而不流者也孔子曰吾觀于鄉而知王道之易正謂此也洪武十七年六月上御奉天門謂羣臣曰治天下之道禮樂二者而已若通于禮而不通于樂非所以淑人心而出治道達于樂而不達于禮非所以振紀綱而立大中必禮樂並行然後教化醇一或者曰有禮樂不可無刑政朕觀刑政二者不過輔禮樂為治耳茍為治徒務刑政而遺禮樂在上者雖有威嚴之政必無和平之風在下者雖有茍免之心終無格非之誠大抵禮樂者治平之膏粱刑政者救弊之藥石卿等于政事之間宜知此意毋徒以禮樂為虛文也又諭禮部臣曰近命製大成樂器將以頒天下學校俾諸生習之以祀孔子朕思古人之樂所以防民欲後世之樂所以縱民欲其故何也古樂之詩章和而正後世之歌詞淫以誇古之律吕協天地自然之氣後世之律吕出人為智巧之私天時與地氣不審人聲與樂聲不比故雖以古之詩章用古之器數亦乖戾而不合凌犯而不倫矣手擊之而不得于心口歌之而非出于志人與樂判然為二而欲以動天地鬼神豈不難哉然其流已久救之甚難卿等宜究心于此俾樂成而頒之諸生得以肄習庶幾可以復古人之意敦教化之訓洪武二年六月令民間立義塜上諭禮部臣曰古者聖王治天下有掩骼埋胔之令推恩及于朽骨近世狃于習俗死者或以火焚之而投其骨于水孝子慈孫于心何忍傷恩敗俗莫此為甚其禁止之若貧無地者所在官司擇近城寬閒地為義塜俾之葬埋或有宦逰逺方不能歸葬者官給力費以歸葬之洪武十七年十一月上謂禮部臣曰近命遼東立學校或言邉境不必建學夫聖人之教猶天也天有風雨霜露無所不施聖人之教亦無往不行昔箕子居朝鮮施八條之約故男遵禮義女尚貞信管寧居遼東講書詩陳爼豆􅎖威儀明禮讓而民化其德曽謂邉境之民不可以教乎夫越與魯相去甚逺使越人而居魯久則必魯矣魯人而居越久則必越矣非人性有魯越之異風俗所移然也况武臣子弟久居邉境鮮聞禮教亦恐漸移其性今使之誦詩書習禮讓非但可以造就其才他日亦可資用洪武二十三年五月播州貴州宣慰使司并所屬宣撫司官各遣其子來朝請入太學上敕國子監官曰移風善俗禮為之本敷政導民教為之先故禮教明於朝廷而後風化逹于四海今西南夷土官各遣子弟來朝求入太學因其慕義特允其請耳爾等善為訓教俾有成就庶不負逺人慕學之心洪武二十七年三月有儒士初授知縣陛辭上問之曰試言蒞民之道何先對曰教化為先曰教化何施對曰奬勸之上曰治民固以教化為本而身又為教化之夲長一邑則係一邑之望民率視己以為則己身不正民將何法雖多為奬勸彼不見信故曰以身教者從以言教者訟爾其試之耕藉之訓洪武二年十二月上躬耕藉田遣官享先農禮成宴羣臣于壇所上曰耕藉田古禮也一以供粢盛一以勸農務本也朕即位以來恆舉行之惟欲使民知勸盡力于田畝以遂其生養非事虛文今禮成與爾羣臣享胙于此豈徒為宴飲之樂正欲羣臣知重農之意羣臣皆頓首謝進膳之訓洪武七年五月禮部尚書牛諒上所考定進膳禮奏言古禮凡大祀齊之日宰犢牛以為膳以助精神上曰太牢非常用致齊三日而供三犢所費太侈夫儉可以制欲淡可以熙性若無節制惟事奢侈徒增傷物之心何益事神之道諒曰周禮是古人所定非過侈也上曰周官之法不行於後世多矣惟自奉者乃欲法古其可哉樂歌之訓洪武七年九月翰林院奏進回鑾樂歌先是上以祭祀還宫宜用樂舞前導命翰林儒臣撰樂章以致敬慎監戒之意諭之曰古人詩歌辭曲皆寓諷諫之意後世樂章惟聞頌美無復古意夫常聞諷諫則使人惕然有警若頌美之辭使人聞之意怠而自恃之心生蓋自恃者日驕自警者日强朕意如此卿等其撰述毋有所避祀元主之訓洪武十一年六月遣使致祭故元幼主于沙漠上命禮部臣曰曩者元運既終其末帝能知天命遁歸沙漠今聞其子阿裕錫哩達喇殁于彼可遣使弔祭禮部臣對曰道里遼逺使者難至况彼久離中華已變異俗非典禮所加上曰以天下為一家彼不出覆載之外何逺之有彼雖異俗其愛憎之情未嘗不同敬其主則其臣悅况典禮所加其孰能違德舍禮哉于是自為文祭之武臣禮度之訓洪武二年正月上御奉天殿受朝賀大宴羣臣宴畢見諸功臣進退有禮召前諭之曰朝廷之間以禮為主人之有禮如衣之有章朕聞元世祖命巴延阿珠二人平江南班師之日世祖遣儒臣許衡齎酒郊迎之兩人推讓莫肯先飲巴延曰阿珠之功當先酌阿珠曰巴延之功當先酌相讓者久之衡嘆曰賢矣哉古有拔劍擊柱而爭功者視此何如今觀卿等雖出身行陳而進退周旋不失禮度朕為之喜卿等能始終如此何患後世無稱道之者尚禮之訓吳元年正月上諭左相國徐達等曰禮法國之紀綱禮法立則人志定上下安建國之初此為先務吾昔起兵濠梁見當時主將皆無禮法恣情私縱為暴亂不知馭下之道是以卒至于亡今吾所任將帥皆昔同功一體之人自其歸心于我即與之定名分明號令故諸將皆聽命無敢有異者爾等為吾輔相當守此道無謹于始而忽于終也又諭廷臣曰剽悍驕暴非人之性也習也茍有禮法以一之則剽悍者可使善柔驕暴者可使循帖若踶嚙之馬調御有道久則自然馴熟屬兹草創茍非禮法人無所守故必當以此洗滌漸染之習然制禮立法非難遵守禮法為難人知遵守自無暴悍能守法則不至暴悍夫三尺童子至弱也遇强暴而不敢欺者以有禮法故耳方今所當急者此為先務不可後也交神之訓洪武元年上諭羣臣曰凡祭享之禮載牲致帛交于神明費出已帑神必歆之如庶人陌紙瓣香皆可格神不以菲薄而弗享者何也所得之物皆已力所致也若國家倉廪府庫所積乃生民脂膏以此為尊醪爼饌充實神庭徼求福祉以私于身神可欺乎惟為國為民祈禱如水旱疾疫師旅之類也十月上命宰臣曰祀神之道貴乎潔誠若執事之人衣服垢弊何以交神明今圜丘之祀凡執事之官各賜以新衣仍飭其齊潔毋致褻慢科試之訓洪武四年正月上謂中書省臣曰今天下已定致治之道在于任賢既設科取士各行省連試三年庶賢才衆多而官足任使也自後三年一舉著為定例勵士之訓洪武五年正月上謂禮部臣曰近代以來舉人不中程式為有司所黜者多不省已自修以圖再進往往托拾主司細故謗毁以逞私忿禮讓亷恥之風不立今後有此者罪之䖍祀之訓洪武五年五月命各司置齊戒牌上諭中書省臣曰齊戒古人所以致潔于鬼神也朕于祭祀每齊戒必盡其誠不敢少有怠忽尚慮諸司不能體此致齊之日䙝慢弗謹雖幽有神鬼司察其罪不若預為戒飭使知所警其命諸司各置木牌刻文其上曰國有常憲神有鑒焉每遇祭祀則設之洪武六年二月上諭太常司臣曰今後祭太嵗風雲雷雨嶽鎮海瀆山川城隍旗纛諸神朕親行中五壇禮餘壇魏鄭曺宋衛五國公及中山江夏江隂三侯分祀夫祭祀之道在誠敬孔子曰祭如在祭神如神在茍有一毫誠敬未至神必不格而牲醴庶品皆為虛文又焉用祭朕自即位以來于祀神之道不敢怠忽常加警惕務致其誠爾太常職専祀事宜益加修謹以副朕事神之意擇國學官之訓洪武六年正月禮部奏增廣國子生上曰須先擇國子學官師得其人則教育有效非其人增廣徒多何益蓋瞽者不能辨色聾者不能辨聲學者而無師授亦如聾瞽之于聲色朕觀前代學者出為世用雖繇其質美實亦得師以造就之後來師不知所以教子弟不知所以學一以記誦為能故卒無實用今民間俊秀子弟可以充選者雖衆茍無端人正士為之模範求其成材難矣故曰務學不如務求師今祭酒乏人卿等為朕詢採天下名士通今博古才德兼備宜為人師者以名聞洪武十二年禮部尚書李叔正言州縣儒學訓導多以賢良等科薦至京師範缺員生徒廢業上曰學校人才所出朕方以未得明師為憂而有司又拔而舉之甚失教育人材之意其即禁之著為令十一月禁有司不得差遣學官時松江府華亭縣儒學教諭曺宗儒屢為府縣差遣宗儒以為言上諭禮部臣曰教官訓導所以作養生徒為國儲材爾者有司往往委以公務使不盡心教訓甚非所以崇儒重道之意其禁止之洪武十三年上諭禮部臣曰學官所以造就人材模範後進非老成篤學之士莫宜居是其令各按察司精考儒學官不通經學者送吏部别用其有通經術能文章滯于下僚者悉以名聞洪武十七年正月上諭禮部臣曰天下府州縣學官總理學士其訓導専教生徒毋令同署公文以妨講授爾禮部其移文天下學校永為遵守洪武十八年四月引奏下第舉人俱授教官上諭曰教學之方非求速成辟之為層臺者必基於簣土行千里者必始于跬步但當勉其勤力循序漸進自有其效耳若急遽茍且未得于此而即求于彼非但學者無益爾亦徒勞矣且爾等年方壯盛雖職在教人尤當自修其道須常謙抑不可自滿即如工人習技常見已不若人則所習益髙汝其勉之洪武二十四年上謂禮部臣曰教官訓導教育賢才非有司劇任可比今後遇有除授皆賜之衣服使知所重也洪武三十年申明學規上諭禮部臣曰太學育才之地朝廷厚廪祿廣學舍延致師儒以教諸生期于有成為國家用近者師道不立學規廢弛諸生惰業至有不通文理不精書算不諳吏事甚者抗拒師長違越禮法甚非育材養賢之道也向者已令條陳學規俾師生遵守爾等宜申明之求賢之訓洪武七年上諭中書省臣曰朕從科舉以求天下賢才務得經明行修文質相稱之士以資任使今有司所取多後生少年觀其文詞若可與有為及試用之能以所學措諸行事者甚寡朕以實心求賢而天下以虛文應選非朕責實求賢之意也今各處科舉宜暫停罷别令有司察舉賢才必以德為本而文藝次之庶幾天下學者知所嚮方而士習歸于務本禮言之訓洪武七年上諭禮臣曰朝廷禮法之所自出天下之所瞻視凡文武官于朝班奏對之際言辭當詳雅切實勿為浮溢之語若事蒞臨下須有惠有威使人畏服切戒忿怒及惡言加人先聖云非禮勿言禮云君子惡言不出于口卿等為禮官當致謹于此庶無忝于爾職也表箋之訓洪武七年詔禁四六文辭先是上命翰林儒臣擇唐宋名儒表箋可為法者翰林諸臣以栁宗元代栁公綽謝奏表及韓愈賀雨表進上命中書省臣録二表頒為天下式因諭羣臣曰唐虞三代典謨訓誥之詞質實不華誠可為千萬世法漢魏之間猶為近古晋宋以降文體日衰駢儷綺靡而古法蕩然矣唐宋之時名儒輩出雖欲變之而卒未能盡變近代制誥章表之類仍蹈舊習朕嘗以其雕琢殊異古體且使事為浮文所蔽其自今凡告諭臣下之詞務從簡古以革弊習爾中書宜播告中外臣民凡表箋奏疏毋用四六對偶悉從典雅逹民情之訓洪武十一年上謂禮部臣曰周書有言人無于水監當于民監人君深居獨處能明見萬里者良由兼聽廣覽以逹民情前元之世政専中書凡事必先關報然後奏聞其君又多昏蔽是致民情不逹尋至大亂深可為戒大抵民情幽隱猝難畢逹茍忽而不究天下離合之機係焉甚可畏也所以古人通耳目于外監得失于民有見于此矣爾禮部其定奏式申明天下釋菜之訓洪武十五年上謂禮部尚書曰國學新成朕將釋菜令諸儒議禮議者曰孔子雖聖人臣也禮宜一奠而再拜朕以為孔子明道德以教後世豈可以職位論哉周太祖曰百世帝王之師敢不拜乎遂再拜朕深嘉其明斷不惑于左右之言今朕君天下敬禮百神于先師之禮宜加尊崇祀帝王之訓洪武九年十一月上諭禮官曰歷代帝王廟皆祀開基創業之君周文王雖基周命然終守臣節唐髙祖雖有天下然皆太宗之力可勿設二主止于陵廟致祭庶于公論為宜其定祭儀來嵗朕將親祀焉優夷之訓洪武十六年五月上謂禮部臣曰諸蠻夷酋長來朝涉履山海動經數萬里彼既慕義來歸則賞豫之物宜厚以示朝廷懷柔之意弔恤之訓洪武十七年上諭禮部臣曰近者海運軍士溺死者幾二百人朕聞之愴然于懷夫死生固有定數然骨肉分離遂至永隔子之思父妻之念夫父母之憶子悲痛之情何堪爾禮部即下所司令各厚恤其家洪武十八年上謂禮部郎中金雍曰養生送死人子之至情今內外文武羣臣有親殁官所路逺不能歸葬者令有司以舟車資送還鄉著為令上諭禮部臣曰從征雲南軍士回者已加賞賚其戍守者須按例給之死者宜厚恤其家病故戰殁者宜有差等蓋朝廷爵賞所以示勸懲必出至公乃可厭服人心茍施之弗當則人心懈怠誰肯勉力事公卿等其慎之馭夷之訓洪武十八年正月上諭禮部臣曰覆載之間藩邦小國多矣有能知天命守分限不恃險阻修理事上以保生民未有不綿其國祚若施譎詐肆侮慢未有不搆兵禍以殃其民髙麗王王顓自朕即位以來稱臣入貢朕嘗推誠待之大要欲使三韓之人舉得其安豈意王顓被弒而殞其臣欲掩己惡來請約束朕數不允聽彼自為聲教而其請不已是以索其嵗貢然中國豈倚此為富不過以試其誠僞耳今既聽命其心已見宜再與之約削其嵗貢令三年一朝貢馬五十匹至二十一年正旦乃貢汝宜以此意諭之却賀之訓洪武十八年夏四月五色雲見乙未五色雲再見禮部請率百官表賀上諭之曰天下康寧人無災害祥瑞之應固和氣所召昔舜有卿雲之歌當有元凱嶽牧之賢相與共致雍熙之治朕德不逮治化未臻豈可遽以是受賀前代帝王嘉定祥瑞臣下從而和之往往不知省懼以至災異之來不復能弭蓋誇侈之心生則戒慎之志怠故鮮克有終可以為戒薦舉之訓洪武十八年詔舉孝亷之士上諭禮部臣曰朕向者令有司舉聰明正直之士至者多非其人甚孤所望朕聞古者選用孝亷孝者忠厚愷悌亷者潔已清修如此則能愛人守法可以從政矣其令州縣凡民有孝亷之行著聞鄉里者正官與耆民以禮遣送京師非其人勿濫讀法之訓洪武二十年上謂禮部尚書李原吉曰朕製大誥三編頒示天下俾為官者知所監戒百姓有所持循若能遵守不至為非其令民間子弟于農隙之時講讀之嵗貢之訓洪武二十年詔更定嵗貢生員例府學嵗一人州學二嵗一人縣學三嵗一人上謂禮部尚書李原吉曰昔人有言不素養士而欲求賢譬猶不琢玉而求文采夫天下未常無賢才顧養之之道何如耳嘗命天下學校凡民間子弟願遣入學者聽復其身家今定嵗貢之例必資性淳厚學問有成年二十以上者方許充貢爾禮部其申明之朝貢之訓洪武二十三年上謂禮部尚書李原吉曰安南逺居海濵率先效順方物之貢嵗以為常朕念彼知向慕中華服我聲教豈在數貢故嘗以海外諸國嵗一貢獻轉運之煩實勞民力已命三年一朝今安南不從所諭又復入貢爾禮部其速令廣西遣還必三年乃來也㑹議之訓洪武二十四年上御華蓋殿謂六部臣天下事體皆有至當之理但人識見不同决斷之頃各執一偏故難盡善惟揆之于理則自無弊自今凡有政令必㑹官詳議所論僉可然後施行欲事皆善必當如此卿等其各盡乃心毋阿比以為同毋矯訐以為異允執厥中以副朕所託清異教之訓洪武二十四年命禮部清理釋道二教勑曰佛本中國異教也自漢明帝夜有金人入夢其法始自西域而至當是時民皆崇敬其後有去鬚髮出家者有以兒童出家者其所修行則去色相絶嗜欲潔身以為善道教始于老子以至漢張道陵能以異術役召鬼神禦灾捍患其道益彰故二教歷世不磨滅者以此今之學佛者曰禪曰講曰瑜珈學道者曰正一曰全真皆不循本俗汚教敗為害甚大自今天下僧道凡各府州縣寺觀雖多但存其寬大可容衆者一所併而居之毋雜處于外與民相混違者治以重罪親故相隱者流願還俗者聽其佛經畨譯已定者不許增减詞語道士設齊醮亦不許拜奏青詞為孝子慈孫演誦經典報祖父母者各遵頒降科儀毋妄立條單多索民財及民有效瑜珈教稱為善友假張真人名私造符録者皆治以重罪勳戚之訓洪武二十六年命禮部申嚴公侯制度僣侈之禁敕曰歷代聖君賢臣必謹禮節循法度者所以畏神明也蓋知畏神明則知守禮法一或不謹則鬼神鑒之將假手于人而禍患作矣朕自即位之初稽古定制凡爵祿禮儀等殺皆著為令俾勳臣之家世守之朕觀前代之受封皆為虛號其于祿食止給繒布我朝賜以膏腴土田所以待有功者不為不至尚有不知分限以速罪戾者已命翰林歷考漢唐宋故事輯為稽制録頒之勳臣使有所遵守爾禮部其申明之仍將公侯食祿及服舍器用等殺著為定式不惟止僣亦保全勳舊之道也申禁之訓洪武二十六年上謂禮部臣曰先王之治天下彛倫為本有如君君臣臣父父子子兄兄弟弟夫夫婦婦乃天地之大經人倫之大本是以古今致治之道莫先於叙以彞倫也朕膺天命君主華夷復先王之教以叙彝倫使各得其叙既定于律又著之大誥以明示天下比聞民間尚有頑不率教者仍蹈襲故俗甚乖政體宜申禁之違者論如律逺邉學校之訓洪武二十六年户部知印張永清言雲南四川諸處邉境之地民皆囉唣朝廷與以世襲土官于三綱五常之道懵焉莫知宜設學校以教其子弟上然之諭禮部曰邉境土官皆世襲其職鮮知禮義治之則激縱之則玩不預教之何由能化旁雲南四川邉境土官皆設儒學選其子弟孫姪之俊秀者以教之使其知君臣父子之義而無悖理爭鬭之事亦安邉之道也禮樂之訓洪武二十六年上謂侍臣曰論禮樂者必原于德此至論也蓋德盛者禮樂明備否德則禮樂不興三代之德盛故禮樂逹于天下後世德不如古禮樂有其名而無其實王通云如有王者出三十年而後禮樂可稱此本孔子必世而後仁之說朕居位己三十年矣禮樂之文粗備而政治不能如古揆德凉薄故也侍臣曰陛下武定禍亂文致太平天下翕然同風咸䝉至化所謂十年平之十年富之十年和之真有竒效矣而聖德謙冲不有此其跨越于前代也垂法之訓洪武二十八年頒祖訓條章于內外文武諸司勑諭禮部曰自古國家建立法制皆在始受命之君以後子孫不過遵守成法以安天下蓋創業之君起自側微備歷世故艱難周知人情善惡恐後世守成之君生長深宫未諳世故山林初出之士自矜己長至有奸賊之臣狥權利作聰明者上不能察而信之任之變更祖法敗亂國家貽害天下故日夜精思立法垂後永為不刋之典如漢髙祖刑白馬盟曰非劉氏者不王以後諸吕用事盡改其法遂致國家大亂劉氏幾亡此可為深戒者朕少遭亂離賴皇天眷命剪除羣雄混一天下即位以來勞心焦思定立法制革前元弊政至于開導後世復為祖訓一編立為家法俾子孫世世守之爾禮部其以朕訓頒行天下諸司使知朕立法垂後之意永為遵守後世敢有言改更祖制者即以奸臣論無赦飭夷之訓洪武二十八年朝鮮國王李旦遣使臣栁玽等奉表貢方物進賀明年正旦上見其辭不遜謂禮部臣曰以小事大禮當修辭前者朝鮮王李旦數生釁端已嘗詰問彼謝罪之使方歸而侮慢之詞又至朕非不能伐之古人有言不勤兵于逺所以不即興師者以此今留其使者可移咨李旦令撰文者至方歸之俾知生釁之由玽言表文是其國門下評理鄭道傳所撰遂命遣道傳未幾釋玽還二十九年朝鮮國王李旦遣其臣知門下府事鄭總來請印誥上弗許謂禮部尚書門克新曰古昔帝王列聖相承建邦錫土撫安華夏其四夷外蕃風殊俗異各有酋長自治其民初不以中國之法令治之此內外逺近之别也今朝鮮僻在東隅逺隔山海朕嘗勑其禮從本俗使自為聲教來則受之去亦弗追今來請印誥實非誠心固難與之爾禮部其咨李旦使知朕意安南以其前王陳叔明卒遣其臣來告哀上以叔明篡弒得國諭禮部臣曰安南自陳叔明逼逐其王陳日燧使不得其死因篡其位廢置相仍未嘗來告叔明懷奸挾詐殘滅其王自圖富貴不義如此庸可與乎今叔明之死若遣使弔慰是撫亂臣而與賊子也異日四夷聞之豈不效尤狂謀踵發亦非中國懷撫外夷之道爾禮部咨其國知之省灾之訓洪武五年上御齊室謂省臣曰朕前數日心中勿寧夜不安寢若有所警者忽聞中都城隍萬嵗山雨雹甚大其在是乎據占書氷雹乃兵象宜遣人戒飭守禦官嚴加防護以備不虞省臺臣因奏各州縣氷雹傷禾稼鳥獸亦有死者上曰漢宣帝及石勒時亦有雨雹損禾稼斃飛鳥事人君能恐懼修德則天灾可彌朕于此敢不謹乎三月戊子上諭禮部臣曰順天府直𨽻府州縣山東饑荒特甚朕憫赤子餓殍流離不遑寢食其被災地方𣲖納光祿寺一應供用之物宜悉量為減省以蘇民困書曰民惟邦本本固邦寧自今凡可以恤吾民者其悉以聞禮教之訓洪武五年詔天下曰朕惟三皇立極導民以時庖厨稼穡衣服始制民居舍焉五帝之教以仁信不過遵三皇之良規未備之宜當時之君示其所以天下從之自周至漢唐宋亦因時損益國乃昌民以安朕䝉皇天后土之恩命統天下祖宗之靈百神護佑得正帝位已五年于兹朕布衣失習經書况摧强撫順二十有一年常無寧居紀綱粗立古道未臻民不見化市鄉閭里尚循元俗天下大定禮義風俗可不正乎兹有所示諭爾臣民曩者兵亂人民流散因而為人奴𨽻者即日放還士庶之家毋收養閹豎其功臣不在此例古者鄰保相助患難相救今州縣城市鄉村或有凍餒不能以自存者令里中富室假貸錢法以資養之工商農業皆聽其故俟有餘贍然後償還孤寡殘疾不能生理者官為養贍毋失其所其有疾未愈願占藉為民者聽鄉黨論從古所尚凡平居相見揖拜之禮幼者先施嵗時燕㑹坐次之列長者居上佃見田主不論齒序並如少者事長之禮若在親屬不拘主佃則以親屬之禮所以明長幼厚風俗今廢缺已久宜令中書議定像式頒布遵守又婚姻古之所重近代以來狃于習俗専論聘財有違典禮又喪事以哀為本而葬祭之禮稱家有無今富者奢侈貧者假貸務崇炫耀又有惑于隂陽停柩經年以至暴露宜令中書集定議以頒示天下四方既定流民各歸田里其間有丁少田多者不許仍前占據他人之業若有丁衆田少者許于附近荒田內官為驗其丁力給與耕種又中國衣冠壞於元俗己嘗考定品官命婦冠服及士庶人衣巾婦女服飾行之中外惟民間婦女首飾衣服尚循舊習令中書頒示定制務復古典僧道之教以清净為本往往齊薦之際男女溷雜飲酒食肉自恣已令有司嚴加禁約福建兩廣等處豪强之家多以他人子閹割役使名曰火者今後有犯者以閹罪抵之沒官為奴于戲用夏變夷風俗之所由厚哀窮賑乏仁政之所當施因時制宜與民更化期臻禮義之風永底隆平之治咨爾臣庶體豫至懷受貢之訓洪武七年詔中書禮部曰古者中國諸侯于天子比年一小聘三年一大聘九州之外蕃邦逺國則每世一朝其所貢方物不過表誠敬而已髙麗稍近中國頗有文物禮樂與他畨異是以命依三年一聘之禮彼若欲每世一見亦從其意其他逺國如占城安南西洋瑣里瓜哇浡尼三佛齊暹羅斛真臘等處新附國土入貢既頻勞費太甚朕不欲也令遵古典而行不必頻煩其移文使諸國知之賞將士之訓洪武十七年賞征南校先是詔禮部曰賞賜國之重事所以報賢勞而勵士氣權度毫髮一失輕重則上為失禮下無所勸朕有天下十有五年雲南越在萬里負固不服故命大將帥師討之諸將士冒瘴癘踰險阻霧雨薄肌體沾汗濡甲胄而能效忠宣力搴旗斬將登城拔壘使天誅無留良善附順甚者身委矢石為國效命司馬法曰軍賞不踰月欲民速得為善之利也爾禮部其核實定議行之至是議上上以為賞薄曰將士甚勞若此非所以報有功也其重賞之上又諭禮部臣曰曩者發兵征雲南朕憫其勞苦出師臨陳皆有賞賚比者將士還京論功行賞士卒已令五軍十衛驗名給之近聞有賞不及格者或所司有欺蔽者致使竊議于外爾禮部即榜諭諸軍或受賞不及格與有勞而不及賞者皆許陳訴驗實賞之賜第之訓洪武二十年上諭禮部臣曰諸功臣于京師既有第宅而鄉里尚仍故居若既老而歸于禮不稱其各賜鈔俾還置第以居樂其髙年傳之子孫亦優待功臣之禮保夷之訓洪武三十年朝鮮國王李旦以栁玽等蒙恩放還遣其判三司事偰長夀密直副使辛有賢等貢鞍馬及金銀器布人參等物至京師謝恩上諭禮部臣曰朝鮮密邇東陲比之他國最為切近前者王氏怠政而亡李氏繼興數生邉釁與語再三終不能止易云開國承家小人弗用朝鮮本新造之國而所用之人皆非賢智之士此恐非三韓之福也昔子産于鄭凡為辭命草創討論修飾潤色必更數人手所以鄭國稱治如鄭道傳等乃小人之尤者在王左右豈能助其為善茍使鄭總盧仁度金若恆仍在朝鮮又鄭道全之羽翼今總等既不免王不精審又將假手于人矣宜諭其國王深思熟慮以保三韓禮部志稿卷一
