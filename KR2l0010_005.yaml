body:
  text: 禮部志稿卷五眀俞汝楫編聖訓憲宗純皇帝經筵之訓天順八年六月上將開經筵命少保吏部尚書兼華盖殿大學士李賢㑹舉講讀官以聞且賜𠡠諭勉勵之曰朕恭膺天命繼承祖宗鴻業君臨億兆負荷良艱永惟自古聖帝明王未有不資學問而能致天下於太平者朕鑒於茲將以八月初二日御經筵命爾太保㑹昌侯孫繼宗少保吏部尚書兼華盖殿大學士李賢知經筵事吏部左侍郎兼翰林院學士陳文吏部右侍郎兼翰院學士彭時同知經筵事太常寺少卿兼翰林院侍讀學士劉定知詹事府少詹事兼國子監祭酒司馬恂大理寺左少卿孔公恂翰林院學士杜僭萬安侍講學士李㤗太常寺少卿兼翰林院侍讀孫賢劉珝牛綸左春坊左庶子兼翰林院侍講王㒜徐溥兼經筵官賢文時安泰賢珝綸日侍講讀翰林等衙門儒臣分直侍講夫帝王之道具載經書茍非講眀何以措諸行事况朕臨御之初先務莫急於此卿等宜端心竭誠相與講論務臻其極毋隱而勿彰毋曲以狥好庶㡬㑹而通之理足以溉朕心舉而措之澤足以被天下如此朕斯無負上天之命祖宗之托而卿等亦無負于朕之所望矣欽哉尊號之訓成化二十三年三月上𠡠禮部曰皇太后撫育朕躬纉承鴻業二紀於茲海宇敉寧治化旁逹復撫育皇太子進學成身充諧室家國本益固功德隆重莫罄報酬宜上徽號以極尊崇用表朕愛敬之忱爾禮部擇日具儀以聞四月上恭上皇太后徽號禮畢詔告天下曰朕惟自古帝王之孝親匪惟養以天下而必尊以鴻名盖所以表功象德顯於今而垂於後也情文咸具敢㤀祗循恭惟聖母皇太后夙賛先皇茂隆内治誕育𦕈質纉紹丕圖迄今二紀宗社奠安海宇寧謐實惟聖母深仁洪慈訓廸之所致也矧於皇太子勤劬長育用底有成室家攸宜國本深固凡茲勲德超軼前古而尊崇之禮尚未加隆朕心歉焉乃稽典彛率籲臣工以今月十七日謹奉冊寳上尊號曰聖慈仁夀皇太后仰酬罔極之恩逺追帝王之孝禮既成於家國澤斯溥於寰區於戯據古尊稱式廣親親之教揆今恤下敷布老老之仁詔告中外咸使知聞孝思之訓成化二十年英宗睿皇帝忌辰奉先殿行祭禮遣駙馬都尉王増祭裕陵上退朝顧左右曰今早行禮之際追念罔極之恩感傷於懷泫然泪下不能自已永惟先皇奄棄天下臣民忽已二十年矣朕嗣守大業兢兢慄慄恒懼勿克負荷無以慰宗廟神靈今益當省身修徳任賢圖治使四海無虞生民樂業庶㡬無愧天子之孝云爾修省之訓成化元年五月京師大風雹大學士李賢勸上逺嬖幸親近老成修德舉政上曰朕嗣未久天戒屢彰敢不敬畏爾臣下亦當加警焉越數日降勑諭文武羣臣曰朕以菲德嗣承大統雖在疚中而敬天恤民之心未甞敢忽然自即位以来天灾屢見近於是月初五日風雹大作飄瓦㧞木此乃上天垂戒之嚴朕深懼焉意者徳有未修而政有未舉歟心有未誠而治有未至歟抑爾羣臣怠慢不謹爾事有乖上無以輔君徳下無以恵生民歟自今各宜恐懼修省恪恭乃事庻㡬以回天意特茲告戒尚其毋忽成化元年五月火流守南斗越五日𠡠諭文武羣臣曰朕以𦕈躬嗣承祖宗鴻業代天理物負荷惟艱茲者𤣥象示警朕甚懼焉永思厥咎罔知攸措用是减膳節用齋心於便殿朕將親露禱於昊天上帝引咎責躬修眀庶政爾在廷文武羣臣皆佐朕以行政者也上下一體休戚惟均其自今日為始各致齋三日同加修省務各秉乃誠各恭乃職勵精治理毋事因循為德為民必臻實效凡諸衙門有曽經具奏買辦採買物料於民間悉皆停止其有營造亦暫停免過夏俟秋涼興工以便吾民於戲朕為天之子爾羣臣與朕分治天職克謹天戒理所當然自今有可以匡輔不逮者尚無有隠爾等其欽承朕命毋忽成化三年七月上以南京雷震午門諭文武羣臣曰朕承天序守祖宗大業夙夜圖治惟求所以克享天心然望道未見治效未著今年地載失寧乃六月十五日雷震南京午門天之示戒可謂至矣詩云敬天之怒易云洊雷震以恐懼修省朕用是齋心滌慮内求已過盖中和未足以格髙厚誠敬未足以孚幽顯修齊治平之功未足以安中國服逺人敢㤀迪勵以弭灾異咨爾在廷文武羣臣與朕共天職其間有謀謨是資勲戚是聮司銓衡以清庶位均賦役以理萬民典禮以事神天治兵以靖華夏明刑罰守章程掌風紀任言責與夫握將帥軍旅之權分鉅細官守之寄者固或能守厥職矣然豈無竊位茍祿蔽塞賢路以玷朕之任使者乎豈無懷私狥利欲成谿壑未逹朕之聰聞者乎怠而能勉過而能改知止足而能退所與也以毗朕志以回天意以底於雍熙是為君臣交修之道是日上又𠡠諭南京文武羣臣曰朕惟太祖髙皇帝創萬世大業於南京所繫甚重乃今年六月十五日雷震於午門天之示戒夫豈徒然朕用是敬以修省戒飭在廷百執事勉修厥職以假穹聽咨爾南京守偹恭賛之臣屢致人言豈無所由盍各改勵以展来效其餘百司庶府勿謂朕耳目所不及而隳廢其職守以自勉背公向私盈饜其所欲以自棄當言者勿謂時不我從當事者勿謂上不欲用朕將稽其言之當理而從考其事之成功而用焉祀典必恪神乃歆戎政必練邦乃固賦入必慎民乃富屈抑必伸獄乃清無慢以取譴無怠以忘職無掊尅以為能足國無酷惨以為能去惡惟趨於大中至正以稱朕意惟天心其祐焉成化四年九月上諭文武羣臣曰朕嗣守丕圖惟天地眷佑是頼然勿克正於心修於身近無以御於家邦逺無以寧於海宇將奚以格髙厚神祗乃今年八月癸巳京師地震九月初以来彗星見北斗朕既齋心滌慮以改圖自新袛告天地非徒言之固將躬行之爾文武諸臣輔朕猷為受朕委託分職布任於中外者尚各警其怠忽因循之習革其欺公狥私之弊堅其忠藎不移之操固其㢘慎不汚之節豈惟爾之功名無玷天將鑒之以不致罰朕將資之撫世御宇不負所使朕之兵民將由之以不失其所邉圉強固而閭里殷富三光全於上九域安於下豈非君臣同德之效歟爾文武羣臣其圖利之成化十二年七月上於禁中祭告天地曰臣以菲薄之資撫盈成之運顧政事之多缺致灾異之荐臻茲者京城内外有物夜出殘害軍民驚動閭巷夫變不虚生必有所自意者或用度不節致傷民財歟或宫功繁興過勞民力歟或忠言不聞下情無由上逹歟或仁政不施實恵不能下究歟夙夜兢惕罔知所措伏惟大造垂慈曲賜矜憫赦過宥罪轉禍為祥俾妖物潜消居人安妥臣當祗謹天戒垂省愆尤斯維新於政令以圖報於大恩不勝惓惓懇禱之至成化十七年四月𠡠諭文武羣臣曰朕嗣承祖宗大統十有七年恒宵旰圖治求以上格穹蒼下安黎庶無負付託之重柰自去冬以来隂陽愆期雨澤少降朕心憂懼已甞齋心露禱祭告神祗又遣官清理刑獄用弭旱沴然而連日狂風大作塵霾蔽空豈朕與爾在廷諸修省有未至耶凡事闗朕躬者朕自究循而行之不怠爾等佐予治理中間能修職者固有而矌職者豈無為勲戚輔道者或忠藎未殫猷謀未盡歟司銓衡錢糓者或黜渉未當徴歛不時歟典禮樂兵戎者或不能以和神人息邉患歟與夫掌刑罰工役任風紀言責握將帥戎柄以及鉅細官守之寄者豈不稱委任而竊祿者歟有一於此亦足以召灾今自以後務湏痛加修省革其欺公狥私之弊警其因循懈惰之習固其㢘慎不私之節庶乎各舉厥職以輔朕不逮而政事修舉灾沴可弭矣爾等其欽承之成化十八年閏八月陕西西安府及徽州地震守臣以聞上曰地道失寧實由人事不修所致藩臣邉將皆佐朕以奠安坤維者陕西重地且逼近邉陲而地動若此夫豈無所感召歟其令各官殫心修禳以荅灾譴勿視為常事成化二十一年正月以星變赦天下詔曰朕紹祖宗大位撫御萬方思惟負荷之艱罔敢自遑自豫然而治效未著灾沴迭興地道失寧天時亢旱土無所演朕切憂惶甞齋心懇禱遣廷臣祭告山川柰嵗不登而河南山東畿内率多饑饉陕西山西尤劇至有棄恒産家室不相顧者元元何辜罹此危阨朕為民主可忍而莫之愍耶累愽采羣議發内帑倉儲𠡠所司大小多方賑濟期此矜人同歸樂土不意冬暮春初兩次星變有聲朕愈兢惕載𠡠臣工備陳時政得失采納而行用以下慰民望上荅天心況方春時和萬物發育祗承乾元資始之仁誕敷寛恤之典於戯君以愛民為德懷保恵鮮之政當施臣以輔治為忠還定安輯之務宜勉必上下極交修之誠庶穹蒼有昭格之效詔告中外俾咸知悉成化二十三年五月上以旱灾𠡠諭文武羣臣曰朕以涼德嗣守鴻圖夙夜憂勤期臻治理柰上天示戒亢旱踰時田苗枯槁民庶驚惶朕甚憫焉已曽寛恤刑獄徧禱神祗而雨澤未降豈寃抑未伸財用未節困苦未蘇而致然歟抑爾百官奉公守法之心懈而罔上厲下之私勝歟茲朕省躬自飭節减用度疎放宫人及條示合行事宜令内外衙門從實舉行爾等其各體朕心痛自修省盡心職務必致實效以回天意以蘇民困以紓朕憂憫元元之意祈禱之訓成化十八年四月上諭禮部臣曰前者爾等言一春無雨恐夏麥不實秋禾不生請命官祈禱朕以為立夏之後氣候蒸潤必有雨澤而今亢旱愈甚朕心憂惶莫知所措其命英國公張懋告天地保國公朱永告社稷襄城侯李瑾告山川宗室之訓成化十四年七月趙王見灂先以有罪革冠服令戴民巾讀書習禮至是其母妃懇為之請上乃賜之𠡠曰徃年皇親文武大臣合詞奏王悖禮犯法之事難以悉數揆之祖訓本當拘取来京令降為庶人朕念親親特從輕典止革冠服帯民巾讀書習禮俾圖自新今纔二載王母妃十次乞恩謂王自思惶赧悔悟深切夫人有過貴乎能改過而能改必遷於善特允所請復王冠帯仍管國事而後王當聽信輔臣毋狎近羣小當仁民愛物毋非法虐下當正大持身毋恣意滛戯當禮遇親族毋戕害骨肉當鎮靜圖治毋騷擾軍民凢府中一應事務必遵成憲必本天理必合人情然後斟酌而行庶㡬祿位可保無虞藩邦可保永昌矣不然禍仍逮身追悔何及成化十五年十一月襄王祁鏞奏乞追封故妃李氏為襄王妃然與臣母妃靖氏封號無辨竊觀諸司職掌命婦因子孫官爵封母並祖母者並加太字議禮出自朝廷乞如命婦制上曰議禮雖出自朝廷但祖宗舊制乃萬世臣子所當遵守者其敢擅増損乎詩云不愆不忘率由舊章王所請非舊章其已之止殉葬之訓成化十年七月遼王豪墭奏嫡長子思璊病故其繼妃馮氏妾曺氏俱無所出宜令殉葬上曰先帝上賓頋命毋令後宮殉葬可以為萬世法況王府前此未甞有用殉者今遼王葬其子乃欲以其婦殉之何其戾耶禮部即移文所司啓王勿用遷其婦别室毋令失所冕服之訓成化十六年三月晉王鍾鉉為其嫡長孫表榮乞衮冕章服上曰冠服之制所以眀尊卑辨等威所係甚重祖宗舊制親王世子冕服各有章數未聞世孫而有冕服也將何給王所奏可寢之藩婚之訓成化二十二年代府鎮安王成泳奏舊例天下王府婚配務於本境衛府州縣軍民良善子女内令長史承奉擇倫理無碍年貌相應者取其所司官勘結啓王成婚今本府各王將軍多有違此例者乞申眀約束禮部覆奏所言宜從上從之以書諭各王府曰朕惟婚姻人道之始正家之原婚姻正而家道齊然後國與天下可治也近聞各府王選婚多不遵禮法徃徃信任小人受其賄賂嘱託不復論其門地叙其倫理一槩選用或有男為王姪女儀賔而女却為王堂夫人者或有叔為姑儀賔而姪就配姑之女者或有姑為王妃而姪就配王之庶女者甚至一女有先定姪姪亡而定與叔或先定與兄兄亡而定與弟或弟亡而定兄者傷倫敗理違背法度莫此為甚近日鎮安王曽有此言已諭禮部定為禁例自今以後藩府選婚務湏長史㑹同承奉教授内使等官於本境衛府州縣官軍民之家行已無愆治家有禮者選其子女必湏年命相宜人物俊秀取其各該軍衛有司官衛鄰里保結眀白啓王具奏成婚若内使旗較人等敢有通同納賄欲蔽親王濫將不應之家及犯律禁之人朦朧選擇啓請成婚致使紊亂尊卑有傷國體者事發即將用財營求并受財聽嘱及事内一干人衆通查提問俱治以重罪不宥夫倫理明則風化行紀綱正斯天下定自古治外由内之政未有不先謹於此也朝貢之訓成化元年二月禮部言朶顔等三衛徃来進貢路繇喜峯口去年因附迤北使臣来朝欲要厚賞朝廷待以常禮處之别館彼皆失望今嵗来朝博囉恐失朶顔等衛人心乃代為奏求厚賞上𠡠博囉曰我祖宗以来四方朝貢使臣管待賞賜輕厚重薄俱有定例不可増減況朶顔等三衛曩時無所依倚我祖宗特加憐憫設立衛分授以官職俾近邉住牧每年朝貢俱從東路進入管待賞賜有例不缺今都督多羅千等不遵舊例却差人與爾等同来若朝廷不加分别不惟違我祖宗舊例抑且不見厚爾使臣之意因此只照常例難以更改特諭爾知之成化二年九月朶顔等衛右都督多羅千遣使臣傳報夷情且奏求印信帳房并不限朝貢人數上乃賜之𠡠曰爾三衛皆我祖宗所立授之官職衛我邉境爾之前人嵗時朝貢無有二心爾等正當繼前人之志感恩圖報却乃隨從摩爾觀為非抑不思昔有從也先作歹者今安在哉爾等年来朝受賞賜陞官職誰與爾耶今既改悔差人来朝并奏報事情特從寛貸仍賜表裏以答爾意并准爾所奏嵗時差人朝貢每衛許放百人湏以本衛印信文書為照爾等今後宜以也先等為戒以爾前人為法各守境土防護邉疆勉於為善竭誠報國庶㡬永享太平之福成化三年正月禮部奏遼東邉闗并驛遞於入貢逺人待之失宜致有嗟怨恐生邉釁上曰然其移文薊州永平等處鎮守廵撫等官令各嚴飭守闗各官軍及驛遞衙門凡遇逺人入貢務待之以禮其供用之物亦宜周備毋簡畧所貢之物聽其自效毋責備必使逺人感恩懷恵庶盡朝廷柔逺之意成化三年二月摩爾觀三上書求入貢上遣通事詹昇齎𠡠奬諭之曰朕受天命承祖宗大業為天下主内華外夷皆朕赤子也勿率循治化者有怒之而勿終拒絶焉服則舎之且待以仁恩爾摩爾觀昔年甞来廷矣昨日忽擾我邉陲今又悔過歸誠累求朝貢在邉諸將俱厲兵秣焉以待奏功在廷文武亦謂宜從邉將之言朕以天覆九有為心特允爾来命通事指揮使詹昇齎𠡠諭爾𠡠至即率領部落退處邉外戒令守法安靜住牧所遣朝貢使臣無得過三百人亦湏戒令遵依我邉將約束母得在途恣肆夫好生惡殺者天之道朕之所奉以子民也爾能仰體朕心朕將錫福於爾俾永享太平之樂豈不美歟成化三年四月虜酋毛里孩等遣使朝貢奏欲遣報使上不允賜以𠡠曰爾等尊敬朝廷遣使朝貢朕甚嘉恱已於来賜以宴賞比諸夷有加凡所求請量為給與朕於爾厚矣所以然者奉天命為華夷主當廣如天之量以容受之今爾等欲求朝廷遣使固是矣但使臣不能盡得其人或反因之搆起兵端況我祖宗原無此例近年雖遣不克慎終今不可效尤爾等能效順每年来朝朕不爾拒切宜戒約部屬勿侵軼我邉庶彼此安樂共享太平之福成化十七年十月禮部奏海外諸國及西域番王等遣使臣朝貢沿途多索船馬夹帯貨物裝載私鹽收買人口酗酒逞兇騷擾驛遞非禮違法事非一端所過官司累經陳奏欲依國法治之則念其逺人欲不治之則中國之人被其虐害今特降𠡠開諭繼今以後王遣使臣必選曉知大禮謹守法度者量帯傔徒嚴加戒飭小心安分毋作非為以敬奉使之禮以伸納欵之忱俾奉使者得以保全供應者得免煩擾豈不彼此两全哉封外國之訓成化十九年四月朝鮮國王李娎請封長子㦕為世子上既許之且諭禮部臣曰娎敬事朝廷與他國不同宜厚賜與且降𠡠諭之曰有爵土者莫不為長世之圖立嫡長所以係羣情之望今特封爾長子㦕為朝鮮國王世子朝廷之命王其承之藩邦之器世子其主之知天地之分不可踰益循事上之誠知繼體之道不可忽罔替秉禮之訓若是則本愈固譽愈隆國王享福有窮耶修寺觀之訓成化二年上諭禮部臣曰京城内外居民輳集處所多有内外官員人等増修寺觀廟宇禮部其嚴加禁約尚書姚䕫等請掲榜禁約繼今不許於原額外増修請額違者許廵街御史及五城御史兵馬司擒治仍行順天府曉諭鄉村一體遵行廕襲之訓成化十八年已故刑部右侍郎林鶚子薇援例乞為國子監生禮部通查舊例以聞上不允薇入監仍諭禮部曰廕叙大臣子孫朝廷所以崇徳報功示激勸也其間或有容身保位無益於時者恩典何可泛及今後在京三品以上官果政績顯著許一子自陳試其能通經書大義乃許入監否則發回籍毋容一槩濫擾隆廕之訓成化二十二年楊榮曽孫昻援例乞為國子監生上諭禮部臣曰仕者世祿王政之所先也楊榮歴事先朝四十餘年有計安社稷之功其子孫雖甞廕叙猶未稱朝廷報功之典宜令昻入監讀書用示殊恩以為後来盡忠於國者勸禁自宮之訓成化六年二月有自宫求進者二百六人禮部以聞上命姑宥其罪俱發回原籍當差不許托投王府勢豪潜住違者論死隠匿之家發邉逺充軍仍出榜禁約後有自宫求進一體治罪孝宗敬皇帝修省之訓𢎞治二年七月早朝畢上勑諭禮部曰近日京城雨水為灾南京又奏大風雷雨水之異朕當檢身飭行袛謹天戒爾文武百官其各加修省勉圖報稱政事有缺失當舉行改正者皆斟酌精當以聞𢎞治六年四月上以去冬無雪至於是月不雨𠡠諭文武羣臣曰朕以涼德纘承祖宗鴻業宵旰靡寧圖為治理乃者天道勿順自去冬迄今亢旱踰時田苖枯稿民庶驚惶朕甚憂懼已甞齋心露禱及遣官祭天下神祗而連日狂風屢作雨澤少降揆厥所由豈朕與爾文武羣臣交修之道猶有所未至耶自今事闗朕躬者朕當究循而行之爾等與朕共理天事休戚惟均亦各宜痛加修省革其背公狥私之弊警其因循怠惰之習固其㢘慎不渝之節凡軍民利病時政得失有可以興革文武羣臣并科道仍條奏来聞務臻實效母事虚文用佐朕之不逮庶人事修而天意可回故諭𢎞治十六年禮部以遼東火灾之異請令鎮廵等官各修省上曰遼東灾異非常即𠡠鎮廵等官痛加修省利弊可興革者具實以聞被火之家盡心賑恤毋致失所廟祀之訓𢎞治二十三年十一月上𠡠諭禮部曰朕惟古者天子九廟而祖宗功德百世不祧其他則以次祧遷有常制焉恭惟我太祖髙皇帝混一區宇肇正綱常追祀德懿熈仁四祖同殿異位情文具稱列聖相承昭穆有序至於皇祖考英宗睿皇帝九廟已備茲者皇考繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝山陵將畢升祔有期當定祧遷之制矧惟皇妣孝穆慈恵恭恪莊僖崇天承聖皇太后袝塟畢日宜有奉享神主之禮爾禮部其會文武大臣并詹事府國子監翰林院堂上左右春坊司經局及科道掌印官詳稽古制斟酌情文議處来聞務遵典禮足垂萬世用成朕尊祖敬親之大孝欽哉故諭視學之訓𢎞治元年三月上視學行釋奠禮御彛倫堂授經於講官祭酒司業賜之坐講祭酒費誾講商書說命惟天聰眀一節司業劉震講周易乾卦大人者與天地合其徳一節講畢上宣諭師生曰六經載聖人之道講眀體行務臻實效爾師生其勉之重建文廟之訓𢎞治十七年閏四月以重建闕里文廟成特命太子太保户部尚書兼謹身殿大學士李東陽徃祭賜之𠡠曰比因闕里文廟燬於回祿爰命有司重建厥功既成茲遣卿徃彼祭告夫先師道德萬世之所宗鼎新廟廷一代之盛典以故禋告之禮特委輔弼之臣卿其精白一心寅恭將事務期聖靈昭格以副朕隆師重道之懷事畢即星馳回京欽哉故諭纂㑹典之訓𢎞治十年三月𠡠諭大學士徐溥等曰朕嗣承丕緒以君萬邦逺稽古典近守祖宗成法夙夜祗懼罔敢違越惟我太祖髙皇帝創業定制所以為子孫計者至矣御製之書連篇累帙宏綱衆目極大而精隨制隨改靡有寧嵗後所施行未盡更定迨我太祖文皇帝繼正大統益宏逺圖列聖相承至於皇考皆因時制宜或損或益盖有不得不然者期不失乎聖祖之意而已顧其條貫見於簡冊卷牘之間凡百有司艱於考據下至閭里或未悉知皇祖英宗睿皇帝甞有志纂述事未克竟以遺朕躬是不可緩茲欲仰遵聖製編國史以本朝官職制度為綱事物名數儀文等級為目一以祖宗舊制為王而凡損益同異據事繫年彚列於後萃而為書以成一代之典俾天下臣民咸得披誦庶㡬㑹極歸極底於㤗和爾等其各殫心力詳錄而謹書之務使文質適中事理兼備行諸令而無悖傳諸後而可徴以稱法祖圖治之意爾等其敬承之故諭宗室之訓𢎞治元年二月晉王知烊奏世子竒原以母薨乞廬墓禮部覆奏上不許與王書曰承諭世子先因母妃患病躬侍湯藥徒歩禱神及後薨逝欲於安塟畢日廬墓以終喪制且又慮叔祖年髙侍養有缺不忍離側此可見其孝心純至宗室有此良足嘉尚但古人有云附於身附於棺必誠必信諒世子於送終之禮必已盡心而無遺悔矣古人又云事親者左右就養無方今叔祖春秋已髙世子正當朝夕侍奉不離左右況宗藩繼序所繫尤重豈可輕身乆處於外乎茲特令世子送塟掩壙之後即循常道回府侍養至於三年之内居處之奉服食之制哀思之誠則在世子自盡其心如此則送死事生兩得其道不惟於祖訓無違而於宗族化𨗳風俗歸厚寧不又有光乎叔祖其知之宥夷之訓𢎞治八年廣西上思州頭目黄政齎𢎞治七年冬至節表箋過期始至且不由本布政司類進禮部請治其罪上曰上思州去京師道里遼逺進表箋過期兼不由布政司類進不為無罪但念其逺人其特宥之濫乞之訓𢎞治十三年永順伯薛勲及廣寧伯劉佶俱乞賜蠎衣禮部以恩賞不宜太濫請賜裁處上曰蟒衣之賜係朝廷特恩而勲等一槩援例濫請實為煩凟今後有如此者必罪不恕武宗毅皇帝祭告之訓正德六年七月上諭禮部臣曰寜夏底定皆天地百神眷佑所致未伸告謝邇者四方灾旱相仍盜賊繼起荼毒生靈朕心惕然禮部其擇日遣官致告於是遣英國公張懋新寧伯譚佑㑹侯孫銘祭告天地宗廟社稷山川禮部右侍郎李遜學祭告天夀山之神其鍾山之神及天下嶽鎮海瀆俱令守臣祭告優夷之訓正德元年上諭禮部等臣曰今後四夷朝貢来京凡筵宴飲食俱宜豐㓗沿途廪餼驛傳如例應付以副朕柔逺之意朝貢之訓正德三年十月以禮部大通事王喜奏雲南夷𬗟甸及宣慰土官衙門例用三年一貢今皆不通宜移文鎮廵等官以時促之上曰土官貢賦自有舊制其勿紛擾仍行各省鎮廵等官知之禮部志稿卷五
