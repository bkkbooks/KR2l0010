body:
  text: 禮部志稿卷二十明俞汝楫編儀制司職掌婚禮天子納后先遣官祭告天地宗廟天子臨軒命使行六禮東宫納妃則先告廟其詳在大明集禮正統中英宗納后成化末年孝宗在東宫納妃皆遵用舊儀而稍有所損益今備載其親王公主婚禮亦附列焉皇帝納后儀正統七年定萬厯六年新定儀注有損益者附注本文之下納采問名前期擇日遣官告天地宗廟至期前一日所司設御座于奉先殿鴻臚寺設制案節案于御座前新儀改節案于制案之前下放此內官監禮部陳禮物于文樓下教坊司設中和樂于殿內至期早錦衣衛設鹵簿于丹陛丹墀禮部陳禮物于丹陛上及文樓下內官監設采輿于奉天門外教坊司設大樂於奉天門內鼓三嚴鐘止鴻臚寺奏請升殿上具冕服導駕奉引如常儀升座文武官朝服叩頭訖左右侍班執事引正副使朝服就拜位行四拜禮傳制官奏傳制訖由東門出執事舉制案節案于中門出置丹墀中道禮物在丹陛上者隨之傳制官宣制曰兹選某官某女為皇后命卿等持節行納采問名禮正副使又行四拜禮鴻臚寺奏禮畢上興新儀改禮畢上興在禮物隨出之後引禮引制案節案用傘蓋遮護由奉天門中門出執事引文樓下禮物隨出至奉天門外正副使取節及制書置采輿中儀仗大樂前導從中門中道行出大明門外正副使易吉服乘馬行詣皇后第行禮皇后第前一日設正副使幕次于大門外左南向設香案于正堂中設制案節案于香案南别設案于香案之北其日正副使至大門外儀仗大樂分列置采輿于正中設制案節案于采輿北引禮引正副使入幕次執事官陳禮物于正堂正副使出幕次取制書置案上禮官一員先入正堂立于東主婚者朝服出見立于西禮官曰奉制建后遣使行納采問名禮引主婚者出迎引禮引正副使捧制書及節先行主婚者隨行至正堂置制書及節于案正使立于案左副使立于案右東西相向引禮引主婚者就拜位行四拜禮詣案前跪正使取納采制宣訖授主婚者主婚者受之授執事者執事者跪受置于北案上稍左副使取問名制宣訖授主婚者主婚者受之授執事者執事者跪受置于北案上稍右主婚者俯伏興平身執事者舉答問名表案于主婚者後少西取表授主婚者主婚者受表跪授正使正使受置于案主婚者俯伏興平身退就拜位又行四拜禮畢正副使出置表采輿中訖新儀改正副使持節隨表案後出各置采輿中訖主婚者出大門外至正副使前致詞云請禮從者正副使復入酒饌畢主婚者捧幣帛以勞正副使正副使出主婚者送至大門外正副使進發采輿于大門等門左門入至奉天門外以表節授司禮監官捧入復命制詞朕承天序欽紹鴻圖經國之道正家為本夫婦之倫乾坤之義實以相宗祀之敬協奉養之誠所資維重祗遵聖祖母太皇太后聖母皇太后命遣使持節以禮采擇右納采朕惟夫婦之道人倫之本正位乎內必資名家特遣使持節以禮問名尚佇來聞右問名附答辭臣某伏承嘉命正使某官某等重宣制詔問臣名族臣女臣夫婦所生先臣某官某之玄孫先臣某官某之曽孫先臣某官某之孫先臣某官某之外孫臣女今年若干謹具奏聞納采問名禮物玄纁紵絲四段玄色二假纁色二假金一百兩花銀八百兩珍珠五樣紵絲八十匹大紅線羅四匹白生土紗四匹各色熟絹八十匹綿胭脂一百箇蠟胭脂二兩用金合兩箇珠兒粉十兩開合紵絲六匹木紅絹六匹珠翠花一朵羊八隻豬四口酒一百六十瓶鵝四十隻末茶二十袋圓餅一百六十箇白熟米四石白麵八十袋棗子四合栗子四合木彈四合納吉納徵告期前一日所司設制案節案禮物中和樂至期早設鹵簿采輿大樂新儀改設中和樂大樂俱在前一日傳制遣使並同前納采問名儀但納徵用玄纁束帛六馬等物制詞云兹聘某官某女為皇后命卿等持節行納吉納徵告期禮皇后第前一日設正副使幕次香案制案節案别設案並同前受納采問名儀惟更設玉帛案其日正副使至皇后第于采輿中取節及制書玉帛置案上少候執事先設皇后冠服諸禮物于正堂六馬陳于堂下禮官一員入正堂主婚者朝服出見禮官曰奉制聘皇后新儀無皇字遣使行納吉納徵告期禮主婚者出迎執事舉玉帛案前行正使于案取納吉納徵制書捧之副使取告期制書及節捧之次行主婚者後隨新儀改正使捧節副使捧納吉納徵告期制書至正堂正副使各以制書及節置案上退立案之左右相向置玉帛案于節案制書案之南引禮引主婚者就拜位行四拜禮引詣案前跪正使取納吉納徵制書以次宣訖授主婚者主婚者受制以授執事者執事者跪受置于北案正使捧圭授主婚者主婚者受圭以授執事者執事者跪受置于北案副使捧玄纁授主婚者主婚者受以授執事者執事者跪受置于北案副使取告期制書宣訖授主婚者主婚者受制以授執事者執事者跪受置于北案主婚者俯伏興平身復位行四拜禮畢正副使持節出以節置采輿中主婚者出門外請禮從者及捧幣勞正副使俱同前正副使還至奉天門外以節授司禮監官捧入復命制詞大婚之卜龜筮卿士協從敬循禮典遣使持節告吉右納吉卿女有貞靜之德稱母儀之選宜共承天地宗廟特遣使持節以禮納徵右納徵歲今月良吉日某甲子大婚維宜特遣使持節以禮告期右告期納吉納徵告期禮物玄纁紵絲四段玄色二纁色二玉穀圭一枝金龍珠翠燕居冠一頂金簮全燕居服素夾四件紵絲一件線羅二件銀絲紗一件大帶各色線羅四條玉革帶一條金事件全玉花采結綬一副金事件全玉佩玎璫一副金鈎金事件全玉雲龍霞帔墜頭一個金鈒花釧一雙金素釧一雙金連珠鐲一雙首飾一副天順八年加一副珠面花二副翠面花二副四珠葫蘆環一雙八珠環一雙排環