body:
  text: 禮部志稿卷九十五明俞汝楫編曠典備考耕藉初舉藉田議洪武元年十月癸亥上欲舉行耕藉田禮諭廷臣曰古者天子藉田千畝所以供粢盛備饋饎自經䘮亂其禮已廢上無以教下無以勸朕涖祚以來悉脩先王之典而藉田為先故首欲舉而行之以為天下勸時監察御史有歴班而言曰耕藉田則力本者知所重矣上曰欲財用之不竭國家之常裕鬼神之常享必也務農乎故后稷樹藝稼穡而生民之詩作成王播厥百穀而噫嘻之頌興有國家者其可棄置而不講乎遂命以來春舉藉田禮行之于是禮官奏祭法為羣姓立社曰大社王自為立社曰王社亦曰帝社鄭𤣥謂王社在藉田之中詩載芟序云春藉田而祈社是也又周官籥章凡國祈年於田祖龡豳詩繫土鼓以樂田畯鄭氏曰田祖始耕者謂先農也漢立官社文帝令官祠先農先農即神農也晉武詔復二社北齊及隋又改曰先農神龍中禮官祝欽明議以典禮無明文先農與社本是一神妄為改作請改先農壇為社壇以應禮經王社之義至開元定禮又采齊隋之議復曰先農宋陳祥道曰先儒謂王社建於藉田然國王藉則司空除壇農正陳藉禮而歴代所祭先農而已不聞祭社也詩載芟序所謂春耕藉田而祈社非謂社稷建於藉田也今按祝欽明云先農即社陳祥道云社自社先農自先農藉田所祭乃先農非社也雖其説不同要知其為重農報本之意一也若夫藉田之制則考於月令與周官可見月令天子孟春之月乃擇元辰親載耒耜置之車右帥公卿諸侯大夫躬耕藉田千畝於南郊冕而朱紘躬秉耒以耕天子三推三公五推卿諸侯九推反執爵於太寢三公九卿諸侯大夫皆御命曰勞酒季秋之月蔵帝藉之收於神倉地官内宰詔王后帥六宫之人生穜稑之種而獻於王甸師掌帥其屬而耕耨王藉以時入之以供粢盛其制如此然享先農之禮與躬耕同日禮無明文惟周語云農正陳藉禮而韋昭注云陳藉禮者祭其神為農祈也至漢以藉田之日祀先農而其禮始著漢舊儀春耕藉田官祀先農百官皆從置藉田令承東漢藉田儀正月始耕常以乙日祠先農於田所先農已享耕於乙地由晉以下至於唐宋其禮不廢政和間罷享先農為中祀命有司行事止行親耕之禮南渡後復親祠先農元雖議耕藉而竟不親行其祠先農命有司攝事今議耕藉之日皇帝躬祀先農禮畢躬耕藉以仲春擇日行事制從之耕藉之祭洪武二年二月上躬享先農以后稷氏配祀畢耕藉田於南郊先農壇在藉田之北髙五尺濶五丈四出陛藉田在皇城南門外御耕藉位在先農壇東南髙三尺濶二丈五尺四出陛其神位先農正位南向后稷配位西向正配位幣各用青色其餘噐物禮儀並與社禝同但不用玉仍加登三先農祝文曰惟神生於天地開闢之初創田噐别嘉種以肇興農事古今億兆非此不生永為世教帝王典祀敬不敢忘某本庶民因天下亂集兵保民一紀于兹荷天地眷佑海内一家臨御稱尊紀綱黎庶考典崇祀神載䇿書今東作方興禮宜告祭謹命太常官築壇于京城之陽躬率百官詣壇展禮緬惟神明造化萬世如斯仰兾發太古之苖實初生之粟為民立命昭祀無疆謹以制幣犧齊粢盛庶品肅備常祀式陳明荐以后稷氏配神作主后稷祝文曰惟土膏脉起爰脩耕藉用荐常祀于先農之神惟神功恊稼穡允宜昭配謹以制幣犧齊粢盛庶品式陳明荐作主侑神尚享其樂章迎神奠帛並奏永和之曲迎神曰東風啓蟄地脉奮然蒼龍掛角炳炳天田民命惟食創物有先圜鍾既奏有降斯筵奠帛曰帝出乎震天發農祥神降于筵藹藹洋洋禮神有帛其色惟蒼豈伊具物誠敬之將進俎奏雍和之曲曰制帛既陳禮嚴奉牲載之于俎祀事孔明簠簋攸列黍稷惟馨民力普存先嗇之靈三獻並奏夀和之曲初獻云九穀未分庶草攸同表為嘉種實在先農黍稌斯豐酒醴是供獻奠之初以祈感通亞獻云倬彼甫田其隰其原耒耜云載驂馭之間報本斯享亞獻惟䖍神其歆之自古有年終獻云帝藉之典享祀是資㓗豐嘉栗咸仰于斯時惟親耕享我農師禮成于三以訖陳詞徹豆送神並奏永和之曲徹豆云於赫先農歆此㓗脩于篚于爵于饌于羞禮成告徹神惠敢留餕及終畆豐年是求送神云神無不在於昭于天曰迎曰送于享之筵冕衣在列金石在懸往無不之其佩翩翩望瘞奏太和之曲云祝帛牲醴先農既歆不留不䙝瘞之厚深有幽其瘞有赫其臨曰禮之常匪今斯今配享樂章初獻云厥初生民粒食其天開物惟智䆳古奚𫝊思文后稷農官之先侑神作主初獻惟蠲亞獻云后稷配天興于有邰誕降嘉種有栽有培俶載南畝祇事三推侑神再獻歆我尊罍終獻云嘉徳之薦民和歲豐帝食率育報本之供陳常時夏其德其功齊明有格惟獻之終其耕藉儀見職掌洪武二十年二月乙未躬耕藉田遣官享先農禮成宴羣臣於壇所上曰耕藉田古禮也一以供粢一以勸農務本也朕即位以來恒舉行之惟欲使民知勸盡力於田畝以遂其生養非事虚文也今禮成與爾羣臣享胙于此豈徒為宴飲之樂正欲羣臣知重農之意羣臣皆頓首謝宣德耕藉宣德元年二月上祭先農詣耕藉位三推賜宴如洪武儀謂侍臣曰先王制藉田以奉粢盛以率天下務農貴有實心人君體祖宗之心念創業艱難愛惜蒼生明德致治達於神明則黍稷之薦不徒親耕矣農民勤苦終歲不免飢寒輕徭薄歛貴農重穀禁止遊食則民趨耕稼不徒勸率之不然三推何益於事侍臣對曰先王制禮有本有文陛下之心宗社蒼生之福也嘉靖耕藉嘉靖十年上命定西苑耕歛之禮墾隙地為田建帝社帝稷壇北建殿曰天通亭曰豳風又曰省耕曰省歛倉曰恒裕隆慶耕藉隆慶二年二月耕藉先期預告奉先殿還宮仍詣奉先殿及𢎞孝神霄等殿恭謁先是上諭禮部百官不必稱賀不必鹵簿禮部議造耕車以載耒耜用青質本日聖駕詣先農壇親祭先農之神禮畢詣耕田所上秉耒三推公卿以下助耕畢上御齋宮賜百官宴并宴耆老於壇旁賜農夫布疋駕還是日以禮部言増上中下三等農夫各十人於耆老之後如洪武中例奏増耕藉農夫𢎞治元年二月戸部尚書李敏言天下之苦勞者莫如農夫蠶婦今皇上躬藉田若不親見其事則稼穡之艱難何由而知乞勅禮部於耕藉儀注内増上中下農夫各十人服常服執農噐引見行禮然後令其終畝俟終畝訖或賜食賜布以慰其勞尤見初政重農之意上曰朕正欲觀農夫艱苦其終畝庶人只常服從事仍人賜布一疋造耕根車觀耕臺嘉靖十年行耕藉禮詔議造耕根車以重農務禮部議言臣等考大明集禮國朝耕藉因宋制上乘玉輅而以耕根車載表耜蓋玉輅耕根車同日而行及考見行儀注順天府官捧耒耜及穜稑種置綵輿先於祭前二日而出今用耕根車以載耒耜宜令順天府官於祭日早進呈畢以耒耜置於耕根車内前玉輅以行及考耕根車式稽諸禮書止有圖式而無髙廣尺寸宜依今制車式差小通用青質伏乞欽定下順天府速為製造臣等又考得宋史有觀耕臺今皇上御門觀耕地位卑下侍衛人衆有碍觀視宜令工部以木作臺髙五尺横直五丈正面東西三出陛暫行一次俟明年用磚石砌築西苑耕獲規制嘉靖上以西苑地畝農具耕種收獲之事未有成法令禮部戸部㑹議以聞至是禮部尚書夏言戸部尚書許瓉等條具以進言西苑耕熟地五頃七十畝有竒歲用農夫五十人管農老人四人騾夫八人人日支口粮三升太倉關給仍復其身耕畜一十六頭御馬監倉給草料其農具俱出之内官監五穀種子順天府送用倉厫農舎牛房工部蓋造每歲戸部侍郎一人郎中一人提督之所獲納之恒裕倉以備郊廟粢盛撥太倉軍斗三十人守之歲終戸部奏報其出入之數上從之仍付史舘采輯西苑耕歛嘉靖十年八月上諭尚書李時曰西苑工俱告完朕今日往視收獲以觀農事之終卿可偕大學士鑾尚書鋐侍郎言同觀之上御豳風亭召見諸臣復曰兹當秋成之期與卿等同觀收獲時對曰皇上務農重本自足以風勵天下觀獲畢復召諸臣諭曰農之勞苦見于紙上不如見之于真我聖祖常有訓曰衣帛當思織婦之勞食粟當念農夫之苦以此觀之委為粒粒辛苦也時等復曰自古帝王親農事未有如我皇上者真所謂知稼穡之艱難也上命賜諸臣宴宴畢復召鑾時二臣上御無逸殿之東室曰西苑宮室是朕文祖之御近脩葺告成欲於殿中設皇祖之位祭告之時曰仁壽殿乆已廢圯皇上一旦整飭追慕皇祖祭告之禮益見聖孝上曰祭畢宜以宴落成之其令文臣三品以上及經筵日講官俱與宴罷西苑耕隆慶元年禮部奏先年大行皇帝於西苑隙地種植麥穀命總督倉塲戸部侍郎同司禮監督理農事收其子粒貯恒裕倉以供大祭粢盛且欲以知稼穡之艱難甚盛舉也但苑内禁地農夫出入力作事體非便請罷部臣兼督止令該監督理種植以少存重農省艱之意其戸部侍郎督理農事舊銜宜省從之藉禮自三代以來未之能易也藉者借也甸師掌之借民力也漢耕於鎚定於弄田於定陶於下邳無定所領以藉田令丞唐戎近郊履千畝行九推宋耕數十步或十有二跬無定數以宰臣領大禮使總之開創之君注念稼穡為子孫法耳我朝髙皇定禮文皇世皇稍潤色之宣王諭言則休養生息勤生節用寧獨為觀美哉巡狩巡狩古禮也文中子有言舜一歲游五岳兵衛少而征求寡也時異世殊宣皇言之詳矣髙皇平定之初僅一巡大梁再入中都而其儀不著文皇六年以將巡北京始定巡狩之禮而其它征布尼雅錫哩阿嚕台與宣皇之征彰德出喜峰度居庸獵岔道以韎韐從事載在戎行不與焉武皇駐邉關幸南畿六飛時駕八駿不休非巡狩禮也監國永樂北巡永樂七年二月勅皇太子曰朕今巡狩北京命爾監國天下之務甚重爰簡文武才德之臣為爾輔賛古聖哲為政需賢而成者宜悉心取益虚己納言整肅𢎞綱康理庶務聼言之際宜加審擇言當雖芻蕘從之言不當雖王公不可聼惟明與㫁乃克有成至於武備猶宜盡心居處關防幾務慎宻宜祇勤佩服夙夜不忘以副朕付托之重遂命禮部議皇太子留守事宜閏四月勅吏部尚書兼詹事府詹事蹇義兵部尚書兼詹事府詹事金忠右春坊大學士兼翰林院侍讀黄淮左春坊左諭德兼翰林院侍講楊士竒曰皇太子監國所裁决庶務令六科每月以聞如賞一人何以賞罰一人何以罰或罰而復宥皆類奏勿隠嘉靖南巡嘉靖十八年二月命皇太子監國以宣城伯衛錞遂安伯陳鏸為留守大學士顧鼎臣為同留守兵部尚書張瓉參賛機務太監麥福為内提督與錞等恊同行事文武大臣刑部右侍郎屠僑等一十八人分守京城九門仍命内坐營官九人恊守賜留守大學士顧鼎臣勅曰朕兹巡幸承天恭視顯陵車駕往回動歴數月昨已冊立東宮令之監國特留卿賛務恊同文武重臣居守内自禁掖外而都城逺及邊陲并大小有司庶務悉以付卿卿宜遵承朕命應啓請者請令㫖應聞奏者馳奏行在其有宻切𦂳重事情宜用欽賜印記來聞卿講幄舊臣乆懐經濟朕兹重寄其欽承之是日復召鼎臣于平臺面授手勅曰朕以二親安神之地日夜思念心甚缺焉必親見乃安非漫遊也特以留守至託簡付於卿宜朝夕慎恭輔賛儲政朕乃心安於行卿其欽哉慎之鼎臣因條上監國事宜七事一聖駕行後皇太子十日一具本恭問實封馳奏一臣不時問皇太子二王公主起居及宮闕消息一體奏聞一皇太子正位東宮舊制文武百官俱朝叅朔望今宜令都察院鴻臚寺設糾儀官員及司儀鳴賛至日百官各詣文華門候朝臨時取㫖放免一皇城及各門守備官軍臣等不時查覈有違悞者量加懲戒一皇城營未得停止臣五日一閲視一内閣於諸司舊無統攝今臣奉欽命留守事體重大乞特降明㫖令順天府宛大二縣及五城御史兵馬與皇城各門守衛官軍俱聼臣約束便於行事一往來多有四方奸人妖術潛住京城蠱惑愚民玩㺯國法無所不至近聞外邊奸細入内地間至京師宻伺動靜尤不可忽乞容臣留守兵部計議嚴督巡城御史五城兵馬及行緝事官校宻切查訪但有奸人即與擒送究問如法重大事情則奏聞區處上覧奏答曰宫中消息當宻疏奏聞都察院重獄具在該院官其加意監守無通同疎縱卿亦時𫝊朕諭令周期查知之勿賣主不忠也餘俱報可鼎臣又請以先後所降手勅綸音下該科庶百官知儆臣亦得奉命行事上曰百司庶官分理政務近者多恣縱怠慢朕躬至顯陵去京師非邇卿受茲特任留守國都賛佐東宮其一切事務俱當與知其有廢法狥情行私者即加開諭違者如情重則具疏以聞輕者暫取令㫖懲戒之仍令諸司遵守大閲隆慶大閲儀隆慶三年禮部奏大閲之禮古昔所重在成周之世職列夏官自漢唐以來事載國史迨我宣英二聖相繼舉行成憲昭然遺烈未逺兹遇皇上煥起神謨光脩令典建熈朝之盛事垂後世之法程一切儀章俱當詳慎但稽之前代則制度互有不同考之先朝則禮文亦多未備臣等謹畧叅古制兼酌時宜擬議上請其儀不録後萬厯大閲儀即據此而加詳也萬厯大閲儀注萬厯九年二月儀制清吏司案呈奉本部送該兵部咨為遵制恭請大閲以飭武備以保治安事又該禮科抄出欽天監監正臧隆等題同前事選擇駕發日時等因查得隆慶三年大閲禮儀雖經本部題請縁係肇舉曠典一時酌議尚未詳悉今奉明㫖備查禮儀開具上請伏乞勅下臣等一體通行欽遵施行一欽定萬厯九年三月初三日辰時吉一前期工部搭蓋行宮於將臺之北一初二日上常服以親行大閲禮預告於内殿用告詞行四拜禮如聖駕出郊常儀是日司設監設御幄於將臺上總恊戎政大臣巡視科道官督率將領軍兵預肅教塲内外一初三日早遣官於教塲内祭旗纛之神三大營官軍俱各披鮮明盔甲盛陳旌旗器械於本營擺列仍選擺將官四員統領有馬戰兵二千名於長安左門外伺候扈駕文職各堂上官六科十三道掌印官并禮科兵科禮部儀制司兵部四司官及糾儀監射御史鴻臚寺供事官武職除應該操閲外其餘都督以上并錦衣堂及南北鎮撫司掌印僉書官各具大紅便服關領扈從牙牌懸帶俱詣教塲伺候一是日免朝錦衣衛備鹵簿駕設輦於皇極門下正中上常服乘輦由長安左門出扈駕官軍前後導從鉦鼓嚮器振作從安定門出至閲武門外總恊戎政官率領大小將佐官於閲武門外戎服跪迎候駕過方起隨入將臺下向北序立駕進閲武門内中軍舉號砲三各營鉦鼓嚮器振作扈從官序立於行宮門外迎駕上至行宮門降輦兵部官導上入行宮將臺上號頭官舉藍旗鳴金止鼓候上陞座扈從官行一拜叩頭禮如傳㫖賜酒飯各官仍叩頭謝恩畢即退出於將臺下東西侍立兵部官跪奏請登臺大閲承㫖畢兵部鴻臚寺官導上登臺陞御幄將臺上舉紅旗臺前起肅靜砲三鴻臚寺官跪奏京營將士叩頭賛一拜叩頭禮畢分東西侍立總恊戎政官列於扈從官之北其餘將佐列於扈從官之南兵部官跪奏請令各營整搠人馬承㫖畢總恊戎政官指麾副叅遊佐等官各歸所部整搠人馬將臺上吹號笛麾黄旗各營鉦鼓齊鳴待諸將到營將臺上舉藍旗鳴金止鼓兵部官跪奏請閲營陣臺上舉紅旗臺前舉靜隊砲三各營應砲三調哨前行至營盤先演五花營陣戎政官引號頭官執牌跪奏演五花營陣次演四方平定營陣戎政官引號頭官執牌跪演四方平定營陣演營畢將臺上紅旗臺前起掣人馬砲三營中應開營砲三官軍調哨各回軍營將臺上又吹號笛麾黄旗各營鉦鼓齊振竢將士回營畢臺上又舉藍旗鳴金止鼓戎政官引號頭官執牌跪奏演營陣畢上回行宮少憇各應射將佐官俱釋甲胄更戎服聼射安把官安馬步把用御史二員兵部司官二員監視紀錄二員立於馬箭道頭把之東聼唱名放馬二員立於將臺前扈從九卿官之下地屏上聼報箭紀錄候駕陞御幄將臺上吹號笛麾黄旗各營鉦鼓齊振少頃臺上又舉藍旗鳴金止鼓兵部官跪奏請閲射戎政官指麾大小將佐及公侯駙馬伯錦衣衛等官各聼比較射藝戎政官引號頭官執牌跪奏射馬箭將臺上舉號帶東旗臺上㸃藍旗吹喇叭三聲領馬官執牌引馬前馳東旗臺挨次㸃藍旗吹喇叭一聲唱名放馬射箭人各三箭唱名官自下而上依次傳唱直至御前中的者鳴鼓報箭官跪奏某人中幾箭以次射完戎政官引號頭官執牌跪奏射馬箭畢各射箭官俱回東旗臺下各照次序立鼓手趨前掣馬把訖戎政官引號頭官執牌跪奏射步箭報箭官并下籌官即夾御路兩邊對立應射官俱在東邊聽紀錄官唱名每六員為一㑹報箭官自西而東挨次髙唱第一員射餘倣此人各六箭中的者鳴鼓報箭官髙聲跪奏某人中箭下籌官跪下籌一㑹完下籌官跪奏一㑹射畢遂起籌歸入籌桶以次挨射悉如前儀射完戎政官引號頭官執牌跪奏射步箭畢兵部官跪奏大閲畢將臺上吹號笛麾黄旗戎政總恊官及大小將領俱詣將臺下向北序立臺上偃黄旗止號笛鴻臚寺官奏𫝊制賛跪各官皆跪鴻臚寺官宣制訖賛叩頭各官叩頭又賛山呼三各官軍俱呼萬歲三臺上扈從官等亦俱齊呼萬歲又賛叩頭各官仍叩頭訖先退出閲武門外伺候上升輦將臺上舉紅旗臺前起號砲三各營鼓吹齊鳴鹵簿及馬戰兵導從如來儀鉦鼓嚮器與大樂相應振作總恊戎政以下官候駕至叩頭退駕由德勝門𤣥武門入上還仍詣内殿叅謁如前儀一是日百官不係扈從者各具吉服於承天門外橋南向北序立恭送候駕出長安左門退於本衙門辦事一初四日總恊戎政官率將佐等官各具朝服上表謝恩文武百官朝服侍班行稱賀禮是日早上具皮弁服御中極殿執事官行禮畢導駕官導上陞殿樂作鳴鞭總恊戎政官以下入班賛四拜賛進表賛宣表目又賛四拜退百官入班鴻臚寺官致詞稱賀行五拜三叩頭禮畢樂作駕興一是日兵部以各將士演營優劣中箭多寡并教練等第具本奏聞請自上裁一初五日上御皇極門百官常服侍班如常朝儀上頒勅勉勵將士總督戎政官捧至彩輿將士迎導至教塲開讀行禮如儀是日即賞賚將士并戒罰有差一初六日總恊戎政官率將佐等官復謝恩回鑾樂章照得萬厯九年三月初三日恭遇皇上親行大閲禮駕還之時教坊司例該作樂前導隆慶三年大閲回鑾似應遵照前項樂章以昭宣盛典合無恭候命下本部預行教坊司先期演習以備臨期供應計開駕回樂奏武成之曲吾皇閲武成簡戎旅壯帝京龍旂照耀虎豹營六師雲擁甲胄明威靈廣播蠻夷震驚稽首頌昇平四海澄清親蠶嘉靖舉行親蠶國初無親蠶禮嘉靖九年肅皇帝勅禮部每歲季春皇后親蠶夕北郊先是吏科都給事中夏言請行親蠶立公桑園令有司種桑柘以備宮中蠶事又勅禮部曰耕桑重事古者帝親耕后親蠶以勸天下朕在宮中每有稱慕自今歲始朕親耕皇后親蠶其具儀以聞於是大學士張璁等因請於安定門外建先蠶壇凖先農壇制旁設採桑壇倣藉田制其别殿如南郊齋宮制少減其數即齋宮旁起蠶房為浴蠶所皇后採桑三條後三公夫人採五條列侯九卿夫人採九條仍擇民婦授桑浴蠶於内以終事詔如議行詹事府詹事霍韜言皇后出郊難以越宿且郊外别建蠶室則宮嬪命婦未得親見蠶事勢難乆行乞擇近地便上曰爾諳禮制何有此言出郊古禮非可以逺近計若在禁内不可垂法已而戸部亦言安定門外近西可用而水源不通無浴蠶所初禮部議於皇城内南城西苑中有大液瓊島之水且唐制亦在苑中采亦於宮中請從禮部初議便上曰周禮之制耕蠶分南北郊唐人固陋不可法迺諭禮部曰疑謀勿成中心未決之事不必其成親蠶禮朕心決之乆矣韜奏一出必有藉彼為言破政害事禮樂制度自天子出今非朕者有五曰我太祖範則已定汝何増加一也列聖不議汝何擅創二也皇后午門不敢出而可逺出北郊三也太祖豈不知此何待汝為非作聰明而何四也宮中有累朝未聞之語或有蹙額者五也舍此必以福禍有恐今以此刻布中外各令以所見具陳於是禮部尚書李時等言大明門出至安定門外道路逺今日鳯輦或由東華𤣥武二門出無碍於古禮臣等條為四事以請一増治繭之禮繭成後令内臣自北郊捧獻宮中仍於宮中隙地量立蠶繭織室行三盆之禮以終蠶事二定壇壝之向先蠶壇北向採桑壇東向如唐開元之制三定採桑之器唐制尚功奉金鈎夫親蠶以識女工之艱難金鈎侈矣宜令造辦筐鈎止如民間器用毋過雕餙四擇掌壇之官中宮出郊禮儀令内臣謹愿者掌之以肅宮闈之禁上嘉納之曰皇后有事先蠶宜於𤣥武門出儀衛令内使陳列兵衛官軍一萬員名五千圍於壇所五千䕶於道仍擇西苑隙地織室壇制凖先農而殺其十之一數用隅不必建齋宫止建具服殿蠶室繭舘俱如古制於是築親蠶壇於安定門外十年以出入不便三月己丑上幸西苑召大學士張孚敬尚書李時至大液池令中官以舟渡二臣諭以築蠶壇相地遂改築壇於西苑十四年皇后親蠶於内苑如儀上曰親耕無賀蠶其毋賀女樂苐用以宴勿前導蠶事告成行治繭禮嘉靖八年禮部以蠶事告成請行治繭禮令蚕官於令蠶婦中選能繅絲及能織者各十人欽天監預定繅絲吉日先期蠶宮令送織婦入織堂應用繅絲及織造器用工部造用至期皇后出宫警蹕侍從如常儀至織堂命内命婦一人行三盆手禮禮畢遂布於織婦以終其事其所繅完蠶絲就令織婦於織堂量織堪用絹幣完日蠶官令徑送尚衣織染等局具奏製造祭服詔如議仍命查犒賞蠶婦例講女訓皇后講女訓儀嘉靖九年十月禮部奉聖諭欲令翰林院撮諸書關女教者撰為詩言進呈以備宫中誦詠仁孝文皇后内訓聖母章聖慈皇太后女訓行翰林院官每日撰直解三章仍引經傳及髙皇后傳内事實每章不過百字以便女官記誦初六日皇后率妃夫人詣聖母前聽講畢女官仍歌翰林院新撰詩一章臣等又惟宫壼邃宻宜令内閣類編二訓章㫖令講讀官通撰直解總集進呈女官按期講解又古禮絃歌周南召南之詩不用鐘磬乃房中之樂后夫人諷誦以事其君子者宜令宫中女官將二南之詩被之管絃以備宫中宴樂斥去一應俗樂其於閫德宫儀尤有禆益授書行欽天監擇吉前一日女官設聖母寳座於宫授設女訓案於寳座傍是日女官侍衛如常儀皇后具禮服女官導詣聖母前四拜女官賛授訓舉案女官舉授女訓案於御座前賛跪皇后跪賛恭聽訓命賛興賛四拜舉案女官舉案皇后隨案還宫次日皇后詣聖母前謝恩迎聖母奉迎聖母儀正德十六年八月世宗肅皇帝以聖母將至命禮部議奉迎禮尚書毛澄等言豫遣文武大臣各一於通州境外奉迎至日母妃由崇文門入東長安門上具黑翼善冠黑犀帶素袍迎於東華門百官青素服於㑹同舘前東西序立候輿過次日早上御西角門百官致詞慶賀若至在山陵上翼善冠服百官錦繡服次日奉天門慶賀得㫖奉迎遣大臣文武入門禮畢再議聞遣駙馬尉崔元大學士蔣冕奉迎聖母禮官復議入門儀欲由正陽左門進大明承天端門午門之東王門入宫上不允命再議禮部㑹議母妃南來自通州至朝陽門進東安門便上不從親定其儀曰聖母逺來宜從正陽門由中道行入朝廟其宫眷進朝陽東華等門特祀祀夷國山川洪武三年遣使往安南髙麗占城祀其國山川先期上齋戒親為祀文是日臨朝授使者香幣香盛以金盒幣一文綺幡二皆隨其方色祝版上自署御名給白金二十五兩具祭物使者人賜白金十兩及衣服而遣之仍命各國圖其山川及摹錄其碑碣圖籍付使者還所至諸國皆勒石紀其事其略曰朕賴天地祖宗眷佑位臣民之上郊廟社稷以及岳鎮海凟之祭不敢不恭邇者占城安南髙麗遣使奉稱臣已封其王則其國境内山川悉歸職方考之古典天子望祭雖無不通然未聞有遣使致祭於其境者今思與普天之下共享昇平之治故具牲幣遣使往祭於神神歆格必能庇其國王世保境土使風雨以時年穀豐登民庶得以靖安庶昭一視同仁之意是用刻石以垂永乆禮部志稿卷九十五
