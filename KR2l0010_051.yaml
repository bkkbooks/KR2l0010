body:
  text: 禮部志稿卷五十一明俞汝楫編列傳尚書崔亮崔亮字執夫直隸藁城人洪武元年授中書禮曹主事遷濟南知府以母憂起復為禮部尚書癸未詔定官員親屬冠服之禮亮於內外官員父兄伯叔子孫弟姪及隸卒軍士等制各定有差三年上諭亮曰司天臺言朔日以來日中有黑子占者多以為祭天不順禮所致令亮制之亮引周漢唐宋及元損益不同復以我國朝前議圜丘從祀之禮以漢唐為煩故止祀日月星辰太嵗為簡當上然之而止復問郊祀天地拜位皆正中而百官朝參則列東西避正中何也亮對以天子祭天升自午陛祭社升自子陛蓋社主隂隂北方也故君南向答隂之義也郊主陽陽南方也故君北向以答陽也若羣臣朝參無答神之義俱當避君上之尊故升降則皆繇卯陛朝班則分列東西以避馳道此其義不同上繇是益重亮因命百官朝參左右班不得越三尺省府臺公俱就拜甬道上復承命議百官及內史監官於皇太子親王前稱殿下自稱名若本宫內史本府官及承奉司於皇太子親王前俱稱殿下自稱臣百官在上前稱皇太子稱親王曰某王又定大朝㑹常朝及內外官員辭謝奏事待班等禮付侍儀司行之並定皇太子以下及羣臣賜坐殿下坐墩墩制參酌宋典各有等差其他請旗纛止祭於當祭之月與夫宗廟四時之祭皆用四時孟月及嵗除凡五祭於清明等節各備時物薦享俱允行之時禮儀草創而亮引證考據多本經典云尚書錢用壬錢用壬直隸廣德州人故元進士為翰林院編修張士誠據吳用為淮南省參政後來歸授按察司副使遷中書省參議改御史臺經歷洪武元年升禮部尚書秋八月遣官釋奠於先師孔子用壬等奏周制凡始立學者釋奠於先聖先師凡學春秋釋奠於先師秋冬亦如之漢儒以先聖為公若先師孔子為詩書之官若禮有髙堂生樂有制氏詩有毛公書有伏生可以為師者蓋四時之學將習其道故釋奠各以其師而不及先聖惟春秋合樂則天子視樂有司總祭先聖先師是則漢時釋奠亦略可知矣魏正始中使太常釋奠於辟雍晉釋奠於國學東晉成穆孝武皆親釋奠隋制國子監每嵗四仲月上丁釋奠先聖先師州縣學則用春秋仲月唐初釋奠儒官為祭主直書博士姓名敢昭告於先聖許敬宗奏請令國子監祭酒為初獻詞稱皇帝謹遣仍令司業為亞獻博士為終獻縣則令為初獻丞為亞獻主簿及尉通為終獻永為禮制武德貞觀中皆以二月親幸國子監釋奠開耀景龍中皆皇太子釋奠於太學開元中詔春秋釋奠以三公攝事著之常式若遇大祀則仲丁州縣用上丁宋元因古禮而損益之今宜定制以仲春仲秋二上丁日降香遣官祀國學以丞相初獻翰林學士亞獻國子監祭酒終獻上然之至是遣官致祭本年十二月乞休賜居湖州尚書陶凱陶凱字仲立浙江臨海人博學善屬文至元中以明經掇科除永豐教諭國初薦入朝授翰林編修與修元史又撰洪武廣韻若干卷以進上稱善命教大本堂授楚王經洪武三年升禮部尚書剖符封功臣議五等封爵據歷代故實討論詳定四夷之未歸附草璽書諭之悉效順獻琛於時法制未備上命有司各行鄉飲乃采周官儀禮及唐宋之制參定其儀又以兵亂之後人才荒落命定科舉式行於天下以取賢斂才焉開國之初百凡禮儀區畫為多四年初設進士取吳伯宗等一百二十人而凱實提調之得人之盛始此遂刻程文而凱叙其首九月冊河南王巴拜女為秦王樉妃時妃有外王父喪上命廷臣議之凱奏大功以下雖凡人亦可成婚况王妃無服上命中使及女史往諭妃家行納徵發冊禮五年十二月凱言漢唐宋皆有㑹要紀載時政以資稽考今起居注紀言紀事藏之金匱已呈為實録凡諸司領録聖旨及奏事簿籍紀載時政可以垂法後世者宜依㑹要編類為書使後之議事者有所考焉其臺省府宜各置銅匱藏領録簿以備稽考俱從之尋出為湖廣行省參政㑹使髙麗主客誤用符驗上坐與知罪遂曰臣受知陛下官髙二品夀至七旬死復何憾雖向有金牌免死之旨亦不自表也翼日上傷悼之贈太子少保以旌其忠洪武八年三月也葬長潭山下尚書楊訓文楊訓文四川潼川人為元淮海書院山長遇亂不能去王師下揚州聞其名徵起拜之起居注上諭訓文曰起居之職非専事紀録而已要在輸忠納誨致主於無過之地而後為盡職也爾素稱謹厚當始終一致茍易其所守則患必生矣譬如馳馬致戒於險阻則不墜肆意於平曠則顛蹶吾每以此自警故以示爾等他日復命訓文同滕毅集古無道之君所行之事以進曰往古人君所為善惡皆可見為龜鑑吾所觀此者正欲知喪亂之繇以為之戒耳兩遷中書省左司郎中洪武元年改太常寺卿二年出知湖州三年移知汀州四年升禮部尚書協陶凱理部事是嵗肇舉進士命禮部尚書陶凱與前侍講學士潘廷堅為會試主司侍講學士詹同國子司業宋濂吏部員外郎原本前貢士鮑恂為同考至廷試又命訓文協陶凱提調得進士吳伯宗等一百二十人號稱得人本年改户部拜河南行省參政五年二月卒人稱其有學行政事云尚書牛諒牛諒山東東平人洪武元年以秀才舉擢典簿二年同學士張以寧出使安南至界日煃以卒其姪日熞立以寧獲敕印留洱江使諒入其國諭以來意諒宣德威黎人效順三年回京以使稱旨升工部員外郎四年廷試進士充讀卷官五年升禮部尚書六年命承旨詹同等制釋奠先師孔子樂章諒以所定禮儀進朝可又奉命定大祀分獻禮上初獻禮畢分獻官即行初獻亞獻終獻亦如之又上建陪祭官齊房於北郊齊宫之西南命諒與承旨詹同等議省牲所冠服用同等奏玉藻君皮辨以日視朝遂以食則皮辨似與命常服之服同今中祀既以皮辨行禮則省牲上用常服又上命禮官參考歷代帝王祀廟諒奏三王開天立極大有功德於民京都有廟春秋享祀宜令太常掌之祀以太牢漢髙祖光武唐髙祖太宗宋太祖元世祖宜令有司就各陵立廟每嵗仲春以少牢致祭商中宗髙宗等亦宜令有司立陵廟三年一祭祭以少牢上曰五帝三王及漢唐宋創業之君俱宜於京師立廟致祭其餘守成賢君令有司祭於陵廟皆每嵗春秋祭之又詔定文武官誥命制度命諒與學士宋濂稽古詳定其式諒等參考唐宋誥命以進上從之七年十一月敕禮部官定喪服之制諒奏周禮儀父在為母服期年若庶母則無服上謂其不近人情命翰林學士宋濂等考定喪禮於是濂等考得古人論母喪者凡四十二人願服三年者二十八人服期年者十四人奏之諒為人朴實議禮精密本年以事降本部主事尋復前職未幾致仕尚書吕本吕本鳯陽夀州人仕元為元帥府都事其後來歸嵗丙午為中書掾史吳元年授湖廣行省照磨洪武三年升中書省右司郎中四年改左司郎中五年升刑部侍郎尋進吏部尚書六年除太常寺卿七年以事左遷北平按察司檢事召還授禮部尚書八年正月諭本令天下有寄跡佛老志尚聖賢者許入國學以習天理民彛乃畀之以政本年出為兩浙都轉運鹽使十二年復授太常寺卿十四年以疾卒賜葬鍾山之隂本無子其女皇太子妃尚書張籌張籌字惟中常州無錫人少明經元季浙江省試第一洪武四年吏部尚書詹同薦籌有文學應奉翰林文字授禮部主事奉詔同禮部尚書陶凱等采托漢唐以來藩王善惡可為勸戒者為昭鑑録六年升廣東行省參政九年升禮部尚書值晉王妃謝氏薨命籌同學士宋濂議喪服制籌以濂議奏上按唐制皇帝為皇妃等舉哀畢則常服宋制皇帝為皇親舉哀素服幞頭白羅衫黑銀帶令參酌唐宋之制皇帝及中宫服大功諸妃皆服小功南昌王妃服大功東宫親王公主皆服小功晉王服齊衰杖期靖江王服小功王妃服緦麻輟朝三日既成服皇帝出次釋服服常服制曰可命著為令十年坐事罰輸作十二年起禮部員外郎尋以事免尚書朱夢炎朱夢炎字仲雅南昌進賢人祖粹中宋末漕貢進士夢炎少孤粹中訓之學成登元至正辛卯進士為撫州金溪丞嵗丙午以故官入京延居上賔館命與儒士熊鼎等集古忠良奸邪事實以恆辟直解之為公子書及務農技藝商賈書使貴賤之家講誦通知大義書既成有白金衣帽鞾襪之賜俄除授國子博士俾領胄子教之夢炎日以所為書訓迪諸生兼使講誦經書無有弗率教者上時召問夢炎奏對詳雅應制作為文章皆典則有據上益重之吳元年遷翰林修撰坐小誤出為浙江按察司經歷洪武二年轉山西行省員外郎是年入為禮部員外郎尋升侍郎十一年四月升本部尚書夢炎博學善記通歷代文獻之學如指諸掌朝廷稽古議禮審學皆有力焉尚書偰斯偰斯應天府溧陽縣人故元嘉定州知州來附王師洪武元年授兵部員外郎本年擢尚寶符寶郎二年髙麗遣使上表來貢方物遣使齎印封之改尚寶司丞仍以祀文牲幣祭其境內山川使回稱旨日侍左右四年出知太安州六年改授河間府知府俱以才幹著而民亦不擾九年入為户部郎中尋升户部尚書本年調山西左參政十三年正月召拜吏部尚書二月改禮部尚書三月詔定公侯稱號上諭斯曰自今封公侯不必加以散官已授券誥者且仍其舊若追封公侯生則曾佩將軍印者仍列於銜於是斯等奏定則式為三公之銜曰開國轉運推誠宣力武臣某公某侯食祿若干石世襲者曰世襲某公某侯食糧若干石追封者曰開國轉運推誠宣力武臣某將軍某公某侯追封某王某公諡某本年以年老致仕尚書李叔正李叔正初名宗頤字克正南昌靖安人其先唐宗室世家四會至殿中侍御史翰林學士積中始家南昌叔正生而聰穎善紀年十二以能詩聞人以神童呼之既長博通諸子百家之言江西十才子叔正其一也方陳友諒陷南昌時妻夏氏投井而死叔正終身不再娶嵗丙午初設國子學有以宗頤名薦者擢為學正洪武三年告歸田里許之既退自齒於齊民已而廷臣以太學舊僚文行兼備無若叔正者登名薦剡以誤克正為叔正四年徵至京師仍除國子學正遷渭南縣丞時同州與蒲城人爭地連年不決行省以是事委之叔正即單騎至其處召兩家至前立談而決縣嵗輸糧二萬而田無定額乃立里社丈量立法密而用刑嚴奸慝警服畢獻其誠於是豪右失計公私稱便遷興化知縣尋召為禮部員外郎年老乞骸骨不許除國子監助教叔正凡三至太學至是日與諸生講解立課程而督勉之雖貴胄待之愈嚴旦夕端坐聽察誦習無倦容暇輒會計廪饌毫髮無敢欺者朝論推讓其賢能遂遷監察御史嘗奉命巡嶺表因適瓊州府吏訐告其守進表公座僉名鞠之抵吏罪而守之誣得直上聞而大悅奬諭之曰人言老御史懦乃明斷如是耶連擢湖廣參政升布政使召還為禮部侍郎十四年升本部尚書七月日本國王良懷遣僧如瑤等貢方物及馬匹上命却其貢仍命叔正等移書責之尋卒於官年六十四尚書劉仲質劉仲質字文質江西分宜人敏而好學博通經史洪武初舉薦宜春訓導被薦入京奏對稱旨擢翰林典簿階文林郎日侍左右十二年命較正春秋本末十五年春特拜禮部尚書四月諭仲質曰孔子明帝王之道以教後世使君君臣臣父父子子綱常以正彞倫攸叙其功參乎天地今天下郡縣廟正并建而報祀之禮止行京師豈非缺典卿與儒臣其共定釋奠禮儀頒之天下學校今以每嵗春秋仲月通祀孔子丁巳上謂仲質曰國學新成朕將釋菜於先師之禮宜加尊仲質乃與儒臣定議上服皮辨服執圭詣先師再拜獻爵後又再拜退易服詣彛倫堂祭酒司業博士助教進講賜坐侍臣以次於東西講畢宣諭學官諸生而還明日祭酒率學官上表謝上從之十一月奉敕旨條成學規一十二欵合太祖欽定九條梓行以頒賜師生本月奉命頒劉向說苑新序於天下學校令生員講讀十一月戊午倣宋殿閣大學士之制以仲質為華蓋殿大學士上親製誥文賜之曰朕閲宋書見尚文之美崇儒之道廓焉且當時諸儒皆以賢德輔景運三百有竒焉今特倣宋制殿閣之名必期近侍有補文並歐蘇爾仲質才頗稱任授以華蓋殿大學士奉議大夫爾往欽哉未幾坐事降監察御史後以年老致仕仲質為人篤厚文多質實如其人云尚書任昻任昂河南河隂人博覽羣書早有才譽故元舉進士拜山西寧晉縣知縣不受隱居山林日以經史自娛洪武初年以儒士薦舉授襄垣訓導雅志作人多所成就十一年擢監察御史十五年升禮部尚書十六年正月上命昂同太師李善長及諫院翰林院等官往監考定教官生員髙下分列班次規矩煥然明備於是奸弊盡革增立監規八條三月廣東都指揮使狄崇王臻言妣阮氏昔封淑人已沒仍乞封次妻何氏等為淑人詔下廷臣議昻同李善長議以為亂嫡妾之分不可許上從之遂命昻及翰林院儒士定嫡妄封贈例頒示中外十七年二月奉命頒科舉成式行凡三年大比子午卯酉鄉試辰戍丑未㑹試不拘額數六月上諭昻等曰近命製大成樂器將以頒天下學校俾諸生習之以祀孔子是年甲子初科監生舉首且中式者過半髙皇帝喜甚面諭祭酒宋訥以為訓導之功九月十三日昻侍華蓋殿上諭昻曰在京鄉試多有取中的國子監生為他肯學所以取中似這等生員好生光顯他父母恁禮部出榜於原籍去處張掛著他鄉里知道自是科舉之途始重矣本年命署吏部事未幾以年老致仕尚書李原名李原名即彥名字資善北直安州人洪武中以通經儒士舉用至京洪武二十年試禮部尚書六月上諭原名曰尚齒所以教敬事長所以教順虞夏商周之世莫不以齒為尚而養老之禮未嘗廢是以人興於孝弟風俗淳厚治道隆平曩者朕詔天下行養老之政尚慮有司奉行不至耳爾其以朕命申之二十一年詔定歷代帝王名臣從祀原名奏凡三十六人帝曰古之君臣同德者始終一心載在史傳萬世不泯國家祀典必洽公論不可徒觀其迹而不究其實若宋趙普負太祖為不忠不可從祀元臣四傑穆呼哩為首不可以其孫從祀而去其祖可祀穆呼哩而罷安圖既祀巴延其阿珠亦不必祀如陳平馮異宋潘美皆節義凛然兼全始終可從廟祀餘悉如原名所擬三月上親策多士臨軒命題策問祀禮命户部右侍郎沈士榮翰林學士劉三吾等讀卷賜進士及第任享泰等九十七人又命原名礱石題名祭酒宋訥撰記二十二年冬命原名申嚴巾帽之禁魯王檀薨詔議喪制原名等奏曰考制喪制宜輟朝五日皇帝於諸子無服宜素服五日而除諸王齊衰期年以日易月十三日素服期年世子郡王與親王同公主服齊衰期年下嫁者服大功九月郡主服同公主諸王妃及靖江王世子郡王皆服小功五月從之二十三年二月命考定合祀山川上曰王國有嶽鎮海瀆者即以嶽為正祀次海次鎮次瀆風雲雷雨之神又次之於是李原名為圖以進使頒諸國復圖命東海則燕齊皆祭東嶽東鎮齊魯皆祭西海秦蜀皆祭南海晉祭北海三月申定官民飾先是上見朝臣所服之衣多取便易日就短窄有乖古制乃令原名同國子司業龔斆參酌時宜俾存古意原名等著為定例頒示中外原名議禮精密多見施行後以年老致仕尚書任亨泰任亨泰字古雍湖廣襄陽人繇嵗貢入太學中洪武十八年三月殿試擢亨泰第一召祭酒宋訥褒諭之命撰進士題名記立碑於監門授翰林院修撰二十五年改詹事院為府升亨泰少詹事仍兼修撰二十七年五月癸亥上重其學行擢禮部尚書時青州日照民江伯兒以母病割股肉食之不愈乃禱於岱嶽祠誓云母病愈則殺子以祀既而母病愈竟殺其三嵗子祭有司以聞上怒曰父子人倫至重禮父為長子三年服今百姓無識殺其子絶滅倫理宜亟捕治之勿使傷壞風化因命禮部定議旌表孝行事例行於天下亨泰等議上詔從之又詔國子博士錢宰等至上語正定蔡氏書傳命翰林院學士劉三吾等總其事開局翰林院時禮待諸儒甚厚各賜以綺繒衣被等物又御製詩令次韻和之朝參則班於侍衛之前宴享則賜坐殿中時酒樓成人賜鈔宴其上各獻詩謝上大悅復遣亨泰諭旨諸儒有年老願歸先遣之衆皆願留至是書名蔡氏集傳得者存之失者正之又集諸家之說足其未備三吾等率諸儒上進賜名曰書傳㑹選命禮部刊行天下賜諸儒及宴鈔俾馳驛而還二十八年三月秦王樉薨詔定喪禮亨泰奏曰考之喪制宜輟朝五日今遇時享宜暫輟朝一日服制與魯王同從之四月辛未上諭亨泰曰秦王既沒國事無統世子長成宜命襲爵爾其集議以聞亨泰同翰林諸臣議漢諸王薨遣使者并嗣為王則𤣥冠衰絰素服以承詔事畢反喪服諸侯受天子之命亦宜服其命服使者出反喪服即位而哭既合於禮且協人情詔依服命禮部行之九月庚戌命頒祖訓條章於內外文武諸司十月辛卯朔亨泰曰百官朝參賜食實出厚恩緣職事衆多供億為難請罷賜從之十一月出使安南時將征龍州以其地界安南故先命亨泰同監察御史嚴震直奉制書諭之亨泰等至丘溫先以書遺王其略曰亨泰等辭闕之日面奉旨諭雲南梁王元之子孫本欲存宗祀奈何自謀弗靖匿逋逃誘邉人天討不容所以滅亡今龍州不臣允廷臣議奏興十萬之師問彼之罪地界安南五縣人民若有容納逋逃者盡行剿除然猶念前王之篤實憫嗣王之弱冠復恐國人驚駭故遣亨泰等親詣安南欵諭國王日焜以中朝狀元又亨泰議論英發敬之盡禮至二十九年春二月使還上聞其在安南私市蠻人為僕降為監察御史後以事免尚書門克新門克新鞏昌秦州人為人寬厚和易始為本州儒學訓導二十六年秩滿來朝時天下學官入覲者咸命侍朝或試文辭詢問經史及民間政事得失在列者多應對不稱旨獨克新敷奏亮直上甚重之時紹興儒學教授王俊華亦以善文辭稱旨遂擢華為右春坊右贊善克新為左春坊左贊善後升今官未幾以疾請告命太醫給物藥不輟其祿已而疾革遂卒上嗟悼之遣官祭命有司護喪歸葬於鄉尚書鄭沂鄭沂字仲與浙江浦江人宋時旌表義門之裔國初天兵下浙東甫定金華選良家子弟為參隨舍人大將軍衢處溫台等州沂居行簡著能聲既而還京仍命歸鄉里洪武二十五年宣召義門子弟年三十以上者至御前選擢備用沂其一焉三十年八月又徵取大姓賢能者授以重任吏部引奏上特召沂詣前語曰爾家大孝大義纍世同居前朝雖嘗仕宦我今使汝大貴御筆親除為禮部尚書夙夜祇畏恪恭乃職同寅協和有如兄弟於時新創大理寺命各部官㑹同審囚沂再三詳讞無一人枉濫三十一年正月郊祭前期命焚咨城隍時天大雨禮畢雨忽止夜半登壇月明星朗大禮慶成天顔喜甚未幾奉旨往山西祭晉恭王五月還朝太祖疾大漸既而賔天典禮畢即引年致仕東歸永樂二年成祖思念舊臣復召沂授以前職蒞事三月憫其力衰不煩以政特製誥命賜歸有世惇孝友天凛忠淳之語四年朝廷新禮樂修永樂大典訪求天下圗書與姪監察御史幹以義門家藏書籍及龍吟雅友二琴上進䝉賜白金百兩寶鈔一千二百錠文綺四端四年入朝賜白金五十兩寶鈔四百錠文綺二端六年鄉人誣告義門私造軍器朝廷遣官搜索一無所有止有舊紅漆器尚存以罪坐家長當之沂詣前請曰家長乃某之兄昏耄無聞知某嘗為禮官不能使家衆遵國法罪坐某兄弟爭再三事聞於朝未幾䝉恩宥仍賜冠帶還家八年大駕巡北京召致仕老臣南京聚㑹同館待以優禮五日一朝東宫沂嘗為領袖駕還賜燕東歸十年三月忽得氣疾浹旬一日呼二子杓槃來前曰吾仰賴天子寵光祖宗德澤白衣授以尚書今年逾七十以疾終於正寢幸莫大焉爾等當一心向公力行義事以圖報效言畢風雨大作頃焉風靜雨止倏然而逝尚書陳迪陳迪字景道直隸宣城人少倜儻有志操領洪武乙卯鄉薦辟郡學訓導嘗為郡撰萬夀賀表上覽而異之除翰林編修進侍講預修犬典擢山東布政司左參議捕蝗弭盜民甚德之再遷雲南左布政時普定曲靖烏撒烏䝉諸夷煽亂迪擊破之捷聞有白金彩幣之賜召入為禮部尚書革除二年朝廷因災求言迪條陳清刑獄恤流民等事多見采納尋加太子少保辭不受靖難師起迪與太常寺卿黃子澄兵部尚書齊泰等上書陳論大計嘗受命儹運糧儲過家未嘗入聞變即赴京師成廟繼統召迪責問迪抗辭不屈與子鳯山丹山等六人同日就戮將刑鳯山呼曰父親纍我迪叱使勿言因罵不絶口命割二子鼻舌熬熟俾食之迪吐唾之益肆指斤遂俱凌遲而死人於衣帶中得詩有曰三受天王顧命新山河帶礪此絲綸千秋公論明於日照徹區區不二心又有五噫詞並悲烈不傳有老蒼頭候來保拾其遺骸歸葬之計家橋是時宗姻悉戍邉徼洪熙改元詔始釋之尚書李至剛李至剛名銅以字行直隸華亭人少穎敏不羈嘗從學楊廉夫為詩文有清思洪武戍辰舉明經奉命侍懿文太子初授詞部試郎中既實授坐纍謫戍邉無幾召還為虞部郎中尋升河南布政司右參議㑹河決汴隄居民危懼至剛建議毁王府積木作筏濟之人賴全活甚衆革除中升湖廣布政司左參議成祖入正大統來朝大臣有言其才且洪武舊人遂以為通政司右通政尋命與修洪武實録且朝夕在上左右道說洪武中事甚親密是冬升禮部尚書時禮部之務叢脞至剛長於剸繁條理井然益見寵遇實録成有白金文綺錦織衣之賜永樂二年春冊立皇太子命以尚書兼左春坊太學士解縉最先進講及修永樂大典四方文儒皆集仍命董之無幾為侍郎宋禮所間見疏嵗餘降儀制郎中然遇劇務必以屬之初解縉素相厚成祖御書大臣十人命品評縉於至剛則云誕而附勢雖才不端既縉遭讒出至剛懷宿恨言其怨望中傷之後召下獄而並下至剛仁廟嗣位念其舊臣復以為左通政數月又念其老不任朝參改知興化府時朝廷方需仁澤於天下至剛勞心撫綏郡民德之甫再年卒於官享年七十尚書鄭賜鄭賜字彥嘉福建建寧人洪武乙丑進士授山東道監察御史嵗滿以最當升時湖廣布政司奏官闕賜與翰林院檢討吳文俱受命為參議二人同德協力剗吏弊去民蠧正已率下有寬直之政賜丁內艱去服除改北平布政司友參議為政清簡無幾坐纍謫戌建文中成祖在潛邸及楚王楨皆舉賜為長史㑹已召為工部尚書既而督軍務河南成祖即位李景隆言賜為建文用罪亞齊黃逮至上問賜吾嘗何如待汝乃遂相背耶對曰亦盡臣職耳上笑而釋之改刑部尚書持法寬平永樂三年改禮部尚書凡朝㑹祭祀貢獻禮儀參酌準式文質彬彬人服其能永樂六年卒賜小心恭慎而和厚易直恥側媚之行同官有不相能者數短之上前雖上素亮之而賜懷兢畏既疾猶强出朝參及卒上顧翰林臣曰賜本善人其為文遣人祭之又命工部治喪具云尚書趙羾趙羾字雲翰山西夏縣人徙河南祥符洪武丁卯繇郡薦入太學被命董事山東以廉謹受襲衣楮幣之賜嵗庚午授兵部職方司主事命覆天下兵馬暨諸路屯戍補其缺而增所宜置悉得其實具圖以進太祖以為能乙亥升武庫員外慎密小心尤為當道者所重戊寅升浙江右參政剸繁治劇事無凝滯時海寇出沒劫取人財乃以計捕之境內獲安尋丁外艱吏民痛之如離父母壬午年成祖嗣臨大寶以能専對命使交趾至則誕宣德音恩威兼布夷長欵服既歸却其金寶之餽上聞而嘉之賜賚優渥擢刑部右侍郎永樂二年轉工部再轉禮部受命往封西寧侯宋晟歸五年冬拜禮部尚書賜宴於華蓋殿并徹御筵羞遣其母以榮之戊子仁孝皇后崩逝命北京卜山陵告成膺楮幣之賜壬辰督創隆慶保安永寧諸郡治撫輯有方而新集之民悉安其業不知其勞七年扈行在奏言北京國子監開設七年矣監生唐謙等情願出仕吏部試之皆未通經宜罪司業趙季通上曰姑宥之行文申明天下凡弟子員再試不知文理者併罪其師發烟瘴地面安置十五年改兵部尚書仁宗皇帝嗣位改刑部尚書宣德庚戌以疾致仕正統元年卒遣官諭祭命有司治喪葬羾在襁褓母抱避寇林莽間卒遇虎置於地虎熟視而去聞者異之及長英偉多才善屬文喜歌詠歷事五朝多所禆益雖貴位列卿自奉如寒素云禮部志稿卷五十一
