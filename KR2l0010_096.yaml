body:
  text: 禮部志稿卷九十六明俞汝楫編酌典備考異同禮外官主祭之異洪武十五年正月禮部言天下布政使司府州縣凡祭祀社禝山川命文官主祭武官不與岷州等衛軍民指揮使司既職兼軍民其社禝山川之祭則宜從本司主之制曰可趙王居䘮之祭永樂七年八月命羣臣議趙王祭國社國稷山川等神行在禮部尚書趙羾戸部尚書夏原吉翰林學士兼左春坊大學士胡廣等言䘮三年不祭惟祭天地宗廟社稷謂不以卑廢尊也今趙王居仁孝皇后䘮已踰大祥雖梓宮未葬而國社國稷山川之禮不可乆曠宜令致祭從之萬壽節不妨祭期宣德元年上御左順門謂行在禮部尚書胡濙曰明年二月祭先師大社還用上丁上戊日不可改初濙言是月上旬祭期適當萬壽聖節恐妨行禮請改用中旬上曰此祖宗以來定禮今以為便而輕改之豈誠敬事神之意至是申命焉忌辰祭祀仍升殿正統二年禮部奏正統三年正月初六日享太廟先三日太常寺奏祭祀故事上御正殿受奏然是日值宣宗皇帝忌辰例不鳴鐘鼓苐視事西角門禮有不同請裁之上以祭祀重事仍宜升殿餘悉遵永樂間例行之正旦立春同日行禮正統十年禮部尚書胡濙等奏明年正旦立春舊制立春順天府官四拜進春復四拜畢文武百官五拜三叩頭賀今二節同一日宜殺賀立春禮順天府官四拜進春後文武百官即詣班行賀正旦禮從之母后大祥内免慶賀天順七年乙丑萬壽聖節遣官祭長陵景陵上詣奉先殿行禮畢出御奉天殿文武百官行禮如朔望儀先是禮部以賀禮請上曰母后違養未及大祥朕生辰豈忍張樂受賀耶特命已之衍聖公守制免行禮嘉靖二十五年十二月該孔子六十三代孫襲封衍聖公孔貞幹奏稱父孔聞韶病故乞恩回籍守制該本部查得嘉靖二十一年五月該孔子六十二代孫襲封衍聖公孔聞韶奏稱繼母袁氏病故例應守制乞要暫免赴闕朝貢及進貢馬匹及冬至正旦東宫千秋節等表箋該本部議得既有繼母之䘮例該守制前項禮儀相應暫免奉聖㫖准暫免慶賀欽此欽遵外今該襲封衍聖公孔貞幹乞要回籍守制查有前項事例相應俯從所請容令回籍守制及查得節年事理凡遇萬壽聖節例該本爵親赴闕庭朝貢馬匹冬至正旦千秋等節差官齎捧表箋赴京慶賀今既有伊父之䘮所據前項禮儀相應暫免赴京慶賀其進貢表文馬匹并冬至正旦千秋等節表箋通候本爵制滿之日俱各遵照舊典舉行等因覆題奉聖㫖是欽此嘉靖三十五年十月該孔子六十四代孫孔尚賢奏乞守制本部亦照前例覆題奉聖㫖是欽此勅定皇子睿名成化十一年正月勅禮部朕皇子年已六歲未有名其與翰林院定議以聞既而擬進上親定睿名下宗人府書於玉牒皇子即孝宗也母紀氏生時失傳於外廷臣不及致辭奉賀至是已六年矣因乾清宫門災上欲顯示於衆乃命司禮監太監懐恩等至内閣計議僉議未定良乆學士商輅曰若降勅於禮部以擬名為辭則衆不言而自喻矣恩等欣然從之請於上遂有是命因䘮免賀免宴成化六年十一月冬至節上以英廟順妃在殯諭禮部免行賀禮部尚書鄒幹奏因䘮免賀固皇上哀悼之情有所不忍然陽徳方亨而祝頌聖壽乃臣子敬上之誠亦不可廢宜從宸妃例從簡為當上乃先詣奉先殿皇太后宫行禮畢出御奉先殿文武羣臣及四夷朝使行人拜禮又冬至節例賜百官宴詔免之遣祭官遇䘮服成化七年先是孝陵祀事自宣廟登極後委勲戚之臣主之駙馬都尉趙輝承命主祭已乆至是以母憂辭南京禮部乃㑹官擬請成國公朱儀代輝以聞命未下儀辭不敢擅往南京太常寺少卿潘榮劉宣以儀辭為當移文輝仍主祭晟等乃上奏劾儀等曰謹按大明律凡大祀及廟享百官已受誓戒而弔䘮問疾者罰俸一月其知有緦麻以上䘮令陪祀者罪同謹詳律意吊䘮不可則居䘮豈可緦麻不可則斬衰豈可陪祀不可則主祀尤不可者國家制律一本乎禮律之所在即禮之所在儀受朝廷重寄雖未奉詔㫖而仰體聖心代輝行事未為不可榮宣軰依可聽從俱不諳大體不權時宜臣等職忝禮官義不容黙乞勅該部詳審所奏議擬明白頒示庶使禮有定制法無茍變上下其奏於禮部尚書鄒幹乃上奏曰切惟人臣以君命為重而事有成命者不可以擅更禮義繇人心而生而情有不同者不可以槩論晟等所論禮之在臣下者也儀等之守禮之在朝廷者也豈可泥而論之哉且今駙馬及陪祀官恭詣長陵等陵行禮俱不分有無服制亦不純用吉禮蓋以陵寢之際寓哀愴之情視廟享之禮實有不同况孝陵祝文當稱孝曽孫嗣皇帝謹遣某官之詞此乃成命不敢不欽遵者若令儀暫以代輝則祀文當改易不幾於詐傳詔㫖乎然則輝仍主祭者蓋以君命為重而不敢顧一己之私服也儀等辭不往者亦以成命當遵而不敢從臣下之私議也揆諸禮法俱為允當而晟等輒以儀等為不忠不敬名曰引律而心實挾私辭若議禮而意實償忿其所謂罪不容逃誠是矣宜將晟及孟和付法司治其妄奏之罪命下之獄上戊用十一日𢎞治十七年九月舊例春秋用仲月上丁日釋奠先師孔子而以次日為上戊祀社稷是年八月上丁在初十日上戊在初一日而太常寺及禮部尚書循用舊例奏以十一日祀社稷監察御史金洪因劾奏禮部謂如此則是以中戊祀社稷而非以上戊矣上謂諸司職掌舊例用上戊日其改用中戊連祭始於何年所司其詳究以聞於是禮部覆奏謂社稷之祀自洪武二十年及永樂八年至正統景泰天順間亦嘗以春秋仲月十一日為上戊其失不始於今日乞賜裁處命今後只照職掌舊制用上戊日致祭享太廟值忌辰正統二年十二月行在禮部奏正統三年正月初六日享太廟上御正殿受奏然是日值宣宗皇帝忌辰例不鳴鐘鼓苐視事西角門禮有不同請裁之上曰祭祀重事還宜陞殿餘悉遵永樂間例行之元旦日食免諸禮正徳元年十二月禮部奏明年元旦有朝㑹宴賞之禮今孝宗皇帝未踰大祥又當日食宜免稱賀上曰元朝日食災變非常朕心警懼何以賀為諸禮其悉免之廢后䘮祭議禮正徳三年憲廟廢后呉氏薨大學士李東陽等言漢成帝廢后許氏葬延陵交道厩西光武廢后郭氏葬北邙山凡皇后廢黜史冊猶稱廢后書有葬地不曾有降為庶人之禮廢后呉氏原奉憲宗皇帝詔書止云退居别宫閒住屢朝以來服食供奉皆從優厚今日之事宜令禮部斟酌儀節凡事宜從簡省而殯歛祭葬皆不可缺以存皇上敬老念舊之心播之天下傳之後世亦美事也上諭禮部䘮禮倣英廟惠妃故事太常寺以祭儀請命歲時用素羞别祭於墓所時享與梓宫在殯同行禮嘉靖元年禮部奏七月初一日孟秋時享太廟恭遇武宗皇帝梓宫在殯按禮宗廟之祭不可以䘮廢惟先期致齋鴻臚寺免請陞殿太常寺止具本奏知至日設樂而不作從之慶賀箋文暫移易嘉靖元年南京禮部以武宗皇帝徽號未定慶賀箋文有碍題稱且箋文舊式有中宫恊相之文尤非今日所宜移文禮部議請暫稱皇后為武宗皇后箋文舊式稍加刪正頒示在外文武諸司上命如儀暫行之三禮先後行嘉靖元年八月禮部言是月初十日恭遇萬壽聖節因武宗皇帝山陵未畢已奉㫖免行慶賀禮至期百官各具青素服黑角帶於西角門行五拜三叩頭禮但是日為孝慈髙皇帝后忌辰仰惟皇上孝心純篤同日行禮誠恐未安臣等議擬先期一日行從之忌辰暫免經筵嘉靖元年仁宗昭皇帝忌辰遣官祭獻陵先是給事中安盤等奏稱是日適值經筵衣緋賜宴輟講則廢學如儀則忘孝請移經筵前一日上下其議禮部覆言經筵禮儀期日屢朝未之有改考之祭義曰君子有終身之䘮忌日之謂也此專指父母而言祖父以上禮經未載伏聞孝宗在位遇憲宗忌辰仍御經筵凡侍班等官俱衣青綠花様賜宴宜倣此行上特㫖暫免除服近元旦行禮嘉靖元年壽安皇太后服除部臣毛澄等請上即吉御奉天門視事議再上不許命考孝肅太皇太后䘮禮行之澄等又言孝肅太后崩時距葬期不逺故暫爾持凶以待山陵事竣與今事體不同况當正旦朝元之㑹亦不宜素冠縞衣臨見萬國若孝思未忘苐毋御中門及不鳴鼓足矣上不得已從之仍免朔望日陞殿䘮内行吉禮嘉靖十四年莊肅皇后崩上命禮部具䘮祭儀尋遣中官諭曰䘮禮量視聖慈仁壽太皇太后制行於是禮部具上儀注中有上素冠素服絰帶舉哀及羣臣奉慰等禮上覧之曰朕於皇兄后無服制矧奉兩宫皇太后在上又迫臨聖母壽誕忍用純素朕青服視事諸合行禮儀再酌擬來聞於是禮部尚書夏言等上言大行莊肅皇后䘮禮其在臣民者無容别議惟是皇上天子之尊服制既絶則不必臨御西角門及一切奉慰禮皆不當舉但羣臣成服之後又不當素服於奉天門朝叅蓋情固有所當伸而尊尤在所當避宜候命下暫免朝叅便因復條未盡事宜具儀以上制可復諭言等聖母壽辰爾百官俱不必赴衙門只各居私所盡制大學士張孚敬等言聖母壽誕禮吉之至重大者若令百官皆私所盡制豈特臣下之心不安惟皇上之心必有未安者宜吉衣終日庶於禮儀允恊上以其體君忠敬從之二月鴻臚寺奏本月初十日俱發祀齋期雖以人行莊肅皇后䘮然大祭為重詣令百官暫服青綠錦繡將事其各衙門引奏人員亦具淺淡服免行禮上從其言又以㑹試係國家求賢吉典考試官及諸執事官進塲日亦許服青綠錦繡塲中供事則用淺淡服色免宴冊封徳妃議禮嘉靖二十年冊封徳妃張氏是時妃娠將就室上先諭禮部尚書嚴嵩即今保祥妃氏無封難於文移其以二十七日命官告廟發冊卿㑹内閣亟計上之嵩㑹各臣議上方靜理若御殿傳制致詞稱賀恐勞聖躬又妃方在詳謁告内殿逺涉車輿恐非所宜且上既不御殿當從奉天門發節冊妃具服迎送節冊及謝恩行禮皆如故議入從之命翊國公郭勛祭告内殿成國公朱希忠為正使持節大學士翟鸞為副使捧冊行禮詔勛等行禮發節冊仍於奉天殿大䘮遇祭百官服嘉靖二十年是月五日百官服滿㑹有大享時祫禮禮部請服所宜上曰禮情一定不可變亂服色隨主祀者大享齋戒服吉正祭用樂時祫齋戒惟用青綠花様祭樂設不作朝叅辦事百官青衣本等帶退仍烏帽素衣祔陵日仍䘮服居䘮遣攝祭隆慶元年禮部又言歲暮大祫孟春時享皆國之大體我皇上承奉宗祧宜親致祭而大行皇帝服制未除皇上哀慕方殷不敢遽請考之古禮云不與祭則攝而説者以為有故乃不與祭如居䘮之屬是也今次二祭請遵𢎞治十八年例暫遣攝事樂設而不作鴻臚寺免請陞殿皇上即䘮次致齋恭候釋服遇有大祭仍遵祖宗舊制聖駕親行其陪祀官亦在二十七日之内宜俱令暫免俟釋服之後恭陪如常從之大行䘮祭太社稷隆慶元年太常寺以祭太社太稷請如例遣官攝事上命禮部查議至是覆言臣等謹按禮曰䘮三年不祭惟祭天地社稷為越紼而從事説者以為不敢以卑廢尊以已事廢公祀也今太社稷祀典雖在世宗皇帝未升祔之前然稽諸越紼行事之説似不可廢宜如憲宗武宗朝例鴻臚寺免請陞殿太常寺具本奏知至期請皇上躬詣壇壝具服致祭樂懸而不作致齋之日上具黄素袍翼善冠百官淺色衣朝叅其陪祀官各具祭服行禮如常上從之改議郊社諸典隆慶元年禮部遵詔㑹議郊社諸典禮及祔葬祔享之制一郊祀之禮謹考國初建圜丘於鍾山之陽用冬至祀天之日月星辰太歲從祀建方丘於鍾山之隂用夏至祀地以嶽鎮海瀆從祀俱奉仁祖淳皇帝配又築朝日壇於城東夕月壇於城西用春秋分行事日月亦以星辰從祀俱不奉配洪武十年始定合祀之祭每歲正月擇日行於大祀殿三十二年更奉太祖髙皇帝配永樂十八年北京大祀殿成行禮如前儀洪熈元年増奉成祖文皇帝並配嘉靖九年始建圜丘於南郊冬至祀天以日月星辰風雲雷雨從祀建方澤於北郊夏至祀地以嶽鎮海瀆陵寢諸山從俱奉太祖髙皇帝配又建朝日壇於東郊以春分祭日無從位建夕月壇於西郊以秋分祭月亦以星辰從祀俱不奉配臣等議以天為地分祭昉於周禮圜丘方丘之文自漢以來歴代分合不常諸儒議論不一我太祖定鼎之初與一時儒臣斟酌考訂首建分祀之禮其後因感齋居隂雨始改合祀至我皇考大行皇帝仍建四郊如洪武初年之制蓋太祖始分而後合皇考改合而為分皇考之更制即太祖之初制也今分祀已乆似難紛更宜照例南北二郊於冬至夏至日恭請聖駕親詣祭仍奉太祖髙皇帝配其東郊以甲丙戊庚壬年西郊以丑辰未戍年聖駕親祭餘歲遣官代行其地歲暮孟春遣官專祭至如天地神祇已從祀南北郊其仲秋神祇壇之祀不宜復舉一祈穀之禮謹考祖宗朝原無祈穀之禮惟郊藉田有先農壇國初每歲仲春上戊日聖駕親祭先農遂藉田永樂後惟遇列聖登極之始僅一舉行其他歲遣順天府官代嘉靖九年以孟春上辛日行祈穀於大祀殿十年以啓蟄日改行於圜丘十八年又改行於禁内之𤣥極寳殿遂為定例而先農之祭亦不廢臣等謹議禮稱元日祈穀於上帝其詳亦不可考我國家先農之祭蓋即祈穀之遺意自皇考俯納言官之請肇興此典夫既祭先農復云祈穀二祀并行於仲春不無煩數且𤣥極寳殿當禁嚴之地而百陪祀宵分出入事體深有未安臣等竊以為宜罷祈穀之禮止於先農壇行事為當恭遇聖主登極則親祀先農并行耕藉禮其餘每歲仲春仍遣順天府官代行庶合祖宗舊典一大享之禮嘉靖十七年我皇考舉明堂大典以季秋享上帝奉睿宗獻皇帝配尋乃撒大祀殿改建大享殿然每歲惟於禁内之𤣥極寳殿遣官行禮以為常亦未嘗於郊壇親祭也臣等謹議明堂大典大享雖稱古制而制度之詳亦不可考見皇考肇舉此祀無非追崇睿宗以昭嚴父配天之孝但自皇考祀睿宗則睿宗為嚴父自皇上視睿宗則睿宗為皇祖若以今日仍奉睿宗配帝似於周人宗祀文王於明堂之義不甚相恊恐非所以妥睿宗之靈而安皇考之心也故臣等以為大享之禮可罷一社稷之禮謹考國初建太稷異壇同壝以句龍后稷配仁宗三十一年更奉太祖配永樂中北壇成位置如故洪熈間又奉成祖配嘉靖九年遵復初制以句龍后稷配十年復於西苑隙地墾田樹穀建帝社帝稷二壇每歲以仲春秋上戊次日行所報禮臣等謹議帝社稷之名則自古及祖宗廟皆無之國初大社稷之建悉遵古禮而皇考仍以句龍后稷配實合太祖初制無容别議至於帝社稷之祭不無嫌於煩數臣等竊以為止宜照舊奉大社大稷之祭其帝社帝稷宜罷勿舉一陵葬廟祔之禮謹考我國家自宣宗以前陵寢合葬若太廟祔享則惟一帝一后又后為元配始得升祔恭惟孝㓗皇后為大行皇帝元配禮應合葬永陵祔享太廟先年神主回京時本部曾請祔享以其時未有本室暫祔奉慈殿則以俟孝烈皇后雖曾正位中宫然非元配今先已祔廟又奉孝㓗皇后同祔則二后並配非祖宗舊制若因孝烈皇后先祔而遂使孝㓗皇后不得升祔則舍元配而祔繼配亦非祖宗舊制况孝㓗皇后宜祔之禮皇考先年已有欽依近日復有遺命臣等竊以為皇考大行皇帝升祔大廟之時宜請孝㓗皇后祔享而移奉孝烈皇后於别所仍於大行皇帝發引之先遷奉孝㓗皇帝梓宮於永陵與聖母梓宫同日祔葬孝烈既以祔葬似當次列祔其孝㓗皇后孝烈皇后尊諡乞勅臣等撰擬議又奏進薦上冊寳庶幾名分正而典禮全矣上以其禮官㑹議允當如議行之景王之國禮嘉靖三十八年禮部言皇上欽承祖宗大制諭景王之國乃以父皇命子與太祖髙皇帝成祖文皇帝親命諸王事體相同比之列聖以兄命弟者有間臣等伏攷先朝故事皆奉天門陛辭而行今景王逺違聖慈乞令前一日王與妃恭詣御前面辭行五拜三叩頭禮祇受皇上訓命禮畢王與妃詣母妃前行四拜禮出辭裕王至府内行兩行又國初諸王之國百官俱送至龍江關候王登舟而返以後此禮不行惟先一日詣王府拜辭而已今景王承皇上親命之國禮宜從其重者乞令文武百官先一日詣王府行辭禮至次日各具朝服侍班候王行禮畢出易吉服送至崇文門橋南候王輅過而回則國典人情庶為兩盡報可變通禮有妃䘮遇祭期洪武九年五月將有事於方丘適有晉王妃之䘮上命翰林侍講學士宋濓考古制以聞濓對曰按王制䘮三年不祭惟祭天地社稷越紼而行事䘮服傳云宫中有䘮三月不舉祭既葬而祭宋真宗時有内䘮太常禮院言凖禮宜祭天地社稷神宗時當郊而䘮未除帝以為疑講讀官王珪司馬光王安石皆以為不當廢夫郊社之禮國之大事聖人所重雖有三年之䘮亦不可廢示有尊也上然之䘮禮遇時享洪武二十五年上以皇太子新薨欲停祭祀而時享在邇復命禮部右侍郎張智翰林學士劉三吾等以郊廟合行典禮參考古制議定以聞於是智等奏曰宋㑹要王制三年不祭惟天地社稷蓋不敢以卑廢尊也真宗居䘮既易月而服除明年遂享太廟合祀天地於圜丘服衮冕車輅儀物音樂縁臣事者不廢南郊所有鹵簿儀仗冠冕車輅宫架登歌鼓吹並如常儀及宰臣畢自安請聽樂真宗批荅云除郊天之事資禮樂以相成須用樂外所有鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作其各處警塲止鳴金鉦鼓角今定議天地社稷先師太歲風雲雷雨嶽鎮海瀆諸神皆係祀典神歴代帝王乃是紹承統系宜如宋制惟太廟乃祖先神靈所在國既有䘮而時享仍用樂恐神不樂聽宜亦備而不作詔從之變通禮天順二年以大祀天地親祀力疾行禮上御奉天殿誓戒文武羣臣致齋三日上召内閣臣李賢謂曰大祀期至朕足疾未愈欲自行禮但艱於拜起令人扶可乎賢曰陛下力疾行禮足見敬天有誠雖扶何妨上從之大祀遇大行䘮成化元年禮部奏春二月該祭太社太稷遣官祭先師孔子故事祭社稷太常寺先期奏齋戒至日上躬詣壇壝行禮釋奠先師傳制奏樂遣官行禮茲遇大行皇帝䘮禮禮曰䘮三年不祭惟祭天地社稷為越紼而行事謂不敢以卑廢尊以已䘮廢公祀也社稷之祭請上如禮行之釋奠先師遣官如故免傳制制可萬壽遇冬至成化七年禮部言今年十一月初二日恭遇萬壽聖節是日又遇冬至節乞照例二禮併行所宣冬至節表内加忻逢聖旦等語在外祝壽禮今茲冬至下加恭遇聖旦等詞預行各王府及天下文武衙門知㑹從之進春遇星變成化七年十二月丙戍立春順天府官進春例登殿受賀上以星變苐常服御奉天門命順天府官便服進春免賀殿試遇太子䘮成化八年禮部奏例應三月初一日殿試而狀元率諸進士上表謝恩在初六日值悼恭太子發引上不視朝請改殿試於十五日從之日食遇時享成化八年三月禮部奏今年四月初一日日食文武百官例赴本部救䕶然其日孟夏時享太廟俱在午後行禮彼此有妨宜如孟秋時享例於初一日早行禮彼此是日免朝時享如所奏免行飲福受胙禮𢎞治六年二月禮部尚書倪岳等奏明年正月初七日大祀天地前期三日以孟春享太廟值大祀齋戒之始宜免行飲福受胙禮視牲遇日食正德十年十二月朔日食是日車駕當出視郊祀牲禮部請移於次日且言視牲乃郊祀之始日食乃天變之大今大禮將舉忽遇此變上天示戒亦昭然矣伏願順承天意益加敬畏自此以往皆郊祀之所有事起居必以其道出入必以其時一遵祖宗典訓而慎行之至於朝賀燕享亦莫不然則天心感格灾變不足弭矣齋戒暫免傳制嘉靖十一年禮部言二月四日祀先師孔子先一日當𫝊制同日上親行祈穀禮恐二禮不能並舉得㫖祈穀禮重既專齋戒𫝊制暫免歲暮大祫酌儀嘉靖二十年禮官議歲暮大祫當陳祧主而景神殿隘不能盡陳請暫祭四祖於後寢用連几陳籩豆以便周旋前殿兩廡故有列廟神龕孝潔神座請移别所尊藏以便親王功臣侑享詔可四祖在寢祝讀於前殿太祖位前改特修大祫禮太廟句為特修大祫之禮敬皇后神主業已還内不書待詣廟而後書正旦值立春正統十年十二月禮部尚書胡濙等奏明年正旦立春舊制立春順天府官四拜進香復四拜文武百官五拜三叩首今二節同一日宜殺賀立春禮順天府官進香後文武百官即詣班行賀正旦禮從之萬壽遇冬至天順五年七月禮部尚書石瑁言十一月十一日萬壽聖節是日遇冬至羣臣賀詞各異聖節不傳制冬至傳制今請通致詞曰律應黄鍾日當長至恭惟皇帝陛下萬壽聖節應乾納祐奉天永昌臣某等誠歡誠忭敬祝萬萬歲壽然後以冬至制詞傳荅羣臣其各處賀表宜讀重復請通宣表文曰忻逢長至恭遇聖旦其在外衙門行告天祝壽禮曰今茲冬至恭遇聖旦聖壽益増上從之聖旦遇服制嘉靖元年八月禮部奏初十日萬壽聖節文武百官朝服慶賀今武宗皇帝服制未闋又遇孝慈髙皇后忌辰宜免習儀初九日廷臣并進表官各具吉服於奉天門致詞五拜三叩首表文免宣讀詔可䘮禮遇祭日及吉典嘉靖十四年正月鴻臚寺奏本月初十日俱祭祀期雖大行莊肅皇后䘮然祭為重請令百官暫服青綠錦繡將事上又以㑹試係求賢吉典考試執事官亦得服青綠錦繡中供事則用淺淡服色免宴大䘮遇日食隆慶六年大䘮方成服遇日食百官先哭臨後赴禮部青素衣黑角帶向日四拜不用鼓樂頒厯值冬至成化十四年禮部奏今歲冬至十一月朔舊例以是日頒厯二禮難於併行請㑹翰林院定議上命免議以十一月一日進厯即位在大行䘮服内萬厯四十八年八月初一日光宗皇帝登極在大行䘮服内令文武百官是日俱吉服入朝俟行禮之時更換朝服禮畢仍吉服出朝禮部奏升殿頒詔係至大吉典照得是日文武百官朝臨二十七日之期未滿合無是日暫免朝臨那後一日補足奉聖㫖是欽此大行䘮内值千秋令節𢎞治十八年是日文武百官穿青衣服黑角帶行五拜三叩頭禮隆慶元年是日欽奉明㫖免行脩省遇聖壽嘉靖十一年八月上以彗星見東井諭閣臣曰朕聞彗星又見於井宿之間夫斯變也未及三歲凡三見焉乃朕所召卿等即刻傳意於禮卿言生辰慶賀俱令免行不必吉服只常服視事以承天意于是禮部尚書夏言等奏萬壽大慶凡内外臣工荒逺夷使無不欲恭祝以伸臣子之情盡廢不舉則下情欝而未宣况天變實繇臣等若使禮成之後痛加脩省似與天地人心方為允恊上曰然應天必以實茲不過變其服色暫輟禮儀耳慶賀禮姑聽卿請禮畢之後務實加脩省以弭變異於是禮部復請自十四日始如故事各素服角帶朝叅辦事三日仍通行九卿六科十三道各條例時政得失以聞上曰十四日本因事輟朝不得更言脩省其自二十一日始淺衣辦事三日九卿衙門官還各令自陳以聽裁處務要思忠論實毋挾持泛引假公報私禮部志稿卷九十六
