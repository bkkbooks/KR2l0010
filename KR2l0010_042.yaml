之既受事乃重訂其姓字履歷無令掛漏是署額員四自嘉靖六年而教習尚主者主事一人𨽻焉嗣是時建無定員迄今上三十年而添注者二人則田君億伯槩王君道林潘君去聞是矣王以需次潘以行取蓋一時之盛然亦漢廷所謂積薪矣萬歷三十年壬寅孟冬望日蔡獻臣等重立石禮部志稿卷四十二
