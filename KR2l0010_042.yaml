body:
  text: 禮部志稿卷四十二明俞汝楫編歷官表尚書吕震字克聲陜西臨潼人舉人永樂六年任十八年定鼎北京改掌部事兼太子少師加太子太保金純字德修直𨽻泗州人太學生永樂十四年任十八年扈行在追封山陽伯胡濙字籍見下宣德元年繇本部左侍郎升任加少傅兼太子太師贈太保諡忠安楊寧字彥諡直𨽻歙縣籍浙江錢塘人進士正統十四年任協胡濙理事楊善字籍見下天順元年以興濟伯掌部事贈興濟侯諡忠敏蕭烜字仰善江西泰和人進士天順四年任石瑁字信之山西應州人進士天順五年任姚䕫字籍見下天順七年繇吏部左侍郎升任改吏部尚書加太子少保贈少保諡文敏鄒幹字籍見下成化五年繇本部左侍郎升任加太子少保贈太子太保諡康靖張文質字允中直𨽻昌黎人進士成化十五年繇太子少保工部尚書掌通政司事改任耿裕字好問河南盧氏人進士𢎞治元年任改吏部尚書加太子太保贈太保諡文恪倪嶽字籍見下𢎞治六年繇本部左侍郎升任改吏部尚書加太子少保贈少保諡文毅徐瓊字籍見下𢎞治九年繇本部左侍郎升任加太子少保傅瀚字籍見下𢎞治十三年繇本部穆左侍郎升任贈太子太傅諡文張升字籍見下𢎞治十五年繇本部左侍郎升任贈太子太傅諡文喜李傑字籍見下正德二年繇本部左侍郎升任贈太子太保諡文安劉機字籍見下正德二年繇本部左侍郎升任改南京兵部尚書贈太子太保周經字籍見下正德三年以太子太保户部尚書起任贈太保諡文端白鉞字籍見下正德三年繇本部左侍郎升任後兼翰林院學士掌詹事府事加太子少保贈太子太保諡文裕費宏字籍見下正德五年繇本部左侍郎升任歷少師兼太子太師吏部尚書華蓋殿大學士贈太保諡文憲𫝊圭字邦瑞直𨽻清逺人進士正德六年任贈太子少保諡文毅劉春字仁仲四川巴縣人進士正德八年任後兼翰林院學士掌詹事府事贈太子太保諡文簡毛紀字籍見下正德十年繇吏部左侍郎升任歷少保兼太子太保吏部尚書謹身殿大學士贈太保諡文簡李遜學字籍見下正德十一年繇本部左侍郎升任後兼翰林院學士掌詹事府事贈太子太保諡文簡毛澄字憲清直𨽻太倉人進士正德十二年任加太子太傅贈少保諡文簡汪俊字籍見下嘉靖二年繇吏部左侍郎升任贈太子少保諡文莊席書字文同四川遂寧人嘉靖三年任加少保兼太子太保武英殿大學士贈太博諡文襄吳一鵬字籍見下嘉靖六年繇本部左侍郎升任改南京吏部尚書加太子太保贈太子太保諡文端桂蕚字籍見下嘉靖六年任兼翰林院學士歷少保兼太子太傅吏部尚書武英殿大學士贈太傅諡文襄方獻夫字籍見下嘉靖六年任兼翰林院學士歷少保兼太子太保吏部尚書武英殿大學士贈太保諡文襄李時字籍見下嘉靖八年繇本部左侍郎升任歷少傅兼太子太傅吏部尚書華蓋殿大學士贈太傅諡文康夏言字籍見下嘉靖十年繇本部左侍郎兼翰林院學士升任仍兼學士歷少師兼太子太師吏部尚書華蓋殿大學士諡文愍嚴嵩字籍見下嘉靖十五年繇南京吏部尚書改任兼翰林院學士歷少師兼太子太師吏部尚書華蓋殿大學士張璧字籍見下嘉靖二十二年繇南京禮部尚書改任兼翰林院學士歷太子太保東閣大學士贈少保諡文簡費宷字子和江西鉛山人進士嘉靖二十三年繇本部尚書兼翰林院學士掌詹事府事回任仍兼學士纍加少保兼太子太保諡文通孫承恩字籍見下嘉靖二十七年以本部尚書兼翰林院學士掌詹事府事𬋩理部事贈太子太保諡文簡徐階字籍見下嘉靖二十八年繇吏部左侍郎兼翰林院學士掌院事升任仍兼學士歷少師兼太子太師吏部尚書建極殿大學士贈太師諡文貞歐陽德字籍見下嘉靖三十一年繇吏部左侍郎兼翰林院學士掌詹事府事升任仍兼學士贈太子少保諡文莊王用賔字籍見下嘉靖三十二年繇本部左侍郎升任加太子少保兼翰林院學士改南京吏部尚書加太子太保吳山字籍見下嘉靖三十五年繇吏部左侍郎升任兼翰林院學士纍加少保兼太子太保贈太保諡文端袁煒字籍見下嘉靖四十年繇吏部左侍郎升任加太子少保兼翰林院學士歷少傅兼太子太傅户部尚書建極殿大學士贈太傅諡文榮嚴訥字籍見下嘉靖四十一年繇吏部左侍郎兼翰林院學士升任仍兼學士歷太子太保吏部尚書武英殿大學士李春芳字籍見下嘉靖四十二年繇吏部左侍郎兼翰林院大學士升任仍兼學士歷少師兼太子太師吏部尚書中極殿大學士董份字籍見下嘉靖四十四年繇工部尚書兼翰林院學士𬋩夷部左侍郎事升任仍兼學士髙拱字籍見下嘉靖四十四年繇吏部左侍郎兼翰林院學士掌詹事府事升任仍兼學士歷少師兼太子太師吏部尚書中極殿大學士髙儀字籍見下嘉靖四十五年繇吏部左侍郎兼翰林院學士掌院事升任仍兼學士歷太子少保文淵閣大學士贈太子太保諡文端殷士儋字籍見下隆慶三年繇本部尚書兼翰林院學士掌詹事府事回任仍兼學士歷少保兼太子太保武英殿大學士贈太保諡文通潘晟字籍見下隆慶四年繇南京禮部尚書改任兼翰林院學士吕調陽字籍見下隆慶六年繇吏部左侍郎兼翰林院學士掌詹事府事升任仍兼學士歷少傅兼太子太傅吏部尚書建極殿大學士贈太保諡文簡陸樹聲字與吉直𨽻華亭人進士隆慶六年繇吏部右侍郎兼翰林院學士掌詹事府事升任仍兼學士萬士和字籍見下萬歷二年繇本部左侍郎管南京國子監祭酒闕文恭諡馬自强字籍見下萬歷三年繇吏部左侍郎升任兼翰林院學士歷太子太保文淵閣大學士贈少保諡文莊潘晟萬歷六年繇南京吏部尚書復任仍兼翰林院學士加太子太保致仕起武英殿大學士未任徐學謨字叔明直𨽻嘉定人進士萬歷八年繇刑部左侍郎升任十一年加太子少保陳經邦字籍見下萬歷十一年繇吏部左侍郎兼翰林院侍讀學士掌詹事府事升任兼學士沈鯉字籍見下萬歷十二年繇吏部左侍郎兼翰林院侍讀學士升任仍兼翰林院學士朱𢋫字籍見下萬歷十六年繇太子賓客吏部左侍郎兼翰林院侍讀學士升任兼翰林院學士于慎行字籍見下萬歷十七年繇詹事府掌府事吏部左侍郎兼翰林院侍讀學士升任仍兼翰林院學士李長春字籍見下萬歷十九年繇左侍郎兼翰林院侍讀學士升任仍兼翰林院學士羅萬化字一甫浙江㑹稽縣人戊辰進士萬歷二十年冬繇禮部尚書教習庶吉士兼學士回部𬋩事范謙字籍見下萬歷二十二年繇詹事府掌府事吏部左侍郎兼翰林院侍讀學士升任仍兼翰林院學士余繼登字籍見下萬歷二十七年繇左侍郎兼翰林院侍讀學士升任仍兼翰林院學士馮琦字籍見下萬歷二十九年繇吏部左侍郎兼翰林院侍讀學士升任仍兼翰林院學士孫如遊字籍見下萬歷二十九年侍郎兼翰林院侍讀學士升任仍兼翰林院學士孫慎行字籍見下天啓元年侍郎兼翰林院侍讀學士升任仍兼翰林院學士盛以𢎞字子寬陜西潼關衛籍直𨽻定逺人前右郎訥之子進士繇吏部左侍郎天啓三年升任林堯俞字籍見下天啓三年繇本部左侍郎兼翰林院侍讀學士升任仍兼翰林院學士加太子少保左右侍郎郭敦字闕年山東堂邑人舉人永樂十九任右侍郎歷户部尚書胡濙字源潔直𨽻武進人進士永樂二十二年任左侍郎洪熙元年加太子賓客鄒師顔字闕二湖廣宜都人國子生永樂十二年任右侍郎張瑛字子玉直𨽻邢臺人舉人洪熙元年任右侍郎歷禮部尚書華蓋殿大學士李嘉字永亨順平宛平人生員宣德元年任左侍郎李琦字闕德直𨽻元氏人薦舉宣元年任右侍郎吾紳字叔縉浙江開化人進士宣德四年任右侍郎蔣驥字良夫浙江錢塘人進士宣德五年任右侍郎章敞字尚文浙江會稽人進士宣德五年任右侍郎正統元年轉左吳廷用字廷用福建政和人進士宣德九年任左侍郎王士嘉字道亨山東武城人國子生正統元年任右侍郎王直字行儉江西泰和人進士正統三年任左侍郎兼翰林院侍讀學士歷吏部尚書加少傅兼太子太師贈太保諡文端王英字時彥江西金溪人進士正統三年任左侍郎兼翰林院侍讀學士歷南京禮部尚書諡文安改諡文忠錢習禮字幹文江西吉水人進士正統十年任右侍郎諡文肅楊善字闕十順天大興人生員正統一年任右侍郎王一寧字以康浙江仙居人進士正統十三年任右侍郎景泰元年轉左歷太子少師兼翰林院學士入閣贈太子太保禮部尚書諡文通儲懋字闕右直𨽻丹徒人舉人正統十四年任侍郎景泰二年轉左升南京户部尚書章瑾敞子字用卿進士正統十四年任右侍郎儀銘字子新山東髙密人恩廕正統十四年任左侍郎兵部尚書加太子太保贈太師諡忠襄李實字闕右四川合州人進士景泰元年任侍郎歷都察院右都御史鄒幹字宗盛浙江餘杭人進士景泰二年任右侍郎薩琦字廷圭福建閩縣人進士景泰三年任右侍郎兼詹事府少詹事姚䕫字大章浙江桐廬人進士景泰四年任右侍郎天順元年轉左蕭璁字孟奎江西泰和人進士天順元年任右侍郎章綸字大經浙江樂清人進士天順元年任右侍郎贈本部尚書諡恭毅鄒幹字籍見前天順元年任左侍郎李紹字克述江西安福人進士天順四年任右侍郎葉盛字典中直𨽻崑山人進士成化三年任右侍郎改吏部諡文莊萬安字循吉四川眉州人進士成化三年任左侍郎歷少師兼太子太師吏部尚書華蓋殿大學士贈太師諡文康邢讓字遜之山西襄陵人進士成化五年任右侍郎雷復字景陽湖廣寧逺人進士成化七年任右侍郎劉吉字佑之直𨽻博野人進士成化七年任右侍郎八年轉左歷少師兼太子太師吏部尚書華蓋殿大學士贈太師諡文穆尹直字正言江西泰和人進士成化十一年任右侍郎歷太子少保兵部尚書兼翰林院學士入閣贈諡文和俞欽字振恭浙江新昌人進士成化十一年任右侍郎十三年轉左周洪謨字堯弼四川長寧人進士成化十三年任右侍郎十六年轉左謝一䕫字大韶江西新建人進士成化十六年任右侍郎歷工部尚書贈太子少保諡文莊徐溥字時用直𨽻宜興人進士成化十七年任左侍郎兼翰林院學士歷少師兼太子太師吏部尚書華蓋殿大學士贈太師諡文靖倪嶽字舜咨應天上元人進士成化二十二年任右侍郎𢎞治元年轉左黃景字文昭江西上髙人進士成化二十二年任左侍郎張悅字時敏直𨽻華亭人進士𢎞治元年任右侍郎歷南京兵部尚書加太子少保贈太子太保諡莊簡周經字伯常山西陽曲人進士𢎞治二年任右侍郎費誾字廷言直𨽻丹徒人進士𢎞治四年任右侍郎傅瀚字曰川江西新喻人進士𢎞治六年任右侍郎九年轉左徐瓊字時庸江西金溪人進士𢎞治六年任左侍郎張升字啓昭江西南城人進士𢎞治九年任右侍郎焦芳字孟陽河南泌陽人進士𢎞治十二年任右侍郎十五年轉左歷少師兼太子太師吏部尚書華蓋殿大學士李傑字世賢直𨽻常熟人進士𢎞治十五年任右侍郎十六年轉左王華字德光浙江餘姚人進士𢎞治十六年任右侍郎正德元年轉左升南京吏部尚書劉機字世衡順天大興人進士正德元年任右侍郎二年轉左張澯字仲湜廣西平南人進士正德二年任右侍郎本年轉左歷南京兵部尚書加太子少傅白鉞字秉德直𨽻南宮人進士正德二年任右侍郎費宏字子充江西鉛山人進士正德二年任右侍郎四年轉左靳貴字充道直𨽻丹徒人進士正德四年任右侍郎歷太子太保户部尚書武