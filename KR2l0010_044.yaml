  text: 禮部志稿卷四十四明俞汝楫編歷官表精膳司郎中黃裳癸酉貢士宋興原仁浙江淳安縣人由監生官至河南布政司葉蓁監生王士華彥實浙江鄞縣人乙未進士周濂儒士李奈景春江西上饒縣人己未進士陳律正律江西永豐縣人乙丑進士李和時和直隸遷安縣人乙丑進士官至河南參政楊琛叔獻直隸無錫縣人甲戌進士何暹景升江西宜春縣人監生周宗智子正湖廣大冶縣人倪輔良弼浙江平湖縣人甲申進士高敞德廣直隸崑山縣人壬辰進士周宏懋德浙江德清縣人乙未進士官至工部侍郎張祥思履江西吉水縣人壬辰進士官至知府金福天錫浙江黃巖縣人戊戌進士胡玉伯堅直隸泰州人辛丑進士尹萬化如川江西泰和縣人甲辰進士翁健之應乾浙江餘姚縣人丁未進士官至廣東布政使劉凖直隸博野縣人官生唐禎原善直隸華亭縣人丁未進士張潛用昭陜西岷州衛人丙辰進士劉鈁闕陳䇿嘉言直隸無錫縣人癸丑進士官至布政使宋冕孔瞻浙江餘姚縣人壬戌進士官至副都御史張繼孟子醇浙江仁和縣人乙丑進士官至江西參議侯一元應乾陜西泰安縣人戊戌進士唐升啓東四川敘南衛人戊辰進士官至廣東韶州知府何棠愛之直隸泰興縣人辛未進士官至知府侯綸廷言山西太原左衛人辛未進士官至兵部左侍郎張懷德珍浙江餘姚縣人丁丑進士官至廣東參政張鏜廷進萬全都司人辛未進士官至江西參政丘其仁主靜福建莆田縣人丁丑進士官至潮州府知府陸堂肯堂直隸常熟縣人癸未進士官至副使潘潢薦叔直隸婺源縣人辛巳進士官至南京兵部尚書方瀾思源福建莆田縣人丁丑進士調儀制司郎中洪伊承志直隸歙縣人貢生鄺汴子京直隸任丘縣人丙戌進士官至光祿寺少卿吕璋尚德錦衣衛人癸未進士官至河南知府歐陽龍崇僡江西泰和縣人丙戌進士官至南京工部侍郎田頊希古福建龍溪縣人辛丑進士升提學僉事胡松汝茂直隸滁州人己丑進士歷官右副都御史仕至吏部尚書徐樾子直江西貴溪縣人壬辰進士官至雲南左布政使曹世盛際卿福建閩縣人己丑進士改吏部郎中升廣西參政王宗恆季高直隸武邑縣人己丑進士林炫貞孚福建閩縣人甲戌進士升南京通政使參政易寬栗夫江西安福縣人乙未進士官至四川提學副使胡東魯望之河南鄢陵縣人癸酉舉人升四川參議張鈇元賜山東冠縣人己丑進士官至陜西參政高簡公敬四川綿州人己丑進士改吏部文選司升雲南參政吳舂以容江西貴溪縣人戊戌進士改儀制司郎中升光祿寺少卿高尚志德崇山東冠縣人壬辰進士升陜西平涼府知府張希舉直卿江西南昌縣人辛丑進士官至湖廣右布政使莫如忠子良直隸華亭縣人戊戌進士改祠祭司升貴州提學副使傅學禮立之陜西安化縣人嘉靖丙戌進士升山東副使薛應旗仲常直隸武進縣人嘉靖己未進士官至浙江提學副使張緯朝文江西南昌縣人嘉靖辛丑進士改祠祭司袁祖庚見員外郎下官至按察司副使方廉以清浙江新城縣人嘉靖辛丑進士升松江府知府劉斯潔原靜直隸易州人嘉靖丁未進士升浙江參議官至戶部尚書隂標時凖直隸容城縣人嘉靖辛丑進士升河南參議陳全之粹仲福建閩縣人嘉靖甲辰進士改祠祭司仕至布政使田揚字籍見下繇本司升改祠祭司郎中仕至參議宋大勺升河南汝寧府知府山西提學副使宋廷表升參議徐學謨子言直隸嘉定縣人嘉靖庚戌進士改祠祭升荆州知府仕至本部尚書況叔祺吉夫江西高安縣人嘉靖庚戌進士升貴州提學副使李纘存孝福建晉江縣人嘉靖庚戌進士改祠祭司仕至鴻臚寺少卿雷金科公憲福建建安縣人嘉靖癸丑進士何汝健體乾南京留守衛籍無錫縣人嘉靖癸丑進士改祠祭司劉曰材汝成江西南昌縣人嘉靖癸丑進士龎遠惟明直隸吳江縣人嘉靖癸丑進士薑子羔宗孝浙江餘姚縣人嘉靖癸丑進士仕至南京太僕寺少卿余田見員外郎下柴淶季東光祿寺籍浙江鄞縣人丙辰進士升山東副使吳紹見員外郎下升廣東參議包柳芳子栁浙江嘉興縣人丙辰進士刑部調任調儀制司升提學副使戚元佐希仲浙江嘉興縣人壬戌進士儀制司員外郎升任升尚寶司少卿胡定明仲湖廣崇陽縣人丙辰進士繇主客司員外郎升任歷仕左布政楊俊民伯章山西蒲州人壬戌進士繇儀制司員外郎升任升提學副使歷仕户部尚書查志立鳴朝浙江海寧縣人丙辰進士繇祠祭司員外郎升任調主客司歷升副使參政王續之大卿四川南充縣人壬戌進士繇刑部郎中調任升副使歷仕左布政使郭棐見員外郎下升知府歷仕按察司徐用檢克賢浙江蘭溪縣人壬戌進士繇祠祭司員外郎升任升副使歷仕南京太常寺卿陸光祚見員外郎下調祠祭司歷仕提學副使高則益見員外郎下升參議歷仕參政王象坤見員外郎下調祠祭司升副使歷仕左布政金學曾子魯浙江錢塘縣人戊辰進士繇工部調任升湖廣副使劉應麒道徵江西鄱陽縣人蔣勸能見員外郎下升湖廣參議章禮見員外郎下升江西恭議王庭詩見員外郎下升副使歷仕湖廣布政使祝教子敷浙江山隂縣人丁丑進士繇祠祭司員外郎升任降州同歷仕同知錢若賡見員外郎下升臨江府知府張淳見員外郎下升知府歷仕參政喬巖巽甫河南商丘縣人辛丑進士由儀制司員外郎升任升副使歷仕參政張志於道山東歷城縣人辛未進士繇主客司員外郎升任調祠祭司歷仕參政余寅見員外郎下升提學副使歷仕南京太常寺少卿李同芳濟美直隸崑山縣人庚辰進士繇主客司員外郎升任調祠祭司升提學副使董嗣成見員外郎下繇主客司補任調主客司建言削籍王之猷爾嘉山東新城縣人丁丑進士繇儀制司員外郎