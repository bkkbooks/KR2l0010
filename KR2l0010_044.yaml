庭者故今觀魏肅清禁籞岑寂豢奴牧隸呻吟憔悴吾儕小人得以從容退食與海內淡然甚大幸也於是表載前列刻之貞珉後有君子得以考覽焉嘉靖十七年戊戌仲夏穀旦胡松撰貴溪吳子官禮部精膳司郎冠高子繼之高安劉子員外郎瓊山唐子主事約典歸誼靡愆靡忒乃以暇日備考先達列官兹署者為百五十有一人勒名于石以昭來鑒走問東涯子東涯子題之曰四君子是舉也其有夙夜匪懈之思耶夫膳者善之義司者主之稱名者實之對碑者永之道也周禮膳夫掌王之食飲膳羞以養王及后世子而宰夫贊小宰比官府之具凡朝覲會同賓客以牢禮之法掌其牢禮委積善獻飲食賓賜之飱牽與其陳數其所以為之節者蓋其詳矣我國家以光祿隸禮部而膳司主之即周禮以膳夫掌膳羞而宰夫復掌其禮事之意也周禮宰夫屬冢宰而國家膳司則屬之宗伯宗伯典禮言有專焉重之也惟天子南面而治饗四海報養燕勞饋豫以來四方不移不嗇不夷隤于防禮所生也而精義之蘊亦無乎不在豈籩豆之飾品物之羞而可以語所司哉今觀百五十有一人者蓋自永樂稱行在部以至今日時不同而官同官不同而所司同類多克舉其職蜚聲郎署荐服大僚卓然為名世臣其或沮於梗槩靡究所施見訾公議爰疚厥祿者亦各存其名類而題之考其實而鑒戒昭矣且今仕者往往重京朝官京朝官職有銜秩有階祿有稽其入對也有籍蓋名無不題而碑焉非此無所託以有永也夫舉所司以為守而陳往迹以比類賢不賢皆可指而言也間亦有號稱通顯而心迹可疵靡竟所施而貞介可範者四君子當自得之後之觀今亦猶今之觀昔也故曰是舉也有夙夜匪懈之思焉乃復貽之針曰巍巍帝闕百辟承之翼翼蘭省天祿是司罔滔罔湎令德令儀爰有大饗牢饋是羞貢篚來廷亦罔不柔奉我天度守我天常肅肅大夫鑒往惟良鳴佩鏘鏘大夫至止載瞻于碑其道如矢一讀而僂再讀而俯三讀以思協我規矩直清其德曰為古師古人在列敢告司碑嘉靖二十五年丙午季冬朔日萬逮撰凡署皆有題名司故有之且再矣官是者遞遷遞至則遞而勒石嵗久而復盈自豫來承乏於兹考其名若郎中則李乾吉員外郎則周淑逺主事則鄧日昌而後闕弗載矣今更伐一石次序題之而營其隙地以待來者修故事也既成碣於廳事之左制如初于是同舍相與縱觀各以所聞見稍稍尚論因舉手澤石曰是硌硌者庶託不朽乎詰者曰然結繩勿論自唐虞而下若九官十六族奮庸熙載號能其官者代不少若而人名至今存也其石安在彼湮滅不稱者不可勝數何必乏此一片石耶皆相顧改容曰子無乃稱吾曹識之矣困為之記若夫明職業考善敗以昭鑒戒則向者胡萬兩先生之言具在萬厯壬寅夏梅守和題禮部司務滕霄河南汝州人由本部祠祭司員外郎調任知府陳圭正統四年任周濂正統五年任雍順監生正統十三年任何懷景泰五年任何源江西建昌縣人舉人天順元年任張本監生天順八年任王大經舉人成化二年任時中舉人成化五年任金鍾浙江青田縣人舉人成化五年任劉琛監生成化八年任王均美舉人成化十四年任余鏞廣東順德縣人舉人成化二十年任劉鈁舉人成化二十一年任歷升本部精膳司郎中方佐舉人成化三十三年任郝本舉人𢎞治三年任升本部精膳司員外郎戴儼舉人𢎞治六年任奚頊舉人𢎞治九年任鄺郊舉人𢎞治十二年任王思舉人𢎞治十五年任程鶚舉人𢎞治十八年任劉秉常舉人正德六年任陳端甫直隸武進縣人舉人正德九年任升儀制司員外郎廣東僉事陳濟舉人正德十二年任李輔舉人正德十二年任李瑜江西吉水縣人嘉靖三年任調吏部升禮部主客司員外郎郎中四川參議副使太僕寺卿范韶直隸寶應縣人舉人嘉靖二年任升户部員外郎郎中浙江參議洪伊直隸歙縣人舉人嘉靖三年任調吏部升禮部精膳司員外郎郎中王胤浙江永嘉縣人舉人嘉靖八年任升兵部員外郎郎中貴州參議胡東魯河南鄢陵縣人舉人嘉靖九年任復除兵部調吏部升禮部精膳司員外郎郎中四川參議何勗湖廣江夏縣人舉人嘉靖十年任升户部員外郎郎中姚安府知府陳灝直隸山陽縣人舉人嘉靖十年任調吏部升刑部員外郎郎中楊美冕浙江鄞縣人舉人嘉靖十一年任升工部員外郎郎中胡瀚河南內鄉縣人舉人嘉靖十五年任升戶部員外郎郎中羅淮浙江慈溪縣人舉人嘉靖十七年任調吏部升兵部員外郎郎中井震河南洛陽縣人舉人嘉靖十八年任升戶部員外郎郎中廣西知府吳夢麟順天府通州人舉人嘉靖十八年任徐應竒舉人嘉靖十九年任升廣西知府李世德河南祥符縣人舉人嘉靖二十五年任調教諭升國子監助教南京户部主事陳銓直隸邯鄲縣人舉人嘉靖二十七年任方興邦福建甫田縣人舉人嘉靖二十九年任調吏部歷升兵部武選司郎中吳崙山東德州人舉人嘉靖三十四年任升户部湖廣司員外郎茹子嘉山西澤州籍貴州人舉人初任翰林院孔目嘉靖三十五年升任升工部虞衡司員外郎吳讓江西浮梁縣人舉人初任都察院司務嘉靖三十八年復除劉承恩山西襄垣縣人舉人嘉靖三十八年任吳桓直隸吳縣人舉人初任易州學正嘉靖三十八年升任康憲福建長汀縣人舉人嘉靖四十一年升任調吏部林啓昌福建莆田縣人舉人國子監學正嘉靖四十三年升任周應廣西全州人舉人翰林院孔日嘉靖四十三年升任王道立直隸太倉州人舉人國子監學正嘉靖四十三年任蕭自修陜西高陵縣人舉人國子監學正隆慶元年任升户部員外郎四川夔州府知府李載贄江南廬江縣人舉人國子監學正劉師顔雲南人裴守一山西長子縣人舉人程道淵江西樂平縣人舉人萬厯十年任升刑部山西司郎中鐵世林雲南永昌衛籍浙江杭州府人舉人萬厯五年任高薦湖廣石首縣人舉人萬厯十年任升戶部浙江司員外郎升副使王崇雅山西蒲州人舉人萬厯十一年任升戶部貴州司員外郎黃應奎浙江錢塘縣人舉人歷南京國子監學正萬厯十六年任二十三年升刑部陜西司員外郎郭棟河南安陽縣人舉人萬厯十七年任徐文斗江西彭澤縣籍建德縣人舉人歷南京翰林院孔目萬厯二十三年任夏思直隸廣德州人舉人歷南京國子監學正萬厯二十三年任熊裕江西南昌縣人舉人歷國子監學録萬厯二十四年任衛廉山西猗氏縣人舉人歷翰林院待詔萬厯二十五年任黃彬江西南城縣人舉人歷國子監學正萬厯三十一年任鄢應薦湖廣沔陽州人舉人繇國子監學正萬厯三十六年任李文綬福建晉江縣人舉人繇國子監學正萬厯三十三年任潘龍貴州赤水籍浙江海鹽人舉人禮部司務萬厯三十六年任劉孔祿江西安福縣人舉人翰林院待詔萬厯三十九年任附司務題名碑記廳事題名其典不見於周漢之䇿後人倣年表而起義端有作者今中外諸司凡涖政之所往往有穹碑夫士大夫入官涖事晨宵所直精神所寓恆積嵗而後去去之日邈無所繫於其故乃其數嵗之間所以殫慮凝矚以毗一時之政令者遂無以託於方來而方來之論世者則又歎於文獻之不足昔賢所為是非沿古而義實有禆者此碑是也禮部暨四司皆有碑而司務廳事尚缺司務綜領四司之文案稽核出納以贊大卿之政任劇而職專聖祖特賜敕以優之廳事之有敕惟此官為然以故守是官者常久於其位精神所寓視他為深春卿掌禮儀文案之政令其文獻尤宜有所託以示後遡情宣德辛亥廳事落成迄今百九十年矣兹欲考其官於此者則黯然莫存將與形響而垂盡有志之士能無興懷嘉靖甲寅莆田方君為司務雅抱斯志會遷未果己未秋浮梁吳君至撫感前修思任其事頃之姑蘇吳君至儀與協祠署徐大夫嘉兩吳君之有志也署有巨石舉以贈之於是兩吳君搜閲故牘濟以咨詢得四十四人姓氏嵗籍略備乃銓次登石以樹於廳事之左隅而屬余記其嵗月嗟夫彼四十四君者方其注神殫力思以夙夜之勤勞流聲永譽孰知其名之無所寄以永存也百九十年之間時移政熄逺者飄風近者駒影又孰知有兩吳君者踵出為之表其懿也且一石之建制無所嫌而義資於政乃歷百九十年而莫克舉豈其思之匪存哉夫亦以創始之難而稽往之逺也今兩吳君踊奮而功集博搜而牘全肇曠儀以彰往秉逸獻以裕來二君之志則遠矣余惟古之修墜典而表前聞者即以厥修而自貽令問二君所藉以不朽者豈惟兹石哉謹記賜進士出身禮部祠祭司郎中華亭楊豫孫謹撰禮部志稿卷四十四
