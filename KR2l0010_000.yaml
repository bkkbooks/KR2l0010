front:
  text: 欽定四庫全書史部十二
  hash: sha256:683b84fba18cbfaf1b4f7fb7adb0cf04b078729870de9e8d06bf823f11967f61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0010_WYG_000-1a, image: WYG0597/WYG0597-0001a.png}
body:
  text: 禮部志稿職官類一官制之屬提要臣等謹案禮部志稿一百卷為明泰昌元年官修首列纂修姓氏自禮部尚書林堯俞至司務顧氏碞等四十人次列批委纂修自東閣大學士前禮部尚書孫如游至儀制司員外郎張光房等六人次列巡按直𨽻蘇松等處御史據松江府知府揭薦生員俞汝楫纂禮部志書公移併禮部准聘赴書局批文則成書實出汝楫之手明史藝文志有俞汝楫禮儀志一百卷當即此書此曰禮部志稿蓋其草創初成尚未定名之本也卷首汝楫名後併列上海生員俞廷教名為薦舉公移所無殆入局以後續招協修故初揭不載歟其書首聖訓六卷為洪武至隆慶詔諭次建官建署一卷次總職掌一卷次儀司職掌十六卷次祠司職掌十卷次客司職掌四卷次膳司職掌及司務職掌共二卷次厯官表四卷次奏疏五卷次列傳八卷次儀司事例二十一卷次祠司事例九卷次客司事例三卷次膳司事例一卷次總事例七卷前列凡例三則其溯初制一則稱研討典故要在尋流溯源其理條貫一則稱典故之編不急於薈萃而急於貫通其慎稽考一則稱網羅舊聞非獨挂漏是懼而考正謬誤亦編摩第一義其言皆深得纂輯要領故其書敘述詳贍首尾該貫頗有可觀如釋菜薦舉諸詔為明實録所不載祈雪建宫諸訓為嘉靖祀典所未録王妃冠服百官常服及大宴樂章較明史禮樂志為詳貢舉起送之額誥敕表章之式較明會典為備經筵侍班員額拾明集禮之所遺朝覲賞賚諸制補星槎勝覽西域行程之所闕雖案牘之文稍傷冗雜而取備掌故體例與著書稍殊固不能以是病之也乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀禮部志稿纂修姓氏太子少保禮部尚書兼翰林院學士林堯俞右侍郎兼翰林院侍讀學士溫體仁儀制清吏司郎中周應期員外郎盧洪圭鄧良知主事莫儼臯孔榮宗劉應賓張時𤾉張翼明祠祭清吏司郎中周以謙員外郎周鏘主事張天麟丘履嘉李𦙍華陳耀南居益荆養喬主客清吏司郎中虞德隆員外郎鄭國昌主事畢自肅張𢎞襟丁魁楚李之茂韓琳李長德李其紀孫際可精膳清吏司郎中蕭應坤董暹員外郎張國柱王象晉主事張文運王曰善李日華李芬何應奎沈景初司務㕔司務周迪顧民碞禮部志稿批委纂修東閣大學士前禮部尚書孫如遊前禮部尚書兼翰林院學士孫慎行前禮部左侍郎兼翰林院侍讀學士周道登協理府事禮部尚書前禮部右侍郎周闕名尚寶司少卿前儀制清吏司郎中須之彥前儀制清吏司員外郎張光房奉委輯録直𨽻松江府儒學生員俞汝楫直𨽻松江府上海縣儒學生員俞廷教禮部委纂修公移欽差提督學政巡按直𨽻蘇松等處監察御史毛為禮制綱維政教志乘關繫憲章謹薦學行宿儒以備纂修取用事奉都察院東學字二十五號勘劄准禮部咨儀制清吏司案呈奉本部送據起復原任松江府知府莊育慶揭稱竊聞本朝禮法大備咸統于寅清直亮之臣從來搜輯舊聞必需夫修行積學之士查得萬厯三十七年選司袁員外見吏部志缺擇委貢生宋啓眀收羅散帙慱採羣編纂成志書三十冊現奉堂批付梓永為一代章程而吏禮並稱鴻巨纂修允資端方切見松江府學生員俞汝楫學術醇正操履髙貞屬以考古證今必能刪蕪輯漏况典重郊廟大禮沿革皆當並稽而部設南北兩都彼此亦宜互證查本生萬厯甲寅南部聘修祠乘十卷雖未梓行而先典故已備考鏡又查本生曽經修撰焦竑委纂名賢列傳預魁萬卷之琅函常熟縣延修虞山志書亦具一方之紀事至于母殁二十餘年因遷葬而廬墓荒山泣聲同永夜猿啼家徒存四壁勤課誦而糊口硯田苦節迸末流羶好行砥頽波言無枝葉職自初第司鐸雲間目擊當年之礪志距十載冉守舊逰更覘末路之有成聞見最真秉彛不昧今因服闋赴部躬逢吏志告完而春曹載筆伊始心切憐才誼難緘默等因具揭到部奉批夲部未有志乘誠為缺典第纂輯之任頗難其人今莊使君所薦雲間俞生文行俱優正本部所願得以充纂輯者亟宜委任以成盛典志成之日紀録酬勞尚圖優議等因送司奉此看得本部典禮最稱繁巨而紀載缺焉無稽厯朝掌故幾同藏壁之書四署文移半是存羊之朔挂漏未暏其全敝舛莫知其自志書一節不可謂非本部之缺典也今據原任松江府知府莊育慶所舉松江府學生員俞汝楫行擬閔曾才追班馬即其修輯志乘業已窺見一斑知其慱古凖今當必素􅈺三禮倘假數月之暇得徼筆硯之靈勒成一書俾傳不朽豈直羽翼典禮真可鼓吹休明當不止本部之拜賜也候書成之日應比照南昌生員章潢事例舉用以酬其勞仍知㑹提學官先採訪其文行特為優議以示旌異并轉行府縣動支學租銀八兩以充聘資等因呈部看得本部志書得有博學朗識之士為之纂輯誠不朽盛事也即咨彼處學臺優奬并轉行府縣偹禮銀捌兩充聘俟纂輯完日薦用酬勞擬合就行為此合資貴院煩為轉逹直隸督學御史先將俞汝楫優奬仍轉行該府縣學照數動支學租銀兩送充聘禮施行等因到院准此填給巡按直𨽻東學二十五號勘合備劄到院依奉查照即便施行等因奉此看得松江府學生員俞汝楫孤吟忩下一經峻槩樓頭百尺力行古道夙負時名今令聞已逹家邦即纂輯有光志乘為此案仰本府即支學租銀八兩封給本生作為該部聘禮冉動前銀六兩併置匾一座上書鼓吹休明四字送至其家以示優奬之意仍將支用過銀數取回揭同抄案依准呈來須至案者泰昌元年十月三十日纂志凡例一遡初制夫研討典故要在沿流遡源我朝一代之禮皆繇聖祖創定即位之初甫闢乾坤而新日月亟孜孜三重隆儒引誼撰著禮書以昭示軌極考其時所最先成者曰大眀集禮其書取周官吉凶軍賔嘉五禮為綱而加以冕服鹵簿儀仗律樂字學且多繪圗焉自後十餘年間則有曰國朝禮制曰稽古定制曰國朝制作曰大禮要議曰皇眀禮制曰禮儀定式曰大眀禮制曰洪武禮制曰禮制集要曰禮制節文曰太常集禮曰孝慈録其不專于禮而禮政居多者曰皇眀祖訓曰大誥曰大眀令曰教民榜文曰諸司職掌典禮之盛徹今古通幽明極天地和上下優優大哉不可以加矣列聖纘承先一揆即如世皇天德通達聖學淵深鋭意修眀靡神不舉寧出祖制之矩矱哉故㑹典深得此義每類首列國初諸籍之文次乃後來憲令本末燦然可暏已今兹之纂一遵其義例初制見行必窮其著令之始初制廢閣務識其沿革之繇將率循者與振舉者咸易考見焉此臣子以纂述為憲章之義也一理條貫夫典故之編不急于薈萃而急于貫通不急于廣慱而急于提挈頥事摶沙意緒棼絲安所得其要領哉茲者擬門類則立網以總之立目以疏之于目之中又枝分縷析以悉之此為定局之大勢也擬名目則依倣職掌而不盡泥職掌有宜分而合者為别之有宜合而分者為一之有創立遺漏者為益之有先後失次者為序之又為布列之大凡也擬書法則朝廷所降曰詔曰令曰命臣所奏曰奏准曰奏定曰議准曰議覆皆以年月先後次第著之有創舉者曰謀事之始有舉而旋廢者曰今罷曰某年罷其儀注小有損益者隨文注之小同大異者隨代列之又為載筆之大意也連篇纍牘若三千三百本天淆地而提綱挈領則為輕為曲臚若列眉纍世不能殫其學者一朝可以舉其槩矣一慎稽考夫綱羅舊聞匪獨掛漏是懼而考正謬誤亦編摩第一義也茲幸從詞林巨公請纍朝金匱石室之副逖搜慱採膏晷為繼又節蒙當事名公示以本曹掌故諸牘稔得熟聞往事謂可藉手以報塞筆扎之役于萬一顧簡編浩穰案牘紛拏一事而衆册畢書不免彼此矛盾一編而事端兩見間亦先後抵牾蓋語有曰郢書燭舉筆端燭影則知搦管者之不難脫略也又曰字經三寫焉烏成馬則知傳録者之不難失真也彚録之際每賈勇從事凡有舛錯參互考訂蓋不遺餘力矣其有無從是正者則存舊文以俟亦竊附于郭公夏五之遺意乎
