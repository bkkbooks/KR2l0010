body:
  text: 禮部志稿卷四十七明俞汝楫編奏疏修省疏奏乞囘天弭灾疏成化四年禮部尚書姚䕫等言竊見今年自春徂夏天氣寒慘風霾陰翳日色無光近一二日来黄霧蔽天晝夜不見星日况今四月中旬雷不發聲考之傳記各有徵應邇者北敵屢㓂邊境四方日報災異人事如此天其或者仁愛皇上有以警動之乎伏惟皇上當春秋鼎盛之日正嗣續繁衍之時奈何震位尚虚切繫人望天與祖宗之意固自有待然臣等區區忠愛之私有不能已竊睹英宗睿皇帝臨阼以来克遵祖訓以御家邦而慈懿皇太后皇太后貴妃宸妃以下皆有關雎之徳螽斯之美所以子孫衆多支本隆茂伏願皇上修身養徳感天格祖思國本之不輕思宗社之至重思聖體之當慎惜思聖愛之當均溥將見六宫奉職則百斯男九廟降祥本支百世實天下之大幸也然此在聖心一轉移之間非求神奉佛之所能致若西山塔院勞民傷財所宜停罷阿吒哩之流惑世誣民所當斥囘餘如府庫金帛皆民膏髓不宜浪以費用諸作匠役無大勞效不宜濫授官爵先儒真徳秀有言人主修徳講學則天下安昆蟲草木亦得其所誠為至論伏望皇上奮發乾斷痛自改省于每日視朝之後循祖宗故事詣文華殿留心講筵裁決政務開誠心布公道以来善言親君子逺小人以圖治化雖一服食一言動之間皆遵成憲而行則天意可囘而災異可弭矣疏上詔曰上天示戒實警朕心卿等所言足見忠愛内事朕自處置其政之在外者當斟酌行之星變陳言九事疏成化二十一年正月以星變求言禮部尚書周洪謨等言九事一承平日久俗尚奢麗宜禁止服用違越者治之如律一成化十七年以前京城内外勅賜寺觀至六百七十三所後復增建以至西山等處相望不絶自古佛寺之多未有過于此時者宜申嚴著令敢有增修請額及妄稱復興古刹者罪之一光禄寺正綂間每嵗牲數止四萬成化元年定數不過十萬近又加十萬猶不足用且以猪易雞鵝民力益困今除上供外乞查成化初例凡增𣲖浪費悉宜停止一大慈恩大能仁大隆善䕶國三寺畨僧千餘法王七人國師禪師多至數十廪餼膳夫供應不足况法王佛子大國師例給金印用度擬于王者而其間又多中國人冒濫為之宜令給事中御史覈其本出山畨簇者聽其去留冒濫者悉令還俗一頃嵗術士李文昌以養沙㸃銀之法誣罔不道已寘之法如復有此輩悉宜斥逐一今僧官善世以下九十八人道官真人以下一百三十餘人雖無廪禄亦濫名器况其死例有祭祀真人又例得銀印尤費國用宜覈其額設推舉者方許僉書死則與祭否則止令帶銜死亦不祭又教坊司官至五十餘人亦宜止令五人僉書其餘皆帶銜辦事一自宫求進稱為淨身人者動一二千人雖累加罪謫旋復收用若不痛懲無有紀極今各王府累求内使宜量以賜之否則仍發原籍原衞今後宜依先年枷項放遣事例勿復收用一工部嵗辦鹿多光禄寺至以襍用而太常寺每嵗供祭鹿俱大興宛平二縣買給每隻用銀多至十七八兩宜止于工部嵗辦内擇用之一各處嵗辦藥材約有一十二萬餘斤積久陳腐今宜計足二年之用暫免一年採辦後視為例陜西山西河南旱灾尤甚歴年逋欠藥材悉宜宥免上批答曰禁奢侈已行矣供應牲畜所司查奏節省法王佛子國師禪師畨僧供給俱省其半今後漢人冒為之者必罪不宥方士已令都察院禁之淨身人遞發原籍原衞以後仍以十五年例處之餘皆如議大災異加省疏𢎞治三年閏九月禮部尚書耿裕等奏比来據天下諸司奏報風雷雨雹山崩地震之變一一有之考之傳記以雹為沴氣為陰脇陽以迅雷風妖怪雲變氣為失政以山崩為陰乗陽以地裂為陰背陽以地震為越陰之職專陽之政古之罹此災異者或夷狄背華或小人害正或生民失常業皆歴歴可考陛下自即位以来内修徳政外溥仁恩宜乎和氣致祥災異消弭夫何半嵗之間災異之大疊見層出蓋天心仁愛為陛下特出此以致警動之意伏望益修徳勤政脤恤以全民命節儉以省民財服食器用不越乎常土木興作不萌乎念任賢使能聽言納諫逺宗帝王之道近守祖宗之法以消天變以迓天休以保承平之業延靈長之祚臣等亦當反躬思咎痛加修省并行各鎮巡三司等官務祗奉徳意凡事有便於軍民者即為舉行否則即為改革仍修飭武備用戒不虞奏入上納之極陳災異疏𢎞治七年九月禮部尚書倪岳等言近日南京風雨驟作太廟孝陵等處樹木有拔仆者且飄落殿宇廊廡厨庫明樓碑亭等處瑠璃吻獸垂帶飛仙勾頭筒瓦及裏城坍塌鋪座又今年三月以来甘肅遼東宣府并山東福建雲南四川等處地震有聲如雷或震倒城垣房屋壓死人口遼東大風吹倒城垣房屋天色黑暗吹落黑蟲滿地大如蠅自正月至五月不雨以後霪雨連綿渰没禾稼山西天鳴白日有星如杯散為五塊又有火如斗墜地化為白氣河南白日有星如斗零散而隕有聲如雷又有星大如轆軸赤光隨之宣府白日有星如斗隕地有聲化為白氣四川瘟疫盛行長寧等縣病死男婦三千餘人南直蘇松等府狂風驟雨平地水湧丈餘坍塌官民房屋二萬二千八百九十餘間城垣舖舍五十餘處渰死人口二百八十三人海潮逆湧江水泛溢浙江湖州等府縣天雨連綿江潮泛漲居民房屋橋梁圩㟁類皆浸壊城垣公廨亦多傾仆湖廣武昌等府州縣天雨不止洪水泛漲四望無涯軍民房屋俱被渰没城垣公廨等項俱被崩塌通衢撑駕小船老幼移徙山林廣東肇慶府洪水入城渰倒城垣官民公廨倉厫房屋等項廣西栁州等府縣江水泛漲髙者丈餘崩塌城垣衙門公廨漂流軍民房屋臣等謹按傳記有曰狂恒雨若䝉恒風若又曰大星隕下陽失其位災害之萌也又曰流星晝見民災兵動又曰陽伏而不能出陰迫而不能升于是有地震又曰百姓愁怨陰氣盛則為大水竊見南京祖宗根本重地甘肅宣府遼東雲南皆邊方重地其河南山東山西浙江江西湖廣福建廣東廣西南直𨽻皆藩屏要地不過六七月間各官所奏災異如是之多而又逺近相同彼此互見揆之往牒亦所罕聞若不痛加修弭誠恐變生不虞猝難救藥伏望皇上惕然致警于中赫然修正厥事勤聖學以體天之剛健廣言路以憲天之聰明崇儉約節賞賚以裕財戒姑息嚴刑罰以懲惡信賢斥佞以正朝廷選將飭兵以壯邊圉罷非額之征科以恤民窮停不急之工作以蘇民力杜倖門捐冗費凡此皆修為于人事庶幾仰荅于天心臣等兩京文武羣臣亦須各竭乃心各恭乃職振廢弛而革因循勵亷勤而黜私慝務盡交修之實少寛宵旰之憂仍行各鎮巡等官痛加修省勉立事功若復循習故常罔知警省者必論之以法上嘉納之危言修省疏正徳元年欽天監五官監候楊源奏自八月初大角及心宿中星揺動不止大角天王之座心宿中星天王正位也俱宜安靜而今乃揺動意者皇上輕舉嬉遊射獵無度以致然耳其占曰人主不安國有憂又北斗第二第三第四位星明不如常第二曰天璇法星后妃之象后妃不遇其寵則不明廣營宫室妄鑿山陵則不明第三曰天機令星不愛百姓聚興征徭則不明第四曰天權伐星號令不明則不明伏望祗畏天戒安居深宫絶嬉戲禁遊獵罷弓馬嚴號令毋輕出入逺寵幸節賞賜止工役親元老大臣日事講習克修厥徳仍勅内外廷臣同加修省章下禮部禮部言其覼縷上陳亦憂國愛君之忠悃伏望陛下上畏天戒下恤人言反躬自咎恐懼修省親儒講學正心修身聴政以時起居有節不恣情而輕出禁廷勿玩狎而私行監局痛戒遊逸悉屏玩好凡射騎驅驟狐兔鷹犬之事一切屏除謟諛巧佞乞求陞改之人一切罷黜廷臣建白為公者不阻于倖臣臺諫敷奏盡言者必見諸行事停不急之工節無名之賞則聖徳新治化著而天變自消矣上是之源精于占候見象緯異常則憂形于色必據實具奏無所毁譽然為劉瑾所惡竟杖而斃焉士論傷之修省未盡疏正徳十年禮部右侍郎石珤上疏言去冬以来四郊無雪一月之間兩明繼食東作之始風霾輒興小民無知相視驚洶皇上體念天心哀憫元元敬慎聖躬恊于神明申令廷臣同加修省禹湯之罪已不是過也自下詔迄今又累旬月雨師屯膏旱魃肆威狂颷震怒不悔于昔霾曀萋曖無日無之畿輔地方視逺滋甚河南北數郡樹無完膚人民相食天之譴怒不息何以至此昔者寃婦釋而東海之雨作楚獄雪而鍾離之㴻降劉焜之火滅于反風金縢之禾起于既仆豈臣下奉宣徳意通逹下情容有未盡何其感通之機窒而不行也臣備員秩宗不能少補禮樂以召神人之和節剛柔之氣曠官竊禄罪加夷等災異不息咎實在臣乞賜歸田里詔曰珤學行老成不允辭復初政消災變疏嘉靖二年八月禮部尚書汪俊等題為懇復初政以消災變事禮科抄出南京禮部等衙門尚書等官秦金等題先該禮部咨為勅諭事節該本部題奉欽依上天示戒災異頻仍朕心憂惶特降勅諭思與在京在外文武羣臣同加修省凡關係吏治民隠興利除害政務都要著實舉行以回天意欽此備行前来臣等仰窺聖心遇災知懼即古帝王勅天時幾之心也臣等仰惟朝廷四方之準君心萬化之原皇極建而休徴乃應中和致則位育自臻粤自皇上入繼大統以来昭徳塞違勵精圖治革積年之宿弊復祖宗之成規動無過舉宜足致祥顧自去嵗迄今四方頻告災𤯝風潮水患之非常氛霾旱暵之繼作加以盗賊竊發小醜跳梁循省咎徵皆臣等不能将順徳意病國厲民之所致也敢不痛懲已往思補将来凡于軍民利病吏治得失可以便宜興革者略以次第舉行其于事關重大者另各條具奏請外臣等復有一得之愚敢為九重之獻詩曰靡不有初鮮克有終蓋言保終之難不可一日而或懈也竊觀陛下臨馭未㡬政漸弗終故天心仁愛特示警懼兼以民貧財盡賦重役繁嗟怨之聲足以上千和氣陛下可不幡然慎終如始以慰荅天人之望歟臣等請試言之陛下登極一詔百度咸貞天下拭目望想至治比来百凡舉措多與詔㫖背馳百司罔遵萬民失仰此詔令不能如初未慰天人之望也陛下即位之初罷逐庸囘任用耆舊内閣部院之間極一時名徳之選蓋陛下在藩邸之時已先知諸臣之賢故用之而不疑如大學士楊廷和等嘗召見便殿詢以機務可謂信用得人矣記曰敬大臣則不眩夫所謂敬者聽其言行其計不徒禮貌之而已也比聞諸司章奏或不關内閣票擬㫖意或竟從中改師傅重臣諮詢疎濶至于𦂳切事情下同諸司疏請陛下徒荅温㫖未見依從此必左右計竊政柄而䜛言得行乎其間也蓋大臣必有自安之勢而後可以責其體國之忠人君必有一定之見而後可以遂其欲為之志今貌敬而心疑名任而實阻則諸老臣者咸懐顧慮而有去志陛下欲誰與共理乎此任賢不能如初未慰天人之望也陛下即位之初求治如渇聽言如流九卿科道凡百建議朝請暮報未有不允納者比来諸凡政務但干涉戚畹宦寺雖九卿執奏科道交章一則曰已有㫖了二則曰已有㫖了事若遂非迹同拒諫此聽納不能如初未慰天人之望也陛下即位之初鑒先朝名器之濫冗食之繁凡傳陞乞陞官較匠役人等一切釐革儲蓄稍充國計有賴曾不幾時復蹈故轍比来宦戚之家藩邸之臣或爵以侯伯或官以錦衣至如已故太監趙山等弟姪趙雲等相繼陳乞亦得千百户之除爵非平亂禄非軍功日新月盛無有紀極是朝廷之名器益濫府庫之儲蓄愈缺将何以勸功而給用乎此慎惜不能如初未慰天人之望也陛下登極旬日科道糾劾奸黨巨惡俱命錦衣衞拏送都察院鞫問刑部大理寺擬平人謂積年墜典一旦舉復比来非機宻重情俱下鎮撫司問理臺諫論列而不從法司執奏而被詰此法守不能如初未慰天人之望也陛下即位之初首命户部将御馬壩上等倉塲正徳十六年合用糧料草束比常減半坐𣲖蘇松山東河南比直𨽻小民困苦恩至渥矣其以後年分仍令科道官備查馬匹牛羊實在數目照數會計以免冒濫事方舉行人皆欣忭乃因太監閻洪等飾辭凟奏遂寢查覆積弊彌深此恤民不能如初未慰天人之望也陛下即位之初查遣法王佛子國師禪師囘囘人千永等禁黜左道一歸于正比来誤聽太監崔文蠱惑之言乃于嚴禁之地建設齋醮或盡日而罷或連日不止耗蠧財用溷凟宫庭此禁止不能如初未慰天人之望也陛下即位之初神氣精明體幹充盛仰瞻天日之表鬱有松栢之姿比来聖躬時或違和天顔未能如舊豈鼎盛之年忘在色之戒歟燕間之地違養心之道歟此保固未能如初未慰天人之望也凡此有一足以干和况兼之乎是未可諉為適然之故而弗加之意也中外皆曰陛下初政所以清明者政出公朝而左右不能預也今政不能如初者政在左右而公朝或不知也臣等竊惟政不可一日不在朝廷權不可一日移于左右所謂政在朝廷者非必天子之獨運也以機務之繁多也設公卿以代理之慮視聴之壅蔽也設臺諫以糾察之股肱有托耳目有寄是謂政在朝廷主威重于九鼎國勢安于泰山自古帝王制御天下操此術而已不然則内庭外朝之勢隔而信任有所偏宦寺女謁之情親而聽受有不察名曰摠攬而權實移于下矣伏望皇上上憂天命下悲人窮思闕極異加省疏嘉靖五年大學士楊一清以災異修省上言臣近觀禮部所奏今年災異如遼東山陜江浙湖廣地震不下二十餘次各處氷雹傷稼殪人南北直𨽻江浙諸處亢旱為虐山東豐沛洪水泛溢遼東有雷雨之變貴州有山崩之警至于江南之人疴江西之虎恠鄖陽之牛禍層見叠出尤為竒異豈惟近嵗未有抑亦載籍罕睹稽諸傳記考其證驗皆陰陽失常陰盛陽衰所致請推理論之以上下言則君道為陽臣道為陰豈乾綱下移而威柄或不自上出歟以人品言則君子為陽小人為陰豈直道難容而君子在野邪佞易親小人在列與以天下言則中國為陽四夷為陰豈兵政廢弛而内治不修夷狄侵陵而外攘無方與以治道言則徳教為陽刑法為陰豈恩澤壅于下流而民無實惠法令阻于倖門而人無懲戒與臣伏覩陛下有堯舜之聰明而視聽不能無壅蔽有成湯之智勇而用舍不能無二三有覆載含𢎞之量而未翕受于衆情有視民如傷之心而未遍洽于天下彌文盛而實事微上下暌而情意窒九卿之執奏多聞報罷臺諫之進言或遭譴斥竊恐日積月累䝉蔽漸深陰凝氷堅浸不可長此臣所以終夜靜思竊嘆而深惜者也陛下端拱九重委任臣下将以為百寮供職庶績咸熈然諦觀之則因循玩愒之弊多精明振勵之功少故所用者未必才才者未必用所聞者未必是是者未必聞所見者未必真真者未必見所行未必當當者未必行是朝廷且未必正况百官乎萬民乎今禮部所奏荷䝉聖明采納竊觀朕心警惕之語仰見陛下畏天之誠會官擬議之文欲展臣下進言之志化災為祥轉禍為福端在此舉臣願陛下益嚴敬畏常存此心總攬乾綱以防欺蔽之奸延接大臣以資輔導之益覽諸司之章奏則天下之事得以周知辨臣下之忠邪則聽斷之間不為所惑仍戒飭諸司官守修職言責納忠凡朝廷政事之缺失所當汲汲修改者㡬事天下生民之疾苦所當汲汲救援者㡬事至于遺賢之未甄舉忠直之末收録䜛慝之未殄除幽滯之未昭雪明白開陳悉心敷對勿事因循勿懐顧忌陛下以納善如流之量𢎞改過不吝之勇慨然聴受毅然施行大要以恤民固本為主民心順則天道和豈惟災變可消抑且禎祥可致此臣垂盡之年感恩圖報之愚悃也第輔導之官論道為職公孤之任𢎞化所關古之人君多因災異䇿免公卿今在廷大臣無如臣老憊者亦無如臣不職者遇災䇿免實其所宜伏望皇上賜臣罷斥以警庶官然後委任忠良恊心匡濟庶幾天意可囘而災變可弭疏入上嘉納之畏天修政疏嘉靖十年禮部尚書李時以彗星見上言休咎之徵載在洪範雖聖人猶且嚴之則災異之見不可諉之氣數之適然而人君畏天修政之心有不容漫然而襲故者今京師夏月以来震雷殺人淫雨傷稼沿邊諸郡餓莩盈途盜賊横發乃是月乙巳夜彗星復見東井陛下一聞占候之言即惕然不寧勅下禮官講求至理敬天之誠深宫弗替此古帝王克謹天戒之心也臣等不諳象緯之學固不能旁引曲證如京房劉向之徒以凟天聽然天人相與之際則嘗聞之固不容文飾以欺陛下伏惟仰稽乾象俯順時宜檢察于萬幾之中以求因革舉措之宜仍飭大小臣工同加寅畏勉修職業以来月二日為始俱青衣角帶朝㕘辦事至星滅而止凡利所當興弊所當革務實舉行其事關祖宗害切生民者科道官指實陳奏務恊公論以慰人心或言有未當詞傷過激亦望優容以仰答皇天篤祐之心以共成嘉靖中興之治上曰上天示戒朕敢不警省以仰答仁愛其如議行科道官以言為職當隨事論列秉正竭忠以圖自盡何待災變然後言雖求言為帝王之善然無肯為國為民者亦徒事虚文耳已屢有㫖不必第令大小百工同朕痛加修省以匡朕冲昩上囘天意飭虚文修省疏嘉靖十二年十二月禮部題該寧夏等處督撫巡按等官楊李等奏為類奏災異事各奏報所屬府州縣衞所地震等因通抄案呈到部臣等竊惟上天聰明茍無其故變不虚生詩曰畏天之威于時保之言宜恐懼修省則變災為福也陛下敬徳祈天修道凝命其于弭災之道蓋無所不至矣比来雷鳴星隕物異人妖四方奏報殆無虚日節該本部題奉聖㫖卿等説的是上天示戒近日京師地震各處地方災異叠見朕心驚惕與爾文武羣臣同加修省以囘天意便擇日齋戒遣官祭告天地宗廟社稷山川欽此俱經欽遵外今該前因竊惟類奏災異雖係累朝舊規然實聖明克謹天戒至意是以節年以来凡本部具題前事俱奉諄復之㫖申飭内外同加修省非徒循故事飭虚文而已昨該本部類奏仰奉前㫖其于聖徳謙冲似蒙采聽而内外臣工則似無所施行雖臣等仰知聖明在上應天之實不必以言然大小羣工誰能遍諭将謂陛下以災異為諱以修省為虚恐非所以謹天戒明常憲而昭示天下者也臣等待罪禮官職司聞奏四方災異既有所見不敢不言伏望聖明留神鑒納特播天語嚴飭中外大小臣工今後務宜仰體天心不負君徳惟公惟正去私偽杜朋比毋作好惡以賛成皇上正大光明之治則天意格而人心安矣天下幸甚等因奉聖㫖覽此奏前批委忽畧了天垂眷愛災異羣方本自朕召敢不省懼但内外大小百工均宜各加改悟以弭災沴勿得視為故事便通行示悉欽此陳言消變疏萬厯二十二年禮部右侍郎馮琦題為懇乞謹天戒憫人窮以保治安事臣等竊見九月中太白太陰同見于午又聞狄道山崩成坑更于平地湧出大小山五座大陰經天太白晝見相近相犯已為極異迺至山陷成谷地湧成山則自開闢以来惟唐垂拱中有之而今再見也臣等欲有陳説懼涉煩凟顧身為九列同國休戚安有災變若此而畧不動心心知其危而不以告君父者竊聞帝天之命主于民心民安則天示禎祥民不安則天垂譴告欲承天意當順人情近来天下賦税之額比二十年以前十增其四天下殷實之戸比二十年以前十減其五東征西討蕭然苦兵自礦使出而百姓之苦更甚于兵税使出而百姓之苦更甚于礦加以水旱蝗災流離載道畿輔近地夥盗公行至殺職官家屬十餘人而地方官不以盗聞臣等以為此非細故也皇上憫念小民不忍加𣲖徳意甚盛臣等豈不仰體第奉差諸使各圖其私跟隨奸徒動以千百皇上欲通商而彼專欲困商皇上欲愛民而彼專欲害民皇上戒以弗信撥置而撥置愈多皇上責以不許騷擾而騷擾愈甚皇上之心但欲裕國不欲病民羣小之心必先瘠民方能肥己蓋近日有神奸二種其一專務窺探上意具有成奏假武弁之手以上之其一專務剥害小民畫有成謀假中官之手以行之通謀如鬼蜮取財盡錙銖逺近同嗟貧富交困貧者家無宿儲止慿營運但奪其數錢之利已扼其一日之喉至于富民更被傾害誣以漏報國税誣以盗賣礦砂誣以私販官鹽誣以偷藏禁木粧成局面聲勢赫然及其得財寂然無事索求不遂立見傾家無地可容有天難訴利歸羣小怨歸朝廷假令民間不窮而怨民力猶堪不怨而窮民心猶固今以刺骨之窮抱傷心之怨一呼易動一動難安今日猶是承平民已洶洶不定一有風塵之警誰為可保者夫巴拜誅關白死此皆用人丁以為兵用民財以為餉若一處小民唱亂各處小民應之于何取兵于何取餉乎皇上聖神洞知今古自秦漢以来天下危亂之由惟有四字曰人人嗟怨而已臣不敢言其逺皇上試差親信忠實之人訪問都城内外里巷歌謡令一一具實陳奏則民之怨苦居然可覩天心仁愛明示咎徵誠欲皇上翻然改悟坐弭禍亂乃禮部修省之章未蒙批發而奸人捜括之奏又見允行即如何其賢遍解天下無碍官銀一節各處錢糧皆有定額所謂無碍云者不過支剰羡餘近日征調太煩徵求太急正額錢糧尚多拖欠羡餘支剰何處得之此令一下急如星火不但指有碍為無碍亦将指無銀為有銀必将正項公銀半充進獻公家無措又𣲖民間庫藏既空閭閻亦敝有司一有爭執輒謂阻撓身且不保何有于官官且不安何有于民竊謂天下之財宜散置天下譬如一身榮衞當流布一身若盡括肢體之血置之心腹之間四肢既已空虚心腹亦将脹懣又如仇世亨奏徐鼐掘墳一節事之有無誠難懸斷然以理論之豈有一墓而有黄金巨萬之理即使有之亦當先下撫按覈勘虚實分别首從先正其掘墓之罪而後以掘墓之物入官未有罪状未明而先没入貲財者也片紙朝入嚴㫖夕傳即有深寃誰敢辨理不但破此諸族又将攀及多人但有株連立見夷滅輦轂之下尚須三覆萬里之外止慿單詞遂令狡猾至賤之流撡此生殺至重之柄此風一唱誰不效尤何地不可為金穴何人不可為撲滿已同告緡之令又開告宻之端臣等方欲陳奏而某某之奏又得㫖矣五日之内捜取天下公私金銀已二百萬傾府庫之藏豈無盡日窮天地之産寧有足時奸内生奸例外創例臣等目前猶望其日減今日乃更患其日增不至民窮財盡釀成大亂必不肯止伏望皇上穆然深思超然逺覽上天可畏小民可憐亟與廷臣共圖修弭杜中臣攘奪之路絶羣小窺伺之萌無令四海蒼生之衆結怨清朝無令千秋青史之編貽累聖徳臣等有心恤緯無力回天所望者九廟之神靈所恃者九重之英斷耳不勝􅈤切仰祈之至禮部志稿卷四十七
