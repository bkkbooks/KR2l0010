body:
  text: 禮部志稿卷六眀俞汝楫編聖訓世宗肅皇帝修省之訓嘉靖二年三月禮部以久旱風霾疏請修省上是之命止齋醮及一切興造不急之務遣官祭告天地宗廟社稷山川復諭禮部曰亢旱已久風霾不息二麥未秀秋種未布朕心惶惶凡政令缺失軍民利病有當興革者在內諸司從實舉行或當奏請者詳奏無諱嘉靖二年四月以災異修省遣官祭天地宗廟社稷山川上諭禮部臣曰上天示戒災異頻至朕心憂惶特降敕諭思與內外文武羣臣同加修省凡係吏治民隱興利除害政治皆從實舉行以回天意往嵗以江南水災亦嘗戒諭所司未見施行都察院并申眀使知朕意且行過事迹以聞二年九月以四方災異下詔賑恤詔曰自古帝王臨御天下必以敬天勤民為首務我國家列聖相承率繇是道朕嗣守鴻業深惟祖宗付託之重臣民屬望之深夙夜兢兢不遑寧處自踐祚之後上天垂戒災沴疊見今年七月內南京應天及淮揚等府俱有大風雨之變陵寢震驚江水湧溢漂流房屋不下數萬餘間沒溺男婦無慮數萬餘人死者積尸暴露生者流離遷徙而江西湖廣廣東廣西等處亦有非常水患內自修省罔知所措意者敬天勤民道有未盡永惟厥咎在豫一人百姓何辜罹此艱厄朕方齋心積誠祗告天地宗廟社稷與爾內外文武羣臣同加修省以回天意尤念四方之逺民瘼甚多比年以來兵荒相繼征調不息加之法度廢弛賞罰不眀軍民受苦財力兩疸寬詔徒頒奉行未至官府之催徴不已倉廪則所在空虛朝廷德意顧為姦貪之騙局小民脂膏祗供典守之侵盜上官以逢迎為能贓吏以科罰相尚賢否舉劾多有不當刑獄輕重多有不平閭閻之間疾苦萬狀念之痛心言之蹙額今雖痛加釐革餘風或有未殄天地至和之氣寧不為之感傷爾天下軍衛有司衙門官員職雖不同義均休戚宜各督所屬各慎所司盡革因循積習之弊益勵廉慎不渝之節各該撫按守巡等官俱要躬親巡歷宣諭朕意被災人户加意賑恤死而暴露者官與瘞埋生而流徙者設法招護一應嵗額錢糧與凡嵗派物料徴收必以其時出納必稽其弊已起解者務濟公家之實用應蠲免者務宣詔旨之實惠獄訟勿令久禁聽斷勿致偏枉勿過刻以害良善勿太寬以長姦惡贖罪紙米勿令折價入已往來迎送勿得阿意勞民先年用兵經過及今次災傷地方但有死于非命者除厲壇常祭外各令所司房另舉一祭禮文仍從該部降去各該屬官中但有貪婪殘酷者具實奏黜誠心愛民者雖雜流出身者一體旌奬勿以奉承之能否為愛憎勿以一已之愛憎為進退凡百行事務要奉公守法期於消除民患培養國脈以稱朕敬天勤民之意以延宗社億萬年無疆之休三年上諭羣臣曰近江北江南并湖廣等處水旱相仍地方飢饉人民相食所在盜賊成羣應天鳳陽并河南山東陕西等處元旦同時地震方雷雹交作山崩地陷災異非常近日京城風霾蔽天春深雨澤愆期上天示戒朕心驚惕爾文武衙門官員各宜體朕同加修省凡政教有未眀刑罰有未當寃抑有未申困窮有未息與利所當興弊所當革者俱一一著實舉行事應奏請者條具以聞禮部仍行在外各處鎮巡及三司等衙門官一體遵奉務期弭災召和以副朕軫念元元至意五年十二月大學士楊一清因災異上疏言修省事宜开乞罷免以應天變上嘉納其言旋遣司禮監官齎敕諭之曰昨卿所奏疏朕覽之冉足見誠悃况所言君臣人品天下治道俱論之至切但朕以涼德仰承天命嗣祖宗大統日夜圖維至治勉修厥躬以副眷愛自即位以來福兆未臻怪變非常豈以朕德沖昧咎多在躬以致皇天垂仁示戒朕深懼且愧惕然於懷不能仰承至託不敢一時怠逸欲求轉災為福之術必多訪民情興革惟允故令會官議處又禮部援例請齋戒祭告朕切思之齋戒不過三日服移淺色於外而心存警畏於中不知何如祭告形於文詞不過應事而已不如常修厥德上格於帝所以答諭令實加修省上下同加戒謹不必虛文故事為也朕日總萬幾親閲奏章未必盡知民欲必咨卿等輔理庶務朕今欲求直言而直言者或不實陳顛倒曲直正如卿言言其盡忠可也今咎本實在朕躬凡庶司百僚責亦不無卿言或未盡誠或未伸或聞政事之缺失或朕過多不自悟或刑賞未當或民情不遂可一一指陳開𨗳朕心務以上下一德隂陽各適庶上回天意下安民心此朕之所願卿勿得忌以不言是負朕望方今修省弭變之時豈可求退正當展布忠誠匡朕不逮有疾宜調理如可即出供職六年正月上諭禮部近大學士楊一清以災變修省奏請寬恤小民已有旨待郊祭後令諸司開具條件降敕頒行朕思民間疾苦情狀甚多一時所開或有未盡匹夫匹婦猶有不被其澤者其令四品以上官及六科十三道各條具便宜限正月二十日以前奏上以備采納所言務切於政事合於民情忠誠眀白足以消彌災變副朕敬天恤民之意六年正月禮官以郊祀屆期請舉慶成宴上曰郊祀慶成次日設宴祖宗朝故典蓋以上帝監歆君臣歡會其禮不可廢也今四方災異非常方欲上下同加修省朕恐多費勞民可暫免一年以見朕奉天恤民之意惟四夷使臣賜宴如故十二月禮部類奏四方災異上曰上天垂示災變頻仍朕覽之中心恐懼況邇來地震京師冬季將終雪尤未降推思咎本實在朕躬尚賴卿等中外大小臣工協力匡佐勉修乃職思弭災召和之方為朕言之務期上回天意以消變異副朕至望勿或怠忽其被災地方官亦可傳示令其改悟修省務期實效毋事虛文六年上因災敕諭文武羣臣曰恭承祖訓光紹丕圖夙夜孜孜罔敢逸豫敬天愛民一念恆切於懷然而志勤道逺績化未孚隂陽愆違致生災變比年以來坤寧勿靜乾象失常風雨氷雹之異南北相仍旱乾水溢之災後先繼報甚者物怪人妖層見疊出切惟天道人事相為流通和氣致祥乖氣致異上天垂戒必有其因靜言思之皆繇朕心有未純德有未一用舍失常舉措違宜上無以格於髙穹下無以寧兆庶省躬咎本實在朕躬豈惟遇變而懼實欲思過而改爾文武羣臣皆與朕共理天賦其間竭忠奉法者固有徇利忘義者不無武臣無安攘之略而朘削以為家文臣無弼亮之誠而依違以玩日賢否混淆而官無懲戒賦斂繁急而民不聊生掌邦禮無以和於神人典邦政無以威乎夷狄刑獄寃濫而怨聲載道工作無度而財力告竭至於風紀之司尤昧激掦之任愛憎或徇其意毁譽多失其真以致四方視效貪墨成風下民怨咨無所控訴愁嘆之狀所不忍聞故君心萬化之源朝廷四方之極事關朕躬者不敢自怠責在百官者當圖自新特茲戒諭爾等各宜洗心澄慮去垢滌汚素廉勤者益加砥礪習玩慢者即為修改官守盡職言責納忠毋事因循毋懷顧忌兩京官員有不職者待考察之時從公罷黜在外官員朝覲考察未久姑且䇿勵戒飭若姦貪不法實迹顯著撫按官亦要悉心訪察去其太甚務期弊端革而民心恱庶幾上下交修以成勵精之治以答上天人和之心倘或勿思勿慮徒以虛文應故事豈但瘝乃官曠乃職國法具在朕不爾私爾等勉之慎之故諭七年四月禮部以露瑞請表賀及欲照河清事例致祭天地上不許諭輔臣楊一清等曰朕思謝告一事原非舊章亦非經制乃朕妄為以其情無不可緣其禮而無害雖然以致人言矣幸上天垂憐鑒朕眇誠今次不可不加詳處文獻通考記前代有一年五祀者為太煩不可不慎而今之舉行非祀儀比亦恐齋戒頻煩羣臣怠惰以朕意論若彼嘗告謝而今次不行是為始敬終慢也若繼之為事例又恐瀆也不知何處為可一清等請如部議致祭乃從之八年二月上諭禮部曰朕念去年各處俱奏報災傷變異頻仍人飢至有相食者況一冬少雪今當東作之時雨澤不降若二麥不登則今秋荐飢又有甚於前嵗朕甚憂懼已有旨祭告南郊社稷山川今朕親往庶盡虔祈之意八年十一月上諭禮部朕聞雪乃豐年之兆今深冬無雪朕甚憂惶宜虔誠祈禱祭告天地社稷山川等神擇日具儀以聞於是禮部具儀言駕出親祈百官俱宜陪祀上曰雨雪愆期實朕所致罪在朕躬朕宜自禱百官不必陪從禮部再疏懇請乃聽仍戒各加敬慎以祈上回天意十年四月上以兵工二部火諭禮部曰火災雖因人不謹所致不可不知警畏卿等宜各深省毋事虛文仍青衣朝參三日朕亦自省與卿等共圖休兆六月雷擊午門角樓垂脊并西華門城樓西北角柱上諭禮部茲變實朕積愆所致上天垂示與卿等修省三日仍制製祝文行露告禮於殿陛祝曰本月初十日辰刻雷擊午門等處垂脊并及木柱十一日夕占官謂觀候於宫中有火為災臣所獲聞曷勝恐惕伏念臣以愚蒙仰承眀命主理萬方覩茲災變實臣居職不臧政多乖謬之所致也敬惟上帝垂仁俯視矜宥俾五行順序二氣調均轉災為祥庶宗社永以綏寧矣臣下情無任戰栗待罪之至十三年七月上以南宫廟災行告天禮於殿陛畢是日即詣太廟恭慰五祖神諭內閣禮部曰慰廟之禮有謂必待擇日齋沐乃可舉者朕以為此禮之常也今因災而祭禮之變也譬之人或遇變子必奔諸父母所以慰安之何待正衣冠而後行夫禮有齊三日而後對越神眀者此常經耳朕之告天畢即赴廟者亦禮聞變即慰之意權也卿等宜知之十八年十月上諭禮部曰慶成之宴因循舊例以附享禮未成輟之今皇妣主升祔既三月矣行禮奏樂耳聞目覩者屢矣何獨於受天釐反禁也審爾則冬賀當輟只賀大報禮成庶不失重輕尚書嚴嵩未悉上旨宜舉慶賀成之宴上又曰朕昨諭本是敬天庥之心非敢負宴樂但既以日易月矣而視殿輟作樂却輟反其重者爾賀節當同宴禮併罷二十一年正月禮部以靈雪應祈請上御殿受賀上曰連冬愆雪朕仰叩皇天此心實是為民丕荷洪庥錫此春前嘉瑞卿等歡慶之情朕已具悉卿等百司但協心秉公贊其代之職以共承天意二十三年四月上諭禮部臣曰今春雨澤固降雷未發聲且四方災異旱潦不同勿專謂爾君所致人臣之義可盡廢乎天工人代君一身能遍諸務耶臣原有分理之責況忠貞者又以臣勞自責未可専一欺謗各要實盡厥勞二十九年三月朔禮部以亢旱請順天府官禱雨百官皆致齋青衣辦事上曰去冬無雪今春不雨凡一百五十日如再及旬月麥禾皆失潤溉朕茲躬禱為民生耳卿等以上下相關百官亦當致省但恐應天未可虛文苐今該府官竭誠以禱四月禮部復以旱甚請擇吉遍告神祗乃申飭百司滌已省愆修舉實政以仰贊聖誠上回天意上曰君者代天工不能獨理設官分職以共之又曰臣勞此義孰能知之言之皆非實心也今亦不必申以語言不必虛應故事惟仰告上天廟社諸神自九日始停刑禁屠百官修省至十七日而止尋分遣大臣朱希忠等各如期於郊壇廟社行禮正學之訓嘉靖元年十月禮科給事中章僑言三代以下論正學者莫若宋儒朱熹近有倡為異説以壞人心者宜行禁革上曰祖宗表章六經頒賜敕諭正欲崇正學迪正道端士習育真才以成正大光眀之業百餘年間人材渾厚文體純雅近年士習多詭異文體務艱險所傷治化匪細自今教人取士一依程朱之言不許妄為叛經背道之書私自傳刻紊亂正學進講之訓嘉靖六年七月上諭輔臣曰朕見顧鼎臣所講洪範盡心指解辭語多長恐溫書之日有所失記可説與他著溫書通解之日少為刪去幾句從容講説勿致荒疏以發眀朕心使有所得直解揭帖內可撰寫精全不可遺失庶朕得以覽閲以求其旨義為治之助十月講畢上諭輔臣曰今日講論語又越了一篇朕知以為曽子將死之事故不講但前日已有諭及今日又未講夫死人之常何可忌之如不可講也照前寫來若只忌其不佳還當補講卿等議行又朕惟相讓之風自古大臣之道朕日觀侍郎董玘講筵之內行立之序行禮先後俱無遜讓之體即此觀之其心可知又每日講書時卿等行禮皆六叩頭自今後只是一拜三叩頭退又叩頭禮免了玘之事可諭他知俾令務禮讓以盡大臣之義經筵之訓嘉靖七年閏十月上諭大學士張璁曰朕惟今已寒月例暫免經筵日講但朕以洪範未終其篇故未循例暫免又恐卿等侍朝侍講時久而心有勿安或有謂朕曰為學貴有終始亦在乎篤行不在乎急迫與徒知也斯實至説但恐中絶而不能貫通今欲暫停經筵日講侍終其篇而暫止卿璁等不為例日輪一人侍班一人侍講講官該日進講并鼎臣亦不為例暫免入朝參正入講殿進講庶得以從容進講不得使氣促講而朕亦安聽講解或得於領會矣璁等疏辭上復諭曰茲覽卿等所奏昨日朕調講學事宜謂除鼎臣等欽遵外卿二人仍如故得以心安者朕惟欲心安當先安君可也如此不過徒以自安耳斯不為定例計日可終宜承朕命釋奠之訓嘉定十二年三月上重幸太學釋奠先師孔子御彛倫堂祭酒林文俊講虞書益稷篇司業馬汝驥講易頥卦賜之坐講畢上宣諭師生曰治平之道備在六經爾諸生宜講求力行以資治化眀日文俊等率學官諸生謝恩上賜之敕曰朕惟人君御世撫民教化為先朕即位之初嘗親臨太學祗謁先師講論治道以勸勵諸生茲以祀典釐正載詣孔廟恭行釋奠之禮且進爾諸生講解經義爾等尚𢡟乃淳學率勵作興務在敦本尚實用贊我國家文眀之化顧不偉歟於戲孔子之教正名為先大學之道修己為要爾師生其敬勉之取士之訓嘉靖八年正月上諭輔臣曰朕覽尚書方獻夫等奏陳弭災之宜數事內多取士一節朕欲卿等别議行故説知道了朕惟多取進士以為所缺縣令之補此為途亦狹耳夫舉人監生非士待之不逺實因以槩輕之故也豈無過於進士者每為所輕而亦豈非人才乎又如進士之保守身名固有而縱肆為惡者不無如今以各處地方災重令牧用人則進士舉人監生並用其果才能廉潔為我愛民者一體擢用奬勸上司不許自為輕重之别庶幾可多獲人才亦民間多得安利之日也貢舉之訓嘉靖十年正月禮部尚書李時等以嵗貢法壞請修復祖制掄選真才上曰朕惟祖宗朝設立嵗貢之法實寓古里選之制期得真才以備國用邇來生員茍得幫廪即計充貢有日往往有不修行檢挾制官司欺蔑卿里甚至虧缺倫理玷辱衣冠及有學問荒疏年力衰邁有司不問賢否止計食糧淺深一槩循資充貢却又多選任教官以為人師欲求人材長進誠不可得自今嵗貢生員務令州縣提調官選有學行者方許起送巡按御史會提學官併布按兩司從公考核照常數貢舉先儘廪膳如果無人許於增廣附學內考取不專論食糧淺深以襲舊弊即有年老不堪教養者令提學官嚴加考選無行者黜退為民其餘量與衣巾終身廪膳為提學者毋得輒聽權要子弟濫與收補如未得人寧令空缺其嵗貢入京廷試其衰老無學及行檢不修者所貢舉官一體坐罪不貸國子監見坐監生員該部選查照舊規定擬以聞十一年正月禮部尚書夏言以嵗當會試條奏正文體定程式簡考官三事上曰文運有關國運所係不細近來士子經義詭異艱深大壞文體誠為害治其出榜曉諭今年會試文卷必純正典雅眀白通鬯者方得中式若有仍前鈎棘詭僻痛加黜落甚則令主考官奏聞處治餘俱如議二十九年閏六月禮部覆給事中楊中繩奏請慎選師儒以端士習上曰提學官士子表率自今宜慎選行誼端方者為之不得徒尚虛文禱災之訓嘉靖九年四月敕諭朕聞周禮荒年索鬼神之制其各處凶荒地方爾禮部查奏遣賚香帛祝辭命所在有司官竭虔致誠禱于應祀神祗以希轉災為民之福朕仍躬行露告上天同爾等修省各處戰陳死亡或為國為民者勘報有不真以致徇情顛倒者亦足以傷和氣致災該部以依此類推詳奏請祀典之訓嘉靖七年正月上諭輔臣曰昨朕以大祀齋三日內于各寺宫廟觀宇燒香問於卿等得回奏已朕復檢會典內郊祀齋戒內一條云當日本部官同太常寺官于城隍廟發咨仍於各廟焚香三日所開止云各廟未及宮觀寺宇朕惟各廟亦非與者而宫觀寺宇尤非也不但為妨郊祀恐於誠意反致淆亂卿等亦以為不經之理豈不瀆神今可預諭禮部太常寺云朕惟郊祀乃我聖祖敬天報本重典近每聞奏云各寺宫觀廟宇燒香三日朕心有未安恐非我聖祖初制亦恐間亂齋誠自今年郊祀始不必於各寺觀宮廟宇燒香庶致精純以欽祀事禮部太常寺知道卿等看了便擬傳帖稿子來行九年十月內禮部題該巡按山東監察御史熊榮題為欽奉敕諭事內稱祀典神廟天下俱當修理一新等因該本部議擬題奉聖旨是各地方應祀神廟載在祀典的依擬便著有司修理但近年以來有等在官姦民専一阿奉鎮巡司府州縣等官不問賢否一槩蓋立生祠堂去思碑亭并私創庵院淫祠等項科斂小民欺侵入已為害多端都察院便行各該巡按御史親臨地方逐一查出拆毁變賣以偹修理前項應祀神祗廟宇仍將拆毁變賣過錢糧及修理過數目造册奏報不許别外科斂欽此十年正月敕諭禮部曰朕思郊廟之祀未有不同所以尊事天地祖宗者也惟太廟享祀制宜未稱孝敬之情仰惟朕太祖髙皇帝重闢宇宙肇運開基聖德豐隆神功偉盛顧不得南靣居尊甚非所宜當朕聖祖在御德祖居尊其在今日當以朕聖祖為始祖居始祖之位每嵗孟春行特享之禮自太宗而下並各居一幄而仍同日行禮其夏秋冬三享仍於太祖之室相向行時祫禮如今之制仍季冬行大祫禮以德祖居尊及懿熙仁三廟合享于太廟親王功臣俱配食於兩廡嵗暮自是節祭歸之奉先殿行禮世廟止行四時之享罷嵗暮之祭亦歸之崇先殿行禮即擇日預告具儀來聞欽哉故諭十三年八月以南京太廟災召禮部尚書夏言至平臺賜之敕令宣示府部衙門集議重建事宜敕曰南京太廟或建或弗建宜何所定朕惟太宗既遷北都為子孫萬世之業則南京太廟不必重有或謂太祖初定之都子孫當思慕功德不可廢朕則以太祖定北都傳已六宗矣能守祖宗洪業傳之無窮豈有南北之分也即太宗所定都太祖在天之靈未嘗不歆顧於斯且一天下作二主二廟豈合禮與義哉今又謂承天尚有獻考廟將非薄祖厚親歟朕則曰承天之廟孝宗所命建藩舊邸也故不敢去之亦猶南京奉先殿之比與此世廟不同且今南京秪存百官有司不巡幸不舉時祀徒有廟社耳此與周家三都三廟之同建者今昔意氣不侔也況祖宗神靈惟於子孫是依是憑豈有隔數千里之逺能將朕之誠敬乎今北立萬世之業則當為萬世之圖使其専一于此庶幾太祖永歆必不以再建廟為歆也敕爾諸臣其集議之言退而集廷臣議請以南京香火并於奉先殿其太廟遺址倣古壇墠遺意髙築墻垣謹同啓閉以致尊嚴上曰南京香火并進膳之儀禮部查議以聞其原廟址如議築垣時加巡守并各廨宇永不得修整著為令其在京廟制速處物料擇日興工承天家廟勿稱廟可倣奉先殿意曰隆慶殿用别輕重之意十七年十月上以天垂景雲躬叩元極寶殿畢詣南郊以恭上上帝尊稱預告於天神地祗還御奉天殿敕諭禮部曰朕以支服藉皇考聖母積德乃大蒙天眷嗣主華夏十復七載一政無為獨懷感戴大造之仁祖本之重可無仰酬於心今乃特竭朕𠂻左右咨謀於三五大臣且合詞同情聞之臣庶敢以一念之微上報兆命之主茲已同卿等預告於神祗恭取來月朔旦親率臣民趨詣南郊拜上皇天上帝泰號册表於圜丘是午復詣太廟加尊髙皇帝御諡聖號為太祖開天行道肇紀立極大聖至神仁文義武俊德成功髙皇帝髙皇后慈諡懿號為孝慈貞化哲順仁徽成天育聖至德髙皇后庶報天報祖之微誠聊以少罄焉爾禮部恭具大儀來聞敬哉敬哉二十一年四月敕諭禮部曰朕惟三代之禮至周大備後世治不古若乃因陋就簡焉朕究覽古初斟酌百代惟文武是憲是式故郊正分祝廟隆特享宋儒朱熹所謂大事者朕崇重之惟是季秋大享於眀堂此周禮重典與郊祀並者也數嵗以享地未定特舉祭於元德寶殿朕誠有未盡惟茲南郊舊殿原為大祀之所今禮既是正則固搆不當褻留昨嵗已令有司悉撤之朕自昨制象立為殿恭薦名曰泰享用昭寅奉上帝之意二十二年十一月敕諭禮工二部曰朕惟禮時為大祀典國之大事也茍不安於人心終難協夫禮義我家國宗廟之制自太祖肇基之初首肇四親廟其後更制時奉殷薦同乎一室當其始事豈不博采遐觀卒從同堂異室之規以示酌古凖今之義暨我成祖定制於茲廟寢之營率遵其舊百數十年以祫以享緝於純嘏則有繇然夫萃之為享其則不逺曩因廷臣之議咸稱七廟之文是用創興以從周典乃所司討論不詳區畫失當成祖以六世未盡之親而遽遷世室不獲奉於三昭仁宗以穆位有常之主而移就左營遂致紊於班祔武宗朕兄也不得同為一世顧居七廟之中有妨七世之祀揆之古義斯為戾往者回祿之警天與祖宗實合朕心茲當重建之辰所當釐正以圖鼎新又我皇考睿宗廟於都宮之外朕每事廟中考廟未備豈有四親之內而可缺考乎雖每於祫祭同享而奉主往來深為瀆擾茲禮官等會議欲奉處於孝宗同廟雖為兄弟同世之義然題匾各殘終未為妥朕是究是圖惟遵先制其永無愆夫禮非天降乃起人情祖宗列聖歡聚一堂斯實時義之為順者茲當建立新廟仍復舊制前為太廟後為寢又後為祧時祫祭享奉太祖髙皇帝正位南靣奉迎成祖及羣廟我皇考睿宗獻皇帝神主俱同堂而序享獻既畢則奉列聖主各歸於寢庶昭穆以眀世次不紊列聖在天之靈惟欣鑒享而克伸朕瞻事孝享之誠矣可如期興建爾禮工二部如敕奉行二十四年六月禮部奏廟工大體已完細節未備乞暫舉秋享之禮於景神殿上曰太廟之工爾輩原計以秋祭時可成今既告成更又何待朕雖非長者而自為變詐其何以交於神眀昭穆不序何得成王禮其亟擇日安主具儀以上朕疾不能躬事或命太子或命官攝行其儀節一如先廟之舊後所增諸儀悉除之宗室之訓嘉靖元年五月上諭禮部曰各王府宗室應奏事情止許啓王代奏不得私自來京先朝眀有禁例近多越關妄奏甚至子訐其父不遵祖訓傷敗倫理莫大於是今後違犯者原詞一切不行遣官伴送回府止給口糧腳力不許沿途需索轎馬供應通諭各王府知之斥齋醮之訓嘉靖六年七月上諭輔臣曰朕思每年初度該衙門援例請於朝天等宫建齋以為祈夀福者夫人君欲夀非事齋醮以能致之果能敬事上天凡所戕身伐命之事一切致謹焉則必得夀年長永奚可齋醮為事乎今欲將內三經厰外二寺凡遇景命初度一應齋事悉行革去止著朝天宫建齋醮如故其兩宫景命等日皆照舊行夫革三厰二寺之齋者所謂省一分有一分之益存一宫之醮者蓋倣春祈秋報之意朕此意欲言之已久而恐人譏朕偏尚特與卿等言之庶見崇正之意黜奉釋之訓嘉靖八年正月上諭輔臣曰近年內府禁重地纍被火燒毁官房數多所致之繇非一前日幸夀所謂雖未必無其實因奉釋事為本亦飲酒酣醉所致內府官長隨等家多有事此者每作其事朕多聞之夫事佛以求福也而反為災害惜乎下愚之為也朕故於旨內言多而所司為害勿肯及此卿等看其二旨稿孰可來行親蠶之訓嘉靖九年正月皇后行親蠶之禮上嘉納之諭輔臣曰今日言之奏甚好朕每在宫中恆言及此亦嘗諭皇后曰汝但知玉食繡服之充口飾體却不知成此者辛苦萬狀也又朕每以服上進聖母請尚用聖母諭朕曰吾何德獲今日之奉養但我縱服一素衣亦甚愛惜這等黃色錦綵須有時服之豈可輕用朕對奏此袍服慈親正當尚用何至久服之者不一易之聖母又曰且只説昔日豈有此等衣服固皇帝尊奉亦不敢過用了朕拜奏聖母德慶延於小子乃有今日非聖賢不能念舊日之事今慈意如此子不敢順承尊訓或進一食亦是如此夫聖母性自天成固為來者之法皇后恐不可不使之知農桑勤苦故朕納夏言所奏可著李時承朕意焉選嬪之訓嘉靖十年十二月錦衣衛百户費洪以皇嗣未生請於京城內外慎選淑女以備九嬪禮部請遣官於南北直𨽻河南山東廣東求之上曰慎選淑女本為廣嗣之計朕恐遣官四出重擾百姓又恐不識者謂朕好色苐如洪奏於京城內外選擇如果無人再議奏請飭禮之訓嘉靖九年二月都察院右都御史汪鋐以風俗奢侈奏請刋大眀令典禮儀定式及皇上新降敕諭有違令者以法繩之上曰禮所以辨上下定民志故官民服飾房舍器用祖宗皆有品第著為定式近者貪官豪民陵節犯分日奢侈尅剝兼并職此之繇其令在京巡城御史在外巡按御史檢察不法者具狀以聞却賀之訓嘉靖七年以甘露降遣武定侯郭勳詣郊壇告謝天地上乃躬謝於廷陛羣臣請賀上諭輔臣曰卿等以上天垂降寶露為朕所致覽奏而中慚且愧焉况今災變屢作民不聊生卿等請賀雖出忠誠苐朕心勿安也卿等可欽承止賀以稱朕祗謹天戒之意祈榖之訓嘉靖十七年正月行祈榖禮于圜丘命武定侯郭勛代上諭輔臣曰卿等謂祈穀禮宜暫命官具見愛朕至意然朕思大報未親時又有外臣在故欲躬事耳若論出入大廟丘壇上下自惟禮多但熟思朕既遵復祖制不三五年即偷安自逸且自十三年患咳六旬乃愈三四年間體力復不如故又昨冬連患足瘡兼耳鳴心跳神思不爽又不如前氣積成痼即今茲恙增甚朕心得有一日之寧乎故朝政之廢嵗不及旬日雖此身如逸中心不敢略怠所感者皇天洪眷太祖聖德故支維之沖君得有此十六􅑤及賴卿等竭心以贊耳今朕宜理疾祈穀之典卿勛宜思盡處恭虔代朕行禮卿言仍督禮儀勿怠即録付春官及遍示諸司知之祈年之訓嘉靖三十年四月設祈年醮典於朝天等寺諭禮部曰四民之中惟農為重而且最苦朕茲為民祈福臣佐君理民不宜欺怠諸司其以實奉行之毋慢祈雪之訓嘉靖三十三年十二月以冬深無雪遣文武大臣英國公張溶等祭禱各宫廟是日禮部類奏災異上曰災異屢見仁愛下垂朕敢不仰承天意爾內外臣工未宜一以歸上須分理有責若能同寅恤民和𠂻乃職豈感動即今禱雪之日為始各青衣辦事九日思省以誠勿但日已禮部以禱雪未應請令百官齋戒順天府官祈禱上曰朕欽天命奉天時事上元膺洪佑不敢自負自茲冬未雪不容不禱朕不敢要速效於神况夏秋雨水過多但五榖之精乃寶也朕誠不可自廢今舉祈保醮令百官齋戒停常封三日該府率屬虔禱勿怠册使之訓嘉靖二十三年十二月禮部言勳臣奉使册封多不法請旨嚴禁上曰册封大禮命官各宜仰體朝廷親親至意遵守禮法約束從人所過不得騷擾驛傳還報不得遷延違者聽巡按御史舉奏掩骼之訓嘉靖二十四年八月訓禮部朕思京城九門地大人衆多有死喪貧難不能葬者或有四方客死不能歸者暴露尸體朕體憫焉五城御史其督率各該官役以義地收瘞之恤疫之訓嘉靖三十三年四月都城內外大疫上聞之諭禮部曰時疫太甚死亡塞道朕為之惻然其令太醫院發藥户部同錦衣官以米五千石煮粥療濟用副朕好生之意死者官給席藁令所在居民收瘞之建宫之訓嘉靖十五年四月上諭禮部曰朕恭建郊壇廟寢所以上事天地祖宗今復思太皇太后二宮我皇祖原未有制今曰清寧者所居雖無其人可無其所是非母后所居也曰仁者夀乃統於乾清宫者非母后之宫今朕擬將清寧宫存儲居之地後即半作太皇太后宫一區仁夀宫故址併除釋殿之地作皇太后宫一區以備皇祖一代之制亦非妄舉已復諭禮部朕恭備祖宗一代之制命建慈慶宫為太皇太后居慈寧宫為皇太后居令工有次苐以慈寧奉聖母章聖皇太后以慈慶奉皇伯母昭聖皇太后一應供張悉取給內府如祖宗例行著為令喪禮之訓嘉靖十八年正月上諭輔臣曰朕昨居喪理疾閲禮記檀弓等篇其所著禮儀制度俱不歸一又不載天子全儀雖曰三年之喪通於上下而今昔亦自有大不同者朕數有義意在是苐以皇祖所定未有全文每遇帝后之喪亦未免因仍為禮至於冠裳衰絰所司之製亦各不一卿等試與禮官考定之自初喪至除服冠裳輕重之制具為儀節俾歸至當於是禮部議喪服諸制奏之上令更加考定畫圖注釋並祭葬全儀編輯成書備覽遷陵之訓嘉靖六年十月百户隨全録事錢子諒各上疏請遷顯陵上再下廷臣集議尚書席等固以為不可已有旨報罷至是間住御史虞守隨復申前詣撰皇陵正議數千言以進上諭大學士張璁曰守隨奏進皇陵正議蓋此舉非常前已下廷臣及內閣兩議皆云不可彼意蓋恐帝后各處乃朕失孝是亦忠意而朕所未信者恐一有差虞其為不孝也大矣夫古者君去國遷廟主而行主者陽也先人之精魂故謂之神主廟墓者藏先人之體魄乃隂也是為元宫地道尚靜體魄貴安豈宜輕舉我皇考葬已八年一旦妄動豈勝震恐若於萬年之後奉護慈宫以祔陵室何不善也卿與蕚密議何者為嘉擇而行之璁言聖慈萬嵗之後當祔顯陵上稱善無何錦衣衛百户張得錦復上疏請遷陵上諭輔臣曰朕覽張得錦所言雖是愛國之意但其意甚重前次多官已議二遍進言者不下六七人但朕未能中斷今與卿等定可如何行朕所論之我皇考陵寢逺在數千里之外豈無南望之哀但聞廟者安先人之精神也陵者藏祖考之休魄也今世廟既成祭祀有主不但止於陵前為可朕亦嘗靣承聖母訓告曰汝何不啓請汝皇考靈駕來京勿他日吾異此地朕惶懼無知乃謹對曰此舉關係不輕子不敢便承命須待與大臣議伏請慈尊安心勿慮是以每每未決朕意實以不動為當今欲啓奉來京非為不可其於皇考聖靈豈不震恐又梓宫近體得無露乎至於我聖母之意惟恐幼子失孝故往往垂諭朕安敢棄而違哉但日間亦有一等小人胡言是非加以怨愁曰我輩於此置立莊舍他日又隨南此非朝廷不孝誰乎致以上煩慈聽以為懷憂夫為人子者豈得不立孝功以名後世而此事與孝政無干為子者於親則順志承顔冬溫夏凊或親年老所行有差則從容進諫不違悖不乘危履險以愛身至於親亡則守禮盡哀一如經制三年不改親之善行繼述遺志奉祀綿綿此所謂子之孝也又我聖祖髙皇𥘉欲遷奉仁祖之陵旋亦止之太宗文皇帝遷都北京亦未遷奉孝陵此祖宗之盛典當取法之或曰當二祖之時雙親俱以上賔謂朕今時不當同也以聖母在養可不蚤計夫朕雖無知豈敢忽略實於晝食夜寐之間罔不轉加籌慮深恐動之不吉一或有虞其故在何亦或於後千百年間奉還寶駕同祔陵室未為不可所謂乘凶即事也今世廟已成大典已輯而朕之孝有未盡者嗣也當大婚六年將逾儲嗣未立朕實咎深德薄所致也亦或後之不德朕當自用省責特與卿等計或可就咨於議禮諸臣或下禮部議卿等可用心議詳以求停當以禆朕愆待夷之訓嘉靖三年三月上諭禮兵工三部邇來女直并朵顔等衛進貢夷人經過地方府縣衛所驛遞等衙門多有不行照例應付管待及至到京賞賜縀匹等物又多稀鬆短少不稱朝廷撫待逺人之意爾各衙門便查照舊規議處來説已三部臣各議上上諭禮部曰今後各處夷使朝京著光祿寺用心照例管待應得賞賜你部裡隨即關領給與上緊發回免致遲留在館諭兵部曰各處朝貢夷人經過去處各該巡撫都御史依擬出榜曉諭各屬查照舊例應付管待以稱朝懷逺柔人之意有違誤侵尅者提問發遣俱依擬行諭工部曰今後解到縀匹如有紕鬆短少不堪賞用及違誤限期者務要查照先年罰俸提問降革事例嚴加懲治不許徇情輕縱穆宗莊皇帝日講之訓隆慶元年三月敕諭禮部曰朕惟講學乃帝王進德圖治之首務茲山陵事畢經筵日講宜即舉行爾禮部擇日具儀并合行事宜來聞省災之訓隆慶元年六月上諭輔臣曰連日霖雨不止有傷民間禾稼朕甚憂之其令户部查覆被災地方以聞內外仍痛加修省是日禮部議上修省祈禱及停刑禁屠事宜上曰內外有司其各務省愆修職以副朕畏天恤民至意祈禱自眀日始各衙門官青衣角帶及停刑禁屠俱五日諸司奉行不以實者該科劾奏七月上諭禮部曰秋霖不止重為民災朕祗畏天戒軫念時艱深用憂惕內外各官著各痛加修省自十五日始青衣角帶辨事仍禁屠五日順天府祈禱晴日止十二月禮部言今嵗四方奏報災異特多請上敬天法祖勤學親賢深以佚欲為戒上曰上天示異理宜修省事關朕躬者自當加慎爾大小臣工其各秉忠君體國之心修舉職業消弭以盡交修之義隆慶二年三月京師地震禮部尚書髙儀等請令百官修省青衣角帶辨事三日仍願上親賢逺佞勤政講學以佚欲為深戒以勵精為逺圖絀粉飾之靡文崇交修之實政上曰災變非常委宜知警事關朕躬者當自加慎爾等百司其痛加修省勉盡職業毋事虛文十二月禮部類奏是嵗四方災異比往年特多而山西天鳴地震男子化女及浙江水旱尤為異常宜痛加修省上曰上天示警朕夙夜兢惕不敢怠荒爾內外臣工其務實心體國修舉職業共圖消弭以仰承仁愛之意隆慶三年十一月吏科給事中戴鳳翔以京師雨水氷凍弭盜安民六事章下禮部因類奏災異并覆鳳翔疏請行內外諸臣痛加警省仍勸上勤政事虛聽納以仰答天戒上曰然今嵗災變異常上天示警朕心深切兢惕爾內外臣工務痛加警省修舉實政共承天意視學之訓隆慶元年八月駕幸太學敕諭國子監師生曰朕以眇躬纘承洪緒總億兆君師之責深惟古昔帝王臨御天下莫不建學立師宣眀教術育賢善世以底休平朕甚慕之思與宇內之士臻於斯路爰循舊典紀之元初躬親太學祗謁先師孔子因進爾師生講解經義厥禮告成爾師生其曷以稱塞朕意夫學校之設以眀人倫也五倫之道根於性命之自然而推極其用則化成天下恆必由之六經垂意炳如日星所以發揮斯道者甚偹會其旨要身體而力行之以措諸事業非今日教養之所急與朕方立極綏猷為天下先爾等其夙夜祗懋相與講求經術之微惇敘彛倫之大期於體立用廣以成化於道今上追古雍熙太和之盛無令唐虞三代得専其美不亦善乎若乃徒事辭章離經畔道率忘其性命之實而靡適於世用非所望於師生者也欽哉禱雨之訓隆慶三年六月上諭禮部曰天氣亢旱三時少雨禾苖漸稿朕甚憂之其傳示順天府官竭虔祈禱自初一日始十日止諸司停刑禁屠不許怠忽是夜遂雨明日又雨又明日大雨上喜命輟禱弛禁賞邉軍之訓隆慶元年三月諭禮部曰朕初即位念守邉官軍勞苦宜加恩賚爾等其會兵部備查遼東至甘肅緣邉一帶地方官軍實數以聞禮部志稿卷六
