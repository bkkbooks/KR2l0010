至紅門外内侍官各詣二后神主輿前跪奏捧神主出輿由左門入復陞輿至永陵由中門入至享殿門外内侍官各捧入孝烈皇后神主奉安世宗肅皇帝神寢之左室孝恪皇后神主安于右室冊寳衣冠俱各奉安于室訖遣官行安神禮禮畢回京復命凡陵寢禁例洪武二十六年令車馬過陵者及守陵官民入陵者百歩外下馬違者以大不敬論正統二年諭天夀山祖宗陵寢所在敢有剪伐樹木者治以重罪家屬發邉逺充軍仍令錦衣衛官校巡視工部同欽天監官環山立界界外聴民樵採成化十五年令鳯陽皇陵皇城并泗州祖陵所在應禁山塲地土巡山官軍務要用心廵視不許諸色人等伐木取土石開窰燒造燒山及于皇城内外耕種牧放作踐有犯者正犯處死家口俱發邉逺充軍廵山官軍有科斂銀兩饋送不行用心巡視及守備留守等官貪圖賄賂不嚴加約束以致下人恣肆作弊不能禁治者一體治罪𢎞治十三年議準西山一帯宻邇京師地方内外官豪勢要之家私自開窰賣煤鑿山賣石立厰燒灰者問罪枷號一箇月發邉衛充軍干礙内外官員叅奏提問嘉靖十二年令錦衣衛選差百戸一員督令原差校尉于純徳山嚴加巡視有偷砍樹木作踐等項應提問應叅奏者照例舉行其差委官校與軍衛有司俱無統屬不許濫理詞訟囑托公事及賣放犯人生事擾害故違者聴撫按官究實照例施行二十七年令于天夀山前後龍脉相闗處所大書禁地界石有違禁偷砍樹木者照例問擬斬絞等罪若止是潛行拾柴㧞草比照家屬事例問發遼東地方充軍廵山官軍妄拿平人擾告居民者事發一體治罪凡遇陵祭正統元年諭是日與百官俱淺淡服色成化九年奏准孝陵祭祀凡南京文武大小官員有不赴者令御史糾察凡分官陪祭嘉靖中題准除掌印正官及宿衛守衛差占外俱要以次長官許佐貳官如無佐貳官者方許首領官前去國初追封諸王墳夀春王妃劉氏霍丘王妃翟氏下蔡王安豐安妃趙氏䝉城王妃田氏寳應王六安王來安王都梁王英山王以上墳在鳯陽府西北二十五里地名白塔設祠祭署陵戸南昌王妃王氏盱眙王妃唐氏臨淮王妃劉氏山陽王招信王以上墳附葬鳯陽皇陵有同嵗時祭祀皆與享其分封諸王葬于本封之國者其子孫自主祭祀此不具列外戚王者墳揚王墳在鳯陽府盱眙縣津里鎮洪武初設盱眙祠祭署置陵戸二百一十戸徐王墳在鳯陽府宿州新豐里洪武初設宿州祠祭署置陵戸九十三戸滁陽王墳在直𨽻滁州洪武初立廟墳所廟首宥氏置陵戸十九戸以上皆嵗時祭祀禮部志稿卷二十八
