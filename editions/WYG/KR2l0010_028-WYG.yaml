則遣大臣各分獻不讀祝是秋又命功臣仍于廡間配享不設布殿九年新太廟成奉安四代神主以親王并王妃二十一位侑于殿内東壁功臣十二位配于西壁不分獻自是四時之祭皆行合享之禮其夀春等王舊有皇髙伯祖等稱至萬厯七年罷止稱本爵凡時享值國䘮洪武二十五年議定樂備而不作凡祝文洪武二年定止稱孝子皇帝不稱臣遣太子行禮稱命長子某不稱皇太子嘉靖十七年令大祫祝文九廟帝后諡號俱全書時祫止書某祖某宗某皇帝備行宣讀凡忌辰永樂元年遇髙皇帝忌上率諸王祭奉先殿仍率百官祭孝陵萬厯四年題準凡郊廟奏祭祀日遇有忌辰則移前一日如致齋日内遇忌辰上具常服百官具青緑錦繡其正祭日遇忌者如祭在日間除臨時照常具祭服行禮本日祭前祭後與致齋遇忌同如夜分祭畢是日上仍淺淡服色百官青衣角帶辦事陵寢后妃太子諸王公主墳附皇祖陵熈祖陵在今鳯陽府泗州蠙城之北洪武初號曰祖陵今號其山曰基運即祖陵望祭徳祖懿祖二陵設泗州祠祭署置奉祀一員陵戸二百九十三戸供灑掃毎嵗冬至正旦以三太牢清明中元孟冬及每月朔朢以三少牢本署官行禮仁祖陵在中都鳯陽府太平鄉洪武初號曰茂陵尋改皇陵今號其山曰翔聖設皇陵衛并祠祭署奉祀一員祀丞三員置陵戸三千三百四十二戸供直宿灑掃内選禮生二十四名供祭祀執事每嵗冬至正旦以太牢清明中元孟冬以少牢俱署官行禮朔朢以少牢中都留守司官行禮𢎞治元年勅内官一員監䕶凡官員以公事經過者俱謁陵聖祖陵太祖髙皇帝陵曰孝陵在南京鐘山之陽今號神烈山髙皇后馬氏合葬設神宮監孝陵衛及祠祭署每嵗聖旦正旦孟冬忌辰酒果行香清明中元冬至太牢致祭特遣勲舊大臣一員行禮南京各衙門文武官俱陪祭國有大事遣大臣祭告親王之國過南京者官員以公事入城者俱謁陵出城者詣辭列聖陵成祖文皇帝陵曰長陵在京畿之昌平縣今升為州初永樂七年營山陵于昌平之黄土山封其山曰天夀山遂葬焉是為長陵文皇后徐氏合葬其後諸陵皆在天夀山仁宗昭皇帝陵曰獻陵昭皇后張氏合葬宣宗章皇帝陵曰景陵章皇后孫氏合葬英宗睿皇帝陵曰裕陵睿皇后錢氏合葬孝肅皇后周氏祔葬憲宗純皇帝陵曰茂陵純皇后王氏合葬孝穆皇后紀氏孝惠皇后邵氏俱祔葬孝宗敬皇帝陵曰㤗陵敬皇后張氏合葬武宗毅皇帝陵曰康陵毅皇后夏氏合葬世宗肅皇帝陵曰永陵肅皇后陳氏合葬孝烈皇后方氏孝恪皇后杜氏俱祔葬初世宗作夀宫于長陵東南之陽翠嶺嘉靖二十七年葬孝烈皇后是為永陵隆慶元年奉安世宗皇帝梓宫乃是天夀山西南襖兒峪遷肅皇后梓宫合葬孝恪皇后亦自金山遷祔焉穆宗莊皇帝陵曰昭陵荘皇后李氏合葬神宗顯皇帝陵曰定陵顯皇后王氏合葬光宗貞皇帝陵曰慶陵貞皇后王氏合葬諸陵各設神宫監并衛及祠祭署凡清明中元冬至太牢致祭遣官行禮文武衙門堂上官各一員屬官各一員分詣陪祭忌辰及聖旦正旦孟冬亦遣官行禮止用香燭酒果無帛各衙門官不陪祭諸王之國詣諸陵謁辭嘉靖十五年三月上躬行春祭禮七月改命春以清明秋以霜降遣官行禮各衙門官陪祭其中元冬至等節遣官行禮俱不陪祭九月上躬行秋祭禮自奉慈殿遷孝肅皇后神主于裕陵孝穆皇后孝惠皇后神主于茂陵躬行奉慰禮十七年二月上躬行春祭禮改陵殿曰祾恩殿門曰祾恩門四月建成祖文皇帝聖蹟亭于平臺山率從官行祭禮别陵睿宗獻皇帝陵曰顯陵在湖廣承天府之松林山今號純徳山獻皇后蒋氏合葬建享殿設神宫監顯陵衛祠祭署置奉祀一員以戚屬為之給署印設禮生二十四名供祭祀執事陵戸六十戸供灑掃校尉二十名供巡視嘉靖十八年陞戚屬為都督僉事給欽差純徳山掌祀闗防職専守䕶始于太常寺選補奉祀及增祀丞一員如七陵之制二十七年照長陵制設左司樂一員右司樂三員俳長四名色長十四名教師十六名供祀鑄給顯陵供祀教坊司印信每嵗清明降降二聖忌辰遣鎮守湖廣勲臣行禮勲臣有故以守䕶奉祀官代行奉祀官有故則分守官代聖旦正旦中元孟冬冬至遣守䕶奉祀官行禮恭讓章皇后陵寝在金山祭遣内官行禮嘉靖二十五年令于未央宫荘田六百五頃九十七畝内量撥一半供奉香火景皇帝陵寢在金山景皇后合葬祭遣儀賔行禮今遣駙馬及皇親憲廟廢后吴氏葬金山祭以素饈遣内官行禮世廟繼后張氏葬金山祭以牲醴遣内官行禮妃嬪葬孝陵四十妃嬪惟二妃葬陵之東西餘俱從葬長陵十六妃俱從葬獻陵七妃三葬金山餘俱從葬景陵八妃一葬金山餘俱從葬裕陵以後妃無從葬者裕陵十八妃一葬綿山餘俱金山茂陵十四妃一葬陵之西南餘俱金山康陵二妃葬金山顯陵一妃葬金山永陵三十妃二十六嬪惟五妃葬天夀山之襖兒峪餘俱金山昭陵諸妃葬金山先是妃皆自為墳憲廟十三妃始同為一墓嘉靖三十年以古世婦御妻皆九宜九妃為一墓同一享殿内作七室兩廂等各備于是金山預造五墓墓各九數以次葬焉先是從葬諸妃嵗時俱享于殿内其别葬者俱遣内官祭以牲醴嘉靖十七年始命併入各陵從祭祾恩殿之兩傍以紅紙牌書曰大明某宗皇帝第幾妃之位祭畢焚之隆慶六年改造木位刻列名號置各陵永逺從祀其世廟諸妃並遷祔永陵各置木位配享阿保諸夫人俱葬金山惟清明霜降遣内官以牲醴祭之其餘一用素饈太子諸王王妃公主葬懿文太子陵在孝陵之左祭如孝陵四孟嵗暮忌辰加牲焉孝陵祠祭署兼主之懐獻世子悼恭太子俱葬金山哀冲太子莊敬太子初俱葬金山後遷襖兒峪祔其母妃墓傍憲懐太子葬金山俱祭以牲醴遣内官行禮惟悼恭用素饈哀