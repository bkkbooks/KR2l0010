body:
  text: 禮部志稿卷三明俞汝楫編聖訓仁宗昭皇帝修省之訓洪熙元年正月以遇冬不雪勑六部等官曰朕以眇躬託於臣民之上憂憫元元勤於夙夜而自今迄冬雪不降來牟不遂吾農柰何夫二氣之乖由朕徳涼薄大臣與國同體爕理之助誠有賴焉朕方惕勵自省卿等亦懋修乃職用贊輔予庻以導召和氣康濟兆民夫愛民惟誠可以動天願共勉之欽哉毋忽賜鈔之訓洪熈元年正月上諭禮部尚書吕震曰遇節皇親例賜鈔在廷文武股肱之臣朝夕相與可否機務而有故不宴者即同踈逺小臣皆給節鈔五貫殆非朕禮大臣之道汝識之繼今遇節不宴者凢任事之臣公侯伯都督尚書賜鈔一千貫侍郎五百貫又諭震曰朝廷臣在任久者今皆令還鄉展省其得誥勑者足為家鄉之榮然到家有養祭賔客之費往還有道里之費計其在官俸禄廪給日用外有餘資者鮮矣自今歸者皆賜鈔公侯伯一品二品賜鈔五千貫三品四千貫四品三千貫五品二千貫六品七品一千貫八品以下皆五百貫著為令贈諡之訓洪熈元年正月禮部尚書吕震諭㫖翰林定金忠等諡賀銀預焉大學士楊士竒等覆奏上曰此數人皆在先朝盡心國事有徳行重厚表裏一致者有洊歴艱難始終一心者必旌褒之庶㡬禮賢忠厚之道但朕意未嘗及銀盖銀之勞可贈官而行不應美諡如加銀惡諡又反不如無諡古人制諡正為定論美惡以示至公卿等宜盡心奉先之訓洪熈元年八月勑諭禮部臣曰皇考大行皇帝聖徳神功追配太祖統御天下二十餘年恩徳在民萬世永賴皇嫓仁孝皇后母儀四海寅奉宗廟協隆化理而尊號未上無以稱朕孝思及天下臣民尊仰不忘之心其與羣臣定議請諡於南郊又勑禮部臣曰欽惟皇祖太祖高皇帝受命上天肇興皇業皇考太宗文皇帝中興宗社再奠寰區聖徳神功咸配天地易曰殷薦上帝以配祖考朕崇敬皇祖皇考永惟一心今年正月十五日大祀天地祇奉皇祖皇考配神仍著典章垂範萬世如勑奉行事神之訓洪熈元年正月以大祀南郊上御奉天門文武羣臣受誓戒畢進分獻官諭之曰事神之道豈獨臨事之際則致誠敬要其奉天子民之心積累於平日者皆已孚鬼神所以祭則受福朕以菲徳上承祖宗主典神天所與協恭承天休者公卿百執事也尚體朕心敬亮天工仁䘏斯民庶幾克享天心風雨順調年榖豐稔使斯民䝉福亦昭我君臣共事之美欽哉四月行在太常寺卿楊􅄎奏犧牲所見畜羊少請給鈔遣官於出產之處市買上曰能愛人而後可以事神朝廷事神之道豈當惜費比年有司不逹大體於市犧牲但凖洪武中價值凡物値隨時低昂豈有一定之理今民間諸物視洪武時值率増數十倍而祀神之物獨仍舊值民怨於下神其享乎自今供祀犧牲悉凖在京時值給鈔往市如於所產之處時值不足則就所在有不係贓罰鈔内補給畿内從廵按御史在外從按察司官監市毋致擾民洪熈元年十二月上諭禮部臣曰朝廷崇祀神祇悉有舊典主其事者當致䖍恭以祈嘉貺福黎庻頗聞天下郡邑應祀壇宇嵗久傾墊多不修治甚非昭事神明之道其飭有司修繕凡祭器祠宇並須堅緻潔淨所用物料悉出公幣毋斂民怨仍令廵按御史及按察司官以時㸃視違者罪之孝思之訓洪熈元年太子太保兼禮部尚書吕震奏冬至節請御正殿受賀上曰梓宫在殯山陵未終因時興慕哀慟愈切慶賀之禮豈所宜言勑免賀興學之訓洪熈元年十月禮部引郡縣嵗貢生奏送翰林院考試上召大學士楊士竒等諭曰朝廷所重安百姓而百姓不得䝉福者由牧守非人牧守非人由學校失教故嵗貢中古事不通道理不明十率七八此豈可授安民之寄自今宜戒因循之弊嚴考之本經四書義不在文詞之工拙但取有理致者如或難得即數百人中得一人亦可葢取之嚴則無濫學者不復萌僥倖之望而有嚮進之志矣又諭禮部臣曰太學聚天下之士教之以備任用盖因其已成而益充之今郡縣嵗貢生率記誦陳言以圖僥倖求其實學百無二三爾禮部宜勑有司督學官嚴訓誨必通經成材方得充貢盖學者先立根本學然後進充廣於太學若鄉學全未有成而望有成於國學有此理乎恤養之訓洪熙元年上諭禮部臣曰皇考臨御数詔有司存恤鰥寡郡邑皆有養濟院比聞率是文具居室敝壊肉粟布絮不以時給栖栖饑寒而守令漠不留意爾禮部即戒約之令謹視遍施實惠毋致失所赦宥之訓洪熙元年十一月上御札禮部尚書吕震曰建文中奸臣其正犯已悉受顯戮家屬初發教坊司錦衣衛浣衣局并習匠及功臣家為奴今有存者既經大赦可宥為民給還田土凡前為言事失當謫充軍者亦宥為民隆聖裔之訓洪熙元年禮部尚書呂震奏有㫖賜衍聖公孔縉彥一品金織衣衍聖公是二品如㫖賜之過上曰朝廷用孔子之道治家國天下今孔子之徒在官有一品服者孔子之後襲封承先師之祀服之何過且先帝時五品儒臣有賜二品服者亦何過哉其賜之用稱朕崇儒之意憫忠之訓洪熙元年三月上諭禮部尚書吕震曰往年劉儁從征交阯䧟於賊不屈而死禮官不言婦人盡節於夫有旌褒之典況大臣捐軀為國可不加褒䘏其贈儁為太子少傅令翰林定諡遣人祭之翰林奏諡儁節愍上歎曰忠臣之心皆欲立功報國不能成功則惟守忠義若身為大臣惟阿順取容為保禄固位之計國亦何賴懐逺之訓洪熙元年賜朝鮮國使臣孟思誠等鈔綵幣表裏金織羅衣絹衣有差上因諭行在禮部尚書吕震曰逺國朝貢固有常分然我祖宗以來待下素厚今朕即位之初凡事必循舊典勿失逺人之意交阯各府州縣儒學選貢生員王憲等八十二人至京師上諭行在禮部臣曰交阯京師萬里逺離親戚而來須是教養得宜彼乃樂學可望其成材爾與學官宜知朕此意其衣服嵗賜一如雲南之例宣宗章皇帝敬天之訓宣德元年正月以大祀天地上致齊武英殿命禮部太常習禮殿上諭曰祭享之禮莫嚴於此朕承大統躬祀天地為天下蒼生祈福不敢不敬卿等亦宜秉誠相朕庶㡬感通之道三月漷縣民充郊壇户者有司責令養官牛又俾充逓運夫民訴於朝上謂侍臣曰國家重祭祀而郊祀最重舊制郊壇户悉免他役者慮其不能專有司不知所重不恤民難可責也姑宥之遂命行在禮部申明郊壇户免雜役之令九月行在太常寺奏天地壇每嵗皆自十月撥軍掃除今已及時上曰祖宗敬事天地故立法如此朕念謹守成憲卿等亦當恭體此心躬親臨視務令潔淨祭祀之訓宣徳元年行在太常寺奏明年春郊祀及各壇祭祀犧牲請如例遣官齎鈔往保定及山西諸郡收買上諭之曰此奉天地神祇宜戒所遣官必加敬慎所市犧牲必依時值毋一毫損民茍有怨咨神不顧享舊制凡買祭物直𨽻移文廵按御史在外移文按察司官嚴督使無凟慢爾等勿違舊制庶㡬稱朕敬天地祖宗之意宣徳元年正月行在太常寺奏祭祀上諭之曰國家祭祀掌之禮部而復置太常尤重其事也卿等佐朕事天地事祖宗非他職事之比協恭同寅以承祀事朕盖有賴然必誠敬之心素有持養粢盛之薦極於精潔庶㡬神明歆格而生靈䝉福卿等勉之二月以初即位改元遣永康侯徐安等祭告祖陵皇陵及歴代帝王陵寝嶽鎮海瀆等神諭之曰列祖陵寝慶澤之源朕永念在心若名山大川鎮奠宇内及聖帝明王皆朕所向慕者今即位改元之初特命卿等往修祀禮孔子曰祭如在祭神如神在惟誠與敬其往慎之九月太常寺奏暮嵗孟春當享太廟而犧牲瘠小請於順天府預買餵飼以備用上從之諭府尹王驥曰祭享大事犧牲不成豈可以祭若􅊠價抑買人情不懌神亦不享爾宜慎之宣徳二年上退朝御左順門語及祭祀謂行在工部尚書呉中等曰南京造制帛祀神最為重事洪武中嘗選無過犯疾惡工匠更衣沐浴焚香浣手然後用工其人專供此役更無别差神宗重神之意謹嚴如此卿宜申明舊制務令精專無用䙝慢却慶賀之訓宣徳四年三月南京守備㐮城伯李隆獻騶虞二云出滁州來安縣石固山素質黒文馴狎不驚命羣臣觀之行在禮部尚書胡濙等請上表賀上曰禎祥之興必有實徳庶㡬副之朕嗣位今四年中外所任豈皆得人農畆豈皆有収民生豈皆得所朕夙夜不遑寧處騶虞之祥於徳勿類況天道無常理亂之幾恒相倚伏豈可不虞唐太宗嘗曰人君須至公理天堯舜在上百姓敬之如神明愛之如父母動作興事人皆樂之發號施令人皆恱之是大祥瑞此亦名言朕與卿等宜共謹之遂免賀七月廣東進白烏二行在禮部尚書胡濙具本入奏云考之瑞牒此皇上聖孝所感請率羣臣明旦上表賀御批荅曰祇敬祖考恭養聖母皆職分當然何徳之有感瑞之云良増慚愧夙夜祇念祖宗付託之重懼勿勝負荷惟賴爾文武羣臣同心同徳贊輔不逮溢美虗詞非所樂聞其止勿賀宣徳五年七月茂州守臣進瑞麥有一莖三穗五穗者時太廟之側產嘉禾有一莖四五穗至六七穗者禮部臣請表賀上曰瑞麥嘉禾固是豐年之慶但朕以菲徳居位且比來四方屡奏水旱可言賀耶然產於太廟側實天與祖宗神靈之所敷祐昔周人貽我來牟之詩必歸於先公之徳上帝之命朕何徳以致此其勿賀閏十二月行在欽天監奏含譽星見羣臣上表稱賀畢上諭羣臣曰表辭稱道過實朕甚愧之今海内初安皆由天地宗廟垂佑聖母皇太后訓教及羣臣匡輔所致朕何徳也書曰儆戒無虞詩曰夙夜敬止朕及卿等相與飭勵罔有怠心庻㡬保福禄於永逺宣徳七年八月陜西永夀等縣獻嘉禾有同本三莖或五莖莖十數穗穗一尺有餘者有同本十莖或二十莖莖十餘穗穗又多至数十穗者又有一莖五岐六岐或一節一岐者上覽之謂羣臣曰諸物不足為瑞榖以養民今蕃異如此可以為瑞是日又有獻嘉𤓰者尚書胡濙言𤓰連理而生有𤓰瓞綿逺之兆二者皆禎祥請奉表賀上不許曰嘉禾瑞𤓰雖年豐物阜之應皆天地宗廟之所垂佑朕何徳以致之夙夜内省有歉多矣其止勿賀抑祥瑞之訓宣徳元年八月魯王肇輝遣長史進瑞粟尚書吕震以為豐稔之應請上表賀上曰近日㡬内州縣屡奏水潦卿不聞乎朕方夙夜憂民艱食若以此為瑞則山東一隅之民可當之如他處何其止勿賀王所遣長史賚之遣還宣徳七年五月行在禮部尚書胡濙以山西進龍馬駒請偕羣臣上表賀上曰二三年間水旱告灾繼踵而來朕方日夕惕厲一獸之異何救民饑而欲表賀其止之宣徳八年閏八月蘇門荅剌及諸畨國來朝貢麒麟象馬諸物上受之行在禮部尚書胡濙以麒麟瑞物率羣臣稱賀上曰逺方之物朕非有愛但念其盡誠逺來故受之不足賀也㑹議之訓洪熈元年都督府吏左輔興州衛軍士譚瑛言驛站及民間糧稅養馬諸事上命行在禮部議尚書吕震對曰利民之事近皆舉行吏與軍率希求進用其言無足采者上曰聖人不棄蒭蕘之言前下詔凡軍民利病許諸人陳言朝廷但當察其言之當否不必計其人之貴賤其如例㑹官議果有可行者即與施行修省之訓宣徳五年八月朔日當食陰雨不見行在禮部尚書胡濙等以為即同不食請率羣臣上表賀上不許勑羣臣曰古者人君所謹莫大於天戒日食又天戒之大者惟能修徳行政用賢去邪而後當食不食朕以菲徳嗣承祖宗大統政理之未洽民生之未遂上累三光祇懼惟甚可比於是歟傳不云乎君子之過也如日月之食焉過也人皆見之更也人皆仰之今以陰雨不見得非朕昧於省過而然歟況離明照四方陰雲不見有限京師四方必有見者比之不食天可欺歟朕尚圖修省以仰荅天意尚勑爾羣臣匡其不逮其止勿賀宣徳五年行在禮部尚書胡濙言欽天監奏景星見臣考之占書天子至孝任賢使能海内歡恱制作合天法令清明則景星見今覩斯瑞實皇上聖徳海宇太平之應請偕文武羣臣上表賀上不許遂勑羣臣曰古之人有言時和嵗豐為上瑞今陰陽不和水旱為灾四方告饑不可勝紀朕每念天與祖宗付託之重内慚於心夙夜之間惓惓祇懼星文之瑞何救民饑而欲表賀哉聖賢之心惟徳是敬恒欽天以自度不因祥以自矜爾文武羣臣尚其夙夜同心同徳佐朕於理治政事者以安民為本典軍旅者以武備為重任刑法者以平恕為要敬慎行之毋怠庻用下慰四海生靈之顒望上荅天地宗廟之付託而吾君臣亦得同享無窮之美哉其止勿賀興學之訓宣徳元年十一月貴州鎮逺府奏本府新設儒學訓教生員期有成效請給廪膳以養人上曰邊郡開學教夷人若使自營口腹彼豈樂於為學凢貴州各府新設學校未與廪膳者皆與之宣徳二年四月行在禮部奏天下嵗貢生員考試不中發回原學肄業以待再試教官提調官如例責罰上曰此軰在學若府縣官勤於提督教官勤於訓誨未必無成泰山之溜可以逹石何況於人今上下偷安虗度日月是以臨文不知所措循例責罰薄示儆耳宜令内外風憲者程督之考其勤惰明示勸懲庶幾教學有成國家得用優太學生之訓宣徳元年行在禮部奏兩京國子監生多給還鄉經歴年久託故不來請遣人提問上曰古云才難諸生未及仕先負罪名即為終身之玷宜量地方逺近定與限期自移文到日為始交阯雲南貴州十閲月四川兩廣九閲月陜西福建七閲月山西湖廣六閲月江西浙江山東河南五閲月南京直𨽻四閲月祝得士之訓宣徳二年行在禮部尚書胡濙請以三月初一日臨軒䇿士上曰設科求賢國家大事昔之為君嘗有祝云願得忠孝之人以資國用今朕之心亦如此科試之訓洪熙元年行在禮部奏定科舉取士之額先是仁宗皇帝以為近年科舉太濫命禮部翰林院定議額數至是議奏凢鄉試取奏南京國子監及南直隸共八十人北京國子監及北直隸共五十人江西布政司五十人浙江福建各四十五人湖廣廣東各四十人河南四川各三十五人陜西山西山東各三十人廣西二十人雲南交阯各十人貴州所屬有願試者於湖廣就試禮部㑹試所取不過百人上曰南士取十之六北士十之四大扺國家設科取士為致治之本其冒貢非才盖是有司之過人既茍得遂啓倖心今解額已定果行之以公不才者不得濫進自然人知務學其令各處凢考試官及諸執事先須擇賢庶免冒濫䇿士之訓宣徳五年三月上臨軒發策畢退御武英殿謂翰林儒臣曰朕於此取士不尚虗文欲得忠鯁之士為用其間有若劉蕡蘇轍軰能直言抗論庶㡬所望朕當顯庸之於是賦策士歌以示諸讀卷官云纂修之訓宣徳元年上御奉天門謂行在禮部尚書胡濙曰纂修實録國家重事自古帝王功徳傳之萬世只慿史書祖宗以來多有徳政在天下皆須紀載今内外諸司尚有未奏來者是不體朕心爾禮部移文趣之藉田之訓宣徳元年上觀藉田畢謂侍臣曰先王制藉田以奉粢盛以率天下務農天子公卿躬秉耒耜所貴有實心耳為人君誠體祖宗之心念創業艱難愛恤蒼生使明徳至治達於神明則黍稷之薦不徒親耕矣農民勤苦終嵗不免於饑寒國家輕徭薄斂使之以時而貴農重穀禁止㳺食則人咸趨耕種不徒勸率之矣不然三推五推何益於時侍臣對曰先王制禮有本有文陛下之言及此宗社蒼生之福也旌表之訓宣徳元年禮部尚書胡濙列趙巖權謹孝行節婦王氏吉氏等奏乞旌表上諭之曰孝者人道當然賢智之人不待勸勉中人以下須激勵乃能為善旌表之意盖如此若權謹則朕所知質實人也宜旌之使人見而思奮其於治道豈不有益勉禮職之訓宣徳二年上諭行在禮部臣曰朕惟聖人興禮樂以昭神化以正民彛致治之道於斯為盛朕以菲徳仰承祖宗賦畀之重主典神天表正萬邦而禮樂尤為切要尚體予懐以諧爾職惟致敬可以格天地享鬼神爾弼成之天下國家之本在身正心以正朝廷百官萬民爾弼成之期於明徳至治洞逹幽明天地以位萬物以育九有寧謐四夷咸賓則我國家祚隆萬世爾亦有聞於永久至若學校之政所以立敎興賢必求其實效旌表孝節所以激勵風俗必求其實行尚率乃屬夙夜匪懈用圖成績以昭我國家文明之盛毋循習舊弊廢事瘝官以負朕寵任之意欽此採建言之訓宣徳二年行在禮部奏官民建言請同六部尚書都御史六科給事中㑹議以聞上曰致理之道莫先於廣言路盖天下之大吏治得失民生休戚人不言朝廷何由悉知古人謂明王視天下猶一堂滿飲酒一人對隅而泣則一座為之不樂若令天下有匹夫匹婦不得其所實為君徳之累凢有建言民瘼者卿等勿諱言或激切亦其心發於忠若以其言激切而棄之孰肻進言卿等宜悉此意凡言之善者即以聞庻㡬有補於治又曰大臣輔君為治貴有以來天下之善而不恃一己之能卿等勉之行在禮部尚書胡濙等奏近磁州判官張僎等及耆民四十人各言郡縣官吏軍民利病凡二百餘事有㫖令臣等㑹議臣等詳其所言有益於民可行者八十事乞賜施行其間有告訐人罪及奏牘不書名不稱臣并錯誤者請逮治之上謂濙曰民之休戚朕所欲聞其假建言為名告訐者付法司治不謹及錯誤者皆不足較較之即言者不至矣申禮教之訓宣徳二年行在通政使司奏刑部嵗問罪囚数萬餘應死者六百餘人上謂行在禮部尚書胡濙等曰唐虞成周刑措不用朕每以此自期今百姓輕於犯法如此盖由教化未至卿等宜申明教化使禮譲興行風俗淳美庻幾有成濙等頓首受命恤民之訓宣徳二年行在禮部奏太嶽太和山宫觀所用降真諸香每三嵗七十斤例於湖廣廣東買用上曰買於民間豈不倍加科擾朕初嗣位未有恩惠及民此事姑止其於京庫支用禮制之訓宣徳四年二月上視朝罷御左順門諭行在禮部尚書胡濙曰朝廷之禮最先正名尊卑等級不可僭差凡内外官員士庶服飾儀從序立及尊卑稱呼之類皆有定制近多越禮犯分亦有在内府私行揖拜禮者其揭榜申明定制無使僭越禮禁之訓宣徳四年上諭行在禮部尚書胡濙曰祖宗時文武官之家不得挾妓飲宴近聞大小官私家飲酒輒命妓歌唱沉酣終日怠廢政事甚者留宿敗禮壊俗爾禮部揭榜禁約再犯者必罪之飭訓導之訓宣徳三年上御左順門謂行在禮部尚書胡濙等曰昨日廣宗縣奏訓導生員囑公事通賄賂朕已令法司逮問朝廷建學養士望其成才以資任用訓導居師表之任正當謹守法禮以率諸生使人皆如此賢才何用得成卿等宜申明舊章嚴加戒飭以副朝廷教養之意禁閹之訓宣徳元年行在禮部奏山東有自宫以求用者請如例發交趾充軍縁先奉仁宗皇帝聖㫖有犯此者其所屬里老亦不得無罪請令法司逮問之上曰先帝深懲此事故嚴其令近來犯者亦少里老可宥之但申明舊禁使知遵守宣徳二年七月上視朝罷御左順門諭禮部尚書胡濙曰昔皇考在位禁止自宫之人謂其毁傷父母遺體最是不孝凡有此等皆發充軍朕遵承先志亦嘗援例發遣比者小人復有冒犯盖縁不知故爾妄作孔子曰示之以好惡而民知禁卿宜出榜徧諭天下使知遵守選舉之訓宣徳七年四月應天府奏請鄉試同考官乞命兵部給脚力上從之顧謂禮部尚書胡濙等曰考官取士但據文章不悖經意即可充選然應舉之人皆憑學校有司保送其人果孝弟忠信而又通今博古科目取之足為世用若徳行不修而徒有文辭亦終無益考官須是學問老成心術正大之士不然亦能顛倒是非卿等宜申明朕意亦使知慎恤灾之訓宣徳五年四月易州奏蝗蝻生上謂右都御史顧左曰今禾苖方生宿麥未茂而蝗蝻為灾若不早捕民食無望即選賢能御史往督有司發民併力撲捕初發撲之則易若稍緩之即為害不細六月永平等衛及河間府静海等縣奏蝗蝻生尚書郭敦請遣官徃捕上從之曰遣官之際亦須戒飭頗聞往年朝廷遣人督捕蝗者貪酷害人不減於蝗卿等須知此弊是日晩出御製捕蝗詩示敦等曰蝗之為患此詩備矣卿遣人往捕當如救焚拯溺不可緩也朝貢之訓宣徳元年二月朝鮮國王李祹遣陪臣尹須彌等奉表貢方物謝恩先是朝鮮所獻方物有金物龍頭盞之屬上謂侍臣曰朝鮮進貢頻數每有金銀器皿小國措辦必難宜止之遂勑祹曰金玉非爾國所產自今貢獻惟以土物效誠而已祹感恱至是遣須彌等奉表謝宣徳五年上諭行在禮部臣曰聞西南諸畨進貢海舟初到有司封識遣人入奏俟有命然後開封起運使人留彼動經數月供給皆出於民所費多矣其令廣東福建淅江三司今後畨舡至有司遣人馳奏不必待報三司官即同市舶司秤􅐻明注文籍遣官同使人運送至京庻省民間供饋宣徳七年十一月朝鮮國王李祹遣陪臣趙琠金王振等貢醃松菌及鷹上諭行在禮部臣曰朝鮮貢獻頻數已非朕所欲今又獻松菌及鷹菌食物也鷹何所用珍禽竒獸古人所戒可諭其使自今所貢但服食器用之物若鷹犬之類更勿進獻懐逺之訓宣徳元年六月衛喇特部屬伊蘇巴哈等歸禮部奏定賞例上曰逺人慕義舉家來歸撫之當厚布尼雅錫哩乃彼故主今其妻亦逺來名分不同恩亦當異其别與好第宅於是各賜金織襲衣綵幣銀紗鞍馬有差宣徳元年六月遣使賜琉球國中山王尚已志皮弁冠服上謂禮部尚書曰逺夷歸誠固是美事特賜冠服亦表異恩古人言招携以禮懐逺以徳朕與卿等尤當念之十月遣使以五經四書及性理大全通鑑綱目賜朝鮮國王李祹上謂行在禮部尚書胡濙曰聖人之道與前代得失俱在此書有天下國家者不可不讀聞祹勤學朕故賜之若使小國之民得蒙其惠亦朕心所樂也宣徳二年白葛達國使臣和者里一思等陛辭上謂尚書胡濙曰天氣漸寒海道遼逺正副使各加賜路費鈔三千貫及錦衣一襲頭目從人俱加賜鈔及衣服靴襪給度牒之訓宣徳元年上罷朝御右順門謂行在禮部尚書胡濙曰今僧道行童請給度牒甚多中間豈無有罪之人潛隠其中者宜令科道官取勘如果無之爾禮部同翰林院官禮科給事中及僧道官同考試能通大經則給與度牒在七月十九日以後及不通經者皆不給禁出家之訓宣徳五年行在禮部尚書胡濙言總兵官都督譚廣於宣府建彌陀寺朝𤣥觀請度官軍之家幼童為僧道初見洪武中不許軍匠灶站違碍之人出家今廣所言非舊制上曰宣府邉地官軍家屬正當勤耕稼精武藝固封守以攘外夷為僧道何益昔南唐時曺儉攻城急城中盡召諸僧令與軍民皆誦佛救䕶竟不免敗亡此事是為明戒况祖宗舊制其可違乎若寺觀已完欲僧守之則於他郡邑分與之禮部志稿卷三
