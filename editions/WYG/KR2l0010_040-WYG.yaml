body:
  text: 禮部志稿卷四十明俞汝楫編精膳司職掌下程王國下程凡親王之國永樂間厨料醬一百觔香油五十觔椒二十觔乾魚一百觔醃羊一隻子鱭魚四十觔醃猪一口醃鵞一隻醃鹿一隻醃麂二隻醃雞九隻白麪一百觔茶芽五觔茶葉二十觔醬𤓰四十條黒砂糖十觔藕煎五觔木𤓰湯煎五觔醬茄一百五十個醋蒜三百箇酒五十瓶醋二十瓶芝麻一石糖茄一百五十箇米三石宣德間仍加猪二十口羊二十隻酒一百瓶成化間令經過有司去處送鵞二隻時新菜蔬供用凡王來朝洪熈元年靖江王府輔國將軍來朝欽賜羊十隻鵞十隻雞二十隻酒一百瓶米四石果子五色茶食五般柴三百觔蔬菜厨料又靖江王府奉國將軍來朝欽賜羊五隻鵞五隻雞十隻酒十五瓶米二石果子五色茶食五般柴一百五十觔蔬菜厨料宣德間趙世子安陽王來朝欽賜羊三隻鵞三隻雞六隻酒三瓶米一石五斗柴四百觔蔬菜厨料天順元年襄王來朝囘還沿途飯膳厨料并祗待隨從内外官校人等經過軍衞有司量給供用今題准不必親來朝賀凡各王府差來人員常例下程一次鵞二隻雞二隻酒五瓶米五斗蔬菜厨料衍聖公張眞人下程洪武二十六年鵞二隻麪一十五觔酒四瓶茶醬鹽各一觔燭一十枝洪熙元年衍聖公進表赴京欽賜羊一隻鵞三隻酒十瓶麪二十五觔茶鹽醬各二觔油燭二十枝宣德四年衍聖公張眞人到京欽賜羊一隻鵝二隻酒六瓶麪二十觔茶鹽醬各二觔油燭十枝自後俱照此例舊屬膳部辦送今皆行順天府辦番夷土官使臣下程凡諸番國及四夷土官使臣人等進貢等項到㑹同館俱有常例并欽賜下程禮部奏准通行光祿寺支送其欽賜下程一次者仍支常例下程或五日十日一次者常例下程住支若已經賞兩月之外囘還者住支下程凡送夷人下程光祿寺差屬官一員管押至㑹同館主事驗給隆慶元年題准凡四夷貢使領賞五日後遲留不行者光祿寺住支下程本部將伴送人員叅治常例下程洪武二十六年五日每正一名猪肉二觔八兩乾魚一觔四兩酒一瓶麪二觔鹽醬各二兩茶油各一兩花椒三錢五分燭每房五枝以上下程若奉㫖優待不拘此例又每人日支肉半觔酒半瓶米一升蔬菜厨料欽賜下程朝鮮國安南國占城國琉球國𤓰哇國暹羅國各下程一次朝鮮等國每五人琉球國每十人羊鵝雞各一隻酒十瓶米五斗蔬菜厨料朝鮮國加果子茶食各四般柴炭各二百觔暹羅國加酒十瓶正統六年占城王孫等二十三人下程牛二隻羊四隻鵝四隻雞十隻酒四十瓶米二石蔬菜厨料天順四年占城王族下程與王孫同但減牛一隻嘉靖二十二年安南都統使司差來人員下程減舊例三分之一萬厯四年題准朝鮮琉球暹羅安南差來使臣下程除欽賜及常例日支外每三人五日加給鵝一隻雞二隻酒四瓶米一斗果子五觔隨從人等概不加給尼嚕罕都督下程一次每一人鵞一隻雞二隻酒二瓶米二斗麪二觔果子四色蔬菜厨料下程限數日本國滿剌加國錫蘭山國諾延三衞哈密衛拉特額爾巴拉賽瑪爾堪土魯番哈喇蘓門答剌伊伯格勒實巴爾戎地靣海蘭宻實勒博囉罕衞和囉海衞瑪摩回回蘓勒坦罕都衞鄂端地面迤北納古爾魯爾天方各五日下程一次每十人羊鵝雞各一隻鄂端地面減鵝雞酒二十五瓶哈喇納古爾各減五瓶米五斗麪十二觔八兩果子一斗蘇門答剌納古爾各果子四色燒餅二十個糖餅二十個宻實勒海蘭減一十個蘇門答剌加十個納古爾減餅蔬菜厨料嘉靖十二年題准哈密衞貢使三十四名每五日與羊六隻折去雞鵝賽瑪爾罕貢使除五十五名正數外餘人每五名十日與羊一隻二十二年題准哈密國人每五人五日與羊一隻鵝一隻雞一隻及米麪酒等物二十七年題准哈密伴送下程照夷使例給雲南土官十日下程一次每十人鵝羊雞各一隻送牛肉地方每人牛肉二觔半送糯米地方每人糯米一斗酒二十五瓶果子四色蔬菜厨料嘉靖十九年奏准八百大甸頭目三十一人每五日一次牛肉七十七觔八兩雞鵝各三隻酒八十瓶糯米一石一斗五升蔬菜厨料榜葛剌國下程一次每五人羊鵝雞各一隻酒十瓶米五斗麪十觔果子四色蔬菜厨料實喇烏蘓宣德間使臣八人五日下程一次羊鵝雞各二隻酒二十瓶米四斗麪二十五觔燒餅八十個果子十五觔蔬菜厨料納木扎勒罕王永樂間使臣十人三日下程一次羊五隻鵝四隻雞十隻酒三十瓶米一石麪一百觔果子五斗燒餅一百個糖餅六十個蔬菜厨料頭目等十六人三日下程一次羊四隻鵝三隻雞四隻酒二十瓶米七斗麪五十觔果子四斗燒餅八十個糖餅三十個蔬菜厨料和卓永樂間使臣二十五人五日下程一次羊四隻鵝一隻雞四隻酒十五瓶麪三十觔米一石餅一百三十五個果子四斗蔬菜厨料養獅豹囘囘永樂間使臣九人每日下程一次羊一隻鵝一隻雞一隻酒十瓶米三斗麪五十觔餅五十個拉卓卜地面使臣五十人五日下程一次羊七隻鵝六隻雞十隻酒一百三十瓶米二石麪一百五十觔果子一石餅二百五十個蔬菜厨料伊斯帕罕永樂間使臣四十四人每日下程一次羊八隻鵝三隻雞十隻酒三十瓶麪八十觔米一石果子六斗餅二百個蔬菜厨料浡泥國永樂間使臣二十一人三日下程一次羊二隻鵝四隻雞八隻酒二十瓶米一石麪二十觔果子四色蔬菜厨料洪熈間使臣三十六人三日下程一次羊五隻雞二十隻鵝十隻酒十瓶米二石麪七十觔果子五般每般十觔鹽五觔醬三觔花椒一觔香油四觔醋四瓶茶二觔蔬菜厨料阿克蘓地面永樂間使臣一百十二人三日下程一次羊八隻鵝四隻雞八隻酒一百四十瓶米二石五斗麪一百五十觔果子四色燒餅一百二十個蔬菜厨料竒爾瑪勒部永樂間使臣十一人五日下程一次羊二隻鵝二隻雞四隻酒十瓶麪三十觔米一石餅六十個果子二斗蔬菜厨料薩哈勒永樂間使臣七十七人每日下程一次羊十二隻鵝四隻雞十四隻酒五十瓶米一石五斗果子一石麪一百二十觔燒餅二百箇糖餅一般蔬菜厨料和爾黙色永樂間使臣十四人三日下程一次羊三隻鵝三隻雞四隻酒十五瓶麪四十觔米一石餅八十箇果子四斗蔬菜厨料㧞達克山永樂間使臣四十人每日下程一次羊二隻鵝二隻雞五隻酒二十瓶米五斗麪二十觔果子一斗燒餅四十箇糖餅四十箇密二觔蔬菜厨料三日一次添送羊一隻鵝一隻雞二隻米五斗柳陳城五日下程一次每十人羊鵝雞各一隻酒七瓶麪十五觔米五斗果子五斗餅四十箇蔬菜厨料竒爾愛滿五日下程一次每十人羊鵝雞各一隻酒二十二瓶麪十五觔米五斗果子二斗餅五十箇蔬菜厨料瑪哈穆特王永樂間使臣十三人五日下程一次羊六隻雞十隻酒二十五瓶麪一百觔米一石餅一百六十箇果子七斗蔬菜厨料頭目六人羊四隻雞四隻鵝三隻酒二十瓶麪八十觔米一石餅一百五十箇果子六斗蔬菜厨料甘巴里國柯枝國永樂間使臣各六人三日下程一次羊一隻鵝二隻雞四隻酒十瓶麪二十觔米五斗果子四色蔬菜厨料布斯格爾永樂間使臣十六人每日下程一次羊二隻鵝二隻雞四隻酒十瓶果子二斗米四斗麪二十觔餅六十箇糖餅一般蔬菜厨料果勒國永樂間使臣十八人三日下程一次羊二隻鵝四隻雞八隻酒二十瓶米一石麪三十觔果子四色蔬菜厨料逹爾瑪永樂間使臣十八人五日下程一次羊二隻鵝二隻雞四隻酒十瓶麪三十觔米一石果子二斗餅六十箇蔬菜厨料敏眞城等處永樂間使臣四十人下程一次羊三隻鵝一隻雞二隻酒四十瓶米一石五斗麪四十觔果子二斗燒餅五十箇糖餅四十箇蔬菜厨料諾爾布十日下程一次每五人羊鵝雞各一隻酒十瓶米五斗麪十六觔果子四色蔬菜厨料安定王十日下程一次每十人羊一隻鵝四隻雞八隻酒五十瓶米一石麪二十五觔果子四色蔬菜厨料哈坦國宣德間使臣四人三日下程一次羊鵝雞各一隻米三斗麪十觔酒五瓶果子四色餅二十箇蔬菜厨料多爾濟巴勒正統間使臣四人十日下程一次羊一隻鵝雞各二隻米四斗麪十觔果子一升燒餅二十箇蔬菜厨料左法兒國宣德間使臣四人三日下程一次羊鵝雞各一隻米三斗麪十五觔酒六瓶果子四色餅三十箇蔬菜厨料察遜衞宣德間使臣七人五日下程一次羊鵝各一隻雞三隻米三斗酒二十瓶麪十五觔果子四色蔬菜厨料正統間使臣二人十日下程一次羊一隻酒十瓶麪五觔米二斗果子四色燒餅糖餅各八箇蔬菜厨料天方國嘉裕爾國宣德間使臣各二人三日下程一次羊鵝各一隻米二斗麪十觔酒三瓶果子四色餅二十箇蔬菜厨料和卓衞正統間使臣四人五日下程一次羊鵝各一隻雞二隻酒十瓶米二斗麪五觔果子四色蔬菜厨料喀什噶爾宣德間使臣十四人三日下程一次羊鵝各二隻雞二隻酒二十一瓶米四斗二升麪二十一觔果子一斗四升蜜一觔餅四十五箇蔬菜厨料齊勤䝉古衞天順間使臣四人五日下程一次鵝二隻雞四隻酒八瓶米八斗麪八觔果子四色蔬菜厨料眞臘國十日下程一次每十人羊鵝雞各二隻酒二十瓶米一石五斗蔬菜厨料哈克達國使臣十一人三日下程一次羊一隻鵝二隻雞四隻酒十七瓶米四斗麪十五觔果子四色蔬菜厨料日落國烏梁海哈里等處都指揮等官呼爾察烏斯藏等處喇嘛番僧蘓祿王尚師法王婆羅門格旺結討來思竒木嘉色稜各止支常例下程土官番僧人等無闗文者不支廩給下程二例凡使臣進貢沿途闗支廩給口糧囘還亦如之惟朝鮮占城琉球𤓰哇暹羅滿剌加日本錫蘭山迤北哈密衞拉特賽瑪爾堪土魯番使臣囘還沿途除廩給口糧外仍日支下程一處朝鮮等八國并迤北每人肉半觔酒半瓶哈密等每十人羊一隻酒二瓶半宣德七年令實喇烏蘓等處使臣囬到甘州月送羊酒半年之外止支本等廩給口糧正統三年令衞拉特使臣停止去處每十人五日一次羊二隻酒十五瓶柴薪厨料嘉靖二十八年奏准哈密每五人日支羊一隻酒二瓶半凡各國番王王親頭目人等朝貢到於福建廣東等處宣德二年令除筵宴及本等口糧廩給外日用下程番王每人雞二隻肉二觔酒一瓶柴薪厨料王親每人肉一觔酒一瓶柴薪厨料使臣頭目每人肉半觔酒半瓶柴薪厨料番伴女使人等止支口糧柴薪凡諸畨進貢及囘至該布政司成化十九年令限二十日内照例茶飯管待起程如過期及中途無故停止一日之上者廩給住支凡投降畨人正德元年令每名日支常例下程牛肉半觔酒半瓶米一升蔬菜厨料凡各國漂流及擒獲畨人嘉靖四十五年題准令到館照依投降畨人事例給日支下程厨役王府典膳厨役附厨役𨽻光祿寺者以給膳羞𨽻太常寺者以供祭祀累朝因事増加名數太濫今皆清查著有定額光祿寺厨役凡光祿寺厨役洪武二十六年定凡選取各項厨役或事故新僉光祿寺具呈本部照數類行各處選取精壯慣熟無過犯殘疾之人起送到部轉發光祿寺著役若有厨役病故遺下家小呈送到部劄付應天府給引今劄順天府或遞囘送還原籍𢎞治間定光祿寺厨役起送來京者有司將當房妻小給與口糧脚力紅船告補者遇有弟男等項禮部查勘明白發寺替補告老疾無丁代替者本部先送光祿寺勘驗明白取其該署官吏人等不扶結狀繳部覆審無碍具奏類送順天府給引照囘免其雜泛差役仍行有司僉補逃厨兒男告補者本部行勘明白暫令補役正名自首仍行文替出在逃三月之外者叅送法司問罪送囘轉發著役三月之内免送問隨發著役在逃三次者依律責罰畢仍發