王府民厨退囘原籍當差止撥軍厨應役如無䕶衞儀衞司去處照舊其撥用後不許分外科擾致令消乏累民僉補該衙門如有占恡民厨不行退革及科擾各項厨役者并輔導官治罪嘉靖二年題准新封郡王照例撥給軍厨四名其有奏討民厨者不准九年題准王府新封應僉及逃故老疾厨役除有䕶衞儀衞司去處照舊僉撥軍厨外其無䕶衞儀衞司例該僉撥民厨者俱照民校事例每名每年於均徭内帯徵銀一十二兩類觧布政司轉發該府長史司雇人應役三十一年題准各王府郡王無䕶衞儀衞司者許從實具奏撥與民厨二名每名徵銀十兩給散雇役近例見儀制司王國禮牲口牲口屬禮部歲𣲖各省府州例有定數皆類觧光祿寺有徵折價者即貯該寺庫中收買應用其㑹試供給折價觧順天府光祿寺牲額凡歲𣲖徵觧光祿寺牲口十萬隻口上半年五萬隻口下半年五萬隻口俱行浙江等布政司兩直𨽻各府𣲖屬徵觧成化四年奏准浙江江西湖廣福建應天廬鳳等府州俱觧折色定與價例每猪一口銀一兩七錢羊一隻銀一兩鵝一隻銀三錢雞一隻銀七分河南山東山西陜西淮揚二府徐州及北直𨽻仍觧本色猪羊雞鵝惟祭猪每口折徵價銀五口祭羊每隻徵價銀六兩即大尾綿羯羊山西順天真定仍觧本色祭羊𢎞治二年奏准山西并二府祭羊亦折徵價銀四兩嘉靖七年奏准河南等處順天等府通折徵價銀每猪一口銀一兩九錢五分羊一隻銀七錢五分鵝一隻銀三錢雞一隻銀七分通行光祿寺貯庫收買應用凡徵價限數祭猪一百六十口河南三十八口山東三十二口保定府八口大名府八口永平府十口廣平府八口順德府六口揚州府十四口淮安府十六口真定府十四口徐州六口祭羊二百五十隻河南十隻陜西三十四隻山東三十四隻山西三十八隻順天府四隻真定府十六隻保定府十二隻河間府十隻大名府十六隻永平府八隻廣平府十二隻順德府十隻揚州府十六隻淮安府二十隻徐州十隻肥猪一萬八千九百口河南一千八十口山東一千一百六十口保定府三百一十六口河間府二百七十六口大名府二百七十六口永平府二百八十六口廣平府二百二十口順德府二百三十口揚州府五百一十口淮安府七百一十口真定府三百八十六口徐州二百二十口順天府二百七十口浙江一千八百二十口江西一千五百五十口湖廣一千二百四十口福建一千三百二十口應天府四百四十口廬州府四百口安慶府四百口鳳陽府三百一十口寧國府四百五十口徽州府六百八十口池州府二百口太平府二百六十口蘓州府一千二十口松江府七百四十口鎮江府七百二十口常州府九百口廣德州二百八十口和州一百五十口滁州八十口綿羯羊一萬七百五十隻河南五百四十二隻陜西二千四百六隻山東一千三百六十六隻山西二千六百五十六隻保定府三百二十二隻河間府三百二隻大名府三百二十四隻永平府三百二隻廣平府二百八十二隻順德府二百二隻揚州府三百四隻淮安府三百三十四隻真定府四百四十四隻徐州府一百四十二隻順天府一百二十二隻應天府二百隻廬州府一百八十隻安慶府一百七十隻鳳陽府一百五十隻鵝三萬二千四十隻河南二千二百八十隻山東一千七百隻保定府四百九十隻河間府三百五十隻大名府五百隻永平府四百二十隻廣卒府四百六十隻順德府五百七十隻揚州府一千四百四十隻淮安府一千五百六十隻真定府七百四十隻徐州府六百六十隻順天府六百五十隻浙江四千八百二十隻江西四千七百四十隻湖廣一千二百隻福建一千二百隻應天府二千隻寧國府九百二十隻徽州府一千一百隻池州府六百二十隻太平府六百八十隻蘇州府八百二十隻鎮江府五百九十隻常州府六百九十隻松江府八百四十隻雞三萬七千九百隻河南五千三百二十隻山東二千九百隻保定府三千一百四十隻河間府二千隻大名府二千五百八十隻永平府二千六百隻廣平府二千一百八十隻順德府二千一百三十隻揚州府三千三百隻淮安府四千一百九十隻真定府三千二百隻徐州府七百六十隻順天府二千六百隻浙江六千隻江西六千隻湖廣四百隻福建三百四十隻應天府六十隻徽州府四十隻蘓州府四十隻純色牛犢四十隻順天府五隻真定府八隻保定府六隻大名府六隻廣平府四隻順德府四隻河間府四隻永平府三隻先年光祿寺奏准奉先殿等祭祀缺少純色牛犢禮部行𣲖順天等府三年二次觧納共四十隻嘉靖七年奏准每牛犢一隻折徵銀五兩觧寺貯庫收買供用凡加𣲖徵觧嘉靖三十二年題准每年加𣲖牲口銀二萬四千九百七十八兩一分二釐九毫分𣲖各省并直𨽻府州至四十一年户部奏該寺錢糧見已充裕將加𣲖銀兩改納太倉以濟邊儲順天府牲額凡㑹試天下舉人入院出院管待茶飯并内外簾官舉人巡綽官軍人等飯饌合用牲口俱坐𣲖直𨽻各府猪四十三口永平府五口真定府十口保定府九口大名府九口廣平府五口順德府五口羊五十三隻永平府五隻真定府十一隻保定府十一隻大名府十隻廣平府九隻順德府七隻鵝八十一隻永平府十隻真定府十九隻保定府十三隻大名府十九隻廣平府十隻順德府十隻雞一千五十隻永平府一百二十隻真定府二百四十六隻保定府二百四十六隻大名府二百四十六隻廣平府九十六隻順德府九十六隻乾魚二千五百觔俱河間府出辦𢎞治七年題准永平等府供用不敷行浙江等處九布政司并應天府共徵銀九百兩責行本處司府朝覲官吏齎觧到部送儀制司轉發順天府收貯待用隆慶元年題准㑹試諸費實該銀一千八百六十一兩五錢四分除額徵牲口等價并各省觧到前銀止共一千一百九十九兩其餘於順天府貯庫舖行銀内動支六百六十二兩五錢四分補足前數後為定例藏氷凡藏氷洪武二十六年定每歲氷結之時禮部堂上官預先奏聞膳司官赴内官監闗支鑰匙錦衣衞差撥力士或工部差撥脚夫各備器具赴正陽門外打掃氷窖就令户部闗撥新觧稻草并蘆蓆襯墊完備伺候氷凍揀擇潔淨去處取氷節次挑赴氷窖内如法收藏封鎖將鑰匙送赴内官監仍移付祠部照例祭祀著軍人看守以備應用凡内府氷窖收藏氷雪係内官監官自行提調合用襯墊蘆蓆稻草禮部照例移咨户部依數支撥就差人送内府氷窖處所交收器皿凡宴享合用一切器皿洪武二十六年定光祿寺開呈禮部移咨工部照數造完轉發光祿寺收用舊宴享器皿各歲器皿厰造一萬件發光祿寺收用今祭享等器皿兩京工部歲造共一萬二千件用尚不敷奏准工部歲給光祿寺銀二千兩相兼造用行移本司有勘合科凡行移洪武二十六年定凡有一應行移在外事務儀制等四司各開事件移付通具印信手本赴禮科闗填勘合照㑹各布政司并劄付直𨽻府州照依坐去勘合内事件轉行所屬作急理辦如有違悞不完仍行催督每於年終各該有司分豁巳未完結事件連原填去勘合張數造冊差人親齎奏謝仍用備細開報本部以憑查銷其填寫勘合禮部照依地方編寫字號内外底簿二扇并勘合字號紙編寫畢押印完備外號底簿發去各布政司并直𨽻府州收掌内號底簿并勘合號紙禮部收貯候儀制等四司凡有一應行移在外事務移付本司發勘合科填寫號紙照㑹各布政司并劄付直𨽻府州付通政司掛號送兵部車駕司轉發司府州比對硃墨字號相同施行如號紙盡絶照字號接編如前各該司府州候年終將發去勘合并底簿折粘具本奏繳仍具清冊一本送禮部查考勘合字號浙江以字江西准字陜西誠字廣東及字廣西即字河南正字湖廣各字雲南若字貴州柔字山東格字山西致字四川其字福建皆字安慶府能字松江府賢字蘇州府功字淮安府平字鳳陽府修字廬州府勤字保定府雨字應天府雲字揚州府齊字河間府露字徽州府貴字寧國府原字真定府騰字順德府麗字常州府故字池州府亨字大名府結字永平府金字廣平府霜字鎮江府親字太平府賔字保安州岡字滁州官字徐州治字隆慶州崐字今延慶廣德州列字和州利字萬厯二年議准凡宗藩勘合許各王府差來員役執批告領本司騐批給發即於封袋上填註發行月日及姓名限期仍置立文簿登記其山東河南山西陜西湖廣每季終江西廣西四川每上下半年將發過公文號數領齎日期人役姓名通行各布政司知㑹各布政司亦照所議奉到勘合將𦂳要節畧攢造文冊報部其年終奏繳仍舊司務㕔職掌聖諭勅曰合衙門司務二員坐㕔東南上面西將守籍吏二名終日在堂專管紀載本衙門出入文書隨即附簿騐其應速者速應遲者遲明白勾銷書註或字有差錯不許塗抹於傍圈註逐日紀載事件至晩計定行數字數庻便稽考若事有可速者而遲之躭悞公事矣若可遲者速之事多不當矣惟允異斷庻無後艱司務之設職專職重其所練磨也卷出非常若勤於督責精於銷註使合衙門官吏皆不入刑憲之所其司務之才能也稱堂上之任矣又何考試之亹亹故勅洪武二十六年十二月日諭六部都察院諸大臣曰頃者朕以各部案牘填委往往淹積不行吏緣為奸事愈浩繁於是各設司務職專紀其出入督其稽滯而察其奸弊不旬日間事多完集今在外布政司按察司并各府亦宜設照磨檢較如司務之職萬厯三十四年署部左侍郎李某堂規示司㕔三欵一投文每日投文堂上標到送㕔該㕔即刻分發各司查行其批􅂞該發者立刻發領毋得遲留以杜需索之弊一舉貢到部嵗貢并㑹試舉人大堂投文司務㕔㸃名訖即赴儀制司查銷批引俱於本日急速打發以省伺候示體恤一開印酒席先年每開印司務㕔設席待四司而司務㕔原無錢糧乃取辦於承發二吏吏何從辦弊可知也今革訖并承發每年例送内府紙銀九次俱三堂不受袱銀代出欲責其守法理當如此禮部志稿卷四十
