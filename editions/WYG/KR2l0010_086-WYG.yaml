body:
  text: 禮部志稿卷八十六明俞汝楫編國䘏備考皇帝喪禮洪熈年行永樂二十二年八月文皇帝崩太子以下至諸王公主斬衰三年如洪武儀在京文武官聞喪之明日詣思善門外哭次於本署不飲酒食肉四日具斬衰服詣思善門外朝夕哭臨三日又朝臨十日各十五舉聲衰服二十七日凡入朝及視事白布裹紗帽垂帶素服腰絰麻鞋退服衰服二十七日之外素服烏紗帽黒角帶二十七月而除聴選官人才監生吏典僧道諸人素服赴順天府朝夕哭臨三日十五舉聲素服二十七日而除凡音樂祭祀輟百日男女婚嫁官輟百日軍民素服二十七日在外以聞喪日為始四日成服朝夕哭臨三日又朝臨十日各十五舉聲服衰服二十七日後素服烏紗㡌黒角帶二十七月而除命婦素服舉哀三日二十七月而除軍民男女素服一十三日在京官各給麻一四夷使臣工部製服二十七日後皇帝素冠麻衣麻絰臨朝退仍衰服上謚前三日齋戒遣官祭告天地宗廟社稷如儀是日内侍官置冊寳輿于奉天門厥明捧冊寳置輿中皇帝具衰服詣奉天門内侍官舉冊寳輿導引官導皇帝後隨降階陞輅百官序立金水橋南北向侍冊寳輿將至皆跪冊寳輿過興隨皇帝後至思善門外序立北向皇帝降輅冊寳輿入至几筵殿丹陛上皇帝左門入就丹陛上拜位捧冊寳官至几筵前分左右立北向導引官奏四拜皇太孫親王皇孫陪拜丹陛上百官陪拜思善門外四拜皇帝由殿左門入詣大行帝几筵皇太孫以下皆跪奏進冊捧冊官跪進冊皇帝受以獻捧冊官以置于案奏進寳捧寳官跪進寳皇帝受以獻授如冊奏宣冊奏宣寳俯伏興外𫝊賛亦如之行祭禮皇帝詣几筵前就拜位四拜跪獻酒亞獻終獻俯伏興四拜𫝊賛同導引官導皇帝由左門入詣神前捧冊寳授内侍官捧入皇帝入内奉安頓首皇帝由左門出丹陛上禮畢皇帝還宫十二月禮部㑹議葬祭儀發引前三日奏告百官出宿三日遣官以葬期告天地宗廟社稷皇帝衰服告几筵皇太子親王以下皆衰服百官衰服朝一臨至𤼵引止前一日遣官祭經過應祀神祠皆設辭奠皇帝后妃皇太子親王以下衰服致祭司禮監禮部錦衣衛官提督執事者設大昇舉陳葬儀于午門外并大明門外至日設啓奠皇帝衰服暨皇太子親王各四拜奠帛獻酒讀祝四拜舉哀興哀止望瘞執事者升徹帷幙拂拭梓宫内執事進龍于几筵殿下設真亭神帛輿謚冊寳于丹陛上設祖奠皇帝詣梓宫前西向立皇太子親王皆南侍立内侍奏靈駕進發捧謚冊寳神帛置輿内次銘旌出執事官陞梓宫内執事持翣左右蔽梓宫降殿内侍官請梓宫陞龍執事官奏登龍輴以綵帷飾梓宫執翣列左右繖扇侍衛如儀舊御儀仗前謚冊神帛真亭銘旌以次行皇帝后妃皇太子親王及宫眷随至午門内后妃宫眷哭于帷中設遣奠如祖奠儀内侍請靈駕進𤼵皇帝以下皆哭盡哀皇帝還宫后妃以下俱還梓宫由中門出至午門外禮官請梓宫陞大昇輿執事官奉升大昇輿禮官請靈駕進𤼵皇太子親王以下哭送出端門外行辭祖禮執事官設褥位于太廟香案前皇太子易常服奉神帛至太廟褥位跪置神帛于褥興皇太子正立于神帛後皇太子跪禮官跪于左奏太宗體天𢎞道髙明廣運聖武神功純仁至孝文皇帝謁辭賛五拜皇太子捧神帛興以授禮官禮官安輿中請靈駕進發皇太子仍喪服并親王以下随行梓宫由承天門大明門中門出皇太子以下由左門出歩送至徳勝門外乘馬至陵在途朝夕哭臨至陵執事官先陳龍輴于獻殿門外俟大昇輿至禮官請靈駕降輿升龍輴詣獻殿執事官奉梓宫升龍輴由中門入皇太子親王奉謚冊寳輿前行安神禮四拜興奠酒讀祝興四拜舉哀止親王以下陪拜如常儀遣官祀后土並天壽山俟掩𤣥宫設遷奠如常儀將掩𤣥宫皇太子以下詣梓宫前跪請靈駕赴𤣥宫俯伏興執事官升奉遷梓宫入皇堂内侍奉謚册寳置於前陳㝠器行贈禮皇太子四拜興奠酒進贈執事官進玉帛捧于右皇太子獻以授内執事捧入皇堂安置俯伏興四拜舉哀興哀止遂掩𤣥宫行享禮如遷奠儀遣官祀后土及祭天壽山内侍設香案𤣥宫門外設題主案于前西向設皇太子拜位于前北向内侍盥手出主于案上題主官盥手西向題主畢内侍奉主置于神座藏帛廂中内侍讀太宗體天𢎞道髙明廣運聖武神功純仁至孝文皇帝神靈上神主賛四拜興獻酒讀祝俯伏興四拜舉哀興哀止内侍啓櫝受主訖請神主降座升輿至獻殿請神主降輿陞座行初獻禮皇太子四拜興初獻奠帛酒讀祝畢俯伏興亞獻獻終獻賛四拜舉哀興哀止望瘞内官捧神帛箱瘞于殿前焚㐫器於野葬日初虞柔日再虞剛日三虞後間日一虞至九虞止在途皇太子行禮還京皇帝行禮神主將還内侍請神主降座升輿儀仗侍衞如儀皇太子随仍朝夕奠神主還京先于城外置幄次錦衣衞備儀仗教坊司備鼓吹不作百官衰服奉候城外神主至入幄次百官序列于前五拜三叩頭神主行百官從至午門外皇帝衰服迎于午門内神主至舉哀歩導神主升几筵殿内皇帝立殿上稍東西向内侍請神主降輿陞座行安神禮皇帝四拜興奠酒讀祝興四拜舉哀興哀止皇太子親王以下陪拜百官于思善門外行禮如儀明日行奉慰禮卒哭用虞祭後剛日禮如虞祭于是罷朝夕奠至卒哭之明日太常寺陳設禮饌於太廟如時享之儀内侍設皇帝拜位于几筵殿上進御輦于殿前丹陛上皇帝衰服四拜舉哀哀止立于拜位之東西向内侍請神主降座陞輦詣太廟祔享至思善門外皇帝易祭服升輅随至午門外皇帝詣御輦前跪太常卿跪奏請神主降輦詣太廟祔享皇帝俯伏興捧神主由左門入至丹陛上典儀賛太宗體天𢎞道髙明廣運聖武神功純仁至孝文皇帝謁廟至一廟前内侍捧神主置褥位皇帝於後八拜禮二廟三廟四廟五廟俱如儀内侍捧神主朝於北太常卿立壇東西向賛賜座皇帝搢圭捧神主安于座詣拜位行祭禮如時享之儀太常卿請神主還几筵皇帝捧神主由廟左門出門外奉安于車輦皇帝升輅陞至午門外皇帝至思善門降輅釋祭服易衰服内侍請神主降輦陞座皇帝行安神禮如前儀皇帝釋服還宫明日百官素服烏紗㡌黒角帶行奉慰禮宣徳年行洪熈元年六月上至自南京先是仁宗皇帝上賓遺詔上早正大位宫中以上至良鄉宫中始出遺詔文武百官常服于午門外立班四拜聼宣讀舉哀四拜太監楊瑛户部尚書夏原吉禮部尚書吕震捧遺詔往蘆溝橋迎上上至橋遺詔慟哭左右扶詣幕次聼宣遺詔哭盡哀易素服行文武百官素服迎于都城外上至長安右門下馬歩行哭至宫外釋冠服被髮詣梓宫前叩首哭盡哀宫中自皇后以下皆哭盡哀上就喪次見母后親王以次見上畢各就喪次自六月初三日開喪為始二十七日而除自七月初一日為始鳴鐘鼓上服淺淡色衣烏紗翼善冠黒角帶于奉天門視事百官皆淺淡色衣烏紗㡌帶朝叅如常儀退朝仍終太宗文皇帝服制上曰朕心何能忍雖加一日愈于已初一日仍素服坐西角門不鳴鐘鼓百日後再議八月行在禮部尚書吕震言仁宗皇帝喪服已百日請上易素服御奉天門視朝上論震曰皇考劬勞大徳奄至遐棄梓宫在殯旦夕瞻奉几筵中心何忍所奏候山林事畢再議九月少師吏部尚書蹇義等議言皇上孝思無窮禮貴得宜今祔廟後仍素服于西角門視事至孟冬歲暮行時享禮太常奏祭祀是日鳴鐘鼓上服黄袍御奉天門視朝上可其奏宣徳以後俱如儀仁宗既祔廟遇祭祀上黄袍祭畢如初禫祭後始釋素服成化年行天順八年春正月英宗皇帝大漸召皇太子及太監牛玉傅恭裴當黄順周善至榻前諭之曰自古人生必有死朕病已深倘不諱東宫速擇吉即皇帝位遇百日成婚皇后錢氏名位素定當盡孝飬以終天年徳王等宜俱與善地俾之國殉葬非古禮仁者所不忍衆妃勿殉葬殮時用袍服繫腰縧環帶皮鞓著易以鞓衣服多亦無用擇吉地建陵寢皇后他日宜合葬惠妃亦須遷來以後諸妃次第祔葬言俱遵行無違梓宫之陵遣親王䕶喪行禮皇太后喪禮髙皇后崩于洪武十五年仁孝皇后崩于永樂五年皆以后禮故皇太后喪禮始於正統七年葢仁宗張皇后也儀已見職掌成化年行禮成化四年六月甲寅慈懿皇太后崩丙辰禮部言孟秋享太廟大行慈懿皇太后喪禮哭臨未畢移至初七日上命仍于初一日祭詔禮部㑹文武羣臣議陵寢大學士彭時等言大行慈懿皇太后作配英宗皇帝正位中宫及皇上嗣居宸極尊為慈懿皇太后葢先帝全夫婦大倫皇上全母子深恩位號彰著已數十年壽終之後宜奉梓宫祔裕陵奉神主祔太廟今欲别卜葬必以今皇太后千秋萬歲之後二后並配非本朝之制然有二太后方自今始則陵廟之制亦當自今日考古協義以行之前代一帝二后並祔陵廟者未易悉數如漢文帝尊其所生母薄太后然嫡母吕太后得罪宗社尚與父髙帝並葬長陵無易又如宗仁宗追生母李宸妃為太后然嫡母章獻劉太后本無子尚與父真宗同祭太廟無嫌皇上子慈懿皇太后若稍未合禮則致貽後議有揜前美况千秋萬年之後今皇太后與慈懿皇太后同在陵廟不相妨碍愈足以見二太后生存之日雍和無間永久之後並美無窮載諸史冊増我皇明之光彰我皇上之孝此臣等所深願也上命禮部㑹羣臣定議以聞秋七月禮部尚書姚䕫及在廷文武大臣翰林院科道等官九十九員集議陵廟禮制奏曰大行慈懿皇太后作配先帝二十餘年誠孝一心夷險一徳孚于中外先帝眷禮始終無間兩宫名號既同二母體位相等陛下孝飬如一天下之人皆知陛下克體先帝初心以為至仁大孝莫過於此今慈懿皇太后之喪與皇太后千秋萬歲後俱合葬裕陵慈懿左皇太后右配享英廟禮亦宜然少有疑阻不合典禮関繫非小天下萬世將有言之安保將來無據禮改正者乎上批答曰卿等所言固正但聖母在上事有窒礙朕屢請未䝉俞允朕平昔孝奉兩宫如一若因此違忤致有他虞豈得為孝今當於裕陵左右擇吉地安葬崇奉如禮庻㡬兩全卿等其體朕意翌日少詹事柯潜暨祭酒邢讓等三十二員上言合葬祔廟之禮有闕則先帝在天之靈不安天下後世謂皇太后與陛下為何如歴觀前代未有為皇后又為皇太后始終無他故而不得合葬祔廟者也逢迎者或以宣廟胡后為言此與今日萬萬不侔胡皇后乃宣宗在御之日讓位於章皇后今則先帝臨御未聞慈懿退讓也且先帝與胡皇后亦復正尊號増修陵寢一依后禮矣或又以慈懿無出禮有之妻與繼室雖無出合祔其夫崇正體也縱使皇太后意有不懌陛下當念先帝遵典禮為重而于母后從義不從命可也矧皇太后聰明睿智洞識倫理陛下堅以為請理無不從此葢人倫之本風化之原早降綸音以慰先帝之靈以全母后之徳以順天下臣民之心陛下至仁大孝真足以為法垂訓明日魏國公徐俌暨公侯駙馬伯都督錦衣衞等官三十五人復上言廷有諍臣實為美事后能從諫允合天經伏望陛下起敬起孝和氣婉容上回聖母之心下慰闕復上言曰父母有過人子哭諫人君有過人臣死諫孔子有曰生事之以禮死葬之以禮祭之以禮今欲置梓宫于他所必將奉神主于别室天地未安人事不順以是為禮臣所未喻若以為出于聖母當起敬孝悦則復諌不可􅑈已河南等道監察御史康永韶等四十一人復以為言禮部尚書姚䕫合六部都察院通政司大理寺等衙門尚書李秉等四十四人復上言曰天下者祖宗之天下皇上有祖宗之天下當謹守祖宗之成法我國家立法垂憲一本于綱常尤嚴于君臣父子夫婦之間若母后之意果不見從當斷以大義亦在陛下處之而已時文武既上奏復跪伏文華門前以待必從而後已上悉覽奏復懇請於皇太后自己至申稍見從遂出數奏同辭批答云卿等所言皆合朕意合葬之禮䝉允行矣於是文武羣臣皆呼萬歳而退丙子上尊謚曰孝莊獻穆𢎞惠顯仁恭天欽聖睿皇后頒詔如儀九月庚申祔葬睿皇后于裕陵𢎞治年行禮成化三十三年十二月憲宗皇帝葬茂陵時孝宗皇帝以生母孝穆慈惠皇太后紀氏祔葬其儀文武百官宿公署致齋三日遣官以祔葬告天地宗廟社稷上親告憲宗純皇帝几筵啓𤣥宫祭告陵園設奉遷官拜位于享殿前内侍引奉遷官四拜奠帛獻酒讀祝四拜焚帛祝畢别遣官祭告后土既啓𤣥宫見梓宫奉遷官行祭告禮如儀既奉遷梓宫至享殿拂拭安奉訖奉遷官于前行禮如儀先一日設大昇轝於享殿門外奉遷官行啓奠禮如儀行祖奠禮如儀靈駕進發至陵園門外升大昇轝奉遷官行遣奠禮如儀將至陵有司先設席享殿於茂陵獻殿之右大昇轝至詣享殿安奉奉遷官行安神禮如儀百官陪拜遣官以祔葬祭告后土并天壽山别遣官祭告長陵獻陵景陵裕陵奉遷官行遷奠禮如儀靈駕赴𤣥宫内侍捧謚冊寳以次陳列㝠器内執事官陳酒饌於皇堂門外奉玉帛案置香案奉遷官受玉帛獻畢以授内執事捧入皇堂俯伏興四拜遂掩𤣥宫奉遷官行享禮如儀禮畢祭謝后土并天壽山及祭告憲宗純皇帝别遣官以祔葬畢告長陵獻陵景陵裕陵凡奉遷官行禮俱内侍導𢎞治十七年三月壬戌聖慈仁壽太皇太后喪上素服詣太皇太后宫舉哀哀止括髮設奠復舉哀畢歸喪次英廟皇妃皇太后憲廟皇妃皇后皇太子親王宫主王妃舉哀各歸喪次次日上舉哀朝夕設奠英廟皇妃皇太后以下哭臨次日上束髮素服設奠奉安梓宫設几筵上衰服祭英廟皇妃皇太后以下皆成服各祭一在京文武官聞喪之三日詣清寧門外哭四日具衰服哭臨三日在署視事孝服命婦哭臨俱如儀上御西角門朝退召大學士劉健李東陽謝遷至煖閣素幄中上起立曰陵廟事且商議健等奏曰昨太監扶安𫝊諭孝莊睿皇后葬未合禮欲為釐正此盛徳事臣等仰見皇上聖孝髙出前古上袖出裕陵圖一紙指示曰此未合禮昨見成化年彭時姚䕫軰奏章先朝大臣忠厚為國如此先帝亦甚不得已耳健等對曰誠如聖諭今日斷自聖衷萬世有光上曰欽天監言風水朕已面折之今日開壙合葬不為動風水乎皇堂不通則天地否塞通之則風氣流通惡得言動惟誠心為之其無害皆奏曰皇上一念孝誠可以格天吉無不利上曰此事不難祔廟之禮尤當講健等奏曰先年議已定慈懿太后居左今大行太皇太后居右合祔裕陵配享英廟具引唐宋故事為證臣等不敢輕議其實漢以前惟一帝一后唐始有二后宋亦有三后並祔者上曰二后已非若三后尤非事宜師古末世不足學太皇太后鞠育朕躬恩徳深厚朕何敢忘但一人私耳錢太后乃皇祖冊立正后我朝祖宗以來惟一帝一后今若並祔乃從朕首壊恐後來雜亂無紀極耳健等皆未敢應上曰仍舊則禮未安更之則違先帝意朕思之夜不能寐難于降㫖可議行之健等乃上疏言請下廷議乃議于陵廟神座英廟居中孝莊居左孝肅居右四月丁酉上孝肅貞順康懿光烈輔天成聖太皇太后尊謚冊寳甲辰勑駙馬都尉蔡震䕶喪英國公張懋督官軍防䕶太監苗逵總巡視上衰服告几筵丁未發引上衰服率皇太子以下行啓奠祖奠遣奠禮如儀榮王送梓宫行朝祖禮己酉梓宫祔葬裕陵庚戌神主還京嘉靖年行禮嘉靖十七年十二月章聖慈仁康静貞壽皇太后崩上詣慈寜宫舉哀括髮設奠歸喪次文武羣臣哭如儀三十日禮部言大行皇太后服制二十七日已闋適遇正旦朝㑹祭享所當酌議臣等恭擬皇上是日早黒翼善冠淺淡袍服黒犀帶御殿受朝疏入未下上諭大學士言元旦𤣥極殿拜天仍具祭服先一日變服否於是禮部更請正旦日上拜天受朝及先一日青服孟春享宗廟前三日奏齋皇上青服臣下同之上覽奏諭内閣曰部疏未免循故事未見損益何如禮曰三年之喪賢者無改若拘于紙上法度後世君人皆罪人也不但景君一人耳雖山陵未就古人未葬百事皆輟今郊社不敢廢封建征伐賞刑諸事無虚事謂之居喪吾不信也便當如制定服遇郊有事吉服作樂此尊尊也廟有事著淺淡色服不作樂此親親也居他處服黒布至喪次仍素服直候奉引安陵仍用始服之服以終之庶為情實卿等與宗伯翰林院禮科議否即曰否禮部覆皇上析禮精㣲為萬世法請令内外一體遵奉報可初禮部請正旦朝賀三奉㫖罷免及是因别疏請上報曰履端嵗首朝㑹之始但昨方除服梓宫在上卿等屢以禮請朕謂當行實事于奉天門百官青衣本等帶五拜三叩首不必公服致詞鐘鼔鳴鞭俱輟之禮部復請上具翼善冠黄袍御殿百官公服致詞鳴鐘鼓鳴鞭奏堂上樂上曰改歲更始王者奉順天道不可不重既在除服外其如議行子刻初朕用祭服于𤣥極寳殿行告祀禮前期變服𤣥色吉衣几筵四七節權命内侍行禮先是禮部儀注小殮之下有昭聖恭安康惠慈愛皇太后喪次舉哀之語上覽之註其下曰此未可及成服日舉祭復于昭聖下増曰遣祭一壇又註曰此俱増遣字葢上于典禮明辨如此上勑諭禮工二部曰朕皇考顯陵在承天山川淺薄堂隧狹陋今長陵西一支曰大峪嶺兹欲迎皇考遷祔所司其具儀聞于是禮官具顯陵奉遷大峪興工二儀已乃命駙馬都尉崔元兵部尚書張瓉太監鮑忠詣承天迎獻皇梓宫壬子大駕發京師躬視大峪御史陳讓請奉獻皇遺衣冠與章聖太后合葬於大峪又以章聖遺冠帔合葬于顯陵上曰並建二陵用衣冠交葬從古所無尤見乖謬黜為民上猶以遷陵事于心未安復諭輔臣曰朕復思一夜中心甚懼奉體藏魄二十歲忍啓露風塵掛途路兹欲奉慈宫南詣合葬朕且躬徃禮官當亟上議成化三十三年十月己夘孝宗初即位諭禮部臣曰朕以凉徳獲嗣丕基哀疚凡内而尊崇大禮外而撫綏大猷次第舉行痛惟朕生母恭恪莊僖淑妃鞠育劬勞恩深罔極今賴三靈之佑託於億兆臣民之上奉飬莫逮風木之感實切於衷矧議政之初聖慈仁壽太皇太后皇太后咸謂母妃須進名位式昭慶源因令輔臣考㨿春秋大義前代英君明辟定典乃請於二聖欲遣官奉冊詣園陵尊為皇太后用垂隆名於永世俟皇考梓宫發引有期預啓祔葬庶少罄孝悦于萬一爾禮部具儀擇日以聞壬辰追進聖母淑妃為孝穆慈慧恭恪莊僖崇天承聖皇太后遣官詣園陵行恭上冊寳并祭告禮十一月聖母孝穆皇太后即祔葬茂陵上勑諭禮部曰皇妣孝穆慈惠恭恪莊僖崇天承聖皇太后祔葬畢日宜有奉享神主之禮爾禮部其㑹文武大臣議處來問於是禮部㑹同大傅兼太子太師英國公張懋等官議得周禮春官大司樂之職歌小吕舞大濩以享先妣謂姜嫄也至宋則元徳懿徳二皇太后俱有别廟之享章獻章懿二皇太后遂有奉慈之建兹者恭遇孝穆皇太后祔葬茂陵所有神主宜於奉先殿傍近宫室改為别廟以禮安奉歲時祭享悉如太廟奉先殿之儀仍乞勑奉遷官於祔葬畢暫奉神主于茂陵獻殿以伺二十四日憲宗純皇帝祔廟禮畢啓行於二十六日入城得㫖奉先殿傍近無宫室堪改别廟爾還再議來聞禮部復㑹官議孝穆皇太后祔葬畢日神主宜暫建别廟奉享庶合古制但奉先殿傍既無傍近宫室堪以改作合當於享憲宗純皇帝几筵之右别設幄殿一所以事奉享仍乞勑内官監相度相應吉地營建别廟完日奉遷神主享祀如儀上曰親終當祭以禮爾等既考論明白准議乃定奉安神主之殿曰奉祀殿𢎞治十七年三月聖慈仁壽太皇太后崩上朝夕不離喪次悲哀動中外越五日文武百官請初七日視朝上批荅曰朕哀痛方切未能視朝所請不允次日再請又批荅曰朕朝夕喪次未忍暫離卿等乃累疏懇請謹遵遺詔初八日視朝至日上服縗服御西角門二十七日服滿二十八日百官易烏紗㡌黒角帶青圓領皂靴侍朝上仍白翌善冠白袍腰絰御西角門視事俱不鳴鐘鼔宫中實行三年之喪葢上天性純孝初至東宫進學時講官以文華大訓進講上輙起立俟講畢乃復坐其事太皇太后奉飬尤極尊隆有疾親侍湯藥憂形於色事皇太后亦然四月庚申上𫝊㫖諭禮部臣曰朕制雖遵遺誥中心哀痛未忍盡從吉典每月朔望日暫免陞殿百官常服於奉天門朝叅遇節免宴百官勿着紅衣凡大節免行慶賀禮各王府并南京及在外各衙門預行文知之不必差官赴京𢎞治十七年三月孝肅皇太后崩内閣大學士劉健等題臣等竊惟事莫大於送終禮莫重於祀享兹者大行聖慈仁壽太皇太后鸞馭上升山陵伊邇祀享之禮宜預講求查得成化四年間慈懿皇太后崩逝之日羣臣㑹議有二后並配之文竊惟當時先帝遇天下難處之事羣臣為委曲將順之詞或者猶不能無疑焉然奏議雖成於當時而奉行則始於今日仰惟皇上承宗祧之重為綱常之主所宜至詳至慎而不可少有忽焉者也伏望特勑禮部集議稽本朝祖宗之廟制質古先聖王之訓典務合大公允歸至當俾行之于今而無憾垂之萬世而有光臣等不勝至殿上命禮部㑹多官稽考典制詳議奏聞禮部乃㑹皇親公侯駙馬伯五府六部都察院通政司大理寺翰林詹事府左右春坊司經局六科十三道等衙門議謂宗廟之禮乃天下之公義非子孫得以私之萬古綱常有不可易者自古昔以來殷周七廟父昭子穆各有配座一帝一后之正儀盖隂陽相配之禮也下至春秋以魯隐之國而書考仲子之宫胡安國𫝊云孟子入惠公之廟仲子無祭享之所以此觀之春秋之世去先王之世未逺魯秉周禮先王之制猶有存者祖廟無二配故也先王之制槩見已伏覩憲宗純皇帝成化四年勑諭羣臣有曰朕心終不自安竊窺我先帝之至情以重違慈意不得已而勉從羣臣並配之義羣臣欲權以濟事亦不得已進此議也㨿正禮而區處適宜仁至義盡足以上副先帝在天之遺志端有待於今日稽之周禮有祀先妣之文疏云姜嫄也是則太母特立廟以祀不失尊崇之禮自周然矣詩所謂閟宫是矣唐宋禮制無常初正終亂固無足言但其間推尊太后不配食祖廟者則别立殿以享之亦得閟宫之義至我國朝祖宗太廟之建一遵古典損益得中迄今已溢九廟廟皆有配其配無二宏規逺模成憲已定又於禁廷内建奉先殿得以朝夕供薦孝思之情委曲詳盡仰惟皇上繼統動率舊章而舉無不宜兹遇大行聖慈仁壽太皇太后上仙朝夕不離喪次悲哀動乎中外𫝊之萬方誰不感仰聖孝之無已也但孝心無窮而禮有限節享祀之禮當歸於至當所有奉安神主宜於奉先殿之外相應處所建一新廟如詩之閟宫宋之别殿歲時薦享一如太廟奉先殿之儀祀専而且近禮勤而且便隆名徽號仍稱太皇太后極其尊崇永受萬年之享則情義兩盡罔極之思以酧嚴祖之道以著而大孝之實垂諸萬世無疆矣上曰享祀重事禮當詳慎卿等稽考古典及祖宗廟制既已明白都準議特建廟奉享仍稱太皇太后以伸朕尊親之意後世子孫遵守崇奉永為定制皇后喪禮洪武初定洪武十五年八月庚子上以慈孝皇后喪萬機委積乃命禮部臣考古典遵以日易月之致以素饈祭告于皇后之靈曰自后崩逝已十有五日雖哀慟無窮而天下事重不敢乆曠不治謹遵禮制以日易月朕釋期服視朝諸子仍衰麻以奉筵几惟靈其鑒之九月庚午𤼵引上親致祭于靈文武百官喪服詣朝陽門外奉辭是日安厝皇堂皇太子奠𤣥纁玉璧行奉辭禮神主還宫文武百官素服迎于朝陽門外回宫百官行奉慰禮上復以醴饌祭於几筵殿自再虞至九虞皆如之是晩仍遣醴饌告謝于鍾山之神命所葬山陵曰孝陵十月己夘以孝慈皇后卒哭行祔廟禮上以醴饌致祭於靈復以牲醴告廟曰兹以孝孫婦孝慈皇后馬氏神主詣廟祗謁嘉薦祔享之禮十一月乙丑喪百日上輟朝以牲醴致祭於几筵殿是日紀察司請御素服黒犀帶上香案前致欽不拜東宫親王皆四拜奠帛奠爵上舉哀在位者皆哭哭止上致欽如前東宫以下復四拜上還宫百官素服黒角帶詣中右門俟奉慰上素服出陞座儀禮司官致詞奉慰東宫親王復以牲醴祭孝陵公侯等從祭妃主亦詣靈祭其命婦則詣几筵殿祭奠永樂年行永樂五年七月文皇后喪禮初喪如髙后時儀定各王及公主服制世子郡王皆齊衰不杖期世子妃郡王妃并郡主皆大功周楚諸王及寧國諸公主并郡王之子皆小功遣中官以大行皇后訃告趙王髙燧及永安公主永平公主并召赴京遣官訃告各王府十一年正月丁酉仁孝皇后梓宫𤼵引皇太子漢王送梓宫渡江皇太子哭辭漢王䕶梓宫行途中朝夕哭奠如儀官民迎祭者皆素服嘉靖年行嘉靖七年七月皇后陳氏崩禮部上喪祭禮儀上疑過隆令更議部臣具累朝舊儀叅酌上請上躬自裁定以示閣臣曰聞喪次日百官素服於思善門橋南哭臨又次日亦如之第四日成服百官服喪服入臨如前三日免哭臨葢遵皇太后之意第四日朕視朝百官素冠服行奉慰禮二十七日後百官黒冠素服角帶朝叅發引後從吉如遇七及小祥大祥皆淺色衣朝叅初喪三日朕不視朝如常朝儀兩宫服淺色衣玉帶葢盡事親之道第四日成服為始朕冠翼善冠素服犀帶視朝一十二日盡杖期以日易月之義前後共二十七日俱西角門視朝服淺色衣百官黒冠素服之日於奉天門視朝俱不鳴鐘鼔如遇朝兩宫之日則具常服以盡尊親之禮制下閣臣張璁等擬上服制宜服素冠服絰帶十二日其後乃服翼善冠犀帶前後二十七日俱御西角門視朝之日百官皆素服絰帶二十七日以後上御奉天門百官乃更素服角帶上意既允已復降㫖曰朕當黒冠素服降之九日而釋可矣璁等對曰皇上以兩宫皇太后在上不敢以卑加尊是以欲為降殺非故嗇恩也臣竊謂夫婦之倫叅三綱而立人君為綱常之主言動世為法則尤不可不慎臣讀記曰天子之於后猶父之與母也故謂天王服斬衰父之義也為后服齊衰母之義也又謹按昭公十五年六月乙丑周景王太子壽卒秋八月戊寅王崩叔向曰王一歲而有三年之喪二焉葢古禮父為子夫為妻皆服三年觀此則周天子尚為后服三年之服後世夫為妻始制為齊衰杖期父母在則不杖夫喪服自期以下諸侯絶然特為旁期言若妻之喪本自三年報復殺為期年則固未常絶也皇上為后服期以日易月僅十三日臣子為君母服三年以日易月僅二十七日較諸古禮已至殺殺而又殺則無矣臣愚以為皇上宜服期十二日宜容臣子素冠服終二十七日不然則恩紀不明典禮有乖臣等何忍令後日史臣書曰天子不成后服自皇上始乎又何忍令後日史臣書曰臣子不終君母之服自臣子始乎上曰卿所奏雖出忠愛似未精詳倫理朕豈敢違孝卿勿過慮時禮臣方獻夫亦雜引儀禮喪服等篇反覆争辨謂旁期可降正期不可降亦舉周景王為后三年之文及三朝聖諭所載仁孝皇后崩太宗皇帝衰服後仍服數月白衣冠故事以證之上曰文皇帝之與文皇后喪禮與今大不同爾時上無皇母下有東宫從重盡禮為宜其遵朕欽定儀制行之已詹事霍韜奏曰臣頃見禮官所議大行皇后喪禮臣昨與面諭勸其更議禮官以臣為迎合臣獨以為臣子議朝廷公事各盡其道而已天子之有后猶天之有地故禮曰夫為妻服期萬世之經也因禮之變而酌義之中則有權是故中宫皇后者配陛下者也所以共事天地而承祖宗者也陛下為之服凡以為天地祖宗之故也然限於隂陽内外之辨則有不得盡致其情者矣今百官遭妻之喪無服衰蒞事之理惟三年之喪乃釋位行服葢謂父母之喪達於上下若妻之喪則内而不外隂不可以當陽也在百官則然至于陛下何獨不然聖諭曰素服十日倣輟朝之義臣則曰為皇后服禮也然於内廷行之可也若對臨百官總理萬機履當陽之位行中宫之服或不可也葢制服于内可以自盡素服于外特以示變權而得中所以為禮也百官有司為皇后服衰為其母儀天下也上壓于陛下則有不得盡致其禮者矣古禮父在為母杖不上于堂尊父也為衆人言之也至於朝廷何獨不然臣請陛下𤣥冠素衣御西角門十日即𤣥冠𤣥衣御奉天門百官有司入左掖門則烏㡌𤣥衣侍班奏事退出公署及居私室仍素服白㡌二十七日而除若曰於禮猶有未慊也則山陵事畢而除其入見陛下𤣥服者杖不上堂之義也出即素服者子為母之義也若陛下於二十七日俱御西角門則混而無辯臣下素服朝于中宫門則凟而不敬皆非時義之宜也此于古禮所未有可以義裁者也禮官所執者古禮臣所權者時宜禮官所言類于從厚臣言類於從薄要之人極大中萬世自有能辨之者上曰喪服禮制朕已兩定儀注下禮部行韜所奏斟酌時宜當從所擬朕于十五日常朝奉天門視朝百官淺淡色衣朝叅退仍如制服二十七日而除閏十月禮部尚書方獻夫等上悼靈皇后儀注時諸禮儀皆上親自裁定􅁼從减損如百官哭臨及禁屠徹樂當于發引三日之前梓宫出當端門行辭祖禮從午門等中門出時哭臨既止一日辭祖又復罷免而梓宫命由左王門以出於是禮科都給事中王汝梅等上䟽言天子有后以共承天地祖宗之祀奉兩宫之歡如天之有地日之有月今皇后已正位七載齊體至尊生以禮歸歿不以禮葬非所以重大倫為萬世法請更議之上曰是所言亦係忠愛但未審重輕思善門哭臨逼近仁智殿從减可也午門等中門亦當避所尊陵地既逺于列聖則辭祖之禮不必凟朕已祭告内殿矣夫后尊則主益尊朕豈不知苐有所壓不得不斟酌裁制耳既而給事中徐景嵩又言哭陵辭祖二儀不輕議若梓宫出門乃萬姓觀瞻所係王門之議臣心實不敢安也詔如前㫖發引次日上命經筵官吉服侍班尚書方獻夫等以為山陵未畢不忍遽爾從吉請仍令百官衣淺色衣朝叅上不許曰朝廷禮儀自有定制卿等餘哀未忘可退朝後行之無何遣官冊封故事當鳴鞭作樂百官朝服侍班獻夫復言皇后之喪大樂一作恐聖心増感宜輟樂上怒其違㫖命照舊行嘉靖二十七年二月癸丑上以孝烈皇后陵名未定諭輔臣曰朕思太祖成祖俱二后先安𤣥宫其陵名薦在何時令禮臣宷以故事聞宷具奏洪武十五年九月十三日孝慈皇后葬孝陵永樂十一年二月十六日仁孝皇后葬長陵皆命名在先卜葬在後於是上定孝烈皇后陵名曰永陵仍御製祝文命成國公朱希忠告太廟五月丙子禮部上言曩孝潔皇后梓宫入百官自執事外俱衰服送至土城祭畢更常服辦事迎主用烏紗㡌素服但孝潔皇后自發引至神主還京將及半月中遇元旦百官宜從常服今孝烈皇后初十日發引十五日即還事體不同請令祭畢還京諸臣除入朝外俱素衣烏紗㡌角帶辦事至神主還京而除上曰昔有兩宫在臣從君敬其所尊厥禮是矣今日卿等有母事之儀随喪往來者仍當制服祭畢回者以烏紗㡌素服入朝素冠素服辦事迎主仍制服思善門外行安神禮更素冠素服從事五月詔孝烈皇后梓宫入山陵居之右虚其左先是上命后與孝潔皇后啓安禮併舉孝烈居左既而孝潔啓安禮至是部臣以𤣥宫規制請得㫖乃更啟孝烈仍居右云慈宫發引嘉靖十八年五月内禮部題為喪禮事節奏聖諭恭奉慈宫引發吉日用五月十七日子時奠獻使等官仍用原定官員一應禮儀亦且用原定者如有増損臨期酌擬但改水程奉梓宫行欽此臣等謹將慈宫引𤼵二聖合葬禮儀查將原定節次量加増損謹逐一再行開坐上請其題主一節原於徳勝門外梓宫東行恭擬于通州奉題以次日回京其奉送梓宫官員原係陸行本部定擬三程分送今改用水程合無送至張家灣恭祭而回及原定至承天府各執事官太常寺光禄寺鴻臚寺錦衣衞科道等衙門俱照舊差遣外其禮兵二部司屬官今以堂官掌禮勲臣領兵則二項屬官應合裁省伏乞聖明裁奪奉聖㫖奠獻使等官仍用原定主著輔臣鼎臣恭題畢遣成國公希忠奉主還京餘都依擬欽此慈宫南祔嘉靖十八年五月内禮部題為喪禮事本年四月二十八日欽奉聖諭南巡因謁陵寢及視大峪已畢然峪地空凄豈如純山完美决用前議奉慈駕南祔引發吉辰别候欽此臣等謹將慈宫引發二聖合葬禮儀查照原定節次量加増損逐一再行開坐上請計開一欽定本年五月十七日子時發引梓宫自通州登舟直抵承天俱水程一張家灣祭潞河之神天津祭海口之神安平鎮祭龍王之神徐州吕梁二處祭洪神淮河口祭淮瀆之神儀真南京祭大江之神彭澤祭小孤山之神九江漢江所過大江俱用牲醴致祭俱勲臣具青服行禮其各應祀水府之神開載未備者臨時増酌致祭一經過有王府去處許王素服出迎致祭該府官預陳設祭物于水次席殿内賛唱就位賛鞠躬賛四拜興詣香案前跪上香畢復位跪奠帛初獻爵讀祭文再獻終獻畢俯伏舉哀五聲而止賛四拜興平身焚帛禮畢一王府附近去處遣輔導官致祭先于席殿陳設祭物候梓宫至執事官賛四拜興賛上香畢復位跪奠帛三獻爵讀祭文俯伏舉哀哀止興四拜平身焚祝帛禮畢一南京守備文武衙門各處鎮巡三司官梓宫舟經及附近處所俱致祭舉哀興王府遣官儀同有司所轄大小官員通許陪拜一致祭物品簇盤一座豕一羊一果五盤㸃心五盤􅓞煠五盤餅五盤案酒五様菜五盤粉湯五盌飯五盞帛一叚酒三爵香紙燭一至承天百官俱縗服奉迎梓宫舟岸少住舉哀前後八拜禮師生耆民人等随班行禮一行安神禮撫按等官陪拜鴻臚寺𫝊賛行禮同皇嫂喪禮嘉靖十四年正月武宗莊肅皇后崩上命禮部具喪祭儀尋遣中官諭曰喪禮視聖慈仁壽太皇太后制行於是禮部上儀注有上素冠素服絰帶舉哀及羣臣奉慰禮上曰朕於皇兄無服制矧奉兩宫皇太后在上又迫聖母壽旦忍用純素服青服視事諸儀再擬聞於是禮部尚書夏言等上言大行莊肅皇后喪禮在臣民無容議惟是皇上天子之尊服制既絶則不必臨御西角門一切奉慰皆不當舉羣臣成服後又不當服素朝叅情固當伸尊尤當避宜免朝叅便因復除二十七日𤼵喪二十八日大殮上素服詣大行前行設奠奉安梓宫設几筵安神帛立銘旌上詣梓宫前祭憲廟皇妃昭聖康惠慈壽皇太后章聖慈仁皇太后武廟皇妃中宫皇妃九嬪公主等各祭一百官命婦哭臨如故制可復諭言等聖母壽辰爾百官不必赴公所只私所盡制大學士張孚敬等言聖母壽旦禮吉之至重者宜吉衣終日庶于禮義允協上悦其體君忠敬從之皇妃喪禮洪武初行洪武七年九月貴妃孫氏薨命吳王橚服慈母服斬衰三年以主喪事勑皇太子及諸王皆服期有司營葬厝於朝陽門楮岡之原成化年行成化十一年六月皇子母紀氏薨追封淑妃謚恭恪莊僖輟三日朝上服淺色衣御奉天門視事命禮部定喪葬儀注先是妃病大學士商輅言皇子母有不諱禮宜從厚仍乞司禮監奉皇子問侍衰服行禮上是之乃命司禮監黄賜詣問儀八月葬恭恪莊僖淑妃紀氏于山西自初喪至發引下葬上及皇太后中宫英廟皇妃皇妃親王公主皇子各有祭遣皇子奉祝冊行營城發引下葬日上俱不視朝皇親公侯駙馬伯文武百官及命婦送葬設祭如常儀嘉靖年行嘉靖三十三年正月康妃杜氏薨裕王母也禮部尚書歐陽徳言累朝皇妃薨或未生皇子或子非長或子為東宫而先薨俱與今異惟成化中淑妃紀氏薨所生皇子倫序居長與今相類彼時皇子尚㓜今裕王已婚禮宜持服主喪送葬出城乃議輟朝五日裕王遵孝慈斬衰三年欽定大臣題主開塋掩壙祠謝后土并用工部官送葬儀仗人數皆増于舊上謂大學士嚴嵩等曰部擬憲廟淑妃大不同裕王不當服斬衰嵩等對憲廟初有悼恭太子在前淑妃之子居次正與康妃今日同喪禮必子為主裕王宜服斬衰以執饋奠之事太祖御製孝慈録序文曰庶子為其母斬衰三年部儀遵此也上復諭嵩斬衰三年當避君父嵩言洪武七年貴妃孫氏薨無子命吳王橚服慈母服斬衰三年主喪事皇太子諸王皆服期是年孝慈録成遂為定制乞命殿下衰杖入哭几筵居府盡制上意猶未以為然乃下部䟽曰輟朝兩日不鳴鐘鼓上淺淡色衣奉天門視事百官淺淡衣烏紗帽黒角帶朝叅欽命裕王主饋奠之事裕王率妃入宫素服哭盡哀四拜小殮大殮成服朝夕哭臨三日以後每日一奠通前二十七日而止仍于燕居斬衰三年以伸子情妃詣拜位賛四拜奠酒讀祝賛四拜舉哀興哀止望瘞禮畢其焚黄陳祭儀以祝文及諡冊文置前裕王四拜三獻發引啓奠祖奠遣奠御祭各一柩出𤣥武門裕王歩送至京城門外路祭畢還宫百官素服烏紗冠帽黒角帶路祭入上曰焚黄乃制命非王可行其仍以常禮從事餘如擬部覆奏皇妃焚黄儀𫝊訛非一日葢自累朝或所生皇子及親王或司禮監官行禮皆拜而獻酒跪而讀祝乃叅用上尊諡之儀而未思賜諡為制命其祭文稱皇帝遣諭與上尊諡逈不同也今既奉㫖以常禮從事當改議賜諡祭禮讀祝宣冊皆平立不拜上報可乃著為令遂冊諡妃為榮淑九妃同墓嘉靖三十年六月禮部左侍郎程文徳奉詔相睦妃何氏塋城因言金山一帶壟地無餘宜與故妃包氏陳氏同窆且二妃之逝已奉聖諭令同一地為墓又言憲廟諸妃皆同處者且省民力一分仁言惻怛聞者感動今壙域甚廣附造為便上曰祖宗成法當守王制亦當尊古世婦御妻數俱用九其自今以九妃同墓共一享殿而中為七室所司如議奉行皇太子喪禮妃附成化年行成化八年正月皇太子薨年三歲上召禮部臣諭之曰皇太子年㓜喪禮宜從簡禮部具儀上自發喪日為始服翼善冠素服七日而除發喪後三日皆不視朝又三日上御西角門朝不鳴鐘鼓祭用素食文武羣臣聞喪素服烏紗帽黒角帶第三日素服麻布絰帶麻鞋布裹紗帽詣思善門哭臨一日而除第四日素服朝西角門行奉慰禮以書訃告天下諸王天下王府并文武官素服于㕔視事再舉哀復再拜次日服布裹紗帽麻鞋絰帶設香案舉哀行禮服素服烏紗㡌黒角帶二日而除皇太子妃喪洪武十一年十一月皇太子妃常氏薨上素服輟朝三日中宫素服哀臨皇太子服齊衰葬畢焚于墓所常服還命皇孫服斬衰置靈座傍遇祭奠則服之諸王宫主服如制諸王喪禮洪武初行洪武二十八年三月秦王樉薨王上第二子孝慈王后所生也年十五受封二十三之國至是薨年四十訃聞詔定喪禮禮部尚書任亨㤗奏曰臣考之宋制宜輟朝五日今遇時享宜暫輟朝一日皇帝及親王王妃宫主世子郡王郡主及靖江王世子郡君服制皆與魯王喪禮同皇太子服齊衰期年因親事以日易月亦十三日而除素服期年從之喪聞上輟朝三日禮部奏差官掌行葬祭禮翰林院撰祭文謚冊文壙誌文工部造銘旌差官造墳又欽天監官一員上葬日國子監監生八人報訃各王府御祭一壇太皇太后皇太后東宫各一在京文武官各一壇御祭凡七壇封内文武祭一壇非封内者不弔祭其服制王妃世子衆子及郡主郡王下至宫人斬衰三年封内文武官齊衰三日哭臨五日而除在城軍民素服五日郡王衆子郡君為兄及伯叔父齊衰期年郡王妃服小功五月凡世子世孫喪禮聞喪御祭一東宫祭一七七百日下葬周年二周年除服御祭各一翰林院撰祭文謚冊壙誌文工部造銘旌國子監監生報訃公主喪禮洪武初行喪聞上輟朝一日御祭一皇太后中宫東宫各祭一各公主共祭一翰林院撰祭文壙誌文户部給齎粮工部造銘旌神主魂帛棺槨墳壙誌石㝠器儀仗欽天監選地擇日國子監監生報訃御祭凡六下葬靈柩由東上南門東上北門北中門北安門出工部内監官於坟所設享堂教坊司撥女樂送至墳所祀后土并題主安神俱遣大臣行禮臨朝不釋服洪熈元年九月禮部尚書兼太常寺卿吕震奏太宗皇帝遣命喪服一如太祖髙皇帝倣漢制以日易月今已踰二十七日請上釋衰服服烏紗冠素服黒角帶臨朝上不聴命與六部都察院詳議以聞震與六部都察院共奏上宜服素冠黒角帶羣臣皆從君服上曰梓宫在殯朕何忍遽易自是臨朝素冠麻衣麻絰朝退仍衰服不受冬至賀洪熈元年十一月太子太保兼禮部尚書吕震奏冬至節請御正殿受賀上曰梓宫在殯山陵未終因時興慕哀慟愈切慶賀之禮豈所宜言勑免賀成服不視事成化改元禮部奏兹者大行皇帝喪禮成服已畢恭惟皇上嗣登大寳之初萬機所係宜少節哀情請于西角門視事上不允曰朕不忍遽出待二月朔可也諸王葬禮成化七年禮部奏忻王發引禮儀一發引日上不視朝一下葬輟朝一日不鳴鐘鼔上服淺淡顔色服於奉天門視事一起靈祭祀如去喪例一過内門外門并過橋祭一文武官員共祭一壇於西安門外行禮一開塋域下葬祠后土掩壙題主神主奉安享堂各御祭一壇一凡葬百日周年二年除服每祭如起靈例行禮俱遣中官外門遣太常寺官祭從之王殤女喪禮嘉靖三十三年裕王長女殤禮部議祭葬請如順義郡主例上以未請封無例而且下殤也用全禮非是詔减常儀之半追封世子喪禮嘉靖三十八年裕王長子薨大學士嚴嵩等言親王之子曰世子今若稱長子是與郡王之子同也乞特賜追封庶于典禮為合上命追封為世子祭葬視世子已封者例皇子喪禮成化二年十一月皇子薨上諭禮部曰皇子薨逝朕甚感傷祭葬之禮其斟酌以聞于是禮部議按禮八嵗以下為無服之殤祭葬禮儀俱合從簡祭不用牲用素饈出殯日上服淺淡服明日百官行奉慰禮皇太子葬禮嘉靖三十年上諭禮部皇貴妃王氏同閻氏墓葬哀冲莊敬二太子祔其旁冲㓜兒随母禮以義起俱入天壽山以上近祖宗之義也便擇日舉行禮部因言曩貴妃閻氏已祔主于孝潔皇后陵室今葬者既與同竁固宜祔二太子之墓既宜近母則其主亦宜安祔二妃左右詔可皇女喪禮𢎞治十年九月皇女太康公主薨禮部上喪禮事宜上命照蔚悼王喪禮例行免輟朝并奉慰禮禮部志稿卷八十六
