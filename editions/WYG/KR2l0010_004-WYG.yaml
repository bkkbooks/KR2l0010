body:
  text: 禮部志稿卷四眀俞汝楫編聖訓英宗睿皇帝祀禮之訓宣德十年六月𠡠行在太常寺官曰朕惟祀神國之大事廟宇壇墠惟修惟潔犠牲粢盛惟豐惟備珪幣香祝薦獻之具樂舞之設咸用整飭惟爾之職凡典守壇廟及諸執事爾恒戒警之俾存其誠以時共事彼或不恭越禮廢事爾具以聞必斥去之爾尚齊潔一心昭事天地鬼神以迓禎祥上祐我國家下福我臣民惟爾祿位亦保永乆欽哉正統二年十二月行在禮部奏正統三年正月初六日享太廟上御正殿受奏然是日值宣宗皇帝忌辰例不鳴鐘鼔第視事西角門禮有不同請裁之上曰祭祀重事還宜陞殿餘悉遵永樂間例行之正統九年閏七月𠡠禮部臣曰朕惟國之大事莫先於事神古者帝王率繇茲道我國家自祖宗以来祗事神祗載在祀典已有定制朕嗣承大統惓惓於茲比聞天下嶽鎮海瀆及府州縣社稷山川文廟城隍應祀壇廟歷年既乆多為風雨損敝所司不能時加修葺分廵憲臣亦罔加意甚至容人䙝凟致傷和氣爾等其諭兩京及天下有司於應祀神祗壇廟久荒廢者即設法偹料修理工程大者酌量事宜以聞修完之日擇人奉衛務在敬慎不許䙝慢仍令風憲官按臨廵視其有損壞不修及因修理害民者悉罪不宥祭先之訓正統元年閏六月上諭行在禮部臣曰山陵祭祀哀戚存焉服餙華麗豈禮所宜朕自今後每祭孝陵長陵獻陵景陵行禮之日與百官俱具淺色衣服如洪武永樂例尚書胡濙等頓首奉命弭灾之訓宣徳十年四月𠡠諭行在禮部臣曰今當糓麥長茂之時而畿甸之間天久不雨又聞逺近有水潦蝗蝻深軫朕懷宜遣大臣於在京廟觀祈禱仍分遣道士詣天下嶽鎮海瀆用祈豐稔無稽無忽正統十四年四月上謂禮部臣曰自嵗首至今雨澤愆期糓種未布麥苖就稿民事勿遂朕用􅅥然其遣官告祀天地諸神祈降甘霖以甦我民爾禮部仍分官祭告京都應祀神祗合用祭物及百官齋戒禁屠諸宜悉如例修省之訓正統四年六月勅諭六部等官曰朕恭嗣大統夙夜祗勤惟祖宗付託之重不敢怠逸比年以来停罷一切徴歛除逋負薄刑罰所兾四方咸遂生息今嵗以来灾沴數見京畿尤甚自三月至五月亢暘不雨甚傷農麥五月中至六月連雨不止河決堤岸渰沒田稼城中傾塌官民廬舎亦有渰溺死者深用兢惕洪範咎徴皆繇人事盖朕不徳之所致也其聽納之勿審與䜛佞之勿戢與政事之臣有頗仄歟輔弼之臣失其職歟何灾異特甚循省厥繇用圖善道爾等皆與國同體豈當黙黙坐視而勿思勿勉乎自今其體朕心以敬天愛人為心毋懈夙夜夫持㢘戒貪者善身之本致公絶私者善政之要勿謂可欺神鑒孔眀勿謂無害天應可畏欽哉朂哉徃務善政庶㡬以回天意以固宗社民生之福爾亦尚有利哉正統五年十二月勅在京文武羣臣曰昨欽天監言眀年正月朔日食凡九十一秒故事食不一分者不救護朕惟事天之誠雖㣲必敬謹天之變豈以㣲怠况茲嵗始陽德方亨致灾有繇敢㤀祗畏是日在京文武羣臣悉免賀禮及期救護如制天順元年四月𠡠諭六部等衙門曰朕新復位夙夜兢􅅥永惟致理之要在乎敬天勤民然欲從事於期而無失盖必君臣同心而後可矧今天之灾沴消弭未盡民之饑困拯濟未蘇是惟朕躬之憂亦惟爾文武羣臣之憂也其自今月初一日始為朕與爾羣臣各致齋三日朕親露禱於昊天上帝為民請命朕又聞之應天以實不以文得民以政不以言繼自今朕其恒自修省爾羣臣亦共儆戒於心慎懋於事凡有可以匡輔朕躬以安國家以便軍民利所當興弊所當革者各從職掌眀以條奏施行務底實效毋事虚文庶㡬君臣交修以盡敬天之實勤民之責而得致理之要其敬之慎之又𠡠諭文武羣臣曰朕以菲徳恭膺天命祗復寶座於今半年圖治雖勤應天無效乃天順元年七月初六日承天門灾朕心震驚罔知攸措意者敬事天神有未盡歟祖宗成憲有不遵歟善惡不分而用舎乖歟曲直不辨而刑獄寃歟征調多方而軍旅勞歟賞賚無度而府庫虚歟請謁不息而官爵濫歟賄賂公行而政事廢歟朋奸欺罔而阿附權勢歟羣吏弄法而擅作威福歟徴斂徭役之法太重而閭閻田里靡寧歟䜛諂奔競之徒倖進而忠賢正士不用歟抑為軍衛有司者闒茸酷暴貪無厭而致軍民不得其所歟凡若此者皆傷和致灾之繇而朕或有所未眀也今朕省愆思咎怵惕是存爾文武羣臣既任股肱耳目之寄當懷左右輔弼之圖況君臣一體休戚惟均果有合行事宜必當直言無隱其或躬蹈前非亦宜洗心改過嗚呼應天者當以實政弭灾者不事虚文朕與爾等尚懋敬之興學之訓正統五年六月勅諭北京國子監祭酒司業等官貝㤗等曰夫太學者國家成賢育才之地昔我祖宗臨御教之用之咸有定規朕嗣統以来一切庶政咸循舊章諸司亦皆修職爾北京國子監官不務敬慎隳弛學規玩愒嵗月洪武永樂中六堂諸生咸有季試考第髙下以伸勸勵今南監尚循舊規北監廢而不舉此非師長之惰慢乎尤有甚者惟利是與有入監數月或一二年即得撥諸司辦事者有坐監十餘年不得出身者又與諸司交通凡辦事一人有闕即被干求者得之借曰為勢所逼何為不執以奏師之所行如此何以表勵學者朕惟天地之量姑曲宥不問自今宜洗心滌慮改過自新凡監學常規不許攙越如仍聽從嘱託不奏聞者必罪不宥繼今務眀聖賢之道正身以淑生徒毋背義茍利以壞名禍已如將不悛悔將何及視學之訓正統九年三月上幸國子監畢祭酒司業率學官諸生謝恩上賜𠡠諭之曰朕惟君師之道莫盛於堯舜禹湯文武孔子述而眀之為天下後世楷範功尤大焉朕祗承祖宗成憲景仰大猷新建太學益隆文教茂育賢才躬謁先師勸勵師生夫化民成俗本之躬行秉德建功繇有實學詩曰不愆不㤀率由舊章又曰思皇多士生此王國朕服膺古訓以圖化成尚期爾師生講學修德勉臻成效庶副我國家崇儒重道之意宗室之訓正統五年六月諭靖江王佐敬并各輔國將軍曰朝廷封建宗室祿米已有定制曩因王及各將軍每遇嵗徴先令火者等下縣不收本色加倍折錢民用訴告先皇帝曲貸不問但諭令改過仍𠡠廣西布按二司廵按御史但有再犯者執送京師無非欲其知所警也令按察司奏輔國將軍賛億復令家人杜勝收興安縣祿米加倍折錢民何以堪且百姓乃祖宗之百姓而如此虐害可乎已令按察司將勝等解京處分繼今宜痛自警飭嚴戒下人謹守法度庶㡬長保富貴以副朝廷親親之意欽哉正統六年七月貽書永夀王志填曰比聞王偕弟以行香故引火者官較四十餘人於南山五䑓寺遊覽三宿於外而防閑甚踈萬一為小人所侮非惟虧損令德其如先王遺體何凡今諸王之出在禮有不可已者亦必先期遣人馳奏今叔以逰覽輕出露宿不知自愛自皆惑於左右小人之邪說繼今宜謹自防非親厚不致此言叔其亮之正統七年七月楚王季堄奏欲於昭園莊園立碑表揚先德上從之復書曰此孝子慈孫當然之義叔文學邁衆且素得於侍下目見者最詳且實宜自撰述或授事實於府中儒臣俾之代述亦皆宜也正統十年九月書於秦王志潔曰先因紀善陳彬等奏承奉劉全等從㬰不法事情已提全等至京命法司審實姑舉其尤者言之山川壇奉神之所乃折其獸吻修盖殿宇宜川王至親不容入府拜廟啓事儀賔為國貴戚發塚開棺焚其尸體承奉副係王府内臣逼抑自縊紀善輔𨗳之官拔其鬚髮并侯介歐死軍餘四人及哄誘軍民子弟自宮之類不可悉數劉全侯介皆國法所必誅者餘悉從寛以全其生然全等恃恩玩法挟勢作威如此未審王知否也不知則為不眀知之則為縱惡皆於祖宗有違朕念王室宗至親素稱恭謹茲必小人蔽惑所致復覽奏章具見追悔至情今特置不問自今宜謹遵祖宗大法恪履先王大道親近正人嘉納善言無惑於羣小無自蹈非義庶有光藩屏保國於悠乆亦不致下人指議此朕保全親親言出致愛其兵馬指揮劉鑑姑宥其罪令回府中成禮并内使郭縉等十一人俱免罪遣還以備使令均此奉報惟叔亮之重宗之訓天順二年閏二月勅宗人府曰朕惟玉牒所以紀載宗支乃朝廷重事經年乆逺未及増修爾宗人府即㑹同禮部查照各王府自正統六年以後凡有薨逝襲封及男女新生已故等項逐一眀白開寫中間如有未備仍行各王府取勘回報以續修爾其敬承毋忽王府使臣之訓正統十三年九月上諭禮部尚書胡濙等曰宗室國之至親近聞内外官員有以事至王府者多方需索以致窘廹自今使臣至者止許待以酒饌餘物一毫勿與之若有仍前需索者三司并廵按御史體實奏聞不分内外大小官員人等正犯處死全家發戍邉方其三司御史知而容隠者坐以重罪爾即移文各衙門官員人等一體知悉尚膳之訓正統二年八月𠡠諭尚膳監及光祿寺曰比聞進宫中食物所用器皿扛索十還一二光祿寺不以奏尚膳監不以言重復造用甚費財擾民令後凡進食物必湏印信掲帖備書器皿扛索之數與收領内官姓名尚膳監如數還之有一不還即以奏聞敢隠瞞扶同者悉坐以罪遂勅宮中六尚司曰凡光祿寺進食所用器皿扛索皆國與民力所給不可妄費今後悉照光祿寺所具之數付尚膳監還之有誤損者奏聞註銷敢匿一器一索以上皆治罪却珠之訓正統二年毛憐等衛都督同知李撒滿荅失里等来朝貢五百顆上諭行在禮部臣曰先王盛時四夷之獻惟服食器用珠於國用何益曩以諭縁邉總兵官凡諸夷来貢獻者不用珠玩今撒滿荅失里乃復貢珠本欲却之第念逺大輸誠姑酬其直無以為例仍賜使者宴却瑞之訓宣德十年九月四川龍州宣撫司以瑞麥来獻有一莖六穗七穗者上曰所在旱蝗相望獨此瑞麥何以免民之饑乎其令天下自今凡若類毋獻正統七年九月鎮守陕西都督同知等官鄭銘等奏西安府并耀州産嘉禾一莖二三穗四五穗至數十穗者凡三百餘本禮部尚書胡濙以為豐年之瑞是皇上至仁大德所致請率廷臣稱賀上曰人君以天下為家今有司奏旱蝗者日相繼使嘉禾誠足以兆豐年亦彼二方之慶耳如天下之饑民何其止勿賀朝貢之訓正統元年四月𠡠諭滿剌加國王西嘿麻哈剌者曰王在先朝率属躬来朝貢已悉爾誠朕嗣大統小大庶務悉遵祖宗成憲今已𠡠廣東都司布政司厚具廪餼駕八大櫓船送王還國并遣古里真臘等十一國使臣附載同回王宜加意撫恤差人分送各國不致失所庶副朕柔逺之意正統四年八月𠡠遼東總兵官曺義等曰今遼東境外女直野人衛分多指進貢為由徃往赴京營私且當農務之時勞擾軍民供送今因其使臣回衛已遣𠡠諭之如係邉報不拘時月聽其朝其餘進貢襲職等事許其一年一朝或三年一朝不必頻數其有市易生理聽於遼東開原交易不必来京如仍數遣使爾等詢察即令退回脫有違碍仍奏定奪庶㡬不擾軍民亦不失逺人歸向之意正統五年六月行在禮部言雲南麓州宣慰思任發謀為邉患其所遣朝貢頭目陶孟忙怕等宴賚視常例宜有所損上曰思任發乆蓄不臣之心肆為封豕之患已興師往討之矣彼之朝貢豈誠心哉不過欲窺事機緩我師耳然朕方以至誠治天下故不逆其詐不拒其来庶彼萬一能有感化禮部其毋損常例賚之第不錫之宴以㣲示意焉使彼知朝廷之眀不為其所罔也正統七年十月福餘衛指揮卜台言與察罕地靣貢使巴哈等偕至闗以無信騐為守闗者所止彼云久不朝貢不知禁例今尚留闗外以俟進止上𠡠總兵官王彧等曰察罕逺在千里之外非附邉諸部之比其使臣卜花如尚在闗即審實發遣赴京今後凡朝貢使人使衛所屬而無印信文字者照例止之其逺方初至及徃来希濶者不在此限不可槩行阻遏以失逺人歸向之心入監之訓正統三年北京國子監助教翁瑛男世資援例請入監讀書行在禮部尚書胡濙以聞上命從之既而謂濙等曰國學育賢之地豈宜濫進前之若此入監者務俾科目出身勿容諸司歴事以圖僥倖繼是有請者令入原籍學科貢於是京官子弟入監以歴事者六人復監肄業天順元年九月故山東右叅政劉琪妻宋氏太宗靖難時琪守北平城有功令乞其孫繼宗入監讀書上曰賞延於世此帝王仁政之一端也琪既効勞先朝而繼宗復有志於學宜允所請但出身務在科目不許援入監先後例以倖進取乞恩之訓天順七年上諭禮部臣曰文職廕子出於朝廷特恩近来徃徃干求不已甚非簡賢任能之意今後文職病故及致仕者子孫乞恩進用俱不宜允并著為令禁閹之訓正統九年𠡠禮部曰擅留閽者朝廷具有禁令日者太監喜寧乃敢私收役使縱令生事擾人已𠡠法司擒問如律爾禮部移文申諭内外一切官員人等有私收者許即連人首送俱宥不問匿而不舉及自後勿悛者或因事暴露或為人發覺俱重罪不宥乞寺額之訓天順八年上因太監陶崇乞寺額𠡠禮部臣曰京城内外寺院已多而内外有勢之人徃徃效尤増修不已或豪奪民居或詭稱古額假名為國祈福而實自欲徼福假名為民禳灾而實以生灾今後更不得妄自増修輒求賜額爾禮部宜以朕此意通行曉示景皇帝禁閹之訓景㤗六年上召禮部尚書胡濙等諭之曰近聞民間自宮者甚多洪熙宣德間已有禁例爾禮部其榜諭多年自今敢有自宮求進及投入王府并官員勢要之家者俱如舊例處以不孝死罪該管旗甲里老隣人知而不首及隠藏者俱罪之禮部志稿卷四
