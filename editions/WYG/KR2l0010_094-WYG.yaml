body:
  text: 禮部志稿卷九十四眀俞汝楫編盛典備考尊孔子修文廟别採材洪熙元年浙江台州府言比文廟及學并按察分司廨宇因海風傾塌欲重建之而頻年水旱民力不逮見有沒入官屋請撤為之上諭工部臣曰廟祀先師何惜扵此而取沒入屋材其文廟令有司别採材作之儒學及按察司聽撤舊材為之奏崇孔子封號成化十二年國子監祭酒周洪謨等奏臣聞近日建言者或欲加孔子封號或欲封孔子為帝要見本朝尊崇先聖之意以備一代之制臣按宋元加大成至聖云者不過言集羣聖之大成耳初不見聖人化澤流行扵後世之意若欲形容聖人道徳之妙化澤之逺必須聖神廣運為詞盖此四字惟孔子足以當之如堯之徳非不廣運也而止扵百年舜之徳非不廣運也而止於一世惟孔子聖化神化流被萬代此所以賢扵堯舜也宋真宗欲封孔子為帝下有司議或言孔子周之陪臣周止稱王不當加以帝號殊不知夏商周之稱王猶唐虞之稱帝因時制宜非有隆殺是前代之王天子之稱王者也後世之王藩國而稱王者也若謂孔子周人當用周制止宜稱王不必稱帝猶之可也若謂孔子陪臣不當稱帝則非崇徳報功之意矣善乎先儒羅從彦論之曰唐既封先聖為王襲其舊號可也加之帝號而褒崇之亦可也夫禮惟稱而已或者乃以周之陪臣為言豈知禮者哉臣又按唐𤣥宗既正孔子南面之位服以衮冕宋徽宗考正孔子冠服加十二旒金世宗加孔子冠十二旒服十二章今聖朝孔子冕十二旒衣十二章其冕服既用天子之禮而籩豆則非天子之制六佾亦非天子之樂乞敕禮部㑹官計議或加美謚或封帝號如不加封或以大成至聖四字易為聖神廣運之數如不封帝或表眀孔子周人當依周制其所封乃當時天王之王非後世國王之王况今既用天子冠冕章服則亦當用天子籩豆佾舞宜増十籩豆為十二籩豆増六佾之舞為八佾之舞使天下後世知聖朝尊崇先聖而報其功者既正以天王位號復祀以天子禮樂與唐宋元之所封位號不同而禮樂亦無不稱也又樂舞之制古者鳴球琴瑟堂上之樂笙鏞柷堂下之樂而干羽舞扵兩階今舞羽反居乎上樂器反居乎下殊失古制仍乞禮部尚書鄒幹等覆奏太祖髙皇帝詔凡嶽鎮海瀆並去其前代所封之號惟孔子以善眀先王之道為天下師非有功扵一方一時者比其封爵特仍其舊今洪謨奏欲以大成至聖易為聖神廣運此四字出扵伯益贊堯之詞昔宰予謂孔子賢扵堯舜則非贊堯之詞可盡孔子之美不若大成至聖四字出扵孟子中庸猶僅可擬議至扵所言聖朝孔子冕十二旒衣十二章既用天子之禮則亦當用天子之籩豆佾舞之數惟太祖髙皇帝建都南京始創國子監止用神主不設塑像故當時祭酒宋納奉敕撰文有像不土繪祀以神主數百年夷習乃革之詔今國子監所有孔子塑像皆因前元之舊不忍撤毁之故其冕十二旒衣十二章盖因塑像之舊亦非聖朝之制而籩豆舞佾之數則祖宗斟酌已有定式若論孔子之功當極其褒崇則雖罄海陸之珍竒全天子之名器亦未足以盡報本之誠所以我朝列聖有見扵此舉因其舊無所増改况謚號之易否器數之加否舉不足以為孔子重輕所貴扵孔子之道身體而力行之擴充而推極之以恵綏元元保乂邦家使舉世䝉至治之澤是乃尊崇孔子之實聖君賢臣所宜留意者也封號籩豆佾舞仍舊為宜詔從之九月命増孔子籩豆佾舞之數國子監祭酒周洪謨言臣比言孔子封號冕服籩豆佾舞等事禮部尚書鄒幹以謚號器數之加否不足為孔子重輕請凡封號籩豆佾舞仍舊為宜臣竊以為孔子自唐開元封為文宣王被以衮冕樂用宫懸當時衮冕雖通乎上下而宫懸者天子之樂也樂既用天子之宫懸服必服天子之衮冕是唐之奉孔子已用天子禮樂矣宋承五代衰敝之制至徽宗始加冕為十二旒元時孔子廟貎徧于天下而被以天子衮冕聖朝因之則孔子服冕已用天子之禮佾舞乃用諸侯之樂以禮論樂則樂不備以樂論禮則禮為僭乞勅廷臣計議増籩豆為十二佾數為八則佾舞與冕服相稱禮眀樂備可以格聖靈厚風化補前代缺畧之典備聖朝尊崇之制䟽入上曰尊崇孔子乃朝廷盛典宜從所言其籩豆佾舞俱如數増用仍通行天下悉遵此制擬加孔子名號𢎞治十三年直𨽻常熟知縣楊子器奏先師孔子名號未定似為今日缺典請取春秋祝文之義扵大成之上加以配天廣運至聖之下系以萬世帝王宗師夫尊之以天子之師享之以帝王之禮則名因義起制與位宜廟食之靈萬世安享而一代盛制備矣下其奏扵所司限立孔子牌位嘉靖十一年都察院為立定程限毁擲天下邪像以永萬世定制事近該監生詹啓奏臣聞孔子得獲追崇尊敬之正自周末迄今未有盛扵陛下者也皆因陛下真知孔子之心亦孔子運際昌期而遇聖君之在上也且陛下欲毁孔子邪像盖因以木為骨以土為皮而聖上不忍遽以土木裝為聖人䙝凟孔子者也今日預聞見之列者悉各駭然臣且以為世之迂儒不足與議者矣昔者孔子沒子夏子㳺以有若似聖人欲以所事孔子事之彊曽子曽子曰不可當時門人以有若似聖人推之扵情似亦不忍忘孔子而曽子竟不許之何也盖曽子以孔子道徳眀著光輝潔白非有若所能彷彿者也此曽子尊敬孔子如此今人雖未面聆孔子之教實黙𫝊孔子之道何存心逺殊曽子歟抑與曽子相反而欲薄于孔子者歟紛紛時議設非斷自宸𠂻孔子豈得光眀正大于今日者耶國學邪像臣師許誥已遵眀㫖正議祭告毁訖竊恐在外有司官員眀恃皇上聞見不及阿從邪議視如泛常仍存原日邪形不遵今日制度致使追尊孔子之禮竟成虚文寧不負扵陛下者耶乞定立程限毁擲天下邪像以永萬世定制等因奏奉聖㫖這監生所奏足見崇正在外所司官員因循不行改正難保必無都察院立限期通行各該撫按官督令提學官將各府州縣土木之像遵照禮部行頒去定式様作速立牌盡行改正并𦂳闗事理著一體遵行仍將改正日期回奏敢有違慢的著撫按官叅奏重治不饒這本還送史館増入祀典欽此通行各䖏撫按官一體欽遵查照施行正孔子廟祝文牌額嘉靖十年正月内禮部題為祀典事照得啓聖公祭享近該本部㑹官擬議别立一祠以顔無繇曽㸃孔鯉孟孫氏配享以程珦朱松蔡元定從祀奉有欽遵通行欽遵外據國子監别立啓聖公祠宇合命官前去本監相視相應地方營建擇日興工仍行翰林院撰祝文祠額應用再照先師孔子名號已正其祝文舊稱惟王今合改稱惟師及舊額大成殿大成門今皆撤去牌額宜照大門舊用文廟二字通行天下遵守則事歸一矣奉聖㫖先師廟堂題曰先師廟門曰廟門孔氏祠曰啟聖祠餘依擬行欽此隆聖裔孔顔孟官制洪武元年十月甲辰以孔子五十世孫希學襲封衍聖公希大為曲阜世襲知縣置衍聖公官屬曰掌書曰典籍曰司樂曰知印曰奏差曰書冩各一人立孔顔孟三氏教授司教授學録司各一人立尼山洙泗二書院各設山長一人復孔氏子孫及顔孟大宗子孫徭役官屬並從衍聖公選舉呈省擢用授希學誥曰古之聖人自羲農至扵文武法天治民眀並日月徳化之盛莫有加焉然皆隨時制宜世有因革至于孔子雖不得其位㑹前聖之道而通之以垂萬世為帝者師其孫子思又能𫝊述而名言之以極其盛有國家者求其統緒尊其爵號盖所以崇徳報功也歴代以來膺襲封者或不能繩其祖武朕甚憫焉當臨馭之初訪世襲者得五十六代孫孔希學大宗是紹爰行典禮以致褒崇爾其領袖世儒益展聖道之用扵當世以副朕之至望豈不偉歟可資善大夫襲封衍聖公授希大勅曰朕惟徳相天地道合四時若此者古今罕焉雖然始伏羲而至有元聖相繼賢接踵未嘗缺也然如仲尼者無且秦焚之後亡扵紀册但存者未完獨仲尼誠通上下澤敷宇宙所以自漢崇之至唐追封文宣王宋加至聖元加大成號封至極血食無窮其子孫世享榮禄所以前代以闕里之邑職其子孫今是邑缺官導民俗以賢推惟孔希大最今特以希大授承事郎知濟寜府兖州曲阜縣事汝往欽哉先是元仁宗授孔思誨為朝議大夫襲封衍聖公賜四品印泰定三年山東㢘訪副使王鵬南言孔子之後襲爵上公而階止四品扵格弗稱且非所以尊崇先聖之意眀年陞嘉議大夫至順二年改賜三品印上謂禮部臣曰孔子萬世帝王之師待其後嗣秩止三品弗稱褒崇其授希學秩貳品賜以銀印希學思誨之孫也優聖賢裔宣徳元年正月孔顔孟三氏子孫十人來朝辭歸上謂禮部尚書吕震曰朝廷待賢當厚彼皆聖賢子孫其給道里費又謂震曰孔顔孟三氏舊設教官訓其子孫必選端重有學行者爾以朕言諭吏部知之訪求曽子子孫嘉靖十一年禮部題該學士顧鼎臣奏為崇植先賢系胄以隆道化事竊惟堯舜禹湯文武周公之道𫝊至孔子而大眀其徳與功垂之萬世直與天地同其髙厚矣孔子𫝊之曽子曽子𫝊之子思子思𫝊之孟子不惟心相授受且筆之扵書以詔後世泄天地之精藴揭宇宙之綱維匯六經之淵源掃百家之蹊径考之論語大學中庸孟子所載如一貫之㫖正心修身之學中和位育之功惟性善誠眀之說王覇義利之辨微言妙道不一而足真所謂為天地立心為生民立命為往聖繼絶學為萬世開太平者然則曽子之功豈小補哉暴秦坑焚之後學道不眀漢司馬遷稱有良史才其序孔門弟子列𫝊但曰孔子以曽参為通孝道故授之業作孝經而已唐韓愈竊附于聖人之徒其序道統之𫝊直以孟子上接孔子他尚何說哉良由大學中庸二書混扵載記篇中不與論語並集學者莫知其為道學之樞奥而討論之是以時君世主徒知推尊顔孟而忽扵曽子子思自唐迄宋雖加曽子封爵而從祀猶列扵十哲之後子思則杳無聞焉宋徳隆盛治教休眀仁宗始表章學庸二書而程顥程頥朱熹諸儒更相發眀遡流窮源使天下後世曉然知正則道統授受之功曽子為大而子思次之咸淳三年始封曽子為成國公子思為沂國公配享次扵顔子躋扵孟子之上而四配之位始正為萬古不易之定論也我太祖髙皇帝御極之初首詔孔氏子孫襲封衍聖公并世襲知縣並如前代舊制固崇儒重道之宏䂓矣𢎞治中因修顔子孟子廟特置世襲翰林院五經博士各一人以主祀事此孝宗皇帝稽古右文之盛舉也夫曽子𫝊道之功優扵顔子而孟子私淑于曽子子思今顔孟子孫皆世襲博士而曽子之後獨不得沾一命之榮豈非古今之闕典也哉當時典禮守土之臣曽無一言及此者豈以曽子子孫散在四方亦世歴乆逺譜系不眀恐有冒濫之弊歟臣嘗考之春秋之時莒人滅鄫其太子巫仕曽去邑為氏然則曽氏去受姓之祖甚近也後世凡曽姓者孰非曽子之子孫乎又訪得正徳年間今都御史錢宏任山東按察司僉事廵歴至嘉祥縣謁曽子祠基因而訪求附近編氓中曽姓者得一農夫扵深山中貌甚朴野詢之果曽子之後也不知錢宏當時何以不請扵朝而復使之湮沒耶必以其人鄙陋不可側衣冠之列故爾臣愚以為先王興滅繼絶崇徳報功其意甚逺其道甚廣不當因其子孫之無賢而遂已也臣自入仕以來見三氏子孫來朝輙有惑扵𠂻耿耿不忘㡬三十年矣茲者恭遇皇上親承道學之統丕宏禮樂之化釐正孔廟祀典一洗前代陋規重勞聖駕臨幸國學躬行釋奠之禮真可謂功光祖廟而範垂百王矣臣謬以章句之儒得預爼豆之事欣榮鼓舞不能自已乃敢陳其愚見仰凟宸嚴如䝉勅下内閣禮部擬議請自聖裁准照𢎞治年間追崇顔孟二氏事例訪求曾氏子孫相應者一人授以翰林院五經博士世世承襲俾守曽子祠基兼主祀事萬世斯文不勝幸甚等因抄呈到部為照曽子親受一貫為聖門之髙弟獨聞大學得吾道之正𫝊垂世立教與顔孟同功號稱述聖已並追崇然獨世嗣弗𫝊基墓失守雖配聖有靈而象賢無主誠為闕典本官欲追求其後同于二氏子孫以作賔王家以主祀事實足以仰體朝廷崇儒重道之盛心也但歴世乆逺譜牒無𫝊若非精訪博求難免偽冐之弊覆奉欽依咨行都察院轉行山東撫按官親臨嘉祥縣查訪曽氏子孫詳考歴代支係之真及正徳年間曽經都察御史錢宏所考農夫有無見在通拘到官督同縣學官吏師生并年髙父老逐一詢問務求的系曽氏正𣲖子孫眀白先行具奏以憑議䖏施行再照今去曽子之世上下千有餘年中間更歴變故子孫播越流寓豈無散而之四方者如南豐曽氏鞏肇布兄弟並顯于宋其家乗以為出自曽子之後今其嫡𣲖子孫亦不知誰何合無仍通行天下大小衙門一體訪求務得其人具實奏聞但不許輕易起送前來以啟夤縁争競之端正曽子廟祀𢎞治四年山東嘉祥縣儒學訓導婁奎言本縣係郕國宗聖公曽子闕里廟堂配享有子思陽膚公眀宣等數人乞視孟子廟制惟留子思一位配享陽膚以下悉列兩廡祝文乞増以沂國述聖公配數字庶子思不混扵他賢又孟子門人皆有封爵曽子門人至今稱名顔孟子孫皆𫝊博士主祭曽子子孫乃流落他所乞如例封其門人訪子孫遺𣲖之在江西贛榆二䖏者擇賢而有學者官之俾之主祭以昭聖代祀典下有司知之作養曽氏子孫嘉靖二十八年九月内曽参五十七代孫五經博士曽粹奏要將子孫與三氏子孫均沾教化改為四氏儒學本部行文查勘曽氏子孫見有若干有無堪以作養授曽氏五經博士嘉靖十八年授先賢曽子之後一人世襲翰林院博士先是掌詹事府事頋鼎臣上言孝宗時曽録顔孟子孫各一人為五經博士以奉祀事可謂盛舉至扵曽子之後獨不沾一命之榮亦古今缺典也䟽入下禮部議訪其世得曽子六十代孫曰質梓者居江西之永豐縣其逺租據者曽子十四代孫也當新莽時不受偽命自武城徙廬陵吉陽鄉而質梓其裔孫也禮部以是覆遂有是命饗勞聖裔洪武六年襲封衍聖公孔希學以父䘮服闋來朝上敕中書下禮部致廪餼及從人皆有賜復以勅勞希學曰卿家昭眀厯代富貴不絶者乃由隂隲之重耳隂隲者何以其闡聖學之精微眀彛倫之攸叙表萬世綱常而不冺也卿當思爾祖之道貫通天人則所以繩祖武者誠為不易朕聞卿來朝已敕中書饗勞至則領之仍賜襲衣冠帶靴襪賜聖裔廪餼舘舎洪武十二年襲封衍聖公孔希學來朝敇中書下禮部賜希學廪餼潔舘舎以安之敕曰昔卿之祖能眀綱常以植世教其功甚大故其後世子孫相承凡有天下者莫不優禮卿每嵗來朝不避祁寒可謂篤君臣之大義而不拂于爾祖之訓者矣已敕中書賜卿日用之物至可領也舘衍聖公洪熙元年正月賜衍聖公孔彦縉宅于京師彦縉數來朝皆舘扵民上聞之頋近臣曰四夷朝貢之使至京皆有公舘先聖子孫乃寓民家何以崇儒稱重道之意遂命工部賜宅隆衍聖公洪武元年正月禮部尚書吕震奏有㫖賜衍聖公孔彦縉一品金織衣衍聖公是二品如㫖賜之過矣上曰朝廷用孔子之道治國家天下今孔子之徒在官有一品服者孔子之後襲封承先師之祀服之何過且先帝時五品儒臣有賜二品服者亦何過哉其賜之用稱朕崇儒之意賜聖裔衣鈔宣徳元年十月襲封衍聖公孔彦縉來朝既退上諭行在禮部尚書胡濙曰先皇帝扵其來朝親定賞賜盖重聖人之道師其道則愛及其子孫今當加倍扵是賜彦縉金織紵絲襲衣鈔羊酒等物資給衍聖公市書籍宣徳四年襲封衍聖公孔彦縉欲遣人以鈔往福建市書慮逺行不敢擅咨扵尚書胡濙濙以聞上曰福建鬻書籍無禁先聖子孫欲廣購亦何必言審度而後行亦見其能慎其令有司依時值為買紙摹印工力亦官給之䘏典從一品景泰七年禮部又言衍聖公雖二品然近賜玉帶及三臺銀印恩禮優異今孔彦縉故其䘏典宜視一品之制從之蠲孔氏田租成化元年四月孔子五十六代孫克昫以子姓繁衍日用不給乞蠲田租上曰孔子有功扵萬世其子孫在所優恤命有司减其租授孔裔五經博士正徳元年特授故衍聖公孔𢎞泰之子聞詩翰林院五經博士初衍聖公𢎞緒以罪奪爵禮部議以𢎞泰襲封復𢎞泰卒爵歸𢎞緒之子聞韶而聞詩充三氏學生聞韶言有例䕃録文臣之餘裔叔𢎞泰亦歴爵三十餘年身沒之後不沾一命乞録聞詩以榮其終身下禮部議無例但𢎞泰効勞頗乆授其子一銜亦足以昭聖眀推恩先聖從厚之意乃有是命衢州孔裔正徳元年六月授孔子五十九代孫彦繩為翰林院五經博士主衢州廟祀宋之南渡也衍聖公端友扈蹕自曲阜徙衢州𫝊五世至其孫洙而宋亡元世祖召洙至欲令襲爵洙以墳墓在衢力辭乃讓其爵扵曲阜宗弟治自是曲阜之後世襲為公而嫡𣲖之在衢者遂無禄衢州知府沈杰求端友後得彦繩請授以官俾世主衢州之廟祀且言其先世所賜祭田在西安者五頃洪武初以民田輕則起科未㡬有王氏子隨母改適冐孔姓以罪抵法田沒官改徴重税亦宜减輕以供祭奠修葺費禮部議覆上曰先聖苗裔在衢者齒扵齊民甚憫之其授之五經博士令世世承襲并减祭田税以稱崇儒重道之意扵是以博士授之彦繩國子監世襲學正嘉靖十四年詔以河南儀封縣孔子六十代孫孔承寅為國子監世襲學正初孔子之裔有名徳倫者唐時為褒聖侯家扵河南寧陵徳倫一字長崇基次子嘆崇基嗣侯其裔名端友者宋時從衍聖公從髙宗南渡世居衢州子嘆之後留寜陵元末徙居儀封正統中詔訪聖賢子孫两地皆復其家在衢曰彦繩者正徳中授世襲翰林院博士在儀封曰承寅者以彦繩例請下河南守臣勘報至是禮部議覆詔授學正奉祀興學請考訂朱註誤成化十六年五月禮部侍郎周洪謨言宋儒朱熹所註釋五經四書間有承漢唐諸儒之誤者乞特勅儒臣考訂上曰五經四書漢唐宋諸儒訂釋已詳具有源委永樂中儒臣奉敕考訂纂修悉取其不悖本㫖者輯録之天下學者誦習已乆周洪謨乃以一己之見欲再紛更事在難准已之振俗學𢎞治十二年吏科給事中許天錫言今年闕里孔廟灾逺近聞之㒺不驚懼邇者福建建陽縣書坊被火古今書板蕩為灰燼先儒嘗謂建陽乃朱文公之闕里今一嵗之中闕里既灾建陽又火上天示戒必扵道所從出與文所萃聚之地何哉臣嘗考之成周宣榭火春秋書之說者曰榭者所以蔵樂器也天戒若曰不能行正令何以禮樂為言禮樂不行故天火其蔵以示戒也今書坊之火得無近于此耶自頃師儒失職正教不修上之所尚者浮華靡艷之體下之所習者枝葉蕪蔓之詞俗士陋儒妄相裒集巧立名目殆其百家梓者以易售而圖利讀者覬僥倖而决科由是廢精思實體之功罷師友討論之㑹損徳蕩心蠧文害道一旦科甲致身利禄入手只謂終身温飽便是平借事功安望其身體躬行以濟世澤民哉伏望眀詔有司大為釐正將應習之書或昔有而今無者檢自中秘所載與經生學士所共習者通前存編刪定部秘頒下布政司給與刋行仍敕乞所司推翰林院或文臣中素有學識官員令其往彼提調考較務底成功然後𫝊布四方永為定式其餘晩宋文字及京華日鈔論範論草筞略筞海文衡文隨主意講章之類凡得扵煨燼之餘悉皆斷絶根本不許似前混雜刋行仍令两京國子監及天下提學等官修眀學政嚴督生徒務遵聖代之教條痛革俗儒之陋習遇有前項不正書板悉用燒除如有乆具文書坐以違制之罪尤願陛下日召儒臣講求致灾之故凡敬天體道之要更化善治之術斷而行之以囬天心以迓休命禮部覆奏謂建陽書板中間固有蕩無留遺者亦容或有全存半存者請令廵按提學等官逐一查勘如京華日鈔等書板已經燒燬者不許書坊再行翻刋先將經𫝊子史等書及聖朝頒降制書一一對正全存者照舊印行及無存者用舊翻刻務令文學真正毋承訛習舛以誤來學從之遣官較勘書坊經籍嘉靖五年時福建建陽縣書坊刋刻寖盛字多訛謬為學者病于是廵按御史楊瑞提調學較副使邵銃䟽請専設官第扵翰林院春坊中遣一人往尋遣侍讀汪佃行詔較畢還京勿復差官更代振刷太學儒學嘉靖四十四年禮部言國家内設太學以教育天下之英才外設儒學以作養民間之俊秀二百年來名臣從此出邇者國子監學舎傾圯生徒止二百人又四方讀書綴文之士爭務剽竊以圖㨗徑扵是教官學術悉為虚名而朝廷不得真才之用故給事中張士純周世選御史張士佩前後論列皆及于此然大要不越數端如請敕工部修理監舎請徴下第舉人及嵗貢年未五十者入監舉人毋得槩就刷歴嵗貢不必專泥正歴而援例一途則俟財用稍充即議停止此太學所當議䖏者也乙榜舉人年四十以上者俱銓授教職不妨㑹試其有異等者一體行取各提學官必身先化導以徳行督課諸生毋專事文藝此儒學所當議䖏者也至于文體弊壊内而两都外而列郡靡然同風其弊皆由書肆刋成盛行便扵採摘請悉按天下私鬻冗書無當寔用者一切剷毁時吏部亦覆世選議處教職一事請自今提學員缺必慎選文行兼優者以充仍限六年教成方議超擢嵗貢衰耄者不得收選有司不職者不得更改文學官俱報可正學詆訾程朱嘉靖元年十月内禮部題該禮科給事中章僑奏為崇正學以圖治理事内稱三代以下論學正莫如朱熹近世以來有等倡為異學之徒大率取陸九淵之簡便憚朱熹為支離甚者以朱熹為好名文章為腐爛等因又該監察御史梁世驃奏稱自古道學之𫝊至宋儒朱熹可謂大眀矣近年以來以陸九淵為尊徳性以朱熹為支離槩多可醜俱乞行提學痛革等因本部議得二臣之言深切時弊有補風教合候命下通行各處廵按御史及两京提學御史各行提學官并司府州縣刋榜曉諭一應僧儒人等務崇正學刮去浮靡以趨篤實毋惑恠異之說毋習簡便之私毋作矯偽之行毋尚艱險之文但有詆訾先儒厭棄經史拂古聖之遺䂓求真知扵一蹴著書立論與程朱相背戾者即是心術不正官府察知亟為禁治主司較閲慎勿收録等因題奉聖㫖你毎都說的是祖宗朝表彰五經頒降敇諭正欲崇正學廸正道端士習育真才以成正大光眀之業百餘年間人材渾厚文體純雅近年以來士習多有詭異文辭務為艱險不無有傷治化你部裏便通行各該廵按提學官出榜曉諭嚴加禁約教人取士一遵程朱之言但有叛道不經之書不許私自刻板互相𫝊習致悮初學其餘俱依擬行欽此頒書頒行孝慈録正統五年六月河南固始縣學訓導舉人黄俊言太祖髙皇帝御製孝慈録嘗頒布天下今四方學中鮮存者乞仍鋟印頒布令士民講誦以隆孝道上曰朕觀孝慈録所論仰太祖聖見卓冠百王實萬代不刋之盛典宜家𫝊而人誦者禮部亟印頒之頒五倫書正統十三年禮部奏天下儒學師生蒙賜五倫書籍往往赴京謝恩荒廢學業乞令就彼望闕謝㤙為便從之刋布書籍嘉靖七年十一月錦衣衛千户沈麟奏請命官較勘歴代史書刋布天下禮部議尚書方獻夫等言史書多殘缺若五代以上諸史惟宋板為工多蓄扵江南富民之家宜命官購索付梓上曰翻刻書籍雖係右文之事但差官購索民間古板未免騷擾反滋奸弊姑已之購書遣使購書永樂二年已夘命禮部遣購求遺書上視朝之暇輟御便殿閲書史或召翰林儒士講論嘗問文淵閣經史子集皆備否學士解縉對曰經史粗備子集尚多闕上曰士人家稍有餘資皆欲積書况朝廷可闕乎遂召禮部尚書鄭賜令擇通知典籍者四出購求遺書且曰書籍不可較價值惟其所欲與之庶竒書可得又顧縉等曰置書不難須常覽閲乃有益凡人積金玉皆欲遺子孫朕積書亦欲遺子孫金玉之利有限書籍之利豈有窮也重儒臣親試庶吉士嘉靖十四年上諭大學士李時尚書夏言曰今科取士考選庶吉士送翰林院命官教習讀書扵十五日舉行時等因請上親御文華殿賜題考試上許焉時又奏曰國朝庶吉士之選儲養翰林院以備舘閣之用其事體所闗至重是以我太宗文皇帝親簡二十八人宣宗章皇帝嘗命大學士楊士竒等簡選賜詩諭意歴科以来惟付之臣下因循茍簡以致較閲弗精去取不當仰惟皇上英資聖學髙出千古勵精圖治百度惟貞扵求才一事尤為切至兹親試之舉誠為盛典臣等敢不恪恭承事待命下之日令禮部將今科進士不必限年十五日引赴文華殿候賜題考試其一應禮文定擬儀注上請禮部因上其儀一四月十五日上御文華殿門下親試進士先期一日鴻臚寺冩題案扵文華殿下光禄寺備試案于文華殿門外東西向北序立上常服御文華殿升座内侍𫝊呼執事官進執事官具吉服分班趨入侍列丹陛上鴻臚寺官贊行叩頭禮畢仍暫分待丹陛𫝊贊進士行五拜三叩頭禮畢各分東西就案北向立執事官入殿東西侍禮部尚書詣御前跪奏請賜題内侍官捧御題授禮部尚書受訖叩頭興捧從左門降階出殿門外内閣中書官以粉牌謄録𫝊示進士上還宫執事官退試畢吏部文選司禮部儀制司郎中等官公同彌封送輔臣并吏禮二部堂上官較閱分正副卷進呈御覽報可禮部志稿卷九十四
