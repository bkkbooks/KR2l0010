body:
  text: 禮部志稿卷三十一明俞汝楫編祠祭司職掌喪禮喪葬之禮通乎上下各有差等無敢僭踰歴朝大喪首遺詔次部議而儀注事例附焉宗藩及品官䘏典嘉靖隆慶以來數更條例今著其見行者以便遵守大喪禮洪武三十一年髙皇帝喪禮遺詔一天下臣民令到出三日皆釋服嫁娶飲酒皆無禁一毋發民哭臨宫殿中當臨者皆以旦晡各十五舉哀禮畢非旦晡臨毋得擅哭一當給喪事及哭臨者皆毋跣絰帶毋過三寸無布車兵器一諸王各於本國哭臨不必赴京中外管軍戍守官員毋得擅離信地許遣人至京一王國所在文武衙門官民軍士今後一聴朝廷節制䕶衛官軍王自處分一諸玉不在令中者皆以此令比類從事部議一在京五府六部等衙門官員聞喪次日各易素服烏紗帽黑角帶赴内府聴宣遺詔畢於本衙門齋宿素服朝晡詣几筵哭仍各置孝服至第四日成服朝晡哭臨至葬畢而止仍自成服日為始服孝服二十七日而除其命婦亦於第四日各具孝服由西華門入哭臨不許帶金銀首餙一諸王世子郡王王妃郡王妃郡主内使宫人等俱服斬衰三年自聞喪第四日成服為始二十七月而除凡臨朝視事素服烏紗帽黑角帶退朝服斬衰一官員麻布大袖員領衫不緝邊麻布帽就用所戴帽以布裹之仍垂帶麻腰絰麻鞋一命婦麻布大袖員領長衫麻布蓋頭一冥器行移工部及内府司設監等衙門成造照依生存所用鹵簿器物名件一作神主用栗木為之制度依家禮一差行人齎捧遺詔前去各布政司并直𨽻府州縣衙門開讀一在外大小衙門文武大小官員人等詔書到日素服烏紗帽黑角帶行四拜禮跪聴宣訖舉哀再行四拜禮畢各置孝服至第四日成服為始每旦率各屬官僚人等於本衙門朝闕設香案哭臨三日而除一在外大小衙門各令官一員赴京致祭所用香燭祭物禮部備辦永樂二十二年文皇帝喪禮遺詔喪服禮儀一遵洪武舊制部議一宫中自皇太子以下成服日為始服斬衰二十七月而除親王世子郡王及王妃世子妃郡王妃公主郡主以下聞喪皆哭盡哀行五拜三叩頭禮第四日成服斬衰二十七月而除凡王視事素服烏紗帽黑角帶退服衰服服内並停音樂嫁娶其祭祀止停百日一在京文武官初聞喪素服烏紗帽黑角帶明日清晨詣思善門外哭五拜三叩頭退各置斬衰服於本衙門宿歇不飲酒食肉第四日成服具衰服詣思善門外朝夕哭臨三日又朝臨十日洪熈後朝臨七日各十五舉聲成服日為始服斬衰二十七日凡入朝及衙門視事用布裹紗帽垂帶素服腰絰麻鞋退服衰服二十七日之外素服烏紗帽黑角帶二十七月而除聴選辦事等官服衰服監生吏典僧道人等素服以成服日為始皆赴順天府朝闕設香案朝夕哭臨三日又朝臨十日洪熈後朝臨七日各十五舉聲仍各素服二十七日而除文武官命婦聞喪第四日各服麻布大袖員領長衫麻布蓋頭清晨由西華門入哭臨三日仍各去金銀首餙素服二十七日凡音樂祭祀官員軍民人等並停百日男女婚嫁官員停百日軍民人等停一月軍民素服婦人素服不装餙俱二十七日一在外俱以聞喪日為始令到之日文武官員素服烏紗帽黑角帶行四拜禮跪聴宣讀訖舉哀再行四拜禮畢各置斬衰服於本衙門宿歇不飲酒食肉第四日成服每旦率合屬官僚人等服衰服就本衙門朝闕設香案朝夕哭臨三日又朝臨十日洪熈以後並無朝臨各十五舉聲成服日為始衰服二十七日衙門視事用布裹紗帽垂帶素服腰絰麻鞋退服衰服二十七日後素服烏紗帽黑角帶二十七月而除文武官命婦聞喪素服舉哀三日各十五舉聲去金銀首餙素服二十七日而除軍民男女皆素服一十三日凡音樂祭祀官員軍民人等並停百日男女嫁娶官員停百日軍民停一月一在京文武官孝服每官員給麻布一疋自制四夷使臣工部造與孝服諸王公主遣官及内外文武官員人等詣几筵祭祀者光祿寺備祭物翰林院撰祭文引赴思善門外行禮各處進香官辭歸者諸王公主所遣臨期司禮監請㫖給賜其方面官與路費鈔二十錠餘十錠一京城聞喪日為始寺觀各聲鐘三萬杵禁屠宰四十九日一上尊諡儀具後一二十七日以後皇帝素冠麻衣麻絰臨朝退仍衰服一發引儀具後一大祥奉安神主神座儀物於太廟前一日遣官祭告太廟至日上親告几筵殿皇太后皇后以下各祭一壇王府遣官共祭一壇在京文武官員共祭一壇一禫祭遣親王詣陵行禮洪熈元年昭皇帝喪禮遺詔山陵制度務從儉約喪制用日易月皆以二十七日釋服毋禁嫁娶音樂在外親王藩屏為重不可輒離本國各處總兵鎮守備禦重臣及文武大小官員亦毋擅離職守聞喪之日止於本處朝夕哭臨三日悉免赴闕行禮部議自聞喪日為始不鳴鐘鼓在京禁屠宰十三日諸王世子郡王及王妃郡主以下並遵遺詔喪服二十七日而除上尊諡次日百官各具素服烏紗帽黑角帶於承天門俟開讀尊諡詔嘉靖四十五年肅皇帝喪禮遺詔喪禮依舊制以日易月宗室親郡王各處總督鎮廵三司官各於本處朝夕哭臨三日進香差官代行衛所府州縣並土官並免進香郊社等禮及祔葬祔享各稽祖宗舊典斟酌改正部議一發喪殿下括髮詣大行皇帝宫内舉哀哀止小殮括髮設奠不用文舉哀歸喪次皇貴妃等妃殿下妃皇孫涇簡王妃等妃景恭王妃寧安公主舉哀禮同哀畢各歸喪次是日頒遺詔一大殮殿下素服束髮詣大行皇帝前舉哀設奠不用文大殮奉安梓宫几筵安神帛立銘旌哭盡哀皇貴妃殿下妃皇孫及各王妃公主哭臨禮皆同一成服殿下服衰服詣梓宫前舉哀行奠祭禮皇貴妃殿下妃皇孫及各王妃公主皆成服各設祭一壇六尚及宫人各隨祭禮畢各歸喪次是日内官内使祭一壇以上祭俱用文次日公侯駙馬伯五府六部等衙門共一壇文武三品以上命婦共一壇一每七及百日殿下一壇皇貴妃等妃共一壇殿下妃一壇皇孫一壇涇簡王妃等妃共一壇景恭王妃一壇寧安公主一壇一内外官員軍民人等及各王府夷使禮並與洪武永樂同永樂二十二年上尊諡儀隆慶初稍有更定者附註于下前期三日齋戒前一日遣官祭告天地宗廟社稷如常儀俱太常寺先期奏請各祭告用祝文香帛果酒脯醢是日後用前一日内侍官置冊寶輿于奉天門即皇極門仍有香亭又几筵前左右先設冊寶案捧冊寶各置輿中皇帝具衰服詣奉天門隆慶初先祭告几筵陳設祭品如常儀祭畢御皇極門百官暫免朝㕘内侍官舉冊寶輿導引官導皇帝後隨降階陞輅導引官退百官序立金水橋南北向皆素冠服腰絰俟冊寶輿將至皆跪冊寶輿過畢興皆隨至思善門外序立于北向皇帝降輅隆慶初内官導引至乾清門外降輅冊寶輿由中門入至几筵殿丹陛上導引官導皇帝繇左門入内贊唱執事官各司其事導引官導皇帝就丹陛上拜位捧冊寶官捧冊寶繇左門入隆慶初繇殿中門入至几筵前分左右立北向導引官奏四拜後内贊奏皇太孫親王皇孫陪拜丹陛上百官陪拜思善門外内贊及鴻臚寺官同時傳贊四拜畢導引官導皇帝繇殿左門入詣几筵前奏跪内贊及鴻臚寺官傳贊皇太孫以下及百官跪奏進冊捧冊官跪進冊于皇帝左皇帝受冊獻畢授捧冊官置於案奏進寶捧寶官跪進如前儀奏宣冊宣冊官跪宣而于皇帝左畢奏宣寶如宣冊畢奏俯伏興平身四拜傳贊百官同奏復位導引官導皇帝繇殿左門出就拜位奏四拜隆慶初接行祭禮省就位四拜奏初獻禮奏跪獻酒隆慶初初獻有獻帛贊讀祝讀祝官讀畢亞獻終獻禮拜傳贊並同隆慶初終獻後有奏俯伏興平身奏復位導引出殿左門就拜位奏四拜導引官導皇帝繇殿左門入詣神位前捧冊寶授内侍官捧入導引導皇帝入内奉安訖奏叩頭畢導引官導皇帝繇左門出至丹陛上奏禮畢傳贊同導引官導皇帝還宫隆慶元年進呈尊諡議文儀先是勅諭文武羣臣議上尊諡至期前一日鴻臚寺官于宣治門設諡議文案是日早上具衰服隆慶六年上具素翼善冠麻布袍腰絰御宣治門捧諡議官立於階之東文武百官各具素冠服隆慶六年百官黒紗帽黑角帶皂靴詣丹墀贊行四拜禮興禮部官出前跪奏進尊諡議文奏畢復位序班二員引班首官稍進前捧諡議官以文授班首官班首官受諡議文繇中道進將至御前序班贊進尊諡議文上起至諡議文案之北班首官進諡議文置於案贊跪百官皆跪上覽畢召翰林院官趨至前跪上以諡議文授翰林院官命撰諡冊文翰林院官受訖捧從中道出上復坐贊俯伏興班首官與百官俯伏興班首官復位贊行四拜禮畢序班徹案上還隆慶元年尊諡頒詔儀先期鴻臚寺設詔案於皇極殿内東錦衣衛設傘蓋於皇極殿前至日早各官具已素服烏紗帽黑角帶於承天門外伺候上御中極殿具黑翼善冠白素袍黑犀帶執事官先行五拜三叩頭禮鴻臚寺官奏請陞殿導駕官導上御皇極殿鳴鞭訖序班舉詔案於殿中翰林院官捧詔立於左鳴贊唱頒詔翰林院官以詔授禮部官禮部官受詔置於案序班舉案繇殿左門出錦衣衞用傘蓋迎至承天門上百官入班鳴贊唱四拜稱有制唱跪開讀訖再唱行四拜禮鴻臚寺官傳奏禮畢百官退詔書迎至禮部授使者頒行天下永樂二十二年發引儀發引前三日行奏告禮百官預齋戒三日隆慶初太常寺先六日奏齋戒京城内外禁屠宰音樂勅命大臣一員䕶喪行禮勅把總内官勅入皇堂内官内使遣官以喪期告天地宗廟社稷祭品行禮如常儀皇帝衰服告几筵禮如啟奠皇太子親王以下皆衰服隨班行禮是日後百官衰服朝一臨至發引日止京師内外禁樂至祔祭日止禁屠宰至葬畢日止發引前一日遣官祭金水橋午門端門承天門大明門徳勝門幷橋清河橋沙河京都應祀神祇幷經過去處應祀神祠隆慶初増祭乾清宫門隆宗門思善門幷橋歸極門御橋玉河橋沙河安濟橋朝宗橋其應祀神祇闗王廟天將廟靈濟宫城隍廟東嶽廟真武廟内門橋俱内官行禮玉河橋以下俱太常寺官行禮祭用酒果餚饌香燭祝文是夕設辭奠隆慶初改辭靈禮如啟奠皇帝后妃皇太子親王以下皆衰服以序致祭司禮監禮部錦衣衛官提督執事者設大昇輿於午門外依圖式陳葬儀於午門外幷大明門外發引日設啟奠内侍陳設醴饌拜位如常儀内導引官導皇帝衰服詣拜位皇太子親王以下各就拜位贊禮贊四拜奠帛獻酒讀祝四拜舉哀興哀止望瘞禮畢隆慶初改望瘞為焚幣帛祝文以後祖奠遣奠至陵安神遷奠享禮禮俱同内導引官導皇帝詣几筵殿内稍東西向立皇太子親王以下丹陛上稍東西向立執事者陞徹帷幕等物拂拭梓宫畢内侍徹啟奠内執事官進龍輴於几筵殿下設真亭神帛輿諡冊寶輿於丹陛上設祖奠如啟奠儀畢内導引官導皇帝詣梓宫前稍東西向立導皇太子繇殿左門入立於皇帝之南稍東西向親王以下俱於丹陛上稍東西向内侍於梓宫前跪奏請靈駕進發内侍捧諡冊寶次捧神帛繇殿中門出各置輿内次捧銘旌繇中門出執事官陞捧梓宫内執事持翣左右蔽梓宫降殿内侍官於梓宫前跪奏請梓宫陞龍輴執事官奉登龍輴訖以綵帷飾梓宫執翣仍立左右内侍擎繖扇侍衛如儀列舊所御儀仗于前諡冊寶輿神帛輿真亭銘旌以次而行内導引官導皇帝繇殿左門出后妃皇太子親王及宫眷後隨后妃宫眷哭於帷中至午門内設遣奠如祖奠儀内侍於梓宫前跪奏請靈駕進發司禮監官率儀衛諡冊寶輿等前行皇帝后妃皇太子親王以下皆哭盡哀内侍于皇帝前跪奏請還宫内侍導引皇帝還宫后妃以下皆還宫隆慶初皇子同還執事官舁