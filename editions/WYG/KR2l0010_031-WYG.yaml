奠至卒哭之明日奉神主祔享于太廟儀具升祔下祭畢太常卿于神主前跪奏請太宗文皇帝神主還几筵奏訖導引官導皇帝捧神主由廟左門出至門外安奉于御輦儀衛繖扇導從如來儀皇帝陞輅後隨至午門外儀衛止皇帝至思善門降輅釋祭服易衰服隨御輦至几筵殿前内侍于輦前跪奏請神主降輦陞座内侍奉神主升座訖内導引官導皇帝繇殿左門入行安神禮如前儀禮畢皇帝釋服還宫明日百官素服烏紗帽黑角帶行奉慰禮凡大喪内朝賀祭祀等禮洪熈元年仁宗既祔廟上仍素服御西角門視朝遇行時享等禮太常寺奏祭祀其日早朝鳴鐘鼓服黄袍御奉天門視朝祭畢仍如前至禫祭後始釋素服成化二十三年憲宗喪服既除上仍素翼善冠麻布袍腰經視朝不鳴鐘鼓文武百官素服烏紗帽黑角帶皂靴朝參至百日後始變服如常是年冬至節詔免行賀𢎞治元年正旦以憲宗服制未及小祥上服黄袍御奉天殿鳴鐘鼔鳴鞭作堂下樂文武官具公服行五拜三叩頭禮次日至十五日具黑翼善冠淺淡袍服犀帶御奉天門文武官具常服朝參至禫祭免朝一日遣官詣陵致祭正徳十六年肅皇帝萬夀聖節以武宗山陵未畢令天下齎進表文幷公侯駙馬伯儀賓進賀綵段俱免宣讀陳設逕送司禮監承運庫交收嘉靖四十五年嵗暮大祫隆慶元年孟春時享太廟以世宗喪禮尚在二十七日之内禮部題准照𢎞治十八年例暫遣官行禮樂設而不作免陞殿奏祭祀齋戒之日上于喪次致齋陪祀官俱暫免隆慶元年正旦後世宗喪禮成服畢上始服衰服御宣治門視事百官素冠服腰絰行奉慰禮以後朝參並同至二十七日滿上易素翼善冠麻布袍腰絰御宣治門視事俱不鳴鐘鼓百官素服烏紗帽黑角帶皂靴朝參辦事二月祭先師孔子及朝日壇歴代帝王以梓宫在殯議准照𢎞治十八年例免請陞殿及傳制命太常寺具本奏知仍各遣官行禮樂設而不作致齋之日照天順八年例上具黄素袍翼善冠百官具淺淡色服朝參陪祀執事官至期仍各祭服行禮本月祭太社太稷議准仍請上親祭餘並同例三月世宗祔廟畢次日免朝百官烏紗帽黑角帶青圓領辦事又次日上具黑翼善冠黑犀帶淺淡袍服御皇極門百官仍烏紗帽黑角帶淺淡色服行奉慰禮以後俱皇極門視事鳴鞭鳴鐘鼓如累朝例是年孟夏時享太廟以世宗神主尚在几筵照正徳元年例先一日上具常服祭告几筵祇請詣廟享祀以後遇太廟時享祫祭大祥内皆如之其鴻臚寺奏請陞殿太常寺奏致齋及祭畢聖駕回宫俱樂設而不作禮部志稿卷三十一
