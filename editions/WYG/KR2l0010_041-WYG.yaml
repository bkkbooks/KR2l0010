body:
  text: 禮部志稿卷四十一明俞汝楫編歴官表昔龍門令史為侯王作年表以有土君長帶礪綿邈畧倣春秋紀年􅉍見予奪之久近也後世官同圜轉義無世及曷表焉然入其官則亦有受事之日月矣循省牽絲爰蒂及􅆶卿省惟月尹惟日飲冰之義於是乎在故知表之不可以已也苐其體世經人緯國初題名諸臣間有嵗月漶漫者將安附哉竊睹雷鄭王李四家表皇明諸臣皆以年系人以人系官又表家之變體乎謹循其例将贔屭鐫識提挈而整齊之凡禮曹之長貳司屬咸得備書蓋其姓氏里居資次遷轉之槩臚若列眉也俾覽者指曰若而人也是聖世之秉禮臣也以視刑名錢穀兵戎将作之司何如哉作歴官表國初禮部尚書内氏籍俱考註無考者闕之崔亮直𨽻藁城人國初歸附吳元年任禮制司洪武元年丁憂錢用壬直𨽻廣徳州人故元進士洪武元年初設禮部尚書首任本年致仕崔亮洪武元年起復再任二年卒於官陶凱浙江天台人洪武初年薦舉三年任五年出湖廣參政後以罪廢楊訓文四川潼川人洪武初年舉人才四年任協陶凱理部事六年改户部尚書牛諒山東東平人洪武初年以秀才舉五年任七年降本部主事尋復前職劉昭先洪武初年舉人才洪武六年任協牛諒理部事七年罷吕本直𨽻壽州人故元丙午歸附歴吏部尚書謫官洪武七年召任八年出為兩浙運使歴太常寺卿卒于官趙著洪武七年五月任章善浙江錢塘人洪武八年任本年命署湖廣參政後以事免張籌直𨽻無錫人故年鄉試舉人録用洪武九年任十年罷翰作李允真定蠡州人繇元故官授兵部郎中累遷兵部尚書改任本年降寺丞朱夢炎江西進賢人故元至正辛夘進士録用洪武十二年任十三年卒于官鄭九成洪武十三年以河南按察使陞任本年免偰斯應天溧陽人國初歸附任吏部尚書洪武十三年改禮部本年以年老致仕李冕保定博野人洪武十三年任十四年以事免李叔正江西靖安人名宗頥國初丙午年以文學徵洪武十四年任十五年卒于官髙信浙江義烏人洪武中薦舉十五年任本年以老致仕劉仲質江西分宜人洪武初年舉文學十五年任本年改華盖殿大學士未幾坐事降監察御史後以年老致仕任昂河南河隂人故元進士洪武初年以儒士薦舉十五年任十六年署吏部事十七年致仕趙瑁河南宜陽人舉文儒洪武十七年任十八年改吏部尋以禮部事坐法唐鐸直𨽻鳯陽人元末從軍洪武十九年任刑部尚書署部事二十年改兵部尚書李彦名直𨽻安州人洪武中以通經儒士舉用二十年任二十三年致仕趙勉湖廣夷陵人洪武二十四年以户部尚書署禮部事楊靖直𨽻山陽人洪武乙丑進士二十六年以刑部尚書署禮部事二十九年改吏部賜死任亨泰湖廣襄陽人洪武戊辰狀元二十七年任二十九年以私市蠻人降監察御史後以事免門克新陜西秦州人洪武中舉太學二十九年任本年以疾卒于官鄭沂浙江浦江人洪武中舉孝行三十年拜禮部尚書三十一年致仕陳迪直𨽻宣城人洪武乙夘薦舉三十一年任加太子少保革除四年以死靖難族誅李至剛直𨽻華亭人洪武末年以明經舉革除四年任永樂二年兼左春坊大學士三年除禮部儀制郎中以罪下獄二十二年調興化府知府宣徳二年卒于官鄭沂永樂元年來朝命仍知禮部事本年以年老賜誥歸鄭賜福建甌寕人洪武己丑進士歴工刑二部尚書永樂三年改任六年卒于官贈太子少師謚文安吕震陜西臨潼人永樂六年繇刑部尚書改任十八年扈行在十九年定鼎北京掌部事于北劉觀直𨽻雄縣人永樂六年以都察院右副都御史改任本年改刑部尚書趙羾河南祥符人鄉貢舉人永樂七年任歴兵刑二部尚書永樂十九年以後另表國初禮部左右侍郎世家寳河南臨潁人故元集賢院學士歸附洪武元年任二年陞刑部尚書坐事降廬陵知縣召還授兵馬副指揮使歴兩浙運同臨安府知府致仕黄肅故元主事歸附洪武三年以本部主事陞任本年降工部郎中尋復陞工部侍郎傅􅬐國初入仕歴中書參知政事洪武二年改禮部侍郎三年致仕張銘善洪武三年任侍郎秦文繹洪武三年任侍郎丘民洪武四年六月任秦約直𨽻崇明人洪武初年以文學舉四年任侍郎本年以母老致仕後卒于家楊冀安直𨽻靈璧人洪武四年任侍郎曾魯江西新淦人洪武初年以文學徵修元史五年任侍郎本年以疾致仕卒于途楊思濟河南歸徳人洪武初年薦舉六年任右侍郎九年免王中立山西平定人洪武初年舉儒士六年任左侍郎本年致仕朱夢炎詳尚書洪武七年任左侍郎李冕詳尚書洪武十一年繇本部員外郎陞任本年為試尚書魏鑑洪武初年薦舉十二年任右侍郎十三年免劉崧江西泰和人洪武初年舉明經十三年命以禮部侍郎試吏部尚書本年致仕後起國子監司業卒于官李叔正詳尚書洪武十三年繇湖廣試布政司陞任試右侍郎劉嘉議洪武初年薦舉十四年任左侍郎十七年免張子源洪武初年薦舉儒士十五年任右侍郎本年免朱同直𨽻休寧人洪武中舉明經十五年任右侍郎十六年坐事廢吳𤣥洪武十五年任七月改山東按察使儲可求直𨽻宜興人名才洪武初年舉明經十六年任右侍郎二十年免王志即好徳直𨽻藁城人洪武初年薦舉十七年任左侍郎十八年免章祥洪武初年薦舉十八年任左侍郎二十一年免陳思道浙江山隂人洪武乙丑進士二十一年任左侍郎二十三年乞歸養張衡江西萬安人洪武乙丑進士二十年任右侍郎二十二年轉左侍郎二十三年卒于官王起東浙江上虞人洪武中以文學舉獻大明頌不次用二十三年試右侍郎二十四年免凌漢河南原武人洪武中舉秀才二十二年為右都御史本年降刑部侍郎復為僉都御史改禮部右侍郎張智福建順昌人洪武中舉明經二十四年任右侍郎命申肅朝儀二十六年降為北平府儒學訓導旋改國子學録歴國子司業姚子宗洪武中薦舉二十六年任左侍郎二十八年致仕張炳山西澤州人洪武中舉人才二十六年任右侍郎二十八年轉左侍郎革除元年改北平左布政使被執而死齊麟山西五台人洪武乙丑進士二十八年任右侍郎二十九年免許觀直𨽻貴池人洪武辛未㑹元状元二十九年任右侍郎革除元年陞侍中四年死靖難董倫順天宛平人洪武末年舉明經三十一年任左侍郎兼翰林院學士革除四年免吳景𤣥浙江括蒼人洪武中以人才舉革除元年任左侍郎本年致仕陳性善浙江山隂人洪武丁丑進士革除元年任左侍郎四年以監軍敗入河被執死蔣源洪武中薦舉革除元年任右侍郎二年免黄魁革除二年任右侍郎四年死靖難宋禮河南永寧人洪武中歳貢革除四年任右侍郎本年轉左侍郎至永樂三年以工部尚書採木四川九年又出濬㑹通河十年冄督四川木兼巡撫回京卒戚存心浙江黄巖人洪武甲戍進士永樂二年任左侍郎五年除工部營繕司主事歴北京太僕寺卿兼苑馬寺卿卒于家趙羾見本部尚書永樂二年任左侍郎劉翼南永樂元年任北京行部右侍郎二年改禮部侍郎尋轉左王彰河南鄭州人洪武丁夘舉人入太學永樂五年任右侍郎六年丁憂儀智山東髙宻人洪武末年以儒士薦舉永樂六年任左侍郎十九年致仕卒于家贈太子少師謚文簡蔚受直𨽻合肥人洪武中國子生永樂六年任右侍郎古朴河南陳州人洪武癸酉鄉舉永樂七年以户部右侍郎署本部印信金純見尚書永樂十四年以刑部右侍郎改任本部右侍郎胡濙見尚書永樂十四年二月以户科都給事中陞任右侍郎易英湖廣澧州人洪武末年舉文學永樂十六年繇浙江布政司右參議陞任坐累左遷本部主事國初禮部郎中王宗洪武三年任本年十二月改磨勘司令周彌瞻洪武十三年任祠祭司髙信湖廣郴州人洪武十四年任夏伯通洪武十四年任祠祭司杜思進洪武十五年任陞户部試侍郎蔣惠洪武十六年任祠祭司王正洪武十七年任祠祭司李習洪武十八年任祠祭司邢文􅄎洪武二十一年任祠祭司劉鑑洪武二十五年任祠祭司金潤湖廣人洪武二十五年任先是以郎中謫都察院鞫獄嘗奏事殿中稱旨是年復命為禮部主客司郎中陳植洪武二十九年任祠祭司郝鵬洪武三十五年任改湖廣布政司左參政胡遠永樂元年任六月以纂修髙廟實録陞左參議汪原進永樂二年任改漢府左長史程得永樂二年任祠祭司鄭居真直𨽻歙縣人永樂十二年任闕李繼鼎永樂二年以北平刑部郎中改任儀制司郎中兼右春坊右賛善五年改任左賛善侍皇長孫說書李至剛永樂三年四月以本部尚書坐罪釋降任儀制司九年六月以解縉同謀下獄童銓永樂七年任祠祭司王宴永樂七年任精膳司本年九月陞陜西布政司右參政左洋永樂八年任祠祭司鄒濟永樂八年任九月皇太子陞為廣東布政司右參政潘賜永樂九年任祠祭司本年十一月改江西布政司右參政髙謙永樂十年任本年十一月陞河南布政司右參政平思忠永樂十四年任十六年陞陜西布政司參政陳士恪永樂十五年任十六年陞山東布政司右參政曾堅洪武中員外郎永樂十六年任祠祭司郎中本年四月陞雲南左布政使李昌祺江西廬陵人永樂甲申進士十六年仕主客司郎中陞廣西左布政使葉春浙江開化人永樂壬戍進士十六年以主客司員外郎陞任本司郎中陞兩淮鹽運司運使楊清應天上元人永樂壬辰進士十六年以主客司員外郎陞本司郎中葉仕寧初以儀制司主事陞員外郎永樂十六年陞郎中十七年六月陞陜西布政司左參政李斆永樂十六年任十七年七月陞江西布政司左㕘議陳景宗王復金雍曾伯機楊冀安劉翼南吳禧張彬宋伯義夏止善匡文真李興陳敬蕭鏞陸允大隂仲宏安健張益之姚文正楊思正文彬文濟亨周銳周訥姚本原邢倫張恩楊允崔詢李宰輔吳宗直潘定趙安張頥已上洪武至永樂十七年郎中姓名見題名碑而籍貫履任無攷者也國初禮部員外郎曾堅故元禮部員外郎歸附洪武二年至自北平仍以為禮部員外郎吳伯宗洪武四年狀元及第授禮部員外郎程徳洪武四年任本年改御史台治書侍御史林洪洪武六年任祠祭司瞿莊洪武九年任本年陞福建行省參政張籌洪武九年任本年為本部尚書朱夢炎洪武十年任本年為本部尚書李冕洪武十三年任本年九月試本部尚書林堅洪武十四年任祠祭司應奉世洪武十六年任趙震洪武十八年任高昌安洪武二十一年以山東按察司僉事陞任二十三年陞吏部侍郎陳子髙洪武二十一年任祠祭司何仲亷洪武二十四年任潘善應洪武二十八年任侯泰洪武三十年任本年五月陞刑部右侍郎劉撝謙永樂元年任祠祭司方彦楨永樂元年以儀制司主事陞任陸顒永樂元年繇户部主事謄冩髙廟實録陞任葉仕寧永樂四年以儀制司主事陞任又陞祠祭司郎中饒晞永樂六年任祠祭司滕霄永樂八年以本部司務陞任祠祭司劉泰永樂九年以主客司主事陞任祠祭司吳福浙江鄞縣人洪武庚辰進士永樂十五年任儀制司陞陜西布政司右參政唐魁永樂十年以儀制司主事陞任陳資茂浙江寧海人永樂丙申進士十年任儀制司傳楫齊允中孫禎祥李原曹貴髙雄飛徐遜趙麟唐岳余致中徐善吳敏汪大賔劉華李公正梁盈王恭辛欽黄鼎曹貴周舟李燇李甫潘同陸貞張槩金忠汪智華侯允黄榮侯敏陸普任已上洪武至永樂十七年員外郎無攷者國初禮部主事黄肅故元禮部主事歸附洪武二年同曾堅至自北平製新衣賜之仍以為禮部主事魏觀洪武四年繇龍南知縣陞任五年陞蘇州知