body:
  text: 禮部志稿卷五十六明俞汝楫編列傳侍郎王直王直字行儉江西泰和縣人永樂甲申進士選為翰林庶吉士授修撰成祖巡幸北京仁宗監國翰林留黄淮楊士竒與直三人輔導及來北京與修太祖實錄未成以憂去服闋陞侍讀仁宗即位進侍讀學士宣宗嗣位與修兩朝實錄成陞少詹事仍兼侍讀學士英宗即位與修宣宗實錄為總裁書成陞禮部左侍郎尋出視禮部事正統癸亥陞吏部尚書己巳秋北兵犯邊上欲親征直率廷臣上章諫止不報命留守京師既而加太子太保景泰中陞少傅太子太師天順改元上復位辭師傅之職未幾致仕卒年八十四訃聞贈特進榮祿大夫太保諡文端仍勅有司𦵏祭直偉貌修髯端謹持重望之如神仙中人在翰林三十餘年屢為考官得人為盛經筵進講辭㫖明暢出蒞禮部尚書胡濙大喜闔部之政悉付之直處之裕如若素習者在吏部㢘慎自守居家儼然子弟不敢近為詩文條暢簡潔在二十八宿中登顯位成大器者惟直為最與學士王英齊名而行檢過之侍郎王英王英字時彦江西金谿縣人永樂甲申進士選為翰林院庶吉士丁亥擢修撰秩滿陞侍講成祖北征英扈蹕有勞蹟比宴駕榆木川英與尚書蹇義等議喪禮仁宗嗣位進侍講學士尋陞右春坊大學士仍兼舊職支二俸宣宗登極與修兩朝實錄陞少詹事仍兼舊職母喪命有司塟祭遣中使䕶行遂起復英宗即位修宣宗實錄為總裁官書成陞禮部左侍郎仍兼侍讀學士八年癸亥正月奉㫖出理部事乙丑浙江台寧等處民遭疫死甚衆上遣賫香幣往祀南鎮以禳民厲時浙間久旱英至紹興大雨水深三尺灌獻之夕雨止星見明日又大雨田野沾足人皆喜曰此侍郎雨也布政司孫原貞等作御祭感應記刻石於廟而還丙寅奏京師去冬少雪今年自春徂夏雨澤不降種不入土小民缺食此皆臣等政事不修所致伏望陛下施賑恤之恩臣等宜益修愆戒飭仍乞齋沐祈禱以格天心上從其言果大雨五日先是奏請致仕不允至是年七十乞罷政復不允戊辰八月特㫖陞南京禮部尚書景泰元年卒諡文安遣官諭祭安𦵏英屢為㑹試考官多得名士其文章典贍一時重之尤善草書解縉以後一人而已然豪縱跌宕不拘小節頗有晉人風度云侍郎錢習禮錢習禮名幹以字行江西吉水人自幼喜學才敏思深文多腹稿人莫不竒其才以江西解魁登永樂辛卯進士第選為庶吉士尋授檢討仁宗即位乃進侍讀知制誥與修兩朝實錄成進陞學士正統乙丑特勅陞禮部右侍郎時朝廷稽古右文事多繇禮部尋命兼署吏部事益敬畏不自安連章求去遂致仕卒年八十九勅有司營𦵏祭諡曰文肅習禮恬静少慾篤於倫誼處已待人恭而有禮在翰林三十餘年以文章議論為士類所推重引年退休不廢文墨侍郎王一寧王一寧浙江仙居人十三能詩父峻用任國子監丞一寧從侍時仁宗在春宫以其善撫琴召見命賦早過銀河詩嘉之使就國子監讀書登永樂戊戍進士授吏部稽勲司主事於文華殿供事考滿改翰林修撰預修宣宗實錄書成進侍講兩被命為京闈考官正統十三年遷禮部右侍郎景泰初勅往湖廣督理軍餉明年召還陞本部左侍郎兼翰林院學士命入内閣預機務以中官王誠輩嘗受業焉報其私恩也壬申易儲進太子少師仍兼舊職尋卒於官賜賻鈔祭𦵏贈太子太保禮部尚書諡文通一寧性敏捷詞翰清俊然不慎名檢君子無取焉侍郎章瑾章瑾字用欽浙江㑹稽人父敞為禮部左侍郎自幼失恃英爽卓立甫十餘嵗為文辭已蔚然宣徳丙午其父與吏部尚書趙新同為吏部郎中趙公見其非常人喜而以女歸之是嵗舉順天府鄉試丁未庚戍連試禮部不第癸丑又試名在副榜時朝廷慮俊秀拘於科額必有遺才在副榜者命翰林復選得二十四人授冠帶給以所當得之祿俾卒業俟後舉正統丙辰中禮部㑹試第七廷對賜進士出身觀政兵部踰年以父喪服闋擢禮科給事中時天下亢旱承命祀南海神沛澤斯應數年為同列所推薦遷都給事中景帝嗣統拜禮部右侍郎既而廣東盜賊竊發命撫廣東兼治羣盜瑾聞楊信民素為廣州之民信服以詿誤謫守邊闗力言於上起信民為右僉都御史瑾因疾未行於景泰元年卒年四十四後信民至廣東民有被脇從為盜者聞信民至相率來順歸者凡數千人不負所薦云侍郎儀銘儀銘字子新山東髙密縣人前禮部侍郎諡文簡智之子以父廕入太學授給事中陞翰林院修撰宣宗實錄成陞侍講正統五年陞郕府長史持正不阿有承奉抗王儀即日劾奏之朝廷責承奉而撻之景泰初銘以潛邸舊恩陞禮部左侍郎明年陞南京禮部尚書景泰三年召還陞太子太保兼兵部尚書仍兼掌詹事府事嘗因災異言弭變之方在敬天法祖用賢納諫省刑薄斂節用愛人遂錄皇明祖訓并進以致警戒之意深見奬納推恩三代皆如銘官五年以疾卒遣官諭祭賻鈔萬緡贈特進光祿大夫左柱國太師諡文襄命有司治𦵏事錄其子海為錦衣衛百戸銘雖短於才學然質實負氣遇事侃侃不屈雅志儉樸仕宦三十年惟守舊廬論者謂其不愧乃父云侍郎儲懋儲懋直隸丹陽縣人永樂甲午舉人十三年授台州府學訓導有學行二十二年擢吏科給事中正統元年選充經筵陞翰林修撰三年與修實錄陞侍講八年陞户部右侍郎十四年轉禮部左侍郎為人端重寛和士林推重景泰元年兩京災異迭見給事中葉盛與都給事中李實等欲革各藩鎮中官因約羣臣㑹奏尚書金濂等皆佯贊可行無實心㑹南京學士周叙言事中及之未幾兵部因他奏官多民擾乞將各處公差内外官員量取囘京有㫖内官不動又數日奏議及周叙奏有言此亦有例見行懋即揮筆批定盛因曰此誠民病今既有言者若合辭上請或可從而衆不能然識者惜之二年知貢舉嚴闗防無私弊尋陞南京戸部尚書未任卒於京侍郎李實李實字孟誠四川合州人正統乙丑進士授禮科給事中英廟留北庭衆議遣使奉迎而未決實昌言於朝謂奉迎之使在所必遣不然則曲在我衆難其人實請行遂陞禮部右侍郎使北還陞右都御史巡撫湖廣英廟復辟有上其所著北使錄言多虚誕用是黜為民尋召起於家行至南陽御史龔晟等劾之謂實輕佻小人素無行檢不宜復用有㫖令移文止之命下實已至京因自叙歴任功代具奏申辨且引漢文季布事為言復為御史董韜所劾詔實既不用何若等又言之命以原職致仕實滑稽有口辯頗恣肆不檢在湖廣以黷貨聞士論鄙之然使北庭能不屈於敵肆言辯折令人敬憚車駕之還未必為無助云侍郎薩琦薩琦字廷珪係出西域後為福建閩縣人宣徳庚戍進士宣宗詔楊士竒簡庶吉士入讀中秘書取琦第一命太和王直教之正統元年授翰林院編修預修宣廟實錄三年陞本院侍讀景泰三年缺禮部右侍郎時易儲之議漸萌内侍疏於上令用學士為之大學士陳循舉學士劉鉉以進時江淵不悦鉉言鉉素不能幹事不可用乃薦琦陞禮部右侍郎兼詹事府少詹五年卒於官上遣官諭祭命有司營𦵏琦為人狷素不茍合文學亦有可稱在禮部雖無建明而自守甚篤人亦無所非議云侍郎章綸章綸字大經浙江樂清縣人正統乙未進士授南京禮部主事陞禮部郎中景泰中適有天變監察御史鍾同建言宜令諸司各陳所以致變者因以復儲事諷禮部大臣聞者畏縮不敢對綸即具疏言十四事曰畏天戒任燮理養聖躬節倖御務儉約勤論政惇孝義慎賞賚重名爵革巡撫擇重臣辯異端却貢獻汰冗官皆切中時弊其惇孝義一條尤為剴切曰聞古之帝王所以徳教加於百姓刑於四海者不過乎孝悌而已伏惟上聖皇太后及皇太后兩宫為天子母尊之至也皇上以天下養養之至也臣願退朝之暇必覲兩宫而修問安視膳之禮太上皇君臨天下十有四年是為天下之父也與皇上一氣所生是為至親之兄也皇上嘗親受其册封足為上皇之臣也車駕逺狩漠北而詔㫖傳位陛下陛下尊之為太上皇帝是為天下之至尊也伏讀奉迎還宫之詔有曰禮惟有加而無替義當以卑而承尊臣望皇上於朔望日或節日一至南宫率羣臣朝見上皇於延安門以叙同氣之情極尊崇之道可也皇上即位之初詔册妃汪氏為皇后其後詔立太子復册其母杭氏為皇后不意太子薨逝此事既往固不必言然而中宫儲位不可久虚臣望皇上復后汪氏於正宫詔沂王復居儲位如此則五倫全備和氣充溢天心自囘災異自弭矣臣非不知逆耳之言而身必危但臣身輕而朝廷為重使朝廷安則臣身雖死亦無憾矣疏上留中不出遂偕同下錦衣衛獄考訊備極箠楚俄大風揚沙天地晝晦獄得稍緩已而南京大理寺廖莊疏至亦言復儲事然未暇究他日莊秩滿陛見即命杖之幾死乃復命杖綸同各一百同竟死獄中及英宗復位首詔釋綸而檢其疏無所得或有能畧舉其詞者即日擢禮部右侍郎尋為石亨楊善所短調南京轉南京吏部天順八年朝廷有大喪綸請止大婚禮不從秩滿遷左侍郎久之致仕家居十九年卒年七十訃聞賜祭𦵏如例後其妻張氏因陳情乞贈諡始具其疏稿以聞上覽奏嘉其忠贈禮部尚書諡恭毅綸為人質直坦易與人交表裏洞達少好學至老讀書不廢然性執泥於世務不盡通若其忠節炳然則為後世所敬仰云子𤣥應舉進士授給事中為湖廣布政司參議侍郎李紹李紹字克述江西安福縣人宣徳癸丑進士選為翰林院庶吉士正統初授翰林檢討與修宣宗實錄既而以剰員汰歸未幾景泰即位召充經筵官陞修撰歴司經局洗馬兼修撰右春坊右庶子兼侍講天順初改尚寶司卿仍兼侍講轉翰林院學士尋陞禮部右侍郎時有結權貴相軋者以紹奏字多南音沮之英廟弗聽且曰禮部不可無此人癸未㑹試紹専知貢舉防範甚嚴頗革宿弊修英宗實錄充副總裁書垂成以疾力求解任歸其後國子祭酒為其屬所搆吏部尚書姚䕫言隆師道非宿儒重望不可援洪武初起致仕尚書劉崧署司業故事虚祭酒位馳勅召之命至紹己卒紹體貌修偉性剛直有器局刻志學問持論平正正統中英廟常訪人才少師楊士竒疏五人以對紹居其一後居髙位好奬勵後進聞人有善輒稱譽之為文有法度不尚竒詭好古博學積書甚富凡所有者無不究覽焉紹卒時年六十有五訃聞賜以祭𦵏子瑢為雲南布政使侍郎葉盛葉盛字與中直隸崑山人正統乙丑進士授兵科給事中進都給事中己巳之變朝廷多事言路大開六科聯署建請多盛倡之一時名稱翕然景泰壬申陞山西右參政督糧宣府尋命協贊獨石等處地方軍務請復棄城闢草萊葺廬舍積糧芻撫士卒立社學醫學置義塚煖舖又請出内帑銀買牛種教民耕種多所收穫以父喪去位天順改元英宗召至京面加奬諭擢都察院右僉都御史巡撫兩廣請終制不許適朝命大將顔彪專征盛參贊其軍務成化初遷左僉都御史巡撫宣府墾田益廣以所積餘糧鬻戰馬千八百匹修屯堡七百餘所召入為禮部右侍郎改吏部敵寇延慶命往議戰守方畧以歸遷左侍郎卒年五十五命官祭𦵏如例特賜諡文莊盛清修好學攻詩能文留心世務其在宣府多所建置事皆經久可行邊人至今思之但在兩廣不能戢下以致官軍馘平人以為功又以峒蠻出沒不常自古無善處之術每禁有司不許擅申盜賊必俟年終彚奏識者頗非議之然其功業所就亦一代偉人云侍郎萬安萬安字循吉四川睂州人正統十三年進士選為翰林院庶吉士授編修陞左春坊司直郎尋陞右春坊右中允改尚寶司丞轉侍講陞學士詹事府少詹事陞禮部左侍郎成化五年兼學士入内閣參機務歴加少師兼太子太師吏部尚書華葢殿大學士二十三年致仕𢎞治二年卒訃聞輟朝一日贈太師諡文康賜祭𦵏如例安狀貌魁岸儀觀甚偉自未第時人皆知為偉器及官翰林受知憲廟在内閣者幾二十年恩禮隆厚而又當海内熙洽之餘其遭際可謂盛矣顧其為人外寛内忌惡人異已若禮部侍郎邢讓國子祭酒陳鑑司業張業皆以無罪誣罷官葢安與學士彭華謀居多而吏部尚書尹旻之得禍則尤華所媒孽而安陰主之也是時指揮萬通為昭徳内妃兄弟有寵安以同姓結通為族江西李孜省鄧常恩等時以左道獲寵因使華通孜省常恩為助而安益陰厚之以是安勢益盤據凡才賢勝己持正不趨附皆妬嫉之末年益斥逐名士以箝人口時雖側目然未有敢攻之者㑹孝宗即位有詔不許言官風聞糾劾衆遂譁然謂詔草仍安所為以自為己地者於是御史湯鼐庶吉士鄒智等皆極論之遂勒令致仕中外稱快葢安之輔政惟黷貨好内以利其身家為事而於人才治體漠不槩意又慮人以是議已遂益結勢力威以制之故得致仕人猶以為幸云侍郎邢讓邢讓字遜之山西襄陵縣人繇進士改庶吉士授翰林檢討考績陞修撰景泰元年北人遣使請和奉送英廟還京上屢以敵情多詐為疑及囘使多不具迎復事讓上奏首以前次勅書不具迎復上皇之意為言衆服其剴切英廟復辟命與修大明一統志成化二年陞國子監祭酒五年陞禮部右侍郎七年以費用國子監㑹饌錢鈔無歸著除名初讓為祭酒欲聲聞出前人上創立勅諭學規等碑修國子監通志躬課諸生誦小學以及諸經痛懲謁告之弊人以是稱譽之其致毁亦以此免歸數月卒年僅四十五讓負才氣詞翰亦清勁然強忍狹中意所輕重人輒形辭色鋭意柄用而勢力相軋者忌之卒以及禍侍郎雷復雷復字景暘湖廣寧遠縣人正統丙辰進士改庶吉士授行人擢監察御史陞廣西副使分巡蒼梧道時藤縣民胡趙成搆集大藤峽猺賊攻陷縣治荼毒一方復承巡撫葉盛檄往討之擒斬成等五年陞山東左布政使七年陞禮部右侍郎八年改右副都御史巡撫山西十年卒於官賜祭𦵏如例復清雅端謹歴任中外所至守法度循矩矱無非分之為侍郎未久以短於敷奏出外然在邊行事多得宜人至今思之侍郎劉吉劉吉字祐之直隸博野縣人正統十三年進士改翰林院庶吉士授編修景泰元年充經筵官預修寰宇通志成陞修撰天順間侍憲廟於春坊講讀預修大明一統志丁内艱起復成化改元陞侍讀英廟實錄成陞侍讀學士兼經筵講官五年陞禮部右侍郎八年轉左侍郎遣祀東嶽等神十一年命兼翰林院學士入内閣參預機務歴加少師兼太子太師吏部尚書華葢殿大學士𢎞治五年乞致仕許之踰年卒贈太師予諡文穆賜祭𦵏如例吉性沈毅喜怒不形於色遇事能斷在内閣最久上始即位尤委任之恩遇最盛凡綱紀政事進退人才言率見聽隠然有内相之重然所與厚善者多讒謟面諛之人致不能自聞其過廷臣有不悦者輒使言官劾去之故議者謂其乏休休有容之量而其後聖眷亦漸衰云侍郎尹直尹直字正言江西泰和縣人景泰甲戍進士入翰林院為庶吉士預修寰宇通志成授編修憲宗初御經筵充講官成化三年纂修英廟實錄成遷侍講八年擢侍講學士十一年陞禮部右侍郎以父憂去任十五年起復改南京吏部轉南京禮部左侍郎二十二年特召為兵部左侍郎尋兼翰林院學士入内閣參預機務二十三年致仕家居二十四年卒賜祭𦵏諡文和直明敏軒豁少有才名在禮部嘗因天變㑹官具疏陳修省二十二事言多切中時弊嵗當開度僧道連章奏省之又請汰黜天文陰陽生之詭籍者凡數百人始至兵部貴州鎮巡官奏苗叛請發兵夾攻廷議將從之直獨言吾自東南來未聞有警豈可聽彼邀功啓釁以疲民乃請選委御史部屬二人往勘貴州果無警居内閣時有建明㑹言官劾其進用不合公議孝宗薄之然尚慰留待之辭乃令致仕直為人疎俊不拘小節亦頗以才氣自負以是多招物議為文章贍逸渾健步驟大家所著有歴代名臣讚皇明名臣言行通錄行於世侍郎俞欽俞欽字振恭浙江新昌縣人景泰辛未進士選為翰林院庶吉士授禮部儀制司主事儀制務繁縟欽才贍學充通悉今古事無留滯天順戊寅陞郎中壬午以郎中績最當加封其父于時祖尚在堂疏乞移封上嘉之特賜其祖冠帶欽秩方五品而褒及其父實曠世殊典癸未㑹試試院火左遷松江府同知成化改元召還改兵部武選司郎中乙酉以從征山都掌蠻寇有功陞太常寺少卿壬辰奉命禱祀淮瀆之神還擢禮部右侍郎朝章典故素所明習凡國家大禮事處之井井有條乙未陞左侍郎戊戍皇太子出閣加冠詔有司議定禮儀乃㕘酌備具朝廷采用之庚子遭父憂去職壬寅冬服未闋詔起兵部左侍郎制終乃就任九年秩滿加正二品俸尋卒於官年五十四訃聞賜祭𦵏如例欽通敏有才幹處事善思慮而不失正所歴皆號稱職葢能臣也時將以重任畀之而欽忽報卒聞者多為憫惜云侍郎謝一䕫謝一蘷字大韶江西新建縣人天順庚辰進士第一臚傳之旦裒然衆中縉紳屬目除翰林院修撰憲宗嗣統進侍經筵被賞賚預修英廟實錄成陞左春坊左諭徳又預修續資治通鑑綱目成進學士未幾擢禮部右侍郎陞工部尚書年六十三以疾卒於位贈太子少保賜祭𦵏一蘷為人和易平實與人交久而益親尤篤於友義為文章不竒詭雕刻其為諭徳時嘗疏陳五事言頗剴切在禮部凡制度儀文多所裁定前所未有者必稽經據史㕘以時制具為儀注務使可行一時同事者咸推其練達但務交好而不重操執其政事不能無徇情云侍郎徐溥徐溥字時用直隸宜興縣人景泰五年進士第二人及第授翰林院編修英宗復辟命兼司經局校書侍東宫講讀憲廟登極錄舊勞遷左春坊左庶子兼侍講充經筵講官纂修英廟實錄五年陞翰林院學士九年秩滿陞詹事府少詹事兼侍讀學士十六年陞太常寺卿兼學士掌翰林院事十七年陞禮部左侍郎二十三年改吏部孝宗即位首膺簡入内閣㕘預機務歴加少師兼太子太師吏部尚書華葢殿大學士尋以目疾累疏乞歸乃賜勅給驛遣官䕶送還鄉踰年卒年七十二訃聞輟朝一日遣行人諭祭者九命有司營𦵏贈特進左柱國太師諡文靖溥立朝四十餘年在翰林院不以文學名歴部事安靖以和處寮屬及進内閣因事納約登崇俊良隨才器使嘗有大獄干宗藩連貴近衆讙不能決皆力贊成之葢從容委曲以助成天下之務者其功為甚多平居容儀儼雅温易可親度量宏裕而包含不露人皆飲醇仰徳無怨惡者為詩文清潤有思致而酷好古法書名畫至老不倦云侍郎張悦張悦字時敏直隸華亭縣人天順四年進士授刑部主事轉員外郎歴陞江西按察司僉事浙江提學副使四川按察司按察使丁憂服闋改湖廣按察使進都察院僉都御史工部侍郎𢎞治元年遷禮部右侍郎再轉吏部陞南京右都御史南京吏部尚書改南兵部參贊機務累乞休致加太子少保致仕未幾卒訃聞贈太子太保賜祭𦵏諡莊簡悦學問該博操行清謹其提學浙江杜絶請謁甄别才器尤為士類所信服在湖廣執法不阿在吏禮二部風裁益峻至參贊機務時雖久疾稍不移然猶持大體卒能奉身而退始終之際葢亦無貶議云侍郎費誾費誾字廷言鎮江丹徒人成化五年禮部㑹試第一遂第進士選為翰林院庶吉士授編修同考禮部與經筵陞國子司業秩滿陞左春坊左諭徳仍管司業事未幾陞祭酒𢎞治元年孝廟初開經筵簡充講官車駕幸學賜坐講彞倫堂褒諭宴賚士林榮之及直日講遂改少詹事兼侍讀同修憲廟實錄成進詹事兼侍讀學士再越月擢禮部右侍郎病滿三月例停俸詔特不允尋卒年五十有八上遣官諭祭命有司為營𦵏事誾長身偉貌議論亹亹臨事變通慷慨且恭謹自持人恒以公輔期之其在國學最久士子多所造就在禮部亦能持謹人惜其不及大用云侍郎王華王華字徳輝浙江餘姚縣人成化辛丑狀元及第授翰林院修撰預修憲廟實錄進左春坊諭徳充經筵日講官選侍東宫講讀陞翰林院學士主考兩京鄉試陞詹事府少詹事教習庶吉士預修大明㑹典通鑑纂要陞禮部左侍郎南京吏部尚書忤逆瑾遂傳奉致仕家居十餘年卒子守仁平逆濠有功封新建伯贈華如子爵命給祭𦵏如例華才識宏達操持堅定為禮部時方賊瑾用事士大夫争奔走其門華獨不之顧子守仁方為兵部主事上疏論瑾罪惡瑾怒逐守仁顧素敬慕華不輒遷怒間以語人諷若一見内閣之位可立躋華不往及轉南京瑾又使人言華不久當召用冀得往謝華竟不往其生平大節如此侍郎張璨張璨字仲湜廣西全州人成化戊戍進士改翰林院庶吉士授編修𢎞治己酉秩滿陞侍講戊午選侍東宫辛酉主順天鄉試乙丑陞侍讀學士尋陞學士國子祭酒正徳丙寅三月駕幸太學賜坐講尚書丁卯陞禮部右侍郎改左己巳陞南京禮部尚書辛未改吏部時儲位久虛草疏率同儕請建太子罔有顧忌甲戍改兵部㕘贊機務條陳八事又奏革守備㕔審事官及營伍有所委任不容請托人皆服其明決乙亥夏乞歸田里疏十五上始得請特加太子少傅給驛還尋卒賜祭𦵏如例璨性頗剛褊與人多不合其在户部請查追遠年逋賦論者謂劉瑾方事誅求而其跡涉承望於賢者不能無責備云侍郎靳貴靳貴字道充直隸丹徒人𢎞治庚戌進士第三人授翰林院編修丙辰皇太子將出閣講學詔選正人以端國本户部尚書吕鍾以貴名上遂兼司經局校書未數日宫僚環侍皇太子獨指貴問左右曰非靳先生耶固己目屬之孝廟幸講所尤加奬異庚申進右春坊右中允癸亥㑹典成進左春坊左諭徳兼翰林院侍講每侍講筵敷奏雍容儀觀修偉重瞳屢囘武宗登極以舊學陞太常寺少卿兼侍讀充日講尋以母憂去終喪仍舊秩掌翰林院事授庶吉士業正徳四年進禮部右侍郎時逆瑾盜政常因事諷貴密書翰林官殿最以進貴不從銜之時翰林多外遷貴亦左遷為光祿寺卿已乃復舊薦更吏部進兼學士管誥勅掌詹事府事又進禮部尚書甲戌遂擢文淵閣大學士加太子太保户部尚書武英殿大學士致仕卒贈太傅諡文僖貴為人豐夷端粹發言有章為文本經術有理致在科塲崇雅黜浮所刻文出其手者多典重敷腴號為博雅獨周旋權宦不失富貴晩既家居猶悒悒不解薦譽舊徳者竟莫之及云侍郎呉儼呉儼字克温常州宜興縣人成化丁未進士選翰林院庶吉士己酉授編修丙辰同考禮部試又充經筵講官武宗出閣兼司經局校書庚申陞左春坊左中允辛酉轉南京翰林院侍講學士正徳丙寅召還纂修孝廟實錄充經筵日講官兼修玉牒丁卯主考順天府鄉試時逆瑾恃寵招權傾陷正直第二塲以為臣不易命題瑾己心惡之又聞儼家巨富陰遣人啗以美官儼峻拒之瑾益慚怒媒孽無所得㑹朝覲考覈外官以不根之語罷之瑾誅起用仍舊職未幾擢南京禮部右侍郎壬申召還禮部乙亥轉左侍郎持節册封益府丙子陞南京禮部尚書丁丑武宗北幸宣大偕府部大臣上疏切諫己卯卒於位贈太子少保諡文肅儼性方嚴操履清慎居鄉有士行閨門亦整肅當官臨事期於自立秉經議禮多合古意為文章莊重簡古詩詞清嚴可諷侍郎石珤石珤字邦彦直隸藁城人成化丁未同兄玠登進士被簡為庶吉士𢎞治己酉授翰林院檢討與修大明㑹典同考禮部㑹試少師李文正毎謂諸後進可托以柄斯文者其石氏季方乎辛酉充經筵展書官乙酉滿九載遷修撰同修孝宗實錄正徳丙寅武宗初開經筵充講官尋遷南京翰林院侍讀學士己巳擢南京國子監祭酒庚午改北監尋陞南京吏部右侍郎乙亥改禮部丙子轉左侍郎丁丑命兼翰林院學士掌院事未幾召入内閣參預機務歴少保武英殿大學士卒諡文隠侍郎王瓚王瓚字思獻浙江永嘉縣人博學雄文下筆數千言不滯𢎞治丙辰進士第二授翰林院編修十二年丁憂十六年補原職正徳二年陞本院侍讀三年陞國子監司業五年陞南京國子監祭酒六年南京禮部移文本監撰述慶賀皇上尊慈聖康夀太皇太后慈夀皇太后表文瓚以非奉㫖意不敢撰述答之部復查有成化二十三年舊規本監乃與南京翰林院公同撰述八年改國子監祭酒為人坦直未嘗斂怨北監諸生愛戴之十一年尋陞禮部右侍郎十三年轉左侍郎十六年以議大禮調南京禮部左侍郎嘉靖元年丁憂卒贈禮部尚書侍郎顧清顧清字士濂直隸華亭人𢎞治壬子南畿鄉試第一明年舉進士改翰林院庶吉士授編修與修大明㑹典成陞侍讀正徳初與修孝廟實錄時逆瑾擅權清守正不阿瑾銜之矯詔追論㑹典事以不諳政事為名降編修尋調南京兵部員外瑾誅復任侍讀陞侍讀學士掌院事教習庶吉士陞少詹事兼學士充經筵日講官兼修玉牒儲位尚虛請預定不報武宗數巡幸清屢疏請囘鑾言甚切尋陞禮部右侍郎與宗伯毛文簡公協心秉正㑹郊祀且迫而駕尚未還清草疏數百言上之上亦為感動武宗崩世廟入繼大統㑹議迎駕册立勸進頒詔易服臨喪諸吉㐫大禮清援古證今折衷羣言時以清所議為得體從清居多有忌清欲傾之者嗾臺諫摭他人事誣清不根特甚衆論囂然内閣持之不下而清從容鎮静因詔例自引退無少濡滯一時皆為清不平久之輿論益定於是南北臺諫并撫巡上章論薦者四十餘人上乃起清南京禮部右侍郎清既歸自喜甚適絶意仕進不謂復有簡命不得已之任兩疏乞歸不允歸志已決疏益懇得俞旨陞南京禮部尚書致仕先是清以進徽號賀表上京師至東昌聞命時已力疾猶輿疾而進遂卒於河間府瀛海驛特詔賜祭𦵏諡文僖清好學敦節行士論重之侍郎賈詠賈詠字鳴和河南臨潁人𢎞治丙辰進士改庶吉士授編修充經筵講官正徳初逆瑾亂政調兵部主事改禮部員外郎瑾誅復原職陞左春坊左中允轉侍講學士掌南院篆尋拜南京國子監祭酒改北世廟登極擢禮部左侍郎奉命詣承天上獻皇帝尊號還改吏部掌詹事府事進禮部尚書入内閣輔政累主考鄉㑹試久侍講經筵修武宗睿宗實錄明倫大典充總裁嘗召對平臺上親灑宸翰以賜以大獄事詿誤乃引疾乞休居鄉二十餘年以醇厚聞夀踰八十詔有司存問卒贈太保諡文靖賜祭𦵏如例侍郎朱希周朱希周直隷崑山人𢎞治丙辰進士第一授翰林院修撰尋以纂修大明㑹典成晉侍讀歴陞禮部右侍郎擢南京吏部尚書希周學行醇篤性恬於世利居官守正在禮部能舉其職為南吏部以考察庶官無所阿徇忤執政意令再考遂抗疏乞歸士論髙之卒贈太子太保諡恭靖賜祭𦵏如例侍郎劉龍劉龍山西襄垣縣人𢎞治己未探花廷對勸上崇敬畏儆逸慾奬忠斥佞建中和之極為禮樂之本使政出於一而達之天下擢編修進修撰正徳初忤逆瑾出為兵部職方司主事五年陞吏部考功司員外郎持正不茍本年復修撰十一年陞侍講學士十五年改侍讀學士嘉靖元年陞禮部右侍郎丁憂四年復除右尋轉左七年陞南京禮部尚書八年改南吏部十二年改南京兵部尚書所至砥節礪行不與世浮沈為講官講誠能動物章引黄河清為証勸世廟謙以履盛約以持盈感溢天顔又抗疏論太后廟見并集議弭災十事又議宣大邊務六事衆多韙其言侍郎何塘何塘河南懷慶人𢎞治壬戌進士改庶吉士授翰林院編修正徳初預修孝廟實錄成陞修撰忤逆瑾投劾移疾去瑾敗召復故職癸酉充經筵講官有旨出為開州同知遷東昌府同知引疾致仕世廟登極起為山西提學副使累陞南京工部侍郎改工部左侍郎尋改戸部嘉靖八年轉禮部移病疏免以言者留擢南京都察院右都御史道家遂上疏不起詔准致仕尋卒塘孝友峻潔以古人自期博學篤行嘗以象山慈湖之學流入禪定謂為充塞仁義其學術梗槩如此性淡泊絶無嗜好土室縞衣晏如也塘既沒詔錄其一孫賜諡文定給祭𦵏如例侍郎顧鼎臣顧鼎臣蘇州府崑山縣人登𢎞治乙丑進士第一授翰林院修撰進侍讀翰林院學士嘉靖十年陞禮部右侍郎改吏部左侍郎陞禮部尚書掌詹事府事加太子太保進文淵閣大學士尋加少保兼太子太保武英殿大學士卒於位遺疏勸上親賢愛民保䕶聖躬上覽之憫悼輟視朝一日賜祭𦵏如例遣官䕶其喪還鄉贈太保諡文康鼎臣性樂易無町畦自在講筵即受知於上特詔免其朝參令專講洪範已從掌詹陟内閣輔政上南幸承天命之居守輔皇太子監國其任如此然其在政府充位而已侍郎黄宗明黄宗明字誠甫浙江鄞縣人正徳甲戍進士授南京武庫司主事陞武選司員外郎宸濠反上江防三策上諫南巡疏武宗幸南都百官服罩甲衣以朝宗明約言官面奏不宜服褻衣不果遂告病歸尋起為南京刑部郎中㑹議大禮宗明與張桂意合遂名連署疏上陞吉安知府轉福建運使召修明倫大典以母憂不至服闋陞光祿寺卿撰光祿須知為疏以進上嘉之著為令又應詔言四事一曰求才二曰勵志三曰定計四曰責任皆切時弊陞兵部右侍郎時編修楊名以言事忤旨詔窮治主者宗明疏陳非宜乃并得罪出為閩省參政俄召還為禮部右侍郎轉左侍郎尋卒於官初張桂以議禮得幸諸同議者咸驅駕氣勢更相牽引乃宗明無比周迹故張桂既去人亦無訾之者葢矜名自好士也侍郎蔡昂蔡昂直隸淮安人正徳甲戌進士授翰林院編修以武宗實錄成陞右春坊右贊善同纂修大明㑹典陞翰林院侍講學士充日講官尋以失誤日講降調湖州府通判逾年召復職管錄累朝及皇考寳訓實錄成陞翰林院學士嘉靖十六年陞禮部右侍郎兼侍讀學士十九年遷左侍郎兼官如故㑹慎簡宫僚衆咸推昂改兼翰林院學士詹事府府丞未幾卒贈禮部尚書賜祭𦵏如例侍郎馬汝驥馬汝驥字仲房陜西綏徳州人正徳己丑進士改庶吉士授翰林院編修己卯中武皇帝且南狩諫者輒獲罪後縮莫敢諫者汝驥曰即畏罪寧不為宗廟朝廷所乎乃奮氣抗疏率諸同館士六七輩赴闕上之疏出其手切直言巡㳺有隠憂伏禍不可上怒罰跪闕下五日己又杖之諸上書者悉謫外而汝驥調澤州知州世廟登極召復故職仍進俸一等以修武宗實錄成擢修撰尋陞南京國子監司業改北監上幸太學充講官命坐講言辨而正賜文綺居數嵗陞南京通政又三嵗陞南京國子監祭酒遂擢為禮部右侍郎當是時嚴公嵩為宗伯孫公承恩為左侍郎而上方興禮樂創制度諸大典更起不絶諸公日聚講議而汝驥洽覽羣集習識今昔嚴公賢之㑹嚴公拜相見上言馬侍郎賢上繇是知侍郎因以其官加翰林侍講學士寵之而汝驥以疾卒於官上悼焉為遣官致祭勅有司營𦵏贈尚書諡文簡汝驥沈毅有大節其行己峭厲而性復和易可親葢詞臣之選也侍郎朱廷立朱廷立字子禮湖廣通山人嘉靖癸未進士授諸暨縣令以治行髙等徴拜侍御史己丑巡兩淮鹽政條陳鹽法宜行事鹽遂通課益昔百七十餘萬辛卯巡按順天又條陳六事切中時病壬辰巡按四川時土畨夷釀亂松潘梗貢道為邊患上怒命將征之勅立督其事立冒險疾趨壁壘親授計將大舉兵㑹銜立者以他事罪立使閒住無何功臣各膺爵賞潘都御史上其功上嘉嘆懋賞復其官適順天缺督學御史遂推立焉丁酉陞南京太僕寺少卿丁母憂起復為僉都御史擢大理卿陞工部右侍郎己酉轉禮部右侍郎有嫉立軋己者譖諸言官劾之復以閒云廷立篤於孝友持身訓家咸以禮平生不計議人過至於事闗利害則喜力言之雖嫌罔避其多得謗亦以此云侍郎程文徳程文徳浙江永康人嘉靖乙丑進士第二授翰林院編修以楊名論吏部尚書汪鋐連下詔獄謫信宜典史歴陞兵部主事郎中廣東按察司提學副使南京國子監祭酒擢禮部右侍郎遷左侍郎改吏部尋加翰林學士掌詹事府事教庶吉士簡撰𤣥文文徳素講理學所撰不稱旨㑹推南京吏部尚書上疑文徳欲脱不經之奉特旨調南京工部左侍郎文徳疏辭勸上享安静和平之福上益怒以為謗訕削籍為民及卒貧無以殮文徳篤學修行稱為儒者好談當世之務嘗自以其學未究於用而迂濶極行識者不以為然後贈禮部尚書諡文恭侍郎孫陞孫陞字志髙浙江餘姚縣人前死節都御史燧之子舉乙未進士第二人授翰林院編修以校錄列聖御文五經二十一史成遷右春坊右中允復與修大明㑹典丙午主應天鄉試晉國子監祭酒辛亥陞禮部右侍郎值華亭徐公為尚書協恭一心諸大典儀如請行裕景府冠讀禮商決居多癸丑改吏部旋丁内艱服除徴拜禮部左侍郎旋改吏部丁巳進南京禮部尚書卒於官詔贈太子少保諡文恪陞為人孝友長厚父燧死寧庶人之難終身不書寧字亦不為人作夀父文事伯兄如父居官被服雅素口不談人過葢篤行君子也子鑨鋌錝鑛皆先後舉進士至通顯侍郎閔汝霖閔汝霖浙江烏程縣人嘉靖壬辰進士改庶吉士授翰林院編修尋陞右春坊右中允歴左諭徳翰林院侍讀學士掌院事太常寺卿掌國子監事遂陞禮部右侍郎遷左尋改兼學士教習庶吉士簡撰𤣥文復改吏部左侍郎掌詹事府事進南京禮部尚書致仕汝霖顓謹有文以撰𤣥失上㫖南遷尋罷同鄉進士董份復陷之竟鬱鬱而卒上聞賜祭𦵏如例侍郎林燫林燫字貞恒福建閩縣人尚書廷機之子嘉靖丁未進士改翰林院庶吉士授檢討選侍景恭王講讀滿九載擢修撰進司經局洗馬兼官如故與校錄永樂大典明年與纂承天大志尋志成賜金帛陞國子祭酒大典成進太常寺卿祭酒如故遷禮部右侍郎兼翰林院學士經筵開充日講官仍充世廟實錄副總裁改吏部右侍郎無何改南京吏部久之始進工部尚書尋改南京禮部尚書卒年五十七燫幼而朗秀讀書日恒數千言性尤耿介不偶合當景王之國吏部以故事請相嵩時柄政意猶豫曰史官侍王邸豈亦故事耶徐文貞公階方副揆力為慫恿得母從之國相嵩念燫且造謝燫陽為不悟也者不謝也嵩敗宦稍稍達其佐禮部則髙文端公儀為之長儀海内夙望長者虚心待之燫亦侃侃亡隠多所裨益諸陵貴人以大水請修治冀得遂所欲燫周視還奏惟長陵小毁當葺餘俱已之所省費以萬計嘗再考㑹闈一典順天試及掌成均學門生故吏偏天下其却真定鳯陽二守賂尤著嗜書手不時釋為文能復古根柢理道不好為浮靡以躐名譽惜其早世不盡究其用云侍郎瞿景淳瞿景淳字師道直隸常熟人嘉靖甲辰進士第二人及第授翰林院編修滿九載遷侍讀陞左春坊左諭徳丁母憂歸服除守故官遷侍讀學士視翰林篆搃校永樂大典亡何以太常寺卿領南京國子祭酒事已即南京為吏部右侍郎三載當入奏績而㑹穆宗登極以禮部左侍郎召旋用大典總校勞兼翰林院學士仍佐部事食二品俸比朝留侍經筵修世宗實錄尋以病發疏乞骸骨遂予告歸歸一載而卒上為下所司治𦵏諭祭贈禮部尚書諡文懿景淳為人醇謹以學行聞歴典試多所奬拔士論稱之禮部志稿卷五十六
