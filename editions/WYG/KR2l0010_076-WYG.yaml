body:
  text: 禮部志稿卷七十六明俞汝楫編宗藩備考藩婚選擇婚配宣德元年四月安東屯衛指揮僉事姜通奏為其子裕聘朔州衛指揮使周忠女為配今已二年近為平陽王選妃不得成婚上謂行在禮部尚書胡濙曰婚姻人道之始風教所闗昔唐太宗聘鄭仁基女為充華聞其已許陸氏遂罷之亦是重禮教忠女宜歸姜氏令平陽王别選妃𢎞治七年十月本部議得各王府選婚之日除本處仕官人員果有相應子女聽其選婚若外處流移軍民人等來歴不明財賂交通假以附籍為名者不許選擇其餘不分官員軍民良家子女務要家道清白年貌相應雖是重結王親倫理不失原選長史教授等官照例保結明白申送布政司督同該衙門官吏知証人等重甘結状繳部本部再行彼處按察司坐委堂上官一員覈勘無礙具結至日以慿奏請婚配等因奉孝宗皇帝聖㫖是欽此𢎞治十年四月山西布政司呈稱張禄先年為事問發充軍伊女張金菊定與本州民人賀瀛為配後奉禮部勘合又将張金菊選與山隂王長子為婚續該山隂王奏乞宥罪本部看得張金菊先定與賀瀛為婚既已查勘明白其山隂王長子成鍪合聽另選原委選婚官應行題問題奉孝宗皇帝聖㫖是山隂王既認罪罷欽此𢎞治十三年二月内楚王奏鎮國将軍榮過選婚境内年命不對看得辰州府沅陵縣已故僉事李轍長女年命相合已行聘禮續奉禮部勘合止許本境選配臣思看定之時實在例前該本部查得鎮國将軍榮過于𢎞治三年授封其本境選婚事例正係本年奏行原奏未曾選婚今却揑稱聘定李轍長女叅照該府長史教授俱合有罪相應革退仍行另選題覆奉孝宗皇帝聖㫖是長史等官本當究問且都饒這遭欽此𢎞治十六年十二月内遼府光澤王奏乞選婚該本部議得王府選婚止許于本境内府衛州縣官員軍民良家子女選配題奉孝宗皇帝聖㫖今後各王府子女不許于本府軍技之家選配欽此𢎞治十七年七月内楚王奏稱相隣州縣三百里之内者即同本境不拘禁限本部查得見行事例凡王府子女選婚止許于本境内府州縣官員軍民良家子女内選配楚王所奏于例有礙覆題奉孝宗皇帝聖㫖准議欽此正德三年十二月内慶成王奏奉國将軍表桗選到永和王府典仗所餘丁田林長女為婚因父䘮未娶近奉軍校不許與王府結親事例思得表桗選婚在前乞要行令保勘等因本部覆題奉武宗皇帝聖㫖王府子女明有禁例不許于本府軍校之家選配如何不遵但在例前姑不查究田林女不准選用着另行揀選今後有這等妄選的該部查出退了仍将被選之家編發極邊衛分充軍定不輕宥欽此正德三年十二月内瀋王奏稱各府子女選婚欲令承奉僉押該本部查無事例覆題奉武宗皇帝聖㫖是既查無事例係本府自行斟酌欽此正德四年七月内魯府鎮國将軍當滇奏乞申明律意禁止貪財以正人倫事本部議得各王府長史教授等官凡各王府将軍果有已結未完聚姑舅失序為婚等項即便具啟改王今後選婚之日務在長史教授照例㑹同布按二司官員通行軍衛有司衙門及里隣親族知証人等保勘明白送赴巡按御史從公面審及多方訪察果無前項違碍俱有批允方許具結前來以慿奏請若倫理失序有乖律例或以本府軍校揑作别府州縣籍貫外處流移軍匠人等揑作該里寄籍帶管父祖重刑之人揑作家道清白等項即便革退另選仍将經該官吏并保勘人等照例以枉法論罪營求撥置之人問發邊逺充軍遇赦不宥干礙輔導及布按二司官員叅奏定奪若有扶同隠匿情弊事發責有所歸本部節題奉武宗皇帝聖㫖是欽此正德四年十二月該本部議得各王府選婚務待子女年足十五以上奏行本境内府衛州縣官員軍民及䕶衛官員之家選擇如果家道清白人物俊秀年嵗相應及不係服屬失序于例無礙者繳報本部奏准婚配如有做官寄籍不係本土人氏及縁事革遣本府軍校及逺方流移軍匠人等朦朧冐選者革退另選仍将被選及營求撥置之人編發極邊衛分永逺充軍經該官吏并保勘人等以枉法論罪及照各府厨役亦係軍校之屬今後但有厨役之家子女與王府結親者悉照例問擬題奉武宗皇帝聖㫖是欽此嘉靖三十二年三月内襄垣王奏稱本府子女婚配選擇過嚴以致嫁娶失時怨曠年久該本部議行山西巡按嚴督蒲州縣所掌印官員作速選娶不許隠匿仍啟王戒諭各宗室毋得貪富棄貧以致失時難娶及照民間避匿子女不願與王府結婚者一則以仕官不得選除京職一則以宗室于結婚之後往往恣意求索致或盡奪家産故民間相戒以不婚王府為幸而不以連姻帝室為榮也合無通行有王府去處今後宗室虐害婚姻之家及吞騙資産者許呈告撫按具啟親郡王叅奏前來先将撥置之人問擬充軍宗室聽本部㑹同法司酌量事情輕重奏請奉聖㫖是欽此勒抑婚期𢎞治十七年令各王府結勘選婚文移所司遷延半年之上延悞婚期者聽王府舉奏治罪正德十一年奏准各王府子女年應請封選婚者長史教授即啟王覈查一年二次類奏若過期一年之上者輔導等官以違制論其請封選婚勘合到布政司有掯勒遲滯者巡按官查究旗舍軍民枷號二個月發邊衛永逺充軍儀賓職官從重發落干礙宗室奏請定奪守巡官年終将請封選婚己未完結報稱布政司呈部稽考守巡官催督欠嚴叅究治罪正德十二年定各王府子女婚姻止令布政司結勘奏請不必轉行核實以致遲悞嘉靖十二年詔宗室子女有年二十嵗以上未曾婚配者許各該撫按長史輔導等官限三月以裏保送前來以慿禮部覆請嘉靖三十四年九月該都察院右副都御史王忬叅博野王府管理府事奉國将軍廷墧掯勒宗儀阻滯婚䘮不與轉啟及典仗蘇浩索財過送等因奉聖㫖是蘇浩着巡撫衙門提問發落廷墧等各罰住禄米三個月欽此擅自成婚𢎞治十六年九月内西河王奏稱選配馬氏未經奏請就吉成婚乞恩宥罪該本部叅題奉孝宗皇帝聖㫖是西河王既認罪罷欽此隨該西河王奏稱馬氏取到官吏里隣保結申訖所有冊命冠服未曽請給該本部覆題奉聖㫖是欽此正德四年該本部議得西河王所犯雖經寛宥然請命而行禮法所先今後各王府如有不奉明㫖擅自成婚者聽本部叅奏輔導等官及主嫁之人治以重罪奉武宗皇帝聖㫖是欽此嘉靖二年令王府子女有不遵禁例擅自成婚者俱革退另選嘉靖十三年五月内晉王奏稱寧化王府鎮國中尉表柔繼選藺氏就結成婚乞要賜封該本部議得表柔選到藺氏自合奏請授封方可成婚却乃不遵舊例擅自成婚輔導等官及主嫁之人俱各有罪奉聖㫖表柔繼選到藺氏如何不候奏請授封輙自成婚該府輔導官員并主嫁之人都着該巡按官查提究問了來說欽此續該晉王奏稱藺氏未䝉賜封乞要照例賜給該本部議得表柔擅婚藺氏已該本部查叅輔導官員并主嫁之人問擬發落其藺氏係是繼選應否請封恭人臣等難擅擬奉聖㫖藺氏既擅自成婚又係繼選不准封欽此嘉靖三十年七月内鄭府鎮國将軍祐椗選到黄氏祐梪選到髙氏各已成婚乞要請封該本部看得祐椗等配黄氏等俱各未經請封輙便就吉成婚于例有違合照藺氏事例不准請封奉聖㫖是欽此同姓為婚嘉靖三十一年四月内該慶府夀陽王第一妾朱氏庶生第二女乞要請封該本部查得同姓為婚題議不准授封照依庶人子女事例給與婚嫁朱氏免離異長史教授媒証人等巡按御史提問奉聖㫖是欽此繼室内助請封繼室附選取内助管理家事天順四年令宗室奏請繼室無後者方許奏准𢎞治間定凡王府前妃有出聽王自備財禮于本境内選取一人以為内助不授繼妃之封凡親郡王妃并鎮國将軍夫人以下病故者若無出許選繼室有出許選内助事例正德四年奏准凡王妃以下病故不欲選娶繼室内助者許于宫人内擇其來歴清白持身端謹者奏請管理家事不許溺于私愛濫請名目請封繼室𢎞治四年正月韓王奏稱有妃郭氏病故缺人管理内事欲将宫人張氏比照蜀府宫人何氏𠡠賜管理家道事例量賜名目該本部查得𢎞治三年三月内蜀和王稱繼妃梁氏病故要将宫人何氏比照先祖蜀和王繼妃事例頒賜冊命冠服俾為繼室本部為照梁氏已封繼妃各王妃並無兩次冊封繼妃事例覆題奉孝宗皇帝聖㫖是還冩𠡠與蜀王准何氏管理家事欽此緣何氏出自一時特恩不係常例覆題奉聖㫖准冩𠡠與王著張氏管理家事欽此𢎞治十三年三月瀋王奏稱鎮國将軍詮鋐選配夫人屈氏無子用到侍女王氏有孕屈氏憎嫌不容在府生産母妃宋氏慮恐妒害王氏性命密令内使靳通等将王氏送與屈氏母宿氏家優養生子一人後屈氏病故奏選繼室牛氏請封其王氏所生之子因循不曽奏報乞要請名該本部行山西布政司咨呈勘過王氏所生之子無礙結状前來看得王氏既生有子詮鋐自合明白開奏止娶一人以為内助不授繼室之封却又不合隠匿生子情由朦朧将牛氏冐請封號該府長史教授不行查報俱合有罪雖䝉赦宥所據牛氏亦合改正革去封號覆題奉孝宗皇帝聖㫖既檢舉准改正牛氏革去封號長史等都饒這遭詮鋐罷欽此正德四年該本部議得瀋府鎮國将軍詮鋐侍女王氏既生有子却乃不行奏報冐将牛氏請封繼室其間隠情固難遙度除已往外今後如有不遵禮法如詮鋐者許該府親郡王及輔導指實奏聞區處毋致生育不明閨門貽玷奉武宗皇帝聖㫖是欽此正徳四年七月魯府鎮國将軍當須奏為墧欺罔正名分定襲爵以省儲用事本部議得各王府正妃夫人生有子女病故以後各王府将軍如有将自娶内助之人揑作繼室及将所生子女稱為繼出者不拘己未請封通行叅奏定奪今後各王府造到玉牒并嵗報文冊凡繼出子女名下開係伊母某氏何年奏准選娶何年奏准授封不許朦朧影射如有此弊聽從本府親王并本處鎮巡等官指實叅奏輔導官員照例降調逺方重者從重問擬其内助擅用正妃冠服出入拜謁者聽親王嚴加禁治以正宫闈如有恃頑不悛者奏聞區處等因題奉武宗皇帝聖㫖是宗祀倫理係是重事當須所言深為有理正妃夫人病故已有庶生長子不許将自娶之人所生揑稱繼出紊亂倫序亦不許僣用正妃冠服各府各項事情俱要造冊具結明白奏繳經該官吏并輔導官員扶同隠匿的都重治不饒恁部裡通行各處鎮巡等官查勘各府有無别項情弊奏來定奪該科記着欽此選取内助嘉靖三年正月内秦王奏保安王府鎮國将軍秉椆先娶楊氏為夫人無出再娶劉氏為繼夫人亦故並無嫡庶子女乞要再選該本部查無兩次繼選事例題准聽令秉椆自備財禮選娶内助不授繼夫人之封奉聖㫖是欽此嘉靖二十八年題准宗室年五十以上子女長成者止許於妾媵内奏乞管理不得請選内助嘉靖二十九年七月内榮王奏稱永春王厚烈妃丘氏病故並無嫡子奏乞繼選該本部查得嘉靖二十八年十二月内節奏聖㫖今後郡王正妃故後勿再准封繼妃著為令欽此欽遵今該前因今照近奉明㫖勿再准封繼妃止依選娶内助事例聽令于本境良家女内選娶一人以為内助以後凡有奏請者俱照此例施行奉聖㫖是欽此管理家事嘉靖二十八年五月内瀋王奏輔國将軍勛年五十六嵗夫人病故有子一人孫四人再娶少艷玷累藩封該本部議得今後将軍等未有子嗣而夫人等病故者許不拘年嵗照例奏選繼室年五十以下及子女㓜小者許照例奏選内助或于原奏娶妾媵内奏乞管理若年五十以上子女年已長成如勛者止許照例奏乞管理不得更請内助其請繼室并内助管理等項奏内俱要明開本身年嵗若干子女長㓜位數及妾媵原經奏選年月本部查明無礙方與題覆違者聽本部叅究等因奉聖㫖是欽此妾媵限制𢎞治間定凡郡王除正妃外妾媵不過四人鎮國輔國将軍除夫人奉國将軍除淑人外妾媵各不過三人鎮國中尉除恭人輔國中尉除宜人奉國中尉除安人妾媵不過二人生子之日先行開具姓名奏報以慿請名請封庶無僣差若濫收過數輔導官隠匿不奏者叅提究問奏請降調邊方𢎞治七年奏准親王府選用多人務奏奉明文定有名數方許于本府軍校之家選用不許強買民間子女郡王将軍使女俱照奏准事例若擅買子女及名數過多或令外人入府者許鎮巡官叅奏長史教授降調逺方𢎞治九年三月准都察院咨稱寧府鍾陵王違例濫收妾媵嫉妒不和将有子之妾非法責打鎖禁致死㓜男以致宫人帶刑逃出醜聲外彰有違祖訓具題節奉孝宗皇帝聖㫖鍾陵王濫收妾媵致令嫉妬不和将㓜男饑死及致宫人帶刑逃走醜聲外彰本當重治姑從輕革去禄米三分之一冩𠡠切責欽此正德四年令各王府如有未娶正室而先收侍女生育男女者聽本府輔導官具實奏聞區處所生子女不許請封請名又奏准凡長女已為王妃又将次女進與為妾者罪坐所進之人正徳四年該本部議准王府妾媵名數已經奏有禁例而鍾陵王濫收之弊深足為戒今後如有仍前縱欲敗度及輔導等官不行舉奏者許鎮巡等官指實具奏悉照前例區處永為定例奉武宗皇帝聖㫖是欽此嘉靖二年令郡王将軍中尉妾媵子女俱每年造冊繳部查對如有額外濫收者輔導等官即行舉奏減革禄米所生子女不許請封若輔導等官徇情隠匿者鎮巡等官舉奏照例降調邊方嘉靖六年五月内周府汝陽王府鎮國将軍安洛多收妾媵本部議得郡王将軍中尉選娶妾媵務從所在府州縣官吏里隣親戚保結明白果係例内應娶之數先行奏報本部知㑹方許禮娶入府若不係例内所司扶同保勘奏保或雖係例内故不經官保奏徑自收留入府者必是樂女娼婦並許輔導官舉奏如輔導等官徇情隠匿許鎮巡官指名舉奏查照節年題准事例減革禄米其所生子女即同花生不許請名請封輔導等官罷黜等因奉聖㫖你每說的是各處郡王将軍中尉收用妾媵已有定數禁例甚明安洛等仍前不遵已往的且都不究便行各處鎮巡等官輔行各王府長史教授啟王知㑹今後選娶妾媵務從所在官司里老隣佑人等查勘明白果係内應娶之數先行奏報方許禮娶入府有不遵的輔導等官舉奏若徇情不舉聽鎮巡官叅奏罷黜例外所生子女不許請名請封欽此嘉靖二十三年六月禮科給事中周采題稱王府奏選妾媵不明開嫡嗣有無奏報子女不著母妾來歴冐濫多端禁例有違乞要再加詳議及定議親郡王妾媵之數著為令甲該本部議得各該王府今後凡選娶妾媵俱要預行奏請其奏内必明開年已若干有無嫡子及例内應娶之數方與行文彼處官司并各輔導官員重加查勘如果所奏是實方許選娶仍将選娶過某處某人之女為苐幾妾備細緣由取具一應不致扶同欺隠結状繳報本部每嵗造冊送部查對如該府造報稽遲以後奏到庶生子女俱不許請給名封若有例外濫收者聽本部叅題革退所生子女不許造入玉牒冊内該府輔導保勘等官一併論罪罷黜其庶生子女應該奏請名封者奏内俱要明開委係何年月日禮娶何處何人之女為第幾妾所生不許朦朧将妾媵所生冐作嫡出樂婦姦生冐作庶出以致紊亂宗支乖違國典如再不行遵守聽本部并該科照前從重叅究所據欲要定擬親郡王妾媵名數除郡王妾媵已有定制外其親王妾媵應否定限人數本部未敢擅議伏乞聖明裁定奉聖㫖准議欽此嘉靖二十五年九月禮科都給事中李給題稱宗室不經奏選妾媵所生子女多由踵襲因循今若一概不准請封難遏紛紜之奏該本部議得郡王将軍中尉妾媵以有定數如查有例外濫收宫人多人名目及自嘉靖二十三年以前雖未經奏請若係例内應娶之數如果節年造報冊内來歴明白所生子女照例請封共有入府雖在二十三年以前而人數却在例外及自二十三年申明以後雖人數不係例外而入府未經奏報者所生子女俱照例不准請封止依庶人事例給與婚嫁之資如有既係私娶又在例外者所生子女不許造入玉牒永為定例仍将違例宗室奏請減革禄米輔導官從重究治奉聖㫖是欽此嘉靖三十一年七月禮科給事中王鳴臣題該本部議得郡王将軍中尉娶妾各以四十三為期誠為清源救弊之意合無今後郡王選婚之後年二十五嵗嫡妃無出者許其奏娶妾二人候至三十無出方許具奏娶足四妾将軍中尉選婚之後年三十嵗嫡配無出者許具奏各先娶妾一人候至三十五嵗無出方許具奏照例将軍娶足三妾中尉娶足二妾其所娶妾媵病故者必其嫡庶皆未有出方許奏請選補如已有出不得槩引額數務求補足至于濫收及越境選配禁例具存俱應再行申明如或故違本部查出将該府長史教授等官從重叅奏罷黜郡王将軍中尉奏請革罰撥置人等究治發遣等因奉聖㫖准議欽此妾媵禁例正德四年該本部議得王府婚禮俱奉成命選娶然後另奏請封無有未娶正室而先收侍女生育男女之禮除已往不究外合無本部通行各王府嚴加禁約但有前項所為聽慿輔導官員具實奏聞區處所生子女不得請封請名永為定例若輔導官員朦朧不舉者事發治以重罪奉武宗皇帝聖㫖是欽此嘉靖二十九年六月襄垣王奏稱長子聰瀺夫人病故子女無人看育㑹已故儀賓張繼恩女嫁夫翟霽出外十年有餘貧難無倚慿伊舅姑主議歸宗改嫁禮娶為妾生子二人俱已授封乞要比照仕㚀事例認罪首正該本部看得聡瀺所娶張氏既係有夫婦女又係姑舅之親于法本不當娶但既首正合無俯從寛宥奉聖㫖聡瀺本當究治既認罪首正饒他欽此嘉靖三十二年九月該刑部咨稱韓府襄陵王府奉國将軍旭柱收妾陶氏係長安縣流移民人陶春妺冐作平凉縣人劉氏係邠州失記名姓劉人女冐作縣民劉千里之女及行該縣申結並無陶梅劉千里姓名陶氏所生子融㸁劉氏所生女并所生子融應否請封食禄查例奏請定奪該本部看得宗室越境選婚禁例甚嚴旭柱違例收買流移民女為妾又敢揑報戸籍已經刑部題奉欽依去禄米三分之二似難再究其劉氏陶氏成婚年久似應免革及查冐籍選婚事例止罪營求撥置保勘人員所生子女未經議擬題請今據融㸁等欲照不良婦女所生削去玉牒屬籍則似非其倫欲照例内妾媵所生仍准請授官職則違例冐籍之人無以懲戒合無比照擅婚事例将旭柱庶第一子融㸁革去濫請中尉官職給與庶人婚資口粮三分之二其誥命冠服房屋從人等項盡行追奪并行各該衙門查照施行其庶第二子融并庶第一女以後止許照擅婚子女請給口粮婚嫁之資不許朦朧請授官封等因奉聖㫖是欽此庶人婚嫁天順四年奏准宗室降為庶人者其子女婚嫁有司每人與四表裏首飾銀二十兩猪四口羊四隻自今婚配正德二年六月守備鳳陽太監倪文題稱各墻庶人所生子女乞要婚配本部查得𢎞治十八年詔書内一欵宗室降為庶人者各賜米十石絹十疋其子女各米五石布五疋年及婚配者所司具名以聞照例選婚量助婚嫁之資欽此又查得見行事例宗室庶人婚嫁有司每人辦與四表裏首飾銀二十兩猪四口羊四隻自行婚配合無遵奉詔書内事例准復止照見行事例覆題奉武宗皇帝聖㫖還依詔書例行欽此正德二年三月魯王奏稱庶人當洅次子健樟乞要選婚本部備查覆題奉武宗皇帝聖㫖是只照見行事例行欽此正德四年該本部議得庶人婚嫁悉遵見行事例近該本部題奉欽依又有特從詔書量為資助者臣等竊恐有司不能仰承聖意多寡不齊適足為弊今後合無例照見行事例闗給庶使事體歸一而恩澤均沾奉武宗皇帝聖㫖是欽此儀賓婚配𢎞治十六年令各王府子女不許于本府軍校之家選配成化二十年六月禮部送雲丘王鍾鋋長女平陶縣主欲選古并郡君儀賓殷輅姪繡為儀賓所司以縣主與郡君同輩行尊卑失序禮難成婚詔令改選而王復累章陳乞不已上曰婚姻禮之大節謹始正家之道莫先于此王既為女擇配其可不論尊卑顧禮義而強欲曲成乎有司已當辨奏猶不知改悔是益違祖訓而不畏清議也可乎其依前㫖改選勿仍執迷正德三年十二月慶成王奏姪奉國将軍表桗先聘典仗所餘丁田林女以祖䘮未婚至是服闋疏請上曰王府子女禁于本府軍校之家選配奈何違之其别行選配後有違者禮部查出停婚被選之家戍邊衛不貸嘉靖五年令各王府選婚有失倫序者不許保結起送嘉靖十六年題准宗室郡君等擇配有不係本土人民擅自成婚者止准給冠帶榮身定儀賓品秩宣徳三年十二月初寧王權言儀賓品秩未有定制上命禮部考定其儀禮部奏洪武禮制云郡主儀賓秩從二品縣主儀賓秩從三品郡君儀賓從四品縣君儀賓從五品鄉君儀賓從六品若遇行禮宜序于同等官員之左上曰禮不踰等儀賓雖親當守定分此為定制其頒行遵守附籍選婚嘉靖六年五月襄王奏鎮寧王女洧川縣主選到附籍襄陽縣致仕典史陳預男陳珠為配該本部查得不係本土人氏駁回革退另選隨該鎮寧王具奏乞恩本部覆題奉聖㫖陳珠准令成婚欽此嘉靖十六年九月南渭王奏義烏郡君選到零陵縣主簿秦嘉祥長男秦賢為配擅自成婚該本部查得秦賢不係本土人氏但已成婚似難革退合無止給冠帶榮身奉聖㫖依擬欽此嘉靖三十一年三月楚府通城王庶第五女平恩縣主選到崇陽王府典膳廷嚮長男林舜潮為配該本部查得林舜潮原籍浙江人不係本土人氏駁回革退另選隨該本王比照附籍㐮府儀賓陳珠等乞恩前來本部覆題奉聖㫖林舜潮姑准完婚欽此續婚𢎞治十四年七月魯王奏稱嫡第三女宜夀郡主選到濟寧州張弨為配郡主未配病故有嫡第五女儀封郡主長成選無相應子弟欲将弨改配該本部查無違礙欲照例将張弨改配儀封郡主奉孝宗皇帝聖㫖是欽此嘉靖三十四年十二月内榮王秦稱寧逺縣主選到儀儐宋思未婚縣主病故乞要将碧湘縣主與宋思續親該本部議将宋思照例准令續親改給誥命奉聖㫖是再選𢎞治十七年三月鄭王奏稱革爵盟津王見長女選到子弟李良未婚病故乞要再選該本部議得合無聽其再選其助嫁之資例不重給奉孝宗皇帝聖㫖是欽此嘉靖十九年七月蜀王奏芒部郡君儀賓徐進冠帶回府未婚病故乞要另選該本部查例題奉聖㫖是欽此謝恩嘉靖六年五月該本部議得王府選取子弟婚畢謝恩許于三年以裏舉行如過三年者照例治罪等因奉聖㫖依擬行欽此教養儀賓𢎞治二年二月本部題據趙府等府起送儀賓趙文等到京冠帶看得數内李庠秦鶴年貌㓜小合送本府讀書三年待其長成另行具奏等因奉孝宗皇帝聖㫖是今後王府選擇儀賓務要年及十有五嵗以上人物長成俊秀的方許具奏成婚若将㓜小不堪之人朦朧選奏長史教授等官都重罪不饒欽此𢎞治十六年該聽選官鄭善桓奏本部議准各王府姻親人等擅求圗書手本票帖内囑托公事許所在官司先将差去人役拘執仍備将所齎圗書手本票帖内囑托事情指實奏聞區處其長史教授等官不能諫阻者一體叅究問罪本部合行各王府申明禁約其揀選儀賓之時不許将人物鄙陋禮貌粗疎者一槩起送其舊授儀賓二十五嵗以下并新授儀賓本府長史教授俱要照前例通送本處提學官撥𤼵儒學讀書習禮不時考驗年至三十方止其出入王府務在禮制當行不許放縱無度致生前弊俱許鎮巡等官指名叅奏等因覆題奉孝宗皇帝聖㫖是欽此正徳四年九月鎮守河南太監廖堂奏前事本部議得見行事例凡各王府郡縣主君鄉君儀賓務選家道清白保結到部看係無礙方與題准冠帶回還成婚又查得𢎞治十五年該徽王奏為預教儀賓成全禮儀壯觀王國事本部查照侯伯事例通行天下王府将新舊儀賓年二十五以下俱送本處儒學讀書習禮聽提學官長史教授考驗題奉孝宗皇帝聖㫖是欽此正德四年該本部議得儀賓習書習禮一節所司視為故事多不舉行合無再行申明嚴加禁約敢有違者聽鎮巡等官指實叅奏區處等因奉武宗皇帝聖㫖是欽此嘉靖三十四年六月崇王奏稱嫡第二女已封南陽郡主見年一十四嵗預乞選婚以便教養儀賓讀書習禮成材之後照例成婚今崇王奏乞預先教養合行本布政司照例揀選候年嵗日足具奏冠帶成婚等因奉聖㫖是欽此釋放宫眷𢎞治八年四月内南渭榮順王第二子鎮國将軍膺鉙奏父原管長兄庶人膺鑼家眷人口在府居住禄米停止宫人數多奏乞疎放被府親湖海等撥置存留該本部議行彼處鎮守太監劉雅㑹同膺鉙查勘所遺宫人無出者量為疎放若是仍前占恡先将撥置之人徑自拿問覆題奉孝宗皇帝聖㫖是欽此𢎞治九年四月巡按湖廣御史田奫題稱各王府如遇襲爵之初承奉等官即便㑹同本處鎮守内官将多餘侍從之人具數啟王知㑹照例釋其郡王将軍以下見今數多者亦聽照例施行以後悉照奏准名數存留該本部查照覆題奉孝宗皇帝聖㫖准擬欽此正德三年三月守備鳳陽太監黄凖題據髙墻庶人鍾鈵病故遺妾胡迎春宫人陳重陽欲照戸部題准事例釋放該本部議行太監黄凖照例查拘胡迎春陳重陽父母親屬領出嫁遣若無父母親屬量為處置疎放勿令失所奉武宗皇帝聖㫖是欽此正德四年六月内岷王奏祖岷順王遺下宫人周氏等四人俱有出乞要疎放該本部查議覆題奉武宗皇帝聖㫖周氏等係岷順王原近幸人數難以釋放仍留存府養贍欽此正德四年該本部議得今後各王府襲爵之初其先王侍從宫人除有出者仍留存府養贍其餘無出者照例釋放各将軍以下并庶人病故其宫人無出者亦照太監黄凖奏事例俱令原籍親屬領出嫁遣違者許鎮巡等官指實叅奏若訪有撥置之人徑自拏問從重議擬奉武宗皇帝聖㫖是欽此王親迴避凡有與王府結親官員不分軍民職官但在一城居住者俱各改調或令致仕閒住正統十四年十二月内肅王奏庶長男洵陽王選到甘州中䕶衛指揮樊俊女為婚合請改調奉英宗皇帝聖㫖還查洪武永樂年間官員與王府結親應否改調的例來說欽此本部隨行南京該部查無改調事例覆題奉英宗皇帝聖㫖既無䕶衛官與王府結親改調的例樊俊不必調今後只依這例行欽此𢎞治十五年八月内吏部尚書馬文昇奏稱親姪璡次子天禄已聘民人張樞女為婚近徽王預要将馬天禄選佐㓜女儀賓時令璡入承奉司習禮臣查得見行事例凡任京官其同户人有做王府儀賓者不分族屬逺近俱改調外任臣叨任外臣合當迴避乞令致仕等因奉孝宗皇帝聖㫖卿以耆德舊臣方膺重任屢乞退休已有㫖不允不必固辭馬天禄已定婚了充選儀賓該部知道欽此正德四年九月内吏部咨准都察院咨據山東道理刑進士田蘭呈照本職係直𨽻保定府清苑縣人由進士簡選理刑先有族伯父任平凉府知府田賜伊女田氏選作褒城王妃苐田福久因寄籍在彼伊男田疇近年又作本府儀賓田蘭應該迴避等因題奉武宗皇帝聖㫖田賜田疇俱不係本土人氏因做官寄籍累結王親顯是交通王府依法本當重刑姑從輕不究田蘭係王府親如何求進着回籍為民今後在外的官不許與王府結親永為定例見今如有王府占親的即當自陳如若不自陳退的有人首告訪查得出必重罪不饒該衙門便行文曉諭各衙門知道欽此移咨到部續又行該吏部文選清吏司手本回稱查審得進士田蘭自髙曾祖父以來俱分門另住知府田賜居官寄籍結親之時田蘭尚未生育伏乞聖明矜宥将田蘭量除在外職事等因題奉聖㫖准擬欽此勘辯樂籍𢎞治八年六月内晉王奏稱世子竒源宫人馬氏生有一子其馬氏曾祖馬得喬原係民籍至伊祖馬王瞽目唱詞報生樂戸其父馬亮又經告明改正等因本部駁行山西布政司查勘保結相同合行分豁覆題奉孝宗皇帝聖㫖是欽此正德元年十二月内晉府寧化王府輔國将軍鍾鎎奏生子妾張氏祖張俊原在富樂院地方居住伊男張璽遷居在鄉乞要改正該本部行據山西布政司勘過張俊止在富樂院前居住張氏不係娼優等因前來覆題奉武宗皇帝聖㫖是欽此正德四年該本部議得馬氏雖經查勘無礙然以天潢支派而求婚于唱詞微賤之家誠為不當張氏雖已保勘明白然富樂院乃淫賤之處在彼隣住亦涉嫌疑今後各王府選擇婚配如馬氏張氏者不許濫選違者罪在輔導官員奉武宗皇帝聖㫖是欽此嘉靖二十五年四月内晉王奏河東榮安王第四子表㮁生母劉氏原籍榆次縣民劉瓉妺因父劉剛早亡賣與榮安王為宫人後生表檯表㮁比有樂女劉氏止生一女授封縣主正德年間奉例通查被鎮守太監朱秀将表檯表㮁混造樂女册内不得請封乞要查勘明白改正隨該山西撫按官㑹勘結稱表檯表㮁生母劉氏委係榆次縣民人劉剛女先年河東榮安王納為宫人比因先娶樂工劉貴女劉氏入府所生一女封為崇明縣主伊恃寵嫉妒譖撥榮安王将表檯表㮁生母劉氏不肯明開籍貫混報宫妾劉氏所生已經節次駁勘無異似稱實明等因前來該本部看得河東榮安王妾劉氏委係民人劉剛之女不係樂籍則劉氏所生之子表檯表㮁似應照例封為鎮國将軍奉聖㫖表檯表㮁既查勘明白准照例與封欽此戒飭交通結親正統十年南京守備豐城侯李賢言寧王第四子盤炷已擇南京孝陵衛指揮使葛覃女為妃嫡長孫奠塔已擇濟川衛指揮使郭謙女為妃既而寧王又奏第十六女靖安縣主選覃之子旿為儀賓荘惠王世子磐􅥈第三女髙安縣主選謙之子𤦺為儀賓然寧王先奏擇儀賓上命于南昌府衛官員軍民之家擇之今乃不于南昌而于南京盖由覃等以王妃親故私與王府交通結親請治其罪上命覃謙各陳結親之故覃謙奏先各與妻送王妃往寧府成婚旿與琦俱隨送䝉王問其年與縣主相等皆許以婚輙從之罪不容逃上命禮部審其情至是尚書濙等言婚事雖出于王之自許覃謙亦宜奏請今乃恣意妄行于理未當請南京都察院究治仍行寧府長史司啟王知之上曰覃謙既認罪姑宥之俱令支俸隨操不管衛事其婚禮成則止今後各王府奏事禮部務勘酌行之酌持服成婚正德十三年楚王季埱奏弟大冶王季堧擇武昌䕶衛指揮同知翟政妺為妃婚姻在邇不意叔崇陽王孟煒薨逝季堧應持服未敢成婚上命禮部定議言王于崇陽王當服期年緣崇陽王未薨逝之先君命已下節冊至日合令妃翟氏拜受候服滿成婚從之慶成府擅擇女婚景泰元年禮部奏故事各王府選婚須先請命于朝今慶成王羮埥有女四人未嘗奏請擅擇婚姻然後奏聞其府中教授職居輔導不能諫止請令巡按監察御史究治其罪從之不成婚儀賓景泰元年禮部奏楚府麻城縣主選福建泉州知事李讓子旵為儀賓未成婚而縣主卒旵宜罷官為民仍将原給誥命送吏部焚燬冠服鞍馬等物送内府收貯從之違例婚姻追奪成化六年革晉府輔國将軍竒潡夫人李氏封號及恒隂郡君儀賓黄璽職先是慶成王奏弟鎮國将軍鍾鑄選太原衛餘丁李茂女為男竒潡夫人係厮養之家輔國将軍鍾選永和昭定王女興縣縣主儀賓王慶弟璽為妺恒隂郡君儀賓有失倫序事下禮部議其違例婚姻宜加追奪從之選婚在坐事前成化十年十月慶王邃奏先選郡牧千户所副千户沈宏女為弟豐林王邃㙂配後宏坐事立功其婚禮不敢擅舉事下禮部覆奏選婚在坐事之前宜如例封沈氏為豐林王妃從之罪宗子婚成王十四年四月禮部言代府鎮國将軍仕埭已坐罪降為庶人其子輔國将軍成鑿先奏允娶劉氏為配今其誥命冠服未敢擅議上命與之選婚未及期成化十六年秦王公錫奏永夀王府輔國将軍公鐼女㑹寧縣君選民人胥欽為配乞授儀賓職事禮部奏舊例王府子女必年十五方許選婚今㑹寧縣君年甫十二未經奏請輙擅選婚乞降勅戒諭秦王永夀王及公鐼今後宜遵成憲仍行所司逮問長史教授等官如律從之禁親屬為婚成化十八年詔禁諸王府不得以親屬為婚姻巡撫河南郡御史孫洪奏伏讀律文凡外姻有服尊屬卑㓜不得共為婚姻今王府婚姻多混雜不分遂使尊卑失序有乖倫理乞自親王妃以至中尉夫人及郡主以下儀賓皆宜擇良善之家并服屬無碍者為之禮部㑹官議以為當上曰婚姻人道之始禮之大者不可不謹矧藩府為朝廷親屬宜為朕禮遵行以先天下著為令給庶人婚資𢎞治二年庚子命守祖庶人子女年及婚嫁者准遼庶人子女例人給表裏四疋首飾銀二十兩猪羊各四隻行禮從禮部覆宿州知州萬本所奏也奪繼室冒封𢎞治十三年舊例宗室之䘮妻者若侍妾已有子其繼娶者不得受封瀋府鎮國将軍詮鋐夫人屈氏卒隠妾所生子冐請繼室牛氏封號冠服至是始自檢舉乞改正禮部請并治本府長史等官罪上命革牛氏封號准其子改正填註玉牒詮鋐及長史等官俱宥之覈庶生詐稱嫡嘉靖二十二年初胙城王府故輔國将軍安滔嘗娶樂婦生子女及妾班氏所生皆詐稱嫡出至是淑人張氏具奏發其事都給事中周采言近例宗室妾媵将軍不過三人中尉不過二人今一切廢格而諸王府奏選妾媵不言嫡嗣有無奏報子女不言母妾來歴冐濫滋甚宜詳議條例著為令甲于是禮部覆請令各王府自奏請娶妾皆明著年齒幾何有無嫡子及妾必例得選娶所司核實奏報乃許之諸凡庶生子女應請名封者皆明著年月生日及誰氏女第幾妾所生不得以庶冐嫡以奸生冐庶出違者究論如法詔允行之申阻抑選婚禁嘉靖二十八年禮部言王府宗室選配類奏保勘具有成規今徽府太康等王岷府唐年等王業已選婚矣而或保勘不至或不為奏聞中間必有阻遏需求之弊自今各王府請皆以嵗終行撫按官通查犯者悉如法親郡王故為遷延輔導官不能匡正者罪之報可妾媵請封禁限嘉靖三十三年十二月崇王載境為叔懐安王厚熑故内助周氏請封援襄府棗陽王妃單氏例禮部議親王妾媵有出者得稱夫人此定制其後親王生母得請封次妃郡王将軍生母遂得請封夫人夤緣倖恩實從此始如單氏子為将軍而得請封為妃踰制甚矣今周氏生二女亦遂援此以圗僥倖及今不節後将無紀請自後親王之妾有子者許請封夫人其子已襲封親王而嫡妃不存者許請封為次妃郡王而嫡妃不存者許請封為夫人仍請𠡠知㑹不給誥命冠服及裁減身後祭𦵏此外毋得濫請春可議便請婚嘉靖十一年九月内禮部題查得見行事例凡宗室将軍中尉一應子女俱候十五嵗選婚其有年嵗不同或庶出生母入府來歴不明通行駁勘所據前例遵行已久但近來各府長史司多違法守任意遷延或有使用不敷營求未及則子女年嵗過例方與類請乞恩其奏内來文又多年月不同母氏錯誤至于應婚夫人姓氏或本到無結結至無本互相背馳延緩以致查駁之間動經年嵗遂使聖明渥澤欝而不流宗室至親怨曠失所題奉欽依今後行各王府長史司啟王知㑹今後将軍中尉子女年嵗已及即與具奏請婚若奏内來文或年嵗少差母氏未的本部一面駁行查勘一面聽令選擇應婚子女一併開具奏請夫人奏結不齊候至三月以上者俱聴本部查考得出奏将該府長史司等官究問庻人婚資隆慶元年禮部言宗室庶人請給婚資必待各府勘奏本部覆議然後給與惟南京庶人生子南京吏部保勘登冊待及婚娶之年乃為查奏照各處事例給與表裏猪羊及首飾銀二十兩往時一婚折銀八十兩之例原非成憲當改正從之藩𦙍擅婚子女嘉靖二十八年三月晉王奏寧化王府鎮國中尉表柔繼娶藺氏所生第二女例該請封該本部查得藺氏既經擅婚革封其子女似難照常請封惟復照依革爵庶人所生子女事例量給婚嫁之資不許請乞封號以後各王府但有違例擅婚者俱照此例施行等因奉聖㫖是欽此嘉靖三十二年十二月周王奏鎮國中尉睦擅婚髙氏所生男女請給名糧該本部查得戸部議准事例宗室擅婚所生子女不許請封止許請名比照庶人給與口糧五十石女止給婚資及睦長男及三女勘係擅婚所生是實合照例将長男行移請名所據口糧并三女婚資查照近題事例闗給等因奉聖㫖是欽此濫妾子女嘉靖二十五年九月遼王奏有長垣王寵泑陪從女瑣氏庶生第六女鎮國中尉寵添陪從女王氏庶生第四男各要請給封名該本部叅題奉聖㫖是寵泑寵添子女既屬違例止許請名以後不經奏請濫娶妾媵并増立陪從宫人多人名目所生子女還都照例不許一槩請封欽此嘉靖二十七年八月慶成王奏輔國将軍竒夫人早故遇有已故王仲芳妻髙氏娶為繼室所生一子彼時稱妾黄氏所生具奏請名表朶今已成長乞要請封選婚該本部看得竒繼妻髙氏生子表朶雖經請名但髙氏既係故民妻竒輙敢濫收始而朦朧奏報繼又擅稱繼室俱屬故違合無比照庶人子女事例量給婚配之資奉聖㫖是欽此嘉靖二十九年五月楚府武岡王奏鎮國中尉顯桄第三妾張氏庶生第六子奉國中尉華素隨嫁侍女王氏庶生第一子俱乞請名該本部看得顯光庶第六子係額外第三妾所生華素係隨嫁侍女即陪從之人俱屬違例合照前㫖止請名以後不許朦朧奏請封號等因奉聖㫖是欽此嘉靖二十九年九月慶成王奏有奉國将軍表椇第二妾田氏庶生第五男乞要請名該本部查得玉牒冊内田氏係第四妾看得表椇庶第五男既係額外四妾所生今却揑作二妾顯是教授等官徇私受賄朦朧作弊合将表椇庶第五男止准賜名以後不許朦朧奏請封號教授等官行提審究等因奉聖㫖是欽此嘉靖二十九年十月周王奏有輔國将軍安洢第三妾許氏庶生第七男第二妾馮氏庶生第八男各要請名該本部查得安洢第七男係第五妾許氏第八男係第四妾馮氏各庶生今却将許氏揑作三妾馮氏揑作二妾具奏前來顯是輔導等官徇私受賄朦朧欺蔽合将安洢庶第七男庶第八男止許賜名不許朦朧奏請封號輔導等官轉行查究等因奉聖㫖是欽此花生子女正德四年奏准宗室姦收樂女并不良之婦所生子女并選配夫人等及儀賓已授封者爵職封號禄米盡行革去未授名封者不許冐請樂工人等俱𤼵邊衛永逺充軍其女婦盡數逐出輔導官不行諫阻及所司朦朧保勘者鎮巡官查奏處治正德四年三月周王奏稱第七弟係樂女所生乞要比照安汎等事例請給名封等因本部叅題節奉武宗皇帝聖㫖是宗支重事這樂女所生之子有玷祖訓尚不自恥如何冐濫來請名封號着做庶人安汎等已封的係夤縁朦朧奏請都革了輔導等官不能以理諫阻着巡按御史提問明白奏來處治各府有樂女所生的着禮部通查來看欽此隨該本部議得天下宗支繁衍本部無從備查合行都察院通行有王府去處各鎮巡等官嚴督承奉長史教授從公查勘宗室之中但有收用樂女并不良婦人所生子女不分己未請名授封選婚通查明白備造文冊繳部以便查考其已授封者查明之日另行奏請定自今各王府請名等項除嫡生外但係庶生子女俱待鎮巡等官查勘明白㑹造文冊至日再查宗人府玉牒冊内相同方為覆題以俟聖明裁處永為定例倘有遺漏及朦朧奏報聴本部叅究治以重罪覆題奉武宗皇帝聖㫖你每說的是着各鎮巡等官嚴督各府承奉長史教授将收用樂女并非良家婦女所生子女己未請名授封選婚的通查明白造冊繳部奏來定奪今後請名等項但係庶生子女俱待鎮巡等官查勘明白㑹奏造冊至日恁部裡再查宗人府玉牒冊内相同方許覆奏今後有似這等的革了爵禄欽此正德五年十一月内該本部㑹議得各王府收用樂婦生有子女乞請封號等因奉武宗皇帝聖㫖封爵重事卿等既㑹議停當已請封號爵職七十人俱免革已請名未授封的都照晉代等府例查革不許請封還給與冠帶有司量給婚嫁之資例前所生的也照例行今後各王府務要遵守祖訓敢有仍前收買樂女姦宿樂婦并不良婦女及将所生子朦朧奏請名封的輔導等官治罪不饒庶生子女俱依前例覆勘明白方許類奏開報欽此正德八年十月内該本部議得各王府收用樂婦女并不良婦女所生子女雖有例前例後之分其為不遵祖訓一也今例後所生者已奉欽依不許奏請名封例前授封者成命已定朝廷寛恩姑不查革今其後嗣雖非樂婦女并不良婦女所生揆其源流終出不正合無比照例前所生事例止許請名不許請封仍給與冠帶婚嫁之資其再世以後者俱照前例施行等因奉武宗皇帝聖㫖是都照例前所生子女例行欽此嘉靖八年八月内該本部議得天下各王府凡係樂婦所生子女婚嫁比照庶人事例量給一半於布政司照數闗給等因奉聖㫖是欽此嘉靖二十二年六月該周府永寧王府安治等奏為月糧被革乞要照舊賜給本部議得安治係花生傳生子孫支流蕃衍宜限其子女定給口糧合無備查見在庶人傳生等項名數除子女未出㓜者從父養育女将出嫁者給與婚資從夫自贍外其子已出㓜成婚應請口糧查其多寡二子以上則不分長子衆子各與減半支給若止一子二子俱給與口糧全分傳世以後原係減半即照原題支給原係全結者仍查其父子多寡照前定擬奉聖㫖是欽此嘉靖二十七年題准今後樂女并不良婦女所生子女不拘年嵗不得朦朧開報比例奏討名糧冠帶等項如違聴本部及該科從重㕘究治罪其見娶婦女無出者即令退黜不許容留永為定例嘉靖二十七年三月該巡按湖廣御史勘得庶人譽梡譽槲係伊祖膺䥯奸收不良婦女所生子孫先經勘明奉有欽依照例給與冠帶婚嫁之資却乃故違明㫖不即領受及犯人林千違例撥置法應重遣該本部查得譽梡譽槲正與本部近題事例相合合無将譽梡譽槲冠帶婚資并行革奪聴其自行婚配所生子孫悉照近例施行奉聖㫖是欽此寄養子女𢎞治十七年六月山隂王長子成鏊奏稱輔國将軍成鑱父鎮國将軍仕圯與夫人侯氏俱故遺下第二妹原係伯父山隂王已故宫人孫氏所生之女因伯妃李氏不睦不容存養将本女抱與侯氏撫養不合報作侯氏嫡生第二女有此差錯乞要改正等因該本部查得郡王女例封縣主鎮國将軍女例封郡君名位不同嵗支禄米多寡懸異今欲奏請改正事屬可疑況經年逺合無以冊為慿後該請封止擬郡君封號等因奉孝宗皇帝聖㫖是欽此正德四年該本部議得今後親郡王将軍以下子女如有伯叔自㓜抱養已經造冊奏報者止據冊受封不許以改正為由濫請封號奉武宗皇帝聖㫖是欽此宗室繼嗣正德四年議照郡王将軍而下薨故無嗣者止許以昭穆相應之人承祀不許奏乞繼嗣名目天順二年五月晉王奏弟太谷王妃無出不期患病沉重倘有不測乞将親兄河東王嫡第二子賜與繼嗣等因本部查無事例覆題奉武宗皇帝聖㫖既查無此等事例罷欽此天順八年四月廣昌安僖王生母劉氏奏稱孫男鍾見年十四嵗乞賜封爵等因本部查得先該廣昌王奏稱無子已将雲丘王第二子為嗣并賜名鍾䥏去後今廣昌安僖王生母劉氏奏要賜以封爵照得鍾係過繼之子查無襲封王爵舊例覆奉英宗皇帝聖㫖既無舊例罷欽此𢎞治九年五月瀋王奏稱清源王嫡長次子俱故無子遺第五子鎮國将軍詮鏴先年過繼與黎城荘惠王為後乞要歸宗為嗣等因覆題奉孝宗皇帝聖㫖詮鏴准歸本宗為嗣待生有次子仍繼承黎城王宗祀欽此𢎞治十八年四月瀋王奏稱清源王詮鏴生有子三人理該第三子勛洺奉祀黎城王宗祀乞要請𠡠管理等因本部題奉孝宗皇帝聖㫖是欽此正德三年十二月晉府寧河王奏鎮國将軍鍾年老乏嗣欲将伊兄鎮國将軍鍾鋩第六子竒漢為嗣本部覆題表武宗皇帝聖㫖是這繼嗣祖訓未載難同仕宦常人之家況鍾年未及五六十罷欽此正德四年十二月内該本部議得近該遼府承繼應山王宗祀輔國将軍寵波乞襲祖爵本部題奉欽依止以本職奉祀永為定例今後各王府郡王将軍而下薨故無嗣者止許以昭穆相應之人承祀不許違例奏乞繼嗣名目他日得以夤緣請封冐濫爵職違者坐罪輔導官員奉武宗皇帝聖㫖郡王将軍病故無嗣其宗支止許奏請奉祀不許夤緣請封并繼嗣名目欽此嘉靖二十年九月内該韓王奏稱隴西王旭林先年五十五嵗乏嗣承繼乞要将伊嫡生第二子謨墊過府與隴西王承繼本部尚書嚴嵩議照郡王乏嗣薨故方許昭穆相應之人承祀不許奏乞繼嗣名目著例遵行已久今隴西王旭林年未六十無故請人之子為後韓王不察輙以第二子過繼于人且倫序不應違例請乞顯有他日夤緣冐爵之圖揆之國典事屬有違叅照韓府長史并隴西王府教授各職輔導不能諫阻以致妄行奏擾合候命下本部移咨都察院轉行巡按陜西監察御史将各輔導官員行提到官問擬如律以警将來奉聖㫖是欽此嘉靖二十九年十二月崇王奏稱瑞安王載埴病故無嗣乞将伊弟輔國将軍載垉准襲祖爵以繼宗祀該本部看得瑞安荘惠王載埴既病故無嗣其嫡第四弟輔國将軍載垉據例難以准襲只應以本職奉祀既經河南布政司查勘倫序相應合行該府長史司具啟崇王知㑹行令載垉照例以本等官職奉祀管理府事以後不許朦朧再請襲封等因奉聖㫖是欽此嘉靖三十四年二月秦王奏稱汧陽王秉榛病故乏嗣乞要将奉國将軍惟主䘮奉祀管理府事該本部查得汧陽王秉榛與奉國将軍惟倫序昭穆與榛相同及查有前例合行該府啟王知㑹行令惟照例以本等職事主䘮奉祀管理府事不許朦朧奏請封爵等因奉聖㫖是欽此嘉靖三十六年本部纂職掌議照宗室繼嗣前項訓例昭然邇年以來郡王将軍援引𢎞治年間鍾釡事例奏乞繼嗣本部既為覆行但鍾釡例已久逺堂稿無從稽查且于祖訓不許請乞繼嗣名目似有違碍今並不録禮部志稿卷七十六
