body:
  text: 禮部志稿卷五十三明俞汝楫編列傳尚書倪岳倪岳字舜咨應天府上元縣人南京吏部尚書謙之子天順八年進士改翰林院庶吉士成化元年授編修與脩英廟實録秩滿陞侍讀充經筵講官丁父憂服闋復任預脩文華大訓成遷學士充東宫講讀官二十二年陞禮部右侍郎二十三年憲宗賔天充山陵使時孝宗初即位典禮坌集皆下禮部尚書周洪謨老多疾議擬多出岳手遂釐正祀典凢京師諸神祠淫名侈費諸不經訓者裁革殆盡國朝自徳祖以下九廟已備及憲宗山陵禮畢神主皆陞祔于制當祧廟下禮部集廷臣議岳力言國家自徳祖以上莫推其世則徳祖乃周之后稷也不可祧懿僖仁三祖以次當祧至太祖太宗為周之文武百世不遷今憲宗新祔當祧懿祖一廟宜于太廟寢殿後别建藏祧主之所如古夾室之制每嵗暮則奉祧主合享亦如古祫祭之制時又言孝穆太后宜祔廟者復詔議之岳言孝穆神主宜于奉先殿旁别立廟嵗時祭享悉如奉先之儀奏上詔悉從之時程敏政又欲改定孔庭從祀諸賢岳言馬融王弼之徒其立身不無可貶然秦漢以來六經出於煨燼賴諸子抱遺經專門講授經以復存自唐之註疏多祖其言今之經傳引用尚多其説則何可盡廢七十子名字自馬遷以來相沿已乆千百年後何可臆定於是咸復舊𢎞治元年進左侍郎時以灾異求言岳同尚書耿裕等䟽寅畏天戒七事未幾復陳八事上嘉納焉二年賽瑪爾堪差人進貢岳具奏海南諸畨國入貢有勘合者例與廣東布政司比對起送赴京其餘不許起送係是定例今賽瑪爾堪差人進貢却乃即便差人起送似此故違合當㕘究上從其言差官阻回不受貢六年進禮部尚書時始五十㑹京師大雨雹具言雨雹之作天所以告陛下宜深求致災之繇以回天意又勸上勵精以勤聖學推誠以開言路止無功之賞停不急之役黜奸貪進忠直時有㫖四川光相寺國師琳沁珠卜取来大慈恩寺住坐岳言琳沁珠卜等俱以西畨清凈之徒壊禮義之教不可也皇上首賜罷黜中外稱聖今欲行取來京於皇上初政之清明制命之嚴正不無少損又西域胡人從海道進獅子岳言獅者外夷之獸真偽不可知且海道亦非西域常貢之路詔還之八年七月有㫖聖母年老念叔崇王欲得一見便冩勅差官請来岳極論事有未便者三上不納尋復有㫖免王来岳力居多先是四方奏報灾異禮部率類其凢嵗終一復以為故事岳乃以日月先後彚分條析末復援經史懇懇為上言之𢎞治九年知貢舉岳凡三知貢舉防範嚴宻如帖圗編號每因舊法出新意後遂不可易本年改南京吏部累官南京兵部改吏部尚書加太子少保卒於官年五十八賜寳鈔萬貫遣禮官諭祭者四勅有司治塟仍給驛歸其䘮贈光禄大夫少保諡文毅官其子為中書舎人岳状貌魁異望之如神人有文武才畧在禮部儀文制度多所擬定事當廷議往往片言而决天下皆仰望其風采獨在翰林時太監黄賜母死衰服送塟論者謂其急於功名䁥比權要君子亦深惜焉尚書徐瓊徐瓊字時庸江西金谿縣人自㓜穎敏向學慱通經史為文竒逸不滯景泰庚午領鄉薦天順丁丑進士第二人授翰林院編修預修英廟實録成化丙戌同考㑹試士丁亥修大明一統志成陞侍講辛夘典應天鄉試丙申陞南京翰林院侍讀學士署院事丁未春陞南京太常寺卿掌南國子監事𢎞治庚戌陞南京禮部右侍郎癸丑改比部左侍郎時尚書倪文毅公岳清徳宿學為世推重挺然任事不少規避權貴忌之瓊托婣貴戚垂涎代岳丙辰㑹南京吏部缺尚書舉岳補之遂陞瓊為禮部尚書衆論諽然不平初祠部度僧道十年一舉時僧道集京師以萬計權貴多為之請左侍郎傅瀚持不可遂同議上疏仍改十年給度之例又太常寺卿崔志端謂本寺與光禄寺太僕寺不同不係禮部統屬瓊具奏朝廷每大事㑹議正該六部都察院通政司大理寺未聞有太常寺也今欲與九卿衙門齊得乎况本寺乃祠部之一事與光禄寺為膳部之一事太僕寺為駕部之一事相同但以此三事乃事之大者所以又設此三等衙門以專之耳今太僕寺既屬兵部光禄寺既屬禮部矣獨太常寺與禮部齊可乎正以志端發身道流穢行彰聞累經弹劾未蒙黜退乃敢愈無忌惮忍為欺罔通應究問上戒諭志端於是體統不紊戊午以青宫出閣加太子少保因四方災異上言数事上可之己未知貢舉庚申上疏乞骸加太子太保給驛歸後年八十有一卒瓊以髙第致位宗伯遭逄孝宗明聖在上不能展諝陳慮舉明主于三代之隆徒納欵中貴驟致通顯屢經給事中彭城等御史余濓等交章論列去位識者惜之尚書傅瀚傅瀚字曰川江西新喻縣人少穎秀拔異讀書過目成誦始就外傅則往往推究奥義人多竒之癸未㑹試科塲災寢疾幾殆忽神人見夢曰弗憂也公前程逺大疾今愈其年八月中㑹試甲申賜同進士出身改庶吉士除翰林院檢討憲宗一日於内得古帖斷爛不可讀命中使持至内館適瀚至直次為韵語湏㬰授中使以復上大悦有珍饌法醖之賜九載進修撰兼司經局校書日侍孝宗於春宫遷左諭徳兼檢討充經筵講官及東宫講官孝宗嗣位以舊學恩進太常寺少卿兼侍讀仍充經筵講官兼日講每進講誠意懇切敷陳詳婉而進止雍容上每注聽焉憲宗實録成進太常卿兼侍講學士乆之遷禮部右侍郎㑹南部缺叅賛僉舉尚書倪岳瀚言倪之才何可寘之南或謂倪往公不當次進乎瀚曰吾知為國遑恤其他及金谿徐公瓊進尚書瀚轉左侍郎徐凢事多倚成之初祠部給度十年一舉時僧道集京師以萬計權貴多為之請澣力言此軰蠧耗天下宜痛加禁革縱未能如祖宗朝之制亦當稍賜裁抑遂改十年給度之例時以龜山楊時從祀孔子廟廷言者因謂羅從愿李侗亦當從祀瀚言二子著述視尹焞㳺酢謝良佐未知所先後二子從祀則三人似不可遺道學所在其可濫乎乃止己未知貢舉俄用廷薦以本官兼翰林院學士掌詹事府事仍兼日講官㑹典副總裁庚申進禮部尚書㑹京師地震雨雹四方日奏灾異因疏言今賦重役繁民窮財盡宜躬行節儉以先天下庶民困苦可蘇時陜西地震異甚復率諸公卿條奏三十一事如敬天勤民法祖修徳汰冗官罷工役减齋醮省上供尤拳拳焉奏留中又復言民心易感在結之以恩天意可囘在應之以實屬者所陳謂當如拯溺捄焚猶恐不及而側聽彌月未賜宸斷何以回天意哉疏上報可保定獻白鴉謂祥瑞不當奏陕西守臣熊翀得玉璽来獻乞頒示天下以為傳國之寳復出也瀚言以史傳諸書考之刑制篆刻皆不類其為贗作無疑即使非贗人主受命在徳不在璽自前世以秦璽為寳得之者君臣動色相慶我太祖以聖徳受命製一代之璽傳之聖子神孫夀昌之福萬世無極何藉於彼哉上廼以其璽屬庫藏之尋以足疾在告上数遣醫來視因乞致仕不允壬戌年歿於官上賜寳鏹為治歛具贈太子太保諡文穆諭祭者三給舟車遣官䕶行為營塟事瀚好學力行至老彌篤平生著述多本於理書法遒麗有晋人風韻性縝宻有矩度事必思而後行其在上前雖舉歩後先髙卑輕重疾徐毫髪皆可較勘聞人有善汲引如不及兩主文衡人稱其公明但同鄉監生汪鎔誣奏大學士劉健李東陽或謂瀚實嗾之而嫁禍于程敏政謝遷王華咸中誣之不能不致疑于國史所訾云尚書張昇張昇字啟昭江西南城人成化己丑進士第一人授翰林院修撰後以皇太子出閣特改左春坊左賛善充東宫講讀官秩滿陞右春坊右諭徳孝宗即位以從龍恩進左庻子兼翰林侍讀故事特改宫僚者例轉数階而昇以憂居後至但進一階疑大學士劉吉抑已摭吉過劾之忤上左遷南京工部員外郎以憂去服闋㑹吉已去位復庶子言数事多中時弊尋陞詹事府少詹事兼翰林院侍讀學士歴陞左右侍郎轉尚書時崔志端以太常樂舞生積資至為同官頗倨傲昇常别流品以裁割之屬官有授徒講經者御史楊儀之子在講下嘗出入部中遇昇散部失趨避命司務朴而拘之儀不能平劾昇不恊人望自是名益損屡為言官所指嘗奉詔選宫女禁娼優卒𨽻家不得與榜書𨽻為吏衆閧然騰謗昇乃不安于位遂致仕加太子太保劉瑾用事又以為尚書時裁抑晋府郡王封爵鐫所加官正徳十二年冬卒訃聞輟朝一日贈太子太傅諡文僖賜祭塟如例昇愿慤有餘居官雖無大建白然自守謹飭為文平實嘗主兩京鄉試所取得侍郎儲巏編修陳瀾皆名士論者以為得人尚書李傑李傑字世賢蘇州府常熟人成化丙戌進士改翰林院庶吉士授編修陞侍講二十二年充東宫講讀官秩滿陞侍讀學士𢎞治初以宫僚恩陞左春坊左庶子兼侍讀學士四年陞南京國子監祭酒時方修憲廟實録留館中校正書成乃行以憂去服闋改太常寺少卿兼侍讀學士掌院事十三年陞南京禮部右侍郎十五年改禮部右侍郎轉左侍郎正徳元年充孝廟實録副總裁尋陞南京吏部尚書二年改禮部尚書時逆瑾用事納晋府鎮國将軍表槏等賂欲進封為郡王傑坐前與尚書張昇皆持不與進封之議忤瑾意遂令致仕瑾誅有㫖在起用之列正徳十二年閏十二月卒贈太子少保傑持己矜嚴待後進頗立崖岸晩以忤瑾而去士論髙之其為詩文亦温厚可觀尚書周經周經字伯常山西陽曲人南京刑部尚書諠之子也天順庚辰進士改翰林院庶吉士授檢討纂修英廟實録成進編脩秩滿進侍講十四年孝宗出閣改春坊左中允𢎞治改元以東宫恩陞太常寺少卿兼侍讀二年擢禮部右侍郎四年改吏部尋轉左九年擢戸部尚書尋加太子太保十三年以災異乞免加太子太保致仕十八年起為南京户部尚書以疾辭㑹丁母憂未上正徳三年復起為禮部尚書居数月以病乞休復致仕卒年七十有一上輟視朝一日贈特進光禄大夫右柱國太保諡文端賜祭塟如例經在館乆淹有諷之圗速化者卒不為動及居禮部議政蒞事必傅經義若却西域貢獅毁黄村尼寺為先朝盛徳事皆經賛成之在吏部時有指民田為閒地獻太監李廣者廣固欲得之經草奏率諸司言之事遂寢及遷户部人以其出翰林或不能理錢穀視事後嚴條約革宿弊剖决如流郎吏皆嘆服以為難及中官織造於南京者屢以引鹽𣙜課為請賴經奏裁省甚多大内張燈取外帑銀三萬兩經言不可以小民脂膏供耳目之玩乃命以明年内庫嵗額償之近戚貴幸有所陳請一裁以法皆歛不得肆而怨日益深致仕命下廷臣皆相顧失色争上疏留之是後中外奏薦多致八十餘疏前此未之有也經少頴敏莊重寡言笑孝友純至自為小官已志用世及為戸部尚書秉正執法竟以不合去人甚髙之其復起也則以其壻曹元與劉瑾有連或謂元實為之時經已病又黽勉赴召則不能無責備云尚書白鉞白鉞字秉徳真定府南宫縣人兵部尚書圭之子成化甲辰舉禮部廷試第二名及第授翰林院編修𢎞治戊申同修憲廟實録以内艱去癸丑同考禮部丙辰秩滿遷侍讀己未充經筵講官壬戌復考禮部武宗在春宫充講讀官癸亥脩大明㑹典成進侍講學士賜宴禮部尋命與脩歴代通鑑纂要甲子考南畿鄉試乙丑以登極進學士加從四品俸充日講官正徳丁夘命教庶吉士署院事擢禮部右侍郎賜御製蟠龍諸軸并纂要本年改吏部三年轉左尋陞禮部尚書己巳賜玉帶庚午復命兼學士入内閣專典誥勅掌詹事府事加太子太保卒于官賜祭塟贈太子太保諡文裕鉞愽覧子史長於記誦體貌魁梧器局凝重為禮部尚書時逆瑾方用事值所難處寧稍遜避而亦不失其正云尚書費宏費宏字子充江西鉛山人成化丁未進士第一授翰林院修撰𢎞治中改左賛善事毅皇帝于東宫已陞右諭徳兼侍讀正徳中以舊學進太常寺少卿兼侍讀充日講官歴禮部左右侍郎至尚書皆直講如故尋入内閣與李東陽楊廷和等輔政事四方羣盗充斥以次削平詔録輔臣功官其子仍進太子太保户部尚書武英殿大學士寧濠請復䕶衛恃錢寧為内援賂遺狼藉宏䇿其必叛執勿與寧深憾以計傾之宏去位上即位詔召宏進少保入閣脩翊戴功加伯爵廕子錦衣衛指揮使世襲宏懇疏辭免時水旱相仍條陳救荒十事上嘉納又蠲逋賦减太僕寺馬價十五以輕齎之羡給漕卒議安大同叛卒皆宏謀也武廟實録成進少師兼太子太師上嘗製詠春及四景詩屬宏和上自序其端名曰詠春同徳録題其銜為内閣掌㕘機政輔導首臣其見任如此丙戌獻皇帝實録成進華盖殿大學士食正一品俸賜御製詩一章丁亥以疾求去疏再上賜馳驛歸及大學士張孚敬去位上思用舊臣手勅起宏于家宏至見便殿上親勞之賜銀圗書一文曰舊輔元臣時時燕見宻議奏對皆稱㫖無何遂卒上為輟朝詔贈太保諡文憲遣官䕶其䘮歸䘏典之厚諸大臣莫得比焉宏恭慎謙抑明集國家故事能持重得大體故三入政府以功名始終云尚書傅珪傅珪字邦端保定清苑縣人成化丁未進士改翰林院庶吉士授編修𢎞治中兼司經局校書與修大明㑹典陞左春坊左中允兼編修丙辰乙丑一再同考㑹試正徳初以東宫恩陞左諭徳兼侍講充經筵講官與修孝廟實録清理軍職貼黄丁夘考應天鄉試戊辰考武舉奉命授庶吉士業充日講官劉瑾柄政摘㑹典訛字珪以嘗與纂修降修撰旋以史勞陞左中允厯侍講學士庚午考順天鄉試陞吏部右侍郎轉左侍郎陞禮部尚書正徳十年卒年五十七珪為人強毅有執持人不敢干以私在禮部守法持正嘗因類奏四方災異陳時弊十事言甚剴切時上方好佛自名大慶法王外廷知之無徴以諫畨僧奏討田百頃為大慶王下院傅公遂劾僧曰法王何為者至與至尊並列大不道當誅有詔不問其妄求亦止優人臧賢被寵能軒輊士夫士夫或與善賢因是請改牙牌製如郡僚印文改方者珪不可召老優更事者詰曰爾優敢亂法爾寵可常保否即遺爾辱禍靡極矣優乃戢但與新之盜劉六擾中原勢炎炎熾太監誾以侍即完征之不能㓕乃先行左右賞閹後曺又立監鎗名謀統軍命多官議可否衆依違不斷珪怒而言今兵老民疲直以多冒功者失士心賊在腑肺孔棘民譁然思禍亂旦夕及宗社吾儕死不償責諸公尚唯唯将何待乎以是忤權倖忽傳㫖諭令乞休珪抗疏得歸兩京言官交章留之不報家居杜門謝賓客絶跡公府遺言戒子弟忝竊大官無以報國慎毋以䘏典請御史盧雍等以為言給祭塟如例尚書劉春劉春字仲仁四川巴縣人成化癸夘鄉試第一丁未進士及第授編修𢎞治辛亥轉修撰庚申充東宫講讀官秩滿遷左諭徳癸亥預修㑹典進侍講學士正徳紀元陞學士辛未擢吏部侍郎充經筵日講官明年陟禮部尚書凢舉動皆為乆逺計不務目前西僧有欲奪民地於甘州且乞遣官督建寺時闗中饑甚春力争以為不可謂非止病民邉警至不可支持竟停之占城世子失國竄居邦都即請封春曰春秋公孫青尚不辱命於衛况天朝乎疏上已之宗藩請封及婚嫁弊孔百出春即檢其行駁者盡語之吏不得欺以求賄又以祭塟諡議闗係勸懲乃奏為定格要家及故舊有以厚利力請者不為動乆之亦安其所宜得心亦莫之怨也每勲戚大臣病故上遣諭祭䘮家輙厚幣為謝習以為常春曰以尚書而受其贈遺豈惟輕已如國體何故事功臣襲爵表謝又皆禮部堂上分撰謝以銀幣悉却之其謹峻有守如此尋丁憂起復為禮部尚書兼翰林院學士在内閣專管誥勅掌詹事府事卒録東宫講讀勞詔特加祭二壇造墳安塟如例贈太子太保諡文簡春志行端潔徳量醇厚有古人風尚書毛紀毛紀字維之山東掖縣人成化丁未進士改庶吉士𢎞治二年授翰林院檢討十二年陞本院修撰十六年陞本院侍讀十八年陞左春坊左諭徳仍兼侍讀正徳元年丁父憂四年起服以㑹典故降侍讀本年以實録成陞翰林院侍讀學士尋陞本院學士五年陞户部右侍郎本年陞禮部尚書尋兼翰林院學士時遣使西域齎畨供紀西畨逺在萬里祖宗朝賜法王國師名號用以羈縻今不擾邉齎供媚之失天朝體又以儲嗣未建乞早定大計十一年命掌詹事府事管内閣誥勅十二年五月命兼東閣大學士内閣辦事累加太子太保文淵閣大學士少保改户部尚書武英殿大學士武皇帝大漸奉遺詔迎上入繼大統上即位論定䇿功封紀伯爵紀固辭不受尋改吏部尚書謹身殿大學士以疾乞致仕再疏請許之詔有司給月米嵗夫紀歴事三朝守正不阿晩家居二十年始終一節上嘗詔有司即其家存問及卒上輟朝一日贈太保諡文簡賜祭塟如例尚書李遜學李遜學字希賢河南上蔡縣人成化丁未進士改翰林院庶吉士授檢討𢎞治丙辰陞浙江按察司僉事以憂去終䘮改陕西陞副使又以憂去終䘮改山東前後更三任俱提調學校所至務從寛厚頗得士心正徳戊辰陞太常寺少卿提督四夷館明年仍入翰林兼侍讀陞户部右侍郎提督草塲尋改禮部陞左侍郎乙亥陞南京禮部尚書丙子以奉賀表入京改禮部明年兼學士掌詹事府事入内閣專管誥勅奉命授庶吉士業正徳十四年卒祭塟如例遜學為人開爽頗不羈為詩文有藻思尚書毛澄毛澄字憲清太倉州人𢎞治癸丑廷試第一授修撰丙辰同考㑹試己未預修㑹典癸亥轉左諭徳兼修撰預脩通鑑纂要甲子侍皇太子于東宫充講讀官敷奏明暢孝宗聞之甚喜徹御前中秋宴以賜之乙丑武宗登極擢左庶子兼侍讀賜金鑲束帶預修實録值内艱歸逆瑾柄國奪所陞秩瑾敗起服仍官侍讀庚午進侍講學士典順天鄉試九月署國子監事辛未充廷試讀卷官擢學士充日講官壬申掌院事教庶吉士讀書甲戌主考禮部㑹試尋陞吏部右侍郎丁丑進階通議大夫禮部尚書值武宗南廵澄上疏諫阻兵部尚書彭澤坐哈宻事将置重典澄預廷議首救免之己夘賜蟒衣玉帶逆濠就擒江彬擁邉兵邀駕駐通州命文武百官大臣出迎人人自危澄倡正議謂當訊馘告廟悉從之辛巳四月同駙馬都尉崔元奉迎世宗於郢邸賜白金千鎰綵段十襲預修武廟實録充副縂裁加太子太傅冊立中宫皇后充副使持節行禮未幾以議禮勿恊乞休卒于興濟舟中贈少保諡文簡澄逮事三朝忠勤敬慎終始如一論事侃侃不能為媕妸有古大臣之風云尚書羅欽順羅欽順字允昇江西泰和人𢎞治癸丑進士授翰林編修十三年陞南京國子司業正徳二年忤逆瑾黜為民五年起原職七年陞南京太常寺少卿九年陞南京太常寺卿掌南翰林院事十年陞南京吏部右侍郎十四年改吏部十六年轉左嘉靖元年陞南京吏部尚書二年改禮部尚書未任丁憂六年起吏部尚書以疾固辭詔准致仕賜月米嵗夫卒祭塟如例贈太子太保諡丈荘欽順學術純正操履端方是時有倡為師心頓悟之學者欽順為之反覆辯正其説甚具究所造詣可為信道不惑者矣尚書席書席書四川遂寧人繇進士授山東剡城知縣屢遷右副都御史廵撫湖廣歴南京兵部右侍郎召入為禮部尚書加太子太保監修獻皇帝實録加少保以目疾四上疏乞歸及薦尚書羅欽順自代勅加武英殿大學士致仕特賜第在京調治給俸如故命甫下卒上深悼惜賜祭九壇遣官營塟贈太傅諡文襄廕一子尚寳司司丞其初䘮一祭上親製文有曰學得真傳徳惟一致忠誠端慎蕳在朕心欲其圗政化之淳而遽奪忠良之速後雖同事之臣日或接見獨于謀議之善不可復聞書居官先後所至有能聲在雲南勦除霑益土舎安白之亂在福建聞宸濠之變募兵赴援為南京兵部侍郎奉勅賑濟淮揚饑民多所全活初大禮之議人持異見書擬疏上陳主事桂萼得其稿上之上召書入議陞為禮部尚書後大禮告成疏陳新政十二事上深納之書直諒勤敏遇事敢為故受知于上言無不從恩遇之隆始終不替云尚書吳一鵬呉一鵬直𨽻長州人𢎞治癸丑進士改翰林院庶吉士授編修陞侍講逆瑾矯㫖以擴充政事為名調南京刑部員外郎陞南京禮部郎中瑾誅復原職尋陞侍講學士累陞禮部右侍郎兼翰林院學士掌詹事府事充武宗實録副總裁書成進禮部尚書管部事居数月加太子少保改南京吏部尚書踰年以疾致仕賜嵗夫月米尋卒于家年八十餘賜祭塟如例贈太子太保諡文端尚書桂萼桂萼江西安仁縣人正徳六年進士授丹徒知縣被論調青田不赴後以言者薦補武康嘉靖癸未稍遷南京刑部主事時議大禮張璁方獻夫霍韜席書等咸執為人後之説為非是上心欲從之格于廷議萼因抗疏極論累累千餘言上遂召五臣還京竟定大禮繇是寵異之陞翰林學士詹事吏禮二部侍郎俄遷尚書加太子太傅少保己丑遂改兼武英殿大學士入内閣萼精悍狷隘以學術經濟自任既受上特達之遇遂直躬而行無所頋忌然其志遠才疎諸所規畫多迂滯不適于用方議禮時五臣同心排異議相得驩甚而萼與璁尤宻比末年二人者遂亦相失尋卒上念議禮功贈太傅諡文襄賜祭九壇命工部遣官營塟復録其子輿為尚寳司丞輻為中書舎人尚書方獻夫方獻夫廣東南海縣人𢎞治乙丑進士授禮部主事尋調吏部著大禮論二篇奏之其意與張桂論合上悦拜翰林侍講學士陞少詹事預經筵日講陞吏禮二部侍郎兼學士陞禮部尚書加太子太保吏部尚書以疾賜告居二年詔以原秩兼武英殿大學士入内閣辦事加少保又二年癸巳以疾乞歸許之未幾卒賜祭塟如例贈太保諡文襄獻夫始起郎署雖以議禮稱㫖不次擢用而性恬静立朝議論恒在平恕人以此多之禮部志稿卷五十三
