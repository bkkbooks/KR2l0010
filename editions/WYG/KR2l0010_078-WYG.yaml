body:
  text: 禮部志稿卷七十八明俞汝楫編宗藩備考藩䘏為晉王妃䘮服洪武九年晉王妃謝氏薨命禮部翰林院議䘮服之制翰林侍講學士宋濓等議曰按唐制皇帝為皇妃等舉哀臨䘮素服舉哀畢則常服宋制皇帝為皇親舉哀素紗幞頭白羅衫黒銀帶今恭酌唐宋之制皇帝及中宫服大功諸妃皆服小功南昌王妃服大功東宫親王宫主皆服小功晉王服齊衰期靖江王服小功王妃服緦麻輟朝三日既成服皇帝素服入䘮次十五舉哀百官奉慰皇帝出次釋服服常服制曰可命著為令除行人諭祭例景㤗二年行人司行人陳浩奏舊規親王妃并郡王妃薨逝禮部奏中官致祭行人主行䘮葬禮儀各王府儀賓殁亦遣行人諭祭今公務叢冗差遣不敷矧邊務警急驛𫝊供億艱難乞勅今後親王郡王妃薨逝及儀賓卒者止遣中官并所在官司遣官致祭俱不必遣行人王府墳塋合葬天順元年掌欽天監事禮部右侍郎湯序奏言自親王以下及文武大臣之家例當有司營葬者往往夫婦異葬各造墳瑩享堂不惟勞民傷財抑且有乖禮度今後宜令夫婦同墳瑩享堂庻便于民且合乎禮事下禮部議從之妃墳立石成化五年秦王公錫以妃王氏薨奏欲于墳前立石鎸録諭祭文并妃封冊以昭恩命禮部覆議宜令王自備工料鐫刻且戒不得生事擾人從之宗室卹典齎送成化五年禮部奏天下宗室本支蕃衍毎有䘮禮所用謚寳冊銘石器俱下工部委所司製造累月不成比成遣官賫送或已不及葬期虛縻工料有孤恩典今右僉都御史李流言各王府䘮具絡繹遣官道路供億甚為煩費欲并與掌行䘮禮等官順賫事體為便宜從定擬凡親王郡王謚寳冊仍下工部所司促辦付掌行䘮禮等官賫去其明器宜令工部具列器式下所在有司就彼製造給用庻事易就緒人不煩擾詔可王府不得用殉成化十年遼王豪墭奏嫡長子恩滿病故其繼配馮氏妾曹氏俱無所出宜令殉葬上曰先帝上賓顧命毋令後宫殉葬可以為萬世法况王府前此未嘗有用殉者今遼王葬子乃欲以其婦殉之何其戾耶禮部即移文所司啟王勿用殉葬遷其婦于别室使無失所未冊封世子祭葬成化十年遼王豪墭奏嫡長子恩滿先封世孫已授一品冠服臣襲王爵之後奏允進封世子命未及下而故乞如世子例葬祭事下禮部覆奏上曰既未受冊封其祭葬禮儀從一品例仍令工部遣官塋葬䘮葬三事議成化十二年四川按察司彭韶言三事一親王郡王薨逝皆遣官致祭縁各府事殷使臣絡繹人夫勞擾自後惟親王如舊其郡王初䘮遣官一祭餘祭並遣本處官為便一凡王國母妃之䘮俱遣内官致祭今宗婦衆多各布政司有鎮守太監處宜遣就彼行禮一凡王國瑩葬例該夫婦同穴遇有䘮葬不分先後一體兼造其初造之時工費浩大或兆位未安所以遣官監修選擇今後遇有開壙葬者乞免差官惟令本處官司提調及隂陽學擇日事下禮部議擬覆奏上曰王妃祭禮如舊遣官餘悉如議行之禁王府䘮葬多索成化十四年廵撫湖廣左副都御史劉敷奏王府䘮禮禮部所定祭品已有常數而王府聴羣小言輙于常數外巧取費用不貲且不示葬期以致所遣人員久侯費民供給而因之違限得罪乞勅該部移文所司自後祭品毋多科增設而有司亦不許阿順奉承從之唐府非例請祭𢎞治元年先是唐世子彌鍗言近以皇上登極覃恩臣曾祖定王祖憲王俱蒙遣官賜祭惟曾伯祖靖王不與敢以為請命禮部看詳以聞尚書周洪謨等䖏議謂靖王永樂二十一年襲封至宣徳元年九月薨逝其妃髙氏未及合婚後三年卒雖得追封合葬然自正統至成化初五十餘年俱未嘗遣祭况唐憲王在位日久亦未嘗有所請奏近日之祭本部盖援據舊例今不敢輙復更易從之庻人復爵不與祭𢎞治二年先是上登極後遣官分祭各府先王晉王知鮮因援例為其父定王乞祭禮部覆奏謂定王初縁事降庻人薨後復爵故先朝恩典皆闕且晉王襲封已久前此未嘗有請况舊例具在似難輙更從之王謚覈實𢎞治十五年唐王彌鍗奏朝廷于親籓生封以爵殁加以謚親親之恩既深且厚但其間有為惡未敗者擬列上陳多獲美謚是使善者怠惡者肆也今後王府請謚宜劾寔跡庻彰旌善殫惡之心禮部議謂王所言宜從今後親王請行撫按二司等官覈勘郡王則行本府親王及承奉長史等官覈勘善惡賢否據實奏陳然後賜謚使名與寔副唐王生長富貴所見及此誠可嘉尚請降􅃯諭奬仍行天下各王府俾咸知勉勵從之追封世子為王正徳元年追封淮安懿世子見濓為淮安王先是世子薨無嗣其姪祐棨繼封淮王請以世子入家廟奉祀禮部議世子無王爵宜建别室祀享上言復議因言孝宗時嘗追封周王之父周世子為王今安懿應封而絶姪襲其爵宜以周王故事追封入廟故有是命議請謚徑省嘉靖十一年九月内禮部題臣等看得各王府親郡王薨故必有謚號以表其行舊制俱于乞恩祭葬之時即賜以謚𢎞治年間唐王奏准凡親王薨逝行撫按分廵等官郡王病故行本府親王及承奉長史等官各覈勘善惡事蹟至日度其賢否方賜以謚至今通行遵守但各王乞恩祭葬到部方與行文各該衙門覈奏事蹟囘報至日題請謚號填寫銘旌前去始得安葬且如四川蜀府廣西靖江王府俱路途窵逺文移往返動經逾年差去掌行䘮葬禮儀行人在彼守候葬畢方得囘還以致往往乞恩寛限且有司供應之繁本差躭延之久未免耗費財力多生嗟怨矧各王府親郡王朱棺暴露動經嵗年亦足以上干和氣深為不便題奉欽依今後但遇各王府親郡王薨故本府一面乞討祭葬一面行移各該衙門覈勘平生行實不必候本部行文徑自具結呈部以憑具題請謚藩學王府教官制洪武三年詔定諸王府教官職名禮部奏宋太宗朝凡教皇姪皇孫並以教授為名今擬諸王府各置一教授一員秩正八品以十二月為滿從之洪武十七年六月置親王􅀶士禮部取唐宋王太子與師傅相見禮以進博士西序東向四拜王東序西向再拜其常見博士肅揖王答揖若講授時王中坐博士侍坐于右從之教養儀賓𢎞治十五年徽王見沛奏各王府儀賓選既不精教又無法至有邪滛放僻靡所不為者今後乞將年三十以下者送本䖏儒學讀書習禮以成厥徳禮部覆奏宜從王所請凡儀賓二十五以下者不分新舊悉送本府州儒學讀書本學教官同長史司逐月考騐提調學校官按季考較勤惰量加賞罰候年三十以上考其學業有進行止無虧方令停免從之宗學延師儒隆慶四年賜廣濟王定㸁書院名遵訓從王請也山西撫按官靳學顔等請如禮部議命晉府藩府及慶成永和安寧隰川陽曲西河交城靈丘山隂襄垣懷仁等王府各建立宗學延請師儒教督宗室子弟從之藩便宜覆宣大宗室二議嘉靖三十八年癸亥禮部覆總督宣大都御史張松疏議宗室二事其一時婚姻以免怨曠言大同去山西㑹城五百餘里兼之烽警王府選婚舊例必經由布政司保勘然後保勘為之題請往返遷延官吏抑勒貧宗有白首而不得嫁娶者今當為之配䖏除親郡王名封外自鎮國將軍以下子女婚封勘結起文止令廵撫衙門掛號儀賓保勘亦止由司府文結徑啟代王轉奏不必復由各郡王府及布政司若子女有過十五未得婚封者許撫按官時加研訪行長史司啟王速為具奏其一議遷移以便居䖏言本鎮宻邇塞垣城郭狹隘各宗在野䖏不就有司約東易與為非宜如先年襄垣等分封故事移數府于代遼尉渾等州以絶禍本但事體重大必當行代王詳議上請使官民兩利恩義並立然後可以服宗室之心疏入報可飭題覆壅滯嘉靖四十四年禮科給事中辛自修言各王府名封婚禮等項禮部久不題覆以致貧苦怨曠徳意壅閼乞限一月以内悉為查題其行查未到者下廵按御史刻期勘報所不應得者亦明開其故類行掲示毋得再行奏擾各廵按御史凡遇名封婚禮郡王以上特疏具題將軍中尉以下按季類題部臣于題疏至日即照單題類奏事例具覆言若廵按御史題本踰期不至及查勘與王府不同者許禮部類恭若本部留難不覆及封典踰期者亦許臣等奏報可請覃恩䘏宗藩隆慶元年禮部覆給事中曹當勉奏宗子藩姪莫非王室懿親皇上即位覃恩當施由近始凡慰問勸奬及賑恤貧乏諸事請下有司覈寔本部議行至于名封婚禮各府所奏動以千數而本部必待覈寔乃為題覆是以日壅月積廢閣甚多臣等議得為選擇婚配在于民間誠宜慎重其名封本府既以保勘及宗人府本部冊籍詳看無異宜即題請其内外衙門需求許本宗奏陳及令五城緝事衙門訪治從之便宗藩八事隆慶四年廵撫廣西兵部右侍郎殷正茂以靖江王府多事上議宗藩急務請寛名封之請酌逓減之制復朝恭之儀篤親睦之情明房長之義飭宗學之規伸拘禁之法開舉首之條凡八事禮部覆奏多采用之請令宗室教養入制科𢎞治十六年禮部覆南京光禄寺卿楊峻所陳恤宗室以廣聖恩事謂峻欲如宋朝宗室仕宦科目故事凡將軍中尉之子許充生員報名于各伴讀教授䖏授以五經教以文字長史司提督考較量給廪膳校餘供養成材于本䖏科貢一體鄉試㑹試中進士者除授宗支無礙府分長史等官副榜者除授審理等官食粮應貢中者除工作雜職等官所言亦自有見但教授審理以下官視奉國中尉品職既卑俸禄亦薄且非聖祖立法初意請如舊從之藩雜例管理府事𢎞治十八年十二月晉王奏寧化王鍾鈵縁事革爵將伊嫡長男竒奏准掌管府事今竒病故伊男年方三嵗乞將竒同母弟竒津給賜冠帶暫管府事侯竒男長成之日照舊歸還該本部題奉孝宗皇帝聖㫖是竒津准給與冠帶暫管府事欽此正徳四年奏准郡王患病及薨逝其子㓜子有以親支暫管府事者本部請勅着令用心撫養毋致失所候其長成仍囘本府不許干預一應事務嘉靖七年十二月魯王奏稱襲爵年㓜一應禮儀不能自行乞留叔東甌王賛輔該本部議得魯王襲爵年㓜東甌王宜暫時往来賛輔凡有奏請事件只許恭詳可否不必署名一應禮儀悉令指引代行其錢粮等項不得干預待王稍知事體即便逥避不得久謀占戀等因奉聖㫖是魯王年㓜所奏情詞懇切准暫令東甌王不妨府事往来賛輔國政一應錢糧不許干預待王稍長即便具奏廻避寫勅與東甌王欽此嘉靖二十二年本部題准郡王惟管理府事者請勅其餘不許凟奏奉聖㫖是欽此嘉靖二十二年二月樂安王王妃陳氏奏長子拱攞服制未滿乞先請勅管理府事本部覆題奉聖㫖郡王同城居住應否請勅管理還查例明白来説欽此查得事例親郡王病故其子應襲本爵者請勅管理服滿請封但未開有同城另城之分今樂安王府與弋陽王府同居一城應否賜給伏乞聖裁奉聖㫖前例謂郡王管理府事者請勅其各郡王數多不許凟請著為令欽此嘉靖二十四年十一月該刑部咨楚王顯榕暴薨英燿弑逆合命禮部查舉宗室一位暫攝國事行該宗人府查報武岡王顯槐係楚端王庻第三子及楚王顯榕見有庻第三子英㷿見年五嵗該本部議照英㷿年方五嵗未可承襲所據府事例該親支管理撫養雖先經題稱不拘倫序行令通城王暫攝乃一時應變之權今據武岡王稱係端王次三子又該宗人府囘報無異是在該府既親且尊而居内御衆為勢甚便合行請勅一道給付武岡王授以攝國之權責以保孤之義管理府事鈐束宗室仍行心撫養㓜子待其年長成立仍自囘府不許干預一應事務所據通城王亦合囘府聴其約束奉聖㫖是顯槐着暫管府事寫􅃯與他欽此嘉靖三十年該都察院右副都御史王忬題稱博野王府管理府事奉國將軍廷墧掯勒婚期已經恭題罰住禄米其宗儀婚䘮應否查照昌化襄垣二府事例徑啟代王咨部查議該本部議照昌化王絶嗣宗支未經請􅃯襄垣王分封蒲州宗支留住大同所以各徑啟代王今博野王絶嗣廷墧以倫序已經請勅管理府事比與二府事例不同但今廷墧不能敦睦宗親索財阻滯既經都察院恭題罰治外所據各宗儀一應婚䘮事宜合行該府啟王暫令博野王府各宗儀徑自具啟轉奏及戒飭廷墧以後果能悔咎自新和睦宗儀啟王與其轉奏本部題請照舊管理轉啟等因奉聖㫖是欽此嘉靖三十一年六月山西撫按官許倫等題稱隰川王俊栢始因殘害宗支繼復抗違㫖限恭奉欽依革去府事另舉賢能今推舉得輔國將軍俊樚賢能素著倫序相當應該代理府事合行請勅給付俊樚管理該本部覆題奉聖㫖是欽此嘉靖三十一年十二月河南撫按官謝存儒等㑹題議得鄭王厚烷送發髙墻缺人管理府事所據世子載堉倫序相應賢能可取及簡王十支之孫廬江王祐㭿倫序稍疎賢能亦可欲乞奏請一人管理該本部尚書歐陽徳議得朝廷睦親之恩以明倫為重而世及之義以與子為先故親王有罪自非謀反大逆必不遂因其父而并廢其子世子既封自非不才無道必不遽棄其人而復議其他今據撫按官所議鄭世子載堉于其父本無干連而世務又頗諳習在聖心或未忍遽廢廬江王祐㭿賢能雖亦可取而倫序則亦稍疎于輿情或未必盡歸先該本部備查氓庻人罪廢則府事以世子譽榮管理慶庻人罪廢則府事以鞏昌王寘銂代理然管理者終自有其國而代理者國終歸于人事體既異則已之所以自持與人之所以代之亦自不同故慶府後以互相攻訐竟歸其世子鼒櫍管理而後已人情事勢亦自可見今撫按官保奏雖以載堉祐㭿並舉而恭詳語意皆歸重于載堉似亦有監于此所據鄭王府事伏乞欽定一人代理恭候命下請勅一道令其修舉事務鈐束宗儀奉聖㫖載堉雖與厚烷無干乃係父子不許管理府事着祐㭿管寫勅與他敢有爭辨奏凟者罪之欽此嘉靖三十一年管理府事弋陽王拱樻薨逝該將軍多焋訐奏長子多焜過惡乞要擇賢管理宸等奏保多焜賢能乞要仍與接管本部備行江西撫按官勘囘該本部議得弋陽建安樂安石城爵位則皆比肩倫序則非嫡長况宸濠以謀反伏誅其國已除其實已毁其爵永不應襲其府已不復存則管理府事名目相應革去合無比照交城等事例將建安樂安弋陽三府有郡王者聴其管束宗儀奏請事件其冠帶石城王未經復爵遽難比照郡王行事并瑞昌等府合照支屬逺近分附三府其建安分管鍾陵一府樂安分管石城瑞昌二府弋陽分管宜春臨川二府一應名封附府轉奏拜表慶賀随府行禮其三府迎接詔勅則輪逓從尊大宗廟祀則每一易世奏請欽定一王奉祀各該宗儀悉照分管郡王鈐束其先鑄管理府事弋陽王印行令繳進各府仍照原降印信行事等因奉聖㫖是這事情你們既議擬停當着各府分管不許再来奏擾欽此嘉靖三十六年正月内該廵撫河南都察院右副都御史潘聲㑹同廵按御史孫昭題稱推舉徽府郡王管理府事首稱始封莊王之後第五子封建徳王其孫厚􅟼誠篤安静最賢其次則簡王之後次子封新昌王厚燇亦賢及恭王第三子封太康王載垙係庻人載埨親弟賢否未著俱應推舉合無于内慎選一位請勅管理府事等因奉聖㫖該部知道欽此欽遵該本部尚書吳議照先年寧府削封府事則以弋陽王栱樻管理鄭府罪廢府事則以廬江王祐㭿管理是皆擇其賢能尤著倫序相應者以為總攝盖管理重慎貴在得人故必先論其素行而後及其倫序今太康王載垙庻人載埨之親弟倫序雖應而賢否則稱未著新昌王厚燇係簡王之子雖稱頗賢而輿論猶未盡歸所據建徳王厚􅟼委係始封親王之孫而稽其素行則撫按交稱其安静誠篤賢能既足以服人而其序又不至于相紊况查與寧府事例相同恭候命下行令翰林院請勅前去令其管理府事鈐束宗儀凡該府自始封以下各郡王府請名請封選婚奏報等項俱與依時類奏以仰副朝廷敦睦盛典凡遇聖旦正旦冬至等節統率各府郡王并宗儀人等在于本府行禮及迎接詔勅赦書俱有司衙門謄黄差官齎送本府率同各郡王將軍官員人等查照儀注開請奉聖㫖是着厚􅟼管理府事欽此鈐束宗支𢎞治十七年議准各王府儀賓戚屬如自恃尊屬以王㓜冲不服鈐束肆惰縱欲任意非為敗倫傷化聴王指實具奏廵撫等官照例㑹本奏聞區䖏其教授等官不行勸止及軍民旂校無籍之徒并樂工人等哄誘撥置生事者事發重治𢎞治十七年五月鎮守河南太監劉瑯題稱先因周惠王久疾不能䖏國治事以致家法廢弛即今周王年㓜各府郡王又皆尊軰乞要請勅周王徑自鈐束該本部覆題奉孝宗皇帝聖㫖是寫勅與周王着好生省諭鈐束欽此正徳三年八月靖江王奏稱本宗支繁衍荷蒙先帝各立房長懲勸守法奈何近年臣疾子㓜累被宗親規䑴等兇惡欺侮乞要比照秦府等府事例請勅一道與臣并長子嚴加鈐束該本部查得先該靖江王奏為宗支無籍恣肆為非欺滅宗藩擁衆出城等事已經行勘未報今奏前因合行催促勘報審其應否請勅另行具請覆題奉武宗皇帝聖㫖是靖江王所奏規䑴等違法事情著鎮廵等官上𦂳從公㑹勘明白奏来䖏治還寫勅與王令長子嚴鈐束欽此正徳四年該本部議得王國之政論禮則當統于所守據爵則當統于所尊豈可越禮犯分縱欲非為今後親郡王患病或年雖尚㓜其合府郡王將軍以下悉該聴其鈐束有事必啟而行違者許該府指實恭奏奉武宗皇帝聖㫖是欽此嘉靖二十四年四月該本部議得今後各府儀賓務要照將軍等例五日一赴府畫押如或不到許即時差人查究下落其有無故而推托者即拘伊親鄰里體訪勘明聴親王量加罰治若累次抗違不到備由恭奏前来以憑題請䖏治若因搆訟方在縁事者本部轉行該衙門將俸糧按月扣留在官作正支銷其各府但有守孀宗女本府𣲖撥内使一名看守門户不容恣行出入如有不聴約束者即拘伊親并看守人役量加責治等因奉聖㫖依擬行欽此嘉靖三十年九月内韓王奏宗室衆多俱不守法乞要請勅鈐束該本部具題奉聖㫖欽此嘉靖三十一年二月靈丘王聰滆奏稱年老乞令曾長孫廷址代理府事鈐束宗室該本部看得靈丘王年七十七嵗委應代理但宗儀繁衍廷址年少行卑若非仰仗天語之重委難鈐束相應請勅題奉聖㫖是欽此嘉靖三十四年二月樂安王奏恭輔國將軍拱楀儀賓毛潮故違勅命不赴慶賀畫押不到又拱楀抗違欽依赴戒飭乞要罰治懲究該本部看得樂安王既奉有勅命各宗儀自合遵守乃敢故違拱楀先因奉疏差寫職銜已奉欽依戒飭乃敢抗違儀賓毛潮朝賀不赴畫押不到禮法俱廢相應究治乞將將軍栱楀罰去禄米三分之二儀賓毛潮轉行廵按提問發落俸糧照例截日扣留在官作正支銷題奉聖㫖栱楀罰住俸米三分之二毛潮着廵按御史提問𤼵落欽此遷改府第移居入藩府例天順四年四月欽奉勅諭山西布政司按察司代府郡王數多城中窄隘况今禄米等項百姓運送艱難欲于腹裏蒲州澤州各造府第二䖏以遷王居以便民力欽此天順五年二月内節該欽奉英宗皇帝致書代王將大同城内山隂王襄垣王遷居蒲州隰川王遷居澤州欽此成化元年二月岷世子奏稱故祖岷莊王于洪熈元年蒙仁宗皇帝命往武岡州暫住思得城池淺隘又兼各郡王府逼近一䖏乞賜長沙腹裏地方一所等因本部查得先年節該岷王奏稱武岡地方連年苖賊生發乞遷雲南舊居人稱湖廣一道豐稔人民安業要往衡州居住等因俱奉英宗皇帝聖㫖是欽此𢎞治四年十月興王奏稱臣聞衛輝府地形瘠窪逓年黄河水溢乞照崇古等王更改所封地方事例將湖廣安陸州撥賜與臣况本州舊有梁王等王府基易為改造本部查得安陸州亦係先經㑹官計議相應地方與安王府相去不逺等因覆題奉孝宗皇帝聖㫖安陸既你們㑹議相應地方准王奏起蓋王府欽此𢎞治十五年六月户科給事中王益題竊見大同一城郡王府將軍儀賓等府殆佔其半而軍民房舎遂無所容且聞其糧儲亦㡬于盡給王府俸禄而無以養贍軍士宜擇近地各州以䖏郡王而其將軍儀賓之為親屬者俱從而遷焉茍縣可以建府亦陞為州使其品秩稍髙不至于動遭陵轢等因該本部奏行廵撫大同都御史劉宇等勘得大同一府所屬四州七縣城郭窄小無可陞州縣分惟本城南闗地勢寛大等因本部議得合將各該府第暫免遷移待後年豐嵗稔邉情寧息再行議䖏題奉孝宗皇帝聖㫖是欽此嘉靖十七年六月内代府樂昌王奏乞遷移蔚州等因該本部覆議行令撫按查勘随該撫按題稱蔚代二州准令一䖏安置無礙縁由續據勘覆上請奉聖㫖代州係代王始封爵邑准遷朔州今後不許相援為例以致分擾地方欽此欽遵備行翰林院請􅃯准令遷改續該禮科都給事中丁湛題稱乞収囘成命勿准改遷本部覆題行令撫按等官將樂昌王停止改遷奉聖㫖是准令議行欽此嘉靖二十一年九月衡王奏弟髙唐王齊東王年長乞要將先涇王沂州府第分給居住本部查無事例相應查照原行蓋造等因題奉聖㫖初封郡王無出居别境事例只照先年原行蓋造欽此嘉靖三十二年十二月廵撫大同都御史侯等㑹議得大同鎮城地方逼窄宗室繁衍禄米不繼婚配難求今奉欽依查議量移一二府于本省地方誠為便益但聴其自備脚力不許擾民若非情願改遷亦難擅動今樂昌王府願改蔚州棗強王府願改朔州且量封位多寡正與地方廣狹相當今侯鉞奏請等因該本部尚書歐陽徳議得朝廷議分徙宗室于寛鄉計慮甚逺而宗室之願徙者或未免規圖便利人各有心若非區畫詳悉安敢遽議遷移今樂昌王一遷九十七位雖稱搬移營建自備諸費不勞民力但府第及各將軍等官堂宅基址蔚州城内曽否相應有空地九十區若官為取給勢必不能若自行價買中間或礙民居官舎應否聴其擇取另行撥住改建又營建之際各管事人員収買諸種物件應否差何項官員監臨鈐束禁革奸弊搬移之日脚力雖各自備自大同至蔚州三百餘里宫眷人等晝夜行止作何頓宿防䕶各宗儀九十七位即今應否一時同遷或且先遷郡王及將軍等三五位其餘待此諸位安居之後随年豐稔陸續遷移本部前奏行令撫按官恭酌人情事勢區處停當止要一一明白奉㫖之後不得别生事端致有室礙今據廵撫都御史侯鉞所奏一切事宜未詳盡等因奉聖㫖是欽此嘉靖三十三年九月内廵撫大同都御史侯鉞廵按直隸監察御史毛鵬各題議代府昌樂王遷封該本部議照代府宗支衆多大同鎮城窄隘量遷一二郡府以寛民力先該本部㑹同成國公朱希忠等議擬又該給事中徐綱廵撫都御史侯鉞廵按御史毛鵬各題行撫按逐一恭酌議䖏務要事勢人情不相妨礙勘䖏停當奏請定奪去後今該撫按題稱遷移朔州沿途防範與營建府第不勞官民該府力能自辦初則樂昌王先移閤府將軍中尉次第舉行或數位同一府視諸大同移寛一分等因俱各擬議明白具題前来相應議䖏合候命下移咨都察院轉行大同撫按衙門知㑹行移該府長史司具啟代王知㑹果係年榖豐稔宜于遷移許令樂昌王并將軍中尉各自備工價差人前去朔州地方兩平置買相應基址營建府第務要安静節約不得過為勞擾侈靡完日具奏樂昌王先移將軍中尉儀賓以次啟行各宗室不得聴信棍徒撥置強買人屋侵佔地址擾害軍民如違許該州官將置撥之人申呈撫按衙門挐究𤼵遣教授罷斥干礙宗室者奏請䖏治等因奉聖㫖准議行欽此移居入藩府正徳二年七月鄭府管理府事東垣王奏稱蒙􅃯管理府事乞要移居鄭府等因本部覆題奉武宗皇帝聖㫖東垣王既聴繼親藩准移入鄭府居住欽此進繳冊印正徳四年閏九月内該本部題先該石城王宸浮等俱縁事降革其印冊已經送繳近該應山王絶嗣其嫡孫寵波乞襲祖爵臨潼王進封秦王將伯鎮國將軍誠潤補襲郡王題奉欽依俱以本職奉祀欽遵去後合無本部行移天下有王府去䖏鎮廵等官通查如有絶嗣進封等項無人該繼本爵如應山臨潼王者即將原給印信進繳縁事降革如石城王宸浮等者通將印冊冠服等件進繳奉武宗皇帝聖㫖是欽此正徳四年題准以後凡郡王故絶遺有冊印該親王差官奏繳到部本部具手本轉送印綬監交收郡王迎養成化二年十月涇陽王奏父王薨逝臣親母張氏見年六十三嵗久患風病乞要請母過府供侍湯藥等因本部查得先該趙府臨漳王奏生母王氏年邁風疾乞令出府侍養奉武宗皇帝聖㫖准令出府就養欽此事例相同等因覆題奉聖㫖准照例欽此𢎞治五年三月寧府管攝府事上髙王奏據弟建安王啟父靖王薨逝安葬已畢欲照宜春等王事例迎母吳氏随住孝養本部查得正統十四年五月内該寧靖王為世孫時奏稱祖考宫人有子在外居住者合從迎養題奉英宗皇帝聖㫖准他奏欽此欽遵等因覆題奉孝宗皇帝聖㫖既有例准他奏欽此𢎞治七年七月内岐王奏請生母邵氏之國侍養等因奉孝宗皇帝聖㫖王欲請母妃之國就養孝心固可嘉但祖宗舊制不敢有違欽此𢎞治十二年十一月鄭王奏叔丹陽王乞要請毋于氏過府奉養等因覆題奉孝宗皇帝聖㫖准王請母就養欽此正徳四年該本部議得親王之國無迎養生母之禮故岐王之請情雖懇切而祖宗之制不可違其餘各王府宗支病故侍妾除無子者例該移居别室有子在外居住者各從其子迎養中間若有生子數多者亦止許一子迎養節奉武宗皇帝聖㫖是都准議行欽此儀賓迎養天順八年十月唐府儀賓張鳯奏稱原籍陜西西安府同州澄城縣人先于正統年間選為上蔡郡主儀嬪不幸郡主早逝乞將父張進搬取前来随住等因本部查得天順二年五月内該府新城郡主儀賓李巘奏因郡主病故乞囘侍養等因題奉英宗皇帝聖㫖李巘既做儀賓難准囘家許令伊母就養欽此合無照例准令張鳯搬取父来侍養覆題奉憲宗皇帝聖㫖是欽此初定殁者建坊例嘉靖四十三年詔有司為襄垣王府陵川縣君建坊賜名貞節初儀賓裴禹卿地震壓死縣君自經事聞下禮部議旌表例不許請坊而許請勅盖為生者設也若死者雖有􅃯孰受之且庻民家節烈俱得表揚况出天潢不加旌異何以風示羣宗自今宜存者給􅃯殁者建坊從之諭止立碑正統二年靖江王佐敬奏欲為悼僖王立碑以彰懿行命禮部稽查洪武永樂間例皆無親王及郡王立碑以書諭止之永豐府買女子天順元年庚午禮部奏永豐王祁鉞言缺女子使用欲于本䖏饒州守禦千户所軍旗之家收買數家然本所不係王府相干衙門難以准買宜令自備財禮于淮府儀衛司并羣牧千户所軍校之家情願者買用從之宗室預造生墳天順三年四月襄陵王冲秌奏臣母故䝉賜營葬今將工完訖臣年已衰老乞勅有司即以原修造工料為臣及妃預為生墳則事易成功臣没世之時免重勞民力上曰郡王預造生墳舊制所無不允旌表宗室成化十年二月安昌王膺鋪父岷王得風疾侍湯藥晨夕不懈岷王嘉之奏乞旌表禮部以無例聞上特賜書奬諭曰國家以孝為治凡臣庻孝行卓異者必旌表之以風教天下以圖成大順况于宗室有能敦行可無奬諭用勸將来耶六月韓王偕灊奏曽叔祖襄陵王範址性至孝嘗刲股剪鬚以療母疾今年已七十有五毎祭掃猶躬自負土培毋墳哀慟誠切古所謂終身慕父母者盖王有之乞加奬諭以為宗室子孫之勸上特移書奬諭之屯軍子粒永樂八年十一月内伊王奏前事本部欽奉太宗皇帝聖㫖古者寓兵于農則兵食有餘最是良法如今各䕶衛旗軍屯種子粒以備嵗用因伊王之國未久以此還免他䕶軍士屯種子粒一年豈是常例今伊王不想軍人屯種是他本等好勾當又不得罪怎麽来謝恩不知那長史在那裏管甚麽事錦衣衛差人去把那長史都拿將来欽此賜書奬孝成化十年安昌王膺鋪父岷王音垽得風疾膺鋪侍養湯藥晨夕不離岷王嘉之乞如例旌表事下部覆奏親藩旌表舊未有例上特賜書奬諭之世子郡王出逰成化十二年正月壬子襄王瞻墡奏英廟時曽蒙賜勅許與世子諸郡王秋冬出郭逰覽嵗或四五度後世子郡王偶以䘮事出郭遂為廵撫都御史王恕所奏復奉㫖令世子郡王必奏而後出但出逰事小數奏非便請仍如舊􅃯事下禮部議以王至親尊為屬則可餘請從後㫖詔世子郡王嵗以春秋出逰各一度即日囘出城詣墳行禮成化十二年乙夘代王成鍊奏臣曽祖簡王墳正統年毁于兵近修造將完欲于七月望日率諸王將軍等詣墳行落成禮事下禮部言無舊例上重王尊祖之意許同郡王出城其餘不許不允出城祭墓成化十四年禮部言往嵗代王成鍊奏欲率郡王將軍出城祭墓有㫖許親王郡王一行而王與妃等偕行已賜􅃯切責今秦王又奏欲于清明中元毎嵗二祭辰出未入以盡尊祖敬宗之義未敢定擬得㫖親王出城祭墓祖訓初無是典王何以再三凟奏不允責問不為轉奏成化十九年十一月遼府寜福鄉君詣京奏兄豪㙷既封為長陽王已該進封為縣主遼王因懐宿憾不為轉奏有㫖寧福鄉君擅離本府遼王不為阻其下􅃯切責之鄉君遣人送囘其所奏事所司看詳以聞禮部覆奏鄉君例當追封遼王挾私不為轉奏而長史等官亦不為啟勸鄉君出城府衛官及守門官軍皆不諫止又不具聞俱宜令所司執問從之飭妄奏請封成化二十年八月己卯朔革山隂王仕堸禄米及輔國將軍成鑿等封職降􅃯切責之先是代王成鍊與仕堸成鑿以庻人仕㙺仕埭子女妄奏請封已封成鍊成鎕為鎮國將軍成鍜成鈁為輔國將軍第八女為延安縣主第二妹為遂溪郡君至是禮部以初失于覺察檢舉待罪上命革山隂王禄米一半停止代王禄米一年成鑿等及儀賓俱革去封職禮部堂上官停俸一月該司官吏下錦衣衛鞫之襄垣府將軍有事自奏成化二十二年命襄垣王府鎮國將軍有事得自具奏先自襄垣恭簡王自代府分封山西蒲州有事自奏不經代府比因襄垣王仕㙺等為事發鳯陽守祖墳鎮國將軍仕壞等居蒲遇有事啟王代轉奏往復留難仕壞以聞事下禮部覆奏故有是命世子悔過復爵成化二十二年江川王音墊奏岷府自順王薨逝世子膺鉟縁事藩邦無復綱紀蒙命安昌王膺鋪暫主祭祀未㡬病故臣見膺鉟自革冠帶至今四年悔悟自新畧無過犯乞賜恩宥復其冠帶統率臣僚俾得奉守藩國下禮部覆奏江川王及岷府長史教授等官自成化二十一年至二十二年已十疏乞復岷王世子今江川王所奏情詞迫切請聖裁上以膺鉟既悔自新命復世子管理國事體降􅃯諭之秦王奏行二事𢎞治四年秦王誠泳陳言二事一保愛宗支謂各王府婚娶䘮葬宜遵令祖訓禁止奢侈如用度不敷止于本府宗室借貸不許責悉以傷恩義一教養儀賓謂各王府儀賓既選中宜送本䖏儒學讀書習禮成婚後不許因循廢業禮部覆奏從之庻生驗同玉牒正徳三年周王為其悼王庻生子請名封且言出官人李氏乞如汝陽王孫安汎等例禮部議李為樂女于例有妨詔以宗支事重周王不宜冐請令革所生子為庻人并革安汎等封仍􅃯禮部通查各王府樂女所生子女及禁與僧道剌麻往来于是禮部因言各府王玉牒不載所生毋自考究無由乞自今許鎮廵與輔導官查係樂女及非良家女所生不分己未請名授封選婚俱造冊送部係庻生者俱候鎮廵移文再行宗人府驗同玉牒方為覆請名封著為令從之魯府奏除積弊三事正徳三年魯國鎮國將軍當湞秦除王府積弊三事一親王世子郡王長子授封以後薨故及為事降革其嫡次長庻子比例請繼封爵其無嫡次庻子者或以弟繼兄以姪繼伯叔既有成命停原給禄米候冊封之日方與所應得之禄正妃夫人生有子女病故無人撫養例得自娶一人以為内助不受繼妃之封其有僣用正妃冠服及所生子女稱謂繼出請封者聴鎮廵等官叅奏嚴禁則糧儲省而名分定矣一同姓及姑舅之親為婚律有明禁今後王府結婚若倫理失序有乖律例或以本府軍校妄作别府州縣衛籍貫外䖏流移軍人匠等妄作該里寄收帶管或父祖重刑之人妄作家道清白即便革退另選仍將該經管吏并保勘人等依律問治營求撥置之人發遣戍邉則人心警懼而宗室不致有玷矣一郡王奏討厨役嵗夫虛月宜行所在官司查勘如有䕶衛儀衛司者通行僉役軍厨將民厨退囘原籍當差無軍可撥者以民籍補之如有軍可撥而占留民厨及科擾累民者宜禁治之仍先罪其輔導官則事不煩而民力亦少蘓矣禮部議覆俱從之仍令鎮廵等官查勘各王府有無前項情弊奏聞區䖏樂舞生禮生巾服正徳三年禮部議覆濟寧州致仕訓導張紹奏各王府樂舞生禮生濫將民丁僉補且僣用儒巾宜通行天下王府務遵原額樂舞生先于有牒無犯道士禮生于附近相應人户選補不足則各以黜退生員補之不許踰額祭祀時許用禮服餘日仍初服不許輙用儒巾如富民額外營充依律問擬長史等官縱容不舉聴各廵按御史叅究從之裁官藩官嘉靖四十四年禮部言隰州安定南渭陽曲四王皆薨無後其以將軍攝祀者㩀例不得置復典膳教授等官第與親王别城而居諸奏請保勘事必輔用導官主之宜留教授及印勿革其與親王同城而無後者止令長史典薄兼攝勿得援此為例報可宗室旌孝特典嘉靖六年十二月靈丘王聰滆疏上鎮國將軍成䥩孝行禮部以聞上諭輔臣曰今日朕聞各衙門奏牘見禮部一䟽為乞恩旌表孝行事朕閲之再三甚為嘆賛成䥩天性如此不但下民難之而朕亦不能生盡其養亡又盡其哀深可旌表但該部意謂宗支與庻民不同今後不請立牌坊只照例賜勅奬諭朕復思之宗支既與庻民不同若止賜􅃯為奬似反不及士民也在牌坊委不可立朕欲定為制今後有孝行實跡等項應旌表者許親王奏来若係親王則令撫按官奏来仍令勘明寫勅遣官賫持往諭并賜以銀叚羊酒庻得揚其善行以風動諸親卿等議看可否如可朕欲親撰勅文仍賴卿調潤行如今年終日多事務便囘具帖子来于是大學士楊一清等請節降㫖𫝊行報可改定恩詔宗室二條嘉靖七年七月以章聖皇太后加上尊號頒詔天下輔臣擬上推恩條例上覽之曰聖母尊上號稱已有累朝舊制頒降推恩之條但我宗親不得異於臣民亦非睦族親親之意今欲除詔内載有闗於宗室者其親王各寫書并加以金帛示朕敦睦之意王府結親者其子弟仕宦不許選京職此豈親親睦族之意且今詩禮故家衣冠世族俱不敢與王府結親恐為子孫之累故各䖏王府夫人儀賓市井白丁田野愚夫一例濫選家教不端守身不律非惟不能導引宗室為善反縱其為非干犯憲典比例祖訓大明集禮大明律令俱無開載不知是何年臣下建白准行然成化年間已前多不拘至𢎞治十三年各衙門纂修問刑條例載入其間遂為定例不敢復犯甚非帝王正大公平之體其議更之輔臣楊一清等因復擬加恩宗室二條請増入末一條之前上親為改定一宗室節年因事减革住支禄米者除敗倫傷化打死人命重情其餘詔書到日全革者准支一半减去一分二分者俱仍舊全支以資養贍一近年事例官員軍民之家有女為王妃夫人子為儀賓者其子弟仕官俱不選任京職似非帝王親親睦族之道吏禮二部便㑹查前例果係祖宗典章該載照舊遵行若係先年臣下因事建白准行者具奏革去以存公平正大之體擬宗室减禄降封嘉靖九年六月禮部覆豐林王台瀚所奏據宗室四事一崇輔導二興學校三定子女四均人役上以定子女一事所擬未一令再議餘三事悉依擬已禮部復條為三目以上上疑未决乃自為書賜諸王欲將朝廷皇子自第二子皆封郡王親王第二子皆封鎮國將軍餘各减一等書成未發以示大學士張璁璁言諸王封爵原有定制恐一旦减降有失親睦之道以臣愚計莫若量减禄而不降封郡王以下凡全支俸米者照依京官事例米鈔或四六或中半折支其見有米鈔兼支者亦量為逓减以示撙節上以其事重俟從容自䖏不果行變通宗室奏訴例嘉靖二十六年六月内禮部題該鄭王厚烷奏為議䖏宗室奏訴事宜以盡下情以廣聖恩事據長史司啟稱近該禮科都給事中李綸等題切惟國家之制宗室不許出城凡有應奏事情皆啟親王代奏其有不遵典制越關赴京者又經節有明例或送發髙墻或降為庻人或罰住禄米仍將所奏事情立案不行夫何數月以来赴京陳乞者踵而至即其違例赴愬事體固多難從然未經審勘可否未分一概立案恐終無以厭服其心也仍乞勅令該部叅詳所奏事情如有可行及曽具啟親王赴告廵按御史屢遭阻抑不與代奏者不惟不罪而且准其所奏并將輔導官員廵按御史一併叅究若其奏不可行及曽具啟親王赴告廵按御史已經據理㫁遣乃猶不自修省復行陳凟者不惟不准而且併議其罪靡自姑息等因具啟到府臣等看得給事中李綸之題深為有見但其中隱弊實難盡觀且以各宗室赴京路費以錢身勞以力其事有得已豈肯自取苦責皆由親王及管理府事郡王千方規利沮泥不行故有十嵗未名終身未嫁娶者告不勝其力奏不敢與之角于我聖祖及皇上惇睦九族使萬物各得其所之意大相矛盾矣使各宗室有苦無告深為可憫誠所謂不平之鳴也及其赴京復䝉譴責雖朝廷必欲例嚴而告者均不獲申也且如臣府自臣始祖靖王及臣父懿王相𫝊皆以惇睦宗親為首事臣雖至愚固不能繼述先志亦不敢棄抑舊法但各府始祖必有一定親睦之規嗣世子孫或有驕㤗所養利欲所熏其不變舊法盖鮮矣一變舊法則利害日生而于舊法不可望其復矣宗子之家益隆支子之家愈窮其欲得所難矣雖請冠婚䘮葬請封請名之事無一事非利不可行也且又宗室犯罪祖宗建制雖有大過亦不加刑但明賞罰而已皇上嗣統非不率由至于各府有付箠者有加􅆭酷者其不怨者未能無以臣愚見伏望聖上先􅃯各府開陳祖宗以来及皇上惇睦宗親之道令其各要體守毋得仍前妄為及其違犯不必叅究輔導禁約下人就將所統親王或郡王量罰禄米示以懲創等因抄呈到部查得嘉靖十一二十二五等年節該科道等官建白該本部覆議題奉欽依俱節次通行欽遵去後今該前因為照我國家懋建親郡王或有是心則親誼既洽寃抑不生尊卑大小或正其所法懸于上而人自不犯豈非聖世之瑞哉伏乞天語特加褒奬仍令本部將鄭王奏詞通行天下各王府令長史司具啟親郡王知㑹以示風勵但所據論罰係干親郡王臣等未敢擅擬合無今後各府將軍以下但有越闗来京奏事者除不係廹切事情照例立案叅究外其或事干婚封等項曽經啟王果被抑勒不勝窮蹙之甚者亦除坐本府越闗之罪及輔導等官照例查叅外仍將被抑縁由具寔上聞請自宸斷其將軍中尉管理府事者聴本部徑自叅奏使責有所歸庻足以昭陵轢之戒而潜消將来驀越之風矣奉聖㫖這宗室越關越愬者禁例已詳比以遷發太重又慮有情非得已毎從寛處却往往玩法不悛今後這等的著廵按御史勒限具奏干碍親郡王朝廷一體究治爾部裏還將各行勘未報的查催限三箇月裏囘報䖏分仍通行各王府知悉欽此革爵府事管理嘉靖三十年初命江西建安樂安弋陽三王府分管各宗室建安以鍾陵一府附之樂安以石城瑞昌二府附之弋陽以臨川宜春二府附之凡事轉奏行慶賀等禮輪次從尊仍更賜弋陽王印革去管理舊名先是宸濠國除以府事暫令郡王管理而不冠某府二字于上至是各宗遂起爭心訐奏弋陽王長子多焜不宜世襲管理禮部因援山西交城襄垣慶成等府例請從之便關領冠服嘉靖十一年九月内禮部題照各王府將軍以下應得冠服等件已該本部議䖏題准嘉靖六年正月以後授封者令各該布政司給錢造辦外嘉靖五年十二月以前授封未曽闗領者其器物非一監局所造闗領非一時可齊是以各府往返差人勞費日甚差来人役守候日久有將闗文領出金銀彩段等項恣意花費無從查考遂使朝廷有成造之費而該府無受惠之寔相應議䖏題奉欽依通行各該布政司轉行長史教授啟王將領過錢粮數目給散過名位造冊奏繳以憑查考但節年工部行造物件係是内府各監局造辦本部查催仍乞􅃯各監局查照該部原行一一造辦給領如有延緩查出一體叅究旌表不開建坊例嘉靖十一年九月内禮部題照得王府孝行等事舊止應得請勅奬勵𢎞治十八年十二月内該魯府奏鎮國將軍陽銖陽孝行可嘉欲自備工料各建坊門乞賜刻名荷蒙特恩賜允自此始開旌表之端親王將軍妃與夫人遂往往援引前例請乞不已竊惟朝廷與民庻之家凡有節孝等行賜之旌表所以表其宅里以致特異于齊民之意至于天下王府則皆朱垣㦸門有不俟于旌表而後異者朝廷降􅃯奬勵盖以親親之懿特形天語之表非宗室孰克當此故累朝以来宗藩善行止是寫勅奬勵不立坊碑所以崇重宗室辨别貴賤立法最有意義且天潢之裔孰非懿徳若使有所表異分别既殊則淑慝互見亦非敦睦之意况今藩日蕃衍樂善無窮若不㫁之于今竊恐將来無有紀極合行議䖏題奉欽依今後各王府如有節孝等事及卓異情形親郡王或撫按官查奏前事本部俱照舊例請勅奬諭仍通行天下王府今後不許奏立坊碑自首冒爵隆慶二年秦府永興王惟自言王父奉國將軍秉以榮惠王誠瀾堂侄得襲王爵僣冐至今乞改正行上曰惟能據法自首以本爵禄終身著為例今後有冐封匿爵不以聞者聴撫按叅治御史代宗室奏隆慶四年十二月禮科右給事中戢汝止言宗室之請名封選婚宜改屬廵按御史代為具奏則可免王府需索之弊而婚禮不至愆期上謂祖制不可更報罷恤録言事宗室隆慶元年正月復鄭王厚烷爵管理國事如舊仍嵗加禄米一百石釋䣕陵王府鎮國中尉勤熨及其子朝㙕歸本府有司存恤先嘉靖間厚烷以建言時政忤㫖盟津王長子祐橏因搆之王遂奪爵勤熨朝㙕亦以赴闕言事俱發髙墻禁錮至是禮部奉詔書請寛釋優䖏故有是命宗室旌孝特典嘉靖六年十二月靈丘王聰滆䟽上鎮國將軍成䥩孝行禮部以聞上諭輔臣曰今日朕閲各衙門奏牘見禮部一疏為乞恩旌表孝行事朕閲之再三甚為嘆異成䥩天性如此不但下民難之而朕亦不能生盡其養亡又盡其哀深可旌表但該禮部謂宗支與庻民不同今後不許請立牌坊只照例賜勅奬諭朕復思之宗支與庻民不同若止賜勅為奬反不及士民也在牌坊委不可立朕欲定為制今後有孝行實跡等項應旌表者許親王奏来若係親王則令撫按官奏来仍行勘明寫勅遣官賫持往諭并賜以銀叚羊酒庻得揚其善行以風動諸親卿等議看可否如可朕欲親撰勅文仍賴卿調潤行如今年終日多事務便囘具帖子来於是大學士楊一清等請降㫖𫝊行報可改定恩詔宗室二條嘉靖七年七月以章聖皇太后加上尊號頒詔天下輔臣擬上推恩條例上覽之曰聖母尊上稱號已有累朝舊制頒降推恩之條但我宗親不得異于臣民非睦族親親之意今後除詔内載有關于宗支者其親王各寫書并加以金帛示朕敦睦之意王府結親者其子弟仕宦不許選任京職此豈親親睦族之道且今詩書故家衣冠世族俱不敢于王府結親恐為子孫之累故各䖏王府夫人儀賓市井白丁田野愚夫一例濫選家教不端守身不律非惟不能導引宗室為善反縱其為非干犯憲典此例祖訓大明集禮大明律令俱無開載不知是何年臣下建白准行然成化年間已前多不拘至𢎞治十三年各衙門纂修問行條例開載入其間遂為定例不敢復犯甚非帝王正大公平之體其議更之輔臣楊一清等因復擬加恩宗室二條請増入末一條之前上親為改定一宗室節年因事减革住支禄米者除敗倫傷化打死人命重情其餘詔書到日全革者准支一半减去一分二分者俱照舊全支以資養贍一近年事例官員軍民之家有女為王妃夫人子為儀賓者其子弟仕官不許選任京職似非帝王親親睦族之道吏禮二部便㑹查前例果係祖宗典章該載照舊遵行若係先年臣下因事建白准行者俱奏革去以存公平正大之體檢詳宗室條例正徳四年十二月禮部奉㫖檢詳累朝政令凡渉王府者條例上請一舊制各王府生女子三日即具奏其奏報冊嵗一上玉牒冊三嵗一上近多違期及不開庻生子女所出者于其請名請封選婚日治長史等官罪一親王嫡長以下郡王嫡長子孫俱年十嵗即請封其餘子孫十五方請内府監局成造冊印諸物當以奏之先後為序各府關領人役有歸或後期及詭稱使費者謫戍邉方各王府儀賓例賜鞍馬守候之難飼養之費得不償失自今惟親郡王儀賓照例關領餘皆革之一祖訓止著嫡長襲封之文其後有以庻弟襲封如保安王者以嫡侄襲封如交城王者以庻堂侄襲封者如永興王者俱出特恩近應山王絶嗣嫡侄請繼伯王爵臨潼王進封秦王庻伯請補侄王爵者惟命以鎮國輔國本職奉祀以著為令自今郡王殁無嗣及進封親王有如應山臨潼者其宗支止許奏請奉祀一各府以罪革爵重者不復輕者革未㡬復之自今有罪重者不許引輕例冐請一親王郡王病及薨其子㓜則以親支暫理府事請勅諭暫理者善撫㓜子無令失所候其長即囘本府不得復預諸事一王與正妃年五十無嫡子始立庻長子為王世子郡王年老正妃已殁無出乞封庻子為長子者請自上裁一各王府將軍而下薨故無逝者止許以昭穆相應者承祀不得違例奏乞繼嗣名一親王朝覲雖祖訓英廟之時亦嘗一舉然久已不行以故比者崇王請朝貽書免之今後凡親王郡王請身自入朝者並免著為令一凡是親王之國無迎養生母之禮近岐王有請雖懇切而祖宗之制不可違其餘各府宗支殁侍妾無子者例移居别宫有子䖏外者各從其子迎養若生子多者亦止就一人一近例親郡王妃并將軍夫人没而無出者許選繼室有出者止選内助自今妃夫人沒不欲娶繼室内助者許于宫中人擇其可者奏請管理事務不許溺愛濫請一各府宫眷有嫉妬亂倫爭競越禮詔革封號者不許妄請復本府官有為之請者本部劾治一先是瀋府鎮國將軍銓鋐侍女既娠為嫡所妬出寓他出生有子匿不以聞嫡没又選繼室請封事覺乃削今後有此類許親郡王及輔導官奏聞區䖏毋致生育不明閨門有玷一凡王府婚禮奏選有制若未娶正室而侍女先有生育者輔導官舉奏區䖏所生子女不得請名請封著為令輔導官匿不以聞坐之一各王府襲封之初其先王宫人有出者留府贍養無出者放之將軍以下并庻人没者其宫人無出亦令歸其親屬嫁遣違者鎮廵官具實奏叅有撥置阻撓者重治之一各府奉承等官悉聴祖訓載有額設名數郡王内使二名亦奏准之例員缺則保陞數少則撥置不許額外濫保及擅立内典膳名色以圖保陞已著為令今後有違者坐罪營求之人及輔導官一先是革爵庻人鍾嘗進琴詔不納降􅃯切責自今有庻人越分進貢者本部奏叅區䖏一各王府進獻王物本出尊親之誠今後若進筍進扇之類宜令本府自備脚力免驛逓應付以蘇民困一永樂中有上㫖凡使人至王府止欵以飲食不得賞物合宜申明凡使人至王府有需索財物許廵按御史按察司叅究一先是各王府有守節及貞烈者具奏旌表今王室繁衍宜通行昭示以為世勸一天下王府有無籍之徒假以燒丹煉藥為名往来誑感者鎮廵預為禁約一各府所遣人除關領者勿限餘嚴限遣歸如在途延緩及潛住于京有所營求者照例叅究一王府凡遇疾病䘮葬修齋設醮一切禁革至于僧尼道士女冠巫祝之流尤宜痛絶勿容出入違者許撫按官擒治并追究引誘之人罪之一寺觀廟宇徒耗民財無益于事自今各府不許修建并請額禮部志稿卷七十八
