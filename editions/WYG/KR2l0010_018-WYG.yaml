吹冠紅青緑紵絲彩畫百花袍紅絹䙏歌工皆服弁冠紅羅織金胸背大袖袍紅生絹錦領中單黒角束帶紅熟絹錦脚袴皁皮琴鞋白棉布夾襪樂工服色與歌工同凡教坊司官常服冠帶與百官同至御前供奉執粉漆笏服黒膝幞頭黒緑羅大袖襴袍黒角偏帶皁靴又令教坊司伶人常服緑色巾以别士庶之服又令樂人戴鼓吹冠不用錦縧惟用紅䙏服色不拘紅緑又令教坊司婦人不許帶冠穿禙子又令樂工當承應許穿靴出外不許又令樂人衣服許用明緑桃紅玉色水紅茶褐顔色不得穿用俳色長樂工俱戴黑頭巾繫雜色縧凡中宫供奉女樂奉鑾等官妻本色鬏髻青羅圎領提調女樂服黒膝唐巾大紅羅銷金花圎領鍍金花帶皁靴歌章女樂服黒膝唐巾大紅羅銷金裙襖子胸帶大紅羅抹額青緑羅衫畫雲肩描金牡丹花皁靴奏樂女樂服色與歌章同房屋器用等第國初著令凡官民服色冠帶房屋鞍馬貴賤各有等第上可以兼下下不可以僭上官員任滿致仕與見任同其父祖有官身歿非犯除名不叙子孫許居父祖房舎及衣服車馬有官者依品級其御賜者及軍官軍人服色不在禁例又禁凡服色器皿房屋等項並不許雕刻刺綉古帝王后妃聖賢人物故事及日月龍鳯獅子麒麟犀象等形所以辨上下定民志至今遵守不敢違越其禁制備列於後凡房屋洪武二十六年定官員葢造房屋并不許歇山轉角重簷重拱繪畫藻井其樓房不係重簷之例聴從自便公侯前􅈦七間或五間兩厦九架造中堂七間九架後堂七間七架門屋三間五架門用金漆及獸面擺錫環家廟三間五架俱用黒板瓦葢屋脊用花様瓦獸梁棟斗栱簷桷用綵色繪飾窻枋柱用金漆或黒油飾其餘廊廡庫厨寺從屋房宜從葢造俱不得過五間七架一品二品􅈦堂五間九架屋脊許用瓦獸梁棟斗栱簷桷用青碧繪飾門屋三間五架門用緑油及獸面擺錫環三品至五品􅈦堂五間七架屋脊瓦獸梁棟簷桷用青碧繪飾正門三間三架門用黒油擺錫環六品至九品􅈦堂三間七架梁棟止用土黄刷飾正門一間三架黒門鐵環一品官房舎除正􅈦外其餘房舎許從宜葢造比正屋制度務要減小不許太過其門窻户牖並不許用硃紅油漆庶民所居房舎不過三間五架不許斗栱及綵色妝飾又定在京功臣宅舎地勢寛者住宅後許留空地十丈左右邊各許留空地五丈若見住舊居所在地勢窄隘止仍舊居不許那移軍民以留空地官員之家住宅照依前定丈尺不許多留空地過此即便退出令子孫赴官告給園地另於城外量撥功臣之家不許于住宅前後左右多占地丈葢造亭館或開掘池塘以為逰翫公侯内外文武四品以上官不得令子孫家人于市肆開張鋪店生放錢債及出外行商中鹽興販物貨三十五年申明軍民房屋不許葢造九五間數一品二品􅈦堂各七間六品至九品􅈦堂棟梁止用粉青刷飾庶民所居屋從屋雖十所二十所隨聴宜葢但不得過三間正統十二年令庶民房屋架多而間少者不在禁限凡車輿洪武元年定並不得雕飾龍鳯紋職官一品至三品許用間金妝飾銀螭繡帶青幔四品五品素獅子頭繡帶青幔六品至九品用素雲頭素帶青幔轎子比同車製庶民居用黒油齊頭平頂皁幔轎子比同車製並不許用雲頭六年令凡車舟坐轎除紅漆外許雜色漆飾五品以上車同青幔餘并不許其坐轎止許婦人及官民老疾者乘之景泰四年令在京三品以上許乘轎其餘不許違例在外各衙門俱不許乘轎𢎞治七年申明兩京及在外文武官員除奉有㫖及文武例應乘轎者止許四人扛擡其兩京五府管事并内外鎮守守備等項公侯伯都督等官不分老少皆不許乘轎違例乘轎及擅用八人者指實奏聞萬厯三年奏准武職衙門及勲戚等官俱不許僭用四人帷轎與肩輿及擅用交床上馬違者聴科道官及巡視衙門參奏重處指揮以下京衛調外衛調邊衛俱帶俸差操凡􅐸葢洪武元年令庶民並不許用羅絹涼傘許用油紙雨傘三年令京城内一品二品許用傘葢其餘止許用雨傘京城外聴用之十六年令尚書侍郎左右都御史通政使太常卿應天府尹國子監祭酒翰林等學士許張傘葢二十六年定一品二品銀浮屠頂茶褐羅表紅絹裏三簷三品四品用紅浮屠頂茶褐羅表紅絹裏三簷以上傘葢俱用黒色茶褐兩傘俱用紅油絹五品用紅浮屠頂青羅表紅絹裏兩簷雨傘同四品六品至九品用紅浮屠頂青絹表紅絹裏兩簷雨傘俱用油紙三十五年申明官員傘葢不許用金繡硃紅妝飾公侯駙馬伯與一品二品同成化九年令兩京官員油傘遇雨任用其涼傘京城内不許張設若出郊在外不拘此限凡鞍轡洪武元年令庶民不得描金惟用銅鐵妝飾二十六年定公侯一品二品用銀減鐵事件䩞用描銀三品至五品用銀減鐵事件䩞用油畫六品至九品用擺錫鐵事件䩞用油畫三十五年申明官民人等鞍轡馬頷下纓并鞦轡俱用黒色不許用紅纓及描金嵌金天青硃紅妝軍民用鐵事件黒緑油䩞凡帳幔洪武元年令並不許用赭黄龍鳯文職官一品至三品許用金花刺繡紗羅四品五品刺繡紗羅六品以下許用素羅庶民用紗絹三年令職官一品至五品帳幔許用綾羅紗被褥用紵絲錦繡六品至九品帳幔許用紗絹被褥用綾羅紬絹庶民用紬絹布凡器皿洪武二十六年定公侯一品二品酒注酒盞用金餘用銀三品至五品酒注用銀酒盞用金六品至九品酒注酒盞俱用銀餘皆用磁漆木器並不許用硃紅及抹金描金雕琢龍鳯文庶民酒注用錫酒盞用銀餘磁漆又令官員牀面屏風槅子並用雜色漆飾不許雕刻龍鳯文並金飾硃漆又令軍官軍士應用弓矢止是黒漆弓袋箭囊並不許用硃漆描金妝飾三十五年申明官民人等不許僭用金酒爵其椅桌木器之類亦不許用硃紅金飾正徳十六年奏准職官一品二品器皿不許用玉止許用金以為定例其商賈技藝之家器皿不許用銀與庶民同官吏人等不許僭用金酒爵其椅桌木器之類並不許用硃紅金飾凡寺觀菴院洪武三年令除殿宇梁棟門窻神座案桌許用紅色其餘僧道自居房舎並不許起造斗栱彩畫梁棟及僭用紅色什物牀榻椅子六年令凡各處僧道寺觀金彩妝飾神佛龍鳯等像除舊有外不許再造天順八年詔京城内外寺觀今後不許増修請額禮部志稿卷十八
