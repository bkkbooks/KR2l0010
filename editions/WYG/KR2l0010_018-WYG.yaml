body:
  text: 明俞汝楫編儀制司職掌冠服國朝上下冠服具載大明集禮及諸司職掌嘉靖初又釐正衮冕及朝祭等服而武弁燕弁保和忠靜等冠服特出創制今備列焉皇帝冕服衮冕凡祭天地宗廟及正旦冬至聖節則服衮冕見職掌祭社稷先農冊拜亦如之見集禮洪武十六年定冕前圎後方𤣥表纁裏前後十二旒每旒五采玉十二珠五采繅有十二就相去一寸紅絲組為纓黈纊充耳玉簮導衮𤣥衣黄裳十二章日月星辰山龍華蟲六章織在衣宗彛藻火粉米黼黻六章綉在裳白羅大帶紅裏蔽膝隨裳色繡龍火山文玉革帶玉佩大綬六采赤黄黑白縹緑小綬三色同大綬間施三玉環白羅中單黻領青縁襈黄韈黄舄金飾二十六年定衮冕十二章冕版廣一尺二寸長二尺四寸冠上有覆𤣥表朱裏前後各有十二旒旒五采玉珠十二玉簮導朱纓圭長一尺二寸衮𤣥衣纁裳衣六章織日月星辰山龍華蟲裳六章織宗彛藻火粉米黼黻中單以素紗為之紅羅蔽膝上廣一尺下廣二尺長三寸織火龍山三章革帶珮玉長三尺三寸大帶素表朱裏用縁上以朱錦下以緑錦大綬六采用黄白赤𤣥縹緑織成純𤣥質五百首小綬三色同大綬間織三玉環朱韈赤舄永樂三年定冕冠十有二旒冠以皁紗為之上覆曰綖桐板為質衣之以綺𤣥表朱裏前圎後方廣一尺二寸長二尺四寸用周尺前後各十有二旒每旒各五采繅十有二就貫五采玉珠十二赤白青黄黑相次以玉衡維冠玉簮貫紐紐與冠武并繫纓處皆飾以金綖以左右垂黈纊充耳用黄玉繫以𤣥紞承以白玉瑱朱紘玉圭長一尺二寸剡其上刻山四葢周鎮圭之制以黄綺約其下别以袋韜之金龍文衮服十有二章𤣥衣八章日月龍在肩星辰山在背火華蟲宗彛在袖每袖各三皆織成本色領褾襈裾纁裳四章織藻粉米黼黻各二前三幅後四幅前後不相屬共腰有襞積本色綼錫中單以素紗為之青領褾襈裾領織文十三蔽膝隨裳色四章織藻粉米黼黻各二本色縁有紃施于縫中其上玉鈎二玉珮二各用玉珩一瑀一琚二衝牙一璜二瑀下有玉花下垂玉花下又垂二玉滴瑑飾雲龍文描金自珩而下繫組五貫以玉珠行則衝牙二滴與璜相觸有聲其上金鈎二有二小綬六綵以副之六采黄白赤𤣥縹緑纁質大帶素表朱裏在腰及垂皆有綼上綼以朱下綼以緑紐約用素組大綬六采黄白赤𤣥縹緑纁質小綬三色同大綬間施三玉環龍文皆織成韈舄皆赤色舄用黑絇純以黄飾舄首嘉靖八年定冠制以圎匡烏紗冒之冠上有覆板長二尺四寸廣二尺二寸𤣥表朱裏前圎後方前後各七采玉珠十二旒以黄赤青白黑紅緑為之玉珩玉簮導朱纓青纊充耳綴以玉珠二凡尺皆以周尺為度衣𤣥色凡織六章日月在肩各徑五寸星山在後龍華蟲在兩袖長不掩裳之六章裳黄色為幅七前三幅後四幅連屬如帷凡繡六章分作四行火宗彛藻為二行米黼黻為三行中單素紗為之青縁領織黻文十三蔽膝隨裳色羅為之上繡龍一下繡火三繋于革帶大帶素表朱裏上縁以朱下以緑不用錦革帶前用玉其後無玉以佩綬繫而掩之圭白玉為之長一尺二寸剡其上下以黄綺約之上刻山形四盛以黄綺囊藉以黄錦朱韈赤舄黄縧縁𤣥纓結皮弁服凡朔朢視朝降詔降香進表四夷朝貢朝覲則服皮弁服見集禮嘉靖間令祭太嵗山川等神皆服洪武二十六年定皮弁服用烏紗冒之前後各十二縫每縫中綴五采玉十二以為飾玉簮導紅組纓其服絳紗衣蔽膝隨衣色白玉佩革帶玉鈎䚢緋白大帶白韈黑舄永樂三年定皮弁用烏紗冒之前後各十二縫其中各綴五采玉十二縫及冠武并貫簮繋纓處皆飾以金玉簮朱紘纓玉以赤白青黄黒相次玉圭長如冕服之圭有脊并雙植文剡其上黄綺約其下及有韜金龍文絳紗袍本色領褾襈裾紅裳如冕服内裳制但不織章數中單以素紗為之如深衣制紅領褾襈裾領織黼文十三蔽膝隨裳色本色縁有玉鈎二玉佩大帶大綬韈舄俱如冕服内制常服洪武三年定常服烏紗折角向上巾盤領窄袖袍束帶間用金玉琥珀透犀永樂三年定冠以烏紗冒之折角向上今名翼善冠袍黄色盤領窄袖前後及兩肩各金織盤龍一帶用玉靴以皮為之武弁服國初行親征遣將禮則服武弁乘輅其制未詳定自嘉靖初年始嘉靖八年定弁上鋭色用赤上十二縫中綴五采玉落落如星狀靺衣靺裳靺鞈俱朱色如常制佩綬革帶如常制佩綬及靺鞈俱上繫于革帶舄如其裳之色玉圭視鎮圭差小剡上方下有篆文曰討罪安命燕弁冠服嘉靖七年定冠匡如皮弁之制以烏紗冒之分有十二瓣各以金線壓之前飾五采玉雲各一後列四山朱縧為組纓雙玉簮服如古𤣥端之制身用𤣥邊縁以青兩肩繡日月前蟠圎龍一後蟠方龍二邊加龍文八十一領與兩袪共龍文五九袵同前後齊共龍文四九襯用深衣之制黄色袂圓袪方下齊負繩及踝十二幅素帶朱裏青表緑縁邊腰圍飾以玉龍九片履𤣥為之朱縁紅纓黄結襪用白皇后冠服冊寳附皇后受冊謁廟朝㑹服燕居則常服見集禮禮服洪武三年定冠為圎匡帽以翡翠上飾以九龍四鳯大花十二樹小花如大花之數兩摶鬢十二鈿服褘衣深青為質畫翟赤質五色十二等素紗中單黼黻領朱羅縠褾襈裾蔽膝隨衣色以緅為領縁用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以緑錦紐約用青組玉革帶青韈青舄以金飾永樂三年定九龍四鳯冠膝竹絲為圎匡冒以翡翠上飾翠龍九金鳯四正中一龍銜大珠一上有翠葢下垂珠結餘皆口銜珠滴珠翠雲四十片大珠花十二樹皆牡丹花每樹花二朶蕋頭二個翠花九葉小珠花如大珠花之數皆穰花飄枝毎枝花一朶半開一朶翠葉五葉三摶鬢左右共六扇飾以金龍翠雲皆垂珠滴翠口圈一幅上飾珠寳鈿花十二翠鈿如其數托裏金口圈一幅珠翠面花五事珠排環一對皁羅額子一描金龍文用珠二十一顆翟衣深青為質織翟文十有二等凡一百四十八對間以小輪花紅領褾襈裾織金雲龍文紵絲紗羅隨用中單玉色紗為之紅領褾襈裾領織黻文十三或用線羅蔽膝隨衣色織翟為章三等間以小輪花四以緅為領縁織金雲龍文紵絲紗羅隨用玉榖圭長七寸周尺剡其上琢榖文黄綺約其下别以黄袋韜之金龍文玉革帶青綺鞓描金雲龍文玉事件十金事件四大帶表裏俱表青紅相半其末純紅而下垂織金雲龍文上以朱縁下以緑縁并青綺副帶一綬五采黄赤白縹緑纁質間施二玉環皆織成小綬三色同大綬玉佩二各用玉珩一瑀一琚二衝牙一璜二瑀下有玉花玉花下又垂玉二滴瑑飾雲龍文描金自珩而下繫組五貫以玉珠行則衝牙二滴與二璜相觸有聲上有金鈎小綬五綵以副之五采赤黄白縹緑纁質織文青韈舄韈以青羅為之舄用青綺飾以描金雲龍文皁線純每舄首加珠五顆常服洪武三年定雙鳯翊龍冠首飾鐲釧金玉珠寳翡翠隨用諸色團衫金繡龍鳯文帶用金玉十四年定龍鳯珠翠冠真紅大袖衣霞帔紅羅長裙紅褙子冠制如特䯻上加龍鳯飾衣用織金龍鳯文加繡飾永樂三年定雙鳯翊龍冠以皁縠為之附以翠博山上飾金龍一翊以二珠翠鳯皆口銜珠滴前後珠牡丹花二朶蕋頭八個翠葉三十六葉珠翠穰花鬢二朶珠翠雲二十一片翠口圈一副金寳鈿花九上飾珠九顆金鳯一對口銜珠結三博鬢左右共六扇飾以鸞鳯金寳鈿二十四邊垂珠滴金簮一對珊瑚鳯冠觜一副大衫霞帔衫用黄色紵絲紗羅隨用霞帔深青為質織金雲霞龍文或繡或鋪翠圈金飾以珠紵絲紗羅隨用玉墜子瑑龍文四䙆襖子即褙子深青為質金繡團龍文紵絲紗羅隨用鞠衣紅色胸背雲龍文用織金或繡或加鋪翠圈金飾以珠或紵絲紗羅并餘色隨用大帶紅線羅為之有縁餘或青或緑或隨鞠衣色縁襈襖子黄色紅領褾襈裾皆織金綵色雲龍文紵絲紗羅隨用縁襈裙紅色緑縁襈織金采色雲龍文紵絲紗羅隨用玉帶青綺鞓描金雲龍文玉事件十金事件三玉色綵結綬以紅緑線羅為結上有玉綬花一瑑雲龍文綬帶上玉墜珠六顆并金垂頭花板四片小金葉六個紅線羅繫帶一白玉雲様玎璫二如佩制每事上有金鈎一金如意雲葢一件兩面鈒雲龍文下懸紅組五貫金方心雲板一件兩面亦鈒雲龍文俱襯以紅綺下垂金長頭花四件中有小金鐘一箇末綴白玉雲朶五青韈舄與翟衣内制同冊寳冊用金二片每片依周尺長一尺二寸濶五寸厚二分五釐鐫刻真書每片側邊上下有竅用紅縧聨貫開闔如今書帙之狀背各用紅錦嵌䕶藉以紅錦小褥冊盝以木為之飾以渾金瀝粉蟠龍用紅紵絲襯裏内以紅羅銷金小袱裹冊外以紅羅銷金夾袱裹之五色小縧縈於匣外寳用金龜紐朱綬文用篆書曰皇后之寳依周尺方五寸九分厚一寸七分寳池用金濶取容寳寳匣二副毎副三重外匣用木飾與冊盝同中匣用金級造蟠龍内小匣仍用木與外匣同小匣内置一寳座四角雕蟠龍飾以渾金座上用小錦袱褥上一置寳池用銷金紅羅小夾袱裹寳其匣外各用紅羅銷金大夾袱覆之皇妃冠服册印附皇嬪命婦附凡皇妃受冊助祭朝㑹用禮服燕居常服禮服洪武三年定冠飾以九翬四鳯花􅁫九樹小花如大花之數兩博鬢九鈿翟衣青質繡翟編次于衣及裳重為九等青紗中單黻領朱縠縹襈裾蔽膝隨裳色文繡重雉為章三等以緅為領縁大帶隨衣色玉革帶青韈舄佩綬永樂三年定九翬冠二頂冠以皁縠為之附以翠博山飾以大珠翟二小珠翟三翠翟四皆口銜珠滴冠中寳寳珠一座前後珠牡丹花二朶蕋頭八個翠葉三十六葉珠翠穰花鬢二朶承以小連雲六朶翠頂雲一座上飾珠五顆珠翠雲十一片翠口圈一副金寳鈿花九箇上用珠九顆金鳯一對口銜珠結金簮一對珠翠牡丹花穰花各二朶面花二對梅花環四珠環各一對大衫霞佩衫用紅色紵絲紗羅隨用霞帔深青為質織金雲霞帔鳯文或繡或鋪翠圈金飾以珠紵絲紗羅隨用玉墜子瑑鳯文四䙆襖子即褙子桃花色金繡團鳯文紵絲紗羅隨用鞠衣青色胸背鸞鳯雲文用織金或繡或加鋪翠圈金飾以珠燕居服用素除黄外餘色及紵絲紗羅隨用大帶青綿羅為之有縁餘或紅或緑各隨鞠衣色縁襈襖子青色紅領褾襈裾織金雲龍文紵絲紗羅隨用縁襈裾紅色緑縁襈織金花鳯文紵絲紗羅隨用玉穀圭長七寸剡其上琢榖文以錦約其下并韜玉鞓帶青綺鞓描金雲鳯文玉事件十金事件三玉花采結綬以紅緑線羅為結上有玉綬花一瑑寳相花文綬帶上玉墜珠六顆并金垂頭花板四片金葉兒六個紅線羅繫帶一玉佩二如中宫佩制珩以下瑑飾雲鳯文描金上有金鈎青韈舄韈以青線羅為之舄用青綺飾以描金雲鳯文皁縁純每舄首加珠三顆常服洪武三年定鸞鳯冠首飾釧鐲用金玉珠寳翠珠色團衫金繡鸞鳯不用黄帶用金玉犀又定山松特䯻假鬢花佃或花􅁫鳯冠真紅大袖衣霞帔紅羅裙紅羅褙子衣用織金及繡鳯文冊印冊用鍍金銀冊二片其長短濶厚與諸王冊同冊盝飾以渾金瀝粉蟠龍鳯其物用裏覆皆與諸王同印用金龜紐其尺寸與諸王寳同文曰皇妃之印其餘制度皆與諸王同匣皆飾以蟠鳯皇貴妃有寳餘無寳皇嬪冠服冊附嘉靖十年定冠用九翟次皇妃之鳯大衫鞠衣如皇妃制圭用次玉榖文冊冊用銀少殺于皇妃五分之一以金飾之内命婦冠服洪武五年定三品以上用花􅁫翟衣四品五品用山松特䯻大衫為禮服貴人視三品以皇妃燕居冠及大衫霞帔為禮服珠翠慶雲冠鞠衣褙子縁襈裾裙為常服皇太子冠服冊寶附皇太子陪祀天地宗廟及正旦冬至朝㑹則服衮冕見諸司職掌從祭社稷及受冊納