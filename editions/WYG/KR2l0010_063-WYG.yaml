body:
  text: 禮部志稿卷六十三明俞汝楫編冕服備考乗輿以下冠服考古定冠服制洪武元年十一月甲子詔定乗輿以下冠服之制先是上即位之初權宜創置服御之制未遑詳定至是命禮官及諸儒臣稽考古制以聞禮部及翰林院等官議曰乗輿冠服黄帝始作冕服有虞制十二章周制王有五冕六服祭昊天上帝則服大裘冕祀五帝亦如之享先王則服衮冕享先公饗射鷩冕四望山川毳冕社稷五祀絺冕羣小祀𤣥冕凡兵事韋弁服眂朝皮弁服甸冠弁服凶事弁服弔事弁絰服燕居𤣥端漢髙祖始制長冠以入宗廟後漢明帝初服旒冕備文十二章晉祀天明堂以大冕祀太廟朝㑹以法冕小㑹及臨軒以絺冕征獵以繡冕耕藉饗國子以紘冕聽政以通天冠齊郊廟以平天冠服臨朝以通天冠絳紗袍隋祭天地明堂服衮冕朝日夕月宗廟社稷朝㑹皆服之朔日受朝及大㑹諸祭祀還則服通天冠服唐制天子之服十有四等祀天地服大裘冕踐祚享廟征還遣将飲至加元服納后元日受朝賀臨軒冊拜王公服衮冕冬至受朝賀祭還宴羣臣養老服通天冠其鷩冕毳冕𤣥冕緇布冠武弁服黒介幘白紗幘平巾幘白裕各因事而祭之宋祀天服大衮冕祭宗廟元日受朝賀及冊拜服衮冕宴㑹及冬至受朝賀服通天冠常服朝衫袍視事窄袍元祀天服大裘加衮祀宗廟服衮冕大朝以本俗衣冠今擬祀天地宗廟及正旦冬至聖節朝㑹冊拜皆服衮服𤣥衣纁裳其製冕版廣一尺二寸長二尺四寸冠上有覆𤣥表朱裏前後各十二旒每旒五采玉珠十二黈纊充耳玉簪導朱纓圭長一尺二寸衣六章畫日月星辰山龍華蟲裳六章繡宗彞藻火粉米黼黻中單以素紗為之紅羅蔽膝上廣一尺下廣二尺長三尺繡龍火山三章革帶佩玉長三尺三寸大帶素表朱裏兩邉用縁上以朱錦下以綠錦大綬六綵用黄白赤𤣥縹綠純𤣥質五百首小綬三色同大綬間施三玉環朱韈赤舄其郊廟省牲皇太子諸王冠婚禮醮戒之類則服通天冠絳紗袍冠加金博山附蟬十二首施珠翠黒介幘組纓玉簪導絳紗袍深衣製白紗内單皂領褾襈裾絳紗蔽膝白假帶方心曲領白韈赤舄其革帶佩綬與衮服同朔望視朝降詔降香進表四夷朝貢朝覲則服皮弁其製用烏紗冒之前後各十二縫縫中綴五采玉十二為飾玉簪導紅組纓其服絳紗衣蔽膝隨衣色白玉佩革帶玉鈎䚢緋白大帶白韈黒舄其常服則烏紗折角向上巾盤領窄袖袍束帶間用金玉琥珀透犀皇后冠服周制追師掌王后之首服為副編次追衡笄鄭𤣥云副者覆也覆首為飾若今步揺也編者編髪為之若今假紒也次者次第髮長短而為之所謂髲髢也追治也衡笄皆以玉為之衡垂於副之兩旁當耳其下以紞懸瑱笄卷髪者内司服掌王后之六服褘衣揄翟闕翟鞠衣展衣縁衣三禮圖云褘衣色𤣥刻繒為翟形以五采畫之綴於衣以為文章褕翟青衣刻繒為揺雉畫以五色闕翟色赤刻翟形而不畫三者皆王后助祭之服也鞠衣色黄如鞠塵王后親蠶之服也展衣色白展與亶誠也王后以禮王及賓客之服也縁衣色黒王后接御於王之服也漢皇后首飾用假結步揺簪珥步揺以黄金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天禄辟邪南山豐大特六獸諸爵獸皆用翡翠為毛羽金題白珠璫繞以翡翠為花入廟所用服紺上皂下朝㑹用蠶服青上縹下隋皇后首飾用大小十二樹褘衣鞠衣青衣朱衣四等褘衣深青色織成領袖文以翠翟五采重行十二等素紗中單黼領羅縠褾襈色皆以紅蔽膝隨裳色以緅為縁用翟三章大帶隨衣色飾以朱綠之錦青縁革帶白玉佩𤣥組綬青襪舄舄加金飾助祭及朝㑹受冊大事則服之鞠衣黄羅為質織成領袖蔽膝革帶及舄隨衣色餘同褘衣親蠶則服之青衣去大帶及佩綬金飾履見天子則服之朱衣如青衣唐皇后首飾用大小花各十二樹服褘衣鞠衣鈿􅁫禮衣三等褘衣深青色畫翟赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅為領縁為翟章三等青衣革帶大帶隨衣色朱裏紕其外上以朱錦及懸以白玉雙佩黒組大綬青舄舄加金飾朝㑹受冊及助祭則服之鞠衣黄羅為之蔽膝大帶革帶舄隨衣色親蠶則服之鈿􅁫禮衣十二鈿兼用雜色宴見賓客則服之龍鳯珠翠冠泥金衣霞佩常服之宋皇后首飾用大小花各十二樹兩博鬢冠飾以九龍四鳯其服褘衣深青織成翟文素質五色十二等青紗中單餘同唐制朝㑹受冊助祭則服之鞠衣色黄蔽膝革帶舄則隨衣色親蠶則服之其常服真紅大袖紅羅生色為領紅羅長裙紅霞帔藥玉為墜紅羅背子黄紗衫子白紗襦褲明黄裙粉紅紗短衫今擬皇后首飾冠為圎匡冒以翡翠上飾九龍四鳯大花十二樹小花如之兩博鬢十二鈿服褘衣深青為質畫翟赤質五色十二等素紗中單黼領朱羅縠褾襈裙蔽膝隨衣色以緅為領縁用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以緑錦紐約用青組玉革帶青襪舄舄以金飾凡朝㑹受冊謁廟皆服之燕居則服雙鳯翼龍冠首飾釧鐲以金珠寳翡翠隨用諸色團衫金繡龍鳯文帶用金玉皇太子冠服周禮有王世子服而不載其制漢制皇太子服𤣥冠絳衣魏服五時朝服晉服遠逰冠介幘翠綴以白珠佩瑜玉垂組朱衣絳紗襮皂縁白紗中單白曲領帶領火珠素首革帶玉鉤䚢獸頭鞶嚢至明帝泰始六年始服衮冕九章朝賀梁助祭則服衮冕九章朝㑹則朱衣絳紗袍隋皇太子従皇帝祭祀謁廟加元服納妃則服衮服謁廟還宫元日朔日入朝釋奠則服逺遊冠絳紗袍五日常朝則服常服唐制皇太子之服有六衮冕者従祀謁廟加元服納妃之服也逺逰冠者謁廟還宫元日朔日入朝釋奠五日常朝元日冬至受朝之服也烏紗帽者視事及燕見賓客之服也弁冕者朔望視事之服也平巾幘者乗馬之服也進德冠者亦乗馬之服也宋皇太子従皇帝祭天地宗廟服衮冕九章其朝㑹服逺遊冠服其常服皂紗折上巾其執圭之制至道二年冊皇太子禮官上言周禮云天子執鎮圭公執桓圭無太子執圭之文晉書太子出㑹在三恪之下三公之上請皇太子執桓圭以受冊従之今擬皇太子従皇帝祭天地宗廟社稷受冊正旦冬至聖節朝㑹賀加元服納妃被衮冕九章其制冕九旒每旒九玉紅組纓金簪導兩玉鎮圭長九寸五分衮服𤣥衣五章畫山龍華蟲火宗彞纁裳四章繡藻粉米黼黻白紗中單黼領蔽膝隨裳色繡火山二章革帶金鉤䚢綬五采赤白𤣥縹緑純赤質三百二十首小綬三色大綬間施二玉環大帶白表朱裏上縁以紅下縁以綠白韈赤舄其従皇帝郊廟省牲及冊封公主則服逺逰冠絳紗袍其制金博山附蟬施青翠黒介幘犀簪導絳紗袍白紗中單黒領褾襈裙衣裳白裙襦白假帶方心曲領紅紗蔽膝白韈黒舄其朔望朝四夷朝貢朝覲則服皮弁其常服則烏紗折上巾諸王冠服周制王子封建為諸侯其服隨封爵漢封諸子為王用逺逰冠上衣下裳玉佩鉤履唐親王服逺逰冠黒介幘三梁青緌金鉤䚢大帶金寳飾玉褾首纁朱綬朱質赤黄縹紺為純二百四十首黄金璫附蟬絳紗單衣白紗内單皂領縁皂褾襈革帶鉤䚢假帶曲領方心絳紗蔽膝白襪烏皮舄宋親王服七梁冠用金塗銀稜貂蟬籠巾犀簪導銀立華朱裳白羅中單並皂褾襈蔽膝隨裳色方心曲領緋白羅大帶玉佩翬銀綬青絲網間施三玉環白韈黒履革帶以金銀鍍玉佩今擬諸王受冊助受謁廟元旦冬至聖節朝賀加元服納妃服衮冕九章冕用五采玉珠九旒紅組纓青纊充耳金簪導圭長九寸二分五釐衮服青衣五章畫龍山華蟲火宗彞纁裳四章繡藻粉米黼黻白紗中單黼領青縁蔽膝纁色繡火山二章革帶金鉤䚢玉佩受五采赤白𤣥縹綠純青質三百二十首小綬三色同大綬間施三玉環大帶表裡白羅朱縁白韈朱履其朔望朝進表四夷朝貢朝覲則服皮弁皇妃冠服古者王后之下為夫人次嬪次世婦次御女則夫人即皇妃之位也周制内司服掌六服褘衣揄翟闕翟之下嬪服鞠衣世婦服展衣女御服褖衣鄭𤣥以為九嬪服鞠衣則夫人服闕翟乎闕翟者王后第三等服也𤣥以九嬪服鞠衣故以類推而以夫人服闕翟周制無明文可見漢貴人首飾皆大首髻黒玳瑁加簪珥妃以上又得服錦綺羅繒采十二色重縁袍唐首飾兩博鬢飾以寳鈿花􅁫九樹翟衣九等青質繡翟編次於衣及裳重為九等青紗中單黼領朱縠褾襈裾蔽膝隨裳色青衣革帶青韈舄佩綬宋首飾大小花各九珠兩博鬢冠飾以九翬四鳯褕翟青羅繡為揺雉之形編次於衣青質五色九等素紗中單黼領羅縠褾襈裾蔽膝隨裳色褕翟為章二等以緅為領縁大帶隨衣色朱裏紕其外上以朱錦下以綠錦紐約用青組青衣革帶白玉雙佩黒組雙大綬小綬三間施三玉環青韈舄舄加金飾今擬皇妃九翬四鳯冠大花􅁫九樹小花如大花之數兩博鬢九鈿翟衣青質繡翟編次於衣及裳重為九等青紗中單黼領朱綬褾襈裾蔽膝如裳色加文繡重雉為章二等以緅為領縁大帶隨衣色玉革帶青韈舄佩綬凡受冊助祭朝㑹諸大事則服之其燕居則服鸞鳯冠首飾釧鐲用金玉珠寳翠諸色團衫金繡鸞鳯不用黄束帶用金玉犀皇太子妃王妃冠服凡受冊助祭朝㑹諸大事與皇妃同惟王妃以素紗中單為别其燕居則服犀冠刻以花鳯餘與皇妃同皆參酌唐宋之制而定之衮冕洪武元年十月翰林院學士陶安等奏古者天子五冕祭天地宗廟社稷諸神各有所用請製之上曰五冕禮太繁今祭天地宗廟則服衮冕社稷等祀則服通天冠絳紗袍不用十一月詔定乗輿以下冠服之制凡祭天地宗廟及正旦冬至聖節則服冕祭社稷先農冊拜亦如之嘉靖八年五月上疑衮冕未合典制諭大學士張璁以制有革帶之文今何不見於用璁對曰按陳祥道禮書古革帶大帶皆謂鞶革帶以繋佩韍然後加以大帶而笏搢於二帶之間夫革帶前繋韍後繋綬左右繋佩自古冕弁未嘗不用之今不用革帶前後佩服皆無所繋遂附屬裳要之間失古禮制矣上曰禮服不備非齊明盛服之意㑹典載蔽膝用羅上織火山龍三章并大帶縁用錦皆與今不合且衣裳分上下而今衣掩裳裳制如帷幔而今兩幅朕意衣但當與裳要下齊而露裳之六章何如巳又諭璁以更祖制為疑璁對曰臣考禮制衣不掩裳與聖意合夫衣六章裳六章上下適均自不容掩考之集禮㑹典與古不異今衣八章裳四章衣常掩裳國朝典籍皆無所見内閣圖註葢因官司織造循習訛謬今訂正之乃為復祖上意決因復諭璁曰兹求至當一一與卿訂定衣六章古曰繪者畫也今當織之查國初冕服日月各徑五寸今當従之日月在兩肩星山在後華蟲在兩袖仍𤣥色裳六章古曰繡今従之古色用𤣥黄盖取象天地今裳用纁義無取其従古其六章作四行以火宗彞虎藻為二行米黼黻為二行革帶即束帶後當用玉以佩綬繋之蔽膝隨裳色其繡上龍一下火三不用山卿其詳議璁以聖裁至當為對上乃諭内閣諸臣同考訂於是大學士楊一清桂萼翟鑾同禮部翰林院詹事府禮科詳議太祖皇祖十二章之制司造之官徇習近訛勿諳古義遂至失真皇上博稽古典遠㑹聖祖之心不失乾坤之義乞一一更正萬代遵守得㫖擇吉更正各王府並文武内外官一體更正冕洪武十六年定前圎後方𤣥表纁裏前後十二旒每旒五采玉十二珠五采繅十有二就就相去一寸紅絲組為纓黈纊充耳玉簪導二十六年定冕版廣一尺二寸長二尺四寸冠上有覆𤣥表朱裏永樂三年定冠以皂紗為之上覆曰綖桐板為質衣以錦綺以玉衡維冠玉簪貫紐紐與冠武并繋纓處皆飾以金係以𤣥紞承以白玉瑱朱紘嘉靖八年定冠制以圓匡烏紗冒之覆板廣二尺二寸前後玉珠七綵十二旒以黄赤青白黒紅緑為之玉珩玉珠導青纊充耳朱纓綴玉珠二尺以周尺為度衮洪武十六年定𤣥衣黄裳十二章日月星辰山龍華蟲六章織在衣宗彞藻火粉米黼黻六章繡在裳二十六年定𤣥衣纁裳永樂三年定𤣥衣八章日月龍在肩星辰山在背火華蟲宗彞在袖織成本色領縹襈裾纁裳四章織藻粉米黼黻各二前三幅後四幅前後不相屬其腰有襞積本色裨裼嘉靖八年定衣𤣥色六章日月在肩各徑五寸星山在後龍華蟲在袖長不揜裳之六章裳黄色為幅七前三後四連屬如帷凡繡六章分四行火宗彞藻二行米黼黻二行白羅大帶紅裏洪武二十六年定兩邉用縁上朱錦下緑錦永樂三年定在腰及垂皆有綼上朱下緑紐約用素紐嘉靖八年不用錦蔽膝隨裳色繡龍虎山文洪武二十六年定上廣一尺下廣二尺長三尺永樂三年定隨裳色四章織藻粉米黼黻各二本色有紃施於縫中其上玉鉤二嘉靖八年定隨裳色羅為之上繡龍一下繡火三繋於革帶王革帶玉佩洪武二十六年定長三尺三寸永樂三年定玉佩二各用玉珩一瑀一琚二衝牙一璜二瑀下玉花垂二玉滴瑑飾雲龍文自珩而下繋組五貫以玉珠行則衝牙二滴與璜相觸有聲其上有二小綬六采以副之黄白赤𤣥縹緑纁質嘉靖八年定革帶前用玉後無玉以佩綬繋而掩之大綬六采赤黄黒白縹緑小綬三色同大綬綬間施三玉環洪武二十六年定六采黄白赤𤣥縹緑織成純女質五百首織三玉環永樂三年定六采纁質施三玉環龍文織成白羅中單黼領青黄襈洪武二十六年以素紗為之永樂三年定素紗青領褾襈裾領織黻文十三黄韈黄舄金飾洪武二十六年定朱韈朱舄永樂三年定赤色舄用黒鈎純黄飾舄首嘉靖八年定朱韈赤舄黄絛緑𤣥纓結玉圭長一尺二寸永樂三年刻山四通天冠服洪武元年定郊廟省牲皇太子諸王冠婚禮醮戒之類則服通天冠絳紗袍冠加金博山附蟬十二首施珠翠黒介幘組纓玉簪導絳紗袍深衣製白紗内單皂領褾襈裾絳紗蔽膝白假帶方心曲領白襪赤舃皮弁服洪武二十四年上以百官侍朝皆公服而已獨便服非以示表儀命倣古制為皮弁服絳袍𤣥圭以臨羣臣凡朔望視朝降詔降香進表四夷朝貢朝覲則服皮弁服武弁服嘉靖八年九月上諭大學士張璁㑹典有親征之條七類造宜禡之祭皆曰具武弁服卿為朕言之璁對周禮司服凡兵事韋弁服釋之者曰韋弁以韎韋為弁又以為衣裳孔穎達謂韎蒨染赤色韋為弁杜佑謂頂少銳為車駕親征中外戒嚴之服是韋弁者武弁也國朝視古損益為皮弁之制有定式矣武弁如皮弁之制皮弁冒以黒紗武弁冒以絳紗隨具圖説進覽上報曰覽圖制足見博考所繪有􅔖形無繋處冠制古銳今圎朕惟上鋭者取其輕利如古可也又衣裳􅔖舄皆赤色何謂且佩綬俱無而於祭用之可乎璁對曰自古服冕弁未有不用革帶考革帶前繋韍後繋綬韋弁之􅔖正繋於革帶耳武事尚威烈故色多用赤詩韎韐有奭乃天子講武之章奭赤貌韎舄従裳色故皆赤佩綬於禮制不可缺據采芑詩曰服其命服朱芾斯皇有瑲􅋛珩此詩為卿士南征而作其戎服尚備佩玉如此則天子武弁可推惟聖明裁定上復諭璁武弁冠服衣裳韎舄俱如古制増革帶佩綬及圭諭禮部擇吉行乃定弁制上鋭色用赤十二縫中綴五采玉落落如星韎裳韎衣韎韐俱如赤色如常制佩綬革帶如常制俱上繋於革帶舄如其裳之色玉圭視鎮圭差小剡上方下篆文曰討罪安民燕弁服嘉靖七年二月丁巳上製燕弁服倣古𤣥端制襯用深衣色黄初上以燕居冠服未雅諭輔臣張璁考古帝王燕居法服之制璁采輯禮書𤣥端深衣之文圖註以進上為參定其制示璁且諭璁成朕志璁對曰古服𤣥端深衣二者其用最廣𤣥端自天子達於士盖國家之命服深衣自天子達於庶人蓋聖賢之法服今皇上於𤣥端俱加文飾於深衣但易黄色誠得損益之道上勅禮部曰常情多修治於明顯怠忽於幽居古聖王治𤣥端為燕居服𤣥取其𤣥邃端取其方正朕酌古𤣥端之制更名曰燕弁庶㡬深宫獨處以燕安為戒也因勅尚衣監著為式其制如皮弁衮冕祭服嘉靖六年四月内大學士楊題為祭服事題稱奉勅内閣朕惟齊明盛服以供祭祀國之重典而祭服乃章之重焉今衮冕之服祭服也被之以祀天享祖其所闗豈小小哉且聞衮冕之制𤣥衣黄裳所以象天地之色衣六章曰日月星辰山龍華蟲裳六章曰宗彛鍾虎火藻粉米黼黻各有取義乃古今弗易之制亦我聖祖之制也奈何司造之官罔諳典制遂失其真近因與少傅大學士張璁論及已具圖註兹特勅卿等可将圖註㑹同禮部翰林院參以禮科詳議可否具奏更正夫兹舉也實出朕意非璁之獻諂君有問其臣不敢不以正對如有真識髙見當坐咎於予一人勿得乗是而毁我忠良卿等悉心具對若有不同者各具以聞欽此臣等㑹同各官伏讀聖諭詳閲圖説有以仰窺皇上考古之精議禮之當真大聖人之制作出於尋常萬萬也竊惟衮冕之制天子所以祀天享祖承上下神祗與他服不同誠至重焉者也自黄帝堯舜以来𤣥衣黄裳製為十二章之式日月星辰山龍華蟲其序自上而下為衣之六章宗􅂜鍾虎粉米黼黻其序自下而上為裳之六章自周以後寖變其制或八章或九章已戾於古漢唐宋歴代以来則愈失其義無足言者矣至我太祖髙皇帝復定為十二章之制司造之官乃徇襲近訛勿諳古義遂至失真誠非太祖制作之初意恭惟皇上博稽古典洞見精微逺㑹吾聖祖之心據今之訛一舉而正之使皆循於古象不失乎乾坤之義而凡聖意之所以逺合乎唐虞者臣璁圖註之文𤼵揚殆盡皇上廣大謙虚猶欲令臣等㑹同詳議臣等知而不言真有負皇上舎已従人樂取為善之心但思兹制至精至當燦然明備稽諸古帝而勿悖質諸聖祖而有光俟之百世而不惑夫豈自用其聰明而故為變更者乎易訛就正道理當然無以易此臣等分當効忠而今委不容有一毫異議也伏乞皇上聖斷不疑将内閣所蔵圖畫一一更正仍勅令禮部通行天下各王府及内外百官朝祭之服其上衣下裳一體改正及勅工部轉行内外織造衙門今後照依欽定制式俱行改造毋得因循舊謬則聖制昭明而萬代永有遵守矣等因題奉聖㫖卿等既㑹看詳議停當便著欽天監擇日更正制造各王府并文武百官及在外官員著一體更正禮部知道欽此嘉靖八年十二月上親定百官朝祭服圖式禮部摹板繪采頒行中外初章服定制載在㑹典及内閣秘圖沿久而訛每遇朝賀祭祀服人人殊及上更制衮冕先出圖説示閣臣下禮部議定頒行中外而百官承訛如故㑹聖旦給事中戴儒請明降定式以便習儀禮部按秘圖㑹典酌以今上所定冕服説草上圖註不稱㫖上乃諭内閣親定公服所用革帶照舊朝祭服大帶表裏俱素兩耳及下垂縁以綠色就以蔽膝佩綬繋之佩玉更服古制裳并三齊如禮官所言且令議方心曲領名義於是禮官言方心曲領始於隋時非古也上曰方心曲領古制不𫝊况始自隋豈可襲用宜革之餘如圖註通行中外職官遵行毋得違越仍㑹議各王府官一體更正寳璽備考皇明製璽洪武元年春正月初上欲製寳璽未得玉有賈胡浮海獻美玉曰此于闐玉祖父相𫝊當為帝王寳璽上命製為璽一圭一獻古玉璽𢎞治十三年巡撫陕西都御史熊翀等遣人獻玉璽云鄠縣民毛志學等於趙倫村泥河水濱得之其文曰受命於天既夀永昌玉色純白微青背有螭紐周廣一尺四寸厚二寸翀等以為秦璽復出也事下禮部尚書傅瀚等奏自有秦璽以来歴代得喪存毁真贋之跡具載史籍今所進之璽其篆刻之文既與輟耕録等書模載魚鳥篆文不同其螭鈕又與史傳等書所載文盤五龍螭缺一角及旁刻魏𨽻者不類且又與宋元所得之璽色各不同蓋秦之舊璽更歴變故亡毁已久今陕西所進與昔宋元所得疑皆後世模倣秦璽而刻之者竊惟璽之為用以識文書防詐偽非以為寳玩也自秦始皇得藍田玉刻為璽漢以後𫝊用之自是轉相因襲巧爭力取意謂得此璽者乃足以受天之命否則歉然愧恥以為天命去之不知受命以德不以璽為輕重也故求之不得則私刻偽造務以欺人一或得之輒譁然以為秦璽君臣色喜交慶徧視以誇示於天下貽笑取譏千載一律洪惟我太祖髙皇帝神謨睿鑒髙出千古不師前代之刻製為一代之璽文各有義隨事而施真足以為聖子神孫一代受命之符而垂法萬世者矣列聖相承率由祖訓百餘年别無古璽而受命夀昌之福愈隆愈盛皇上大德懋昭天命匪懈聖躬萬福宗社奠安正無俟於璽而得天之眷有足徵者今此璽出於陕地乃遂以為天錫神符交獻諛説盖不自知其非耳宜姑蔵之内府以備燕閒一玩以彰聖德以正人心臣不勝惶恐之至上従之仍命薄賞志學等白金人五兩儀衛備考考設儀衛洪武元年宣國公李善長等進儀衛上見仗内之旗有天下太平皇帝萬嵗字之旗上乃顧謂善長曰此誇大之辭也古者九旗之制各有其屬若日月蛟龍熊虎鳥隼龜蛇之類所以昭儀物辨等威若天下太平皇帝萬嵗之名此直誇耳莫若以天祐邦家海宇康寧易之庶㡬順理耳上既而復語之曰此亦近誇宜併去之洪武五年三月禮部言周制天子出入條狼氏夹道以辟止行人漢制鹵簿前驅持弓以射窺者唐宋清道􅎻弩辟止行人惟迎駕之人仗外迎拜今定擬車入有司肅清道路官民勿觀望官員父老迎駕者於仗外路右俛伏若遇駐驆迎駕之人五拜洪武六年八月詔禮官考五輅制度上曰五輅起於成周玉輅太奢今止用木輅朱漆之樸素渾堅奢儉得中為二乗一不用革祭祀用之一以皮鞔行幸用之鹵簿大駕洪武二十六年定凡正旦冬至聖節錦衣衛陳鹵簿大駕於殿之東西凡鹵簿大駕惟郊祀幸太學耕籍田用之如祭社稷祭太廟祭山川則於鹵簿大駕内去白澤以下至𤣥武豹尾大涼步輦至大路不設其郊祀前期視牲則用丹陛駕丹陛駕凡常朝日奉天門設丹陛駕於午門外及金水橋南凡正旦冬至聖節冊拜親王及番使来朝金吾衛於奉天門外分設旗幟宿衛於午門外分設兵仗衛尉於奉天殿門及丹陛丹墀設黄麾仗内使監擎執於殿上其宣詔赦降香則惟設奉天殿門及丹殿儀仗殿上擎執永樂元年八月禮部言鹵簿中宜有九龍車一乗又舊有金鉦紅鼓魫燈紅燈請増製上曰禮貴得中過為奢不及為儉先朝定禮審之精矣後世子孫遵用舊章當自朕始豈可輒有増益以啟後世之奢哉九龍車既先朝所無即不可増舊有而今闕者令工部補造武陳駕嘉靖二年上将幸天夀山諭禮部巡狩鹵簿當與出郊不同義須尚武尋御製天子武陳駕及大武冠服制式示尚書夏言且諭之曰朕此二制卿其註圖行今次不及後用之於是言繪二制以進宫府備考宫闕更奉天殿名嘉靖六年八月甲申大學士嚴嵩疏言昨奉聖諭殿名奉天是已即天也皇祖何取臣仰窺聖德不以天自居𫝊記有曰人君其尊如天孔子作春秋繋王於天又書曰天命天討言人君賞罰不自己出一歸於天祖制已久宜勅禮官集議以俟聖裁上曰卿釋奉天二字義甚正第非題扁用也遂勅部曰人君奉天已身坐之終未安况災燬初罹兩蒙昭示名稱之舊不可復於是禮部㑹議言皇祖肇造之初名曰奉天者昭掲以示䖍爾既以命名則是昊天監臨儼然在上臨御之際坐以視朝似未安修復之始乞睿斷更以答天庥上曰俟至期奏於南郊太祖更之三十七年重建奉天門更名曰大朝門四十一年九月甲申更名奉天殿曰皇極初殿工成工部請額上諭内閣曰朝殿太祖名之成祖因之不更上天垂示已兩矣嵩謂太祖定名莫非奉天改之必前代所無之名今只仍舊惟天字當出奉字上於是部臣以扁式請為横扁天字居中上出奉殿二字兩傍稍下相對上謂不雅乃取尚書洪範字義更名府第親王府第洪武九年春正月詔禮部親王宫殿門廡及城門樓皆覆以青色琉璃瓦如東宫之制又命中書省臣惟親王宫得飾朱紅大青緑餘居室止飾丹碧中書省臣言親王居室飾大青綠亦無過度上曰惟儉養德惟侈蕩心諸子方及冠年去朕左右豈可使靡麗蕩其心洪武十二年王府營造訖工繪圖以進其制中曰承運殿十一間後為圜殿次曰存心殿各九間承運殿兩廡為左右二殿自存心承運周迴兩廡至承運門為屋一百三十八間殿後為前中後三宫各九間宫門兩廂等堂九十九間王城之外周垣四門其南曰靈星餘同王城名周垣之内堂庫等室一百三十八間凡為宫殿室屋八百十一間𢎞治八年定王府制前門五間門房十間廊房一十八端禮門五間門房六間承運門五間前殿七間周圍廊房八十二穿堂五間後殿五間家廟一正房五間廂房六門三間書堂一正房五間廂房六門三間左右盝頂房六宫門三間廂房十前寢宫五間穿堂七間盝頂房一東西各三所每所正房三後屋三廂房六多人房六連漿糨房六淨房六庫十儀仗庫三間廂房六間三門正房五後房五廂房十二茶房二淨房一世子宫正房三間後房五間廂房十六郡王府第天順四年定郡王每位盖府屋共四十六間前門樓三間中門樓一間前㕔房五間廂房十後㕔房五廂房十厨房三庫房三米倉三馬房三公主府第洪武五年定公主府第之制禮部言唐宋公主視正一品其府第並用正一品制度今擬公主府第㕔堂九間十一架施花様獸頭梁棟斗栱簷桷彩色繪飾惟不用金正門五間七架大門用緑油銅環石礎牆磚鐫鑿玲瓏花様従之郡王府承運門制洪武九年靖江王相府奏請靖江王府承運六門金釘朱戸之制命員外郎張籌等考古制以聞籌等奏按韓詩外𫝊諸侯有德者錫朱戸而金釘無所考今親王府承運門既用金釘靖江王府宜降殺如公主府掩錢之制符信備考符牌造符牌洪武四年上召工部造用寳金牌及軍國調發走馬符牌用寳為小金牌二中書省大都督府各蔵其一遇制書發兵省府以牌入而後内府出寳用之其走馬符牌凡有軍國急務遣使者佩之以行禮部因以唐宋走馬銀牌之制以進上令寸尺従唐其式如宋務令製作精緻凡造金字牌二十銀字牌二十文曰符令所至即時奉行違者必刑俱以鐵為之濶二尺五分長五寸上鈒二飛龍下鈒二麒麟牌首為圎竅貫以紅絲絛蔵之於内府之中一遇有調發則出之牙牌牙牌制洪武十一年三月丁酉始制牙牌給文武朝臣其制以象牙為之刻官稱於上凡朝參佩以出入有不佩者門者却之私相借者論如律有故則納之内府其在外来朝百司官無牌者則於各門附名以入勲臣以勲字親臣以親字文臣以文字武臣以武字文武官之與陪祀郊廟及執事人亦給牙牌有圎花長花花素之别凡諸得給牌者有故則檢籍而納之正德十六年九月禮部覆禮科都給事中邢寰奏牙牌惟常朝職官得以懸帶正德以来權奸竊柄傳旨陞官乞清查以重名器得㫖文職不朝參者不得濫給牙牌武官進御侍班佩刀執金爐者給與命婦牙牌嘉靖九年二月定命婦牙牌式視陪祀官殺三之一嘉靖二十四年十一月丙申禮科都給事中陳邦脩言百官出入禁門帶牙牌以防奸偽今虚衝帶俸及􅇎流供事者如文思院大使趙成等十餘人皆得闗領朝參牙牌宜查奪上以名器當慎令禮部尚寳司禮科查奪有違例者以名聞武臣金銀牌洪武四年六月詔定武臣金銀牌制參考舊典武臣懸帶金牌濶二寸長一尺上級雙龍下級二伏虎牌首尾為圎竅貫以紅絲絛指揮佩金牌雙龍雙虎千戸佩鍍金銀牌獨雲龍獨虎符百戸佩素雲銀牌符凡造雙龍雙虎符金牌五百面獨雲龍獨虎符鍍金銀牌二千面素銀牌一萬一千面共一萬三千五百面上親為文鈒之曰上天祐民朕乃率撫威加華夏實憑虎臣賜爾金符永𫝊後嗣天子饗祀郊廟若視學籍田勲衛扈従及公侯駙馬都督日直衛錦衣當直則給金牌有龍者有虎者麒麟者獅者雲者以官為差皇城金吾禁夜五城夜巡則給令牌虎賁巡城則給銅符九門守衛則給銅牌錦衣校尉入直則給雙魚銅牌扈駕銅牌洪武六年五月命造扈駕先鋒金字銀牌一千五百面尋改為守衛金牌以銅為之塗以金髙一尺濶三寸分仁義禮智信五字仁字鈒獨龍蟠雲花公侯伯都督佩之義字鈒伏虎蟠雲花指揮佩之禮字鈒獬豸蟠雲花千戸衛鎮撫佩之智字鈒獅子蟠雲花百戸所鎮撫佩之信字鈒蟠雲花将軍佩之二面俱篆文牌首竅貫青絲鎮撫及将軍隨駕應直宿衛者闗給備帶下直則納之國朝将軍選鋒幹勇力者為之號曰天武将軍立将軍千百戸總旗統其衆凡早晩朝及宿衛扈駕執金瓜披鐵甲佩弓矢冠紅纓鐵盔帽列侍左右如大朝㑹則披金甲金盔帽列侍殿廷俱有定數初隷拱衛指揮使司後隷錦衣衛止稱曰将軍闗領通規正德五年十月内該本部題准各官懸帶牙牌仍照舊例司禮監科造完備送尚寳司給發凡各官闗領牙牌本部准尚寳司手本開稱某等衙門某等官原領牙牌驚􅪤透徹字號糢糊不堪懸帶及某衙門某官應該闗領牙牌查無收貯俱各相應料造等項本部即查正德年間題准事例開坐請㫖懸帶員數文職應帶牙牌官員九卿等衙門及内閣辨事等官文職不應帶牙牌官員太醫院帶俸及御藥房并各營供事官員工部文思院等衙門帶俸及内官監辦事匠作官員銓注在京各衙門帶俸專在各營書辦官員工部所屬軍器鞍轡等局官員武職應帶牙牌官員五府并錦衣衛堂上帶俸王親之家及公主親男錦衣衛左千戸七所并鎮撫司千百戸若係執捧金爐侍駕者許帶凡多餘見任必須駁查或分管存恤守衛管屯管操管倉管馬管厰管苜蓿管巡菁等項職任明白方許給領殿前御前侍班帶刀答應官員武職不應帶牙牌官員神木厰官員太常寺犧牲所官員錦衣衛五所七所并鎮撫司及在京各衛所帶俸指揮千百戸等官專在内府各監局御藥整容等房供事官員各府轄各衛及旗手等親軍衛雖稱多餘見任及一應雜差但駁查回報不明一概不與嘉靖二十八年五月内該本科都給事中陳邦􅁱等題為清理牙牌以慎名器事奉聖㫖這朝參官牙牌名器所當慎重禮部便㑹同尚寳司并該科查理應該追奪改給的明白具奏今後再有違例冒領的著指名參奏究治欽此該本部查得正德十六年九月内該禮科都給事中邢寰等題為遵詔制刷舊例以新政治事本部覆議得工部文思院等衙門帶俸專在内府内官監辦事匠作等官不係朝參之列冒領牙牌相應裁革等因奉聖㫖是各該官員不係朝參之類舊額原無牙牌的一體裁革武職官專在殿在御前侍班帶刀答應并執捧金爐的還給與他欽此又查得本部見行事例内一款在京各衛所帶俸專在内府各監局御藥等房供事指揮千百户等官俱不該帶牙牌又一款尚膳監千百戸該本監於正徳十六年十二月題奉聖㫖既有永樂年間事例准給與他欽此又查得嘉靖四年七月内該内官監太監郭紳等題稱本監官匠順天府知事工部營繕所所正等官孫志等忠義等衛副千戸等官路英等在工効勞乞給牙牌等因奉聖㫖都准他欽此今該前因本部議得牙牌之設明開朝參官懸帶此牌則凡不係朝參者其不應懸帶明矣今除各衙門大小官員在任朝參例該給領牙牌者無容别議外其通政司等工部營繕所等衙門帶俸見在内府内官等監辦事匠作等官錦衣衛等衙門帶俸見在内府各監局御藥等房寄名供事等官俱不在朝參人員先年已經遇例裁革隨該各官具奏復蒙准給兹欲仍舊給與朝參牙牌似非其義欲徑革奪則出内府禁宻之地譏察不便相應議處臣等查得内府尚寳司見貯有先年舊牌數百餘面原開有入内府字様合将前項牙牌闗出換給各官懸帶如數不足另行照式造補原領朝參牌面通行送繳其各衛所等衙門除掌印僉書管屯管存恤坐營坐司侍衛等官應給朝參牙牌外其餘多餘見任并一應雜差等官不係朝參官員之數又無内府供役之因合行革奪及有在外納粟填註職事朦朧闗給妄肆誇耀并考選斥退因事閒住等官舊領牙牌不行送繳俱屬故違合送法司提問均乞聖裁奉聖㫖依擬行欽此懸帶别例通政使司等工部營繕所等衙門帶俸見在内府内官監辦事匠作等官錦衣衛等衙門帶俸見在内府各監局御藥等房寄名供事等官改給與内府字様牙牌懸帶嘉靖二十八年五月内該本部議題奉聖㫖依議行欽此尚膳監千百尸該本監於正德十六年十二月題奉聖㫖既有永樂年間事例准給與他欽此錦衣衛左千戸等所并鎮撫司千百戸等官於嘉靖六年十月内奉該本部覆題奉聖㫖既係朝參官員牙牌准給與懸帶欽此太常寺犧牲所千百戸嘉靖八年正月内奉乞牙牌該本部覆題奉聖㫖准給與牙牌懸帶欽此宛大二縣典史嘉靖八年十二月内奏乞牙牌本部覆題奉聖㫖准給與牙牌懸帶欽此重領事例嘉靖十一年五月尸部主事尹尚賓奏稱因馬驚墜地跌損牙牌乞恩認罪事該本部覆題看得本官缺損牙牌似當參究但因馬驚奔逸事出不測情有可原合無将本官原損牙牌查繳仍行尚寳司另行闗給奉聖㫖准另闗給欽此嘉靖二十六年正月行人章熈奏同前事奉聖㫖禮部查了来説欽此該本部行查明白及查與主事尹尚賓事例相同題覆乞従寛宥奉聖㫖既查無他故原牌著送繳另給章熈免究欽此嘉靖三十年正月靖逺伯王瑾奏為燒損牙牌乞恩認罪事該本部覆題看得本爵傷損牙牌應參究問但據覆查委係燒損失火事出不測似應俯賜寛宥奉聖㫖王瑾姑免究牌面准另給欽此犧牲所官請牙牌𢎞治八年太常寺卿齊章等奏犧牲所百戸錢堅等請給常懸牙牌以便禁門出入禮部謂本所居城外而堅等又非朝參官若遇進牲供祀臨期自有供事牙牌所請宜勿許従之定清查牙牌法𢎞治十六年時有玉河橋道邉拾工部文思院副使牙牌者禮部奉㫖查審乃成化十年六月文思院帶俸副使馮宇所領宇以𢎞治元年革罷莫知所之而其牌遂私假於未革職者懸帶以故遺失後畏罪不敢言因奉牙牌本為朝參官員而設文思院匠官出入禁門自有牌面照驗乃假以不便為辭援朝參官例一概冒領且自以冠帶不便工作往往繋牙牌於絛上所以易於遺失今後宜一切禁絶年終諸司将各官原領牙牌字號并年月日期備開冊了送尚寳司清查違者治罪従之禮科奏稽牙牌嘉靖元年禮部覆禮科給事中邢寰奏牙牌惟常朝職官得以懸帶正徳以来權奸竊柄官以𫝊乞而陞牌以夤縁而得乞賜清查以重名器得㫖文職不朝參者不得濫給牙牌武官進御侍班佩刀執金爐者照舊給與供事執事别給牌面嘉靖二十八年初内府供事匠作武職等官皆帶朝參牙牌曽奉㫖革奪旋復之至是禮科都給事中陳邦脩以為言禮部覆奏大明㑹典所載在京文武官員出入禁門各有所帶牌面而牙牌内有執事供事朝參之别執事供事等牙牌皆臨時闗領如期繳進惟朝參牙牌例得朝夕懸帶盖非徒為闗防之具亦以等威之示辨也若虚銜帶俸供事執事人員委不宜一概冒領第出入禁宻若一切革奪則又不便譏察及查尚寳司見貯舊牌數百上有入内府字様請以此給之庶闗防既便而名實亦稱至於衛所武官自掌印僉書侍衛之外見任雜差等官不朝參供役者盡革奪之其納粟填註冒闗牙牌及罷退閒住官舊所闗領不繳者俱行逮問報可使節使節之制洪武二十三年八月詔考定使節之制禮部奏漢光武時節以竹為之柄長八尺其毛三重而黄紹韻㑹註漢節柄長三尺毛三重以旄牛尾為之紹従三尺之制禮部志稿卷六十三
