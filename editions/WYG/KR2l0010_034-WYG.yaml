body:
  text: 禮部志稿卷三十四明俞汝楫編祠祭司職掌恩卹國初武臣亡殁念其勲勞賻卹之典特從優厚其後漸為限制今併文武卹典著於後而外夷官員亦附焉祭葬洪武二十六年定一優給則例凡陣亡失陷傷故渰没者全支邊逺守禦出征并出海運糧病故者減半一品米六十石麻布六十疋二品米五十石麻布五十疋三品四品米四十石麻布四十疋五品六品米三十石麻布三十疋一公侯亡故不分病故陣亡止給麻布一百疋禮部奏輟朝三日仍具手本行移在京衙門知會一將引本官家人赴内府給與布疋一咨工部造辦㝠器棺槨及撥人匠甎石造墳安葬一劄付欽天監選擇墳地一具手本赴光禄寺備辦祭物遣官行禮一禮部奏議封諡一自初喪至除服以次遣官致祭聞喪入殮首七至終七下葬百日新冬周年二周除服一都督至都指揮亡故禮部奏輟朝二日移咨工部造辦棺槨等項仍備辦祭物自初喪至除服節次遣官致祭聞喪下葬百日周年除服如合優給者照前則例并咨兵部照例追贈一指揮使至指揮僉事亡故禮部移咨工部造墳安葬亦節次遣官致祭安靈下葬周年除服照例優給追贈一衞所鎮撫千戸百户亡故禮部移咨工部造墳安葬止二次遣官致祭安靈下葬照例優給追贈一公侯及在京一品二品父母妻喪三品四品父母喪曽授封贈及致仕者各照品級造墳安葬在外止祭祝未封贈者無一在外都指揮使至指揮僉事止是禮部遣人往祭一次若回京安葬則照例祭祝造墳千百户則無祭葬例一公侯在外病故聞喪止輟朝三日靈櫬到京仍輟朝三日下葬輟朝一日永樂以後續定凡公侯承襲病故者祭二壇若管府事有功蹟加太子太保以上及守備南京者俱祭十六壇凡駙馬都尉病故者祭十五壇凡伯爵承襲病故者祭二壇其年㓜襲爵不及而故者祭一壇若管事有功蹟加太子太保以上者祭十五壇凡公侯駙馬伯病故俱輟朝一日齋糧麻布取自上裁其喪禮照依定制若公侯伯為事病故者祭葬等項俱無凡公侯伯母與妻俱祭二壇有葬係皇親者加祭壇數取自上裁凡兩京二品以上文官併父母妻三品文官併父母曽授本等封者照例祭葬其三品父母止授四品封及四品官并父母授本等封者俱止賜祭一壇若止授五品以下封者祭葬俱無其有出自特恩者不在此限凡一品官病故者輟朝一日祭九壇父母授封至一品者祭二壇妻祭一壇凡尚書左右都御史在任病故者祭二壇其加有東宫三少或兼大學士贈一品者祭四壇父母妻祭俱一壇凡兩京三品官病故者俱祭一壇致仕者亦然其以侍郎兼學士贈尚書者祭二壇凡兩京三品以上官葬祭制度俱照依品級其四品五品官得特恩賜葬者亦以本等品級為定惟衍聖公葬祭照一品施行凡左右都督至都督僉事管府事病故者俱祭六壇齋糧麻布取自上裁其先有功後閒住病故者祭二壇母妻祭俱一壇俱有葬凡都督僉事以上葬禮俱照品級若署都督僉事祭一壇無葬凡中都留守正副俱祭一壇凡在京親軍衞分帶俸都指揮使及同知僉事在御馬監把總或出充叅將遊擊等官有功無過者祭一壇凡錦衣衞等官指揮使同知僉事或帶俸都指揮職銜者俱祭一壇以上俱無葬其係干皇親者祭葬取自上裁凡在京在外文武官員不拘品級其以死勤事者卹典取自上裁凡女直都督等官永樂間差官齎香鈔諭祭近例因其奏請給與表裏祭文令帶囘自祭凡達官都督等官永樂宣徳間來京病故者隨時遣官諭祭或給棺賜葬舊例禮部年終類奏分遣官祭之今不行若在邊殁於戰陣者不在此例凡外國使臣病故者令所在官司賜棺及祭或欲歸葬聽其自便凡在京文武官員及夫人病故者嘉靖六年令止與應得祭葬其齋麻布一體裁革凡公侯伯殁於王事者嘉靖八年題准於本爵應得祭外加祭二壇凡二品以上大臣在任病故者嘉靖二十八年議准行兵部應付船隻脚力差官一員䕶送還鄉隆慶三年更定凡四品五品文官以侍從春宫軍功等項應沾卹典者禮部臨時具由取自上裁其他一切雜塗盡行停止𢎞治十年例遇有前項陳請仍先移文翰林院兵部覈實如軍功必躬履行陣侍從必日侍講讀春宫必親奉出閣開陳有勞方與具由題請若止曽受官未經實効勤勞者不准嘉靖二十三年例其特恩所加祭葬大約於本等品級内量加一等如無祭者給與祭一壇無葬者給與半葬應半葬者給與全葬如講讀官則五品本身有祭四品本身父母得擬祭葬三品祭得及其妻軍功則四品本身得擬祭葬三品未滿得及其父母各有差等不可越次妄生希覬或有講讀年久啟沃功多軍旅身殱勲勞懋著者卹典自宜加厚禮部臨時議擬奏請定奪凡二品官本等祭二壇若加陞一品致仕者祭五壇正德七年例加東宫三少致仕者祭三壇正徳六年例原加東宫三少而續奉㫖革去者止與本等祭二壇妻未封夫人者不准與祭俱嘉靖二十三年例其加陞日淺政蹟未著者臨時覈實奏請量減若被劾冠帶閒住者祭葬俱無俱𢎞治十年例凡四品官已經考滿者其父母例不重封雖止授五品封亦與祭一壇未考滿者不准嘉靖二十三年例凡四品以上官其父母曾授本等封贈者先後病故祭得因後并及其先如有前母亦得及之無封贈者不許越例陳乞其品官妻非係封贈夫人者原無祭典不准與祭俱嘉靖二十三年例凡被劾聽調官有心本無疵事因詿誤雖遭指摘不累其人品者應得祭葬仍准全給或功有可録過有可原者功過當相較量其祭葬應全給者半給應半給者有祭無葬若罪過昭彰公論共棄者照閒住例不准給凡公侯伯本爵應得祭二壇若在内掌府事坐營守備南京同在外總兵征討積有勲勞而加太子太保以上者公侯祭十六壇伯祭十五壇掌府事坐營總兵歴有勲勞祭七壇掌府事坐營積有年勞者祭五壇雖掌府事坐營而政績未著者祭四壇掌事而被劾明閒住者止與本爵祭二壇被劾而未經勘實者祭一壇勘實而罪重者并本爵應得祭葬一槩盡削凡都督同知僉事起用未久病故者與祭三壇嘉靖三十年例錦衣衞都指揮使身後贈都督同知者亦祭三壇正徳二年例俱照例造葬萬厯六年更定凡文官三品以上不論已未考滿其各父母妻必曽授本等封俱照例祭葬四品本身及父母皆止一祭無葬不出自特恩者不拘凡一品父母妻已授本等封於例祭外父母有加祭二壇者正徳十年例妻有加祭一壇者𢎞治十二年例係出特恩取自上裁陳乞者不得輒援為例凡三品官曽經考滿者祭一壇全葬未經考滿者祭一壇減半造葬正徳六年例其以侍郎兼學士贈尚書者祭二壇不拘已未考滿給與全葬或兼官雖同非係贈尚書者止給與本等卹典不得槩援為例凡致仕養病終養聽用等項官員祭葬俱與見任官同革職閒住及先曾為事謫戍遇䝉恩詔辨復原職者祭葬俱不准給凡文官二品三品共實歴三年以上者雖未考三品滿父母准與三品祭葬三品四品共歴三年以上者雖未考四品滿父母准祭一壇若未及三年者不准正徳九年例其有未及三年而遇䝉恩詔父母已授本等封及父母先授外封後任京職考滿例不重封者俱照品級給與應得祭葬内外通理嘉靖二十八年例凡三品以上官有被劾致仕及先被劾冠帶閒住後奉特㫖復職者俱准照例與祭葬𢎞治十年嘉靖二十七年例若罪過昭彰公論共棄者不拘見任致仕等項俱不准給其被劾閒住遇䝉覃恩槩復致仕者亦不准給被論聽調及聽勘未明病故者務稽考其平生履歴人品髙下功罪重輕議擬奏請定奪凡公侯伯為事未經勘實身故者其妻封命雖未追奪亦從夫例止與祭一壇凡左右都督都督同知都督僉事管封事及在外總兵病故者俱祭六壇照例造葬都督同知以上不分真署一體給祭葬署都督僉事止祭一壇不得妄援凡興留正副都守俱祭一壇凡以死勤事若抗節不屈身死綱常者犯顔諫諍身死國事者執鋭先登身死戰陣者危城固守身死封疆者諸如此類開具實跡卹典取自上裁其或城池失守戰陣敗衂以致殞命者不許一槩議給萬厯十二年續定凡公侯伯掌府坐營總兵加太子太保以上者必查前項官銜因何加授果以勲勞進秩方許照㑹典公侯祭十六壇伯祭十五壇之例如係因事加恩功業未副者止照勲臣二等事例與祭七壇其有不願坐營管府懇疏乞休者查其平生有功無過俱照見任優卹凡三品以上致仕官其雅負時望懇疏乞休者照見任例給與應得祭葬如被劾致仕及考察自陳致仕者二品曾經考滿祭葬准全給未經考滿者祭照舊葬價減半三品曽經考滿祭照舊半葬未經考滿者有祭無葬四品雖經考滿亦不准祭其被劾自陳官員有日久論定原無可議者仍照例給與祭葬父母妻曽授本等封者應得卹典亦視本身致仕縁由以為差等不得濫給凡三品已上被劾聽用聽調官員祭葬俱照今擬被劾自陳致仕官遞減之例如公論已明人品無玷仍准全給聽勘未明官員有陳乞卹典者仍行原勘撫按衙門查明無礙應否量給臨時題請定奪如果有顯過為公論所不容無論聽用聽調聽勘徑照閒住例俱不准給其父母祭葬亦稽其子功過以為差等凡京官三品陞四品者不拘四品已未考滿俱照三品未考滿例祭一壇半葬父母曽授三品封者與同授四品封者止祭一壇其原以三品降調後歴陞四品者止照四品例不得妄行陳乞凡三品父母曾授本等封者無論亡故先後一視其子以為差等其已經考滿者祭葬全給未經考滿者祭一壇減半造葬凡文官二品三品共歴三年以上者雖未考三品滿其父母曽授四品五品封准與三品祭葬三品四品共歴三年以上者雖未考四品滿其父母曽授五品封准祭一壇其未經受封及止授六七品封者不得援以為例凡三品官本生父母有値覃恩乞以本身應得誥命移封者身後量給祭一壇其授二品封者量給半葬凡二品三品文臣曽經賜葬者妻故在後俱准祔葬惟授封夫人者例給開壙工價其餘不給若妻先故者除已封夫人照例祭葬外其餘俟夫故之日祔葬凡營府及總兵都督僉事止與祭四壇照品造葬其陞署都督同知者如之若由署都督僉事陞署都督同知者祭二壇減半造葬凡留守正副親軍衞分都指揮使等官贈都督同知者於本級上加祭一壇減半造葬凡三品以上文官父母曽授本等封而子先亡故者萬歴元年題准若無違礙仍與應得卹典若被罪削籍本身原無祭葬父母雖經授封亦不准給凡大臣父母先後病故者萬厯三年題准如父先以三品封給祭葬其母後封一品夫人開壙合葬者准行工部量給増造工價以足一品之數凡公侯襲爵未謝恩病故者萬厯二年議准照伯襲爵未久例與祭一壇葬凡奏請卹典萬厯元年題准兩京大臣病故應得卹典如見任公差於外者許各差撫按官勘明具奏其在家致仕養病給假等項病故者各地方有司具本官履歴縁由及病故日期申報撫按衙門覈實季終類奏中間果有行業超卓公論共推及罪過昭彰公論共棄者據實開列聽禮部議覆若大臣見在不拘見任致仕其父母妻曽授本等封病故者許照例自行陳乞其致仕在家等項子孫微弱官司一年之外不為代奏者亦許子孫自行陳乞禮部仍行撫按勘明議覆若撫按官并所屬留難者聽禮部及該科叅究以上喪葬賜諡凡議諡洪武初俱禮部奉㫖施行二十五年令禮部行翰林院擬奏請㫖凡親王諡例用一字郡王二字𢎞治十五年奏准親王行巡撫巡按等官覆勘郡王行本府親王及承奉長史等官覆勘善惡得實明白結報具奏定諡隆慶四年題准凡冐襲王爵奉㫖改正