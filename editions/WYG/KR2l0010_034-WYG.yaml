甚多諭禮部先令僧道官取勘禮部同翰林院官禮科給事中及僧道官考試能通經典方准給與正統十四年令僧道應給度牒者各僧道衙門先行勘試申送有司審係額内并籍貫明白仍試精通經典方許申送禮部覆試中式然後具奏請給景泰六年令僧道務要持行脩潔本戸丁多不係軍匠鹽竈等籍里老保結呈縣覆實具申府司類呈該部方許收度仍勘各寺觀原定額數如已數多不與出給嘉靖十八年奏准僧道照國初額設定數每僧道一名納銀十兩在内於兩京工部在外於各布政司直𨽻於各府上納類解免其赴京其兩京給度在京准二千名南京一千名三十三年題准各府州縣納解年終造􅁽連庫收繳送戸部給與號紙一張咨送禮部塡給度牒三十七年議准每名量減銀四兩隆慶六年題准禮部印發空頭度牒通行各處召納如有來京請給者赴户部納銀五兩發號紙送禮部給牒僧道禁例洪武二十年令民年二十以上者不許為僧二十四年令佛經畨譯以定者不許増減辭語道士設醮亦不許拜奏青詞各遵頒降科儀民有效瑜珈教稱為善友假張真人名私造符籙者各治以重罪二十七年令榜示天下寺觀凡歸併大寺設砧基道人一名以主差稅每大觀道士編成班次每班一年高者率領餘僧道俱不許奔走於外及交搆有司以書冊稱為題疏强求人財其一二人於崇山深谷修禪及學全真者聽三四人不許母得私剏庵堂若遊方問道必自備路費毋索取於民所至僧寺必掲周知冊驗實不同者挐送有司僧道有妻妾者許諸人趕逐相容隱者罪之願還俗者聽亦不許收留民間兒童為僧違者并兒童父母皆坐以罪年二十以下願為僧者亦須父母具告有司具奏方許三年後赴京考試通經典者始終度牒不通者杖為民有稱白蓮靈寳火居及僧道不務祖風妄為議論沮令者皆治重罪二十八年奏准天下僧道赴京考試不通經典者黜還俗年六十以上者免試永樂六年令軍民子弟僮奴自削髪為僧者并其父母送京師發五臺山做工畢日就北京為民種田及盧龍牧馬寺主僧擅容留者亦發北京為民種田十年諭禮部天下僧道多不守戒律民間脩齋誦經動輒較利厚薄又無誠心甚至飲酒食肉遊蕩荒淫略無顧忌又有無知愚民妄稱道人一槩蠱惑男女雜處無别敗壞風化洪武中僧道不務祖風及俗人行瑜珈法稱火居道士者俱有嚴禁即掲榜申明違者殺無赦十六年定天下僧道府不過四十人州不過三十人縣不過二十人限年十四以上二十以下父母皆允方許陳告有司行鄰里勘保無礙然後得投寺觀從師受業五年後諸經習熟然後赴僧道録司考試果諳經典始立法名給與度牒不通者罷還為民若童子與父母不願及有祖父母父母無他子孫侍養者皆不許有年三四十以上先曽出家而還俗及亡命黥刺亦不許寺觀住持容留違者治之宣德八年令天下有司關津但遇削髪之人捕送原籍治罪如律十年禁僧道私自簮剃及妄言惑衆者正統六年令僧道多有壞亂心術不務祖風混同世俗傷壞風化都察院即遵洪武舊例出榜禁約違者罪之天順八年令各處僧人年二十以上無度牒者即便還俗有隱瞞年歲者并其師治罪成化二十三年令僧道有父兄見存無人侍養者不問有無度牒令還俗養親嘉靖八年奏准凡宦戚施捨寺觀不許容令婦女出入及多蓄行童若有私自簮剃并犯姦者各照律例問擬清理寺觀洪武二十四年令清理釋道二教凡各府州縣寺觀但存寛大可容衆者一所併居之不許雜處於外違者治以重罪親故相隱者流願還俗者聽又令天下僧道有剏立庵堂寺觀非舊額者悉毁之三十五年令清理釋道二教凡歴代以來及洪武十五年以前寺觀有名額者不必歸併新剏者歸併如舊永樂十五年禁僧尼私剏庵院正統六年令新剏寺觀曾有賜額者聽其居住今後再不許私自剏建成化十三年禁約遊方僧人凡僧道住持勑建寺觀許二人勑賜并在外寺觀各止許一人正徳十六年奏准今後再有私剏庵院寺觀私度僧道尼姑女冠者挐問治罪寺觀拆毁入官嘉靖六年奏准尼僧道姑發還原籍出嫁其庵寺房屋土地盡數入官十四年大興隆寺燬令永不許復併大慈恩寺一應修齋俱革僧徒聽告就各寺依住有歸化者量給原寺田畆仍免差徭六年十六年題准各該有司欽遵聖諭化正僧徒願自還俗者聽其自求安便各處寺院年久宫殿任其頽壞不許修葺民間㓜童不許捨入為僧私自披剃如有此等罪其父母及其鄰佑二十二年令毁大慈恩寺萬厯元年令五城御史查各寺觀庵院有遊食僧道驅令回籍仍比照居民保甲法置立油牌開寫年貌籍貫以便稽查其有私自簮剃及不穿戴本等冠服者訪挐治罪禁止戒壇嘉靖四十五年令在外行撫按衙門督率有司各查本居僧寺若干僧徒若干明白登簿不時查㸃不到者罪坐住持立限投銷一切寄住遊僧發回原籍當差在京厰衞衙門及五城御史將京城内外地方大小僧寺嚴加巡緝有指稱受戒姦淫不法者訪挐重治萬厯元年詔禁革萬壽廣善二壇僧人戒法保舉僧道洪武二十六年令各布政司并直𨽻府州縣申呈開設僧道衙門保舉到僧人劄付僧録司道士劄付道録司考試如果中式就申吏部施行僧道罪犯𢎞治七年令僧道尼姑女冠有犯姦淫者就於本寺門首枷號一箇月滿日發落十三年奏准僧道官僧人道士有犯挾妓飲酒者俱發原籍為民若姦拜認義父母親屬俱發邊衞充軍凡僧道額外擅收徒弟者問發口外為民還俗僧道官知而不舉者罷職凡漢人出家習學畨教不論曽否關給度牒俱問發原籍各該軍衞有司當差若漢人冐作畨人發邊衛充軍尼姑女冠洪武六年令民家女子年未及四十者不許為尼姑女冠真人名號洪武中革前代所稱天師止稱正一真人隆