body:
  text: 禮部志稿卷三十五明俞汝楫編主客司職掌朝貢國初諸番國及四夷土官朝貢具載職掌其後募化者衆事例日増土官衙門添設别見兵部而事闗朝貢者附此東南夷見祖訓及職掌凡二十國祖訓例不征諸夷朝鮮日本大小琉球安南真臘暹羅占城蘇門荅剌西洋瓜哇彭亨百花三佛齊浡泥凡十五國職掌所載又有瑣里西洋瑣里覽邦淡巴須文達那諸國與祖訓稍有不同洪武初分遣使臣奉詔往諭諸番以平定四海之意多隨使來朝貢者八年諭安南髙麗占城等國每三年一朝貢國王嗣立則世見永樂中數有事於西洋遣中使以舟師三萬齎金帛諭賜之隨使朝貢者十有六朝鮮國祖訓朝鮮國即髙麗其李仁人及子李成桂今名旦者自洪武六年至洪武二十八年首尾凡弑王氏四王姑待之按髙麗併有扶輿新羅百濟其國分八道洪武二年國王王顓遣使奉表賀即位請封貢物詔封為髙麗國王賜龜紐金印詔命五年以髙麗貢使煩數諭令三歳或歳一來二十五年李成桂代王氏請更其國號詔更號朝鮮永樂初賜印誥自後每歳聖節正旦嘉靖十年外夷朝正旦者俱改冬至皇太子千秋節皆遣使奉表朝賀貢方物其餘慶慰謝恩無常期若朝廷有大事則遣使頒詔於其國國王請封亦遣使行禮其歳時朝貢視諸國最為恭慎嘉靖二十六年特許其使臣同書狀官及從人二三名於郊壇及國子監遊觀禮部劄委通事一員伴行撥館夫防護以示優異云貢道由鴨綠江歴遼陽廣寧入山海闗達京師又中國漂流人口至本國者量給衣糧送回先是永樂元年其國王具奏世系不係李仁人之後以辨明祖訓所載弑逆事詔許改正正徳嘉靖中屢以為請皆賜𠡠奬諭焉萬厯三年使臣復申前請詔付史館編輯今録於後李成桂系出本國全州逺祖翰仕新羅為司空六代孫兢休入髙麗十三代孫安社生行里行里生椿椿生子春是為成桂之父李仁人者京山府吏長庚裔也始王氏恭愍王顓無子養寵臣辛盹子禑為子恭愍王為嬖臣洪倫等所弑仁人當國誅倫等立禑禑嗣位十六年遣將入犯遼東成桂為副將在遣中至鴨緑江與諸將合謀回兵禑懼傳位於其子昌時恭愍妃安氏以國人黜昌立王氏孫定昌君瑶誅禑逐仁人已而瑶妄殺戮國人不附共推成桂署國事表聞髙皇帝命為國王遂更名旦贍瑶别署終其身貢物金銀器皿螺鈿梳函白綿紬各色苧布龍文簾蓆各色細花蓆豹皮獺皮人參黄毛筆白綿紙種馬每三年五十匹近有加貢不在種馬之數日本國祖訓日本國雖朝實詐暗通奸臣胡惟庸謀為不軌故絶之按日本古倭奴國世以王為姓其國有五畿七道及屬國百餘時冦海上洪武五年始令浙江福建造海舟防倭七年其國王良懐遣僧朝貢以無表文却之其臣亦遣僧貢馬及茶布刀扇等物以其私貢却之又以頻年為冦令中書省移詰責自後屢却其貢并安置所遣僧於川陜番寺十四年從其請遣還十六年築登萊至浙並海五十九城二十年築福建並海十六城各置衞所永樂初復來朝貢賜龜紐金印誥命封為日本國王名其國鎮山曰壽安鎮國之山御製碑文賜之給勘合百道始令十年一貢貢道繇浙江寧波府每貢正副使等毋過二百人若貢非期人船逾數夾帶刀鎗並以冦論宣徳初遣貢不如約諭使臣自今貢毋過三船人毋過三百刀劒毋過三十嘉靖六年奏準凡貢非期及人過百船過三多挾兵器皆阻回二十九年定日本貢船每船水夫七十名三船共計水夫二百一十名正副使二員居坐六員土官五員從僧七員從商不過六十人三十年後時入冦掠自是朝貢未有至者貢物馬盔鎧劒腰刀鎗塗金裝綵屏風灑金厨子灑金文臺灑金手箱描金粉匣描金筆匣抹金銅提銚灑金木銚角盥貼金扇瑪瑙水晶數珠硫黄蘇木牛皮琉球國祖訓大琉球國朝貢不時王子及陪臣之子皆入太學讀書禮待甚厚小琉球國不通往來不曾朝貢按琉球國有三王洪武初中山王察度山南王承察度山北王帕尼芝皆遣使奉表箋貢馬及方物十六年各賜鍍金銀印二十五年中山王遣子姪入國學以其國往來朝貢賜閩人三十六姓善操舟者永樂以來國王嗣立皆請命册封後惟中山王至中山世稱尚氏諭定二年一貢每船百人多不過百五十人貢道由福建閩縣貢物馬刀金銀酒海金銀粉匣瑪瑙象牙螺殻海巴擢子扇泥金扇生紅銅錫生熟夏布牛皮降香木香速香檀香黄熟香丁香蘇木烏木胡椒硫黄磨刀石右象牙等物進收硫黄蘇木胡椒運送南京該庫馬就于福建發缺馬驘站走遞磨刀石發福建官庫收貯安南國祖訓安南國三年一貢按安南國古交趾地洪武二年其國王陳日煃遣使朝貢請封詔封為安南國王賜鍍金銀印誥命未至而日煃卒以封其弟日焜後其臣陳叔明專黎季犛篡位俱降詔詰責季犛詭言陳氏無後請署國事已而日煃弟天平來訴季犛又詭迎天平還國伏兵殺之永樂四年發兵討平殍季犛父子郡縣其地尋有季擴之亂甫定而黎利復叛宣徳間遣使謝罪請命因宥而封之嗣後朝貢如常别有進中宫東宫方物其餘慶慰謝恩無常期朝廷有大事則遣使頒詔於其國國王請封亦遣使行禮嘉靖十九年其臣莫登庸篡立發兵討之明年登庸降詔革王封止授都統使其所轄海陽等十三路各改設安撫司毎司設安撫一員同知一員聴自行陞黜遇朝貢之年以陞黜過官員總數奏聞後登庸子莫福海嗣朝貢不常萬厯四年都統使莫茂治遣使慶賀并補貢二次九年復來貢亦補二次貢道由廣西憑祥州貢物金銀器皿犀角象牙白絹薫衣香降真香沈香速香木香黒線香紙扇真臘國真臘本扶南屬國其國濱海後并有扶南洪武四年其國巴山王忽兒那遣使貢方物賀正旦六年復來貢貢道由廣東後朝貢不常貢物象象牙犀角孔雀翎寳石土降香蘇木烏木黄花木胡椒黄蠟暹羅國國濱海本暹與羅斛二國後併為一洪武四年其國王參烈照毘牙遣使奉金葉表來朝貢方物賀正旦六年參烈寳毘牙復遣貢并獻其國地圖十年遣人齎詔及印往賜之十六年給文册永樂元年遣使乞量衡為國中式自後定三年一朝貢貢道由廣東萬厯七年遣使具金葉表文入貢貢物象象牙犀角孔雀尾翠毛龜筒六足龜寳石珊瑚金戒指片腦米腦糠腦腦油臘柴檀香速香安息香黄熟香降真香羅斛香乳香樹香木香烏香丁香薔薇水碗石丁皮阿魏紫梗藤竭藤黄硫黄没藥烏爹泥肉荳蔲胡椒白荳蔲蓽茇蘇木烏木大楓子苾布油紅布白纒頭布紅撒哈剌紅地紋節智布紅杜花頭布紅邊白暗花布乍蓮花布烏邊葱白暗花布細棋子花布織人象花文打布西洋布織花紅絲打布織雜緑打布紅花絲手布剪絨絲雜色紅花被面織人象雜色紅花文絲縵占城國祖訓自占城以下蘇門荅剌西門𤓰哇彭亨百花三佛齊浡泥諸國來朝時内帶行商多行譎詐故沮之自洪武八年沮至洪武十二年方乃得止焉按占城國濱海即古越裳林邑洪武二年其國王阿荅阿者遣使朝貢詔封為占城國王賜鍍金銀印四年遣使奉金葉表文朝貢十六年復遣子來賀聖節乃齎與勘合文册二十四年復來朝貢以其臣弑立命絶之永樂後其國與諸國皆來朝貢始定三年一貢貢道由廣東正統後其國襲封遣使行禮貢物象象牙犀犀角孔雀孔雀尾橘皮抹身香薫衣香奇南香金銀香土降香燒碎香檀香柏香花藤香龍腦烏木蘇木花棃木蕪蔓番沙紅印花布油紅綿布白綿布烏綿布圖璧花布花紅邊縵番花手巾雜色縵番花手帕兠羅錦被洗布白泥𤓰哇國國濱海即古闍婆有東西二王洪武五年其國王昔里八達剌八剌蒲遣使奉金葉表貢方物并納元所授宣𠡠十四年來貢如初有黑奴三百人後絶其貢永樂二年其國東王孛令達哈遣使朝貢請印賜鍍金銀印五年西王都馬板滅東王遣使謝罪正統八年令三年一貢後朝貢無常期貢物火雞鸚鵡孔雀孔雀尾翠毛鶴頂犀角象牙玳瑁龜筒寳石珍珠薔薇露奇南香檀香麻藤香速香降香木香乳香黄熟香安息香烏香龍腦丁皮没藥肉荳蔲白荳蔲藤竭血竭蘆薈阿魏大楓子番木鼈子蓽澄茄蓽茇悶蟲藥黄蠟番紅土烏爹泥金剛子碗石錫西洋鐵摺鐵刀鐵鎗苾布油紅布蘇木烏木胡椒彭亨國國濱海洪武十一年其王麻哈剌惹荅饒遣使奉金葉表貢番奴及方物永樂十二年復遣使朝貢貢物金水罐象牙乳香速香檀香片腦胡椒百花國國居海中洪武十一年其王剌丁剌者望沙遣使奉金葉表朝貢貢物白鹿紅猴龜筒玳瑁孔雀鸚鵡倒掛鳥胡椒香蠟三佛齊國國居海中即舊港本南蠻别種有地十五州洪武初其國王怛麻沙那阿者稱臣入貢四年遣使奉金字表朝賀六年遣賀正旦貢方物八年復遣使從招諭拂菻國十年其子麻那者巫里嗣立奉表請封遣人齎駝紐鍍金銀印賜之貢物火雞五色鸚鵡孔雀龜筒黒熊白獺諸香米腦苾布兠羅錦被胡椒肉荳䓻番油子浡泥國國居海中本屬闍婆有地十四州洪武四年其國王馬合謨沙遣使以金表銀箋貢方物永樂三年遣使往封麻那惹加那乃為王給印誥𠡠符勘合六年王率其妃及家屬陪臣來朝至福建遣中官往燕勞之令所過諸郡設宴至京王奉金字表獻珍物妃箋獻中宫東宫上御奉天門賜王宴是年王卒於㑹同館輟朝三日祭賻甚厚詔諡恭順賜葬南京城外石子岡以西南夷人隸籍中國者守之樹碑立祠命有司春秋致祭封其子遐旺嗣遣中官及行人䕶送歸國復從其請封其國後山為長寧鎮國之山御製碑文賜之十二年及洪武熈元年俱來朝貢貢物單目用銀五色鸚鵡倒掛鳥孔雀鶴頂犀角熊皮生玳瑁龜筒寳石珍珠金戒指金縧環金銀八寳器梅花龍腦米腦糠腦降香沈速香檀香丁香肉荳䓻黄蠟螺殻西洋白布黒小厮須文達那國洪武十六年其國王殊旦麻勒兀達朌遣使奉金葉表來貢貢物馬幼苾布隔著布八的方布花滿直地番綿紬直地兠羅錦撒剌八幼賴隔著撒哈剌薔薇水降香沈速香蘇門荅剌國國濱海永樂三年其酋長宰奴里阿必丁遣使朝貢誥封為國王給印誥五年至宣徳六年屢遣使來貢表用金葉十年復請封其子為王或曰即須文達那國貢物馬犀牛龍涎寳石瑪瑙水晶石青回回青錫硫黄番刀弓梭眼木香丁香降真香沈速香胡椒蘇木西洋瑣里國國濱海近瑣里視瑣里差大洪武三年其國王别里提遣使奉金葉表貢方物永樂元年復遣使朝貢貢物黄黒虎馬兠羅綿被漫折的花被皮剔布槁泥布沙馬打泥布瑣里國西海中小國洪武五年其國王卜納的遣使奉金葉表貢方物并圖其地山川以獻貢物馬紅八者藍布紅撒哈剌覬木里布紅番布白苾布珠子項串覽邦國洪武九年國王昔里馬哈剌扎的剌扎遣使奉表來貢永樂宣徳中附隣國貢方物貢物馬孔雀胡椒蘇木檀降香淡巴國在西南海中洪武十年國王佛喝思囉遣使奉表朝貢貢物苾布兠羅錦被沈香檀香速香胡椒蘇禄國國在東南海中永樂十五年葛禄東國巴都葛叭荅剌西國麻哈剌吒葛剌麻丁峒妻叭都葛巴剌卜各率其屬三百餘人奉金鏤表朝貢各賜印誥封為其國王三王者東王為尊西峒二王副之東王歸次徳州卒賜祭命有司葬以王禮御製碑文留其妃妾傔從十人守墓三年還國𠡠諭其子都麻含封為東王十九年遣使來貢貢物梅花腦米腦竹木綿花玳瑁降香蘇木胡椒蓽茇黄蠟番錫古麻剌國國在東南海中永樂十八年國王斡剌義亦敦奔率妻子及陪臣來朝貢方物請封給印誥仍其舊號行至福州卒詔謚康靖𠡠葬閩縣令有司歳致祭古里國古里大國西洋諸番之㑹永樂三年其酋長沙來的遣使朝貢𠡠封為古里國王給印誥