放一千人十年六千人準放二千人至京者以五百人為率貢道皆由大同入居庸正徳中衛喇特西徙與土魯番相讐殺小王子復强小王子三子長阿爾婁其後為圖們汗次阿珠次摩古津阿爾婁為太師額伯爾所弑二子博恰伊爾們皆幼阿珠稱小王子未幾死衆立博恰稱伊克汗而額伯爾部從濟囊居套和碩部從諳逹居漠婁巴圖住牧宣府塞外與濟囊子濟農東西出没並聴諳逹調度濟嚢諳逹婁巴圖皆阿珠子而諳逹最强嘉靖間犯邊無寧歳遂絶其貢至隆慶中復款貢為順義王貢物馬駝貂䑕皮海青順義王嘉靖間濟囊駐牧河套近延寧諳逹近大同山西婁巴圖近宣府各衆十餘萬時時冦邊二十九年諳逹入犯薄都城脅求通貢不許隆慶四年諳達孫巴罕鼐濟來降詔授官職厚撫之諳達屢請不得遂執拜甡叛人趙全等以獻請贖還鼐濟因乞封貢許之乃封諳逹為順義王賜勅印令約束諸部落其弟婁巴圖其子黄台吉等并各部皆授以都督指揮千百戸等官每年一貢以二月為期由小王子故道馬不過五百匹内選上馬三十匹督撫代進餘留邊給軍使人不過一百五十名俱留大同應得賞賜差官齎發軍門頒給五年套部濟嚢子濟農因諳逹求貢詔授濟農都督部下頭目量授指揮千百戸每年貢馬二百匹内選上馬二十匹送宣大軍門類進餘馬及使人二十名俱留延寧賞賜亦差官齎給仍許開市諸部貢者六枝一婁巴圖後為青巴圖台吉等一黄台吉等今為齊哩克等一永實卜岱青台吉等一烏蘓逹爾罕台吉等一呼喇濟巴圖爾台吉等一濟農後為巴圖爾黄台吉等今為布斯圖阿布哈等皆統於順義王諳逹開市凡十一處在大同者三曰得勝口曰新平曰守口在宣府者一曰張家口在山西者一曰水泉營在延綏者一曰紅山寺堡在寧夏者三曰清水營曰中衞曰平虜衞在甘肅者二曰洪水扁都口曰髙溝寨歳以為常市各二日每月又有小市六年貢市部人一百五十三名萬厯元年増至四百五十三名二年増至五百五十七名題準行該鎮督府量加節制諳逹死黄台吉嗣王更名徹辰汗齊哩克貢物馬􅛸金鞍轡撒袋達弓雕翎箭諾延衞福餘衞泰寧衞烏梁海即古山戎後稱庫莫奚在烏龍江南漁陽塞北元時為大寧路北境國初設北平行都司洪武十四年以大寧地封子權為寧王二十一年東夷遼王惠寧王諾延元帥府元帥等各遣使來朝二十二年乃分烏梁海為三衞于横水之北曰諾延曰福餘曰泰寧以處降人授指揮使等官各賜以冠帶俾領所部成祖靖難時寧王權從南下時諾延三衞各以其兵從有戰功永樂元年三衞來朝益求内附因改封寧王于南昌移行都司於保定而以大寧全地與之授都督都指揮指揮千百户鎮撫等官各賜勅書每襲則更勅有功則加陞入貢者以勅為騐自是襲陞朝貢不絶嵗以聖節及正旦後改冬至兩貢每貢各衞百人由喜峰口入貢物駝馬西戎自陜西蘭州渡河千五百里至肅州肅州西七十里為嘉峪闗外並稱西域而陜西以南並四川抵雲南外徼並稱故元遼王七衞曰哈密曰安定曰安圖曰齊勤䝉古曰察遜曰罕都罕都左皆曰闗西而哈密又最西永樂十三年遣使往諭西域歴十有七國其後土魯番强占據哈密闗西諸衞皆為所侵擾西番地為都指揮使二指揮使司一宣慰使司三招討司六萬户府四千户所十七又於洮河西寧各置茶馬司以通貿易國初令各酋長故有官職者至京授職俾因俗為治至今因之哈密輝和爾附哈密古伊吾廬地在燉煌北大磧外為西域諸番往來要路其國部落與回回輝和爾三種雜居非貴俗不相下永樂二年以封元裔額爾克特穆爾為忠順王而授其頭目瑪哈瑪特浩齊等為指揮等官分居苦峪城忠順王數世襲封賜金印誥命領西域職貢而三種各立都督以佐之諸番貢使皆繇哈密譯送成化元年令哈密每年一貢以八月初旬驗放入闗多不過三百人内起送三十人赴京九年以後及𢎞治正徳間數被土魯番驅掠朝廷每遣大臣經畧還其金印城池復立酋長然驅掠如故嘉靖八年定每貢不必拘三百之數止據到數十人起送二人前起貢回盡數出闗後起方許入闗十一年定五年一貢每貢不過一百人起送不過三十人四十二年定哈密輝和爾都督俱五年一貢每貢三十人起送十三人餘留邊聴賞貢物馬駝玉斯隆瑪石青金石把咱石金剛鎖梧桐鹻鐵器諸禽皮等物安定衞安定韃靼别部洪武七年西域安定王布延特穆爾遣使來朝貢鎧甲刀劒等物因立其酋長為四部各賜印曰鄂端曰阿榮曰庫克新曰特哩而賜布延特穆爾銀印仍稱安定王八年設安定鄂端二衞指揮使司分統四部天順三年𢎞治十一年俱遣使來貢駝馬罕都衞齊勤䝉古罕都罕都左二衞皆在沙州本西戎部落洪武三十年設以其部長索諾木䇿喇實為指揮僉事永樂二年來貢陞指揮使齊勤䝉古西戎月氏國永樂二年故韃靼丞相子塔爾尼來歸因設齊勤䝉古千户所以為千户尋陞為衞塔爾尼為指揮各賜印詔宣徳以來朝貢不絶嘉靖四十二年定五年一貢每貢三十人起送十三人赴京餘留邊聴賞貢物馬駝梧桐鹹察遜衞察遜亦西戎部落永樂四年設衞以其部長薩竒蘓為指揮同知正徳二年遣使朝貢哈里哈克繖哈喇婁薩爾滿喀什噶爾哈努勒薩哩木薩蘭額爾巴拉亦云巴實伯哩摩和勒博迪蘇巴勒赫阿哩瑪圖沙瑪綽爾齊斡齊爾布哈爾保喇實喇斯尼沙布爾和斯摩哩塔布喇實古薩克蘓和坦和卓庫克新沙津哈雅約希雅爾哈戎巴雅爾阿克蘇鄂端伊遜展庫徹沙克巴延克結西戎三十八國朝貢皆經哈密其貢期或三年或五年一次起送不過三十五人哈里洪武三十五年遣使招諭賜織金文綺永樂七年正統二年俱遣使來朝貢馬及玉石額爾巴拉洪武二十四年遣使來朝貢馬永樂四年