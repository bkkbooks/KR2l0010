body:
  text: 禮部志稿卷九十八明俞汝楫編隆典備考誥勑文武官誥命制洪武六年詔定文武官誥命制度禮部尚書牛諒侍講學士宋濂等曰前代仕於朝者必有封贈施恩之典既封贈則必給以誥命所以上榮其祖考下及其子孫也卿等宜稽古詳定其式於是諒等奏考唐宋誥命皆繇三省官列銜書名復用吏部吿身等印章本朝誥勑既用御寳則省臣不敢署見造誥勑花樣籖軸制度俱有等第不須改作又宋紹興年間工部言官誥院所用綾紙易以偽冒乞下文思院别織一體花樣専充官誥今議於誥尾添織某字第幾號以為關防及取工部神帛制勑局已造完誥命書寫用寳頒於文武官從之其制公侯一品至五品誥命六品至九品勑命公侯及一品誥軸用玉伯子男及二品用犀五品以下用角因子推恩給原官誥成化四年給致仕禮部右侍郎倪謙誥命從其子編修岳之請也岳三年考滿例得推恩吏部持之不行岳上奏自陳詔下其章於吏部尚書李秉等言謙先任學士時曾犯贓罪充軍原授本身并封父母妻誥勑俱已追奪焚毁後雖遇赦陳情復職及陞任致仕閒住終係犯贓之人於例難以推封上曰謙已陞任致仕因子推恩亦何不可其與之不為例券誥定功臣鐵券洪武二年上欲封功臣議為鐵券以賜之而未有定制有言台州民錢允一呉越忠肅王繆之裔家藏唐昭宗所賜鐵券遂遣使取之準其式而加損益其制如瓦第為七等公二等其一髙一尺廣一尺六寸五分其一髙九寸五分廣一尺六寸侯三等其一髙九寸廣一尺五寸五分其一髙八寸五分廣一尺五寸其一髙八寸廣一尺四寸五分伯二等其一髙七寸五分廣一尺三寸五分其一髙六寸五分廣一尺二寸五分外刻履歴恩數之詳以記其功中鐫免罪減禄之數以防其過字嵌以金為副九十七副各二分為左右左頒諸功臣右藏内府有故則合之以取信仍以舊券還允一賜而遣之勲封功臣祖父母封爵洪武四年戊辰命中書省定功臣祖父母封爵禮部言古者封爵有五曰公侯伯子男如父封某國公某侯某伯者母封某國夫人某侯夫人某伯夫人未授封爵應封贈者父母以子貴妻從其夫祖降父一等曾祖又降一等並依品級授散官職事從之詔定公侯稱號洪武十三年詔定公侯稱號上諭禮部臣曰自今封公侯不必加以散官已授券誥者且仍其舊若追封公侯生前曾佩將軍印者仍列於銜於是禮部奏定其式為三公侯之銜曰開國輔運推誠宣力武臣某公某侯食禄若干石世襲者曰世襲某公某侯食禄若干石追封者曰開國輔運推誠宣力武臣某將軍某公某侯追封某王某公諡某封贈定嫡妾封贈例洪武十五年廣東都指揮使狄崇王臻言妻阮氏等封淑人已殁仍乞封次妻何氏等為淑人詔下廷臣議太師韓國公李善長及禮部等官議曰禮莫大於分分莫大於名妾不可為嫡夫人故魯莊公妾成風僖公母也稱為夫人春秋非之哀公庻子荆之母嬖將以為夫人使宗人亹夏獻其禮對曰無之昔周公武公娶於薛孝惠娶於商自桓以下娶於齊此禮則有若以妾為夫人則固無其禮蓋古者夫人殁貴妾攝其家事不為稱夫人若庻子而貴得以推恩其母亦不得稱夫人使並嫡也今崇臻欲任私意廢大禮亂嫡妾之分不可許上從之遂命禮部及翰林院儒臣定嫡妾封贈例頒示中外於是定議凡正妻在日所娶例室皆謂之妾正妻殁諸妾不許再立為妻若以禮聘良家女子為妻許封贈前妻無子其所生子即為嫡長子若正妻在日無子不再娶而諸妾有子者當以長男襲父職其子依本品職推恩其母俱從之所繼所生並封洪武十八年濟南衛指揮使何誠言早失父母其伯父養以為嗣例應承重而所生父母先已受封復乞推恩伯父以報養育之恩事下禮部議援宋右僕射李昉為叔承重既封贈其叔復贈其所生以為言上命依所請定軍官替襲封贈洪武二十四年丙寅命禮部翰林院議軍官姪男替襲叔伯職事及弟襲兄職養子女壻承襲養父妻父封贈禮制議姪男替襲伯叔父職事者與人後同止合封贈伯叔父母本生父母不在封贈之例弟襲兄職者若兄原襲父祖職事再又立功陞授者亡後親弟襲其職事如當封贈原其本止合封贈父祖如是兄自立功得官不因父祖承襲亦止合推恩父祖追贈兄嫂古無此典若軍官沒於王事者褒贈二等死於鋒鏑者褒贈三等養父從軍為官養子承襲職事隨養父姓者封贈所養父母出姓者止於脚色内寫養父歴官功績不須封贈若本官以後自立功績陞授職事許封贈本官親父母若養父從軍充總小旗先鋒養子代役以後自授官職隨養父姓者封贈養父母出姓者封贈親父母妻父從軍為官女壻承襲職事當封贈妻父母若因妻父從軍充總小旗女壻代役以後自授官職者當封贈本身父母議上從之議定繼嫡母生母封贈永樂元年命禮部翰林院議廣平侯袁容繼嫡母生母封贈事先是禮部言國朝諸司職掌内載凡嫡母在所生之母不得封嫡母亡得並封贈武官例又云繼嫡母在所生庻母不封嫡繼母亡所生母在宜如其子職封繼母見在嫡母已亡合封繼母追贈嫡母嫡母及所生母俱亡止贈嫡母今廣平侯袁容嫡母孫生母劉俱亡獨繼嫡母羅在而封贈事例不同上命禮部與翰林院議禮部官同翰林院侍讀學士解縉等議若所生母與繼母俱在禮難並封今繼母在當封所生母并嫡母俱亡亦可一體追封從之仍命後不為例於是封其繼母羅氏贈其嫡母孫氏生母劉氏皆為夫人乞推封特恩天順六年禮部郎中俞欽父廷獻奏臣田野農民先以子貴荷蒙推恩封為主事今子進秩郎中臣又例得加封雖粉骨碎身曷繇報補竊念臣父用貞年幾九十氣息奄奄朝不保暮無繇沾恩臣獨屢蒙恩典心何敢安伏望皇上施仁孝之洪恩憐烏鳥之私情免加封臣移封臣父俾得生沾冠帶之榮臣父子子孫不勝感激之至疏聞上謂吏部臣曰此人子之至情予之冠帶後不為例廕敘胄子先令入鄉較景泰三年國子監祭酒劉鉉言國子監生徒必繇鄉選嵗貢而後得齒其中今朝廷念死事之臣特許令一子入監往往初離襁褓尚在羈邜洒掃應對之事且未能知況可教以修齊治平之事乎宜遣其姑就學於家及年稍長然後赴監令肄習一經或通書算一藝然後許其以次出身於是禮部請令年十五以上者留監肄業十五以下者遣囘從之申飭胄子入監條天順元年十月禮部奏朝廷設國子監所以儲養天下科貢之士以備任用近年内外官員子孫多有敷敘父逺年事功希求入監名雖補報朝廷實則茍倖進取宜勑自後京官三品以上子孫願入監讀書者聽然必責其科目出身其四品以下子孫不許上曰國子監乃育才之地其可濫進豢養之子以啓奔競之風禮部言是宜申禁之裁處胄監濫進天順四年禮部奏舊例三品以上官員子孫許令入監近者故尚書古樸之孫約侍郎蘇瓚之孫晟俱援例求入監有㫖不準今右副都御史韓福亦援例乞令其孫景入監讀書未敢裁處上曰國子監是育才之地不可濫進今三品以上子孫奏入監者俱不許定三品以上官胄監成化二年命在京三品以上官子孫各一人入監讀書先是國子監助教李伸上言欲䕃大臣之子事下廷議以為爵以待賢理不可濫教養之法義不可闕宜如舊制三品以上官子孫方聽一人入監讀書禮部為上其議故有是命廕敘廕敘入監成化四年四月戶科給事中李森言在京三品以上子孫生於貴族鮮克繇禮乞停其入監之例上曰先王之政仕者世禄京官仕至三品以上蓋亦積歴久而勞著矣朝廷録其子孫一人入監固未為過矧祖宗明有故事乎李森昧於古訓持論刻薄不體朝廷忠厚之意朕所未諭但古者賞延於世所以報有功自今三品以上非歴任年久政績素著者不許濫敘其子孫庻幾人知所勸成化二十一年十月故南京刑部右侍郎陳儼子昶援例乞為國子監生上不許且勑所司今後大臣子孫乞恩入監須審其父祖歴任久而政聲著者方許奏聞再賜録廕成化十九年二月監察御史鍾同在景泰時以直諫死英宗復位追贈大理寺丞録其長子起為國子監生至是其妻羅氏復自陳貧寠乞以次子越入監上曰同死於忠義先帝愍之雖以䕃子未足以為忠義之報其再賜越一命仍勑有司月給羅氏米一石以終其身申明廕敘優典成化二十年禮部尚書周洪謨等奏近例文職三品以上歴任年深者得遣一子入監讀書後復奉㫖三品以上官果有政聲顯著者許一子自陳禮部仍依諸司職掌考試有能通經書大義者方許入監否則發囘原籍為民毋概奏擾伏覩諸司職掌所載廕子之法二品官之子該授六品職三品官之子該授七品職考試本經或四書能通大義者即得授官今乞恩入監者自坐班歴事聽選通計十七八年方得授官今又加以考試之嚴則人皆畏懼不敢乞恩有孤朝廷盛典故自成化三年再開恩例之後迄今一十八年大臣之子入監者不過六十餘人乞仍依舊例凡大臣已經考滿準給誥命者許一子自陳本部審其子可教者奏請送監作養庻大臣之子均荷造就之典得預敘用之例奏上從之奉使殁者敘廕𢎞治七年三月刑科給事中林霄成化中奉詔使暹羅殁於其國至是其子菲援例乞讀書國子監以自効上曰以死勤事古人所恤林霄奉使殁於萬里之外情亦可憫其子菲奏欲送監讀書非尋常濫乞恩澤者比特允之廷議廕敘例正徳六年吏科都給事中楊褫言大臣三品以上三年考滿例得廕子近年士風漸靡雖政績無聞屢被劾者亦自陳乞有傷治體請勑該部於考滿時㕘酌輿論否可取自上裁有被効得實及年逺違例奏擾者治以罪或人品才望素著亦被劾者具實以聞吏部尚書楊一清等議覆自今兩京三品以上官考滿復職給誥命者本部查其履歴詢其行實果堪廕録移咨禮部奏請其曾被劾或雖未被劾而素譽有虧及雜流出身者俱不得與至於身後䘏恩子孫陳乞者贈官繇本部查議而其諡號葬祭禮部亦須先㑹本部議其人品資望方與具奏若庸碌無補及屢被劾者俱已之間冇人品才望素著雖嘗被劾或因一事之失或出一人之見不致虧損名節者該本各具實奏請定奪見任者不許輙自陳乞其被劾得實去職及故久大臣子孫違例妄奏者罪之議上既得俞㫖禮部尚書傅珪等奏駁之曰廕子入監葬祭諡號乃本部職掌今欲預定恩廕子考滿到部之時先議諡號葬祭於禮部具奏之始與職掌㑹典并見行事例不合又廕子不許自陳乞與例亦不相同即如其說既經考稱復職又已請給誥命則其人之賢可知矣旋又察其歴履詢其行實不免有髙下其手之嫌葬祭請諡俱有定法行之已久今必先行吏部㑹議方與查例不免有往來移文之擾況每遇前項事務必待該司查報至日然後具奏吏部又未嘗不與知也其陳乞之舉固為可厭必欲一槩禁之似又難行蓋春宫侍從者多論功於既沒之後不得不陳奉使海外者多非三品之官不得不陳至於補廕之子繼嗣之子及三品以上應得恩典而沒未久者不得不陳但當罪其違例陳乞者其餘事宜仍舊屬之禮部其稱間有人品才望素著或因一事之失或出一人之見而被劾者該部各具實奏請此雖舊制所無而處置得宜則其可行者也乃從珪所議既而一清又以諸司職掌廕敘列司封部下為言得仍前㫖適侍郎王瓊乞廕子入監吏部為覆請珪復爭曰言官建白吏部覆議皆謂大臣不自陳乞瓊乃大臣自乞者而吏部又為之請殊戾前奏且禮部掌行廕敘已數十餘年莫有非之者何至今日改之且職此條特官廕官非為廕子入監言也豈有國子監既屬禮部而其事有不屬者乎竟令吏部掌行之是時一清方柄用珪卒為所軋然其是非固自有在也援講讀恩追廕正德十年復廕故禮部尚書兼翰林院學士彭華次子勉肇為國子生先是華嫡孫師丙巳廕為中書舎人至是勉肇復援春宫講讀恩例乞廕特與之廕外補廕嘉靖元年廕禮部尚書劉春子延年中書舎人仍補廕一人入監讀書春嘗二品滿考又為經筵講官東宫講讀者數年其子主事彭年援例以請故有是命軍功後裔補廕嘉靖二年故西華縣知縣李景以死事廕子子尋死孫熙請補廕禮部議軍功無補廕例但事係勸忠似當優處許之補廕二次例嘉靖七年補廕禮部尚書張駿孫張元博俱為國子監生初駿已廕子張珂因鄉試中式補廕次子張珩復病故援尚書屠勲廕子中科二次補廕事例以請許之問勞優老臣成化七年八月監察御史梁昉言致仕南京吏部尚書魏驥德望素著白首一節今年九十有八而福履康寧近代罕有宜特加優禮上覽奏嘉之特諭禮部曰尚書魏驥年及百齡兼有徳望朕甚嘉悅其即遣行人奉勑存問并賜羊酒仍勑有司月給米三石贍其終身以表朕優老之意優耆夀成化二十二年八月韓王僣􅏦奏羣物所千戶朱政曾祖信年一百八嵗而終祖全一百二嵗父鏞八十二嵗俱正千戶致仕一門同享髙夀古今希有誠世之上瑞國之休徴乞賜褒嘉以敦養老之禮上曰老夀之人禮所宜厚矧在一門尤不易得有司宜勞羊酒全階為宣武將軍賜米二石布二疋問勞眉夀嘉靖八年詔書内開文職官員五品以上致仕在家實年六十以上者各進階一級其二品以上致仕大臣年八十者有司備綵帛羊酒問勞九十以上者具實奏來存問嘉靖十八年十二月該浙江紹興府知府湯紹恩等奏稱致仕南京工部尚書陳雍夀躋九十乞要優禮本部查照大學士毛紀例覆題奉聖㫖陳雍累朝舊臣年登九袠徳夀可嘉賜以羊酒就着浙江廵按御史及門存問仍月給食米二石歲撥人夫二名欽此嘉靖三十三年十月該廣東廵按御史郭文周等題稱原任南京兵部尚書湛若水學問師古標望絶人致政居家夀躋九十乞要存問本部查照陳雍舊例覆題奉聖㫖是欽此嘉靖三十八年正月該少傅兼太子太傅武英殿大學士徐等題大學士嚴年登八十實未常有伏乞聖慈特賜加恩等因奉聖㫖卿等說的是嵩髙年佐朕愈盡忠勤贊事上𤣥竭力匪懈宜有褒嘉著歲支伯爵俸銀一百兩彩段八表裏仍宴於禮部該衙門奉行欽此又該本部題為内閣輔臣躋八十乞加優禮以彰國典事今大學士嚴年八十歲見居首輔實我皇上眷遇之隆委任之重尤曠古所稀有乃今多歴年所介茲祺夀又熙朝所罕見此豈偶然者哉蓋繇上天眷佑我皇上緝熙純嘏萬夀無疆是以有此忠誠不懈夀耉難老之臣光輔聖治真所謂千載一時明良之盛㑹也等因奉聖㫖是已加恩奬還賜新鈔八千貫羊四隻酒四十瓶該衙門知道欽此寵錫賜坐墩式洪武三年七月禮部尚書崔亮奏定皇太子以下及羣臣賜上殿坐墩之制參酌宋典各為等差其制皇太子以青為質綉蟠螭雲花為飾親王亦如之宰相及一品以赤為質飾止雲花二品以下蒲墩無飾凡大朝㑹錫宴文官三品以上武官四品以上上殿者賜坐墩其朝退燕閒及行幸處則中書省大都督府二品以上臺官三品以上及勛舊之臣文學之官賜坐者仍加絨剡綉褥命如其式製之教養將胄入監洪武五年上以將官子弟因年少驕佚故承襲者多不稱職乃命其子弟年幼者入國子學讀書稍長令隨班朝參以觀禮儀退出令習弓馬學武事待其可用然後官之髙麗生入太學洪武五年髙麗王王顓遣密直同知洪師範鄭夢周等奉表賀平夏貢方物且請遣子弟入太學其詞曰秉彛好徳無古今愚智之殊用夏變夷在禮樂詩書之習故我東夷之人自昔以來皆遣弟子入太學不惟知君臣父子之倫亦且仰聲名文物之盛伏願皇仁察臣向化之誠使互鄉之童得齒虞庠之胄不勝慶幸聖公習禮入學成化六年國子監監丞李伸言前襲封衍聖公孔𢎞緒自幼失學長而狎近羣小以致干冒刑憲聖明念先聖之裔特寛宥革職為民即令其弟𢎞泰襲封恩渥矣然不預教之誠恐復蹈前轍伏望留之京師賜以館舎俾之隨侍班行獲覩禮制退則從遊太學受教於師儒俟其學成遣歸奉祀禮部覆宜準其言留𢎞泰在監讀書一年然後許歸仍給與牙牌懸帶朔望併時節隨班朝參從之故官子孫入監成化八年禮部以都御史葉盛言奏行天下三品以上故官子孫赴京聽㫖入監既而得㫖入監者六人餘皆吿擾不去禮部不得已乃復請俱遣囘原籍充儒學生教養肄業原係生員者三年舎人五年從提學官考送本部照歲貢生例考試入監上允之至是致仕都御史孫日良之孫鵬等從原學限滿赴部如例考試俱入監後來者亦如之琉球陪臣子入監成化十八年琉球國中山王尚真奏乞以其陪臣之子蔡賓等五人於南京國子監讀書禮部按洪武永樂宣徳間例以聞上曰海南逺夷嚮慕文教朕甚嘉之矧在先朝已有舊制其令蔡賓等於南監肄業有司歲給衣服廩饌毋令失所務俾通知中國禮儀永遵王化顧不美與處副榜舉人成化二十年丙子禮部言近例副榜舉人除歴事外其坐監依親年三十五以上新舉人年二十五以上當授職俱不聽告然其中又有願就職而不得者乞命㑹試考官多取副榜其不願者不以年歲為限命仍如上科例從之介胄讀書𢎞治二年兵部再議給事中王綸郎中陸容所奏在閒侯伯駙馬隨操讀書事請於五軍營别立一隊以處之悉聽提督大臣五日一操每季以兵家諸書并五倫等書呈國子監祭酒司業課其日程令在家誦讀季終赴監較騐如有文義未通即為講解至年三十而止及國公已襲爵而在閒者亦如此例詔可既而禮部以為按季讀書肄習太簡季終赴監考較太疎請令除該操日外餘日每朝後即詣國子監讀書習禮其怠惰者具名以聞從之勲冑教讀𢎞治七年禮部覆奏兵科給事中周旋陳言事請令公侯伯之子應襲者年至十五俱令入國子監讀書習禮保舉教讀須於奏内開稱子弟幾人吏部仍嚴加考試年三十以上不係紈綺子弟方與保勘收充三年受職至九年考滿有功無過方得陞除不則革職為民從之三氏學生員開貢正徳四年七月三氏學生員顔重禮奏三氏子孫自成化初年開貢迄今顔氏未貢一人乞定為資格以均之禮部覆議以孔氏子孫在學者九顔孟子孫在學者十一若孔氏仍舊三年一貢每及三貢顔孟輪貢一人則均矣上是之且曰輪貢既均其毋令廢學當貢者所司仍愼選以充教養三氏子弟嘉靖八年廵撫山東都御史劉節請於曲阜縣治立四塾十六社各立一塾簡孔氏生員儒士二十人為墪師凡孔孟顔三氏子弟八歲以上俱送塾教習年十五以上提督官試其學業有成者送入三氏學而黜其累試無成者仍立為廪膳增廣附學名目其廪膳雖無廪餼俱以提學官考定髙下收補至於應貢以收補名弟為定如年至五十累考無進者發囘衣巾終身禮部覆議允行其廪增人數依州學例各三十名廢典備考大射詔行大射禮洪武三年上以先王射禮久廢弧矢之事專習於武夫而文士多未解至是詔太學生及􅇿縣生員皆令習射凡遇郊廟之祭先期命文武官執事行大射之禮乃命工部制虎中鹿中及諸侯卿大夫射侯等器命禮部考定其議斟酌古今煩簡適中於是禮部奏曰按周禮大司馬之職王大射則合諸侯之耦其屬有射人掌張三侯司弓矢掌六弓八矢之法服不氏掌贊侯以旌居乏而待獲古大司馬今兵部之職也宜令掌之其射鵠有七虎鵠五采天子射用之熊鵠五采皇太子射用之豹鵠五采親王射用之豹鵠四采一品二品文武官射用之糝鵠三采三品至五品文武官射用之布鵠無采文武官子弟士民俊秀射用之乏又名容凡射時置於鵠右執旗及待獲者以蔽身設福并韋當射時置於前以齊矢設射中五皮樹中天子大射用之閭中天子宴射用之虎中皇太子親王射通用之兕中一品至五品文武官用之鹿中六品至九品及文武官子弟士民俊秀通用之其職事設司正官二員掌驗射者品級尊卑人力強弱而定耦其中否則書於算兵部職之司射二員掌先以強弓射鵠誘射以鼓衆氣以武職官充之司射器官二員掌辨弓力強弱分為三等驗人力強弱而授之工部官職之舉爵者掌以馬潼授中者飲光禄寺官職之請射者掌定耦射射畢再請某耦射每鵠二人侍儀司職之待獲者掌矢納於司射器者以各𨽻僕供其役執旗者掌於容後執五色旗如射中的舉紅旗應之中采舉采旗應之偏西舉白旗偏東舉青旗過於鵠舉黄旗不及鵠舉黑旗以軍士二人掌之設引禮二人掌引文武官之進退命侍儀司舎人職之制曰可仍命頒儀式於天下官府學較使遇朔望則於公廨或閒地習之其府官學較射儀前期戒射定耦選執事充司正副司正司射司射器請射舉爵收矢執旗樹鵠陳設訖至日執事者入就位請射者引主射正官各官員子弟士民俊秀者各就品位司射器者以弓矢置於各正官及司射前請射者詣正官前圓揖畢引詣司射器前受弓矢訖復位司正執算入立於中後請射者詣司射前曰請誘射引司射二人耦進各以三矢搢於腰帶之右以一矢挾於二指間推年齒相讓年長者為上射年幼者為下射上射先詣射位向鵠正立𤼵矢司正書中投算置於中舉旗者如所射應之射畢退立於旁讓下射者詣位射訖請射者俱引復位收矢者收矢復於射者司正取所中算請射者次請士民俊秀射次請官員子弟射次請品卑至品髙者射其就射位𤼵矢取算書中舉旗收矢復位皆如前儀既畢司正副司正各持算白中於主射正官舉爵者酌酒授中者飲之中的者三爵中采者二爵飲訖請射者請屬官以下仍捧弓矢納於司射器還詣主射正官前相揖而退謹按三代之後射禮不行也久矣惟晉廋亮曾依周制以行我聖祖初得天下即令天下府州縣學訓誨生員每日講讀經書罷於學後設一射圃教學生員習射朔望要試過其有司府閒暇時與學官一體習射命禮部定圖式儀注凡八則一射式二樹射鵠三置射位四主射五賞酒六司射七射器八射職九射位十儀注所謂射器者凡九射職者凡七是即州長㑹民射於州序之遺意也又按大射者天子將祭與羣臣諸侯習禮之射也賔射者天子與諸侯來朝而與之同射也燕射者天子與羣臣燕息之射也其射侯異焉虎熊豹侯者天子之侯也熊豹侯者諸侯之侯也麋侯者大夫之侯也其射耦異焉天子六也諸侯四也孤卿大夫三也士二也大射於郊賔射於朝燕射於學此射地之異也天子以騶虞諸侯以貍首大夫以采蘋士以采蘩此射節之異也讀法倣古讀法洪武二年監察御史雎稼言周官有懸法象魏之文禮經載鄉飲讀法之說皆導民知禮法而逺刑辟也今新律頒布天下鄉井細民猶有不通其說者宜倣古人讀法之典命府州縣長吏凡遇月朔㑹鄉之老少令儒生讀律解析其義使之通曉則人皆知畏法而犯者寡矣上曰威人以法不若感人以心敦信義而勵㢘耻此化民之本也故羞惡之心生則非僻之私格外防之法密則茍免之行興卿言讀律固可禁民為非若謂使民無犯要當深求其本也講讀大誥正統二年廵按直𨽻監察御史楊春言太祖髙皇帝大誥三編教民為善去惡官民所宜遵守今天下有司視為文具乞令講讀事下行在禮部覆奏講讀大誥宜如春言請頒孝慈録講讀正統五年河南固始縣學署訓導舉人黄俊言太祖髙皇帝御製孝慈録已嘗頒布天下今四方學中鮮有存者乞仍鋟印頒布令士民講讀以隆孝道上曰朕觀孝慈録所論仰太祖聖見卓冠百王實萬代不刋之盛典宜家傳而人誦者禮部亟印頒之謹按成周盛時制為教治政令之法既已行之於朝廷國都而又推之州黨族閭焉州長黨正族師閭胥皆以歲時屬其民而讀邦法每歲為常州長則以正月及終歲是一歲而再讀也黨正則以四時之孟月是一歲而四讀也族師則每月而一舉行焉是一歲而十二讀也他如州長之祭祀州社黨正之春秋祭禜族師之春秋祭酺其非時而讀法者又不止一也我聖祖作為教民榜文頒布天下閭里御製大誥三編頒布天下學較蓋即周官所謂教治政令之法也社學社學子弟補儒學生正統十年禮部辦事官鄭與常獻太平十二䇿一曰興學以翊太平之運中及社學事上命有司議行因諭禮部各處社學悉令提督學較風憲官嚴督勸課不許廢弛其子弟不拘常額挨次選補儒學增廣生員修舉社學𢎞治八年十月太子太保兵部尚書馬文升奏近年小民罔知禮義風俗日澆子詈其父弟毆其兄恬不為異窺其所繇社學久廢人不讀書以致於斯宜修舉社學愼選教讀之人凡民弟子俱令入社學讀孝經小學并大誥俾知孝弟之道與當代之法禮部覆奏修舉社學已有著令請仍行各提學官舉行無致廢弛從之保舉人才洪武初凡舉保孝㢘人才秀才及山林隠逸本部即行所屬委自正官選求民間果係名實相副素無過犯之人有司起送到部咨發吏部聽用其後以舉保屬之吏部而本部所掌惟選貢生員闕典備考禘祭不立禘廟洪武七年監察御史答禄與權言古之王天下者既立始祖之廟而以始祖配之又推始祖所自出之帝祀之於始祖之廟而以始祖配之故曰禘禘者大也王者之大祭也周祭太王為始祖推本后稷以為自出之帝今皇上受命巳七年矣而禘祭未舉宜命羣臣參考酌古今而行之以成一代之典事下禮部太常寺翰林院議以為虞夏商周四代世系明白其始所從出可得而推故禘禮可行自唐虞以來世系無考莫能明其始祖所自出當時所謂禘祭遇大祫巳祧之主序昭穆而祭之乃古之大祫非禘也宋神宗嘗曰禘者所以審禘祖之所自出是則莫知祖之所自出禘禮不可行也今國家既已追尊四廟而始祖之所自出者未有所考則於禘祭之禮似難遽行上是其議蜡祭行蜡祭嘉靖七年十二月臘節以御製蜡樂詩賜大學士張璁其詞曰蜡樂當今日金門宴禮宣嘉平殷典著清祀夏書𫝊勞農休田叟浴蠶勤室娟將迎新歲至為忻萬物鮮按大蜡之祭三代已有之在周之前夏曰嘉平殷曰清祀而在周則曰大蜡焉秦始謂之臘尋更曰嘉平漢復曰臘古所祭者八神而已皆有功於農事者也后世所祀之神乃至於八十有五座一百九十有二位何也本朝於古祀典所當舉者未嘗或廢惟於蜡祭闕焉蓋此祭也與籍田相為始終當夫東作方興之始既舉籍田之禮以祀先農於春而以帥先農民以興其務本之心則夫百榖吿成之後載舉大蜡之禮以報先嗇於冬而以勞來農民以報其勤動之苦是固舉先王莫大之禮亦廣聖君莫大之施也禮部志稿卷九十八
