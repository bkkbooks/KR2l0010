body:
  text: 禮部志稿卷二十六明俞汝楫編祠祭司職掌雩祀國家凡遇水旱災傷及非常變異或躬禱或露告於宫中於奉天殿陛或遣官祭告郊廟陵寢及社稷山川無常儀嘉靖八年春祈雨冬祈雪皆御製祝文躬詣南郊祠皇天后土遂躬祠山川神祇於山川壇次日祠社稷壇冠服淺色鹵薄不設馳道不除皆不設配不奏樂後建崇雩壇始定雩祀之儀十七年躬禱雨於崇雩壇青服用一牛以熟薦具禮樂與雩祀同亦不設配萬厯十三年上親禱郊壇却輦步行有步禱儀詳具於後嘉靖十一年定雩祀儀嵗旱則於季春之末禮部奏請行禮一前期四日太常寺奏祭祀如常儀諭百官致齋三日一前期二日太常卿同光祿卿奏省牲如常儀次日復命一前期一日上親填祝版於文華殿遂告於廟如祈穀之儀一陳設與祈穀同一正祭是日上乗輿至昭亨門西降輿過門東乗輿導引官導上至帷幕内具祭服出導引官導至壇門内内贊對引官導上至拜位行禮如祈穀之儀禮畢上至帷幕内易服駕還詣廟㕘拜回宫一祝文臨時撰用一樂章迎帝神中和之曲於穆上帝爰處瑤宫咨爾黎庶覆憫曷窮旗幢戾委蛇雲龍霖澤斯溥萬寶有終奠玉帛肅和之曲神之格思奠兹文纁盛樂斯舉香氣氤氲精禋孔熯徹於紫冥懇祈膏澤渥我嘉生進俎咸和之曲百川委潤名山出雲愆𤾉孔熾膏澤斯屯祈年於天載牲於俎神之格思報以甘雨初獻夀和之曲有嚴崇祀日吉時良酌彼罍洗椒馨苾香𤣥功溥濟時雨時暘惟神是聴綏以多穰亞獻景和之曲皇皇禋祀孔惠孔明瞻仰來歆拜首欽承有醴維醽有酒維清雲韶侑獻肅雝和鳴聖靈有赫鑒享精誠終獻永和之曲靈承無斁駿奔有容嘉玉以陳酌鬯以供禮三再稱誠一以從備物致志申薦彌恭神昭景貺佑我耕農徹饌凝和之曲有赫旱暵民勞瘁斯于牲于醴載舞載詩禮成三獻敬徹不遲神之聴之雨我公私送帝神清和之曲爰迪寅清昭事顥穹仰祈甘雨惠我三農既歆既格言歸太空式霑下土萬方其同望燎太和之曲赤龍旋馭禮洽樂成燔燎既舉昭假精禋維帝降康雨施雲行登我黍稌溥受厥明雲門之曲祭畢使道童羣歌之景龍精兮時見測鶉緯兮宵懸肆廣樂兮鏗鍧列皇舞兮蹁躚祈方社兮不莫薦圭璧兮孔䖍需密雲兮六漠霈甘澍兮九𤣥慰我農兮既渥錫明昭兮有年萬厯十三年步禱儀一前期一日上具青服以躬詣南郊祈禱預告於奉天殿行禮如常儀一前期一日太常寺進祝版上親填御名訖太常寺博士捧出安輿亭内擡至南郊神庫奉安一太常寺預設酒果脯醢香帛於圜丘牛一熟薦設上拜位於壇壝於正中一錦衣衛設隨朝駕不除道一正祭是日免朝昧爽上具青服御皇極門太常寺官跪奏請聖駕詣圜丘上起步行䕶駕侍衛幷導駕侍班翰林科道等官如常儀百官各青衣角帶恭候於大明門外内閣禮部太常寺近前其餘文東武西各照常朝班行序立駕至魚貫前導卑者在前崇者在後緣道兩旁離御路稍逺文武兩班就中又各自為對至昭亨門照前序立候駕監禮御史等官如常儀鴻臚寺仍委序班十餘員整肅班行不許諠譁越次一駕至昭亨門導引官導上至左櫺星門外幕次少憩禮部尚書侍郎太常寺卿少卿跪奏詣壇位内贊對引官導上行典儀唱執事官各司其事内贊奏就位上至拜位典儀唱迎神内贊奏陞壇導上至香案前奏跪奏上香上三上香訖奏復位奏四拜傳贊百官同典儀唱奠帛行初獻禮内贊奏陞壇導上至神御前奏獻帛訖奏獻爵訖奏詣讀祝位奏跪傳贊百官皆跪贊讀祝訖奏俯伏興平身傳贊百官同奏復位典儀唱行亞獻禮内贊奏陞壇導上至神御前奏獻爵訖奏復位典儀唱行終獻禮儀同亞獻典儀唱送神内贊奏四拜傳贊百官同典儀唱讀祝官捧祝進帛官捧帛各詣燎位内贊奏禮畢導引官導上至幕次少憩上還仍詣奉先殿㕘謁如常儀節拜嘉靖初沿先朝舊儀每日於宫中行拜天禮後以為瀆罷之遇正旦冬至萬夀聖節於奉天殿今皇極殿丹陛上行禮既定郊祀遂罷冬至之拜惟正旦萬夀聖節行禮於𤣥極寶殿隆慶元年罷仍於皇極殿丹陛上行禮嘉靖中定𤣥極寶殿拜天儀今罷前期一日太常寺博士捧祝版於文華殿或精一堂或臨時於𤣥極門内候上親填某太常寺辦祭品晡時同供事官入殿内陳設夜二鼓太常寺官入候行禮三鼓初上具服乗輿至凌霄門外降輿入門内太常寺卿跪奏神御位奉安訖導引官導上至𤣥極門内由集真門入至左陛内贊對引官導上由左門入就位典儀唱迎帝神内贊導上由中陛登臺至香案前上香復位四拜典儀唱奠帛行初獻禮内贊導至御案前獻帛獻爵詣讀祝位讀祝行亞獻終獻禮典儀唱送帝神奏四拜奏詣望燎位禮畢上還宫祝文元旦維某年某月某日嗣天子臣某敢昭奏於皇天上帝曰適維斯辰節當元旦嵗時所重爰奉典常祇對皇穹仰瞻拜祝祈垂洪造大賜亨豐臣無任瞻奉之至謹奏萬夀聖節維某年某月某日嗣天子臣某謹昭奏於皇天上帝曰臣以昧愚微資上叨帝心簡在報稱無由稔諸愆戾今日臣生之辰祇申叩拜仰祇我天慈俯垂賜鑒伏望降歆益大生生之仁均囿民物於康和福夀之域臣下情不勝瞻對之至謹奏社稷太社稷國初以春秋仲月上戊日祭太社太稷異壇同壝太社以后土勾龍氏配太稷以后稷氏配每獻禮先詣太社及配位壇獻畢次詣太稷及配位壇臨祭遇風雨則於齋宫望祭洪武三年於壇北建享殿又北建拜殿各五間以備風雨行禮十年改建社稷壇於午門外之右先是社主用石髙五尺濶二尺上微尖立於社壇半埋土中近南向北稷不用主至是埋石主於社稷壇之正中微露其尖仍用木為神牌而丹漆之祭則設於壇上祭畢貯庫壇設太社神牌居東太稷神牌居西俱北向奉仁祖神牌配神西向而罷勾龍后稷配自奠帛至終獻皆同時行禮洪武三十一年更奉太祖配神永樂中北京社稷壇成位置陳設悉如南京舊制洪熈後奉太宗同配嘉靖九年遵初制太社仍以后土勾龍氏配太稷仍以后稷氏配洪武二十六年初定儀一齋戒與祭太廟同一告廟正祭前二日用祝文酒菓於奉先殿告請仁祖配社稷祝文與大祀同一省牲與太廟同牛三羊三豕三鹿一兔二一陳設太社在東北向犢一羊一豕一豋一鉶二籩豆各十二簠簋各二帛一黑色玉用兩圭有邸太稷在西北向陳設同仁祖配位在東西向陳設同無玉共設酒尊三爵九篚三於壇西北東向祝文案一一正祭典儀唱樂舞生就位執事官各司其事導引官導引皇帝至御拜位内贊奏就位典儀唱瘞毛血迎神奏樂樂止内贊奏四拜百官同典儀唱奠玉帛行初獻禮奏執事官各捧玉帛爵獻於神位前讀祝官取祝跪於神位左内贊奏跪典儀唱讀祝讀訖進於太社神位前内贊奏俯伏興平身百官同樂止典儀唱行亞獻禮奏樂執事官各奉爵獻於神位前樂止典儀唱行終獻禮儀同亞獻太常寺卿進立於壇西東向唱賜福胙光祿司官捧福胙自神位前由正門左出至皇帝前内贊奏跪奏搢圭光祿司官以福酒跪進内贊奏飲福酒光祿司官以胙跪進内贊奏受胙出圭俯伏興平身内贊奏四拜百官同典儀唱徹饌奏樂執事官各詣神位前徹饌樂止典儀唱送神奏樂内贊奏四拜百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣瘞位奏樂内贊奏禮畢一祝文維洪武某年某月某日皇帝某敢昭告於太社之神太稷之神惟神贊輔皇祇發生嘉穀粒我烝民萬世永賴時當仲春秋禮嚴告祀報謝謹以玉帛牲齊粢盛庶品備兹瘞祭皇考仁祖淳皇帝配神尚享一樂章迎神廣和之曲予惟土穀兮造化工為民立命兮當報崇民歌且舞兮朝雍雍備筵率職兮候迓迎想聖來兮祥風生欽當稽首兮告拜年豐初獻夀和之曲氤氲氣合兮物遂蒙民之立命兮荷隂功予將玉帛兮獻微衷初斟醴薦兮民福洪亞獻豫和之曲予今樂舞兮再捧觴願神昭格兮軍民康思必穆穆兮靈洋洋感厚恩兮拜祥光終獻熈和之曲干羽飛旋兮酒三行香煙繚繞兮雲旌幢予今稽首兮忻且惶神顔恱兮霞彩彰徹饌雍和之曲祖陳微禮兮神喜將琅然絲竹兮樂舞揚願祥普降兮遐邇方烝民率土兮盡安康送神安和之曲氤氲氤氲兮祥光張龍車鳳輦兮駕飛揚遥瞻稽首兮去何方民福留兮時雨暘望瘞時和之曲捧餚饈兮詣瘞方鳴鸞率舞兮聲鏗鏘思神納兮民福昻予今稽首兮謝恩光嘉靖九年更定儀一前期二日太常寺卿同光祿寺卿面奏省牲如常儀一陳設太社居東北向太稷居西北向后土勾龍氏居東西向后稷氏居西東向陳設並如舊制惟帛春用告祀秋用禮神一正祭上乗輿由西闕門入至壇北門東降輿導引官導上由右門入至具服殿上具祭服導引官導上由拜殿右門出典儀唱樂舞生就位執事官各司其事上至御拜位内贊奏就位上就位典儀唱瘞毛血迎神樂作内贊奉陞壇導上至太社神前奏跪奏搢圭奏上香司香官捧香跪於上左上三上香内贊奏出圭導上至太稷神前儀同奏出圭奏復位太常卿上配位香樂止奏四拜傳贊百官同典儀唱奠玉帛行初獻禮樂作執事官捧玉帛爵於各神位前跪奠訖樂暫止内贊奏跪傳贊衆官皆跪典儀唱讀祝讀祝官跪讀訖樂復作奏俯伏興平身傳贊百官同樂止典儀唱行亞獻禮樂作執事者捧爵於各神位前跪奠訖樂止典儀唱行終獻禮樂作儀同亞獻樂止太常卿於壇左東向立唱賜福胙内贊奏跪上跪奏搢圭光祿卿捧酒跪於上右内贊奏受胙上受胙訖奏出圭俯伏興平身奏四拜傳贊百官同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位樂作捧祝帛饌官過御前訖奏禮畢上至具服殿易服還宫一祝文稱嗣天子及后土勾龍氏后稷氏配神餘並同一樂章仍舊帝社稷今罷嘉靖十年上命於西苑空閒地開墾為田樹藝五穀建帝社帝稷壇壇址髙六尺方廣二丈五尺甃以細甎實以浄土繚以土垣北為櫺星門髙六尺八寸廣五尺八寸神位以木為之各髙一尺八寸廣三尺題曰帝社之神帝稷之神俱硃漆質金書壇之南置石龕以蔵神位髙六尺廣二尺壇之西為祭器庫樂器庫壇之北樹二坊以表之曰帝社街每嵗以仲春秋次戊日上躬行祈報禮如次戊在朢後則以上已日臨期奏定一前期四日太常寺奏齋戒一前期一日太常寺奏省牲上親填祝版於文華殿一陳設帝社牛一羊一豕一豋一鉶一籩豆各八簠簋各一帛一𤣥色春用告祀秋用禮神帝稷陳設同一正祭是日辰刻上具皮弁服乗版輿至豳風亭東降輿導引官導上至櫺星門内典儀唱樂舞生就位執事官各司其事上至御拜位典儀唱送神樂作内贊導上陞壇至帝社帝稷香案前各三上香奏復位樂止奏兩拜通贊陪拜官同典儀唱奠帛行初獻禮樂作執事者捧帛爵於各神前奠訖樂暫止奏跪上跪通贊同内贊贊讀祝讀訖樂復作奏俯伏興平身通贊同樂止典儀唱行亞獻禮樂作樂止唱行終獻禮樂作樂止唱徹饌樂作樂止唱送神樂作奏兩拜通贊同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位樂作奏禮畢上至豳風亭易服還宫一祝文維嘉靖某年嵗次某月朔某日嗣天子某致告祭於帝社之神帝稷之神春云秋云時當務農之期萬寶告成庸修恒祀特兹告祈報謝惟神歆鑒俾五穀皆登萬方咸永福予民萬世攸賴尚享一樂章迎神時和之曲東金風兮地脈以融首務萬寶以充忻成兮稼穡之工祀神于此兮苑中願來格兮慰予衷初獻夀和之曲神兮臨止禮薦清醇菲幣在笥初獻式遵神其鑒兹享斯藻蘋我祀伊何祈報是因神兮錫祉財阜吾民亞獻雍和之曲二觴再舉申此慇懃神恱兮以納祥靄兮氤氲終獻寧和之曲禮終