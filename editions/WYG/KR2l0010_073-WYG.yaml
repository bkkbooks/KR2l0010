計可也鎮輔奉國將軍中尉凡犯重罪革為庻人及曽發髙牆放回者其未革爵前生子女止許請名給與冠帶養贍婚嫁不許請婚其既革爵後所生子女止請名不許請乞養瞻婚嫁聴其於城中自為生計可也鎮輔奉國將軍而下凡嫡子俱許請封無嫡子方許以一庻子請封其餘止許請名給以冠帶養瞻婚嫁至奉國中尉止許一子請封其餘止許請名給以冠帶養瞻婚嫁可也凡此數者或以其罪戾而少損或以其疎逺而少抑庻幾可以减宗室財用萬分之一亦救弊之一端也等因奉聖㫖這本内崇輔導興學校均人役三事既㑹議停當都依擬其定子女一事所據尚未歸一你部裡還冄行處務要使親睦之道樽節之宜兩有不失以稱朕意欽此查得先奉本部送禮科抄出都察院右都御史汪鋐奏近該豐林王台瀚具奏前來奏聖㫖禮部㑹議了來説隨該禮部尚書李闕等㑹同臣等多官議得豐林王所奏定子女以杜宗室之詐一條擅難定擬臣切惟祖訓之所定也人事之常也以一人而生數十子則天下古今之無人事之變也近來定妾媵之例雖行然如豐林王所論則詐冒之弊背違祖訓亦已極矣今限其生子之數是制之使不得為詐冒禮度以嚴倫理以正實所以遵祖訓也何為不可乎臣聞各處郡王祿米有累月不得關者有經年不得闗者將軍而下有二三年不得關者蓋賦稅之入有限祿米之供無窮其勢自不得不然耳臣又聞陜西一省嵗増祿米二萬石然則十年當増二十萬石百年當増二百萬石夫陜西之賦嵗不過三百萬石而祿米之増若此豐林王所請臣愚以為的然當行而不可易設或不然則生子之冒濫既不能革常禄之缺乏又不能供恩薄而義疎其為患殆有不可言言者伏望皇上斷然行之而不疑就於其中更從寛厚如親王限以五子則増二子為七子之限郡王限以三子則増二子為五子之限將軍増一子為三子中尉増一子為二子多餘之數雖無爵祿仍各月給食糧米二石女封其一不及其二如此則親親之恩救弊之義並行而不悖矣等因奉聖㫖這所奏禮部一併㑹議停當来説欽此臣等謹將前議冄行斟酌上請伏望皇上俯賜裁處著為定例等因奉聖㫖這事情且待朕從容審處欽此嘉靖三十二年本部尚書歐陽徳等題為乞恩請封選婚事該秦王懐埢奏前事看得國家大事祖宗之制所當申明時勢之窮所當通變照得郡王孫男祖訓有六世以下世授奉國中尉之孫女則鄉君之號止於曽𤣥而五世不復及焉盖孫女至於五世親屬疎逺若一概授以封號給以祿秩非惟勢有不能所及而恩亦有所不溥也今觀郡王之女其祿米比曽孫𤣥曽女祿米僅比六世孫聖祖深逺之慮可推而知矣况女既有歸則其夫家生業足以自贍朝廷稍加光寵既足為恩固不必强勢之所不能而盡授以封號祿秩此則祖宗之制所當申明者也若以時勢論之洪武年間初封親郡王將軍纔四十九位女纔九位永樂間増封親郡王將軍四十一位女二十八位通計百二十七位未為多也而當時祿米已不能全給瀋府纔本色六千石秦府魯府唐府各五千石代府三千石遼府韓府伊府各二千石岷府一千五百石肅府僅七百石慶府雖七千五百石而郡王又嘗於數内分撥俱不滿萬石之數盖天𣲖日衍税糧有限祖宗預計其必然而逺為之慮者如此今各處親郡王將軍中尉計九千八百二十八位女計九千八百二十三位通計一萬九千六百一十六位數多國初一百五十位其來尚無紀極而親王本色祿米又無不給萬石者計天下嵗供京師米四百萬石而各處祿米凡八百五十三萬石視於京師之數不啻倍之民間稅糧有减無増豈惟將來莫知所處即今所在已無措矣即如山西一省存留米麥一百五十萬石而宗室祿米該三百一十二萬石河南一省存留八十四萬三千石而宗室祿米一百九十二萬石是二省之糧即無水旱蠲免升合俱完猶不足以供祿米之半况官吏俸廩軍士月糧皆取給其中如之何其能供耶前此豐林王台瀚奏要限定親郡王將軍中尉子女其限外之數止給冠帶口糧夫台瀚亦郡王也豈其獨不欲富而為此言哉盖以宗室祿米雖有定額而有司不能全供必數懐觖望有司缺乏未能辦給而宗室勢欲全得必數受侵政令因之阻格國計無繇充足不若使各授冠帶月糧從其便各治生業為兩利也夫祖訓所載者祖宗時亦不盡足其數而豐林王尚欲為裁限况中尉之女祖訓所不載乃當祿糧無措之日而欲於祖訓之外盡授封號徧給廩祿米臣等未見其可此則時勢之窮所當變者也又查得靖江王府鎮國等中尉之女俱遵奉祖訓例不授封今秦晉等府其初則與靖江王府親疎少異既傳至中尉則女同為皇家袒免以下親之女矣伏乞皇上推思皇祖之意裁成昭代之制凡各王府中尉女及選配子弟合無聴本部題請聖恩授以宗女宗婿名色仍給與冠帶婚資其冠服宗婿視文職宗女視出鎮國位下者冠服七品并婚資共給銀一百兩猪羊各十隻出輔國位下者冠服八品并婚資共給銀九十兩猪羊各八隻出奉國位下者冠服九品并婚資共給銀八十兩猪羊各六隻俱行各該布政司關領其宗婿就各該王府冠帶謝恩不必赴京仍聴其自便不必在府隨衆朝叅有司以禮相待照品官例免其雜泛差役如有志科舉者聴提學官比照教官舉例考選進塲盖郡王子孫祖訓猶許其出仕則宗婿可以類推矣推祖訓有限之制而溥皇上無窮之恩酌時勢之窮而盡通變之道臣等不勝拳拳等因奉聖㫖准擬行欽此嘉靖二十五年十月該禮科給事中查秉彝題為崇重恩典事我國家湛恩優渥流通於至親情文偹具可謂兼隆矣但畫一之典未明倖冒之端易啟查得𢎞治十三年多官㑹議王府條例十七條及禮部節年題准事例雖經次申眀宗藩未必知悉伏惟聖明勅部臣再加詳議一應名封祭葬恩賚之典悉照大明㑹典斟酌刋定其有特與之恩額外之例不為典要者毋得相援陳乞該部毋得朦朧濫與等因該本部議覆近來宗室繁衆才品不齊羣小依憑百端引誘或稱逺年事例或援近日特㫖法外希恩肆行瀆奏甚或擕持鏹幣潛住都城指稱侵騙為計已熟合候命下本部移咨都察院轉行各處巡按監察御史行令各該長史敎授啓王知㑹今後一應恩典悉照大明㑹典并節年題准事例奏請不許聴信奸人撥置妄引事例覬覦非分自招過舉違者聴本部叅奏罰治并將輔導官員撥置人役從重究黜照例發遣庻法例明飭而恩典不至於冒濫矣等因奉聖㫖准議欽此宗支奏報正徳元年該駙馬蔡震題自正徳元年為始各王府新生子女務要審勘的確年嵗嫡庻行次照依舊例奏報文冊一年一次造報等因奉武宗皇帝聖㫖是欽此正徳三年慶成王奏稱本府宗支數多生育子女冒報嵗數敎授外官豈能得知乞要行令親隣收生人等保結奏報該本部覆題奉武宗皇帝聖㫖是宗支重事旣王所奏恐有不實王當在彼拘集收生親識府内宫眷明白果有朦朧奏來處治今後所生子女保結明白奏報還通行各王府長史敎授等官一體遵行欽此正徳四年趙府輔國將軍祐椋奏為革宿弊以正宗支事該本部覆題奉武宗皇帝聖㫖是宗支重事祐椋所言有理各郡王以下該用妾媵不許過多還著輔官保勘明白造冊奏繳生有子女依期奏報查照相同方許請封如有朦朧冒濫的親王及鎮守等官指實叅奏並輔導官都重治不饒欽此正徳十六年詔令各王府庻子女郡王以下聴親王鎮國將軍以下聴郡王先令内外輔導等官嚴加覆勘開係何年月日以禮娶到何人子女所生果無違碍方與類奏嵗報正徳十六年八月内掌宗人府事駙馬蔡震題稱傳奉武宗皇帝聖㫖宗室揭帖大小四套著宗人府清理毎一年終進換該衙門知道欽此今自嘉靖元年以後毎年一次造報合行各府長史敎授自始封親王郡王所生子孫從前至今宗支行次一一類造文冊徑送本府以憑攅造進呈等因題奉聖㫖是欽此嘉靖二十九年七月該本部題今後各府王凡新生子女三日以後長史敎授等官啟王即為轉奏不許稽遲其開造玉牒嵗報妾媵等冊俱要從實開報奉聖㫖是欽此嘉靖三十年六月兵科給事中朱伯辰題該本部議覆今後各王府遇嫡庻所生子女請乞各封照依武官替職事例取具本位親支如無親支以次挨及房族宗室五位并長史敎授兩隣收生人等不致扶同欺隠甘結於類奏之時一并差人齎解到部投遞以憑查考無碍方與題請名封若或扶同隠匿將額外濫收妾媵并乞養過房來歴不明樂婦花生傳生子女􅑃作嫡出庻出朦朧冒請名封者本部查出及被奏吿事發將本位叅革爵祿原結勘宗室請㫖罰治降革長史敎授等官照例罷黜兩隣收生人等行巡按御史查提問罪其或奏請名封而前項結狀不偹本部即行駁回奉聖㫖是欽此查奏玉牒𢎞治十年玉牒文册務查各年奏報生年月日相同并嫡庻行列次第賜名授封加封出閣成婚薨逝亡故等項事跡明白造冊二本徑齎到部轉送宗人府及存本部以憑查考纂修正徳四年六月内荆府左長史施魯等奏繳本府己未請名授封薨故新生子女等項文冊奉武宗皇帝聖㫖該衙門知道這字様細小欽此欽遵本部查叅覆題奉武宗皇帝聖㫖施魯等不遵前㫖任意書寫奏本字様細小本當究治且都饒過恁部裏還行文與他令知道欽此嘉靖二十九年七月該本部題為申舊例明節制以崇宗室事照得各王府解到玉牒等冊該司即將舊冊查到如有差訛即便開呈以憑駁行該府改正本部仍通行各府知㑹其開造玉牒嵗報妾媵等冊如有仍前稽遲奏報及遺失名位増添嵗數那移人數長史敎授造冊等官聴本部叅奏輕則行巡按提問重則依例罷黜等因具題節奉聖㫖是欽此嘉靖二十九年九月内懐仁府敎授批差校尉田景全齎本年玉牒等冊申部該本部看得懐仁王府造到玉牒及妾媵文冊與舊冊查對那移年月者九位以死作生者二位遺漏名位者八百三十五位例外濫收妾媵者二位顯是該府署敎授事聴缺典膳劉文章既不能以理諫止又不能從實造報遺失爵位以玉牒為空文増减生年視名位為奇貨相應查照前例將本官罷黜及將經手造冊人役移咨都察院轉行彼處巡按衙門問以應得罪名其冊中前項差錯該布政司轉行該府敎授啓王知㑹查照舊冊作速改正造報前來等因奉聖㫖是欽此嘉靖三十年六月該本部看得靈丘王府造到玉牒妾媵文冊與舊冊查對中間那移生年月日不同者二十六位遺漏名位者九十九位生年及母姓不同者十位以死作生者一位名位不同者七位差造妾媵者一位顯是該府敎授造冊等官或狥私受賄故増年嵗以圖詐冒封名或需索不遂故意差遲以幸查駁抑或不行用心查究致多訛舛揆之法例俱合叅究合候命下本部移咨都察院轉行彼處巡按御史將該府敎授并造冊員役究問叅奏前來以憑題請治罪其前項差錯縁由行移該布政司轉行該府敎授啟王知㑹查明改正造冊呈報等因奉聖㫖是欽此冊封例給凡冊封合用金寳或鍍金銀印轉行綬印監㑹同司官一員鑄印局官一員鑄給金冊或鍍金銀冊咨工部轉行銀作局造辦冊文候冊封之日行翰林院撰文中書科書寫冠服儀仗行工部轉行内官監造辦其合用府第行工部祿米行户部奏給其奏討敎授典膳行吏部選補其民校等役行兵部查行凡郡王次嫡庻子封將軍中尉復本抄下本部合用誥命咨吏部撰給祿米咨戸部奏給冠帶房屋咨工部奏給從人咨都察院轉行布按二司於徒罪囚人内給發選婚類行布政司於本境内選配凡宗室之女請封覆本抄下本部行翰林院照依郡縣鄉主君名色定擬封號抄出本部附簿登記郡王冠服儀仗行内府造辦縣主以下冠服行工部轉給折價選婚移付類行布政司於本境選擇其誥命候選有儀賔併行題給凡將軍中尉選有良家之女該布政司偹查無碍取具保結咨呈本部仍查親王奏抄有無相同抄結俱全者方准題授夫淑恭宜安人封號誥命行吏部撰給冠服行工部轉行婚配類行布政司知㑹凡郡縣鄉主君選有良家之子該布政司偹查無碍取具保結咨呈起送赴部仍查親王有無奏抄俱全者方准題授儀賔職事誥命行吏部撰給祿米行户部奏給冠服房屋行工部查給從人都察院照例給撥紗帽角帶等因六科廊關給毎人一副令其先行冠帶而引赴御前叩頭回還成婚如遇免朝止送鴻臚寺演禮午門前叩頭凡毎年將及冊封之日本司先行㑹帖轉送内府尚衣監内官監銀作局針工局知㑹候各監㸃出某王某妃行造已完本部照㸃開具該封王妃名數將各該開領物件擇日遣官事宜及應用木櫃扛索鎻鑰水陸應付脚力類題請㫖候奉有欽依方行司禮監照㑹禮儀内府各監關領物件兵部水陸應付工部扛索器具欽天監擇日五府翰林院六科尚寳司衙門等取應差官員俟欽天監擇有吉日各衙門取到正副使等官本部題請於本日先吿内殿傳制遣官持捧節冊將合用正副使等官名數開列請㫖㸃差前去候㫖㸃下欽遵施行𢎞治十七年閠四月内本部議得各王府親郡王以下子女請婚請封等項其該用冊内府各監局造備完辦候各王府另奏關給但本部差官前赴内府行㑹之時有等故意延阻以致先後遲速大有不同合無今後各王府應該行造物件移文到日務要照依行造月日挨次造辦其各王府差人闗領近者半年逺者不過一年照例具奏闗領本部行㑹之日即與關給不許那前䟎後以致冊封遲延嵗月本部仍行各王府長史司啟王知㑹凡遇差來闗領之時定立批限如有過月之上不回府者許其追究遲悞縁由徑自舉奏如或差來人役詐稱各衙門名目冒費財物者照例問發邊逺充軍等因節奉孝宗皇帝聖㫖准行欽此正德元年七月内該本部題各王府儀賔該闗鞍馬雖係舊例闗給之時未免守候日久及至闗出又多瘦瘠不堪騎坐其在沿途又有草料及裝載之費恐成勞擾今後除親郡王儀賔照例闗領外其餘悉宜革去令其自行措辦等因奉武宗皇帝聖㫖是欽此嘉定六年三月本部議擬各王府親郡王并妃冊封儀物等項遣使齎賜郡王儀仗照舊成造給領外其將軍中尉郡縣主君鄉君并各儀賔冠服等件例該内府成造給領工部造辦木櫃扛擡兵部起闗有司應付其間勞費不可勝言合無該部議處通算前項成造所費題奉欽依凡係該造辦給領者合無照先年折價事例行令定擬折價給與官錢令其自行造辦等因題奉聖㫖是這處置造辦等事都依擬行欽此冊封關領物件親王初封用金冊一副銀事件全金寶一顆寳池一箇寶匣一箇親王襲封止用金冊無印俱銀作局領親王初襲封用皮弁服冕服常服俱尚衣監領冊盝服匣一箇法服匣一箇䕶匣木櫃一箇銷金包服二箇俱内官監領親王妃用金冊一副銀事件全金墜頭一箇俱銀作局領用盝服匣一箇珠翠九翟冠一頂事件全舄料一副珍珠全銷金包袱八條俱内官監領未裁整疋大紅大衫一件紵絲一件表用紵絲一疋裏用大紅熟絹一疋零一叚銀絲紗一件表用銀絲紗一件裡用大紅生絹一疋零一段燕居服素夾四件大紅紵絲一件表用紵絲一疋裡用大紅熟絹一疋線羅一件表用羅一疋裡用大紅生絹一疋零一段大紅銀絲紗一件表用紗一疋裡用大紅生絹一疋大紅線羅一件表用羅一疋裡用大紅生絹一疋青線羅一件表用羅一疋裡用青生絹一疋鞠衣實金繡鸞鳯綵繡圏金雲夾四件大紅紵絲一件表用紵絲一疋裏用大紅熟絹一疋大紅銀絲紗一件表用紗一疋裏用大紅生絹一疋大紅線羅一件表用羅一疋裏用大紅生絹一疋青線羅一件表用羅一疋裏用青生絹一疋造完霞帔青線羅實金繡鸞鳯綵繡圏金雲二副各色大帶四條大紅三條青一條紅錦布包袱一條俱針工局領郡王初封用鍍金銀冊一副鍍金銀印一顆銀印池一箇銀印匣一箇郡王襲封止用鍍金銀冊無印俱銀作局領郡王初封襲封用皮弁服冕服常服俱尚衣監領冊盝服匣一箇法服匣一箇䕶匣木櫃一箇鍍金包袱二條俱内官監領郡王妃用鍍金銀冊一副銀事件全金墜頭一箇俱銀作局領冊盝服匣一箇珠翠七翟冠一頂事件全舄料一副珍珠全銷金包袱八條俱内官監領未裁大紅大衫素紵絲一件表用紵絲一疋裏用紅熟絹一疋鞠衣大紅紵絲綵繡圏金翟雞雲夾一副霞帔青線羅綵繡圏金翟雞一副俱針工局領世子初封用金冊一副銀事件全金寳一顆寳池一箇寳匣一箇俱銀作局領皮弁服冕服常服俱尚衣監領冊盝服匣一箇法服匣一箇䕶匣木櫃一箇銷金包袱二條俱内官監領世子妃服用金冊一副銀事件全金墜頭一箇俱銀作局領冊盝服匣一箇珠翠九翟冠一頂事件俱全舄料一副珍珠全銷金包袱八條俱内官監領未裁整疋大紅大衫一件紵絲一件表用紵絲一疋裏用大紅熟絹一疋零一段銀絲紗一件表用紗一疋裏用大紅生絹一疋零一叚線羅一件表用羅一疋裏用大紅生絹一疋零一叚燕居服素夾四件大紅紵絲一件表用紵絲一疋裏用大紅熟絹一疋大紅銀絲紗一件表用紗一疋裏用大紅生絹一疋大紅線羅一件表用羅一疋裏用大紅熟絹一疋青線羅一件表用羅一疋裏用青生絹一疋鞠衣實金繡鸞鳯圈金雲夾四件大紅紵絲一件表用紵絲一疋裏用大紅熟絹一疋大紅銀絲紗一件表用紗一疋裏用大紅生絹一疋大紅線羅一件表用羅一疋裏用大紅生絹一疋青線羅一件表用羅一