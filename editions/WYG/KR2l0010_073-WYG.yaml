body:
  text: 禮部志稿卷七十三明俞汝楫編宗藩備考藩爵王封祿秩太祖髙皇帝封國封子二十二人齊王谷王寧王遼王伊王以罪削封潭王湘王安王郢王無子國除今見存十四府又封姪一府而遼寧伊三府郡王以尚存秦王洪武三年授封諡愍國居陜西西安府嵗支禄米一萬石本折中半兼支今辭一千石晉王洪武三年授封諡恭國居山西太原府嵗支祿米一萬石俱本色今辭一千石周王洪武三年授封呉王十一年改周王諡定國居河南開封府嵗支祿米一萬石俱本色今辭一千石楚王洪武三年授封諡昭國居湖廣武昌府嵗支祿米一萬石俱本色今辭一千石魯王洪武三年授封諡荒國居山東兖州府嵗支祿米一萬石本折中半兼支今辭二千石蜀王洪武十一年授封豫王二十四年改封代王諡簡國居山西大同府嵗支祿米六千石本折中半兼支蜀王洪武十一年授封諡獻國居四川成都府嵗支禄米一萬石俱本色今辭二千石肅王洪武十一年授封漢王二十四年改封肅王諡荘國居陜西甘州三十一年移國蘭州嵗支禄米一千石本色七百石折色三百石今止支輔國將軍禄米慶王洪武二十四年授封諡靖國居陜西韋州三十三年移國寧夏嵗支禄米一萬石本色七千五百石折色二千五百石今辭一千石岷王洪武二十四年授封諡莊國居雲南永樂二十二年移國湖廣武岡州嵗支禄米一千五百石本色韓王洪武二十四年授封諡憲國居陜西平凉府嵗支禄米三千石本色二千石折色一千石瀋王洪武二十四年授封諡簡國居山西潞安府嵗支祿米一萬石本色六千石折色四千石諸王表開瀋王禄米止五千五百石本色唐王洪武二十四年授封諡定國居河南南陽府嵗支禄米六千五百石本色四千五百石折色二千石今辭五百石靖江王洪武三年授封國居廣西桂林府嵗支禄米一千石本折中半兼支成祖文皇帝封國封子二人漢王以罪削封今見存一府趙王永樂二年授封諡簡國居河南彰徳府嵗支禄米一萬石本色八千石折色二千石今辭一千石仁宗昭皇帝封國封子九人趙王蘄王滕王梁王衞王無子國除今見存四府鄭王永樂二十二年授封諡靖國居陜西鳯翔府正統九年移國河南懐慶府嵗支禄米一萬石嘉靖三十年傳至厚烷以罪禁住髙牆封爵不廢今王以建言赦復爵特加四百石襄王永樂二十二年授封諡憲國居湖廣長沙府正統元年移國襄陽府嵗攴禄米一萬石本色今辭一千石荆王永樂二十二年授封諡憲國居江西建昌府正統十年移國湖廣蘄州嵗支禄米一萬石本色淮王永樂二十二年授封諡靖國居廣東韶州府宣徳十年移國江西饒州府嵗支禄米一萬石本折中半兼支今辭一千石英宗睿皇帝封國封子七人許王秀王忻王徽王以罪削封今見存三府而徽府郡王以下尚存徳王天順元年授封諡莊國居山東濟南府嵗支禄米一萬石俱本色今辭一千石崇王天順元年授封諡簡國居河南汝寧府嵗支禄米一萬三百石俱本色今辭一千石吉王天順元年授封諡簡國居湖廣長沙府嵗支禄米一萬石俱本色憲宗純皇帝封國封子十人一初封興王後為睿宗獻皇帝其岐王雍王夀王涇王申王汝王無子國除今見存三府益王成化二十三年授封諡端國居江西建昌府嵗支禄米一萬石本折中半兼支今辭二百石衡王成化二十三年授封諡恭國居山東青州府嵗支禄米一萬石本色今辭二千石榮王𢎞治四年授封諡荘國居湖廣常徳府嵗支禄米一萬石本色今辭五百石世宗肅皇帝封國封子一人景王景王嘉靖四十年授封諡恭國居湖廣德安府無子國絶穆宗莊皇帝封國封子一人潞王潞王萬厯十七年之國國居河南衞輝府嵗支禄米神宗顯皇帝封國封子四人福王瑞王惠王桂王福王瑞王惠王桂王各府分封郡王有同城另城秦府永興王永夀王隆徳王保安王興平王安定王宜川王臨潼王郃陽王汧陽王鎮安王紫陽王各王嵗支禄米初封二千石襲封一千石本折中半晉府寧化王寧河王雲丘王河東王義寧王河中王靖安王旌徳王慶成王永和王交城王西河王髙平王平陽王新化王臨泉王陽曲王方山王徐溝王太谷王襄陽王安溪王靖安王滎澤王廣昌王各王嵗支禄米同前周府永寧王汝陽王遂平王封丘王内鄉王胙城王原武王鄢陵王河陰王頴川王義陽王臨汝王沈丘王上洛王魯陽王臨湍王堵陽王河清王新㑹王義寧王崇善王海陽王曲江王博平王汾西王魯山王信陵王邵陵王萊陽王東㑹王富陽王㑹稽王靖江王益陽王奉新王華亭王湯溪王瑞金王南陵王京山王寳坻王商城王柘城王修武王安吉王汝寧王彰徳王順慶王保寧王儀封王安昌王汝南王順陽王新安王鎮平王宜陽王羅山王項城王汝陰王平樂王定安王永福王聊城王麗水王臨安王遂寧王應城王各王嵗支禄米同前楚府永安王東安王通山王通城王江夏王武岡王巴陵王夀昌王崇昌王景陵王岳陽王大冶王縉雲王保康王宣化王各王嵗支禄米同前魯府鉅野王鄒平王安丘王樂陵王新蔡王東甌王翼城王滋陽王陽信王髙密王東密王東原王郯城王館陶王歸善王福安王長泰王各王嵗支禄米同前蜀府内江王石泉王汶川王慶符王南川王華陽王黔江王崇寧王徳陽王崇慶王江安王永川王新寧王各王嵗支禄米初封襲封俱一千石代府廣靈王潞城王和川王寧津王􅀥強王吉陽王溧陽王進賢王河内王富川王饒陽王襄垣王山陰王宣寧王隰川王靈丘王懐仁王樂昌王寧化王廣昌王定安王永慶王太平王江川王南渭王博野王昌化王寶豐王碭山王新寧王各王嵗支禄米初封襲封俱二千石肅府延安王鉛山王金壇王㑹寧王延長王淳化王開化王㑹昌王各王嵗支禄米初封襲封俱一千石慶府真寧