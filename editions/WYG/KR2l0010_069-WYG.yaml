body:
  text: 禮部志稿卷六十九明俞汝楫撰學校備考太學定監生歸省之賜洪武十二年命禮部凡國子生居京師嵗久有父母俱存或父母亡而祖父母伯叔父母存者皆遣歸省人賜衣一襲鈔五錠為道里費其父母或祖父母伯叔父存者人賜帛二疋太學石䥴勅諭成化三年二月上以祖宗以來欽降國子監􅃯諭學規勸勵師生之道罔不周備因命祭酒邢讓等募工鐫石樹太學中門外使師生永逺遵守復㑹饌勘丁憂二事成化四年南京國子監祭酒周洪謨奏伏覩太祖髙皇帝勅諭國子監并監規極嚴重㑹饌之事永樂宣徳以來俱曽㑹饌景㤗年間因缺柴薪暫且停止因循廢弛至今未復又言舊例監生丁憂俱准坐堂月日出身祭酒李時勉奏監生居家丁憂多有詐冒不准坐堂後給事中胡清又奏如此恐有匿䘮不舉者仍准之如清言士子或至於詐喪如時勉言士子或至於匿喪揆之理皆所當懲下禮部覆奏㑹饌移文南京禮部議行丁憂日月行所在官司保勘違者一體治罪從之覆行學政事宜成化四年八月禮部覆奏國子監祭酒邢讓所言學政事宜其一謂永樂間監生以病告歸者病已得復監正統間因而放還為民自是寕旅死不敢歸有足憫者今宜定例監生病滿三月保驗不誣許令還鄉一年以内復監不作坐堂月日若踰一年之外仍在為民之例其二謂舊制監生嵗一簡選其有事故復監年深者未經選過不得撥歴殊為淹滯今宜定例每嵗二次㑹官簡選庶便於撥歴不至淹滯從之申明撥歴事例成化六年禮部申明監生撥歴事例時國子監監生互争撥歴年月資次各援科條争辨不已祭酒陳監以兩詞具聞於上乞􅃯禮部酌中定制以息紛争事下所司禮科叅駁之而鑑不平上章辨之曰近據監生周中等言於天順七年九月以後入監成化五年五月間部行取依限復監共准坐監六年之上見今撥歴監生與中等年月多有不及欲先撥歴又據監生王端等言天順七年三月以後入監成化四年二月初行取復監除依親外實坐監食糧已經二年之上欲照本監序出通知文簿撥歴其周中等入監行取復班俱各在後實坐監未及一年却欲攙先撥歴以此两詞奏請定議今禮科輒叅臣等除去通知文簿任私撥歴以啟争端且本監止憑通知文簿考驗明白序出監生姓名揭於學門壁上萬目通視憑此撥歴何嘗除去通知文簿而給事不䆒其實妄為叅語奏上下禮部覆奏舊例監生以坐堂月日淺深次第撥歴近年以存省京儲遣囬監生依親就學其在家月日亦准作坐堂之數及文移行取以出部日為始計程亦作實數此外事故及患病俱作虛曠已是定例今諸生不遵舊規妄意紛争宜令本監一遵舊例不分先取後取監生一皆查究年月明白除虛曠外仍以實坐堂與依親准作坐堂日通計淺深以次撥歴若查曠監生增損月日許受抑者指陳而執之其行取監生必待移文到彼原籍轉給本布政司批文起送若途次不經布政司與南北直𨽻者轉於本府批文起送其有預給縣批及以放囘原引托言買書游學至京欲攙先入監者俱執治之仍計其地里逺近水程月日悉作虛曠其有從宦父兄者亦須宦所保明起送然後聽之上允所議議科貢與納粟撥歴成化十一年十月國子監監生三百六十一人奏臣等皆發身科貢循資入監而各學生員近有納粟入邊得入監者一千五百餘人况有未經食廩臨時寄名冐籍者率多㓜稚而撥監反在臣先乞通查冐濫從宜處分其在學曾為廩膳者亦與臣等相兼撥歴為便於是納粟監生二百一十二人亦奏以為臣等皆出學校亦有曾經科舉者朝廷以邊儲缺用下輸粟入監之例初不以年齒長幼論也俱下禮部議科貢乃祖宗舊典納粟實一時權宜况納粟送監及復班之日多在科貢入監之先若仍緣舊規以次取撥是使納粟者得以遂㨗取之願而科貢者不能無淹困之嗟宜􅃯國子監於此兩途酌其多寡相兼撥用俟粟納數盡然後奉例如舊議上報可榜諭國子監學規成化十一年十二月國子監祭酒周洪謨言洪武間學規嚴整士風忠厚頃來大不如昔奏凟紛紛欲壊累朝循次撥歴之規且羣造謗言宜加禁革上曰太學者賢士之闗也今諸生所為若是則禮義蕩然矣後將何賴禮部其申明洪武間學規備榜戒諭之舉人坐監例成化十四年禮部詳定監生依親坐監事例先是禮部奏不就教職及下第舉人宜依舊例俱送北監不許依親南道御史談俊言欲將新舊舉人分送兩監皆不果行至是尚寳司卿李本又言舉人監生緣㑹試而來不意留之坐監供給不周艱辛萬狀禮部乃為覆奏言洪武永樂年間舉人嵗貢悉留坐監三年一省親初無依親之例至正統十四年存省京儲始以年淺監生放還原學依親讀書其放肆無恥者遊説干謁靡所不為且舉人舊例俱在北監後有告入南監者徑還原籍既廹㑹試赴監取文以來所以俱送北監不許依親者懲宿弊也今本欲仍放依親俊等欲分送南監宜移文國子監以舉人年淺者放還俾提學等官時常考校如遇所司迎詔拜表須令儒巾行禮不許戴大㡌繫帶遊説干謁其願入南監者仍聴之如有愆期兩月雖有病帖亦罪之且以其名上本部次科毋容㑹試詔可請復太學生舊例正徳八年國子監祭酒石珤奏國家建學育才以端治本規模條貫一凖唐虞三代之法我祖宗朝太學生員坐班至十餘年始登仕籍故雖中材之士陶鎔日久亦有可觀正統景泰間偶因西北用兵暫放依親讀書遂成故事然猶嚴復班之期謹違限之法坐班生員多者猶六七年少者不下三年盖化必久而後洽業必久而後精也頃因納銀生員數多奏准減歴一時權宜未為盡失但行之已五六年坐班生員挨撥欲盡其依親者多限年未該行取已行取者又多過期不至今坐班食糧僅六百餘人科貢裁什之三四其間舉人尤少所養非所用豈設學之初意哉况各衙門歴事一年所用約八百餘人出多入少不及此而增損斟酌之不惟賢才空虚無以稱辟雍之盛而歴事衙門亦將服役供事之不繼矣如此不已恐謀計之臣必且乗閒復獻輸粟之策是使正途壅塞賢才重困而天下之士相率而趨於利其為治道之蠧豈小小哉乞照先年事例歴事或十月或一年方與起送撥補而雜歴等項亦遞加月分仍申嚴復班限期不使冐送問之法杜絶官醫保結不使長欺偽之風則士有定志人得専業既無欲速之弊亦消見利之心六館不至於乏才諸司亦可以濟事矣禮部議覆珤言允當但撥歴事例因時增減不常請照𢎞治十五年例正歴寫本各一年長差二年其依親經行取者仍􅃯天下提學官嚴督所屬立限起送違者送問詔從之監例酌處監生嵗增永樂十八年禮部言國子監生嵗益增又㑹試下第舉人例送監今學舎隘不能容請以監生南人送南京國子監下第舉人發還原學進業以待後科自今嵗貢生員請如洪武三十年例府一年州二年縣三年貢一人從之監生老除教職正統元年北京國子監祭酒貝泰言朝廷設國子監聚天下之英才資百司之任用廩養豐厚勸勵勤至故凡在甄陶者咸思有以補報近年行在禮部奏准監生年五十以上者㑹官揀退為民是時有年及五十者雖得留選然俟至歴事之日又在揀退之年窮經皓首莫酬志願教養厚恩未答涓涘與其待老放閒孰若揀賢授職况臣聞在外府州縣儒學多缺教官乞命該部將此等監生考其學行可為師範者除授教職如此則無淹滯之患矣從之行揀選法正統四年禮科給事中劉海言北京國子監見存肄業及歴事諸司監生二千五百餘人其中有年五六十嵗者有久病殘疾者有貎陋而學無進益者乞􅃯各衙門堂上官躬詣國子監通行揀選其不堪任用者罷斥為民庶人才有選揀之精糧廩無虛耗之弊而國家得實才之用矣事下禮部請如所言上從之仍命南京國子監亦如是例揀選監生居憂不作曠正統八年禮科都給事中胡清言比者國子監祭酒李時勉以監生居憂二三次以上者中間多有虛偽奏准居憂月日俱不作坐監之數遂致先入監者坐此不得出身年益衰邁徒切嗟嘆夫忠孝臣子立身之大節不幸父母或祖父母物故為子并嫡孫居憂承重豈得已哉茍慮人之虛冐遂并實居憂者概作虛曠臣恐競進之徒於將撥之際匿喪不舉是廢孝矣豈不所慮者小而所失者大乎乞􅃯該部今後監生居憂省祭公故不過期者俱作坐監月日事下禮部議尚書胡濙等請如清言第托故過期者雖有文據亦不准冒居祖父母嫡繼母憂者府縣官虛文㭺飾者許提調學校御史僉事并按察司官體實䆒問上是其議命著為令申飭監學弊習天順二年國子監學正閻禹錫言國子監乃教化之原禮儀之地奈何近年監生入監多懐倖進之心少有向學之志徃徃通同廂房總掌脚色監生竝各堂友長啖之以酒食誘之以賄賂竄抺供詞湔補脚色或倒坐年月以圖續黄或隱匿虛曠以倖歴事欺蔽那移難以枚舉鑽刺請托不可殫述遂至黠狡者早獲出身誠恪者淹至皓首亷恥道䘮奔競風興宜申明洪武舊制學規務責躬行實踐不許視為虛文仍置通知文簿六本備書通監逐年監生脚色付各堂收執使衆曉然知孰先孰後凡各衙門來取歴事清黄之類悉照此挨次注撥為便事下禮部議以為洪武中條陳學規警戒監生極其詳悉盖欲造就人才以資任用近年監生罔守舊章専事奔競誠有禹錫所奏宜申明舊制并置通知文册悉如禹錫所請敢復前弊之蹈而差撥失先後序者許同時受抑之人具實陳告本部奏聞䆒治詔如議行復班監生撥歴天順三年國子監祭酒劉益言本監放囬依親丁憂復班監生那移年月到監輙與坐堂年久及辦事者一概挨次撥歴非惟勞逸不均抑且不諳政體難以任用上命禮部定議以聞於是議今後丁憂復班監生須坐堂及辦事半年方許撥歴仍移文各處有司有依親監生丁憂者隨即申達本部以憑稽考若無預先申文止於起復之日扶揑文書到部者將經管官吏并監生一併䆒問從之提學官收納例監生肄業成化二十一年三月禮部議覆南京吏部等衙門應詔陳言内一事欲將各處納銀米入署者分送南北二監自具薪米肄業請止限以坐監兩月如自願具薪米以留者聴其年十三四或十六七則俱行各處提學學校官收入本學肄業滿十年乃復監從之處納銀入監違例成化二十二年禮部奏直𨽻大名縣附學生員王鈜等三名赴山西納銀入監審出各生不係在學生員宜革退上曰違例詐冐入監本當革退但既納銀賑濟矣姑容本學為增廣生讀書年二十以下者八年二十以上者五年滿日有司重給文移赴部送監仍行各處提學官從公清審類此者如例行之處納粟科貢撥歴成化二十二年申定國子監生撥歴之例先是以國子監納粟監生四千六百七十餘名行取復班欲如例與科貢監生相兼撥歴行禮部奏處置有㫖命本部㑹同吏部國子監斟酌以聞至是覆奏納粟與科貢監生相兼撥歴已有定例但今納粟者多而科貢者少宜從國子監通行叙出各取其復班嵗月深淺以定其名次先後臨撥之際以兩途人數多寡酌量均平相兼撥歴如此既不乖祖宗一定之法亦不失朝廷權宜之信仍行南京國子監如例施行上從之命本監臨期務必酌量均平不許狥私革願留坐班例𢎞治二年國子監舊例監生自備柴米願留坐班三年滿照例歸省復班查無虛曠即與收糧一月以上遇有清軍清黄續黄冩誥及天財庫辦事等項年滿役者挨次撥補後以自備柴米願留坐班者意圖越次出身奏止之至是納粟監生許龍等皆以自備柴米坐班三年歸省復班具奏乞如舊例收糧撥歴下禮部覆奏議以龍等願坐俱係新例前其收糧撥歴宜如舊例今後有願自備柴米坐班者皆不聴從之處坐班數少𢎞治四年十月南京國子監祭酒羅景以坐班監生數少不足差撥乞取各處依親服滿監生并留今嵗新貢及舉人之入監者俱免放依親禮部覆奏如其請且以國子監南方納粟監生量改南監以備差用從之疏通監歴𢎞治八年五月國子監祭酒林瀚奏順天以前監生多在監讀書十餘年方得撥歴後因積滯人多頻減撥歴嵗月以疏通之至是監生在監者益少吏部聴選積至萬餘人有十餘年不得選者請量開科貢且照舊例撥歴下禮部覆奏科舉名數已有定額不可再增各處嵗貢生員自明年以後請如永樂二年例府學一年二貢州學二年三貢衛學縣學一年一貢其順天應天二府學一年三貢俱至𢎞治十二年止四年之間嵗貢人數增三千五百餘名分送南北兩監庶足坐班撥歴之用其兩監撥歴等項亦請自明年為始正歴監生三月考勤之後仍歴一年其餘冩本者一年清黄冩誥清軍清匠者三年以至隨從御史出巡之後俱照舊制月日滿後方與更代俟監生如前積至一萬以上再行查處如此庶諸生坐監稍久各司差撥不缺不惟監學舊制可復而仕途亦不至壅滯矣從之歴滿監生放囘依親𢎞治十五年復行放囘依親之例舊例國子監分撥各衙門辦事監生正歴以一年餘三月為滿冩本以一年為滿出巡長差以三年為滿而近例歴生不許放囘依親至是監生蕭昺等奏稱壅塞淹滯請暫為疏通併行放回依親之例禮部覆奏請正歴者減歴三月長差減一年冩本者仍舊其願告依親者聴從之處監生撥歴不敷嘉靖十年是時國子監生在班者不及四百人而各衙門歴事嵗額㡬有千數該監以撥歴不敷疏請預處詔禮部詳查舊規擬奏於是尚書李時等覆稱國初監生俱由廣業堂肄業積漸升率性堂始得積分出身故天順以前監生必作養十餘年然後撥歴後因積滯人多節將撥歴嵗月量減至𢎞治八年國子監即有坐班人少不敷撥歴之請該本部尚書倪岳題稱權宜捄之法有二增貢額以足坐班生徒議差歴以久坐班嵗貢擬將府學嵗二貢州學二嵗三貢縣學一嵗一貢行四年而止其各衙門歴事三月考勤之後仍歴一年其餘冩本一年清黄冩誥清軍清匠三年以至出廵等項俱如舊例日月為滿今國學缺人視𢎞治時為甚所有前項事例似應叅酌舉行得㫖在監坐班人少皆因近來將歴事月日減少而雜歴長差等項増多既天順年前十年以上方得撥歴今乃未及一年已夤緣撥出大壊祖宗作養之法吏部其查各衙門歴事舊例人數明白開奏著為定例不許仍前濫撥及令出銀冩本無名差用各項歴事日月俱照倪岳題事例滿日方許更替凡歴事及出廵奏内既該監生僉名一應事務許其公同評議舉察所司奸弊以稱祖宗設立歴事深意以後考選嵗貢入監務遵監規由廣業堂漸升率性然後積分出身果有超越奏聞擢用貢額不必增恐致異日選法壅滯其監生給假者取復班條陳監規嘉靖十五年三月禮部題該國子監祭酒吕枏題稱監規五事臣等謹開立前件依擬上請一行取入監告囘舉人奏稱舉人在監本以觀皇上薫陶羣士今查實數以天下之廣止二三十盖自㑹試之後或入監未久或就於禮部支稱他故奔囘原籍有志者固不廢學餘多交際郡邑業治門産及試期方攢監簿乃計水程覬圖撥歴未仕如此居官可知乞􅃯該部將己未入監告囘舉人移文各省定限行取坐監違限半年者准在監作曠三月計月加曠若違至年半通未入監免其考試庶㡬士類知儆向學者衆本部議得舉人㑹試下第之後多有稱病囘籍又有到監數月告回依親搬取等項以致坐監缺人數多實近來士習之弊相應議處覆奉欽依通行南北直𨽻并各省直布政司將原部在監告病并依親搬取畢婚等項舉人俱以文書到日為始限三箇月内起送前來發監肄業如有限半年者准作監作曠三月計月作曠若延至年半并通未入監㑹試臨期方至者定行䆒問查勘明白方准入試一嵗貢於食糧年深内考取奏稱嵗貢入監即古鄉舉里選六徳六行六藝之士也古稱四十道明徳立近見嵗貢中有二十上下者其徳行焉考甚至禮讓未聞遇事興争煽及例貢勢利相加奔競為能殊壊士風是雖臣等無教亦緣各提學官嚴選貢之例慮有退貢懼貶已位故惟取詞章不論行檢遂使邊衛下邑質樸淪墜不獲一貢乞勅該部轉行提學當嵗貢之期還於食糧年深三二名内考取隨地方都鄙髙下人才多寡列為上中二等使遐荒亦有文物昭聖上一視無外之心然其較文只准聖賢書理明辭達不専富麗若有踵襲兩晉六朝人語竒怪難讀者俱從黜落仍必遵祖宗卧碑監規叅取等因本部議得祖宗嵗貢舊制令提學官于各學食糧年深生員内考貢一人如果不堪方將以次陪貢者考充所以多得老成之士近年新例不論食糧深淺通學考取將年少小生員充貢是以在監則不聞禮讓争趨勢利授職則不堪為人師長况才性可以𤼵科登第者亦徃徃茍趨目前自棄逺大考其學業又不過崇飾浮詭無經明行脩之實查得本部累次具題及近日奉有明㫖著以食糧次第起貢已經通行外合再申明覆奏欽依今後在學生員年老無進益者照例給與衣巾終身如果平素奸頑把持學校挾制官府勾擾公事凡一切行止有虧者令提學於嵗貢之時嚴加查考黜退不許食糧冐貢一依親囘籍監生起送肄業奏稱納銀例貢在監者固有監規教條日就月就將近奉欽依聴其依親原籍亦得與考科學亦固可待志士矣惟他無志者一旦還里挾富豪之家恃監生之名抗揖守令肆行鄉閭或兼服商賈不復知所嚮徃他日有官殃民不淺見今查有投文到監未及旬日即逃囘籍數人乞􅃯該部將依親例貢行各提學官嵗貢之時隨本學生員量行試騐畧用賞罰仍令轉行各府州縣正官月一查其行業類報庶㡬知進亦肯復守監規其逃監及稱患病三個月外者許臣等查報該部處治等因本部議得納銀生員假以援例入監已是國學人數今依親囘籍者與同本處生員一體量行賞罰考試似非事體勢亦難行但稱逃監等項相應查處覆奉欽依行令南北直𨽻省并各省布政司比依親給假在家例貢生員限三個月以裏起送前來發監肄業如有過違者照例送問其私自逃監者許該監查部轉行法司提問照依律例問罪一公侯伯子孫入監習禮奏稱公侯伯子孫己未襲爵未管事官例該在監習禮讀書支饌米以養盖有文事斯有武備也舊規每日在監其後每從寛簡定以三八日期近臣等到監有二三人依期受書習禮者餘多不至盖此輩挾父兄之勢倚閥閲之家惟躭驕惰不修禮讓平居如此一旦管事豈知練撫軍士之道乞􅃯該部轉行各爵戒飭子孫使之敬業樂學以永保祿位與國咸休有違例久曠者許臣等指名叅劾等因本部議得公侯伯子孫己未襲爵未管事并駙馬年二十五以下者俱照例送監讀書近來委多廢失舊規相應申明戒飭覆奉欽依備行兩京五軍都督府轉行各爵除駙馬都尉謝詔該本部題准劄付主事教習外其餘例該送監者俱要照舊規送監讀書習禮不許挾貴遺教庶學業有成文武兼濟他日可備朝廷任使而勲名閥閲為益隆矣一重刋儀制以給諸生誦習奏稱士必知古斯可通今儀禮一書乃成周致太平之具者也世行髙堂生所𫝊十七篇者宋儒楊復又為圖解皆可習行近臣等選諸生按圖學歩自冠射鄉燕至士相見諸儀使其閑乎進退周旋之節養其中正和平之氣惜此書稀少靡所取據而禮樂諸器舊多未完甚至六館桌案亦皆不具乞勅該部重刋儀禮印裝一二百部并造前項禮樂諸器桌案等事以便諸生㳺業足凖大雅鼓鐘辟雍周禮徳音樂語之意其諸生不能聲律者乞􅃯太常寺遣知樂官導數人𫝊諭諸生節奏音響等因本部議得古人之學固不外乎禮樂而禮樂之用不専在乎器數文為今祭酒吕柟欲稱禮書樂器使諸生咸習其事具見本官尚古好禮之意相應議處覆奉欽依行令該監將儀禮一書精加校正刋刻印行本部仍移咨工部照數給與工食紙價並將該監原有禮樂諸器及桌案等件果有損壞不備通行查明補造發監備用所奏乞􅃯太常寺遣知樂官道數人𫝊諭諸生節奏音響緣太常寺官生俱係供祀郊廟人員難以遣撥宜令諸生自行講求習學題奉聖㫖准議納銀例貢逃監三月以外𤼵回原學肄業欽此議處嵗貢生不願入監嘉靖二十四年先是祭酒程文徳以國學空虛議於嵗貢生員廷試之後擇當年應選者留之守部餘者盡令入監肄業以實國學已得㫖報可以是嵗貢生員張士良等疏言年老家貧不願入監吏科都給事中劉學易等亦上疏稱其不便禮部覆言文徳初議祗以近年選法壅滯各生守候艱難不若令其入監就廩餼以實國學其意實欲以便之非苦之也而諸生不樂從者則亦有説盖徃年貢有常數選途不壅即在監生儒例得告送就選故人不以入監為憚煩而國學亦充實自選貢增貢之例開而老成格於少壯人數倍於徃昔仕祿之念彌急銓選之法益滯是以在部日見其多而在監日見其少一聞則慘然不樂盖龎眉皓首之人力不能任升散之勞復使之循次愉樂以俟有司之選則年不及待而其志已灰故寧願留部候選以遂祿養之計而不願入監需選以僥倖不可必得之官也乞令今後嵗貢生員年力精壯者送監肄業其有自願守部就教者亦各從其便至於下第舉人則多係年少氣髙不屑就監與貢生不同宜盡發兩監肄業不許托故回籍其有已送監而遷延不至及到監而無故潛回者該監治之有全不赴監輙持原引及原籍起送入監文書投試者有囘籍之後陸續投告送監以覬赴試者本部治之仍不聴㑹試如此則不必假嵗貢而國學自實矣議入報可嚴限赴監撥歴嘉靖三十八年禮部覆南京國子監祭酒潘晟議節年下第舉人本部俱限定水程分送南北監肄業但各生徃徃不依限赴監其嵗貢援例生員雖未入監又多揑告依親患病給假等項回籍不行依期復班以致在監人少不敷撥歴請申明典例凡舉貢援例生員告南監者通查本部原定水程如違半年以上者作曠三月計月如曠一年以上送問其依親養病者除水程外亦三月復班如仍前故違期限者定行查革仍咨都察院轉行各巡按御史將前項生徒下有司嚴限起送限三月以内赴監如違半年以上罪承行吏一年以上罪首領官舉人遷延及廹試期方赴監或不入監而赴試者本部送問如例不許入試嵗貢生非年老者不許授教庶法制嚴明國家充實報可貢例嵗貢生員之始洪武十五年二月命天下學校嵗貢生員時諫官闗賢言國朝崇尚儒術春秋祭享先師孔子内外費至巨萬尊師之道可謂隆矣天下生員嵗給廩米亦數萬石養賢之禮可謂厚矣今又建太學聚天下英才以教育之期為國家用也奈何所師非人師道不立平居教養既無其法及至選貢賢愚混淆至有缺員又或府選於州州選於縣致使為師者不能各任其職甚至布政司按察司將俊秀有學問生員選充承差有乖朝廷育賢之意今宜令府州縣學嵗貢生員各一人如考試中式則賞及所司教官否則所司論如律教官訓導停其廩祿生員罰為吏如是則士有勸懲學有成效從之命禮部榜諭天下府州縣學自明年為始嵗貢生員各一人正月至京從翰林院試經義四書義各一道判語一道中式者入國子監不中者罰之貢生不中式者坐提調洪武十七年禮部言府州縣嵗貢生員不中式者提調官吏論以貢舉非其人律教官訓導罰一年貢不如期者以違制論從之嵗貢不中式洪武三十年禮部侍郎張炳言今考中嵗貢生員葉憲等七百二十三人已送國子監肄業其不中式一百十八人遣歸本學停膳肄業教官訓導及提調官例皆罰俸上曰師不嚴訓有失於勉勵者罰如例諸生不中式者且遣歸肄業勿停其膳四川去京師道逺徃復實難可留國子監肄業勿遣嵗貢令送部考選宣徳七年九月行在禮部尚書胡濙奏今天下府州縣學生員有年五十之上方入貢者此為國子生又十餘年方得歴事出身則已年老不堪任事虛費廩饌不得其用乞今天下學校生員年四十五已上盡送部考選定奪從之嚴嵗貢考中之法正統元年行在禮部奏天下嵗貢生員例從行在翰林院考試中式者送南京北京國子監讀書初不中者仍發原籍住廩肄業以待復試再不中者發充吏役提調官教官如例責狀犯在赦前者免責狀從之南貢生入南監成化十二年四月禮部言南直𨽻府縣嵗貢生員考中者例得送南監景泰間因北監充撥數少暫留今宜仍舊例從之揀選貢生𢎞治十七年四月禮部覆奏南京國子監祭酒章懋所言學校事謂兩京監生先自諸生歴數十年始得貢迨入國學又歴十餘年始得官則其人已老多不堪用此今日積弊之大者請如懋所奏今年每二年一次兩京禮部㑹官揀選果衰老篤疾者量與冠帶榮身如文理不通行止有虧故違監規者發為民各處提學官尤當清理學校以為端本澄源之地每生員進學起貢務如例考選庶應貢者多有用之材而仕途亦不患其不清矣從之覈嵗貢𢎞治十七年五月禮部覆奏監察御史何天衢奏各處儒學生員多虛糜廩祿其起送嵗貢者或虛應故事請令巡按監察御史㑹同提學官三年一次通考在學生員列為上中下三等廩膳不諳文理者追糧為民其每嵗應貢生員不許以衰老殘疾者起送違者治罪上曰今後各處提學官敢有仍循情姑息將衰老殘疾并不堪教養之人濫容在學及起送充貢者一體叅究黜罷土官學嵗貢十一月貴州程番府知府鄧廷瓚奏本府新立學校土官土人子弟在學者乞嵗貢一人如選貢例上曰朕以蠻夷率化既建學置徒比之内地但科舉之業未可猝成宜嵗貢生員一人俾觀我國光相勸於學以稱立賢無方之意申飭嵗貢違例正徳八年十一月禮部言各處嵗貢生員違例起送者多故本部事例亦有開載未盡者宜酌處申明自今各學務依該貢年分及計到部期限預推食廩年深者正副各一人送提學官考定即給文起送令依期到部其有已考領有試卷特未給文而丁憂患病者雖無情弊者亦發為民以懲偷惰若當貢者遇考時有故者聴將以次者考充候其服除病愈乃得應貢補貢年月俱以各地方到部期限為斷如直𨽻限年今正月到部者考補貢生至明年正月以後即為一年之上不得己未及一年為觧矣自今申明之後敢有再違及將老疾之人充貢者所司并提學官聴本部叅䆒庶舊制不失而人知所守從之請立考貢法嘉靖五年國子監祭酒嚴嵩請復舊規以膳銀分給師生飲饌之資而㑹其餘羨以支公費監生老疾鄙陋不堪作養者給冠帶囘籍以省冗食諸生廩餼即以時給饌米勿待三月禮部善其議第以為監生老疾不堪者繇充貢時去取不嚴宜令提學官立考貢法每正貢一人陪考九人拔十得一不計資序凡三為正貢不入選而年過六十者許以冠帶榮身上命考貢以次取四人餘皆如部議處年老嵗貢嘉靖七年十月禮部該監察御史秦武題為清名器以光聖治事内稱年老嵗貢乞要定處等因本部議擬覆奉欽依通行各處提學官自嘉靖八年分以後考取嵗貢生員果有容貎衰老文理不通三次不能中選年六十以上者不准起貢即便類名到部奏給冠帶以榮其身嚴貢生覆試嘉靖十年禮部尚書李時等上言臣等仰承明詔備考祖宗之時徃徃得人於貢途而今之嵗貢以憫老恤窮為舊規以選賢黜耄為苛法俗弊既深何以得賢自今宜依宣徳正統天順年間例行兩京及各省提學官於各學廩膳内通試及多方體訪果有學行出羣年三十以上者府學許貢三人州學二人縣衛學一人以後各學如期起送如廩膳無人增廣内考取增廣無人附學内考取務求真才以應明詔如有名實不稱及夤緣干進之弊聴撫按官糾舉廷試有不中式者其提學官一名以上叅䆒提問五名以上降級改用仍行國子監依祖宗監規送廣業堂月嚴考試學業進修者方許以次升至率性堂撥送諸司辦事間有考試累優行誼著聞堪以任用者年終具奏本部㑹同吏部覆考得實奏請選用覆試不如式者仍常撥歴如此則選擇既精而嵗貢不患不得人矣其廩膳中有年老不堪貢者予以衣巾終身國學中有年老不堪選者予以衣冠終身俱量蠲雜徭則獲送者既得以自盡其才而被黜者亦不至於失所疏入上曰朕惟祖宗朝設立嵗貢之法實寓古里選之制期得以真才資國用邇來生員茍得帮廩即計充貢有日徃徃有不修行檢挾制官司欺篾郷里甚至虧缺倫理玷辱衣冠及有學問荒疎年力衰邁有司不問賢否止計食糧淺深一概循資充貢却又多貢選教官以為人師欲求人才長進誠不可得自今嵗貢生員務令府州縣提調官選舉有學行者方許起送廵按御史處㑹同提學官并布按二司官從公考覈照常數貢舉先儘廩膳如果無人許以增廣附學内考取不許専論食糧淺深以襲舊弊即有年老不堪教養者令提學官嚴加考選無行者黜退為民其餘量予衣巾終身廩膳有缺提學官毋得輒聴權要子弟濫與收補如未得人寧令空缺其嵗貢入京廷試再有衰老無學及行檢不脩者所貢舉官一體坐罪不貸國子監見坐監生員該部還查照舊規定擬以聞開貢額嘉靖十年詔開天下嵗貢生員額二年以充國學如𢎞治八年例府學嵗二人州學二嵗三人縣學嵗一人順天應天學嵗三人仍飭提學官嚴加考選不得冐濫時祭酒許誥以生徒益少請如嘉靖初元增貢額禮部直𨽻提學御史胡如善亦請處嵗貢抑奔競及增貢額禮部覆請故有是命停止選貢新例嘉靖十年禮部覆都御史史道言祖宗令甲凡嵗貢生員必食糧年深者邇者建議之臣徃徃病其衰朽遂欲痛加汰黜大非祖宗建學育才之意至欲盡一學精選之不拘其年之淺深夫是途之設本以待累舉不偶之士今之貢者亦前之鋭志場屋者也且國家用人科目為重今止據少年一日之長遂令充貢是阻其終身科目之望而使年深者永無出身之途矣乞遵舊令有司推上正副貢各一人聴督學者考定送部不必如近例增至四人五人合試以滋凌奪奔競之弊上悉從之且令頒示天下不得紛更奏擾復嵗貢舊例嘉靖十一年正月内禮部題為嵗貢生員事查得先年事例凡天下府衛州縣遇該貢之年提學官將各學廩膳及優等生員各照食糧入學年數挨數年深者二人考中一人起送赴部奏請廷試若初試不中者遣復原學停廩肄業次年再復試不中者充吏如患病丁憂等項候其病痊服滿之日查無違限託故情弊仍准收考有司貢不依期者有以違制論又查得嘉靖六年該國子監祭酒嚴題為查復舊規以恵養生徒事本部覆題奉聖㫖今後提學官考選貢生員照依食糧次序挨取四人陪考務要通曉文理方許起送充貢欽此嘉靖十九年九月内該廵按直𨽻監察御史胡明善題為申明學政事本部覆題今後嵗貢生員每處提學官徑自考送不必㑹同廵按二司其起送應貢者每嵗考之時即應詳定如廩膳考居一等之内不拘名數仍查食糧年深者起送一人如無人才去處一等無人方許於二等内十名以前起送等因奉聖㫖這嵗貢生員即兩京國學缺人數多各衙門撥用不敷准照例開貢二年還行與各處提學官員嚴加考選不許冐濫其餘准擬欽此本年十二月内該都察院右僉都御史史道題為請復嵗貢舊制以通利人才事案呈到部看得都御史史所奏其言通達大體曲盡人情殊為有見本部先因提學御史胡明善所奏本部定擬考居一等二等三等四等之説似為立例太繁合無遵照祖宗舊規今後每年嵗貢止以廩膳生員食糧年深者充貢每遇該貢之年有司起送止許正貢一人陪貢一人提學官處考定一人起送赴部不必如近年事例加添四五人送考徒滋凌奪奔競之弊虛費道路奔走之勞其考貢不中願告衣巾終身聴于提學道應貢到京願告冠帶榮身者聴本部俱照例准行等因奉聖㫖是這嵗貢生員事例你部裏既議停當都著照舊行便行文與天下知道再不許紛更奏擾欽此查得今年貢到嵗貢生員有照通行㑹考不拘廩增附生起送者有照考居一等年深廩膳起送者有照正貢一人陪貢一人各取起送者前項人數事例雖有不同俱係各府衛州縣該貢人數雖各所司考送之法不同然奉行事例則一既經查審明白相應一體收考以後年分自當欽遵明㫖照舊舉行等因奉聖㫖祖宗設立貢法每嵗例選入貢務要人物厚重通經能文的後來却只依食糧淺深挨貢以致年老闒茸的充塞正途嘉靖十年正月内你部裏遵奉聖㫖議處㑹考已有明㫖了今次各項貢到生徒且准收考内有重複的還將㑹考過的留考以後只查前㫖行欽此六月禮部奏今天下嵗貢廷試不中式者五十九卷近本部遵奉詔書議處生徒内開廷試有不中生員一名以上提學官提問五名以上提學官降用隨奉聖㫖令廵按御史㑹同提學及布政司按察司官員從公考選起貢此例定自嘉靖十年各提學官奉行當自十一年始今所考黜生員惟當按應十一年貢者為各提學官罪御史既與二司官㑹同考試亦宜分受其罰以後事宜便聴臣等從長議處得㫖嵗貢廷試不中五名以上提學官俱照見行事例降一級别用未盡事宜其更議以聞於是禮部覆言提學官貢士既不得専委則罪譴必宜分任况一名以上提問五名以上降級似乎立例太嚴臣恐提學官畏罪必至有不敢起貢之處偏方下邑遂至無人學校之政廢而教化之原塞非議之得也今各處按察司提學官應降級者咨送吏部應逮治者及南北直𨽻提學遼東帶考各御史俱叅送都察院并斷自十一年始一遵明例示戒夫考退之罰提學官既以専職獨坐則考選之事亦須専任責成請自今止令提學官遵奉􅃯諭悉心從事其嵗貢照例先食糧年深者取考果有不堪方以其次考免御史及二司各官毋得侵越庶責任既専可以自効既被譴罸當亦無詞其廷試不中生員故事有願告冠帶衣巾終身者聴宜與之以𢎞朝廷始終作養之恩其邊逺地方本與中土不同是以累朝有免考送監之例有從便舉貢之例有選取身材不限文字之例今若一例發回艱苦特甚如雲貴廣西北邊或稍寛以覆試之條以無失祖宗曲成人材之意上曰嵗貢選事俱係祖宗舊制已有明㫖巡按及二司官雖係㑹考而提學官職専提調貢非其人責實難辭五名以上降級遵前㫖行三名以上提問俱自十一年為始南北直𨽻提學並遼東帶管御史今兩京都察院逮問黜退生員原無覆考事例願告冠帶并衣巾者聴停罷嵗貢嚴例嘉靖十五年是時嵗貢例嚴自嘉靖十一年始至十四年天下郡邑缺貢至一千一百九十餘處禮部言國初建學設貢本以興起斯文故寛立條格開其進取之路今新例既嚴提學官畏避降罰於各府州縣學該貢年分多不起貢且偏方下邑既鮮科目又無嵗貢其勢必至頽廢學校盡散生徒非祖宗立法意也况考選雖名㑹同權實専於御史及廷考不中顧乃獨罪學官不特情理未協於先年設官専督學政初意亦已大謬臣請查復累朝學校起貢舊例行令各提學官自後惟於食糧年深者起送二人考選正貢不堪許以倍貢考充不必㑹同廵按二司官亦不許概學通考以啟夤緣倖進之路其赴京廷試不中准令回學肄業再試不中照例充吏止罰治提調官教官提學官不必降級其一應提督學校事宜并遵成憲并見奉􅃯書行事仍通行各提學官將十一年後缺貢地方依考補起貢庶事體歸一易於遵守而人才亦各得其所矣得㫖允行嚴考貢不稱例嘉靖四十年更定嵗貢法今天下督學官每嵗嚴加考校如正貢考不稱則起次貢復不稱則起次貢以下者必得其人乃以廷試嵗貢如一省發回五人以上者提學官降級别用酌行嵗貢新法嘉靖四十四年禮部言近者言官以貢途日輕欲稍更舊法在御史龎鵬則請各郡國廩膳生員即以嵗考前列處之就中叙其年月久近充貢在給事中張鹵則請當貢期每學起送止倍四人提學官遴選今後提學官考試當先嚴補廩之法考居下等者照例停降黜退每遇貢期取年次在前者四人拔其尤若皆不稱則以次復起四人必得人乃已其至京廷試限以五月十月令翰林院詳加考較而懷挾代試等弊命御史糾察之本部騐其年力有餘者分兩京國學肄業吏部以次叙用其才識超卓不羣即待以優禮從之嚴考貢責成隆慶二年禮部覆提學御史周𢎞祖奏正士風五事一廣恩貢以實國學二申卧碑事例以整澆風三久任教職以收成效四責成有司以懲玩愒五試題須善惡並陳以革剽竊之習得㫖開貢本為求才各提學官其嚴選毋濫如廷試之日𤼵回三名以上者提學官以不職論降一級禮部志稿卷六十九
