body:
  text: 禮部志稿卷三十八明俞汝楫編主客司職掌給賜迤北韃靼及衞喇特以下北夷永樂宣徳中賜衞喇特順寧王綵段十表裏妃五表裏頭目一等者五表裏二等至四等者四表裏正統二年賜韃靼國王綵段十五表裏虎斑絹十疋妃八表裏頭目一等八表裏二等六表裏三等五表裏四等四表裏外有加賜六年賜迤北太師段絹與國王同共妻毎口五表裏一等二等類内頭目毎人加賜織金綵段一表裏天順以後一等二等者不加賜三等者俱二表裏差來正副使毎人賞織金衣一套靴韈各一雙其後定例一等正副使毎人彩段六表裏絹五疋二等使臣綵段四表裏絹三疋三等綵段二表裏絹二疋四等綵段一表裏絹一疋俱與紵絲衣一套紅氊帽一頂靴韈各一雙數内婦女不與紅氊帽使臣自進中等馬毎匹綵段二表裏折鈔絹二疋下等馬綵段一表裏絹八疋折鈔絹一疋下下等馬綵段一表裏絹六疋折鈔絹一疋帶進在彼頭目馬匹不分等第毎匹綵段二表裏給賜在彼頭目一等毎人綵段八表裏二等六表裏三等三表裏四等二表裏内一等二等𦂳要頭目加賜織金綵段一表裏回賜永樂九年回賜順寜等王上等馬者各綵段十表裏海青一連四表裏白狐皮二十七箇四表裏宣徳間回賜順寧王及使臣人等進馬中等者毎匹綵段二表裏折鈔絹二疋下等者紵絲一疋絹八疋折鈔絹一疋下下者絹六疋折鈔絹一疋駝毎隻三表裏折鈔絹十疋中途寄留倒死新生駒馬毎匹絹三疋折鈔絹半疋駝毎隻絹六疋折鈔絹一疋海青一連一表裏銀䑕皮二百箇十二表裏貂䑕皮二箇絹一疋青䑕皮十箇絹一疋土豹一箇絹七疋半正統元年回賜使臣銀䑕皮毎六箇絹一疋玉石毎一斤絹一疋二年回賜國王及頭目使臣人等馬毎匹綵段二表裏貂䑕皮五十箇四表裏使臣者毎二箇絹二疋銀䑕皮五十箇二表裏白兎皮三箇絹一疋白狐皮一箇絹一疋小厮一名二表裏三年貂䑕皮毎十箇綵段一表裏四年貂䑕皮毎三箇絹一疋使臣人等到京續進馬俱照下等馬例回賜五年回賜銀䑕皮與熟紅絹六年青䑕皮毎二十箇絹一疋使臣人等馬分三等國王并太師馬不分等第八年太師鄂特凌古馬毎疋綵段六表裏使臣馬毎匹四表裏絹八疋九年進西馬者毎匹綵段五表裏絹十疋薩哈勒毎段絹九疋十二年額爾克馬毎匹四表裏求討在彼頭目一等二等并三等内有係部長親及親信用事者俱請㫖給賜𢎞治三年三等以下不給賜差來使臣自元年至三年四年俱有特賜㑹同館開市禮部出給告示除違禁物不許貿易其段絹布匹聽于街市與官員軍民人等兩平貿易正統十年許買賣五日十二年許衞喇特使臣賣馬景泰元年許買銅湯瓶鍋紅纓鞍轡剪子等物順義王及套長嘉靖三十年部長貢馬賞金頂大㡌綵段衣服隆慶四年執叛人來獻賞綵段四表裏布一百疋五年部長順義王奉表獻鞍馬賞大紅蠎白澤各紵絲衣一襲綵段十五表裏妻大紅五綵紵絲衣二套綵段四表裏親弟及長子都督同知各綵段八表裏濶生絹二疋五綵紵絲衣一套木綿布四疋孫指揮使綵段五表裏織金紵絲衣一套絹布同各枝指揮同知千戸百戸等官各綵段三表裏織金紵絲衣一套絹一疋布同差來畨使内小頭目各綵段二表裏素紵絲衣一套布二疋散從減素紵絲衣段布同進表人賞如各枝例國王賜勅奬諭是年國王又遣使代套部都督同知貢馬賞大紅白澤紵絲衣一襲綵段八表裏套酋都督同知及指揮同知以下并差來小頭目散從各賞如例國王仍賜勅奬諭又以套部監市効賞勞綵段四表裏五綵紵絲衣一套次首領段二表裏織金紵絲衣一套六年國王增獻鞍馬弓矢賞大紅蠎白澤獅子紵絲衣各一套綵段二十三表裏妻賞如例萬厯三年以順義能約束諸部五年無警加賞銀三十兩紵絲蠎衣一襲綵段八表裏後毎年加賞一次又順義長官毎枝給勅一道共七道回賜隆慶五年順義王進上馬三十匹毎匹綵段二表裏闊生絹一疋以初貢加綵段一表裏留邉馬四百七十九匹聽該鎮支馬價銀五千兩給賞套部進上馬二十匹毎匹綵段三表裏濶生絹一疋留邉馬一百八十匹支各鎮兵餉銀一千八百兩給賞六年議準上馬給段絹外毎匹加銀五兩留邊馬毎匹銀十兩求討隆慶六年順義王奏請番經與金字經五部墨字經五部差番僧二人齎赴本國併為傳誦其差去番僧先行順天府各給衣食銀十兩差回給賜禅衣坐具併紵絲番僧衣一套靴襪各一雙帶去番官綵段二表裏木棉布四疋諾延福餘泰寧三衛差來并自來都督賞綵段四表裏絹二疋都指揮綵段三表裏絹二疋指揮千百户所鎮撫頭目每人綵段二表裏絹一疋各織金紵絲衣一套又各加綵段一表裏舍人毎人綵段二表裏絹一疋織金衣一套䝉古毎人綵段一表裏絹一疋素紵絲衣一套婦女有進貢者毎人一表裏絹一疋紵絲女衣一套隨來婦女一表裏絹一疋絹女衣一套以上靴襪各一雙奏事進貢都指揮絹二疋綵段三表裏織金衣一套指揮毎人絹一疋綿布一疋綵段二表裏紵絲衣一套靴襪各一雙舍人因事進貢者毎人綵段一表裏織金衣一套絹一疋靴襪各一雙嘉靖二十四年以諾延都督能鈐束部人不擾邊境準與金帶及金頂大㡌回賜自進并帶進馬匹不分等第每疋綵段二表裏絹一疋駝毎隻三表裏絹十疋在衛都督指揮毎員加賜綵段一表裏求討請㫖量與物件到京者照名給散在衛者討勑開付差來人領去領賞畢日許於㑹同館開市三日鋪行人等照例將貨入館兩平交易順天府仍行薊州遵化等處如三衛部人回還到彼聽命兩平交易毎人許收買牛一隻犁鏵一副鍋一口不許將違禁之物私自夾賣違者巡按御史究治哈密以下西域夷永樂四年賜忠順王紵絲六十疋絹二百一十四疋祖母母妃各紵絲六疋絹六疋嬸母紵絲四疋絹四疋六年賜王紵絲五十疋絹二十疋織金紵絲衣三套皁麂皮靴二雙氊韈二雙祖母母妃并妃各綵段六表裏成化三年故忠順王外孫為都督錫銅印并織金衣一套八年其都督赴京襲職除馬駝給價外加賞綵段一表裏絹一疋織金紵絲衣一套并靴韈各一雙進貢到京使臣分五等一等綵段五表裏絹四疋二等四表裏絹三疋三等三表裏絹二疋四等二表裏絹一疋布一疋五等一表裏絹一疋俱紵絲衣一套靴韈各一雙存留甘州男女人等有進貢者照五等例賞無者每人絹布各一疋奏事到京使臣不分等第毎人綵段二表裏絹一疋紵絲衣一套靴韈各一雙十二年奏準寄住苦峪城使臣賞例仍分五等比前表裏絹各減其一不與衣服靴韈存留甘州有進貢者照前五等例無者與絹一疋嘉靖四十三年到京正使從人名色照四等例賞隆慶五年照五等例賞寄住甘州有進貢者俱與綵段一表裏不與衣服靴韈回賜大馬每匹綵段四表裏達馬不分等第每匹二表裏駝毎隻四表裏駝羔每隻紵絲一疋絹二疋倒死駝絹六疋折鈔絹一疋蘓普每段絹六疋金剛鎻上等毎顆絹四疋成化十年金剛鎻二等毎顆絹二疋三等毎顆絹一疋四等毎二顆絹一疋五等毎顆布一疋番砂水晶石不與價𢎞治三年奏定價例玉石毎斤絹一疋夾玉石四斤絹一疋斯隆瑪石二斤絹一疋青金石一斤絹一疋把咱石十斤絹一疋螺子石六塊絹一疋松都魯石即水珀舊例毎斤鈔十五貫正統四年添作一百貫毎二百貫折絹二疋石頭靶八箇磠砂八斤各絹一疋魚牙靶小刀毎把絹二疋鑌鐵大刀毎把絹五疋拐棍刀毎把絹五疋兩刄釼每把絹八疋鑌鐵銼一把鑌鐵鏡一面各絹二疋鑌鐵二斤絹一疋撒哈剌馬黒瞞每段各絹九疋刀紬畨云黄馬海牙兒毎段絹一疋馬服屯即番夏布毎二段絹一疋虎力麻五疋絹二疋藍花手巾二條絹一疋桚馥蘭毎斤絹四疋硝子阿思馬亦一箇絹一疋硝子遮眼番名矮納三箇絹一疋蛤蚧四箇絹二疋梧桐鹻十斤雄黄十五斤各絹一疋蛇角二枝一表裏羚羊角四斤絹一疋豹皮即實魯蘓皮二張綵段一表裏金線豹皮一張一表裏獅子皮一張二表裏哈剌虎剌皮一張一表裏鐵角皮二條絹一疋銀䑕皮六箇貂䑕皮三箇青䑕皮二十箇白兎皮三箇白狐皮一張駝皮獺皮毎一箇各㡌一頂癿馬尺即羊甸皮五張絹二疋卜剌硤児即牛甸皮四張絹一疋哈剌卜花二十張絹一疋樺皮弓一張絹八疋回回木梳細者六箇絹一疋粗者十箇絹一疋珊瑚珠正統中毎十四兩絹四疋今毎兩絹二疋鎻鎻葡萄毎斤絹一疋使臣自進中等馬毎匹紵絲一疋絹八疋折鈔絹二疋下等馬毎匹紵絲一疋絹七疋折鈔絹一疋新生馬駒中途倒死馬毎匹絹二疋駝毎隻三表裏絹四疋帶進西馬毎疋五表裏阿魯骨毎匹六表裏求討正統四年忠順王奏討與紵絲四表裏天順四年王母差來使臣領去厚榜紙中夾紙各三百張心紅三斤金箔一百帖胡椒蓽茇各十斤桐油十斤白􅈨十斤丁香乳香檀香各三斤良薑桂皮各五斤細茶三十斤洗面銅盆一箇成化十三年苦峪城使臣奏討加絹一疋十三年又準加折衣絹一疋十五年再加絹一疋使臣進貢到京者每人許買食茶五十斤青花瓷器五十副銅錫湯瓶五箇各色紗羅綾段各十五疋絹三十疋三梭綿布夏布各三十疋綿花三十斤花毯二條紙馬三百張顔料五斤果品沙糖乾薑各三十斤藥餌三十斤烏梅三十斤皂白􅈨十斤不許過多就館中開市五日除違禁之物并鞍轡刀箭外其餘段疋紗羅等項不係黄紫色龍鳯花様者許官民各色鋪行人等持貨入館兩平交易該城兵馬司差人宻切闗防及令通事管束毋得縱容鋪戸畨人在外私自交易如有將違禁等物及通事人等故違者許各該委官體察通行拏問後又奏準未領賞前開市二日領賞後開市三日其奏討沿途收買牛羊鐵鍋犁鏵者聽于臨洮府蘭州地方與軍民兩平收買不許過多仍令伴送人員及所在官司防範不許將熟鐵兵器夾賣及因而生事擾人哈里等三十八國及天方國日落國各賞例與哈密同安定衛洪武七年安定王來朝貢賜織金文綺四疋其貢賜賞例到京國師綵段四表裏絹二疋紵絲僧衣一套舍人并使臣毎人二表裏紵絲衣一套僧人毎人一表裏紵絲番僧衣一套靴韈各一雙回賜自進并帶進駝毎隻綵段三表裏絹四疋馬毎匹二表裏襲封洪武八年賜嗣王勑書誥命各一道織金紵絲衣一套綵段六表裏諭祭已故王祭文一道降香一炷新鈔一千貫禮部差通事一員送請封人至西寧衛交割本衛差頭目一員齎封物同原來人前去本地授封别差頭目一員齎祭物另辦齋糧五十石麻布五十疋食茶二百斤量帶軍士同去行祭罕都齊勤蒙古永樂二年賞賜差來都指揮綵段三表裏織金紵絲衣一套靴韈各一雙千百戸鎮撫綵段二表裏舍人一表裏俱與素紵絲衣一套靴韈各一雙存留甘州男婦有進貢者綵段一表裏生絹一疋無者生絹一疋布一疋回賜帶進駝毎隻綵段四表裏中等馬毎匹二表裏下等馬毎匹紵絲一疋生絹四疋自進中等馬毎匹紵絲一疋生絹四疋土魯番使臣到京并存留賞賜自進并帶進駝馬等物回賜及買賣俱照哈密例嘉靖二年瑪瑙數珠一串與絹四疋紅絹道布一疋絹六疋鞍子一面絹四疋撒袋一副絹二疋其鑌鐵銼多不真正毎貢不過百把毎二把與絹一疋三十三年進貢回回青三百三十一斤八兩㑹估毎斤與銀二兩三十八年題準五地面自進并帶進過各番王頭目馬匹阿魯骨上等毎匹綵段六表裏中等毎匹綵段三表裏下等毎匹綵段一表裏畨馬中等毎匹紵絲一疋絹八疋折鈔絹二疋下等毎匹紵絲一疋絹七疋折鈔絹一疋上等馬匹原無賞例比照中