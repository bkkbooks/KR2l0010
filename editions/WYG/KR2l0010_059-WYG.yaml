body:
  text: 禮部志稿卷五十九明俞汝楫編登極備考登極儀告祭及追尊洪武元年正月乙亥上服衮冕先期告祭設昊天上帝位於壇之第一成居東皇地祇居西皆南向各用玉一幣一犢一籩豆各十有二簠簋各二設大明夜明位於壇之第二成星辰社稷太嵗嶽鎮海瀆山川城隍位於壇内之東西各用犢一幣一籩豆各十簠簋各二其儀迎神燔柴奠玉帛進爼三獻飲福受胙徹豆送神望燎瘞各行再拜禮樂舞如制祝曰惟我中國人民之君自宋運告終帝命真人於沙漠入中國為天下主其君父子及孫百有餘年今運亦終其天下土地人民豪傑分争惟臣帝賜英賢為臣之輔遂勘定采石水寨蠻子海牙方山陸寨陳埜先袁州歐普祥江州陳友諒潭州王忠信新淦鄧克明龍泉彭時中荆州姜珏濠州孫徳崖廬州左君弼安豐劉福通贑州熊天瑞永新周安平鄉易華平江王世明沅州李勝蘇州張士誠慶元方國珍沂州王宣益都老保等偃兵息民於田里今地幅􅊷二萬餘里諸臣下皆曰生民無主必欲推尊帝號臣不敢辭用是以今年正月四日於中山之陽設壇備儀昭告於上帝皇祇定有天下之號曰大明建元洪武簡在帝心尚饗先是自壬戌以來連日雨雪陰沍自正月􅃋旦雪霽粤三日省牲雲陰悉斂日光皎然暨行禮天宇廓清星緯明朗衆皆欣悦禮成遂即位於郊壇南備儀衛法從丞相率百官北面行禮呼萬嵗者三禮畢上率世子暨諸子奉神主詣太廟追尊四代祖考妣為皇帝皇后奉上玉寶玉冊冊曰孝𤣥孫嗣皇帝稽首頓首上言尊敬先世人之至情祖父有天下𫝊之子子孫子孫有天下追尊於祖考此古今之通義也遇天下兵起躬擐甲胄調度師旅戡定四方以安人民土地日廣皆祖宗深仁厚徳所致也諸臣庶推尊為皇帝先世考妣未有稱號謹上皇髙祖考尊號曰𤣥皇帝廟號徳祖皇髙祖妣曰𤣥皇后皇曾祖考尊號曰恒皇帝廟號懿祖皇曽祖妣曰恒皇后皇祖考尊號曰裕皇帝廟號熙祖皇祖妣王氏曰裕皇后皇考尊號曰淳皇帝廟號仁祖皇妣陳氏曰淳皇后伏惟神明在上鑒此孝思每廟牲幣祭器及禮義樂武同郊壇惟不用玉不燔柴祭訖退上顧謂李善長曰朕荷先世積累之勤慶及予躬撫臨億兆今遵行令典尊崇先代齋肅一心對越神靈所謂焄蒿悽愴若或見之善長對曰陛下誠孝感通達於幽顯上曰奉先思孝祭神如在誠敬無間神靈其依茍或有間非奉先思孝之意也遂命世子先至社稷壇立石主上至設位於兩壇之間詣各神位前行禮其禮如宗廟儀事畢上還御奉天殿尚寶司拱衛司金吾衛陳設如儀中書省左相國宣國公李善長等率文武百官上表稱賀謹按髙皇初用王禮後正大位其儀始備文皇靖難以乙丑至金川門以乙巳即帝位倉卒其儀不詳昭皇以儲宫嗣位稍有更定肅皇入自藩國與嗣皇異累朝所因者昭皇儲宫禮也朝賀備考朝儀朝賀贊詞洪武二年上以羣臣每遇正旦聖節朝賀行禮呼萬嵗者三雖云臣子祝上實以虚語因諭宰臣更其詞如遇賀之日贊禮者云贊呼衆皆曰願君有道又贊呼曰則天下和平倣此意與諸儒議之於是廷臣議曰三呼之詞乃臣子祈君之至誠若如聖諭則謙徳有餘然於臣子之誠不盡今更其詞令贊禮者始贊呼則衆曰天輔有徳又贊呼曰海宇咸寧再贊呼則曰聖躬萬福制可朝賀贊詞仍舊庚午禮部尚書崔亮太常少卿陳昧等言舊制朝賀之禮贊禮者既唱三舞蹈訖復三唱山呼而羣臣拱手加額與樂工軍校齊聲稱萬嵗者三近改擬山呼為贊呼百官應之曰天輔有徳曰海宇咸寧曰聖躬萬福臣等切謂殿廷之禮主於尊嚴贊呼之際貴乎齊一令百官三呼應聲讙譁不齊誠為失禮况山呼故事循行已久甚為嚴肅宜仍其舊從之朝參避正中洪武三年上問禮部尚書崔亮曰朕郊祀天地拜位皆正中而百官朝參則班列東西以避正中此何禮也亮對曰臣聞天子祭天升自午陛祭社升自子陛葢社祭土而主陰陰北方也故君南向答陰之義也郊祭天而主陽陽南方也故君升自午陛而北向以答陽也何佟之議曰祭社北向君答之故南向祀天南向君答之故北向若夫羣臣朝參於上非答神之義俱當避君上之尊故升降則皆由卯陛朝班則分列東西以避馳道此其義不同也上曰臣之事君君之事天其道不相遠也因命侍儀司自今百官朝參左右班相去不得越二尺其省府臺官俱就甬道上拜謁但不得直行甬道而已殿廷雜儀洪武九年禮部言凡殿廷頒降詔書冊命宜從中道中門出近東而行其内外官員賫捧御製文字及御用之物進呈不許直行中道或左右或取别以行至御前正中跪進見光祿司進御膳等物亦不可當中道直行許於正道邊左以進凡御座處即為正道如上御奉天殿則於正門邊東入將至御前正中供具膳畢而出亦如之若上帝所往來處其奉御内使捧執御用之物聴使令者皆須近後取便左右行不許隨後徑馳中道違者杖一百從之命著為令肅文武朝參洪武二十四年禮部言朝廷之禮貴於嚴肅而近者文武官入朝往往争趨競進品級紊亂髙下失倫甚非所以明禮法振綱紀請自今朝參之時將軍先入近侍官員次之公侯駙馬伯又次之五府六部又次之應天府及在京雜職官員又次之有不如儀從監察御史及儀禮司糾復從之免命婦􅃋望朝永樂元年壬辰禮部言洪武間京官文武四品以上命婦􅃋望朝中宫隆寒盛暑雨雪皆免上命併免􅃋望但遇節來朝飭陪京朝賀成化八年南京鴻臚寺序班李琰奏近者南京文武官員凡遇拜賀聖節等禮多因循不謹乞勅禮部移文南京所司凡遇大朝賀悉照在京事例各衙門官員先具職名手本送南京鴻臚寺報名至期聼糾儀監察御史等官㸃閘如有托故不至及不具服攙越怠慢者具奏執問庶使朝儀整肅事下禮部復奏從之申明朝儀八事成化十四年鴻臚寺卿施純禮科都給事中唐章御史王濬等以近者朝班驚喧不定各奏朝參官多罔遵禮度乞將朝儀榜示於長安左右門上命禮部通查朝儀舊制以聞制是禮部尚書鄒榦等備錄洪武年間朝參禮儀奏請申明榜示朝門曉諭禁約凡八條一朝班公侯序於文武班首次駙馬次伯自一品以下各照品級文東武西以次序列風憲糾儀官居下朝北紀事官居文武第一班之後稍近上以便觀聴勿得越次如有陳奏從班末行至御前跪奏畢即入班立一文武百官御前侍坐遇有大小官奏事須起立侯奏畢復坐勿得倨坐如有旨賜坐則復坐一文武官出入朝門各照品級第加敬遜如一品以下官遇公侯駙馬加敬禮立則旁立行則後從三品四品官遇一品二品官加遜禮行立俱後五品以下倣此不得攙先越次如有事宣召勿拘一百官朝參遇有聖諭教誡須當専心致意拱聴即便省身克己不許放肆馳心外想一百官自入午門内不許吐唾如朝參近侍御前有病咳𠻳者即許退班一百官奏對務必從實知則為知不許妄對一凡大小官員如隨上行丹墀身常朝北不得向南或右環轉隨侍不許背北上陞奉天門及丹墀其隨從官員勿得徑行中道并正道候有旨令行許側邊隨行一百官入朝門須拱手端行威儀整肅不許行私揖禮請肅朝儀𢎞治十五年禮部復奏禮科都給事中呉仕偉等所言肅朝儀事謂朝廷之上以嚴為主今文臣官入朝之際有推擠諠譁或步趨放肆者有進掖門而掉臂過御橋而附身者甚至班行踰越尊卑失次請如仕偉等所言令御史序班糾奏從之朝參面糾嘉靖七年十月内禮部題該鴻臚寺左少卿王道中等題為朝儀事仰惟皇上每日視朝御奉天門侍班御史序班咫尺天顔如遇文武官員數少得以面糾至於每月􅃋望及奏祭祀日期皇上御奉殿内侍班官員俱在丹墀之下東西序立難以面糾及至其本糾劾則百官俱散緩不及事以此因襲日久各衙門官員凡遇升殿之日勤於朝參者固多而偷安一時不到朝參者亦不為少乞望天語叮嚀戒諭各衙門官員以後凡遇􅃋望及奏祭祀陞殿之日務要依期朝參等因抄呈到部看得本官題稱乞要著為定例許御史序班照依殿内奏事復命事例徑赴御前從實糾舉本寺與錦衣衛堂上官趨候明旨處斷俟出奉天門外公同弔取門籍文簿逐一查㸃許御史序班具本指名劾奏一節查得本年九月内該給事中王汝梅題亦為前事節該奉聖旨這本説的是近來在朝官朔望日多不朝參好生不謹禮部便通行各衙門省諭今後再似這等朕别有區處該各衙門知道欽此欽遵已經通行去後左少卿王道中復有此奏臣等切惟皇上御門親正百官朝參員數多寡昭然在列然必鴻臚寺髙唱奏事然後御史序班敢向御史面糾隨奉明旨查㸃請究此舊例也若遇朔望及奏祭祀陞殿之日百官即有失儀者亦必具本參奏不敢面糾見查大明會典内亦云文武官遇陞殿有違越失儀者從監察御史儀禮司糾劾中間竝不曾言劾及他事亦竝無面糾之辭何也葢朔望非奏事之期殿陛乃尊嚴之地故惟重體勢之髙而暫畧煩瑣之務其與御門之時實為不同祖宗設立儀法深有至意今陞殿之日若許其面糾則一二小臣得以擅入禁地近觸天顔恐傷體勢若只具本指名劾奏所指安得其真而是非混淆挾詐遂起末流有不可禁者前項二條具舊章所弗載難便宜行但臣子之職惟勤為最先朝參之禮不可以少怠近者常朝官員因循玩惰誠亦有之凡遇陞殿之期至於朔望亦往往不肯赴朝上厪聖諭下動論列實諸臣之罪也臣等請自今後凡遇朔望及奏祭祀陞殿之日朝參官員不論多少皇上間出不意特旨宣諭鴻臚寺官許令公同錦衣衛官俟駕退之後弔取門籍文簿朝參各官俱出奉天門外金水橋邊聴侯逐名查㸃奏請罰治不必付諸糾劾以起事端則天威不測大震叠乎庶工體勢愈尊用克存乎舊典朝綱振肅而怠玩俱知所警矣奉聖旨是鴻臚寺題免朝例嘉靖十一年八月内禮部題該鴻臚寺題為申明舊例請宸斷以便遵守事及與通政司彼此辯争前後肆奏本部仰遵聖諭備查典章俱經依擬明白復查得今年正月間因聖體違和暫免朝參該寺題稱免朝日久一應領勅繳􅃯人員若俱於御前面奏恐聖體於視朝之初起數太多未免煩勞欲要暫於左順門領繳等因奉聖旨是欽此本部看得該寺原題止是一時權宜未嘗擬為定例近日以來一應領勅繳勅并例該面辭面見人員但偶遇陰雨免朝之日該寺即令赴左順門繳進此則甚非祖宗舊制况非該寺原題本意本部因復奏前事合就題請今後領􅃯繳􅃯例該面辭面見等項雖遇免朝仍侯視朝之日面奏所以重體統而防壅隔其所闗係未為輕小適聞奉旨免朝日期領􅃯繳等項不係重大事情照該寺題准事例行欽此臣伏讀綸音不勝疑駭切意本部題復之章因司事者互相講論言語煩多恐未經聖覽前項㫖意恐出閣臣一時票擬未曾注意臣切謂朝廷差官降勅未有不係重大事情且頒勅必於御前所以重皇命可以防詐𫝊旁出之奸繳勅必於御前所以達下情可以防遲留隠匿之弊至於禮該面辭面見人員即遇免朝日期豈不能少待而遽然廢上下之禮殆非臣子之心所敢安者以此為不係重大事情則御前進奏之事無復有重大於此者也且御前與勅上勤天語陛下慎重絲綸特令翰林院學士捧下今乃以為不係重大事情恐非所以仰承聖謨矣臣實愚昧不通遠猷廟堂批答必有深意但在廷臣工本部僚佐議與臣合非一人私見伏乞聖明於該科取本部原題特加省覽仍賜問閣臣所以票擬之意萬一臣有所見於朝廷大禮不為無補伏望聖裁重降御批改囘前命則宗社幸甚等因題奉聖旨卿説的是勅書領繳見辭官員都照舊例行如遇雪雨風寒暫三五日免視朝都著候待若朝廷小有不豫免朝日多准今春該寺奏准事例行著為令請申勅朝儀嘉靖四十二年禮部復給事中王楷奏請申飭朝儀大小官員不得從人多帶入朝直宿官軍不得坐卧御道商販人等不得擅入長安門其習儀之日常朝官不得無故不至違者俱論如法報可慶賀儀罷聖節冬至表箋洪武五年命罷天下進賀聖節冬至表箋上謂侍臣曰正旦為嵗之首天運維新人君法天運以施政治進表稱賀禮固宜然若生辰冬至亦皆稱賀於文繁矣且生辰父母劬勞之日朕皇考皇妣蚤逝每於是日不勝悲悼况忍受天下賀乎宜皆罷之羣臣對曰臣子敬君之心無時不有惟不可煩瀆故因聖夀及時序致祝頌之誠請如舊禮行之上不許表賀夷貢麟鳥正統三年十月禮部尚書胡濙等奏比者榜葛剌國遣使以麒麟鸚鵡等物詣京朝貢斯皆皇上徳被萬方仁及庶類是以遠仁慕義航海來獻誠國家億萬年太平之徵也請率在廷文武羣臣進表行慶賀禮仍命天下文武五品以上衙門悉以表稱賀從之慶賀表箋凡遇萬夀聖節該親王及天下文武衙門進賀表文例該陳設宣讀如遇免朝止將前項表文照例於是日早用鼓樂迎至午門前司禮監官捧進先期開坐題請凡遇中宫殿下千秋令節該親王進到慶賀箋文是日早用鼓樂迎至午門前司禮監官捧進在京文官四品以上武官三品以上命婦朝賀先期具題請㫖凡遇皇太子千秋節親王及天下文武衙門進到箋文照例於是日早用鼓樂迎至午門前司禮監官捧進先期具題請㫖嘉靖二十四年六月恭遇太廟告成詔告天下行移各王府并在外文武五品以上衙門拜進表文慶賀先期題請本年南京禮部等衙門賫捧慶賀皇太子箋文到部看得前項箋文原無題奉明㫖令其拜進今既齎捧前來亦臣子一念忠敬之私合行進收以後如有進到者俱照例施行等因奉聖㫖是欽此凡朝鮮安南琉球日本暹羅等國王差陪臣賫捧表箋管送方物赴京慶賀謝恩等項除方物另行外其表箋例該本部引奏進收如遇免朝將前項表箋俱送至午門前司禮監官捧進先期題請一具手本二本一本行司禮監知會請期一作交單進表賞賜凡各王府差來賫有禮物人員該給賞盤纒鈔二十錠綵緞一表裏無禮物人員賞鈔一十錠文武衙門差來官員賞盤纒鈔五錠行移内府照例奏請頒給本司給散慶賀糾儀及賜宴班次成化四年正月申定監察御史殿中糾儀及丹墀賜宴班次中書舍人李應禎奏凡遇行慶賀禮奉天殿預執事者給事中十員該給賞盤纒鈔錠中東西立翰林院中書舍人各四員為侍班官分立於導駕官後監察御史四員為糾儀官立於侍班官下若慶成宴中書舍人位給事中御史前而宴品均一初無厚薄皆舊制也近時御史越班立導駕官下可為失憲體而亂舊章禮部列宴席以中書舍人位給事中御史後及光祿寺設宴品亦於給事中御史厚而中書舍人薄可謂諂勢要而蔑禮法乞各正其失禮科給事中參應禎以小事瀆聖聴宜究治事下禮部尚書姚蘷等議擬御史在殿中糾儀有侍班官則立侍班下稍南無侍班官則立導駕官下稍南其丹墀宴序中書舍人從近例坐於給事中御史後宴品亦當均一而於給事中參則漫不可否上既准擬且謂禮科挾私參奏當治其罪姑宥之其宴序可視正統年間例行既而䕫復奏正統間文案不存無從查考乞如今議為宜上亦是之飭南京官儀成化十一年南京監察御史楊成奏南京進賀聖節表行禮時適有兩臣見五府及所隸武官大約不過三四十人且班行失序跪拜參差及導送輒張雨葢有策馬前馳及便道先囘者葢緣雖設官糾儀而無簿籍可稽以至漫視不謹及見每嵗正旦冬至等節行大禮大臣僅見遵守其部屬或越於近侍佐貳或先於正官或常服以取自便或歴階互為談謔褻慢不恭難以悉數臣惟南京根本重地其禮文隳廢且如此則外而三司府縣可知矣章下禮部而復奏以為祖宗成法具悉典禮但日夕廢墜誠有如成所言者合勅南京禮部移文府部諸司凡遇大禮預具各官姓名送掌禮及糾儀官至日通為檢查敢有仍前蹈弊者疏名以聞其在外聴禮生呈舉上司轉為奏聞悉麗於法如此庶禮儀整肅人知遵守從之賀皇太子設位嘉靖二十八年禮部奏故事皇太子朝賀設座文華殿中今易用黄瓦則東宫受賀之位似應避尊上曰東宫受賀位當設文華殿之左南向然今侍衛未備已之謝恩儀藩王謝恩凡王府已受冊封齎捧謝恩表箋到部例該本部引奏進收如遇免朝將前項表箋俱恭送至午門前司禮監官捧進先期本部具題請㫖侯伯謝恩凡公侯伯及衍聖公襲爵謝恩本部先期題知例該鴻臚寺設案本爵具朝服本部引奏行五拜三叩頭禮如遇免朝止令本爵先期一日赴鴻臚寺報名次日早具朝服赴午門前照例行禮所進表文仍令本爵親捧至左順門司禮監官捧進狀元謝恩凡狀元上表謝恩於三月二十二日本部表具奏本奏目狀元率諸進士赴午門前行禮表文狀元親付司禮監官捧進凡遇出朝備黄綾殼表副表目三本二本送鴻臚寺宣讀一本本部備照如免朝不用習儀習儀所凡正旦冬至聖節百官先期之三日及二日習儀正旦冬至於朝天宫聖節於靈濟宫嘉靖九年更定郊祀冬至習儀於先期之七日及六日二十一年令聖節正旦冬至俱赴朝天宫習儀翰林院官習儀成化十四年十一月始令翰林院官習儀先是翰林官僚自永樂宣徳以來相𫝊免習儀至是錦衣緝事官校奏學士王獻檢討張奏不赴習儀上命鞫問之獻奏舉相𫝊之例以聞宥之仍詔自今行大禮先期習儀内閣辦事者免其餘俱習儀如常糾儀輿馬僭越𢎞治八年六月南京監察御史王存忠等奏舊例凡武官雖公侯伯不得乗轎出入以習勞苦今成國公朱儀魏國公徐俌武靖伯趙承慶南京錦衣衛帶俸指揮使王鋭乗轎出入儀俌慶俱乗八人轎僭越更甚其各衛指揮而下乗馬又多用紅氊鞍籠馬杌胡床導從亦所當禁下禮部復奏請俱論之以法上皆宥之仍諭不得再犯以朱儀年老任重特命乗四人轎申飭領􅃯等議嘉靖十一年八月先是正月間上體違和數不視朝鴻臚寺因請諸領勅繳勅及辭見人員暫受事左順門葢本一時權宜後因循遂為定制部以為非祖制執奏不可得㫖免朝領繳勅書諸事非係重大其該照寺題准例行於是尚書夏言言朝廷差官降勅未有不係重大事情者且領勅必於御前所以重大帝命以防詐𫝊旁出入奸繳勅必於御前所以達下情可以防遲留隠匿之弊至於禮該面辭面見人員即遇免朝豈不能稍待而遽廢上下之禮殆非臣子之心所安以此為非重大則御前奏進之事無復重大者臣愚以此必出一時閣臣票擬之詞宜更加察上深然之詔勅書繳領見辭官員竝遵舊制行如遇雨雪風寒暫三五日不視朝竝令候待若免朝日久方准照該寺題准例行著為令御殿稱賀侍班嘉靖十二年先是上以大祀御殿誓戒羣臣中書舍人無侍殿者御史楊行中奏之上怒其怠玩逮掌中書傅棨等四人下詔獄棨等奏辯言故事誓戒無中書侍班下禮部復議言陞殿禮儀翰林院官與中書舍人俱用四人東西侍班第緣會典開載互有詳畧故於誓戒進歴等禮有翰林無中書棨等沿習舊規罪亦可原今宜著為令凡御殿稱賀諸禮皆中書舍人與翰林諸臣分班對立毋得異同上從其請因貸棨等糾行禮不到嘉靖三十一年八月二十四日該鴻臚寺序班曹榮題為糾儀事參南京大理寺卿今陞户部左侍郎總督倉塲督理西苑農事余𦙍緒謝恩行禮不到事屬違慢節奏聖㫖余𦙍緒不敬恩命着革了職冠帶閒住早朝各項官員人等違失不止一人一次侍班的先後不到彼此黨容自肆無禮今後着厰衛看着重治各該衙門知道欽此議糾朝儀班行隆慶元年都給事中辛自修等以朝儀久曠班行不肅請令禮部官考議成式疏下禮部及禮科會議至是奏言國家初制百官以品序列故令皇極殿前所列品山表識森然其後更定制度又有不拘於品者如内閣官錦衣衛陞立寶位之東西翰林院學士列僉都御史之上其他翰林官不論品級叙於京堂之内科道官自為一等列於部屬之先及鴻臚寺尚寶司列於西階三科六道與東班對侍雖若次第參差班行混淆然或以顧問糾察或以奏事承㫖莫不有因難以輕改今後常朝悉如此例其餘官員仍依品級崇卑衙門資序為列如有紊越聴糾儀官糾舉至於各官被服束帶會典所載甚明不得僭用以乖典制從之禮部志稿卷五十九
