body:
  text: 禮部志稿卷九十三眀俞汝楫編給賜備考賜賚賞有功將士格洪武三年賞平章楊璟左丞周徳興克平湖南寳慶廣西靖江等䖏部下將士之有功者命禮部定其賞格指揮文綺帛各六匹千户衛鎮撫各五匹百户所鎮撫各四匹旗軍人給塩六十觔征廣西不征北者指揮文綺帛各四匹千户衛鎮撫各三疋百戸所鎮撫各二疋旗軍人給塩四十觔賜監生衣物洪武二十三年二月賜國子生張睿等五十三人冬衣衾裯初有命賜監生衣物睿等出使扵外至是始還禮部言今時已春宜罷給上曰監生一也居者既給行者不與非直居者逸而行者勞乎皆如例給之省親祭祖賜鈔例宣徳元年辛丑行在禮部奏仁宗昭皇帝即位之初凡在文武官自公侯伯一品至九品以下應給誥勅者還鄉省親祭祖悉賜鈔公侯伯一品至二品五千貫其餘逓減永為定例今省親祭祖者援例以請未敢専擅上曰悉遵皇考之制冊立頒賞例𢎞治四年時以冊立皇太子賞賚臣下而差遣無門籍者不預監察御史閻介以為言下禮部議扵是自冊立以後頒賞以前其間公差初囬與未行及被命承委分幹在京諸務者雖無門籍亦得沾賜焉雲貴賞功就地支給洪治十五年禮部議得雲南貴州賞功事例除綵縀絹布外又有鈔貫俱差行人一員從南京戸部闗支轉送㑹鎮廵等官給散水陸萬里艱難險阻且今雲貴功賞共該鈔十六餘萬貫所用夫役甚多加以連年兵荒轉運之難尤倍曩昔而雲貴鈔價甚㢘計其所得費踰百倍乞依近日折銀例每鈔百貫折銀三錢移文彼處布政司支給節賜賜節錢勿用鈔嘉靖七年詔賜京官節錢勿用鈔内閣及一品賜錢二百文二品三品一百文四品至六品九十文七品至九品七十文公侯駙馬伯及衍聖公真人如一品其餘及朝覲官吏錢鈔各半凡鈔一貫折錢二十一文時禮部言舊制鈔一貫折錢千文似太重𢎞治中每貫折錢十二文有竒又太輕請更定則例故有是命優賜優賜致仕臣僚洪武中賜光禄寺卿徐興祖白金一百两鈔一百錠永樂賜太醫院使戴元禮白金五十两鈔一百錠綵幣四表裏二臣皆庶僚得此尤為異數也仁廟初賜太子太師致仕郭資白金百两鈔二百錠綵幣八表裏自是以後雖内閣輔臣重者不過白金五十两四表裏而已若髙皇帝念致仕秦府長史文原吉勞特賜勅奬勵賞白金一百两鈔二百錠綵幣八表裏尤前後所無優賜丁憂大臣洪武中上以布政使魏鑑臧哲徐中智府李亨居官勤慎即䘮所賜鑑哲米六十石鈔二十五錠中亨米五十石鈔二十錠諭以服滿來朝分理庶務仁廟賜夏尚書原吉米十石鈔萬貫胡􅎛百斤憲廟賜劉閣學吉綵幣四表裏銀五十两米十石鈔十塊羊四羫酒十瓶優賜勲衞大臣洪熙元年賜太師英國公張輔羊四百牽酒六百瓶米二百石逾月復賜羊二百牽酒四百瓶優賜大臣景泰三年賜少保戸部尚書兼文淵閣大學士陳循少保工部尚書兼東閣大學士髙榖各白金一百两吏部左侍郎兼翰林院學士江淵禮部左侍郎兼翰林院學士王一寧戸部右侍郎兼翰林院學士蕭鎡翰林院學士商輅各白金五十两尋各賜黄金五十两優賜元輔自正徳寧夏平内閣大臣賞白金至百两前後絶響矣嘉靖隆禮元輔若夏嚴亦未有登此數者諸賜賜旌小民洪武中民王竹遺書誨其子平涼知縣郝瑱罪賜白金百两絹十疋附子五枚川椒十斤軍人王二以隨征獲馬入官身故賞白金百五十两鈔五十錠民蔣公達王剛甫破蘭秀山盗各賞白金一百二十两黄再文破長陽盗賞白金一百五十两珠展布哈執叛右丞雅克哈雅等賞白金三百两永樂中小旗射三箭中者賞牛一羊一鈔百錠銀椀二良鄉民謝定住孝行賜鈔二百錠米十石賜賞發贜洪武末河南按察僉事王平行部至孟津有司歛財為賂平執其人以聞賜勅奬勵又綺襲衣被褥鈔百錠書吏半之永樂中劉寧為刑部主事有人納銀扵𤓰以餽者妻安發之詔褒寧平日㢘信扵妻妻能佐夫以義賜白金二百两綵幣八表裏賜勞侍駕天順初賜錦衣指揮袁彬居第白金三百两綵幣拾二表裏以娶妻賜黄金三十两銀二百两綵幣八表裏生子亦如之而金殺其一賜勞迎駕嘉靖初以迎駕安陸賞太監谷大用韋霦張錦大學士梁儲定國公徐光祚駙馬都尉崔元禮部尚書毛澄各白金一千两綵幣二十表裏奬賜外臣稱軄洪武元年賜徐州恭政陸聚白金三百两綵幣三十四疋酒三尊部曲文綺銀椀各二百八年賜浙江按察僉事解敏白金一百兩文綺十匹恤賜戰歿將士洪武元年給陣亡將士四百十五人百戸鎮撫人給米二十石蔴布十疋軍士人給米五石錢一千二百蔴布二疋又指揮孫靖家米三十石布十五疋鈔二百錠織金文綺及帛各十疋千百戸楊貴俞清嚴整家米二十石布各十五疋鈔各百錠又千戸王仲家鈔一百六十錠百戸鄭禮家鈔一百四十錠龍虎衛指揮弟胡斌弟文綺帛各二十疋鈔二十錠千戸俞賢家米二十石布二十疋又綺帛三十二疋又征南死事家屬指揮米三十石蔴布十五疋鈔五錠千户米二十五石蔴布一十二疋鈔四錠百戸米二十石蔴布十疋鈔三錠永樂中征南死事一品米六十石蔴布六十疋二品米五十石蔴布五十疋三品四品米四十石蔴布四十疋五品六品米三十石蔴布三十疋賞賜營繕功永樂十一年營建長陵功武義伯王通進封成山侯食禄千二百石子孫世襲侯爵散官勲號如故賞綵幣六表裏鈔四百錠掌金吾右衞事都指揮僉事許亨陞都指揮同知金吾右衞指揮僉事李旺陞指揮同知羽林前衛指揮同知吳剛陞指揮使亨賞綵幣四表裏鈔二百錠旺剛各賞綵幣三表裏鈔百六十錠營繕所正蔡信陞工部營繕清吏司郎中不視司事賞綵幣三表裏鈔二百錠其營繕所正王寧等并督工官吏及軍民工匠賞各有差復論初卜告之功陞知縣王侃州同知賞綵幣三表裏鈔二百錠陞給事中馬文素太常寺􅀶士隂陽訓術曽從政隂陽人劉玉淵皆欽天監漏刻􅀶士食禄不視事五官靈臺郎吳永始以僧授官改陞僧録司右闡教各賞綵幣二表裏鈔百六十錠正統六年三殿二宫成賜太監阮安僧保各金五十两銀一百两紵絲八表裏鈔一萬貫都督同知沈清陞脩武伯食禄一千石子孫世襲少保工部尚書吳中陞少師尚書如故各賜紵絲五表裏鈔五千貫太僕寺少卿馮春楊青俱陞工部左侍郎各賜紵絲二表裏鈔二千貫所正工作人等各賞絹紗有差進香賞賜正統十四年三月禮部尚書胡濙奏車駕詣天夀山躬修祀事文武羣臣人等進香初在正統十年二伯八十九炷以後每年有増今嵗増至三千七百七十五炷除公侯駙馬伯文官五品以上武官四品以上并近侍風憲官每香三炷宜如例賞鈔一千貫其諸司屬官及將軍旗較辦事官吏軍民人等舊無進香例俱難給賞上曰諸司屬官及軍民人等以香來進亦足以見其尊敬祖宗之誠何可沮之苐賞例宜損扵前其人錫鈔三錠著為令嵗進備考方物嵗進告諭髙皇帝御製大誥曰應天府河泊所常州府武進縣江西布政司湖廣布政司皆為嵗進野味湖廣原本進鹿改冩麂又江西本進天鵞改寫天鴈其解物者物有活者則途中宰食之存其皮以進又以死易活以肥易痩以微抵巨龍江河泊所進鱘魚扵光禄寺作鮓其所進之人將鱘魚去首去尾以為己用所進者不過中身一塊耳嗚呼因朕不才三綱不眀五常弗度致使當該有司官吏并解物無藉之徒㒺知君臣之義故敢肆侮常州府工房吏楊仲和獵夫孫華一等以香貍進數本五枚甲首先食其一該吏又食其一所存者三及其進也死者又一止存有二焉嗚呼恭敬之心安在此果臣民乎減進革魚鮓𢎞治二年四月湖廣無嵗進魚鮓例成化七年鎮守太監始進之二千五百斤後増至二萬一百二十二斤用船至十一二艘至是禮部以廵撫等恤灾之奏請止令有司減數進獻上命鎮守内官造辦如成化七年之數船止用二艘科擾需索為害者罪請革魚鮓嘉靖十一年二月内題該廵撫湖廣右副都御史林為議䖏進貢魚鮓以蘇民困事内稱本鎮進貢鰣魚等魚鮓共該銀二千四百有竒今照本省鎮守太監已革湖廣地方水旱相仍加以修理顯靈地方凋瘁乞敕該部早為計䖏裁革等因本部行據光禄太常二寺手本囬稱該省原無此等進貢則知前項魚鮓不係該寺額辦顯是本省鎮守太監先年私自造以進獻于上者也但進貢魚鮓一物出扵當時守臣一念芹曝之忱而遂成舊例常年供辦所據各官欲將前項進貢魚鮓盡行裁革以寛民力合無行移撫按官查照前項魚鮓自嘉靖十一年為始免其進貢等因題奉聖㫖這魚鮓著照舊進貢欽此隆慶元年五月詔禮部罷寳坻縣等䖏採取魚鮓自今薦新上供但令光禄寺備辦毋得奏遣内臣著為令筵宴備考宴夷夷使簪花禮部儀制司凡各國朝貢使臣到京㑹同舘安挿精膳司題請上下馬宴并待宴大臣候㫖下行本司當該吏照數領花赴㑹同舘簪帶每年翠羅花查庫内缺少先期行工部都水司造送貯庫應用奏飭宴夷茍簡成化六年禮部奏邇者朝鮮國王遣其陪臣朝賀萬夀聖節賜宴禮部所用器皿多有損壊所具品物亦不精潔有負朝廷優待逺人之意宜令所司自後毋得仍前茍簡違者治罪從之宴夷值䘮免樂成化十年正月庚戍賜朝鮮國賀正旦陪臣苪承錫等宴并金織衣綵縀等物禮部以是日宴值英廟賢妃薨當輟朝請免宴令領酒饌上命如例宴之但勿用音樂申飭酒飯菲薄成化十二年整飭邊備兵部右侍郎馬文升奏遼東諸夷朝貢朝廷賞賜筵宴恩禮極盛但光禄酒飯甚菲薄殆非懐柔之道乞勅禮部筵宴加厚以安夷心毋分彼此使之感恩畏威亦撫綏之一道也下禮部覆奏謹按往年精膳司員外郎李麟所呈朝鮮使臣筵宴事已經奏請申其令上曰宴侍諸夷本柔逺之道所以尊國體起其瞻仰非但飲食之而已必器具整齊品物豐潔始稱今後筵宴并酒飯處令光禄寺堂上視之仍以禮部官一員督察敢有不遵者倂治以罪定慶成與宴百官儀𢎞治十三年正月光禄寺以慶成宴羣臣多失儀奏下禮部議與宴百官一槩今日收饌殊非祖宗錫宴優待之意而扵古使人歸爼之禮不合宜仍舊令辦事官吏人等代收但量帶一二人而已其宴扵殿内者亦仍舊令厨人代收其所帶官吏人等各衙門俱用印信手本送守午門内外官軍䖏㸃入奉天殿前東西丹墀宴畢收訖同出各官不許攙越坐次談論諠譁并未畢先起收饌及本部㸔宴簪花官吏監生亦各鈐束不許夾帶混擾違者俱聽糾儀監察御史等官糾舉如該宴官前執赴宴後有事故許令開報本部行光禄寺扣席免致餘剰以後俱凖此例從之隆㑹同舘筵宴𢎞治十四年禮部覆議錦衣衛千戸牟斌所言豐厚外夷筵宴事謂今後光禄寺但遇㑹同舘筵宴外夷人員請令本寺堂上官一員親至舘督同各署官屬依式設辦務令豐潔以稱朝廷柔逺之意仍令本部委官并侍班御史廵視其不謹者從之日本使臣與宴班次正徳四年禮部奏眀年正月大祀慶成宴四夷朝貢者若朝鮮陪臣在殿第七班今日本國使臣見在無與宴故事宜如朝鮮例列殿西第七班從之慶成宴儀數正徳八年禮部言每嵗慶成宴預進宴圖後有因事故臨時進退者悉以上聞渉干煩凟及公侯伯亦有臨宴爭坐次者所宜申警自今凡正旦以後按日定圖至宴期前三日進覽有事故者本部移光禄寺扣除宴席以聞其公侯伯爵同者以中左右前後為序府與爵俱同者則序以歴年深淺不得臨宴執論從之進士宴主席位次嘉靖五年賜宴禮部命武定侯郭勛主席勛因奏歴年賜宴主席大臣位次居中今圖乃左右列坐臣無足齒柰辱朝命得㫖如舊規行比入宴禮部設席仍左右分列勛不得已就左席已復䟽争之上責禮部不奉詔令自後務遵故事毋再争擾宴朝鮮進香使臣隆慶元年朝鮮國王李峘遣陪臣禮曹恭判宋贊等賫表陳慰别遣戸曹恭書鄭宗榮等進香詔進香扵永陵獻殿門外行禮賜其使織金衣綵段絹布有差禮部以山陵雖舉而使者以陳慰進香至與他朝貢者不同請仍賜宴扵遼東都司從之厨役厨役以侍養放免正統五年光禄寺厨役白代有奏臣父家居年近八十無他子乞歸侍養事下禮部覆奏以為例難放免上曰在禮七十者一子不從政何惜此一役而使老有所失乎即日罷遣之嚴䖏厨役迯囬𢎞治四年己亥禮部覆奏刑科右給事中季源所言嚴厨役事謂光禄太常二寺厨役今後有迯回原籍者許里甲人等首告所司即差人起解迯至三次以上者問罪發口外為民仍將本戸親丁解補從之議勾僉缺役嘉靖二年禮部尚書席書言邇者光禄寺卿崔傑以厨役缺人移文原籍勾僉非便欲揀選餘丁千戸人給米四斗及量收在京善庖者二三百名以充已奉俞㫖盖謂止費見役四百人之粮可得千人也臣竊以為不然舊例真正人冊餘丁聽令在寺随同父兄役辦候父兄有缺之日隨補食粮初無在役久近限期亦無給與粮賞事例盖出彼所願欲非强之也今乃給之食粮是正粮之外加米四千八百有竒名為省費實増費矣且此軰原有定額不可多收如收善庖者濫充恐頃年奉詔查革詐冐之徒夤縁復入隨到隨迯虚費粮賞非所以眀禁而防奸欺也宜遵舊額戒各省有司亟勾僉缺役以補便得㫖調停厨役煩簡嘉靖二十八年禮部奏光禄寺厨役以四千一百名為額今總數尚盈而該寺動稱缺乏必各署煩簡不齊代有消長或此署事簡而存數反多彼署事煩而存數反少今註籍已定業有專守固難更易請自今立法以四千一百名酌量煩簡𣲖為定數視其盈虧以為消補如某署當用五百名而見存止四百名則本部為處補一百某署當用五百名而見存乃有六百則必待其消至五百名以下乃始照名議補如此調停庶不至有誤供應其或役名過多占籍充數强猾包攬富奸買閒致倉粮有名供應無寔並聽廵視科道官禁革收補報可禮部志稿卷九十三
