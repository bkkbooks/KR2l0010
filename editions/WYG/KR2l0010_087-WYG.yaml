body:
  text: 禮部志稿卷八十七明俞汝楫編䘮禮備考職官䘮期年不奔䘮洪武二十三年閏四月甲戌除期年奔䘮之制先是百官聞祖父母伯叔兄弟䘮俱得奔赴至是吏部言祖父母伯叔兄弟皆係期年服若俱令奔䘮守制或一人連值五六期䘮或道路數千里則居官日少更易繁數曠官廢事今後除父母及祖父母承重者丁憂外其餘期年服制不奔䘮從之期功迴避與祭嘉靖十三年孟冬享廟先期命侍郎顧鼎臣霍韜皆有期功之服上言古禮期服諸侯絶大夫降今之公卿即古之諸侯而猶有期服非禮也律言緦麻以下皆不與祭者謂其身蒞之也百官聞期年之訃不過私家為位及踰旬月則無庸避矣上令禮官考議以聞於是尚書夏言奏封建法廢世無諸侯久矣古之諸侯建邦啟土世有其國伯叔兄弟皆其臣也故期服可絶不知今之公卿能臣其伯叔兄弟乎又曰在位則為公卿釋位則為族屬不知䘮服之制人情之所由生也豈以在位釋位為隆殺哉夫哀有淺深故服有輕重祭祀吉禮致敬神明若情未忘哀則不專誠於祭故不與也禮曰小功緦麻執事不與禮言小功緦麻但可執事至饋奠之禮重則不敢與也今二臣小功麻服之重者也太廟捧主又禮之重者也以服之重而與禮之重者得謂知禮乎詔鼎臣韜迴避以侍郎黄宗明林廷㭿代之且令自後廟享前五日太常寺即奏奉主官十餘人以請三年不得奪情景泰二年吏科給事中毛玉奏禮部郎中章綸三年之䘮古今通制向者朝廷因各邊未寧暫行奪情之典所留者皆股肱輔弼之大臣邊徼經營之要職近者各處官司相習成風或司府佐貳之官或州縣幕司之職甚至辦事官吏一聞親䘮即行保舉奪情且金革之變禮不可施之於平世矧今聖明蒞政之初法令大新之日前項官吏素非執政之臣輕引奪情之例保留章奏絡繹道途雖䝉明斷不允亦已煩瀆聖聽乞𠡠該部将綸奏准事例通行内外俾皆遵守庶敦廉恥之節以消奔競之風從之通䘮制孝慈録服制洪武七年十一月孝慈録成先是貴妃孫氏薨勅禮部議服制禮部尚書牛諒等奏曰周禮儀禮父在為母服期年若庶母則無服上曰父母之恩一也而低昻若是不情甚矣乃𠡠翰林院學士宋濓等曰養生送死聖人大政諱亡忌疾衰世陋俗三代䘮禮散失於衰周厄於暴秦漢唐以降莫能議此夫人情無窮而禮為適宜人心所安即天理所宜爾等其考定䘮禮於是濂等考得古人論服母䘮者凡四十二人願服三年者二十八人服期者十四人奏之上曰三年之䘮天下之通䘮今願服三年視服期年加倍豈非天理人情之所安乎乃立為定制子為父母庶子為其母皆斬衰三年嫡子衆子為庶母皆齊衰杖期仍命以五服䘮制著為書使内外遵守其冠服絰杖制度詳見本書䘮禮禁令洪武五年詔古之䘮禮以哀戚為本治䘮之具稱家有無近代富者奢侈犯分力不及者掲借財物炫耀殯送惑於風水停柩經年不行安葬宜令中書省集議定制違者論罪俗䘮禁令洪武元年十二月辛未監察御史髙原諐言京師人民循習元氏舊俗凡有䘮葬設宴㑹親友作樂娯尸惟較酒殽厚薄無哀戚之情流俗之壞至此甚非所以為治且京師者天下之本萬民之所取則一事非禮則海内之人轉相視傚弊可勝言況送終禮之大者不可不謹乞禁止以厚風化上是其言乃詔中書省令禮官定官民䘮服之制禁䘮葬僭侈洪武三年禮部尚書崔亮言禮所以辨上下防奢侈也今䘮葬之禮自公侯卿大夫至於士庻各有等第然其間儀制上可以兼下下不可以僭上力雖有餘不得過度力不足者稱家有無不拘常例從之品官䘮制庶民附洪武五年禮部奏定文武品官䘮禮襲衣三品以上三襲四品五品二襲六品以下一襲飯含五品以上飯用稷含用珠九品以上飯用粱含用小珠銘旌以綘帛為之廣一幅四品以上長九尺六品以上長八尺九品以上長七尺斂衣品官朝冠朝服一襲常服十襲衾十番命婦大衫褙子一襲常服十襲衾十番靈座設於柩前用白絹結魂帛以依神棺槨品官棺用油杉朱漆槨用土杉墻翣公侯六三品以上四五品以上二明器公侯九十事一品二品八十事三品四品七十事五品五十事六品七品三十事八品九品二十事引披鐸引者引車之紼也披者以纁為之繫於輀車四柱在傍執之以備傾覆者也鐸者以銅為之所以節挽歌者公侯四引六披左右各八鐸一品二品三引四披左右各六鐸三品四品二引二披左右各四鐸五品以下二引二披左右各二鐸羽旛竿長九尺五品以上一人執之以引柩六品以下不用功布品官用之長三尺方相四品以上四目七品以上兩目八品以下不用栁車上用竹格以綵結之傍施帷幔四角垂流蘇誌石二片品官皆用之其一為葢書某官之墓其一為底書姓名鄉里三代生年月及子孫葬地婦人則隨夫或子孫封贈二石相向用鐵束埋墓中碑碣功臣歿後封王螭首髙三尺二寸碑身髙九尺濶三尺六寸龜趺髙三尺八寸一品螭首髙三尺碑身髙八尺五寸濶三尺四寸龜趺髙三尺六寸二品葢用麟鳳髙二尺八寸碑身髙八尺濶三尺二寸龜趺髙三尺四寸三品盖用天禄辟邪髙二尺六寸碑身髙七尺五寸濶三尺龜趺髙三尺二寸四品圓首髙三尺四寸碑身髙七尺濶二尺八寸方趺髙三尺五品圓首髙二尺二寸碑身髙六尺五寸濶二尺六寸方趺髙二尺八寸六品圓首髙二尺碑身髙六尺濶二尺四寸方趺髙二尺六寸七品圓首髙一尺八寸碑身髙五尺五寸濶二尺二寸方趺髙一尺四寸墳塋功臣歿後封王塋地周圍一百步每面二十五步墳髙二丈四圍墳墻髙一丈石人四文武各二石虎羊馬望柱各二一品塋地周圍九十步每面二十二步半墳髙一丈八尺墳墻髙九尺石人二文武各一石馬虎羊石望柱各二二品塋地周圍八十步每面二十步墳髙一丈六尺墳墻髙八尺石人石虎羊馬石望柱同一品三品塋地周圍七十步每面一十七步半墳髙一丈四尺墳墻髙七尺石虎羊馬石望柱同二品四品塋地周圍六十步每面十五步墳髙一丈二尺墳墻髙六尺石虎羊馬石望柱同三品五品塋地周圍五十步每面一十二步半墳髙一丈墳墻髙四尺石羊馬石望柱各二六品塋地周圍四十步每面一十步墳髙八尺七品塋地周圍三十步每面各七步半墳髙六尺祭物四品以上用羊豕九品以上用豕庶民襲衣一用深衣一大帶一履一雙裙褲衫襪隨用飯用粱含錢三銘旌用紅絹五尺斂衣隨所用衣衾及親戚禭儀棺隨所用堅木油杉為上栢扻之土杉松木又次之用黑漆金漆不得硃紅明器一事功布以白布三尺引柩栁車以衾覆棺誌石二片如品官之儀塋地周圍十八步每面四步半祭物用豕力不足者隨家有無既奏上曰婚䘮之禮人道之重斟酌得宜行之惟允其頒布天下使臣民皆遵守之恩䘏備考聞訃為大臣發䘮禮洪武二年十月庚午命禮部議天子為大臣發䘮禮禮官請以宋太祖為韓王趙普舉哀故事其儀聞訃於西華門壬地設御幄南向陳御座於正中上置素褥侍儀司設訃者位於前設文武官陪哭位東西向奉慰位於訃者位北北向其日拱衛司備儀使奉迎車駕引禮導文武百官素服由西華門入就陪哭位引訃者亦由西華門入立於西南侍儀奏外辦皇帝素服乘輿詣幄儀仗分列和聲署即陳樂設而不作太常卿於幄西跪奏某官來訃某年某月日臣某官以某疾薨請舉哀皇帝哭文武官皆哭太常卿跪奏止哭皇帝止哭文武官皆止哭文武官就奉慰位北向立班首詣御前跪百官皆跪奉慰畢俯伏興分立引禮導訃者就拜位四拜興訃者退大常卿奏禮畢皇帝還宫訃者及文武百官以次出明日舉哀如前儀公侯䘮輟朝洪武二十三年命禮部定公侯卒𦵏輟朝禮著為令凡公侯卒於家者聞䘮輟朝三日下𦵏輟朝一日卒於外者聞䘮輟朝一日䘮柩至京輟三日下𦵏仍輟一日輟朝之日不鳴鐘鼓各官服淺淡色衣烏紗㡌黑角帶朝叅從之為大臣發哀洪武二年以開平忠武王常遇春訃至上悲悼即命禮部議天子為大臣發哀禮禮官言周制王哭諸侯大宗伯為上相檀弓曰天子之哭諸侯也雀弁緇衣自周以降天子為諸王公妃主大臣宗戚外祖父母后父母内命婦及蕃國主之䘮皆有舉哀之禮漢東海㳟王薨明帝幸津門亭發哀晉長樂公主扶風王亮薨武帝並舉哀三日唐永安王孝基薨髙祖為之發哀宋汝南郡王晉王夫人符氏薨天子為之素服舉哀此為諸王妃主而舉哀也魏司馬曹真薨帝幸城東張幃而哭之唐太子右衛率李大亮卒太宗為之舉哀於别殿宋太師趙普薨太宗為之素服舉哀樂安郡主惟正薨仁宗素服發哀於後苑此為大臣宗戚而舉哀也今請以宋太宗為韓王趙普舉哀故事其儀見職掌為公侯訃輟朝洪武二十二年命禮部定公侯卒葬輟朝禮著為令禮部議凡公侯卒於家者聞䘮輟朝三日下𦵏輟朝一日卒於外者聞䘮輟朝一日䘮柩至京輟朝三日下𦵏輟朝一日凡輟朝之日不鳴鐘鼓各官服淺淡色衣烏紗㡌黑角帶朝叅從之重考輟朝例景泰三年禮部言昨者奉㫖令稽輟朝事例今按諸司職掌公侯故輟朝三日都督至都指揮故輟朝二日公侯在外故輟朝二日靈襯到京仍輟朝三日其親王公主郡主薨逝輟朝俱係特㫖又永樂間伊王薨輟朝十日具素服西角門視事永安公主薨輟朝四日亦素服視事於西角門今後凡輟朝禮儀俱如永樂間例祭𦵏品官墳塋洪武三年禮部尚書陶凱奏定品官墳塋之制一品塋地周圍九十步墳髙一丈八尺二品塋地周圍八十步墳髙一丈四尺三品塋地周圍七十步墳髙一丈二尺以上石獸並六四品塋地周圍六十步五品五十步墳髙八尺以上石獸並四六品四十步七品以下二十步墳髙六尺凡碑碣五品以上許用碑龜趺螭首六品以上用碣方趺圓首皆參酌古典以為定制五品賜祭葬宣德七年五月上聞少詹事兼侍讀學士王英母卒問尚書胡濙曰英母亦應得賜祭及營葬否濙對曰舊制官三品父母曾受封贈者官為營葬今英官四品其母受五品封上曰儒臣吾所優禮者況非此母無此子其遣官賜祭仍命有司治葬勿為例不允袁忠徹祭𦵏天順二年十月鴻臚寺丁憂序班袁應驤以其父尚寶寺少卿忠徹所纂相書來進且言忠徹祇事太宗皇帝靖難乞賜贈官葬祭上曰忠徹無他能苐以區區相術受知太宗皇帝得累官職其為榮幸亦云至矣所請不允允辭𦵏成化八年八月致仕南京吏部尚書魏驥以是年正月卒遣官祭𦵏其子鴻臚寺序班完以驥遺言具奏辭𦵏上曰大臣不幸云亡朝廷賜䘏典以為盡忠者之勸非但為死者也今驥臨終遺言乃爾身之将死猶恐有勞於民可謂純臣矣覽之良久惻然重違其志特從之申明祭𦵏限制成化七年禮部尚書鄒幹等奏舊制公侯伯都督及在家文職一品二品父母妻并三品父母亡故者賜祭并造墳四品父母故者止賜祭然必其父母妻受本等封贈者方許近來臣下雖例不該祭𦵏者往往陳乞䝉荷特恩不為過而中間有品級畧相等者輙援例希求不已不惟煩凟宸聽又且事不歸一臣議自今除前項官父母并妻曾受本等封贈亡故照例請行若生前雖已受封不係本等品級如子見任三品官其父母受封四品亡故者止有祭又有子現任四品官其父母受五品六品七品者亡故祭𦵏皆無如此則庻幾䘏典一定禮制無更從之正典一祭例成化八年應天府尹彭信卒其子乞祭𦵏禮部尚書鄒幹言在京三品例有祭𦵏而順天府尹王賢致仕卒惟有祭今信卒於任未敢定擬上命止與一祭命禮部左侍郎劉吉子申為國子監生許其請也辨駁與祭𦵏議正德八年禮科給事中王鑾等言大臣祭葬類多冐濫乞查例定擬禁革禮部議國家鑒古為制凡兩京四品以上官皆給賜祭葬隆恩異數非但哀死於既往亦以勸忠於将來也邇因逆瑾變亂事例不一人無適從乃有自行陳乞覬干恩澤者屢經言官建白輙加裁損如被劾去官職者特為停止未經考滿者減半給價侍從邊功者臨時定奪雜流出身者不與覆奏在外者之祭祀以年逺而不行四品官之父母雖受封而無𦵏斟酌時宜可謂無復滲漏但今三品二品官被劾致仕者其祭葬俱遵𢎞治十年恩例二品奏請量減三品還與祭𦵏似等級畧舛乞以二品奏請量減者還與祭𦵏三品被劾致仕者如二品例量減又三品父母受封有祭𦵏而二品三品先後共歴四五年以未考滿請封例無祭𦵏是二品父母有終不霑祭𦵏之恩者矣四品父母受封有祭而三品未及考滿或曾歴四品亦未考滿請封是三品父母有終不霑賜祭之恩者矣乞以二品三品共歴三四年以上者雖未考滿父母准與祭𦵏三品未及三年父母亦准與祭詔悉如所議自後不得紛更已而鑾等又言三品被劾致仕舊止與祭今禮部擬與祭𦵏視以禮致仕者恩典混同無闗勸戒宜舉正禮部奏辨此先帝恩㫖但云還與則抑揚之意亦自有在請自今三品被劾致仕公論不與者止與祭一壇詔從之嚴祭葬限制嘉靖二十三年禮科都給事中周采等言國家優䘏臣下祭𦵏贈諡載諸令甲今陳乞援附章奏紛紜請下禮部通查㑹典條格及前後事例著為畫一之法疏下禮部議言祭葬之賜本以優寵臣下然計品論資以為隆殺則辨勞之義存而怠者奮祭葬有兼得有半得則辨賢之義存而不肖者懲雜途不得以干恩父母不得以追附則辨能辨位之義存而凱覦者息規制甚備但歲久因循為子孫者徒以儌惠君上為孝而不知分限之不可越為有司者徒以推廣德意為務而不知恩禮之不可濫臣等叅稽㑹典擬議條格如言侍臣者必常日侍講讀言軍功者必常躬履行陣給半𦵏者必原其年勞之異同請特恩者必論其途徑之邪正與例未可拘法當報罷者條例上請惟聖裁明定一一二品官妻受封病故者止祭一壇不得與夫之父母比一三品四品父母止授五品以下封者不賜祭其稱特恩非日講侍讀親履行陣及春宫親奉出閣開陳有勞者不得概與一切雜途皆報罷一尚書左都御史已加三少而奉㫖革去者止與本等祭二壇加陞日淺政績未著者臨時奏請定奪被劾閒住者不許一四品以上父母曾授本等封者各許並祭無封贈者不許一二品文官妻未封夫人者不賜祭一被劾致仕者聽本部論其平生功過酌議可否請自上裁未考滿者不分在任致仕俱祭一壇𦵏減半聽調别用及閒住并閒住詔復者俱不許一四品官已考滿者父母雖不得重封著亦與祭一壇未考滿者不許疏上得㫖被劾致仕者仍如𢎞治中例給與祭𦵏以稱朝廷優禮大臣之意餘皆如議申明公侯伯祭𦵏差等嘉靖三十二年十月故伏羌伯毛漢常被叅提未勘及卒乞恩禮部議洪武間公侯祭𦵏之典甚隆葢以待開國功臣至永樂間始命承襲病故者與祭二壇而年㓜襲未久者與一壇所以貴其爵也若管府事有功加太子太保以上者各有加祭則所以勸功也而為事者祭𦵏俱無所以罰罪備載㑹典惟未詳所為事若以被劾閒住為為事則都督例與祭六壇後閑住者亦與祭六壇而侯伯乃祭𦵏俱無輕重似不倫又本以才能推用雖經論劾其爵禄未常絶乃不惟革其管事所加祭遂并本爵應得恩典盡削之反不與無才可推及年㓜襲未久者為比論法似太嚴若以犯罪叅提為為事則犯有輕重勘有虚實恩典一槩削奪論罪似太混又為事者之妻若并革其祭則罪非身造命未追奪不革其祭則本從夫貴而妻獨䝉恩情理似未安自今公侯伯管府事有功後被劾閒住者宜止削其管事有功所加祭仍與本爵應得例𦵏及祭二壇若參提罪重勘實果碍倫理闗行檢者并本爵祭𦵏著一槩削之其罪状頗輕勘問無實者當與閒住同論若未經勘實病故者減其半葬止與祭一壇其夫人命未追奪者似當不革其祭而祭文内亦應并及其夫以示恩從夫得庶幾祖宗貴爵之義與罪罰法並行不悖矣詔如議諡例奏慎重美諡成化四年禮部主事陸淵之奏刑罰雖嚴可警於一時爵賞雖重不及於後世惟美惡之諡一定則榮辱之名永逺不朽我朝祖宗尤重諡法雖以親王勛臣茍無善行亦不輕與之以美諡比年以來故官子孫往往以私求而得美諡上之予之也既無所擇下之得之也不以為榮邇者太子少保禮部尚書兼文淵閣大學士陳文卒奉聖㫖諡曰莊靖莊靖美諡也陳文何足當此迹其平生所存所行貪德彰聞汚風大著縱子為惡滅裂義方繆居調元贊化之任素乏經邦濟世之才生既逃於重罰死又竊夫美名殊失古人勸善懲惡之典乞𠡠廷臣㑹議削其美名更以惡諡以服天下之心以為将來之戒設為大臣之惡不可暴之天下後世恐傷朝廷禮遇之意則止而不諡於義亦可奏入上曰陳文在時不聞人言其過惡歿後循例加以恩典事已施行如何方來訐奏不准特賜四品官諡景泰七年巡按江西右僉都御史韓雍奏乞賜故國子監祭酒李時勉贈諡下禮部議尚書胡濙等以為諡法之設有美有惡無非因人賢否而示勸懲也我朝於大官善者諡不善者不諡即古聖善善從長之意比者尚書周忱徐𤦺左都鎰等俱䝉賜諡如時勉官雖不過四品而其節概之髙行誼之篤學問文章之純足以啟後學之敬慕誠非忱等可比宜如例請錫諡斯愜公論事下翰林院議於是少保大學士陳循等言時勉德行文章卓然為士林仰宗其臨事又多果斷而毅按諡法勤學好問曰文果而能斷曰毅請諡曰文毅從之允改諡成化四年四月故國子監祭酒諡文毅李時勉孫顒奏請改諡加贈上曰時勉在先朝直言敢諫於忠無沗矣毅不足以盡之其諡文忠贈禮部左侍郎如曹鼐例陳請諡成化五年六月南京刑部尚書耿九疇子翰林院脩撰裕言先臣官行應得諡上賜諡清惠因諭禮部臣曰諡法當時自有公論今後已往者不得陳請覆與諡議𢎞治十五年吏部尚書馬文昇奏三品以上大臣卒其子孫乞諡有賜有不賜者有諡及三品者美者多惡者少與者少不與者多乞斷自今凡二品以上大臣及始立功所封侯伯卒無問現任致仕應與諡者或三品有特賜者宜令吏兵二部備查勳業行實仍行禮科給事中詳議等第上請賜諡若所議未公許言官舉劾禮部覆奏謂國朝臣下之諡皆出上賜乞仍遵舊制凡文武大臣諡俱本部具奏既得㫖移文吏兵二部詳述勳業行實等第送翰林院定擬上請從之䘏例初定封贈諸典洪武五年禮部奏定封贈之禮凡文武官自一品至七品得贈其曾祖祖父母及妻有差功臣歿後加贈則公封為王侯封為公歿於王事合加官爵封諡者有司奏請若領兵征伐而陷沒者不許褒封或舊有勳勞合追封者有司不得輒請取自上裁凡功臣䘮𦵏之禮有司臨時上請墳塋享堂碑亭官為脩治其壙内房室及享堂加采色惟公侯及一品得用其餘不許文官至二品武至三品或𠡠䘮或賜錢帛公侯省府臺各指揮使等官之家父母及妻䘮或遣官致祭及賜予皆出自上恩武臣歿於王事者自迎柩至𦵏凡七次遣官致祭小祥大祥皆有司隨時上請給賜之恩取自上裁指揮千百户亡歿有優給之例從征死事者全給從征病卒者半之邊上守禦病故及從征病還而卒者不得援例優給其有勤勞立功者優給之恩亦取自上裁有司不得奏請詔從之内臣乞封諡成化八年寧普伯劉聚奏乞封諡故叔御馬監太監劉永誠并乞祠堂賜額事下禮部言無封諡内臣事倒惟故司禮監太監王振祠堂䝉英宗賜額旌忠今永誠所乞未敢擅擬有㫖賜祠額曰褒功仍命内閣議擬封諡大學士彭時等言王振輔翼英宗年久又死國事英宗復位非不欲重加褒恤因無舊例止賜祠額今劉永誠得照例賜額已為過矣若又加封諡出於王振之上則輕重不倫人心不服将來守邊等項如水誠者将紛然比例陳乞變祖宗之法必自此始況今多事之際正宜恪守成憲以慰人心不可輕易更改致生外議於是事寝不行裁武臣䘏請𢎞治十五年禮部議得公侯都督等官病故既有祭𦵏之賜其家又以齊糧麻布為請在開國元勳則可在􅄻襲者則不可請今後齊糧麻布悉與革免裁省文武䘏典嘉靖二十八年給事中任有齡言大臣䘏典為費不貲今請乞太多不無濫與宜令所司詳核禮部亦以為然因請自今定議凡大臣䘏典或例雖應得而行業無聞勳勞未著者以次遞降其罪過昭彰者皆不准給庻於䘏死之中寓勸生之道又諸皇親指揮以下或妃嬪父母或其兄弟祭𦵏槩給似無等差亦宜分别裁定以重恩典節裁用上曰文武官䘏典如議皇親自宜從厚且生不與爵禄所省為多死後又議殺之不可其仍舊行酌處遇害䘏録嘉靖十一年福建布政查約叅議楊禹都指揮王翔以賊囚林汝美等反獄遇害都御史王應鵬御史蘇信稱其忠義宜加褒録給事中薛宗鎧言約等非為國死事特以變起倉卒不及趨避與蹈水火何異難比孫燧諸臣事例上是其言下禮部議覆諸臣向䝉賜葬是詶其遇害不得更議加卹體訪等第以給䘏典隆慶二年禮科給事中張鹵言先朝建言得罪及應得䘏典諸臣事久時移搜覆未遍宜趣撫按及提學官采訪奏聞其諸陳乞者一切報罪於是禮部覆言諸臣中固有進退光明始終一致者亦有因人成事見斥及退居之後肆情妄作晩節不終其為人品難以槩論設稍不為區别則朝廷勵世之典遂為臣下市恩之私其何以勸天下後世請申所司從公體訪分别等第行誼卓越心術純正見重鄉評者為上謹守亷隅人無疵議者次之罔利營私敗名䘮節者為下各指陳實跡毋徇情私如有濫舉者參奏如法上是之更定䘏典條例隆慶三年禮科都給事中王之垣請定議丈武官䘏典如宗藩條例體式頒示中外以省凟擾禮部請如之垣言叅酌前後故事列為條例以俟聖裁至是禮部議上一文武官祭葬有無隆殺之等悉遵㑹典其特恩如侍從必日侍講讀軍功必躬履行陣春宫官必親奉出閣開陳有勞者悉遵嘉靖中題允事例其祭葬大約於本等品級内量加一等無祭者給與全𦵏如講讀官五品本身有祭四品本身父母得擬祭𦵏三品得及其妻軍功則四品本身得擬祭葬三品未滿得及其父母加恩成例各有等差不得超越資次妄生希覬其或有讀講年久軍旅功多恩䘏特宜從厚者禮部臨時議請其餘不許一概援引陳乞一一品官父母妻加祭有父母加二壇者有妻加一壇者妻止於一壇者遇有陳乞禮部酌議以聞不得預擬一㑹典所定二品祭數本身二壇如有三少或兼大學士贈一品者至四壇父母與妻俱一壇節年所議則例如致仕加三少者加祭一壇加太子太保者加祭三壇原加三少而續奉㫖革去者止與本等祭二壇其被劾閒住者祭俱無妻未封夫人者不准與祭加陞日淺政績未著者禮部臨時核實奏請量減一三品官祭塟不分在任致仕俱祭一壇兼學士贈尚書者祭二壇未及考滿病故者祭一壇減半造墳造𦵏悉如舊例一四品官凡經考滿者父母雖止授五品封亦與祭一壇其未經考滿者不得越例陳乞一品官父母未䝉封贈者於制本不當霑祭不許越例冐請若品官妻非係封贈夫人者原與祭典不准並祭二品三品共歴三年以上者雖未考三品滿本身父母俱准與三品祭葬三品四品共歴三年以上者雖未考四品滿本身准照三品未考滿例祭一壇半葬父母准祭一壇其未及三年以上者不得妄行陳請一内外官不拘品級凡已授外封及後授京職考滿宜封而例不得重封者悉照品級給與應得祭𦵏如不因考滿而䝉恩詔受封者非係講讀軍功仍不准給一二品以上者雖經論劾中間或有心行無疵優禮致仕者悉照𢎞治年間例給與身後恩典如有罪過昭彰公論共棄者不拘見任等項俱不得概給其被劾閒住遇䝉覃恩開復致仕者祭葬仍不准給不許混奏一被劾聽調功過未明舉措未定者使人品原無可議所有應得祭葬准與全給或功有可録過有可原者以全給擬作半給半給作有祭無葬至於罪過昭彰公論共棄者照閒住事例不准給一因事革職而後賜復原職給以應得恩典如嘉靖二十七年例其覃恩槩復者不得援以為例今後自三品以上凡遇此項悉照所復品級題給祭葬若後復職銜反優於原職者仍照原職施行其被核聽核未明身故者照閒住例俱不准給一勳臣祭葬除皇親外其為事革祭者如正德嘉靖間題給賜祭則例今後公侯伯在内掌府事坐營在外總兵征討積有勳勞而加太子太保以上者照㑹典公侯祭十六壇伯祭十五壇掌府事坐營總兵歴有勳勞者與祭五壇雖掌府事坐營而政績未著者與祭四壇管事被劾勘明閒住者祭二壇被劾未經勘實者祭一壇勘實者祭一壇勘實而罪重者并本爵應得祭葬一概盡削又正德間公侯伯本祭俱三壇嘉靖間仍祭二壇今後照嘉靖間事例以復㑹典之舊一武臣祭葬舊例都督同知僉事起用未久病故者與祭二壇錦衣衛都指揮使身後贈都督同知者亦祭三壇署都督同知照署都督僉事止與祭一壇今後推類一體遵行一死事官如抗節不屈身死綱常者犯顔諫諍身死國事者執銳先登身死戰陣者危城固守身死封疆者仍照例立祠此外或有城池失守而身殞於奔命戰陣敗衂而軀斃於倒戈者止為酌量輕重賜之葬祭或加贈廕不得一概立祠禮部志稿卷八十七
