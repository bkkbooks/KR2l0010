body:
  text: 禮部志稿卷七十一明俞汝楫編科試備考試法初行科舉成式洪武十七年三月戊戌朔命禮部頒行科舉成式凡三年大比子午卯酉年鄉試辰戍丑未年㑹試舉人不拘額數從實充貢鄉試八月初九日第一塲試四書義三道每道二百字以上經義四道每道三百字以上未能者許各减一道四書義主朱子集註經義詩主朱子集𫝊易主程朱𫝊義書主蔡氏𫝊及古注疏春秋主左氏公羊榖梁胡氏張洽𫝊禮記主古注疏十二日第二塲試論一道三百字以上判語五條詔誥章表内科一道十五日第三塲試經史策五道未能者許减其二俱三百字以上次年禮部㑹試以二月初九日十二日十五日為三塲所考文學與鄉試同鄉試直𨽻府州縣則於應天府在外府州縣則於各布政司其舉人則國子學生及府州縣學生員之學成者儒士之未仕者官之未入流者皆繇有司申舉性資敦厚文行可稱者應之其學校訓導專教生徒及罷閒官吏娼優之家與居父母喪者並不許入試其中式者官給廪𫝊送禮部㑹試考試官皆訪明經公正之士官出幣帛先期敦聘主文考試官二人文幣各二表裏同考試官鄉試四人㑹試八人文幣各一表裏提調官在内鄉試應天府官一人㑹試禮部内官一人在外布政司官一人監試官監察御史二人在外按察司官二人供給官在内應天府官一人在外府官一人收掌試卷官一人彌封官一人謄録官一人對讀官四人受卷官二人皆選居官之清慎者為之巡綽監門搜檢懷挾官四人在内從都督府委官在外從守禦官委官凡供用筆札飲食之屬皆官給之舉人試卷自備每塲草卷正卷各用紙十二副幅首書三代姓名及其籍貫年貌所習經書在内赴應天府在外赴布政司印卷會試殿試赴禮部印卷試之日黎明舉人入塲每人用軍一人守之禁講問代冒至晩納卷未畢者給燭三枝文字迴避御名廟諱及不許自敘門第彌封者編號作三合字謄録者用硃考官用墨以防欺偽其會試中式者三月朔日赴殿試建言取士法洪熈元年四月鄭府長史司審理所審理正俞廷輔言伏讀制勑有曰為國以得賢為重事君以進賢為忠竊以為進賢之路莫重於科舉近年賔興之士率多記誦虛文為出身之階求其實才十無一二盖有年才二十者雖稱聰敏然未嘗究心於治人之道一旦僥倖挂名科目而使之臨政往往束手無為職事廢隳民受其弊自今各處鄉試乞令有司先行審訪務得通今博古行止端重年過二十五者許令入試比試則務選其文詞典雅議論切實者進之㑹試又加慎選庶幾士務實學而國家得賢才之用上諭禮部臣曰所言當理其即行之又曰科舉之士須南北兼取南人雖善文詞而北人厚重比累科所選北人僅得什一非公天下之道自今科塲取士以十分論南士取六分北士四分爾等其定議各布政司名數以聞擇考官避嫌疑正徳十年七月給事中范洵言二事一擇考官謂各布政司鄉試皆用教官多不得人用是監臨官恒委其事於簾外而自專進退之權請如兩畿例主考用翰林院六品以下官或事簡衙門五品以下官為之同考教官先期於各處提學官聴其選擇以充則真才可得一避嫌疑謂兩京府官子弟入塲中式不免有倚勢之弊兩京顯官子弟不由府縣保送而徑自移文入塲不免有僱代之弊請令兩京人各不得為兩府官而别府入仕兩府者其子弟親屬亦宜迴避宦遊子弟科舉聴原籍提學考試則高門不得妨寒畯之階公道不至為私意所蔽矣禮部議覆以京官主考鄉試言之者多雖先朝偶一行然羣議紛起宜如舊例令各布政司照舊訪取教官供事如不及數令提學官以平日考居優等充之兩京府官干選法者宜令吏部查處兩府官及兩京官子弟入試宜如洵所奏行之詔可監臨不與内簾事嘉靖十年浙江巡按御史李佶言各省鄉試考官宜㑹同監臨等官揭書出題考試官取定試卷先期將號數發出聴監臨官叅之墨卷以定去取禮部覆議考試監臨各有職掌先大學士張孚敬題各省外簾官豫結生徒密邇關節不公之弊莫甚於斯今復令外簾官叅之墨卷不惟非祖宗糊名易書之法亦非今日補偏救弊之意宜照先奉欽依事例未出榜以前監臨官不許干與以撓職守出榜之後内簾果有不公等弊據實糾舉曰各處鄉試事宜俱照原題准事例行監臨并外簾官不得干預主考官務同分考官從公揭書出題三塲策題亦不許主考官預搆以防奸弊以後會試俱遵照行鄉試録提調官與考試官序名只照舊規不許更變試條奏科舉定制洪武四年中書奏科舉定制凡府州縣學生員民間俊秀子弟及學官吏胥習舉業者皆許應試上曰科舉初設凡文字詞理平順者皆預選列以示激勸唯吏胥心術已壞不許應試科舉别出題永樂十七年三月為善隂隲書成命賜諸王羣臣及國子監天下學校又命禮部自今科舉取士凖大誥例于内出題遠方學生就近鄉試宣徳二年六月貴州布政司言普安州儒學生員皆是玀玀僰人莫知向學今選俊秀軍生王璽等入學讀書以備貢舉又言前奉禮部文書本司所轄州郡生徒堪應舉者許於湖廣布政司就試縁去湖廣路遠於雲南為近宜就近為便中舍入試成化七年五月中書舍人吕㦂乞應順天府鄉試從之刑科給事中芮畿言國朝開科取士凡有職人員入流品者不得入試近者中書舍人吕㦂乞應順天府鄉試有㫖允之不為例然中書舍人係七品近侍官非進士監生不授㦂以故父翰林學士吕原之䕃叨授此官而反欲屈身就試下冺先澤上負國恩茍圖今日科舉之榮預為他日陞遷之地而禮部尚書朦朧奏請俱宜究治上曰朕念㦂儒臣之子有志科目特允所請不為例典吏承差等入試例正統八年雲南道監察御史計澄等奏開科取士其在京如遇稱係軍生并各衙門吏典承差人等不繇學校不經考驗其間奸盗貪墨無所不有此等之徒一體不許入試庶革奔競之風下禮部議如澄言上曰求賢之路不許阻塞生員儒士軍民還著提督學校御史考察入試其吏典承差人等禮部嚴切考察果通經無過犯俱容入試仍移文原籍勘實如有虛詐論罪不宥處置科塲落卷正統十年陝西耀州儒學署學正事舉人康極言科舉之設誠選賢圖治之盛事也今各處考官止將中式文卷批附各生謄照其不中式者不𤼵中間亦有文卷無疵考官忽畧而不取其應試生員亦有不成文并曵白者乞勅今後科塲不中之文卷并不成文曵白卷俱付提調學校僉事等官詳校如文卷無疵考官忽畧不取具奏逮問其不成文并曵白者按臨各學給與本生曉諭其失量施責罰如此則為考官者不敢忽畧而不中生員知所改正不成文并曵白者不敢萌倖進之心矣上命禮部集議以聞經房不用帶考景㤗元年順天府府尹王賢奏今年該鄉試往者各處取正考試官二員同考試官四員或三員臣以五經宜用考官五員若他經官帶考一二經則去取文字豈無謬悞且㑹試受卷彌封謄録對讀等官俱用在京郎中員外主事分管俱能通曉三塲中間豈無受業及同鄉親屬乞令該部計議今後在京在外鄉試取同考試官五經務要五員專經考試不用帶考其㑹試謄録等官移文吏部取聽選官借用如此則奸弊可革科目得人從之增兩京經房天順三年順天府尹王福言今年八月本府鄉試看得應試生員春秋禮記二經數少詩書易三經各有四五百卷若各以同考官一人校閱慮恐涉獵不詳而有玉石不分之弊乞令禮部將詩書易三經每經添同考官一員上從之仍命南京亦照此例增經房員數成化十七年禮部言二月初九日㑹試天下舉人合用同考試官舊易春秋禮記三經各二員書詩二經各三員縁今書詩二經試卷加多乞每經各增一員上曰科舉取士務在得人使鑒别不精寧免其無濫進者乎今詩書卷比前科加多而額數有限可每經增同考試官一人庶得詳於校閱而人才無遺也考試官隆賔禮𢎞治四年禮科給事中林元甫等言各處鄉試所請考試官多不得其人致去取悉從外簾甚至為監臨等官所斥辱甚非賔禮儒臣之意今後請令巡按監察御史各㑹同京府并布政按察二司先期移文各處提學憲臣擇有學行者行聘御史等官以禮相待除私弊紏察外其文章純駁悉聴去取不許考立簾外五經官以奪其權如考官取士不足服人并罪其原請者禮部覆奏宜如所言上曰今後鄉試務遵依定制事該簾内官管理者簾外官不許干預雲貴合試𢎞治七年十月貴州守臣奏本布政司生員舊於雲南布政司鄉試其試録止名雲南鄉試録所取舉人名數通四十五名今請於本處開科以免合式增解額以激士心禮部議謂舊制不可改止擬改試録為雲貴鄉試録及稍增解額名數上從之命雲南增舉人二名貴州三名太醫院子弟入試𢎞治十年十一月太醫院使王玉奏本院官并醫生醫士子孫弟姪凡有諳習舉業者例得應順天府鄉試近給事趙竑奏止許食糧當差醫士醫生應試而子弟不得復與進用人才不宜故為是沮隔也乞如舊便禮部覆奏得㫖命凡冊内有名者許仍舊入試申飭訪取試官正徳八年六月廣東道監察御史楊時周言國家每三年取士除兩京外其浙江諸省主考官類以教職充之濫竽者不少自今宜於兩京進士出身官員内訪求才學為士類攸歸者往膺主考之任庶得真才章下禮部覆奏謂舊制未可盡更且諸省鄉試校文雖屬於教官而監臨實統於御史請申飭巡按通㑹布按二司預訪教職有學行者以禮聘之不勝任者御史紏舉則舊制不失而真才可得矣從之京省鄉試别議考官嘉靖五年署都察院事兵部左侍郎兼學士張璁條陳慎科目三事一正文體請令主司校文務取平正爾雅有禆實用仍於周禮儀禮中出策一道使之習於禮樂然後責以事君使民一明實録言鄉㑹試録宜取生儒原卷稍增損一二字不必盡出已筆分考校之功一慎考官言各省鄉試宜如兩京事例擇翰林院科部官為之主考毋令權歸外簾得以預結生徒暗通關節上深善其言令所司如議舉行各省鄉試王考令禮部舉京官或進士每省二人馳往供事監臨官不得叅預内簾兩京鄉試主考外五經房仍令各加科部官一員會試三事嘉靖十一年禮部尚書夏言以歳當㑹試條奏科塲三事一變文體以正士習言近年以來文章日趨卑陋往往剽剟摹擬國左等書以相矜眩不過以艱深之詞餙淺近之見用竒僻之字盖庸拙之詞而純正博雅之體優柔昌大之氣蕩然無存自皇上登極以來屢渙徳音黜浮崇雅乃昨歳天下進呈録文數皆猥鄙不經氣格卑弱背戾經㫖决裂程式其刻意以為髙者則浮誕譎詭而不協於中騁詞以為辯者則支離磔裂而不根於理文體大壞比昔尤甚今年望勅考官務取淳正典雅温柔敦厚之文一切駕虛翼偽鉤􅁄軋茁之習痛加黜落庶幾士知所向文體可變二責主司以定程式言應試之士較于風簷之中欲實録其文可為程式者盖已絶無間有所以試録文字多出主司之手而兩京㑹試皆館閣儒臣所為足為海内矜式近今録士子本文不必考官自作所以各省試録文理紕繆體裁龎雜乞令考官今次㑹試所命三塲題目俱要冠冕正大有關理道不許截裂牽綴徒事帖括及困以隠僻有如覆射若士子可録之文仍令考官重加裁正以示模範三簡考官以重文衡言同考官例用翰林院講讀官十一人給事中三人司屬三人今本院自侍講已下通得十一人則當盡數入塲方足供事乞勅内閣於科部六人之外再訪三四人以補翰林不足之數疏入上報曰文運有關國運所係不細近來士子經義詭異艱深大壞文體誠為害治其出榜曉諭今年㑹試文卷必純正典雅明白通鬯者方得中式若有仍前鉤棘竒僻痛加黜落甚則令主考官奏聞處治餘依擬行請寛京考官數目嘉靖二十四年部覆科道條陳乞遇兩京鄉試題遣主考官寛其數目如翰林院春坊中允贊善講讀官少即於修撰編修内共擬數員上請㸃用以絶士子窺伺之弊􅈬近鄉試嘉靖十年十月本部題該遼東都司等衛儒學生員徐潮等奏要改赴順天府應試等因本部看得遼東都司衛學應試生員先附山東多係縁海道之便今海道既塞陸路遼逺往返正有六千餘里貧生寒士裹糧挾策奔走長途動經數月委於人情不便今欲改附近順天府應試又與潼關之附陜西宣府之附順天事體相同况節該衛學生員徐潮等陳奏頻煩情詞如一似應俯從但係奏改就近科舉地方既已更屬解額未免有拘臣等查得近該直𨽻提學御史胡明善題稱徳州等衛提學教官皆屬山東惟生員乃為提學御史所轄乞要建學起貢等因該本部題覆奉聖㫖是依擬行欽此已經行令欽遵去後今照遼東衛學遠去山東六千餘里乃使越過順天而附山東科舉徳州左等衛學本是山東地方而科舉反附於順天事體人情通屬未便相應議處臣等合候命下行移山東布政司及咨都察院轉行直𨽻提學并遼東巡按御史知㑹今後徳州左等衛儒學聽山東提學官管轄就山東布政司應試遼東科舉生儒遼東巡按御史考送順天府鄉試其徳州等衛建學起貢事宜本部移咨都察院改行山東巡按御史查照先奉欽依事理施行則不惟解額無拘而人情事體兩得便益奉聖㫖是依擬行順天增巡城御史檢閱嘉靖四十年以近歳科塲弊多詔增拓舉塲前地令生徒便於出入官校便於防檢其臨入試時除監塲御史外增遣巡城御史二員先於塲門檢閱以進著為令監生官恩生應試特例嘉靖十四年十一月内禮部題該南京國子監祭酒費寀奏照得近年遵奉詔㫖精選歳貢生員到監作養以偹不次擢用立賢無方人知感奮縁各生多是玅年英俊而京闈取中有限其在歴期滿日各衙門既嚴勒還鄉原籍提學又不肯多取監生應試是諸生歴滿之後無復科第之望矣以故滿監率多託病遷延甚至私自逃回不顧虛曠雖經决罰猶循故常如䝉俯念許令歴滿還鄉之後凡遇鄉試在畿輔者畿輔巡按御史收考應試在各省者各省巡按御史收考應試庶使人有定志不擾監規再照官恩納銀生員中間空疎荒謬者固多亦間有經生宿學乆困鄉校未友善士以廣見聞抑或初雖失學後經琢磨亦知奮勵故納銀生員中如見任吏部侍郎羅玘發解之後往往踵武相繼而官恩生員中間有多發身賢科不可謂盡無人也但官司多以富賄而起嫌疑又以儒素而槩輕忽較之選貢生監摧抑尤甚以致遷延規避滋紊條約如䝉歴滿鄉試之年随處巡按御史收考精選入塲則不惟監規可齊而國家作人之方益廣矣等因具題該本部議得各處歴滿監鄉監生官恩生并納銀生員其間豈無豪傑之才若遇鄉試之年不令入試未免有遺賢之嘆今費寀具奏前因相應依擬覆奉欽依移咨都察院通行南北直𨽻并浙江等布政司如遇鄉試之年將歴滿在京監生官恩生并納銀生員許彼處提學官按歴地方與在學生員一槩嚴加精選如果文理平通録取入試不許聴受囑託將文理紕謬不堪者一槩濫送請精擇考官嘉靖二十四年禮部覆南京給事中萬虞愷等條奏科塲事宜請㑹試及兩京主考翰林官内盡數開列及部院官亦多擬上候㸃其各省鄉試精聘教職不足則聘外省推官知縣等官入内簾主事外簾不得有所干與印卷封號須加詳慎入塲唱名給卷印號登時彌封奸人不得措手以杜關節得㫖㑹試及兩京考官宜遵舊制餘如議行試約申飭鄉試用考官正統六年監察御史丘俊奏江西鄉試小録刋舉人胡皥易經家人卦彖辭義九五陽剛訛作六五柔順考試官禮部主事林璧湖廣岳州府通判林文􅮘同考官浙江鄞縣儒學致仕教諭錢縉俱合治罪禮部請斥皥回原學肄業待下科再試并言舊例同考官止請四員今湖廣江西廣東山西山東陜西皆多一員福建多二員湖廣鄉試小録自增知貢舉官二員事屬僭妄宜通行禁革上從之命今後考官必求文學老成行止端莊不許將六十以上及致仕老病與署事舉人年少新進學力未至者舉用違者從風憲官紏劾治罪試題犯王諱正統十二年丙申禮部奏山西布政司正統十二年鄉試小録所出詩經題内維周之楨其楨字犯楚昭王諱不曽迴避考試官學録郭明郁教諭呉驥同考試官知縣黄子嘉提調官左布政使石左叅政朱監試官按察使林文秩僉事黄文政俱應問罪上宥之但令巡按監察御史取各官罪狀考試及同考試官俱罰俸一月提調監試官紀録還職仍移文申諭戒無再犯陳入試人禁例景㤗三年禮部祠祭司主事周騤奏設科取士當遵國法禁例洪武以來舊制曽繇科目出身未入流品官生員發充吏罷閒官吏監生生員倡優隸卒刑喪過犯之人不許入試其生員軍生儒士及未入流品官農吏承差軍餘人等若無錢糧等項粘帶者聽從入試如有不遵照例論罪已中式者斥退不録未中式者終身不許入試今順天府景㤗四年鄉試取中舉人尹誠汪諧陳益龔匯王顯李随李森錢輪俱係冐籍人數於例不該入試似此之徒欲求事君而先欺君今日茍圖如此他日居官可知乞明正其罪以警將來命錦衣衛俱執送刑部問未發露者許出首逮問同學知而不首者同罪今後科塲知貢舉監試提調等官務在防範嚴切不許容情冐名換卷截卷傳遞文字并說話作弊監門搜檢巡綽監試官軍敢有如前容隠不舉作弊者俱治以重罪簾外執事官臨期於吏部聼選官内選文學出身者充之詔舉人尹誠等十二人冐籍下錦衣衛獄鞫罪終身不録用至是禮科都給事中張軾等言立法不可以不嚴待人不可以不恕貴乎張弛得宜而輕重適均也竊此冒籍等人因多避難就易欲希僥倖然亦有因地里遥逺盤費弗給而不能回者有因從親在外生長不識鄉里而難以回者是以冐籍鄉試以圖出身冀得升斗之粟以為養親之需其初心不過如此其所犯亦非甚重今既問罪而不容㑹試固為當矣至若終身不許録用則將終為罹罪之人竟無自新之路待人無乃未恕乎乞勅禮部通查此等冐籍之人己經問𤼵者給引照回原籍如遇開科鄉試仍許本地入塲如此則犯小過者得以自新負才藝者不終至於阻抑矣從之出題禁割裂天順三年浙江温州府永嘉縣教諭雍懋言朝廷每三年開科取士考官出題多摘裂牽綴舉人作文亦少純實典雅比者浙江鄉試春秋摘一十六股配作一題頭緒太多及所鏤程文乃太簡畧而不華實且春秋為經屬詞比事變例無窮考官出題往往棄經任傳甚至叅以己意名雖搭題實則射覆遂使素抱實學者一時認題與考官相左即被黜去乞勅自後考官出題舉子作文一惟明文是遵有弗悛者罪之上善其言命禮部議行題行鄉試條約嘉靖十二年定節年題准鄉試條例本部每遇鄉試先年八月通行各省知㑹遵守一各處鄉試該用考試官布按二司務要㑹同巡按御史從公訪求學問老成行止端謹之士以禮聘取不許狥私將年六十已上并到任養病見在府州縣官及不由科目出身教官聴從囑託一槩濫請亦不許越數多請若所請考官遇有事故許原差人赴所在提調學校官處改請相應教官各將舉到試官開坐舉主職名随小録咨呈本部若請非其人罪在舉主一簾外執事官照依舊例取用不許過多其順天應天二府官員不拘是否入院共事弟男人等俱不許朦朧入試以致夤縁中式一試官所出三塲題目提調監試官俱不許干預其題目務要依經按傳不許偏生小説意外鑿空摘裂牽綴有失本㫖及問非所當問干犯迴避字樣一塲中所作文字俱要純雅通暢不用浮華險恠艱澁之詞䇿荅不許引用謬誤雜書陳及時務須要斟酌得宜便於實用不許泛為夸大及偏執私意有乖醇厚之風俱遵照本部題准正文體事例著實舉行一應舉生員并儒士人等俱要本府州縣并衛所申送提調學校并遼東巡按御史先行嚴加考試中者方許入塲不得將不熟三塲初學之士及外處人民假以贅壻等項冐濫入試虛費供給亦不許仕宦子弟於父母原任衙門移文起送其各生有重冐古今顯著姓名責令改正方許入塲一文章純駁悉聽考官去取不許巧立外簾五經官干預考試官一所取舉人止憑文字髙下去取不得論其地方中式多寡臨時偏徇進斥以廢公論一考試官如有徇私作弊仍從監臨等官紏舉一小録文字務將文理平正者録出不許監試提調等官各逞己能分派代作及將舉人原文改作刋刻其書寫刋刻要字畫真楷用黄綾壳裝潢黄二本紅四本俱用紅黄綾袱包裹太后中宫東宫仍備紅綾壳録六本試畢同將本部備照小録作速差人馳驛送部一小録書板照本部㑹試録式樣不許仍開掌行科舉文字吏及謄録對讀生員姓名一小録序文内考試提調等官各開官職姓名不許稱臣并知貢舉字樣名目如㑹試録例又不許稱張公李公字樣所給公據各要粘連三塲文字仍將舉人的確年歳籍貫經書備開咨呈與備照鄉試録一同送部以憑查對毋得增减年歳及遺漏不報一各處進到小録本部照依前項事理逐一叅詳如有故違及差謬等項通行叅奏究治一查得近年有等無籍之徒瞰遇科舉生儒入塲之時預先挾讐告害及投粘匿名書帖隂謀駕害報復者不許輕信如或牽告在官審果不係𦂳關對證者亦待科塲畢日問理毋墮奸計以息刁風題行㑹試條約成化二年正月禮部奏設科取士期得真才以資任用然每歳㑹試雖有禁約舊例而行之日乆不能無弊臣等更議事宜條示申明敢具以請一舊例考試等官於初八日蚤入試院一日之間事務多端整頓不及宜預於初七日早入院為便一舊例就試之日舉人黎明入塲黄昏納卷有未畢者給燭三枝燭進文不成者扶出今士子比昔倍蓰中間多有故意延至暮夜請燭之時抄寫換易或有棄燭於席舍中而他出因而誤事者最為可慮宜於四更時捜入黎明散題申時稿不完者扶出若至黄昏有謄真一簾或簾半未畢者給與燭一舉子入塲務要嚴加捜檢放入就舍坐待題目文成二篇之上者方許入厠即随還舍不許交接講論若有懷挾及凂官軍夫匠人等夾帶文字入塲埋藏抄寫并越舍與人互換者捜尋捉獲得出并發充吏其官軍夫匠人等為帶文字縱容懷挾又容越舍互相抄寫不行覺察捉拏者問罪軍調邊衛官罰俸一年夫匠發口外為民一巡綽捜檢看守官軍止于在營差撥其曾經差者不許再差若他人冐頂軍名入塲看守者民𤼵充軍軍調邊衛一提調監試官不許私自入號務要公同往來巡視其巡綽官止於號門外看察不許入號與舉子交接違者聽提調監試官叅奏拿問一舉人入塲之後墻外例該五城兵馬指揮等官率領火夫弓兵分地看守以防不虞近年各城兵馬視為泛常或致悞事今後各城務委的當官率領火夫弓兵牌帶什器環墻四面嚴加防守不許擅離怠慢悞事違者叅奏拿問一每塲謄録紅卷送入簾内老閲候三塲畢考閲紅卷文字已定方許弔取墨卷送入簾内於公堂比對字號不許散入同考各房誠恐收拾不謹遂致疎漏一謄録生員務要用心逐字真正對寫不許差訛失落字樣潦草不真對讀所亦要對得明白不許含糊茍且若謄録差訛失落字樣潦草不真及對讀不出者生員發充吏役該管官送問一謄録對讀收卷等項官舊例用京官今行吏部取聴選官充之縁中間多有年老眼昏及無行止不堪任使今後務要精選四十歳以上下五品至七品官有行止者令各執事庶㡬事可責成一供給飯食順天府官多有造作不精供給失節士子嗟怨合無本部另差官一員專一提督供給奏上上從之嘉靖十年禮部題准節年㑹試條例一試官不得將帶弟男子姪親屬入試狥私取中違者許諸人指實陳告一舊例就試之日許令舉人黎明入塲黄昏納卷有作文未畢者給燭三枝燭完文不成者扶出縁今士子比昔不啻加倍中間多有奸詐之徒往往故意延至黄昏請燭之時乗機混雜謄寫懷挾換易文字甚有棄撇燈燭於席舍之内走求他人因而悞事合於四更時搜入黎明散卷申時初刻稿不完者扶出其謄寫正卷至黄昏如有一篇半篇未畢者給與燭一枝再不多與一舉人作文依例迴避御名廟諱及親王名諱如有違犯定行斥落惟二名不偏諱一考試官及簾内外官各帶不識字從人一名役使不許縱令出入一試官入院之後提調監試官封鎖門户不許私自出入如送試卷或供給物料提調官監察御史眼同開門出入即便封鎖一舉人作文字畢送受卷官收受類送彌封官撰字號封記送謄録所謄録畢送對讀官對讀畢送入簾内考閲一搜檢懷挾凡遇每塲舉人入院把門官軍一一搜檢除印過試卷洪武正韻筆墨硯外其餘不得將帶片紙隻字如是搜檢得出即時扶出仍行移本貫再不許應試及冐名入試者定行奏聞區處一巡綽官凡遇舉人入院竝須止約不得喧閧如己入席舍常川巡綽舉人不得私自交談互相講論及巡察簾内外官不得漏洩事務一受卷所置立文簿凡遇舉人投納試卷陸續關發彌封所就於簿上附名以憑取勘入試人員數目其舉人納卷未了不許先行歇息及遺失試卷一彌封所先將試卷密封舉人姓名用印關防仍置簿撰定三不成字號編排資次照樣於各經卷首號寫明白不許㸃畫相同及漏洩作弊一謄録所受到試卷硃書字號并所作文字務要用紅筆謄録相同於上附寫某人謄寫如是不行真楷以致錯訛及脫漏添換許對讀官劾舉照謄寫人名究治一對讀所官受到試卷務要將紅字卷墨字卷對讀分明於後附寫某人對讀無差不許差訛有妨考校一供給官合用心紅筆墨紙劄棃木板并刋字匠刷印匠先期辦完候用其簾内外官并舉人執事等廪饌務要精潔其吏胥里甲供應人等出入竝仰守門官軍用心搜檢毋得透漏試題及暗遞文字一舉人入試之後其在外諸色人等毋得輒入窺探事情違者許把門官軍捉拿赴官治罪一撥到搜檢看守軍人本部委官先將各軍人搜檢沿身别無夾帶方許入院如是將帶片紙隻字誣舉人者捉拏到官定行奏聞區處一提調官監試官不得干預考試卷一舉人用墨筆書寫試卷謄録對讀官受卷皆用紅筆考試官用墨筆批㸃竝同關防用墨處竝不用心紅用心紅處竝不用墨毋容混同一舉人試卷自備三塲所用筆墨并正卷草卷各紙一十二幅於卷首書寫三代籍貫年甲及所治本經赴部印卷外更不得於正卷前後重寫姓名籍貫違者究治一圖畫東西行席舍間數編排開寫舉人照依編定字號姓名并所治本經相間入坐毋得攙越錯亂違者治罪一舉人文字題目之上不許私加奉試字樣文字中間不得自敘辛苦門第謄録㸃檢如有似此違犯者許掌試提調官監察御史看過更不謄録其正卷内務要真楷書寫草書有碍謄録一舉人入塲務要嚴加搜檢放入就舍每用軍一人看守坐待題目到手文成二篇之上者方許出恭随即還舍不許交接講論若有懷挾及凂託官軍夫匠人等夾帶文字入塲埋藏抄謄并越舍與人互換寫録者搜尋捉獲得出并𤼵充吏其官軍夫匠人等替帶文字縱容夾帶及容越舍互相抄寫不行覺察捉拏者問罪軍調邊衛官罰俸一年夫匠發口外為民一巡綽搜檢看守官軍止於在營差撥其曾經差過者不許再差若他人冐頂正軍入塲看守者民發充軍軍調邊衛一提調監試官員不許私自入號務要公同往來巡視其巡綽官員止於號門外看察不許入號舉人交接違者聽提調官監試官叅奏拿問一每塲謄録紅卷送入簾内於至公堂比對字號不許流落同考各房誠恐收拾不𦂳遂致疎漏不便試卷犯諱差謬成化十三年詹事府少詹事兼翰林院侍讀黎淳奏科塲出題作文定式洪武年間已嘗頒降近年有司多有不遵任情行事所刋程文除兩京外其餘純粹者少駁雜者多甚至犯廟諱及御名乞移文所司將提調監試并考試同考試官究治考官如例追奪表裏仍查墨卷如舉人自錯退還原學及小録前列吏典掌行科舉生員謄録對讀兩條亦當削去申明科塲舊制頒降學校永為遵守有㫖科舉重事各處題刋文等事何為違式差謬該部㑹官查究明白以聞禮部㑹同翰林院等衙門學士等官覆奏成化十三年鄉試録浙江等布政司中有犯廟諱御名及親王諱其嫌音及偏犯一字者如例不坐外其犯二字及文理差謬行文有疵表失平仄字畫差錯者宜如淳言究治但犯親王諱及文疵平仄不順字畫差錯比與文理差謬者不同宜止治其罪仍令舉人㑹試如錯改其文止罪考官後㑹試鄉試開科取士凡遇御名廟諱下一字俱要减寫㸃畫以盡臣下尊敬之道餘皆如禮部奏行條件考試等官務取學行老成之士不許狥私濫舉及越數多取出題校文并刋録文字必須依經按傳文理純正不許監臨等官干預其考試官如有狥私作弊仍從監臨等官紏舉簾外執事如舊例取用小録刋板如禮部㑹試録式不許仍開掌行科舉文字吏典及謄録對讀生員姓名從人聘考官不得狥私成化十四年御史許進言國家以科目取士慎選考官甚為詳備近各布政司每遇開科輙狥私情所聘以為考試及同考試官者多非其人以致校閲不精有遺才之弊竊見兩京俱命翰林官主試故所取得人乞各布政司亦如兩京例命翰林官主考為是上諭禮部臣曰布政司鄉試自聘主司乃祖宗舊制行之已乆許進何得具奏欲改之且科目選賢國家重事若聘王司狥私作弊無往而不為奸利矣爾其行令巡按御史并布按二司今後敢有作弊者令互相紏舉或爾部中詳看體訪得出奏來必重治之奏革科塲弊𢎞治四年巡按直𨽻監察御史王鑑之言臣奉勅提督南畿學校嘗聞南京科塲之弊明年又當鄉試不先革正將恐奸偽益滋惟南京應試士人除百二十三處學校外又有國子監生及諸司歴事聴選官吏儒士軰進途既廣弊端多生而貢院規模窄狹四面皆居民樓房圍繞登髙窺覘乗暗投擲巡綽難于關防懷挾易于進入况受卷彌封等所俱在至公堂上内簾上隔一板壁聲息相聞舉動便覺積年以來冨貴子弟多方營圖有買求編號將有學生員置在左右代作文字者有請託執事官吏截人文字易以己名者有三更不出潛入别號求人改作者有先藏舊文在内而臨時取出謄寫者巡綽官軍多狥情弊不舉近又増府官一員進入内簾科塲一應公事俱屬此軰豈不傳遞消息名曰革弊其實生奸故榜未揭而物色已遍榜既揭而議謗交騰凡此弊端臣恐不獨南畿為然乞勅禮部看詳行南京都察院凡差監試御史務求剛正老成之人其應天府提調并一應執事官亦必慎擇公㢘端謹之士痛革宿弊貢院墻垣并受卷等所宜增高加􅁄充廣遷移以杜弊源仍移文各布政司一體禁革則真才可得而謗議自消矣命禮部知之議處簾内外責成𢎞治十六年禮部奏明年各布政司當開科取士欲申明所司知之上曰科舉重事邇者各布政司舊規廢弛考試等官多不得人簾内簾外混淆侵越弊出多端宜查原定條格議處畫一以聞於是禮部具言我祖宗科塲條貫之善而近年以來各布政司為簾外官者思欲防簾内之弊往往選取府州縣官充受卷彌封等官翻封墨卷叅定去取似與舊規不合且府州縣官未必盡得其人將以革弊而更以滋弊今宜令慎擇試官試官得人則為簾外者雖欲分爭侵越亦自有所不能矣命遵照原定舊規申明禁約考試官必從公訪舉不拘職任務在得人其有不勝任者罪作舉主簾外官有侵奪簾内職務者事發重罪之若所刋試録乖舛許該部與翰林院叅究以聞重選舉五事正徳十年南京禮科給事中徐文溥言重選舉五事一近日主司務為譎恠命題摘掇一句二句或割裂文義或偏斷意㫖宜如成化初年以前出題必章句成段義理貫屬取文必講理親切措詞淳雅其有浮艷險恠不根義理者並皆黜落各提學官亦依此訓廸諸生二各處監塲官務為苛刻屏去士子衣巾被髪趨走宜畧倣㑹試事體許其單衣草履稍存體䫉以養㢘恥敢有懷挾加重治三今後鄉試除同考官照舊行令提學考選教官應聘其主考不拘官職務令愽訪素有名望操持㢘正邃於經術者往蒞其事四近年塲屋之權一歸御史二司俛仰承風考官局縮聽命五經分校於各所去取一聽於監臨且據所習之經以為所舉之首或用字號以示内簾或進簾内以諭己意或臨榜而執卷請填或割榜而私自換易為弊多端所害不少今後御史專令紏察奸弊毋得仍前侵奪有違舊制或專恣聽考官指實陳奏二司互相紏舉吏部嚴加訪察黜之示戒五近時時文流布四方書肆商人藉此以賈利士子假此以僥倖宜加痛革凡塲屋文字句語雷同即係盗竊不許謄録其書坊刋刻一應時文悉時燒燬不得鬻販各處提學尤當禁革如或私藏誦習不悛者即行黜退疏入下所司知之條陳科舉事嘉靖十年禮部覆都給事中張潤身條陳科舉事一杜詐冒以端趨向監生三月以後到監及到各衙門補歴者不許考送仍行北直𨽻督學御史明覈在京生儒鄉貫冊籍一革小考以節勞費各省督學往往多取名數臨期集省城聽巡按御史覆考名為小考此於生儒勞費不便一處考官以絶私嫌各處同考試官聘取狥私宜令督學先㢘所屬教職年壯行端者糊名考選類造手冊分經編號下實其姓名官籍自存備照别置一冊不書名籍第以所編字號密切鈐封送巡按處以待隔省來聘旋填姓名官籍或應迴避則用次人以次應聘其預泄私通及濫舉充數者聴御史叅究詔如議禁流移附籍入試嘉靖二十二年禮部言國家開設賢科兩京各省三年大比各簡其士賢者多貢禮部禮部合試之簡其賢者對制大廷以供中外百司之任所係甚重夫人才之生其地者多寡不同故解額因之而異至於㑹試則分南北中卷取之各有定額所司不得增損奈何法乆禁疎遂有遊學矯詐之徒見他方解額稍多中式頗易往往假為流移冐籍入試至有脱逃罪犯變易姓名奔走營求靡所不至至于㑹試舉人報籍印卷亦有假託族屬改附籍貫朦朧開具以南作北國法罔存士風大壞乞於明年㑹試嚴加覈究但係先年冐籍嘗經恩赦者許其首正其他籍貫不明妄報中卷北卷者本部指名叅退仍行兩京各省凡遇鄉試開科提學考選生儒不得將流移附籍之徒一槩濫收以玷科目違者奏請治罪報可飭鄉㑹廷試法嘉靖二十四年禮部議覆給事中胡叔㢘鄭大同奏科塲事宜一關防考試謂兩京主考需次差遣則易於窺伺用鄉土之人則多招物議各省鄉試之弊則又在提調監試與各供事官得相接也宜禁革之一飭鄉試之法謂各省鄉試以權歸外簾故弊端滋多遂使禮聘考校徒寄空名糊名易書竟成虛典此教職權輕之所致也宜照兩京例以京官主考一飭㑹試之法謂監試御史不過防範於外故内簾之弊無從紏察而散卷等官始得以狥私分送故内簾亦宜置監試官一員一飭廷試之法謂廷試閲卷往往以官之崇卑定卷之髙下以故送卷官得以髙下其手宜勅下部臣痛釐夙弊監試御史二員專意防範使人不得以行其私得㫖取用考官并内簾散卷官俱照舊規行不必紛更其餘如擬京省試革弊事宜嘉靖四十二年禮部覆南道御史官所陳兩京鄉試革弊事宜一今後兩京主考不用本省人如資序挨及南人用北北人用南以别嫌疑一同考用京官進士出身者易詩書各二員春秋禮記各一員其餘參用教官以便覺察一謄録用書手對讀用生員以防洗改但此三事專為兩京鄉試而設其各省及㑹試亦當因其説而廣之因更上六事一㑹試及兩京鄉試官預於二十日以前選差以便防範一巡視搜檢務加嚴慎以杜奸弊一各省務精選才望内簾官無令外簾干預去取一申明各處科舉名數照原定解額每舉人一名取應舉生儒二十五名一中式之文務存簡實凡浮靡冗雜詭僻不經悉行黜汰仍參取後塲以來實學一解原卷到部以憑稽查不用公據得㫖各省鄉試但照舊規令監臨公同考官揭書出題提調監試等官不得干預餘皆如議行慎選考官嘉靖元年正月内禮部題為嚴選考官以圖得人事該監察御史向信題稱各處鄉試考官聘取之時巡按多執己見或因親朋不論老耄荒疎輙行聘取以致取人不真乞要慎重選取等因本部覆奉欽依通行各省巡按御史今後聘取考官及考官取士悉照本部節年題准舊例施行申飭科塲六弊隆慶元年禮科給事中何起鳴奏申飭科塲事宜一曰重懷挾之罪二曰革傳遞之奸三曰慎同考之選四曰正諂諛之風五曰預監臨之差六曰嚴誆騙之罰疏下禮部覆奏得㫖懷挾傳遞諸弊依擬枷號重處今後科塲搜檢不嚴關防不密責在外簾舉動不慎校閲不公責在内簾禮部都察院分别叅奏餘悉如議行隆慶二年正月河南道御史王好問條陳科塲四弊一號舍二懷挾三代替四透漏俱宜嚴法關防禮部覆奏上曰奸弊不祛何以得真才監試御史其盡心嚴察不得寛縱禮部志稿卷七十一
