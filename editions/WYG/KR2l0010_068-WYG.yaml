body:
  text: 禮部志稿卷六十八明俞汝楫編視學備考視學釋奠成化視學成化元年二月上視國子監是日上具皮弁服躬詣先師孔子行四拜禮命少保吏部尚書兼華盖殿大學士李賢太子少保户部尚書馬昂兵部尚書王竑工部尚書白圭吏部左侍郎兼翰林院學士陳文吏部右侍郎兼翰林院學士彭時户部左侍郎楊鼎兵部右侍郎王復分獻四配十哲兩廡翰林院官俱陪祀禮畢幸彛倫堂祭酒司馬恂司業張業講書畢駕還宫戊午上御奉天門賜祭酒司業監丞學官及孔顔孟三氏子孫襲衣諸生寳鈔己未詔宴孔顔孟三氏子孫衍聖公孔𢎞緒等於禮部故事視學祭酒以下皆宴於奉天門至是免宴以𢎞緒等逺來特宴之𢎞治視學𢎞治元年三月上視學行釋奠禮御彛倫堂授經於祭酒司業賜之坐講明日祭酒費誾率學官監生上表謝恩上御奉天殿受之賜祭酒司業并三氏子孫及學官監生襲衣寳鈔等物有差又明日祭酒復率學官監生謝恩增視學釋奠儀𢎞治元年太子太保吏部尚書王恕言臣竊觀皇上視學釋奠儀注分獻官始終不拜恐非禮也臣愚以為分獻拜位當在殿陛之下列於陪祭官之前上在殿陛上拜分獻官陪祭官俱在殿陛下拜上獻爵畢分獻官以次詣神位前奠爵訖復退於殿陛下原拜位立定賛送神上拜分獻官陪祭官俱拜似為近禮臣讀禮記文王世子篇有曰凡始立學者必釋奠於先聖先師及行事必以幣今皇上嗣登大寳初幸太學即所謂始立學也臣以為釋奠當用幣爵亦當三獻今儀注無獻幣是行春官釋奠之禮非始立學釋奠之禮也似為未安或以為舊儀如此臣以為舊儀是當從之或有差誤亦當更之以求乎冝不可以訛承訛也禮部覆奏自永樂以來列聖視學祭先師孔子儀注爵止一獻無奠帛之禮每年春秋二丁朝廷遣官釋奠有奠帛三獻爵之儀今恕所奏雖與永樂以來儀注不同然與見行丁祭禮儀無異合增入奠帛三獻爵其分獻官各就殿陛下與陪祭官俱拜則禮儀全備上曰分獻官拜禮准行餘惟循舊制三月太子太保吏部尚書王恕言近陳愚見請皇上視太學釋奠先師孔子當奠幣用樂爵當三獻分獻官當陪拜伏奉聖㫖分獻官拜禮准行其餘仍舊臣竊又以為我朝列聖即位之後所行之禮有一行而不再舉者惟耕耤田及幸太學二事然耕耤有奠幣三獻齋戒省牲之禮何獨於幸學釋奠而乃不然乎昔太宗文皇帝將幸太學命禮部詳議禮儀尚書鄭賜言宋制謁孔子服鞾袍再拜太宗曰見先師禮不可簡必服皮弁行四拜禮其事載諸五倫書人以為太宗尊儒重道之意超越前古今陛下釋奠先師而禮比先農則載諸史冊傳之萬世豈不為盛事哉命復下禮部㑹議於是禮部及詹事府國子監翰林院春坊等官言禮記曰凡學春官釋奠於其先師註云釋奠者但奠置所祭之物而已無食飲酬酢等事以其主於行禮非報功也又云凡始立學者必釋奠於先聖先師及行事必以幣註云諸侯初受封立學行釋奠之事必奠幣為禮也又云凡釋奠者必有合也有國故則否註云凡行釋奠之禮必有合樂之事若國有㐫喪則否又云太學始敎皮弁祭菜示敬道也註云學者入學之初有司衣皮弁之服祭先師以蘋藻之菜示以尊敬道藝也盖古者見師之禮以菜為質故始入學者必釋菜以禮其先師而學官四時之祭乃皆釋奠釋奠釋菜皆祭之略者也故以行禮而行釋奠則無幣差厚於釋菜之意即今天子視學所行是也以報功而行釋奠則有幣即今二丁所行是也三代之禮無所於考漢祀孔子未行釋奠唐制天子北面跪祭周廣順二年車駕幸曲阜始拜奠祠前宋大中祥符元年幸曲阜謁文宣王廟始鞾袍再拜至我朝太宗皇帝視學躬行一奠四拜之禮尊師重道蔑以加矣列聖相承率循無改至成化元年始加牲用樂雖極尊崇之禮然既非釋奠之正又非釋奠之全卒至紛紛實繇於此此則所謂有其舉之莫之敢廢者矣今恕言奠帛三獻之禮必須讀祝飲福受胙始為全備原無舊典固難以擅行其欲比依先農之祀又係大明集禮所載洪武舊制亦難以擅改宜但於視學之前致齋一日至期加幣一段樂設而不作餘仍其舊庶㡬其可上曰尊先師當以禮既成化初年有所舉惟孔子前加幣用太牢改分獻為分奠其餘儀物俱從永樂年例行幸學頻行嘉靖十年羽林前衛指揮使劉永昌疏言臣竊觀史傳皆以數幸大學為帝王盛節我國朝幸學之禮僅於登極後一行之其於作興之道或有未盡伏望皇上每遇春秋開講經筵之始先期幸學拜祭先師仍御彛倫堂進講宣諭賞賚如制則人心感奮而敎化大行矣詔下禮部議尚書夏言等覆言臨幸太學尊禮先師實帝王崇儒重道之盛舉我皇上經筵日講未嘗暫輟又於文華東室奉三皇二帝三王及周公孔子神位春秋開講祭告月朔躬行瞻謁近於西苑無逸殿落成命大學士坐講豳風無逸諸篇右文崇道之實誠遠邁前代矣顧臨雍盛事惟於登極一行而近日釐正先師祀典以來未嘗恭謁永昌欲於春秋開講先期幸學則歳且再行車駕太數臣竊擬明年朝覲考察㑹試之後天下大夫士㑹集之時冝一舉行上曰先師祀典既正朕當躬謁如議以明年三月内舉行視學觀禮隆慶元年六月命禮部遣官行取衍聖公孔尚賢及翰林院五經博士顔肇先孟彦璞仍取孔氏老成族人五人顔孟族人二人馳驛來京以聖駕將幸太學也命公侯伯應襲子弟俱赴國子監習禮以禮部言視學在邇欲其迎駕聽講故也朝鮮國王李垣遣陪臣吏曹參判洪春年等齎表文方物馬匹慶賀冊立中宫賜宴賞如例春年等以上將幸太學乞留觀禮許之幸學隆施隆慶元年八月癸未朔上幸太學行釋奠禮於先師命大學士徐階李春芳陳以勤張居正衍聖公孔尚賢吏部尚書楊博兵部尚書郭乾吏部侍郎趙貞吉分奠四配十哲兩廡禮部侍郎潘晟致奠啓聖祠畢上御彛倫堂命武官都督以上文官三品以上及翰林院學士坐賜茶授祭酒司業經坐講上宣諭諸生曰聖人之道如日中天講究服膺用資治理爾師生其勉之甲申上御皇極殿衍聖公孔尚賢率三氏子孫管祭酒事侍郎趙貞吉司業萬浩率學官諸生上表謝恩賜冠服鈔錠有差仍賜三氏子孫及祭酒司業宴於禮部遣官釋奠洪武初定制洪武元年三月丁丑遣官釋奠於先師孔子初禮官奏周制凡始立學者必釋奠於先聖先師凡學春夏釋奠於先師秋冬亦如之漢儒以先聖為周公若孔子以先師為禮樂詩書之官若禮有髙堂生樂有制氏詩有毛氏書有伏生可以為師者盖四時之學將習其道故釋奠各以其師而不及先聖惟春秋合樂則天子視學有司總祭先聖先師是則漢時釋奠亦略可見矣魏正始中使太常釋奠於辟雍晉釋奠皆於國學東晉成穆孝武皆親釋奠隋制國子監每嵗四仲月上丁釋奠先聖先師州縣學則用春秋仲月唐初釋奠儒官自為祭主直書博士姓名敢昭告於先聖許敬宗奏請令國子祭酒為初獻詞稱皇帝謹遣仍令司業為亞獻博士為終獻縣學則令為初獻丞為亞獻主簿及尉通為終獻永為禮制武徳貞觀中皆以二月親幸國子監釋奠開耀景龍中皆皇太子釋奠於太學開元中詔春秋釋奠以三公攝事著之常式若遇大祀則用仲丁州縣用上丁宋元因古禮而損益之今冝定制以仲春仲秋二上丁日降香遣官祀於國學以丞相初獻翰林學士亞獻國子祭酒終獻上然之至是遣官致祭牲用牛羊豕各一幣一白色籩八實以形鹽藁魚棗栗榛菱芡鹿脯豆八實以韭葅醓醢菁葅鹿醢芹葅兔醢笋葅魚醢簠簋各二實以黍稷稻梁豋一實以太􅃵鉶二實以和􅃵犧尊象尊山罍各一實以醴齊盎齊事酒樂用大成豋歌樂四配位牲用羊豕各一幣一白色籩四實以形鹽藁魚棗栗豆四實以芹葅兔醢菁葅鹿醢豋一實以太􅃵簠簋各一實以黍稷其從祀十哲兩廡各籩二實以栗鹿脯豆二實以菁葅鹿臡簠簋各一實以黍稷先期皇帝齋戒獻官及陪祀執事官俱散齋二日致齋一日前祀一日清晨有司立仗百官具公服侍班皇帝服皮弁服御奉天殿降香獻官捧由中道出至午門外置龍亭内儀伏鼓吹導引至廟學是日獻官法服并執事官集齋所省饌省牲告充告腯視鼎鑊滌溉告潔至日丑前五刻執事者各實祭物於器獻官及陪祀執事官各就位監禮監祭官閲陳設糾不如儀者賛禮唱有司謹具請行事唱迎神樂作獻官及在位官皆再拜樂止賛禮唱奠幣獻官詣盥洗位搢笏盥帨出笏詣大成至聖文宣王神位前樂作獻官搢笏上香奠幣出笏再拜以次詣兖國復聖公郕國宗聖公沂國述聖公鄒國亞聖公神位前並如前儀復位樂止贊禮唱進俎樂作獻官至大成至聖文宣王神位前搢笏奠俎出笏以次詣四配神位前如前儀出笏復位樂止贊禮唱行初獻禮獻官詣爵洗位搢笏滌爵拭爵以爵授執事者詣酒尊所搢笏以爵受酒以授執事者出笏樂作獻官詣大成至聖文宣王神位前跪搢笏上香祭酒奠爵出笏樂止讀祝官取祝跪讀訖獻官俯伏興再拜以次詣四配神位前並如前儀亞獻終獻儀並同初獻但不用祝行終獻禮時賛禮唱行分獻禮分獻官詣盥洗位搢笏盥帨出笏詣爵洗位搢笏滌爵拭爵以爵授執事者出笏詣十􅈒兩廡神位前搢笏奠帛上香祭酒奠爵出笏俯伏興平身復位賛禮唱飲福受胙初獻官詣飲福位再拜跪搢笏奉爵者以爵進獻官受爵飲福酒奉胙者以胙進獻官受胙以授執事者出笏俯伏興再拜亞獻官以下皆再拜復位賛禮唱徹豆樂作掌祭官各徹豆樂止贊禮唱送神樂作獻官以下皆再拜樂止讀祝官取祝捧幣者捧幣各詣瘞位獻官詣望瘞位東西各二人以炬燎火俟半燎實土半坎贊禮畢其祝文曰惟王徳侔天地道冠古今刪述六經垂憲萬世兹維仲春秋謹以制幣牲齊粢盛庶品式陳明薦以兖國復聖公郕國宗聖公沂國述聖公鄒國亞聖公配尚饗征儀備考親征遣將詔定軍禮洪武元年閏七月詔定軍禮中書省臣㑹諸儒臣議古者天子親征所以順天應人除殘去暴以安天下自黄帝習用干戈以征不享此其始也周制天子親征則類於上帝冝於大社造於宗廟禡於所征之地及祭所過山川師還則奏凱獻俘於廟社後世又有宣露布之制若遣將出師則授以節鉞亦告於廟社禡祭旗纛而後行宋又有祭告武成王之禮歸則奏凱獻俘然後天子論功行賞於是歴考舊章定為親征遣將諸禮儀奏上詔並從之親征儀見職掌遣將出師儀授節鉞禮儀前期拱衞司設大將軍次於午門外兵部官備節鉞陳於奉天殿内架上内使監設御座於殿中侍儀司設大將軍拜位於丹墀中道稍西又設授節鉞位於御前俱北向設内賛位及授節鉞官位受節鉞執事位於大将軍受節鉞位之北東西相向百官侍立位於文武樓之北東西相向通班賛禮位於大將軍丹墀拜位之北通班在西賛禮在東引大將軍二人位於通班之次其餘侍衞陳設如朝㑹儀是日鼓初嚴侍儀導從官入迎車駕次嚴文武官具朝服入侍立位大將軍朝服入立候於丹墀之西北所部將士鼓吹皆候於午門外鼓三嚴皇帝服武弁服出樂作陞座樂止鳴鞭捲簾報時訖引班引大將軍就丹墀拜位贊禮唱鞠躬拜樂作四拜興樂止引大將軍由西陛陞西門入内贊接引至御前唱鞠躬樂作再拜興樂止唱跪搢笏大將軍跪搢笏授節鉞官取節鉞至御前跪承制興立於大将軍之東北宣制訖先授節次授鉞大将軍以次受訖以授執事者執事者跪受立於西唱出笏俯伏興樂作大将軍出笏俯伏興復再拜樂止自西門出執節鉞者前行至位分立於左右樂作賛禮復唱鞠躬四拜興禮畢樂止皇帝興樂作還宫樂止大将軍出勒所部建旗幟鳴金鼓正行列擎節鉞奏樂前導百官以次送出告祭廟社儀與遣官奏告廟社禮同就命大將以牲幣行一獻禮師還則陳凱樂俘馘於廟社門外而祭告之與出師祭告儀同祭武成王廟儀前期二日有司請大將以下次及省牲位於廟南門外前一日及諸將陪祭官詣廟所致齋執事者於齋所肄儀大將省牲廩犧令牽牲自東過大將軍前省訖詣神厨視鼎鑊滌溉遂烹牲大將還齋所執事者洒掃陳設至日清晨讀祝官於大將幕次僉祝版執事實祭物於器訖大將以下具服入就位賛禮賛拜大將以下皆再拜訖贊引引大將詣盥洗所帨訖詣武成王神位前搢笏上香奠幣出笏再拜興詣配享神位前如前儀復位贊禮唱進俎贊引復引詣武成王神位前搢笏進俎配位前亦如之復位贊禮唱獻官行禮贊引引詣爵洗所贊搢笏受爵滌爵拭爵以授執事者出笏詣酒尊所搢笏受爵酌酒以授執事者引詣神位前贊跪搢笏受爵三祭酒奠爵讀祝官讀祝訖大將興再拜詣配位前如之復位初大將行禮時贊引引分獻官各詣兩廡神位前分獻如正獻禮贊飲福受胙引大將詣武成王神位前跪搢笏飲福酒受胙出笏興再拜復位徹豆贊賜胙正獻官免拜分獻以下皆再拜贊禮唱望燎執事者以祝幣詣燎所大将望燎燎半賛禮畢以次出禡祭軍牙六纛儀與祭武成王同但奠幣行三獻禮大将初獻次将亞獻終獻不進熟奏凱儀先期大都督以露布聞大将未至前一日所司設大将次於午門外内使監官陳御座於午門樓上前楹當中南面侍儀司設大將拜位於樓前北向諸将位於大将之後文武百官位於諸将之南文東武西奏凱樂位於大将位前協律郎位於奏樂位之北司樂位於協律郎之南俱北向贊禮位於樓前大将拜位之北文武官侍立位於兩傍諸将侍立位於文武班之北俱東西相向大将侍立位於諸将之北東向引班舎人位各於所引官之北東西相向又設獻俘位於樓前少南獻俘将校位於獻俘位北刑部尚書奏位於将校之北皆北向又設刑部尚書受俘位於獻俘西東向設露布案於内道正中南向受露布位於案東西向承制位於案東北西向宣露布位於文武班之南北向至日侵晨大將以下入就侍立位皇帝常服乘輿出升樓即御座侍衞如常儀大將以下就拜位贊拜大將以下皆四拜退就侍立位贊奏凱樂恊律郎執麾引樂工就位司樂俛伏跪請奏凱樂恊律郎舉麾鼔吹振作徧奏樂曲其曲隨事撰述樂止司樂跪唱謹奏樂畢恊律以下以次退凱樂初奏將校引俘侍立於兵仗之外樂畢贊宣露布承制官承㫖以露布付受露布官詣露布案跪受由中道南行以授宣露布官宣訖將校引俘至位刑部尚書跪奏曰某官某以某處所俘獻請付所司奏訖退就受俘位俟㫖其就刑者立於西廂東向以付刑官其宥罪者樓上承制官宣㫖曰有勅釋縳樓下承傳宣㫖釋訖贊禮贊所釋之俘謝恩皆四拜呼萬嵗者三將校以所釋俘退如有所賜就宣㫖賜之大將以下就拜位皆四拜搢笏舞蹈山呼萬歲者三出笏復四拜乃出文武官就位四拜搢笏舞蹈山呼如常儀復四拜班首稍前跪稱賀致詞訖俯伏興復位及衆官復四拜禮畢乘輿降樓還宫百官以次出外論功行賞儀前期内使監陳御座香案於奉天殿如常儀尚寳司設寳案於殿中侍儀司設詔書案於寳案之前誥命案於丹陛正中之北設皇太子諸王侍立位於殿上之東北設承制位於殿上之東宣制位於丹陛誥命案之北吏部户部禮部尚書位於殿上之東南設大都督府兵部尚書位於殿上之西南應受賞官拜位於丹墀中序立位於丹墀西南受賞位於誥命案之南受賞執事位於受賞官序立位之西每官用捧誥命捧禮物各一人俱北向餘陳設如期㑹議是日鼓三嚴執事官各就位皇帝服衮冕御輿以出樂作陞座樂止捲簾鳴鞭報時訖皇太子諸王具衮冕自殿東門入樂作至殿内侍立位樂止受賞官入就拜位樂作四拜樂止承制官跪承制由殿中門出吏部户部禮部尚書由殿西門出立於誥命案東承制官至丹陛中南向稱有制受賞官皆跪宣制曰朕嘉某等為國建功宜加爵賞今授以某職賜以某物其恭承朕命宣畢受賞官俯伏興樂作再拜樂止行賞受賞官第一人詣案前跪搢笏吏部尚書捧誥命户部禮部尚書捧禮物各授受賞官以授左右出笏俯伏興復位餘官以次受賞訖承制官吏部尚書等俱至御前復命退復位樂作受賞官皆再拜樂止搢笏鞠躬三舞蹈呼萬嵗者三出笏俯伏興樂作復四拜樂止樂畢皇帝興樂作至謹身殿樂止皇太子諸王還宫受賞官及文武官以次出至午門外以誥命禮物置於龍亭用儀仗鼓樂各送還本第明日進表稱謝如常儀獻俘征倭獻俘嘉靖三十五年十二月該提督軍務工部尚書趙文華奏稱擒獲賊首陳東等三名倭首辛五郎等四名及首賊徐海首級函解到京乞要獻俘奉聖㫖禮兵二部查議來說欽此該本部㑹同兵部㸔得陳東等本以華民背逆天道勾引倭奴辛五郎等侵擾内地流毒三省惡逆深重罪不容誅兹當奏凱之辰宜舉獻俘之典臣等謹查的大明㑹典獻俘事冝開具奏請其倭賊陳東等七名一面押送法司訊罪一面行欽天監擇吉獻俘其徐海首級法司驗收候陳東等取决之日一併通行傳首梟示浙江閩廣沿海地方永為倭逆入犯之戒等因奉聖㫖這備制所擬都依行欽此前期禮部告示文武百官具朝服詣午門前行慶賀禮先一日内官監設御座於午門樓前楹正中是日早錦衣衞設儀仗於午門前御道之東西敎坊司陳大樂於御道南西北向鴻臚寺設贊禮二人於午門前東西相向設文武官侍立位於樓前御道南文東武西相向及刑部獻俘官位於午門前御道東稍南西向設獻俘將校位於午門前御道西稍南北向引禮引文武官東西序立獻俘将校引俘列於午門前西邊文武班之後候文武班齊獻俘将校引俘至獻俘位北向立定俘跪於前刑部官於樓前中道跪具本奉聞候㫖處决其合受刑陳東等七名刑部官同將校押出仍赴法司監候文武百官行五拜三叩頭禮以次退受降受降禮洪武四年秋七月乙丑指揮萬徳送明昇並降表至京師初上聞大軍下蜀命中書集六部太常翰林院定議受降等禮省部請如宋太祖乾徳三年受蜀主孟㫤降禮上御奉天門昇等於午門外跪進待罪表侍儀使捧表入宣表官宣讀訖承制官出傳制官出傳制昇等皆俯伏於地侍儀舎人掖昇起其屬官皆起跪聽宣制釋罪昇等五拜三呼萬嵗承制官傳制賜衣服冠帶侍儀舎人引昇丹墀中四拜侍儀使傳㫖昇跪聽宣諭俯伏四拜三呼萬嵗又四拜出丞相率文武百官行賀禮上曰明昇與孟㫤不同㫤專治國政所為奢縱昇年幼事由臣下冝免其叩頭伏地上表請罪之禮是日昇及其官屬朝見百官稱賀制授昇為歸義侯賜冠帶衣服及居第於京師禮部志稿卷六十八
