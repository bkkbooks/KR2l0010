贊唱瘞毛血迎神樂作樂止司贊奏四拜公主以下同内贊唱奠帛行初獻禮樂作執事官捧帛爵跪于神位前各奠訖樂暫止内贊唱讀祝司贊奏跪皇后跪公主以下同讀祝女官跪于神位前右讀訖樂作司贊奏興皇后興公主以下同樂止内贊唱行亞獻禮樂作執事官捧爵跪奠于神位前訖樂止内贊唱行終獻禮儀同亞獻執事女官進立于壇東西向唱賜福胙司贊奏跪皇后跪執事女官以福酒跪進于皇后右奏飲福酒皇后飲訖執事女官以胙跪進于皇后右奏受胙皇后受訖司贊奏興皇后興司贊奏二拜公主以下同内贊唱徹饌樂作執事女官詣神位前徹饌訖樂止内贊唱送神樂作司贊奏四拜公主以下同樂止内贊唱讀祝官捧祝執事官捧帛饌各詣瘞位樂作樂止司贊唱禮畢皇后還具服殿更常衣行親蠶禮一祝文維某年某月某日皇后致祭于先蠶氏之神曰惟神肇興蠶織衣我烝民萬民永賴時維季春躬行採桑禮仰冀黙垂庇佑相兹蠶事率土大同惟神之休敬以牲帛醴齊之儀用申祭告尚享如遇令官則去躬行採桑禮一句更云用修常典又改用申為謹用一樂章迎神貞和之曲於穆惟神肇啓蠶桑衣我萬民保我家邦兹舉曠儀春日載陽恭迎霞馭靈氣洋洋奠帛壽和之曲初獻同神其臨只有苾有芬乃獻玉齍乃奠文纁仰祈昭鑒淑氣氤氲顧兹蠶婦祁祁如雲亞獻順和之曲載舉清觴蠶祀孔明以格以饗鼓瑟吹笙隂教用彰坤儀允貞神之聽之鑒此禋誠終獻寧和之曲神之格思桑土是宜三繅七就惟此繭絲獻禮有終神不我遺錫我純服藻繪皇儀徹饌安和之曲俎豆具徹式禮莫愆既匡既勅我祀孔䖍我思古人葛覃惟賢明靈歆只永顧桑阡送神恒和之曲望瘞同神之升矣日霽霞蒸相此女紅抒軸其興兹返𤣥宫鸞鳯翔騰瞻望弗及永錫嘉徴凡太常寺執事人役先一日入壇具祝版祭品香帛本日晩送交蠶宫令轉送執事女官其厨役等項不許以鋪排名色擅入壇内祭畢蠶宫令祭品交還太常寺凡樂女生奏樂止用歌不用舞凡陪祀文官四品以上武官三品以上命婦各造給陪祀牌一面牌式較陪祀官減三之一先醫嘉靖十五年建聖濟殿于文華殿後以祀先醫歲用羊一豕一鉶二簠簋各二籩豆各八帛一遣太醫院正官行禮二十一年又建景惠殿于太醫院上祀三皇配以勾芒祝融風后力牧而附歴代醫師於兩廡凡二十八人歲遣禮部堂上官一員行禮太醫院堂上官二員分獻二殿之祭並以春冬仲月上甲日一陳設殿中正壇犢一羊一豕一豋一鉶二籩豆各十簠簋各二爵三酒尊一帛一篚一祝案一東配位一壇羊一豕一鉶一籩豆各十簠簋各一爵六帛一篚一西配位一壇陳設同東廡醫師十四位僦大季天師岐伯伯高鬼㬰區俞跗少俞少師桐君太乙雷公馬師皇伊尹神應王扁鵲倉公淳于意張機陳設分為三壇每壇豕一籩豆各六簠簋各一酒盞五爵三帛一篚一西廡醫師十四位華陀王叔和皇甫謐抱朴子葛洪巢元方真人孫思邈藥王韋慈藏啓𤣥子王冰錢乙朱肱李杲劉元素張元素朱彦修陳設同一正祭贊引對引導遣官至咸濟門贊詣盥洗所贊搢笏洗訖贊出笏典儀唱執事官各司其事贊引贊就位典儀唱迎神贊四拜贊引贊陞壇導遣官至中香案前贊跪贊搢笏贊上香贊引引至東香案前贊跪上香訖引至西香案前贊跪上香訖贊出笏贊復位太醫院堂上官于兩配位香案前上香訖典儀唱奠帛行初獻禮贊引贊陞壇引至神位前贊搢笏贊獻帛贊三獻爵獻訖贊出笏贊詣讀祝位贊跪贊讀祝讀訖贊俯伏興平身贊復位兩配位執事自獻兩廡儀同正殿典儀唱亞獻禮終獻禮儀亦同初獻惟不獻帛不讀祝典儀唱徹饌執事徹訖典儀唱送神贊引贊四拜典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位贊引贊禮畢一祝文維某年某月某日皇帝遣官某致祭于太昊伏羲氏炎帝神農氏黄帝軒轅氏曰仰惟聖神繼天立極開物成務壽世福民尤重于醫所以贊帝生徳立法配品惠我天民功其博矣時維仲春冬特修常祀尚冀黙施㝠化大著神功深資妙劑保和朕躬期于一世之生民咸蠲疾疚躋于仁壽之域以永上帝之恩不亦丕顯歟以勾芒氏之神祝融氏之神風后力牧氏之神配尚享禮部志稿卷二十九
