body:
  text: 禮部志稿卷二十九明俞汝楫編祠祭司職掌羣祀歴代帝王洪武元年命以太牢祭三皇二年遣官致祭以勾芒祝融風后力牧配六年始建帝王廟于京師以祀三皇五帝三王及漢唐宋創業之君每歲春秋致祭後以周文王終服事殷唐高祖本太宗力勿設主止各祀于其陵廟而増隋文帝七年春塑帝王衮冕坐像惟羲農不衮冕是秋上親臨祭焉廟同堂異室中一室祀三皇東一室五帝西一室三王又東一室漢髙祖光武隋文帝又西一室唐太宗宋太祖元世祖凡五室十七帝二十一年始定歴代名臣終始全節者三十七人從祀兩廡列為四壇宋趙普以負太祖不忠不得預元祀穆呼哩罷安圖祀巴延罷阿珠而太公望以從祀罷其故廟及武成王號是年帝王廟火改建于雞鳴山之陽罷隋文帝而遷唐太宗與漢髙光同室凡十六帝又定以每歲春附祭歴代帝王于郊壇秋祭于本廟每三年傳制遣道士齎香帛令有司祭于各陵寢凡祭于陵寢之歲則停廟祭嘉靖九年釐正祀典罷郊壇帝王附祭十年春為位于文華殿祭之十一年春仍祭于文華殿夏始建廟于都城之西亦為五室位次如舊是秋上親臨祭嗣後歲以春秋仲月太常寺先期奏請遣大臣一員行禮四員分獻凡祭于陵寢之歲則停秋祭二十四年罷元世祖及其臣五人復遷唐太宗與宋太祖同室凡十五帝從祀名臣三十二人洪武二十六年定遣祭儀一齋戒前一日太常官宿于本寺次日具本奏致齋二日傳制遣官行禮一傳制儀見儀制司一省牲牛五羊五豕六鹿一兔八凡正祭前一日獻官承制畢詣本壇省牲一陳設五室十六位今十五位每室犢一羊一豕一每位豋一鉶二籩豆各十簠簋各二帛一白色禮神制帛共設酒尊三爵四十八今四十五篚一于中室東南西向祝文案一于西東廡第一壇風后皋陶龍伯益傳説召公奭召穆公虎張良曹參羊一豕一鉶九籩豆各四簠簋各一帛九白色禮神制帛酒盞二十七饌盤一篚一第二壇周勃馮異房𤣥齡李靖李晟潘美岳飛穆呼哩博勒呼巴延今黜穆呼哩等三人羊一豕一鉶十今七籩豆各四簠簋各一帛十今七酒盞三十今二十一饌盤一篚一西廡第一壇力牧䕫伯夷伊尹周公旦太公望方叔蕭何陳平陳設與東廡第一壇同第二壇鄧禹諸葛亮杜如晦郭子儀曹彬韓世忠張浚博爾濟齊拉衮今黜博尔濟等二人陳設與東廡第二壇同一正祭典儀唱樂舞生就位執事官各司其事贊引引獻官至盥洗所贊搢笏出笏引至拜位贊就位典儀唱迎神恊律郎舉麾奏樂樂止贊四拜陪祭官同典儀唱奠帛行初獻禮奏樂執事官各捧帛爵進于神位前贊引贊詣三皇神位前搢笏執事官以帛進于獻官奠訖執事官以爵進于獻官贊獻爵凡三出笏詣五帝神位前儀同前爵五詣三皇神位前爵三詣漢髙祖光武唐太宗皇帝神位前爵三今遷唐太宗于西室爵用二改稱詣漢髙祖光武皇帝神位前詣宋太祖元世祖神位前爵二令黜元世祖而遷唐大宗爵仍二改稱詣唐太宗宋太祖皇帝神位前出笏詣讀祝所跪讀祝讀祝官取祝跪于獻官左讀畢進于神位前贊俯㐲興平身復位樂止典儀唱行亞獻禮奏樂執事官各以爵獻于神位前樂止典儀唱行終獻禮儀同亞獻典儀唱飲福受胙贊詣飲福位跪搢笏執事官以爵進飲福酒執事官以胙進受胙出笏俯伏興平身復位贊兩拜典儀唱徹饌奏樂執事官各于神位前徹饌樂止典儀唱送神奏樂贊四拜平身樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位樂止贊禮畢一祝文維洪武某年歲次某月某朔某日皇帝謹遣具官某致祭于太昊伏羲氏炎帝神農氏黄帝軒轅氏帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏夏禹王商湯王周武王漢髙祖皇帝漢光武皇帝唐太宗皇帝宋太祖皇帝元世祖皇帝曰昔者奉天明命相繼為君代天理物撫育黔黎彛倫攸敘井井繩繩至今承之生民多福思不忘而報特祀以春秋惟帝兮英靈來歆來格尚饗一樂章迎神仰瞻兮聖容想鸞輿兮景從降雲衢兮後先來俯鑒兮微衷荷聖臨兮蒼生有崇睠諸帝兮是臨予頓首兮幸䝉奠帛秉微誠兮動聖躬來列坐兮殿庭予今願兮效勤捧禮帛兮列酒尊鑒予情兮欣幸方旋駕兮雲程初獻酒行兮爵盈喜氣兮雍雍重荷䝉兮再瞻再崇羣臣忻兮躍從願覩穆穆兮聖容亞獻酒斟兮禮明諸帝熈和兮悦情百職奔走兮滿庭陳籩豆兮數重亞獻兮願成終獻獻酒兮至終早整雲鸞兮將還宫予心眷戀兮神聖欲攀留兮無踪躡雲衢兮緩行得遙瞻兮達九重徹饌納餚饈兮領陳烝民樂兮幸生將何以兮崇報維歲時兮載瞻載寧送神旛幢繚繞兮導來蹤鸞輿冉冉兮歸天宫五雲擁兮祥風從民歌聖祐兮樂年豐望燎神機不測兮造化工珍饈禮帛兮薦火中望瘞庭兮稽首願神鑒兮寸衷嘉靖十一年定親祭儀先期太常寺預設牲醴香帛樂舞等如儀錦衣衛設隨朝駕設上拜位于殿中設御幄于景徳門外之左是日早免朝上服常服御奉天門太常寺卿跪奏請皇上詣帝王廟祭歴代帝王上乘輿由長安右門出至廟門由中門入至幄次降輿具祭服出導引官導上由中門中導至拜位典儀唱樂舞生就位執事官各司其事内贊奏就位上就拜位典儀唱迎神樂作樂止内贊奏搢圭奏上香上三上香訖奏出圭復位内贊奏兩拜興平身傳贊陪祀官同典儀唱奠帛行初獻禮樂作内贊奏詣神位前執事官各捧帛爵跪進于各神位前樂暫止内贊贊讀祝奏跪傳贊陪祀官同讀祝官取祝讀訖樂作内贊奏俯伏興平身傳贊陪祀官同樂止典儀唱行亞獻禮樂作儀同初獻惟不讀祝樂止典儀唱行終獻禮儀同亞獻樂止太常寺卿進立于壇東西向唱答福胙内贊奏詣飲福位奏搢圭奏跪光禄寺卿以福酒跪進于上右内贊奏飲福酒上飲訖光禄寺卿以福胙跪進于上右内贊奏受胙上受訖奏出圭俯伏興平身奏復位内贊奏兩拜興平身傳贊陪祭官同典儀唱徹饌樂作執事官于各神位前徹饌訖樂止典儀唱送神樂作内贊奏兩拜興平身傳贊陪祭官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎位樂作内贊奏禮畢樂止導引官導上入御幄易祭服陞輦還宫樂章仍舊嘉靖中更定遣官祝文儀仍舊祝文某年月日遣官各帝稱號俱同但去元世祖曰仰惟諸帝昔皆奉天撫世創治安民皇祖景慕不忘春秋致祭著在令甲兹朕特建殿宇恭修恒祀時仲春秋謹遣輔臣以牲帛庶品用享列聖予惟沖昧敬體皇祖追報之䖍惟諸帝鑒臨來格于斯庶副予誠之至尚饗分獻官儀注典儀唱分獻官陪祭官各就位候行初獻奠帛禮畢唱分獻官行禮贊引引詣東西廡神位前贊跪贊搢笏上香獻帛爵出笏殿内贊跪分獻官跪各神位前俟讀祝畢俯伏興平身復位亞終獻禮儀同初獻餘隨遣官行先聖先師嘉靖九年初祀伏羲神農黄帝堯舜禹湯文武周公孔子凡十一位于文華殿東間位各有主主各有龕㐲羲至武王南向周公西向孔子東向歲以仲春秋開講前一日上親致祭每月朔朢具酒果上服黄袍行禮間遣輔臣及大臣代拜十六年移祀于永明後殿行禮如初其後常遣官代行隆慶初罷仍于文華殿東室行禮一前期一日太常寺博士捧祝版于文華殿上塡御名訖捧出一正祭日早太常寺進籩豆祝帛陳設畢候上至行禮一陳設皇師㐲羲氏聖位皇師神農氏聖位皇師軒轅氏聖位帝師陶唐氏聖位帝師有虞氏聖位王師夏禹王聖位王師商湯王聖位王師周文王聖位王師周武王聖位每位鉶一籩豆各二禮神制帛一白色先聖周公之位先師孔子之位每位鉶一籩豆二帛一一正祭是日上具皮弁服由文華殿出内贊對引官導上至拜位奏就位上就御拜位内贊導上至伏羲氏前奏搢圭奏上香訖詣各神位前俱奏上香訖奏出圭奏復位上復位奏再拜訖讀祝官啓祝跪内贊奏跪上跪贊讀祝訖奏俯伏興平身讀祝官安祝退奏再拜訖贊焚祝帛上退拜位之東立捧祝帛官出門奏禮畢内贊對引導上出還宫一祝文維某年歲次某月某日皇帝某謹告于先聖諸師暨周公孔子曰予維後學之資必賴先聖遺集以為進修兹于明日春秋開講學伏惟黙運神機覺我後學俾誠正之功不替庶治平之至可臻而聖道永有霑民之惠矣特用奠告惟聖師鑒焉謹告先師孔子釋菜啓聖祠附國初詔正諸神封號惟孔子封爵特仍其舊每歲二丁傳制遣官祭于國學每月朔朢遣内臣降香朔日則祭酒行釋菜禮洪武四年令進士釋褐詣國學行釋菜禮十五年始詔天下儒學通祀孔子頒釋奠儀二十六年頒大成樂器于天下府學令州縣如式製造二十九年黜揚雄從祀進漢董仲舒後遇登極皆遣官祭告闕里又駕幸太學行釋菜禮永樂八年正文朝聖賢繪塑衣冠令合古制十九年北京國子監既定其南監春秋命祭酒行禮稱皇帝謹遣正統元年刋定從祀名爵位次頒行天下二年以宋胡安國蔡沈真徳秀從祀三年禁祀孔子釋老宫八年追封元吳澄為臨川郡公從祀成化二年封董仲舒為廣川伯胡安國建寧伯蔡沈崇安伯真徳秀浦城伯𢎞治九年封宋楊時為將樂伯從祀嘉靖九年釐正祀典始為木主題曰至聖先師孔子神位改大成殿為先師廟殿門為廟門四配稱復聖顔子宗聖曽子述聖子思亞聖孟子之位十哲以下及門弟子皆稱先賢某子之位左丘明以下稱先儒某子之位申黨即申棖祀止存棖公伯寮秦冉顔何荀況戴聖劉向賈逵馬融何休王肅王弼杜預吳澄十三人俱罷祀林放蘧伯玉鄭衆盧植鄭𤣥服䖍范寗七人各祀于其鄉后蒼王通歐陽修胡瑗陸九淵増入從祀凡籩豆樂舞之數皆更定焉其内臣降香亦罷隆慶五年以本朝薛瑄從祀萬厯十二年以本朝王守仁陳獻章胡居仁從祀洪武二十六年釋奠儀一齋戒與祀帝王同一傳制儀見儀制司一省牲牛一今二山羊五今北羊豕九今十四鹿一􅊵五今一一陳設正壇犢一羊一豕一豋一鉶二籩豆各十簠簋各二帛一白色禮神制帛共設酒尊三爵三篚一于壇東南西向祝文案一于壇西四配位每位羊一豕一豋一今去鉶二籩豆各十今八簠簋各一今二爵三帛一篚一十哲位東五壇豕一分五帛一篚一爵三每位鉶一籩豆各四簠簋各一酒盞一西五壇陳設同東廡五十三位共十三壇今四十七位分十六壇共豕一今三帛一篚一爵一每壇籩豆各四簠簋各一酒盞四西廡五十二位共十三壇今四十八位分十六壇陳設同一正祭典儀唱樂舞生就位執事官各司其事分獻官陪祭官各就位贊引引獻官至盥洗所贊詣盥洗位搢笏出笏引至拜位贊就位典儀唱迎神奏樂樂止贊四拜通贊陪祀官同典儀唱行初獻禮奏樂執事官捧帛爵詣各神位前贊引導遣官贊詣大成至聖文宣王今稱至聖先師孔子神位前贊搢笏贊獻帛執事以帛進奠訖執事以爵進贊引贊獻爵出笏贊詣讀祝位樂暫止跪傳贊衆官皆跪贊讀祝讀祝官取祝跪于獻官左讀訖贊俯伏興平身贊詣兖國復聖公今稱復聖顔子神位前搢笏獻爵出笏詣郕國宗聖公今稱宗聖曽子神位前沂國述聖公今稱述聖子思子神位前鄒國亞聖公今稱亞聖孟子神位前儀並同前贊復位樂止典儀唱行亞獻禮奏樂執事以爵獻于神位前樂止典儀唱行終獻禮奏樂儀同亞獻樂止典儀唱飲福受胙贊詣飲福位跪搢笏執事以爵進贊飲福酒執事以胙進贊受胙出笏俯㐲興平身復位贊兩拜傳贊陪祀官同典儀唱徹饌奏樂執事各詣神位前徹饌樂止典樂唱送神奏樂贊引贊四拜傳贊陪祀官同典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位典儀唱望瘞奏樂贊引贊詣望燎位樂止贊禮畢一祝文維洪武某年歲次某月某朔某日皇帝遣具官某