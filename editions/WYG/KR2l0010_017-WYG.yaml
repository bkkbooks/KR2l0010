body:
  text: 禮部志稿卷十七明俞汝楫編儀制司職掌蕃國禮國初諸蕃來朝必見皇太子及親王皇帝親御殿待宴後止朝見上賜宴㑹同館命禮部待之其蕃使進表亦不宣讀蕃王來朝儀蕃國遣使進表朝貢儀附洪武二年定凡蕃王來朝至龍江驛驛官具報應天府報中書省及禮部以聞遣侍儀通贊舍人二員接伴遣應天府知府至驛禮待前期館人于正㕔陳設蕃王座於㕔之西北東向知府座於􅈦之東南西向知府進館以賔主接見具酒食宴待畢知府還蕃王送出門外次日清晨從官復伴送蕃王入㑹同館禮部尚書奉㫖即館中宴勞尚書至蕃王服其國服出迎相見宴享如龍江驛酒行作樂宴畢尚書及從官皆出蕃王與其從官送至館門外明日中書省奏知命官一員詣館如前宴勞禮部告示侍儀司以蕃王及其從官具服于天界寺習儀三日擇日朝見前一日内使監陳設御座香案於奉天殿尚司設寳案于御座前侍儀司設蕃王與其從官次于午門外蕃王拜位于丹墀中道稍西及御座之南其從官拜位于蕃王丹墀拜位之後俱北向設方物案于丹墀之北中道東西方物狀案于御前及丹墀中受方物官位于方物案之東西知班二人位于蕃王拜位之北引蕃王舍人二人位于蕃王之北引蕃王從官舍人二人位于蕃王從官之北俱東西相向餘如朝㑹儀是日鼓初嚴禮部陳方物于午門外舉案者就案次嚴執事官俱入就位接伴舍人引班舍人引蕃王及其從官立候于午門外三嚴文武官具朝服入就侍立位執事者舉方物案蕃王等從其後繇西門入奉天西門至殿前丹墀西候立侍從奉迎皇帝具禮服御輿以出大樂鼓吹振作陞座樂止捲簾鳴鞭報時訖蕃王及其從官各就拜位執事者以方物案置蕃王拜位前贊拜樂作蕃王及其從官皆四拜樂止引班導蕃王陞殿宣方物官取方物狀從行俱繇西陞樂作從殿西門入内贊接引蕃王至御前樂止贊拜蕃王再拜跪稱兹遇某節欽詣皇帝陛下稱賀致詞訖宣方物官跪于御前西宣狀承制官跪承制詣蕃王前立宣制訖贊拜蕃王俯伏興再拜蕃王及宣方物狀官俱繇西門出樂作復位樂止贊拜樂作蕃王及其從官皆四拜樂止禮畢鳴鞭皇帝興樂作至謹身殿樂止引班導蕃王及其從官俱出見皇太子前一日禮部官以蕃王所獻東宫方物啓知内使監設皇太子位于東宫正殿蕃王及其從官次於東宫門外又設蕃王拜位于殿門外及殿中其從官拜位于殿下中道之東西俱北向引班二人于蕃王拜位之北引從官二人于從官拜位之北皆東西相向餘陳設如朝㑹儀質明蕃王朝見皇帝訖常服至東宫門外文武官公服入從侍皇太子皮弁服出樂作陞座樂止引班引蕃王入樂作至位樂止其從官俟立於殿下東西相向贊拜樂作蕃王再拜皇太子立受樂止引班引蕃王至殿西門内贊接引至殿中跪稱兹遇某節詣皇太子殿下稱賀致詞訖俯伏興蕃王復位贊拜樂作再拜皇太子荅拜樂止蕃王出皇太子坐引班引蕃王從官就拜位贊拜樂作從官皆四拜樂止禮畢皇太子興樂作出殿門樂止及蕃王其從官以次出接伴舍人引見親王前期王府官設王座於正殿東稍北西向蕃王座於殿西稍南東向蕃王拜位于座之南王荅拜位于座之北蕃王從官拜位于殿門外北向内贊二人位于殿上之東西承傳二人位于殿門外之東西接伴舍人位于内贊之南東西相向引從官二人位于拜位之北王府官侍立位于殿上左右俱東西相向是日所司陳儀仗于殿之東西蕃王至王府門外執事者先入就位王皮弁服出陞座蕃王至殿下繇西階升王降座出迎于殿門外既見王府官引王繇中門入舍人引蕃王繇西門入各就拜位贊拜蕃王再拜王答拜就座蕃王亦就座引班引蕃王從官就拜位皆四拜禮畢蕃王詣王座前王降座蕃王舉手揖畢王還府蕃王出王府官送至門外擇日賜宴于謹身殿拱衛司設黄麾仗于殿廷左右内使擎執如奉天殿受朝賀儀内使監陳設御座于殿中皇太子座于御座東偏稍南諸王座皆以次而南俱西向又設諸王座于西偏與東偏諸王座相對俱東向蕃王座于殿中之西第一行東向次設文武一品陪宴座第二行二品三品三行俱東西相向蕃王從官文武三品陪宴官俱以序座于西廡東向北上和聲郎陳大樂細樂舞隊于殿之南楹光禄寺設御尊于殿中之南皇太子諸王蕃王至二品官酒尊于殿門左右之東西御位司壺二人尚酒尚食二人東偏皇太子諸王司壺二人奉酒食二人西偏諸王如之蕃王司壺一人奉酒食一人文武官第一行及左右第二行各司壺四人兼供酒食光禄寺直長于兩廡各置酒尊及司壺供酒食之人光禄寺卿陳御食案及皇太子諸王食案寺丞設蕃王食案于殿中直長設殿上左右文武官及兩廡食案各于其座前諸執事者各供事舍人引文武官常服侍立于殿門之左右又引蕃王服其國服侍立於百官之北引進皇太子諸王常服侍立殿内之左右侍儀導引皇帝常服陞御座大樂鼓吹振作鳴鞭樂止皇太子諸王各就座禮部官取㫖導蕃王入就座光禄寺卿舉御食案進于御前禮部侍郎光禄寺少卿舉食案置于御前皇太子諸王之前禮部郎中光禄寺丞舉食案置于蕃王前文武官及蕃王從官各以次就座内使監令于御前斟酒司壺皇太子諸王以下各斟酒細樂作奏太清之曲和聲郎北面立舉手唱上酒皇帝舉爵飲皇太子以下皆飲畢樂止酒再行細樂作奏感皇恩之曲飲畢樂止内使監令于御前進食供事者自皇太子以下各供食大樂作和聲郎唱上食皇帝進食皇太子以下皆食畢樂止酒三行細樂作奏賀聖朝之曲飲畢樂止進食奏大樂食畢樂止凡五進食皆如之酒四行細樂作奏普天樂之曲飲畢樂止進食酒五行細樂作舞諸國來朝之舞飲畢樂舞止進食酒六行細樂作奏朝天子之曲飲畢樂止進食酒七行細樂作奏醉太平之曲舞長生隊之舞飲畢樂舞止進食其西廡進酒進食之次亦如殿中惟不用樂宴畢皇帝興樂作皇太子諸王侍從還宫樂止文武官蕃王俱以次出東宫日宴蕃王是日宿衛陳設如朝㑹儀中書省大都督府御史臺俱取㫖宴樂蕃王陛辭其陳設行禮如朝見儀惟不設宿衛及傳制方物案宣狀等官辭東宫亦如見儀惟不跪致詞禮畢中書省率禮部官送至龍江驛禮部設宴如初至禮部官還應天府官送起行二十七年更定凡蕃國王來朝先遣禮部勞於㑹同館明日各服其國服如嘗賜朝服者則服朝服於奉天殿朝見行八拜禮畢即詣文華殿朝皇太子行四拜禮見親王亦如之親王立受二拜答二拜其從官隨蕃王班後行禮凡遇宴㑹蕃王班次居侯伯之下其蕃國使臣及土官朝貢皆如常朝儀蕃國遣使進表洪武二年定前期所司于王宫内外及國内街巷結綵設闕庭於殿上正中表箋案于闕庭前香案于表箋案前司香二人于香案左右王拜位于殿中衆官位於王後俱北向司禮二人于王位北引禮二人于王左右引班四人於衆官左右俱東西相向使者立位於香案東捧表箋二人於香案西設樂于衆官拜位之後龍亭于殿南正中儀仗鼓樂于龍亭前是日清晨司印者陳印案于殿中滌印記以表箋及印俱置於案王具冕服衆官具朝服詣案前用印畢用黄袱裹表紅服裹箋各置于匣中仍各以袱裹之捧表箋官捧置于案使者與捧表箋官各就位引禮引王及衆官俱入就拜位贊拜樂作再拜樂止王詣香案前跪衆官皆跪王三上香訖捧表箋官取表東向跪進王王受表以進于使者使者西向跪受興置于案贊興王復位贊拜樂作王與衆官皆四拜樂止禮畢捧表箋官捧表前行置于龍亭中金鼓儀仗鼓樂前導王送至宫門外還衆官朝服送至國門外使者乃行蕃使朝貢洪武十八年定蕃國初附遣使奉表進貢方物先於㑹同館安歇禮部以表副本奏知儀禮司引蕃使習儀擇日朝見其日錦衣衛陳設儀仗和聲郎陳大樂于丹陛如常儀儀禮司設表案于奉天殿東門外丹陛上方物案于丹陛中道之左右設文武百官侍立位于文武樓南東西相向蕃使服其服捧表及方物狀至丹墀跪授禮部官受之詣丹墀置於案執事者各陳方物于案畢典儀内贊外贊宣表展表官宣方物狀官各具朝服其餘文武官常服就位儀禮司官奏請陞殿皇帝常服出樂作陞座樂止鳴鞭訖文武官入班叩頭禮畢分付東西侍立引禮引蕃使就丹墀位贊四拜典儀唱進表序班舉表案繇東門入至於殿中内贊贊宣表外贊令蕃使跪宣表宣方物狀訖蕃使俯伏興四拜禮畢駕興樂作還宫樂止百官及蕃使以次出其蕃使常朝及為國事謝恩遣使進表貢方物皆如前儀唯不宣表蕃國慶祝儀蕃王奉正朔稱朝貢者其國中有慶祝禮頒自朝廷使遵行之儀具于後聖節正旦冬至望闕慶祝儀洪武二年定前期執事者于王宫正殿南向陳香燭案于闕庭前王拜位于殿中褥位于香案前衆官拜位于王之後俱北向司禮贊禮于王拜位之北司香二人于香案前俱東西相向是日陳軍仗于王宫門之外樂工陳樂于拜位之後衆官先具朝服引班于王宫門外東西執事俱就位王于後殿具冕服未賜者服其服衆官入候立于殿庭陳西王出樂作由西陛陞至拜位樂止衆官就拜位贊拜樂作王與衆官皆四拜樂止王由東門入樂作至褥位樂止贊跪王與衆官皆跪王三上香畢俯伏與衆官皆興王繇東門出樂作還位樂止贊拜樂作王興衆官皆四拜樂止贊搢笏三舞蹈跪三拱手加額呼萬嵗出笏俯伏興四贊拜禮畢王與衆官以次出蕃國迎詔儀受印物儀附皇帝登極及冊立皇儲則遣使頒詔蕃王受封則賜或有賚予故有蕃王迎接之儀洪武十八年定凡使者入蕃國境先遣人馳報于王王遣官逺接詔前期令有司于國門外公館設幄結綵設龍亭于正中設香案于龍亭之南備金鼓儀仗鼓樂伺迎候引又于國城内街巷結綵王宫内設闕庭于殿上正中設香案于闕庭之前設司香二人于香案之左右設詔使立位于香案之東設開讀案于殿陛之東北設蕃王拜位于中道北向設蕃國衆官拜位于蕃王拜位之南異位重行北向設捧詔官位于開讀案之北宣詔官位于捧詔官之南展詔官二人位于宣讀官之南俱西向司禮二人位于蕃王拜位之北引禮二人位于司禮之南引班四人位于衆官拜位之北俱東西相向陳儀仗于殿庭之東西設樂位于衆官拜位之南北司向逺官接見詔書迎至館中安詔于龍亭中遣人馳報王王即率國中衆官及耆儒僧道出迎于國門外至館中具冕服衆官具朝服行五拜禮訖迎詔出館至國門金鼓在前次僧道耆儒次衆官次王次儀仗鼓樂次詔書龍亭使者常服行于龍亭後迎至殿中金鼓分列門外之左右置龍亭于殿上正中使者立于東引禮引王入就拜位引班引衆官人等各就拜位使者詣前南向立稱有制司贊唱拜樂作蕃王及衆官以下皆四拜樂止引禮引蕃王繇西階陛詣香案前北向立引禮唱跪司贊唱衆官皆跪引禮唱上香司香捧香跪進于王之左王三上香訖引禮唱俯伏興平身蕃王及衆官以下皆俯伏興平身引禮引蕃王復位司贊唱開讀宣詔官展詔官陞案使者詣龍亭捧詔書授捧詔官捧詔官前受詔捧至開讀案授宣詔官宣詔官受詔展詔官對展司贊唱跪蕃王及衆官以下皆跪宣詔官宣詔書捧詔官于宣詔官前捧詔書仍置于龍亭司贊唱俯伏興平身蕃王及衆官以下皆俯伏興平身司贊唱拜樂作蕃王及衆官以下皆四拜樂止司贊唱搢笏鞠躬三舞蹈三拱手加額山呼萬嵗山呼萬嵗再山呼萬萬嵗出笏俯伏興樂作四拜興平身樂止禮畢引禮引蕃王退引班引衆官以次退蕃王及衆官釋服使者以詔書付所司頒行蕃王與使者分賔主行兩拜禮使者居東蕃王居西如蕃國陪臣行禮使者立受正徳元年題准凡使者齎捧詔節前徃安南等國王請留詔書為傳國之寳者聴之嘉靖十六年題准凡禮制詔告天下者遇有蕃國朝貢使臣依式謄黄一道付齎回國徑自開國讀行禮其恭遇國家大典禮應該遣使詔諭者仍遵照舊例施行蕃國受印物洪武三年定使者至蕃國境先遣闗人入報蕃王遣官逺接前期有司于國門外公館設幄結綵設龍亭于館之正中備金鼓儀仗鼓吹于館所以伺迎引又於國城内街巷結綵又於王宫設闕庭于殿上正中設香案于闕庭之前設蕃王受賜予位于香案之前設蕃王拜位于殿庭正中北向衆官拜位于王拜位之南異位重行北向設樂位于衆官拜位之南北向司贊二人于蕃王拜位之北引禮二人于司贊之南引班四人于衆官拜位之北俱東西相向陳儀仗于殿庭之東西逺接官接見使者迎至館所以上賜安奉於龍亭中遣使馳報王是日蕃王率百官出迎于國門外逺接官迎上賜出館至國門金鼓在前次衆官常服乘馬行次儀仗鼓樂次上賜龍亭使者常服乘馬行于龍亭之後迎至殿中金鼓分列于門外之左右衆官分立殿庭之東西置龍亭於殿上正中使者立于龍亭之東引禮引蕃王引班引衆官各就拜位立定司贊唱拜樂作蕃王及衆官皆四拜樂止引禮引蕃王詣龍亭前使者稱有制引禮贊跪司贊唱跪蕃王與衆官皆跪使者宣制曰皇帝勅使某持印賜爾國王某并賜某物宣畢使者捧所賜印并某物西向授蕃王蕃王跪受以授左右訖引禮唱俯伏興平身司贊唱同蕃王及衆官皆俯伏興平身引禮引蕃王出復位司贊唱拜樂作蕃王及衆官皆四拜樂止司贊唱禮畢引禮引畨王入殿西立東向使者東立西向引禮唱使者與蕃王行兩拜禮使者降自東階蕃王降自西階遣官送使者還館官員禮朝廷尚爵故官員禮類依品級等次凡拜揖序立行走迴避尊卑上下森然各有儀節故備述之而儀從到任禮附焉凡官員拜揖洪武二十年定凡公侯駙馬相見各行兩拜禮一品官見公侯駙馬一品官居右行兩拜禮公侯駙馬居左答禮二品見一品二品居右行兩拜禮一品居左答禮三品見二品三品居右行兩拜禮二品居左答禮四品見三品四品居右行兩拜禮三品居左答禮五品見四品五品居右行兩拜禮四品居左答禮六品以下倣此如三品見一品四品見二品行兩拜禮一品二品官答受從宜餘品倣此如有親戚尊卑之分從行私禮二十九年定凡王府將軍與駙馬儀賔公侯相見將軍居左駙馬等居右皆再拜與文武一品至三品官相見將軍居中各官拜將軍答禮與四品以下官相見各官拜將軍坐受三十年令百官以品秩髙下分尊卑其品級近者相見行禮則東西對立稍卑者居西髙者居東其品級相越二三等者卑者居下尊者居上其相越四等者則卑者拜下尊者坐而受禮有事則跪白如一品與二品相見二品居西行禮一品居東答禮與三品四品相見三品四品居下行禮一品居中答禮與五品以下相見一品受禀事則跪餘倣此凡司屬官品級亞于上司官者禀事則跪凡近侍官員難拘品級行跪拜禮亦不許與外官交接凡同僚官品級有髙下者不拘凡大小官員于内府相見不許跪拜𢎞治十一年議准王府長史不許行走三司中門若相見之際須以禮待十五年奏准陜西行太僕寺少卿與御史相見比遼東山西等處例出入行中門正道凡官員聚坐洪武二十年定凡文武官公聚各依品級聚坐若資品相同者各照衙門次第若王府官屬與朝官坐立各照品級俱在朝官之次二十四年令凡學官位於雜職之上宣徳三年令御史給事中照品級坐景泰三年令六科都左右給事中内外序坐書銜俱居御史之左成化二年奏准凡鎮守總兵巡撫等官列坐總兵係伯爵以上者居左巡撫係僉都御史以上者居右若總督提督軍務等官自僉都御史以上俱坐于總兵官侯伯之左列名于前五年奏准在京法司㑹審囚俱于承天門外東西重行列位公侯駙馬伯列于東班都督等官列于東班後行尚書都御史侍郎等官列於西班通政司大理寺佐貳官并六科掌科給事中列于西班後行禮部㑹議民情俱於闕左門東直房序坐尚書左都御史等官上坐侍郎副都御史等官對坐通政司參議大理寺寺丞等官列於東傍六科掌科都給事中列於西傍南京文武衙門公事㑹集聚坐亦如之八年奏准御史郎中貟外郎主事奉勅同差者俱照所差職名先後序坐若郎中等官奉勅㑹同御史或御史奉勅㑹郎中等官行事當以奉勅之人坐左次者居右其各衙門一應公差有闗㑹御史者俱讓御史居左若不係同差别處政務相闗止依品級序坐十四年定在外總兵巡撫官位次左右都督與左右都御史並都督同知與副都御史並都督僉事與僉都御史俱文武東西伯以上則坐於左十五年奏准都御史係總督及提督軍務者不分左右副僉俱坐於右總兵雖伯以上亦坐於右凡官員相遇迴避洪武二十年定凡駙馬遇公侯分路而行一品二品遇公侯駙馬引馬側立須其過二品見一品二品趨右讓道而行三品遇公侯駙馬引馬迴避遇一品引馬側立遇二品趨右讓道而行四品遇一品以上官引馬迴避遇二品引馬側立遇三品趨右讓道而行五品遇二品以上官引馬迴避遇三品引馬側立遇四品趨右讓道而行六品遇三品以上官引馬迴避遇四品引馬側立遇五品趨右讓道而行七品遇四品以上官引馬迴避遇五品引馬側立遇六品趨右讓道而行八品遇五品以上官引馬迴避遇六品引馬側立遇七品趨右讓道而行九品遇六品以上官引馬迴避遇七品引馬側立遇八品趨右讓道而行品級相等者分路而行如有親戚尊卑之分聴從迴避凡遇王府將軍于道駙馬儀賔公侯讓左右文武一品至三品引馬側立四品以下官下馬凡内官出入遇駙馬於道必須下馬遇公侯一品二品官引馬側立遇三品四品官分路而行凡公侯駙馬一品二品官隨從侍者人等非跟隨本官而私自出入者凡遇文武百官必須下馬違者治罪凡所屬官遇上司官引馬迴避所屬官品級髙者遇上司官卑者分路而行凡官員應合迴避而路窄不可迴避者則下馬拱立應分路者不得占中道凡文武官員出入應合開道而自不開路致令應避官員不曽迴避者不問根因而生事者止問上官凡街市軍民人等買賣及乘馬出入者遥見公侯駙馬一品以下至四品官過往即便下馬讓道凡官員當避路者若承宣召及祠祭官詣祠所并有捕逐者在道雖遇應避之官不避凡屬官見上司洪武二十年令凡屬官見上司官必序立於堂階之上總行一揖上司拱手首領官答揖其公幹節序見上司官皆行兩拜禮長官拱手首領官答禮四年令凡揖禮下見上躬身舉手齊眼為敬上官隨坐隨立無答其次下官舉手齊口上官舉手齊心答之五年令凡内外掾吏令史書史宣使奏差人等晨謁長官必序立階下一揖乃退長官不答禮幕官拱手十六年令教官生員見上司一遵憲綱行禮如有出郭迎送及妄行跪禮過為稱呼者聴巡按御史按察司官依律究問若上司過違憲綱者亦行糾奏嘉靖八年凡巡按御史于守令官不許作威挫辱知府相見不許行跪禮凡官員公座洪武二十年定凡大小衙門官員每日公座行肅揖禮佐貳官揖長官答禮首領官揖長官佐貳官拱手凡官員儀從洪武二十年定凡文武百官自四品以上儀從并依從舊制宜五品官止許引導一人六品以下不許引導其出郊在外儀從仍依舊制不拘此例二十四年更定官貟儀從公十人侯八人伯六人一品至三品六人四品至六品四人七品至九品二人其役皁奴婢公侯之家不過二十人一品不過十二人二品不過十人三品不過八人成化元年令凡京官出外四品以上引導三對用錫槊鋼乂藤棍七品以上引導二對用錫槊藤棍在外方面堂上官引導三對用錫槊鋼乂藤棍各府及鹽運司等衙門四品以上官引導二對用錫槊藤棍七品以上引導一對用藤棍八品九品用竹篦一對引導雜職不許引導若府州縣官催徴用竹篦荆杖巡捕用乂刀之類導引者不在禁限其京官還鄉回里本府州縣並不許引導及責罰吏民違者從巡按御史按察司官究治若風憲官僭用亦許諸司指實具奏凡官員到任洪武十八年定一有司新官受職赴任者未到城一舍二三十里而止先令人報知禮房吏告示官屬及父老人等相率出城來㑹令灑掃合祀神祇祠宇備牲醴祭儀以候謁告比至城外齋宿三日第四日清晨父老人等導引入城遍詣諸神祠如儀致祭其祝文曰維某年月日某官奉命來官務専人事主典神祭今者謁神特與神誓神率幽㝠隂陽表裡予有政事未備希神黙助使我政興務舉以安黎民予倘怠政姦貪陷害僚屬凌虐下民神其降殃謹以牲醴致祭神其鑒之尚饗一祭神之禮新官到任之日詣神廟祭祀禮房先備牲酒等物陳設禮生父老人等導引新官同僚屬官吏詣廟贊禮唱排班班齊鞠躬拜興拜興平身贊唱行初獻禮引贊引新官詣神位前贊唱跪新官跪贊唱衆官皆跪贊唱獻爵執事捧爵于左跪新官獻畢仍授執爵者以爵奠於神位前贊唱讀祝執事者取祝跪讀畢贊唱俯伏興平身贊唱行亞獻禮執事以爵酧酒奠於神位前終獻如亞獻儀畢贊唱鞠躬拜興拜興平身禮畢一新官到任之日本衙門合備儀仗皂𨽻前期一日出城伺候至日清晨首領官率領各房吏典并合屬生員人等迎接入城先詣神廟祭祀畢引至本衙門儀門前下馬具公服從中道入先於月臺上望闕設香案禮生引新官至香案前行五拜三叩頭禮畢上􅈦公座皂𨽻排衙報時晨擡書案至前吏房將公座呈押一參見禮先從皂𨽻次吏典各從兩拜禮新官坐受次合屬官參見亦行兩拜禮新官拱手答禮次首領官亦行兩拜禮新官起身拱手答禮次佐貳官行兩拜禮新官出公座答禮如是佐貳官到任先受所屬并首領官行禮後至長官前兩拜禮長官出公座答禮畢諭僚屬曰朝廷設官置吏欲其敬神恤民親賢逺奸興利除害某不敏忝兹重任尚賴一二僚屬及邑中長者匡其不逮庶免後艱其四境之内利有當興弊有當革者某等當共竭力為之以安黎庶諭畢署押公文各房吏典將該管應有已未完結事件施行等項逐一開寫須知呈報新官署押文書如係長官則交割印信倉庫匙鑰等件畢照依各房呈報須知事日逐一發落署判公事畢將所祭牲酒與官屬父老享飲而退其九年考滿仍具牲酒率官屬父老人等辭廟致祭就以祭物出郊餞别而去其祝文及所諭之言禮生代説亦可宣徳十年奏准各布政司按察司府州縣新官到任于本處城隍廟㑹請應祀諸神用猪羊二牲總祀庶人禮凡民庶以齒為先後致仕官序爵爵同序齒至處親族則不論爵洪武五年令凡鄉黨序齒民間士農工商人等平居相見及嵗時宴㑹謁拜之禮㓜者先施坐次之列長者居上如佃户見佃主不論序齒并行以少事長之禮若親屬不拘主佃止行親屬禮十二年令内外官致仕居鄉惟于宗族序尊卑如家人禮於其外祖及妻家亦序尊卑若筵宴則設别席不許坐於無官者之下如與同致仕官㑹則序爵爵同序齒其與異姓無官者相見不須答禮庶民則以官禮謁見敢有凌侮者論如律二十六年定凡民間子孫弟姪甥婿見尊長生徒見師範奴婢見家長乆别行四拜禮尋常近别行揖禮其餘親戚長㓜照依等第乆别行兩拜禮尋常近别行揖禮平交同禮部志稿卷十七
