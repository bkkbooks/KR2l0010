body:
  text: 禮部志稿卷五十二明俞汝楫編列傳尚書吕震吕震字克聲陜西臨潼人自幼穎悟以神童稱年二十以明經領鄉薦入太學二十六年朝廷欲稽郡邑壌地之廣狹貢賦之多寡命有司具圖以進使賦役適均奸弊無隠震承檄往西浙督之民不勞而事集既還京師遂拜山西按察司僉事繼入為户部主事尋復出為北平按察司僉事所歴俱以才幹聞成祖在潛邸將舉兵靖難震知天命有在遂竭勞績壬午年内難平以城守功陞真定知府本年召為大理寺在少卿二年陞大理寺卿三年拜刑部尚書六年冬遷禮部尚書七年車駕北狩東宫監國震啟㑹試天下舉人得中式者陳璲等七十五人閏四月琉球官生石達魯在監三年例當省親震以事屬外夷馳驛以聞上從之八年四月震等啟言琉球官生自其國省親復監挈帶妻子女伴未有給賜皇太子命工部亟製給之仍悉賜衣巾靴縧衾褥枕簟九年三月震奏舉廷試上可其奏賜蕭時中以下及第出身有差十一年十二月二十八日鴻臚寺奏習正旦賀儀上詔禮部翰林官問曰正旦日食百官賀禮可行否震對曰日食與朝賀之時先後不相妨侍郎儀智曰終是同日免賀為當後以學士楊士竒引証甚直竟免賀十九年定鼎北京去行在二字震改北部夏四月三殿災召羣臣直言得失震奏監生有單丁親老告侍親者照例令侍養親終服闋起用其已經編伍者悉宜宥免從之二十二年仁宗即位優遇隆渥恩禮有加嘗從容上言百司庶政具有成法第悉遵祖訓行之勿有所更則永世有賴仁宗嘉褒賜以綵幣鈔錠初命兼掌太常卿事未幾加太子少師尋進太子太保仍兼禮部尚書九月癸未震奏於上曰今喪服已踰二十七日請如太祖倣漢制釋服纕易服楊士竒以為不可尚書蹇義請兼二説明旦羣臣皆素衣冠黑角帶遂偕六部都察院具奏報可明旦上素冠麻絰出視朝文臣惟學士武臣惟英國公如上所服餘文武羣臣皆從義所定朝畢上召蹇義夏原吉楊士竒等諭曰吕震昨奏易服皆與汝等議之前奏時我已疑其非但聽臣下易之梓宫在殯吾豈忍易後聞士竒有言始知震妄士竒所執是因嘆曰張輔知禮六卿乃有不及又顧義曰汝所折衷亦未當然不必再以語人羣臣聽其便十二月庚午百官習新正儀於海印寺用樂明日楊士竒等乞勅禮部設樂不作不報震復言士竒所議不當士奇與議復進言遂有旨命禮部設樂不作正月初二日特召士竒四人奉天門諭之曰吕震毎事誤朕卿等所執停樂是洪熙元年奉旨祀古皇帝王陵寝於關西復加厚賜俾訖事便道祀先省母比還值宣宗登極凡冊立封拜及宴勞事多任之震在禮部二十餘年凡禮樂制度郊廟祭禮燕享錫賚朝覲㑹同之事莫不參酌古今以時舉行太夫人家居年耄每形於憂念得承命歸省者三皆有白金文綺之賜其歸也兩值關中飢即令所司出粟以賑之既還條例以聞上多是之但震有通才不能持正頗為清議所譏云宣徳元年四月以疾卒於官年六十有二尚書胡濙胡濙字源潔直隸武進人自幼端重不好戲嬉洪武中登鄉薦登庚辰進士第擢兵科給事中尋陞右給事中勤慎小心甚見委任成祖入正大統濙供職如故奏對稱旨陞户科都給事中丁亥命濙巡歴天下以訪異人為名實欲察審人心向背也丙申還朝遭内艱詔起復視事冬陞禮部右侍郎明年仍命巡歴江浙等處癸卯自鈞㐮還時駕親征北敵駐驆宣府濙馳見行在賜坐與語因以民間欣戴之意慰勞而出先是仁宗在青宫監國南京時有為飛語者成祖疑之命濙往察焉濙至宻疏七事皆誠敬孝謹上覧之大悦自是不復疑仁宗嗣位遷太子賔客南京國子監祭酒宣宗嗣位復禮部左侍郎兼職如故尋自南京入朝進行在禮部尚書益見倚任漢庶人反濙贊上親征事平賜賚優厚丁未賜近第於長安右門仍給閽者二人侍焉戊申賜銀範圖書四其一以清和恭靖為文嘗以生辰令光祿寺賜宴於其第己酉命兼詹事府事凡駕巡邉必命扈從辛亥兼掌户部行在事嘗遇天夀節御製詩以寵之仍面諭之曰朕茂膺天眷惟爾翼贊之功因賜宴沾醉新建禮部仍命光祿具宴落之勲戚公卿皆與濙每燕見即問曰卿何所言凡有章疏即行之九載秩滿賜勅奬諭上即位待遇尤厚凡軍國重務皆令與聞年及七十上章乞致仕上勉畱之己巳上親征迤北命濙居守陞太子太傅階榮祿大夫景泰中以立儲陞少傅兼太子太師二俸兼支當畱守時廷議迎上皇衆相顧不敢言濙獨以奉迎儀注送内閣上在南宫屢請百官朝廷安門不報及復位濙力疾入見時年八十餘因以疾病不任朝謁乞歸老且辭師傅二職上從之命以尚書致仕賜璽書慰諭侑以白金寶鏹金織襲衣仍給傳以歸官其長子寧為錦衣衛世襲鎮撫命歸終養天順七年卒事聞贈太保謚忠安遣官諭祭勅有司營𦵏濙為人節儉寛和喜怒不形於色待人温恭有禮時以徳量稱性多知每朝廷建置太議皆預定於中而承迎於外卒能因時以成其功名故歴事累朝幾六十年榮遇不衰位兼孤卿富夀罕儷尤慕仙術招致術士出入無間以損譽云尚書楊寧楊寧字彦謐直隸歙縣人繇進士授刑部主事正統三年随兵部尚書魏原巡視宣府大同邊備四年出師征剿麓川以中官監軍薦寧偕往至境賊欵軍門約降主將許之寧曰兵未加而敵降是詐以諉我也宜嚴兵以備之已而賊兵果至以功特陞郎中六年仍舉麓川之師兵部尚書王驥總軍務薦寧偕往攻破杉木籠山柵砦搗其巢穴師還以功進刑部右侍郎九年參贊雲南軍務請置隴川宣撫司又即騰沖險塞築城控制蠻夷戊辰巡撫江西詢求民瘼士民畏服景泰初召還進禮部尚書與毘陵胡濙協心政務濟寛以嚴人謂得體後二年以足疾調南京刑部天順初致仕未幾卒訃聞遣官賜祭營塟寧為人機警負才能善交權貴麓川之行雖已成功而其不免於清議亦以此云尚書楊善楊善字思敬順天府大興縣人年十七為府學生成祖皇帝舉兵靖難善與守城除典儀所引禮舍人永樂改元擢為鴻臚寺序班改鳴贊累陞至本寺卿正統十三年陞禮部左侍郎十四年遷都察院副都御史督守九門尋陞右都御史景泰元年使北廷迎車駕囬京遷左都御史先是遣使迎請車駕額森以為非大臣不許及善至果知其大臣善又有機變能動額森且自出財帛以啖其衆遂得迎囘三年以易儲加太子太保仍理鴻臚寺事天順元年上復位封奉天翊衛推誠宣力守正文臣特進光祿柱國興濟伯掌左軍都督府事食祿千二百石給賜誥券復錄其子并養子出使功得祿秋者十數人上眷顧甚隆已而為石亨輩譖言疎之尋命兼掌禮部事卒年七十有五上悼惜之輟視朝一日遣官諭祭贈興濟侯謚忠敏命有司營𦵏事善容貌魁梧應對敏捷在鴻臚五十餘年其朝㑹慶賀宴享之禮及四夷朝貢之儀未有熟於善者然素無學術為人外若柔和中實隂忮凡事之可以利己自便者無不為之永樂初嚴治方孝孺之黨庶吉士章朴與善同坐事朴言家有孝孺文集善即借觀宻以奏聞遂戮朴而復善官正統中太監王振用事善媚事之不憚屈己迨上復位輒恃功凌人招權納賂亞於石亨張軏出諷言官舉劾奸黨而入稱為公論王文于謙之死陳循等之竄善有力焉然其出使北廷能使國威不屈額森攝服卒之奉駕南還其忠藎之氣有足尚云尚書蕭晅蕭晅字養善江西泰和人宣徳丁未進士正統五年授吏部文選主事八年晉考功員外郎十一年陞稽勲郎中厚重優容喜怒不形而坦夷悃實不為皎皎之行以取聲名久之陞雲南副使慎憲度理寃獄於官民示以恩信不務摶擊及進右布政使益務鎮静因其俗而順治之民夷帖然天順初年轉湖廣左布政使沈潛有幹局事必求於便民時苗寇弗靖用兵征勦調度甚繁晅節縮冗費出公帑餘蓄以充芻粟嘗有勅督造戰船甚急衆議欲賦財於民晅不可白於巡撫白圭請清積餘木代造全楚不擾其他於民有利興不利者罷行各中其宜天順四年春入覲畢英宗召大學士李賢曰黜陟之典亦須舉行賢曰此祖宗舊制即勅吏部都察院退不職者數百人旌其才行超卓政績顯著晅與布政賈銓等以下十人賜以衣服楮幣禮部筵宴命太監牛玉大學士李賢吏部尚書王翺侍宴以勵其衆輿論懽然随召晅為禮部尚書是年知貢舉學士李原修撰柯潛為㑹試考官揭曉後有落第舉人奏考官較文顛倒者上問李賢對曰此乃私忿考官實無弊如臣弟譲亦不中可見其公上意始解乃命晅㑹翰林院考前奏者多不能答題意因疏其狂妄命枷號部前以示衆澆風頓息晅為人朴實故蒞政臨民恵然稽古右文非其所優遂改南京禮部未幾致仕天順元年卒遣官諭祭命有司營𦵏尚書石瑁石瑁字信之山西應州人宣徳癸丑進士擢禮科給事中性謹飭不務竒節正統九年陞金華知府蒞政嚴謹修舉廢墜甚得民心十三年處州劇賊楊熙輩流刼隣郡乃繕城聚粮為守備計賊果猖獗為浙東患朝廷命將征撫而歸化避難之民與駐劄官軍不計其數皆仰給羣庾瑁調度有方事平餘積尚多總督上其功超陞福建右布政使益尚清謹簡在閩藩年久無赫赫譽而朴實悃愊與民相宜進南京吏部左侍郎㑹禮部缺尚書王翺在吏部不喜南士喜瑁北人拙直遂薦瑁代蕭晅為尚書瑁不學少文典禮非其所諳士論譁然不服一日英宗召大學士李賢曰今六部尚書庶皆得人惟禮部石瑁稍弱賢曰此人居是位不滿人望早晩宜致仕上曰且畱之恐後來者未必過之六年夏四月一日奉天門奏事畢静鞭上起身召禮部石瑁等疾出班趨走欲上御階鴻臚寺呼止方轉囘御道跪承旨與勅書選妃事上下金臺即召賢曰石瑁動止粗疎失措如此何為禮部尚書不求自退朝廷難於遣逐賢曰誠如聖諭令其自退全大臣之義上曰若户部侍郎張睿可以代之賢曰張睿老成人此職亦宜賢即報瑁疏乞致仕瑁遂自陳上見瑁疏意却不忍曰瑁為人篤實豈可因此小失而退命太監牛玉勅吏部尚書王翺與賢議賢等言石瑁亦淳誠人但動作遲鈍耳既畱之張睿可不動也七年以老致仕卒贈資徳大夫給賜誥命遣官諭祭尚書姚䕫姚䕫字大章浙江桐廬人少穎悟不羣正統間以春秋舉鄉試㑹試皆第一賜進士出身擢吏科給事中多所論列己巳之變尤憤激奮發遇事敢言景泰改元超拜南京刑部右侍郎尋改南京禮部奏命考察雲南官吏還朝畱任禮部天順丁丑春正月景泰不豫尚書胡濙病告䕫強之出十四日率文武大臣於左順門問安退集東閣議立皇太子上疏懇請未允次日䕫欲率百官伏闕以請是夕以學士商輅議定遂歸十六日早三皷至朝房輅具本稿有陛下為宣宗章皇帝之子當立宣宗章皇帝之孫正位東宫等語䕫躍然舉筆於立上添一復字時侍郎鄒幹等語俱稱善巳時入朝衆議合文武大小官僉名具一様冩二本因遲悞延至十七日早變作弗果進英宗復立石亨輩竊弄威權䕫視之如常亨憾其不附己乗間調䕫南京禮部英廟素知䕫為人且聞正月立儲之議未幾召至京賜二品服轉禮部左侍郎戊寅吏部左侍郎缺一日英廟召大學士李賢曰吏部乃天下人物權衡非他官比先生以為誰賢曰以在朝觀之無如禮部二人可擇一用之上復問其優劣賢曰姚䕫表裏相稱有大臣之量上遂用之癸未遷禮部尚書階資善大夫䕫詳雅敬謹明於典禮克稱厥任上深嘉之甲申憲廟嗣位命侍經筵賜白金綺寶等物成化年乙酉上耕耤田幸太學皆從䕫所請宴賜有加又大同猫兒庄本北人入貢正路至是北使有從他路入者上因守臣之奏許之䕫請筵賞賜一切殺禮北使有後言䕫令通使諭旨云故迤北使臣進貢俱從正路入境故朝廷有大筵宴相待今爾從小路來疑非迤北頭目比只照他處使臣相待耳北使不復有言人以為得馭外之體丙戌㑹試䕫知貢舉預陳數事以杜僥倖閏三月進資善大夫五月䕫率羣臣上封事其畧曰皇上當念祖宗之付託思天下之艱難勿以目前無事以恣於宴安肆於逸樂以禮法齊家以節儉制用官爵無濫授金帛無妄費土木勿妄興齋醮勿頻設出入有防巡遊有度節嗜欲養天和畱心萬機無忘正務上嘉其言慰諭甚至丁亥正月賜金織麒麟文綺朝鮮進海東青䕫言非故事宜下詔自今非常貢之物不得進以示不寳逺物之意戊子四月以災變率羣臣上疏言皇上春秋鼎盛而震位尚虛宜均愛六宫以繁子嗣然此事自陛下身上用非求神奉佛所能致也若西山塔院勞民傷財宜在停罷阿叱哩之流惑世誣民宜在斥囘畱心經筵裁決政務親君子逺小人服食動息遵祖宗舊規以順天意上嘉納之慈懿皇太后崩卜𦵏有異議内閣大學士彭時等執不可繼之以疏事下禮部䕫率羣臣覆奏詞甚懇切有曰山陵宗廟聖孝所先綱常典禮國家攸重萬一合塟祔廟之禮少有疑阻關繫非細豈能保其將來無據禮改從正者上覧奏感泣下卒從其議當時雖賴内閣臺諫維持而䕫力居多䕫在禮部㑹議條陳多進讜言但皇太后夀誕建設齋醮乃欲㑹大臣收賈炷名相率詣寺觀行禮祈福於全徳不無歉云五年遷吏部尚書加太子少保成化九年卒年六十訃聞上震悼賻祭營塟給驛歸其喪贈榮祿大夫少保謚文敏賜誥命尚書鄒幹鄒幹字宗盛浙江餘姚人父濟詹事府少詹事贈太子太保謚文敏在太宗皇帝時為宫寮卒幹尚幼適仁宗皇帝監國南京遣充應天府學生親加訓勉賜鈔二千貫仍月給米二石以資養之幹感激奮勵力學不懈正統戊午中鄉試明年己未遂登進士第庚申初授兵部職方司主事歴陞武選司員外郎中己巳八月北敵犯邉英宗北狩京師戒嚴一時所需甲仗粮餉未有能任其劇者乃超陞兵部右侍郎幹殫竭智力日共厥事倉猝間發廩以給兵士或不候奏報而行一日兵士擁東城門請給馬草適鄕民萬計避難走城下叫號求開門守者難之幹曰草不得則廏馬不過瘦死爾城以衛民若無所衛焉用城為且聞敵距城尚逺若至近境門開無及而民皆死矣竟從其言獲濟及敵退明年改元景泰被勅奬諭辛未清軍職帖黄事竣改禮部壬申奏勅考察山西官吏癸酉河南鳯陽等處大水詔往救荒民多受惠奏免税粮若干萬石既歸命督易州山厰薪炭積弊􅉐革因奏設主事一人總核其事幹獨總其綱而已居三年召還治部事尋陞左侍郎進階正議大夫資治尹天順丁丑英宗復位尚書胡濙方致其事去諸冊立大禮並從幹詳定而行時㐮王來朝故事當祭禁門而入自遷都後來朝禮絶莫有知者幹檢太常故典行之及上不豫復行皇太子御文華門代朝禮成化丙戌命撫安畿内許便宜行事明年以老辭不允未幾特拜南京禮部尚書時祭酒周洪謨奏復㑹饌詔幹與工部議卒尼不行居二年召還禮部尚書仍令經筵侍班幹性謙謹喜揚人之善處事是非不肯詭隨嘗因災異首以妄費濫賞及修苑囿設齋醮為言後以度僧道過多因極言其弊奏為定制多遵行之少侍文敏公多聞典故及居官往往述以諭諸寮屬其言皆可書者十四年加太子少保十六年特勅致仕令馳驛還仍令有司月給米二石嵗給夫四人家居夀八十四至𢎞治五年卒卒之前二月以杭屬縣大饑心切甚憫手具疏以聞上嘉其身居田里不預政事能達民隠如此詔有司如所奏賑恤即出内帑文綺賜幹以旌其賢及聞訃贈太子太保謚康靖尚書周洪謨周洪謨字堯弼四川長寧人正統十年進士及第授翰林院編修景泰三年選為東官官陞左春坊左贊善仍兼編修寰宇通志成陞侍讀仍兼贊善天順二年改南京翰林院署院事八年召修英宗實錄時戎珙蠻入宼上備禦方畧多見采納成化元年以秩滿陞侍讀學士尋陞南京國子監祭酒嘗奏孔子冕十二旒衣十二章惟舞佾邉豆不稱於是命加舞佾為八邉豆為十二孔廟純用天子禮樂自此始十二年陞禮部右侍郎轉左侍郎上疏請造璿璣玉衡憲宗即命洪謨自製衆謂必不可成旬日間乃製成以進賜賚有加十七年陞本部尚書烏思藏等處入貢其貢使數踰舊制一嵗中有至三四千人者賜賞靡費不可勝計自長河西諸畨皆冒以圖利公言此特無印符為騐耳宜依海南諸畨例各給與符二十道入貢備填貢物使數於上仍識以舊賜金印至關驗以防詐偽詔從其議其費始省丁未月當食不食或以為宜賀公謂此隂盛之象豈宜賀耶遂止當命祭天夀山神見役夫運載相繼於道知有所營建也歸言月令云盛夏不可興土功又曰舉大事必有天殃今嵗大旱未必不由於此且時方炎蒸人易疾疫宜暫休息之不報尋加太子少保乞致仕許之𢎞治四年卒年七十二謚文安賜祭塟如例洪謨務莊寡合博覧強記著疑辯錄其所論述多出新意為文亦富贍尤善談兵論事每執己見鮮適於用云尚書耿裕耿裕字好問河南盧氏縣人南京刑部尚書九疇之子景泰五年進士改翰林院庶吉士授户科給事中尋改工科天順初九疇以劾將臣忤旨補外裕亦坐調泗州判官丁父憂服闋改定州成化初言官白裕無罪復除檢討與修英廟實錄成陞修撰尋遷國子監司業轉祭酒陞吏部右侍郎丁母憂服闋轉左侍郎二十二年進本部尚書素與大學士萬安不諧造飛語中之遂改南京禮部𢎞治初改南京兵部尋召入為禮部尚書孝宗初政勵精圖治多行大典禮裕素博雅通知古今能斟酌而行得㑹通之宜時以灾異求言裕率左侍郎倪岳同羣臣等陳七事一預節親藩一懲究欺弊一均平銓選一照例附選一減造軍器一遵復舊制一裁抑侵尅大意謂田土有限藩封日增國賦日消乞開示條件之國之際不許生事擾人在國之時不許輒行奏討又人臣事君以不欺為本如雲南之木邦貴州之都匀江西之南贑以至兩廣三邉南北兩畿之間侵犯者不為克復之計盜竊者不聞捕勦之策甚者殺良民以為賊假敗績以為功捷奏率為虛聲掩獲遂為良策宜一一從公究理以懲欺弊又兩京官職出身既相同而遷轉之際乃至懸絶及監生考勤上選先後互異須斟酌通融庶事體歸一又南京兵仗局前厰建造軍器共七萬六千餘件收貯南京戊字庫聼候應用今地卑年久朽壊綉爛有名無實乞暫且停止以後減半成造至於鈔關收税乞免户部差官照舊制勅鎮撫鎮巡委府官管理及曾經抽分去處給與執照不復重復抽分上謂其有防㣲杜漸之意深嘉納焉崇王嘗乞詣京師朝賀勅諸臣集議裕言王雖至親於制不宜况兹飢嵗所過必勞供役民何以堪上從之西夷貢獅子上言賈胡嗜利受之無益且彼泛海而來非繇故貢道宜却其物亦從之畿内多自宫以求進者紛然行賂上疏請治其罪一時雖不能盡絶然自是禁例甚嚴無敢再犯者癸丑復改吏部進太子太保𢎞治九年卒輟朝一日贈榮祿大夫太保謚文恪裕美鬚髯善談論多識國家典故坦夷率直自奉儉約不營産業人稱其有父風所著有臺閣紀聞藏於家禮部志稿卷五十二
