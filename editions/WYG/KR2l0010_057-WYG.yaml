body:
  text: 禮部志稿卷五十七明俞汝楫編列傳郎署宋濓宋濓字景濓浙江金華人幼聰敏強記從同郡吳萊黄溍學為古文有聲元至正間有薦濓翰林編修官者濓以親老不就隱居小龍門山中嵗辛丑金華既歸附上遣使以書幣徴之與括蒼劉基葉琛章溢四人同見上甚禮重之擢濓江西等處儒學提舉既而命授皇太子經甲辰十月改起居注乙巳三月以疾告歸上賜以金帛太子亦厚遺之濓歸奉表謝上賜書嘉勞之其畧曰先生之師吾子訓飭甚嚴是不佞也以時言講解釋聖賢之意是不固也以忠貞立心以節儉制行是得儒者之道也昔聞古人今親見之仍侑以文綺洪武三年修元史詔徴濓與翰林待制王禕為總裁官六月除翰林學士亞中大夫知制誥兼修國史三年以失朝㕘左遷編修四年遷國子司業秋以議祭孔子禮稽緩貶知安逺縣是年十一月召還為禮部主事五年冬遷太子賛善大夫六年七月復命為翰林侍講學士中順大夫知制誥同修國史仍兼賛善大夫八月上命濓與詹同樂韶鳳等纂修大明日厯一百卷又與吳伯宗朱右等修寳訓五卷每旦侍膳燕見必命茶賜坐濓不能飲一日侍飲醉行不能成步上見而歡甚為詩賜之仍命侍臣咸為歌辭且曰使後世知吾君臣同樂如此也九年拜翰林學士承㫖嘉議大夫知制誥兼修國史仍兼賛善大夫擢濓長孫慎為殿廷儀禮司序班復召濓仲子璲為中書舎人子孫聫班内廷儒者榮之濓既老難于步趨上命選良馬以賜復為作良馬歌命詞臣咸賦之以示優寵年六十八上憫其老賜致仕歸鄉里及陛辭上以御製文集賜之加鈔綵段及衣三襲命其孫慎䕶至家濓上表稱謝上復賜手詔答之自是每嵗一朝至則恩遇之甚厚十三年璲以事得罪濓當連坐有司請罪之上以濓舊臣特命居于茂州十四年五月行至䕫州卒所著有潜溪集四十卷蘿山集五卷龍門子三卷浦陽人物記二卷翰苑集四十卷歸田集四十卷長子瓉與璲俱以能書名吳伯宗吳伯宗撫州金谿人洪武四年進士第一時初開科取士得伯宗上甚喜賜袍笏冠服擢禮部員外郎命與學士宋濓等同修日厯胡惟庸方用事欲人附己伯宗性剛直不肯與之相降屈惟庸每銜之八年竟坐忤庸庸中傷以事謫居鳳陽伯宗上書論時政因言惟庸專恣不法不宜獨任以事恐久為國患詞甚剴切上得其言即召還賜襲衣鈔錠奉使安南得馴象方物以歸除國子助教十二年命進講東宫首陳正心誠意之説皇太子嘉納之明年改為翰林典籍御製十題命賦之伯宗援筆立就詞語峻潔上嘉其才敏賜織金錦衣十四年除太常寺丞辭不拜十五年除國子司業復固辭由是忤㫖貶陜西金縣教諭至淮安召還除翰林檢討未幾拜武英殿大學士十六年冬坐弟仲實為三河知縣薦舉不以實伯宗為所累復降為翰林檢討十七年卒伯宗為人温厚詳雅博學能文章所著有南宫集使交集成均玉堂等集魏觀魏觀字起山武昌蒲圻人初以文學薦為國子助教歴浙東提刑按察司僉事吳元年遷兩淮都轉運鹽司入為起居注三年正月陞太常卿七月轉翰林侍讀學士十二月拜國子祭酒四年八月以考祭孔子禮不以時奏貶為龍南知縣甫至官召還為禮部主事五年三月出知蘇州府深懲陳寧苛酷之弊一以寛厚為政明教化正風俗郡中翕然陞四川㕘政未行上以蘇州大郡政務繁劇非其人不可使理命仍知蘇州焉陳敬陳敬者世家増城之石灘洪武十四年以賢良舉授禮部主客司郎中遇事剛果敢為人多忌之以事左遷雲南曲靖府幕官尋署劍州州事劍州鄉寇竊發來攻州城敬不欲為偷生計親率壯士禦之衆寡不敵其下欲退敬瞋目大罵賈勇前進遂力戰而死軍民咸聚哭賻焉上聞命有司恤其喪王鈍王鈍河南太康人洪武中舉秀才授禮部主事改湖廣長沙府通判坐事免復舉明經授北平府通判入為吏部試郎中陞福建布政司左㕘議陞本司左㕘政奉使僰夷僰夷致贈遺固辭不得強受之至雲南悉納布政司官庫太祖髙皇帝嘉之陞浙江布政使建文中陞户部尚書成祖即位命解户部之務月給尚書俸之半居京師後命徃北京山東撫綏軍民經理屯戍永樂三年以老賜敇奬諭命仍以浙江左布政使司之職致仕還鄉鈍有文學持身亷靜然為人脂韋遇大議媕婀無所可否云崔恂崔恂青州臨淄人洪武間由鄉貢舉人擢禮部主客員外郎陞兵部車駕郎中永樂二年陞雲南左㕘政恂資質厚重以謙謹自持事其母孝居官雖逺地必迎就養及卒人多惜之林鴻林鴻字子羽福清人少任俠不羈讀書能強記髙皇帝時部使者以人才薦授將樂儒學訓導居七年擢拜膳部員外郎髙皇帝臨軒試龍池春曉孤鴈二詩一日名動京師是時鴻年未四十髙皇帝治尚操切而鴻性脱落不善仕又久為散秩無自表見遂自免歸歸益閉門謝客肆力為詩其後閩人言詩者皆本鴻云尹昌隆尹昌隆江西人洪武中舉進士授修撰改監察御史建文初視朝頗晏昌隆疏諫制以昌隆所言切中朕過禮部可徧行天下使朕有過人得而知之及文皇帝舉兵南向昌隆上書言今事勢日去而北來章奏有周公輔成王之語不若罷兵息戰許其入朝彼既欲伸大義於天下不應便相違戾設有蹉跌便須舉位讓之猶不失作藩王也不報文皇帝入南京指為奸黨驅出戮之昌隆當陛大呼曰臣當時曽上章勸以位讓陛下奏牘尚在可覆按也上乃命緩昌隆刑閱其奏上流涕詔特貸昌隆死且諭之曰朕長子在北京爾徃事之爾能盡誠輔導朕不忘爾昌隆頓首謝永樂二年册立皇太子授昌隆左春坊中允前后在東宫隨事匡諫多所補益太子甚重之後陞禮部主事尚書吕震方承寵用事羣臣無比昌隆適有事請不得以舊事東宫遽唘令㫖行之震大怒奏昌隆傲慢狠愎事多專行無屬官禮且身為王官事須上奏而乃假托宫僚怙賴恩私隂欲樹結潜蓄無君之心又言昌隆身事庶人名在黨籍僥倖茍免見利忘義其心叵測其行匪良不宜任用上乃命逮昌隆下獄尋遇赦復官丁父憂歸後起復至京徃謁震震温言接之入理前奏詔繋昌隆錦衣衛獄且籍其家後數年谷王謀反事發詞連昌隆以曽經保奏為長史乃坐以同謀詔公卿雜問昌隆初不服震折之昌隆知不可免乃無言獄具上剮死夷其族宋琰宋琰字廷圭浙江奉化縣人永樂乙未進士授翰林庶吉士與修性理大全改中書舎人宣德初陞行在禮部主事預修宣宗實錄轉吏部考功入内府授内使書太監王振重之正統中陞河南右㕘政景泰四年入為太僕寺卿遷兵部右侍郎上初復位改南京兵部卒賜𦵏祭琰為人敦雅好學旁通風鑑星命諸術洪英洪英字實夫福建懐安縣人永樂乙未㑹試第一登進士入翰林為庶吉士擢禮部主客司主事歴吏部文選考功主事兩為㑹試同考官進考功郎中陞山東左布政使正統乙巳邊寇犯順陞都察院左副都御史巡撫山東督役夫臨清築運河堤景泰壬申進右都御史巡撫浙江㑹有㫖考察百官賢否以行黜陟英惑於左右之言去取有未當者因懇乞致仕歸英為人端凝詳雅在官無赫赫之譽而亦不失為善人長者云曹義曹義字子宜應天府句容縣人永樂中以舉人選入翰林譯夷字舉進士為翰林庶吉士十六年授編修轉禮部儀制司主事仍於翰林供事宣德十年陞吏部文選司員外郎正統九年秩滿陞本司郎中尋陞本部右侍郎十四年北兵犯邉京師戒嚴義與中貴守朝陽東直二門又奉命獨守崇文門景泰改元陞南京兵部尚書天順元年上復位奉表來賀命致仕賜以璽書卒年七十六訃聞遣官諭祭命有司營𦵏義為人平易不檢時薦舉方面得以髙下其説人多餽遺之亦善營利在吏部家人猶多為賈典選幾二十年無清譽第篤於友道而不遺故舊云吳政吳政浙江麗水縣人由進士擢禮部主事尋陞員外郎以幹濟稱宣德中陞本部右侍郎巡撫湖廣鋤強扶弱民用以寧正統中轉南京工部左侍郎未幾致仕至是卒遣官諭祭命有司治喪𦵏孫原貞孫原貞本名瑀以字行江西德興縣人舉永樂乙未進士授禮部主事遷郎中正統中陞河南㕘政進浙江右布政使時閩浙羣盜雖更赦罷兵尚未帖服原貞度其必反圗上方畧請為備禦未幾賊果叛發兵征討命㕘議軍事乃督兵深入擒其賊首捷聞陞兵部左侍郎㕘賛軍務鎮浙江進尚書奉命考福建吏治遂留鎮焉復與都御史劉廣衡平浙江賊五年仍鎮浙江天順初以老命致仕上即位詔進階一級卒年八十七訃聞遣官祭𦵏如例原貞居官以清慎自將多著勞效令終夀考亦世所難得云丁鎡丁鎡字永時直𨽻南陵縣人由楷書生員預修永樂大典永樂十七年授行在户部主事繼調吏部文選司復調禮部祠祭司二十一年扈駕北征洪熙元年陞本司員外郎宣德四年丁父憂服闋調户部正統初陞浙江鹽運使以亷能稱九年述職來京上嘉鎡治行超卓宴賞厚甚仍命吏部紀名以待陞用十四年陞河南布政使景泰元年召還陞刑部左侍郎已而為御史所劾令致仕遣官諭祭命有司為營𦵏事陳士啓陳士啓字震之江西泰和人由進士觀政右軍都督府時成國公朱能掌府事得士啓喜甚閒暇輒從講論古大臣賢將所以事君使人之道能禮遇加厚召入翰林為庶吉士修永樂大典書成擢禮部祠祭司郎中直道自任不為茍免薦陞山東布政司右㕘政青州嵗歉郡具饑民數上聞朝廷遣使偕士唘如數賑之粟比至而饑民倍増使者議再奏俟報士唘曰民命在旦夕若再俟報浹旬間悉餒死矣請發奏後即出粟脱有罪請自任不敢以累使者遂獨具奏朝廷從之所至民有爭訟羣邑未決而伏馬首以訴者從容數語諭之皆帖服其為政亷平無所矯拂所至其民愛之李昌祺李昌祺名貞江西廬陵縣人少穎異以進士選翰林庶吉士預修永樂大典號稱博洽書成擢禮部主客司郎中亷慎効職宣德薦陞廣西左布政使以德化人谿洞諸蠻聞聲歛跡不復為患未幾以詿誤謫役房山已而宥還改河南左布政使亦有惠政及民尋丁内艱詔特起之正統中疏乞致仕從之景泰三年卒家事蕭然幾不能斂其詩敏贍流麗時輩稱之劉球劉球字廷振江西安福人自幼舉動不凡長老目為國器永樂辛丑進士擢禮部儀制司主事正統初充經筵官預修宣宗實錄成改侍講正統間上疏言十事疏入命五府六部都察院集議咸言球所言惟擇太常寺官當從之請令吏部推舉翰林修撰董璘聞之遽自乞為太常寺官球坐璘累執下錦衣衛獄數日錦衣衛指揮馬順承中官王振意以球病死聞碎其屍棄之士論惜焉正統乙巳贈翰林學士諡忠愍李斆李斆字居學順天府涿州人永樂初詔開北京國子監斆以郡庠生被選時仁宗以皇太子居守北京發策以奉聖德安民生為問斆以敏對擢居第一賜衣一襲鈔四十錠命為監生首久之授京衛經歴陞禮部主事屢扈駕巡幸及北征十五年遷祠祭司員外郎奉使陜西還奏關中旱甚詔如所言賑之又明年陞江西左㕘議尋改四川洪熙初入朝奏除四川嵗買茶課宣德五年奏請松潘邉餉宜從近地轉輸以便民得許著為令秩滿遷右㕘政正統初陞右布政使疏言軍食鹽待民運不便宜從軍自請給從之及奏罷嵗造水戰鞍等軍器丁母憂家居又奏成都各處抽分物貨局及鹽井嵗久淡竭宜定減課額皆從之奪情復任六年以大臣舉選吏部左侍郎尋卒命有司諭祭為治墳𦵏斆剛直勤慎在蜀十餘年不以家隨政績著聞蜀人稱之及居吏部人望有不足云鄒濟鄒濟字汝舟餘杭人初為縣學訓𨗳累官平度州知州預修太祖髙皇帝實錄陞禮部儀制郎中從總兵官英國公孫輔征安南掌奏記還陞廣東布政使司右㕘政坐事左遷吏部郎中尋擢左春坊左庶子秩滿陞詹事府少詹事未幾卒於官為人和易不見崖岸於物無忤兼通老釋之學善伺上意寵遇特厚洪熙元年上追念之贈太子少保諡文敏命有司立祠墓側嵗以春秋祭焉葛清隱葛清隱江西廬陵人自樂舞生擢為山川壇奉祀陞太常寺清慎端厚熟於典禮秉誠持敬以奉神明仁宗皇帝為皇太子監國每嵗代祀天地宗廟山川清隱相禮深見嘉重後坐畧改禮部主事永樂十九年以老致仕仁宗皇帝嗣位特敇召之迨至上矜其老不欲煩以政仍令致仕葉春葉春浙江海鹽縣人初為禮部主客司主事陞郎中再陞兩淮鹽運使改福建布政司右㕘政宣德三年調四川未赴任奏浙江土豪為民患郡縣不能制上命大理寺卿熊概錦衣衛指揮任唘及春巡撫蘇常及浙江諸郡察捕強豪以安善良春雖行事于其鄉能持公道既還陞刑部右侍郎居無幾遘疾卒訃聞賜祭命有司治𦵏况鍾况鍾字伯律江西靖安縣人由學吏從事禮部尚書吕震保授儀制司主事尋陞郎中尚書胡濙薦陞蘇州府知府賜璽書以徃郡多宿弊鍾剔除之首黜貪汚數人凡政令便于民者靡不興復未幾以憂去民歌之曰况太守民父母願復來養田叟七邑耆民赴闕保留詔從之奏蠲重額糧七十萬餘石開豁枉為軍者八千百餘户為教條以教民立善惡簿以季考月書久而不悛者罪之秩滿軍民耆老萬餘人仍保留詔進三品祿正統七年卒鍾有治劇才故郡事雖殷理之綽有餘裕當時論者以為能吏云禮部志稿卷五十七
