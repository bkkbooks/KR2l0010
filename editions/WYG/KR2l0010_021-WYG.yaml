象元首明哉三奏民初生之曲沽美酒熈春陽化日長執懿筐采柔桑拾繭繰絲有萬箱染紅黄孔陽為公子翟衣裳太平歌勤樹藝嵗年豐穰九十月禾黍登塲為春酒甕浮新釀耕田樂齊歌齊唱饗公堂殺牛舉觴繼進著兕觥祝聖夀萬靈扶相四奏品物亨之曲醉太平納嘉禾滿場釀御酒盈缸公桑蠶績製𤣥黄服龍衣衮裳螽斯蟋蟀諧清唱水光山色明仙仗豳風亭殿進霞觴祝聖夀無疆五奏御六龍之曲清江引九月風光何處有鳯苑在龍池右農夫稼已登公子衣方授萬嵗君王頻進酒碧玉簫凡我生民農桑最苦辛終嵗經營氣候變冬春田畯欣婦子勤詠豳詩仰化鈞場圃新風雨順宴御丹墀龍顔近進膳水龍吟養老休農敞御筵㵼春酒介耆年刲羊剪韭社鼔正闐闐香粳米顆升堂拜獻此樂真堪羨太清歌九月天開西苑宸居無逸殿講幄張筵集儒流雲蒸星炫璧緯珠纒暏御製焕文章照囘雲漢堯天舜日民安宴御廩神倉百榖登金輝玉燦休徵見大有豐年上清歌鳯苑宸居公桑帝籍今方舉躬耕蠶勸士女獻羊羔升堂奏樂舞葵菽棗壺上珍厨萬夀山呼開天門豳風亭共仰吾皇聖百榖登萬國咸寧民康物阜禎祥應仰乾運俯坤靈皇后親蠶宴内外命婦樂章陞座天香鳯韶之曲春雲繚繞芳郊曙喜乾坤萬象咸舒蘭皋蕙圃迎仙馭采柔條攀茂樹蠶宮繭館親臨御璧月珠星照太虚開筵還駐翠銷旟萬載垂貞譽進膳沽美酒蠶禮成鳯輦停薦霞觴列雲屏宮妃世婦仰坤寧祥雲映紫㝠同頌耀前星囘宮御鑾歌維天啟聖皇君耕籍后躬桑身先田織率萬邦天清地寧民康物阜百榖用成四夷來王治化登唐虞世發禎祥東宮宴樂永樂間定樂器簫四笙四􅌙四樂章一奏喜千春之曲賀聖朝開國承天聖感極多總一統封疆濶百姓快活萬物榮光共沐恩波仙音韻合讚昇平詠歌齊朝拜千千嵗東宮滿國春和二奏永南山之曲水仙子洪基永固海波清盛世明時禮樂興華夷一統江山静民通和樂太平讃東宮仁孝賢明秉鈞衡端正順乾坤泰亨坐中華萬世昌寧奏百戲承應三奏桂枝香之曲蟾宮曲曉光融燕享春宮日朗風和氣喜葱葱鎮領台樞規宏綱憲禮節正公事聖上柔聲婉容問安寧勤孝䖍恭果斷寛洪剛健文明聖徳合同奏百戲四奏初春曉之曲小梁州端拱嚴宸事紫微秉運璇璣四時百物總相宜仰賴明君徳大業勝磐石皇儲仁孝明忠義美遐方順化朝儀孝能歡慈愛心敬篤上尊卑意禮上和下睦民鼓舞樂雍熈奏百戲承應五奏乾坤泰之曲滿庭芳春和玳筵安邦興國欽聖尊賢文英武烈于民便禮樂成全亨大業中庸不偏順天常節儉為先逹文獻嚴儀訓典孝敬億千年奏百戲承應六奏昌運頌之曲喜秋風文武安軍民樂宴文華㑹班僚五雲齊動鈞天樂賀春宮讃皇朝奏百戲承應七奏泰道開之曲沽美酒布春風滿畫樓對嘉景鳯凰洲髙捧金波碧玉甌設威儀左右分品從列公侯太平令效聖上誠心勤厚主宗器嚴備春秋諧律呂仙音齊奏欽王政皇天保佑拜舞頓首讃祝進酒千千嵗康寧福夀迎膳樂樂器戲竹二笙四笛四頭管四􅌙二琵琶二鼓三拍板二杖鼓四樂章水龍吟方響笙􅌙鼔樂喧排寳器開玳筵鸞儀旌節錦繡景相連簮纓趨進皆來朝春滿文華殿陞座還宮樂章千秋嵗與前同禮部志稿卷二十一
