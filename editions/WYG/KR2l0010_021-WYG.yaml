body:
  text: 禮部志稿卷二十一明俞汝楫編儀制司職掌宴禮宴有大宴中宴常宴小宴洪武永樂間兩定禮少異而樂半不同至嘉靖間有宮殿落成書成之宴今具列之而歴朝各例附于後大宴儀中宴常宴附洪武二十六年定是日尚寳司設御座於奉天殿錦衣衞設黄麾於殿外之東西金吾等衞設䕶衞官二十四員于殿東西教坊司設九奏樂歌于殿内設大樂于殿外立三舞雜隊于殿下光禄司官設酒亭于御座下之西膳亭于御座下之東珍羞醯醢亭于酒膳亭之東西設御筵于御座之東西設羣臣四品以上位于殿内之東西設羣臣酒尊食桌于殿外設五品以下位桌于東西兩廊司壺尚食各供乃事引禮引羣臣殿外東西相向立儀禮司跪奏請陞座駕興大樂作陞座鳴鞭樂止鳴賛引文武官四品以上由東西門入殿中横班北向立五品以下官列于殿外丹墀北向立樂作賛四拜樂止光禄司官進御筵大樂作捧案至御前樂止進花樂作進訖樂止光禄司至開爵注酒捧詣御前進第一爵酒教坊司跪奏一奏炎精開運之曲賛内外官皆跪教坊司跪奏進酒飲畢賛衆内外官俯伏興樂作賛四拜平身樂止賛各就位序班隨進羣臣桌㪚花樂作散訖樂止序班即進羣臣盞第二爵酒教坊司跪奏二奏皇風之曲樂作光禄司官斟酒御前序班隨斟羣臣酒教坊司跪奏進酒候皇帝舉酒羣臣以次舉飲訖樂止光禄司官進湯鼓吹饗節前𨗳至殿外鼓吹止殿上樂作羣臣起立光禄司官進湯御前羣臣復位序班即供羣臣湯樂止教坊司跪奏進湯樂作候皇帝舉箸羣臣次舉皇帝進湯訖賛饌成樂止武舞入教坊司跪奏平定天下之舞舞畢出第三爵酒教坊司跪奏三奏眷明皇之曲樂作進酒如前儀樂止教坊司跪奏撫安四夷之舞舞畢出第四爵酒教坊司跪奏四奏天道傳之曲樂作進湯如前儀食畢教坊司跪奏車書㑹同之舞舞畢第五爵酒教坊司跪奏五奏振皇綱之曲進酒如前儀飲畢教坊司跪奏百戲承應舞畢出第六爵酒教坊司跪奏六奏金陵之曲進酒進湯如前儀教坊司跪奏八蠻獻寳進呈舞畢出第七爵酒教坊司跪奏七跪長楊之曲進酒如前儀教坊司跪奏採蓮隊子承應畢出第八爵酒教坊司跪奏八奏芳醴之曲進酒進湯如前儀食畢教坊司跪奏魚躍于淵承應畢出第九爵酒教坊司跪奏九奏駕六龍之曲進酒如前儀飲訖光禄司官収御前爵序班隨収羣臣盞光禄司官進湯進大膳大樂作羣臣起立進訖復坐序班隨供羣臣飲教坊司跪奏進膳食訖賛膳成樂止光禄司官収膳訖教坊司跪奏百花隊舞承應舞畢出鳴賛唱撤案序班撤羣臣桌訖光禄司官即撤御案賛宴成羣臣皆出席北向立序班即撤羣臣座殿外官皆詣丹墀北向立賛鞠躬樂作賛四拜興平身樂止羣臣分東西立儀禮司跪奏禮畢駕興大樂作鳴鞭百官以㳄出續定大宴儀是日陳設如前儀駕自右順門至奉天門丹墀大樂作陞座鴻臚寺官賛拜百官四拜興平身樂止光禄寺官進御筵内官捧案進膳樂作設案畢樂止内官進花進膳樂作進訖樂止教坊司跪奏一奏上萬夀之曲侑食樂作内官斟酒捧爵至御案前鴻臚寺賛跪文武百官皆跪教坊司跪奏進酒鴻臚寺官賛俯伏興平身樂止賛各就位百官就位簮花訖教坊司跪奏平定天下之舞舞畢出教坊司跪奏二奏仰天恩之曲樂作内官斟酒捧爵至御案前教坊司奏進酒進酒畢樂止殿外𨗳湯樂作至殿内迎湯樂作内官捧湯至御案前教坊司奏進湯樂作鴻臚寺官賛饌成内官撤湯樂止教坊司奏黄童白叟鼓腹謳歌承應舞畢奏撫安四夷之舞舞畢教坊司跪奏三奏感地徳之曲樂作進酒如前儀樂止教坊司跪奏車書㑹同之舞舞畢教坊司跪奏四奏民樂生之曲樂作進酒如前儀樂止殿外𨗳湯樂作至殿内迎湯樂作内官捧湯至御案前教坊司奏進湯樂作鴻臚寺官奏饌成内内撤湯樂止教坊司跪奏表正萬邦之舞舞畢教坊司跪奏五奏感皇恩之曲樂作進酒如前儀樂止殿外導湯膳樂作至殿内迎湯膳樂作内官捧湯膳至御案前教坊司奏進膳樂作鴻臚寺官賛饌成内官撤湯膳并御筵樂止教坊司跪奏天命有徳之舞舞畢奏纓鞭徳勝蠻夷隊舞承應畢教坊司更進致語畢鴻臚寺官復賛四拜興平身樂止鴻臚寺官跪奏禮畢中宴常宴洪武六年定凡中宴禮儀同大宴但進酒七爵凡常宴同中宴但百官一拜三叩頭進酒或三爵或五爵而止嘉靖十年西苑仁夀宮落成宴儀是日駕詣無逸殿暫駐尚膳監設御幄于仁夀宮丹墀内光禄寺設各官宴桌于仁夀宮殿門内外東西相向教坊司設小宴樂舞如儀上乘板輿至仁夀宮各官及侍衛等官于殿門外東西序立迎候上降輿陞座鴻臚寺官賛各官于殿内行一拜三叩頭禮畢尚膳監設御筵訖鴻臚寺光禄寺堂上官侍儀給事中御史序班各依次立尚膳監進第一爵酒賛各官皆跪教坊司官跪奏進酒上飲畢各官俯伏興樂作賛行四拜禮畢樂止賛各就位鴻臚寺官拱聽綸音承㫖如常儀尚膳監官進第二爵酒樂作教坊司官跪奏進酒候上舉酒各官以次舉飲訖樂止尚膳監進湯鼓吹響節前導至殿門外鼓吹止樂作各官起立尚膳監官捧湯進御前各官復位樂止教坊司跪奏進湯樂作候上舉箸各官舉訖賛饌成樂止尚膳監進第三爵酒樂作教坊司跪奏進酒上飲訖樂止其第四爵第五爵俱如第三爵之儀尚膳監進膳鼓吹響節前導至殿外鼔吹止樂作各官起立尚膳監捧膳進御前各官復位教坊司跪奏進膳樂作候上舉箸各官以次舉訖樂止鴻臚寺官唱撤案尚膳監撤御案訖賛宴成各官入班賛行四拜禮畢分東西立鴻臚寺奏禮畢上乘輿還宮大樂作各官以次出豳風亭宴講官儀右與仁夀宮宴儀同嘉靖十五年進呈重書寳訓實録宴監録等官于謹身殿儀是日監録等官各具吉服于華盖殿東西門外候上陞殿樂作陞座樂止衆官入鴻臚寺官賛衆官入班樂作四拜興平身樂止内官捧御案樂作設宴畢樂止簮花教坊司官跪奏一奏本太初之曲管絃樂作内官斟酒捧爵至御案前鴻臚寺官賛跪監録等官跪教坊司官跪奏進酒鴻臚寺官賛俯伏興平身樂止賛各就坐衆官各就坐教坊司跪奏聖喜功臣慶賀之舞舞畢教坊司跪奏二奏仰大明之曲樂作内官斟酒捧爵至御案前教坊司跪奏進酒畢樂止殿外導湯樂作至殿内迎湯樂作内官捧湯至御案前教坊司跪奏進湯樂作鴻臚寺官賛饌成内官撤湯樂止教坊司跪奏賓鴻翺翔之舞舞畢羣仙朝聖隊舞承應教坊司跪奏三奏民初生之曲樂作進酒如前儀樂止教坊司跪奏二十八將封侯之舞舞畢教坊司跪奏四奏品物亨之曲樂作進酒如前儀樂止殿外導湯樂作至殿内迎湯樂作内官捧湯至御案前教坊司跪奏進湯樂作鴻臚寺官賛饌成内官撤湯樂止教坊司跪奏感洪恩之舞舞畢教坊司跪奏五奏御六龍之曲樂作進酒如前儀樂止殿外導湯樂作至殿内迎湯膳樂作内官捧湯膳至御案前教坊司跪奏進膳鴻臚寺官賛饌成内官撤湯并御案前樂止教坊司跪奏金安之舞舞畢朝聖隊舞承應隨奏賛語畢鴻臚寺官復賛四拜興平身樂止鴻臚寺官跪奏禮畢上還宮諸宴通例凡大祀天地次日慶成大宴文武百官及四夷使臣土官人等共位次公侯駙馬伯文職四品以上及學士武職都指揮使以上陞殿東西侍坐學士坐于文職四品官之上翰林院左右春坊經筵官六科都給事中左右給事中尚寳司卿少卿司丞通政司叅議大理寺寺丞國子監司業翰林院帶俸叅議太常寺寺丞鴻臚寺少卿寺丞順天府治中欽天監監正監副太醫院院使院判神樂觀提㸃道録司知觀等官中左門序坐皇親都指揮同知僉事等官都指揮同知僉事署都指揮僉事皇親正副千户百户所鎮撫兵馬副指揮外國副使尼嚕罕等都指揮使等官中右門序坐翰林院修撰等官六科給事中監察御史中書舍人陪祀郎中員外五府經歴都察院經歴都事照磨檢校司務翰林院帶俸官太常寺典簿博士等官犧牲所千百户詹事府主簿通事舍人鴻臚寺署丞主簿序班欽天監五官等官太醫院御醫等官指揮使同知僉事正千户副千户百户所鎮撫外國四夷人等丹墀東序坐指揮使指揮同知陪祀指揮同知僉事外國四夷人等丹墀西序坐其遇朝覲各布政司方面行太僕寺卿運使知府官員陪祀者與宴方面官列于中左門班次卿運使知府列于東丹墀班次衍聖公張真人與宴列于二品文武班次其餘真人領宴及以事故者亦領宴其法王佛子國師禪師僧官喇嘛俱于大慈恩寺宴内官一員侍宴先期禮部行各衙門開與宴官員職名畫位次進呈仍懸長安門示衆宴之日紏儀御史四人二人立于殿東西二人立于丹墀錦衣衞鴻臚寺禮科亦合委官紏舉宣徳八年命朝鮮黑婁琉球陪臣列于殿内東西班後侍坐天順三年令真人不必與宴賜饌與之四年尼嚕罕都督列于殿内西班後侍坐六年令安南陪臣迤北使臣列于殿内東西班後侍坐成化四年令修撰等官給事中御史中舍書人及錦衣衞堂上官凡近侍風憲者另列于丹陛下之東西稍北其陪侍官郎中員外郎以下及各衙門官分列于丹陛下之南嘉靖十年奏準行取坐營在外都指揮許與宴二十五年奏準進呈慶成宴圖掲帖紙劄工費于列部支取凡正旦冬至萬夀聖節洪武永樂間大宴並如慶成儀宣徳正統間朝官不與宴者給賜節錢鈔錠各處進表官亦令與宴免宴則通賜節錢凡立春元宵四月八日端陽重陽臘八等節永樂間俱于奉天門通賜百官宴用樂其後賜宴日早朝畢光禄寺面奏百官入班行叩頭禮駕還宮百官出宴于午門外不用樂宴畢復向闕行叩頭禮乃退凡皇太后夀旦正統四年賜百官宴于午門外凡東宮千秋節永樂間賜五府六部等衙門堂上官左右春坊科道近侍錦衣衞隨駕帶刀指揮千户等官及天下進箋官宴于文華殿并文華門東西廊王府進箋官并外國使臣宴于禮部宣徳以後宴于午門外纂修校勘書籍總裁等官嘉靖八年奏準以門館前一日賜宴于禮部命勲臣一員主席凡纂修書籍進呈賜宴于禮部嘉靖十五年題準纂修官雖已陞遷去任許一體與宴凡内閣大臣一品九年考滿賜宴于禮部命六部尚書侍郎都察院都御史侍宴凡進士賜恩榮宴于禮部命勲臣一員侍宴嘉靖間内閣四品特賜坐于二品之末凡武舉賜㑹武宴于中府命内閣大臣一員主席凡午門外欽賜筵宴嘉靖二十五年題準光禄寺將與宴官員各照衙門官品開寫職銜姓名貼主席上務于候朝處所整齊班行俟叩頭畢候大臣就坐方許以次照名就席不得預先入坐及越次失儀其各官宴餘桌面許令量帶一二人収領不得帶領多人跟隨有紊朝儀違者聽糾儀御史及鴻臚寺指名糾奏跟隨人役混擠者緝事衙門官校拿問凡文武官遇筵宴洪武初令四品以上官文東武西各照品級上殿侍坐五品以下于殿下丹墀内文東武西各照品級序坐其奉特㫖賜殿内坐者不在此限如在奉天門則四品以上官坐于門上五品以下官坐于丹墀内務要容止恭肅不許攙越喧嘩二十年令百官于奉天華盖謹身武英等殿筵宴奏事須穿履鞋方許上殿違者從禮部官監察御史儀禮司紏舉送法司如律嘉靖二十五年題准光禄寺專掌貼註該宴職名鴻臚寺專掌序列貼註班次每遇筵宴先期三日光禄寺行鴻臚寺查取與宴官班次貼註若貼註不明品物不備責在光禄寺若班次或混禮度有乖責在鴻臚寺大宴樂洪武間定殿内侑食樂樂器麾竿一柷一敔一搏拊一琴四瑟四簫四笙四笛四塤四箎四排簫一鐘一磬一應鐘一樂章一奏炎精開運之曲炎精開運篤生聖皇大明