官具朝服詣午門前行慶賀禮先一日内官設御座于午門樓前楹正中是日早錦衣衛設儀仗于午門前上位常服御皇極殿鐘聲止鴻臚寺跪奏請上乘輿樂作至午門樓上陞座樂止鳴鞭訖鴻臚寺官宣奏畢賛獻俘將校引俘至獻俘位北向立定俘跪于將校之前刑部官詣樓前中道跪奏云具官臣某奏云某官以某處所俘獻請付所司伺㫖傳下刑部官承㫖訖即同將校押出施行文武百官入班北向立唱排班班齊致詞官詣中道跪致詞稱賀訖賛鞠躬樂作五拜三叩頭興平身樂止鴻臚寺跪奏禮畢樂作駕興樂止百官以次退凡宣㨗凡各處奏捷鴻臚寺于早朝將差來人役引至御前宣讀捷音隆慶六年令擇吉宣捷至日不奏事次日行慶賀禮萬厯八年定凡大捷於常朝期宣奏捷音是日百官各具吉服候宣捷之後鴻臚寺官致詞行五拜三叩頭禮本日早即遣官薦吿郊廟行翰林院撰文太常寺辦祭品中捷以下止宣捷不行祭告慶賀禮監國皇帝有巡狩然後令皇太子或皇孫監國故其儀止見於永樂嘉靖間東宫監國永樂七年時駕幸北京一朝儀凡常朝於午門左視事其左右侍衛及在京各衙門官貟人等合啓事務如常儀若皇太子御文華殿官員人等承㫖召入者方許入凡在京文武衙門遇有内外軍機及王府切要事務悉奏請處分其有各處起報聲息即調邉軍勦捕仍遣人馳赴行在所奏聞皇城四門各城門守衛圍宿比常時皆須増撥官軍仍每日操閲軍馬如各衙門稱奉令㫖調遣官軍及處分事務所司須覆啓施行一慶賀凡遇萬夀聖節正旦冬至先期皇太子率文武百官于文華殿前拜進表文是日早設龍亭於文華殿中丹陛上設駕大樂鳴鐘鼓皇太子具冕服于丹陛上百官具朝服于丹墀内行十二拜如常儀禮畢儀仗鼓樂導表由中門出皇太子由左門送至午門還宫文武百官導至長安右門外文官五品以上武官四品以上及近侍官監察御史俱乘馬導至三山門外以表授進表官百官各回至期行吿天地夀禮是日早設香案於文華殿丹陛上設駕大樂鳴鐘鼓如常儀皇太子具冕服于丹陛上文武百官具朝服於丹墀内行八拜如常儀其在京文武衙門遇萬夀聖節禮部文職衙門共進表一通中軍都督府同公侯駙馬伯武職衙門共進表一通正旦冬至亦如之其正旦冬至千秋節文武百官于文華殿行慶賀禮如常儀其有王府遣人詣東宫前行禮即納其禮物宴賞差來人其應答禮者奏聞處分一祭祀凡遇享太廟祭社稷風雲雷雨山川之神預期勅皇太子攝祭其祀典神祇太常寺預期于行在所奏聞遣官行禮一宴賞凡四夷來朝循例宴之皇太子命禮部遣人送行在所正使人給鈔十錠從人五錠為道里費其每日賞賜有例者循例無例者臨時斟酌賞之其京衛軍士冬夏布絹及邉衛軍士冬衣綿布循例給賞其有折賞物色該部定議具啓施行一選法凡文選六部都察院翰林院太醫院欽天監堂上官尚寳司通政司大理寺太常寺光禄寺鴻臚寺國子監堂上掌印官六科都給事中并在外布政司王府長史有缺吏部奏請擢用其考滿黜陟并復職改用等項常選官員俱循例具啓銓注其武選除在京五府都督在外各都司都指揮缺員者及土官衙門奏保土人任職者兵部奏請擢用其餘襲替優給及例應陞降改調官員具啓銓注其土官例應襲替及保用通事把事隨司辦事長官該部具啓裁度餘悉奏請處分其内外大小文武官員俱從行在吏部兵部奏請銓選其有開設大小衙門該部奏請定奪一刑名凡内外文武大小官員有犯所司具啓准問者問之若皇親犯小事令其在家聴候具由奏請待報若所犯重情及干謀逆者即時拘執在官先命皇親㑹問若事有未當及犯人不服乃命公侯伯五府六部都察院大理寺會皇親再問畢將所服情犯及擬議罪名具啓候車駕回京奏請處分其在外王府䕶衛指揮并長史及土官有犯事干惡逆先行收問然後奏聞其餘所犯預奏待報提問其法司問擬罪合决死罪者奏請待報其餘所犯悉具啓决放如特奉令㫖原免者不拘此例一迎詔凡詔書至禮部設龍亭錦衣衛設儀仗教坊司設大樂文武百官各具朝服出三山門外奉迎使者到三山門外下馬候龍亭來捧至詔書于龍亭中使者立于龍亭之東百官行五拜三叩頭禮訖衆官乘馬前導使者上馬在龍亭後東邉行至長安右門下馬隨龍亭後東由中門入文武百官于承天門外橋南侍立東宫殿下具冕服于午門前五丈餘地奉迎至文華殿置龍亭于正中使者立于東宫殿下於殿前臺上樂作行五拜三叩頭禮畢樂止陞殿殿下展詔讀訖使者捧詔置龍亭中殿下送至午門内錦衣衛先設雲輿于午門外正中禮部官置詔書于雲輿中文武二品以上官迎至承天門鴻臚寺先設開讀案于承天門稍東文武百官入班賛禮唱排班班齊鞠躬樂作四拜平身樂止賛開讀使者取詔授開讀官跪受使者復立位所賛跪衆官皆跪開讀訖開讀官捧詔授使者復至雲輿中賛俯伏樂作四拜平身樂止賛搢笏鞠躬三舞蹈賛跪唱山呼萬嵗者三賛出笏俯伏樂作四拜興平身樂止賛禮畢百官以次退使者捧詔書出承天門外復置龍亭中鼓樂送至會同館使者見東宫殿下行四拜禮畢其日宴使臣于禮部本部官侍宴十二年奏定時駕北征凡常朝于文華殿視事其在京文武衙門凡有應合奏啓事件奏本俱逹北京敢有隠匿者治以重罪其在京衙門合具啓事務仍依常例若係應奏隨即具奏待報其東宫發落事件六科按月差人類送北京敢有于題本上増減改寫㫖意者凌遲處死全家籍沒其各衙門差人出外幹辦公事仍將所辦事務開具奏報凡祀典神祇合應遣官祭者太常寺預期具啓遣官行禮凡皇親并軍職王府䕶衛指揮長史等官與各處土官有犯者俱奏請提問在京文武衙門官員有犯者堂上官具奏待報發落五品以下者具啓拏問在外文職衙門官員有犯者方面及四品以上該衙門奏請提門五品以下具啓拏問十三年奏定凡京衛軍士冬衣布絹及邉衛軍士冬衣布花襖俱行在戸部奏請施行凡進春其日早文武百官各穿顔色衣服于文華殿門外侍班如常儀應天府置春案于文華門丹墀中道之東候東宫殿下陞座引禮引府縣官舉春案由東陛陞置于殿門外中道各就拜位賛鞠躬四拜平身禮畢文武百官慶賀行叩頭禮嘉靖十八年定時駕南巡一東宫朝駕儀仗等件勅内府各該衙門先行造辦一請勅欽命輔臣一員居守京師保䕶皇儲一應軍國機務悉聴啓行一在京文武衙門遇有内外軍機各王府𦂳要重大事務悉奏請處分其有各處啓報聲息即調邉軍勦捕仍遣人馳赴行在奏聞一皇城四門京城九門比常皆増撥官軍守䕶留守武職大臣同參賛尚書仍每日操閲軍馬各衙門稱奉令㫖調遣官軍及處分事務所司須覆啓施行一五府九卿各衙門凡有𦂳要重事俱逹行在所奏聞其每日進繳精㣲監生考勤宴賞鈔錠官軍俸糧及五府比試等項俱照常啓行一祭祀凡遇忌辰陵祭各常典祭至期太常寺啓請取令㫖遣官行禮郊廟社稷之祭候勅命行一各處拜進表箋特賀大禮不係常典者原差人恭詣行在所投進其進賀中宫東宫箋文俱在京禮部類收司禮監官捧進一各王府進慈孝獻皇后香并南京進香官朝鮮國弔使禮部啓請命司禮監官捧進几筵照例給賞綵段鈔錠一吏部㑹推在京堂上官六科都給事中在外方面官知府俱行在吏部奏請擢用其大選急選并取選逺方監生及考滿復職等項俱循例啓行一各王府請給勅誥兩京三品以上官廕子各處土官襲職俱行在吏部奏行其官吏人等丁憂查放起復官員付選查題散官等項俱照常啓行一兵部推補兩京五府錦衣衛在外總兵參將各都司掌印僉書俱奏請擢用其大選軍職查黄續黄官舍襲替優給土官襲替及保用通事把事隨司辦事長官等項俱具啓裁度一各處奏報邉功應該覈勘及勘明應該陞賞等項俱啓請行一在外撫按官劾奏不職文武官文官方面以上武官參將以上奏聞待報一京衛軍士冬夏布絹及邉衛軍士冬衣布花襖但係年例給賞等項錢糧該衙門啓請行一在京各邉鎮遇有𦂳急調用馬匹啓請調取兑用一在京各衙門赴行在奏事人俱兵部啓請給關應付一各王府奏訴重情辦復爵位禄米者俱詣行在所奏聞其請名請封請㛰等項在京具啓行一天下嵗貢生員到部者該部查照事例啓行一四夷朝貢人員到京一應賞宴該部照例啓行一法司問擬罪犯除重囚奏請待報其餘悉具啓决放勅諭審録矜疑罪囚例該覆題及京官軍職犯人例該參題俱奏請定奪一刑名凡内外大小官員有犯具啓准問者問之若所犯情重該衙門具由奏請待報一都察院㸃差各處巡按御史具奏行在餘差及考察公差回道御史俱啓行中間有推姦避事贓濫不職者具奏一通政司每日收過奏題本照常封進下科發抄各衙門啓行其有疑碍難行者差人赴行在取㫖一大理寺審録罪囚詳擬罪名干係生殺并提問大小京官具奏其每月繳刑部都察院問過囚犯奏本照常啓行俱送科備照皇太孫監國永樂時駕北征皇太子監國于南皇長孫監國于北後皇長孫行冠禮始尊稱皇太孫云永樂八年定一每日皇長孫于奉天門左視事侍衛如常儀諸司有事具啓施行若軍機及王府要務一啓皇太子處分一奏聞行在所一遇萬夀聖節設香案于奉天殿丹陛上皇長孫具色服于丹陛上行禮文武官具朝服于北京行禮行禮如常儀天下諸司表文俱諸北京進賀四夷朝貢俱送南京禮部啓皇太子施行一文選行在六部都察院等衙門及北京行部所屬衙門如有缺員應除補者五品以上行在吏部移咨南京吏部啓皇太子選補六品以下及考滿起復例應陞降復職及對品改用常選官撥用吏典俱循例啓皇長孫施行一武選行在五軍都督府及行在後軍都督府所屬衙門例應襲替優給降陞者行在兵部亦循例啓皇長孫施行其餘非常選者啓皇太子斟酌行之一内外軍吏軍民有犯所司啓皇長孫施行若皇親有犯小事令其在家聴候所司啓皇太子待報施行若所犯情重及干謀逆者即時拘執先命皇親會同若事未當及犯人不服乃命公侯伯五府六部都察院大理寺㑹皇親再問將所服情犯啓皇太子候車駕回京奏請處分其王府䕶衛指揮及長史有犯干惡逆者先行收問然後啓皇太子其餘有犯啓皇太子待報收問其行在刑部都察院北京行部議擬囚人應死者監候啓皇太子待報施行餘悉啓皇長孫裁决禮部志稿卷十四
