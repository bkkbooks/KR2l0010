body:
  text: 禮部志稿卷十四明俞汝楫編儀制司職掌經筵國初經筵無定日或令文學侍從之臣講説亦無定所正統初始著為儀常以月之二日御文華殿進講月三次寒暑暫免日講于文華穿殿其儀簡嘉靖初命儒臣進講大學衍義迨西苑無逸殿成命儒臣及經筵日講官六卿侍經筵官各撰尚書無逸詩豳風七月講義一道于無逸殿進講萬厯初増定午講儀視舊儀稍有損益今並列于後經筵講儀正統初定凡經筵初開勑勲臣一人知經筵事内閣學士或知或同知經筵事六部尚書左右都御史通政使大理寺卿及學士等官侍班翰林院春坊等官及國子監祭酒二貟進講翰林春坊等官二貟展書給事中御史各二貟侍儀鴻臚寺錦衣衛堂上官各一貟供事鴻臚寺鳴贊一貟贊禮序班四貟舉案勲臣或駙馬一人領將軍侍衛禮部擇吉題請先期直殿内官于文華殿設御座又設御案于殿内御座之東稍南設講案于御案之南稍東是日早司禮監官先陳所講四書經史各一冊置御案又各一冊置講案皆四書東經史西先期講官撰四書經或史講章各一篇預置于冊内是日早上御文華殿陞御座將軍侍衛如儀鴻臚寺官引知經筵及侍班講讀執事侍儀等官于丹陛上行五拜三叩頭禮畢以後每月初二十二二十二日止行叩頭禮以次上殿依品級東西序立知經筵官序于侍班官上侍儀御史給事中于殿内之南分東西北向序班二貟舉御案置御座前二貟舉講案置御案之南正中鴻臚寺官贊進講講官一貟從東班出一貟從西班出詣講案前稍南北向並立東西展書官各一貟從本班出進至御案之南銅鶴下東西向立鴻臚寺官贊講官鞠躬拜叩頭興平身畢東班展書官進詣御案前跪展四書畢起退立于東鶴下講四書講官進至講案前立奏講某書講畢稍退展書官詣御案前跪掩四書畢仍退立于鶴下西班展書官進詣御案前跪展經或史畢起退立于西鶴下講經史講官進至講案前立奏講某經或某史畢少退並立如初展書官詣御案前跪掩書畢仍退立于鶴下鴻臚寺官賛講官鞠躬拜叩頭興平身各退就東西班展書官隨之序班二員舉御案二貟舉講案退至原所鴻臚寺官賛禮畢命賜酒飯鴻臚寺官及各官皆跪承㫖出至丹陛上行叩頭禮至左順門酒飯畢入行叩頭禮嘉靖二年奏准八月二十二日恭遇憲宗純皇帝忌辰是日經筵官各具青緑花様衣服光禄寺仍具酒飯續更定具素服角帶十年十月初二日孝潔皇后忌辰令經筵官服青緑花様隨侍人員淺淡衣服隆慶元年定先一日告奉先殿告几筵先五日命司禮監同各官詣文華殿演禮是日上詣文華殿左室展禮先聖先師又定講章于前兩日先進呈覽凡假日先期傳免萬厯二年定春講以二月十二日起至五月初二日止秋講以八月十二日起至十月初二日止不必題請日講儀上御文華穿殿止用講讀官内閣學士侍班不用侍衛侍儀執事等官侍班講讀等官入見行叩頭禮東西分立先讀四書次讀經或讀史每本讀十數遍後講官先講四書次講經或講史務在直説大義明白易曉講讀後侍書官侍上習書畢各官叩頭退文華殿賜茶今不行文華門賜酒飯午講儀隆慶六年定每日早閣臣及講官講畢各退上進煖閣少憇司禮監將各衙門章奏進上御覽閣臣等退西廂房伺候上有所諮問即召至御前將本中事情明白敷奏覽本後閣臣率領正字官恭侍上進字畢若上欲再進煖閣少憇閣臣等仍退至西廂房伺候若不進煖閣閣臣等即率講官再進午講講通鑑節要候通鑑講完以貞觀政要進講講官務將前代興亡事實直觧明白講畢各退上還宫一每月三六九視朝日暫免講讀上于宫中有暇將講讀過經書從容温習或看字體法帖隨意寫字一幅不拘多寡一每日定以日出時上早膳畢出御講讀午膳畢還宫講大學衍義儀嘉靖六年定每月初三初八十三十八二十三二十八日用經筵日講官二員進講内閣學士一貟侍班講畢賜茶賜酒飯俱如日講儀無逸殿講儀嘉靖十年定先一日設司監官于無逸殿設御座御案及講案如文華殿月講之儀是日質明上具常服乘輦至無逸殿門衆官于門外迎候上降輦乘板輿至殿内降輿陞御座鴻臚寺官贊各官于殿門外入拜行一拜三叩頭禮畢進入殿内各照品級東西序立序班二貟舉御案置御座前二貟舉講案置殿門内西邉東向設坐位鴻臚寺官贊進講講官大學士一員出班行叩頭禮上命賜講官坐講官并鴻臚寺官承㫖賛叩頭訖展書官詣御案前跪展講章退講官坐講坐展書官詣御案前跪掩講章講官叩頭訖復班又大學士一員出班叩頭承㫖坐講展書官一貟展書俱如前儀序班二員舉御案二員舉講案退至原所鴻臚寺卿奏禮畢有㫖賜宴衆官承㫖訖退至豳風亭前迎候上陞版輿至亭内降輿陞御座賜宴儀具宴享東宫出閣講學儀太祖命學士宋濓授皇太子諸王經書于大本堂後於文華殿及肅皇帝改為便殿遂移於殿之東廂房初出閣儀天順二年定是日早侍衛侍儀如常儀執事等官于文華後殿行四拜禮畢鴻臚寺官請皇太子陞文華殿執事官導引至殿陞座師保等官于丹陛上行四拜禮畢各官退出内侍臣導皇太子至後殿陞座以書案進每日侍班侍讀講官入分班東西立内侍展書侍讀講官以次進讀叩頭而退每日講讀儀一每日早朝退後皇太子出閣陞座内侍以書案進不用侍衛侍儀執事等官惟侍班侍讀講官入行叩頭禮畢分班東西向立内侍展書先讀四書則東班侍讀官向前伴讀十數遍退復原班次讀經書或讀史書則西班侍讀官向前伴讀亦如之務要字音正當句讀分明讀畢各官退一每日己時侍班侍讀侍講及侍書官俟皇太子陞座畢入東西向立侍班内侍展書先講早所讀四書則東班侍講官進講一遍退復原班次講早所讀經史書則西班侍講官進講亦然務要直言解説明白易曉講畢内侍收書訖侍書官向前侍習寫字務要開説筆法㸃化端楷寫畢各官叩頭而退一午膳後是時已回宫從容逰息或習騎射一每日晩讀本日所授書各數遍至熟而止一凡讀書三日後一温須背誦成熟遇温書日免授新書講官通講須曉大義一凡寫字春夏秋月每日寫一百字冬月每日寫五十字一每遇朔望節假及大風雨雪隆寒盛暑暫停講讀寫字𢎞治十一年定是日早内侍設書案于文華殿内東禮部鴻臚寺執事官于後殿行四拜禮畢鴻臚寺官請皇太子陞文華殿導引至殿陞座三師三少并宫僚以次序于丹陛上行四拜禮畢從殿左右門入分班東西立通事舍人以書案進内侍展書侍讀官進讀讀畢侍講官進講講畢通事舍人徹案各官叩頭退每日講讀常儀與天順年同隆慶六年増定是日早侍衛侍儀如常儀内侍先設皇太子座于文華殿之東廂房正中西向設書架于座之左禮部鴻臚寺執事官候皇太子出閣導引至東廂房陞座提調輔臣并侍班講讀等官以次序立丹墀行四拜禮畢各官以次入東廂房分班相向立鴻臚寺官贊起案通事舍人以講案進内侍展書侍讀官進讀讀畢侍講官進講講畢通事舍人徹案命賜酒飯各官叩頭而退每日講讀儀與天順年所定同但每日各官先詣文華門外東西向序立候皇上御日講經筵畢皇太子出閣陞座又題准東宫初講之時閣臣連侍五日以後仍于每月三八日一至先行叩頭而出然後各官進入供事諸王讀書儀書堂在皇極門右廂房講官選部臣或進士改授翰林院官充之天順二年定初入書堂其日早王至右順門之北書堂面東中坐提督講讀并講讀官行四拜禮畢内官捧書展于案上就案左立講讀官進立于案右伴讀十遍叩頭退一每日講讀清晨王至書堂講讀官行叩頭禮伴讀十遍出飯後復詣書堂伴看寫字畢講書直説大意畢仍叩頭退内侍以所寫字送内閣㸃看萬厯六年詳定一是日王出閣先期一日内侍官設座于書堂内坐西面東設書案于座之左側置書于案設寫字案于座之右側置筆硯放紙于案是日早輔臣率領講讀侍書官於書堂門外稍南北面拱立伺候王入書堂内坐定令㫖説先生每來輔臣率各官進入行四拜禮分班侍立内侍官舉書案就案左立講讀官以次進立于案前授書各十遍訖令㫖先生每吃酒飯内侍官答應各官出王暫入書堂南間少憩輔臣再率各官入侍王寫字講書候王出坐定令㫖説先生每來輔臣同各官入照前分班侍立内侍官舉寫字案于座前侍書官進至案前看寫字寫畢内侍官徹寫字案舉講書案於座前講讀官以次進講畢各官行一拜禮出仍于書堂外向北立王進内各退輔臣看所寫字圈註于旁以備勸益一次日以後每日早王出書堂各官進見行一拜禮其授書講書看字並如前儀輔臣止侍看三日三日後講讀侍書官徑自如儀授書講書看字輔臣不預至寫字畢每日輪一内侍官捧倣紙送内閣圏註一王每日所讀書大學一本書經一本授書務要字様真正講書直説大意務要通曉先一日進講章三日一温書就温講仍進講章寫字先用影本以後寫熟對帖自寫一各官酒飯止是初入書堂時令㫖説一次以後不必再説只於講書罷令㫖與先生每茶吃内侍官答應嵗率為常一每年假日聖節前後通九日千秋節九日正旦初一日至二十日花朝一日清明一日端午前後通三日七夕一日中秋一日重陽前後通三日冬至前後通五日臘八一日除夕前五日每月朔望各一日遇大風雨暫免大寒大暑該住歇時請㫖定奪一講讀侍書官俱於歸極門南廊給與酒飯一先期一日各該内外執事官俱赴書堂演禮又令春講定以二月初旬起至五月初旬暫止秋講定以八月初旬起至十月中暫止又准題輟講之後内侍書官照常啟請尋温舊書及日寫字送閣圏註講讀等官遵先年事例半月恭詣書堂啓請誦書習講或别授新書等項以効忠益巡狩成祖未定鼎時以北京為行在嵗常巡幸至肅皇巡承天謁獻皇陵禮詳載大狩録各朝俱不行永樂七年北狩儀永樂六年定詔告天下諸司及各處鎮守總兵官知會一禮部預行各處凡有重事并四夷來朝俱達行在所仍俱本啓聞其餘事務奏啓俱達京師啓聞施行事有疑礙者在京各該衙門具奏取自上裁凡進拜表文達行在所箋文達京師一禮部預行經過所在軍民衙門俟車駕至官吏生員耆老朝見及預行北京畿内文武衙門令掌印官俟車駕至朝見一祭祀車駕將發奏告天地社稷太廟孝陵祭大江旗纛等神軷祭于承天門其經過處所滁州遣官祭滁陽王泗州遣官祭祖陵鳯陽祭皇陵祭淮闕里遣官祭先師孔子望祭㤗山縁途古先聖賢忠臣烈士祠墳禮部預期奏聞遣官致祭將至北京境上設壇祭北京山川等神車駕到北京奏告天地祭告境内山川等神一扈從在京馬步軍五萬人内馬軍一萬步軍四萬馬軍五千步軍五千充駕前軍餘馬軍五千步軍三萬五千分五軍率領每軍馬軍一千步軍七千以都指揮指揮千百戸管領錦衣衛仍選將軍五百人校尉二千五百人力士二千人一侍從五府都督各一貟首領官一員吏六人吏部堂上官一員文選等四司官五員辦事官二十貟歴事監生四十人秀才五十人吏十人户部堂上官一員北京等十三司官十三員辦事官十貟吏二十四人禮部堂上官二員儀制等四司官七員辦事官十貟吏十二人鑄印局官一員吏一人匠六人兵部堂上官一員武選等四司官七員辦事官五員吏十五人刑部堂上官一員浙江等十三司官十三員辦事官五員吏十三人工部堂上官二貟營繕司等四司官十員辦事官二十員吏十五人都察院堂上官一員浙江等十三道監察御史二十四員辦事官五員吏二十