body:
  text: 禮部志稿卷八十三明俞汝楫編宗廟備考廟祀薦幔褥正統十年十二月祭告七廟太皇太后皇考宣宗章皇考曰比者畿内野蠶成繭以絲來獻此誠天地和氣所致祖宗福佑所臻不敢自用謹用製成幔褥陳於神位伏惟鑒知量增奉先品物𢎞治三年八月南京太監陳祖生等奏請增奉先殿每日供獻品物禮部覆議謂徳懿熙仁四廟品物定自太祖高廟品物定自太宗豐儉適宜莫敢增損若謂朝廷盡祀先之禮欲其豐盛雖竭天下之奉亦何所不可致而其中牲口雜羞不過雞鵝糕餅其儉約如此蓋欲以儉徳示聖子神孫俾萬世守之以為家法者今臣下豈敢擅議增減但祖生料數少恐為廚役之累乞量為增給上以為然令間日增鵝一鷄二建議宗廟推尊正徳十年禮部右侍郎楊㢘言臣聞韓愈言宗廟常祭甚衆合祭甚寡太祖所屈之祭至少所伸之祭至多朱熹言合為一廟則所以尊其太祖者既褻而不嚴所以事其親者又壓而不尊以二說觀之大抵謂天子宗廟之禮一則不可合食於太廟之祭以尊其始祖一則不可四時羣廟之祭以各伸其尊二者當錯綜於其間也陳祥道云天子之禮春則犆祭夏秋冬則合享犆祭於其廟合祭同享於太廟程頤云歲四祭三祭合食於祖廟惟春則徧祭諸廟以二說觀之豈不以一於徧祭則太繁一於合祭則未當而欲斟酌於繁簡至當之間乎國家歲暮祫祭固合食於太廟之前殿四孟時祭復合食於太廟之前殿祫祭則以徳祖正南向之位而懿祖以下皆就東西之列時祭則亦以徳祖正南向之位而仁祖以下皆就東西之列誠如上四家之說則天子之禮歲暮祫祭為同堂異室之制當合祭於一堂堂如今之太廟前殿是也夏秋冬亦同所不同者無祧主爾每歲孟春犆祭為同堂異室之制者當合祭於一室今之太廟後殿九室是也如此則始祖之祭既致其尊羣廟之祭復申其尊所謂太祖雖有所屈亦有所伸至於復孟春之犆祭仍三時之合享事理最為簡當儀節不至繁多求之古禮蓋無不合以本廟言之太祖創業開基化家為國太宗貽謀燕翼卜宅遷都祖功宗徳百世不祧羣廟之中有此二廟則毎歲之祭一伸其尊此理之所不容已者若推其極我太祖受天明命勘亂開基勲業垂乎無窮聲教訖於四海自書傳所載以來求其功高萬世未見有此近年臣下之議亦多謂太祖宜於合祭正南向之位雖與程頤朱熹之論未合而往者議祧懿祖之初固不之取然亦可見於本廟之中孟春犆祭在太祖尤不可已也伏望下臣此奏俾文武臣僚集議可否後斷自宸衷則陛下奉先思孝之心庶幾得遂矣章下所司知之增七廟祠官嘉靖十四年太宗昭穆七廟增設祠官召見尚書夏言於平臺諭令不拘資格嚴加考選至是奏請將太常寺官生盡送本部考選擇可任寺丞者疏名請命其次協律贊理司樂等官第其等以上上可其奏令擇禮儀􅈺熟聲音洪亮充之祭按厥明行事儀嘉靖十四年上召大學士李時尚書夏言同到文華殿議及宗廟祭祀上曰祭以厥明視事為敬其脫履入殿恐古人禮意與今不同宜考議以聞於是言等上言按儀禮凡祭厥明行事晏朝乃闋故祭之日雞人夜嘑旦以嘂百官閽人設門燎蹕宫門廟門所以嚴有事也子路為宰與祭厥明行事晏朝而退孔子曰誰謂由也而不知禮是厥明行禮實所以致敬也故事四時之享秋孟以中夜三孟以日中蚤宴非時誠宜厥明行事晏成禮也古人席地而坐飲食用籩豆亦席地以設故侍坐於長者履不上於堂入則脫履出則内履雖以致潔亦便拜跪若今脫履上殿意者恐有履聲嫌於不恪然履以飾足為禮脫履雖若致敬而足不為飾亦近於䙝請自今宗廟祭祀俱用厥明行事太常寺先時陳設神宫監先是洒掃所司設燎廟庭錦衣衞具儀衞如常皇上不必脫舄陪祀等官俱用潔淨新履供事庶得合古宜今之道也制可燎罷之請改獻帝廟祀隆慶元年禮科左給事中王治上四事其一曰議宗廟之禮以隆聖孝謂先帝追崇獻皇帝大備尊稱誠萬世不刋之制至於入廟稱宗一事在今日猶有當議者葢獻皇雖貴為天子之父實未嘗南面臨天下而今乃與祖宗諸帝並列雖親為武宗之叔父然嘗北面武宗而今設位於武宗之右揆之古典終為未合故先帝於獻皇祔廟之後世廟之享猶不忘設是先帝之心亦自有不安者臣以為獻皇祔太廟於萬歲後不免遞遷若專祀世廟則億萬年不改惟陛下勅廷臣博考詳議務求至當以妥獻皇之靈以光先帝大孝章下所司太廟新茶薦宗廟呉元年三月丁丑朔宣州貢新茶上命内夫人親煮薦於宗廟初立祖廟呉元年九月太廟成四祖各為廟徳祖居中懿祖居東第一廟熙祖居西第一廟仁祖居東第二廟廟在宫城東南皆南向每廟中奉神東西兩夾室兩廡三門門皆設㦸二十四外為都宫正門之南别為齋次五間齋次之西為饌次五間俱北向門之東為神廚五間西向其南為宰牲池一南向製太廟祭器洪武元年詔製太廟祭器上曰今之不可為古猶古之不可為今禮順人情可以義起所貴斟酌得宜必有損益近世泥古好用古籩豆之屬以祭其先生既不用死而用之似亦無謂孔子曰事死如事生事亡如事存其製宗廟器用服御皆如事生之儀於是造銀器以金塗之酒壺盂􅊦每事皆八朱漆盤盌二百四十及楎椸枕簟篋筍幃幔浴室皆具上謂侍臣曰朕念創業之艱難日不暇食夜不安寢侍臣對曰陛下日覽萬幾不免有勞聖慮上曰汝曹不知創業之初其功實難守成之後其事尤難朕安敢懐晏安而忘艱難哉宗廟時享薦新洪武元年定宗廟時享之禮翰林學士陶安侍講學士朱升待制詹同等奏按禮古者禴祠烝嘗四時之祭三祭皆合享於祖廟祭於各廟者惟春為然自漢而下廟皆同堂異室則又四時皆合祭矣今四廟時享亦宜倣近制合祭於第一廟庶適禮之中無煩瀆也上命春特祭餘三時合祭是日太常又進宗廟月朔薦新禮正月以韭薺生菜雞子鴨子二月以水芹蔞蒿臺菜子鵝三月以茶笋鯉魚鮆魚四月以櫻桃梅杏鰣魚雉五月以新麥黄瓜桃李來禽嫩雞六月以西瓜甜瓜蓮子冬瓜七月以菱雪梨紅棗蒲萄八月以芡新米藕菱白薑鱖魚九月以小紅豆柿橙蟹鯿魚十月以木瓜柑橘蘆菔兔雁十一月以喬麥甘蔗天鵝鷀䳓鹿十二月以芥菜菠菜白魚鯽魚上覽畢謂羣臣曰宗廟之祀所以隆孝思也然祭之於後不若養之於先朕今不及矣嘗聞為人子者願為人兄其意謂為兄侍膝下之日早於養之日多也朕於子為人弟親存而幼不能以養及長富有天下則親沒矣雖欲以天下養其可得乎因悲歎久之命以月朔薦新儀物著之常典俾子孫世承之定太廟配享洪武元年十二月丁未享太廟以功臣廖永安俞通海張徳勝桑世傑耿再成胡大海趙徳勝配享設青布幃六間於太廟庭中内設配享功臣位籩豆各二實以粟牛脯葵葅鹿醢簠簋各二實以黍稷稻粱羊豕體各一遣官分獻其分獻儀皇帝行亞獻禮將畢分獻官各詣罍洗所盥手洗爵酌酒諸執事官皆酌酒於爵獻官進詣功臣第一位前上香奠爵諸執事官各進爵於各神位前讀祝官讀祝訖獻官復位其正祭祝文徳祖廟曰時維孟春禮嚴特享謹以牲醴庶品恭詣徳祖之廟以伸追慕之誠懿祖熙祖仁祖三廟文同配享祝文曰朕以孟春嚴奉廟祀追念忠烈輔成開基爰用牲醴陳於廟庭英靈如生尚其與享定太廟時享洪武元年更定太廟時享春以清明夏以端午秋以七月望日冬以冬至製藏廟冠服洪武元年十二月製太廟四代帝后冠服成初上詔中書省臣考古制製太廟四代帝后服事下太常議太常奏按中庸云設其裳衣註謂先祖之遺衣服祭則設之史記漢高帝陵寢衣冠月出遊高廟說者謂從高帝陵寢出遊高廟皆前王存日衣冠然事亡如事存禮固可以義起今太廟四代帝后尊號既上亦宜製為冠服藏於廟以象生時所存遇時享則陳之仍各製一襲以焚上可其奏遂命工部製帝服冕十二旒旒十二珠朱紘玉簪導兩瑱冠以金飾卷武冠服十二章𤣥衣六章繪日月星辰山龍華蟲纁裳六章繡宗彝藻火粉米黼黻素紗中單黼領蔽膝從裳色繡龍火山三章革帶玉鈎䚢玉佩五綵綬大帶素衣朱裏上緣以朱錦下緣以綠錦朱履朱襪后服鳳冠褘衣青質繡翟十二等素紗中單黼領革帶佩綬大帶蔽膝青色繡翟三等青履青襪至是成命各以二襲貯以金飾木匣藏於各廟仍别用八襲祝告焚之太廟帝后紗服丙申又製太廟四代帝后紗服成帝服用𤣥色畫紗衮衣大紅紗繡裳白紗中單白紗繡領大紅紗繡蔽膝紅白紗大帶后服用青紗褘衣大紅羅銷金緣絡玉色中單紅黼領青紗繡蔽膝大紅羅銷金緣絡青紅羅大帶銷金羅附帶時薦洪武二年二月辛酉詔凡時物太常先薦宗廟然後進御造太廟金器洪武二年三月造太廟金器成每廟壺一盂臺盞二爵二椀四肉楪十菜楪十槖四匙二筯二茶壺二茶鍾二香爐一香盒一花缾二燭臺二計金八千八十餘兩先是上欲造宗廟金器因諭禮官曰禮緣人情因時制宜不必泥於古近世祭祀皆用古籩豆之屬宋太祖曰我先人亦不識此孔子曰事死如事生事亡如事存其言可法今製宗廟祭器只依常時所用者於是造酒壺盂盞之屬皆擬平時之所用又置楎椸枕簟篋笥帷幔之屬皆如平生焉時祭用孟月洪武三年禮部尚書崔亮奏古者天子宗廟四時之祭皆用孟月夫孟月者四時之首因時之變致其孝思故備三牲黍稷及品物以祭至於仲季之月不過薦新而已今太廟祭享已嘗用孟月之制後改春用清明夏用端午秋用七月望日冬用冬至既與古制不同况冬至之日既行郊祀又復廟享難以兼舉今宜仍用四時孟月及歲除凡五祭其清明等節各備時薦享從之祝神稱名洪武三年詔翰林侍讀學士魏觀自今太廟祝文止稱孝子皇帝不稱臣凡遣太子行禮止稱命長子某勿稱皇太子著為令臨濠宗廟洪武四年正月建圜丘方丘日月社稷山川壇及太廟於臨濠禮部奏臨濠宗廟宜如唐宋同堂異室之制作前殿及寢殿俱一十五間殿之前俱為側階東西傍各二間為夾室如晉儒王肅所議中三間通為一室奉徳祖皇帝神主以備祫祭東一間為一室奉懿祖皇帝神主西一間為一室奉熙祖皇帝神主從之定祫禘祭禮嘉靖十年上問大學士張璁以禘祫之義因諭祫有時祫大祫今四孟時祫太祖未得居尊歲暮之祭混其輕重以大祫而兼節日之祭是祫義反輕以節日祭而兼祫義恐非所以尊孝祖宗之意卿可盡心詳論以聞璁對宗廟之禮聖明所見皆得禮義中正至於禘祭則祀其始祖所自出之帝於始祖之廟以始祖配之自出之祖無主於廟時設虚位此義自趙匡申之朱熹曰以始祖配而不及羣廟之主不敢䙝也此大禘之禮也如邱濬之議則欲正高皇帝為始祖而以徳祖為所自出之帝歲一禘祀蓋斷然可知耳至於大雩為禱雨之祭大享是明堂享帝之祭但禘祫欲復古禮則宗廟當復古制臣故未敢輕議上乃親為大禘圖以高皇帝為始祖以徳祖為所自出之帝如邱濬議以示璁諭之曰太祖開運肇基不可不尊隆太廟本是太祖廟當南向而享之他人及列聖雖不可並但生一世而南面至其為宗終不得一南面以享是亦未盡人情况孝子之心安乎又禘祭欲歲一舉恐失於常祀之同又大雩之祭雖是禱雨亦恐非專待旱時纔祭如曰龍見則雩可知古人用心不見是圖耳大享之義亦非專為大報禮簡而致委曲又亦非祭文王舉也必有意焉夫孟春既祈焉故季秋報之也朕意以為今以曲存更制為祈榖之祀恐有所祈而不可無其報耳璁對五年一禘三年一祫原非古制况奉欽定大禘圖以太祖為始祖以徳祖為所自出之帝太祖今享四時之祭若禘歲不一舉則徳祖終歲無祭於義未安今皇上既定每歲季冬大祫其大禘亦宜定於某月歲一行之為善至於大享之禮擬秋報以並春祈大雩之祭謂古人圖於不見仰惟聖明眞善用古禮得古人制禮之心當舉行無疑時春享期逼上以禘議未定乃先勅諭禮部朕惟太廟享禮尚未稱孝敬之情聖祖在御固宜尊徳祖居尊其在今日當以朕聖祖居始祖之位每歲孟春行時享之禮自太宗而下並各居一幄同日行禮夏秋冬三季仍於太祖之室相向行時祫禮如今之制冬季中旬擇吉日以歲時告終行大祫禮以徳祖居尊及懿熙仁三祖合享於太廟親王功臣配食於兩廡歲暮及時節祭歸之奉先殿行禮世廟止行四時之享歲暮之祭亦歸之崇先殿行禮即擇日預告具儀以聞禮部尚書李時言宗廟之禮所以事乎其先求之於理有所不合原之於情而有不安皆非禮也我太祖高皇帝四時享祭以壓於徳祖不得南面之位太宗文皇帝而下以同堂之制每祭止東西相向不得受特享之禮親王功臣分為臣子列坐於堂而天子拜跪於下皆於理不合於情未安兹遇聖明天啟考正祀典正南面之位以尊太祖孟春行時享之禮以尊列聖季冬舉大祫之禮以合祀祧廟之主移親王功臣配食於兩廡以别尊卑情順理安眞可以補舊制之未備垂萬世以常行臣等謹遵諭施行竊見舊祭止設衣冠似於禮未備宜每祭俱令太常寺官捧主安於前殿衣冠仍設孟春特享之禮每廟各具祝文若以次畢讀則誠意不無倦怠宜先讀高廟祝文畢則齊讀各廟祝文庶為適宜廟享舊儀三獻之禮令太常司之皇上止立於廟門之外今肇舉禘祫禮宜崇古宜於大祫特享上親行獻爵之禮又太常寺官奏禮畢請還宫舊儀叩頭作揖今宜止跪奏禮畢請還宫不必行叩頭禮庶免近䙝謹開具祭告日期及一應儀注以候聖裁上覽儀注有遍告九廟而無告徳祖及懿熙仁三祖之文復諭禮部昨所擬預告并特享宗廟儀俱有未安其預告止宜告太祖以伸尊崇之意我列聖亦必獲太祖命而後可安幽明豈有二理哉但又當告徳祖於寢殿奉主於祧廟中廟及當告祧廟三室後奉太祖主居寢殿中室至大祫日前期預告如故事又預告太祖朕以其事重擬祝用冊已具冊式矣又特享禮須要可繼亦使陪祀執事無久而怠之之患其另具奏以聞於是禮官復議臣考大明會典及往年祧廟儀注止告於奉祔神主不及祧主兹承聖諭欲告於徳祖及祧廟三室仰見皇上誠孝篤志思慮周悉非臣等拘泥舊聞者所能仰及但臣等考舊儀注必先撤祧主而後可以正遷主之位今徳祖神主尚正設於寢殿之中若候告祭太祖畢始告祭於徳祖臣等竊慮皇上方親捧太祖神主神主至寢殿既不宜仍安於舊設之位又不可以捧主行禮似為有碍宜於告祭之日先告徳祖及詣告祧祖三室然後親捧徳祖神主安於祧廟中後至寢殿捧太祖神主出於太廟殿中座上行告祭禮先後次序始無妨碍其親獻爵之禮已䝉皇上採納但大祫時享特享之時禮儀繁郁皇上遍詣各宗三獻俱親精力易倦有妨誠敬宜於大祫時於徳祖前時享特享時於太廟前三獻必親其列聖止親初獻至亞獻終獻令捧主大臣司之則至敬不盡假於所司而亦簡便可繼謹將一應儀注遵諭再擬以聞制曰可太廟必躬祭隆慶二年孟春享太廟上已命成國公朱希忠代祭行禮官請上親祭不允於是大學士徐階等疏言祭祀國家之大禮春祭四時之首禋在皇上必躬奉祼將而為孝為敬在祖宗列聖亦必得皇上之躬親而後來格來歆故孔子曰吾不與祭如不祭是非有甚不得已之事未有可以遣官代行者易曰萃亨王假有廟言萃聚精神總攝衆志之志莫大乎宗廟也仰惟皇上當萬國來王之初朝覲官會試舉人四夷朝使咸集闕下正宜致謹廟享以萃合天下之心而乃無故遣代恐非所謂萃之道也且自宫至廟其路不逺奠獻有數其禮不繁皇上躬一奉行勞亦不甚大以宗廟大禮雖勞且不當避况甚非勞者乎臣等謹披瀝上請惟聖明鑒允仍親詣太廟行禮上乃從之祧祔祀懿祖祧主𢎞治元年十月禮部奏去歲憲宗皇帝神主升祔懿宗皇帝神主奉祧而歲暮之祫當合毁廟之主而祭之安奉於徳宗皇帝室内以俟後殿之成今者始行歲暮祫祭宜遣官祭告至期更奏祫祭事宜行翰林院改撰祝文及令太常寺至期陳設懿祖皇帝御座於太廟正殿之左熙祖皇帝之上衣冠等物同時陳設祭畢仍舊安奉著為常典從之議二后題主遷祔隆慶元年禮部言孝潔肅皇后神主將祔太廟宜就奉先殿西夾室改題以俟遷祔孝烈皇后神主將專祀殿宜遷於西夾室同題以俟奉安又國家舊制太廟一歲五享而節序忌辰等祭則行於奉先殿若有别殿專祀則諸祭並行於别殿今孝潔肅皇后既祔太廟則奉先殿宜奉安神主孝烈皇后既改祀别殿則奉先殿原設神位亦宜奉遷乃奏上應行禮儀薦諡號莊肅皇后諡議嘉靖十四年禮官以大行莊肅皇后諡為請上命會官議奏於是文武諸臣及科道等官會東閣集議大學士張孚敬曰莊肅皇后與累朝事體不同其諡冊之文止宜二字四字禮部尚書夏言曰今在廟列聖元后俱十二字恐二字四字未稱大學士李時曰二字四字太少須得八字孚敬曰禮官謂何言曰請諡者禮官之職定諡者翰林之事今衆議未協當請上裁都御史王廷相曰莊肅作配武宗今日之事似應一體吏部左侍郎霍韜曰諡者天下之公非天子自行之宜備陳以請言等乃集上其議因奏曰昔周公之制諡法非使臣議君子議父也葢諡以尊名節以壹惠雖以君父之尊必稱天以諡之示不敢私也古人尚質諡法簡嚴故稱美之言無幾後世帝后之諡始有不一其書者亦臣子尊崇之情所謂以義起者也生今之世則當行今之禮本朝列聖元后之諡皆十二字夫大行盛名帝后嫓美妻以夫尊禮宜與並武宗廟諡既與列聖相同則莊肅諡號似亦不當稍異且今號諡祗以表行尊名為典其於服制有無名分尊卑本不相涉皇上特命會官集議者祗欲考據懿行以定諡盡人道之終始耳非議字數之增減也况二字四字八字之擬於禮無據而十二字之擬似為累朝事例宜今日所當遵者若上冊行禮自當别議儀節以避抗尊之嫌奏入上覽之不悅曰朕與皇兄義乃手足昔方受命之初猶在藩服有臣子之道今受命即位兹遇皇嫂之喪無有事嫂如事母之禮矧兩宫在上而昭聖皇太后有母道所壓尤為未便再會官議擬歸一以聞於是復集東閣議成國公朱鳳等太子太保吏部尚書汪鉉等皆曰今日定諡之議聖諭甚明昨禮部惟以莊肅皇后大行固上同於列后若論大分實上壓於兩宫遽加全禮委於皇上有倫理之嫌今日大行莊肅皇后諡議止宜且據諡法二字以表稱懿行俟他日再加徽號以備全典庶幾情理兩得議上得旨既復議歸一皇嫂諡用六字曰孝靜莊惠安肅毅皇后數既用半且隂六又合其令翰林院撰冊文禮部具儀擇日以聞孝潔皇后諡議嘉靖十五年禮部尚書夏言等奏悼靈皇后神主先因祔於所親暫祔奉慈殿孝惠太后之側兹三后神主既擬遷於陵殿則悼靈亦宜暫遷奉先殿旁室歲時享祀祀及有祭告祖宗則一體設饌而但不啟主匱不見祝稱斯為合禮又先皇后正位中宫七年懿行純徳足以母儀天下其原諡悼靈考之諡法在悼雖協年中早夭之義而靈義有六類非美大之稱請下翰林院更議褒稱垂示後世上從其言詔改諡曰孝潔陵殿三后稱號嘉靖十五年面諭禮卿夏言曰三后神主稱皇太后太皇太后者乃子孫所奉尊稱今既奉遷陵殿實同帝后之列揆之名實於禮未宜似當更正卿其會翰林院禮科詳議具聞至是言等議曰禮天子惟一帝一后配享於廟禮之正也兹三后神主禮不祔廟義當從祧已經聖明定制遷奉陵殿深合典禮但三后稱皇太后於奉慈殿乃子上尊號於母孫上尊號於祖母禮也若今日孝肅太皇太后奉遷於裕陵實在英宗睿皇帝孝莊睿皇后之側孝穆皇太后孝惠太皇太后奉遷於茂陵實在憲宗純皇帝孝貞純皇后之側則當各從夫婦之義而不當仍襲子孫之稱臣等據禮僉議請改題孝肅太皇太后神主止稱孝肅貞順康懿先烈輔天成聖皇后不用睿字孝穆皇太后神主止稱孝穆慈惠恭恪莊僖崇天承聖皇后孝惠太皇太后神主止稱孝惠康肅温仁懿順協天佑聖皇后俱不用純字則庶嫡之稱有别夫婦之分無嫌而尊尊親親之道兼隆而無失矣上曰卿等既會議僉可其如議配享太廟合祭功臣配享洪武四年定太廟合祭功臣配享先是特享太廟命以青布幃列功臣之位於廟庭中俾預配享既而以親王與功臣分祀於兩廡遂罷幃設之次及是合祭上謂中書省臣曰太廟之祭以功臣配列於廡間然合祭之時朕意祖宗之神具在使功臣故舊之沒者得少依神靈以同享祀則不獨朝廷宗廟之盛典亦以寓朕眷念功臣不忘之意也其定合祭配享之位以聞於是禮官奏凡合祭之時於太廟内為黄布幄殿設兩廡中設祖考神位親王及功臣列於兩廡每行禮既奠獻祖考則遣大臣各分獻兩廡制可重建配享功臣位次嘉靖十六年武定侯郭勛請以始祖開國功臣郭英從祀得旨郭英同時贊佐皇祖功臣準配享太廟因命禮部開注功臣位次以聞至是禮部上言祖宗時定列功臣位次皆序封爵首王次公次侯次伯洪武功臣以徐達等自為序永樂功臣以張玉等自為序今觀廟廡所列以誠意伯劉基列於六王之次羣公之上似為不倫今因營國公郭英定列從祀之時亦照封爵定列上請聖裁得旨廟中配享與朝廷宴禮相同豈可懷私位次一以爵序各殿室别建奉先殿洪武三年上謂禮部尚書陶凱曰事死如事生朕祖考陟遐已久不能致其生事之誠然於追逺之道豈敢怠忽復感嘆曰養親之樂不足於生前思親之苦徒切於身後今歲時致享則於太廟至於晨昏謁見節序告奠古必有其所爾考論以聞於是凱奏宋太廟一歲五享宫中自有奉先天章閣欽先孝思殿奉神御畫像天子日焚香時節朔望帝后生辰皆徧祭用常饌行家人禮古者宗廟之制前殿後寢爾雅曰室有東西廂曰廟無東西廂有室曰寢廟是棲神之處故在前寢是藏衣冠之處故在後自漢以來廟在宫城外已非一日故宋建欽先孝思殿於宫中崇政之事以奉神御今太廟祭祀已有定制請於乾清宫左别建奉先殿以奉神御每日焚香朔望薦新節序及生辰皆於此祭祀用常饌行家人禮奉先殿祭儀奉先殿成殿建於宫門内之東南向正殿五間深二丈五尺前為軒五間深一丈二尺五寸遂命禮部製四代帝后神位衣冠并定諸祭儀物及常用祝文於是禮部定議每日朝晡上及皇太子諸王二朝皇后率妃嬪日進膳饈每月朔薦新正月用韭薺生菜鴨子雞子二月水芹臺菜蔞蒿子雞三月新茶笋鯉魚四月梅杏櫻桃黄瓜彘雉五月來禽茄子桃李大麥小麥嫩雞六月蓮子西瓜甜瓜冬瓜七月梨棗菱芡蒲萄八月新米粟穄藕芋茭白嫩薑鱖魚九月栗子橙小紅豆鯿魚十月山藥柑橘兔十一月蕎麥甘蔗鹿獐雁十二月菠菜芥菜白魚鯽魚其品物太常司官每月奏聞送光祿寺供薦新獻新則凡遇時新品物太常司官亦每月奏聞送光祿寺供獻其常用祝文正旦曰正旦之吉萬象維新追念恩徳不勝感慕謹具牲醴庶品恭率眷屬詣廟獻祭十月朔則曰時維孟冬氣候初寒冬至則曰冬至令節陽氣初生上元清明端陽中元重陽等節則曰時維某節禮嚴常祀餘並同前奉先殿神主式上將幸臨濠諭中書省臣製奉先殿四代帝后神主及龕須精緻朕還日視其成禮部遂奏神主之制高一尺二寸闊四寸趺高二寸用木為之飾以金縷以青字神龕高二尺闊二尺趺高四寸朱漆鏤金龍鳳花板開二窗施紅紗側用金銅環内織金文綺為藉從之奉遷三后主於陵殿嘉靖十五年庚午詔禮部㑹廷臣議奉遷三后神主於陵殿先是上諭尚書夏言曰廟重於陵禮制故嚴廟中一帝一后陵則二三后配葬今别建奉慈殿不若奉主於陵殿為宜且梓宫配葬而主乃别置近於黜之非親之也此關典禮其會議以行言既會内閣覆奏上上曰然此與崇先殿不同周人祀后乃始祖之母今奉慈殿但名存耳四時之祭舞樂俱無其會官議聞至是禮部會廷臣上議曰自古天子惟一帝一后配享於廟所生之母别薦於寢身歿而已斯禮之正故禮有享先妣之文周閟宫宋别殿皆此義也我孝宗皇帝於奉先殿側特建奉慈殿别祭孝穆皇太后後祔孝肅太皇太后近復祔孝惠太皇太后葢子祀生母以盡終身之孝焉爾然禮於妾母不世祭疏曰不世祭者謂子祭之於孫則止明繼祖重故不復顧其私祖母也今陛下於孝肅曾孫也孝穆孫屬也孝惠孫也禮不世祭義當擬祧若崇先殿之建則陛下以子事考廟當世享故世廟配太廟而作崇先殿配奉先殿而作也義不侔矣臣考宋熙寧罷奉慈廟故事與今事略同但祧義惟適主為重若當時瘞主陵園則襲故人栗主既主乃埋桑主之說而誤用之非禮也今聖諭遷主陵廟歲時祔享陵祀如故尤為曲盡非前代所及請即諏日具儀行報可皇后别殿專祀隆慶元年二月禮部言國朝廟制一后配帝其禮甚嚴如先年孝肅皇太后孝穆太皇太后孝惠太皇太后神主皆祀於别所今孝烈皇后改題神主宜勅所司於大内别建殿宇奉安以副皇上一體孝事之意上命禮部官定議以聞至是上議言列后奉祀别所例有二端非祀於大内之别殿則祀於陵寢然内殿之祀似近而專陵寢之祀稍疎而逺今孝烈皇后以先帝祀之則位非元配太廟祔享之禮固當遷改以皇上祀之則分為母后近方祗奉尊稱若使遽遷於陵寢則於皇上追崇之孝臣民瞻戴之情均有未安臣等反復詳議惟大内别殿之祀為當疏入得旨俱如議行遂以景雲殿奉孝烈皇后專祀罷玉芝宫祀隆慶元年二月禮部言睿宗獻皇帝慈孝獻皇后既升祔太廟奉祀内殿凡行禮之日已與列聖同臨鑒享而復有玉芝宫諸祭祀似為煩數請悉罷之止存日供之膳上謂玉芝祀典出自皇考孝思復命詳議以聞於是尚書儀等復言我朝宗廟之常禮如每年四孟及歲暮大祫則止行於太廟大小節辰及列聖考妣忌辰則止行於内殿未嘗有并祭者國有大事或告於太廟或告於内殿亦未嘗有并告者今於玉芝宫則無所不祭無所不告是列聖皆一祭一告而睿宗兩祭兩告也其在先帝行之則以為豐於禰未為不可今睿宗於皇上為皇祖凡事必兩祭兩告則逺而列聖近而先帝皇上將何以處之此所謂禮之難行難繼者也至於日供之膳則有可言者謹考南京奉先殿奉太祖以上列祖神位於中迨北京奉先殿成南京奉先殿各祭俱罷而供膳至今不輟葢以奉安神位之所而特存有舉莫廢之義也今玉芝宫既為睿宗原廟近又設有二聖神位故臣等以為日供之膳宜加舊奉設而悉罷其四時享祫及節序忌辰并有事奉告之祭庶國家之典禮先帝之孝思可以兩全上從其議時享酌定時享與陵祭重複嘉靖十四年上召禮部尚書夏言至文華殿諭曰清明節既遣官上陵行禮内殿復有祭祀似涉煩復卿宜從容講明越數日復召對於文華殿言因請更正其禮上即令議聞於是言上奏曰祭祀之典有禮有義祭不欲疏疏則怠祭不欲數數則煩不疏不煩協禮與義事神之道盡矣我朝祀典之在宗廟為有司所掌者如特享時享祫祀禘祭俱經皇上稽古定制足應經義可為世法惟是上陵之禮儀及奉先殿一應祭祀多沿前代故事况掌在内庭容有禮官所未及知者比䝉聖諭所及臣竊加討論於陵祀一節誠有可議國家上陵之祀每歲凡三清明中元冬至是也夫中元係是俗節事本不經往因郊祀在正首故冬至有上陵之禮葢重一氣之始用伸報本之義云耳今皇上先復郊典於冬至既行大報配天之禮則追報本始於郊禋為重而陵祀為輕况有事南郊之日乃輟陪祀臣僚逺去山陵恐於尊祖配天之誠若有所分臣愚以為冬至上陵可罷而中元陵祀遣官之禮可移於霜降日舉行惟清明節上陵如舊葢清明禮行於春即禮經所謂雨露既濡君子履之有怵惕之心者也霜降禮行於秋即所謂霜露既降君子履之有悽愴之心者也夫雨露之降草木實先被之於是有陵墓之思義斯切耳若夫二節既有遣官陵祀之典則内殿之祭誠不宜重復舉行庶幾合禮與義而可以垂示永久矣議入上曰内殿祭儀已别諭卿同輔臣議奏上陵遣祭春以清明秋以霜降冬至已止於奉先殿有祭并中元仍遣官詣陵祭祀各衙門官不必去著為令孟夏薦麥嘉靖十四年初薦新麥於内殿賜百官麥餅先是上諭尚書夏言曰内殿禮儀四月八日俗事宜革去但有賜百官不落夾之例此當議改日行已復諭曰禮記月令篇謂是月麥先熟以薦寢廟今可據此義歲以孟夏之五日薦内殿賜百官仍具米食造如舊名麥餅卿可與輔臣議聞於是言及大學士張孚敬李時奏曰四月八日例賜百官不落夾者相沿釋氏之說於禮無據及考禮經歲月令篇是月薦麥寢殿葢重五榖之先以薦新也兹䝉聖諭仰見皇上據經析禮不因故襲俗得先王遺意可垂萬世請著為令許之兩妃位次祭器成化二十一年十月太常寺以英廟惠妃節朔致祭并與英廟賢妃位次祭品為請上曰惠妃位列賢妃之次冬至用素羞於柩前祭之忌辰享忌辰禮俱用宋制永樂元年庚辰禮部尚書李至剛等奏五月初十日恭遇太祖高皇帝忌辰考宋會要凡國忌前後各二日不行刑不視事不舉音樂禁屠宰百官赴景靈宫奉眞殿行香今謹議得忌辰前期二日上服淺淡衣服御西角門視事至日早於奉先殿祭祀初八日至初十日不鳴鐘鼓不行賞罰不舉音樂禁止屠宰文武官自初八日服淺淡衣服黒角帶侍朝至日早赴孝陵行禮從之仍命八月初十日孝慈高皇后忌辰禮亦如之於是至剛復言宋制凡忌日於各佛殿誦經設帝后位百官行香今後宜依宋制於天禧寺五寺并朝天宫令僧道誦經三晝夜上曰子於父母固當無所不用其心但人君之孝與庶人之孝不同為人君者奉天命為天下主社稷所寄生靈所依但當謹身修徳深體天心恪循成憲為經國逺謨使内無邪奸外無盜賊宗社奠安萬民樂業斯孝矣如不能此而惟務修齋誦經抑末矣忌辰視事儀正統元年五月行在禮部上祖宗忌辰禮儀先是上謂尚書胡濙曰朕念祖宗恩徳深厚每遇忌辰良切悲感食稻衣錦豈心所安爾禮部其與翰林院詳議以聞至是大學士楊士竒楊榮學士楊溥議每歲遇太祖高皇帝孝慈高皇后太宗文皇帝仁孝文皇后仁宗昭皇帝忌辰上服淺淡色衣不鳴鐘鼓於奉天門視事宣宗皇帝忌辰小祥之日上服淺淡色衣不鳴鐘鼓於西角門視事從之忌辰免奏事𢎞治十六年八月吏部尚書馬文昇言臣伏聞宣徳間有旨仁祖忌辰諸司悉免奏事自太祖至仁祖生忌俱輟朝一日其後不知始於何時仁祖忌辰照常奏事惟太祖至憲宗忌辰百官淺淡服色黑角帶朝廷亦出視朝鳴鐘鼓奏事與親王及文武一品官忌日輟朝事例反有不同且與古禮未合又與宣宗勅旨有違臣切思之自仁宗至憲宗世有逺近服有隆殺臣愚欲自仁祖忌辰至英宗睿皇帝生辰照舊視朝鳴鐘鼓百官淺淡服色黒角帶奏事若遇憲宗皇帝孝穆皇太后忌日皇上於奉先等殿祭祀畢回宫不出視朝著淺淡服進素膳淵黙以居不與他事或如宣宗聖旨自太祖至憲宗生忌照例俱輟朝一日若遇憲宗皇帝孝穆皇太后忌日仍如臣前所擬而行上令禮部稽考古禮詳議以聞禮部謂古禮經傳所載忌日謂親死之日則死日為忌而非謂生辰也其曰忌日不用不以此日為他事也曰忌日不樂是不可舉吉事也是則此日當專意於哀思父母其餘一切事務皆當不舉也文昇所奏固為有見但奉有先朝事例迄今見行不敢更易伏乞聖明裁斷上曰列聖忌辰已有旨淺淡服色視事矣陵寢備考陵制皇陵改葬吳元年上至濠州追念仁祖太后始葬時禮有未備議欲改葬問博士許存仁等改葬典禮當何據存仁等曰禮改葬易常服用緦麻葬畢除之今當其禮上愴然曰改葬雖有常禮父母之恩豈能盡報耶命有司製素冠白纓衫絰皆以麄布為之起居注王禕曰比緦為重矣上曰與其輕也寧重時有言改葬恐泄山川靈氣乃不復啓葬但增土以培其封陵旁居民汪文劉英於上有舊召至慰撫之遂令招南陵黨二十家以守陵墓命有司復其家陵號不祭告洪武元年上仁祖淳皇后陵名曰英陵初禮部尚書崔亮以為歴代諸陵皆有名號今仁祖陵宜加以尊名上乃定曰英陵亮復奏請下太常行祭告禮時太常博士孫吾與以為山陵之制莫備於漢凡人主即位之明年將作即營陵地以天下貢賦三分之一入山陵如漢文帝起灞陵欲以北山石為槨時文帝尚在尊位豈有陵號祭告之禮乎又唐太宗昭陵之號定於葬長孫皇后時武后合葬乾陵其號定於高宗初葬之日其時帝后之陵初未有兩號其於祭告之禮決無有也葢廟號與陵號不同廟號是易大行之號不祭告不可也故必上冊諡以告之神明若陵之有號者則後之嗣王所以識别先陵而已故歴代皆不以告今英陵加號尚書崔亮欲行祭告臣竊以為非禮之宜願罷其說亮曰加上陵號尊歸先世考之典禮如漢光武加上先陵號曰昌宋太祖加上高祖陵曰欽曾祖陵曰康祖陵曰定考陵曰安葢創業之君尊其祖考則亦尊崇其陵既尊其陵亦必以告禮緣人情加先帝陵號而不以告先帝者非人之情也臣以為告之是於是廷議皆是亮遂命俟英陵碑石成遣太常行祭告禮孝莊太皇陵殿祀議𢎞治十七年上御西角門朝退遣内官召大學士劉健李東陽謝遷至内門煖閣素幄中上起立曰陵廟事須商量健等對曰昨䝉遣太監扶安諭示孝莊睿皇后葬未合禮欲為釐正此盛徳事臣等仰見皇上聖孝高出前古不勝嘆慕上袖出裕陵圖一紙指示曰此未合禮昨見成化年彭時姚䕫輩奏章先朝大臣忠厚為國如此先帝亦甚不得已耳健等對曰誠如聖諭但今日斷自聖衷則天下臣民無不痛快垂之史冊萬世有光矣上曰欽天監言恐動風水朕已面折之今日開壙合葬不為動風水乎皇堂不通則天地否塞通之則風氣流行惡得言動惟一㸃誠心為主料亦無害皆曰皇上一念孝誠可以格天吉无不利上曰此事不難若祔廟之禮尤所當講健等奏曰先年議奏已定慈懿太后居左今大行太皇太后居右合祔裕陵配享英廟且引唐宋故事為証臣等以此不敢輕議其實漢以前惟一帝一后唐始有二后宋亦有三后並祔者上曰二后已非三后尤為非禮事須師古末世鄙䙝之事不足學太皇太后鞠育朕躬恩徳深厚朕何敢忘但一人之私情耳錢太后乃皇祖冊立正后我朝祖宗以來惟一帝一后今若並祔乃從朕壊起恐後來雜亂無紀極耳且如孝莊太后朕生身母止尊稱為皇太后别祭於奉慈殿今仁夀宫前殿儘寛大意欲奉太皇太后於此他日奉孝穆太后於後殿歲時祭享一如太廟不敢少缺健等皆未敢應上曰此事却難處仍舊則理有未安更之則違先帝之意又違羣臣會議會議猶可奈先帝何朕嘗思之夜不能寐先帝固重而祖宗之制為尤重耳然朕亦難於降旨可議行之健等對曰此事重大非廷議不可退乃上疏言成化四年間慈懿皇太后崩逝之日羣臣會議有二后並配之文竊聞先帝遇天下難處之事羣臣為委曲將順之詞或者不能無疑焉伏望特勅禮部仍會集羣臣咨詢衆議稽本朝祖宗之廟制質古先聖王之訓典務合大公允歸至當上命禮部會多官稽考典制詳議以聞於是會集英國公張懋吏部尚書馬文昇等議謂宗廟之禮乃天下之公議非子孫得以私之自古昔以來殷周七廟父昭子穆各有配座一帝一后禮之正儀葢隂陽相配之理也下至春秋以魯隱之國而書考仲子之宫胡安國傳云孟子入惠公之廟仲子無祭享之所以此觀之春秋之世去先王未逺魯秉周禮先王之制猶有存者祖廟無二配故也先王之制槩亦可見伏覩憲祖皇帝成化四年勅諭羣臣有曰朕心終不自安敢竊窺我先帝之至情以重違慈意不得已而勉從羣臣並配之議羣臣欲權以濟事亦不得已而進此議也據正禮而區處適宜以上副先帝在天之遺志端有待於今日稽之周禮有祀先妣之文疏云姜嫄也是則太母得特立廟以專祀自周然矣詩所謂閟宫是已唐宋禮制無常初正終亂固無足言但其間推尊太后不配食祖廟者則别立殿以享之亦得閟宫之義至我國朝祖宗太廟之建一遵古典迄今已溢九廟廟皆有配配皆無二又於禁庭内建奉先殿得以朝夕供薦仰惟皇上繼統動率舊章今大行聖慈仁夀太皇太后所有奉安神主宜於奉先殿之外相應處所建一新廟如詩之閟宫宋之别殿歲時薦享一依太廟奉先殿之儀祀專而且近禮勤而且便矣隆名徽號仍稱太皇太后極其尊崇永受萬年之享則情義兩盡議上上即復召大學士劉健等至素幄上袖出奉先殿圖指示其西一區曰此奉慈殿也又指其東一區曰此神廚也欲於此地别建殿奉遷孝穆太后神主併祭於此如何健等皆對曰最當又問位次如何皆對曰太皇太后中一室孝穆太后或左或右一室上曰須在左後來有如此者却居右耳於是上親批會議本曰祀享重事禮當詳愼卿等稽考古典及祖宗廟制既已明白都准議特建廟奉享仍稱太皇太后以伸朕尊親之意後世子孫遵守崇奉永為定制於是中外翕然稱為得禮葢自庚申之召不奉接者已閱五年至是連奉顧問龍顔温霽天語周詳視昔有加而明習國事洞察義理惓惓以宗廟綱常為已任有非臣下所能涯涘矣後陵事竟不行葢欽天監以為歲殺在北方向不利内官監亦謂事干英廟陵寢聖意終不得已乃於陵殿神坐奉移英廟居中孝莊居左而孝肅居其右云預定夀宫規制嘉靖十五年五月初上謁陵還召見輔臣李時禮部尚書夏言於行宫諭以務建夀宫規制謂宜略倣長陵重加抑殺紙衣瓦棺朕所常念其享殿以磚石為之地中宫殿器物等舊倣九重法宫為之工力甚鉅此皆虚文且空洞不實宜一切釐去不用至是言等擬上圖制上命會同侯郭勛禮工二部翰林院講讀諸臣通將皇妃從葬之式總擬定圖進覽於是諸臣議奏皇上過於貶損無以稱臣子尊崇之禮其享殿明樓寳城請量依長陵規制其地中宫殿等項請存其制至於列聖諸妃從葬之制具載會典今擬於外垣之内寳城之外左右相向以次而祔庶為合禮上乃從之陵祭遷祀懿文太子主於陵園永樂元年戊寅遣安王楹祭告懿文太子遷其主於陵園葢建文初尊諡懿文為孝康皇帝廟號興宗升祭於太廟至是禮官言考之古典於禮未安遂命遷主置陵園仍舊諡號曰懿文皇太子歲時致祭如常儀陵寢節序祀儀洪武八年乙夘詔翰林院臣考議陵寢朔望節序祭祀禮翰林學士樂韶鳳等奏謹按漢諸廟寢園各有寢有便殿日祭於寢月祭於廟時祭於便殿後漢都於洛陽以關西諸陵久逺但四時用特牲祀每帝西幸即親詣洛陽陵每正月郊祀廟畢以次上陵唐園陵之制皇祖以上至太廟陵皆朔望上食元日冬至寒食伏臘社各一祭皇考陵朔望及節祭日進食又薦新於諸陵高宗永徽二年有司言獻陵三年之後每朔上食其冬夏二至伏臘清明社節亦上食顯慶五年太常博士彭景直上疏曰近代始以朔望諸節日祭於陵惟漢時議京師自高祖下至宣帝等陵旁立廟園各有寢有便殿故日祭於寢月祭於便殿唐𤣥宗開元二十三年四月勅獻昭乾芝橋恭六陵朔望上食冬至寒食日各設一祭如節祭與朔望相值依節祭禮宋每歲春秋仲月遣太常寺正卿朝拜祖宗諸陵欽惟我朝祭祀皇陵舊儀每歲元旦清明七月望十月朔冬至日俱用太牢遣官致祭白塔二處則用少牢其伏臘社每月朔望日則用特羊祠祭署官行禮如節與朔望伏臘社同日則用節禮從之遣親王謁祭宣徳元年行在禮部進鄭王詣南京謁陵合行事宜先是上以即位之初未及躬詣孝陵議遣鄭王謁祭仍命豐城侯李賢行在兵部尚書李慶從行詔行在禮部議禮儀及隨從官員賞賜至是奏王啓行預告奉先殿太宗皇帝几筵仁宗皇帝几筵及皇城門城隍等神其緣途應祀神祇預期遣王府官告祭到南京王祭告皇城門及城隍等神入謁告奉先殿告孝陵及懿文陵貞靜順妃悼僖麗妃享堂凡遇正旦萬夀聖節皇太后聖節中宫千秋王於本府拜進表箋由西安門出入南京各衙門官止於朔望日見王王府遇有合行事務照常例發落五軍六部都察院等衙門合行事務俱照常例發落應合奏者具奏施行王日用飲膳南京光祿寺給送王往復經過文武官或耆老等進禮物者長史司啓王收受并進隨侍官員軍校人等賞例豐城侯李賢鈔十五錠兵部尚書李慶十錠指揮人鈔六錠千户長史儀衞鎭撫人伍錠百户所鎭撫紀善等官人鈔四錠旗軍校尉人三錠吏曲醫士廚役人鈔二錠軍伴皂𨽻人等人鈔一錠祭陵不華服正統元年閏六月上諭行在禮部臣曰山陵祭祀哀戚存焉服飾華麗豈禮所宜朕自今後每祭孝陵長陵獻陵景陵行禮之日與百官俱服淺色衣服如洪武永樂例尚書胡濙等頓首奉命謁陵賞賜進獻正統十三年禮部尚書胡濙等奏聖駕謁陵臨幸之所臣民有以物來獻者例給價值或賜衣服宜行所司量支紵絲衣絹衣并鈔以備給賞從之又奏車駕詣天夀山躬修祀事文武羣臣人等進香正統十年二百八十九炷十一年五百二十七炷十二年一千一百七十一炷十三年至二千二百七十五炷今歲又增至三千五百七十五炷除公侯伯駙馬文職官五品以上武官四品以上并近侍風憲官每香三炷宜如例賞鈔一千貫其諸司屬官及將軍旗校辦事官吏軍民人等舊無進香例俱難給賞乞勅今後扈駕公侯伯駙馬文官五品以上武官三品以上并近侍風憲官每一衙門止許進香一炷餘皆禁止庶無䙝瀆上曰諸司屬官及軍民人等以香來進亦足以見尊敬祖宗之誠何以沮之第賞例宜損於前其人賜鈔三錠著為令天夀山祔北嶽景泰七年太常寺奏今五嶽四瀆皆在祀典鍾山以孝陵所在祔神主於中嶽每歲孟春祭南郊既合祀之仲秋祭山川又專祀之惟天夀山祖宗三陵所在今又益於夀陵猶未列諸祀請於每歲春祈秋報附祭天夀山神主於北嶽之壇雖牲牢不加而事體得宜詔從之陵寢災變祭告𢎞治十五年遣駙馬都尉馬成詣鳳陽祭告皇陵及山川之神先是守備鳳陽内官監太監倪文奏自本年七月初三日暴風猛雨交作於是皇陵皇城萬歲山獨山龍興寺第一山圓丘方丘南山及一應壇壝樹木拔折者無慮萬餘株官民屋舍吹倒者一千五百餘間槐栁等木不可勝計於是禮部尚書張昇引咎請罪因請行兩京文武官員及鳳陽守土大小官員各加修省毋或怠忽仍請照例遣大臣一員祭告皇陵及山川之神以慰聖祖在天之靈上納之故有是命夀安太后卜葬嘉靖元年時議擇夀安皇太后葬地日久不決文武大臣爭言橡子嶺地形高敞可以卜葬而上意必欲祔近茂陵已降旨集議者數矣禮部尚書毛澄等雅知上孝思深至不敢力爭因持兩端以奏上遂命擇日興工大學士楊廷和等言昔宋寧宗欲祔孝宗於裕思諸陵之旁朱熹累疏謂祖宗之側不當數興工作驚動神靈先年孝穆皇太后祔葬與憲廟𤣥宫同時掩土其後孝貞皇太后亦不過開壙即葬今欲祔夀安皇太后於茂陵左右旋開金井大興土工憲祖在天之靈能自安乎且其襟抱疏洩利害所關不細臣等知而不言是為負國請如原議卜宅橡子嶺便上猶豫未允命禮部欽天監再行看擇茂陵近地會官定議可否具奏肅孝陵陪祀議正徳二年南京監察御史郭郛奏孝陵行香諸司大小官通行陪祀而怠惰不至者甚多宜倣天夀山諸陵禮制每遇時序分官分禮仍置籍以備監禮官察舉禮部議覆天夀山諸陵去京城百里外陪祭官往返必三閱日若孝陵則在南京朝陽門外往返甚易與北不同且行香禮儀行之百年已為定制但日久玩易不免廢弛宜令南京文武百官遵守如故其有假託偷惰者聽監禮御史具名以聞庶乎人心之懼而典禮不謬從之陵祭日不祀内殿嘉靖十四年先是上召禮部尚書夏言至文華殿諭曰清明節既遣官上陵行禮内殿復有祭祀似涉煩擾卿宜從容講明越數日復召對於文華殿言退而上議請罷冬至中元上陵而以秋祭改於霜降之日與清明禮同其内殿不復設祭上曰内殿祭儀已别諭卿同輔臣議奏上陵遣祭春以清明秋以霜降冬至已於奉先殿有祭并中元仍遣官詣陵祭祀各衙門官不必去著為令禮部志稿卷八十三
