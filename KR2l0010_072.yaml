body:
  text: 禮部志稿卷七十二明俞汝楫編科試備考解額定科舉額宣德元年行在禮部奏定科舉取士之額先是仁宗皇帝以為近年科舉太濫命禮部翰林院定議額數至是奏議凡鄉試取士南京國子監及南直𨽻共八十人北京國子監及北直𨽻共五十人江西布政司五十人浙江福建各四十五人湖廣廣東各四十人河南四川各三十五人陜西山西山東各三十人廣西二十人雲南交趾各十人貴州所屬有願試者於湖廣就試禮部㑹試所取不過百人上曰南士取十之六北士十之四大抵國家取士為致治之本其冒貢非才蓋有司之過人既茍得遂起幸心今解額已定果行之以公不才者不得濫進自然人知務學其令各處凡考試官及諸執事先須擇賢庶免冒濫增鄉㑹試取數正統五年祭酒陳敬宗言比者解額有定副榜數少以致天下教官類多缺員吏部遂建議兼考監生補除教職往往僥幸選列不稱師範竊以為縱科舉取人之濫猶愈於監生考試之精請量寬解額專取之於副榜庶幾誨導得人賢才無滯於是吏部議增㑹試為百五十人順天府近已增至八十人其應天浙江等處各增舊額有差上定為應天府百人浙江福建皆六十人江西六十五人河南廣東皆六十人湖廣五十五人山東四川皆四十五人陜西山西皆四十人廣西三十人雲南二十人其監生學業無愧仍除教職請限進士數景泰元年巡撫直𨽻大理寺左寺丞李奎言往年進士多為解額所拘未免有滄海遺珠之嘆皇上統御之初廣收賢才用圖治理乞令禮部㑹議今後㑹試天下舉人宜照永樂年間事例三場文字合程格者不拘多寡取中仍通具名數臨期奏聞定奪庶有學之士不為定額所拘從之雲貴增科額成化二年貴州左布政使等官蕭儼等奏雲貴二布政司儒學共五十餘所而科額共三十名貴州止得十名宜量增名數以勵士氣禮部覆奏准鄉試舉人量加增十名貴州六名雲南四名雲南增解額成化十年增雲南鄉試舉人五名先是總兵官黔國公沐宗等言雲南貴州雖在邊鄙久沾聖化人才漸盛往往與中州之士聨中甲科故事鄉試止取四十名雲南二十四名貴州十六名人才淹滯教官亦難遷轉乞量增額數故有是命請增京省解額𢎞治十六年南京吏部尚書林瀚等以灾異陳言一增廣賢才今賢才日盛而學校作養不為無人但科舉解額有限英俊之士或未能盡收臣瀚前任祭酒時已嘗奏請兩京鄉試每科乞增十五名浙江等布政司各增十名未䝉准行乞敕禮部計議加增鄉試舉人名數以廣賢路命下其奏於所司貴州設科解額嘉靖十四年八月內禮部題該巡按貴州監察御史王杏等題據貴州宣慰司貴前二衛致仕官孟震等呈惟我朝取士開科惟貴州附搭雲南兩省隔越山菁險阻赴試之時溽暑瘴厲正甚往者隱處居者積慮搆病遭劫亡財喪身歷歷可數伏望採擇奏聞一體設科拯救士子無限之苦等因抄呈到部為照我朝設科取士內而兩京外而浙江等布政司每三年一舉其解額之衆多視人才為差等先年以廣西貴州人材缺少故將廣西附搭廣東貴州附搭雲南後廣西因人材漸多奏准另開科惟貴州仍附搭雲南鄉試節該彼處撫按官具題止量增額數近年該給事中田秋建議本部以未經查勘有礙擬請又恐人材未充地方不便支費不資行令查議去後今該地方巡按御史王杏備細勘報前來臣等看得貴州雖與雲南接壤而山勢險絶道里遐渺盜賊出沒無常秋夏嵐瘴盛發以致每科應試生員跋涉衝冒多所損傷其於人情委為未便况今文教漸洽遐方絶域人材日盛每科應試之士數逾七百中試録文五經俱備及舉進士科不乏人近年被翰林臺諫之選者往往文章氣節與中原江南才俊齊驅但貴州地里視雲南稍狹故學校之數差少今於應試七百人之中取原定解額二十一人則貴州一省自可成録况貴州雖附雲南而科舉坊牌之費該省自辦鹿鳴之宴該省自舉所議增者止建立貢院并三場供給試官聘禮耳今既查有省城南隅空閒分司堪立貢院估計用銀二千八百餘兩而在庫堪動官銀實有三千一百之數及增聘禮供給等費亦不過五百餘兩則財力未為不敷况係聖朝興文盛典事理可行所據本官勘報事情相應准議合無行令撫按官㑹同都布按三司即便動支前項無礙官銀於議定舊址建立科場依期開設鄉試以備一省賔興之制但不許因而大肆科擾於民其原定鄉試解額雲南三十四名貴州二十一名今二省人材比昔倍盛伏乞聖裁每省均賜加增三五名尤足以昭一代文明之盛奉聖㫖是雲南鄉試解額准取四十名貴州二十五名湖廣貴州增解額嘉靖十九年巡按湖廣御史姚虞題為應時增科以作興文教事本部覆議湖廣歲額舉人八十五名其承天乃陛下本原之地乞要增加解額等因題奉聖㫖湖廣朕皇考德化所及之地解額准增足九十名欽此嘉靖二十五年該巡撫貴州都御史王學益巡按御史蕭端䝉各題稱貴州一省并附湖廣鎮遠等五衛儒學近年人材益盛原定額數未足乞要酌量加增等因該本部覆題奉聖㫖貴州鄉試解額准取三十名欽此鄉試初行鄉試洪武三年八月京師及各行省開鄉試自初九日始試初場復三日試第二場又三日試第三場京師直𨽻府州貢額百人河南山東山西陝西北平福建江西浙江湖廣各四十人廣西廣東各二十五人若人材衆多之處不拘額數或不能及數者亦從之考試之法大略損益前代之制初場四書疑問本經義及四書義各一道第二場論一道第三場策一道中式者後十日復以五事試之曰騎射書算律騎觀其驅馳便捷射觀其中之多寡書通於六藝算通於九法律觀其决斷京省試官凡兩京鄉試主考官俱本府題請候抄到日本部行手本內閣㸃用應天府文然後覆題候㫖方行手本同考官俱本府徑自聘取十三省主考同考官俱照題准事例各布政司同巡按御史差人齎文各處聘取成化十二年十二月監察御史許進以各布政司鄉舉考試官緣狥私情所聘多非其人乞如兩京例命翰林官為是上諭禮部臣曰布政司鄉舉自聘主司乃祖宗舊制行之已久許進何得具奏欲改之且科目選賢國家重事若聘主司狥私作弊無往而不為奸利矣爾其行各巡按御史并布按二司今後敢有作弊者令互相紏舉或爾部中看詳體訪得其人必重治之𢎞治四年該本部覆議應天順天二府并南北直𨽻係是邦畿之內故鄉試主考之官出於上命取於翰林其各布政司俱是外藩例該各處自行鄉試主考官該布按二司㑹同巡按御史從公推舉以禮聘請考官遇有事故所在提學官改請相應如若各該保舉官員狥情濫舉非人以致取士不當録文不純聽巡按御史并布按二司官互相紏舉若御史等官故立簾外五經官員干預考卷紊亂舊規致生私弊亦聽各該考官執奏本部悉照前項奏准事例通行參究治罪嘉靖六年本部奏准兩京鄉試除主考照例奏請簡用禮部仍㑹吏部於兩京六科部屬等官內該訪舉每經一員隨考試官入院各總校本房其餘仍用教官各布政司預呈禮部亦㑹舉京官或進士每處二員主考監臨官不許預干內簾職事又奏准鄉試除主考官上請㑹舉其同考官巡按御史移文别省請取止具某經員數不許明列姓名聽彼處巡按御史㑹提學官推舉開送嘉靖十二年十月禮部題為鄉試事查得嘉靖六年該學士張璁題為慎科目以風勵人才事節該奉聖㫖各鄉試係有司職務考官雖出欽命但近來教官多不得人補偏救弊似亦相應况先年亦曾舉行待開科之前數月各布政司呈禮部亦㑹舉京官或進士每處二員具奏馳驛前去主考監臨官不許干預內簾職事禮部仍急作先行各衙門及各提學道官知道欽此己經通行欽遵外照得嘉靖十三年例該天下鄉試之期合行照例依期鄉試但各省開科名為鄉試本係有司職務實古今鄉舉里選之意近以京官主試委屬一時補偏救弊之法可偶一行之若遂踵為常規似又不能無弊况上科差出考官與巡按御史每因爭較禮部競生嫌隙以致妨誤試事其試録文字間有艱深竒僻不堪為式有壞文體一切事宜俱有未便其正文體一節合無查照本部上年題准事例申明通行移咨都察院轉行各該巡按衙門及令各省考官務要明經取士為文必合程式毋得崇髙竒詭如有不遵候試録進呈到部之日摘其文疵參究照例追奪聘幣其監臨提調監試等官亦要與考試官同心戮力以共成賔興重典毋或異同僨事重傷大體奉聖㫖考官只用教職京官不必差正文體依擬欽此試録程式凡各省奏到試録長短難以進呈御覽本部每遇鄉試之年通行天下遵照本部降式黃綾殼二本紅綾殼四本長一尺二寸濶六寸七分俱用隂裝數外另備六本嚴考試教職之聘成化二十二年禮部奏成化二十一年天下鄉試録文多舛謬及犯諱違式乞將考試官訓導黃奎等追奪聘禮與録文舉人衛傑等俱令御史究問然兹弊之來蓋以教職易至淹滯人不樂為而就職者多非有學識之士及至聘以典文罕稱其選自今副榜舉人入監三年及未入監者許令就教職為教職者不限年資許令會試其滿九載試中績著者許推選御史知縣凡遇鄉試所司務聘才行之士以充敢以昏老寡識曾經參問之人䝉蔽聘用者罪有所歸奏上上曰舊制二名不偏諱犯下一字者不問其違式并提調官取招狀副榜舉人在監三年年三十以上者未入監并新科年二十五以上者俱令就職教職六年有人者許會試餘皆如議各省考官請如兩京例𢎞治八年四月監察御史曹鳳奏各處布政司所聘鄉試考官多不得人以致科場多弊請如兩京鄉試事例命翰林院一二員主考或於六科及部屬推舉素有學行者酌量地里逺近禮部臨期疏名請差其同考試則巡按御史并布按二司推舉學問優長心術純正者以充仍注舉主姓名於其下如有不稱聽翰林院官并巡按御史劾奏連坐下所司知之罷部臣分考嘉靖四十三年甲子歲兩京初用進士為分考官皆就近選用人得預擬故浮議尤多而南京部臣至與主考列坐爭事不協於是禮部復以為初議不便詔今後兩京鄉試同考官仍擇文行俱優年力精壯教職充之罷部臣勿遣遣兩京監試特早隆慶元年七月遣御史凌儒陳聨芳監順天鄉試上以科場事重邇年多弊諭儒等悉心綜理嚴加禁革先是兩京監察御史皆臨期方遣禮部以為倉卒之際不便防奸故是歲遣官特早增設監試隆慶四年禮部覆南京河南道御史王嘉賔奏請令行今後試録第録中式士子之文考試官稍為刪潤兩畿鄉試宜增設御史二人緝治懷挾諸弊得㫖允行會試題聘考官永樂七年令會試考官賜宴於禮部景泰四年奏准會試考官翰林春坊專其事京官繇科第有學行者兼取以充教官不許題用人員景泰元年令會試受卷彌封謄録對讀等官於吏部聽選官取用成化二年令禮部官一員提督供給𢎞治七年奏准受卷彌封謄録對讀官增十六員謄録等生員照例除在京并通州學外順天府所屬并鄰近學選撥已冠能書生員七百名知貢舉本部堂上官一員監試官御史二員咨都察院取用提調官本司王事二員收掌試卷官中書二員一員行內閣取用一員行中書科取用彌封官四員謄録官四員受卷官四員對讀官四員俱咨吏部取用巡綽官四員監門官二員旗軍五千名俱行申府取用若曾經差過官員今次不許再差供給官四員精膳司主事一員順天府委通判一員縣官二員謄録生員咨都察院轉行提學官取用進題官回避凡會試進題該本部尚書及郎中進場領出赴朝呈進嘉靖二十六年二月內儀制司郎中吳舂呈有親兄應試所進三場題目及進呈例該回避查得舊例試官不得將帶弟男子姪親屬入試其郎中止進三場題目不該回避本官具呈前因另劄員外進場領題嘉靖三十二年本部尚書歐陽德有子入試止是三場領題進呈例不回避右侍郎閔如霖亦有子入試該充知貢舉官例應回避查照𢎞治十五年欽命吏部侍郎王鏊入場充知貢舉官事例題奉聖㫖著吏部左侍郎程文德充知貢舉官入院供事欽此舉人入試例洪武十七年頒行科舉成式凡鄉試中式舉人出給公據官為應付廪給腳力赴禮部印卷會試就將鄉試文字咨繳本部照驗嘉靖十年本部題准今後會試除新科舉人齎執公據外凡依親等項復班舉人務齎原籍公文并原引坐南監者執應天文引查無違礙方准收試如違一槩不准會試凡試年通行天下題請中式洪熙元年奏准會試取士臨時請㫖景泰元年令會試文字合格者通具中數臨期奏請定奪正德八年禮部議覆都給事中李鐸奏明春㑹試欲增取百十餘名選補州縣正官惟我朝進士之科初無定數洪武開科止取一百二十名永樂間增至四百七十名後又减至二百五十名近年數科多三百名間有三百五十名皆因時酌取以備官使今盜平之後宜選守令托以撫綏而守令之良多出於進士宜於明年會試定擬奏請以後額數仍舊報可嘉靖三十二年該吏部尚書萬鏜題邊方緊要腹裏疲敝州縣舊選鄉科舉人者今得選進士以備選用乞要加額等因該本部覆題奉聖㫖照嘉靖二年取四百名南北中分數如舊例行欽此定南北中卷洪熙元年奏准南卷取十之六北卷取十之四後復以百名為率南北各退五卷為中卷南卷浙江江西福建湖廣廣東直𨽻應天松江蘇州常州徽州寧國池州太平淮安揚州廣德州北卷山東山西河南陝西直𨽻順天府保定真定河間順德大名永平廣平隆慶保安遼東大寧萬全中卷四川廣西雲南貴州廬州鳳陽安慶徐州滁州和州𢎞治二年九月南京禮部尚書黎淳言宣德間所定進士南北中之數行之已久近成化二十三年㑹試以四川左布政使潘稹言南北減二名增為中卷之數人心不服士多怨言乞仍舊便命下其章於禮部揭曉取辨揭曉之日該本部尚書等官先期一日入內簾拆卷仍帶該供役吏書知印人等其主考并本部尚書侍郎吏皂各十人同考執事等官各五人各吏皂先赴司領木牌一面進場聽監試提調官㸃入進呈㑹試録進試録例用黃綾殼一本紅綾殼二本俱用銷金黃紅包袱本部尚書及郎中呈進有太后中宫東宫仍各備紅綾殼三本俱用銷金紅包袱呈進進呈登科録每科本年九月初一日儀制司郎中進朝至左順門進登科録行一拜三叩頭禮司禮監官捧進考庶吉士嘉靖二十六年三十二年該內閣題請考選庶吉士題奉欽依坐名開具各衙門辦事進士該內閣擇日㑹同吏部禮部堂上官於東閣前考選題行下第舉人例送監永樂二年據廣西等布政司潯州等府桂平等縣舉人甘摯等四十九名赴部應試緣試期已過各供阻風患病等項及查己卯卷不入試場舉人尹慎等十名各供患病不曾入試查得洪武二十四年本部將㑹試下第并過期未試舉人奏奉太宗皇帝聖㫖下第照例未試的送國子監讀書欽此嘉靖三十一年十二月內廣西舉人王價等告乞送監查得舊例會試下第引奏過分送南北二監肄業如上科未經引奏下科投文到部如王價等告入監者一槩不准就教再試洪武三十年令再試寄監下第舉人中式者次其等第除教授教諭訓導不中者為州吏目永樂七年令下第舉人再試送國子監進學其優等者仍賜冠帶或加俸給後令發回原籍進業嘉靖間定凡會試下第舉人有願就教職者本部題送翰林院考試文理平通者咨送吏部選用修理會場嘉靖元年該順天府題科場廢壞乞要預行工部與該府四六修理本部工部各委屬官一員該府委佐二官一員公同估勘監督等因該本部覆題奉聖㫖是工部知道欽此自後每遇會試先該年各該本部具題咨行工部與該府四六分修理會場經費𢎞治七年禮部言𢎞治九年當會試天下舉人而百爾供給止取辦於京畿諸府請行浙江江西湖廣四川福建各取鄉試所用餘銀一百兩山東山西河南陜西及應天府各八十兩以助其費且請執事官三員謄録生員二百名從之正德八年初順天府尹楊亷奏會試之費出於本府者居天下三分之一民力不堪乞令各布政司增數輸銀以助之禮部議增原定數至二千五百五十兩有㫖令查上科所費數酌定已而本府查報多實數而間有一二難據者乃不果定至是會試并登科録進呈事竟通計用銀三千一百九十七兩有竒除見有餘數外借支本府銀一千一百九十七兩有竒禮部請以此為凖𣲖徵各布政司浙江江西湖廣福建四川各增一百二十兩并原𣲖各共輸二百七十兩應天山東山西陜西河南各增八十兩廣東增一百兩并原𣲖各共輸二百兩雲南廣西各增五十兩并原𣲖各共輸一百兩題奉武宗皇帝聖㫖是自後但遇會試先一年春各省照前數與各該司府朝覲官順齎赴部至期有故違者本部指名參究就責本官借貸交納嘉靖三十一年本部奏准會試刋字刷印等匠工價分永平等七府每名該工食銀二兩八錢闕大名二府各八名各該銀二十二兩四錢順德廣平二府各七名各該銀十九兩六錢河間府五名該銀十四兩真定府十名該銀二十八兩保定府九名該銀二十五兩二錢遇會試年分行文各府催取正德五年十二月內該本部題㑹試供給場中合用米麥盡數户部關支不必拘定將在倉一二年者給放奉武宗皇帝聖㫖是欽此自後每遇會試之年該本部具題咨行户部取老米一百二十四石八斗糯米三十八石粟米九十五石小麥二百一十石本部劄付順天府委屬官一員徑赴户部太倉照數關支運場應用會場治辦正德八年十二月內該本部題會試合用蘆席一萬五十領咨行户部於在京各倉借用奉武宗皇帝聖㫖是欽此自後每遇會試之年照前數借用仍劄順天府委官搬運場中聽用事完給還其科場供給下程付精膳司行搭蓋棚宇咨行工部取長杉條三百根仍劄順天府委官前去該部借領應用事畢責令委官交還工部凡治辦本部於會試前一年八月內將合用修理試院㕔房板舍添蓋厰屋并考官禮幣下程入院出院管待茶飰狀元冠服帽帶進士巾服恩榮宴花簾內外官舉人巡綽官軍人等飲饌筆墨紙劄辦事官吏等項題請通行各衙門預辦送用凡考官禮幣本部於會試年正月內行內府承運庫照例關領綵段總二十一表裏考試官二員綵段四表裏同考試官十七員每員綵段一表裏凡題請考官本部於會試年正月初九日題請考試并執事等官筵宴同日題請主考官又於正月二十四日題請考試官本部筵宴二月初七日題請考試并同考官及執事等官辭朝入場刻録支費刻登科録其紙劄等項查照舊規將後開物件照例行順天府官錢內支價收買送部應用御覽登科録紙六百張奏本紙六萬張藍絹七段每段二丈中夾紙四千張藍青連七紙七十五張大黃夾榜紙一百張心紅一斤十四兩小石硯七十五箇墨三十笏碧青紙七百五十張棕十斤八兩麵五十五斤白連七紙九千四百五十張黃綾一丈五尺紅綾五丈蠟燭七百五十枝行移紙一千一百三十七張墨煤六斤藍綾二段每段二丈粗墨七斤八兩梨木板八十片黃羅銷金包袱二箇紅羅銷金包袱四箇筆一百五十枝定會試試官例景泰三年初禮部會試其主試官二人出上命同考試官從禮部推選翰林院官京官教官皆得為之至是禮部尚書胡濙言翰林院春坊以文藝為職業宜專其事京官繇科第有學行者宜兼取以充之教官不許請著為令從之寬限科會試禁𢎞治二年會試舉人林瀾等奏近例舉人三試不中者不許復試臣等艱苦萬狀臨試猝遇此令坐守者有空歸之嘆逺來者有徒行之勞乞下所司别有議處禮部覆議前日移文初下各處舉人未及周知其令明年再入試一次以後仍依舊例從之副榜就教嚴限𢎞治四年禮部奏今次會試所取副榜舉人凡在監五年以下并未入監及新科年歲相應者俱令就教職不許告免仍遵天順八年詔例署職九年考滿者方許再會試一次從之仍命署職六年以上有舉人者亦許會試時副榜舉人多不願就教職者故禮部奏嚴其限條上革弊四事嘉靖四十四年以禮部會試天下舉人命御史李邦珍鮑承廕監試周宏祖顧廷對場外搜檢詔申嚴懷挾傳遞之禁犯者執送法司問罪仍於禮部前枷號一月邦珍等條上革弊四事一舉人試卷禮部印鈐已完送提調官收領臨期舉人入場至大門外驗票給領以防洗改腳色彼此交換之弊一請留朝覲二司及府縣官臨期督集所屬舉人照依省分及府縣次第挨次㸃檢照進以防冒替代筆之弊一舉人有不服搜檢及攙先落後不循序進違規者輕則扶出重則參奏以防喧競抗違之弊一請增軍三百餘名嚴密搜檢場外仍選差參將官一員帶領官軍晝夜巡邏俟揭曉乃止以防懷挾透漏之弊詔允行殿試題請合行本部先於二月十五日題請廷試讀卷放榜日期及合用書桌并讀卷等官午飯與在部宿歇早晚飯食恩榮宴登科録板片紙劄題名碑石等項候㫖下行各該衙門備辦送用請讀卷官本部例於三月初七日題請十五日殿試其執事等官行移各衙門取用讀卷官照例擬定另本開坐請㫖一讀卷官內閣六部都察院通政司大理寺正官詹事府翰林院堂上官計十四員廷試甲第從公會取嘉靖五年禮部尚書席書言舊例廷試貢士掌卷官先行看閲分送內閣然後以次及於九卿進士甲第前後第决於讀卷官職之尊卑不復論其文之髙下非所以示大公也自今請糊名混送以防奸弊其一甲三名不分內閣九卿從公㑹取既定然後論次均填不宜偏私以官爵為序疏入上初未允書復論乃許之館選考選庶吉士𢎞治六年四月大學士徐溥等言比給事中徐旦建議欲選新進士改庶吉士入翰林院讀書惟庶吉士之選自永樂二年以來或間科一選或連科屢選或數科不選或合三科同選初無定限每科選用或內閣自選或禮部選送或會吏部同選或限年歲或拘地方或採譽望或就廷試卷中查取或别出題考試亦無定制自古帝王皆以文章關平氣運而儲才於館閣以教養之本朝所以儲養之者自及第進士之外止有庶吉士一途凡華國之文與輔世之佐咸有賴於斯然而或選或否則有才者未必皆選而所選者又未必皆才若更拘於地方年歲則是已成之才或棄而不用而所教者又未必皆有成請自今已後立為定制一次開科一次選用待新進士分撥各衙門辦事之後俾其中有志學古者各録其平日所作文字如論䇿詩賦序記之類限十五篇以上於一月之內赴禮部呈獻禮部閲視訖編號封送翰林院考訂其中詞藻文理有可觀者按號行取本部仍將各人試卷記號糊名封送照例於東閣前出題考試其所試之卷與所投之文相稱即收以預選若其詞意鈎棘而詭僻者不在取例中間有年二十五以下果有過人資質雖無宿搆文字能於此一月之間有新作五篇以上亦許投試若果筆路可通其學可進亦在備選之數每科不必多選所選不過二十人每選不必多留所留不過三五輩如此則所選者多是已成之才有所論撰便堪供事將來成就必有足賴者如是則預列者無狥私之弊不預者息造言之謗臣等皆出此途引進後賢儲之館閣以報國厚恩乃其職也疏入上納之命今後內閣仍同吏禮二部考選考選館職限數嘉靖五年禮部覆御史周煦議考選館職宜每科一舉每選不出二十人留館不出五人務求學行俱優將來效用必有可觀疏入上命內閣便㑹同吏禮二部從公考選必年少可進學送翰林院讀書欽定庶吉士名數嘉靖二十年先是大學士翟鑾言今年庶吉士之選奉聖諭於八月內行屆期值孝康敬皇后大喪是以未遑今進士開選在即宜遵諭舉行欲照嘉靖十四年例不限年歲俱引赴文華殿大門外恭候欽試或止依先年例臣會同吏禮二部堂上官并翰林院掌印官於東閣限三十五歲以下取考品列次第進呈恭候聖明裁定詔暫照先年例會考取擬封卷呈覽上復諭大學士夏言等曰考選庶吉士必精擇吉人已乃欽降御題文曰原政詩曰讀大明律於是大學士言等會同吏禮二部并翰林院官於東閣考試取正副四十五卷進呈上親賜鑒别欽定三十三名題名進士題名記嘉靖七年大學士楊一清言舊例進士開科禮部奏請於國子監立石題名命儒士撰記以昭盛典傳之永久正德六年以來國家多事因循不作皇上敦化崇文始命輔臣追記補之嘉靖五年丙戍科題名記僉謂臣職當撰述臣竊謂此記雖禮部題請命翰林院撰文然未嘗奉㫖專何官而各年碑石竝書臣某奉敕撰其文又未嘗呈覽揆之事體似有未安竊聞先朝大學士楊榮李賢等連科撰述皆出宸命况我皇上聖文溢發凡近日冊詔誥敕有所指㸃皆非臣等所及臣謹以所撰稿録進伏乞少運睿思改撥工部仍行翰林院擬定制敕房官一員書寫刻石以後俱可照此行上從其言遂著為例禮部志稿卷七十二
