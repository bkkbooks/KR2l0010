body:
  text: 禮部志稿卷八十五上明俞汝楫編羣祀備考歷代帝王祀祀歷代帝王洪武六年監察御史答祿與權等言開物成務先王各正乎民彛崇德報功後世宜興乎祀典茍不追尊前古曷由立教將來謹稽經史伏羲神農黃帝號稱三皇盛德大業被於萬世使天下後世三綱正九法敘三聖人之功莫大焉故堯舜禹湯文武相承而為道統孔子顔曽思孟相傳而為道學統以續其業學以傳其心後世有天下者舉不違其成法此其所以繼天立極而為帝王之所宗豈但隂陽醫方而已哉其在祀典法施於民則祀之著之禮經歷代宗守爰在我朝繼正統而有天下四海九州罔不臣服天下社稷宗廟山川之神皆得享其祭而躬祀三皇之禮獨闕焉宜於春秋躬行祀事庶成一代之典上以報往聖之功德下以正萬姓之彛倫則道德尊嚴而政教修舉矣上納其言命禮官參考歷代帝王開基創業有功於生民者立廟祀之於是禮部尚書牛諒奏三皇開天立極大有功德於民京都有廟春秋享祀宜令太常掌之伏羲以勾芒配神農以祝融配黃帝以風后力牧配正位南面祀以太牢配位東面祀以少牢漢高祖光武唐高祖太宗宋太祖元世祖宜令有司就各陵立廟每歲仲春以少牢致祭商中宗高宗周成王康王漢文帝武帝宣帝明帝章帝唐玄宗憲宗後唐明宗宋太宗真宗仁宗亦宜令有司立廟陵三年一祭祭以少牢上曰五帝三王及漢唐宋創業之君俱宜於京師立廟致祭其餘守成賢君令有司祭於陵廟皆每歲春秋祭之乙酉建歷代帝王廟於京師禮部奏定其儀制略如宗廟同堂異室為正殿五間以為五室中一室以居三皇東一室以居五帝西一室以居夏禹商湯周文王又東一室以居周武王漢光武唐太宗又西一室以居漢高祖唐高祖宋太祖元世祖從之祀三皇洪武二年二月遣中書參政蔡哲祀三皇以勾芒祝融力牧風后配享勾芒祝融居右風后力牧居左儀同釋奠三皇位則籩豆各八簠簋各二登鉶各一爵三犧尊象尊山罍各一幣一白色祝一共用牛羊豕各一其配位用籩豆各四簠簋各一鉶一爵三象犧尊各一幣一白色祝一共用羊豕各一其樂用登歌闕其祝文伏羲曰惟皇始畫八卦教民書契繼天立極肇開道統謹以制幣牲齊粢盛庶品式陳明薦以勾芒氏配神農曰始作耒耜蒸民粒食百草是嘗功濟萬世謹以制幣牲齊粢盛庶品式陳明薦以祝融氏配黃帝曰惟皇通變神化垂衣而治制作寖偹以濟萬民謹以制幣牲齊粢盛庶品式陳明薦以風后氏力牧氏配勾芒曰爰以季春有事於太昊伏羲氏惟神盛德在木發生之始功被萬物本於至仁謹以制幣牲齊粢盛庶品式陳明薦祝融曰惟神火德司夏長飬庶物功在上古惠及無窮風后曰惟神貫通天時孤虛闡奧作輔軒轅德業名世力牧曰惟神兵法竒祕有光有烈土德追崇功垂萬世餘詞如勾芒修舉帝王陵寢祀事初上遣使訪求古帝王陵寢河南陜西各行省具圖所在帝王諸陵凡七十有九以進禮官考其功德昭著者曰伏羲神農黃帝少昊顓頊唐堯虞舜夏禹商湯中宗高宗周文王武王成王康王漢高祖文帝景帝武帝宣帝光武明帝章帝後魏文帝隋高祖唐高祖太宗憲宗宣宗周世宗宋太祖太宗真宗仁宗孝宗理宗凡三十有六各製衮冕服函香幣遣祕書監丞陶誼等往修祀事每陵以白金二十五兩俾具祭物陵寢之發者掩瘞之壞者完築之廟之敝者因其舊而葺之無廟者設壇以祭仍令有司禁樵採嵗時祭祀以為常牲用太牢祭帝王陵寢遣使祭歷代帝王陵寢上諭中書省臣曰天下都邑咸有三皇廟前代帝王大臣皆不親祭徒委之醫藥之流且令郡縣通祀豈不褻瀆至於堯舜禹皆聖人有功於天下後世又不立廟朕不知其何説也宜令禮部會諸儒詳考以聞於是禮部同翰林院太常司官考前代聖帝賢王自唐以來皆祭於陵寢唐玄宗嘗立三皇五帝廟於京師至元成宗時乃立三皇廟於府州縣春秋通祀而以醫藥主之甚非禮也上曰三皇繼天立極以開萬世教化之源而汩於醫師其可乎自今命天下郡縣毋得褻祀止用有司祭於陵寢禮部復議三皇五帝三王漢以下創業之英主守成之賢君歲時俱宜一體祭于陵寢上曰古先聖帝賢王以及歷代帝王曽主中原安人民者皆春秋祭祀偏方之君雖賢不祭主中原而昏愚者亦不祭於是禮部復定議合祀帝王三十五在河南者十陳州祀伏羲商高宗孟津縣祀漢光武洛陽縣祀漢明帝章帝鄭州祀周世宗鞏縣祀宋太祖太宗真宗仁宗在山西者一滎河祀商湯在山東者二東平州祀唐堯曲阜縣祀少昊在北平者三內黃縣祀商中宗滑州祀顓頊髙辛在湖廣者二􅌕縣祀神農寧逺縣祀虞舜在浙江者二會稽縣祀夏禹宋孝宗在陜西者十五中部縣祀黃帝咸陽縣祀周文王武王成王康王宣王漢髙帝文帝景帝興平縣祀漢武帝長安縣祀漢宣帝三原縣祀唐髙祖醴泉縣祀唐太宗蒲城縣祀唐憲宗涇陽縣祀唐宣宗歲用仲春仲秋朔器用籩豆各八登一鉶一簠簋各一爼一爵三尊三篚一牲用太牢制可之於是遣使詣各陵致祭復命陵寢所在禁民無得樵採置碑刻祭之月日牲帛之數于其上俾所在有司守之以為常式祭歷代帝王樂章洪武七年八月御製樂章迎神云仰瞻兮聖容想鑾輿兮景從降雲衢兮後先來俯鑒兮微衷荷聖靈兮蒼生有崇眷諸帝兮是臨豫頓首兮幸蒙奠帛云秉微誠兮動聖躬來列坐兮殿庭豫今願兮效勤奉禮帛兮列酒尊鑒豫情兮欣享方旋駕兮雲程初獻云酒行兮爵盈嘉氣兮雍雍重荷蒙兮載瞻載崇羣臣欣兮躍從願覩穆穆兮聖容亞獻云酒斟兮禮明諸帝熙和兮悅情百職奔走兮滿庭陳籩豆兮數重亞獻兮願成終獻云獻酒兮至終早整雲鑾兮將還宫豫心眷戀兮神聖欲攀留兮無從躡雲衢兮緩行得遙瞻兮達九重徹饌云納殽羞兮領陳蒸民樂兮幸生將何以兮崇報惟嵗時兮載瞻載迎送神云幡幢繚繞兮導來蹤鑾輿冉冉兮歸天宫五雲擁兮祥風從民歌聖祐兮樂年豐望瘞云神機不測兮造化工珍羞禮帛兮薦火中望瘞庭兮稽首願神鑒兮寸衷祭歷代帝王祝文洪武十年遣官祀歷代帝王凡十七位為五室共設酒尊三于殿之東南西向用祝一設于神之右初獻畢讀祝餘禮儀仍舊祝文曰皇帝謹遣具官某致祭於太昊伏羲氏炎帝神農氏黃帝軒轅氏帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏夏禹王商湯王周武王漢髙祖皇帝漢光武皇帝隋髙祖皇帝唐太宗皇帝宋太祖皇帝元世祖皇帝曰昔者奉天明命相繼為君代天理物撫育黔黎彛倫攸敘井井繩繩至今承之生民多福思不忘報特祀以春秋惟帝英靈來歆來格尚享祭歷代忠臣不具祭服洪武十三年監察御史連楹等劾奏應天府尹曽朝位祭歷代忠臣不具祭服有乖典禮上顧問廷臣吏部尚書阮畯言祭前代之臣不具祭服相承已久上命翰林院考證以聞翼日翰林院奏祭前代忠臣便服行禮為宜遂詔應天府以為常式定帝王廟祀及名臣從祀洪武二十年遣官祀歷代帝王廟五室祀伏羲至元世祖凡十七帝至是去隋文帝凡十六帝為五室中三室居三皇五帝三王如舊最東一室則漢髙祖光武唐太宗最西一室則宋太祖元世祖從祀名臣凡四壇東廡第一壇九人風后臯陶夔龍伯益傅説召公奭召虎張良曹參西廡第一壇九人力牧夔伯夷伊尹周公旦太公望方叔蕭何陳平東廡第二壇十人周勃馮異房玄齡李靖李晟潘美嶽飛穆呼哩博勒呼巴延西廡第二壇九人鄧禹諸葛亮杜如晦郭子儀曹彬韓世忠張浚保爾濟齊拉衮帝王陵寢護視歷代帝王陵寢洪武九年八月遣官視歷代帝王陵寢令百步內禁人樵牧設陵户二人守之有經兵火而崩摧者有司督近陵之人以時封培每三年一遣使致祭乙巳禮部尚書張籌奏使者視歷代帝王陵寢還言各陵有素無祠宇者有歲久不堪修葺者有間可修葺者按唐開元間先代帝王有廟者祭於廟無廟祭於壇祠宇之壞者請勿葺上曰然其廟之可葺者葺之不可葺者令有司次第修之勿亟勞民也特設歷代帝王陵寢嘉靖十年右春坊右中允廖道南請改大慈恩寺興辟雍以行飬老之禮撤靈濟宫徐知證知諤二神改設歷代帝王神位仍配以歷代名臣下禮部議覆言今國子監乃祖宗以來幸臨之地恐不必更葺梵宇舊址重立辟雍惟寺內歡喜佛實屬不經敗壞民俗相應毁棄靈濟宫徐知證知諤二神其在當時已得罪名教固宜撤去但所在窄隘恐不足以改設帝王寢廟宜擇地别建得旨夷鬼淫像可便毁之帝王廟工部其相地卜日興工於是工部銷毁淫像會官相帝王廟地因言阜成門內保安寺故址舊為官地改置神武後衛而中官陳林鬻其餘為私宅地勢整潔且通西壇可贖遷而鼎新之奏入報可嘉靖十一年七月禮部以新作歷代帝王廟成請上親祀許之仍詔以祀之前一日預告皇祖即太廟後寢行禮禮部上親祭歷代帝王儀注上覽之曰正五壇中案朕親奠獻左右四案命郭勛李時代之成國公朱鳯尚書王憲夏言汪鋐分獻兩廡餘俱如擬追祀忠節宣德八年八月江西吉安府知府陳本深言廬陵縣城南舊有忠節祠祀鄉先賢宋楚國文忠公歐陽修忠襄公楊邦乂忠簡公胡銓蓋國文忠公周必大文節公楊萬里信國公文天祥比來官屢更代事致因循曠缺祀典乞舉行盛典敕有司每歲春秋致祭上諭行在禮部臣曰褒崇忠節足以正人心厚風化此國家先務其從所言令春秋祭祀命府官行禮仍命有司以時修葺祠宇成化十八年十一月顔氏六十代孫襲翰林院五經博士顔公鋐奏顔子廟缺人灑掃請如孟氏例撥賜上曰國朝祀典二廟并隆孟氏既有廟户而顔氏獨無誠為缺典其令有司如孟氏數給與之成化二十二年十一月禮部以博士顔公鋐請修顔子廟覆奏上曰顔子孔門髙弟道德可仰身先配享而家廟不修可乎其令有司以修孔廟工役重為修葺功臣廟正官行禮𢎞治十五年南京太常寺卿楊一清等奏南京每年四孟并歲暮例遣勳戚大臣致祭雞鳴山功臣廟是日并祭晉成陽卞忠貞公等六廟該應天府官行禮近年以來本府率委縣丞訓導等官代之恐禮意太輕乞定為著令禮部議謂所言宜從請此後分遣堂上官有事故即委京縣掌印正官必不得已乃委府學教授等官從之仍令本府官如無事故不許推託轉委禮部志稿卷八十五上欽定四庫全書禮部志稿卷八十五下明俞汝楫編崇祀備考孔廟祀遣祭闕里洪武元年遣前國子祭酒孔克堅祀先師孔子于闕里出內府香幣并白金百兩俾具祭物仍命通贊舍人張漢英副之上諭克堅曰先師孔子扶持世教功德廣大萬世帝王之師也朕今命爾往祭蓋以爾先師子孫祭必歆饗爾宜致誠潔以副朕懷初定曲阜廟祀洪武三年八月丁巳朔遣官釋奠于先師孔子命來年曲阜廟庭官給牲幣俾衍聖公主祀事歲以為常崇祀孔子洪武元年十月詔以太牢祀先師孔子于國學仍遣使詣曲阜致祭及行上謂之曰仲尼之道廣大悠久與天地相並故後世有天下者莫不致敬盡禮修其祀事朕今為天下主期在明教化以行先聖之道今既釋奠國學仍遣爾修祀事于闕里爾其敬之更定釋奠孔子祭品禮物洪武四年禮部奏更定釋奠孔子祭品禮物正位犢一羊一豕一籩豆各十登一鉶二簠簋各二酒尊三爵三四配位每位羊一豕一酒尊一餘同正位其從祀十哲東五位共用豕一分置於各位帛一爵一每位用籩豆各四簠簋各一鉶一酒盞一西五位陳設同東廡五十三位為十三壇共用豕一分置於各壇帛一爵一每壇用籩豆各四簠簋各一酒盞四西廡五十二位亦為十三壇陳設與東廡同初孔子之祀象設於髙座而籩豆罍爵皆陳於座下弗稱于儀其來已久至是定擬祭物陳設各為髙案籩豆簠簋登鉶悉代以瓷器牲用熟樂用舞樂生六十人舞生四十八人引樂二人凡一百一十一人上從之禮部請選京民之秀者充樂舞生上曰樂舞乃學者事况釋奠所以追崇先師宜擇國子生及凡公卿子弟在學者預教肄之宣德元年山東德平縣儒學訓導年富言天下儒學文廟以崇祀先聖先賢近年以來十哲及兩廡從祀先賢或置木牌或為塑像或封爵差訛或位次失序甚者缺而不置皆有司因循所致乞依洪武中定例重加考校刋布內外永為定規上曰朝廷崇儒重道為緊要事而有司不得人如此命禮部即考正頒示天下定孔廟祭品數正統三年禮部尚書胡濙言比者湖廣桂東縣知縣范忠奏本縣每遇春秋祭孔子教官生員逼取祭儀擾民各府州縣亦有此弊請定其儀豬每隻重七十斤山羊每隻重二十斤綿羊每隻重三十斤其餘品物不係出産者鹿兔以羊代榛栗以土産果品代令風憲官嚴加禁約教官訓導生員毋責取擾民上從之遂著為令增孔廟從祀祭品景泰六年二月太常寺卿許彬奏每嵗仲春仲秋上丁釋奠先師孔子及四配十哲牲牢品物固無容議其兩廡從祀先賢共一百九位止用豕二隻棗栗各二十二斤黍稷各三升三合有竒鉶鹽五斤十兩每品分為一百九分甚儉薄不足以盡尊崇之意請增豕四隻棗栗各五十斤黍稷各一斗鉶鹽五十斤庶於禮為稱及行南京國學一例增設從之陳孔廟四議𢎞治二年山東兖州府知府趙蘭陳六事其四云一請定禮樂謂孔子廟在國子監者皇上或躬臨致祭或遣官代祭是以天子祭先師器用十二籩豆舞用八佾宜也其天下郡縣廟學豈可僣用此等禮樂以祭乞議處之一請詳祀位謂大成殿後宜别為寢室祀叔梁紇配以顔路曽晢孔鯉其七十子言行著見如有子輩并宋周程張朱數子宜皆升坐殿上通謂之哲以備一代之制一請議諡號謂周公制禮作樂前代嘗加諡文憲王今一例革其舊有之封號止以太師周公稱之恐名爵不足以副功德之實乞會議復舊一請補缺略謂孔顔孟三代子孫各有官爵祭田惟曽子子孫未有乞賜祭田給人户備灑掃選賢良户為廟主嵗時祭祀仍令有司主之命所司知之考正從祀名位宣德三年正月四川萬縣儒學訓導李鐸言各處從祀先賢名位多有差訛且失次序若不考正實乖祀典上謂禮部尚書胡濙曰昔我太祖皇帝斷自聖心大正神祗名號惟於先聖先賢悉從其舊將以垂憲萬世豈可差謬其速考正頒示天下重定從祀位次𢎞治十一年南京兵科給事中楊亷言孔廟之祀所以崇德報功今兩廡之間自宋諸儒入祀之後未有論其位次者遂使荀况馬融諸人居于周惇頥程皓程頥張載朱熹之上彼况以下諸人置之從祀猶有可議矧可使宋之五儒反位于下乎臣謂宜升惇頥皓頥載熹于况等之上若謂當以時之先後為次則孔伋孟軻何得越由賜之班若謂一廡之間不宜易置太甚則配哲之分何乃在一堂之上若謂祀典行之已久不必更改則本朝何為而黜揚雄之祀于數百年之後哉陛下于惇頥之太極圖通書于皓頥之遺書易傳于載之西銘正蒙于熹之本義傳注章句綱目等書深宫誦習經筵講説固多取之望命儒臣禮官博議斷自宸衷俾宋五儒者得于孔門諸子接席于兩廡之間超荀况等而處其上豈非朝廷之一盛事乎命下其言于禮部新孔廟祭告𢎞治十七年翰林院檢討劉瑞言闕里孔廟告完皇上遣大學士李東陽祭告立碑文物一新惟夫子加封之典尚因襲前元之舊未能改正所謂大成者孟氏取譬之詞而所謂文宣者又齊亂主髙洋之諡是不可以擬夫子盛德之形容請節去大成文宣四字别定為尊崇美諡因此祭告而併新之以彰皇上崇儒重道之盛心命下其奏于所司始定啓聖祠祀嘉靖十年七月國子監建啓聖公祠成禮部尚書李時等議祀典請春秋祭祀與文廟同日所用牲帛籩豆視四配其東西配位先賢顔無繇氏曽點氏孔鯉氏孟孫氏十哲從祀先儒程朱祭視兩廡是日文廟代主祭者係欽遣輔臣則祭酒于啓聖祠行禮南京國子監祭酒於文廟司業於啓聖祠各行禮從之罷孔廟陪祀瀆褻嘉靖一十二年祭至聖先師孔子大學士嚴嵩行禮時上久不視朝暫罷御殿傳制禮受命左順門令典祭先師孔子文官五品以上陪祀其六品以下俱先期展謁嘉靖九年用主事梁喬升言令在京文臣俱例陪祀官後行禮地隘人衆不禁喧雜至是禮官言其瀆褻非禮詔復如舊例定闕里家廟配享正統三年三月孔顔孟三氏子孫教授襄侃言天下文廟惟論傳道以例位次闕里家廟宜正父子以敘彛倫顔子曽子子思子也配享廟庭無繇子晳伯魚父也從祀廊廡匪惟名分不正抑恐神不自安况孔子父叔梁紇元已追封啓聖王創殿於大成殿西崇祀而顔孟之父俱封公爵惟伯魚子晳仍為侯爵乞追封為公偕顔孟之父俱遷配啓聖王殿庶名位胥安人倫攸敘又言祭告孔子祝文稱王在天下則可在子孫則不宜乞易惟王為仰惟我祖增深仁厚澤詒我子孫二句於垂憲萬世之下上是其言命行在禮部行之仍命翰林院議伯魚子晳封號以聞隆聖賢廟祀成化十二年七月國子監祭酒周洪謨言孔子冕服已用天子之禮宜增籩豆為十二佾舞為八則禮樂相稱上曰尊崇孔子乃朝廷盛典宜從所言其籩豆佾舞俱如數增用仍通行天下悉遵此制定釋奠先師樂𢎞治九年二月太常寺奏釋奠先師孔子已準用天子之禮增為八佾之舞惟樂器之數尚用諸侯之樂似為未稱請增文廟樂器人數為七十二人如天子之制禮部因請行移所司如數置造仍通行天下并南京國子監一體遵行上曰文廟享祀用天子之禮而舞已加八佾樂器乃尚諸侯之舊則尊崇未至而情文亦有未備所言良是即如擬行之以副朕崇奉先師之意改正先師祀典嘉靖九年十一月上因纂祀儀成典諭大學士張璁凡雲雨風雷之祀以及先聖先師祀典俱當以敘纂入璁因奏言雲雷等祀及社稷配位俱蒙聖明更定但先聖先師祀典尚有當更正者請于大成殿另立一堂祀叔梁紇而以曽晳顔路孔鯉配之上以為然因諭聖人尊天與尊親同今籩豆十二牲用犢全用配天儀亦非正體其諡號章服悉宜改正卿宜加體孔子之心為朕計之璁遂言孔子宜稱先聖先師而不稱王祀宇宜稱廟而不稱殿祀宜用木主其塑像宜毁撤籩豆用十樂用六佾叔梁紇宜别廟以祀以三代配公侯伯之號宜削只稱先賢先儒其從祀申黨公伯寮秦冉顔何荀况戴聖劉向賈逵馬融何休王肅杜預吳澄宜罷祀林放蘧瑗盧植鄭玄服虔范寧宜各祀于其鄉后蒼王通歐陽修胡瑗蔡元定宜增入上命禮部會翰林諸臣議編修徐階疏陳不可上怒謫階福建延平府推官乃御制正孔子祀典説示禮部謹按漢髙帝過魯以太牢祀孔子安帝祀孔子及七十二弟子于闕里此崇祀之始也厥后唐太宗稱以先聖尼父玄宗諡以文宣王顔閔而下俱為侯伯宋真宗始以至聖稱焉我太祖即位奉太牢祀于國學又遣祭酒致祭于闕里成祖躬行四拜之禮憲宗加以天子禮樂至世宗獨出睿見尊為先師孔子可為極崇祀之道矣曽廟配享從祀位次正德八年二月山東嘉祥縣修曽子廟成巡按御史李璣請以門人子思配享而以陽膚子襄公明儀沈猶行公明髙樂正子春公明宣單居離列于子思後從祀且請御製碑文以垂示無極禮部議覆詔曰顔子廟先已有御製碑矣曽廟亦不可無也其令翰林院製文賜之從祀先賢圖本正統元年忠州儒學訓導宋廉言欲將各處儒學從祀先賢名爵位次較勘明白刋成圖本頒行天下學校永為遵守從之進宋儒三人從祀正統二年乙亥以宋儒胡安國蔡沈真德秀從祀孔子廟廷先是廣東肇慶府知府王罃順天府通判曹銘等皆言春秋上丁祭先師孔子以歷代諸儒從祀斥揚雄而進董仲舒吳澄誠百世不易之盛舉也然而性惡之荀况短喪之杜預皆穿鑿陋儒尚祀廟廷而宋儒若胡安國蔡沈真德秀皆有功道學羽翼六經其格言微意擴先儒之未發處已行事又皆正大光明足以紹承道統之緒皆未得從祀事下行在禮部覆奏謂安國作春秋傳沈作書傳德秀作大學衍義學者宗之誠有功於聖門宜如其請故有是命議從祀進黜𢎞治二年禮科給事中張九功言文廟從祀世教所關不可不慎如蘭陵伯荀况扶風伯馬融偃師伯王弼成都伯揚雄俱得罪名教宜黜之本朝文清公薛瑄篤志好學於道有得宜進之從祀之列詹事府少詹程敏政亦言馬融劉向賈逵王弼何休戴聖王肅杜預八人雖有訓詁其行不足稱宜禠爵罷祀鄭衆盧植鄭玄服虔范寧五人雖若無過而所著未能發明聖學止宜各祀于其鄉申棖申黨其實一人位號宜存其一公伯寮秦冉顔何蘧瑗林放五人家語不載亦宜罷祀如以瑗放為不可無祀則祀瑗於衛祀放于魯或各附祭於鄉賢祠又后蒼有功於禮記宜與王通胡瑗二人俱加爵從祀又顔子曽子子思配享在朝而其父顔無繇曽點孔鯉列坐廡下於義未安請令各處廟學如鄉賢祠之制别立一祠中祀啓聖王叔梁紇而以無繇點鯉及孟子父邾國公孟孫氏配享程子父永年伯程珦朱子父獻靖公朱松從祀則重道之典明倫之義兩得之俱下禮部會官議於是禮部等衙門尚書周洪謨等言揚雄洪武中因行人楊砥之請已罷從祀薛瑄在成化初亦議其於明道著書尚未若黃幹輔廣之親承微言金履祥許謙之推衍緒説若后蒼雖能明髙堂生之禮然漢以二戴慶普三家立於學官而蒼之禮不與焉王通河汾之師道雖存而於聖人之道亦安望覃懷迓續之功若遽欲躋之從祀俱未敢以為然也至若啓聖王及泗水侯各為廟以祀於闕里久矣今欲通祀於天下而遂升孟子程朱之父以配之則於禮為太過置無繇點鯉於别廟而遂不得預享孔子萬世之祀則於義為不及况朱子在當時嘗因釋奠狀申禮部考正兩廡諸賢位次亦未嘗有一言謂荀况馬融王弼戴聖劉向賈逵何休王肅杜預鄭衆盧植鄭玄服虔范寧等非所當祀者此非慎於闕疑則必志於從厚者也又况南京國子監廟廷之祀嘗經我太祖神謨聖斷之所詳定今百有餘年矣臣等何敢復致議於其間哉謹僉議曰仍舊上是之覆吳澄從祀議𢎞治十四年禮部議覆掌國子監事禮部右侍郎謝鐸所陳三事謂叔梁紇立廟及吳澄從祀事鐸與學士程敏政嘗言之俱以廷議不合而止今請再集廷議嵗貢生員入監一年方許告就教職請如鐸議餘皆有不可行者惟論吳澄不當從祀時尚書傅瀚力詆鐸言為謬侍郎焦芳曰鐸言誠有難行者但草廬先生苦心著述雖若有功而出處大節則真有可議鐸言不當從祀是已瀚力稱前人之請為有見今不可遽易芳曰所謂前人者蓋楊士竒也今天下方議其當柄用之際雖從祀大事猶能私庇其鄉人可又襲其非耶瀚曰薛文清學徒博而少著述人猶曰能繼道統為之請列從祀况草廬著述之多可不祀乎芳曰不然文清著述雖少於草廬而出處之正則加草廬之上矣况以盡心知性之學達窮神知化之妙其讀書一録皆寫其身心之所得蓋在聖人所必與者豈常人所能識也然至今猶未躋之從祀草廬者著述其何以加之且道統者謂深逹往聖之域而身有之者也傳聖門之道者莫加於顔子後世稱未達一間彼豈以著述為逹耶今欲尚言而不尚行則取尋常士且不應如此而况道統之大顧謂能修辭立言者即是而不復論其節豈不悖乎瀚不能應於是會集諸廷臣議而芳不與瀚竟引禮所謂凡祭有其舉之莫敢廢詩書所謂率由舊章監于成憲以文其説而於澄忘宋事元之大節略不及澄遂仍舊從祀而鐸議皆寢論者謂士竒之以澄欺宣廟非特私其鄉人而措意亦有在瀚不悟此有惟溺鄉里之私而不顧君臣之大倫正道統之攸繫乃據為舊章成憲再不可議然則楊時奏黜王安石之配享當時安石豈無朝命而配享哉特其命雖出自朝廷而事實由臣下阿私所親以誤朝廷而非天下之公議所以易之後世竟不以為過也此豈橫私意於胸中者所能與哉兩地五經博士嘉靖二年命宋儒朱熹裔孫野為翰林院五經博士于婺源奉祀初御史王完言熹實徽之婺源人其宗族墳墓在建安已置博士世祀考其次子四世孫勳還居婺源宜如衢州孔廟例官其子孫嫡長者一人以主祀事禮部請下有司核實以聞故有是命議薛瑄諸儒祀嘉靖十八年先是御史楊贍樊待仁奏故禮部侍郎薛瑄國朝大儒宜從祀文廟詔下儒臣議時尚書霍韜侍郎張邦竒詹事陸深少詹事孫承恩祭酒王教學士張治詹事府丞胡守中庶子楊維桀諭德龔用卿屠應竣洗馬徐階鄒守益中允李學詩秦鳴夏閔如霖贊善閻朴司直謝少南吕懷編修兼校書王同祖趙時春編修兼司諌唐順之黃佐侍講胡經二十三人議宜祀庶子童承敘贊善浦應麒議宜緩贊善兼檢討郭希顔以瑄無著述之功議不必祀給事中丁湛等請從衆議之多者霍韜又欲黜司馬光陸九淵吕懷欲將道統正傳皆進之廟堂系於四配下至是禮部集議以請上曰聖賢道學不明士趨流俗朕今有感薛瑄能自振起誠可嘉尚但公論久而後定宜候將來童承敘浦應麒議是司馬光陸九淵從享與四配等位次俱歷代秩祀又經我太祖欽定俱照舊不許妄議慎重從祀議隆慶元年給事趙輄御史周𢎞祖請以故禮部侍郎薛瑄從祀下禮部議至是覆言孔廟從祀國家所以崇德報功垂世立教其典甚重我朝祖宗列聖增入名賢類皆宋元以上而明興二百年間未有一人誠慎其事也臣等謹考侍郎薛瑄潛心理道勵志修為言雖不專于著述而片言隻簡動示楷模心雖不繫于事功而偉節恢猷皆可師法尚書王守仁質本超凡理由妙悟學以致良知為本獨觀性命之源教以謹講習為功善發聖賢之旨此二臣者皆百年之豪傑一代之儒宗確乎能翼贊聖學之傳矣但瑄則相去百年輿論共服先朝科道諸臣建言上請纍十餘疏而儒臣獻議與瑄者十居八九世宗皇帝亦嘉瑄能振起然猶謂公而後明宜俟將來若守仁則世代稍近猶恐衆論不一請勑翰林院詹事府左右春坊國子監儒臣令其廣咨博討撰議進覽仍下本部會官集議以俟聖斷上是之附考正孔廟從祀議𢎞治十二年禮部右侍郎兼翰林院學士程敏政言臣聞古聖王之治天下必以祀典為重所以崇德報功而垂世教淑人心也故有功德于一時者一時祀之更代則已有功德于一方者一方祀之踰境則已然猶欲以勸一時範一方而不敢輕議焉况先師孔子有功德于天下萬世天下祀之萬世祀之則廟庭之間侑食之人豈可茍然而已必得文與行兼名與實副有功于聖門而無疵于公議者庶足以稱崇德報功之典若侑食者非其人則豈惟先師臨之神不顧歆將使典模範者莫知所教為弟子者莫知所學世教不明人心不淑通乎天下而施及後世其為關係豈特一時一方之可比哉邇者言官欲黜文廟從祀諸賢之有罪者詔禮部集議臣愚亦在預議之列疑其所言尚有未盡而議者相待憚于改作臣考之于書揆之于心不敢為異同謹畫一條陳上瀆聖覽一唐貞觀三十一年始以左丘明等二十二人從祀孔子廟庭蓋當是時聖學不明議者無識拘于舊注疏謂釋奠先師如詩有毛公禮有髙堂生書有伏生之類遂謂専門訓詁之學為得聖道之傳而併及馬融等行之至今誠不可不考其行之得失與義之可否而釐正于大明有道之世也臣考歷代正史馬融初應鄧隲之召為祕書歷官南郡太守以貪濁免官髠徒朔方自刺不死又不拘儒者之節前授生徒後列女樂為梁冀草奏殺忠臣李固作西第頌以美冀為正直所羞即是觀之則衆醜備于一身五經為之掃地後世乃以其空言目為經師使侑坐于孔子之庭臣不知其何説也劉向初以獻賦進喜誦神仙方術嘗上言黃金可成鑄作不驗下吏當死其兄楊城侯救之獲免所著洪範五行傳最為舛駁使箕子經世之微言流為隂陽術家之小技賈逵以獻頌為郎不修小節專一附會圖讖以致貴顯蓋左道亂政之人也王弼與何晏倡為清談所著易傳専祖老莊而范寧追究晉室之亂以為王何之罪深于桀紂何休則止有春秋解語一書黜周王魯又注風角等書班之于孝經論語蓋異端邪説之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武于朝及豫賓客為盜繫獄而武平心決之得不死而又造謝不慚先儒謂聖乃禮家之宗而身為贓吏子為賊徒可謂世鑒王肅在魏以女適司馬昭當是時昭篡魏之勢已成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及毌丘儉起兵討賊肅又為司馬師畫䇿以濟其惡若好人佞已乃其過之小者杜預所著亦止有左氏經傳集解其大節亦無可稱如守襄陽則數餽遺洛中貴要紿人曰懼其為害耳非以求益也伐吳之際因斫癭之譏盡殺江陵之人以吏則不廉以將則不義凡此之人其於名教得罪非小而議者謂能守其遺經若左丘明公羊髙榖梁赤之于春秋伏勝孔安國之于書毛萇之于詩髙堂生之于儀禮后蒼之于禮記杜子春之于周禮可以當之蓋秦火之後惟易以卜筮僅存而餘經非此九人則幾乎熄矣此其功之不可泯者以之從祀可也若融等又不過訓詁此九人之所傳者耳况其書行于唐故唐始以備經師之數祀之今當理學大明之後易用程朱詩用朱子書用蔡氏春秋用胡氏又何取于漢魏以來駁而不正之人使安享天下之祀哉夫所以祀之者非徒使學者誦其詩讀其書亦將識其人而使之尚友也臣恐學者習其訓詁之文于身心未必有補而考其姦諂淫邪貪墨怪妄之迹將自甘于效尤之地曰先賢亦若此哉其禍儒害道將有不可勝言者矣至于鄭衆盧植鄭玄服虔范寧五人雖若無過然其所行亦未能以窺聖門所著亦未能以發聖學五人者得預從祀則唐漢以來當預者尚多臣愚將戴聖劉向賈逵馬融何休王肅王弼杜預八人裭爵罷祀鄭衆盧植鄭玄服虔范寧五人各祀于其鄉后蒼在漢初説禮數萬言號后氏曲臺記戴聖等皆受其業蓋今禮記之書非后氏則不復傳于世矣乞加封爵與左丘明一體從祀則偽儒免欺世之名賢者受專門之祀而情文兩得矣一孔子弟子見于家語自顔回而下七十六人家語之書出于孔氏當得其實而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟壁所畫又多蘧瑗林放申棖三人先儒謂後人以所見增益殊未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一人也今廟庭從祀申棖封文登侯在東廡申黨封臨川侯在西廡重復無稽一至于此且公伯寮訴子路以沮孔子乃聖門之蟊螣而孔子稱瑗為夫子決非及門之士林放雖嘗問禮然家語史記邢昺注疏俱不載諸子之列秦冉顔何疑亦為字畫相近之誤如申棖申黨者俱不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不識于家語七十子之數宜罷其祀若瑗放二人不可無祀則乞祀瑗于衛祀放于魯或附祭于本處鄉賢祠仍其舊爵以見優崇賢者之意亦庶乎其名實相符而不舛于禮也一洪武二十九年行人司司副楊砥建議請黜揚雄進董仲舒太祖髙皇帝嘉納其言而行之主張斯道以淑人心可謂大矣然荀况揚雄實相伯仲而况以性為惡以禮為偽以子思孟子為亂天下子張子夏子遊為賤儒故程子有荀卿過多揚雄過少之説今言者欲併黜况之祀宜也然臣竊以為漢儒莫若董仲舒唐儒莫若韓愈而尚有可議者一人文中子王通是也通之言行先儒之論已多大約以為僣經而不得比于董韓云爾臣請斷之以程朱之説程子曰王通隱德君子也論其粹處殆非荀揚所及若續經之類皆非其作然則程子豈私于通哉正因其言之粹者而知其非僣經之人耳朱子曰文中子論治體處髙似仲舒而本領不及爽似仲舒而純不及又曰韓子原道諸篇若非通所及者然終不免文士之習利達之求若覽觀古今之變措諸事業恐未若通之精到懇惻而有條理也至于河汾師道之立出于魏晉佛老之餘逮今人以為盛則通固豪傑之士也今董韓並列從祀而通不與疑為闕典臣又按宋儒自周子以下九人同列從祀而尚有可議者一人安定胡瑗是也瑗之言行先儒之論已詳大約以為少著述而不得比于濂洛云耳臣亦請斷之以程朱之説程子看詳學制曰宜建尊賢堂以延天下道德之士如胡瑗張載邵雍使學者得以矜式朱子小學書亦備載瑗事以為百世之法臣以為秦漢以來師道之立未有過瑗者矧程子于瑗之生也欲致其與張邵並居于尊賢之堂其沒也乃不得與張邵並侑于宣聖之廟其為缺典信矣况宋端平二年議增十賢從祀以瑗為首若謂瑗無著述之功則元之許衡亦無著述但其身教之懿與瑗相望誠有不可偏廢者臣考之禮有道有德于教于學者死則為樂祖祭于瞽宗鄉先生歿則祭于社若通瑗兩人之師道百世如新得加封爵使與衡同列祀于學宫最得禮意一自唐宋以來以顔子曽子子思孟子配享坐堂上而顔子之父顔無繇曽子之父曽點子思之父孔鯉皆坐廡下臣考之禮子雖齊聖不先父食而三代之學皆所以明人倫也夫孔子之所以為教與諸子弟之所以為學者不過明此而已今乃使子坐于上父坐于下豈禮也哉若以為此乃論傳道之功則自古及今未有外人倫而言道者縱出於後世之尊崇非諸賢之本意恐諸賢於冥冥之中必有不安於心而不敢享非禮之祀者臣考之元至順三年嘗封顔無繇把國公諡文裕孟子之父孟孫氏亦嘗封邾國公臣愚乞下有司于各處廟學如鄉賢祠之制别立一祠中祠啓聖王以把國公顔無繇萊蕪侯曽點泗水侯孔鯉邾國公孟孫氏配享庶不失以禮尊奉聖賢之意臣又竊觀聖學失傳于五百年至程朱出而後孟氏之統始續則程朱之先亦不可缺况程子之父大中大夫封永年伯程珦首識濓溪周子于屬掾之中薦以自代而又使二子從逰朱子之父韋齋先生追諡獻靖公朱松臨沒之時以朱子託其友籍溪胡氏而得程氏之學珦以不附王安石新法退居于洛松以不附秦檜和議奉祠于閩其歷官行已俱有稱述臣愚乞將永年伯程珦獻靖公朱松從祀啓聖王祠使學者知道學之傳有開必先明倫之義不為虛文矣謹按家語所載七十二賢無秦冉顔何史記所載七十七賢無陳亢文翁石室而唐祀因之杜氏通典則有八十三賢而宋祀因之以左丘明等二十二人為先師則始于唐之貞觀以曽參等六十七人並為侯伯則昉于唐之開元至于孟子元加封亞聖公繼顔復聖公曽宗聖公思述聖公為四配升顓孫師為十哲則又至宋而始定焉又按從祀之説始于唐太宗時左丘明等以配食先師自是宋神宗益以荀况揚雄韓愈理宗加以周惇頥張載程皓程頤朱熹張栻吕祖謙度宗加以邵雍司馬光元人又加以董仲舒許衡本朝正統中又加宋胡安國蔡沈真德秀元吳澄四人者蓋安國傳春秋沈注書德秀著大學衍義澄著諸經纂言是皆有功于聖門者也已祀而黜者惟揚雄一人若孔聖之後有功聖德者無不祀矣惟楊時者從學二程載道而南使無時則無朱熹矣乃不得從于二程之後朱吕之前豈非闕典歟嚴名宦鄉賢祀嘉靖十三年八月內禮部題該巡按直𨽻御史鄭坤奏為廟災建言事條陳內開天地神祗歷代帝王道統師儒陛下精誠純敬設主立廟物無弗備義無不周堯舜三代之主無以過矣至于仕于其地而有政迹惠澤及于民者謂之名宦生于其地而有德業學行傳于世者謂之鄉賢陛下固令有司立有祠宇春秋祭祀矣然或徇情去取而賢否或至于倒置參酌弗公而淑慝或混於無别遂使忠魂義魄尚耻于絳灌同列正氣聰明不甘與草木同腐未免物不得平氣乖致異伏望陛下敕下該部即行天下掌印官會同儒學師生各查本處應祀名宦鄉賢俱遵照大明一統志所載逐一從公會議明白備將職位姓名及履歷行實各相講明務使事有考據衆無私議然後方許入祠見有祠者時加修葺原無祠者即便修蓋以及梵宇瑶宫等項先年奉旨拆毁淫祠事例已將私創及不係應祀之神俱已拆毁矣今後仍嚴禁有司不得假以拆毁之例肆為魚獵之場或利木石而尅落修理之價或改為書院而身動帑藏之積名則為國家毁淫祠實則為貪官開騙局監司昏暗準其申請為其所賣而莫知生徒有為俊秀者苦其虛拘被其騷擾而不敢言合行各省巡按通查各屬奉例之後拆毁者若干改造者若干要見有無尅落銀至自修治以後免其拆毁俯順愚民之心庶神不濫祀人不偷薄詩云神之聽之終和且平是之謂歟故曰崇祀等因抄呈到部議得名宦鄉賢之祀乃國家崇德報功盛典比來愛憎任情臧否失據名實不副激勸無聞今本官所奏具見敦本尚實相應依擬覆奉欽依通行各該撫按衙門行令提學官著落府州縣掌印正官及儒學師生備查各處名宦鄉賢果有遺愛在人鄉評有據未經表彰即便及時興立祠祀以勵風化若祠宇傾頺及未經立祠地方亦合查給無礙官錢擇地修蓋其或惠政殊常遺思不泯出于民心追戴願專立祠以申崇報者有司官員亦當代與申請聽其建言中間如有匪人濫預有干清議者亦要從公釐正禮部志稿卷八十五下
