body:
  text: 禮部志稿卷二明俞汝楫編聖諭成祖文皇帝敬天之訓永樂元年七月朔大祀天地預告太祖高皇帝配神告畢諭禮官曰祭天嚴父國家第一事必以恭敬為本固當自朕始然陪祀與執事之臣皆當同朕此敬庶幾感格之道爾等職典祀事尤宜夙夜直清以率於衆十一月朔南郊上南郊省牲還御奉天門進公卿大臣諭之曰祭祀莫大於郊古者犧牲粢盛不偹不潔不敢祭而帝牛滌三月其敬如此明日以始卿等繼朕省牲便應秉對越之誠不可怠忽自古天子之祭皆公卿助相國家生民受福卿等亦預享之不可不謹永樂四年正月上御武英殿覽存心録顧翰林侍臣曰適覽慕容超郊有異獸出壇側隋煬帝祀圓丘暴風未成禮而退後二人皆不旋踵而亡古人言惟德動天蓋不德亦動天善則降祥不善則降殃但各以類應之又曰祭祀時固當誠敬亦必平素積纍善行乃可獲福若平日所行反道背德而臨祭一時致其虔恭此豈有獲福之理永樂十一年春正月朔日有食之先是禮部以正旦朝賀宴會上請上曰古者日食天子素服修政用謹天戒朕既乖於治理上纍三光而衆陽之宗薄食於元旦咎孰甚焉爾文武羣臣尚思勉輔朕躬調燮隂陽消弭災變新正朝賀宴會之禮悉罷百官節鈔仍如例給之孝先之訓永樂元年五月禮部尚書李至剛等奏宋制凡忌日於各佛殿誦經設帝后位百官行香今後宜依宋制於天禧等五寺朝天宫令僧道誦經三晝夜上曰豫於父母固當無所不用其心但人君之孝與庶人不同為人君者奉天命為天下主社稷所寄生靈所依但當謹身修德深體天心恪循成憲為經國逺謨使內無姦邪外無盜賊宗社奠安萬民樂業斯孝矣如不能此而惟務修齋誦經抑末矣修省之訓永樂元年閏十一月書諭世子曰比北京山西地震坤道貴靜占法地震主兵數動人不寧上天示戒不可不謹宜撫綏軍士嚴固城池洞察人情不可怠忽又御奉天門顧侍臣曰比北京山西地震天變垂戒朕用惕然爾等試言其故侍臣對曰地震應兵戈土木之事上曰比年兵旅飢饉民困甚矣朕方夙夜圖蘇息之豈肯適一已之情興土木之工重困民力如樓居可以避暑則午門端門皆可居也何必復建高臺廣榭今後宫卑隘不足容尚不敢增修慮勞民力土木之事至今不為若兵戈但當敕邉將嚴守備戒不虞而已永樂二年十一月上以京師地震召文武羣臣諭曰隆古聖王之世山川鬼神莫不寧皆由君德修於上臣職修於下感應之機不誣後世君臣不能如古故災異數見今地震京師固由朕之不德然卿等亦宜戒謹修職以共回天意軍民有不便之事當速改之永樂八年十月夜月犯太微垣右執法上諭三法司官曰昨夜太隂犯執法甚急爾等典刑罰宜加謹慎無罪不可枉有罪不可縱須得中道毋纖毫輕重永樂四年六月朔日有食之是日隂雲不見禮部尚書鄭賜等言此聖德所感召請明日率百官表賀上曰正朕恐懼修省之際何可賀對曰宋盛時有行之者矣上曰於此一方隂雲不見天下至大他處見者多矣且隂陽家言日食而隂雲不見者水將為災以此言之可賀乎乃止永樂十九年四月敕諭文武羣臣曰朕恭膺天命祇紹鴻圖爰倣古制肇建兩京乃永樂十九年四月十八日奉天等三殿災朕心惶懼莫知所措意者於敬天事神之禮有所怠歟或祖宗有戾而政務有乖歟或小人在位賢人隱遁而善惡不分歟或刑獄寃濫害及無辜而曲直不分歟或讒慝交作諂諛並進而忠言不入歟或橫征暴斂剝削掊剋而殃及田里歟或賞罰不當蠧財妄費而國用無經歟或租稅太重徭役不均而民生不遂歟或軍旅未息征調無方而饋餉空乏歟或工作過度征需頻繁而民力凋弊歟或姦人附勢羣吏弄法抑有司闒茸罷愞貪殘恣縱而致是歟下厲於民上違於天朕之𡨕昧未究所由爾文武羣臣受朕委任休戚是同朕所行果有不當宜條陳無隱庶圖悛改以回天意永樂二十年正月朔日食上諭禮部臣曰日食天變之大者况在正旦永念厥咎惕焉於心卿等宜各修厥職以匡輔不逮遵制之訓永樂元年二月上謂禮部臣曰昔我太祖高皇帝立綱陳紀禮樂制度咸有成規建文中率皆更改使臣民無所遵守朕即位以來首詔諸司必遵舊制尚恐奉行不逮爾禮部其申明之丁未上諭禮部臣曰太祖高皇帝親製大誥三編使人知趨吉避凶之道頒行嵗久慮民間因循廢弛爾宜申明仍令天下誦讀鄉飲則講解如舊宗室之訓永樂元年四月賜晉王濟熺書曰皇考之世參酌古典詳定禮部儀車服器用各有等級比有言駙馬胡觀所乘棕輿其制度僣越與諸王無異詰其從來云爾與之夫諸王所用其制下天子一等君王之分可僭其漸既長何事不可僭矣繁纓小物孔子惜之爾繼今宜慎重不可率易永樂三年十月賜周王橚等皇明祖訓且諭之曰皇考所以垂訓子孫至要之道具在此書朝廷常守之可以永安宗社藩王常守之可以長保富貴朝廷與藩王本同祖宗所出但能皆以祖宗之心為心則自然各盡其道前代有帝王不能保全宗室如宋太宗亦有宗室不能自保全者如周三監漢七國此皆是不能以祖宗之心為心朕與諸弟勉之永樂三年五月上以代寧秦晉永興高平平陽諸王所為過失日多思豫訓戒以全親親之義賜書周楚齊蜀等王曰易曰履霜堅氷至孔子釋之其所由來者漸矣由辨之不早辨也故凡事慮於未萌則有益論於己然則無及我皇考太祖皇帝創業垂統為子孫帝王萬世之計惟欲本支各盡其道朝廷篤於親親藩國重於守法朝廷之紀綱明正親藩不齟齬於其間藩國之禮節不踰朝廷不苛責於其上恩不至於掩義義不至於傷恩宗社永有磐石之安親藩同享無疆之福此皇考立法之意亦吾繼述之意而諸弟姪之意亦皆然也吾嘗思之朝廷不能篤親親之道是不孝於祖宗不友於兄弟不慈於子姪棄仁背義咎孰大焉昔建文嘗蹈此失矣吾即位以來恆切戒此間居獨處教詔子孫亦惟在骨肉手足之恩不可為非禮苛責之事言出乎口心通乎天地鬼神蓋吾躬嘗奉藩豈其不能身體其事哉夫為藩國者亦當體朝廷之心而亮其誠天下之事至繁一人之精力有限智識豈能悉周區畫豈能悉當若吾於兄弟子侄行有未至亦宜以情恕之比代寧秦晉永興髙平平陽諸王不亮吾心稍不順意內懷怏怏或聼小人教誘為非甚者形諸怨謗魘鎮所為不知不仁固少年寡學之過吾恐傷同氣已皆容忍不問然此特私恩耳為君之道必正公義而後有以服天下况法度者皇考之法度吾嗣位而不能守之又何以服天下之心故雖不可虧親親之私恩亦不敢廢天下之公義夙夜思之事有兩難欲直言其故使之圖改則恐傷恩欲隱忍不言將來積過愈深理不得容是陷之於罪也至此非惟吾心不能自安天下之人亦謂吾徒能愛之而不能教之養成其過故皆直言以戒之矣雖未能必其不逆於心若有諒吾之意信而從之他日德成名立享其安樂與國家同久豈不兩盡其美哉兹特遣書陳布悃欵繼今之後吾惟常念親親之恩勿替諸弟侄亦惟常念皇考之法具在各盡其道共保富貴豈有涯哉吾之所言天地鬼神鑒臨在上惟宗國諸王亮之亮之永樂三年七月賜書周王橚曰比各府縣録周府長史司榜文來奏夫朝廷與王府體不同長史專理王府事豈得遍行號令於封外與朝廷等一家有一家之尊一國有一國之尊天下有天下之尊卑不踰尊古之制也今賢弟居國如諸子擅行號令於國中其亦可乎若姦人造此離間骨肉即具實以聞當究治之如實賢弟所命則速遣人收還仍嚴戒長史行事存大體毋貽人譏議永樂八年十月周王橚於國中作殿奉祀太祖高皇帝上聞之賜書曰禮支子不祭王國廟祀則肇於始封之王太祖高皇帝之祀朝廷自有宗廟王今祀於國中過矣孔子曰祭之以禮若不得為而為之不可為孝王其審禮而行毋貽物議永樂九年二月勑戒秦王尚炳曰昔周天子遣使賜齊桓公胙且命勿下拜桓公對曰天威不違顔咫尺小白敢貪天子之命無下拜遂下拜登受春秋書以示褒遣使賜晉侯命晉侯受玉惰使者歸曰晉侯其無後乎成肅公受脤於社不敬劉康公曰成子惰棄其命矣後皆不得其終春秋書以示戒比屢遣人賫符赴王國王不出迎但令內監取入及出見使者又侮慢不一此皆王不學之過不學何由達禮致王於此者皆長史紀善典儀之失職也其械送京師王自今勉力學問庶幾寡過永樂十年二月勑靖江王府輔國將軍贊億曰監察御史言爾交通衛卒以錢貸民多取利息至繫人妻孥逼脅鬻居以償所負古畜馬乘不察於雞豚伐氷之家不畜牛羊百乘之家不畜聚斂之臣國家舊制四品以上官不得與民爭利汝宗室之親乃恣肆如此果爾所為則赴京面陳若左右小人假爾名為之即械送京師永樂元年十月勑晉府長史龍鐔等曰朝廷封建親藩而選賢命材為之輔導兾以贊成德善不至於有過也古之為人臣者無外交今王府擅與西畨往來又私以車遞送王年少寡學而不知古長史儒者謂不知古乎廷臣皆欲置汝於法朕恐傷親親之意姑宥不問今後慎無復爾戒之戒之永樂十五年十二月勑戒永和王濟烺曰凡朝廷儀物制度等差截然不可違越比爾擅造印章僭用龜紐龜紐惟親王之寶用之爾擅為之越禮分矣以爾年少及念爾父同氣之故姑宥不問自今宜謹遵禮法毋蹈前過戒外戚之訓永樂二年四月春坊官劾奏中軍都督僉事李諒於文華殿早朝百官班退之後諒獨進啓事有違禮法請治諒罪上命姑宥之勑諭諒曰朝廷之法公於天下不以親踈有間朝儀凡百官謁東宫偕進偕退不許獨留私見乃謹始防微之道令行之初爾首犯之帝王行法先於貴近朕念親親之故曲宥不問其戒之慎之非分之恩不可再得爾其欽哉永樂四年八月賜趙王髙燧曰比聞都指揮欵台乘馬過駙馬都尉廣平侯袁容之門容怒其不下箠楚幾死欵台靖難功臣豈當非禮陵辱爾非不知亦不以聞自洪武以來往來駙馬之門何嘗有下馬之令晉王敦為駙馬縱恣暴橫卒以悖逆滅亡覆轍在前可再蹈乎此書觀畢仍以示容其受使令辱欵台之人械送京師巡狩望祭之訓永樂七年正月上謂禮部臣曰朕今巡狩蓋古人省方觀民之意服食之物皆偹以行都無取於民尚慮有司不體朕心妄有科擾使民未見德而先受害者必不宥之其遣使先諭道途所經及北京所屬郡縣朕至日止令正官一員朝見毋騷擾百姓永樂七年三月朔車駕巡狩北京駐蹕東平州望祭泰山畢顧侍臣曰昔舜巡狩至泰山舉祀禮覲諸侯一正朔考制度而已蓋欲使天下同風後來秦皇漢武皆生侈心登封泰山建立功德以誇示後世終不免後世之非議我太祖皇帝一天下立法制五六十年國不異政家不殊俗朕謹遵成憲此行亦惟欲親巡撫使軍民各得其所耳侍臣頓首曰陛下守太祖之法而以堯舜為心天下蒼生實受其福彼秦皇漢武何足道哉科試之訓永樂二年二月禮部奏請會試選士之數上問洪武中所選幾何尚書李至剛對曰各科不同多者四百餘人少者三百人上曰朕初即位取士姑凖其多者後不為例又曰學者成材亦難當取其大略其細如十分中有一二分語疵而不害理亦可偹數然科舉是國家取人材第一路不可濫且文體毋尚虗浮惟取朴實永樂十年二月命禮部尚書吕震諭考試官楊士竒金幼孜曰數科士頗多不免玉石雜進今取無過百人其務精擇收散木纍百不若得良材一株也學校之訓永樂二年二月禮部奏北方嵗貢生員入學十年考不中式者例當充吏上曰人心志舒泰則能學四體不勞則能學衣食溫飽則能學責人之功當量其力論人之罪當明其情北方近三四年間兵戈擾攘諸生舍俎豆而事軍旅飛芻挽粟之勞奔走流離之苦豈暇於學今考不中者可發回原學補其廢學年數以俟再試不中如例處之永樂三年八月上諭禮部臣曰學校育才以資任用太祖高皇帝內設國子監外設府州縣學選用師範教育俊秀嚴立教法豐廪蠲徭期待甚至建文以來學校廢弛所司又不督勵虗縻廪祿爾禮部宜申明舊規俾師教無闕士學有成庶幾國家得賢材之用永樂四年四月禮部言廣西嵗貢生員考不中式者二人於法學官罰俸一年提學官當杖上曰逺方之人漸化者淺教道未行不可槩論夫立法雖有定論行法當量人情有定論則民知所守量人情則民用不寃姑宥之生員遣歸進學再貢不中式一論如法永樂十年三月雲南布政司左參議吕名善言武定尋甸廣西三府居民繁庶請設學校從之上謂禮部臣曰學校風化所繫人性之善蠻夷與中國無異在上之人作興之耳永樂十五年三月頒五經四書性理大全書於六部並兩京國子監及天下郡縣學上謂禮部臣曰此書學者之根本而聖賢精義悉具矣自書成朕旦夕宫中披閲不倦所益多矣古人有志於學者苦難得書籍如今之學者得此書而不勉力是自棄也爾禮部其以朕意曉諭天下學者令盡心講明無徒視為虗文也育才之訓永樂二年六月上命禮部臣曰會試下第舉人既多其中必尚有可取者蓋慮一時匆猝或本有學問而為文之際記憶偶差遂至謬誤或本不謬誤而考閲之官神情昏倦失於詳審以致黜落此皆可矜其令翰林院出題再試擇文詞優等者以聞遂得貢士張鉉等六十人以奏上召見皆賜官帶命於國子監進學以俟後科且勉之曰士當立志志一則工專工專則業就爾等於學已有根本但更百尺竿頭進步耳後科第一甲人有不在爾曺乎其往勉之永樂三年正月命翰林院學士兼右春坊大學士解縉等於新進士中選材質英敏者俾就文淵閣進其學縉等選修撰曽棨編修周述周孟簡庶吉士楊相劉子欽彭汝器等二十八人入見上諭勉之曰人須立志志立則功就天下古今之人未有無志而能建功成事者汝等簡拔於千百人中進士又簡拔於進士中至此固皆今之英俊然當立心逺大不可安於小成為學必造道德之微必具體用之全為文必並驅班馬韓歐之間如此立心日進不己未有不成者古人文學之至豈皆天成亦積功所致也汝等勉之朕不任爾以事文淵閣古今載籍所萃爾各食其祿日就閣中恣爾玩索務實得於己庶國家將來皆得爾用不可自怠以孤朕期待之意奉先之訓永樂五年五月上問侍臣曰聞近俗之弊嚴於事佛而簡於事親其失果有之乎對曰間有之上嘆曰此蓋教化不明之故朕於奉先殿旦夕祇謁未嘗敢慢或有微恙亦力疾行禮世人於佛老竭力崇奉而於奉先之禮簡略者蓋溺於禍福之説而昧其本也率而正之正當自朕始耳祀功臣之訓永樂元年十月享太廟畢遣官祭功臣於雞鳴山廟先是禮部侍郎宋禮言功臣自有廟請罷太廟配享但於本廟祭之上曰先帝所定配享不可罷又曰此皆佐命開國之臣既自有廟俟太廟享畢亦别遣官即其廟祭之於義可也著為令崇儒之訓永樂四年三月上幸太學勑禮部臣曰朕惟孔子帝王之師帝王為生民之主孔子立生民之道三綱五常之理治天下之大經大法皆孔子明之以教萬世朕皇考太祖高皇帝膺君臨億兆之任正中夏文明之統復禮樂衣冠之舊渡江之初首建學校親祀孔子御筵講書守帝王之心法繼聖賢之道學集其大成以臻至治朕承鴻業惟成憲是遵今當躬詣太學釋奠先師以稱崇儒重道之意其合行禮儀禮部詳議以聞禮部尚書鄭賜言宋世謁孔子服靴袍再拜上曰見先師禮不可簡必服皮辨行四拜禮講書之訓永樂四年四月命禮部遣使購求遺書上視朝之暇輒御便殿閲書史或召翰林講論嘗問文淵閣經史子集皆偹否學士解縉對曰經史粗偹子集尚多闕上曰士人家稍有餘資皆欲積書况於朝廷可闕乎遂召禮部尚書鄭賜令擇通知典籍者四出購求遺書且曰書籍不可較價值惟其所欲與之庶竒書可得又顧縉曰置書不難須常覽閲乃有益凡人積金玉皆欲遺子孫朕積書亦欲遺子孫金玉之利有限書籍之利豈有窮也禮制之訓永樂元年十月勑禮部臣曰太祖高皇帝臨御命所司歷考禮樂制度恭酌古今上自朝廷下及臣民冠昏喪祭之儀服舍器用之制皆有等差著為定式頒布中外行之久矣朕慮今有司因循茍且奉行弗謹致有非分違法干犯刑憲非朕所以愛民之道爾禮部其以洪武中所定一切制度圖示中外俾人知遵守庶幾享太平之福永樂七年四月上諭行在禮部臣曰朝廷立法五十餘年服式器皿皆有定制比來臣民數有以越禮僭分罹刑憲者此教諭未至也即以舊定官民冠帶器皿制度繪為書册頒示中外及諸色工匠俾知遵守知民情之訓永樂十一年四月上謂行在禮部尚書吕震曰朕欲周知民之休戚嘗命凡布政司按察司及府州縣官至京者陳民間利病近有以時和嵗豐民安物阜為言者及驗視之田野荒蕪人民飢寒甚至水旱蟲蝗皆不以聞朕已置諸法如今後所言有切民情可裨治理者宜旌賞之以明懲勸取言之訓永樂元年甘州中衛左所軍張真言事上覽畢顧禮部侍郎宋禮曰雖堯舜禹之聖亦皆樂取人言以為治朕即位首下詔求言而言者無幾此戍卒能上言雖皆不可采然為國之意則善宜加賚之其賜衣一襲鈔一千貫又顧禮曰居其位無其言君子耻之卿等亦毋默默守位而已豐年之訓永樂四年六月南陽府獻瑞麥有兩岐至五岐者上語禮部臣曰比郡縣屢奏祥瑞獨此為豐年之兆若年榖豐登民足衣食老少無凍餒之患皆天地祖宗之賜矣命薦之宗廟節假之訓永樂七年正月元宵節近上諭禮部臣曰我太祖高皇帝君天下四十餘年法度明偹恪遵成憲今四方無虞兆民康阜思與臣民同樂太平自正月十一日為始其賜元宵節假十日百官朝𠫭不奏事急務具本封進處分聽軍民張燈飲酒為樂五城兵馬弛夜禁著為令清釋道之訓永樂五年直𨽻及浙江諸郡軍民子弟私披剃為僧赴京冒度請者千八百餘人禮部以聞上怒甚曰皇考之制民年四十以上始聽出家今犯禁若此是不知有朝廷矣命悉付兵部編軍籍發戍遼東甘肅又嘆曰朕遵承舊制一不敢忽下人尚縱肆如此何况後來此不可宥此輩皆民螟螣不可蕃育又直𨽻蘇州府嘉定縣僧會司奏縣舊有僧六百餘人今僅存其半請以民之願為僧者令披剃給度牒不聽上諭禮部臣曰國家之民服田力穡養父母出租賦以供國用僧坐食於民何補國家度民為僧舊有禁令違者必罪永樂十五年五月上謂禮部臣曰佛道二教本以清淨利益羣生今天下僧道多不守戒律民間修齋誦經動輒較厚利又無誠心甚至飲酒食肉逰蕩荒淫略無顧忌又有一種無知愚民妄稱道人一槩蠱惑男女雜處無别敗壞風化洪武中僧道不務祖風及俗人行瑜珈法稱火居道士者俱有嚴禁即揭申明違者殺不赦永樂十六年十月上以天下僧道不通經典而私簮剃者多命禮部定通制榜示天下今後碩為僧道者府不過四十人州不過三十人縣不過二十人限年十四以上二十以下父母皆允方許陳告有司行鄰里保勘無礙然後得投寺觀從師授業俟五年後諸經習熟然後赴僧録司考試果諳經典始立法名給與度牒不通者罷為民若童子與父母不願及有祖父母父母無他子孫侍養者皆不許出家有亡命避罪出家者併寺觀住持罪之眚赦之訓永樂四年西域貢佛舍利禮部尚書鄭賜請因是置釋罪囚上曰帝王之治以刑賞為務有功不賞有罪不誅雖堯舜無以治天下梁武帝元順帝皆溺於佛有罪者不刑致法度廢弛綱紀大壞而致於敗亡此豈可效况佛亦有天堂地獄善惡報應之説誘人為善爾儒者乃欲姑息為治耶賞將士之訓永樂九年十二月雨雪寒甚上御武英殿召禮部尚書吕震諭曰昔姦臣構凶朕率師征討當風雪寒苦之際將士有墮指裂膚者而勇氣不衰今宗社既安朕居天位適對此景思昔艱難惻然動心凡諸靖難將士各賜之鈔都指揮人三百貫百指揮二百五十貫千户鎮撫二百貫百户所鎮撫一百五十貫旗軍一百貫故官并總小旗父兄嘗在軍中凍傷皆如例懷逺人之訓永樂元年九月諭禮部臣曰太祖高皇帝時諸畨國遣使來朝一皆遇之以誠其土物來市易者悉聽其便或有不知避忌而誤干憲條皆置宥之以懷逺人今四海一家正當廣示無外外國有輸誠來貢者聽爾其諭之使明知朕意永樂元年九月禮部尚書李至剛奏日本國遣使入貢已至寧波府禁令凡畨使入中國不得私載兵器鬻於民宜命有司會檢畨船中有兵器籍封送京師上曰外夷向慕中國來修朝賀危蹈海波跋踄萬里道路既逺資費亦多其各賫以助路費亦人情也豈當一切拘之禁令至剛復奏兵器民間不得私畜則亦無所鬻惟當籍封送官上曰無所鬻則官為凖中國之人市之毋拘法禁以失朝廷寬大之意且阻逺人歸慕之心永樂二年五月禮部尚書李至剛等奏琉球國山南王遣貢方物就令賫白金詣處州市磁器法當逮問上曰逺方之人知求利而已安知禁令朝廷於逺人當懷此不足罪永樂二年福建布政司奏暹羅國遣使與琉球通好其舟為風所漂至岸官已籍記舟中之物請命上謂禮部臣曰兩國通好是畨邦美事其舟為風所漂正宜矜恤豈可利其物而籍之鄉有善人猶能援人於危助人於善况朝廷統御天下哉其令布政司舟壞者為之修理人乏食者給之粟俟風便其人欲歸或往琉球導之去永樂五年六月上問禮部臣曰近四夷之情何如對曰蠻夷之情由來叛服不常數年陛下懷之以恩待之以禮今皆恱服無復反側之意上曰朕素待之以誠彼或不誠亦不與較故或有感激愧服者孔子嘗曰言忠信行篤敬雖蠻貊之邦行矣聖人之言萬世可行永樂八年十一月賜國子監琉球等處生李傑等并其從人冬衣靴襪既而從容與羣臣語及之禮部尚書呂震曰昔唐太宗興學校新羅百濟皆遣子入學當時僅聞給廩膳未若今日賚與周偹也陛下聖德前古未有上曰逺方慕中國禮義故遣子入學必足於衣食然後樂學我太祖高皇帝命資給之著為令典所謂曲成萬物而不遺者朕安得違之永樂十一年五月國子監琉球生模都古等三人奏乞歸省上謂禮部臣曰逺人來學誠美事思親而歸亦人情宜賜以榮之遂賜綵幣表裡襲衣及鈔為道里費仍命兵部給驛傳永樂十四年六月廣東儋州土官同知王賢祐率生黎洞首王撒黎佛金等來朝貢物賜鈔幣遣還上謂行在禮部臣曰黎人逺處海內素不霑王化今慕義來歸而朝貢頻繁殆將困之非存撫之意自今生黎土官洞首俱三年一朝著為令永樂元年上謂禮部臣曰帝王居中國撫馭萬國當如天地之大無不覆載逺人來歸者悉撫綏之俾各遂所欲近西洋回回哈只等在暹羅聞朝使至即來朝逺夷知尊中國亦可嘉也今遣之歸爾禮部給文為驗經過官司毋阻自今諸畨國人願入中國者聽永樂元年安南國王胡遣使奉表謝恩上命禮部臣諭之曰安南昔稱知禮之國今思明府言祿州西平州永平寨皆思明故地與安國接境安南奪而有之其歸語王如非安南地則速歸之保境安分惇修鄰好可以長享富貴也却慶賀之訓永樂二年七月禮部尚書李至剛奏今嵗山東郡縣野蠶成繭繅絲來進請率百官賀上曰野蠶成繭亦常事不足賀使山東之地野蠺盡繭足以被其一方而未能遍及天下朕之心猶未安也朕為天下父母一飲一食未嘗忘之若天下之民皆飽暖而無飢寒此可為朕賀矣乃止永樂三年七月陜西興平鳳翔二縣進瑞麥三十本禮部率羣臣上表賀以為聖德覆被之應天下太平之徴上覽之謂尚書李至剛侍郎趙翀曰瑞麥固是喜應但四方逺邇靡一物不得其所斯可為太平今中外果無匹夫匹婦之愁怨於下者乎覽表祇益慚愧耳君臣貴相與以誠諛佞非治世之風也至剛等愧謝永樂七年七月順天府密雲縣民獻嘉禾先是行在禮部尚書趙羾以禎祥疉見若兩岐之麥野蠺成繭日食不見之類皆欲稱賀上悉却之至是又因獻嘉禾欲率廷臣上表賀上曰古之帝王為治尚敦實黜浮華朕德不逮但得四敘協和海宇康乂黎民衣食給足即國家之福一物之異皆偶然耳何以賀遂止八月山西代州繁峙縣獻嘉禾二百七十九本羾又奏曰前密雲嘉禾陛下却羣臣之賀今嘉禾又至此實聖德之應請率羣臣上表賀上曰朕奉天子民正願天降豐年使四海之人皆足今蘇松水患未息近保定安肅處州麗水皆雨雹渾河決於固安傷禾稼且四方之廣尚有未盡聞者不聞羣臣一言及弭災之道而喋喋於賀嘉禾謂禎祥朕德所致其災異非朕所致乎爾等宜輔朕修德行政他非所欲聞也永樂十一年五月曺縣獻騶虞行在禮部尚書呂震奏騶虞上瑞請明旦率羣臣上表賀上曰百榖豐登雨㿩時順家給人足此為上瑞騶虞何與民事不必賀永樂十二年九月榜葛剌國王賽佛丁貢麒麟禮部請上表賀上曰海宇清寧逺人嚮化貢獻方物斯皆天與祖宗之祐卿等但當夙夜竭心輔治以惠天下天下既安雖無麒麟不害為治其免賀永樂十三年九月西域貢獅子文武羣臣以為聖德逺及所致叩頭稱賀上曰逺人貢方物以達誠何用賀詩所稱唐虞三代之治曷嘗及祥瑞蓋古聖賢之君但求時和嵗稔百姓家給人足即是太平隋煬帝時孔雀集朝堂百官稱賀元順帝時兩都桑果葉皆生黃色龍文又有嘉禾一莖至八穗者又常有五色祥雲見恃此而驕卒皆亡滅前鑒如此朕與卿等但當祇守祖法敬事無怠以保鴻業不可萌侈心十一月麻林國進麒麟將至行在禮部尚書吕震請於至日率羣臣上表賀上曰往者翰林院言修五經四書及性理大全書成欲上表進朕則許之蓋帝王修齊治平之道具於此有益世教可以表進麒麟有無何所損益遂已永樂十三年貴州布政司右布政使蔣廷瓚言去年北征班師詔至思南府婺州縣聞大巖山有聲連呼萬嵗者三咸謂皇上恩威逺加山川效靈之徵禮部尚書呂震請率羣臣上表賀上曰人臣事君當以道阿諛取容非賢人君子所為呼譟山谷之間空虗之聲相應理固有之豈是異事布政司官不察以為祥爾為國大臣不能辨正其非又欲進表媚朕非君子事君之道遂已永樂十四年八月旦壽星見欽天監以聞行在禮部尚書吕震帥文武百官請上表賀上賜敕諭之曰朕惟太祖高皇帝膺受天命掃除羣雄創業垂統立綱陳紀以安天下臻兹太平是以上天垂象屢顯鴻應揆朕涼薄曷克膺兹矧天道無常惟德是輔凡為臣民能遵守高皇帝成憲為子盡孝為臣盡忠奉公守法安分守己用承福祐國家之祥孰大於此爾文武臣僚宜各盡乃心輔朕不逮國家有永逺之安爾等暨爾子爾孫亦同享永逺之福壽星之瑞其勿賀永樂十五年七月旦壽星見百官請賀上曰比嵗壽星見卿等以為瑞而致賀然四方旱潦蝗疫比比有之而鮮有為朕言者朕之所願時和嵗豐天下之人俱得其所賢者在位讒慝不作百工舉任其事政平訟理國家清明此可為瑞壽星之瑞不足賀永樂十五年十一月金水河及太液池氷凝具樓閣龍鳳花卉之狀竒巧特異賜羣臣觀之行在禮部尚書吕震以為禎祥屢見率百官上表賀上拒不受賜勑諭曰朕德涼薄託於萬姓之上懼弗克負荷夙夜祇事不敢暇豫比嵗以來卿等一遇祥異輒進表賀朕𡨕昧寧不自知夫戒謹者治之所興宴樂者亂之所自卿等宜精白乃心勵臣職奉成憲用以輔朕共承天休書曰后克艱厥后臣克艱厥臣政乃乂其毋因是遂有怠心欽哉永樂十七年九月卿雲見欽天監言占事卿雲喜氣也太平之應又曰天子孝則卿雲見君聖臣賢天下順心則日旁氣如龍鳳茲實上瑞行在禮部請率文武百官上表賀勑免之且諭侍臣曰昔帝舜之世萬邦協和故百工有卿雲相和之歌朕寢食之間恆慮政事有缺民生未安安敢恃此為祥縱是上天委貺朕與卿等正當憂勤惕勵以答天眷何以賀為永樂十九年萬壽聖節先期禮部奏行慶賀禮上勑文武羣臣曰比者上天垂戒奉天等三殿災朕心兢惕寢食不寧方反躬省愆不遑夙夜而禮部謂朕初度請行慶禮此豈所以相朕恭承天意蓋益重朕之不德也其止弗賀却閹人之訓永樂四年琉球國進閹者四人上曰彼亦人子無罪而刑之何忍其還之禮部臣言還之慮沮逺人歸化之心請但賜勑止其再進上曰諭之以言不若示之以實事今不遣還彼欲媚朕必有繼踵而來者天地以生物為德帝王乃可絶人類乎竟還之却封禪之訓永樂十四年四月禮部祠祭清吏司郎中周訥上言今天下太平四夷賔服民物阜豐請禪泰山刻石紀功德垂之萬世尚書吕震亦言皇德神功昭格上下宜如訥請上謂震曰今天下雖無事然水旱疾疫亦間有之朕每聞郡縣上奏未嘗不惕然於心豈敢自謂太平之世且聖經未嘗言封禪唐太宗亦不謂封禪魏徴每以堯舜之事望太宗爾亦處朕於太宗之下亦異乎徵之愛君矣爾當以古人自勉庶幾不愧宗伯之任禮部志稿卷二
