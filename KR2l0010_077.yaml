body:
  text: 禮部志稿卷七十七明俞汝楫編宗藩備考藩禮國内禮儀洪武十九年十二月内本部奉太祖髙皇帝聖㫖今後親王所在去處凡遇正旦冬至千秋節日只許本國在城軍民官員慶賀在外府州縣衞所及守邉衞門不許慶賀遇有事務許首領官承差人等具本啟聞並不許差遣將官有妨公務任禮部行文書去與長史都司知道欽此洪武二十五年二月内河南按察司呈本部㑹官議得長史縁係按察司故牒衙門左右係五品衙門官員本司僉事方面正三品衙門五品官凡遇公座公宴序坐左右長史班次于按察司僉事之次若親王一時有令㫖賜坐不在此例奏奉太祖髙皇帝聖㫖是按察司僉事是方面官員不拘常例也着入殿坐于長史之上欽此洪武二十八年九月内本部官於右順門欽奉太祖髙皇帝聖㫖靖江王庻子稱王子𤼵放的言語稱裔㫖一應官員人等恭見并時節慶賀都行四拜禮常見行一拜禮都不叩頭欽此成化三年二月内廵按江西監察御史趙敔奏稱京官出使公差朔望日應否同三司等官至王府門外候見及查無敕至王府并王府進表祭祀随同行禮王府東西四門應否下馬等因本部照得前項禮儀舊制俱無該載今議得京官公差出使在外道經王府例該報名見辭如遇朔望三司等官俱至府候見公差出使人員亦各詣府随班行禮若王府進表祭祀儀王府應行禮儀出使公差官員無所干預不必随同行禮王府門首官員人等禮當下馬亦宜逺引而行不許逼近横絶等因具題奉憲宗皇帝聖㫖是欽此𢎞治十七年七月内楚王奏稱文武官員陪祀社稷等壇止輪左貳慶賀表箋止委首領封王節至則不用朝服以迎見王宴畢或只為長揖以退伏乞申明戒𠡠其稱呼不稱臣于禮固是然須别有稱謂等因本部查得節該廵撫四川右副都御史鍾蕃奏為嚴禮法以塞訟源事内開朝見親王應否稱臣等因本部查得節該題准事例親王到國除本府官屬照例稱臣其餘文武官員慶賀禮儀止具職名原不稱臣係是聖祖欽定禮儀似亦有據其陪禮慶賀迎節見王等項悉遵禮制等因覆題奉孝宗皇帝聖㫖是欽此正徳三年七月内榮王奏稱分封之國伏望特㫖姑容承奉長史出入三司中門等因本部先年㑹官議得昔我太祖髙皇帝初設左右王傅其秩二品後来改設長史司降為五品當時欽定行移體式明白著長史司具呈牒呈三司之制公聚禮儀又明開王府官屬各照品級俱在朝官之次近年親王長史雖蒙特㫖陞支四品俸然依舊五品衙門今後長史司遇有王命止該行移三司施行若有公事不得已相接為長史者自當安分從謙為三司者亦量宜優待等因題奉武宗皇帝聖㫖是既議㑹已定只照舊例行欽此嘉靖元年五月内靖江王奏更改禮儀事該本部查得𢎞治十一年三月内該廵撫四川右副都御史鍾蕃奏為申嚴禮法以塞訟源事本部議題查得皇明祖訓内開凡朝臣奉使至王府或因使經過見王並行四拜禮其王所居城内布政司都指揮使司并衛府州縣雜職官皆于朔望日至王府門候見此係朝見親王禮儀其朝見郡王舊無定禮又查得見行事例郡王各城居住者有事逕奏其餘一城居住者有事具啟親王類奏合無郡王與親王一城居住者統于所尊不必朝見其各城另住郡王一體朝見又查得諸司職掌内載凡朝見稽首頓首五拜乃臣下見君上之禮稽首四拜者百官見東宫親王之禮合無除王府官屬照例稱臣外其餘文武官員見王止稱本官職銜朝見及慶賀之時行四拜禮不叩頭朔望随班行禮之時行一拜叩頭禮等因具題奉孝宗皇帝聖㫖准議欽此今靖江王又稱各該官員慶賀行八拜禮自其髙祖之國以来相傳舉行仍要照依㑹典欽定拜禮欲令各官遵守臣等竊惟祖宗制禮先後因革意義攸存恭詳㑹典所載八拜禮儀係洪武十八年所定其後祖訓職掌俱無開載百五十年間各王府慶賀傳有舊規不開講議至𢎞治十一年該廵撫四川都御史鍾蕃具奏該本部具奏題准前項禮儀益為明白又奉有孝宗皇帝欽依文武官員朝見并慶賀行四拜禮朔望行一拜叩頭禮合候命下本部類行廣西布政司轉行該府長史司啟王知㑹仍照先朝舊規凡遇慶賀除王府屬官外其餘文武官員俱常服行四拜禮儀奉聖㫖是王府慶賀行禮祖訓及諸司職掌開載甚明又有𢎞治年間奏准儀節遵行已久靖江王府如何妄行奏擾且不查究你部裏還通行申明與各處王府知道欽此同城禮儀正徳三年五月内府襄垣恭簡王第五子管理府事鎮國將軍仕坏奏稱宗支繁衍凡有迎接詔𠡠并賀聖節千秋正旦等節乞比慶成永和二府事例與山隂王府各自拜賀得以盡報本之私且息不睦之訟等因本部議得合無照依永和慶成二府事例備行該府教授且啟山隂王并仕坏知㑹凡遇迎接詔𠡠俱在山隂一府行禮其聖節千秋正旦等節本府行禮等因覆題奉武宗皇帝聖㫖是准本府行禮欽此嘉靖二十六年二月襄垣山隂二府奏爭禮儀該本部尚書徐某議照禮歸至當情欲相安為之收渙合離俾可即窮通變此篤倫睦族之大端也二王之爭禮也在山隂則欲從始封之長㓜而一定不移在襄垣則欲論一時之尊卑而逓相更易偏執已私各雄其説無端肆毁為禮成仇彼此奏辯已皆不下百十餘次節經本部行駁勘報前因大抵爵同則論倫爵殊則論爵二府沿革可放而見也但以歷年勘合之文觀之則襄垣王随山隂王者禮之始也其既屬之襄垣王以山隂王未封也又既也柝而為二以襄垣王得請也是雖歴世屢更而意若主于山隂此山隂所以執此以求勝也及考之慶成永和宣寧隰川四府習舊從尊並無爭異則其與二府也事體既屬相同儀節見有可據此襄垣所以執此以必爭者也蓋畫一之規實無典章開載而好勝之説卒難定其是非但禮既至于可爭則勢固難于強合意既生于所忌則法必宜乎從權今據勘官所擬雖彼此先後之間詞若含糊而分屬另行之説意亦有在况二府怨詈既出搆結已深若仍聚處一府終必别生事端致傷骨肉誠有如勘官所云者為今之計固欲永㧞禍本豈為暫息爭端而已除表箋慶賀救䕶等項已經各另行禮無容再議外合無已從凡遇頒降詔𠡠到于代府從本府謄黄二通齎至蒲州分送二王府各自迎接到府開讀并令蒲州製造龍亭一様二座待取用之時各送兩府俾無先後其蒲州并守禦干户所合屬官吏聴其調停𣲖為兩班分投赴府随班行禮其餘一應禮儀未經議及者俱照此例行仍乞明㫖特𠡠二府永為遵守用全懿親不得挾私逞忿意圖專權再行爭奪庻交際以寡既足以杜釁孽之端彼此各全其尊于尊尊長長亦兩無所失矣若慶成永和宣寧隰川輪逓從尊情既相安行之亦久即照四府之舊不必轉相視效致起紛更及照州所官雖兩班随拜然正佐之分終不能免少有差别爭猶未已合無不拘年月定以次数令本州掌印官輪流前往毎府一次不致輕重其間惟復聖明别賜裁㫁等因題奉聖㫖這兩府禮儀着照慶成等府輪逓從尊行著為定式不許紛爭致擾欽此王國相賀儀𢎞治十二年八月内徳王奏照得臣初之國魯府差典寳正張貴前来看賀今衡王之國臣欲差官前去行禮𢎞治十五年二月内鄭王奏稱汝王分封到府與臣地界相連欲行遣官看賀等因本部查無事例覆題節奉孝宗皇帝聖㫖罷欽此代行禮儀𢎞治十二年八月内岷王奏稱原患痰氣等疾不時舉發乞命庻長子江陵王彦汰代行禮儀管理府中諸事該本部議得父在子攝國事多有起釁致尤不可輕易今岷王不係沉錮之疾合令照舊管理其一應禮儀暫令彦汰代行題奉孝宗皇帝聖㫖是欽此𢎞治十四年十二月内肅王奏稱近患暗風病症乞將世子真淤暫理府事代為行禮該本部議令世子真淤代為行禮題奉孝宗皇帝聖㫖欽此𢎞治十六年九月内徽王奏稱舊疾牽纒國事合令世子祐擡代行該本部議得徽王年方強壯既稱舊疾舉發合無俯順其情凡一應禮儀暫令世子代行候王病可之日照舊舉行題奉孝宗皇帝聖㫖是欽此正徳四年該本部議得凡親王父病而子孫代為行禮乃職分之所當然但父在子不得自專其于府中諸務不許擅自管理若王果患篤癈之疾先須具實奏聞本部行勘明白請自上裁奉武宗皇帝聖㫖是欽此嘉靖二十五年三月内靈丘王聰滆奉臣先因有疾不能行禮已經奏令長子俊格代行禮儀暫理府事今俊格病故臣年七十二嵗老病日甚難以動履所有府事禮儀乞命長孫充禩代行該本部議得先年靈丘王奏稱老疾查勘是實准令長子俊格暫代行事今俊格病故合令長孫充禩代行禮儀暫理府事候王病痊之日照舊舉行題奉聖㫖是欽此嘉靖三十一年二月内靈丘王聰滆奏臣年老先蒙命臣長孫充禩代行禮儀不幸病故乞令曾孫廷址代行該本部議得靈丘王年齒益髙病勢益篤府事委行代理况查有俊滆前例合令曾長孫廷址代為行禮題奉聖㫖是欽此行禮次序景㤗六年四月岷王奏稱長子音垽為岷世子臣弟徽煝為江川王嵗遇萬夀節等及家庭往来行禮縁無儀注伏乞欽定等因本部看得以宗子法言之則以長嫡為重以家人禮言之則以尊卑為先凡遇節令行公禮則當依宗子法重在世子家庭往来行私禮則當依家人禮尊歸伯叔及查得宣徳十年十一月該秦王奏弟永興王志樸来啟凡遇聖節等項禮儀俱係各郡王本府自行皆不曾来秦府行禮伏覩祖訓及儀注内亦無率領各郡王行禮伏乞仍令各郡王于各府行禮等因奏奉宣宗皇帝聖㫖只依洪武永樂年間例行禮部便行文書與長史司知道欽此欽遵今岷王奏稱前因合無照依前例行禮覆奏奉景宗皇帝聖㫖是欽此𢎞治四年五月宣寧王長子成鉆奏稱臣父存日凡遇萬夀節等俱為班首行禮今臣父既歿惟伯父鎮國將軍仕堁最長合為班首等因本部議得成鉆已封長子係應襲王爵之人凡拜牌祝賛合令成鉆為班首題奉孝宗皇帝聖㫖是欽此弘治五年二月寧府鎮國將軍覲鋋奏稱忝居宗室與諸郡王皆為一氣之親其間兄弟孫姪有為郡王者有為將軍者各守爵職毎遇拜賀聖節并節令俱無尊卑之列先来者儘佔上立乞要頒降禮儀毋令攙越該本部議得合無通行各王府長史司啟請郡王將軍知㑹凡遇拜賀聖節等項各照爵職崇卑立班行禮覆題奉孝宗皇帝聖㫖是欽此正徳四年十一月該靈丘王奏稱長子俊格荷蒙聖恩封為長子凡遇萬壽等節行禮其間有鎮輔奉國將軍係叔祖及諸叔難以行禮等因該本部議得郡王長子序立禮儀祖訓不曽開載為長子者豈可列于叔祖諸叔之前但俊格既受長子之封則凡行公禮當依案長之法位次列在靈丘王之後與兄弟一行而立但俊格獨居中道等因覆題奉武宗皇帝聖㫖是欽此表奏遵式永樂八年八月内晉府進賀平邊表文中間畧無稱述平邊事實本部官具奏奉太宗皇帝聖㫖洪武年間這等撰寫表文侮慢不敬的都拿来重罪了見有太祖皇帝號令申明在外這厮們如今都不怕又這般無禮都察院出批錦衣衞差人去將撰寫的人與那長史紀善都拿来問欽此嘉靖十六年九月鄭王奏本四本本内稱弟不稱臣又不稱聖號俱稱皇兄字様又進到表文二通俱各稱弟鄭王厚烷不稱臣俱稱皇兄陛下不稱聖號該本部恭照君臣之分同于天地國家定制宗室懿親雖係伯叔尊行亦必䖍恭寅畏稽首稱臣執禮惟謹所以嚴大分遏僭踰尊陛下森然毫髮不可違者也今恭看得鄭王奏進慶賀謝恩四疏及進賀表文乃輙用家人之禮俱各稱弟不行稱臣又俱稱皇兄不稱聖號是徒知親愛之私情罔識君臣之大分顯是該府長史等官不諳典制有失輔導以致王于有過之地事屬有違法當查究合候命下移咨都察院轉行廵按河南監察御史將該府輔導提問如律仍行長史司啟王知㑹及通行天下各王府今後奏進章䟽表文務要恪循典制不許妄意稱謂有乖禮法庻恩義並舉皇度惟貞而宗室各知所儆矣等因奉聖㫖卿等説的是該府長史等官本當都查提問罪的且饒這遭各罰俸三個月便通行天下王府一體遵守欽此嘉靖三年七月代王奏襄垣王成鍨朦朧奏准將御名敕書徑賜該府等因奉聖㫖禮部知道本内御名字義著查恭来説欽此欽遵該本部查得洪武正韻御字註曰天子所止謂之御前書曰御書服曰御服皆取統御四海之義賜字註曰上予下曰賜由此觀之則御之為字非臣下所得稱而凡上之所予皆當稱賜也今宗室請名于上上以名而降敕焉此于義當稱賜名勅書而代王奏内乃用御名字様事屬違錯恭看得該府長史承奉孤陋寡聞不學寡術平時乏匡輔之才臨文昧敬慎之道以致代王有此過舉相應究治合候命下移咨都察院轉行廵按御史將長史承奉查提到官問擬應得罪名徑自奏請發落以儆將来等因奉聖㫖是欽此恭詳奏事正綂九年令各郡王奏事俱先令長史司啟親王知㑹恭詳可否然後出批付令奏聞惟機宻事不在此例𢎞治五年奏准各王府但有一城居住者凡婚䘮等事毎年春秋二季總啟大府類奏𢎞治十三年申定各郡王并將軍中尉凡有奏請先令長史司具啟親王知㑹恭詳可否若應該具奏者然後給批差人齎奏如違該衙門將齎奏人員并教授一體恭究其所奏事件仍行長史司具啟親王查勘明白具奏方纔施行若機宻重事或與親王事有干渉及郡王分封不在一城居住者許令徑自具奏如無前項事件驀越来奏者所司備查前例上請區處若已經恭奏勘問未結重復奏擾即將奏詞立案不行𢎞治十六年奏准儀賓應奏事情合照郡王將軍中尉事例令長史司具啟親王恭詳代奏正徳元年奏准各王府選中子弟止許給與本身批文聴帶一二人自備盤費来京不許有司應付廩給脚力亦不許差帶旗校攪擾正徳四年九月鎮守河南太監廖堂題該本部議得各王府有奏請事件毎因一事輙差一人前来齎進應付廩給馬匹口粮脚力以致供應浩繁民生困窘今後除有機宻重事等項及請封王爵外其餘請名等項聴該府長史司并郡王相離窵逺例該另奏俱于一年春秋兩季類奏其餘謝恩等項亦各于毎年春首類謝覆題節奉武宗皇帝聖㫖是廖堂所言有理王府人員不係批差的不許在京潛住營求的事違了的治罪不饒欽此正徳四年九月鄭府繁昌王韓府褒城王秦府輔國將軍誠灍各違例徑奏請乞本部查恭覆題奉武宗皇帝聖㫖是這各郡王將軍不經本府驀越奏事有違舊例該府教授着廵按御史提問了来説欽此正徳四年該本部議得各王府齎進表箋及奏事謝恩等項合應并禁約事件節經奉有欽依但恐行之日久不無怠忽本部合行兵部轉行各該驛逓衙門查騐各王府差委人員如有違例到彼需索廪給脚力者不許應付仍將需索之人申送本處廵按御史從重問擬其各府所差人員除闗領外其餘俱要嚴立程限如儀賓進表事例刻期囬還如有在途延緩及在京潜住營求幹事者本部照例恭究等因奉武宗皇帝聖㫖是欽此正徳八年題准各王府除機宻及與親王干渉外其餘事情郡王將軍而下悉令長史教授具啟親王并另住郡王恭詳明白差人類奏或本無機宻本無干渉而揑稱機宻干渉及以假建言為報復之舉者奏詞立案仍將差来人役送問其長史教授遇有各爵應奏事件即與具啟親王郡王案季類奏不得阻抑正徳十四年令各王府差人赴京奏事并慶賀進貢者事完即囬該管官吏并緝事衙門催起程如有延捱不行者具奏治罪賞賜使臣永樂八年十月内該本部奉太祖髙皇帝聖㫖各王府糧有數的他支費也大朝廷差使人員及經過到府的都要王毎賞賜王那得許多錢糧答應他若與他的便説王好若不與他的便説王不好若是朝廷有分曉的不聴他説便拿問罪使他的奸計不得行全親親的意多少好處若是朝廷無分曉的聴他説便離間了骨肉正中他的奸計好生不便當恁禮部便寫啟本各王知道今後朝廷一應差使人員及經過見的官員一應人等或與他酒醉飯飽便罷或不與他也罷不要賞他物件欽此欽遵正徳四年該本部議得前件已經遵奉去訖但恐行之年久人心怠玩合再申明今後一應差人王府官員人等若有需索財物者許廵按御史并按察司指實恭究照依欽奉太宗皇帝聖㫖𤼵落庻法令昭明而貪墨知戒奉武宗皇帝聖㫖是欽此親王朝覲𢎞治七年十月内節該崇王奏稱皇上嗣登寳位太皇太后甲子一周欲行到京慶賀節該本部㑹官議皇明祖訓雖有親王朝覲之制但自洪熈宣徳以来鮮行此禮英宗皇帝在位年久畧舉行之以故襄王亦曽来朝今經年逺烏可一旦驀然創始等因覆題奉孝宗皇帝聖㫖是寫書免王来朝欽此正徳四年十二月該本部議得崇王事例已經本部反覆議處有前項欽依去訖自後各王府親郡王但有奏乞請親自謝恩慶賀等項者俱各遵照前例寫書免来永為定例推廣宗室初制宣徳元年定宗室將軍中尉郡王縣主郡君縣君鄉君儀賓品級冠服儀式先上謂行在禮部尚書胡濙等曰皇明祖訓凡郡王次子及孫稱鎮國輔國奉國將軍中尉皆定與禄米未有品秩其女及孫之壻皆稱儀賓亦未定品秩今支庻日繁宜有定分其冠服儀從可准禄米為差爾與諸尚書學士定議以聞至是濙與尚書蹇義夏原吉大學士楊士竒楊濙等㑹議太宗文皇帝時靖江王衆子當授輔國將軍准其禄米定為從二品今倣此例鎮國將軍嵗禄米一千石為從一品輔國將軍八百石為從二品奉國將軍六百石為從三品鎮國中尉四百石為從四品輔國中尉三百石為從五品奉國中尉二百石為從六品其妻各依夫品級受封若諸儀賓視此當逓減一等郡主儀賓從二品縣主儀賓從三品郡君儀賓從四品縣君儀賓從五品鄉君儀賓從六品其冠服儀仗各依禮制榜冊内所載又永樂中封藍田縣主造五翟冠以此為凖若郡君縣君當用四翟冠鄉君用三翟冠若其封爵婚禮則皇明祖訓已有成法凡王世子及郡王納妃郡王嫡長襲封者當先上聞朝廷遣人行冊命之禮命後王國自鎮國將軍縣主以下婚禮但頒誥命冠服其儀仗粧奩諸物皆王府自辦從之禁詣王府者受饋宣徳八年四月監察御史王紹等劾奏應城伯孫傑往蜀府行禮受文綺白金工部主事張曽為瀋府治墳受鞍馬金帛又聞比者朝臣以嘉禮詣王府者皆受餽遺當明正典刑以勵亷恥上曰御史言是昔皇祖嘗言凡朝臣以事至王府者惟酒食待之不以財貨若與之出于王意猶可豈當需索逺近頗聞有尚寳司丞至楚府王已厚與鈔幣又逼求白金形之詞色王執禮終不與此禮部不擇人而遣也然朕聞此語于一人更俟詳察而後罪之今御史所奏者姑宥其罪凡所受皆追入官禮部仍移文各王府長史司使啟王今後朝廷凡遣人至勿與財物定公禮私禮景㤗六年岷王徽煣奏蒙封長子音垽為岷世子臣弟徽煝為江川王凡遇節令及家庭行禮班次不定乞降儀注命下禮部議之尚書胡濙奏以宗子法言之則以長嫡為重以家人禮言之則以尊卑為先凡遇節令行公禮則當依宗子法重在世子家庭行私禮則當依家人禮尊歸叔伯從之崇王請朝太皇太后𢎞治二年三月詔免崇王見澤来朝王自以之國年久欲援襄王例来朝太皇太后禮部言王國地方災傷宜慎守封疆未可輕動恐貽他患上曰王朕至親欲許朝見太后因得叙親親之誼卿等既以地方藩屏為重義難獨違其貽書止之庻長子代行禮𢎞治十四年瀋王㓜學自以年老有疾請凡遇祭祀社稷山川暫令本府長史攝行祀事禮部議不可請如寧府例令王庻長子西陽王銓鈺代行禮從之祭墓送𦵏先奏聞𢎞治十年禮部題䟽舊例各王府郡王以下凡欲出城祭墓送葬之類俱先期奏請得㫖乃行蜀府自獻王以来毎遇親䘮親王郡王俱自行送葬不經奏請至四川守臣奏之蜀王亦自以本府相承故事為解乞命今後各王出城仍照例先期以聞兩府同行禮正徳三年代府襄垣王管理府事鎮國將軍仕坏奏臣父恭簡王與山隂康惠王俱為郡王令兩府宗支繁衍凡遇迎接詔勅及慶賀萬壽正旦等禮俱赴山隂府同行非便乞如慶成永和王例各于本府行禮庻盡報本之私亦息不睦之訟禮部議覆迎接詔勅仍赴山隂王府行禮其諸令節宜如仕坏所請從之淮安王廟祀稱號正徳八年康王世子見濓蚤卒無子康王老請以次子清江王見殿攝府事逮康王薨見濓尋卒其長子祐棨襲為淮王已而見濓得追封淮安王其妃王氏為王妃時制冊稱安王為祐棨伯父故其常祭祀號安王稱王伯清江王稱王考且所居王氏仍世子府宫而本生母趙氏入居永壽宫輔導官謂其非宜言于王王奏其生在安王卒後未嘗為嗣欲加重其私親事下禮部移西江守臣令輔導官勘覆乃謂安王伯父之稱本諸制詞惟稱清江王為王考于義未恊按禮諸侯之子為天子後者稱于所後之天子而不得稱于所生之諸侯别子之子為諸侯後者稱于所後之諸侯而不得稱于所生之别子其不為人後者子為天子而父非天子則必追尊之詔已播于天下乃可稱其父為天子子為諸侯而父非諸侯則必追封之請已允于天子乃敢稱其父為諸侯今之親王即古諸侯也今之郡王即古别子也親王所主祭之王考則諸侯之稱廟也淮王既不後于其伯則非為人後者欲乞以清江王追封入廟與安王同為三世之穆似兩得之但今未得請王乃以親王之爵主祭郡王之廟祀號為王考是即子為諸侯而父非諸侯請未允于天子而輙稱其父為諸侯矣又生母趙氏未得進封遽稱國母先居永壽官此則其非據者于是禮部尚書劉春謂安王雖未封而卒今已追封為王祐棨雖生子安王卒後今既入繼親王則實承安王後矣皆朝廷之命非無所承也乃更欲追封其本生之父則安王封謚之命將安委乎徒欲顧其私親而不知繼嗣之重事體殊戾况安王既追封入廟為三世之穆清江王又欲進封則一代二穆豈禮哉祝號稱呼不可以制冊為據惟當以所後為稱其清江王祀事宜令次子祐楑主之惟王無預焉所居官則安王妃遷入永壽宫清江王妃退居清江府斯禮典法令皆得矣詔以其援據甚明從之藩府奏事禁限嘉靖元年禮部上言各王府郡王將軍有事必啟親王代奏除機宻重事及請封王爵外其春秋類奏之時長史司止許批差一人齎進不許一事輙差一人在京潜住營求幹事本府仍將類奏事件總造印信書冊二本一開具郡王等所奏事件送禮科收貯一造具各郡王奏本封數及批文數目差人數名送鴻臚寺收候但有王府差来人役挾帶空本在京填寫者緝事衙門即訪察擒拿追究用印之人從重治罪得㫖允行奏進稱謂乖違嘉靖十六年禮部尚書嚴嵩言鄭王厚烷奏進慶賀謝恩四疏俱稱弟不稱臣稱皇兄臣惟君臣之分等于天地故國家制宗室懿親雖伯叔尊行亦必䖍恭寅畏稽首稱臣執禮惟謹所以嚴大分遏僣踰堂陛森然不可違越者也今鄭王乃輙用家人之禮罔識君臣之分皆該府長史等官不諳典制有失輔導法宜恭究仍通行天下王府奏進章疏表文務恪循典制毋妄意稱謂以乖禮法庻恩義兼舉皇度惟貞而宗室各有所儆矣上曰然長史等官本宜究治姑奪俸三月仍通行遵守有司謄黄差悞嘉靖元年九月禮部題該岷王彦汰奏為民牧慢欺朝廷擅改詔㫖塗抹帝號大不敬事奏劾寳慶府知府楊淳塗抹詔㫖等因該本部看得岷王所奏知府楊淳若果如所言不為無罪但恐因詔書一到該行王府及所屬非止一處倉卒謄黄慮恐稽遲致使字様潦草傍註添改情有可原查得寳慶府與岷府地方甚近凡公私事務相于有司近日訐奏楊淳事情見該都察院奏行湖廣鎮廵等官勘問未結法當廽避不宜摭拾小過上凟宸聰况該府頻年以来收留無賴生事害人府縣歛手地方嗟怨先年妄奏欲行視學習射該本部查無舊例已經立案今又肆無忌憚動輙奏言恭照内外輔導等官不能以禮諌阻乃復從諛成事合當究治及照岷王聴信本府下人致生多事細摘有司小失煩凟天威似應請勅戒諭令其自新以保禄位等因題奉聖㫖是楊淳謄黄差誤顯是不謹見因别事勘問待問結之日一併来説岷王摭拾小過動輙具奏輔導等官不能以理諫阻也當查究都饒這遭你部還各行文書與他毎知道欽此藩王奬勵嘉靖十一年十月為修省陳言事該本部題今後各王府如有節孝及卓異行跡親郡王或撫按官查奏前来本部俱照例請勅奬諭仍通行天下王府今後不許奏請建立牌坊奉聖㫖都依擬行欽此嘉靖十五年詔書内一欵各䖏親郡王如有謹身修行樂善好禮孝親敬長敦宗睦族足以勵世者許彼䖏撫按官具實奏聞奬勵嘉靖三十年三月該撫大同右僉都御史何思奏稱代王捐禄米銀五千兩以濟挑選官軍之用乞要奬勵本部覆題奉聖㫖王助銀軍給忠義可嘉着寫𠡠奬諭禮部知道欽此嘉靖三十四年十二月廵撫山西右副都御史王崇奏稱慶成王表欒仁孝和睦朴實寡言讀書好禮謹守憲度壽登八十乞要旌表本部查照節年恩詔及慶成王竒湞事例覆題奉聖㫖是欽此嘉靖三十五年十月該廵撫山西右副都御史王崇奏稱隰川王府輔國將軍成錢篤盡忠誠三廬孝節為善尚賢禱雨屢應乞要旌表本部查照嘉靖十一年題准事例覆題准與旌表奉聖㫖是欽此藩王存問嘉靖九年詔書内一欵親郡王年七十以上者寫書并賜羊酒幣帛存問以待之嘉靖三十一年三月該唐王宇温奏稱郾城王彌鈱年已八十齒徳兼全乞要存問本部查照前例覆題奉聖旨着差官賫勅褒諭欽此嘉靖三十三年三月該府湯隂王彌鍔奏稱唐王宇温年及七十順體康健素行端慤乞要存問本部查照舊例覆題奉聖㫖是欽此王妃存問嘉靖三十八年六月周王在鋌奏稱髙祖母太妃李氏見年九十孀居六十餘載教育四世乞要存問本部覆議雖查無存問王妃事例然禮以義起相應題請差官一員齎􅎁一道前去仍行河南布政司備辦幣帛羊酒及門存問以彰昭代惇睦親藩之盛以後年非九十不係親王祖母不許一槩陳乞等因奉聖㫖是准寫􅎁存問欽此慶賀進表文嘉靖三十四年十一月該樂昌王充燻奏討表式本部覆照得親王與郡王一城居住例不進賀今樂昌王充燻既係改遷别郡慶賀表文例應拜進所據行移式様亦應頒降合候命下本部將王府表箋式様抄寫備行該府遵照拜進奉聖㫖是欽此覈王府進貢馬匹嘉靖十一年九月内禮部題照得天下各王府凡遇聖旦冬至正旦并謝恩慶賀例有馬匹進貢本部先准御馬監奏為進貢馬匹不堪廐養等事題奉欽依務要到部辨看毛齒看中方行送監驗收已經遵行三四年矣但王府享上之誠雖同而其逺近貧富不一加以差来人役多係積年或領價到京旋買或領馬中途變易事完囬府又稱雜費百計侵尅中間有不堪驗退者未免行移責備該府是利歸奸人罪坐宗親甚非事體題奉欽依行移各王府長史司啟王知㑹今後應進馬匹須用印烙鈐記仍將毛齒尺寸備造清冊一本長史司印封送部以憑比對看騐即與轉送該監收受毋得留難勒掯十分求全以拂朝廷親親之情如或馬匹毛齒參差與原造清冊不同即是差来人役作弊定行究治命婦朝王妃洪武十一年命禮部定親王之國命婦朝見王妃儀議曰按古禮婦人迎送不出門今王妃随王之國命婦不必郊迎惟具服詣宫行朝見禮其正旦朝賀則命婦一人為班首陞殿稱賀云夫人某氏等茲遇履端之節敬詣王妃殿下稱賀其命婦禮服俱依定製從之王府救日月食洪武十一年奏相府奏稱王府救䕶日月薄蝕之禮禮部議曰周禮鼓人救日月則詔王鼓春秋傳曰非日月之𤯝則不鼓書月辰勿集于房瞽奏鼓自古日月之災自天子至于庶人皆不遑寧䖏則親王亦當救䕶但王府崇嚴之地百官㑹集而鼓于理未宜今據凡遇日月食親王止于靈臺行禮不鼓其大小官員則鼓于布政按察二司從之定將軍品級禮儀永樂元年上命禮部㑹議靖江府輔國將軍品級禮儀本部官同太子太師曹國公李景隆順昌伯王佐吏部尚書蹇義等檢㑹祖訓錄内靖江王别子授鎮國將軍三品孫輔國將軍四品曽孫奉國將軍五品𤣥孫鎮國中尉六品五世孫輔國中尉七品六世以下世受奉國中尉八品皇朝祖訓内郡王子孫不開品級鎮國將軍嵗用米一千石輔國將軍八百石奉國將軍六百石鎮國中尉四百石輔國中尉三百石奉國中尉二百石今考祖訓録内開輔國將軍四品事例在前皇明祖訓内開嵗用禄米八百石事例在後若依禄米合依從二品為允及洪武二十九年十二月集議將軍與駙馬儀賔公侯相見將軍居左駙馬等居右皆再拜與文武一品至三品官相見將軍居中各官拜將軍答拜與四品以下官相見各官拜將軍受遇將軍于道駙馬儀賓公侯讓左並行一品至三品引馬側立四品以下下馬内廷出入由左門凡𫝊其言者稱鎮國將軍裔㫖稱呼之曰官人今宜俱依舊制但内廷出入宜從右門其袍服花様除龍鳯文外随宜製用從之奏事必知㑹恭詳天順三年代府長史司左長史李滋言本府郡王俱在大同一城居住近来各郡王奏事止令長史司出批所奏事情並不經本司看騐中間有奏一事而夾奏二三事者稍有不從輙將實封赴本司既不敢開視又不敢稽留只得遣人齎進臣係輔導之職不敢緘黙乞勅本府未之封國郡王奏事務令長史司知㑹恭詳事有不當行者得以勸諫則法正事簡庻不累及事下禮部定議言近者各郡王奏事中間有乞請封號而不開年嵗者有求討多物而不思事例有無者有已䝉恩賜及奉聖斷而又重復奏請者甚至鎮國將軍以下亦有不繇郡王而徑令家人校尉齎本詣京者非惟煩凟聖聴抑且事不歸一請再行各王府長史司轉行各郡王府教授啟王知之今後郡王以下凡有奏請務遵前例先令長史啟親王知之恭詳事體可否應奏請㫖然後長史司給批付所遣人賫本具奏如有機宻事情許徑自奏請不在此例從之宗室儀從嘉靖三十一年三月欽差廵撫江西都御史翁某咨稱鎮輔奉將軍中尉毎年季支禄糧各有品級而儀從一概坐派中間事有可疑查得𢎞治五年八月例鎮國將軍一品嵗給儀從二十名輔國將軍二品嵗撥儀從十六名奉國將軍三品嵗撥儀從十二名鎮國中尉四品嵗撥儀從十名輔國中尉五品嵗撥儀從八名奉國中尉六品嵗撥儀從六名今照儀從不分品級毎位二十名雖與大明㑹典開載相同但與前例有碍本司亦無卷案可查今欲遵奉案騐將各宗室儀從俱自二十五年為止二十六年以後咨部查明至日施行等因該本部尚書徐題看得宗室受封將軍中尉各有品級禄糧房俱有等差前項儀從多寡數目于𢎞治五年刑部之議准𢎞治八年刑部議申明本自詳備其曰將軍以下撥儀從二十名㑹典原載在𢎞治年之前夫事例以後定者為凖則儀從之撥給固當准𢎞治八年之新例而不當復泥㑹典之舊文此本部節年文移所以俱稱照品撥給而各省胥守以為定規也獨江西一省在宗室則妄引以求多在有司則狥情而濫撥又因徒夫不足徵派州縣違例擾民本應查究但事往人衆合無將已往者姑從寛宥將来者嚴行究革臣等恭侯命下備咨都察院轉行彼䖏廵撫衙門通行布政按察二司知㑹今後務要照依𢎞治五年八年刑部議准事例及本部原因照品撥發事例施行毋得市好宗室重困民生如違聴撫按衙門指名恭劾等因奉聖㫖是欽此洪武十一年九月禮部議王國所屬諸司正至慶賀之禮未有定制禮有等威尊無二上進箋非宜其令王所臨䖏躬賀在外諸司則遣佐貳官一人往秋七月秦相府請王府救䕶日月薄蝕之禮禮部議日月之災自天子至庻人皆不遑寧處親王當救䕶但于露臺行禮不鼓洪武十九年十二月詔親王建國䖏在城官慶賀在外官不賀亦不遣官洪武二十九年十二月命議鎮國將軍與駙馬公侯文武官相見禮鎮國將軍居左駙馬儀賓公侯居右並行兩拜三品以上官見之亦兩拜鎮國將軍答拜若遇于道向右讓道而行内廷出入由左門稱呼曰官人言語曰裔㫖從之宣徳三年十二月定儀賓班次先是寧王權言慶賀拜表儀賓未有定制上命在禮部考定儀郡主儀賓秩從二品縣主儀賓秩從三品郡君儀賓從四品縣君儀賓從五品鄉君儀賓從六品宜序于同品官之左上曰禮不踰等儀賓雖親當守定分此為定制景㤗六年定凡王世子及將軍行禮其宗子法重在世子家庭家人禮尊在伯叔𢎞治十七年令王府慶賀禮毎節止一舉其扇鮓之類勿進如多使人勿與𫝊正徳十三年令各府庻人勿貢五月定出使官朝見諸王禮先是寜王宸濠驕恣按撫三司或具朝服如臣禮御史范輅廵按江西因言洪武間王府官屬亦稱官其後乃稱臣州縣文武及出使官凡遇慶賀俱稱官四拜出使官則便服臣以為尊無二上凡不稱臣皆不宜具朝服以嚴大防寧王亦奏出使官如持節制使賫照行人之類總兵廵按官久在地方難以為比禮部議持兩端以請詔仍集議再上謂洪武未頒行祖訓便服行禮總兵撫按奉有制􅎁行事便宜服上令如祖訓累朝故事行仍以書諭宸濠嘉靖元年五月靖江王經扶言故事本府正至初度各官慶賀朝服八拜今各官常服四拜乞坐罪下禮部議㑹典所載八拜洪武十八年新定其後祖訓職掌俱不載𢎞治十一年四川廵撫都御史鍾蕃具奏部覆文武官朝見慶賀四拜朔望一拜三叩首近廣西布政司恭議梁億等具奏部覆已奉武宗皇帝聖㫖文武官俱常四拜上曰靖江為何妄奏其申諭各王嘉靖六年令郡王攝府事者詔赦至有司抄黄送郡王自率宗行禮隆慶元年令親王朝覲久不行今後勿奏京官出使王府成化二年禮部奏廵按江西監察御史趙敔請定京官出使公差王府禮儀舊例不載今議得京官公差出使在外道經王府例該報名見辭如遇朔望三司等官俱至府候見公差出使人員亦合詣府随班行禮若勅書止賜王府中間恐有宻切及王府進表祭祀係王府應行禮儀出使人員無所干預不必随同行禮其王府前門官員人等禮當下馬其經過東西後門雖無例下馬亦宜逺引而行不許逼近横絶從之酌省遣官行成化二年户部等衙門官議漕運總兵及各䖏廵撫等官所言事宜條奏一王府婚䘮大事毎嵗朝廷三五次遣官行禮館穀贈遺未免浩費請自今親王郡王并妃如舊差在京内外官行禮其將軍縣主以下應差京官者以命布政司官應差内官者以命本府承奉從之王孫違例進表箋成化五年十月己未靖江王孫規裕遣官奉表箋賀皇太后聖誕及冬至節禮部言故事親王世子未襲王爵表箋必先奏請今規裕未奏而進宜正長史不能輔導之罪詔貸之給肅府管理府事關防嘉靖四十四年命肅府輔國將軍縉􅖷以本爵奉祀攝府事縉􅖷鎮國將軍弼柿子也弼柿父肅靖王靖王薨子弼桄嗣為定王定王薨世子縉烱卒子紳堵以世孫嗣自為懷王懷王薨無子縉􅖷乃親定王姪而懷王叔也服屬為近至是定王妃吳氏上書請命縉􅖷嗣王事下禮部覆㩀條例親王無後者必親弟親姪始得嗣而縉􅖷以叔嗣侄與親例不合若不為立嗣則無罪而國除肅之先王乏享矣可否請上裁上謂越世無相繼之理止命縉􅖷以本爵奉祀攝府事仍令上先世所藏冊寳改鑄肅府管理府事關防予之革長史以下官藩祀定王國祀制洪武四年命中書省定王國宗廟及社稷壇壝之制禮部尚書陶凱等議于王國宫垣内左立宗廟右為社稷廟中為殿五間東西為側階後為寢殿五間前為門三間社稷之制古者王爵不以封止有諸候社稷之制漢皇子始封為王得受茅土而社稷之制無聞其他封公侯者無土而社以木後世因之以州縣比古諸侯故其制皆方二丈五尺唐制州縣社稷壇方二丈五尺髙三尺五寸四出陛三等門北東西三面各一為屋各三間毎間二十四㦸其南無屋宋制州縣社稷壇率如唐制而唐不及者五寸其社主用石如鍾形長二尺五寸方一尺剡其上培其下半今定親王社稷壇方三丈五尺髙三尺五寸四出陛兩壇相去亦三丈五尺堤四圍廣二十丈壇居壝内稍南居三分之一壝墻髙五尺各置靈星門外垣東北西門置屋列十二㦸南門無屋社主用石長二尺五寸濶一尺五寸剡其上埋其半已上丈尺並無營造尺上不同于大社下有異于州縣之制從之定王國合祀之神洪武二十三年命禮部翰林院考定王國合祀山川諸神上曰王國有嶽鎮海凟者即以嶽為正次海次鎮次凟風雲雷雨之神又次之于是禮部為圖以進使頒之諸國復命東海燕齊皆祭東嶽東鎮齊魯皆祭西海秦蜀皆祭晉祭北海喪禮不祭社稷山川宣徳五年七月行在禮部言瀋府長史司呈本國見有喪禮稽于經有喪者不祭社稷山川等神宜令停祭從之定官給祭物數正統二年初襄陵王奏安惠王墳園守墳典伏王隆遇清明節本府祭畢輙私歛校尉銀鈔重辦祭祀上命禮部定議禮物給官錢支買至是禮部奏請毎嵗六祭毎祭羊豕各一香四兩燭十二對帛一段菓五品酒二瓶永為定例從之周王請乞親母同廟祀正統五年書復周王有爝曰所言欲加親母胡夫人位號同于宗廟祀享又言欲迎憲王貞烈鞏妃祀于宗廟東一室南向即下禮官議今禮部舉春秋考仲子之宫及僖公成風事謂胡夫人宜仍舊號祀于别室又舉春秋𫝊諸侯不再娶于禮無二嫡謂鞏妃定祔于定王夫人之室禮官所言皆有經據朕不能違雖叔祖孝思無窮然孔子有言祭之以禮惟叔祖諒之嬪妃郡主祔廟議景㤗二年禮部奏代王仕壥言祖考嬪妤所生子女皆封郡主郡主見有亡没嬪妤及郡主未知可入祀宗廟否乞賜明訓臣等議嬪妤之子既封郡王其郡王自立小宗奉祀嬪妤當祔具廟郡主已配儀賓其儀賓自立本姓家廟郡主當祔其廟俱難入祀宗廟從之出城祭瑩成化十八年三月湯隂王祁鏋裕川王祁鋹南樂王祁鉷各奏欲因時序出城祭先塋禮部以三王兄弟豈宜同日逺出請止令湯隂王祭一往祭可寢園修祀成化二十二年九月襄王祁鏞奏梁郢二王宣徳正統間薨逝無嗣其寢園惟奉祠及軍校人守之乞命本府長史司帶領庻得以時修其祀事上曰二府奉祀及軍校皆祖宗設立與長史無預不可從徽王請祭中岳𢎞治二年六月徽王見沛奏欲照徳王例往祭中岳嵩山之神上曰王藩屏為重且中岳不在封内未可輕動因貽書止之復爵追封入家廟𢎞治十六年代王俊杖以其父武邑懷隱王嘗以罪革爵没後復爵賜謚祭葬今禮應入家廟奏乞改賜親王謚號禮部奏㫖㑹官議處以聞上曰既查有事例武邑王准追封為代王入廟謚曰思庻支以長次奉祀正徳二年禮部言秦府永興王誠瀾薨無嗣秦王以二支從子秉櫸為嗣其三從支子秉楶奏言秉櫸庻出以嫡出宜為䘮主謹按二牒二祖皆庻支例以長次為序秉楶雖三支嫡長不當加于二支秉櫸之上妄爭圖嗣失序非禮其教授輔導失職宜究治上曰可教授其勿問既而秉楶又以其祖母奏欲奉祀凟擾不已禮部請究治教授罪許之仍命多官議奉祀事僉謂名分素定難變詔已之宗室遣官祭生母正徳三年六月益王奏乞毎嵗自遣官詣金山口祭掃生母徳妃張氏墓禮部議非舊制上曰遣官祭母王之誠孝矣但朝廷嵗時自有祭祀其已之還以書復王郡王奉祀親王嘉靖五年禮部言弋陽王拱樻得祭其祖寧獻惠二王夫二王親王也宜祭以親王之禮但今以郡王奉祀似難全與凡樂舞齋郎之類當半給之報可定王府祧廟制嘉靖七年代府管事府㤗順王充燿奏稱臣考懿王當祔廟而代自始封簡王至思王已盈五廟之數請定祧廟之制下禮部議尚書李時言親王祧祔之禮㑹典未載臣等竊謂當推太廟祧祔之禮而降殺之今代府之廟當以始封簡王居中百世不遷次戾王隱王惠王思王為五世今懿王入祔則戾王當以親盡而祧但諸侯無祧廟戾王神主宜祧祔入簡王之室置櫝藏之隱王惠王思王以次上遷而懿王神主升祔于第五廟毎嵗暮則出祧主行合祭之禮庻于禮制隆殺得宜詔如議議毁廟奉祀嘉靖三十三年禮部言寧府宸濠既以反誅其太宗宗廟已毁之廟不當復建此所謂禮之變而當議取者也始本部議請獻惠二廟毎一易世欽定一郡王奉祀盖即有之廟而定祭祀之禮將以息覬覦爭競之私耳今諸宗室各執一説紛紜奏擾在樂安則曰惠王小宗之首在建安則曰獻惠有服之孫在弋陽長子多焜則執父管理故事一定不移雖言各有據然皆不知毁廟無復建之理而郡王有不可踰之分蓋私而不能斷之以義者也臣等竊謂獻惠二王墳所各有享殿而樂安弋陽建安諸府各有家廟乞令毎遇嵗時正旦清明中元霜降冬至等節各府同差儀賓一員詣享殿致祭其祭品即輪流供辦而祝文序列諸王之名庻祭既不黷而追逺之孝可伸惟獻王則毎嵗立春用古者祭先祖之義各府各設位于家廟致祭而以始封郡王配食其祭儀俱從生者制度不得僣用親王禮樂庻情既得盡而分亦不踰其原設齋郎鋪排屠户厨役及添撥校尉諸人盡行裁革毎年有司于均徭内加徵銀一百五十兩三府教授分領囘府以供祭費其樂供十二户毎府分管四户以給私祭遇有迎詔勅進表箋及冠婚諸務則十二户通行供事毋致逃竄永無撥補其禮生有司臨期撥用事畢即囘毋得占恡得㫖允行禮部志稿卷七十七
