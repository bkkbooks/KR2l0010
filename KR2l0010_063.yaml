body:
  text: 禮部志稿卷六十三明俞汝楫編冕服備考乘輿以下冠服考古定冠服制洪武元年十一月甲子詔定乘輿以下冠服之制先是上即位之初權宜創置服御之制未遑詳定至是命禮官及諸儒臣稽考古制以聞禮部及翰林院等官議曰乘輿冠服黃帝始作冕服有虞制十二章周制王有五冕六服祭昊天上帝則服大裘冕祀五帝亦如之享先王則服衮冕享先公饗射鷩冕四望山川毳冕社稷五祀絺冕羣小祀玄冕凡兵事韋辨服眂朝皮辨服甸冠辨服凶事辨服弔事辨絰服燕居玄端漢髙祖始制長冠以入宗廟後漢明帝初服旒冕備文十二章晉祀天明堂以大冕祀太廟朝會以法冕小會及臨軒以絺冕征獵以繡冕耕藉饗國子以紘冕聽政以通天冠齊郊廟以平天冠服臨朝以通天冠絳紗袍隋祭天地明堂服衮冕朝日夕月宗廟社稷朝會皆服之朔日受朝及大會諸祭祀還則服通天冠服唐制天子之服十有四等祀天地服大裘冕踐祚享廟征還遣將飲至加元服納后元日受朝賀臨軒册拜王公服衮冕冬至受朝賀祭還宴羣臣養老服通天冠其鷩冕毳冕玄冕緇布冠武辨服黑介幘白紗幘平巾幘白裕各因事而祭之宋祀天服大衮冕祭宗廟元日受朝賀及册拜服衮冕宴會及冬至受朝賀服通天冠常服朝衫袍視事窄袍元祀天服大裘加衮祀宗廟服衮冕大朝以本俗衣冠今擬祀天地宗廟及正旦冬至聖節朝會册拜皆服衮服玄衣纁裳其製冕版廣一尺二寸長二尺四寸冠上有覆玄表朱裏前後各十二旒每旒五采玉珠十二黈纊充耳玉簪導朱纓圭長一尺二寸衣六章畫日月星辰山龍華蟲裳六章繡宗彞藻火粉米黼黻中單以素紗為之紅羅蔽膝上廣一尺下廣二尺長三尺繡龍火山三章革帶佩玉長三尺三寸大帶素表朱裏兩邉用緣上以朱錦下以緑錦大綬六綵用黃白赤玄縹緑純玄質五百首小綬三色同大綬間施三玉環朱襪赤舄其郊廟省牲皇太子諸王冠婚禮醮戒之類則服通天冠絳紗袍冠加金博山附蟬十二首施珠翠黑介幘組纓玉簪導絳紗袍深衣製白紗內單皂領褾襈裾絳紗蔽膝白假帶方心曲領白襪赤舄其革帶佩綬與衮服同朔望視朝降詔降香進表四夷朝貢朝覲則服皮辨其製用烏紗冒之前後各十二縫縫中綴五采玉十二為飾玉簪導紅組纓其服絳紗衣蔽膝隨衣色白玉佩革帶玉鈎䚢緋白大帶白襪黑舄其常服則烏紗折角向上巾盤領窄袖袍束帶間用金玉琥珀透犀皇后冠服周制追師掌王后之首服為副編次追衡笄鄭玄云副者覆也覆首為飾若今步搖也編者編髮為之若今假紒也次者次第髮長短而為之所謂髲髢也追治也衡笄皆以玉為之衡垂於副之兩旁當耳其下以紞懸瑱笄卷髮者內司服掌王后之六服褘衣揄翟闕翟鞠衣展衣緣衣三禮圖云褘衣色玄刻繒為翟形以五采畫之綴於衣以為文章褕翟青衣刻繒為搖雉畫以五色闕翟色赤刻翟形而不畫三者皆王后助祭之服也鞠衣色黃如鞠塵王后親蠶之服也展衣色白展與亶誠也王后以禮王及賓客之服也緣衣色黑王后接御於王之服也漢皇后首飾用假結步搖簪珥步搖以黃金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天祿辟邪南山豐大特六獸諸爵獸皆用翡翠為毛羽金題白珠璫繞以翡翠為花入廟所用服紺上皂下朝會用蠶服青上縹下隋皇后首飾用大小十二樹褘衣鞠衣青衣朱衣四等褘衣深青色織成領袖文以翠翟五采重行十二等素紗中單黼領羅縠褾襈色皆以紅蔽膝隨裳色以緅為緣用翟三章大帶隨衣色飾以朱緑之錦青緣革帶白玉佩玄組綬青襪舄舄加金飾助祭及朝會受册大事則服之鞠衣黃羅為質織成領袖蔽膝革帶及舄隨衣色餘同褘衣親蠶則服之青衣去大帶及佩綬金飾履見天子則服之朱衣如青衣唐皇后首飾用大小花各十二樹服褘衣鞠衣鈿叉禮衣三等褘衣深青色畫翟赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅為領緣為翟章三等青衣革帶大帶隨衣色朱裏紕其外上以朱錦及懸以白玉雙佩黑組大綬青舄舄加金飾朝會受册及助祭則服之鞠衣黃羅為之蔽膝大帶革帶舄隨衣色親蠶則服之鈿叉禮衣十二鈿兼用雜色宴見賓客則服之龍鳯珠翠冠泥金衣霞佩常服之宋皇后首飾用大小花各十二樹兩博鬢冠飾以九龍四鳯其服褘衣深青織成翟文素質五色十二等青紗中單餘同唐制朝會受册助祭則服之鞠衣色黃蔽膝革帶舄則隨衣色親蠶則服之其常服真紅大袖紅羅生色為領紅羅長裙紅霞帔藥玉為墜紅羅背子黃紗衫子白紗襦褲明黃裙粉紅紗短衫今擬皇后首飾冠為圎匡冒以翡翠上飾九龍四鳯大花十二樹小花如之兩博鬢十二鈿服褘衣深青為質畫翟赤質五色十二等素紗中單黼領朱羅縠褾襈裙蔽膝隨衣色以緅為領緣用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以緑錦紐約用青組玉革帶青襪舄舄以金飾凡朝會受册謁廟皆服之燕居則服雙鳯翼龍冠首飾釧鐲以金珠寶翡翠隨用諸色團衫金繡龍鳯文帶用金玉皇太子冠服周禮有王世子服而不載其制漢制皇太子服玄冠絳衣魏服五時朝服晉服遠逰冠介幘翠綴以白珠佩瑜玉垂組朱衣絳紗襮皂緣白紗中單白曲領帶領火珠素首革帶玉鉤䚢獸頭鞶囊至明帝泰始六年始服衮冕九章朝賀梁助祭則服衮冕九章朝會則朱衣絳紗袍隋皇太子從皇帝祭祀謁廟加元服納妃則服衮服謁廟還宫元日朔日入朝釋奠則服逺遊冠絳紗袍五日常朝則服常服唐制皇太子之服有六衮冕者從祀謁廟加元服納妃之服也逺逰冠者謁廟還宫元日朔日入朝釋奠五日常朝元日冬至受朝之服也烏紗帽者視事及燕見賓客之服也辨冕者朔望視事之服也平巾幘者乘馬之服也進德冠者亦乘馬之服也宋皇太子從皇帝祭天地宗廟服衮冕九章其朝會服逺遊冠服其常服皂紗折上巾其執圭之制至道二年册皇太子禮官上言周禮云天子執鎮圭公執桓圭無太子執圭之文晉書太子出會在三恪之下三公之上請皇太子執桓圭以受册從之今擬皇太子從皇帝祭天地宗廟社稷受册正旦冬至聖節朝會賀加元服納妃被衮冕九章其制冕九旒每旒九玉紅組纓金簪導兩玉鎮圭長九寸五分衮服玄衣五章畫山龍華蟲火宗彞纁裳四章繡藻粉米黼黻白紗中單黼領蔽膝隨裳色繡火山二章革帶金鉤䚢綬五采赤白玄縹緑純赤質三百二十首小綬三色大綬間施二玉環大帶白表朱裏上緣以紅下緣以緑白襪赤舄其從皇帝郊廟省牲及册封公主則服逺逰冠絳紗袍其制金博山附蟬施青翠黑介幘犀簪導絳紗袍白紗中單黑領褾襈裙衣裳白裙襦白假帶方心曲領紅紗蔽膝白襪黑舄其朔望朝四夷朝貢朝覲則服皮辨其常服則烏紗折上巾諸王冠服周制王子封建為諸侯其服隨封爵漢封諸子為王用逺逰冠上衣下裳玉佩鉤履唐親王服逺逰冠黑介幘三梁青緌金鉤䚢大帶金寶飾玉褾首纁朱綬朱質赤黃縹紺為純二百四十首黃金璫附蟬絳紗單衣白紗內單皂領緣皂褾襈革帶鉤䚢假帶曲領方心絳紗蔽膝白襪烏皮舄宋親王服七梁冠用金塗銀稜貂蟬籠巾犀簪導銀立華朱裳白羅中單並皂褾襈蔽膝隨裳色方心曲領緋白羅大帶玉佩翬銀綬青絲網間施三玉環白襪黑履革帶以金銀鍍玉佩今擬諸王受册助受謁廟元旦冬至聖節朝賀加元服納妃服衮冕九章冕用五采玉珠九旒紅組纓青纊充耳金簪導圭長九寸二分五釐衮服青衣五章畫龍山華蟲火宗彞纁裳四章繡藻粉米黼黻白紗中單黼領青緣蔽膝纁色繡火山二章革帶金鉤䚢玉佩受五采赤白玄縹緑純青質三百二十首小綬三色同大綬間施三玉環大帶表裡白羅朱緣白襪朱履其朔望朝進表四夷朝貢朝覲則服皮辨皇妃冠服古者王后之下為夫人次嬪次世婦次御女則夫人即皇妃之位也周制內司服掌六服褘衣揄翟闕翟之下嬪服鞠衣世婦服展衣女御服褖衣鄭玄以為九嬪服鞠衣則夫人服闕翟乎闕翟者王后第三等服也玄以九嬪服鞠衣故以類推而以夫人服闕翟周制無明文可見漢貴人首飾皆大首髻黑玳瑁加簪珥妃以上又得服錦綺羅繒采十二色重緣袍唐首飾兩博鬢飾以寶鈿花叉九樹翟衣九等青質繡翟編次於衣及裳重為九等青紗中單黼領朱縠褾襈裾蔽膝隨裳色青衣革帶青襪舄佩綬宋首飾大小花各九珠兩博鬢冠飾以九翬四鳯褕翟青羅繡為搖雉之形編次於衣青質五色九等素紗中單黼領羅縠褾襈裾蔽膝隨裳色褕翟為章二等以緅為領緣大帶隨衣色朱裏紕其外上以朱錦下以緑錦紐約用青組青衣革帶白玉雙佩黑組雙大綬小綬三間施三玉環青襪舄舄加金飾今擬皇妃九翬四鳯冠大花叉九樹小花如大花之數兩博鬢九鈿翟衣青質繡翟編次於衣及裳重為九等青紗中單黼領朱綬褾襈裾蔽膝如裳色加文繡重雉為章二等以緅為領緣大帶隨衣色玉革帶青襪舄佩綬凡受册助祭朝會諸大事則服之其燕居則服鸞鳯冠首飾釧鐲用金玉珠寶翠諸色團衫金繡鸞鳯不用黃束帶用金玉犀皇太子妃王妃冠服凡受册助祭朝會諸大事與皇妃同惟王妃以素紗中單為别其燕居則服犀冠刻以花鳯餘與皇妃同皆參酌唐宋之制而定之衮冕洪武元年十月翰林院學士陶安等奏古者天子五冕祭天地宗廟社稷諸神各有所用請製之上曰五冕禮太繁今祭天地宗廟則服衮冕社稷等祀則服通天冠絳紗袍不用十一月詔定乘輿以下冠服之制凡祭天地宗廟及正旦冬至聖節則服冕祭社稷先農册拜亦如之嘉靖八年五月上疑衮冕未合典制諭大學士張璁以制有革帶之文今何不見於用璁對曰按陳祥道禮書古革帶大帶皆謂鞶革帶以繫佩韍然後加以大帶而笏搢於二帶之間夫革帶前繫韍後繫綬左右繫佩自古冕辨未嘗不用之今不用革帶前後佩服皆無所繫遂附屬裳要之間失古禮制矣上曰禮服不備非齊明盛服之意會典載蔽膝用羅上織火山龍三章并大帶緣用錦皆與今不合且衣裳分上下而今衣掩裳裳制如帷幔而今兩幅朕意衣但當與裳要下齊而露裳之六章何如巳又諭璁以更祖制為疑璁對曰臣考禮制衣不掩裳與聖意合夫衣六章裳六章上下適均自不容掩考之集禮會典與古不異今衣八章裳四章衣常掩裳國朝典籍皆無所見內閣圖注蓋因官司織造循習訛謬今訂正之乃為復祖上意決因復諭璁曰兹求至當一一與卿訂定衣六章古曰繪者畫也今當織之查國初冕服日月各徑五寸今當從之日月在兩肩星山在後華蟲在兩袖仍玄色裳六章古曰繡今從之古色用玄黃蓋取象天地今裳用纁義無取其從古其六章作四行以火宗彞虎藻為二行米黼黻為二行革帶即束帶後當用玉以佩綬繫之蔽膝隨裳色其繡上龍一下火三不用山卿其詳議璁以聖裁至當為對上乃諭內閣諸臣同考訂於是大學士楊一清桂萼翟鑾同禮部翰林院詹事府禮科詳議太祖皇祖十二章之制司造之官徇習近訛勿諳古義遂至失真皇上博稽古典遠會聖祖之心不失乾坤之義乞一一更正萬代遵守得旨擇吉更正各王府並文武內外官一體更正冕洪武十六年定前圎後方玄表纁裏前後十二旒每旒五采玉十二珠五采繅十有二就就相去一寸紅絲組為纓黈纊充耳玉簪導二十六年定冕版廣一尺二寸長二尺四寸冠上有覆玄表朱裏永樂三年定冠以皂紗為之上覆曰綖桐板為質衣以錦綺以玉衡維冠玉簪貫紐紐與冠武并繫纓處皆飾以金係以玄紞承以白玉瑱朱紘嘉靖八年定冠制以圓匡烏紗冒之覆板廣二尺二寸前後玉珠七綵十二旒以黃赤青白黑紅緑為之玉珩玉珠導青纊充耳朱纓綴玉珠二尺以周尺為度衮洪武十六年定玄衣黃裳十二章日月星辰山龍華蟲六章織在衣宗彞藻火粉米黼黻六章繡在裳二十六年定玄衣纁裳永樂三年定玄衣八章日月龍在肩星辰山在背火華蟲宗彞在袖織成本色領縹襈裾纁裳四章織藻粉米黼黻各二前三幅後四幅前後不相屬其腰有襞積本色裨裼嘉靖八年定衣玄色六章日月在肩各徑五寸星山在後龍華蟲在袖長不掩裳之六章裳黃色為幅七前三後四連屬如帷凡繡六章分四行火宗彞藻二行米黼黻二行白羅大帶紅裏洪武二十六年定兩邉用緣上朱錦下緑錦永樂三年定在腰及垂皆有綼上朱下緑紐約用素紐嘉靖八年不用錦蔽膝隨裳色繡龍虎山文洪武二十六年定上廣一尺下廣二尺長三尺永樂三年定隨裳色四章織藻粉米黼黻各二本色有紃施於縫中其上玉鉤二嘉靖八年定隨裳色羅為之上繡龍一下繡火三繫於革帶王革帶玉佩洪武二十六年定長三尺三寸永樂三年定玉佩二各用玉珩一瑀一琚二衝牙一璜二瑀下玉花垂二玉滴瑑飾雲龍文自珩而下繫組五貫以玉珠行則衝牙二滴與璜相觸有聲其上有二小綬六采以副之黃白赤玄縹緑纁質嘉靖八年定革帶前用玉後無玉以佩綬繫而掩之大綬六采赤黃黑白縹緑小綬三色同大綬綬間施三玉環洪武二十六年定六采黃白赤玄縹緑織成純女質五百首織三玉環永樂三年定六采纁質施三玉環龍文織成白羅中單黼領青黃襈洪武二十六年以素紗為之永樂三年定素紗青領褾襈裾領織黻文十三黃襪黃舄金飾洪武二十六年定朱襪朱舄永樂三年定赤色舄用黑鈎純黃飾舄首嘉靖八年定朱襪赤舄黃絛緑玄纓結玉圭長一尺二寸永樂三年刻山四通天冠服洪武元年定郊廟省牲皇太子諸王冠婚禮醮戒之類則服通天冠絳紗袍冠加金博山附蟬十二首施珠翠黑介幘組纓玉簪導絳紗袍深衣製白紗內單皂領褾襈裾絳紗蔽膝白假帶方心曲領白襪赤舄皮辨服洪武二十四年上以百官侍朝皆公服而已獨便服非以示表儀命倣古制為皮辨服絳袍玄圭以臨羣臣凡朔望視朝降詔降香進表四夷朝貢朝覲則服皮辨服武辨服嘉靖八年九月上諭大學士張璁會典有親征之條七類造宜禡之祭皆曰具武辨服卿為朕言之璁對周禮司服凡兵事韋辨服釋之者曰韋辨以韎韋為辨又以為衣裳孔穎達謂韎蒨染赤色韋為辨杜佑謂頂少鋭為車駕親征中外戒嚴之服是韋辨者武辨也國朝視古損益為皮辨之制有定式矣武辨如皮辨之制皮辨冒以黑紗武辨冒以絳紗隨具圖説進覽上報曰覽圖制足見博考所繪有􅔖形無繫處冠制古鋭今圎朕惟上鋭者取其輕利如古可也又衣裳􅔖舄皆赤色何謂且佩綬俱無而於祭用之可乎璁對曰自古服冕辨未有不用革帶考革帶前繫韍後繫綬韋辨之􅔖正繫於革帶耳武事尚威烈故色多用赤詩韎韐有奭乃天子講武之章奭赤貌韎舄從裳色故皆赤佩綬於禮制不可缺據采芑詩曰服其命服朱芾斯皇有瑲璁珩此詩為卿士南征而作其戎服尚備佩玉如此則天子武辨可推惟聖明裁定上復諭璁武辨冠服衣裳韎舄俱如古制增革帶佩綬及圭諭禮部擇吉行乃定辨制上鋭色用赤十二縫中綴五采玉落落如星韎裳韎衣韎韐俱如赤色如常制佩綬革帶如常制俱上繫於革帶舄如其裳之色玉圭視鎮圭差小剡上方下篆文曰討罪安民燕辨服嘉靖七年二月丁巳上製燕辨服倣古玄端制襯用深衣色黃初上以燕居冠服未雅諭輔臣張璁考古帝王燕居法服之制璁采輯禮書玄端深衣之文圖注以進上為參定其制示璁且諭璁成朕志璁對曰古服玄端深衣二者其用最廣玄端自天子達於士蓋國家之命服深衣自天子達於庶人蓋聖賢之法服今皇上於玄端俱加文飾於深衣但易黃色誠得損益之道上敕禮部曰常情多修治於明顯怠忽於幽居古聖王治玄端為燕居服玄取其玄邃端取其方正朕酌古玄端之制更名曰燕辨庶幾深宫獨處以燕安為戒也因敕尚衣監著為式其制如皮辨衮冕祭服嘉靖六年四月內大學士楊題為祭服事題稱奉敕內閣朕惟齊明盛服以供祭祀國之重典而祭服乃章之重焉今衮冕之服祭服也被之以祀天享祖其所關豈小小哉且聞衮冕之制玄衣黃裳所以象天地之色衣六章曰日月星辰山龍華蟲裳六章曰宗彛鍾虎火藻粉米黼黻各有取義乃古今弗易之制亦我聖祖之制也奈何司造之官罔諳典制遂失其真近因與少傅大學士張璁論及已具圖注兹特敕卿等可將圖注會同禮部翰林院參以禮科詳議可否具奏更正夫兹舉也實出朕意非璁之獻諂君有問其臣不敢不以正對如有真識髙見當坐咎於豫一人勿得乘是而毁我忠良卿等悉心具對若有不同者各具以聞欽此臣等會同各官伏讀聖諭詳閲圖説有以仰窺皇上考古之精議禮之當真大聖人之制作出於尋常萬萬也竊惟衮冕之制天子所以祀天享祖承上下神祗與他服不同誠至重焉者也自黃帝堯舜以來玄衣黃裳製為十二章之式日月星辰山龍華蟲其序自上而下為衣之六章宗彝鍾虎粉米黼黻其序自下而上為裳之六章自周以後寖變其制或八章或九章已戾於古漢唐宋歷代以來則愈失其義無足言者矣至我太祖髙皇帝復定為十二章之制司造之官乃徇襲近訛勿諳古義遂至失真誠非太祖制作之初意恭惟皇上博稽古典洞見精微逺會吾聖祖之心據今之訛一舉而正之使皆循於古象不失乎乾坤之義而凡聖意之所以逺合乎唐虞者臣璁圖注之文發揚殆盡皇上廣大謙虛猶欲令臣等會同詳議臣等知而不言真有負皇上舍已從人樂取為善之心但思兹制至精至當燦然明備稽諸古帝而勿悖質諸聖祖而有光俟之百世而不惑夫豈自用其聰明而故為變更者乎易訛就正道理當然無以易此臣等分當效忠而今委不容有一毫異議也伏乞皇上聖斷不疑將內閣所藏圖畫一一更正仍敕令禮部通行天下各王府及內外百官朝祭之服其上衣下裳一體改正及敕工部轉行內外織造衙門今後照依欽定制式俱行改造毋得因循舊謬則聖制昭明而萬代永有遵守矣等因題奉聖旨卿等既會看詳議停當便著欽天監擇日更正制造各王府并文武百官及在外官員著一體更正禮部知道欽此嘉靖八年十二月上親定百官朝祭服圖式禮部摹板繪采頒行中外初章服定制載在會典及內閣祕圖沿久而訛每遇朝賀祭祀服人人殊及上更制衮冕先出圖説示閣臣下禮部議定頒行中外而百官承訛如故會聖旦給事中戴儒請明降定式以便習儀禮部按祕圖會典酌以今上所定冕服説草上圖注不稱旨上乃諭內閣親定公服所用革帶照舊朝祭服大帶表裏俱素兩耳及下垂緣以緑色就以蔽膝佩綬繫之佩玉更服古制裳并三齊如禮官所言且令議方心曲領名義於是禮官言方心曲領始於隋時非古也上曰方心曲領古制不傳况始自隋豈可襲用宜革之餘如圖注通行中外職官遵行毋得違越仍會議各王府官一體更正寶璽備考皇明製璽洪武元年春正月初上欲製寶璽未得玉有賈胡浮海獻美玉曰此于闐玉祖父相傳當為帝王寶璽上命製為璽一圭一獻古玉璽𢎞治十三年巡撫陕西都御史熊翀等遣人獻玉璽云鄠縣民毛志學等於趙倫村泥河水濱得之其文曰受命於天既夀永昌玉色純白微青背有螭紐周廣一尺四寸厚二寸翀等以為秦璽復出也事下禮部尚書傅瀚等奏自有秦璽以來歷代得喪存毁真贋之迹具載史籍今所進之璽其篆刻之文既與輟耕録等書模載魚鳥篆文不同其螭鈕又與史傳等書所載文盤五龍螭缺一角及旁刻魏𨽻者不類且又與宋元所得之璽色各不同蓋秦之舊璽更歷變故亡毁已久今陕西所進與昔宋元所得疑皆後世模倣秦璽而刻之者竊惟璽之為用以識文書防詐偽非以為寶玩也自秦始皇得藍田玉刻為璽漢以後傳用之自是轉相因襲巧爭力取意謂得此璽者乃足以受天之命否則歉然愧恥以為天命去之不知受命以德不以璽為輕重也故求之不得則私刻偽造務以欺人一或得之輒譁然以為秦璽君臣色喜交慶遍視以誇示於天下貽笑取譏千載一律洪惟我太祖髙皇帝神謨睿鑒髙出千古不師前代之刻製為一代之璽文各有義隨事而施真足以為聖子神孫一代受命之符而垂法萬世者矣列聖相承率由祖訓百餘年别無古璽而受命夀昌之福愈隆愈盛皇上大德懋昭天命匪懈聖躬萬福宗社奠安正無俟於璽而得天之眷有足徵者今此璽出於陕地乃遂以為天錫神符交獻諛説蓋不自知其非耳宜姑藏之內府以備燕間一玩以彰聖德以正人心臣不勝惶恐之至上從之仍命薄賞志學等白金人五兩儀衛備考考設儀衛洪武元年宣國公李善長等進儀衛上見仗內之旗有天下太平皇帝萬嵗字之旗上乃顧謂善長曰此誇大之辭也古者九旗之制各有其屬若日月蛟龍熊虎鳥隼龜蛇之類所以昭儀物辨等威若天下太平皇帝萬嵗之名此直誇耳莫若以天祐邦家海宇康寧易之庶幾順理耳上既而復語之曰此亦近誇宜併去之洪武五年三月禮部言周制天子出入條狼氏夾道以辟止行人漢制鹵簿前驅持弓以射窺者唐宋清道􅎻弩辟止行人惟迎駕之人仗外迎拜今定擬車入有司肅清道路官民勿觀望官員父老迎駕者於仗外路右俯伏若遇駐驆迎駕之人五拜洪武六年八月詔禮官考五輅制度上曰五輅起於成周玉輅太奢今止用木輅朱漆之朴素渾堅奢儉得中為二乘一不用革祭祀用之一以皮鞔行幸用之鹵簿大駕洪武二十六年定凡正旦冬至聖節錦衣衛陳鹵簿大駕於殿之東西凡鹵簿大駕惟郊祀幸太學耕籍田用之如祭社稷祭太廟祭山川則於鹵簿大駕內去白澤以下至玄武豹尾大涼步輦至大路不設其郊祀前期視牲則用丹陛駕丹陛駕凡常朝日奉天門設丹陛駕於午門外及金水橋南凡正旦冬至聖節册拜親王及番使來朝金吾衛於奉天門外分設旗幟宿衛於午門外分設兵仗衛尉於奉天殿門及丹陛丹墀設黃麾仗內使監擎執於殿上其宣詔赦降香則惟設奉天殿門及丹殿儀仗殿上擎執永樂元年八月禮部言鹵簿中宜有九龍車一乘又舊有金鉦紅鼓魫燈紅燈請增製上曰禮貴得中過為奢不及為儉先朝定禮審之精矣後世子孫遵用舊章當自朕始豈可輒有增益以啓後世之奢哉九龍車既先朝所無即不可增舊有而今闕者令工部補造武陳駕嘉靖二年上將幸天夀山諭禮部巡狩鹵簿當與出郊不同義須尚武尋御製天子武陳駕及大武冠服制式示尚書夏言且諭之曰朕此二制卿其注圖行今次不及後用之於是言繪二制以進宫府備考宫闕更奉天殿名嘉靖六年八月甲申大學士嚴嵩疏言昨奉聖諭殿名奉天是已即天也皇祖何取臣仰窺聖德不以天自居傳記有曰人君其尊如天孔子作春秋繫王於天又書曰天命天討言人君賞罰不自己出一歸於天祖制已久宜敕禮官集議以俟聖裁上曰卿釋奉天二字義甚正第非題扁用也遂敕部曰人君奉天已身坐之終未安况災燬初罹兩蒙昭示名稱之舊不可復於是禮部會議言皇祖肇造之初名曰奉天者昭揭以示虔爾既以命名則是昊天監臨儼然在上臨御之際坐以視朝似未安修復之始乞睿斷更以答天庥上曰俟至期奏於南郊太祖更之三十七年重建奉天門更名曰大朝門四十一年九月甲申更名奉天殿曰皇極初殿工成工部請額上諭內閣曰朝殿太祖名之成祖因之不更上天垂示已兩矣嵩謂太祖定名莫非奉天改之必前代所無之名今只仍舊惟天字當出奉字上於是部臣以扁式請為橫扁天字居中上出奉殿二字兩傍稍下相對上謂不雅乃取尚書洪範字義更名府第親王府第洪武九年春正月詔禮部親王宫殿門廡及城門樓皆覆以青色琉璃瓦如東宫之制又命中書省臣惟親王宫得飾朱紅大青緑餘居室止飾丹碧中書省臣言親王居室飾大青緑亦無過度上曰惟儉養德惟侈蕩心諸子方及冠年去朕左右豈可使靡麗蕩其心洪武十二年王府營造訖工繪圖以進其制中曰承運殿十一間後為圜殿次曰存心殿各九間承運殿兩廡為左右二殿自存心承運周回兩廡至承運門為屋一百三十八間殿後為前中後三宫各九間宫門兩廂等堂九十九間王城之外周垣四門其南曰靈星餘同王城名周垣之內堂庫等室一百三十八間凡為宫殿室屋八百十一間𢎞治八年定王府制前門五間門房十間廊房一十八端禮門五間門房六間承運門五間前殿七間周圍廊房八十二穿堂五間後殿五間家廟一正房五間廂房六門三間書堂一正房五間廂房六門三間左右盝頂房六宫門三間廂房十前寢宫五間穿堂七間盝頂房一東西各三所每所正房三後屋三廂房六多人房六連漿糨房六淨房六庫十儀仗庫三間廂房六間三門正房五後房五廂房十二茶房二淨房一世子宫正房三間後房五間廂房十六郡王府第天順四年定郡王每位蓋府屋共四十六間前門樓三間中門樓一間前廳房五間廂房十後廳房五廂房十厨房三庫房三米倉三馬房三公主府第洪武五年定公主府第之制禮部言唐宋公主視正一品其府第並用正一品制度今擬公主府第廳堂九間十一架施花樣獸頭梁棟斗栱簷桷彩色繪飾惟不用金正門五間七架大門用緑油銅環石礎牆磚鐫鑿玲瓏花樣從之郡王府承運門制洪武九年靖江王相府奏請靖江王府承運六門金釘朱戶之制命員外郎張籌等考古制以聞籌等奏按韓詩外傳諸侯有德者錫朱戶而金釘無所考今親王府承運門既用金釘靖江王府宜降殺如公主府掩錢之制符信備考符牌造符牌洪武四年上召工部造用寶金牌及軍國調發走馬符牌用寶為小金牌二中書省大都督府各藏其一遇制書發兵省府以牌入而後內府出寶用之其走馬符牌凡有軍國急務遣使者佩之以行禮部因以唐宋走馬銀牌之制以進上令寸尺從唐其式如宋務令製作精緻凡造金字牌二十銀字牌二十文曰符令所至即時奉行違者必刑俱以鐵為之濶二尺五分長五寸上鈒二飛龍下鈒二麒麟牌首為圎竅貫以紅絲絛藏之於內府之中一遇有調發則出之牙牌牙牌制洪武十一年三月丁酉始制牙牌給文武朝臣其制以象牙為之刻官稱於上凡朝參佩以出入有不佩者門者却之私相借者論如律有故則納之內府其在外來朝百司官無牌者則於各門附名以入勳臣以勳字親臣以親字文臣以文字武臣以武字文武官之與陪祀郊廟及執事人亦給牙牌有圎花長花花素之别凡諸得給牌者有故則檢籍而納之正德十六年九月禮部覆禮科都給事中邢寰奏牙牌惟常朝職官得以懸帶正德以來權姦竊柄傳旨升官乞清查以重名器得旨文職不朝參者不得濫給牙牌武官進御侍班佩刀執金爐者給與命婦牙牌嘉靖九年二月定命婦牙牌式視陪祀官殺三之一嘉靖二十四年十一月丙申禮科都給事中陳邦修言百官出入禁門帶牙牌以防姦偽今虛衝帶俸及雜流供事者如文思院大使趙成等十餘人皆得關領朝參牙牌宜查奪上以名器當慎令禮部尚寶司禮科查奪有違例者以名聞武臣金銀牌洪武四年六月詔定武臣金銀牌制參考舊典武臣懸帶金牌濶二寸長一尺上級雙龍下級二伏虎牌首尾為圎竅貫以紅絲絛指揮佩金牌雙龍雙虎千戶佩鍍金銀牌獨雲龍獨虎符百戶佩素雲銀牌符凡造雙龍雙虎符金牌五百面獨雲龍獨虎符鍍金銀牌二千面素銀牌一萬一千面共一萬三千五百面上親為文鈒之曰上天祐民朕乃率撫威加華夏實憑虎臣賜爾金符永傳後嗣天子饗祀郊廟若視學籍田勳衛扈從及公侯駙馬都督日直衛錦衣當直則給金牌有龍者有虎者麒麟者獅者雲者以官為差皇城金吾禁夜五城夜巡則給令牌虎賁巡城則給銅符九門守衛則給銅牌錦衣校尉入直則給雙魚銅牌扈駕銅牌洪武六年五月命造扈駕先鋒金字銀牌一千五百面尋改為守衛金牌以銅為之塗以金髙一尺濶三寸分仁義禮智信五字仁字鈒獨龍蟠雲花公侯伯都督佩之義字鈒伏虎蟠雲花指揮佩之禮字鈒獬豸蟠雲花千戶衛鎮撫佩之智字鈒獅子蟠雲花百戶所鎮撫佩之信字鈒蟠雲花將軍佩之二面俱篆文牌首竅貫青絲鎮撫及將軍隨駕應直宿衛者關給備帶下直則納之國朝將軍選鋒幹勇力者為之號曰天武將軍立將軍千百戶總旗統其衆凡早晚朝及宿衛扈駕執金瓜披鐵甲佩弓矢冠紅纓鐵盔帽列侍左右如大朝會則披金甲金盔帽列侍殿廷俱有定數初隸拱衛指揮使司後隸錦衣衛止稱曰將軍關領通規正德五年十月內該本部題準各官懸帶牙牌仍照舊例司禮監科造完備送尚寶司給發凡各官關領牙牌本部準尚寶司手本開稱某等衙門某等官原領牙牌驚􅪤透徹字號糢糊不堪懸帶及某衙門某官應該關領牙牌查無收貯俱各相應料造等項本部即查正德年間題準事例開坐請旨懸帶員數文職應帶牙牌官員九卿等衙門及內閣辨事等官文職不應帶牙牌官員太醫院帶俸及御藥房并各營供事官員工部文思院等衙門帶俸及內官監辦事匠作官員銓注在京各衙門帶俸專在各營書辦官員工部所屬軍器鞍轡等局官員武職應帶牙牌官員五府并錦衣衛堂上帶俸王親之家及公主親男錦衣衛左千戶七所并鎮撫司千百戶若係執捧金爐侍駕者許帶凡多餘見任必須駁查或分管存恤守衛管屯管操管倉管馬管厰管苜蓿管巡菁等項職任明白方許給領殿前御前侍班帶刀答應官員武職不應帶牙牌官員神木厰官員太常寺犧牲所官員錦衣衛五所七所并鎮撫司及在京各衛所帶俸指揮千百戶等官專在內府各監局御藥整容等房供事官員各府轄各衛及旗手等親軍衛雖稱多餘見任及一應雜差但駁查回報不明一概不與嘉靖二十八年五月內該本科都給事中陳邦修等題為清理牙牌以慎名器事奉聖旨這朝參官牙牌名器所當慎重禮部便會同尚寶司并該科查理應該追奪改給的明白具奏今後再有違例冒領的著指名參奏究治欽此該本部查得正德十六年九月內該禮科都給事中邢寰等題為遵詔制刷舊例以新政治事本部覆議得工部文思院等衙門帶俸專在內府內官監辦事匠作等官不係朝參之列冒領牙牌相應裁革等因奉聖旨是各該官員不係朝參之類舊額原無牙牌的一體裁革武職官專在殿在御前侍班帶刀答應并執捧金爐的還給與他欽此又查得本部見行事例內一款在京各衛所帶俸專在內府各監局御藥等房供事指揮千百户等官俱不該帶牙牌又一款尚膳監千百戶該本監於正德十六年十二月題奉聖旨既有永樂年間事例準給與他欽此又查得嘉靖四年七月內該內官監太監郭紳等題稱本監官匠順天府知事工部營繕所所正等官孫志等忠義等衛副千戶等官路英等在工效勞乞給牙牌等因奉聖旨都準他欽此今該前因本部議得牙牌之設明開朝參官懸帶此牌則凡不係朝參者其不應懸帶明矣今除各衙門大小官員在任朝參例該給領牙牌者無容别議外其通政司等工部營繕所等衙門帶俸見在內府內官等監辦事匠作等官錦衣衛等衙門帶俸見在內府各監局御藥等房寄名供事等官俱不在朝參人員先年已經遇例裁革隨該各官具奏復蒙準給兹欲仍舊給與朝參牙牌似非其義欲徑革奪則出內府禁密之地譏察不便相應議處臣等查得內府尚寶司見貯有先年舊牌數百餘面原開有入內府字樣合將前項牙牌關出換給各官懸帶如數不足另行照式造補原領朝參牌面通行送繳其各衛所等衙門除掌印僉書管屯管存恤坐營坐司侍衛等官應給朝參牙牌外其餘多餘見任并一應雜差等官不係朝參官員之數又無內府供役之因合行革奪及有在外納粟填注職事朦朧關給妄肆誇耀并考選斥退因事間住等官舊領牙牌不行送繳俱屬故違合送法司提問均乞聖裁奉聖旨依擬行欽此懸帶别例通政使司等工部營繕所等衙門帶俸見在內府內官監辦事匠作等官錦衣衛等衙門帶俸見在內府各監局御藥等房寄名供事等官改給與內府字樣牙牌懸帶嘉靖二十八年五月內該本部議題奉聖旨依議行欽此尚膳監千百尸該本監於正德十六年十二月題奉聖旨既有永樂年間事例準給與他欽此錦衣衛左千戶等所并鎮撫司千百戶等官於嘉靖六年十月內奉該本部覆題奉聖旨既係朝參官員牙牌準給與懸帶欽此太常寺犧牲所千百戶嘉靖八年正月內奉乞牙牌該本部覆題奉聖旨準給與牙牌懸帶欽此宛大二縣典史嘉靖八年十二月內奏乞牙牌本部覆題奉聖旨準給與牙牌懸帶欽此重領事例嘉靖十一年五月尸部主事尹尚賓奏稱因馬驚墜地跌損牙牌乞恩認罪事該本部覆題看得本官缺損牙牌似當參究但因馬驚奔逸事出不測情有可原合無將本官原損牙牌查繳仍行尚寶司另行關給奉聖旨準另關給欽此嘉靖二十六年正月行人章熙奏同前事奉聖旨禮部查了來説欽此該本部行查明白及查與主事尹尚賓事例相同題覆乞從寬宥奉聖旨既查無他故原牌著送繳另給章熙免究欽此嘉靖三十年正月靖逺伯王瑾奏為燒損牙牌乞恩認罪事該本部覆題看得本爵傷損牙牌應參究問但據覆查委係燒損失火事出不測似應俯賜寬宥奉聖旨王瑾姑免究牌面準另給欽此犧牲所官請牙牌𢎞治八年太常寺卿齊章等奏犧牲所百戶錢堅等請給常懸牙牌以便禁門出入禮部謂本所居城外而堅等又非朝參官若遇進牲供祀臨期自有供事牙牌所請宜勿許從之定清查牙牌法𢎞治十六年時有玉河橋道邉拾工部文思院副使牙牌者禮部奉旨查審乃成化十年六月文思院帶俸副使馮宇所領宇以𢎞治元年革罷莫知所之而其牌遂私假於未革職者懸帶以故遺失後畏罪不敢言因奉牙牌本為朝參官員而設文思院匠官出入禁門自有牌面照驗乃假以不便為辭援朝參官例一概冒領且自以冠帶不便工作往往繫牙牌於絛上所以易於遺失今後宜一切禁絶年終諸司將各官原領牙牌字號并年月日期備開册了送尚寶司清查違者治罪從之禮科奏稽牙牌嘉靖元年禮部覆禮科給事中邢寰奏牙牌惟常朝職官得以懸帶正德以來權姦竊柄官以傳乞而升牌以夤緣而得乞賜清查以重名器得旨文職不朝參者不得濫給牙牌武官進御侍班佩刀執金爐者照舊給與供事執事别給牌面嘉靖二十八年初內府供事匠作武職等官皆帶朝參牙牌曽奉旨革奪旋復之至是禮科都給事中陳邦修以為言禮部覆奏大明會典所載在京文武官員出入禁門各有所帶牌面而牙牌內有執事供事朝參之别執事供事等牙牌皆臨時關領如期繳進惟朝參牙牌例得朝夕懸帶蓋非徒為關防之具亦以等威之示辨也若虛銜帶俸供事執事人員委不宜一概冒領第出入禁密若一切革奪則又不便譏察及查尚寶司見貯舊牌數百上有入內府字樣請以此給之庶關防既便而名實亦稱至於衛所武官自掌印僉書侍衛之外見任雜差等官不朝參供役者盡革奪之其納粟填注冒關牙牌及罷退間住官舊所關領不繳者俱行逮問報可使節使節之制洪武二十三年八月詔考定使節之制禮部奏漢光武時節以竹為之柄長八尺其毛三重而黃紹韻會注漢節柄長三尺毛三重以旄牛尾為之紹從三尺之制禮部志稿卷六十三
