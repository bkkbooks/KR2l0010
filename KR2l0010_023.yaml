body:
  text: 禮部志稿卷二十三明俞汝楫編儀制司職掌貢舉歲貢國初有舉保之令凡舉保孝廉人材秀才及山林隱逸禮部即行所屬委自正官選求民間果係名實相副素無過犯之人有司起送到部咨發吏部聽用其後皆屬吏部掌行而禮部所掌惟歲貢國初額不一正統間始定至今遵行其額外增貢者或以疏通或以恩詔不著令兹並列焉凡歲貢額數洪武十六年奏準天下府州縣學自明年為始歲貢生員各一人二十一年令歲貢府學一年州學二年縣學三年各貢一人必性資純厚學業有成年二十以上者方許二十五年令歲貢府學一年二人州學二年三人縣學一年一人永樂八年令凡州縣户不及五里者州一年縣二年各貢一人十九年令歲貢照洪武二十一年例宣德二年令貴州府學照縣學例三年一貢七年令歲貢照洪武二十五年例八年令天下州不及二十里者歲貢一人正統六年令府學一年貢一人州學三年貢二人縣學二年貢一人遂為定例成化二年奏準衛學照縣學例二年貢一人四年令凡京學二年貢三人軍民指揮使司衛學照府學例軍民生相間一年貢一人都司及土官學照州學例三年貢二人𢎞治十三年奏準自十四年為始各處州學俱四年三貢其雲南四川貴州等處除軍民指揮使司儒學軍民相間一年一貢其餘土官及都司學各照先年奏準事例三年二貢十四年奏準萬全都司照府學例一年一貢其餘都司所屬衛分少者不許濫比正德三年奏準大寧都司學一年一貢十一年題準遼東都司學設優等次等生員各四十名每年考送一人充貢十二年奏準陜西都司學一年一貢十三年奏準廣寧等五衛儒學生員照州學事例考貢嘉靖二年令順天府學每年起送二名充貢應天府同又奏準貴州宣撫司儒學生員一年一貢十七年題承天府學每二年貢三名單年二名雙年一名凡起貢洪武十八年令雲南所屬學校生員有成材者不拘常例從便選貢永樂元年令廣西湖廣四川土官衙門生員照雲南例選貢十八年令貴州選貢送監正統四年奏準生員科舉停支廩米準作食糧月日充貢七年令歲貢精選端重有文及通書算者起送天順六年令歲貢照例將食糧年深者嚴加考試務要通曉文理方許起送又令歲貢生員取考科貢開除廩米月日準作食糧之數其餘俱作虛曠若同案食糧則以籍名先後為次仍將考過試卷粘連批文親齎赴部成化四年令雲南貴州選貢仍照例考送又令歲貢生員丁憂正服月日準作實數其養病侍親及服闋不復學皆作虛曠十六年令歲貢不分軍民生俱聽提學官考試其衛學在布政司地方布政司給批起送在兩直𨽻地方各府起送在各邊都司起送嘉靖六年奏準考選歲貢生員照次取四人陪考務通文理方許充貢九年奏準照舊用一人陪貢十年奏準提學官考選應貢者於歲考之時即行詳定如廩膳考居一等之內不拘名次查取食糧年深者起送一人如無人材去處一等無人方許于二等內十名以前照前起送不必下及增附十三年奏準提學官一遵祖宗舊規以食糧年深充貢有司起送止許正貢一人陪貢一人提學官考定一人起送赴部不必加添四人五人送考其考貢不中願告衣巾終身者聽提學照例行十四年令各處歲貢生員照例將食糧年深者嚴加考試如果不堪充貢照例罷黜將以次者考充務要通曉文理方許起送萬厯三年題準各處歲貢生員該府州縣提調官俱要查其節年屢考一等二等曾經科舉及年在六十以下三十以上者照依食糧前後選取六人送考提學官擇其最優者起貢其年力衰邁者即授以儒官不準起送十一年題準各府州縣遇歲貢之年止用一正一陪送考擇其頗優者一人充貢赴部凡恩貢𢎞治八年奏準自九年起至十三年止順天應天二府四年各該貢六名者許貢一十二名其餘府學每年該貢一名者許貢二名州學三年該貢二名者二年許貢三名縣學衛學二年該貢一名者每年各貢一名以後仍照見行例嘉靖十年題準照宣德正統天順年間事例今歲各學廩膳生員果係學行出羣年三十以上者府學許貢三人州學許貢二人縣衛學各貢一人以後仍照該貢年限數目起送如廩膳內無人許於增廣附學內考取務求真才以應明詔如有名實不稱及夤緣干進情弊聽撫按糾舉隆慶三年題準將各府州縣衛儒學廩膳生員不拘食糧淺深通行考試務取文行兼優年力精壯者府學二人州縣二學各一人以充恩貢俱限本年到部聽翰林院嚴加考校凡補貢永樂十九年令歲貢生員起送到部遇有事故不許補貢其在家或中途事故者勘明準令次考補貢若丁憂及患病勘明仍補該年之貢如託故延至二年之外者亦不準收有司朦朧送補者各治罪成化四年令歲貢已起送或在家中途事故過一年之上不許補貢𢎞治十六年奏準如遇貢缺取具所缺事故緣由并原給咨批硃卷申繳提學官查明將次貢考補過一年以上者照例不許補貢正德九年奏準凡應本年貢已經考中領有試卷丁憂患病回家不拘已未給文服滿病痊雖三年外各該衙門再查無礙結送補本年貢若重給文後又違限三年之上者雖有患帖亦發為民補貢年月以本地方到部限期為始其應貢生員未曽到部填寫格眼遇有事故該衙門咨中試卷并將以次生員申送提學官處考補過一年之上者駁回若違例起送本部通將經管官吏并提學官參究萬厯三年題準補貢例見後風憲官提督條下凡三氏歲貢成化元年令三氏學三年貢一人提學官考試起送正德四年令三氏學每三年貢孔氏子孫一人至第四次方貢顏孟子孫一人仍行提學官考選曽經科舉者不許將年老無學之人一槩入選收用嘉靖六年令三氏子孫照州學例設廩增三十名以廩膳名次起貢凡期限洪武十六年奏準天下歲貢生員俱限正月至京十八年令貢不如期者以違制論永樂三年令歲貢直𨽻浙江河南限正月到部山東山西陜西湖廣福建江西限二月四川廣東廣西三月成化十七年令提學官考過該貢生員務遵永樂初年欽定限期赴部考試如有過限三箇月之上者壓考一次一年之上者照例問罪託故在家三年之上者雖有堪據文憑亦不準收萬厯二年題準提學官每歲預將次年應貢生員通行考定給領硃卷起文通限次年三月十五日以前到部禮部題請於四月內定期廷試試畢願就教者禮部考送吏部覆請於六月內廷試如貢生三月內不到者俱壓次年候考罷去試以復初制先年春月廷試未到者於秋月補試至是革凡考試洪武十六年定歲貢生員至京從翰林院試經義四書義各一道判語一條中式者入國子監不中者罰充吏十八年令歲貢不中式者遣復學肄業提調官吏論以貢舉非其人律教官訓導罰俸一年二十四年奏準歲貢不中者有司官任及三年者照例論罪二年者住俸半年一年者住俸三箇月學官無分久近照例責罰生員食廩五年者充吏不及者復學次年復不中者雖未及五年亦充吏二十六年定歲貢生員到部禮部奏聞從翰林院考試如果中式者送國子監讀書其入學五年以上及二次不中者發充吏典提調官吏及教官訓導照例決罰又令四川土官衙門歲貢生員免考送監二十八年奏準歲貢初試不中者遣復學停廩肄業提調官教官取招生員限次年再試兩廣四川限兩年再試復不中者照例充吏提調官教官仍舊責罰二十年令歲貢不中復學者免停廩嘉靖十一年令歲貢到部考試不中五名以上者提學官降一級三名以上者提學并帶考御史從兩京都察院按察司官從巡按御史各提問其考試不中生員不許容留在京聽候下次覆考十五年題準歲貢生員復試不中例該充吏者給賜衣巾終身隆慶三年題準恩貢不中如一省發回三名以上禮部即將提學參奏降級别用萬厯三年題準見後風憲官提督條下凡就教成化十四年令歲貢生員願授教職者雖南監人數亦送北監坐監一年本監按季考試能通三場文字委係家貧親老許送吏部考中者方送廷試取中選用不中仍送回本監肄業十七年令歲貢生員願就教職者禮部嚴加考試果堪師範徑送吏部照例覆考除授考不中者分送南北二監讀書嘉靖二十七年奏準歲貢廷試之後驗年五十以下精力未衰送監卒業餘查人數多寡願就教者準送吏部考除隆慶三年題準恩貢考中者分送兩京國子監讀書不許告就教職凡不願授職嘉靖十三年令應貢到京願告冠帶榮身者聽禮部照例行十八年詔天下歲貢生員應貢到部有年老不願仕者與正七品散官凡病故嘉靖二十七年令歲貢投文到部若有病故者查照見行事例咨行兵部起關應付還鄉科舉國初倣古賓興之制定以子午卯酉年秋八月各直省皆試士於鄉中試者貢於禮部次年春禮部奏請會試天下貢士取中式者引奏陛見上親䇿試之欽定甲第賜進士及第出身有差初鄉舉各以地方人才多寡為額多者不過四十人會試臨期奏請取中式者亦不過百人别以人才薦舉他途進者往往至大官不盡繇科目其後海內學者日衆貢額漸增士就試禮部者至四五千人所舉視舊額率增數倍天下英俊之士非此不得進用科條禁令日以益繁矣今並列於後科舉通例凡開科洪武三年詔設科取士以今年八月為始使中外文臣皆繇科舉而選京師及各行省鄉試八月初九日試初場又三日試第二場又三日試第三場初場經義二道四書義一道第二場論一道第三場䇿一道後十日復以騎射書算律五事試之鄉試中式行省咨中書省判送禮部會試其中選者上親䇿於庭第其髙下五經義限三百字以上論亦如之䇿惟務直述不尚文藻限一千字以上其髙麗安南占城等國如有經明行修之士各就本國鄉試許貢赴京師會試不拘額數選取四年詔各行省連試三年自後三年一舉著為定例十七年定一三年大比八月初九日第一場試四書義三道每道三百字以上未能者許各減一道四書義主朱子集注經義易主程朱傳義書主蔡氏傳及古注疏詩主朱子集傳春秋主左氏公羊穀梁胡氏張洽傳禮記主古注疏後四書五經主大全十二日第二場論一道三百字以上判語五條詔誥表內科一道十五日第三場試經史時務䇿五道未能者許減二道俱三百字以上其中式舉人出給公據官為應付廩給腳力赴禮部印卷會試就將鄉試文字咨繳本部照驗以鄉試之次年二月初九日十二日十五日為三場舉人不拘額數一舉人試卷及筆墨硯自備每場草卷正卷各紙十二幅首書姓名年甲籍貫三代本經會試殿試並同前期在內赴應天府在外赴布政司印卷置簿附寫於縫上用印鈐記仍將印卷官姓名置長條印記用於卷尾各還舉人一試前二日圖畫東西行席舍間數編排開寫某行間係某處舉人某人坐又於間內貼其姓名出榜曉示一試之日黎明舉人入場每軍一人看守禁講問代冒黃昏納卷未畢者給燭三枝燭盡文不成者扶出成化二年定考試等官俱于當月初七日入院十年定監試官都察院十日以前選差公正御史公同提調官於至公堂編次號圖提點席舍審察執役人等禁約希求考試聲譽每場進題考試官先行密封不許進題官與聞以致露泄生員作文全場減場者監試官各用全減關防印記至黃昏全場謄正未畢者給燭稿不完者扶出隆慶元年奏準揭曉之日提調官即將中試舉人硃墨卷發出提學道查驗墨卷字迹與先前考取科舉原卷如果出自一手即令本生於硃墨二卷上親供腳色提學官用印鈐封兩京送京府各省送布政司差人星馳解部如試録先到而解卷到遲者將提調官參究治罪若驗係謄過文卷而提調官輒為印鈐者一併參治其各生赴部止用文書不必再録原卷萬厯元年奏準各處鄉試行令提調官轉行主考官除初場照舊分經外其二三場改發别房各另品題呈送主考定奪查果三場俱優者即置之髙選後場俊異而初場純疵相半者酌量收録若初場雖善而後場空疏者不得一槩中式如有後場雷同作弊者查將本生從重問擬其提調主考等官仍蹈故習者聽撫按官及禮部查究四年議準場中編號令監試提調官親自掣籖一面登記號簿一面楷書卷面待其入坐令軍人各看驗字號如有不同即時扶出又委官間出不意稽查一二若有通同容隱者士子即扶出守號軍人一併究治謄録所官須督責書手真正楷書如有一字脫誤及遺落股數者許對讀所舉送監試提調官究治會試同凡文字格式洪武四年令科舉凡詞理平順者皆預選列惟吏胥心術已壞不許應試十七年令文字回避御名廟諱及不許自敘辛苦門第謄録官檢點得出送提調監試官閲過不録二十四年定文字格式一凡出題或經或史所問須要含蓄不顯使答者自詳問意以觀才識一凡對䇿須參詳題意明白對答如問錢糧即言錢糧如問水利即言水利孰得孰失務在典實不許敷衍繁文遇當寫題處亦止曰云云不必重述一凡作四書經義破承之下便入大講不許重寫官題又令科舉歲貢於大誥內出題或䇿論判語參試正統六年令出題不許摘裂牽綴及問非所當問取文務須淳實典雅不許浮華違者從風憲官糾劾治罪成化十三年令舉人文字凡遇御名廟諱下一字俱要減寫點畫考試等官不許越數多取出題校文須依經按傳文理純正不許監臨等官干預小録不許開寫掌行科舉文字吏典及謄録對讀生員姓名𢎞治七年令作文務要純雅通暢不許用浮華險怪艱滯之辭答䇿不許引用繆誤雜書其陳及時務須斟酌得宜便於實用不許泛為誇大及偏執私見有乖醇厚之風御名廟諱及親王名諱仍依舊制二字不偏諱不必缺其點畫違者黜落文字試題上不許加奉試字其正卷務依所出題目次第楷書不許草書及先後錯亂舉人止憑文字髙下去取不得論其地方中式多寡臨時偏徇進黜以廢公論小録文字不許提調監試等官代作及將舉人原文改刻其考試等官各開職名不許稱張公李公字樣十七年令各處進到小録有乖違者禮部與翰林院參奏究問嘉靖六年奏準科場文字務要平實典雅不許浮華險怪以壞文體試録只依士子本文稍加潤色十七年題準會試校文務要醇正典雅明白通暢合於程式者方許取中其中似前駕虛翼偽鈎棘軋茁之文必加黜落仍聽考試官摘出不寫經傳本旨不循體制及引用莊列背道不經之言悖謬尤甚者將試卷送出以憑本部指實奏請除名不許再試十八年令今後鄉試進到試録禮部詳閲舉奏如有叛經離道詭辭邪説定將監臨考試等官罪黜取中舉人辨驗公據得實革退為民萬厯元年奏準試録序文必典實簡古明白正大俱若成化𢎞治年間文體督撫等官不許妄加稱奬以蹈浮靡之弊又奏準士子經書文字照先年題準限六百字上下冗長浮泛者不得中式八年奏準限五百字過多者不許謄録十三年題準程式文字就將士子中式試卷純正典實者依制刋刻不許主司代作其後場果有學問該博即前場稍未純亦許甄録中間字句不甚妥當者不妨稍為修飾但不許增損過多致掩本文凡科場禁例洪武五年令舉人不中程式為有司所黜多不省已自修往往托拾主司細故謗毁以逞私忿者罪之七年奏準生儒點名進場時嚴行搜檢入舍後詳加伺察如有犯者照例於舉場前枷號一月滿日問罪革為民十三年奏準謄録生宜多增名數嚴加考選臨期責令所官用心督責有脫誤差訛者除查究外仍將本卷另謄對讀生查出者量行給賞至於分卷謄録之時須將前後所收試卷勻散以防姦弊十七年令凡試官不得將弟男子姪親屬入院徇私取中違者指實陳告成化二年令舉人不許懷挾并越舍互録及凂託軍匠人等夾帶文字其軍匠人等亦不許替帶及縱容懷挾互録文字違者各治以罪𢎞治七年令應舉生儒人等不許未熟三場初學之士及外處人冒濫入試亦不許重冒古今顯者姓名有即改正席舍照依編定字號并所治本經相間入坐毋得攙越錯亂十三年奏準應試生儒舉人監生但有懷挾文字銀兩并越舍與人換寫文字者俱問發充吏三考滿日為民若係官吏就發為民其官旗軍人夫匠人等受財代替夾帶傳遞及縱容不舉察者旗軍調邊衛食糧差操官罰俸一年夫匠發口外為民若冒頂正軍入場看守屬軍衛發邊衛屬有司者發附近俱充軍十七年奏準凡科舉入場及開榜之日如挾私投匿名文書中傷士子者在內聽巡城御史五城兵馬司在外聽按察司并應捕人役緝拿到官依律治罪見者即便依律燒毁不許考試官諉以避嫌妄退文卷其士子果有作弊實迹聽明白具告治罪違者並聽監試御史糾舉嘉靖四十四年議準舉人入場務要嚴加搜檢放入就舍如有懷挾及凂托人夾帶文字入場埋藏抄謄并越舍與人換寫者搜檢得出拿送兵馬司究問枷號一月發回充吏滿日為民不行覺察捉拿者軍調邊衛官罰俸一年隆慶元年奏準積年棍徒每遇大比之年假考試官親識多方設計詎騙汚衊主司今後如有前項姦徒照例問擬外其生儒用賄是實一體枷號滿日押發口外為民鄉試凡鄉試額數洪武三年定直𨽻府州貢額百人河南山東山西陜西北平福建浙江江西湖廣各四十名廣西廣東各二十五人若人才多處或不及者不拘額數十七年定舉人不拘額數從實充貢洪熙元年定取士額數南京國子監并南直𨽻共八十名北京國子監并北直𨽻共五十名江西五十名浙江福建各四十五名湖廣廣東各四十名河南四川各三十五名陜西山西山東各三十名廣西二十名雲南交趾各十名宣德四年令雲南鄉試增五名七年令順天府鄉試額取八十名正統二年令開科不拘額數五年復定取士額順天府仍八十名應天府百名浙江福建皆六十名江西六十五名河南廣東皆五十名湖廣五十五名山東四川皆四十五名陜西山西皆四十名廣西三十名雲南二十名六年令順天府鄉試增二十名景泰元年令開科不計額數四年復定取士額南北直𨽻各增三十五名浙江江西福建河南湖廣山東各增三十名廣東四川陜西山西廣西各增二十五名雲南增十名成化三年令雲南鄉試復增十名十年令雲南解額復增五名𢎞治七年令雲貴解額共增五名嘉靖十四年令貴州另自開科其解額雲南四十名貴州二十五名十九年令增湖廣解額五名二十五年令增貴州鄉試解額五名隆慶四年奏準兩京國子監恩貢生員數多暫增額各十五名不為例萬厯元年令增雲南解額五名凡考試官洪武十七年定考試官皆訪明經公正之士於儒官儒士內選用官出幣帛先期敦聘主文考試二員文幣各二表裏同考試官四員文幣各一表裏在內應天府請在外各布政司請永樂十五年令北京行部及應天府鄉試考試官命翰林院春坊官主考賜宴於本部及本府正統六年令考試必求文學老成行止端莊者不許將六十歲以上及致仕養病與署事舉人并年少新進學力未至者舉用景泰元年令在京在外鄉試同考試官五經許用五員專經考試三年令凡科舉布按二司會同巡按御史公同推保見任教官年五十以下三十以上平日精通文學持身廉謹者聘充考官天順三年令兩京鄉試易詩書三經各添考官一員𢎞治四年令各處提學官平日巡歷地方將教官考定等第以備科舉聘取若有不堪即從彼處提學官於等第內别舉不許徇私七年令考官不許聽囑濫請各將舉主職名咨呈禮部十七年令從公訪舉考試官不拘職任務在得人有不勝任者罪坐所舉官員嘉靖六年令兩京鄉試除主考照例奏請簡命禮部仍會吏部於兩京六科部屬等官內訪舉每經一員隨考試官入院各總校本房其餘仍用教官各布政司預呈禮部亦會舉京官或進士每處二員主考監臨官不許干預內簾職事又奏準鄉試除主考官上請會舉其同考官巡按御史移文别省請取止具某經員數不許明列姓名聽彼處巡按御史會提學官推舉開送萬厯四年議準兩京鄉試取到同考教官令該府提調官察其衰老者以禮止回或偶病及不到官仍查照近科事例在京於觀政進士及聽補甲科官員南京於附近推官知縣內各選補十三年奏準各省仍用京官主考凡遇鄉試之年巡按御史奏請禮部會同吏部於在廷諸臣內訪其學行兼優者疏名上請每省分遣二員仍酌量道里近遠先期奏差凡入場官員洪武十七年定一提調官在內應天府官一員在外布政司官一員監試官在內監察御史二員在外按察司官二員供給官在內應天府官一員在外府官一員收掌試卷官一員彌封官一員謄録官一員書寫於府州縣生員人吏內選用對讀官四員受卷官二員以上皆選居官清慎者充之巡綽監門搜檢懷挾官四員在內從都督府委官在外從守禦官委官一考試官及簾內簾外官許各將不識字從人一名不許縱令出入一試官入院之後提調官監試官封鑰內外門户不許私自出入如送試卷或供給物料提調監試官眼同開門點檢送入即便封鎖舉人作文畢送受卷官收受類送彌封官撰字號封記送謄録所謄録畢送對讀官對讀畢送內簾看提調監試官不得干預一搜檢懷挾官凡遇每場舉人入院一一搜檢除印過試卷及筆墨硯外不得將片紙隻字搜檢得出即記姓名扶出仍行本貫不許再試一巡綽官凡遇舉人入院並須禁約喧閧如已入席舍常川巡綽不得私相談論及覺察簾內外不得泄露事務一受卷所置立文簿凡遇舉人投卷就於簿上附名交納以憑稽數毋致遺失一彌封所先將試卷密封舉人姓名用印關防仍置簿編次三合成字號照樣於試卷上附書毋致漏泄一謄録所務依舉人原卷字數語句謄録相同於上附書某人謄録無差毋致脫漏添換一對讀所一人對紅卷一人對墨卷須一字一句用心對同於後附書某人對讀無差毋致脫漏一舉人試卷用墨筆謄録對讀受卷皆用紅筆考試官用青筆其用墨筆處不許用紅用紅處不許用墨毋致混同成化二年定一巡綽搜檢看守官軍止於在營差撥曽差者不許再差若他人冒頂正軍入場者罪之提調監試官公同往來巡視不許私自入號其巡綽官止於號門外看察不許入內與舉人交接違者聽提調監試官舉問一試場外照例五城兵馬率領火夫弓兵嚴加防守不得違誤一每場謄録紅卷送入內簾考試候三場考試已定方許吊取墨卷於公堂比對字號毋致疏漏一謄録對讀等官取吏部聽選官年四十上下五品至七品有行止者充之一謄録對讀所須真正謄録明白對讀若謄録字樣差失潦草及對讀不出者罪之六年令監臨等官不許侵奪考官職掌若場中有弊照例舉問十年定一受卷供給巡綽等官入院監試官搜檢鋪陳衣箱等物不許夾帶文字硃紅墨筆厨役皂𨽻人等審實正身供事不許久慣之徒私替出入一搜檢巡綽取在外都司輪班京操官軍三場調用把門人等時加更換不許軍人故帶文字裝誣生員勒取財物𢎞治四年令各處鄉試簾內事不許簾外干預考官務以禮待不許二司并御史欺凌斥辱文章純駁悉聽去取不得簾外巧立五經官以奪其權如考官不能勝任而取士弗當刋文有差連舉主坐罪凡應試洪武十七年定一三年大比直𨽻府州縣試於應天府外府州縣試於各布政司一應試國子學生府州縣學生員之學成者儒士之未仕者官之末入流而無錢糧等項粘帶者皆繇有司保舉性資敦厚文行可稱者各具年甲籍貫三代本經縣州申府府申布政司鄉試其學官及罷間官吏倡優之家𨽻卒之徒與居父母之喪者並不許應試永樂三年令北直𨽻府州縣於順天府鄉試洪熙元年令貴州願試者就試湖廣宣德二年令貴州就試雲南正統九年奏準各處應試生儒人等從提學官考送在京各衙門吏典承差人等聽本衙門保勘禮部嚴考通經無犯者送試仍行原籍勘實不許扶同詐冒又三氏教同生員應山東鄉試本處提學考選景泰元年令應試儒士册內原無名籍儒士及贅壻義男并文武官舍軍校匠餘不許於外郡入試天順二年令兩京天文生陰陽人及官生子弟許就在京鄉試八年奏準依親監生從提學官考試本處鄉試成化二十一年令南京監生人等從南京都察院考送應天府鄉試𢎞治五年奏準吏部聽選監生給假在家者許就本處鄉試醫士醫生在册食糧執役者方許在京應試其在部未考歲貢或在監告就教職監生及不係在任依親官生天文生陰陽人例不許習他業者皆不許入試十年令太醫院各官醫下子孫弟姪本院册內有名者照舊鄉試正德十年令兩京武學幼官及軍職子弟有志科目者亦許應試惟不充貢又奏準兩京文職衙門及各布政司凡有弟男人等回籍鄉試者令赴告本州縣取結明白轉送提學官考試入場不許徑於仕官衙門移文起送其提學官一體遵守不許阿循違者通查參究嘉靖六年奏準歲貢出身教職歷任三年教有成效提學官考試文學優長者許就見任地方入試十年題準直𨽻德州左等衛儒學聽山東提學官管轄就於山東布政司應試遼東生儒聽遼東巡按御史考送順天府應試十六年題準今後順天府鄉試儒士務要查審辨驗籍貫明白其附籍可疑之人取有同鄉正途出身官印信保結方許應試二十二年議準在京應試監生備查在監在厯果無增減月日託故遲延及選期未及先到等項情弊方許收考其厯滿歲貢援例監生有志進取者許赴原籍提學官處同生儒考選應試又題準湖廣清浪鎮遠五開平溪偏橋等衛軍生改教貴州鄉試凡科場應用物料洪武十七年定在京及各布政司搭蓋試院房舍并供用筆墨心紅紙劄飲食之類皆於官錢支給咨報戶部正統九年令今後各布政司如遇鄉試畢日將試院內所用一應物件照數發去在城府分收貯令人看守待下科取用中間若有損壞者修整完偹送用免致再科擾民𢎞治七年奏準雲南貴州鄉試進呈録稱雲貴鄉試録貴州量助錢糧以備雲南供給會試凡會試額數洪武三年詔禮部會試額取舉人百名洪熙元年奏準會試取士臨期請旨不過百名南卷取十之六北卷取十之四後復以百名為率南北各退五卷為中卷浙江江西福建湖廣廣東應天直𨽻松江蘇州常州鎮江徽州寧國池州太平淮安揚州十六省府廣德一州為南卷山東山西河南陜西順天直𨽻保定真定河間順德大名永平廣平十二省府延慶保安二州遼東大寧萬全三都司為北卷四川廣西雲南貴州廬州鳳陽安慶七省府徐滁和三州為中卷正統五年奏準增額為百五十人十三年以後仍不拘額數景泰元年令會試文字合格者通具中數臨期奏請定奪成化二十二年奏準南北卷復各退二卷為中卷𢎞治三年奏準南北卷仍照舊例止各退五名為中卷會試中式無定額大約國初以百名為率間有增損多者如洪武十八年永樂三年俱四百七十二名永樂十三年三百五十名少者如洪武二十四年三十一名三十年五十二名成化而後以三百名為率多者如正德九年嘉靖二年三十二年四十四年隆慶二年五年俱四百名少者如成化五年八年俱二百五十名各科三百名之外或增二十名或五十名俱臨時欽定凡考試官洪武十六年令會試主考官二員并同考官三員臨期具奏於翰林院官請用其餘同考官五員於在外學官請用又令考試官員俱用表裏禮請永樂七年令會試考官賜宴於禮部正統四年奏準會試考官翰林春坊専其事京官繇科第有學行者兼取以充教官不許天順元年令考官不拘員數務在得人成化十七年令會試同考官書詩經各增一員共十四員正德六年令增會試用同考官共十七員翰林官十一員科部各三員內分易經四房書經四房詩經五房春秋二房禮記二房凡入場官員景泰元年令會試受卷彌封謄録對讀等官於吏部聽選官取官成化二年令禮部一員提督供給𢎞治七年奏準受卷彌封謄録對讀官增十六員謄録等生員照依除在京并通州學外於順天府所屬并鄰近學選撥已冠能書生員七百名嘉靖三十二年令禮部尚書止是領題進呈有子入試者不必回避侍郎該充知貢舉官入場有子應試者許回避查照𢎞治十五年例命吏部侍郎一員充知貢舉官入院供事凡應試洪武十八年令會試下第舉人願回讀書以俟後舉者聽三十年令再試寄監下第舉人中式者次其等第除教授教諭訓導不中者為州吏目永樂七年令下第舉人再試送國子監進學其優等者仍賜官帶或加俸級後令發回原學進業天順八年令教官由舉人署職任滿該升年四十以下願會試者聽成化二十三年奏準舉人教授官六年有功績者許會試𢎞治十二年令署職教官照成化二十三年例兩科準算六年願會試者聽其任滿該升如遇會試將近不拘年歲亦許會試若給假或揑病久不入選窺伺會試者不準十九年令教官由舉人九年考滿不拘署職實授及功績有無願入試者聽嘉靖十年題準會試除新科舉人齎執公據外凡依親等項復班舉人有不繇本布政司倒文到部者照例送問各該承行官吏查參其止齎原給文引者不拘日期遠近一切不準入試萬厯三年題準兩京各省舉人有未經入監及監事未畢告回原籍者俱限三箇月內起送到部發監肄業其原入南監者仍赴該監依期起文會試若未經入監雖有原籍起送公文不準入場以後每科會試畢日凡舉人下第及中副榜不願就教者查照前例盡數分送兩監肄業並不許假借告病依親等項名色告給引回籍五年題準各房閲卷凡士子文字合式者除正卷外悉將備卷每房少或五七卷多則十餘卷批詳次序開列數目一併查對姓名籍貫付禮部提調司官以次填入副榜不必拘定額數凡科場應用物件𢎞治七年令各布政司并應天府量將本處科舉供給餘銀送部以備會試供給雲南兩廣免送嘉靖十七年題準試院應用物件并板木紙劄及登科録紙劄等項銀一千九百五十兩供給銀五百兩筵宴銀三百兩俱各省科舉用剩銀解內用浙江江西湖廣福建四川各二百七十兩河南山東山西陜西廣東應天府各二百兩雲南廣西各一百兩其刋字刷印等匠工食俱北直𨽻各府解用內真定府二十八兩保定府二十五兩二錢大名永平二府各二十二兩四錢順德廣平二府各一十九兩六錢河間府一十四兩殿試凡殿試洪武三年定殿試時務䇿一道惟務直述限一千字以上其出身第一甲第一名從六品第二第三名正七品賜進士及第第二甲正七品賜進士出身第三甲正八品賜同進士出身四年定恩榮次第二月十九日御奉天殿䇿賜貢士二十日午門外唱名張挂黃榜奉天殿欽聽宣諭同除授職名於奉天門謝恩二十二日賜宴於中書省二十三日國子學謁先聖行釋菜禮永樂二年定前期禮部奏請讀卷并執事等官其讀卷以內閣官六部都察院通政司大理寺正官詹事府翰林院堂上官提調以禮部尚書侍郎監試以監察御史二員受卷彌封掌卷俱以翰林院春坊司經局光祿寺鴻臚寺尚寶司六科及制敕房官巡綽以錦衣等衛官印卷以禮部儀制司官供給以光祿寺禮部精膳司官至日上御奉天殿親賜䇿問儀見䇿士諸舉人對䇿畢詣東角門納卷出受卷官以試卷送彌封官彌封訖送掌卷官轉送東閣讀卷官處詳定髙下明日讀卷官俱詣文華殿讀卷御筆親定三名次第賜讀卷官宴儀見䇿士宴畢仍賜鈔退於東閣拆第二甲三甲試卷逐旋封送內閣填寫黃榜明日讀卷官俱詣華蓋殿內閣官拆上所定三卷填榜訖上御奉天殿傳制畢儀見䇿士張挂黃榜於長安左門外順天府官用傘蓋儀從送狀元歸第明日賜狀元及進士宴於禮部命大臣一員待宴讀卷執事等官皆預進士并各官皆簮花一枝花剪綵為之其上有銅牌鈒思榮宴三字惟狀元所簮花枝葉皆銀飾以翠羽其牌用銀抹金教坊司承應宴畢狀元及進士赴鴻臚寺習儀又明日賜狀元冠帶朝服一襲諸進士寶鈔每人五錠後三日狀元率諸進士上表謝恩儀見䇿士明日狀元率諸進士詣國子監謁先師廟行釋菜禮禮畢易冠服禮部奏請命工部於國子監立石題名𢎞治六年奏準讀卷并放榜等項遞移次一日嘉靖五年奏準受卷彌封官不許檢看文字及與掌卷官往來各卷糊名畢用關防鈐蓋送掌卷官處轉送讀卷官內除內閣首一人總看各卷不必分授其餘讀卷官各將所看文字第為三等先將上等一卷送內閣公同定擬一甲三名餘卷從內閣至翰林院各填一卷周而復始禮部志稿卷二十三
