body:
  text: 禮部志稿卷八十明俞汝楫編宗藩備考藩約飭奉令㫖行事𢎞治十二年十月内巡撫四川地方都察院右副都御史鍾蕃據壽府長史司呈該本司兵房典吏黄文明啓稱近被保寧府知府張翌辱打等因當奉令㫖知府張翌累次綑打軍校以致逃去數多今又將本府吏典黄文明痛打二十無辜監禁着長史司行文與都察院巡按等官去敬遵擬合具呈施行等因到臣除已敬遵查勘囬報另行外查得蜀府長史司自來並無此等文移其壽府長史司呈到前項敬遵壽王令㫖文移縁臣愚昧未審果於事體應否敬遵施行乞勅該衙門從長計議等因本部議得合無行移巡撫四川都御史鍾蕃知會今後巡撫巡按并都布按三司以下衙門遇有各長史司行到一應敬遵令㫖事務其巡按巡撫三司等官務要㑹同㸔詳計議應施行者即便施行不許故違若事情重大該奏聞者作急會本奏聞請㫖其各長史司官職掌導今後奉王令㫖行事務要停當如有窒礙難行者亦當竭忠諫止不使王命有差貽􅏺於外如有懐奸倚勢撥置親王輒以私情傳行令㫖於各衙門以致驚擾有司軍民貽害地方者許巡撫巡按三司等官會同𠫭奏治罪仍通行各王府及各巡撫巡按三司等衙門一體知㑹施行等因覆題奉孝宗皇帝聖㫖是還冩勅與壽王務遵祖訓行欽此禁方術誘惑正徳四年該本部議得天下王府數多中間恐有無藉之徒以燒丹煉藥等項為名往來誑惑以致壊事非細合無通行鎮巡等官嚴加禁約如遇此等之人即便從重問發無得姑容不便奉武宗皇帝聖㫖是欽此宗儀服飭𢎞治九年四月巡按湖廣御史田淵奏本部㑹官議得各王府儀賔有等出自寒微不知安分合行有王府去處撫按官員通行禁約如有借用服色者各官指名𠫭究革去冠帶戴平頭巾於本處儒學讀書習禮重者五年輕者三年方始復職冠帶奉孝宗皇帝聖㫖是欽此𢎞治十六年十二月遼府光澤王奏本部議淂各王府將軍中尉并夫人以下服色傘盖馬匹等項務要各照原授官職封號品級服用不許張打銷金紅傘扛擡八人硃紅漆轎穿用龍鳳衣服僣束紅帶宗室親迎之禮止於府門之外城門之内設館不許擅自出郭等因覆題奉孝宗皇帝聖㫖准擬欽此嘉靖三十五年四月樂安王奏稱儀賔袁宗道張盖三簷黄傘腰繫金鑲帶乞要㕘治該本部㸔得袁宗道縣君儀賔職掌止應懸用花銀帶乃敢僣用鑲金帶又且張盖三簷黄傘例有明禁法所當究合行巡按江西御史將袁宗道行提到官照例革去冠帶戴平頭巾於本處儒學習禮三年滿日果能循禮守分奏請定奪再照儀章服色朝廷之大制所以辨等威而杜陵僣者也近來豪貴驕奢恣行越禮而各省宗藩儀賔放縱尤甚恐不止一袁宗道為然朝廷累有禁令相應申明合併行都察院轉行各省有王府去處各該巡按監察御史出給告示嚴行禁革本部仍照會各布政司轉行各輔導官啓王知㑹一體戒諭以防其漸庶法制明而豪貴有所儆矣等因奉聖㫖是袁宗道着巡按御史提問革去冠帶戴平頭巾習禮欽此禁約王府人員設騙嘉靖十一年九月内禮部題訪得各王府差來内使儀賔官校人等俱是積年光棍熟知􅫬騙闗節一蒙王府差遣乞恩等項即便設計誆受金帛數多任意光銷使用或有收置土産徃徃買賣填實表文箱扛分外需索人夫接運以致累損驛傳及至到京先投積年窩户窺探進止然後報名朝見或又私自潜徃京師動經年月往往用計打㸃营求各王府不知本部合行事宜自有公道一應公務自有事例期限非吏書人等所能預力題奉欽依通行各處撫按衙門轉行各王府長史司啓王知㑹今後但遇有公事奏理不得聴信差來人役多賫金帛指稱來京使用打㸃亦不許本役私帶銀兩貨物其批文務要定限月日逺近銷到京之日徑報入㑹同館安歇事完即囬但有潜住日久并在京各色人役容令安歇通同作弊者許厰衛緝事衙門及五城兵馬訪挐俱各指實𠫭送法司問以􅫬騙打㸃罪名仍行都察院出榜禁約慶成子女查處𢎞治四年巡撫山西都御史楊澄等以晉府慶成王子女九十四人恐其中有收養異姓之弊且為鎮國將軍奇等増年冐支禄米乞下禮部議處并乞限各郡王以下妾媵之數禮部查覆勘奏謂王子女俱王妃夫人并宫人室女所生别無違碍其冐支禄米法宜追徵還官上曰王子女既無違碍其置勿論冐支禄米不必追徵准作以後年分該支之數法司原奏有不許濫收子女事例仍行各王府知㑹自郡王以下妾媵多少之數再會官定議以聞禮部覆會議覆奏謂郡王自正妃外妾媵不得過四人各將軍不得過三人尉不過二人從之着著為令親王之國管運𢎞治八年吏科給事胡易奏徃者親王之國王府官屬及軍校分為四運先後啓行經過府縣恣意需索多者費至二三百金至於驛遞衙門應付之外亦皆餽遺六七十兩又多買私鹽渡江假重親王令有司領賣不惟民受艱苦抑為親王令徳之累今益王之國乞遣御史二員管運敢有踵襲前弊者執奏區處禮部覆奏上命御史不必遣就委䕶送太監及本府長史承奉嚴加禁治不許仍前作弊約束宗室嫠女𢎞治九年鎮守陜西太監劉瑯奏秦府㑹寧縣君自儀賔胥欽死後為姦民楊鼎誘之出府往來鳳翔地方居住今已送還本府然有玷宗室乞賜各王府凡郡主縣君有孀居者除年老有子外但係年㓜無出者冝令聚處一府撥老成内使并年長宫人守視不許擅自出入致有他虞禮部覆奏宜如所請若有他虞罪坐守視之人仍行彼處軍衛有司一體防範從之儀賔進表違例𢎞治十六年遼王寵涭奏各王府儀賔進表多私有瀆奏請於原批内量其水陸程限執囬本府查照有違限一月之上者許長史司啓王㕘提問罪其應奏者不許假托郡縣等主名因宜以各郡王并將軍中尉其奏例除係机密重情與王親干渉外其餘並令長史司具啓親王𠫭詳可否不當具奏者即寢不行仍諭各王府長史司一體遵守禮部覆奏從之收買子女奏聞𢎞治十一年十二月徽王見沛秦府中收買子女欲照逺年事例不必奏聞煩凟禮部覆奏王府選用多人例須奏聞是朝廷定制請降勅諭王命不必降勅惟移文長史司啓王知之先是有㫖命秦府鎮國將軍誠澮襲封郃陽王誠澮未及受冊而卒禮部以祭𦵏禮儀為請上命照郡王事例行頒宗室定式之始嘉靖七年禮部言王府事例成憲具存而亡頼奸人乃有假請托以紿物者使宗室有越分妄求之愆有無辜妄費之怨所求遂則利歸羣小不遂則怨歸公朝請將正徳四年本部題准累朝政令及改元以來事干宗室擬議奏行可為定例者併查附録刻成一書頒行天下王府知會凡有襲爵請封請名夫人儀賔故絶王爵乞封妾媵等欲具奏乞恩者長史教授查例而行春秋兩季遣官累奏不合例者即為諫阻仍前將碍例事情奏擾則坐長史教授撥置之人其差人誆帶財物者俱聽緝獲送囬照例發遣内府各監局應造冊封冠服儀物如期亟辦毋令遲悮為奸人藉口詔如議行懲創越訴之由嘉靖二十四年鄭王厚烷言各宗室赴京事實非得已皆由親王多方規利沮泥不行故有十嵗未名終身未嫁娶者棄徳不顧惟利是圖宗子之家益盛庶子之家愈窮且宗室犯罪祖宗定制縱有大過亦不加刑至於各府有箠楚慘酷者請先勅各一府體遵守無得妄為及宗室有犯不必𠫭究輔導禁戒下人就將所統親王或郡王量罰䘵米以示懲創下禮部議其如奏上曰宗室越闗赴愬禁例已詳比以立法太重又應有情外得已每從寛處乃往玩法不悛自今如此者巡按御史勒限勘奏干碍親郡王朝廷一體究治禮部將各行勘來報者查催限三月中具報仍通行各王府知之禁革二議嘉靖二十四年部覆科道條陳宗藩各府親王凡遇宗人其啓封婚等事如無違碍依期轉奏及禁奏事人役指稱闗節久住京師一革吏弊各王府奏請名封多有原詞差悮查對玉牒不同以致查駁文移徃返動經旬月事非盡由本部宜勅令查對明白如違聽本部㕘究則吏盡不得容隠而求索之弊可清矣嚴懲越闗撥置人役嘉靖二十八年周瀋二府及靖江王府諸宗室將軍同銑等越闗赴京十餘輩皆得重譴以去而來者不止禮科都給事中楊思中等言此實無藉小人慫慂其中事成則自為利觸禁伏法則不與其憂詿悮宗室為罪不細自今宜窮治以警將來下禮部亦言國家之待宗室名封婚禄給予如制優厚之若此有寃欲言則令親郡王轉奏輔導官不得阻抑體念之若此而擅離封域則有革爵髙墻之例所以禁制之如此今屢創不悛恬不畏法由左右不得人而羣小漏網者衆也請申飭王府各撫按諸司凡宗室奏訴事情啓王轉聞或遏抑不行者得言撫按為之代奏有越闗奏擾者皆𠫭治如法其撥置與俱來者所司逮捕以重論所過有司驛逓嚴加稽察不得容隠詔悉如議酌行懲越闗法嘉靖三十二年晉府方山王府奉國將軍表襯以越闗革為庶人禮部議宗室来京無問事情輕重俱發髙墻奏詞立案為法未免過嚴故不能盡法若酌量行勘具奏論治行法漸至過寛而越闗日衆計其驛遞需索所得倍於嵗䘵及勘又從末减是以無復畏憚請自今越闗者先革為庶人然後行勘情有可原則為請復仍查所需索革䘵示懲如無迫切事情不啓各王不告有司輒聴撥置而來者盡法如例報可停越闗路給嘉靖四十三年以宗室越闗者多詔禮部榜示各驛逓今後凡遇宗室往來不得擅給口糧夫馬仍查本身之外如有私帶姦徒聴所在官便宜收捕其各宗應發閒宅禁住如未請名仍行該府嚴查真偽議處故事宗室赴京者得縣次續食送宅者亦日給口粮既而貧宗陰利其資越闗日衆姦民無頼者率許充未名王子甘投閒宅希冐口粮至是懐仁王府充鮒及其所擕偽宗三哥子事發故有是命禁約宗室奏請設騙嘉靖二十五年九月内禮部題該給事中李綸等奏稱朝廷親親王府為重惇叙九族聖王所先側聞各府宗室凡遇請名請封該府辦事人役即假以見部使用為由􅫬騙財物其請求之既得則以為打㸃之已驗其請之不遂也則以為財力之未敷致使朝廷親親之典反為奸猾射利之資雖經節有禁約然而效尤不止伏乞勅下緝事衙門凡有王府人役挾帶財物潜住京師者即係指稱打㸃之徒當時訪挐以彰國法又聞各處宗室節因生育蕃滋䘵粮時或拖欠故間有貧乏不能自給者而請名請封以至子女之婚配該府長史司官又或厚索謝禮方肯報結又親王之府多有撥置生事之人遇有宗室代奏事情亦必假以親王之意下索常禮稍不如意百計留難以致子女之配婚失時宗室之困抑無訴此非所以親九族而示萬民乞要禁革留難等因本部查得嘉靖二十四年節該給事中等官查秉彛等具奏該本部覆議題奉聖㫖准議欽此俱經通行禁約去後今該前因相應申明覆奉欽依通行各該巡按御史行令各該長史教授啓王知會今後各宗室具啓封婚等事情各置立簿籍稽查如無違碍即與依期奏請毋令使事歸下人致將具啓事情任意行止躭延嵗月不與轉奏亦不得聴信羣小撥置將内外之事一槩混行奏擾如有仍前故意留難不遵舊例者許被害宗室差人徑赴該省撫按衙門告理將撥置人役指實具奏以慿查㕘治罪及行五城將各府奏事已完人役嚴行禁革不許久住京師地方歇家毋得容隠如違本部體訪得出從重㕘究治罪仍聴緝事衙門指實一併訪挐如此庶法例明而國體不致虚冐矣嚴懲宗室奏訴撥置嘉靖二十九年六月内禮部題該給事中楊思中題為申嚴禁例杜驀越以保安宗室事竊惟國家親親之制恩典既渥防範亦密故宗室不得擅離封域一切應奏事宜皆啓親郡王轉奏其有私自驀越來京者輕則降革䘵爵重則發送髙墻而輔導守門及沿途經過人員皆治罪焉以此為防無非欲其全尊大之體享安靜之褔也奈何法雖嚴而犯者益衆即今數月之間來者已十餘次自此以往將不可勝計矣豈其盡有隠欝而不得伸者即宗室派衍天潢為國懿親使之有隠欝而不伸者非情也若聽其奔走徃來溷䙝於道途庸衆之間而損威傷重者非禮也查得嘉靖二十五年該禮部題奉欽依議得宗室奏訴事宜如親郡王阻抑不與轉奏許差人具告撫按衙門議處如撫按推避差人赴京陳奏盖亦慮其刁難抑掯之弊而委曲立法宜乎無不伸之情矣乃今不得遵守皆親赴闕門雖觸冒禁例而不悔是豈無故哉臣等訪得無籍生事之徒投充跟用假此以遂其騙詐之私在府則為之教唆起㓕在途則為之伴送指引在京則為之探聴窺視事成則自以為功有要其厚賄不成則亦索其盤費顧募之資宗室生長富貴鮮經世故墮於術而不知則越闗踰境罔自愛惜者有由然矣幸蒙皇上矜念本支特加曲宥所奏之事亦多允行不然則情既不伸且䧟於罪非所以保安於宗室萬全之地也查得王府撥置事例犯者問發邉衛充軍若跟隨赴京之人誘引王使實與撥置同今止㕘論其驀越及輔導等項人員之罪而不及其跟隨引誘之人於法似有未盡有未盡之法則有未懲之姦宜來者之未已也伏乞勅下禮部再申前議等因抄呈到部查得正徳三年四月内該寧化王府革爵庶人鍾鈉第六子奇浚私自來京奏討冠帶等因本部查例覆題奉武宗皇帝聖㫖奇浚越訴來京便差的當人送囬寫書與晉王嚴加管束所奏事情照例不行其設謀撥置同來之人就着巡按御史用心追究務要得獲奏來處治教授守門巡捕等項人役本都當查究且饒這遭今後將軍中尉庶人有私逃來京的定發鳳陽髙墻内居住恁還通行文書與各府長史知道欽此又查得嘉靖十一等年節該本部議得郡王将軍中尉等俱以宗室懿親不遵禮法徃徃越闗赴京陳奏覆奉欽依移咨都察院通行各該有王府地方刋刻板榜禁諭各該宗室但有應奏事情照例啓王轉奏毋得違訓玩法擅離封域自取卑辱若不行悔改仍蹈故轍者聴本部㕘奏情輕者革去爵秩情重者送發髙墻奏詞徑自查㕘立案不行欽遵禁約去後今該前因為照我國家之於宗室名封婚䘵請給有定期授予有定制所以優厚之者既如此慮其情有不能通寃有不能白申親郡王但有虧即與分理轉奏及不許輔導等官抑勒所以體念之者又如此至擅離封域重則發處髙墻輕亦革去爵秩所以禁制之者又如此為宗室者寧無感恩守訓知耻畏罪之心哉然而違例越奏前後不已只今數月之間周府輔國将軍同銑等瀋府奉國将軍𦙍楧等靖江王府奉國中尉約耵等來者九十餘輩㕘治未畢而周府鎮國中尉睦庶長男山隂王府輔國将軍成鍬庶長男等又已越闗而至此其故何也臣等再三尋訪委由無藉之徒投充跟用撥置宗室紿以赴京親奏則事皆可得宗室一時誤聴帶領同來偶遂所圖彼則指為己功邀求賞勞或罹於罪彼則閧然而散不與其憂及或本部㕘奉欽依差官奉囬該府彼則又跟隨撥置横索經過驛逓衙門供億打發肆無忌憚計其所得宗室不過十之二三而彼無不滿其欲者大抵宗室出城有利有害惟此輩有利無害故無藉之徒一日不去則宗室越奏之擾終不可得絶該科所論可謂切而中矣合将前項節年題奉明㫖事例并加申明通行各王府及撫按衙門知會如遇宗室一應奏訴事情照例啓王轉奏或被故意刁難阻滯不行許家人赴撫按衙門從實具告為其代奏議處如有不獲准理方許令人赴京抱奏各該衙門查處情詞果有寃枉應辯䘵價應給即與施行若未經啓告徑自驀越闗奏擾除照例㕘究奏詞一槩立案不行外仍容本部及緝事衙門并巡視五城御史密切體訪撥置同來之人并窩藏之家挐送法司照依律例從重問遣及行各該撫按轉行各有司驛逓今後遇該宗室伴送囬還但有批闗無名之人跟隨同行不拘人數多寡即便挐送撫按衙門硯審來歴問發不許容縱則宗室不惑於誑誘不䧟於罪愆朝廷優厚體念之恩既全而禁制之法亦行矣再照前項無藉之徒不獨宗室出城一被其撥置其於各府例不該行事亦用前術􅫬挾錢物假充官旗名色賫本到京交通積年光棍歇家任意費用及至囬府藉口打㸃揑數花銷財既侵匿事復無證私槖充盈而各宗室之財力則隂受耗蠧内外百司之名節則咸被玷累其為可惡視前所云尤有甚者本部及緝事巡視衙門一體嚴訪挐問仍行各布政司轉行長史司啓王各自查訪痛行黜逐奉聖㫖是各宗室奏訴事情着照例啓王轉奏如有阻抑許令赴撫按衙門告理代奏今後越闗來京將撥置同來之人訪挐治罪其各府例不該行事務潜住打㸃人役着緝事衙門嚴訪挐問重治欽此懲訐奏奸弊嘉靖四十四年詔鴻臚寺自後各王府以訐愬等項私事至者先将賫奏人役簿録在官俟命下之日查有奸弊即拘送法司問奏其以進表公事至者事畢即勒限出京不許潜留探伺時襄垣王成鍨薨以冐封事當革襲其曽孫充煌狃嚴氏時事欲䑃朧襲之其宗室中有鎮國中尉俊橇者有憾於充煌因訐奏故襄垣王府仕㙺昔以罪廢五十年餘成鍨以孽支夤縁得之今死其子孫當降還原爵如宗藩條例且訐充煌諸貪滛不法事䟽下都察院充煌自其祖父時黠奴數輩絡驛占京邸賄通禮部奸胥作弊以為常至是知俊橇疏行詐署襄垣諸宗室名保充煌𠫭俊橇及山陰王俊柵以宗藩條例查革冐封欵出俊柵所條議也䟽入報寢諸奴即復為一䟽上之禮科都給事中辛自修言襄垣分封山西蒲州去京師二千餘里茲二疏前後同詞而相距不數日且署名乖錯中多竄改疑必潜匿京師奸人所為請行山西巡按御史究并治其輔導官罪禮部覆如其議因有是令外戚備考外戚優典嫡長子食父䘵洪武十二年禮部尚書朱夢炎言祖訓録已定公主郡主縣主嵗賜䘵米之數其有適長子者今宜從其父之品秩食䘵而不任事如駙馬從一品郡主之夫從二品縣主之夫從三品其子當父之品䘵從之妃父䘮祭奠正統十三年襄王瞻墡妃父指揮僉事李玉卒欲遣官祭奠及郡王郡主各外戚家嵗時俱缺弔賀禮部尚書胡濙請如韓王徃南京向山祭掃祖墳例允其所請上覽奏責濙以祖塋比外戚尊卑親踈莫辨仍命稽考洪武永樂間舊例以聞為后父立廟𢎞治三年禮部覆奏户部會多官議孝穆皇太后宗親在昔兵燹之餘人民奔竄嵗月悠逺徃事已無踪跡求之恐愈久愈鑿况前日已誤信李文貴等濫授官爵今日豈容再悞請如太祖髙皇帝即宿州為孝慈髙皇后父徐王立廟事例為孝穆皇太后父母定擬封號立祠於廣西附郭地方春秋遣布政司官致祭即以沒入李文貴等賀縣田八十畝為奉祭之資似為得宜上曰孝穆皇太后早棄朕躬朕每念及此戚然如割初謂宗親尚可求訪故寧受百欺有所不惜今卿等既為嵗久無從物色請加封立廟嵗時致祭以仰慰聖母在天之靈是或一道矧皇祖亦有故事朕心雖不忍又奚能違其悉准所議外戚限制王府不許乞外戚官帶正統十三年沁源王佶㷆奏長子㓜琦已擇潞州民女鮑氏生三嵗父友才卒係伯父友榮撫養乞賜冠帶上不允命禮部通行各王府禁約今後為妃及夫人伯叔兄弟求職違者罪之著為令禮部志稿卷八十
