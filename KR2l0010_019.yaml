日謁廟畢就詣父皇及東宫前謝次日百官稱賀畢詣王府行叩頭禮成化二十三年更定前期各執事官于奉天門前東廡習儀三日鴻臚寺設三冠所於奉天門前東廡左順門之北設節案香案各一于廡內之北正中設冠席于東階之上西向設醴席于西階之上東向光祿寺設司尊所一于東階之下稍南設盥洗所一于司尊所之南內侍設帷幄于香案之東冠席之後稍北俱西向帷中設坐椅几案各一别設案于東階之南司尊所之北具翼善冠及辨九旒冕皆以盤盛紅袱覆之置于案具袍服皮辨服衮服圭帶舄等物皆以箱盛置于幄中案上教坊司設樂于南是日早皇上預告奉先殿畢具皮辨服御華蓋殿鴻臚寺奏請升殿傳制遣官持節行禮文武百官各具朝服侍班如常儀至期內侍導王先于帷幄中坐候持節將至禮部官啓王迎節樂作禮部官同鴻臚寺卿導王出階下節至持節官捧節入置于北正中案上樂止王隨節入持節官立于節案之東賔及宣敕戒宣祝等官序立于東南盥洗所之次禮部官鴻臚寺卿導王詣香案前立樂作行四拜禮畢樂止禮部官啓王就冠席樂作禮部官同鴻臚寺卿導王詣冠席坐樂止內侍二人侍立于王左右鴻臚寺鳴贊贊行初加冠禮樂作引禮序班引賔詣盥洗所搢笏盥手訖樂止鳴贊二員稍南北向立賔升自東階稍西向樂作內侍揭蓋袱以盤捧翼善冠升賔降一等受之樂止賔右手執冠後左手執冠前詣王席前稍東面立贊宣祝宣祝官祝曰祝詞與洪武年同祝訖樂作賔跪進冠訖興復位樂止禮部官啓易服王入帷幄易新袍服出禮部官啓復坐鳴贊贊行再加冠禮樂作內侍揭蓋袱以盤捧皮辨升賔降二等受之樂止賔以右手執辨後左手執辨前如前儀贊宣祝宣一祝官祝曰詞與前同祝訖樂作內侍釋翼善冠賔跪進皮辨訖興復位樂止禮部官啓易服王入帷幄易皮辨服舄出禮部官啓復坐鳴贊贊行三加冠禮樂作內侍揭蓋袱以盤捧冕旒升賔降三等受之樂止進如前儀贊宣祝宣祝官祝曰詞與前同祝訖樂作內侍釋皮辨賔跪進冕旒訖興復位樂止禮部官啓易服王入帷幄易裘服出禮部官啓復坐鳴贊贊行釂禮禮部官啓王詣醴席樂作禮部官同鴻臚寺卿引王降自東階由西階升醴席東向坐樂止光祿寺官舉醴桌置于前樂作引禮序班引賔詣盥洗所搢笏盥手訖取爵詣司尊所酌醴由西階升詣席前立樂止贊宣祝宣祝官祝曰詞與前同祝訖賔跪進爵鳴贊贊王搢圭受爵置于案教坊司啓樂奏喜千春之曲次啓進酒王舉爵飲訖奠爵于案賔興樂止光祿寺官進饌大樂作饌至案樂止饌訖贊出圭徹桌賔復位鳴贊贊受敕戒禮部官啓王詣受敕戒位禮部官鴻臚寺卿引王降自西階繇東階詣拜位立樂作引禮序班引宣敕戒官至庭中西向立樂止稱有制鳴贊贊王跪宣敕戒詞與前同樂作王俯伏興四拜興樂止鴻臚寺卿啓禮畢持節官捧節出王送出門外節行至階下內侍引王還帷中釋衮冕具翼善冠服回宫持節及賔贊宣敕戒等官復命是日王具冕服謁祭奉先殿用樂行禮如常儀仍具冕服謁見皇太后畢謁見皇上皇后俱行五拜三叩頭禮次謁皇妃東宫及妃各行四拜禮皆用樂次日早皇上常服升金臺百官常服稱賀致詞云皇子某王冠禮已成禮當稱賀行五拜三叩頭禮畢是日朝罷司禮監請王具常服詣奉天門前東廡坐百官常服行四拜禮嘉靖二十八年裕王景王冠禮萬􅍓五年潞王冠禮儀俱同但賔自致祝不用宣祝官百官稱賀俱吉服品官冠禮洪武三年定前期擇日主者告于家廟無廟則告于祠堂北面再拜告云某之子某年漸長成將以某月某日加冠于其首謹以告乃筮賔主者北面再拜告云卜以某甲子吉冠某速某賔加冠庶幾臨之謹告前二日主者戒賔及贊冠者主者至賔大門外掌次者引之次儐者受主者之命入告賔曰某之子某將加冠願吾子教之賔曰某不敏恐不能供事以辱吾子敢辭主者曰某猶願吾子教之賔曰吾子重有命某敢不從主者再拜賔答拜主者還賔拜送主者戒贊冠者亦如之亦通使子弟戒之前一日掌事者設次于大門外之右南向其日夙興掌事者設洗于堂阼階東南東西當東霤六品以下當東霤南北以當深罍水在洗東加勺羃篚在洗西南肆實巾一于篚加羃席于東房內西牖下無房者張帷為之陳服于席東領北上莞筵四加藻席四在南側尊甒醴在服北加勺羃設坫四品以下設篚無坫在尊北饌陳于坫北設洗于東房迎北罍水在洗西篚在洗西北肆實以巾質明賔贊至于主者大門外掌次者引之次賔贊公服諸行事者各服其服無公服者服常服執尊罍篚者皆就位其冠各一箱各一人執之侍於西階之東東面北上設主者之席于阼階上西南賔席于西階東面冠者席于主者東北西面主者公服立于阼階下當東序西面諸親公服非公服者常服立于罍洗東南西面北上尊者在别室儐者公服立于門內道東北面將冠者雙童髻空頂幘雙玉導金寶飾采桍褶錦紳烏皮履六品以下導不以玉立于房內南面主者贊冠者公服立于房內户東西面賔及贊冠出次立于門西贊冠者少退俱東面北上儐者進于主者之左北面受命出立門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主者迎賔于大門外之東西面再拜賔答拜凡主賔拜揖皆贊禮者相導主者揖贊冠者贊冠者報揖主者又揖賔賔報揖主者入賔及贊冠者次入及內門行至階主者立于階東西面賔贊立于階西東面主者請升賔曰某備將事敢辭主者固請賔固辭主者終請賔三辭主者升自阼階立于席東西向賔升自西階立于席西東向贊冠者及庭盥于洗升自西階入于東房立于主者贊冠者之南俱西面主者贊冠者引將冠者立于房外之西南面賔之贊冠者取纚櫛簮跪奠于冠者筵南端席北稍東西面立賔揖將冠者賔主俱即坐席將冠者進升席西南坐賔之贊冠者進筵前東面跪脫雙童髻置于箱櫛畢設纚興復位立賔主俱興賔降坐罍洗盥手訖詣西階主者立于席後西面賔立于西階上東面執緇布冠者升授賔賔降一等受之右執項左執前進將冠者筵前東向立祝曰令月吉日始加元服棄爾幼志慎爾成德夀考維祺介爾景福乃跪冠興復西階上席復東面立賔之贊冠者進筵前東面跪結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著青衣素裳之服出房户西南面立賔主俱興賔揖冠者冠者進升席西向坐賔之贊冠者跪脫緇布冠置于箱櫛畢設纚興復位執進賢冠者升賔降二等受之右執項左執前進冠者筵前東向立祝曰吉月令辰乃申爾服恭爾威儀淑慎爾德眉夀萬年永受遐福乃跪冠興復位賔之贊冠者跪設簮結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著絳紗服出自房户西南面立賔主俱興賔揖冠者冠者進升席西向坐賔之贊冠者跪脫進賢冠置于箱櫛畢設纚興復位執爵辨者升賔降三等受之右執項左執前進冠者筵前東向立祝曰以歲之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶乃跪冠興復位賔之贊冠者跪設簮結纓興復位冠者興賔揖冠者適房賔主俱坐主者贊冠者徹纚櫛簪箱及筵入于房又設筵于室户西南向冠者著爵辨之服出房户西南面立賔主俱興主者贊冠者盥手洗觶于房酌醴出房南面立賔揖冠者冠者就筵西南面立賔進受醴進冠者筵前北面立祝曰甘醴維厚嘉薦芬芳拜受祭之以定爾祥承天之休夀考不忘冠者筵西拜受觶賔復西階上東西答拜執饌者奉饌薦于冠者筵前冠者左執觶右取脯祭于籩豆之間贊冠者取胏一以授冠者冠者奠觶于薦西以祭冠者坐取觶祭醴奠觶再拜執觶興賔答拜賔主俱坐冠者升筵跪奠觶于薦東興進北面跪取脯降自西階入見母進奠脯于席前退再拜以出冠者母不在則使人受脯于西階下初冠者入見母賔主俱興賔降當西序東面立主者降當東序西面立冠者既見母出立于西階東南面賔少進字之曰禮儀既備令月吉日昭告爾字孚字孔嘉髦士攸宜冝之于嘏永受保之曰伯某甫冠者曰某雖不敏夙夜祗承賔出主者送于內門外主者西向請賔曰吾子辱執事詣禮從者賔曰某得將事敢辭主者固請賔曰某既不得命敢不從賔就次主者入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西面拜賔之贊冠者賔之贊冠者答拜訖見諸尊于别室賔主既釋服改席訖賔興衆賔俱出次立于門西東面主者出門東西面主者揖賔賔報揖主者先入賔及衆賔從之至階賔立于西階上贊冠者在北少退俱東面主者立于東階上西面衆賔降立于西階下東面掌事者以幣篚升受主者主者授幣篚于賔賔受之又以幣篚授贊冠者贊冠者受之俱復位主者還阼階上北面拜送賔贊降自西階主者送賔于大門外之東西面再拜賔出主者入孤子則諸父諸兄戒賔冠之日主者紒而迎賔拜揖讓如冠主冠于阼階之下禮賔拜送皆如上儀明日見廟冠者朝服質明贊禮者引入廟南門中庭道西北向贊再拜訖引出士庶冠禮洪武三年定凡男子年十五至二十皆可冠將冠筮日筮賔于祠堂戒賔俱同品官儀是日夙興張帷為房于廳事之東賔主人執事者皆盛服設盥于阼階下東南陳服于房中西牖下東向北上席二在南酒壺在服北次盞注置于桌幞頭帽巾各盛以盤蒙以巾帕執事者三人捧之立于堂下西階之西南向東上主人立于阼階下子弟親戚立于盥東儐者立于門外以俟賔將冠者雙紒袍勒帛素履待于房中賔至主人出迎揖而入坐定將冠者出于房報事者請行事賔之贊者取櫛總篦幧頭置于席南端賔揖將冠者將冠者即席西向坐賔之贊者為櫛合紒施總加幧頭賔主皆降主人立于阼階下賔盥訖主人揖讓升自西階皆復位執事者以巾進賔降西階一等受之詣冠者席前東向祝云云跪為著巾興復位冠者興賔揖冠者適房易服服深衣大帶出房即冠席賔盥訖降二等受帽進祝贊者徹巾賔跪冠興復位冠者興賔揖冠者入房易服服襴衫腰帶出房即冠席賔盥訖降三等受幞頭進祝三祝皆同品官詞贊者徹帽加幞頭復位冠者興賔揖冠者適房易公服出房執事者徹冠席入帷中更設醴席于西階南向贊者酌醴出房立于冠者之南賔揖冠者即醴席西向立賔受醴詣席前北面祝同品官詞冠者于席西拜受賔答拜執事者薦饌冠者即席坐飲食訖再拜賔答拜冠者離席立于西階之東南向賔字同品官詞冠者拜賔答拜冠者拜父母父母為之起拜諸父之尊者遂出見鄉先生及父之執友先生執友皆答拜訖賔退主人請禮賔賔辭固請許諾乃入設酒饌延賔及儐贊者賔退主人酬賔贊侑以幣乃拜謝禮畢主人以冠者見祠堂告曰某之子某冠畢敢見冠者北面焚香再拜出禮部志稿卷十九
