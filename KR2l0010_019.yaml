body:
  text: 禮部志稿卷十九明俞汝楫編儀制司職掌冠禮按冠禮天子止一加用衮冕太尉設纚太師受冕太子皇孫年十二或十五始冠天子自為主擇三公太常為賔贊凡三品冠一祝醴成化間始定祝詞醮詞敕戒詞其諸王冠祝醮詞皆洪武間定下及官民莫不有禮備列於後皇帝冠禮洪武三年定前期太史院奉制筮日工部製冕服翰林院撰祝文祝辭或用古辭或臨時修撰禮部備儀注中書省承制命某官攝太師某官攝太尉既筮日遣某官奏告天地宗廟行一獻禮訖告示文武百官於皇城守宿侵晨具朝服行禮前一日內使監令陳御冠席於奉天殿正中設冕服案於御冠席之南香案又於冕服案南尚寶卿設寶案於香案之南侍儀司設太師太尉起居位於文樓之南西向設文官起居位於太師太尉起居位之後設武官起居位於武樓之南設太師太尉拜位於丹墀內道稍西北向東上設太師太尉侍立位於殿上御席之西東向設盥洗位於丹陛西陛之下東向內贊二人位於殿上南楹之左右東西相向設文官拜位於丹墀內道之東每等異位重行北面西上設武官拜位於丹墀內道之西每等異位重行北面東上設使客位於文官拜位之東北面西上設殿前班諸執事起居位於武官起居位之北東向設侍從班諸執事起居位於文官起居位之北西向設宿衛鎮撫二人位於東西陛下東西相向護衛百户二十四人位於宿衛鎮撫之南稍後東西相向典牧所官二人位於乘馬之前東西相向知班二人位於文武官拜位之北東西相向通贊典禮二人位於知班之北東西相向通贊在西贊禮在東引太師太尉二人位於太師之北西立東向引文武班四人位於文武官拜位之北稍後東西相向引殿前班二人位於引武班之南引使者二人位於引文班之南設殿前班指揮司官三員侍立位於丹陛上之西東向光祿寺官三員位於丹陛上之東西向拱衛司官位於殿門之左右東西相向文官侍從班起居注給事中殿中侍御史尚寶卿位於殿上之東西向武官侍從班懸刀指揮位於殿上之西東向護位千戶八人位於殿東西門之左右東西相向典儀二人位於丹陛上之南東西相向鳴鞭四人位於丹陛上北向將軍二人位於殿上簾前之左右將軍六人位於殿門之左右將軍四人位於丹陛上之四隅將軍六人位於奉天門之左右東西相向是日侵晨金吾衛陳設甲士於午門外之東西陳五輅於丹墀之南北向典牧所陳仗馬於文武樓之南東西相向陳虎豹於奉天門外東西相向協律郎陳樂於丹墀文武官之南鼓初嚴催班舍人催文武百官具朝服鼓次嚴引班引文武各官依品從齊班於午門外以北為上東西相向通班贊禮知班典儀內贊宿衛鎮撫鳴鞭殿內將軍殿外將軍俱入就位引班引殿前班指揮光祿卿各依品從序立於起居位東西相向諸侍衛官俱各服其器服及尚寶卿侍從官入詣謹身殿候迎鼓三嚴引班引文武官以序入就起居位引使客立於文班之後侍儀版奏外辦御用監令奏請皇帝服空頂幘雙童髻雙玉導絳紗𫀆御輿出侍御導從警蹕如常儀皇帝將出仗動和聲郎作樂太常博士引導至奉天殿即御位樂止捲簾鳴鞭雞唱報時訖拱御司官繇殿西門出降西階引班引入起居位通班唱各供事殿前班侍從班及諸執事各就本位引禮引太師太尉先入就拜位引班引文武官俱入就丹墀拜位知班唱班齊典儀唱拜贊禮唱鞠躬樂作四拜興平身樂止引禮引太師先詣盥洗位西向立引禮唱搢笏盥手太師搢笏盥手引禮唱帨手司巾以巾進太師帨手訖引禮唱出笏太師出笏引禮引太師繇西陛升引禮退就本位太師至殿西門內贊接引至御席西東向立引禮復引太尉詣盥洗位西向立引禮贊搢笏盥手太尉搢笏盥手引禮贊帨手司巾者以巾進太尉帨手引禮贊出笏太尉出笏引禮引太尉繇西陛升引禮退復位太尉至殿西門內贊接引入立於太師之南侍儀跪奏請加元服退復位太尉進就皇帝席前少右跪搢笏脫空頂幘以授內使內使跪受幘興置於櫛箱櫛畢設纚出笏興退立於西太師進至御前北向立內使監令就案取冕立於太師之左太師祝曰令月吉日始加元服夀考維祺以介景福內使監令捧冕跪授太師太師搢笏跪受冕加冠加簮纓訖出笏興退立於西內使監令徹櫛纚箱御用監令跪奏請皇帝著衮服皇帝興著衮服訖侍儀跪奏請就御座內贊贊進醴樂作太師進就御座前北面立光祿卿奉酒進授太師太師搢笏受酒至御前北面祝曰甘醴維厚嘉薦令芳承天之休夀考不忘祝訖跪授內使內使跪受酒捧進皇帝皇帝受酒祭少許啐酒訖以虛盞授內使樂止內使受盞降授太師太師受盞興以授光祿卿光祿卿受盞退太師出笏退復位內贊引太師太尉出殿西門樂作降自西階引禮接引就丹墀拜位立定樂止引禮退復位典儀唱拜贊禮唱鞠躬四拜興平身樂止贊禮唱搢笏鞠躬三舞蹈贊跪唱山呼百官拱手加額曰萬歲唱山呼曰萬歲唱再山呼曰萬萬歲典儀唱出笏俯伏興樂作四拜興平身樂止典儀唱禮畢侍儀奏禮畢皇帝興樂作警蹕侍從導引入宫樂止引禮引太師太尉及文武百官以次出皇帝改服通天冠絳紗袍入宫拜謁太后如正旦儀擇日謁太廟其儀與時祭同見廟之明日百官具公服稱賀畢賜宴於謹身殿並如正旦冬至朝會儀皇太子冠禮洪武元年定前期太史監承制筮日工部製衮冕逺遊冠折土巾服翰林院撰祝文祝辭禮部備儀注中書省承制命某官為賔某官為贊既筮日遣官奏告天地宗廟禮部告示文武百官於皇城守宿至期之前一日內使監令陳御座香案於奉天殿中侍儀司設皇太子次於殿之東房賔贊次於午門外皇太子拜位於丹陛上正中賔贊受制位於皇太子拜位之西北東向承制官位於御座之東西向宣制官位於皇太子位之東北西向賔贊拜位於內道之東北面西上餘陳設如朝會儀至日清晨執事官設罍洗於東階東南罍在洗東筐在洗西內使監官設皇太子冠席於殿上東南西向醴席於西階上南向張帷幄於東序內設褥席於帷中又張帷於序外御用監陳服於帷內東領北上衮服九章逺遊冠絳紗袍折上巾絳紗袍緇纚座簮二物同箱在服南櫛實於箱又在南司尊實醴於側尊皆勺羃設醴於席之南設坫於尊東置二爵於坫進饌者實饌設於尊北諸執事者皆立於其所冕九旒逺遊冠十八梁折上巾冠冕各一箱盛執事者又執其物立於階之西東面北土鼓初嚴文武百官具朝服次嚴護衛等各就位東宫官導從皇太子至殿門贊禮同太常博士引詣奉天殿東房侍衛官入詣謹身殿奉迎三嚴文武百官入就位皇帝服通天冠絳紗袍御輿以出樂作升座樂止捲簾鳴鞭報曉訖賔贊就位樂作四拜樂止侍儀司跪承制降自東階詣賔前稍東西向稱有敕賔贊跪侍儀宣制曰皇太子冠命卿等行禮宣訖贊皆四拜文武侍從班俱就殿內位賔贊及應行禮官詣東階下位東宫官大常博士詣殿前東房引皇太子入就冠席樂作皇太子即席樂止賓贊詣罍洗樂作搢笏盥帨出笏樂止升自西階執事上捧折上巾進賔降一等受之右執項左執前進皇太子席前北面祝祝辭皆隨時撰述祝畢跪冠樂作興席南北面立贊冠者進席前跪正冠興立於賔後內使跪進服服訖樂止賔揖皇太子復坐賔贊降詣罍洗如前儀贊冠者進跪脫折上巾置於箱興以授內使內使跪受置於席執事者捧逺遊冠進賔降二等受之樂作進冠如前儀贊冠者進跪簮結紘內使進服樂止賔揖皇太子復坐詣罍洗脫冠俱如前儀執事者捧衮冕進賔降三等受之進冠亦如前儀畢太常博士引皇太子下降自東階樂作繇西陛陛即醴席南向坐樂止賔詣罍洗樂作盥帨升自西階樂止贊冠取爵詣司尊前酌醴授賔跪進爵於皇太子席前祝云云祝畢皇太子搢圭跪受爵樂作飲訖奠爵執圭進饌者捧饌設於皇太子席前皇太子搢圭食訖樂止執圭執事官徹爵與饌太常博士引皇太子降自西階殿東房易朝服詣丹墀拜位樂作東宫官各就拜位樂止賔贊詣皇太子位稍東西向賔少進字之辭曰奉勑字某太常博士啓皇太子再拜跪聽宣敕畢復再拜興進前跪奏曰臣不敏敢不祗奉奏畢復位侍立官並降殿復位在位官皆四拜禮畢皇帝興樂作還宫樂止內給事導皇太子入內朝見皇后如朝正旦儀百官以次出明日謁廟如時享禮陪祭官先赴廟庭皇太子服圭冕執圭太常博士前導繇南門入至拜位皇太子及陪祭官皆再拜興皇太子升殿詣神位前三上香復位及陪祭官皆再拜畢皇太子還宫明日百官具朝服詣奉天殿稱賀退易公服詣東宫稱賀賜宴成化十四年續定前期二日各執事官先于禮部習儀次日赴文華殿習儀前期一日遣官具特牲告廟行一獻禮錦衣衛設幕次于文華殿之東序鴻臚寺設節案于殿內之北正中設香案于節案之南設冠席於殿內之東南向設醴席于西上南向內使張帷幄于東序內設座椅几案裀褥于幄中又張帷于序外陳袍服皮辨服衮服圭帶舄等物各以箱盛置于帷中案上具翼善冠皮辨九旒冕各用盤盛以紅袱覆之置于東階之南案上光祿寺設盥洗所于東階冠案之南稍東設司尊所于醴席之西南司尊者實醴于側尊加勺羃設坫于尊東置二爵于坫進饌者實饌設于尊北諸執事者皆立于其所教坊司設樂是日早上具皮辨服御華蓋殿鴻臚寺奏請升殿傳制遣官文武百官各具朝服侍班如常儀制詞曰朕皇太子某冠命卿等持節行禮節將至禮部官詣東序啓皇太子迎節樂作禮部官導皇太子出迎于殿門外持節官捧節入置于案退立于節案之東樂止禮部等官導皇太子詣香案前樂作行四拜禮畢樂止持節官同賔贊并宣敕戒等官序立于東南盥洗之次禮部官啓皇太子就冠席樂作禮部等官導皇太子詣冠席內侍二人夾侍皇太子即席西南向坐樂止鴻臚寺鳴贊贊行初加冠禮樂作引禮序班引賔贊皆詣盥洗所賔贊皆搢笏以次盥手訖出笏樂止鳴贊二人稍南東西向立賔贊官升自東階稍西向立內侍揭蓋袱樂作以盤捧翼善冠升賔降階一等受之樂止賔右手執冠後左手執冠前進皇太子席前北面立祝曰吉月令辰乃加元服懋敬是承永介景福樂作賔跪進冠興復位贊者跪正冠興立于賔後樂止禮部官啓易服皇太子入帷幄易新袍服出禮部官啓復坐鳴贊贊行再加冠禮樂作內侍揭蓋袱以盤捧皮辨升賔降階二等受之樂止賔右手執皮辨後左手執皮辨前進如前儀祝曰冠禮申舉以成令德敬慎威儀維民之式樂作內侍釋翼善冠賔跪進皮辨興復位贊者跪正皮辨興立于賔後樂止禮部啓易服皇太子入帷幄易皮辨服舄出禮部啓復坐鳴贊贊行三加冠禮樂作內侍揭蓋袱以盤捧冕旒升賔降階三等受之樂止進如前儀祝曰章服咸加飭敬有虔永固皇圖于千萬年樂作內侍釋皮辨冠賔跪進冕旒興復位贊者跪簮結紘興立于賔後樂止禮部官啓易服皇太子入帷幄易衮服出禮部官啓復坐鳴贊贊行釂禮禮部官啓皇太子詣醴席樂作禮部等官引皇太子降自東階繇西階升即醴席南向坐樂止光祿寺官舉醴桌樂作引禮序班引賔贊詣盥洗所賔贊搢笏盥手訖出笏升西階贊者取爵詣司尊所酌醴授賔賔執爵詣席前立樂止祝曰旨酒孔馨嘉薦載芳受天之福萬世其昌畢賔跪進爵鳴贊贊皇太子搢圭受爵置于案教坊司啓樂奏喜千春之曲次啓進酒皇太子舉爵飲訖奠爵于案樂止光祿寺官進饌樂作饌至案樂止饌訖贊出圭徹桌賔贊復位鳴贊贊受敕戒禮部官啓請皇太子詣受敕戒位禮部等官引皇太子降自西階繇東階詣拜位樂作引禮序班引宣