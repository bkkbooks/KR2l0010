body:
  text: 禮部志稿卷五十八明俞汝楫編列傳郎署滕員滕員字尚默建之甌寧人幼以開敏聞於鄉年十一補郡庠弟子員未幾領鄉薦卒業太學聲譽焯焯日起同舍生咸心服之正統己未吏部考選居優等得廣之韶州府同知一時同選者咸謂君才與官宜無異言者之任值嵗歉公私無積貯守以下無藉手地員至傾囊得白金若干兩告糴鄰郡命里耆籍民之窘甚者朝夕給之全活數千人郡治舊為淮王府王遷國之饒得請復為郡其規制奢大非人臣所宜居又吏胥公退無所於處往往雜就民居員截長縮大削雕還朴復為郡治如常式又度地為吏舍限其出入絶吏民交搆之弊自昔郡吏惟取充數鮮有通文墨者動輒假手他人員痛革之凡上下文移具為成式以示吏俾其如式草創而為之潤色焉受其指畫後為通習所郡地界江閩湖三藩之衝主户少而客户多少拂其意輒相扇弗靖而翁源乳源二邑尤甚員躬巡行省揭榜開諭許其占籍遂與編户無異凡郡之政員方一一興革之以丁內艱解任吏民不忍員去至有垂涕者比聞員服闋當之京耆老數百人詣闕乞再任之朝議已除代者不允員適至遂有祠部之除清白之操賢能之聲著聞逺近在郎署踰三年為正統己巳扈駕北狩歿于王事明年蒙恩褒恤進其階為奉政大夫孫洪孫洪字伯大山東昌邑縣人景泰五年進士授兵部主事遷郎中丁憂服闋改禮部郎中成化間歷升河南右參政左右布政使遷右副都御史巡撫大同以威寧海子之捷進左副都御史食正二品俸進右都御史巡撫河南後為周府儀賓劉宣所奏下獄尋命致仕洪有幹局為參政時以贊畫撫治流民有勞巡撫河南奏停王府造作蠲逋負浚滏河以興水利人頗稱之其為儀賓所奏亦王府怨之而致是云杜謙杜謙字益之直𨽻昌黎人景泰五年進士授工部主事管理吕梁洪三年考滿改禮部主事升員外郎中用尚書姚夔薦擢浙江右參政歷左右布政司召為順天府尹尋升工部侍郎成化二十三年為言者所劾因陳乞致仕許之後以詔書恩進階資善大夫卒賜祭葬如例謙少有孝行居浙江時人稱為重厚長者子源亦第進士官至青州知州髙敞髙敞字德廣直𨽻崑山縣人成化八年進士授禮部主事歷升員外郎郎中順天府丞以父憂服闋改應天府進府尹在禮部時數奉使於外嵗無寧居畿內飢嘗上疏請發內帑銀五萬兩賑濟所活甚衆及為府尹政頗尚平易然亦無大治績云于冕于冕字景瞻浙江錢塘縣人少保兵部尚書謙之子景泰元年以謙功廕授世襲副千户謙死冕亦從坐謫戍龍門屢上書訟其父寃憲宗登極謙寃昭雪並復冕官冕自陳不願武職改兵部員外郎纍升禮部郎中南京太僕寺少卿應天府府尹致仕卒於家賜祭葬如例冕雖不由科目然頗涉書史有幹局歷官能舉其職不愧其父云王沂王沂字希曾直𨽻武進縣人南京吏部尚書㒜之子成化十一年進士授禮部主事歷升員外郎郎中山東右參政湖廣右參政丁父憂服闋轉山東左布政使𢎞治十四年升右副都御史巡撫真定等府兼提督紫荆三關纍疏乞休不允卒于官年六十二訃聞賜祭葬給驛歸其喪沂嚴毅謹恪天性孝友在禮部時外國以獅子來貢希重賞又有貢刀劍數至三萬者沂言夷人貪詐無厭量損其賜直且定數注為例憲朝上賓凡山陵廟祧遷祔之議儀文草創多所考據及巡撫時賦役繁重力為裁省滹沱河水溢壞民田廬奏請築堤捍之功成賜綺幣奬勞自處儉約家雖富無貴侈態居官二十餘年終始一致人以為有父風云陳鎬陳鎬字宗之其先會稽人占籍南京欽天監成化丙午舉應天鄉試第一明年舉進士授禮部主事改南京吏部歷升員外郎中山東按察副使提督學校轉江西參政尋升湖廣右布政使平漢沔劇盜有功庚午進都察院右副都御史巡撫湖廣明年以病乞歸命未下而卒鎬明敏有吏幹董學時較閲精當得士心巡撫時漢沔之盜黨未平建議散其衆歸農衆賴以安鎬與弟欽同科進士而皆有才名欽亦為廣東提學副使蔡清蔡清字介夫泉州府晉江縣人福建鄉試第一成化甲辰進士授祠祭主事改稽勳尋署驗封員外郎以父憂歸服闋除主客轉南京文選郎中乞終養歸遂丁母憂服闋即其家拜江西按察司副使提調學校屢辭始就職旋復乞致仕去未幾擢祭酒命未至而卒清天資沉潛深探理學所養純粹內外一致在江西務端士習正文體嘗曰學宜養正性持正行聖賢言語熟復玩味則舊去新來日改月化天性孝友內外親族貧無衣食者及不能葬者皆收恤之家屢空勿計也體雖孱脆而好學不倦其學術德器為一時名儒蓋於模範甚稱惜享年不永莫究其用云王綸王綸浙江慈溪人成化甲辰進士初除工部都水司主事以內艱去改禮部儀制司歷員外郎郎中𢎞治庚申升廣東參政尋轉布政正德己巳由廣西布政升都察院右副都御史巡撫湖廣兼理軍務未幾遭外艱值郴永盜賊猖獗特詔奪情督軍閲三月賊平始許終制遂以疾卒與祭一壇綸以能醫遊公卿間公卿多喜之者而才能亦足集事故卒至臺省大官其氣岸簡伉酬應頗刻核且有凌忽之態自敵已以下多惡之吕常吕常字秉之翰林學士贈禮部左侍郎諡文懿原之子也以廕録為國子生成化初又以東宫恩授中書舍人仍上疏乞應試遂薦京闈中書舍人之得應試也實自吕常始秩滿遷禮部員外郎郎中擢南京太僕少卿改通政丙辰擢太常寺卿正德丁卯始致仕閲四年卒詔祭葬如制常為人坦易喜讀書作詩文習典故文與行能世其家徐説徐説字以中直𨽻宣城縣人成化戊戌進士授禮部祠祭司主事轉員外郎郎中升南京右通政𢎞治十五年致仕至是卒賜祭如例説性遲重居官勤政務然遇事多淟涊依違寡方正之操人不能無訾議云王雲鳳王雲鳳字應韶山西和順縣人成化甲辰進士授禮部主客司主事遷祠祭司員外郎郎中副使楊茂元言事獲罪上疏救之又奏太監李廣專恣不法乞正典刑會郊祀雲鳳騎而入壇遂得罪謫陜州知州廣敗乃升陜西提學副使條約甚嚴再升山東按察司使亦以嚴明稱母喪去官逆瑾羅織罰米千餘石家遂懸磬張綵為吏部時言于瑾擢雲鳳國子祭酒司務孫璁者瑾女弟之夫也亦怙瑾勢雲鳳嘗與往還璁後為瑾所疏以病免歸雲鳳不知也復郊餞之瑾語人曰孫璁何人也士大夫至往餞之雲鳳祭酒亦可爾耶遂改南京通政尋謝病歸復起為右僉都御史巡撫宣府在任僅兩踰月凡上數十疏如建儲及充調邉軍皆及之會父喪去官至是卒鳳好竒立異鋭於取名然中實靡定為節不終人多薄之姚鏌姚鏌浙江慈溪縣人𢎞治乙丑進士授禮部主事纍升都察院右副都御史巡撫延綏工部右侍郎督易州山厰右都御史提督兩廣軍務以𠞰平叛夷岑猛功升左都御史太子少保未幾猛部盧蘇等復亂官兵討之不克御史石金劾鏌失策遺患遂落職致仕久之以薦起兵部尚書兼左都御史總制陜西三邉未任乞休報允尋卒賜祭葬如例鏌端嚴博大任職以公亷見稱邵鋭邵鋭浙江仁和人由正德三年進士改庶吉士授翰林院編修調寧國府推官升南京吏部主事禮部員外郎江西提學僉事福建提學副使湖廣右參政河南按察司廣東山東左右布政使至太僕寺卿引疾歸卒詔賜祭葬贈都察院右副都御史諡康僖鋭質任自然不為矯飾而言動必依於禮一時稱為端士故官不過三品而恤典特厚云張嶽張嶽福建惠安人正德丁丑進士授行人率同官諫毅皇帝南巡杖闕下調南京國子監學正上登極復行人歷司副至禮部主客司郎中出為廣西提學僉事已改江西坐前所貢士黜落多謫廣東提舉知亷州遷浙江督學副司右僉都御史撫治鄖陽改江西進右副都御史總督兩廣軍務討封川文德大猾胸諸巢平之進兵部右侍郎明年平陽懷逺諸獞進攻馬鞍魚窩平之召改刑部為御史奏留不果行又明年平連獞尋進右都御史時鎮銅仁諸苖叛亂朝議請遣大臣一人總視湖廣川貴師詔以嶽往嶽謀度苖情謂前時主撫守皆非計乃大集土漢兵檄諸將分道進𠞰斬獲以數千計會有思川之敗詔奪一官未幾惡首盡殄首惡龍許保等前後成擒三方底定功未上而嶽卒其後兵部核其功復右都御史贈太子少保諡襄惠賜祭葬如例唐禎唐禎字元善直𨽻華亭人生而穎敏性復淳厚鄉先生見者皆器之家故饒裕而能自刻勵讀書百里外止以一僕自隨清苦如寒士不數年而學成領成化癸卯鄉薦丁未擢進士𢎞治初修憲宗實録分遣進士詣四方採托時事以禎往浙江禎悉心搜訪其所纂輯視他省獨精詳諸公稱之時二親並恙禎切于晨夕即以疾謁告歸承顔視膳雍容膝下者踰三年而母卒執喪哀毁見者動容服終有勸之仕者以父老辭曰吾懼養之弗及也居嵗餘父強遣之入都始授車駕之命明年以父喪歸辛酉改禮部儀制司主事乙酉升主客員外郎進署精膳郎中事丁卯卒於官禎為人坦易色笑可親而中有矩度發皆中理儀曹重事在貢舉禎兩提調視範周密人言不興哈密貢數倍常而物皆濫惡禎在主客曰是虛名而糜我實賜也且以折估聞使者來訴譁于庭不去禎使譯諭之曰爾欺爾主易爾貢以為利不爾罪足矣而又敢譁耶不聽且移文邉關詰爾主爾罪安歸使者情得乃屈服精膳主天下貢茶至者必先呈樣樣者其名實則以為私積所從來久矣禎至飭門者正供外無得入流風一清人以此重之潘璜潘璜直𨽻婺源人舉進士由知縣擢户部主事尋改禮部與修明倫大典復改吏部擢禮部郎中歷福建提學副使纍遷吏部左侍郎户部尚書調南京工部尋改南京兵部致仕卒璜有文學行誼修飭士論重之孫迪孫迪字仲約浙江錢塘人迪生而秀穎志趨異凡子弟讀書過目輒記不忘稍長入邑庠授春秋語止侃侃出一時流輩上逾數年迪益自刻勵問學期大樹立又六年成進士選任翰林庶吉士不數月用薦者超擢禮部精膳員外郎奉命督運淮安既至遂病不起年始二十有七迪嘗讀書觀古今治亂遇豪傑功業之士必慷慨拊髀恨不生其時躬上下論議至衄者不啻吐涕斥不一顧視故其臨政施事一以理自許而惜年不永未竟其志云錢萱錢萱浙江海鹽人少敏慧嘉靖七年由國子生中順天府鄉試乙未舉進士為刑部湖廣司主事以母喪歸畢改禮部祠祭司是時上方崇制作稽古秩祀諸所請核牘委積案而萱則與其長二旁討廣證去取隆殺咸合宜品部嚴費二尚書數譽其才因改陟儀制司員外郎甲辰提調會試後坐纍謫為廣東德慶州同知來汝賢來汝賢字子禹浙江蕭山人起童子華采振暴及壯乃益沈思術學探抉微渺鄉學及禮部試皆第二廷試同進士出身為奉新令奉新江西陋邑也其俗獷鬬狠訟抵訐扲鍵務必勝不勝則隂持上官短以責右已無何依違之不且立去汝賢至批根其尤痛法繩之又開學館延進諸生為指示經法為文章躬行於是皆輯不為非在奉新十月而徙丹陽丹陽又道衝兩都舟車至者日數十百日出河滸造請諸大夫賢者磬折為禮視供具徒𨽻一一指授無失賓客意久之歸縣中為民均賦平爭訟調繇作不暇給矣又時時進學宫諸生講説經訓勸行如奉新時遂以治行髙等入為兵部職方主事調禮部精膳以疾乞歸尋卒年僅三十有六劉元卿劉元卿字調父江西安福人自幼雄竒穎敏時有以正學倡諸里者聞之喜動于心陳諸宋儒語録堆案盈几玩而三思焉適郡太守公辨諸士試元卿盡以所學發于論太守大竒以為真儒再出入闈遂魁江西仍以學自砥礪辛未業入彀主司以其策多憤激語置之殿江陵聞而大怒下禮部以飭多士乃歸而倡學里中里中勃然興起甲戌不第扶其引杜門不出矣而從遊者日衆創復禮識仁中道一德諸院咸有常會西鄉諸習俗得之一變既而以薦起為國子博士尋晉禮部主事元卿已絶意仕進強應聘出埋光剷采冀與各賢一移世軸覩時不可為遂飄然還里在國子薰德者甚衆在儀部疏從祀諸先大儒釐正女直儀皆其巨者惜乎其大有為之才而未竟其用也元卿性敏又諳于典故有可補閭閻者聞必行行必力所著書甚富皆行于世陳九川陳九川字惟濬直𨽻寧國人癸酉舉鄉試甲戌登進士第請告歸起授太常博士乙卯武宗將南巡衆莫諫獨與舒國裳夏良勝萬潮連疏諫止有旨荷校跪午門外五日杖五十除名直聲動朝野而病日甚然南巡竟止識者壯之辛巳世宗即位拔諸諫臣仍補太常癸未進禮部儀制員外郎册封弋陽王乙酉轉主客郎中正貢獻名物節犒賞費且數萬羣小懷銜會是時有他甘心者思藉為媒嗾通事假夷語奏之下詔獄數瀕死不變言官論救不聽丙戌戍鎮海衛己丑郊祀覃恩解還後兩遇詔得間住致仕九川凡再履機危而卒不肯濡滯依違以為身家之謀而易其計蓋性成然也李逢陽李逢陽字惟明國初籍金吾後衛居南京幼端謹如成人家庭間顰笑不茍雖盛暑恆整衣冠危坐終日無傾側容視世沒溺財利惟恐汚之戊午舉於鄉隆慶戊辰第進士時方選庶吉士逢陽本第七人當道雅屬意逢陽固辭弗就乃授户部主事改儀部郎中會選宫人惟簡其貌類端淑者艷冶悉置不與奉命遣祭楚王事竣以百金為贐卻之歸未幾友人楊希淳病逢陽親視湯藥或謂宜少避者不從楊卒未浹旬亦竟不起逢陽篤於踐履不事空談其沒也人咸惋惜之王洪王洪字希範浙江錢塘人生八嵗即知務學及冠入郡庠從訓導胡粹中授春秋日記數千言無遺忘下筆為文辭沛然有竒氣率所事所言若老成人粹中大器之年十八舉進士任行人將命關陜得使職人賢之未幾升吏科給事中遂為檢討修大典為副總裁考滿升修撰又升侍講三以大比典文衡取士甚公職侍講踰三年遷禮部主事適尚書吕公巡行關陜凡部事悉命洪敷奏論事詳明同列敬服朝廷方屬意洪永樂十八年竟疾以卒年四十有二其疾也得賜藥物其卒也又得賜棺且給舟載歸恩惠隆至人莫及云吳覬吳覬字相虞直𨽻昆山人自幼秀朗異常兒稍長里胥責役即詣縣令自陳家有老母實不能逺離性竊有志於學幸矜念耳令異其言問論語書數條嚮答無滯立遣就邑庠生弟子員越二年以能書赴京預修永樂大典書成取賞而還嵗戊戌膺貢入太學又明年中順天府鄉試宣德五年授刑部廣東司主事逾年改行在雲南司兩司皆兼理京府號繁劇覬皆優為之日收善譽正統丙辰乞歸省祭還朝改禮部主客司賢譽不減刑部時以母髙年且無他子弟力乞歸養大宗伯吳公留之至再不可得既歸孝養備至母卒喪葬盡禮優遊林下者四十年始卒年八十有五仵瑜仵瑜字忠父湖廣蒲圻人生而忱恂篤厚溫惇身若不勝衣言悛悛若不出諸口孝友之行本諸天性弱植操修夙夜匪懈正德庚午發解廣省丁丑成進士己卯授禮部主客司主事大宗伯稱賞乃毛公獨至未幾上疏病歸新天子出離御宸號召黎老登庸宅俊光昭大烈赫赫濯濯與天下更始乃復如京師上疏論天下事一曰勤學二曰篤親親三曰開言路四曰敬大臣五曰選諍臣六曰去浮屠七曰拯困窮八曰重守令九曰修武備十曰儲人才疏上上嘉納之下諸司條行乃仍厥官提督四夷館甲申春上召輔臣于平臺于暖閣諭以尊稱之典大學士楊廷和蔣冕毛紀力諫以為干正統違大議上瀆九廟內間兩宫未敢輕議上意不豫者久之乃主事桂萼窺伺風旨竊取席書張璁霍韜方獻夫諸議奏之上下其議在廷諸臣堅執以為不可時廷和去冕即繼去禮部尚書汪俊又去乃以書為禮部尚書萼璁獻夫為學士諸臣羞與為伍遂不謀而同抗言力辨或謫或罷或繫獄無虛日秋七月乙亥上降手敇改稱孝宗敬皇帝為皇伯考恭穆獻皇帝為皇考昭聖皇太后為皇伯母章聖皇太后為聖母諸司俱奏以為不可十月五日戊寅少宰氏何孟春率百官伏闕死爭大學士毛紀石珤取帖伏于前時近年上命司禮監宣諭乃下學士豐熙給事中張翀御史俞翺郎中余寬黃待顯陶滋相世芳寺正母德純于獄百官號泣聲震闕廷瑜嘆曰吾禮官也有死而已已而未末申初有駕危言以嫁禍中傷者上復命內使宣諭時大臣已退惟諸司在上大震怒悉下百官于錦衣衛獄庚辰械至午門前杖三十死者十有六人編修王恩王相給事中張原毛玉裴紹宗御史胡瓊員外郎張燦主事臧應奎安璽楊余禎胡璉殷承敘司務李可登而瑜亦竟不起矣時伏闕後十日也享年四十有八禮部志稿卷五十八
