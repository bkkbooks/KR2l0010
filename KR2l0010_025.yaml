帛薦之於瘞兮罔敢愆予拜首兮奉送願永貺兮民樂豐年祈穀今罷嘉靖十年定一前期五日上詣犧牲所視牲先一日告廟及還㕘拜俱如大祀之儀告辭曰明日恭視祈穀牲儀㕘辭曰恭視祈穀牲儀回還次日以復命大臣輪視如常儀一前期四日太常寺奏祭祀諭百官致齋三日上親填告請太祖祝版於文華殿一前期三日上詣太廟請太祖配神以脯醢酒果行再拜一獻禮祝文曰維嘉靖某年嵗次某月朔某日孝𤣥孫嗣皇帝某敢昭告於皇祖太祖髙皇帝曰兹以今月日啟蟄之辰恭祀上帝於圜丘為民祈穀謹請皇祖侑神伏惟鑒知謹告一前期二日太常卿同光祿卿奏省牲如常儀一前期一日上親填祝版於文華殿遂告於廟告辭曰孝𤣥孫嗣皇帝某明日祇詣南郊行祈穀禮謹詣祖宗列聖帝后神位前恭預告知夜二鼔禮部尚書上香侍郎導引太常卿捧請神版奉安於壇位俱如大祀之儀一陳設上帝位犢一玉用蒼璧一帛一青色豋一簠簋各二籩十二豆十二蒼玉爵三酒尊三篚一祝案一配帝位同惟不用玉一正祭是日上常服乗輿至昭亨門右上降輿導引官導上至大次具祭服出由左門入至陛上行登禮如大祀之儀惟不燔柴上還至廟㕘拜致辭曰孝𤣥孫嗣皇帝某祇詣南郊祈穀禮成躬詣祖宗列聖帝后神位前謹用㕘拜畢還宫一祝文維嘉靖某年某月某日嗣天子臣某祇奏於皇天上帝曰候維啟蟄農事將舉爰以兹辰敬祈洪造謹率臣僚以玉帛犧齋粢盛庶品備斯明潔恭祀上帝於圜丘仰希垂鑒錫福烝民俾五穀以皆登普萬方之咸賴奉太祖聖神文武欽明啟運俊徳成功統天大孝髙皇帝侑神尚享一樂章迎帝神中和之曲臣惟穹昊兮民物之初為民請命兮祀禮昭諸備筵率職兮祈洪庥臣衷微𦕈兮悃懇誠攄遙瞻駕降兮霽色輝歡迎鼓舞兮迓龍輿臣愧菲才兮后斯民願福斯民兮聖恩渠奠玉帛肅和之曲烝民勤職兮農事顓蠶工亦慎兮固桑阡玉帛祇奉兮暨豆籩仰祈大化兮錫以豐年進俎咸和之曲鼎烹兮氣馨香饈兮㫖醽帝垂享兮以歆烝民䝉福兮以寧初獻夀和之曲禮嚴兮初獻行百職趨蹌兮佩琤鳴臣謹進兮玉觥帝心歆鑒兮嵗豐亨亞獻景和之曲二觴舉兮致䖍清醴載斟兮奉前仰音容兮忻穆臣感聖恩兮實拳拳終獻永和之曲三獻兮一誠微禋禮告成兮帝鑒是依烝民沐徳兮嵗豐禨臣拜首兮竭誠祈徹饌凝和之曲三獻週兮肅乃儀俎豆敬徹兮弗敢遲願留福兮丕而曰雨曰𤾉兮若時送帝神清和之曲祀禮告備兮帝鑒彰臣情上達兮感昊蒼雲程肅駕兮返帝鄉臣荷恩眷兮何以忘祥風瑞靄兮彌壇壝烝民率土兮悉獲豐康望燎太和之曲遥覩兮天衢長邈彼寥廓兮去上方束薦火兮希昇聞悃愊已通兮沛澤長樂終九奏兮神人已和臣同率土兮咸荷恩光大享今罷嘉靖十七年定一前期五日上詣犧牲所視牲其先一日上告於廟及還㕘拜俱如大祀之儀告辭㕘辭改稱大祀曰大享餘並同次日以後命大臣輪視如常儀一前期四日太常寺奏祭祀如常儀諭百官致齋三日一前期三日上詣太廟寢殿告請睿宗配帝以脯醢酒果行再拜一獻禮祝文維嘉靖某年某月某日孝子皇帝某敢昭告於皇考睿宗獻皇帝曰兹以今月日恭行大享禮於大享殿謹請皇考配帝侑神伏惟鑒知謹告一前期二日太常卿光祿卿奏省牲如常儀一前期一日上親填祝版於文華殿夜二鼓禮部同太常堂上官請安神御版位俱如祈穀之儀一陳設上帝位犢一玉用蒼璧一帛十二青色豋一簠簋各二籩十二豆十二玉爵三酒尊三篚一祝案一配帝位同惟不用玉一正祭與祈穀同一祝文維嘉靖某年某月某日嗣天子臣某恭奏享於皇天上帝曰時當季秋咸成農事羣生䝉利黎兆允安邦家是賴帝徳敷天臣統臣工宜為酬享謹用玉幣犧牷祇謝生成大福備此禋燎奉皇考睿宗知天守道洪徳淵仁寛穆純聖恭儉敬文獻皇帝配帝侑歆尚享一樂章迎帝神中和之曲於皇穆清兮𢎞覆惟仁既成萬寶兮惠此烝民祇受厥明兮欲報無因爰稽古昔兮式展明禋肅肅廣庭兮遥遥紫旻笙鏞始奏兮祥風導雲臣拜稽首兮中心孔懃爰瞻寶輦兮森羅萬神庶幾昭格兮眷命其申徘徊顧歆兮鑒我恭寅奠玉帛肅和之曲捧珪幣兮瑶堂穆將愉兮聖皇秉予心兮純一荷帝徳兮溥將進俎凝和之曲嵗功阜兮庶類成黍稷飶兮濡鼎馨敬薦之兮慙菲輕大禮不煩兮惟一誠初獻夀和之曲金風動兮玉宇澄初獻觴兮交聖靈瞻𤣥造兮懐鴻禎曷以酬之心怦怦亞獻豫和之曲帝眷我兮居歆紛繁會兮五音再奉觴兮莫殫臣心惟帝欣懌兮生民是任終獻熈和之曲綏萬邦兮屢豐年𦕈𦕈予躬兮實荷昊天酒三獻兮心益䖍帝命㕘輿兮勿遽旋徹饌雍和之曲禮既洽兮神人肅雍享帝享親兮勉竭臣衷惟洪恩兮罔極儼連蜷兮聖容送帝神清和之曲九韶既成兮金玉鏗鏘百辟森立兮戚羽斯蔵皇天在上兮昭考在旁嚴父配天兮祇修厥常殷薦既終兮神去無方𤣥雲上昇兮鸞鵠㕘翔靈光回照兮郁乎芬芳載慕載瞻兮願錫亨昌子孫黎民兮維帝是將於昭明徳兮永懐不忘望燎時和之曲龍輿杳杳兮歸上方金風應律兮燎斯揚達精誠兮合靈光帝廷納兮玉幣將顧下土兮眷不忘願錫吾民兮長阜康禮部志稿卷二十五
