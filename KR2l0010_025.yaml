body:
  text: 禮部志稿卷二十五明俞汝楫編祠祭司職掌祭祀通例國初以郊廟社稷先農俱為大祀後改先農及山川帝王孔子旗纛為中祀諸神為小祀嘉靖中以朝日夕月天神地祇為中祀凡郊廟社稷山川諸神皆天子親祀國有大事則遣官祭告若先農旗纛五祀城隍京倉馬祖先賢功臣太厲皆遣官致祭惟帝王陵寢及孔子廟則傳制特遣各王國及有司俱有祀典而王國祀典具在儀司洪武初天下郡縣皆祭三皇後罷止令有司各立壇廟祭社稷風雲雷雨山川城隍孔子旗纛及厲庶人祭里社鄉厲及祖父母父母并得祀竈餘俱禁止凡進祀册舊制欽天監每歲十一月上旬具明年各祭祀日期于奉天門奏進嘉靖九年更定郊禮令以九月自大報之祀為始開列具奏十五年令以九月朔禮部尚書於奉天殿進呈欽定儀注每歲九月朔大宗伯以大報日期等日告于皇帝前期于本衙門宿鴻臚卿具請御殿及設案奉天殿中是日百官公服侍班皇帝服皮弁大宗伯具朝服自午門中道行捧祀日册立置于案皇帝就案先立定大宗伯跪奏曰嘉靖幾年分大報等祀日册請敬之皇帝搢圭取而恭視訖序班舉案置于華蓋殿中皇帝陞座百官叩頭如常禮畢凡祀郊社洪武五年令皇太子留宫中居守親王戎服侍從皇太子親王雖不陪祀一體齋戒九年議定郊社大禮雖有三年之喪亦不敢廢凡致齋大祀三日中祀二日降香一日傳制遣官前一日沐浴更衣處于齋宫次日還宫洪武三年定大祀百官先沐浴更衣本衙門宿歇次日聴誓戒畢致齋三日今惟圜丘誓戒宗廟社稷亦致齋三日惟不誓戒令禮部鑄銅人髙一尺五寸手執牙簡如大祀則書致齋三日中祀則書致齋二日于簡上太常寺進置于齋所五年令諸衙門各置齋戒牌刻文其上曰國有常憲神有鑒焉凡遇祭祀則設之嘉靖三年令齋戒日文武百官隨品穿吉服并青緑錦繡凡服大祀冕服中祀皮弁服陪祀諸臣各用本品梁冠祭服凡牲四等曰犢曰牛曰大牢曰少牢色尚騂或黝大祀入滌九旬中祀三旬小祀一旬洪武初定神牲所設官二人牧養神牲前三月付廩犧令滌治如法三年改立犧牲所設武職并軍人專管牧養其牲房中三間以養郊祀牲左三間養宗廟牲右三間養社稷牲餘屋養山川百神之牲六年奏准郊廟犧牲已在滌者或有傷則出之死則埋之其有疾者亦養于别所待其肥腯以備小祀中祀之用若未及滌或有傷疾者歸所司别用景泰四年令禮部鑄造牲字牢字火焙各一會同太常寺御史印記各處解到大祀牛羊凡玉三等曰蒼璧曰黄琮曰玉惟祀天地日月則用之凡帛五等曰郊祀制帛曰奉先制帛曰禮先制帛曰展親制帛曰報功制帛洪武十一年議定在京大祀中祀用制帛在外王國及府州縣亦用帛小祀止用牲醴凡樂四等天地九奏神祇太嵗八奏大明太社稷帝王七奏夜明帝社稷宗廟先師六奏舞皆八佾有文有武先師舞六佾用文嘉靖九年定文武舞生冠履佾數俱如舊制但圜丘服色用青紵絲方澤用黑緑紗朝日壇用赤羅夕月壇用玉色羅凡禮洪武七年奏准先時太常寺奏中嚴奏外辦盥洗陞壇飲福受胙各有贊詞又各壇俱設爵洗立滌爵拭爵初陞壇再拜祭酒唱賜福胙之類俱以繁瀆刪去又令祭祀皆免上香八年定登壇脱舄禮今亦不行九年定大祀拜禮迎神四拜飲福受胙四拜送神四拜共十二拜中祀飲福受胙止再拜凡郊廟社稷祝版嘉靖九年令議先期一日太常寺博士捧至文華殿候上親填御名若冬至大祀則于奉天殿恭填凡陪祀大祀文官五品以上武官四品以上及六科都給事中皆陪内有刑喪過犯體氣之人不預餘祭竝同惟都給事中不預嘉靖十五年令都給事中陪祀宗廟後又令一應祭祀俱陪十七年令皇親指揮以下千百戸等官凡郊廟等祀俱陪凡祀牌洪武八年置陪祭官員牙牌供事官員人等長牙牌各令縣帶無者不許入壇郊祀國初建圜丘於鍾山之陽以冬至祀天建方澤於鍾山之隂以夏至祀地洪武二年始奉仁祖淳皇帝配享十年春始定合祀之制即圜丘舊址為壇以屋覆之名大祀殿嵗以正月上辛日行禮時郊工未成暫就奉天殿行十二年正月乃合祀於大祀殿仍奉仁祖配享命官分獻日月星辰嶽鎮海瀆山川諸神凡一十四壇二十一年又增修壇壝於大祀殿丹墀内東西相向為日月星辰四壇又於内壝之外為壇二十亦東西相向為五嶽五鎮四海四瀆風雲雷雨山川太歲天下神祇歴代帝王諸壇其日月星辰初有朝日夕月禜星之祭至是俱罷歴代帝王及太歲風雲雷雨嶽鎭海瀆山川月將城隍諸神初俱春秋二祭至是亦停春祭惟每嵗八月中旬擇日於山川壇及帝王廟祭之三十二年郊祀更奉太祖髙皇帝配享永樂十八年北京天地壇成每歲仍合祀如儀南京壇有事則遣官祭告洪熈元年奉太祖太宗同配享嘉靖九年遵初制建圜丘於大祀殿之南每歲冬至祀天以大明夜明星辰雲雨風雷從祀建方澤於安定門外每歲夏至祭地以五嶽五鎮四海四瀆陵寢諸山從祀俱止奉太祖一位配享而罷太宗之配又建泰神殿於圜丘北正殿以藏上帝太祖之主配殿以藏從位諸神之主上帝太祖主曰神版餘曰神牌祭則禮部太常寺官請詣壇奉安建皇祇室於方澤南以藏皇祇及從位主而太祖主則以祭之前一日請諸太廟建朝日壇於朝陽門外以春分祭日無從位建夕月壇於阜城門外以秋分祭月亦以星辰從祭俱不奉配其大祀殿則以孟春上辛日行祈榖祭奉太祖太宗同配享十年又改以啓蟄日行祈穀禮於圜丘仍止奉太祖一位配享十一年建崇雩壇於圜丘壇外泰元門之東嵗旱則祭上帝以禱雨以奉太祖配享十七年秋九月詔舉明堂大享禮於大内之𤣥極寳殿奉睿宗獻皇帝配享冬十一月更上昊天上帝㤗號曰皇天上帝改泰神殿曰皇穹宇十八年春行祈穀禮於𤣥極寳殿不奉配二十四年即故大祀殿之址建大享殿而建皇乾殿於大享殿北以藏神版命禮部嵗用季秋奏請擇吉行大享禮已又命暫行於𤣥極寳殿隆慶元年禮部會議圜丘方澤朝日夕月嵗舉四郊仍如世宗所更定而罷祈穀及明堂大享禮今並存其儀以備考云合祀洪武十年初定合祀儀一齋戒前期二日太常司官今太常寺宿於本司次日具本奏聞致齋三日次日進銅人傳制諭文武官齋戒不飲酒不食葱韭薤蒜不問病不弔喪不聴樂不理刑名不與妻妾同處一傳制儀見儀制司當日禮部官太常寺官於城隍廟發咨仍於各廟焚香三日一告廟正祭前二日用祝文酒果奉先殿告仁祖配上帝皇祇祝文曰維洪武十七年嵗次甲子月日孝子皇帝某敢昭告於皇考仁祖淳皇帝茲以正月某日恭祀上帝皇祇於大祀殿謹請皇考配神伏惟鑒知謹告一省牲用牛二十八羊三十三豕三十四鹿二兔十二正祭前二日太常司官奏聞明日與光禄司官省牲次日省牲畢一同復命就奏定分獻官二十四員一陳設共二十七壇正殿三壇上帝南向犢一豋一實以大羮煮肉汁不用鹽醬籩十二實以形鹽藳魚棗栗榛菱芡鹿脯白餅白麵造黑餅蕎粉造糗餌米粉造粉餈糕豆十二實以韭葅以韭切去本末取中四寸菁葅芹葅筍葅醯醢豬肉鮓用鹽酒料物調和鹿醢兔醢魚醢脾析用牛百葉切細湯熟用鹽酒造用豚胉豬肩上肉􅓞食用糯米飯羊脂蜜熬糝食用牛羊豕肉細切與粳米飯同熬簠簋各二實以黍稷稻粱玉用蒼璧一帛一蒼色織成郊祀制帛四字皇祇南向犢一豋一籩十二豆十二簠簋各二玉用黄琮一帛一黄色郊祀制帛仁祖配位在東西向犢一豋一籩十二豆十二簠簋各二玉用蒼璧一帛一蒼色郊祀制帛其設酒尊六爵九篚三於東南西向祝文案一於殿西洪熈以後改奉太祖太宗並祀正殿增一壇加犢一酒尊二爵三帛篚一丹墀四壇大明在東西向犢一豋一籩十無糗餌粉餈下同豆十無􅓞食糝食下同簠簋各二帛一紅色禮神制帛酒尊三爵三篚一夜明在西東向犢一豋一籩十豆十簠簋各二帛一白色禮神制帛酒尊三爵三篚一星辰一壇在東西向犢一羊三豕三豋一鉶二盛和羮用肉鹽醬籩豆各十簠簋各二酒盞三十帛一白色禮神制帛酒尊三爵三篚一星辰二壇在西東向陳設同東十壇北嶽壇犢一羊一豕一豋一鉶二籩豆各十簠簋各二酒盞十帛一黑色禮神制帛酒尊三爵三篚一永樂以後北嶽壇增附天壽山加酒盞十帛一北鎮壇陳設同東嶽壇陳設同帛一青色禮神制帛東鎮壇東海壇陳設並同太歲壇陳設同帛一白色禮神制帛帝王壇陳設同帛十六白色禮神制帛酒盞三十山川壇陳設同帛二白色禮神制帛酒盞三十神祇壇羊五豕五鉶三無大羮籩豆各八簠簋各二酒盞三十帛一白色禮神制帛酒尊三爵三篚一四瀆壇陳設與北嶽同帛四黑色禮神制帛酒盞三十西十壇北海壇陳設與北嶽同西嶽壇陳設同帛一白色禮神制帛下同西鎮壇西海壇陳設並同中嶽壇鍾山附陳設同帛二黄色禮神制帛酒盞二十中鎭壇陳設同帛一黄色禮神制帛酒盞十風雲雷雨壇陳設同帛四白色禮神制帛酒盞三十南嶽壇陳設同帛一紅色禮神制帛酒盞十南鎮壇南海壇陳設並同一正祭典儀唱樂舞生就位執事官各司其事陪祀官分獻官各就位導引官導引皇帝至御位内贊奏就位典儀唱燔柴凡燔柴洪武六年令先刳淨犢牛器盛置於燔罏之右駕自齋宫詣壇大和鐘鳴則罏内舉火候贊燔柴即以犢牛置其上燔之瘞毛血迎神協律郎舉麾奏樂樂止内贊奏四拜百官同典儀唱奠玉帛奏樂内贊奏陞壇至上帝前奏搢圭執事官以玉帛跪進於皇帝右奠訖奏出圭至皇祇前奏搢圭執事官以玉帛跪進於皇帝左奠訖奏出圭至仁祖前奏搢圭執事官以玉帛跪進於皇帝右奠訖奏出圭復位樂止典儀唱進俎奏樂齋郎舁饌至内贊奏陞壇至上帝前奏搢圭進俎出圭至皇祇前奏搢圭進俎出圭至仁祖前奏搢圭進俎出圭奏復位樂止典儀唱行初獻禮奏樂内贊奏陞壇至上帝前奏搢圭執事官以爵跪進於皇帝右奏獻爵出圭至皇祇前奏搢圭執事官以爵跪進於皇帝左奏獻爵出圭詣讀祝位跪讀祝樂止讀祝官取祝跪於神位右讀訖樂作奏俯伏興平身百官同至仁祖前奏搢圭執事官以爵跪進於皇帝右奏獻爵出圭復位樂止典儀唱行亞獻禮奏樂内贊奏陞壇至上帝前奏搢圭執事官以爵跪進於皇帝右奏獻爵出圭至皇祇前奏搢圭執事官以爵跪進於皇帝左奏獻爵出圭至仁祖前奏搢圭獻爵出圭復位樂止典儀唱行終獻禮奏樂儀同亞獻樂止太常卿進立殿西東向唱賜福胙内贊奏詣飲福位跪搢圭光禄司官以福酒跪進奏飲福酒光禄司官以胙跪進奏受胙出圭俯伏興平身復位奏四拜百官同典儀唱徹饌奏樂執事官各壇徹饌樂止典儀唱送神奏樂内贊奏四拜百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎瘞位奏樂執事官各執祝帛饌出内贊奏禮畢一分獻官儀注典儀唱行初獻禮贊引引分獻官詣神位前搢笏執事官以帛進於分獻官贊引贊獻爵出笏贊引引至酒尊南北向立典儀唱行終獻禮儀同亞獻贊引引分獻官復位徹饌執事官徹饌執帛饌詣燎所俱候典儀唱行一祝文維洪武某年嵗次某甲子正月某日嗣天子臣某敢昭告於昊天上帝后土皇地祇時維孟春三陽開泰敬率臣僚以玉帛犧齊粢盛庶品恭祀於大祀殿備茲燎瘞皇考仁祖淳皇帝配神尚享一樂章迎神樂奏中和之曲荷䝉天地兮君主華夷欽承踴躍兮備筵而祭誠惶無已兮寸衷微仰瞻俯首兮惟願來期想龍翔鳯舞兮慶雲飛必昭昭穆穆兮降壇壝奠玉帛樂奏肅和之曲天垂風露兮雨澤霑黄壤氤氲兮