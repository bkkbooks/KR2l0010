body:
  text: 禮部志稿卷三十九明俞汝楫編精膳司職掌膳羞筵宴下程舊制凡大筵宴膳司提調光祿寺官供辦其待諸番茶飯及下程膳司自行辦送後革主事㕔一應皆屬光祿寺禮部止行文照㑹以其事皆禮部掌行故列於此洪武二十六年定凡遇正旦聖節冬至或吉慶筵宴所用諸品膳羞酒醴並須提調光祿寺供辦若管待諸番國朝貢等使客并外國來降土官人等茶飯物料禮部自行備辦其宴之日赴㑹同館管待令教坊司供應若奉㫖管待之人俱於本部筵宴正官主席一土官使客至㑹同館除柴米鋪陳本館應付外本部照依正從名數每五日一次支送下程一管待物料先期一日本部劄委膳部照依時價收買仍令物户親齎赴部對物給價其合用羊隻主事㕔具手本赴光祿寺闗領原編羊隻字號勘合於司牧局照號闗取造辦管待畢日仍囘呈本部開具買過物件同支過價鈔數目主事㕔囘呈闗過羊隻字號毛色觔重本部判送立案通數開銷一買辦管待物料鈔貫若支銷盡絶本部照例具奏依數闗領鈔錠囘部收貯在庫聽候買辦如支銷已盡依上闗用筵宴凡欽賜酒飯附郊祀慶成永樂二年上桌按酒五般果子五般茶食五般燒煠五般湯三品雙下饅頭馬肉飯酒五鍾中桌按酒四般果子四般湯三品雙下饅頭馬猪羊肉飯酒五鍾隨駕將軍按酒一般粉湯雙下饅頭猪肉飯酒一鍾金鎗甲士象奴校尉雙下饅頭教坊司樂人按酒一般粉湯雙下饅頭酒一鍾天順元年上桌寶粧茶食嚮糖纒椀八個棒子骨二塊大銀錠油酥八個花頭二個鳯鴨一隻菜四色按酒五般湯三般小銀錠笑靨二楪鴛鴦飯二塊大饅頭一分果子五般黒白餅一楪鮓一楪每人酒五鍾上中桌寶粧茶食嚮糖纒椀八個棒子骨二塊大銀錠油酥八個花頭二個甘露餅四個菜四色按酒五般小銀錠笑靨二楪湯三品鴛鴦飯二塊大饅頭二分果子五般每人酒五鍾中桌寶粧米食雲子麻葉二楪甘露餅四個大銀錠油酥八個煠魚二塊小銀錠笑靨二楪果子按酒各五般菜四色花頭一個湯三品鴛鴦飯二塊大饅頭四分每人酒五鍾下桌寶粧茶食大銀錠油酥八個煠魚二塊果子四般按酒四般菜四色湯三品馬肉飯二塊大饅頭二分每人酒五鍾隆慶四年題准筵宴規則殿内將軍每名猪肉二觔白麪一觔酒三鍾樂舞生每名猪肉一觔羊肉一觔白麪一觔酒三鍾教坊司樂工每名猪肉四兩白米八合酒三鍾其殿外將軍金鎗甲士旗校等行禮科查給鈔錠聖節永樂十三年上桌按酒五般果子五般茶食燒煠鳯鷄雙棒子骨大銀錠大油餅湯三品雙下饅頭馬肉飯酒五鍾上中桌按酒四般果子四般燒煠銀錠油餅雙棒子骨湯三品雙下饅頭馬肉飯酒三鍾中桌按酒四般果子四般燒煠茶食湯三品雙下饅頭羊肉飯酒三鍾僧官等用素桌按酒五般果子茶食燒煠湯三品雙下饅頭蜂糖糕飯將軍按酒一般壽麪雙下饅頭馬肉飯酒一鍾金鎗甲士象奴校尉雙下饅頭酒一鍾教坊司樂人按酒一般粉湯雙下饅頭酒一鍾給俵内官内使上桌按酒五般果子湯三品小鏝頭酒三鍾中桌按酒四般果子湯三品小饅頭正旦節永樂間上桌按茶食像生小花果子五般燒煠五般鳯鷄雙棒子骨大銀錠大油餅按酒五般菜四色湯三品簇二大饅頭馬牛羊胙肉飯酒五鍾上中桌茶食像生小花果子五般按酒五般菜四色湯三品簇二大饅頭馬牛羊胙肉飯酒五鍾中桌果子五般按酒四般菜四色湯二品簇二大饅頭馬猪牛羊胙肉飯酒三鍾隨駕將軍按酒細粉湯椒醋肉并頭蹄簇二饅頭猪肉飯酒一鍾金鎗甲士象奴校尉雙下饅頭教坊司樂人按酒熝牛肉雙下饅頭細粉湯酒一鍾冬至節永樂間上桌按酒五般果子五般茶食湯三品雙下饅頭馬羊肉飯酒五鍾中桌按酒五般果子四般茶食湯三品雙下饅頭酒五鍾將軍按酒一般雙下饅頭粉湯酒一鍾金鎗甲士象奴校尉雙下饅頭教坊司樂人按酒一般雙下饅頭粉湯酒一鍾皇太后聖旦節皇后令旦節正統間上桌按酒四般菜四色㸃心一楪壽麪一椀酒三鍾中合桌同壽麪二椀酒六鍾東宫千秋節宣德間上桌按酒四般菜四色㸃心一楪壽麪一椀酒三鍾中合桌按酒五般菜四色壽麪二椀酒六鍾立春節永樂間上桌按酒四般春餅二楪菜四色湯二椀酒三鍾中合桌按酒四般春餅二楪菜四色湯三椀酒六鍾元宵節永樂間上桌按酒四般果子茶食小饅頭菜四色粉湯圓子一椀酒三鍾中合桌按酒四般果子茶食小饅頭菜四色粉湯圓子二椀酒六鍾四月八節嘉靖十四年改用四月五日永樂間上桌按酒二般不落莢一楪涼糕一楪小㸃心一楪菜四色湯一椀酒三鍾中合桌按酒二般不落莢一楪涼糕一楪小㸃心一楪菜四色湯二椀酒六鍾嘉靖十四年改不落莢為麪餅端午節永樂間上桌按酒五般果子小饅頭湯三品糕一楪粽子一楪菜四色酒五鍾中桌按酒四般果子小饅頭湯三品糕一楪粽子一楪菜四色酒五鍾教坊司樂人按酒一般湯飯酒一鍾重陽節永樂間上桌按酒二般糕二楪小㸃心一楪菜四色湯一椀酒三鍾中合桌按酒二般小㸃心一楪糕二楪菜四色湯二椀酒六鍾臘八節永樂間上桌按酒四般菜四色臘麪一椀酒三鍾中合桌按酒四般菜四色臘麪二椀酒六鍾祭太廟享胙永樂元年上桌按酒五般果子五般小饅頭粉湯酒三鍾中桌按酒四般果子四般小饅頭粉湯酒四鍾祭社禝享胙永樂二年上桌按酒五般果子五般茶食五般湯三品雙下饅頭馬猪羊肉飯酒五鍾中桌按酒四般果子四般湯三品雙下饅頭猪肉飯酒五鍾祭先農享胙永樂元年上桌按酒四般簇四小饅頭粉湯酒六鍾大祀圜丘文武百官湯飯嘉靖間定上桌按酒四般㸃心一楪湯飯一分小菜四色中合桌按酒四般㸃心一楪湯飯二分小菜四色孟春祈穀夏至方澤春分朝日秋分夕月祭畢内外官酒飯嘉靖間定上桌按酒四般小饅頭一楪湯飯一分酒五鍾中合桌按酒饅頭同湯飯二分酒十鍾遇遣官代祭免辦耕耤三公九卿執事等官酒飯嘉靖間定上桌按酒四般小饅頭一楪湯飯一分酒三鍾中合桌按酒四般小饅頭一楪湯飯二分酒六鍾樂舞生下合桌與中合桌同但減猪肉二觔耆老及樂人各領酸麻湯一椀饅頭一楪肉一觔蠶壇酒飯嘉靖間定夫人秀才每桌按酒五般㸃心二楪添換燒割全湯三品菜四色飯一分酒三鍾内女樂并外蠶母合卓每卓按酒四般㸃心一楪添換燒割全菜四色每人湯三品飯一分酒三鍾命婦中桌每桌按酒四般㸃心一楪湯三品菜四色飯一分酒三鍾九年奏准壇内係禁密處所光祿寺厨役難以造辦令尚膳監管理祗待駕幸太學筵宴𢎞治元年上桌按酒五般果子五般大銀錠大油酥寶粧鳳鴨小㸃心棒子骨湯三品菜四色大饅頭羊背皮酒五鍾中桌按酒五般果子五般茶食五般燒魚小㸃心湯三品菜四色大饅頭羊脚子飯酒五鍾成化間免改禮部待宴嘉靖於禮部止宴三氏子孫及祭酒等官進士恩榮宴永樂十三年上桌按酒燒煠四般寶粧茶食果子五般軟按酒五般菜四色湯三品雙下大饅頭羊肉飯酒五鍾上中桌按酒燒煠四般寶粧茶食果子四般軟按酒四般菜四色湯三品雙下饅頭羊肉飯酒五鍾天順元年每桌煠魚大銀錠堆花雙棒子骨寶粧雲子麻葉甘露餅大油餅鳳雞􅖷猪肉􅖷羊肉小銀錠笑靨兒椒醋猪肉椒末牛馬椒醋雞并魚湯三品果子五般小饅頭雙下大饅頭牛羊肉飯酒五鍾洪治三年上桌按酒五般果子五般寶粧茶食五般鳳鴨一隻小饅頭一楪小銀錠笑靨二楪棒子骨二塊羊背皮一個花頭二個湯五品菜四色大饅頭一分添換羊肉一楪酒七鍾上中桌按酒果子寶粧茶食各五般鳳鴨一隻小饅頭一楪小銀錠笑靨二楪煠魚二楪羊脚子飯二塊花頭二個湯五品菜四色大饅頭二分添換羊肉一楪酒七鍾中桌按酒果子茶食各五般甘露餅一楪小饅頭一楪小銀錠笑靨二楪煠魚二楪牛肉飯二塊花頭二個湯三品菜四色大饅頭二分添換羊肉一楪酒七鍾纂修宴武舉宴二宴與恩榮宴同但無中桌經筵酒飯母桌細茶食四楪饊子一楪果子五楪按酒五般㸃心一楪攢菜一楪湯三品菜四色飯一分酒六鍾日講酒飯每桌按酒五般湯三品菜四色飯一分酒五鍾隨桌酒一瓶殿試酒飯每桌茶食五楪果子五楪按酒五般㸃心一楪湯二品飯一分菜四色酒五鍾進士每名饅頭二個湯一椀禮部晩宴并早粥用鹿一隻猪二口羊三隻鵞十三隻熝猪肉八十觔粳米三斗火燻三腿雞蛋一百個荳腐五十連煑粥猪肉五觔油醋各二瓶醬六觔鹽十觔細粉五十觔花椒十兩七錢胡椒五兩香蕈姑各五兩香油六觔酒九十瓶文華殿讀卷官宴每桌茶食五楪果子五楪按酒五般㸃心二楪湯三品添換猪羊肉各五觔雞肉二觔半燒割猪羊肉各二觔鵝一觔菜四色酒二瓶吏部兵部選官酒飯每桌按酒五般小㸃心一楪蒸一楪飯一分湯三品兵部只二品酒三鍾吏部加午飯一頓朝貢見辭酒飯上桌茶食五般按酒五般果子五般湯飯一分酒三鍾中桌茶食按酒果子各四般湯飯一分酒三鍾管待番夷土官筵宴凡諸番國及四夷使臣土官人等進貢例有欽賜筵宴一次二次禮部預開筵宴日期奏請大臣一員待筵及行光祿寺備辦於㑹同館管待教坊司用樂鴻臚寺令通事及鳴贊供事儀制司領宴花人一枝若使臣數多分二日宴如遇禁屠齋戒移後三四日舉行囘還之日送官伴送沿途備辦飯食經過去處茶飯管待各有次數許鎮守總兵或三司或府衞正官二三員陪席朝鮮國筵宴二次宣德三年使臣囘還薊州永平府茶飯管待占城國琉球國𤓰哇國暹羅國各筵宴二次使臣囘還至廣東布政司茶飯管待一次哈密筵宴二次使臣囘還至良郷湯飯陜西布政司茶飯管待一次衞喇特筵宴二次正統間使臣進貢至大同茶飯管待一次囘還良鄉湯飯至眞定府陜西布政司甘肅各茶飯管待竒爾瑪勒筵宴二次正統間使臣囘還至眞定府陜西布政司甘肅各茶飯管待今例至良郷湯飯陜西布政司管待一次賽瑪爾堪筵宴二次永樂間使臣囘還至甘肅管待一次正統十二年使臣數少甘肅管待多則陜西布政司管待甘肅止送下程今例至良郷湯飯陜西布政司管待一次魯爾嘉靖五年奏准筵宴二次哈喇筵宴二次宣德七年使臣朝貢至潼闗陜西甘肅管待土魯番筵宴二次使臣還至良郷湯飯陜西布政司管待一次滿剌加國筵宴二次使臣囘至廣東布政司管待一次永樂間使臣囘經過府州管待正統間濟寧江西布政司廣東布政司管待宣德間國王朝貢廣東布政司并南雄贑州臨江淮安濟寧各府州茶飯管待至通州令行在光祿寺辦送茶飯接待日本國筵宴二次使臣囘還至寧波府管待一次宣德間使臣至通州湯飯令行在光祿寺辦送至濟寧州浙江布政司并寧波府茶飯管待錫蘭山國筵宴二次使臣囘至廣東布政司管待一次安南國諾延等衛以及雲南土官烏斯藏等處喇嘛番僧罕都衞養獅豹囘囘爉燭地面坤城地面日落國安定王鄂端地面長河西朶甘斯董卜韓胡金川寺雜谷安撫司打剌兒寨達思蠻長官司松潘茂州洮岷等處番僧各筵宴一次嘉靖二十二年題准安南都統使司差來人員不賜宴四十三年復題准照例筵宴和卓浡泥國竒爾瑪勒阿克蘓地靣㧞達克山和爾黙色國竒爾愛滿瑪拉噶拉爾干巴哈國柯枝國布斯格爾果勒國逹爾瑪納古爾諾爾布永樂間筵宴一次哈坦國色佛哷國天方國嘉裕爾國哈克達國喀什噶爾宣德間筵宴一次今例天方國加宴一次戎地面和囉海衞察遜衞竒木嘉色稜瑪摩回回蘓勒坦正統間筵宴一次齊勤蒙古衞天