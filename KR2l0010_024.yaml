body:
  text: 禮部志稿卷二十四明俞汝楫編儀制司職掌學校儒學國初兩京及中都俱設國子監天下府州縣俱設儒學其後裁中都國子監而各都司衛所亦有設學者今具列在外儒學事例於後而兩京國子監事例則各載於本衙門云選補生員洪武初令在京府學生員六十人在外府學四十人州學三十人縣學二十人日給廩膳聽於民間選補仍免其家差徭二丁二十年令增廣生員不拘額數二十五年奏準起取富民原係生員者送應天府學讀書永樂三年令起取人匠內有生員照例送應天府學宣德三年定增廣生員在京府學六十人在外府學四十人州學三十人縣學二十人照例優免差徭正統元年令生員名缺許本處官員軍民之家及社學俊秀無過犯子弟選補十二年奏準生員常額之外軍民子弟願入學者提調教官考選俊秀待補增廣名缺一體送考應試天順六年令廩膳有缺於增廣內考選學問優等者幫補𢎞治七年奏準廩膳有缺不許將别學增廣調補正德十年奏準都司衛所學原定一年一貢者與設優等次等生員各四十名原定三年二貢者與設優等次等生員各三十名原定二年一貢者與設優等次等生員各二十名通行提學官考補以後於優等內照例考選充貢有多餘者俱作附學不堪者不必取足嘉靖二年令增順天府廩膳生員二十名三年令增應天府學廩膳增廣生員順天府學增廣生員各二十名十一年奏準承天府學廩膳增廣生員六十名其鍾祥縣學生員亦照例通𨽻府學十五年詔各處學校廩膳生員有親老無人侍養願告侍親者聽親終復學其纍科不第年五十以上願告退閒者給與冠帶榮身仍免本身雜泛差徭凡衛學成化三年令衛學四衛以上軍生八十人三衛以上軍生六十人二衛一衛軍生四十人不及者不拘有司儒學軍生二十人嘉靖二十一年題準直𨽻金山衛學照福建平海衛學例添設廩膳二十名應給廩米華亭上海二縣出辦又題準貴州普定等十二衛各設廩膳生員二中名各該衙門通融處給廩米隆慶二年題準直𨽻各衛儒學原屬衛官提調者仍以本衛官提調惟季考生員及考選童生聽各該巡按御史定委通判等項文職官管理凡軍舍入學洪武二十七年令武官舍餘年十五以下許入府州縣學讀書宣德七年令衛所官舍軍餘俊秀者許入附近府州縣學聽本處鄉試景泰二年令雲南貴州軍民生相兼考補廩膳照例科貢三年令各處軍生許考補廩膳照例科貢凡土官入學成化十七年令土官嫡子許入附近儒學正德十六年奏準歸順土官子孫但經一次送順天府學食廩者不論事故及中式俱不許再補嘉靖二十六年題準歸順土官子孫照舊例送學食廩讀書萬厯四年題準廣西雲南四川等處凡改土為流州縣及土官地方建有學校者令提學官嚴加查試果係土著之人方準考充附學不許各處士民冒籍濫入學規洪武二年詔天下府州縣立學校學者專治一經以禮樂射御書數設科分教三年定學校射儀前期戒射定耦選職事充司正副司正司射司射器請射舉爵收矢執旗樹鵠陳設訖至日執事者入就位請射者引主射正官及各官員子弟士民俊秀者各就品位司射器者以弓矢置於各正官及司射前請射者詣正官前圓揖畢引詣司射器前受弓矢訖復位司正執算入立於中後請射者詣司射前曰請誘射引司射二人耦進各以三矢搢於腰帶之右以一矢挾於二指間推年齒相讓年長者為上射年幼者為下射上射先詣射位向鵠正之發矢司正書中投算置於中舉旗者如所射應之射畢退立於傍讓下射者詣位射訖請射者俱引復位收矢者收矢復於射者司正取所中算請射者次請士民俊秀射次請官員子弟射次請品卑至品髙者射其就射位發矢取算書中舉旗收矢復位皆如前儀既畢司正副司正各持算白中於主射正官舉爵者酌酒授中者飲之中的者三爵中采者二爵飲訖請射者請屬官以下仍捧弓矢納於司射器還主射正官前相揖而退六年令今後一應文字即用散文不許為四六誤後學十五年頒禁例於天下學校鐫勒卧碑置於明倫堂之左永為遵守一今後府州縣生員若有大事干於已家者許父兄弟姪具狀入官辨訴若非大事含情忍性毋輕至於公門一生員之室父母賢智者少愚癡者多其父母賢智者子自外入必有家教之方子當受而無違斯孝行矣何愁不賢者哉其父母愚癡者作為多非子既讀書得賢聖知覺雖不精通實愚癡父母之幸獨生是子若父母欲得非為子自外入或就內知則當再三懇告雖父母不從致身將及死地必欲告之使不陷父母於危亡斯孝行矣一軍民一切利病竝不許生員建言果有一切軍民利病之事許當該有司在野賢人有志壯士質朴農夫商賈技藝皆可言之諸人毋得阻當惟生員不許一生員內有學優才贍深明治體果治何經精通透徹年及三十願出仕者許敷陳王道講論治化述作文詞呈禀本學教官考其所作果通性理連僉其名具呈提調正官然後親齎赴京奏聞再行面試如果真才實學不待選舉即行録用一為學之道自當尊敬先生凡有疑問及聽講說皆須誠心聽受若先生講解未明亦當從容再問毋恃已長妄行辨難或置之不問有如此者終世不成一為師長者當體先賢之道竭忠教訓以導愚䝉勤考其課撫善懲惡毋致懈惰一提調正官務在常加考校其有敦厚勤敏撫以進學懈怠不律愚頑狡詐以罪斥去使在學者皆為良善斯為稱職矣一在野賢人君子果能練達治體敷陳王道有關政治得失軍民利弊者許赴所在有司告給文引親齎赴京面奏如果可采即便施行不許坐家實封入遞一民間凡有寃抑干於自己及官吏賣富差貧重科厚斂巧取民財等事許受害之人將實情自下而上陳告毋得越訴非干已事者不許及假以建言為繇坐家實封者前件如已依法陳告當該府州縣布政司按察司不為受理聽斷不公仍前寃枉者然後許赴京申訴一江西兩浙江東人民多有不干已事代人陳告者今後如有此等之人治以重罪若果近鄰親戚全家被人殘害無人申訴者方許一各處斷發充軍及安置人數不許進言其所管衛所官員毋得容許一若十惡之事有干朝政實蹟可驗者許諸人密切赴京回奏一前件事理仰一一講解遵守如有不遵竝以違制論二十四年令各處儒學每遇朔望有司官至日早詣學謁廟行香師生出大門外迎接行禮畢請至明倫堂師生作揖教官侍坐生員東西序立講書提調官考課畢退師生復送至大門外回學其别廟行香師生不必隨行如遇春秋祭祀迎接詔㫖師生仍依定例又令生員熟讀大誥律令歲貢時出題試之民間習讀大誥子弟亦令讀律又令教官人等務要依先聖先賢格言教誨後進使之成材以備任用敢有妄生異議鼓惑後生乖其良心者誅其本身全家遷發化外二十五年定禮射書數之法一朝廷頒行經史律誥禮儀等書生員務要熟讀精通以備科貢考試一遇朔望習射於射圃樹鵠置射位初三十步加至九十步每耦二人各挾四矢以次相繼長官主射射畢中的飲三爵中采二爵一習書依名人法帖日五百字以上一數務在精通九章之法永樂三年申明師生每日清晨升堂行恭揖禮畢方退晚亦如之生員㑹食肄業毋得出外遊蕩正統六年令提調官置簿列生員姓名又立為籖公暇揭取稽其所業提學官所至察提調勤怠以書其稱否其生員有姦詐頑僻藐視師長齟齬教法者悉斥退為民成化三年令提學官躬歷各學督率教官化導諸生仍置簿考驗其德行優文藝贍治事長者列上等簿或有德行而劣於經義或有經藝而短於治事者列二等簿經義雖優治事雖長而德行或缺者列三等簿歲課月考循序而上非上等不許科貢𢎞治十六年題準生員不拘廩增附學敢有傲慢師長挾制官府敗倫傷化結黨害人者本學教官具呈該管官員查究得實依律問罪合充吏者發本布政司衙門充吏役滿為民當差嘉靖十年題準生員內有刁潑無恥之徒號稱學霸恣意非為及被提學考校或訪察黜退妄行訕毁赴京奏擾者奏詞立案不行仍行巡按御史拿問十六年令士子文字敢有肆為怪誕不遵舊式者提學官即行革退廩饌洪武初令師生廩食月米六斗後復令日米一升魚肉鹽醋之類皆官給之十五年令廩饌月米一石正統元年令師生日逐㑹饌有司僉與膳府府學四名州學三名縣學二名𢎞治三年奏準膳夫每年歲出柴薪銀四兩以備㑹饌之用八年令膳夫每年歲出柴薪銀十兩若師生不行㑹饌有司失於供應聽提學官究治嘉靖十九年題準孔顏孟三氏教授司生員廩米兖州府通融處給隆慶六年議準劄行順天府將交趾歸順土官膳夫照例編給不許額外增編考法洪武二十七年令生員入學十年之上學無成效送部充吏其有成效及十年以下照依入學年月編次造冊解部以備取用其科舉歲貢亦照編次起送又令廩膳十年之上學無成效增廣年二十之上不通義理者皆充吏其託故僞訟革罷不應選者照卷追徵食過廩膳還官米數實收開繳戶部如數本生送吏部充吏二十九年令凡罷閒等項生員食糧年深以僞訟愚鈍等事革退者假父殘疾告回侍親者以富户技藝户倉腳夫起取户丁因而在京潜住者侍親親終及病痊制終不行入學者因愚鈍患病侍親等事經斷罷閒後以人才等項舉保為官者皆充吏不追糧凡在學讀書及在家丁憂病故者因父伯叔任軍官别無親男坐名起取襲職者告單丁重役及父母年老侍親者因父為事代父起解問發充軍者父兄叔姪當軍户內無丁告退者為手足殘疾耳目盲聾告退者為事充軍工役及以愚鈍犯法等故黜罷後為事充軍工役者為本支親屬極刑黜退者户內軍故勘合坐名勾補者皆免充吏不追糧永樂二年令增廣生員入學十年若年二十之上魯鈍不能行文者充吏宣德三年奏準巡按御史㑹布按二司并提調教官考試生員廩膳十年之上學無成效者發附近布政司直𨽻發附近府州充吏六年以下鄙猥無學者追還廩米為民正統元年令廩膳六年以上不諳文理者充吏增廣六年以上不諳文理者為民四年令生員以疾病罷黜者免追糧米有犯詿誤聽贖罪還學若犯姦盜詐僞挾制官府毆罵師長教唆詞訟說事過錢包占人財物田土等項廩膳追糧解京增廣附近軍民衙門俱贖罪充吏其犯受贓姦盜不分廩增照例運甎運炭納米擺站等項滿日發回原籍為民十年奏準提學官㑹布政司堂上官一員兩直𨽻㑹巡按御史公同提調教官考選生員年四十以上不諳文理者廩膳十年以上送吏部六年以上送附近布政司增廣十年以上送本布政司兩直𨽻送本府俱充吏六年以上并鄙猥殘疾者悉黜為民雲南貴州免考十四年今生員有犯該發充吏者廩膳免追糧米若犯受贓姦盜冒籍宿娼居喪娶妻妾事理重者兩直𨽻發充國子監膳夫各布政司充鄰近儒學膳夫齊夫滿日原籍為民廩膳仍追廩米天順五年令各處㑹官考選廩膳未及六年考不中者追廩為民六年令生員爭貢及越訴者俱充吏是年定敕諭以後奉以從事成化九年奏準北直𨽻考退生員免追廩米風憲官提督正統元年奏準各處添設按察司副使或僉事一員南北直𨽻監察御史各一員請敕專一提督學校十年令提學官遍詣所屬學校嚴加考試提督生徒學業務見實效有不職者禮部都察院堂上官詢察具奏罷黜景泰元年革罷提學風憲官聽巡按御史各司府州縣官提督考察又令按察司分巡各道副使僉事照依提學官先奉敕書事理提督兩直𨽻御史提督天順六年復設各處提督學校官各賜敕諭一學者讀書貴乎知而能行先將聖賢經書熟讀背誦牢記不忘却從師友講解明白俾將聖賢言語體而行之敦尚孝弟忠信禮義廉恥之行不許徒務口耳之學將來朝廷庶得真才任用一為學工夫必收其放心主敬窮理毋得鹵莽間斷其餘修已治人之方義利公私之辨須要體認精切庶幾趨向不差他日出仕方能顧惜名節事業可觀一習學舉業亦窮理之事果能精通四書本經便㑹行文有等生徒不肯實下工夫惟記誦舊文意圖僥幸出身今宜痛革此弊其所作四書經義䇿論等文務要典實平順說理詳明不許浮誇怪誕至於習字亦須端楷庶不乖教養之意一學效無成皆由師道不立今之教官賢否不齊先須察其德行考其文學果所行所學皆善須禮待之若一次考驗學問疏淺及怠於訓誨者姑戒厲之令其進學改過若再考無進不改送吏部别用其貪淫不肖實跡彰聞者不必考其文學即送按察司直𨽻送巡按御史問理吏部别選有學行者補其缺一師生每日坐齊讀書及日逐㑹饌有司僉與齊夫膳夫府學膳夫四名齊夫八名州學膳夫三名齊夫六名縣學膳夫二名齊夫四名不許違誤缺役一生員考試不諳文理者廩膳十年以上發附近去處充吏六年以上發本處充吏增廣十年以上發本處充吏六年以上罷黜為民未及六年者量加決罰勉勵進學一生員之家竝依洪武年間例除本身外户內優免二丁差役有司務要遵行不許故違一凡巡視學校水路乘驛舟陸路乘官馬仍於本司帶書吏一名隨行陸路與官驢俱支廩給一府州縣提調官員宜嚴束生徒不許出外遊蕩為匪凡學內殿堂齊房等屋損壞即辦料量工修理若恃有提督憲職將學校中一切合行之事推故不行用心整理者量加決罰懲戒一所過之處遇有軍民利病及不才官吏貪酷害人事干奏請者從實奏聞一本職專督學校不理刑名如有軍民人等訴告寃枉等事許受詞狀輕則發下所在有司問理重則送按察使司直𨽻送巡按御史提問一科舉本古者鄉舉里選之法今南北所取舉人名數已有定制近年奔競之徒利他處學者寡少往往赴彼投充增廣生員詐冒鄉貫隱微過惡一槩應試所在教官僥幸以為已功其弊滋甚今後不許違者聽本職及提調科舉官監試官拿問一布政司按察司官及巡按御史不許侵越提督者職事若以公務至府州縣亦當勉勵師生勤力學業不許推故不理若提督官行止不端許巡按監察御史指實奏聞一所轄境內遇有衛所學校一體提調整理武職子弟悉令其習讀武經七書百將傳及操習武藝其中有能習舉業者亦聽科舉一各處歲貢生員照例將食糧年深者嚴加考試不必㑹官如果年深不堪充貢就便照例黜罷却將以次者考充務要通曉文理方許起送赴部一廩膳增廣生員已有定額廩膳有缺於增廣內考選學問優等者幫補增廣有缺於本處官員軍民之家選擇資質聰敏人物俊秀子弟補充不許聽信有司及學官徇私作弊若有額外之數須嚴加考選通曉文義者存留待缺不許將不堪者一槩存留躲避差徭一古者鄉閭里巷莫不有學即今社學是也凡提督去處即令有司每鄉每里俱設社學擇立師範明設教條以教人之子弟年一考校擇取勤效仍免為師之人差徭一師生於學校一切事務竝要遵依洪武間卧碑行不許故違成化六年令貴州按察司分巡官兼理本處學校𢎞治十七年令提學官有徇情將老疾鄙猥之人濫容在學及克貢者參究黜罷正德十年給各按察司提督學校官關防又令口外衛學并各都司衛所土官學離本布政司窵遠提督官不能歲歷者許各道分巡官歲加考校行提學官知㑹嘉靖十六年題準大同所屬府州縣衛所儒學生員俱令冀北道分巡官代理今宣大俱今巡按御史帶管二十六年議準甘肅各衛所儒學生員行甘肅巡按御史帶管提調遇該科舉之年聽考送陜西布政司應試萬厯三年換給提學官敕諭一聖賢以經術垂訓國家以經術作人若能體認經書便是講明學問何必又别標門户聚堂空談今後各提學官督率教官生儒務將平昔所習經書義理著實講求躬行實跡以需他日之用不許别創書院羣聚徒黨及號召地方遊食無行之徒空談廢業因而起奔競之門開請託之路違者提學官聽巡按御史劾奏遊食人拿問解發一孝弟廉讓乃士子立身大節生員中有敦本尚實行誼著聞者雖文藝稍劣亦必量加奬進以厲頽俗若有平日不務學業囑託公事或揑造謡歌興滅詞訟及敗倫傷化過惡彰著者體訪得實不必品其文藝即行革退不許徇情姑息亦不許輕信有司教官開送致被挾私中傷誤及善類一我聖祖設立卧碑天下利病諸人皆許直言惟生員不許今後生員務遵明禁除本身切已事情許家人抱告有司從公審問倘有寃抑即為照雪其事不干已輒便出入衙門陳說民情論官員賢否許該管有司申呈提學官以行止有虧革退若糾衆扛幫聚至十人以上罵詈官長肆行無禮為首者照例問遣其餘不分人數多少盡行黜退為民一國家明經取士說書者以宋儒傳注為宗行文者以典實純正為尚今後將頒降四書五經性理大全資治通鑑綱目大學衍義歷代名臣奏議文章正宗及當代誥律典制等書課令生員誦習講解俾其通曉古今適於世用其有剽竊異端邪說炫奇立異者文雖工弗録所出試題亦要明白正大不得割裂文義以傷雅道一提學官奉敕專督學校不許借事枉法奔趨撫按官干求薦舉各撫按二司官亦不許侵伊職掌行事若有不繇提學官考取徑自行文給與生儒衣巾及有革退生員赴各衙門告訴復學者即將本生問罪革黜若提學官有行止不端怠玩曠職者許巡按御史指實劾奏一該管地方每年務要巡視考校一遍不許移文代委及於隔别府分調取生儒以致跋涉為害亦不許令師生匍匐迎送考畢即於本地方發落明示賞罰不許攜帶文卷於别處發案致令書吏乘問作弊士子無所勸懲亦不許招邀詩朋酒友遊山玩水致啓幸門妨廢公務其水陸夫馬廩給隨帶吏書俱照常一提學官巡歷所屬凡有貪汚官吏軍民不法重情及教官干犯行止者原係憲司理當拿問但不許接受民詞侵官喜事其生員犯罪或事須對理者聽該管衙門提問不許護短曲庇致令有所倚恃抗拒公法一廩膳增廣舊有定額逮後增置附學名目冒濫居多今後歲考務要嚴加較閲如有荒疏庸耄不堪作養者即行黜退不許姑息有揑造流言思逞報復者訪實拿問照例發遣童生必擇三場俱通者始收入學大府不過二十人大州縣不得過十五人十一年題如人才衆多地方就試人衆許酌量增取但不許徇情過濫見後如地方乏才即四五名亦不為少若鄉宦勢豪干託不遂暗行中傷者許徑自奏聞處治一兩京各省廩膳科貢皆有定額近來有等姦徒利他處人才寡少往往許冒籍貫投充入學及有詭寫兩名隨處告考或假揑士夫子弟希圖進取或原係倡優𨽻卒之家及曽經犯罪問革變易姓名援例納粟納米等項僥幸出身殊壞士習訪出嚴行拿問革黜若教官納賄容隱生員扶同保結者一體治罪革罷一府州縣提調官員宜嚴束生徒按季考校凡學內殿堂齊房等屋損壞即辦料量工修理其齊夫膳夫學糧學田等項俱要以時撥給不許遲誤尅減一生員之家依洪武年間例除本身外户內優免二丁差役一生員考試不諳文理者廩膳十年以上發附近去處充吏六年以上者發本處充吏增廣十年以上發本處充吏六年以上者罷黜為民一儒學教官士子觀法所係按臨之日考其學行俱優者禮待奬勵其行履無過但學問疏淺者一次考驗姑行戒飭再考無過送吏部别用有老病不堪者許令以禮致仕若卑汚無恥素行不謹者不必試其文學即拿送按察司問革一考貢照近日事例每歲預將次年應貢生員限年六十以下三十以上屢經科舉者六人嚴加考選取其優者充貢後題準考貢止用一正一陪見歲貢條定限次年四月到部聽候廷試文理不通者即行停降年老衰憊者姑授以冠帶榮身不許俱挨次濫貢其有停廩降廩者必考居一二等方許收復十二年題準停廩降廩者考居三等亦準復未收復者不許起送應貢如有濫貢及廷試發回五名以上提學官照例降調一補貢有缺務查人文未經到部果在一年以裏者將原給批咨硃卷追繳方取年力精壯文學優長者一人補貢定限該貢年分次年到部方準收考如有不遵舊例將年遠貢缺濫貢市恩者起送到部即將本生發回革廩肄業提學官參究一遇鄉試年分應試生儒名數各照近日題準事例每舉人一名取科舉三十名此外不許過多一名兩京監生亦依解額照數起送有多送一名者各監試官徑行裁革不許入場一名宦鄉賢孝子節婦及鄉飲禮賓皆國之重典風教所關近來有司忽於教化學校是非不公濫舉失實激勸何有今後提學官宜以綱常為己任遇有呈請務須核真非年久論定者不得舉鄉賢名宦非終始無議者不得舉節婦孝子非鄉里推服者不得舉鄉飲賓僎如有妄舉受人請求者師生人等即以行止有虧論其從前冒濫混雜有玷明典者照近例徑自查革一所轄境內有衛所學校一體提調整理武職子弟悉令習讀武經七書百將傳及操習武藝有願悉舉業者聽社學師生一體考校務求名師責成量免差役其行止有虧及訓詁句讀書韻差謬字畫不端不通文理者即行革退四年令各處鄉試畢日吏部㑹同禮部將各提學官從公考察分别等第優異降調有差六年題準南直𨽻廬鳳淮揚四府滁徐和三州學校以江北巡按兼之湖廣衡永二府郴州以上湖南道副使兼之辰州一府靖州以辰沅道副使兼之廣東瓊州府以海南道副使兼之各請專敕行事每歲巡歷考校十年題準鄉試後提學官考察停止十一年題准各提學每歲考校一次入學務要不失原額間有他故巡歷不周次年即行如數補足雖係科舉之年亦宜照歲考例總計三年之內大府務足六十人大州縣務足四十五人其地方果係科目數多就試人衆則於定額之外量加數名但不許倍於原數如乏才之處亦毋得因而一槩取盈又令南直𨽻提學御史仍兼管江北湖廣貴州提學官照舊專管該省惟瓊州府仍屬海南道社學洪武八年詔有司立社學延師儒以教民間子弟十六年詔民間立社學有司不得干預其經斷有過之人不許為師二十年令民間子弟讀御製大誥又令為師者率其徒能誦大誥者京禮部校其所誦多寡次第給賞又令兼讀律令正統元年令各處提學官及司府州縣官嚴督社學不許廢弛其有俊秀向學者許補儒學生員成化元年令民間子弟願入社學者聽其貧乏不願者勿强𢎞治十七年令各府州縣建立社學訪保明師民間幼童年十五以下者送入讀書講習冠婚喪祭之禮鄉飲酒禮洪武初詔中書省詳定鄉飲酒禮條式使民歲時燕㑹習禮讀律期於申明朝廷之法敦叙長幼之節遂為定制云洪武五年定在內應天府及直𨽻府州縣每歲孟春正月孟冬十月有司與學官率士大夫之老者行於學校在外行省所屬府州縣亦皆取法於京師其民間里社以百家為一㑹糧長或里長主之百人內以年最長者為正賓餘以齒序坐每季行之於里中若讀律令則以刑部所編申明戒諭書兼讀之其武職衙門在內各衛親軍指揮使司及指揮使司凡鎮守官每月朔日亦以大都督府所編戒諭書率僚佐讀之十六年頒行圖式一各處府州縣每歲正月十五日十月初一日於儒學行鄉飲酒禮酒肴於官錢約量支辦務要豐儉得宜除賓僎外衆賓序齒列坐其僚屬則序爵前一日執事者於儒學之講堂依圖陳設坐次司正率執事習禮至日黎明執事者宰牲具饌主席及僚屬司正先詣學遣人速賓僎以下比至執事者先報曰賓至主席率僚屬出迎於庠門之外以入主居東賓居西三讓三揖而後升堂東西相向立贊兩拜賓坐執事又報曰僎至主席又率僚屬出迎揖讓升堂拜坐如前儀賓僎介至既就位執事者唱司正揚觶執事者引司正繇西階升詣堂中北向立執事者唱賓僎以下皆立唱揖司正揖賓僎以下皆報揖執事者以觶酌酒授司正司正舉酒曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭內睦宗族外和鄉里無或廢墜以忝所生讀畢執事者唱司正飲酒飲畢以觶授執事執事者唱揖司正揖賓僎以下皆報揖司正復位賓僎以下皆坐唱讀律令執事者舉律令案於堂之中引禮引讀律令者詣案前北向立唱賓僎以下皆拱立行揖禮如揚觶儀然後讀律令有過之人俱赴正席立聽讀畢復位執事者唱供饌案執事者舉饌案至賓前次僎次介主三賓以下各以次舉訖執事者唱獻賓主起席北面立執事斟酒以授主主受爵詣賓前置於席稍退贊兩拜賓答拜訖執事者又斟酒以授主主受爵詣僎前置於席交拜如前儀畢主退復位執事者唱賓酬酒賓起僎從之執事者斟酒授賓賓受酒詣主前置於席稍退贊兩拜賓僎主交拜訖各就位坐執事者分左右立介三賓衆賓以下以次斟酒於席訖執事者唱飲酒或三行或五行供湯又唱斟酒飲酒供湯三品畢執事者唱徹饌案訖唱賓僎以下皆行禮僎主僚屬居東賓介三賓衆賓居西贊兩拜訖唱送賓以次下堂分東西行仍三揖出庠門而退一里社每歲春秋社祭㑹飲畢行鄉飲酒禮所用酒肴於一百家內供辦毋致奢靡百家內除乞丐外其餘但係年老者雖至貧亦須上坐少者雖至富必序齒下坐不許攙越違者以違制論其有過犯之人雖年長財富須坐於衆賓席末聽講律受戒諭供飲酒畢同退不許在衆賓上坐如有過犯之人不行赴飲及强坐衆賓之上者即係頑民主席及諸人首告遷徙邊遠住坐其主席者及衆賓推讓有犯人在上坐同罪其各里社以百家為一㑹百家之內以里長主席其餘百人選年最髙有德人所推服者一人為賓其次一人為介其餘各依年序齒坐如有鄉人為官致仕者主席請以為僎擇通文學者一人為揚觶一人為讀律二人為贊禮前期一日主詣賓門賓出迎大門之外肅主以入至中堂主賓相揖訖主稍前曰某日行鄉飲酒禮吾子年髙德邵敢請為賓曰某固陋恐辱命敢辭主曰詢諸衆莫若吾子賢敢固請賓曰夫子申命之某不敢辭主再拜賓答拜介亦如之但改請吾子為介執事者設賓席於堂中稍西南向設主席之堂東南西向賓六十以上者席於堂中上兩序東西相向如賓多年幼者席於堂下阼階之南北面西上是日清晨賓及衆賓皆至門外主出迎西向揖賓東向答揖主先入門而右賓入門而左至階主揖賓賓揖主主先升自東階賓升自西階至中堂主西向立賓東向立贊禮唱拜興二主賓皆兩拜主肅賓各就位贊禮唱揚觶揚觶者舉觶酌酒詣中堂北向立贊禮唱在坐皆起賓主以下皆起拱立揚觶者乃揚觶而揚言曰與前同畢唱揖揚觶者揖主賓以下皆揖揚觶者遂飲酒訖復揖主賓以下皆揖以爵授執事者復位賓主以下皆坐贊禮唱讀律執事者設案於堂中次引讀律者詣案前贊禮唱在坐者皆揖唱讀律者揖賓主以下皆立遂展律於案詳緩讀之訖復以申明聖諭讀之畢贊禮唱揖讀律者揖賓主以下皆揖讀律者復位贊禮唱衆皆坐賓主以下皆坐執事者供饌案行酒贊禮唱飲酒衆賓皆飲或五行或七行禮同前食畢徹案贊禮唱禮畢主先行而西向立贊禮引賓以下東向立贊拜興拜興主賓皆兩拜主送賓於門外東西相揖乃退明日賓介僎衆賓詣主家拜謝鄉飲之賜主出門外拜為辱屈昨日之來一鄉飲之設所以尊髙年尚有德興禮讓敢有喧譁失禮者許揚觶者以禮責之其或因而致爭競者主席者㑹衆罪之十八年大誥天下鄉飲酒禮叙長幼論賢良别姦頑異罪人其坐席間髙年有德者居於上髙年淳篤者竝之以次序齒而列其有曽違條犯法之人列於外坐同類者成席不許於與良善之席主者若不分别致使貴賤混淆察知或坐中人發覺罪以違制姦頑不繇其主紊亂正席全家移出化外二十二年再定圖式凡良民中年髙有德無公私過犯者自為一席坐於上等有因户役差稅遲誤及曽犯公杖私笞招犯在官者又為一席序坐中門之外其曽犯姦盜詐僞說事過錢起滅詞訟蠧政害民排陷官長及一應私杖徒流重罪者又為一席序坐於東門之內執壺供事各用本等之家子弟務要分别三等坐次善惡不許混淆其所行儀注竝依原頒定式如有不遵圖序坐及有過之人不行赴飲者以違制論主官知府知州州縣知縣如無正官佐二官代位於東南大賓以致仕官為之位於西北僎賓擇鄉里年髙有德之人位於東北介以次長位於西南三賓以賓之次者為之位於賓主介僎之後司正以教職為之主揚觶以罰贊禮者以老成生員為之𢎞治十七年題準今後但遇鄉飲酒延訪年髙有德為衆所推服者為賓其次為介如本縣有以禮致仕官員主席請以為僎不許視為虛文以致貴賤混淆賢否無别如違該府具呈巡按御史徑自提問依律治罪旌表國初凡有孝行節義為鄉里所推重者據各地方申報風憲官核實奏聞即與旌表其後止許布衣編民委巷婦女得以名聞其有官職及科目出身者俱不與焉洪武元年令凡孝子順孫義夫節婦志行卓異者有司正官舉名監察御史按察司體核轉達上司旌表門閭又令民間寡婦三十以前夫亡守制五十以後不改節者旌表門閭除免本家差役二十一年榜示天下本鄉本里有孝子順孫義夫節婦及但有一善可稱者里老人等以其所善實跡一聞朝廷一申有司轉聞於朝若里老人等已奏有司不奏者罪及有司此等善惡每遇監察御史及按察司分巡到來里老人等亦要報知以憑核實入奏二十六年定禮部據各處申來孝子順孫義夫節婦理當旌表之人直𨽻府州咨都察院差委監察御史核實各布政司所屬從按察司核實著落府州縣同里甲親鄰保勘相同然後明白奏聞即行移本處旌表門閭以勵風俗二十七年詔申明孝道凡割股或至傷生卧氷或至凍死自古不稱為孝若為旌表恐其倣效通行禁約不許旌表又奏準天下軍民衙門將已經旌表軍民孝子節婦於所在旌善亭附內寫行孝守節緣繇其未經旌表果係義夫節婦孝子順孫卓異者不拘軍民人等一體保勘申報天順元年詔民間同居共爨五世以上鄉黨稱其孝友者有司取勘以聞即為旌表成化元年奏準凡旌表貞節孝行里老呈告到官掌印官親自研審坐令有職官關保備開實跡具奏禮部行勘核實類奏旌表如有扶同妄將夫亡時年已三十以上及寡居未及五十婦人增減年甲舉保者被人首發或風憲官核勘得出就將原保各該官吏里老人等通行治罪正德六年令近年山西等處不受賊汚貞烈婦女已經撫按查奏者不必再勘仍行有司各先量支銀三兩以為殯葬之資仍於旌善亭傍立貞烈碑通將姓氏年籍鐫石以垂永久十三年令軍民有孝子順孫義夫節婦事行卓異者有司具實奏聞不許將文武官進士舉人生員吏典命婦人等例外陳請嘉靖二年奏準今後天下文武衙門凡文職除進士舉人係貢舉賢能已經豎坊表宅及婦人已受誥敕封為命婦者仍照前例不準旌表外其餘生員吏典一應人等有孝子順孫義夫節婦志行卓異足以激勵風化表正鄉閭者官司仍具實跡以聞一體旌表又奏準今後節婦但係風憲官核實到部雖有病故者亦準類奏旌表三年詔孝子順孫義夫節婦已旌表年及六十者孝子冠帶榮身節婦照八十以上例給賜絹帛米肉嘉靖十年題準孝子順孫義夫節婦有司勘實具奏者免其覆勘徑行風憲官核實若係風憲官已核實具奏者徑候季冬類奏旌表四十二年議準命婦守節例不題請止行所屬以禮存問仍加周恤其戶下優免與品官相同隆慶三年奏準孀婦夀至百歲者照例旌表為貞夀之門印信國初設鑄印局専管鑄造內外諸司印信其後又有鑄換辦驗及儒士食糧冠帶等俱具列於後而以印信制度附之洪武二十六年定凡開設各處衙門合用印信劄付鑄印局官依式鑄造給降其有改鑄銷毁等項悉領之弘治三年奏準鑄印局儒士食糧三年役滿不願外補者咨送吏部冠帶仍舊食糧辦事候有本局員缺奏補十三年奏準兩京兵部并在外巡撫巡按按察司㸃視各衛所印信如有軍職將印當錢使用印者帶俸差操十四年議準在外大小衙門印記年久印面平乏篆文模糊者方許申知上司驗實具奏鑄換新印其舊印送上司付公差人員繳部仍發鑄印局看驗若印記新降未久揑奏煩擾雖已鑄換仍將申奏官吏治罪嘉靖八年題準鑄印局官儒今後應造印記關防專以洪武正韻為主正韻不載方取許氏說文二書無從查考者方將先儒著述六書等書參考十六年題準鑄印局增食糧儒士二名連額設共四名印信制度征西鎮朔平羌平蠻等將軍銀印虎鈕方三寸三分厚九分柳葉篆文宗人府五軍都督府俱正一品銀印三臺方三寸四分厚一寸六部都察院并在外各都司俱正二品銀印二臺方三寸二分厚八分衍聖公張真人中都留守司俱正二品各布政司從二品銀印二臺方三寸一分厚七分景泰三年賜衍聖公三臺銀印順天應天二府俱正三品銀印方二寸九分厚六分五釐通政司大理寺太常寺詹事府及京衛并在外各按察司各衛俱正三品苑馬寺宣慰司俱從三品銅印方二寸七分厚六分太僕寺光祿寺并在外各鹽運司俱從三品銅印方二寸六分厚五分五釐鴻臚寺并在外各府俱正四品國子監并在外宣撫司俱從四品銅印方二寸五分厚五分翰林院左右春坊尚寶司欽天監太醫院上林苑監六部各司宗人府經歷司并在外各王府長史各衛千戶所俱正五品司經局五府經歷司并在外招討司安撫司俱從五品銅印方二寸四分厚四分五釐在外各州從五品銅印方二寸三分厚四釐都察院經歷司大理寺左右寺五城兵馬司大興宛平上元江寧各京縣及僧録司道録寺并在外中都留守司經歷司斷事司各都司經歷司斷事司各衛百户所長官司及各王府審理所俱正六品光祿寺大官等署并在外各布政司經歷司理問所俱從六品銅印方二寸二分厚三分五釐吏科等六科行人司通政司經歷司工部營繕所太常寺典簿㕔上林苑監蕃育等署并在外各按察司經歷司各縣俱正七品中書舍人順天應天府經歷司京衛經歷司光祿寺典簿㕔太僕寺詹事府各主簿㕔并在外各衛經歷司鹽運司經歷司苑馬寺主簿㕔宣慰司經歷司俱從七品銅印方二寸一分厚三分户部刑部都察院各照磨所兵部典牧所國子監繩愆㕔博士㕔典簿㕔鴻臚寺欽天監各主簿㕔并在外各布政司照磨所各府經歷司及各王府紀善典寶典膳奉祀良醫工正各所宣撫司經歷以上正從八品俱銅印方二寸厚二分五釐刑部都察院各司獄司順天應天二府照磨所司獄司鴻臚寺司儀署司賓署國子監典簿㕔上林苑監典簿㕔內府寶鈔等各庫御馬倉草倉㑹同館織染所文思院皮作局顏料局鞍轡局寶源局軍器局都稅等司教坊司并在外留守司司獄司各都司司獄司各按察司照磨所司獄司各府照磨所司獄司及各王府長史司典簿㕔教授典儀所各府衛儒學稅課司陰陽學醫學僧綱司道紀司及巡檢司以上正從九品俱銅印方一寸九分厚二分二釐各州縣儒學倉庫驛遞閘壩批驗所抽分竹木局河泊所織染局稅課司陰陽學醫學僧道司俱未入流銅條記濶一寸三分長二寸五分厚二分一釐以上俱直鈕九疊篆文監察御史銅印直鈕有眼方一寸五分厚三分八疊篆文總制總督巡撫等項并鎮守及凡公差官銅關防直鈕濶一寸九分五釐長二寸九分厚三分九疊篆文文淵閣銀印直鈕方一寸七分厚六分王箸篆文宣德年賜惟進呈文字等項用之建言按祖訓大小官員并百工技藝之人應有可言之事許直至御前奏聞其言當理即付所司施行諸衙門毋得阻滯違者即同姦論所以廣耳目防壅蔽而通下情也纍朝以來亦有驀越報復之禁具載於後洪武九年頒建言格式使言者直陳得失無事繁文十五年令軍士建言者所日用印實封入遞奏聞本人不必赴京永樂元年令凡利國利民之事不拘百工技藝之人皆許具實敷奏若官吏人等貪贓壞法顛倒是非酷虐良民及婚姻田土軍役等事一體職掌榜文內事理具狀自下而上陳告如有假以實封建言驀越合干上司徑赴朝廷干冒者治以重罪八年令布政司按察司進表官陳奏軍民利病政治得失十三年令凡軍民利病及貪汚吏作弊害民者許諸人具實奏聞景泰四年令建言者該衙門詳細參看果有利國利民可行則行有假以言事報復讐怨者具奏治罪近例凡天下官吏軍民人等建言民情每歲禮部㑹官議定可否具奏內可行者移各該衙門施行若泛言不切立案不行其撫按等官陳奏地方利弊則從各衙門職掌覆奏定奪㑹議洪武二十四年令今後在京衙門有奉㫖發放為格為例及緊要之事須㑹多官計議停當然後施行又令各衙門㑹議事六科給事中與議若有衆論不同許面奏定奪宣德三年奏準官民建言六部尚書都御史六科給事中㑹議奏聞正統十年命內閣官與各衙門㑹議後免㑹正德六年奏準凡事機重大㑹官議擬先備揭帖送該議官人各一本如緊急亦將略節先送傳看畢方才請㑹仍行守衛嚴禁在傍觀聽者近例凡朝廷有大事當㑹别部或㑹九卿堂上官及掌科掌道官議者該部奏請得旨然後請㑹若合㑹武臣則五府管事官皆與合㑹儒臣則翰林院詹事府春坊司經局國子監皆與若刑名則錦衣衛與若大事則皇親駙馬皆與其奉㫖㑹某衙者如㫖施行節假凡每歲正旦節自初一日為始文武百官放假五日冬至本日為始放假三日永樂七年令元宵節自正月十一日為始賜百官節假十日養老國初養老令貧者給米肉富者賜爵惟及于編民天順以後始令致仕官七十以上者皆得給酒肉布帛或進階其大臣八十九十者特賜存問蓋古者尊髙年養國老之遺意今竝列於後洪武九年詔民年七十以上者許一丁侍養與免雜泛差役十九年詔所在有司審耆老不係𨽻卒倡優年八十九十鄰里稱善者備其年甲行實具狀奏聞貧無産業者八十以上月給米五斗肉五斤酒三斗九十以上歲加給帛一匹絮五斤雖有田産僅足自贍者所給酒肉絮帛亦如之其應天鳳陽二府富民年八十以上賜爵里士九十以上賜爵社士皆與縣官平禮竝免雜差正官歲一存問著為令永樂十九年詔民年八十以上有司給與絹二匹布二匹酒一斗肉十斤時加存恤二十二年令民年七十以上及篤廢殘疾者許一丁侍養不能自存者有司賑給八十以上者仍給絹二匹綿二斤酒一斗時加存問天順二年詔軍民有年八十以上者不分男婦有司給絹一匹綿一斤米一石肉十斤年九十以上者倍之男子百歲加與冠帶榮身又詔四品以上官年七十以禮致仕不能自存者有司歲給米五石八年詔凡民年七十以上者免一丁差役有司每歲給酒十瓶肉十斤八十以上者加與綿二斤布二匹九十以上者給與冠帶每歲設宴待一次百歲以上給與棺具成化二十三年詔在京文職以禮致仕五品以上年及七十者進散官一階其中廉貧不能自存衆所共知者有司仍每歲給與食米四石不許徇情濫給𢎞治十八年詔文職官員五品以上以禮致仕在家者各進階一級其二品以上大臣年及八十者有司備采幣羊酒年九十以上者具奏遣使存問嘉靖元年詔文職致仕一品未受恩典者有司月給食米二石歲撥人夫二名應用二品以上年及八十者備采幣羊酒問勞九十以上者具實奏來遣使存問五品以上以禮致仕年七十以上者進散官一階其中廉貧不能自存衆所共知歲給米四石以資養贍又詔內外大小文武官員人等死於忠諫老親寡妻無人侍養者有司量加優恤恤孤寡國初立養濟院以處無告立義塜以瘞枯骨纍朝推廣恩澤又有惠民藥局漏澤園幡竿蠟燭二寺其餘隨時給米給棺之令不一而足兹備列之洪武初令天下置養濟院以處孤貧殘疾無依者三年令民間立義塜仍禁焚尸若貧無地者所在官司擇近城寬閒之地立為義塜十九年詔所在鰥寡孤獨取勘明白田糧未曽除去差撥者即與除去若不能自養官歲給米六石其孤兒有田不能自立既免差役責令親戚收養無親戚鄰里養之其無田者一體給米六石候出幼同民當差宣德三年令天下軍民貧病者惠民藥局給與醫藥天順元年令收養貧民於大興宛平二縣每縣設養濟院一所於順便寺觀從京倉支米煮飯日給二餐器皿柴薪蔬菜之屬從府縣設法措辦有疾者撥醫調治死者給與棺木四年令京城崇文宣武安定東直西直阜城門外各置漏澤園仍令通州臨清沿河有遺胔暴露者一體掩藏嘉靖六年詔在京養濟院止收宛大二縣孤老各處流來男婦篤廢殘疾之人工部量出官錢於五城地方各修蓋養濟院一區盡數收養户部於在官倉庫每人日給米一升巡城御史稽考毋得虛應故事又令巡城御史行各城地方有在街啼號乞丐者審屬民籍送順天府發養濟院屬軍衛送幡竿蠟蠋二寺給濟外處流來三百里內者驗發本貫官司收養三百里外及不能行走者一體送二寺給濟每季輪差兵馬副指揮一員看驗飯食有無弊端隨同內官給散十日一次開報查考并行南京禮部一體施行十一年詔順天府發銀二百七十五兩於五城市故衣給民無衣者自宫禁永樂二十二年令凡自宫者以不孝論軍犯罪及本管頭目總小旗民犯罪及有司里老宣德二年令凡自淨身者軍還原伍民還原籍不許投入王府及官員勢要之家隱藏躲避差役若再犯者本犯及隱藏之家俱處死該管總小旗里老鄰人知而不舉一體治罪正統十二年令凡自首在官閽者送海南子種菜其隱瞞不首及再擅淨身并私收使用者事發全家發遼東充軍天順二年令淨身者拿問邊遠充軍成化九年令私自淨身希求進用者本身處死全家發烟瘴地面充軍十五年令淨身人巡城御史錦衣衛官督同五城兵馬逐回原籍若該城內外容留潜住者并火甲鄰佑人等一體究治本身枷號一箇月滿日決打一百押回如再來京并家下父兄人等俱治罪二十二年令各王府非奉朝廷明文擅收淨身人俱發回原籍收管不許投託容隱𢎞治元年令錦衣衛拘審淨身人送順天府遞回原籍官司五日一㸃閘不在者即杖併户頭追回見官不許容縱五年令私自淨身者本身并下手之人處斬全家發邊遠充軍兩鄰及歇家不舉者同罪有司里老容隱者一體治罪十三年奏準先年淨身人曽經發遣若不候朝廷收取官司明文起送私自來京圖謀進用者問發邊衛充軍正德九年令直𨽻順天等府山東河南等布政司地方再有私自淨身者照例本身并下手之人處死全家發邊遠充軍其先已淨身者立籍㸃閘不使私自逃至京師擾害官府二年令違例私自淨身人著錦衣衛五城兵馬著落該地方盡數逐去如有潜躲在京者拿住殺了九年令今後再有私自淨身者除小幼無知者本身免死充軍其餘俱照見行事例本身并主使下手之人處斬全家發邊遠充軍里老鄰佑及本管官不行舉察者各從重治罪十六年詔私自淨身人在京潜住希圖收用著緝事衙門巡城御史訪拿究問今後敢有私自淨身者本身并下手之人處斬全家發烟瘴地面充軍兩鄰及歇家不舉首者治罪嘉靖八年奏準凡海子食糧淨身男子分别老壯造冊禮部備查各處王府并將軍中尉數目將年壯者勘酌多寡𣲖去各府供役不堪選用者給與印信文票發回原籍官司收恤免其本身差役萬厯十一年奏準小民犯禁私割致傷和氣著都察院行五城御史及通行各省直撫按衙門嚴加禁約自今五年以後民間有四五子以上願以一子報官閹割者聽有司造冊送部候收補之日選用如有私割者照例重治鄰佑不舉者一併治罪不宥禮部志稿卷二十四
