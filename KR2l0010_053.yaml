body:
  text: 禮部志稿卷五十三明俞汝楫編列傳尚書倪嶽倪嶽字舜咨應天府上元縣人南京吏部尚書謙之子天順八年進士改翰林院庶吉士成化元年授編修與修英廟實録秩滿升侍讀充經筵講官丁父憂服闋復任預修文華大訓成遷學士充東宫講讀官二十二年升禮部右侍郎二十三年憲宗賔天充山陵使時孝宗初即位典禮坌集皆下禮部尚書周洪謨老多疾議擬多出嶽手遂釐正祀典凡京師諸神祠淫名侈費諸不經訓者裁革殆盡國朝自德祖以下九廟已備及憲宗山陵禮畢神主皆升祔于制當祧廟下禮部集廷臣議嶽力言國家自德祖以上莫推其世則德祖乃周之后稷也不可祧懿僖仁三祖以次當祧至太祖太宗為周之文武百世不遷今憲宗新祔當祧懿祖一廟宜于太廟寢殿後别建藏祧主之所如古夾室之制每嵗暮則奉祧主合享亦如古祫祭之制時又言孝穆太后宜祔廟者復詔議之嶽言孝穆神主宜于奉先殿旁别立廟嵗時祭享悉如奉先之儀奏上詔悉從之時程敏政又欲改定孔庭從祀諸賢嶽言馬融王弼之徒其立身不無可貶然秦漢以來六經出於煨燼賴諸子抱遺經專門講授經以復存自唐之注疏多祖其言今之經傳引用尚多其說則何可盡廢七十子名字自馬遷以來相沿已久千百年後何可臆定於是咸復舊𢎞治元年進左侍郎時以灾異求言嶽同尚書耿裕等疏寅畏天戒七事未幾復陳八事上嘉納焉二年賽瑪爾堪差人進貢嶽具奏海南諸畨國入貢有勘合者例與廣東布政司比對起送赴京其餘不許起送係是定例今賽瑪爾堪差人進貢却乃即便差人起送似此故違合當參究上從其言差官阻回不受貢六年進禮部尚書時始五十㑹京師大雨雹具言雨雹之作天所以告陛下宜深求致災之繇以回天意又勸上勵精以勤聖學推誠以開言路止無功之賞停不急之役黜奸貪進忠直時有㫖四川光相寺國師琳沁珠卜取來大慈恩寺住坐嶽言琳沁珠卜等俱以西畨清淨之徒壞禮義之教不可也皇上首賜罷黜中外稱聖今欲行取來京於皇上初政之清明制命之嚴正不無少損又西域胡人從海道進獅子嶽言獅者外夷之獸真僞不可知且海道亦非西域常貢之路詔還之八年七月有㫖聖母年老念叔崇王欲得一見便寫敕差官請來嶽極論事有未便者三上不納尋復有㫖免王來嶽力居多先是四方奏報灾異禮部率類其凡嵗終一復以為故事嶽乃以日月先後彚分條析末復援經史懇懇為上言之𢎞治九年知貢舉嶽凡三知貢舉防範嚴密如帖圗編號每因舊法出新意後遂不可易本年改南京吏部纍官南京兵部改吏部尚書加太子少保卒於官年五十八賜寶鈔萬貫遣禮官諭祭者四敕有司治葬仍給驛歸其喪贈光祿大夫少保諡文毅官其子為中書舍人嶽狀貌魁異望之如神人有文武才略在禮部儀文制度多所擬定事當廷議往往片言而决天下皆仰望其風采獨在翰林時太監黃賜母死衰服送葬論者謂其急於功名䁥比權要君子亦深惜焉尚書徐瓊徐瓊字時庸江西金溪縣人自幼穎敏向學慱通經史為文竒逸不滯景泰庚午領鄉薦天順丁丑進士第二人授翰林院編修預修英廟實録成化丙戌同考㑹試士丁亥修大明一統志成升侍講辛卯典應天鄉試丙申升南京翰林院侍讀學士署院事丁未春升南京太常寺卿掌南國子監事𢎞治庚戌升南京禮部右侍郎癸丑改比部左侍郎時尚書倪文毅公嶽清德宿學為世推重挺然任事不少規避權貴忌之瓊托姻貴戚垂涎代嶽丙辰㑹南京吏部缺尚書舉嶽補之遂升瓊為禮部尚書衆論諽然不平初祠部度僧道十年一舉時僧道集京師以萬計權貴多為之請左侍郎傅瀚持不可遂同議上疏仍改十年給度之例又太常寺卿崔志端謂本寺與光祿寺太僕寺不同不係禮部統屬瓊具奏朝廷每大事㑹議正該六部都察院通政司大理寺未聞有太常寺也今欲與九卿衙門齊得乎况本寺乃祠部之一事與光祿寺為膳部之一事太僕寺為駕部之一事相同但以此三事乃事之大者所以又設此三等衙門以專之耳今太僕寺既屬兵部光祿寺既屬禮部矣獨太常寺與禮部齊可乎正以志端發身道流穢行彰聞纍經彈劾未蒙黜退乃敢愈無忌憚忍為欺罔通應究問上戒諭志端於是體統不紊戊午以青宫出閣加太子少保因四方災異上言數事上可之己未知貢舉庚申上疏乞骸加太子太保給驛歸後年八十有一卒瓊以髙第致位宗伯遭逄孝宗明聖在上不能展諝陳慮舉明主于三代之隆徒納欵中貴驟致通顯屢經給事中彭城等御史余濓等交章論列去位識者惜之尚書傅瀚傅瀚字曰川江西新喻縣人少穎秀拔異讀書過目成誦始就外傅則往往推究奧義人多竒之癸未㑹試科場災寢疾幾殆忽神人見夢曰弗憂也公前程逺大疾今愈其年八月中㑹試甲申賜同進士出身改庶吉士除翰林院檢討憲宗一日於內得古帖斷爛不可讀命中使持至內館適瀚至直次為韵語須㬰授中使以復上大悅有珍饌法醖之賜九載進修撰兼司經局校書日侍孝宗於春宫遷左諭德兼檢討充經筵講官及東宫講官孝宗嗣位以舊學恩進太常寺少卿兼侍讀仍充經筵講官兼日講每進講誠意懇切敷陳詳婉而進止雍容上每注聽焉憲宗實録成進太常卿兼侍講學士久之遷禮部右侍郎㑹南部缺參贊僉舉尚書倪嶽瀚言倪之才何可置之南或謂倪往公不當次進乎瀚曰吾知為國遑恤其他及金溪徐公瓊進尚書瀚轉左侍郎徐凡事多倚成之初祠部給度十年一舉時僧道集京師以萬計權貴多為之請浣力言此輩蠧耗天下宜痛加禁革縱未能如祖宗朝之制亦當稍賜裁抑遂改十年給度之例時以龜山楊時從祀孔子廟廷言者因謂羅從願李侗亦當從祀瀚言二子著述視尹焞遊酢謝良佐未知所先後二子從祀則三人似不可遺道學所在其可濫乎乃止己未知貢舉俄用廷薦以本官兼翰林院學士掌詹事府事仍兼日講官㑹典副總裁庚申進禮部尚書㑹京師地震雨雹四方日奏灾異因疏言今賦重役繁民窮財盡宜躬行節儉以先天下庶民困苦可蘇時陜西地震異甚復率諸公卿條奏三十一事如敬天勤民法祖修德汰冗官罷工役减齊醮省上供尤拳拳焉奏留中又復言民心易感在結之以恩天意可回在應之以實屬者所陳謂當如拯溺救焚猶恐不及而側聽彌月未賜宸斷何以回天意哉疏上報可保定獻白鴉謂祥瑞不當奏陕西守臣熊翀得玉璽來獻乞頒示天下以為傳國之寶復出也瀚言以史傳諸書考之刑制篆刻皆不類其為贋作無疑即使非贋人主受命在德不在璽自前世以秦璽為寶得之者君臣動色相慶我太祖以聖德受命製一代之璽傳之聖子神孫夀昌之福萬世無極何藉於彼哉上乃以其璽屬庫藏之尋以足疾在告上數遣醫來視因乞致仕不允壬戌年歿於官上賜寶鏹為治斂具贈太子太保諡文穆諭祭者三給舟車遣官護行為營葬事瀚好學力行至老彌篤平生著述多本於理書法遒麗有晋人風韻性縝密有矩度事必思而後行其在上前雖舉步後先髙卑輕重疾徐毫髮皆可較勘聞人有善汲引如不及兩主文衡人稱其公明但同鄉監生汪鎔誣奏大學士劉健李東陽或謂瀚實嗾之而嫁禍于程敏政謝遷王華咸中誣之不能不致疑于國史所訾云尚書張升張升字啓昭江西南城人成化己丑進士第一人授翰林院修撰後以皇太子出閣特改左春坊左贊善充東宫講讀官秩滿升右春坊右諭德孝宗即位以從龍恩進左庶子兼翰林侍讀故事特改宫僚者例轉數階而升以憂居後至但進一階疑大學士劉吉抑已托吉過劾之忤上左遷南京工部員外郎以憂去服闋㑹吉已去位復庶子言數事多中時弊尋升詹事府少詹事兼翰林院侍讀學士歷升左右侍郎轉尚書時崔志端以太常樂舞生積資至為同官頗倨傲升常别流品以裁割之屬官有授徒講經者御史楊儀之子在講下嘗出入部中遇升散部失趨避命司務朴而拘之儀不能平劾升不協人望自是名益損屢為言官所指嘗奉詔選宫女禁娼優卒𨽻家不得與榜書𨽻為吏衆閧然騰謗升乃不安于位遂致仕加太子太保劉瑾用事又以為尚書時裁抑晋府郡王封爵鐫所加官正德十二年冬卒訃聞輟朝一日贈太子太傅諡文僖賜祭葬如例升願慤有餘居官雖無大建白然自守謹飭為文平實嘗主兩京鄉試所取得侍郎儲巏編修陳瀾皆名士論者以為得人尚書李傑李傑字世賢蘇州府常熟人成化丙戌進士改翰林院庶吉士授編修升侍講二十二年充東宫講讀官秩滿升侍讀學士𢎞治初以宫僚恩升左春坊左庶子兼侍讀學士四年升南京國子監祭酒時方修憲廟實録留館中校正書成乃行以憂去服闋改太常寺少卿兼侍讀學士掌院事十三年升南京禮部右侍郎十五年改禮部右侍郎轉左侍郎正德元年充孝廟實録副總裁尋升南京吏部尚書二年改禮部尚書時逆瑾用事納晋府鎮國將軍表槏等賂欲進封為郡王傑坐前與尚書張升皆持不與進封之議忤瑾意遂令致仕瑾誅有㫖在起用之列正德十二年閏十二月卒贈太子少保傑持己矜嚴待後進頗立崖岸晚以忤瑾而去士論髙之其為詩文亦溫厚可觀尚書周經周經字伯常山西陽曲人南京刑部尚書喧之子也天順庚辰進士改翰林院庶吉士授檢討纂修英廟實録成進編修秩滿進侍講十四年孝宗出閣改春坊左中允𢎞治改元以東宫恩升太常寺少卿兼侍讀二年擢禮部右侍郎四年改吏部尋轉左九年擢戶部尚書尋加太子太保十三年以災異乞免加太子太保致仕十八年起為南京户部尚書以疾辭㑹丁母憂未上正德三年復起為禮部尚書居數月以病乞休復致仕卒年七十有一上輟視朝一日贈特進光祿大夫右柱國太保諡文端賜祭葬如例經在館久淹有諷之圗速化者卒不為動及居禮部議政蒞事必傅經義若却西域貢獅毁黃村尼寺為先朝盛德事皆經贊成之在吏部時有指民田為閒地獻太監李廣者廣固欲得之經草奏率諸司言之事遂寢及遷户部人以其出翰林或不能理錢穀視事後嚴條約革宿弊剖决如流郎吏皆嘆服以為難及中官織造於南京者屢以引鹽𣙜課為請賴經奏裁省甚多大內張燈取外帑銀三萬兩經言不可以小民脂膏供耳目之玩乃命以明年內庫嵗額償之近戚貴幸有所陳請一裁以法皆斂不得肆而怨日益深致仕命下廷臣皆相顧失色爭上疏留之是後中外奏薦多致八十餘疏前此未之有也經少頴敏莊重寡言笑孝友純至自為小官已志用世及為戶部尚書秉正執法竟以不合去人甚髙之其復起也則以其壻曹元與劉瑾有連或謂元實為之時經已病又黽勉赴召則不能無責備云尚書白鉞白鉞字秉德真定府南宫縣人兵部尚書圭之子成化甲辰舉禮部廷試第二名及第授翰林院編修𢎞治戊申同修憲廟實録以內艱去癸丑同考禮部丙辰秩滿遷侍讀己未充經筵講官壬戌復考禮部武宗在春宫充講讀官癸亥修大明㑹典成進侍講學士賜宴禮部尋命與修歷代通鑑纂要甲子考南畿鄉試乙丑以登極進學士加從四品俸充日講官正德丁卯命教庶吉士署院事擢禮部右侍郎賜御製蟠龍諸軸并纂要本年改吏部三年轉左尋升禮部尚書己巳賜玉帶庚午復命兼學士入內閣專典誥敕掌詹事府事加太子太保卒于官賜祭葬贈太子太保諡文裕鉞博覽子史長於記誦體貌魁梧器局凝重為禮部尚書時逆瑾方用事值所難處寧稍遜避而亦不失其正云尚書費宏費宏字子充江西鉛山人成化丁未進士第一授翰林院修撰𢎞治中改左贊善事毅皇帝于東宫已升右諭德兼侍讀正德中以舊學進太常寺少卿兼侍讀充日講官歷禮部左右侍郎至尚書皆直講如故尋入內閣與李東陽楊廷和等輔政事四方羣盜充斥以次削平詔録輔臣功官其子仍進太子太保户部尚書武英殿大學士寧濠請復護衛恃錢寧為內援賂遺狼藉宏䇿其必叛執勿與寧深憾以計傾之宏去位上即位詔召宏進少保入閣修翊戴功加伯爵廕子錦衣衛指揮使世襲宏懇疏辭免時水旱相仍條陳救荒十事上嘉納又蠲逋賦减太僕寺馬價十五以輕齎之羡給漕卒議安大同叛卒皆宏謀也武廟實録成進少師兼太子太師上嘗製詠春及四景詩屬宏和上自序其端名曰詠春同德録題其銜為內閣掌參機政輔導首臣其見任如此丙戌獻皇帝實録成進華蓋殿大學士食正一品俸賜御製詩一章丁亥以疾求去疏再上賜馳驛歸及大學士張孚敬去位上思用舊臣手敕起宏于家宏至見便殿上親勞之賜銀圗書一文曰舊輔元臣時時燕見密議奏對皆稱㫖無何遂卒上為輟朝詔贈太保諡文憲遣官護其喪歸恤典之厚諸大臣莫得比焉宏恭慎謙抑明集國家故事能持重得大體故三入政府以功名始終云尚書傅圭傅圭字邦端保定清苑縣人成化丁未進士改翰林院庶吉士授編修𢎞治中兼司經局校書與修大明㑹典升左春坊左中允兼編修丙辰乙丑一再同考㑹試正德初以東宫恩升左諭德兼侍講充經筵講官與修孝廟實録清理軍職貼黃丁卯考應天鄉試戊辰考武舉奉命授庶吉士業充日講官劉瑾柄政摘㑹典訛字圭以嘗與纂修降修撰旋以史勞升左中允厯侍講學士庚午考順天鄉試升吏部右侍郎轉左侍郎升禮部尚書正德十年卒年五十七圭為人強毅有執持人不敢干以私在禮部守法持正嘗因類奏四方災異陳時弊十事言甚剴切時上方好佛自名大慶法王外廷知之無徴以諫畨僧奏討田百頃為大慶王下院傅公遂劾僧曰法王何為者至與至尊並列大不道當誅有詔不問其妄求亦止優人臧賢被寵能軒輊士夫士夫或與善賢因是請改牙牌製如郡僚印文改方者圭不可召老優更事者詰曰爾優敢亂法爾寵可常保否即遺爾辱禍靡極矣優乃戢但與新之盜劉六擾中原勢炎炎熾太監誾以侍即完征之不能滅乃先行左右賞閹後曺又立監鎗名謀統軍命多官議可否衆依違不斷圭怒而言今兵老民疲直以多冒功者失士心賊在腑肺孔棘民譁然思禍亂旦夕及宗社吾儕死不償責諸公尚唯唯將何待乎以是忤權幸忽傳㫖諭令乞休圭抗疏得歸兩京言官交章留之不報家居杜門謝賓客絶跡公府遺言戒子弟忝竊大官無以報國慎毋以恤典請御史盧雍等以為言給祭葬如例尚書劉春劉春字仲仁四川巴縣人成化癸卯鄉試第一丁未進士及第授編修𢎞治辛亥轉修撰庚申充東宫講讀官秩滿遷左諭德癸亥預修㑹典進侍講學士正德紀元升學士辛未擢吏部侍郎充經筵日講官明年陟禮部尚書凡舉動皆為久逺計不務目前西僧有欲奪民地於甘州且乞遣官督建寺時關中饑甚春力爭以為不可謂非止病民邉警至不可支持竟停之占城世子失國竄居邦都即請封春曰春秋公孫青尚不辱命於衛况天朝乎疏上已之宗藩請封及婚嫁弊孔百出春即檢其行駁者盡語之吏不得欺以求賄又以祭葬諡議關係勸懲乃奏為定格要家及故舊有以厚利力請者不為動久之亦安其所宜得心亦莫之怨也每勳戚大臣病故上遣諭祭喪家輒厚幣為謝習以為常春曰以尚書而受其贈遺豈惟輕已如國體何故事功臣襲爵表謝又皆禮部堂上分撰謝以銀幣悉却之其謹峻有守如此尋丁憂起復為禮部尚書兼翰林院學士在內閣專管誥敕掌詹事府事卒録東宫講讀勞詔特加祭二壇造墳安葬如例贈太子太保諡文簡春志行端潔德量醇厚有古人風尚書毛紀毛紀字維之山東掖縣人成化丁未進士改庶吉士𢎞治二年授翰林院檢討十二年升本院修撰十六年升本院侍讀十八年升左春坊左諭德仍兼侍讀正德元年丁父憂四年起服以㑹典故降侍讀本年以實録成升翰林院侍讀學士尋升本院學士五年升户部右侍郎本年升禮部尚書尋兼翰林院學士時遣使西域齎畨供紀西畨逺在萬里祖宗朝賜法王國師名號用以羈縻今不擾邉齎供媚之失天朝體又以儲嗣未建乞早定大計十一年命掌詹事府事管內閣誥敕十二年五月命兼東閣大學士內閣辦事纍加太子太保文淵閣大學士少保改户部尚書武英殿大學士武皇帝大漸奉遺詔迎上入繼大統上即位論定䇿功封紀伯爵紀固辭不受尋改吏部尚書謹身殿大學士以疾乞致仕再疏請許之詔有司給月米嵗夫紀歷事三朝守正不阿晚家居二十年始終一節上嘗詔有司即其家存問及卒上輟朝一日贈太保諡文簡賜祭葬如例尚書李遜學李遜學字希賢河南上蔡縣人成化丁未進士改翰林院庶吉士授檢討𢎞治丙辰升浙江按察司僉事以憂去終喪改陕西升副使又以憂去終喪改山東前後更三任俱提調學校所至務從寬厚頗得士心正德戊辰升太常寺少卿提督四夷館明年仍入翰林兼侍讀升户部右侍郎提督草場尋改禮部升左侍郎乙亥升南京禮部尚書丙子以奉賀表入京改禮部明年兼學士掌詹事府事入內閣專管誥敕奉命授庶吉士業正德十四年卒祭葬如例遜學為人開爽頗不羈為詩文有藻思尚書毛澄毛澄字憲清太倉州人𢎞治癸丑廷試第一授修撰丙辰同考㑹試己未預修㑹典癸亥轉左諭德兼修撰預修通鑑纂要甲子侍皇太子于東宫充講讀官敷奏明暢孝宗聞之甚喜徹御前中秋宴以賜之乙丑武宗登極擢左庶子兼侍讀賜金鑲束帶預修實録值內艱歸逆瑾柄國奪所升秩瑾敗起服仍官侍讀庚午進侍講學士典順天鄉試九月署國子監事辛未充廷試讀卷官擢學士充日講官壬申掌院事教庶吉士讀書甲戌主考禮部㑹試尋升吏部右侍郎丁丑進階通議大夫禮部尚書值武宗南巡澄上疏諫阻兵部尚書彭澤坐哈密事將置重典澄預廷議首救免之己卯賜蟒衣玉帶逆濠就擒江彬擁邉兵邀駕駐通州命文武百官大臣出迎人人自危澄倡正議謂當訊馘告廟悉從之辛巳四月同駙馬都尉崔元奉迎世宗於郢邸賜白金千鎰綵段十襲預修武廟實録充副總裁加太子太傅冊立中宫皇后充副使持節行禮未幾以議禮勿協乞休卒于興濟舟中贈少保諡文簡澄逮事三朝忠勤敬慎終始如一論事侃侃不能為媕妸有古大臣之風云尚書羅欽順羅欽順字允升江西泰和人𢎞治癸丑進士授翰林編修十三年升南京國子司業正德二年忤逆瑾黜為民五年起原職七年升南京太常寺少卿九年升南京太常寺卿掌南翰林院事十年升南京吏部右侍郎十四年改吏部十六年轉左嘉靖元年升南京吏部尚書二年改禮部尚書未任丁憂六年起吏部尚書以疾固辭詔准致仕賜月米嵗夫卒祭葬如例贈太子太保諡丈莊欽順學術純正操履端方是時有倡為師心頓悟之學者欽順為之反覆辨正其說甚具究所造詣可為信道不惑者矣尚書席書席書四川遂寧人繇進士授山東剡城知縣屢遷右副都御史巡撫湖廣歷南京兵部右侍郎召入為禮部尚書加太子太保監修獻皇帝實録加少保以目疾四上疏乞歸及薦尚書羅欽順自代敕加武英殿大學士致仕特賜第在京調治給俸如故命甫下卒上深悼惜賜祭九壇遣官營葬贈太傅諡文襄廕一子尚寶司司丞其初喪一祭上親製文有曰學得真傳德惟一致忠誠端慎蕳在朕心欲其圗政化之淳而遽奪忠良之速後雖同事之臣日或接見獨于謀議之善不可復聞書居官先後所至有能聲在雲南勦除霑益土舍安白之亂在福建聞宸濠之變募兵赴援為南京兵部侍郎奉敕賑濟淮揚饑民多所全活初大禮之議人持異見書擬疏上陳主事桂萼得其稿上之上召書入議升為禮部尚書後大禮告成疏陳新政十二事上深納之書直諒勤敏遇事敢為故受知于上言無不從恩遇之隆始終不替云尚書吳一鵬吳一鵬直𨽻長州人𢎞治癸丑進士改翰林院庶吉士授編修升侍講逆瑾矯㫖以擴充政事為名調南京刑部員外郎升南京禮部郎中瑾誅復原職尋升侍講學士纍升禮部右侍郎兼翰林院學士掌詹事府事充武宗實録副總裁書成進禮部尚書管部事居數月加太子少保改南京吏部尚書踰年以疾致仕賜嵗夫月米尋卒于家年八十餘賜祭葬如例贈太子太保諡文端尚書桂萼桂萼江西安仁縣人正德六年進士授丹徒知縣被論調青田不赴後以言者薦補武康嘉靖癸未稍遷南京刑部主事時議大禮張璁方獻夫霍韜席書等咸執為人後之說為非是上心欲從之格于廷議萼因抗疏極論纍纍千餘言上遂召五臣還京竟定大禮繇是寵異之升翰林學士詹事吏禮二部侍郎俄遷尚書加太子太傅少保己丑遂改兼武英殿大學士入內閣萼精悍狷隘以學術經濟自任既受上特達之遇遂直躬而行無所顧忌然其志遠才疏諸所規畫多迂滯不適于用方議禮時五臣同心排異議相得歡甚而萼與璁尤密比末年二人者遂亦相失尋卒上念議禮功贈太傅諡文襄賜祭九壇命工部遣官營葬復録其子輿為尚寶司丞輻為中書舍人尚書方獻夫方獻夫廣東南海縣人𢎞治乙丑進士授禮部主事尋調吏部著大禮論二篇奏之其意與張桂論合上悅拜翰林侍講學士升少詹事預經筵日講升吏禮二部侍郎兼學士升禮部尚書加太子太保吏部尚書以疾賜告居二年詔以原秩兼武英殿大學士入內閣辦事加少保又二年癸巳以疾乞歸許之未幾卒賜祭葬如例贈太保諡文襄獻夫始起郎署雖以議禮稱㫖不次擢用而性恬靜立朝議論恆在平恕人以此多之禮部志稿卷五十三
