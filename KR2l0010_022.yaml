勾銷簿附寫名件用使日時印記各科承受該吏于簿上書名畫字收領承行畢仍于前件項下勾銷以慿稽考一凡銓選官員調遣軍馬賞賜物件處决重刑創立制度及為令為律事務所奉聖㫖必須文案上出事內欽寫其餘常行事理雖有奉到聖㫖止于文簿及案驗內欽録不必出事開寫一凡議擬奏准事理止于文簿內云寫奏准若欽奉聖㫖改擬仍寫欽改緣由一凡差使人員既有所齎公文其差帖下止寫去某處公幹不必云寫聖㫖一凡差人齎執欽依奉聖㫖公文到于各省各府須要先將公文于公㕔中間置放然後與官員相見毋得收摺在懷與人講理一凡五府六部等衙門所奏事件各官既已親奉㫖意奏本明白批寫回本衙門自作施行其通政司入奏在外都司布政司按察司等衙門實封軍機錢糧刑名等事并鼓下受詞及各處差官徑奏事件雖有奉到㫖意承行衙門無由知㑹必合抄出施行其抄寫人員將抄到㫖意齎從正門入各該官員起身迎接奉到㫖意止許本衙門明白立案不許出事行移內云寫其各科填送勘合亦不許云寫㫖意止寫某衙門為某事奏奉某衙門如奏施行一凡諸司文移有奉㫖施行者勿書聖㫖二字凡有升賞差調等悉以欽字代之十六年令刑部等衙門遇有行移判押文書及商議公事首領官引吏典就齎印信手本開具幾件于正官處親行禀覆可否從公署押定奪仍各照事件逐一附簿以憑查㸃相同不致違錯十七年奏定天下諸司文移紙式凡奏本紙髙一尺三寸一品二品衙門文移紙三等皆髙二尺五寸長五寸為一等四尺為一等三尺為一等案驗紙二等皆長二尺五寸髙一尺八寸為一等二尺為一等三品至五品衙門文移紙髙二尺長三尺案驗紙髙一尺八寸長二尺五寸六品七品衙門文移紙髙一尺八寸長二尺五寸案驗紙髙一尺六寸長二尺八寸八品九品與未入流衙門文移紙髙一尺六寸長二尺案驗紙髙一尺四寸長一尺八寸官員任內公文皆如式者考為一最不如式者罪之禮部志稿卷二十二
