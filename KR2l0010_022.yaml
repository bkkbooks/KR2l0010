body:
  text: 禮部志稿卷二十二明俞汝楫編儀制司職掌傳制儀國初大祀天地前三日誓戒百官及遣官攝祭皆御殿傳制具儀如左誓戒儀洪武二十六年定凡大祀前三日陳設如常儀文武官各具朝服詣丹墀拜位鍾聲止儀禮司跪奏請升殿樂作皇帝御華蓋殿具皮辨服出升座樂止鳴鞭訖贊四拜傳制官詣御前跪傳制由東門出至傳制位稱有制贊跪宣制云洪武某年正月某日大祀天地於南郊爾文武百官自某日為始致齊三日當敬慎之傳訖贊俯伏興樂作又四拜平身樂止奏禮畢嘉靖九年續定制曰某年十一月某日祗行大祀皇天禮于圜丘爾文武百官自今日為始致齊三日其宜精白乃心益加敬慎之哉遣祭儀洪武二十六年定凡遣官祭祀前一日陳設如常儀次日各官具朝服丹墀北向立皇帝御華蓋殿具皮辨服鐘聲止執事官行一拜叩頭禮訖儀禮司跪奏請升殿樂作升殿樂止􅐈簾鳴鞭訖唱排班班齊百官一拜叩頭畢分東西立引禮引獻官詣拜位贊四拜平身傳制官詣御前跪奏傳制俯伏興由東門靠東出至丹墀東西向立稱有制唱跪宣制祭孔子則曰某年月日祭先師孔子大成至聖文宣王祭帝王則曰先聖歷代帝王命卿行禮贊俯伏興樂作四拜樂止禮卑凡傳制遣官代祀歷代帝王并旗纛孔子等廟前一日沐浴更衣處于齊宮次日還宮嘉靖間更定祭孔子制云某年某月某日祭至聖先師孔子命卿行禮每三年遣道士齎祝文香帛詣所在陵寢致祭制云某年某月某日祭先聖歷代帝王遣爾等齎捧祝文香帛詣陵寢致祭命所在有司行禮傳制樂與朝賀同樂章典祀之曲氤氲滿庭香八音絲竹弄笙簧金石音韻彰匏土革木度鏗鏘髙捧降明香吾皇誠念詣神方神不佞禍淫福善理之常進春儀有司鞭春儀附凡進春先期數日奏聞欽天監遣官至順天府候氣屆期奏進舊儀與見行微有不同備列于左洪武二十六年定是日早文武百官各具朝服于丹墀北向立應天府官置春案于丹墀中道之東引禮引府縣官就拜位贊鞠躬樂作四拜平身樂止典儀唱進春引府縣官舉春案樂作由東階升跪置于丹墀中道俯伏興平身樂作又四拜禮畢鳴贊唱排班引禮引文武官北向立贊班齊致詞官詣中道之東跪奏云新春吉辰禮當慶賀贊鞠躬樂作贊五拜三叩頭訖樂止儀禮司奏禮畢萬厯八年定先一日鴻臚寺執事官設春案一張于皇極殿外東王門簷下是日文武百官各具朝服侍班執事官先諧中極殿行禮如常鴻臚寺堂上官跪奏請升殿導駕官前導教坊司樂作上御皇極殿升座樂止錦衣衛傳鳴鞭引入序班引順天府等官先就拜位鳴贊贊鞠躬樂作四拜興平身樂止內贊立于東王門外贊進春引入序班引順天府府尹至東王門外鴻臚寺堂上官招呼起案樂作擡案序班舉春案至正門外簷下置定樂止引入序班引府尹至案前立內贊隨至簷下立贊跪鴻臚寺堂上官傳跪外贊亦贊跪內贊贊進春府引贊臣某等謹進某年春又奏皇太后陛下春中宮殿下春某王殿下春俱在午門外伺候請命司禮監官捧進請㫖承㫖畢內贊贊俯伏鴻臚寺堂上官傳俯伏外贊亦贊俯伏樂作興平身樂止引入序班將府尹引下鴻臚寺堂上官招呼起案擡案序班舉春案至原處置定府尹仍入原班立外贊贊鞠躬樂作四拜興平身樂止順天府等官退下侍立對贊贊排班班齊文武百官入班立定鳴贊贊跪鴻臚寺堂上官一員于丹陛中道跪致詞云新春吉辰禮當慶賀致畢起身一躬由東邉門入殿內侍立鳴贊贊俯伏樂作興平身五拜叩頭興樂止鴻臚寺堂上官殿內跪奏禮畢傳贊禮畢鳴鞭駕興百官退進春樂與朝賀同有司鞭春儀永樂中定每嵗有司預期塑造春牛并芒神立春前一日各官常服輿迎至府州縣門外土牛南向芒神在東西向至日清晨陳設香燭酒果各官俱朝服贊排班班齊贊鞠躬四拜興平身班首詣前跪衆官皆跪贊奠酒三奠酒訖贊俯伏興復位又四拜畢各官執采杖排立于土牛兩傍贊長官擊鼓三聲擂鼓贊鞭春各官環擊土牛者三贊禮畢頒誥敕官員受誥封贈并焚黃儀附近制文武官誥敕于常朝日皇極門頒給領誥敕官具朝服行五拜三叩頭禮與洪武間所定不同今仍載舊儀備考洪武二十六年定陳設如常儀至日皇帝升殿鳴鞭百官一拜叩頭畢引禮引受誥官詣拜位執事官舉誥案于丹墀中道或吏部或兵部官奏訖贊鞠躬樂作四拜平身樂止執事官舉誥案置于丹墀中道贊跪俯伏興樂作又四拜樂止禮畢頒誥樂與朝賀同官員受誥封贈并焚黃儀洪武中定凡受誥前一日本家設誥案于正㕔中設香案于誥案之南其日綵亭鼓樂送如無綵亭用盤袱一人捧前行受誥官前行誥將至受封者即出大門外迎接命婦服冠服迎于門內候誥輿即綵亭入門隨至㕔前各就拜位執事者于輿內捧誥置于案贊禮者贊鞠躬五拜三叩頭如命婦則不必叩頭捧誥入受封贈并受誥官具香燭等物詣家廟或祠堂告知四拜訖受誥官并命婦于父母前行四拜禮八年令官員祖父母父母受封迎誥至家祖父母父母則與子孫各具服拜受男子受於正㕔婦人受于中堂如不存者子孫拜受擇日焚黃凡焚黃前一日受誥于本家祠堂中設案桌一于中間設香燭桌一于案前置祝文于案至日清晨孝子捧封贈誥命置祠堂中案上著能寫人以黃紙一副依誥命一般謄抄置于案桌執事者陳設祭物于案前孝子等各就拜位從祭子女列于後贊禮者贊鞠躬拜興拜興平身至香案前贊跪上香祭酒亞祭酒三祭酒讀祝執事者取祝文跪于右讀訖贊宣誥宣誥者立于東宣訖贊俯伏興平身贊焚黃讀祝者取祝文宣誥者取黃俱至焚所焚燒孝子酹酒禮畢祝文式維洪武某年嵗次某甲子某月某朔某日孝子孫致祭顯某考散官之靈除某妣夫人之靈若靈在寫之靈若已靈入伺堂則寫神主追念音容不勝感慕兹者欽䝉聖恩追封顯某考散官某妣夫人謹于今日行焚黃禮特備牲醴告祭尚享開讀儀朝廷頒命四方有詔書有赦書有敕符丹符有制諭手詔詔赦先于闕廷宣讀然後頒行敕符等項則使者齎付所授官員祕不敢發開讀迎接儀各不同具列于後洪武二十六年定前期一日尚寶司設御座于奉天殿設寶案于殿東錦衣衛設雲蓋于奉天門教坊司陳中和韶樂于殿內禮部設宣讀案于承天門上西南向其日清晨陳設如常儀教坊司設大樂于午門外承天門外東西相向儀禮司設百官拜位于承天門外橋南校尉四人擎雲蓋于殿內簾前鼓初嚴文武百官各具朝服鼓吹嚴引禮引公侯侍班于午門外東西相向鐘聲止儀禮司跪奏請升殿皇帝服皮辨服導駕官前導中和樂作升座樂止鳴鞭捲簾禮部官捧詔書詣寶案前用寶訖捧置雲蓋中校尉擎執雲蓋由殿東門出大樂作自東陛降由奉天門至金水橋南午門外樂作公侯前導迎至承天門上鳴贊唱排班引禮引文武官就拜位唱班齊鞠躬樂作贊四拜樂止宣讀展讀官升案稱有制贊衆官皆跪禮部官捧詔書授宣讀官宣讀官受詔書唱宣讀宣讀官宣訖禮部官捧詔置雲蓋中贊禮唱俯伏興樂作四拜樂止唱搢笏鞠躬三舞蹈唱山呼百官拱手加額曰萬嵗唱山呼百官拱手加額曰萬嵗唱再山呼百官拱手加額曰萬萬嵗凡呼萬嵗樂工軍校擊鼓齊聲應之唱出笏俯伏興樂作四拜興平身樂止序班即報儀禮司跪奏禮畢禮部官捧詔書分授使者畢駕輿中和樂作鳴鞭樂止百官以次退嘉靖六年續定前期一日鴻臚寺官設詔案錦衣衛設雲蓋雲盤于奉天殿內東别設雲盤于承天門上設綵輿于午門外鴻臚寺官設宣讀案于承天門上西南向教坊司設中和樂及設大樂如常儀鴻臚寺官列百官班次于承天門外橋南是日錦衣衛設鹵簿駕百官各具朝服入丹墀內侍立上具冕服御華蓋殿鴻臚寺官引執事官進至華蓋殿就次行五拜三叩頭禮贊各供事鴻臚寺官奏請升殿樂作導駕官導上升座翰林院官先捧詔書于華蓋殿從至御座前東立西向樂止鳴鞭報時雞唱定時鼓訖唱排班文武百官入班鴻臚寺贊四拜樂作興樂止百官出至承天門外伺候鴻臚寺官舉詔案于殿中贊頒詔翰林院官捧詔書授禮部官禮部官捧詔書置于雲盤案上校尉擎雲蓋俱從殿左門出隆慶六年儀注詔從殿左門出至皇極門鴻臚寺即奏禮畢駕興至午門外禮部官捧詔置綵輿內樂作公侯伯三品以上官前導引至承天門上樂止鳴贊唱排班引禮引文武百官就拜位樂作贊四拜樂止唱宣讀展詔官升案稱有制贊衆官皆跪禮部官捧詔書授宣讀官宣讀訖禮部官捧詔書置雲盤中贊俯伏興平身四拜樂止搢笏鞠躬三舞蹈唱山呼萬嵗者三唱出笏俯伏興樂作四拜興平身樂止序班報鴻臚寺官跪奏禮畢駕興百官以次出禮部官捧詔書授錦衣衛官置雲匣中以綵索繫于龍竿頒降禮部官捧詔書置于龍亭內鼓樂迎至禮部授使者頒行天下開讀樂與朝賀同迎接詔赦儀洪武中定凡朝廷遣使各處開讀詔赦如至開讀所本處官員具龍亭綵輿儀仗鼓樂出郭迎接朝使下馬取詔書置龍亭中南向朝使立于龍亭之東本處官具朝服北面行五拜禮衆官及鼓樂前導引朝使上馬在龍亭後行至公廨門外衆官先入文武官分東西序立候龍亭至公庭中朝使立于龍亭之東西向如有出使官員贊者先唱曰出使官行禮禮生引出使官于公庭露臺上行五拜禮畢於露臺之上東向立贊衆官排班有武官處文東武西排班如有武官處文官依次左右排班班齊樂作贊四拜禮朝使捧詔授展讀官展讀官跪受詣開讀案宣讀出使官于露臺北向跪衆官皆跪宣讀訖開讀官捧詔授朝使朝使捧詔置龍亭中衆官俯伏興四拜三舞蹈跪山呼者三俯伏興四拜禮畢本處官班首詣龍亭前跪問聖躬萬福朝使鞠躬答曰聖躬萬福衆官乃退易服而見朝使行兩拜禮朝使答禮禮畢本處官復具鼓樂送詔于官亭凡遇有詔書禮部差人齎往各處開讀所差人員必預先教其捧詔進退禮儀凡使者欽齎詔書至各處開讀預期一日執知本處官司照依已降儀式迎接行禮凡使者欽齎詔書至總兵官處近營十里先令人報知總兵官設香案於營內南向立金鼓旗仗率領諸將出營迎接見使者下馬立于道傍俟詔書過總兵官并衆官上馬從後至營門外各下馬使者前行總兵官并衆官後從至營內使者捧詔書以授宣讀官衆官皆跪宣讀畢以授使者復置于案衆官皆俯伏興平身行四拜禮禮畢使者東立西向總兵官西立東向行兩拜禮相見禮畢使者居東總兵官居西相向叙坐凡遇詔赦經過道路官員軍民人等即于道傍俯伏候詔赦過畢方起凡出使在途如遇詔赦到各處出迎郊外與本處官一同隨班行五拜三叩頭禮有職者隨品序列無職差使人使服隨具服班之後不許攙越行禮畢同本處官導龍亭至衙門中隨大班依上項班次行禮迎接詔赦官班儀仗行次圖橫瓜鉞斧瓜槌劍令旗鼓樂文官耆儒甲士鼓角金鼓旗四人天丁天丁天丁天丁龍亭香案士甲天丁天丁天丁天丁橫瓜鉞斧瓜槌劍令旗鼓樂舞官耆儒甲士鼓角金鼓旗開讀詔赦文武官拜位圖式橫瓜鉞斧瓜槌劍令旗鼓樂丹墀位鼓角金鼓旗拜儒僧道甲士傘禮贊旗官生員吏典耆文龍亭贊禮武千百户總小官橫爪鉞斧瓜槌劍令旗鼓樂丹墀拜旗甲士鼓旗位鼓角金迎接敕符制諭儀洪武間定凡使者欽齎敕符丹符到處多係機密重事不許先期報知亦不許本處官司迎接使者與衆官直至衙門開看置敕符于案使者立于案東衆四拜使者取符宣讀訖復置于案衆官再行四拜禮畢本處官遂與使者行禮若與一二人止於本家接符從便安放使者