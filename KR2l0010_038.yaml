body:
  text: 禮部志稿卷三十八明俞汝楫編主客司職掌給賜迤北韃靼及衛喇特以下北夷永樂宣德中賜衛喇特順寧王綵段十表裏妃五表裏頭目一等者五表裏二等至四等者四表裏正統二年賜韃靼國王綵段十五表裏虎斑絹十匹妃八表裏頭目一等八表裏二等六表裏三等五表裏四等四表裏外有加賜六年賜迤北太師段絹與國王同共妻每口五表裏一等二等類內頭目每人加賜織金綵段一表裏天順以後一等二等者不加賜三等者俱二表裏差來正副使每人賞織金衣一套靴襪各一雙其後定例一等正副使每人彩段六表裏絹五匹二等使臣綵段四表裏絹三匹三等綵段二表裏絹二匹四等綵段一表裏絹一匹俱與紵絲衣一套紅氊帽一頂靴襪各一雙數內婦女不與紅氊帽使臣自進中等馬每匹綵段二表裏折鈔絹二匹下等馬綵段一表裏絹八匹折鈔絹一匹下下等馬綵段一表裏絹六匹折鈔絹一匹帶進在彼頭目馬匹不分等第每匹綵段二表裏給賜在彼頭目一等每人綵段八表裏二等六表裏三等三表裏四等二表裏內一等二等緊要頭目加賜織金綵段一表裏回賜永樂九年回賜順寧等王上等馬者各綵段十表裏海青一連四表裏白狐皮二十七箇四表裏宣德間回賜順寧王及使臣人等進馬中等者每匹綵段二表裏折鈔絹二匹下等者紵絲一匹絹八匹折鈔絹一匹下下者絹六匹折鈔絹一匹駝每隻三表裏折鈔絹十匹中途寄留倒死新生駒馬每匹絹三匹折鈔絹半匹駝每隻絹六匹折鈔絹一匹海青一連一表裏銀鼠皮二百箇十二表裏貂鼠皮二箇絹一匹青鼠皮十箇絹一匹土豹一箇絹七匹半正統元年回賜使臣銀鼠皮每六箇絹一匹玉石每一斤絹一匹二年回賜國王及頭目使臣人等馬每匹綵段二表裏貂鼠皮五十箇四表裏使臣者每二箇絹二匹銀鼠皮五十箇二表裏白兔皮三箇絹一匹白狐皮一箇絹一匹小厮一名二表裏三年貂鼠皮每十箇綵段一表裏四年貂鼠皮每三箇絹一匹使臣人等到京續進馬俱照下等馬例回賜五年回賜銀鼠皮與熟紅絹六年青鼠皮每二十箇絹一匹使臣人等馬分三等國王并太師馬不分等第八年太師鄂特凌古馬每匹綵段六表裏使臣馬每匹四表裏絹八匹九年進西馬者每匹綵段五表裏絹十匹薩哈勒每段絹九匹十二年額爾克馬每匹四表裏求討在彼頭目一等二等并三等內有係部長親及親信用事者俱請㫖給賜𢎞治三年三等以下不給賜差來使臣自元年至三年四年俱有特賜㑹同館開市禮部出給告示除違禁物不許貿易其段絹布匹聽于街市與官員軍民人等兩平貿易正統十年許買賣五日十二年許衛喇特使臣賣馬景泰元年許買銅湯瓶鍋紅纓鞍轡剪子等物順義王及套長嘉靖三十年部長貢馬賞金頂大帽綵段衣服隆慶四年執叛人來獻賞綵段四表裏布一百匹五年部長順義王奉表獻鞍馬賞大紅蠎白澤各紵絲衣一襲綵段十五表裏妻大紅五綵紵絲衣二套綵段四表裏親弟及長子都督同知各綵段八表裏濶生絹二匹五綵紵絲衣一套木綿布四匹孫指揮使綵段五表裏織金紵絲衣一套絹布同各枝指揮同知千戶百戶等官各綵段三表裏織金紵絲衣一套絹一匹布同差來畨使內小頭目各綵段二表裏素紵絲衣一套布二匹散從減素紵絲衣段布同進表人賞如各枝例國王賜敕奬諭是年國王又遣使代套部都督同知貢馬賞大紅白澤紵絲衣一襲綵段八表裏套酋都督同知及指揮同知以下并差來小頭目散從各賞如例國王仍賜敕奬諭又以套部監市效賞勞綵段四表裏五綵紵絲衣一套次首領段二表裏織金紵絲衣一套六年國王增獻鞍馬弓矢賞大紅蠎白澤獅子紵絲衣各一套綵段二十三表裏妻賞如例萬厯三年以順義能約束諸部五年無警加賞銀三十兩紵絲蠎衣一襲綵段八表裏後每年加賞一次又順義長官每枝給敕一道共七道回賜隆慶五年順義王進上馬三十匹每匹綵段二表裏闊生絹一匹以初貢加綵段一表裏留邉馬四百七十九匹聽該鎮支馬價銀五千兩給賞套部進上馬二十匹每匹綵段三表裏濶生絹一匹留邉馬一百八十匹支各鎮兵餉銀一千八百兩給賞六年議準上馬給段絹外每匹加銀五兩留邊馬每匹銀十兩求討隆慶六年順義王奏請番經與金字經五部墨字經五部差番僧二人齎赴本國併為傳誦其差去番僧先行順天府各給衣食銀十兩差回給賜禪衣坐具併紵絲番僧衣一套靴襪各一雙帶去番官綵段二表裏木棉布四匹諾延福餘泰寧三衛差來并自來都督賞綵段四表裏絹二匹都指揮綵段三表裏絹二匹指揮千百户所鎮撫頭目每人綵段二表裏絹一匹各織金紵絲衣一套又各加綵段一表裏舍人每人綵段二表裏絹一匹織金衣一套䝉古每人綵段一表裏絹一匹素紵絲衣一套婦女有進貢者每人一表裏絹一匹紵絲女衣一套隨來婦女一表裏絹一匹絹女衣一套以上靴襪各一雙奏事進貢都指揮絹二匹綵段三表裏織金衣一套指揮每人絹一匹綿布一匹綵段二表裏紵絲衣一套靴襪各一雙舍人因事進貢者每人綵段一表裏織金衣一套絹一匹靴襪各一雙嘉靖二十四年以諾延都督能鈐束部人不擾邊境準與金帶及金頂大帽回賜自進并帶進馬匹不分等第每匹綵段二表裏絹一匹駝每隻三表裏絹十匹在衛都督指揮每員加賜綵段一表裏求討請㫖量與物件到京者照名給散在衛者討勑開付差來人領去領賞畢日許於㑹同館開市三日鋪行人等照例將貨入館兩平交易順天府仍行薊州遵化等處如三衛部人回還到彼聽命兩平交易每人許收買牛一隻犁鏵一副鍋一口不許將違禁之物私自夾賣違者巡按御史究治哈密以下西域夷永樂四年賜忠順王紵絲六十匹絹二百一十四匹祖母母妃各紵絲六匹絹六匹嬸母紵絲四匹絹四匹六年賜王紵絲五十匹絹二十匹織金紵絲衣三套皂麂皮靴二雙氊襪二雙祖母母妃并妃各綵段六表裏成化三年故忠順王外孫為都督錫銅印并織金衣一套八年其都督赴京襲職除馬駝給價外加賞綵段一表裏絹一匹織金紵絲衣一套并靴襪各一雙進貢到京使臣分五等一等綵段五表裏絹四匹二等四表裏絹三匹三等三表裏絹二匹四等二表裏絹一匹布一匹五等一表裏絹一匹俱紵絲衣一套靴襪各一雙存留甘州男女人等有進貢者照五等例賞無者每人絹布各一匹奏事到京使臣不分等第每人綵段二表裏絹一匹紵絲衣一套靴襪各一雙十二年奏準寄住苦峪城使臣賞例仍分五等比前表裏絹各減其一不與衣服靴襪存留甘州有進貢者照前五等例無者與絹一匹嘉靖四十三年到京正使從人名色照四等例賞隆慶五年照五等例賞寄住甘州有進貢者俱與綵段一表裏不與衣服靴襪回賜大馬每匹綵段四表裏達馬不分等第每匹二表裏駝每隻四表裏駝羔每隻紵絲一匹絹二匹倒死駝絹六匹折鈔絹一匹蘇普每段絹六匹金剛鎖上等每顆絹四匹成化十年金剛鎖二等每顆絹二匹三等每顆絹一匹四等每二顆絹一匹五等每顆布一匹番砂水晶石不與價𢎞治三年奏定價例玉石每斤絹一匹夾玉石四斤絹一匹斯隆瑪石二斤絹一匹青金石一斤絹一匹把咱石十斤絹一匹螺子石六塊絹一匹松都魯石即水珀舊例每斤鈔十五貫正統四年添作一百貫每二百貫折絹二匹石頭靶八箇磠砂八斤各絹一匹魚牙靶小刀每把絹二匹鑌鐵大刀每把絹五匹拐棍刀每把絹五匹兩刃釼每把絹八匹鑌鐵銼一把鑌鐵鏡一面各絹二匹鑌鐵二斤絹一匹撒哈剌馬黑瞞每段各絹九匹刀紬畨云黃馬海牙兒每段絹一匹馬服屯即番夏布每二段絹一匹虎力麻五匹絹二匹藍花手巾二條絹一匹桚馥蘭每斤絹四匹硝子阿思馬亦一箇絹一匹硝子遮眼番名矮納三箇絹一匹蛤蚧四箇絹二匹梧桐鹻十斤雄黃十五斤各絹一匹蛇角二枝一表裏羚羊角四斤絹一匹豹皮即實魯蘇皮二張綵段一表裏金線豹皮一張一表裏獅子皮一張二表裏哈剌虎剌皮一張一表裏鐵角皮二條絹一匹銀鼠皮六箇貂鼠皮三箇青鼠皮二十箇白兔皮三箇白狐皮一張駝皮獺皮每一箇各帽一頂癿馬尺即羊甸皮五張絹二匹卜剌硤兒即牛甸皮四張絹一匹哈剌卜花二十張絹一匹樺皮弓一張絹八匹回回木梳細者六箇絹一匹粗者十箇絹一匹珊瑚珠正統中每十四兩絹四匹今每兩絹二匹鎖鎖葡萄每斤絹一匹使臣自進中等馬每匹紵絲一匹絹八匹折鈔絹二匹下等馬每匹紵絲一匹絹七匹折鈔絹一匹新生馬駒中途倒死馬每匹絹二匹駝每隻三表裏絹四匹帶進西馬每匹五表裏阿魯骨每匹六表裏求討正統四年忠順王奏討與紵絲四表裏天順四年王母差來使臣領去厚榜紙中夾紙各三百張心紅三斤金箔一百帖胡椒蓽茇各十斤桐油十斤白􅈨十斤丁香乳香檀香各三斤良薑桂皮各五斤細茶三十斤洗面銅盆一箇成化十三年苦峪城使臣奏討加絹一匹十三年又準加折衣絹一匹十五年再加絹一匹使臣進貢到京者每人許買食茶五十斤青花瓷器五十副銅錫湯瓶五箇各色紗羅綾段各十五匹絹三十匹三梭綿布夏布各三十匹綿花三十斤花毯二條紙馬三百張顔料五斤果品沙糖乾薑各三十斤藥餌三十斤烏梅三十斤皂白􅈨十斤不許過多就館中開市五日除違禁之物并鞍轡刀箭外其餘段匹紗羅等項不係黃紫色龍鳯花樣者許官民各色鋪行人等持貨入館兩平交易該城兵馬司差人密切關防及令通事管束毋得縱容鋪戶畨人在外私自交易如有將違禁等物及通事人等故違者許各該委官體察通行拏問後又奏準未領賞前開市二日領賞後開市三日其奏討沿途收買牛羊鐵鍋犁鏵者聽于臨洮府蘭州地方與軍民兩平收買不許過多仍令伴送人員及所在官司防範不許將熟鐵兵器夾賣及因而生事擾人哈里等三十八國及天方國日落國各賞例與哈密同安定衛洪武七年安定王來朝貢賜織金文綺四匹其貢賜賞例到京國師綵段四表裏絹二匹紵絲僧衣一套舍人并使臣每人二表裏紵絲衣一套僧人每人一表裏紵絲番僧衣一套靴襪各一雙回賜自進并帶進駝每隻綵段三表裏絹四匹馬每匹二表裏襲封洪武八年賜嗣王勑書誥命各一道織金紵絲衣一套綵段六表裏諭祭已故王祭文一道降香一炷新鈔一千貫禮部差通事一員送請封人至西寧衛交割本衛差頭目一員齎封物同原來人前去本地授封别差頭目一員齎祭物另辦齊糧五十石麻布五十匹食茶二百斤量帶軍士同去行祭罕都齊勤蒙古永樂二年賞賜差來都指揮綵段三表裏織金紵絲衣一套靴襪各一雙千百戶鎮撫綵段二表裏舍人一表裏俱與素紵絲衣一套靴襪各一雙存留甘州男婦有進貢者綵段一表裏生絹一匹無者生絹一匹布一匹回賜帶進駝每隻綵段四表裏中等馬每匹二表裏下等馬每匹紵絲一匹生絹四匹自進中等馬每匹紵絲一匹生絹四匹土魯番使臣到京并存留賞賜自進并帶進駝馬等物回賜及買賣俱照哈密例嘉靖二年瑪瑙數珠一串與絹四匹紅絹道布一匹絹六匹鞍子一面絹四匹撒袋一副絹二匹其鑌鐵銼多不真正每貢不過百把每二把與絹一匹三十三年進貢回回青三百三十一斤八兩㑹估每斤與銀二兩三十八年題準五地面自進并帶進過各番王頭目馬匹阿魯骨上等每匹綵段六表裏中等每匹綵段三表裏下等每匹綵段一表裏畨馬中等每匹紵絲一匹絹八匹折鈔絹二匹下等每匹紵絲一匹絹七匹折鈔絹一匹上等馬匹原無賞例比照中