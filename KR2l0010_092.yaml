body:
  text: 禮部志稿卷九十二明俞汝楫編朝貢備考優夷官市番舶賫物永樂元年禮部尚書李至剛奏日本國遣使入貢已至寧波府凡畨使入中國不得私載兵器刀槊之類鬻於民具有禁令宜命有司㑹檢畨舶中有兵器刀槊之類籍封送京師上曰外夷向慕中國來修朝貢危蹈海波跋涉萬里道路既逺資費亦多其各有賫以助路費亦人情也豈當一切拘之禁令至剛復奏刀槊之類民間不許私有則亦無所鬻惟當籍送封官上曰無所鬻則官為凖中國之直市之毋拘法禁以失朝廷寬大之意且阻逺人歸慕之心不罪賫金布磁器永樂二年五月禮部尚書李至剛等奏琉球國山南王遣使貢方物就令賫白金詣處州市磁器法當逮問上曰逺方之人知求利而已安知禁令朝廷於逺人當懷之此不足罪宥朝貢人永樂二年四月麓川平緬宣慰司并木邦孟飬二府俱遣人朝貢平緬所遣使者奏木邦孟養數侵其地禮部臣言宜以孟養木邦貢使付法司正其罪庶蠻夷知懼不敢侵越鄰境上曰蠻夷相攻奪自昔有之執一二人罪之未足以革其俗且事曲直未明而遽罪其朝貢之使祇沮逺人嚮化之心可令西平侯遣人諭之遣還真臘補從行軍人永樂二年九月真臘國王參烈婆毗牙遣陪臣奈職等九人來朝貢方物賜鈔幣表裏初中官往賜真臘將歸有從行軍三人遁索之不得國王以其國中三人從中官歸補伍至是禮部引見上曰中國人自遁何預彼事而責償且得此三人語言不通風俗不諳吾焉用之况其皆自有家寧樂處此爾禮部給之衣服豫道里費遣還真臘尚書李至剛等官言臣意中國人必非遁於彼者或為彼所匿則此三人亦不當遣上曰不用逆詐為君但推天地之心待人可也還外夷質子永樂四年四月車里宣慰使刀暹答遣使貢馬復遣子刀典受學國子監初朝廷出師征八百元江軍民府遣人助給饋運抵車里之境悉為守者阻遏時刀暹答從征八百不預阻遏事然懼為元江所搆故遣典假受學之名為質兾朝廷不疑之上識其意諭禮部臣曰質子衰世之事朕推誠待人不以此也進典諭之曰爾逺來求學固是美意然使爾父母旦夕惓惓萬里之外朕所不忍夫學之大者為忠與孝爾歸善事父母常存心上忠朝廷下恤一境之人即此是學且歸語爾父爾敬事朝廷之心朕所深知但保終如始決非他人所能間也遂賜典衣服鈔幣命隨貢使同歸貢使就居北京永樂五年戊戍諾延衛頭目巴圖率妻子來朝巴圖自陳其母久居北京乞歸省視命禮部賜之襲衣路費令就居北京侍母如欲俱還諾延者聽優禮滿刺加朝貢永樂八年滿剌加國王拜里迷蘇剌率其妻子及陪臣五百四十餘人入朝初上聞之念其輕去鄉土跋涉海道以來即遣官往勞復命有司供張㑹同館是日奉表入見并獻方物上御奉天門宴勞之别宴王妃及陪臣等仍命光祿寺日給牲牢上尊命禮部賜王金繡龍衣二襲麒麟衣一襲及金銀器皿帷幔裀褥賜王妃及其子侄陪臣傔從文綺紗羅襲衣有差厚賜琉球生入監歸省永樂八年國子監琉球生模都古等三人奏乞歸省上謂禮部臣曰逺人來學誠美事思親而歸亦人情宜厚賜以榮之遂賜綵幣表裏襲衣及鈔為道里費仍命兵部給驛傳接待使臣事宜永樂十七年監察御史鄧真言十事三曰禮部職掌禮儀凡各處朝貢使臣至京當隨即具奏接待如儀不使逺人有觖望之心今使臣到者飲食供帳之具一槩委之㑹同館應賞賜者故意遲留又有各處軍民來貢者往往不即奏達只令於㑹同館聽候或十日半月不引奏或已進貢不即發遣有伺候一兩月或至三四月者此禮官之弊也上可其奏令諸司悛改再犯不恕處衛喇特部屬宣德元年衛喇特部屬伊蘇巴哈等五十四人來歸行在禮部尚書吕震奏定賞例上曰逺人慕義舉家來歸撫之當厚布尼雅錫哩乃彼故主今其妻亦逺來名分不同恩亦當異其别與好地宅於是各賜金織襲衣綵幣銀鈔鞍馬有差仍命有司給房屋器皿牛羊月支薪米奏請宴勞夷使宣德元年行在禮部奏請宴勞外夷朝貢使臣上曰四夷賔服世所貴也其使臣今不難萬里而來者皆有慕於中國餼廩宴賜必豐庶昭朝廷優待之意不問表賀過期宣德元年行在禮部奏廣西思明府及思陵等州遣頭目奉表賀萬壽聖節皆過期始至請罪之上曰蠻夷道逺既至矣不必問不責朝貢宣德元年七月白葛達國使臣和者里一思來朝貢遭風壞舟貢物盡溺和者里一思至京請罪且請賜冠帶歸見國王庶知其實造闕下可免罪責上命禮部賜之冠帶俾附鄰國貢舟還復進和者里一思等諭之曰倉卒風水豈人力所能制歸語爾王朕嘉王之誠不在於物自今惟監爾誠足矣厚遇滿剌加宣德六年二月滿剌加國頭目巫實赤納等至京言國王欲躬來朝貢但為暹羅國王所阻暹羅欲侵害本國本國欲奏無能書者今王令臣三人潛附蘇門答剌貢舟來京乞朝廷遣人諭暹羅王無肆欺凌不勝感恩之至上命行在禮部賜賚實赤納等遣附太監鄭和舟還國令和賫勑諭暹羅國王曰朕主宰天下一視同仁爾能恭事朝廷屢遣使朝貢朕用爾嘉近聞滿剌加國王欲來朝而阻於王國以朕度之必非王意皆王左右之人不能深思逺慮阻絶道路與鄰邦啓釁斯豈長保富貴之道王宜恪遵朕命睦鄰通好省諭下人勿肆侵侮則見王能敬天事大保國安民睦鄰境以副朕同仁之心禮部言諸番貢使例有賜豫巫實赤納非有貢物給賞無例上曰逺人數萬里外來訴不平豈可不賞遂賜紵絲襲衣綵幣表裏綿布悉如他國貢使例賜朝鮮冠服正統三年八月賜朝鮮國王李祹冠服初太宗皇帝賜本國王九章冕服惟遠遊冠絳紗袍未賜至是祹遣弟祉奏請上命禮部製烏紗逺遊冠𤣥圭絳紗袍玉佩赤舄及常時視事冠服豫之送歸朝鮮漂海人景泰三年禮部奏比者游江備倭指揮使僉事馬良等擒獲賊徒文吝只等五人送部審得吝只等係朝鮮國漁户入海捕魚遭風壞船漂流海島遇巡海官軍擒獲今朝鮮國王遣陪臣李仍孫等朝貢至京宜給與衣糧就令仍孫等領歸以示優待逺人之意從之琉球生入監歸省成化二十二年三月琉球國中山王尚真咨禮部官主蔡賔等五人在南京國子監肄業已經五年乞放回本國省親禮部覆請上曰昔陽城在學諸生三年不歸省者斥之矧在逺方外國豈可長留不遣其即放歸以遂其定省之私特弛冠裳國禁例嘉靖十三年先是四夷貢使至京師皆有防禁五日一出館令得遊觀貿易居常皆閉門不出唯朝鮮國琉球使臣防之頗寬已而亦令五日一出至是朝鮮國王李懌以五日之禁乃朝廷所以待西北而已為冠裳國恥與之同因禮部以請詔其弛禁旌朝鮮忠順嘉靖二十四年朝鮮國王李峘遣人解送福建下海通番奸民三百四十一人咨稱福建人民故無泛海至本國者頃自李王乞等始以往日本市易為風所漂今又獲馮淑等前後共千人以上皆挾帶軍器貨物前此倭奴未有火炮今頗有之蓋此輩闌出之故恐起兵端貽患本國遼東都司具報禮部議聞詔頃年沿海奸民犯禁福建尤甚往往為外國所獲有傷國體海道官員令巡按御史查參奏處仍賜朝鮮國王銀幣以旌忠順為朝鮮改實録萬厯元年禮部題為乞恩辨誣事該朝鮮國王李昖奏稱先臣李成桂系出全州逺祖翰仕新羅為司空六代孫入髙麗十三代孫安社生行里行里生椿椿生子春是為先臣成桂之父而李仁人乃京山府吏長庚之裔非一李也若王氏四王終始則恭愍王無子隂飬辛肫之子禑為己子及為洪倫等所弒立禑為嗣興師將犯遼東督遣諸將先臣成桂亦在遣中唱義回軍禑釋位與其子昌有恭愍王妃安氏欽奉太祖髙皇帝宣諭當黜僞辛立王氏定昌君瑶禑昌父子皆為瑶所誅既而瑶又不君大肆弒戮國人憤怨相與推戴先臣成桂以主國事欽蒙太祖髙皇帝命為國王而先臣成桂將王瑶便養私邸終其天年後因讒臣揑辭搆語致先臣蒙被惡名伏望聖慈念列聖改正之命憐微臣纍代之寃特降聖㫖令於新典實録明白開載臣不勝祈懇屏營之至題抄到部為照朝鮮國始封王李成桂代王氏以開國作我東藩守臣節而來王輸忠北闕子孫相繼垂二百年據稱宗系各有本源既與李仁人不同又謂國祚由于推戴亦與弒王氏無與在我皇祖之大訓固得于一時之傳聞在伊裔孫之辨辭實出于一念之誠孝除祖訓遵垂久永不敢輕議外合無念其世秉禮義克篤忠勤依其所請行翰林院請出內府續修㑹典新書朝鮮國一冊將奏呈略節纂呈御覽附録本條之末庶祖訓㑹典因以兩存而傳信傳疑各有攸據仍備細開載于世宗皇帝實録垂示永世仍降勑一道諭以聖意一以答逺臣昭雪其先世之誠一以彰聖朝以孝治天下之義萬厯元年六月初三日題奉聖㫖是該國先後奏嗣著史館備書纂入皇祖實録內新㑹典候㫖續修增入仍寫勑諭王欽此恤夷安南祭賻洪武三年安南使臣杜舜欽以其王陳日燈卒告哀請命祭奠上素服御西華門見舜欽等遣翰林編修王廉往祭之賻以白金五十兩絹五十匹安南使臣喪費洪武三年安南國王陳日熞遣其上大夫阮兼中大夫莫季龍下大夫黎元普等來上表謝恩貢方物阮兼卒于南安上賜季龍以布帛有差仍賜日熞紗縠各二匹以銀五十兩為阮兼喪費令有司送柩歸其國十三年安南陳煓弟煒遣其臣陳建琛阮士諤來告煓卒先是朝廷賞遣使賜陳煓上尊文綺既至而煓已死其弟煒署國事遣使奉表謝恩貢馴象方物且告煓之喪詔賜建琛士諤等衣物仍以文綺紗羅往賜煒遣中使陳能至其國弔祭恤渤泥國王永樂六年渤泥國王麻那惹加那來朝以疾卒於㑹同館上輟朝三日遣官祭之賻以繒帛東宫暨親王各遣祭命工部具棺槨明器葬於安德門外樹碑神道求西夷人之𨽻籍中國者守之立祠於墓命有司歲於春秋用少牢祭之仍賜勑撫慰其子恤朝貢夷人宣德九年二月蘇門答剌國王弟哈利之漢朝貢至京以疾卒上謂行在禮部曰彼萬里來朝傾城歸嚮今死當隆始終之恩遂贈鴻臚寺少卿賜誥命官治喪葬給守塜户恤朝鮮陪臣成化二年朝鮮國陪臣工曹參判南倫卒于京師禮部以聞上命給棺木遣官致祭并給馹送還本國飭夷却安南逆臣貢洪武五年二月丙戍安南陳叔明遣其臣阮汝霖來朝奉表貢馴象禮部已受其表將入見主事曾魯取其副視之曰前王乃陳日熞今表曰叔明必有以也亟白尚書詰之蓋叔明逼死日熞而奪其位恐朝廷致伐故托修貢以覘意汝霖不敢隱具言之上曰島夷何狡獪如是郤其貢不受命禮部移書責日本洪武十四年日本國王良懷遣僧如瑶等貢方物及馬十匹上命却其貢仍命禮部移書責其國王曰大明禮部尚書致意日本國王王居滄海之中傳世長民今不奉上帝之命不守己分但知環海為險限山為固妄自尊大肆侮鄰邦縱民為盜帝將假手於人禍有日矣吾奉至尊之命移文與王王若不審巨微效井底蛙仰觀鏡天自以為大無乃搆隙之源乎王涉獵古書不能詳細始號曰倭後惡其名遂改日本自漢歷魏晉宋梁隋唐宋之朝皆遣使奉表貢方物生口當時帝王或授以職或爵以王或睦以親由歸慕意誠故報禮厚也若叛服不常搆隙中國則必受禍如吳大帝晉慕容廆元世祖皆遣兵征伐俘獲男女以歸千數百年間往事可鑒也王其審之復移書責日本征夷將軍曰日本天造地設隔崇山限大海語言異風俗殊俾自為治然覆載之內外邦小國非一所也必有主以司之惟仁者天必輔之不仁者天必禍之前將軍奉書我朝丞相其詞悖慢可謂坐井觀天而自造禍者也往者我朝初復中土日本之人至者使則加禮遇商則聽其去來斯我至尊所以嘉惠日本故遣克勤仲猷二僧行及其境地加以無禮今又幾年矣洪武十二年將軍復奉書肆侮今年秋僧如瑶來乃陳情飾非羣臣言是必貪利為牒者請誅之我至尊不允曰彼小人無知聽其使令殺之何益福善禍淫天監在上我中國安敢違帝命本部既聽德音專差人涉海往問如瑶之來果貪利者歟實為使歟將行羣臣又奏曰今日本君臣以滄海小國詭詐不誠縱民為盜肆冦鄰邦為良民害無乃天將更其君臣而弭其患乎我至尊又不允曰人事雖見天道幽逺奚敢擅專若以舳艫數千泊彼環海使彼東西趨戰四向弗繼固我滅矣然於生民何罪本部復觀彼遊方之徒皆無德沙門忘中國之寬搆是非於兩端識者嗤之治民之國信浮圖而搆大禍古至於今未之有也彼嘗謂元之艨艟漂於蛇海將謂天下無敵吾不知以天歟以人事歟若以人事較之元坐紫塞不假舟梁蹄輪長驅經年不阻而為有疆蓋長於騎射短於舟楫耳況當是時日本非元之仇讐非鄰邦之患害元違帝命好强尚兵加以天厭征伐海風怒號沉溺巨艦淪沒精兵將軍以為國人之能亦何嘗見元師之盛聚則駿騎雲屯散則馬蹄雷震戈矛掣電旌旗蔽空露刃哮吼鬼魅潛所以八蠻九夷盡在馭內惟爾日本渺居滄溟得地不足以廣疆得人不足為元用所以微失利而不爭所以畏天命而弭兵禍以存日本之良民也今乃以敗元為長勝以蕞爾之疆為大以余觀之海中之洲截長補短周匝不過萬里以元之蹄輪長驅而較之吾不知孰巨孰細者耶今日本邇年以來自誇强盛縱民為盜賊害憐邦若必欲較勝負見是非辨强弱恐非將軍之利也將軍審之不弔慰弒逆洪武二十九年安南以其前王陳叔明卒遣其臣來告哀上以叔明篡弒得國諭禮部臣曰安南自陳叔明逼逐其王陳日熞使不得其死因篡其位廢置相仍未嘗來告叔明懷奸挾詐殘滅其王自圖富貴不義如此庸可與乎今叔明之死若遣使弔慰是撫亂臣而與賊子也異日四夷聞之豈不效尤狂謀踵發亦非中國懷撫外夷之道也爾禮部咨其國知之飭表詞侮慢洪武二十九年朝鮮國王李旦遣其門下評理趙胖等貢金銀器布席等物賀天壽聖節又遣其臣權仲和等來謝恩先是以其表辭侮慢逮其撰文之人至是遣仲和來言小邦事大之誠不敢少怠而海外之人學問粗淺未識中朝表箋體製以致字樣差謬聞命以來驚惶罔措欽遇聖節不敢上表故遣陪臣仲和來謝丁卯朝鮮國王李旦送撰表人鄭總等三人至具言鄭道傳病不能行表辭實總等所撰上謂禮部臣曰今朝鮮送來數儒生勿遣其還蓋此輩略通古今未知大道故任其小智調弄戲侮若朝鮮廢置無乃皆數生之為彼數生者幸災樂禍曾不知昔楚囚一伶人耳昔楚伐鄭軍少北鄖公鍾儀陷為鄭得之獻於晉公見之問南冠者為誰有司云鄭人所獻楚囚也晉公召問之鍾儀所言皆中理以語范文子文子知鍾儀雖伶人君子也盍歸之晉楚搆兵連歲不已此人歸晉楚罷兵必矣成公從之厚待而歸之楚遣人報鍾儀之歸晉之德也由是兵解數十年無征戰之勞此一人懷君子之道能排難解紛以安黎庶朝鮮數生曽不如一伶人古人云以道助人主不以兵强天下此數生不為主量力敢為小敵之堅故作戲慢生隙殃民爾移文朝鮮無用是數生留之京師别授微職以杜絶王左右之禍飭諸番國使臣客旅不通洪武三十一年禮部奏諸番國使客旅不通上曰洪武初海外諸番與中國往來使臣不絶商賈便之近者安南占城真臘暹羅瓜哇大琉球三佛齊勃尼彭亨百花蘇門答剌西洋邦哈剌等凡三十國以胡惟庸謀亂三佛齊乃生閒諜紿我使臣至彼瓜哇國王聞知其事戒飭三佛齊禮送還朝是後使臣商旅阻絶諸國王之意遂爾不通惟安南占城真臘暹羅大琉球自入貢以來至今來庭大琉球王與其臣宰皆遣子弟入我中國受學凡諸畨國使臣來者皆以禮待之我待諸畨國之意不薄但未知諸國之心若何今欲遣使諭瓜哇國恐三佛齊中途阻之聞三佛齊係瓜哇統屬爾禮部備述朕意移文暹羅國王令遣人轉達瓜哇知之於是禮部咨暹羅國王曰自有天地以來即有君臣上下之分且有中國四夷之禮自古皆然我朝混一之初海外諸畨莫不來庭豈意胡惟庸造亂三佛齊乃生閒諜紿我信使肆行巧詐彼豈不知大琉球王與其臣宰皆遣子弟入我中國受學皇上賜寒暑之衣有疾則命醫診之皇上之心仁義兼盡矣皇上一以仁義待諸畨國何三佛齊諸國背大恩而失君臣之禮據有一蕞之土欲與中國抗衡儻皇上震怒使一偏將將十萬衆越海問罪如覆手耳何不思之甚乎皇上嘗曰安南占城真臘暹羅大琉球皆修臣職惟三佛齊梗我聲教夫智者憂未然勇者能徙義彼三佛齊以蕞爾之國而持奸於諸國之中可謂不畏禍者矣爾暹羅國王獨守臣節我皇上眷愛如此可轉達瓜哇俾其以大義告三佛齊三佛齊係瓜哇統屬其言彼必信或能改過從善則與諸國咸禮遇之如初可勿自疑也遣諭相侵永樂二年麓川平緬緬甸諸宣慰司并木邦孟養府土官俱遣人來朝貢方物各賜之鈔幣時麓川平緬宣慰使思行發所遣頭目刀門類訴孟養木邦數侵其地禮部言宜以孟養木邦貢使付法司正其罪庶蠻夷知懼不敢侵越鄰境上曰蠻夷相攻奪自昔有之執一二人罪之未足以革其俗且事曲直未明而遽罪其朝貢之使祇沮逺人向化之心可令西平侯遣人諭之拒琉球進閹者永樂二年壬寅琉球國進閹者數人上曰彼亦人子無罪刑之何忍命禮部還之禮部臣言還之慮阻逺人歸化之心請但賜敕止其再請上曰諭之以空言不若示之以實事今不遣還彼欲媚朕必有繼踵而來者天地以生物為德帝王乃可絶人類乎竟還之朝貢妄求正統十一年正月衛喇特太師額森奏所遣朝貢灌頂國師喇嘛徹辰精通釋教乞大賜封號并銀印金襴袈裟及索佛教中受戒合用五方佛畫像及鈴杵鐃鼓纓絡海螺呪施法食諸器物事下禮部議以為稽無舊例請裁之上曰朕撫馭外夷一惟祖宗成憲是式今也先妄求既無舊例豈可勉狥其勿與處南哥藏正統十三年禮部奏四川雜谷安撫司畨僧南哥藏等來朝貢刀劒鐵甲稽舊例畨僧入貢人賜鈔六十錠綵段二表裏折衣綵段四表裏靴襪各一雙今南哥藏係近邊畨僧刀劒鐵甲又非貴重之物前例賞賜過厚宜賜南哥藏等人四十錠綵段一表裏折衣綵段一表裏靴襪各一雙南哥藏以舊例為言不肯拜賜上命罷其賞賜及下程令住㑹同館毋擅出尋素卿輒以金帛餽之鄉人發其事守臣以聞下禮部議素卿以中國之民潛從外夷法當究治但既為使臣若拘留禁制恐失外夷來貢之心致生他隙宜宣諭德威遣之還國若素卿在彼反覆生事當族誅之仍行鎮巡等官以後進貢夷使宜詳加譯審毋致前弊從之禁出入過時嘉靖元年禮部覆御史王珮條陳節貢獻事言四夷進貢有常期漸多違越或到處輒止州縣驛遞騷然煩費宜申明禁例令出入不得過時上是其議飭貢夷冒王稱謂嘉靖十二年五月時西夷人貢土魯畨天方國等稱王號者百餘人禮臣言其非宜請飭內閣議所答大學士張孚敬等言西域諸國王號疑出本國封受或伊部落自稱謂其先土夷使至者稱王亦有三四十人當時並緣所稱答之今遽裁革恐夷情不協乞更勑禮兵二部詳議於是禮部尚書夏言兵部尚書王憲等議覆中國之於裔夷固不拒其來而亦限以制其或名號僭差語言侮嫚則必正以大義責其無禮乃國家大體所在不可忽略今土魯畨天方國使夷多冒王稱謂其本國封受則舊文無之謂其部落相呼則不當聞之闕下若遂據來文並從優答臣恐漸啓戎心西國自此多事將致貢使日增供費賚豫日煩竭府庫以厭溪壑非計之得也臣等請查照成化𢎞治間例回賜勑書正本國王一人餘止照各地面名直書給勑一道且於本國王勑內申重天語少加詰責令知國無二王大義仍定以貢期限以人數不許來貢無時庶幾正名定分謹始防微不失中國制禦外夷之義上從部議貢船違例嘉靖二十六年十一月日本國王源義晴遣使周良等求貢故事倭夷十年一貢船不過三人不過百良等以四船六百人先期而至上曰倭夷不守貢期又挾帶人船越數三司巡海等官不遵例阻回乃容潛住港外引起事端且往年宗設之叛尚未正法其令新巡撫官亟為處分及宋素卿曾决否一併查奏迤北混同三衛入貢成化二年十二月迤北衛喇特太師阿實克特穆爾所遣使臣平章哈薩克特穆爾等不由大同入貢乃挾諾延三衛人從喜峯口入上以迤北使臣既混同三衛入貢只以三衛常禮待之哈薩克特穆爾等意不平通事諭之始大悟上畨書伏罪上以邊使既伏罪仍以本等禮待之過分求討則不許至是辭上乃賜勑諭之降勑省諭使臣成化十一年琉球國使臣程鵬奏乞如常例歲一朝貢下禮部覆奏去年福建守臣言琉球國使臣登岸殺死懷安縣民陳二觀夫妻焚其房屋劫其財物訪察不獲今鵬等將還宜令齎勑省諭并定以貢期上從之勑其王尚員曰王遣使赴京朝貢已如例賞賜遣還近福建鎮守巡按等官奏通事蔡璋等還次福州殺人劫財非法殊甚今因使臣還特降勑省諭勑至王宜責問璋等故縱其下之罪并追究肆惡之徒依法懲治自後定為例二年一貢止許百人多不過更加五人除國王正貢外不得私附貨物并途次騷擾有纍國王忠順之意王其省之不許阿哈瑪特恩賞𢎞治二年禮部言比土魯畨蘇勒坦阿哈瑪特王并其妻哈屯鄂端各具畨表文遣使貢馬本部已請賜馬價表裏此外入貢磁黃青金石非邊關驗放之數不敢進阿哈瑪特又奏稱與哈密都督哈尚結親因乞賜蠎龍九龍渾金各色膝襴紵絲等物然自遣使之後即誘殺哈尚據有其地其不義如此今得免於誅伐足矣何乞恩賞恐不可濫施上曰哈尚為朝廷效力阿哈瑪特既與結親又忍心殺之所奏乞之物皆勿與其令通事以此意諭來使知之十一月舊例賽瑪爾堪入貢俱由甘肅驗送至是阿哈瑪特遣使從滿剌加國取路進獅子鸚鵡等物至廣州兩廣總鎮等官以聞上曰珍禽奇獸朕不受獻况畨使奸詐又不由正路以來其即遣官阻回廣東鎮巡官違例起送宜坐罪姑從寬宥禮部仍移文諭之禮部覆議夷使雖違例進貢然不可絶之已甚宜薄給賞賜并量回賜阿哈瑪特綵段表裏等物以答其意使知朝廷懷逺之仁從之處烏思藏𢎞治二年禮部奏烏思藏畨僧沙卜珠等進貢不齎原降勘合又不經邊關驗送請郤其方物并罪邊關及沿途之失於盤驗者詔以畨僧既到京姑納其貢給賞遣之飭貢獸畫圖來獻𢎞治三年賽瑪爾堪蘇勒坦阿哈瑪特及土魯畨蘇勒坦阿哈瑪特王各遣使貢獅子并哈喇虎豹等獸陜西鎮守太監𫝊德總兵官周玉等先圖形來上隨遣使人馳驛起送巡按監察御史陳瑶論其靡費騷擾請却之事下禮部議謂宜量容一二人赴京依例給賞其餘使人并所貢獸請一切却回量給犒勞且劾鎮守等官以為聖明在御屢郤外夷貢獻異物德等不能奉順德意顧為畫圖奏進請治以罪上曰爾等所言是既貢使將至陜西不必阻回令鎮巡官止起送一二人來京其餘給與口糧令住城內候事完量與賞勞發遣還國獅子等每獸日止給一羊不許妄費𫝊德等姑貸其罪仍移文諭之飭不赴宴𢎞治三年時宴迤西各處使臣於㑹同館滿拉哈濟等十人以賞賜未給不赴宴并毆其同事赴宴者禮部謂法當究問上曰滿拉哈濟等越禮冒法罪在不赦但逺夷無知姑貸之錦衣衛遣官校拘至禮部令本部堂上官及大通事備以事意諭之俾即關領物價啓行再犯必治以罪處土魯畨𢎞治四年禮部尚書耿裕等言土魯畨蘇勒坦阿哈瑪特往年不道朝廷已赦其罪令通使如故繼而遣使貢獅子及馬朝廷復許其自新優其禮遇賞賜犒勞悉從厚典歸順無幾旋復為逆雖曰其中事情曲直不能盡知但其僭擬稱汗名號稱兵犯順不可不慮且國家馭外蕃宜惜大體而待其使不宜太隆前項使人自去年五月到京久不宣召今自三月以來宣召至再復賜表裏布匹羊酒等物正值彼國畨文到京之後彼心狡黠將謂朝廷恩禮視前倐焉加厚以為因彼虛誇强盛似畏彼而然事干國體不可不慎况蘇勒坦崛强西土久蓄不庭之心則其遣使朝貢必擇其親信狡黠者今乃令其出入內庭略無防範其間萬一有奸細窺覘之情潛蓄凶獷不軌之虞雖悔無及今哈密使臣賽音莽蘇爾等應得宴賞俱已完畢未肯起程口稱朝廷仍復宣召夫不寶逺物則逺人格况獅子本一野獸不足為重何至上煩鑾輿屢加臨視遂使逺人得以藉口且給賞畨王物件俱係賽音莽蘇爾收領若再遷延不還必啓夷酋致疑將謂懼被拘執惡心日長將來邊釁又未可知乞令大通事前去㑹同館省諭各夷速還照例送至甘肅至於宣召賞之數乞賜停止庶幾絶其覬覦之望上曰夷使即令回還賞賜其即給之爾等仍督大通事省諭俾知朝廷柔逺之意日本貢夷橫肆𢎞治九年八月禮部奏日本國遣使入貢至濟寧州夷衆有持刃殺人者其正副使壽冥不能約束乞賜裁抑上命今後日本國進貢使臣止許起送五十人來京餘存留游江館榖者嚴為防禁究處盜勘合通貢𢎞治十四年三月江西信豐縣民李招貼與邑人李廷方福建人周程等私往海外與諸畨貿易至瓜哇誘其國人哽亦宿等齎畨物來廣東市之哽亦宿父八禘烏信者其國中頭目也招貼又令其子誘之得瓜字三號勘合底簿故紙藏之以備緩急舟經烏洲洋遭風飄至電白縣境因僞稱瓜哇國貢使奈何噠亞木而以所得底簿故紙填寫一行畨漢人姓名凡百有九人及所貨椒木沉香等物謂為入貢所司傳送至廣州給官廩食之守臣以聞禮部議瓜哇貢使例齎哇字十二號勘合關寫進貢方物名數今所齎乃先年降去底簿非號紙且又填為差批亦非例其事可疑行守臣核實始得其情奏至禮部請以招貼等付廣東按察司問擬奏請其所齎畨物則令布政司貯之八禘烏信盜出底簿故紙與其子宜令布政司移文國王重治以罪仍令謹收勘合底簿毋俾姦人出廣東守臣自今遇外國進貢人至務審其齎有原降勘合方許具奏從之處哈密使臣誣訴𢎞治十年禮部尚書徐瓊等奏言哈密衛貢使都督沙呼實指揮克實克特穆爾等自哈密殘破之後寄住苦峪朝廷不責其敗亡之罪而憫其流寓之窮所以撫綏安插之者不遺餘策及其來朝廩餼宴賜如故近者薄減其衣服綵段之數將以激其興復之心初不為吝惜計至於馬駝方物價值令次所給段絹共五千餘匹以彼不堪之物易我有用之財數愈增而價不虧朝廷懷柔之道亦已至矣夫何溪壑無厭賞賚已畢買賣已完而猶展轉延住反覆奏擾前者本部嘗以其貪狠誣罔等狀奏聞皇上姑令省諭乃復恣其野性誣訴提督主事本部行勘俱涉虛僞况先年因夷人出入館驛生事害人乃設官提督職掌所繫利害匪輕豈可從其自便而夷人一不利已輒肆怨訴若不量加懲治何以讋服諸畨宜凖先年處置日本國使臣例選差錦衣衛官一員帶旗校同兵馬司官至館率通事示以威福促其起程如仍黠傲不從即將各夷執送錦衣衛明正其罪其大通事楊銘等職專答應義無私交當其承㫖省諭之時正宜宣揚恩威明示勸戒乃持本部覆過事由代之敷陳倡令各寫畨文與之封進似有交通之私况省諭夷人止於朝房內各通事受銘等鈐制莫敢異同或有私言皆不能知如本年七月內朝審泰寧等衛犯邊之賊有大通事王英國其子通事王永向前驛審喝罵捶楚廷陛之間尚爾况於朝房者哉今後凡有宣諭請令大通事同本等通事并伴送人等率領夷人到於禮部堂上望闕明白傳驛令其俯伏聽從庶幾恩威宣著奸弊可革詔從之令大通事即從各夷起程不許仍前延住逮問濫起送𢎞治十二年禮部以烏思藏并長河西宣慰使司各遣人來貢一時至者凡二千八百餘人俱應給賞所費不資請行四川鎮巡等官以後不許濫送務查先年勑㫖及本部勘合事例有礙者徑自阻回無礙奏請定奪其今次濫起送官吏請令巡按監察御史逮問從之戒飭潛從外夷正德五年日本國使臣宋素卿本名宋縞浙江鄞縣人𢎞治間潛隨日本使臣湯四五郎逃去國王寵愛之納為壻官至綱司易今名至是充正使因戒飭之琉球請封事例成化十五年八月內該琉球國中山王世子尚真奏稱父尚圖病故乞要承襲該本部題奉欽依差正使給事中董旻副使行人張祥前去勑封尚真為中山王嘉靖七年四月內該琉球國中山王世子尚清奏稱父尚真薨逝請乞頒勑差官齎賜皮辨冠服襲封王爵等因該本部題核查勘應否承襲等因奉聖㫖是便行與福建鎮巡等官從公訪看明白應否承襲有無詐冒情弊具奏定奪欽此嘉靖十一年該巡按福建監察御史虞守愚題稱㑹勘得琉球國中山王尚真病故伊嫡長男世子尚清相應承襲及該福建布政司咨呈粘繳合國人員結勘無礙緣繇前來題請遣官前去勑封行禮等因該本部題奉聖㫖是欽此又該本部題請出使品服查得勑封琉球國中山王遣給事中陳侃行人髙澄充正副使前去行禮給與大紅麒麟白􅰒羅圓領各一件緣羅各一件青羅貼裏各一件齎捧詔勑各一道前去行禮等因題奉聖㫖是欽此嘉靖三十七年正月內該琉球國中山王世子尚元奏稱父尚清嘉靖三十四年六月內薨逝乞要襲封父爵該本部查係尚清嫡長男倫序已定相應差官勑封尚元為琉球國中山王覆題奉聖㫖是欽此續該本部題查得勑封琉球國中山王例該遣給事中行人等官充正副使行禮給與服色俱照嘉靖十一年正副使陳侃等事例并齎捧詔勑前去等因奉聖㫖是欽此續該刑科等衙門給事中等官吳時來等題稱近該禮部題奉欽依差充正使前往琉球國行禮條陳過海事宜三事上請該本部覆題合將齎捧詔勑若國王請留誠懇照例賜給以俯順夷情及咨南京禮部於欽天監選取天文生一名前去其所帶醫生合聽吳時來等南北自便各選擇本鄉諳曉醫術者二名隨往仍咨都察院轉行福建撫按衙門即將應造船隻器用及添撥民兵選擇有司軍衛護送官員等項俱從長酌量取用仍行該布政司開船之後將帶過人員用過錢糧造過器用等項造冊繳報本部查考覆題奉聖㫖是欽此朝鮮請封事例嘉靖二十四年正月內該朝鮮國奏稱嘉靖二十三年十一月十五日國王李懌薨逝乞要將世子李峼承襲父爵該本部題覆合照例請頒詔勑各一道并妃例該紵絲四匹羅四匹西洋布十匹差內臣二員齎捧前去勑封等因奉聖㫖是欽此續該朝鮮國權署國事李峘奏親兄王李峼執喪過哀薨逝無子乞要承襲該本部題覆合照前例請頒詔勑并紵絲等件差內臣二員齎捧前去行禮等因奉聖㫖是欽此嘉靖三十六年十二月內該朝鮮國王李懌奏將長子李峼立為世子事例覆題例該賞賜織金并暗花紵絲紗羅各四表裏該用內臣充正副使合行司禮監題請二員齎勑前去等因奉聖㫖是欽此布文教髙麗向化入學洪武五年三月髙麗國王王顓遣密直同知洪師範鄭夢周等奉表稱賀平夏貢方物且遣子弟入太學具詞曰秉彜好德無古今賢愚之殊用夏變夷在禮樂詩書之習故我東夷之人自昔以來皆遣子弟入太學不惟知君臣父子之倫亦且仰聲名文物之盛伏望皇上察臣向化之誠使互鄉之童得比虞庠之胄不勝慶幸上顧謂中書省臣曰髙麗欲遣子弟入學此亦美事但其涉海逺來離其父母未免彼此懷思爾中書省宜令其國王與羣下熟議之為父兄者果願遣子弟入學為子弟者果聽父兄之命無所勉強即遣使護送至京或居一年半年聽其歸省也土官應襲子弟入學成化十七年二月巡撫雲南右副都御史吳誠奏乞令土官衙門各遣應襲子弟於附近府學讀書使知忠孝禮義庶夷俗可變而爭襲之弊可息仍禁約師生不許索其束修饋送禮部覆奏以為有益風化事在可行如地逺年幼者督令開一社學延鄰境有學者以之為師仍聽提學官稽考上曰然雲南土官世修職貢無敢違越但爭襲之弊往往有之蓋雖由於政而未化於教也其令土官各遣應襲子弟就學如巡撫官及爾禮部所言使蠻貊乖爭之風潛消而華夏禮義之化逺暨顧不美歟外夷陪臣子入監成化十八年四月琉球國中山王尚真奏乞以其陪臣之子蔡賔等五人於南京國子監讀書禮部按洪武永樂宣德間例聞上曰海南逺夷嚮慕文教朕甚嘉之矧在先朝已有舊制其令蔡賔等於監肄業有司歲給衣服廪饌毋令失所務俾通知中國禮義永遵王化太學琉球生省親成化二十二年三月南京國子監琉球國官生蔡賔等五人乞歸省親禮部為覆請上曰昔陽城為太學諸生三年不歸省者斥之矧在逺方外國豈可長留不遣其即歸本國以遂其定省之私夷興繼為外國繼絶永樂四年正月安南胡奃奏請還前安南王孫陳天平上從之天平陛辭奏曰臣下國餘孽荷陛下大德煦育生成得反故國承已絶之宗復已失之位是使亡魂再生朽骨更肉臣雖庸愚實切圖報尚望陛下天地父母曲賜垂顧終保餘齡上曰自古亡國出奔之君如齊桓晉文皆內有主之故反國而安今爾無主於內徒朕為主於外事之委曲尤切朕心爾其明以燭微智以防患仁以恤下寬以容衆庶無後憂賜羅綺紗衣各二襲鈔一萬貫復安南國後宣德元年三月成山侯王通遣指揮闞忠同事安南國王陳暊三世嫡孫皓所遣人奉表及方物至京請復其國上覽表以示文武羣臣且諭之曰昔太祖皇帝初定天下安南最先四裔朝貢及賊臣篡弒其主毒害國人太宗文皇帝發兵誅之固求陳氏之後立之不得乃郡縣其地我皇考每念陳氏無後形諸慨嘆數年以來一方不靖屢勤王師朕豈樂於用兵哉今陳氏既有後宜與之諸臣皆曰陛下之心祖宗之心也且偃兵息民上合天心與之實便上曰論者不達止戈之義必謂與之不武但得民安朕亦奚恤人言於是遣禮部左侍郎李琦等齎詔往交趾罷兵且詢皓果陳氏之後則復其國正朝鮮國裔正德十四年二月初髙麗國王王氏洪武間遇弒而絶陪臣李仁人擅立僞姓凡幾易矣國人得王氏裔瑶立之瑶復昏亂衆推門下侍郎李成桂主國事且請於朝詔許之改名旦令徙居漢成更號朝鮮成桂與仁人本異族永樂間降祭海嶽祝文稱成桂為仁人嗣而祖訓條章亦載仁人及子成桂今名旦者成桂子芳逺奏辨太宗許令改正近所修大明㑹典復注祖訓於朝鮮國下云李氏連弒四王貢使市以歸國王李懌上疏備陳世系本末及四王始終無弒逆迹乞為改正下禮部議以㑹典一書詳載我朝制度其事關外國是非嫌疑之間皆在所略况成桂之得國出皇祖之命其不繫仁人後又有太宗明詔可徵宜從其請詔可且嘉其誠孝賜勑諭之處番僧優禮歸國洪武十四年九月遣西域僧噶瑪拉實哩薩木丹實哩等還國先是西域僧班迪達同其徒噶瑪拉實哩等十二人自中印度來朝命遊五臺山凡六年還京師居鍾山佛寺既而班迪達死至是噶瑪拉實哩等乞歸西域上勑禮部曰昔班迪達來時觀其資貌端潔戒行精慎朕甚嘉之及居中國甚久吾中國僧俗亦重其善行班迪達死而噶瑪拉實哩等篤奉師教敬如存日可謂不背其師者矣今乞歸本國且欲以所歷中國風土人物歸語其國王使王不出户庭坐知中國之盛特賜僧號曰孝淨戒師俾西還凡經歷諸國及諸酋長或問僧何來所厯者幾國僧必具奏言使彼知之且僧來時朕嘗詢其所厯之地聞其景物之異朕亦喜焉况彼聞吾中國之大者乎爾禮部備録朕諭俾僧持歸仍令所至諸國及諸酋長遇僧至宜善送之買茶自備車輛正統四年禮部奏畨僧旺布桑嘉依嘉勒燦等來朝欲買茶六千斤帶回已有明禁未敢擅許上以畨僧僻處逺方非可以中國法令拘也禁之則拂其情順之則為民害宜令减半自備車輛載回禁番僧僭擬成化四年禮部尚書姚䕫等言近給事中魏元監察御史康永韶等陳言修德弭災及畨僧服用僭擬臣以畨僧者異端外教蠱惑人心汙染華夏宜從所言施行詔曰畨僧在祖宗朝已有之若一旦遣去恐失逺人之心踰制服用别行禁止限畨僧授職成化十八年禮部奏在京畨僧既無化導畨人之功且有夷人冒充之弊一授之職輒請誥勑殊與京官必待三年考滿乃給及僧録司官不給勑命例不同實濫恩典乞自今除邊境并外畨及在京國師禪師重職外餘在京覺義都綱等職俱不得妄請庶名器重而事不繁從之驗畨人給度成化二十二年喇嘛國師扎實巴勒忠鼐奏乞度畨僧禮部欲遵成化二年例以三千四百名數度之上命禮部官督僧録司驗其果係畨人者給度毋容冒濫節約畨僧營建正德十年禮部尚書劉春奏西畨俗信佛教故祖宗以來承前代之舊設主烏思藏諸司闡化闡教諸王以至陜西洮岷四川松潘諸寺令化導夷人許其朝貢然每貢止許數人貢期亦有定限比年各夷僻逺莫辨真僞至有逃移軍匠人等習學畨語私自祝髮輒來朝貢希求賞賜又或多創寺宇奏乞名額即為勑賜朝貢不絶以故營建日增朝貢愈廣此皆藉民財以充宴賞繼繼不已雖神輸鬼運其何能應無窮之用哉乞酌為定例嚴其限期每寺給勘合十道陜西四川等處兵備仍給勘合底簿每當貢期比號相同方許起送其人數不得過多自後再不得濫自營建則逺夷知戒民財可省詔顯慶等二寺及洪福寺以後畨僧來貢者賞賜視寶淨諸寺例餘如所議行之頒給畨僧誥勑嘉靖二十八年以烏思藏等處畨僧琳沁嘉勒燦等三十八名各襲同師禪師都綱喇嘛職事駁回查勘納木喀嘉勒燦等三十一名禮部因奏今歲入貢畨僧中多去年已賞今次復來或同一師僧而襲職異名或同一職銜而住坐異地請以後襲誥勑俱開住坐地方及某師某名不得混冒又諸畨節年襲職守候誥勑日久輒令帶原賫誥勑回畨待後入貢之年赴京補給以故諸畨得假借冒頂夤緣行私及今不處則舊誥勑終無銷繳之期非但夷情怠玩抑且國體未尊請以後畨僧襲職令將賫來誥勑納還內府不得如故賫回其新給誥勑速與關領庶絶弊端又各處畨僧襲職進貢本部立文簿一扇各僧賫到舊給誥勑所載師僧職頒給年月及今襲替僧徒名字住坐地方分别己未領有新誥勑逐一登記備行布政司照式置造如有應貢年分即以前冊查對如係年代久逺果有老疾方得起送承襲如係已襲未領誥勑許起送一二人其餘無得濫放報可裁四川畨僧貢人嘉靖四十年四川威州保縣金川寺畨僧每三年一貢例用五百五十人其來已久至嘉靖三十六年禮部據㑹典中所載永樂初例裁其四百人至是復當貢例該寺演化寺禪師遣都綱畨僧拉喀等仍五百五十人來貢執稱自永樂間勑本寺貢方物一百五十分其都綱噶瑪拉等寨方物共五百五十分俱認守各山界隘口又係舊數原非後來增添勢難减革乞凖如舊守臣以聞祇令拉喀等百五十人入京餘四百人留境上待命禮部請以㑹典額內百五十人給全賞餘四百人既稱各有認守地方亦准給賞於中各减絹二匹詔可貢禁禁紉製違式衣成化七年琉球國使臣蔡璟以織金蠎龍羅不顧匠紉製時錦衣衛校尉有緝獲市民與外國人交通者到部鞫之疑其羅出於私交者皆不服及鞫璟固稱為其王國受賜於先朝者事聞上命禮部稽舊籍有無禮部云無遂收貯內庫仍勑諭其國王知之貢使挾私貨成化十四年廣西守臣奏稱安南朝貢齎裝甚多而邊境民少不足運送以致搆怨事下禮部議其國朝貢使人多挾私貨營利殊為邊境之苦乞嚴加禁約故有是命福建貢夷禁例𢎞治十四年琉球國使臣奏守臣虐削事下禮部議令福建守臣今後琉球國進貢方物除胡椒蘇木每一百斤准令加五十斤以備折耗畨錫不必加增外其餘附帶物貨召商變賣者不許勸借客商銀兩及夷商私出牙錢其布政司等衙門市舶太監等官俱不許巧取以困夷人違者罪之著為令譯職國子生習譯永樂五年癸酉命禮部選國子監生蔣禮等三十八人𨽻翰林院習譯書人月給米一石遇開科令就試仍譯所作文字合格准出身置館於長安石門之外處之選習譯書學生宣德七年選習四夷譯書學生初上以四夷朝貢日蕃翻譯表奏者多老命尚書胡濙同少傅楊士竒楊榮於北京國子監選年少監生及選京師官民子弟有可教者並於翰林院習學至是選監生王瑄等及官民子弟馬麟等各三十人以聞命指揮李誠丁全等教之翰林院學士程督之人月支米一石光祿日給飯食習一年能書者與冠帶惰者罰之不通者黜之譯字生考試出身正統二年十月行在禮部尚書胡濙等奏四夷館舊習畨字及新習者六十四人俱照例考試出身次為三等上命一等者冠帶為譯字官逾年再試得中授職其二等三等及有新習者亦逾年再試遂著為令考試譯生賞罰正統三年禮部奏㑹官試得四夷館諳曉回回等字官并監生子弟冀舞等三十二人第為三等請定其賞罰上命一等有官者月加折鈔米二石無官者與冠帶二等三等月减折鈔米一石使知自勵試譯字生三等法正統五年禮部尚書胡濙㑹官考翰林院四夷館諳曉百夷等字監生并子弟得十九人為三等以聞上曰一等者為譯字官仍加俸鈔二等三等者令再習譯字俟期年考之以監生入四夷館景泰二年禮部奏近年官員軍民匠役之家子弟往往私自投師習學畨字希入翰林院譯館及至考試不惟字畫粗拙而且文理不通豈堪為用今後乞依永樂年間例於國子監㨂選年幼聰俊監生送館習學三年例應考試中式者授以譯字官不中者仍令習學以行再試庶革奔競之風而得實才之用上從之禁私自習譯天順三年禮部左侍郎鄒幹等奏永樂年間翰林院譯寫畨字俱於國子監選取監生習用近年官員軍民匠作㕑役子弟投託教師私自習學濫求進用况畨字文書多關邊務教習既濫不免透漏夷情乞勑翰林院今後各館有缺仍照永樂間例選取年幼俊秀監生送館習學其教師不許擅留各家子弟私習及狥私保舉上命今後敢有私自教習走漏夷情者皆重罪不宥限譯字官生成化二年禮部奏四夷館譯字官并子弟見有一百五十四員今教師馬銘又違例私收子弟張睿等一百二十六名教習畨書以希進用欲盡逮問干係人衆行請翰林院下四夷館不許私收教習漏泄夷情上曰四夷館官員子弟見在既多禮部即㑹官考選精通者量留餘送吏部改外任子弟俱遣寧家今後敢有私自教習者必罪不宥限通事濫進成化八年六月庚申朔禮部言鴻臚寺四夷各國通事額設不過六十人今濫進者數濫額外且國子監監生坐班歷事聽選至十四五年者方得授職今各項通事自辦事至冠帶授職通計正是七年所以啓奔競之風是後通事有缺俱從鴻臚寺查勘如果於例應補具呈本部然後行通事都指揮僉事詹升等從公訪保必須精曉譯語籍貫明白行止端方身無役玷者具奏送部審考相同方奏送鴻臚寺戴頭巾辦事六年送部考中然後支米辦事三年比考核身無過犯誤事方送吏部冠帶再辦事三年比與監生出身年月略等始令實授序班職事否則徑發原籍為民其有事故者如原額不缺亦不准補其丁憂起復到吏部者亦須查有額定實缺選補無則仍令聽候如此則事體歸一人無濫進矣從之限譯字官改任鳴贊𢎞治二年禮部奏四夷館通事序班自有專職近或夤緣改任鳴贊似非設置譯官初意自今請勿改任從之申定翻譯考選法𢎞治三年五月定四夷館翻譯考選之法先是英國公張𢡟奏乞選四夷館翻譯子弟監生禮部議行翰林院查處於是內閣大學士劉吉等言推補教師宜聽禮部及臣等訪舉其子弟監生宜因八館文書繁簡為名數多寡令本部選監生年二十五以下二十名官民家子弟年二十以下及有世業子弟翻譯習熟者不限年數通選考一百名俱送本院分撥習學仍定為事例子弟務須專習本藝精通譯語諳曉畨文以備應用不許假以習舉為由别圖出身三年後本院同本部㑹官考試中者為食糧子弟月給米一石又歷三年後仍前㑹考中優等者與冠帶為譯字官月米如舊又歷三年㑹考中優等者授以序班之職其初試不中者許俟三年再試再試不中者許俟六年三試三試不中者黜為民中者食糧冠帶除授如例監生初入館准坐監食糧習學三年考試中者月與米一石家小糧如舊又三年再考中者與冠帶九年考中優等者授以從八品之職習譯備用其初試再試不中准如子弟例三試不中者仍送還本監撥歷别用其兼習舉業者非精通本業亦不許入試庶使人有定志譯學可精其八館名數韃靼館監生五名子弟二十五名髙昌館監生二名子弟八名西畨館監生二名子弟十五名西天館監生一名子弟二名回回館監生二名子弟十名百夷館監生二名子弟十四名緬甸館監生二名子弟八名議從之處通事𢎞治十五年禮部議得近例鴻臚寺帶俸通事者署正典簿等官考滿鴻臚寺考劾呈送吏部但通事未授職之前食糧冠俸實授俱從本部考送既授職之後考滿不由本部其歷任升任年月公私過名有無無所於考凡遇大通事缺員難於推舉各邊差遣難於選擇又其間勤惰不别何以激勸今後各官考滿請令鴻臚寺考劾呈送本部本部考劾咨送吏部近例南方海外諸國朝貢回者不必差官伴送若原來通事别有事故夷人陳乞不已者本部酌量事勢輕重臨期奏請差行人一員伴送始設暹羅譯字官𢎞治十年時暹羅國進金葉表文而四夷館未有專設暹羅國譯字官表文無能譯辨大學士徐溥等以為請上曰既無曉譯通事禮部其行文廣東布政司訪取諳通本國言語文字者一二人起送聽用考選大通事嘉靖元年禮部尚書毛澄等奏請考選精通譯語熟諳夷情者二員為大通事訪保通事屬之鎮巡官并鴻臚寺掌印官遇奉㫖宣諭畨人該部各差屬官公同宣諭事畢即回以防賄漏得㫖大通事俱停補餘如擬行於是禮部覆議其職事令鴻臚寺官同本等通事掌管從之選補通事法嘉靖元年更定選補各國通事之法除丁憂緣事俱不作缺其見缺十人以上及一國全缺者在外行各邊鎮巡官每缺精選一人送部在京不必行通事訪如四夷館譯字生事例禮部劄鴻臚寺召選真正籍貫俊秀子弟取其印信保結粘連送部覆審相同再行考試每缺精選一人奏送該寺分𣲖各國年深老成通事教習如本國無人許其自行從教師受業或令鄰邦通曉者教之一年之後同邊方訪保到部之人通行試以譯語上者收補次者候缺下者黜退不得妄稱守候年久奏告濫收考選之時勘結人員亦不得妄以過犯冒頂之人竄入取罪著為令初通事缺人見任通事訪保橫行求索視利重輕為出入至是鴻臚寺卿魏境疏其弊禮部覆議詔從之通事授職後季考嘉靖九年禮部通事言鴻臚寺通事之設視譯語生熟為職業修否時加考較立法固善但授職之後如弛季考事體未安請著令通事九年授職并六年者冠帶免其季試專取考對以稽職業其未及六年及候缺頂補者嚴考如三次考居下等者奏請定奪報可選四夷館教師大學士李東陽等言四夷館教授必畨字畨語與漢字文義俱通方能稱職故事於本館推選或於各邊訪保務在得人頃來教師多缺宜令本館提督官從公考試優等送內閣覆試照缺委用仍乞勑陜西雲南鎮守等官訪取精曉韃靼西畨髙昌西天百夷言語文字兼通漢字文義之人照例起送赴部奏請量授官職與本館教師相兼教習務使譯學有傳不致臨期誤事詔是斥通事妄奏正德三年十月大通事王喜等奏哈密國使臣沙呼實等來貢夾帶私物虛靡供給所賜盡於京師鬻之其屬留邊者俱未沾及宜加禁詔通事官給由例不由禮部而尚書張升啓之乞如舊便禮部奏覆各夷朝貢例許挾私貨以來蓋羈縻逺人宜俯順其情而不可過防以傷其向化之心也且哈密城池之復在沙呼實亦與有勞今效順而來須加寬假以示恩意其獲賜而鬻之者亦宜從便蓋所得鈔錠數多輸之於彼既無所用而載之於途大有所費宜移文彼處鎮巡等官聽其量帶方物來京貿易但不可入境市物以勞驛傳其留邊夷使之賜審無欺尅聽其自便可也通事官進身既由本部則考滿之日其歷官月日臧否非本部難盡知之且屢奉欽依譯字并通事人員該部并大通事按季較試業不精善罷之喜言非是上是之命各夷進貢毋得入境市物其以物售之者治以重罪存留夷人賞賜令鎮巡官審處通事考滿如例勿改錦衣衛指揮僉事大通事王喜等言㑹同館大使等官不能鈐束夫牌人等乞俱聽各國通事序班等官約束朔望仍欲本館官吏率之來聽已令章下兵部議謂本館諸務先設禮部主事一員理之各色通事亦聽約束蓋通事之職止於傳譯畨語不可以侵禮部之官今主事雖已裁革可仍添設不然則主客司額設員外郎主事亦可更畨管理得㫖令所司歲更一員理之且諭令今後諸司書辦人等不許撥置主使事覺必罪不宥考較譯字官生嘉靖二十四年禮部覆給事中厲汝進奏欲將譯字通事官生㑹同大臣從公考較甄别去留照得前項官生在館人數甚多若復重加查革未免一時之人次翻譯缺通皆係該管教師宜聽內閣裁酌去取精選得人其各官生俱要嚴立期限勤督課業月有試季有考譯業精曉者方准留用不通者黜其通事序班人員收取太濫宜嚴加精選分别去留俱照譯字生事例每日進館習熟畨語以後通事食糧冠帶授職等項俱以三六九年為期通將在館官員人等一併考試不通者黜為民得㫖譯學不精本於選收多弊教法不嚴在館通事人員即㑹同吏部通行考試已乃罰治罷黜有差考選譯字生條議嘉靖四十三年禮部議上考選譯字生十一事一考選世業子弟以畨文定其去取一各生赴考先自報已通未通二等未通者限年二十五歲以下審驗得實取其分數多者作養已通者不必限年必精熟然後入選一教師妄保者許各生面訴坐罪一往年請託成風以致當事者引嫌自避久不舉行宜嚴禁一臨考時雜取漢文三十字令譯畨文各館教師先將底本送部以憑驗對皆彌封較閲一考題各按九館所習畨漢文就中摘出其名數之多寡視館事之繁簡或一館無人習學者則取他館有餘之數補之令其改習一送館之後行提督官如例季考懲戒其有終難䇿勵者徑請罷革至於三六九年㑹考照例食糧冠帶授職其三年不中者重加責治姑容習學又三年不中者黜退為民其食糧三年不中者亦行黜退其冠帶三年不中者令冠帶閒住三年一㑹考例有黜陟人數漸少宜以六年為率每考取二三十人補之一㑹考之期嚴查在館各生若無放給假至三月以上已食糧者住支未食糧者令補足前曠方許送考至於丁憂起復者亦必扣滿三年不許與廷試歲貢同考一官生不得營求差遣曠廢本業一緬甸館師生俱係故絶宜行鎮巡官多方訪補詔允行禮部志稿卷九十二
