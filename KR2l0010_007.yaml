body:
  text: 禮部志稿巻七明俞汝楫編建官小序昔周官宗伯掌五禮為吉凶軍賔嘉吉為上帝羣神先王之祀凶為喪荒弔禬恤賔為朝宗覲遇㑹同問視軍為大師大均大田大役大封嘉為飲食昏冠賔射饗燕脤燔賀慶故宗伯之屬甚設盖文徳炳離禮運昌明之㑹固知伯夷不能獨肩一䕫未易居足矣我太祖衆建諸司最得周官精義而尤垂神于禮故所建禮曺諸職要以師其意不襲其名長貳視上卿司屬以下分曺治事孰非宗伯氏遺法也攷其時秩制三易始定誠重之矣文皇遷都當經營倥􅘓之際猶以駐蹕嚴肅儀軌是急特建行在禮部員扈從以行至定鼎廼革而専設令部官正統而後稍増員額然大指在因事益官非因官益事也故每以師濟為塤箎而不聞以侵曠干庖爼成𢎞以来則長貳顓任詞臣或以蓬瀛清切兼司斗杓或以喉舌尊嚴旋踐黄閣雲雷霖雨毎出春卿地望優崇五官莫及盖亦分輔之淵藪端揆之左次矣可無紀與志建官自周官既湮秦漢以下禮曺未有定制也秦廢典任吏以主發殿中書者稱尚書次為左右曺漢至武帝使左右曹吏分平尚書奏事旋罷成帝始置尚書五曹僕射諸曺外其一為客曺主外國夷狄事光武以客曺分南北稱六曺而吏曺主選舉兼掌齋祀則祠司客司之端見矣魏設五曺客曺分三其下有子曺晉仍六曹客曺分左右南北而四東晉又五曺有祠部無客以左僕射領主客祠部尚書領祠部儀曺自此客曺下列子部中其後特重祠部尚書掌廟祧之禮常與右僕射通職不並置或右攝祠或祠攝右則客祠皆屬左右僕也後魏吏部管南北主客祠部管左右主客北齊改左主客為主爵南主客為主客掌諸蕃雜客事時尚未有禮部也宇文周置春官卿又有禮部而不言職事俄改禮部為宗伯又春官之屬有典命尋改典命為大司禮最後改大司禮為禮部謂之禮部大夫隋開皇中定置禮部尚書統禮部祠部主客膳部四曺唐承隋制不改龍朔中改為司禮太常伯咸亨復舊光宅又改為春官神龍復舊沿及宋元相因無改然宋初以膳次主客元祐以主客兼膳紹聖主客膳部互置迨金元而有禮部無主客元成宗又増禮部尚書一員領㑹同館事然皆為尚書省屬官與周官宗伯掌邦禮之任固有間矣至國朝而禮部之設直追周官之舊盖春官宗伯之職大宗伯一人小宗伯二人率其屬以修政令而今制尚書倣大宗伯左右侍郎倣小宗伯四司屬所視事視周罔異云禮曺之官前代亦無定名秦郎中令屬有五官左右中郎將三署有中郎付郎郎中三郎郎中秩比三百石不屬尚書漢武更名光禄勲而中郎郎中滿六載爵三級外郎滿六嵗爵二級則今員外郎也光武分六曺命置尚書郎三十四人秩四百石每郎缺輙從三署選郎五詣尚書䑓試箋奏初稱守尚書郎中滿嵗稱尚書郎三嵗稱侍郎而客曹主𦍑胡事廼若起草眀光更直𨽻禮晝枕夕楫握蘭含雞瑜糜一丸赤管雙筆則諸曺同之矣魏晉宋齊後魏北齊惟置郎中梁陳两置隋開皇諱忠不置郎中惟置侍郎六年始置員外郎盖魏末常侍晉初侍郎皆有員外散騎而尚書省則自隋始廼漢復有光禄勲主事察諸郎茂才髙等為之秩四百石後魏量曺置主事郎從六品上隋置主事令史煬帝於主事去令史名每十令史置一主事時用士人其子曺侍郎但曰郎二郎省一而陞侍郎于六曺各置一人貳尚書唐則主客郎中一為五品員外郎一為六品主事二為九品時立法日以清官两人侍制衙内郎中員外郎咸與焉御史歴殿中侍御中丞矣必薦最得員外郎郎中栁子厚以監察御史為禮部員外尚嫌驟顯則是禮部自晉宋来稱清曺選重望髙豈一日哉宋制郎中員外郎因之而主事為吏額分案四置吏七然進省八座令僕均統六曺復有左右司郎中員外郎據子部上以遡秦左右曺之意更華要我太祖罷中書省陞六部為二品分寄丞相權而裁左右司釐子部為清吏諸司司置郎中員外郎其職名品秩遂為不易之典云國初禮部洪武元年始置禮部官統於中書省先是中書省惟設四部掌錢糓禮儀刑名營造之務至是上乃命中書省李善長等議建六部分理庻務乃定置吏户禮兵刑工六部設尚書侍郎郎中員外郎主事首以錢用壬為禮部尚書世家為侍郎至上御奉天殿用壬等入見諭之曰朕肇基江左軍務方殷所以官制未備今茲以卿等分任六部國家之事總之者中書分理之者六部至為要職凢諸政務湏竭心為朕經理或有乖謬則貽患於天下不可不慎洪武元年八月中書省奏定六部官制禮部尚書正三品侍郎正四品郎中正五品員外郎正六品主事正七品洪武五年六月定六部職事嵗終考績以行黜陟禮部掌天下禮儀祠祭燕饗貢舉之政其屬有四一曰總部掌儀制表箋厝日贈諡詔赦科舉圖籍樂律二曰祠部掌祭祀醫藥喪𦵏僧道度牒三曰膳部掌燕享膳差器物酒醴四曰主客部掌貢献建言四夷朝貢賞賚設郎中員外郎主事分掌其事而以尚書侍郎總其政務洪武六年定六部及諸司設官之數部設尚書二人侍郎二人禮部設總部祠部膳部并主客四部毎部設郎中員外郎各一人主事各三人通二十人洪武八年置書畫庫官一人正九品𨽻禮部洪武十年吏部奏定六部每科設都吏一人歴九年於從七品出身椽史令史亦歴九年依已定資格出身洪武十三年陞禮部官品秩先洪武元年始設禮部定官秩屬中書省至是罷中書省陞六部官秩倣古六卿之制分領中書之政陞尚書為正二品侍郎正三品郎中正五品員外郎從五品主事正六品司務從九品是年罷禮部備用庫書畫庫是年又定六部官制凡設官吏五百四十八人官一百五人尚書六人侍郎七人郎中二十四人員外郎二十四人主事四十四人比唐制减三十二人比舊制减七十一人吏四百四十三人都吏二十四人令史一百三十四人典史二百八十五人比唐制减四百二十六人比舊制减三百四十五人洪武十五年定禮部官制尚書侍郎各一人捴掌天下禮儀祠祭燕饗貢舉之政令其屬有四部焉曰總部掌禮儀表箋歴日贈謚公式印信學較貢舉圖籍之屬郎中員外郎主事各一人都吏一人令史二人典吏四人曰祠部掌祠祀享祭及樂律祭器犠牲醫學釋道優給之屬郎中員外郎主事各一人都吏一人令史二人典吏四人曰膳部掌燕饗牲豆酒膳及孶牲器物雜支之屬郎中員外郎主事各一人都吏一人令史二人典吏四人曰主客掌朝聘進貢諸蕃来朝建言賔客賞勞之屬郎中員外郎主事各一人都吏各一人令史二人典吏四人承發典吏一人架閣兼勾銷典吏一人洪武二十二年改六部所屬總部之名以禮部總部為儀部又以四部郎中員外郎為屬官主事司務為首領官洪武二十四年増六部司務禄米先是各部主事之下設主事於司務之後署銜月給米二石五斗至是増為三石不署案牘掌催督稽緩勾銷簿書之事洪武二十五年上以中外文武百司職名之沿革品秩之崇卑勲階之陞轉俸禄之損益歴年茲久屡有不同無以示成憲於後世迺命儒臣重定其品階勲禄之制以示天下正二品六部尚書勲正治上卿階初授資善大夫陞授資政大夫加授資德大夫禄月米六十一石正三品左右侍郎勲資治尹階初授嘉議大夫陞授通議大夫加授正議大夫禄月米三十五石未入流各部司務禄月米闕石正五品六部郎中勲修政庶尹階初授奉議大夫陞授奉政大夫禄月米一十六石從五品員外郎勲協正庶尹階初授奉訓大夫陞授奉直大夫禄月米一十四石正六品主事初授承直郎陞授承徳郎禄月米一十石洪武二十九年八月改六部諸屬部為清吏司上以六部之屬皆稱部混而無别故欲易其名因寓飭厲之意凢諸屬部更其名者十有三禮部儀部曰儀制祠部曰祠祭膳部曰精膳主客仍舊皆稱清吏司革除年六月吏部言建文中改舊官制如各部尚書舊正二品陞正一品又増設侍中二員正二品位侍郎上所屬諸司舊有清吏二字皆除去並合遵復舊制詔速復之革侍中禮部尚書仍二品又言建文中改天地壇祠祭署為南郊祠祭署山川壇籍田祠祭署為籍田祠祭署泗州祠祭署為泗賔祠祭署宿州祠祭署為新豐祠祭署又設鍾山祠祭署非舊制上命泗洲宿州地壇定為郊壇祠祭署鍾山祠祭署不可罷行在禮部永樂元年正月以北平為北京二月置北京行部置尚書二員侍郎四員其屬六曺吏户禮兵工五曹清吏司郎中員外郎主事各一人是年命禮部鑄北京行部諸司印十八年定都罷北京行部分置行在六部以備扈從其禮儀之政尚屬于國初禮部九月上命行在禮部自明年正月初一日始正北京為京師不稱行在各衙門印有行在字者悉送印綬監令預遣人取南京各衙門印給京師各衙門用南京衙門皆加南京二字别鑄印遣人齎給于是國初禮部印轉而北矣正統元年九月造行禮部印時尚書胡濙自劾不謹失行在禮部之印上不問為更造之改其文曰行禮部印禮部正統六年十一月正行在禮部為禮部改給禮部印即國初印也先是正統五年浙江寧波府知府鄭珞言國初造两京合于古制自太宗皇帝定鼎北京以来四聖相承正南靣而朝萬方四十年于茲矣而諸司文移印章乃尚仍行在之稱名實未當請正京師禮部尚書胡濙言行在太宗皇帝所定不可輙有變更事遂寢至是宫殿成上乃命各司去行在事而于南京文武衙門増南京二字悉改給其印焉是年添設儀制祠祭二司主事各一員恊理司事天順五年増置禮部儀制司主事一員以尚書石瑁言司事繁冗故也𢎞治五年増設禮部主客司主事一員専提督㑹同館時有舘夫盜夷人財物從兵部奏也正德二年吏部奉㫖查議天順以後添設官員地要政繁不可裁革禮部儀制司及主客司提督夷人主事昔二員非要地而事簡可革者禮部鑄印局副使一員得㫖俱裁革别用萬厯九年裁革儀制祠祭主客三司主事各一員十一年復設今定設正官尚書一員左右侍郎各一員司屬官儀制司郎中員外郎各一員主事二員如遇選駙馬則添設本司主事一員教習祠祭司郎中員外郎各一員主事二員主客司郎中員外郎各一員主事二員内一員提督㑹同舘精膳司郎中員外郎主事各一員首領官司務二員所屬衙門以下照㑹典行人司司正一員左右司副各一員萬厯九年革左司副一員十一年復設行人三十二員舊三百四十五員嘉靖中存三十七員萬厯九年革五員鑄印局大使一員副使一員舊二員萬厯九年革一員教坊司奉鑾一員左右韶舞各一員左右司樂各一員協同官十五員附考國初禮部四屬部各設主事司務一員為首領官通為主事四員司務四員有主事印至洪武二十九年改主事為司官革主事印而司務亦止設二員以司務為首務官永樂遷都設禮部皆因之至今為定制云建署小序夫人臣夙興以庀王事退食而砥素絲建署弗可後矣然卯金兆祚讀黄圗而知射聲之八署典午偏安覽潘金而知虎賁之寓直則治事之宇又非闗國家而急記載者哉矧禮署彰邦教示民不佻伯夷夙夜之寅桓武世德之館寧殊鳳閣蘭臺拱紫㣲而近宸極也者國初之署在留都文皇定鼎於北有行在禮署宣德五年更建今署而廨宇大備規制宏逺矣延迄於今不改翬飛鳥革之舊將宗社實式靈焉謹考厥建置并與其燕息之居詳著於萹是皆君子攸躋攸寧之所也庶使後之覽者知風教之地動景行之思焉志建署永樂十八年八月定京師于北甫經營宮殿開設百司禮部亦在草剏之初未有定署宣德五年二月建行在禮部於北京大眀門之東時五府六部皆未建上命以禮部所典者天地宗廟社稷之重及四方萬國朝覲㑹同者皆有事於此故首建之地位規制皆如南京加宏壯焉六月新作行在禮部成錫宴落之命公侯駙馬伯都督尚書侍郎都御史學士祭酒及通政司大理寺太常寺太僕寺光祿寺鴻臚寺掌印官及本部屬官皆得與禮部堂大門三間西朝扁曰禮部進大門左為鑄印局右為土地祠儀門三間左右角門各五間西廊廊房各十四間左㕔三間為鸞駕伏庫右㕔三間為司務㕔大堂後川堂上掲御製禮部箴後堂五間左右堂火房六間後堂後碑亭二座亭左房五間亭右房六間亭後為架閣庫七間大堂前左上入儀制司右上入祠祭司左下入主客司右下入精膳司儀制司司門甬道左右科房六間正㕔三間左右房各三間川堂一間後堂三間表㕔三間祠祭司司門甬道左右科房六間正㕔三間左右房各四間川堂一間後堂三間主客司司門甬道左右科房六間正㕔三間左右房各四間後堂三間精膳司司門甬道左右科房六間正㕔三間左庫房一間後堂三間附錄夷館正統四年九月改修舊禮部為厰房以館外夷使臣直房景泰三年禮部奏本部職掌四夷外國并各處進貢金銀器皿方物及賞賜之類舊有直房三間係吏房禮三部堂上官每日候朝處所於内收貯各處進貢賞賜等物凢今剌闕臣數多賞賜動經萬計收貯不盡遂使各官每日候官無地可處㸔得吏科北廊房六間是府軍等衛帯刀上直官軍所處猶有空者乞將帯刀官軍併作三間其餘三間撥與本部收貯各處進貢金銀方物及賞賜鈔幣綵縀之類上命如議為禮部直房修署正統七年九月修禮部公署景泰六年五月修禮部四司禮部志稿卷七
