body:
  text: 禮部志稿卷四十五明俞汝楫編奏疏類奏疏凡類奏內條欵不關禮務者不録陳三事疏洪熙元年禮部左侍郎胡濙言十事內三欵闕曰篤親親書曰克明俊德以親九族九族既睦平章百姓又曰立愛惟親立敬惟長始于家邦終于四海惟升下于宗親誠能推恩義以懷之分寶玉以遺之則親親恩篤而天下化矣曰親經史謂經以載道可以觀帝王致治之本史以紀事可以鑑前代興王之繇伏願萬機之暇法乾行健繼離向明常接儒臣講論經史則聖智益博睿謨益廣而與二帝三王同一揆矣曰嚴祀事書曰鬼神無常享享於克誠仲尼曰祭如在祭神如神在近見各處應祀神祗壇廟傾頽棲神無所甚失國家所以祀神之道乞令所司以時修葺此有國家之大事也疏上上嘉納之覆行三事疏正統二年八月河南布政司李昌祺言三事一城市鄉村舊時俱有社學近年廢弛即令各按察司添設僉事專督學政乞令府州縣正官量所轄人户多寡創修社學延師訓之遇儒學生員名缺即於社學無過犯髙等子弟內選補庶得學業易成一近者禁約僧尼誠為厚俗首務比見河南各府縣衛所有軍民男婦自稱端公師婆托神惑衆人有病不事醫藥惟飲符水以故死常八九傷人壞俗尤甚僧尼乞嚴加禁治再犯及邀請容隱者悉罪之一前代忠臣烈士載在祀典若宋丞相文天祥授仕於傾危之際脫身於俘執之中倡義勤王艱難萬狀功雖未究忠則有餘竟能取義成仁從容就義為千萬世臣子之式而鄉無時祭諡乏美稱人皆嘆惋以為缺典乞准察張巡許逺例頒降祭文儀注令吉安府支給官錢收買牲醴春秋正官於廬陵祠堂行禮仍乞追賜美諡表顯忠貞以勸來裔上嘉納之命行在禮部會官議行議行五事疏正統七年國子監祭酒李時勉言五事一聖朝科舉之設皆欲得人以資任用未嘗有輕重分也比繇教官九年考滿以舉人有無多寡為黜陟遂重科舉而輕嵗貢第以次起送不復論其學之淺深及貢入監考其大義十無一二可否各衙門取撥厯事多不諳書算又有貌陋老病者虛費朝廷作養乞今後嵗貢生員務選資質端重通曉文義書算者充貢其愚劣貌陋者悉黜為民教官考滿嵗貢皆中科舉雖不及數亦本等用科貢俱中者升用科貢俱不中者降用如此則科貢俱重而人才輩出一撥歷監生永樂間俱以入監年月為先後厥後祭酒陳敬宗奏准以坐監年月為先後而兩監邇年仍以入監年月為先後以此丁憂省祭之徒在家延住七八年者有之十餘年者有之詐稱丁祖父母或繼母嫡母憂有司朦朧保結比至入監即得取撥倣效成風不可遽止乞今後惟依實坐監年月淺深以次取撥其丁憂省祭之類俱不作數如此庶勤怠有所懲勸虛詐無繇效尤一嵗貢中式生員分撥南北二監肄業已有定例緣本監各衙門取撥辦事歷事數多監生不敷兼在監諸生多年老少諳書算乞今後嵗貢生員四十以下告願讀書者存留本監以備取撥一醫學所以療疾全生不為不重本監雖有官醫二名每遇監生患病省令醫治緣無官給藥材多有艱難不能措辦乞敕太醫院量給藥餌陸續送監收貯監生有病令醫者對症修治一近年有俗儒假托怪異之事飾以無根之言如剪燈新話之類不惟市井輕薄之徒爭相誦習至於經生儒士多舍正學不講日夜誦憶以資談論若不嚴禁恐邪說異端日新月盛惑亂人心實非細故乞敕禮部行文內外衙門及提調學僉事御史并按察司官巡歷去處凡遇此等書籍即令焚毁有印賣及藏習者問罪如律庶俾人思正道不為邪妄所惑詔下禮部議尚書胡濙等以其言多切理可行但欲取太醫院藥于本監治病原無舊例難從上是其議覆行三事疏正統七年直𨽻大名府內黃縣掌縣事知州宋安言三事一各處迎詔官員俱乘騎于儀從前導引禮曰下公門式路馬况詔敕降臨龍亭在後臣子何可乘騎前驅乞敕自後官員迎詔俱于儀從前步行導引老疾艱于捷步者許于龍亭後乘騎隨行一各處故官多有不肖子孫將父祖所遺紗羅紵絲錦綺衣服鬻於樂人及假鄉村報賽男婦粧飾作戲古人雖貧不鬻祭器况父祖遺衣乎乞敕該部移文禁止一禮曰鄰有喪舂不相里有殯不巷歌今各處愚民有遭父母兄弟之喪殮葬之期宰牲筵欵弔祭姻朋甚至歌唱以恣歡乘喪以嫁娶者傷風敗俗莫此之甚乞敕該部嚴禁約之上命該部議行議覆四事疏成化十一年正月國子監祭酒周洪謨言四事一今臣庶祠堂之制悉本家禮髙曾祖考四代設主俱自西而東考之神道古無其說惟我太祖髙皇帝太廟之制允合先王左昭右穆之義宜令一品至九品止立一廟但以髙卑廣狹為殺神主則髙祖居左曾祖居右祖居次左考居次右於禮為當二在外衙門時節行禮宜令致仕官與有司官依品級髙下序列班次三天下府州縣學祭先師孔子多有禮無樂宜令禮部以樂歌之詞舞佾之數行下有司置造樂器俾士子以時習肄四欽天監所藏選擇厯書係洪武間撰定頒行今民間不見此書宜遵舊制刋布天下事下所司議聞禮部覆奏洪謨所言祠堂之制乞命翰林院參酌更易具奏處置所言在外行禮班次緣致仕與見任同乞通示天下遵守及受封官亦合與致仕同所言學校祭祀先師合用樂舞緣樂歌八佾舞用人數多而州縣學生數少乞行天下止令俟豐稔之時補造樂器所言頒行選擇厯書乞令欽天監印造遇陰陽學官赴監聽考者人給一本使與官民之家遵用從之覆奏四事疏𢎞治元年禮部覆奏左都御史馬文升所奏四事其曰逐術士者宜令各該巡城監察御史及五城兵馬司并錦衣衛巡捕官逐一搜訪但有扶鸞禱聖驅雷唤雨捉鬼耳報一切邪術人等及無名之人俱限一月內盡逐出京仍有潛住者有司執之治以重罪主家及四鄰知而不舉者連坐其曰清僧道者宜令兩京僧道籙司并天下諸司通查敕建敕賜并古剎共若干所給度僧道共若干名備造文冊送部存照仍將十年一度之例停止待額數不足之日所在官司照額起送給度內外衙門不得指以救荒納粟為繇奏請給度違者科道糾之其有擅自修蓋者即便拆毁如無度牒僧道行童發回當差敢有私創寺觀及容隱僧道行童者僧道官并住持俱發附近衛分充軍所司官員不舉以枉法論其曰懷四夷者今後入貢夷人筵宴宜令光祿寺堂上官一員提調要務豐潔本官差官一員督察其朔望并陛辭酒食令該日侍班御史巡視但有尅減菲薄者將光祿寺官并局長等究問其曰節財用者成化四年以前每嵗用甘松等料共千六百三十五斤以後增至千八百八十五斤十一年後又增至二千八百六十五斤雖稱各年間拖缺本部亦已纍行催納緣俱係民間出辦差人解運勞費實多其光䘵寺供用牲口正統年間每年各色數止四萬至天順間漸增數多成化元年奏准每年不過十萬十六年以雞三千折猪三千鵝五百折羊五百添𣲖湖廣等處買辦以小易大價過十倍况近年以來各處凶荒人民艱食乞將內府供用庫二次增添香料數內量減一二光祿寺牲口願納雞鵝者免其折納猪羊仍於十萬數內量減以蘇民困上曰所言皆是逐術士爾部中仍出榜禁約香料照成化四年數解納折納猪羊令光祿寺計算以聞陳七事疏𢎞治二年禮部尚書耿裕等以災異言七事一寅畏天戒謂自元年三月至二年六月各處報奏天鳴地震地陷山崩風電雷雨白毛黑氣等項災異不止二三十次其大水淹沒田禾人畜係户部抄行者猶不在此數天心仁愛一至於此先帝大祥已屆禫除有期陛下孝思之心當於此而益加切防微之慮當于此而益加審倘左右之人有先意逢迎導聲色而倡遊觀通禱祠而進珍玩者宜痛絶之庶以盡今修省仰答至誠一省減貢獻謂各處鎮守內官與掛印總兵官今後遇慶賀萬夀聖節各仍舊進馬二匹不許過多其副總兵參將協守分守守備內外官俱不許進貢科擾違者許參奏究治一停止折納謂雞猪鵝羊其價多寡不倫乞令光祿寺止折納猪三千口羊五百隻其雞鵝仍舊解納為便一革退軍厨謂光祿寺厨役原額六千三百八十四名成化十一年奏添五百名二十三年太監山青又奏添一千名每名月食糧一石又日支白米八合濫費無已乞將青奏添之數悉令革退遇大庖厨等處缺役即于原額厨役內揀選僉補以後內外官不許輒奏收役一慎重教職謂今後教職請仍舊止于科貢二途出身者考授其餘納粟出身者不許濫與一均平取士謂今後會試取士請仍舊照宣德年所定南北中之數南取六北取四中取二以為常一改調官員謂今後有與王府結親官員除護衛儀衛司軍職照例不必改調其餘不分軍民職官但在一城居住者請俱令照例改調或致仕閒住上曰寅畏天戒是防微杜漸之意朕當體行光祿寺折納猪准減一千口軍厨仍舊其餘皆准行覆奏三事疏𢎞治二年禮科給事中王綸陳十事內三欵曰廣科目以崇文學者謂我朝三年一開科解額有限取士之途尚未廣乞斟酌量添名數其嵗貢生之為訓導者三年後宜考選許其鄉試曰去淫邪以敦大化者謂京師西山四月八日有香山之㑹正月十五有戒壇之會男女混狎乞嚴禁之曰嚴遴選以得真才者謂各處嵗貢生員俱以食糧年深輪充取之既不精及赴禮部願就教職者試于內廷又多傳遞懷挾之弊乞慎擇之于先痛革之於後庶教職漸可得人下禮部覆奏以為方今鄉試舉人數額比舊已多難再增加嵗貢生已就教職者亦不許與在學生徒一概奔走鄉試餘所言多可採用其曰體天心修實德者惟皇上尤加之意上從其議看詳三事疏𢎞治四年鴻臚寺右少卿李鐩應詔言十二事內三欵一定禮制諸司職掌所載冠禮止有親王而東宫者不載婚禮止有親王公主而東宫者不詳及建立東宫冊封親王幸太學耕藉田上徽號等禮又皆不録乞敕禮部取近年行過儀注并廷試進士面諭大臣天下諸司朝覲諸未偹禮儀逐一議處得宜或續于職掌之後或别為一書與職掌並行一置齊房每大祀時分獻陪祭等官俱無齊房臨時借居道士房榻貴賤雜處且宣召不便乞敕工部於壇內空地倣天夀山朝房體製蓋造齊房一禁邪妄乞敕工部毁戒壇敕禮部都察院禁僧人坐禪打會奉籙受戒等事下所司看詳以聞議覆六事疏𢎞治四年南京國子監祭酒謝鐸言六事一曰擇師儒謂願求道德之士如唐之韓愈宋之楊時者以為太學師又必得廉靜恬退嚴重剛方之士為各布政司提學憲臣庶無負教化之實一曰慎科貢謂今之所當科舉者雖可得豪傑之士亦間有虛浮躁競之風其所習多俗儒纂録支言長語不知經火大義乞一切禁絶今之所謂歲貢雖稍勝輸粟之徒亦多因循姑息之弊其補廪或以家貧久次乞憐而得宜痛加裁革庶幾升于國學皆可任用一曰正祀典謂孔廟未從祀者若龜山先生楊時乃伊洛正傳息邪放淫以承孟氏宜進已從祀者若臨川郡公吳澄受宋之恩如此其久歷元之官如彼其榮迹其所為曾不及洛邑之頑民宜黜乞升時以上祔宋諸賢之位黜澄以下從莽大夫之列則于世教不為無補一曰廣載籍謂本監書板舊多藏貯散在天下未免有遺乞敕各布政司凡係經史書板盡送南京國子監以復國學儲書之舊免有司贈饋之勞一曰復會饌謂宜修饌堂以便往來造器皿以供日用一曰均撥歷謂科貢多而納粟少十分中乞以六七分屬科貢三四分屬納粟庶得變通之義下禮部覆議謂鐸所奏深切時弊俱可行但欲黜吳澄升楊時從祀先此已屢有陳奏具難别議從之陳八事疏𢎞治四年禮部尚書耿裕等應詔陳八事一曰尚勤儉謂勤則心不他役政事不怠聖學無間儉則志不外奪用度裁省物無妄費皇上自即位以來勤儉著聞惟日慎一日不替初心則可以感格天意一曰議宗室謂天下王府册封婚葬居第食䘵等費皆出內帑與下民供億本部查自今年正月至四月郡王將軍下至夫人儀賔受封薨逝已八十餘人夫天下地有定所賦有定額加之水旱頻仍人民凋耗而宗室之費日增計三月數尚如此一年可知推而至於百年之久又將焉出宜下文武大臣會議務為善後之計一曰減齊醮謂皇上臨御之初禁止齊醮雨雪未見愆期比因雨雪不降啓建禳熒齊醮動經旬月所費不資茫無應驗以初時禁止較之啓建祈福誠為無益宜仍禁絶以除姦蠧一曰汰冗員謂官多則民擾而增設衙門百費紛起尤為不便本部自去冬十月至今嵗四月僅半年間該鑄開設衙門印信關防銅牌已八十有餘似此增設無嵗無之乞命吏部查天下添設官員及新增衙門凡有冗濫悉加裁省一曰省供應謂山東河南北直𨽻等處連年亢旱民多逃亡宜將光祿寺奏𣲖各處猪羊雞鵝𢎞治五年前所缺悉與蠲免其已徴未解價銀發災傷處賑濟𢎞治六七年停免原𣲖之半俟年豐補納庶民困少蘇一曰免厨役謂太常寺新僉山東河南北直𨽻厨役多難起解緣其地災傷僉解費廣俱纍里甲乞悉令停止以少安人心一曰罷營造謂天時亢旱軍民憂惶土役繁興人力困􅉵祖宗陵寢固不可不修至於浣衣局果園溝渠河岸等役皆可少緩宜命督工官將完者趍完未興工者即皆罷之一曰止差遣謂近年降人押送兩廣或差部屬或進士或通事初無定例而通事在外越禮犯分往來騷擾自今但差兵部屬官及行人為便疏奏上曰所言是尚勤儉朕當自勉議宗室汰冗員仍㑹官議處齊醮即令停止供應可省工役不急者所司查勘以聞厨役及押送官如議議覆五事疏洪治七年五月欽天監天文生聞顯言五事一謹齊戒惟大臣在衙門宿歇而屬官不至至者又或飲酒不謹宜行禁約一遵制書近在外布政司等官到京每年各以厯饋送或貨賣京民至以易食物輕䙝國制乞行禁治一觀天文六年十月庚辰二鼓東有星如雞蛋大青白色光起栁宿東行至近濁四鼓南有星亦如雞蛋大青白色光起南河東河行至近濁尾跡炸散十一月甲辰夜三鼓太陰與司怪星相犯本監官將二雞蛋大星改作彈丸大太陰凌犯隱匿不奏且本臺官例與天文生上臺協同觀候多懶惰不行乞許天文生呈究一明事例京官軍民勢豪之家奢靡相尚婚姻醵會率用大樣餅糖纒髙頂獅人渾金衣服寶石首飾越禮僣分無所不至先年纍有禁令未聞問發何人乞敕該部嚴加申明一公考試兩京應試生儒人等舊例止許三千三百有餘司小試者拘此一縣或所取多不過七八人少不過一二人乞不拘以名數但文理平通者取之入試則人才無所遺下禮部議以為舊例京官大小俱齊宿者惟大祀天地為然如太廟社稷等祭惟陪祭執事等官齊宿餘無所預今顯欲大小官凡祭皆一體齊宿紛擾難從其所言齊宿不謹聽科道并㸃閘官劾治欽天監進厯日頒行之後即分布內外各衙門蓋欲小民知耕作早晚之宜識吉凶趨避之道所宜逺近通傳監厯安能遍及以故每年各布政司厯流傳到京資助分布顯不諳大體輒欲禁革遂使公用之制書下同違禁之私物宜行天下凡監厯傳布出外及各布政司厯傳布來京者俱勿禁中有貨賣及易物者許巡按巡城御史并五城兵馬捕治之內靈臺天象小者俱不該占候其言臺官上臺占候宜行本監查例遵守但靈臺郎李英擅圈注二雞字及本監參顯假陳言以泄私忿俱當究問其言奢靡事宜申明舊禁如有仍前僣用違式者許科道官指名糾劾及該巡城御史錦衣衛五城兵馬司緝拏治罪各處鄉試因先年入場人衆難于供給俱有奏准定數遵行已久若不拘額數恐一時任意增添僥幸愈多徒為紛擾上是其議令只照奏准及見例行顯挾私奏擾并李英刑部俱違治二次流星例不占奏仍令吳昊張紳具實以聞既而昊等伏罪上曰爾輩職專占候天象失於占奏法當治既伏罪姑宥之陳五事疏𢎞治十七年禮部尚書張升等言五事一禁侈靡謂服舍婚喪國有定制近年織異色花樣造違式房屋而京師尤甚今後請悉遵諸司職掌及洪武禮制制度違者依律治罪一重名器謂金蟒等衣非人臣常用之服今後內外官不許一概奏請違者許科道官指名糾劾治以重罪一省供應謂光祿寺寄庫進素價銀乞發出補該寺之急以省民財一併解納謂內府香料并太醫院藥材惟蘇松四川遼東總解其餘皆陸續起解為害多端請自明年為始各該地方將額辦香料等物徵完在官差人總解一裁冗濫謂近年添設通事過多貪冒之徒得以濫補補後三年月有食糧之資實授序班嵗有皂𨽻俸銀之給及差送夷人復唆使沿途生事作弊為甚今後除一國全缺該補外餘缺必總類十名以上方許奏行各邊起取及行人大通事訪保庶僥幸之徒不致濫進得㫖卿等所言切中時弊省供應朝廷自有處置餘皆准行覆行四事疏隆慶元年御史王得春條奏四事一清宫闈謂纍年選入宫人充滿掖庭其中老弱幽閉者未免抑鬱愁怨有傷和氣宜悉簡出一禁諂諛謂邇年多獻祥瑞以干恩澤偹極諛辭即有災異匿不以奏甚非憂治危明之意乞曉諭中外臣工毋得仍蹈故轍四方水旱疾疫冦賊奸宄即宜據實報聞一慎題覆謂比來章奏繁多必該部秉公執奏明㫖斷而行之乃為遵君命重主威之義近言官論事奉㫖擬議該部率多委曲遷就以致政令不一下不知所守請敕各部今後章疏是者即為覆行非者即與論罷不必依違兩可以紊國是一慎貢選謂近奉詔令用人毋拘三途誠為美意但嵗貢中沉淪日久壯志已隳似難責其䇿勵宜查覆選貢例與正貢並行又宜慎選提學無尚虛名其取士不當者即加顯黜禮部覆奏從之覆十四事疏禮部尚書沈鯉題為正學校崇節儉以隆聖治事該禮科抄出給事中孟養浩李汝華御史李天麟等各具題到部及諸臣條議未偹者逐一擬議上請伏乞聖明裁定敕下本部勒成書冊通行各直省撫按並提學官轉行各該府州縣查照題奉欽依內事理永為遵守施行等因一明大義夫國家養士以學校而取士以科目者何為乎蓋鄉舉里選之制不可復不得已而觀人于言語文字之間以求其賢與才者為國家用其大義本如是也今之士不復如此義久矣父兄之教其子弟師友之相為勸勉童䝉之習為誦讀者惟知取青紫榮身家為事如古人之明體適用修已治人以畢吾性分能事者不惟無其實而亦不知其名如是而欲人心吏治之復古得乎合無將提學敕諭首一二條極切士習凖有司衙門戒石制度勒之貞珉竪于甬道使士子朝夕諷誦仍刻為書冊廣布于里社小學斯人知為學大義而士習可正吏治或可復古也伏乞聖裁一重始進夫所謂始進者除童生送考生員起貢舉人㑹試各照常規起送外至於生員科舉一得中式即有民社之寄於稽核更宜加詳且人數不多即品藻亦易為力請令自今以後各省提學道於考試發案之日即同各提調官及本學師生將取中科舉生員當堂逐一審問如有犯該不孝不弟慢師傲長􅒬酒賭博出入公門武斷鄉曲教唆詞訟包攬糧差舉放私債㩦妓宣淫營私保舉雜處下流卑汚茍賤者許其指名開報當即革退即以三等首名附二等之末補其額數仍照案內次序取具五人互保一人容隱則四人連坐俱各不准應試所在監臨御史遇該大比先于本年正月申飾提學道及提調官務將科舉生員嚴行稽察仍不時體訪果有行劣者即坐名行布政司及提學官革其應試則始進以正而人知敦行繇此矣伏乞聖裁一崇行誼查得近年提學奬率士類未嘗不諄諄以德行為言而考藝論業亦未嘗不孳孳於窮經明理敦本尚實之務乃士習卒不可變而尚德之風未有自學校先之者則以其有名無實人不信服故也合無自今已後凡提學出巡一到地方即將所訪行優行劣生員公同提調等官多方參問於合學諸生舉其與公論符合毫無可疑者各量其善惡輕重分别賞罰務禆羣情快愜的然可示勸懲不得虛應故事使人以為口實如是已畢方另日考校文藝如賞過行優生員以文藝考居劣等者免其降黜罰過行劣生員有年青而姑容肄業者雖文字考居優等止許給賞不許補廪幫增則一先後低昻之間即可以示崇尚之意而人不以為文具矣伏乞聖裁一督提調夫帝王平治天下大端惟治教養三事皆缺一不可者也國朝崇重教化載在律令㑹典到任須知及教民榜文等項條格者班班可考曷嘗不以教化為先務哉乃近年以來有司既視之以為迂濶而上司考課有司者亦不據此以為殿最無惑乎風化不行而士習日卑也合無行令撫按衙門申飭所屬司道開注有司考語除操守外即以治教養分為三欵各疏事蹟于下三事俱偹者為上考二為中一為下提學官出巡事畢除自已觀風問俗興賢舉孝修明禮教仍專以教化一事考課有司分别等第開報撫按以憑舉劾吏部行取推升亦據撫按所開以為上下至於作興學校則遵照敕諭卧碑事理勤加考課或以本州縣編定季考銀兩隨便動支以為奬賞之用伏乞聖裁一社學之制創自國初不惟䝉養甚便且使窮鄉遐壤庠序之教所不能遍者無不知有絃誦之音意至宏逺矣惟近年有司不肯設署教讀或間設一二而各鄉不遍及待不以禮者蓋里無其師而社學之廢也久矣夫論文藝則生員為上論䝉養則教讀為專故小學之師不但可置於里社即城市皆所宜設也合無行令各提調官於在城坊廂在鄉村落量其民居疏密道里逺近置立教讀名色給與方巾圓領免其雜派差役使專教幼子弟先習小學與禮儀孝弟之事如有通曉文藝堪以作養者亦許提調官於提學按臨之日附搭取中童生一體選考其教習有法誨人不倦者嵗終量加奬賞或破格優免以示激勸伏乞聖裁一鄉飲酒禮乃貴德尚齒之意故賔介雍容禮文揖遜俾觀者有所興起至盛典也近來有司視為故事多將考察去任衙門退役及為事犯罪之人為其子孫顯貴或在冠裳之列徇情濫請有傷風化且辱盛典合無通行各該有司查照律令憲綱務要慎加推擇每次舉行之後即將所請職名逐一開送撫按及提學分巡道備加查訪果否允協輿情中間有無私弊其巡按御史及該道出巡之日遇該考察有司即以此為一事如有前項罷閒有過之人濫與鄉飲者追究原舉師生一併罰治有官職者與注劣考伏乞聖裁一聖訓六言勸化民俗而設木鐸徇於道路則所以提撕警覺之也近年以來此舉久廢合無行令各掌印官查復舊制于城市坊廂鄉村集店量設木鐸老人免其差役使朝暮宣諭聖訓伏乞聖裁一鄉約之設所以訓民即古道德齊禮之遺意也為有司者能鼓舞有術民未有不勸於善者宜於所轄地方酌量道里逺近隨庵觀亭館之便置鄉約所以皇祖聖訓大明律例著為簡明條示刋布其中即于本里擇衆所推服者一二人以為約長使其督率里衆勸勉為善掌印佐二教官倣古巡行阡陌之意每月一次分投各所集衆前來聽講聖訓律例使各家喻户曉講畢仍令約長舉報本里為善為惡之人及曾改過自新怙終不悛者而質于衆果無異同隨即登記簿籍分别懲勸如果年髙有德者或旌以扁額或免其雜役或申准合干上司給與冠帶榮身以示鼓舞伏乞聖裁一鄉賢崇祀載在令甲典至重也苐舉行日久寖失初意有官以賄敗及居鄉不檢者往往緣子孫顯貴朦朧混入有志之士羞與為伍冒濫之弊至今極矣合無今後督學官每嵗終將所屬府州縣舉到鄉賢已准入祀者造冊二本申送部科以憑咨訪查考如有濫舉市恩不協公論即指名參革以光祀典伏乞聖裁一名官崇祀以其在任能為百姓禦災捍患澤及一方故士民相與尸而祝之以報功也近來祀典太濫有等碌碌無聞民未見德一旦為其子孫見為顯官即與曲意阿承使得濫與俎豆之列殊可痛恨合無今後督學官偹查某人在任功績果否顯著人心有無翕服如果無礙方許送入仍照鄉賢例嵗終一體申送部科查考不得曲徇私情致傷公道伏乞聖裁一義夫節婦禮宜表揚據各處奏到甚多其中不無寒微沉滯而仕宦顯貴之家獨得先䝉褒表何以服人心而昭公道合無行令督學官於按臨考試之日即令各提調官將其境內節義應該旌表者即便具申案候仍于賞罰生員已畢舉其所申名氏面加咨訪不惟可見的實亦免吏役阻勒致使寒微之家久為沉滯伏乞聖裁一各處旌表孝行確當者固多其中容有名實不相副者蓋據一時之迹而未暇究其生平也今後除割股一事原有明禁無得概舉外其以廬墓等項推舉孝行者必其平素為人果能服勞奉養不致虧體辱親無間父母昆弟之言者方許題請表揚其有嫡孫承重能盡孝祖父母者亦許一體旌表伏乞聖裁一婚葬宴會房屋車輿衣服首飾傘蓋器皿等項俱經本部遵照成憲題有定式又該都察院題刋憲約不啻三令五申矣乃風俗奢靡如故則倡率未至而禁令不嚴也合無行各撫按嚴督所屬有司約會境內士夫力行儉約以倡衆庶倡之不從則量其情之輕重罰穀備賑或升其户口則重其徭役以困辱之如有工匠人等造作淫巧與違式違禁之物者依律問罪以澄其源伏乞聖裁一非鬼而祭人以為諂即當祀神祗與家廟祭獻禮固不廢法亦當嚴邇來有等奸徒創立淫祠廣設齊醮謬為長生禱嗣懴罪祈福之說以致無知小民聽從虛誑不憚逺道攜挈妻孥焚香祭拜望空禱祝如白蓮無為等教者誘惑愚頑釀成禍亂相應榜示驅逐永為禁革伏乞聖裁禮部志稿卷四十五
