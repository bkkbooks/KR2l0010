body:
  text: 禮部志稿卷十二明俞汝楫編儀制司職掌冊立皇太子冊立儀東宫冊立儀累朝微有同異其尤異者洪武永樂命至殿上受冊寳宣徳嘉靖則命使持節至文華殿授皇太子具列於後洪武初定冊立頒詔前一日内使監官陳御座香案於奉天殿如常儀尚寳司設寳案於御座前儀司設詔書案於寳案之前冊案寳案於殿中冊案在東寳案在西冊寳亭一座於丹陛之東皇太子拜位於丹陛上及御座前俱北向授冊寳官位於殿上皇太子拜位之東西向讀冊寳官位於授冊寳官之北西向捧進冊寳官位於讀冊寳官之南西向受冊寳内使二人位於殿上皇太子拜位之西舁冊寳亭内官八人位於丹陛冊寳亭之東設承制官承制位於殿内之西宣制位於殿門外東北捧詔官位於殿内之東内贊二人位於殿内皇太子拜位之北贊禮二人位於丹陛上之南知班二人位於丹墀中文武官侍立位之南糾儀御史二人位於知班之北俱東西相向文武百官齊班位於午門外之東西北上文武侍立位於文樓之北西向武官侍立位於武樓之北東向使臣僧道耆老侍立位於文官侍立位之南俱西向殿前班指揮司官三人位於丹陛之西東向宣徽院官三人位於丹陛之東西向侍從班起居注給事中殿中侍御史侍儀使尚寳卿侍立位於殿上之東侍從班武官指揮使侍立位於殿上之西拱衛司官二人侍立位於殿中門之左右典牧官二人位於仗馬之南宿衛鎮撫二人位於丹墀階前䕶衛百户二十四人位於宿衛鎮撫之南稍後䕶衛千户八人位於殿東西門之左右將軍二人位於殿上簾前將軍四人位於丹陛之四隅將軍六人位於奉天殿門之左右將軍六人位於奉天門之左右俱東西相向鳴鞭四人位於丹陛之南北向引文武官舍人四人位於文武官侍立位之北稍後東西相向引使臣僧道耆老舍人二人位於引文武官舍人之下禮部官同内使監官安奉詔書於殿内案上及於冊寳亭中匣盝内取冊寳置於殿内冊寳案上冊在前寳在後内使舁冊寳亭就位禮部官以付内使監官守䕶其日清晨鼓初嚴金吾衛陳甲士於午門外之東西旗仗於奉天門外之東西拱衛司陳儀仗於丹陛之東西及丹墀之東西陳車輅於文武樓之南典牧官陳仗馬於車輅之南虎豹於奉天門外和聲郎入陳樂於丹墀之南所司備鼓樂儀衛備儀仗於奉天門外俟候迎送冊寳至東宫文武百官各具朝服執事者各入就位鼓吹嚴百官齊班於午門外尚寳卿侍從侍衛官各服其器服俱詣謹身殿奉迎鼓三嚴侍儀奏中嚴御用監官奏請上御謹身殿具兖冕啟請皇太子於奉天門具冕服引班引百官使臣僧道耆老等俱入侍立位侍儀奏外辦上御輿以出尚寳卿捧寳及侍儀導從警蹕如常儀仗動大樂鼓吹振作陞座樂止將軍捲簾尚寳卿以寳於案鳴鞭報時訖引進四人引皇太子入奉天東門樂作陞自東階繇東門入引進立候於門外内贊接引至丹陛拜位引禮分立於左右樂止捧受冊寳内使繇西階陞俱入就丹陛立位知班於丹墀中唱班齊贊禮於丹陛上唱鞠躬樂作皇太子再拜興平身樂止内贊唱承制官稍前承制官前立於殿西内贊唱跪承制官跪承制訖繇殿中門出立於門外稱有制贊禮唱跪皇太子跪宣制云冊長子某為皇太子宣畢贊禮唱俯伏興平身承制官繇殿西門入跪於殿西云傳制畢復位贊禮贊鞠躬樂作皇太子鞠躬再拜興平身樂止贊禮贊行冊禮引禮引皇太子繇殿東門入樂作引禮立於門外内贊接引至御座前拜位樂止内贊唱跪皇太子跪唱受冊寳捧冊寳官於案前跪捧冊授讀冊寳官内贊唱讀冊讀冊寳官跪讀冊訖以冊授丞相丞相搢笏受冊内贊唱搢圭皇太子搢圭唱受冊丞相以冊跪授于皇太子捧受冊寳内使跪于皇太子西捧冊興立于皇太子西捧冊寳官又于案前跪捧寳授讀冊寳官内贊唱讀寳讀冊寳官跪讀寳訖以寳授丞相丞相受寳跪授于皇太子捧授冊寳内使跪于皇太子西捧寳興立于捧冊内使之下内贊唱出圭皇太子出圭唱俯伏興平身皇太子俯伏興平身唱復位引皇太子出樂作内使捧冊寳前導出至殿東門外引禮引皇太子復位樂止内使以冊寳置于冊寳亭盝匣中退立于丹陛之東贊禮唱鞠躬拜樂作皇太子四拜興平身樂止内使舁冊寳亭前行引禮導皇太子繇東階降樂作出奉天門樂止引禮引皇太子詣東耳房伺候于中殿行禮内使舁冊寳亭東門出至西道儀仗鼓吹前迎百官迎送至東宫安奉冊寳于殿内初皇太子降階禮部尚書跪奏用寳詣案捧詔書尚寳卿用寳以詔書置于案禮部尚書于殿西跪奏云捧詔赴午門開讀興奉詔官捧詔繇中門出樂作階自中階引禮引文武官迎詔書出奉天門樂止開讀于午門外訖百官迎詔至中書省頒行執事入報侍儀奏禮畢鳴鞭上興樂作速還宫樂止皇太子朝謝中宫受冊之日内使監官陳設皇后御座于中宫殿上皇太子拜位于殿庭正中及御座前内贊二人位于殿上拜位之東西司贊二人位于丹墀拜位之東西陳設儀仗于殿庭之東西擎執于殿上之左右樂工陳樂于殿庭之南皇太子于奉天殿受冊畢司賓引皇太子具冕服至中宫外門東向立内使監官啟聞皇后首飾褘衣出殿樂作陞御座樂止司賓引皇太子繇東階陞樂作就丹墀拜位樂止司賓分立于前司贊唱鞠躬拜樂作皇太子四拜興平身樂止司賓引皇太子繇殿東門入樂作至殿上拜位樂止内贊唱跪皇太子恭謝曰小子某兹受冊命謹詣母后殿下恭謝謝畢内贊唱俯伏興皇太子俯伏興平身司賓引皇太子繇殿東門出樂作復位樂止司贊唱鞠躬拜樂作皇太子四拜樂止司賓唱禮畢内使監官啟禮畢皇后興樂作還宫樂止内官引皇太子出諸王賀東宫皇太子受冊之日内使監官設皇太子座于東宫侍儀司設諸王拜位于殿庭階上及殿上正中贊禮二人位于殿庭王拜位之東西内贊二人位于殿内王拜位之東西文武官侍立位于殿庭之東西將軍六人位于殿門之左右拱衛司設儀仗于殿庭之左右樂工設樂于宫門之外伺皇太子于中宫行禮畢引禮引諸王便服至東宫門外西向立引禮引皇太子便服出宫樂作陞殿樂止引禮引諸王繇東階陞樂止至殿庭階上拜位樂止贊禮唱鞠躬拜樂作諸王鞠躬四拜興平身樂止引禮引諸王居長者繇殿東門入樂作引禮立於門外内贊接引至殿内拜位樂止内贊贊禮同唱跪諸王皆跪長王恭賀曰小弟某兹遇長兄皇太子榮膺冊寳不勝忻忭之至謹率諸弟詣殿下稱賀賀畢内贊贊禮同唱俯伏興平身引禮引長王繇殿東門出樂作復位樂止贊禮唱鞠躬拜樂作諸王鞠躬四拜興平身樂止唱禮畢引進啟禮畢皇太子興樂作還宫樂止引進引諸王以次出諸王賀中宫皇太子受冊之日内使監官陳設皇后御座于中宫殿上諸王拜位于殿庭正中及御座前内贊二人位于殿上拜位之東西司贊二人位于諸王丹墀拜位之東西設儀仗于殿庭之東西擎執于殿上之左内贊贊跪贊宣冊捧冊官跪捧冊授宣冊官宣冊官立宣于皇太子之右宣訖贊搢圭贊受冊捧冊官捧冊授皇太子受訖以授内侍内侍跪受立于西贊受寳一如授冊儀贊出圭俯伏興平身贊復位引禮導皇太子繇殿東門出就位内侍捧冊寳前導置綵輿中内贊贊鞠躬樂作四拜樂止執事者各舁冊寳以次前行引禮導皇太子繇東階降持節官隨之樂作至奉天門樂止用儀仗鼓樂迎冊寳至文華殿行禮畢持節官持節復命是日禮部官候節冊寳啟行畢奉詔書至承天門開讀頒示天下皇太子受冊寳畢具冕服儀仗引禮導引詣太廟行謁告禮如常儀禮畢釋服引禮導引至右順門具冕服謝恩上具皮弁服御奉天殿引禮導皇太子至上前謝恩樂作行八拜禮畢樂止導還至右順門内官導詣内殿前皇后服燕居冠服陞内殿皇太子于内殿樂工陳樂于宫門外諸王于東宫行賀禮畢司賓引諸王具冕服至中宫外門東向立内使監官啟聞皇后首飾褘衣出殿樂作陞御座樂止司賓引諸王繇東階陞樂作入就丹墀拜位樂止司贊唱鞠躬拜樂作諸王鞠躬四拜興平身樂止司賓引諸王居長者繇殿東門入樂作至殿上拜位樂止内贊司贊同跪唱諸王皆跪長王恭賀曰小子某兹遇長兄皇太子榮膺冊寳不勝歡慶謹率諸弟詣母后殿下恭賀賀畢内贊司贊同唱俯伏興平身諸王俯伏興平身司賓引長王繇殿東門出樂作復位樂止司贊唱鞠躬拜樂作諸王鞠躬四拜興平身樂止司賓唱禮畢内使監官啟禮畢皇后興樂作還宫樂止内官引諸王以次出百官進慶賀表箋與進賀中宫受冊表箋儀同百官進慶賀東宫箋前期内使監官陳設皇太子位于東宫正殿如常儀侍儀司設箋案位于殿下及殿上正中文武官拜位于殿下文東武西異位重行北向設宣箋官位于殿下箋案之西展箋官位于宣箋官之下知班二人位于文武官拜位之北贊禮二人位于知班之北内贊二人位于殿上引文武班舍人四人位于文武班之北稍後俱東西相向是日宿衛陳兵仗于東宫門外之東西陳旗仗于中門外東西相向將軍六人于殿門之東西拱衛司陳儀仗于殿庭階上下之東西和聲郎陳樂于文武官拜位之南内使擎執于殿上之左右文武官進箋至午門前禮部以箋函置于案舍人舉入東宫門外恭候行禮文武百官于奉天殿行賀禮畢常服詣東宫文東武西分立于門外受箋官贊禮等執事各就位引進啟外備皇太子常服出宫至殿門樂作陞殿樂止舍人舉箋案入宣箋官展箋官押案置于庭各就位引班引文武官亦入就位知班唱班齊贊禮唱鞠躬拜樂作丞相以下皆鞠躬四拜興平身樂止贊禮唱進箋受箋官進至案之東北引班引丞相至案前丞相跪捧箋興與宣表官展表官由西階陞西門入至殿内置于案退立于殿南正中内贊唱跪贊禮唱衆官皆跪丞相與衆官皆跪内贊唱宣箋宣箋官詣案前取箋跪宣于殿西展箋官同跪展箋宣畢俯伏興退立于西展箋官以箋復置于案退立于西内贊贊禮同唱俯伏興丞相與百官皆俯伏興平身丞相與宣箋官展箋官繇殿西門出西階降復位贊禮唱鞠躬拜樂作丞相以下皆鞠躬四拜興平身樂止贊禮唱禮畢引進啟禮畢舍人舉箋案出皇太子興樂作還宫樂止百官以次出内外命婦慶賀中宫至日司賓引内外命婦各服其服候于中宫門外之左右候皇太子入行朝謝畢内使監官啟門司賓二人先引外命婦繇西門入序立于庭中左右二人引内命婦入就拜位司贊唱班齊拜樂作内命婦以下皆四拜興樂止司賓引班首繇西階陞西門入樂作至御座前樂止内贊司贊同唱跪班首以下皆跪班首稱某封某妾等兹遇皇太子榮膺冊命恭詣皇后殿下稱賀賀畢内贊司贊同唱興班首以下皆興司贊引班首繇西門出西陛降復位司贊唱拜樂作班首以下皆四拜興樂止司賓二人引外命婦入就拜位贊拜樂作班首以下皆四拜興樂止司賓引班首繇西陛陞西門入樂作至御座前樂止内贊司贊同唱跪班首以下皆跪班首稱賀曰某封某妾某氏等兹遇皇太子榮膺冊命恭詣皇后殿下稱賀賀畢内贊司贊同唱興班首以下皆興司賓引班首繇西門出西陛降司贊唱拜樂作班首以下皆四拜興樂止司賔唱禮畢皇后興樂作還宫樂止命婦以次出謁廟皇太子擇日恭謁太廟永樂二年續定先期三日齋戒遣官祭告天地宗廟用香帛酒脯行一獻禮前一日禮部同鴻臚寺官設詔案于奉天殿中設節冊寳案于詔案之南節中冊東寳西各以次陳列設冊寳綵輿于丹陛之東尚寳司設寳案錦衣衛設鹵簿儀仗教坊司設中和韶樂如常儀至日鴻臚寺設皇太子拜位于丹陛正中設持等官拜位于