body:
  text: 禮部志稿卷五十明俞汝楫編奏疏恤典疏議覆資蔭祭葬疏洪治十三年六月禮科左給事中葉紳等上言祖宗以來資蔭及祭葬之例甚嚴惟京官三品以上許廕子送國子監讀書然非年久有政績者不得濫進三品以上三年考滿者今日引奏復職明日上章乞恩以致政績無聞屢經彈劾者一槩此例陳乞甚至有長子死而復乞其次子者一子死而又乞其孫者資蔭之恩似乎太濫又祖宗以來京官文職四品有祭無葬三品以上始有祭有葬其父母曽受本等封始有之近年以來有本身并父母未經受封又有本身尚存妻室先故者一槩奏請甚至被劾去職及病故年逺者及未至三品者往往并求祭葬誤蒙賜與祭葬之典似乎太輕乞下所司議處禮部覆奏言朝廷資廕之典所以勸忠勵孝寓賞延於世之義祭葬之義所以禮遇大臣全君臣終始之義至於官資未及而子孫或得廕敘父母及妻或得祭葬是又或因勞而加報或緣義以推恩皆有大義存焉而不可以為輕且濫者今後文職三品以上考滿官請如例許一子或孫或承繼之子致送監讀書內有未沾一命而死或自以科舉出身者仍許一人補廕入監如出身不繇正途或被劾間住及病故年逺者俱不許預補廕之例其官非三品曽侍春宫講讀輔導有功者殁後子孫乞恩入監本部議請上裁又奉命外國死生王事者常有廕子入監之例其祭葬舊例三品以上官及二品以上父母妻三品父母俱有祭葬四品及父母俱有祭今請著為定例若三品以上官被劾官帶間住者祭葬俱無其三品被劾致仕及在京未及一考者有祭無葬若二品以上妻止授三品封三品父母止授四品者亦止賜之祭四品未考滿父母未封四品者亦無祭其賜祭壇數二品者祭二壇加太子少保以上者祭四壇其加太子太保以上及武職大臣祭葬各照前奏定祭數又效勞春宫講讀或常有邉功應沾恤典者亦宜奏請裁決得旨太醫院官有三品考滿無過者亦準照例廕子入監其三品官致仕并在任未及一考病故者仍準與祭葬餘從所議諡法疏禮部尚書沈鯉題為循職掌議諡法以肅臣工以光聖化事臣聞帝王之所以勸懲天下者莫大乎爵賞刑威帝王之所以不賞而勸不威而懲者莫大乎諡法是諡法也父不得以私其子君不得以私其臣者也得失一朝榮辱千載雖以褒貶既往實以激勸將來是以自古重之也國朝稽古右文尤嚴斯典祖宗時文臣得諡者不過數人雖以中書省之尊六卿之貴文章功德有可紀者亦不得輒諡無他重之也宣正成𢎞之間文臣雖往往得諡然名義甚美者或不輕畀以文學直內閣者不皆諡文則慎重之意猶有存者浸淫自正嘉以來以至於今則濫觴甚矣夫京堂三品以上子孫得自陳乞例也而人有醇疵行有巨細乃一切加以美名則是皆善而無惡也生前有未盡之善則改而更諡厚也而行玷縉紳名汚青史者獨因循而不易則是有進而無退也此皆臣之所未解也昔我太祖之諡其子也於魯王而曰厲於伊王而曰荒夫荒厲之非美諡亦明矣我太祖豈不愛其子哉示天下公也不以父子之情而廢國家之法也父不得以佞其子而君乃以諛其臣竊以為過矣臣又嘗考李唐時許敬宗諡繆蕭瑀諡褊繆與褊之為諡人所惡也不敢貸也又嘗考趙宋時司馬光斥夏竦之邪不許文正韓維定陳執中之議必諡榮靈光與維之在當日仕同朝也不敢私也今日諸臣之諡豈無許敬宗蕭瑀其人者在乎當其時能為司馬光韓維之直者誰乎國朝人物之盛逺邁唐宋而諡法豫奪反太鹵莽何以垂訓將來光照前古似不可不亟正也至於文之一字所係尤重其大者道德學問其小者忠信惠禮必唐儒如韓愈宋儒如朱熹始可庶幾無愧即不能然亦必其一莭足以當之今不目其善狀不耳其風聲一經翰苑莫不諡文彼其真文者既無以表其賢而不文者又有所混其不肖是於勸與懲兩失之也且如先臣禮部尚書霍韜新建伯王守仁非文學職也而得文之一節與之誠是也如吏部尚書王恕兵部尚書劉大夏不以文名也而有文之實用獨靳之何也可文則文何嫌於百僚不可文則不文何擇於文學蓋古者生無爵則死無諡國朝有諡亦限爵是故凡有爵皆得諡惟其當而已矣其人誠當豈必爵高又豈必文學凡輿論之所推皆可以義起也此隆古之道也臣願皇上遠法隆古近鑒唐宋念褒貶之旨不可偏廢思名義之重不可輕假慨然獨斷特下所司一洗冒濫之風永翊清平之治臣愚幸甚世教幸甚禁約疏題禁白蓮教拆毁私創庵觀疏禮部尚書沈鯉題為內帑匱詘民生困敝恭陳祖制懇乞聖明特賜俞允以保萬世治安事看得户部尚書王遴條議要將近日私創寺觀庵院盡數拆毁僧道年四十以下無度牒者盡數驅逐歸農流寓者遞歸本籍土著者收入里戶白蓮羅道等會惑衆靡財悉重加懲治一節竊照異端之術足以惑世誣民茍非禮教素敷民未有不蠱於福田利益之説者在昔已然其風猶未甚也邇來逰手逰食之輩布滿中外此倡彼和莫可收拾以致梵宇琳宫星列棋布而無知之民約會進香建幟號佛者日充斥於道途豈直民財靡費上虧惟正之供抑且風俗漸偷釀成地方之禍臣等目擊兹敝方欲申飭今尚書王遴條奏及此深得移風易俗足國裕民至計相應酌議題請恭候命下移咨兩京都察院轉行五城內外及天下司府州縣地方大小寺觀庵院除係古剎及奉有欽依建置照舊存留聽其更修外若係近日私創庵院招集僧尼瀆祀不經者悉行拆毁入官以後再不許新立增置違者依律問遣僧道曽經給有度牒年四十以上者照舊存留其年四十以下未經給度牒者查果戒行無礙姑準查照見行事例申送納給度牒如未給度牒削剃不守清規與流寓逰食之徒一併驅逐原籍務農當差一切白蓮羅道募緣僧道及約會燒香頭戴甲馬口稱佛號等項愚民在內聽緝事衙門在外著巡邏員役嚴加禁捕務得會首倡率之人依律枷號治罪知情故縱者罪亦如之勿視虛文務臻實效然臣等猶有過計焉夫禮者禁於未然之前法者治於已然之後未然者易為力而已然者難為功查得僧道之禁莭經言官建白本部議覆不啻三令五申矣而齋醮施捨愈昌愈熾俾異端者流安坐而享富厚豈盡左道之愚人抑亦崇尚者之自愚耳崇之於彼而欲禁之於此其將能乎今宜於禁令之外仍以禮教隄防之乞敕各撫按嚴督各該守令毋專以簿書期會為急而亦以移風易俗為要申明聖諭勸化愚民教以君臣父子之常道示以農桑衣食之恆業曉以惠迪從逆之實理喪葬必依家禮有擅作佛事者必罰祈年必於方社有揭榜消禳者必罪大經既正邪慝漸消行之既久果於風化有禆不為俗吏吏部開著上考脫有奉行未至亦宜罰治以示創懲庶幾教化與法制並行民風與世道咸賴矣奉聖旨各處寺觀庵院除古剎及敕建有名的照舊存留其餘私創無名黷祀不經的兩京著五城御史在外撫按官嚴行稽查應改應毁的酌量區處具奏餘依擬議處淨身男子疏禮部尚書沈鯉題為議處淨身男子以廣聖澤以信法令事近該順天等處淨身男子奏奉聖旨這厮每羣聚奏擾著五城御史嚴行驅逐不許容留潛住欽此明旨昭宣羣小逺遁中外臣民莫不稱頌聖德臣等更復何言第思此輩因父母愚暗希圖富貴𠞰絶子息痌瘝可憫其於皇上愛養小民之仁既有所歉焉而不周況其家室無歸工商絶藝暫去復來屢行奏擾其於皇上嚴行驅逐之令又有所玩焉而不信及今不一議處不惟傷天地之和亦且損朝廷之體臣等職掌所關乃敢敬陳一得之愚以備采擇稽古內官之設載之周禮曰內小臣曰閽人曰寺人曰內竪雖其職掌不過守王宫中門之禁掌女官之戒令與內外之通令然必求正人居之如巷伯之倫是已降及秦漢而下乃以罪人充之我朝法制高出前代伏覩大明律一欵凡官民之家不得乞養他人之子閹割火者違者杖一百流三千里又條例一欵先年淨身男子曽經發回若不候朝廷收取官司明文起送私自來京圖謀進用者問發邉衛充軍臣等仰窺祖宗盛心即古除肉刑之意所以重絶人道預抑姦慝也至𢎞治五年節奉孝宗皇帝聖旨今後敢有私自淨身的本身並下手之人處斬全家發邉逺充軍兩鄰及歇家不舉首的問罪其里老人等仍要時常訪察但有此等之徒即便捉拿送官如或容隱一體治罪不饒欽此但私淨之禁雖嚴而報官之路未開故自宫者旋即如舊至萬厯十一年節奉聖旨自宫禁例載具會典皇祖明旨甚嚴乃無知小民往往犯禁私割致傷和氣著都察院便行五城御史及通行各省直撫按衙門嚴加禁約自今五年以後民間有四五子以上願以一子報官閹割者聽有司造册送部候收補之日選用如有私割的照例重治鄰佑不舉的一併治罪不饒欽此但報官之路雖開起送之例未定故自來者紛然不已夫以孝宗之明例皇上之嚴旨奚啻三令五申乃三數年來有司有造一册送部者乎有拿一私割照例懲治者乎法令不行德澤不布又何怪此輩之羣聚奏擾乎伏望敕下臣等嚴行各省直撫按官行令各州縣以文到之日為始以前見在閹割者許令報名到官查係三十嵗以下精壯可用者姑免追究準其記籍其衰老不堪者行令各里族拘收以後凡情願閹割者報官查明果四五子以上方與記籍通前類造青册限半年一次送部候各監局缺人聽司禮監奏請本部通行在外各該衙門查係在册人數取具官吏里鄰不扶井結起送赴部聽候選用其册籍無名乃儇巧凶惡潑賴無恥者不許一槩濫送如有仍前私自閹割私自來京者在外撫按有司在內五城御史嚴加訪拿照例問以重罪如撫按等官不行訪拿及有司不行造册違例起送者聽本部查參請旨究治務在必行無事姑息庶黎庶免傷殘之苦而慈惠旁流宦寺皆端正之人而隙竇永塞仁至義盡萬世無弊矣再照死者人之所最重也今自宫之徒加以死刑而不懼者內臣之員數太多富貴太驟選進太頻有以惑其心耳我太祖高皇帝深鑒前代之失祖訓條章內府各監局內官俱有定員各有職掌一監常職止五員一局正副止二員官不過四品所掌不過灑掃供奉之事洪武永樂間未嘗額外濫設其太監等官非歷練老成雖有聰明才俊亦不輕授近年以來則不然矣皇城之內通名籍者不止萬有餘人而倉厰場庫牟利無算蟒衣玉帶濫賞不惜又不三五年輒有一選選輒數千以故無知小民貪圖富貴入骨薰心奈何欲以死刑禁之乎臣等更望皇上恪遵祖訓凡監局冗員非祖宗之舊者悉為裁革一切侵漁科索等弊悉為釐正蟒玉等服非效勞年久忠勤不欺者勿輕賜豫仍著為定例必十年以外方行收選一次務使宫府一體賞罰有章規制既定僥幸不萌前項無知之徒將不禁自息不終為聖化之纍矣各條疏祭告感應疏成化八年禮部左侍郎劉吉奉命祭告海嶽還自山東言臣自成化闕年四月初十日受命暨十六日陛辭仰體聖治沿途齋心致敬罔敢怠忽臣所過濟南等府委因連年亢旱不收人民艱難死亡流離困苦之狀不可勝言田地乾燥多未耕種河水淺涸船隻少行災害之臻誠可憂憫仰惟皇上矜恤民瘼特降詔書減免租稅并發官銀錢米賑濟民間欣然不勝感戴及臣於本月二十六日至東嶽廟下擇以五月朔祭告未祭之先炎風毒日酷旱如舊及省牲之夕忽有雲起西南至夜一更雷雨大作直至四更方止雨止隨祭祭畢次日復大雨自未至酉方止溝壑水溢逺近沾足越七日祭告東鎮十三日祭告東海俱各得雨連日不止事畢回還所過地方間有苗者悉皆長茂未布種者亦皆種有青苗運河亦因此水長官民船隻通行無阻天意漸回人心稍安皆皇上盛德之所感也但今民遭大困之後其各衙門凡百懲需宜悉從寬貸庶使民得蘇息不負皇上始終矜恤之意緣臣奉命專為祈禱救災及所目見係干民情不敢隱默謹具疏以聞下所司知之國喪停止賜宴疏𢎞治元年禮部郎中張祥言伏覩五月五日午門外賜宴羣臣臣切惟憲宗皇帝賔天未久山陵工作方畢尋有雷電之災陛下克謹天戒痛自修省且詔羣臣各秉心修職用回天意羣臣可不惕然加懼以副聖心況臣之事君猶子之事父故居喪之時居處不安食旨不井聞樂不樂孔子謂食稻衣錦於女安乎此言雖責宰我實萬世臣子之通戒也今公卿大臣皆先帝舊臣當嵗序遷易攀號無地詎忍錦繡其衣飲酒食肉恬不為怪臣聞陛下自先帝登遐居諒隂之中已臨半載每退朝燕居猶服布素不御音樂曩者近臣請選妃嬪閣而不行天下臣民皆知陛下之心有所不忍此天理人倫之至也秉是心以往何憂天下之不治天變之不弭天命之不固哉臣請自今以始三年之內凡遇節令賜宴羣臣乞照慶成宴例暫皆停免至如每嵗四月八日之宴特佛氏餘風尤為不經所當先革者陛下即位以來袪邪衛正益崇聖道凡佛老之悖謬百家之淫邪悉已屏斥何獨於此不可革乎方今四夷來王萬方朝會輻輳京師皆得與宴中間豈無一二稍知義理之人萬一播傳其失非小惟陛下留意上曰節令之宴職自禮部既當停免何不先事奏聞而致差失若此咎將誰歸爾堂上並屬官其具實以聞已而尚書周洪謨等言憲宗皇帝上賔皇上孝心純篤凡內廷儀莭悉從簡素而慶成大宴俱準奏停免今山陵安葬已久光祿寺但遵舊例於四月八日五月五日請宴百官蓋與每日見辭官員及經筵酒飯相類非若慶成大宴應免者可比祥奏乞停免止知禮欲從厚而未知事體不倫且未與臣等議臣等失於約束罪不容辭上曰朝廷大小禮儀俱歸禮部職掌其當行當止爾等何不預為斟酌奏定致祥於事後肆言無忌本當究治既服罪俱宥之自後禮莭仍稽考已行之例奏聞請旨止巡郊甸疏正德十年禮部尚書毛澄等言臣等先於七月十八日風聞皇上將巡郊甸已嘗具疏勸止繼知傳言之妄方切喜幸今月初二日道路藉藉皆云聖駕已幸昌平中外憂疑莫知所措臣等切惟聖心慎重必不肻逺離闕庭特以昌平陵寢所在霜露之感切於淵衷欲躬親松楸一展誠孝而已竊惟經宿以來禮意已盡原野之外環衛疏濶衆心懸懸不勝瞻戀伏望思宗社付託之重念朝廷機務之煩早為旋蹕則孝思以申庶政惟舉神靈悅而億兆寧矣不報處置番夷六便疏洪武二十年禮部主事高惟善自長河西魚通寧逺等處上言曰臣聞安邉在乎治屯守而兼恩威屯守既堅雖逺而有功恩威未備雖近而無益今魚通九枝疆土及巖州雜道二長官司東鄰碉門黎雅西接長河西原自唐時吐蕃強盛寧逺安靖巖等州漢民往往為彼驅入九枝魚通防守漢邉元初設二萬户府仍於盤陀仁陽置立寨柵邉民戍守其後各枝率衆攻仁陽等柵及川蜀兵起乘勢侵凌黎雅卭嘉等州洪武十年始隨碉門土奠歸附國朝設巖州雜道二長官司逮今十有餘嵗官民仍舊不相統攝蓋無統制之司恣其猖獗因襲舊弊故也其近而已附者如此逺而未附者何繇而臣服且巖州寧逺等處乃古之州治茍撥兵戍守就築城堡開墾山田使近者向化而先附逺者畏威而來歸西域無事則供我徭役有事則使之先驅撫之既久則皆為我用矣如臣之説其便有六焉通烏思藏朵甘鎮撫長河西可拓地四百餘里得蕃民二千餘戶非惟黎雅之保障蜀亦永無西顧之憂一也蕃民所處老思岡之地土瘠人繁專務貿販碉門烏茶蜀之細布博易羌貨以贍其生若於巖州立布則此輩衣食皆仰票於我焉敢為非二也以長河西伯思東邑獵等八千户為外蕃掎角其勢必固然後招來逺者如其不來使八千戶近為內應逺為鄉導此所謂以夷蠻攻蠻夷誠治邉之善道三也天全六番招討司八鄉之民宜悉免其徭役專令蒸造烏茶運至巖州置倉收貯以易蕃馬比之雅州易馬其利倍之且於打煎爐原易馬處相去甚近而價增於彼則蕃民如蟻之慕羶歸市必衆四也巖州既立倉易馬則蕃民運茶出境倍收其稅其餘物貨至者必多又魚通九枝蠻民所種水陸之田遞年無征若令歲輸租米并令軍士開墾大渡河兩岸荒田亦可供給戍守官軍五也碉門至巖州道路宜令繕修開拓以便往來人馬仍量地里逺近均立郵傳與黎雅烽相應庶可以防遏亂略邉境無虞六也上從之災疫施藥疏禮部尚書沈鯉題為欽奉聖旨事祠祭司案呈恭照本年五月初九日該司禮監太監張誠等傳奉聖諭諭禮部朕聞近日京城內外災疫盛行小民無錢可備醫藥你部裏便行與太醫院精選醫官人員多發藥料分投診視施舍以稱朕救民疾苦之意仍照嘉靖年間例每家量給與銀錢一次欽此該部題奉聖旨是著五城房號內支銀太倉支錢如銀兩不敷還著户部議處你部選委司屬會同五城御史給散不許兵畨人等作弊及無病平人混冒重支欽此已經移咨戶部都察院一體欽遵又經劄付太醫院選委官醫多帶藥料分投前去五城開局按病依方救藥復差祠祭司署員外郎高桂等五員分投五城監督設法給散去後隨五月三十日奉本部送據中城等兵馬司造册呈報五城地方給散銀錢共散過患病男婦李愛等一萬六百九十九名口共用銀六百四十一兩九錢四分錢十萬六千九百九十文五城會齊俱於五月二十一日給散一次並無重支冒領病民委沾實惠等因到部送司案候在卷六月十五日復奉本部送據太醫院委官御醫張一龍等造册呈報自五月十五日開局以來每城沿門診視及抱病就醫問病給藥者日計千百旬日之外疫氣以解病者皆起五城共醫過男婦孟景雲等十萬九千五百九十名口共用過藥料一萬四千六百一十八斤八兩相應住止理合開報等因到部送司查得本題原題施給藥劑隨到隨散置簿登記用備查考以災疫消減之日為始今該前因通查案呈到部臣等惟仰皇上仁無不覆施有所先遂使疲癃之民悉蒙再造之賜即今疫漸消減人遂安寧化愁嘆為謳歌易札瘥為仁夀不惟病憊瞻依實是蒸黎感悅此我皇上博施濟衆積善纍仁之成功也至於給散銀錢雖止一次而領藥無算計其所費實數倍之不但貧民得生且於可過之家更益普濟以故京城內外有病無病之人莫不感仰皇德歡呼萬嵗臣等猥以職掌恭逢盛舉無任欣忭除候命下行令五城散藥人員通行住止外合給散過藥劑銀錢數目開坐謹具題知禮部志稿卷五十
