body:
  text: 禮部志稿卷八明俞汝楫編職掌小序語曰官之有司猶農之有畔也韓昭正典冠之誅見為溺職絳侯不能舉錢榖之對安問司存故夫職之義在分也各相守則治交相侵則亂職之義在合也蘄相濟則舉兩相諉則廢我聖祖衆建諸司而著示職掌一書象魏官常垂炳星日列聖奉為章程不愆不忘侵曠之警代有申飭凡厥有位百度惟貞則庶職修明之效即九官四嶽十二牧之秩秩豈足多讓哉禮曺務視諸曹煩劇什伯之職思其居厥惟艱哉服物采章度數等威儀曺是問禋祀醮燎禬恤術禳祠部是問輯瑞來王㑹同玉帛客司是問籩豆有踐燕樂嘉賔董戒光祿祗事奉常膳司是問而兼總條貫則大宗伯少宗伯受成焉噫嚴矣重矣通百給于一身而腓臂異位歸百川于谷王而河濟分流以是知眀作之朝無叢脞之虞豈漫為任哉志職掌總職掌禮部堂石刻國初立于部堂尚書侍郎掌禮樂儀章郊廟祭祀朝貢㑹同賔客宴享學校科學之政及天下祀典其品節之分制度之詳講議損益考定而頒行之使儀表中外粲然有倫凡所以敦崇風教厚勵民俗者皆總其職務而奉行其制令其屬有四總部祠部主客膳部儀部郎中員外郎主事治禮樂學校貢舉之式凡制詔禮儀開讀詔赦萬夀節正旦冬至朝賀朔望起居大祀誓戒慶成公侯封拜進歷進春宴享進膳等儀及定服色房舍器皿儀物等制表箋萬夀節正旦冬至表箋本部通類付膳部送收印信照依大小衙門品級鑄造給降及銷毁裁草印信頒厯定造厯日則厯欽天監進呈厯日節次類行厯樣付各布政司造科舉定科舉呈式開試日期進士出身雜行旌表孝子順孫義夫節婦及奏各處申報禎祥灾異定各衙門行移體式等事祠部郎中員外郎主事治祠祭百神及釋道之典凡祠祭部祀宗廟丁祭皇陵歷代帝王陵廟并一應祭祀喂養犧牲及在外祭祀日期學校國監府州縣學及嵗貢生員教官生員丁憂事故等事卜筮醫藥選舉術士占候醫病樂律神樂觀舞生教坊司樂户侑食樂工喪葬公侯喪禮壙志贈諡及軍官喪禮優給僧道凡僧道衙門寺觀住持僧道度牒等事客部郎中員外郎主事治侯邦蕃國朝貢之儀凡四夷朝貢外國及土官之屬賔客接待外國來使土官進表使臣及禮待賢德官員貢舉起取及考試通經秀才建言定議可否給賜官員軍士外國土官輕重等第膳部郎中員外郎主事治宴賜牲酒膳羞之事凡膳羞藏氷蔬種等事宴享公支管待物件及茶飯下程則例器物厨役銅牌公廨什物朝服象牙牌面酒醴成造酒器造酒則例雜行收受表箋本部俸給通類勘合大明㑹典尚書侍郎掌邦禮其屬郎中員外郎主事掌二尚書侍郎之事有所疏請則各舉其職事以質于尚書侍郎而受其成儀制清吏司分掌禮儀宗封學校科貢舉其儀度而辦其名數祠祭清吏司分掌郊廟羣祀之典及喪禮厯日方伎之事主客清吏司分掌諸番朝貢接待給賜之事簡其譯伴明其禁令凡百官恩賚各省土貢亦𨽻焉精膳清吏司分掌宴饗牲豆酒膳之事㑹其品數而程其出納聖諭宣宗皇帝御製禮部針諭曰朕承大寶臨撫兆民實賴文武羣臣同心同力以興起治功昔舜命九官十二牧皆孜孜訓諭虞史書之夫以大舜為君臯陶稷契輩為之臣猶致警如此況朕菲薄敢不䆒心然逺臣既不得數見而又諭之近臣雖朝夕相接亦不得數以言諭因取古人針警之義凡中外諸臣各著一篇使揭諸㕔事朝夕提觀庶幾有警然古之君臣有交警之道凡在位君子有以嘉謨告朕者尤朕所樂聞也禮部針聖人立極法天出治為治之大莫大于禮稽古伯夷為虞秩宗所典三禮宗伯攸同既治神人亦和上下政本之地實宣教化惟我祖宗承古之道品節制度式昭禮教幽明崇卑秩乎有序大法大經靡不偹舉咨爾禮官夙夜惟寅秉其直清以交神眀安上治民爰及四裔祗修舊章亦義之比惟卿暨佐汝豫協恭暨厥四屬于卿率從治國去禮猶耕無耜咸篤敬天以懋政事宣德七年夏六月禮部志稿卷八
