body:
  text: 禮部志稿卷五十五明俞汝楫編列傳侍郎世家寶世家寶䝉古人姿貌豐整善言論性剛果有謀略讀書知兵元末以集賢院學士守膠東登萊等郡洪武元年大將軍徐達下山東參政傅友德兵至萊陽世家寶以所守城降授大理寺少卿尋改禮部侍郎二年升刑部尚書未幾以事貶知廬陵縣召還授兵馬指揮司副指揮改兩浙運鹽使司同知十五年知臨安府秩滿賜致仕還家後復至京遣賑濟廣東興寧長樂二縣二十七年卒於家侍郎傅瓛傅瓛初名玳元末入仕留侍左右吳元年升中書省參知政事本年詔定律令命為議律官諭瓛曰汚染之民以善道之則可以復生求生於重典是索魚於釜也及律令成付按察司巡歷州縣使內外知所遵守洪武元年正月命兼詹事府丞二月同右丞相李善長學士陶安進郊社宗廟議八月京師火帝謂京師省臣曰近京師四方水旱相仍朕夙夜不遑寧處豈刑罰失中武事未息徭役屢興賦斂不時以致陰陽乖戾而然耶卿等同國休戚宜輔朕修省以消天譴瓛等對曰古人有言天心仁愛人君則必出灾異以譴告之使知變自省人君遇災而能警懼則天變可弭今陛下修德省愆憂形於色居髙聽卑天實監之顧臣等待罪宰府有乖調燮貽聖衷憂咎在臣等帝曰君臣一體茍知誡懼天心方回卿等其盡心力以匡朕之不逮二年改禮部侍郎三年以年老致仕侍郎曾魯曾魯字得之臨江新淦人幼聰敏記誦過人元末舉進士不第即棄去博覽羣書無所不記國朝初與修元史史成又與修禮書遂擢禮部祠部主事開平忠武王常遇春薨髙麗遣人來祭魯索其文觀之外則襲以金龍黃帕內則不書洪武之號魯責之曰龍帕或是誤用若納貢稱藩而不奉正朔君臣之義安在使者愧懼謝過即令易去之四年冬安南國王遣使來貢主客曹受其表將入見魯取其副視之曰前王乃陳日熞今表曰叔明必有以也亟白尚書詰之使者不敢諱蓋日熞為叔明逼死而代其位中心懷懼故托貢以覘朝廷意上怒曰島夷乃狡獪如此却其貢不受五月二日上問丞相曾魯今何官職對以禮部主事即日超遷中順大夫禮部侍郎魯以順字犯父諱辭就朝請下階吏部以法有定制不之許倭夷入寇戍將捕獲之詔命儒臣草詔歸其俘魯所撰有一視同仁之語上喜其言為得體八月奉㫖考京畿鄉試既入院忽吐血自是遂奄奄九月膏露降鍾山羣臣皆獻頌魯為賦以進獨見稱許以為鋪叙有法既而疾甚上章乞骸骨詔許之十二月舟歸至南昌之石岐潭而卒魯為人和厚其貌癯然若不能勝衣家故儲書甚多魯皆一一校讐其訛舛有六一居士集考異今行於世卒年五十四侍郎劉嵩劉嵩字子髙吉安泰和人元季嘗領鄉薦遇亂不及㑹試教授鄉里國朝洪武三年以材學舉至京授兵部職方郎中升北平按察司副使居官以清苦自持坐事輸作京師尋放歸鄉十三年春丞相胡惟庸等誅上特賜手敕起為禮部侍郎未幾命署吏部尚書事以疾乞致仕許之已而上思其老成宿學遣使以國子司業起之一見歡甚賜以鞍馬居位未十日遽得疾猶强坐訓諸生疾革祭酒李敬問所欲言嵩曰天子遣嵩教國子將責以成功而遽死乎無一語及家事卒年六十一上重惜之親為文以祭之曰惟爾有學有行發譽儒林朕嘉爾能屢常擢用邇者遣使召爾司業成均簡在朕心期於成效夫何不數日間遽然而逝朕甚悼焉已令有司備禮殯殮靈車歸葬特以牲醴致祭嵩博學有志行家素貧及貴未嘗增置産業居官十嵗不以妻子相隨清苦如布衣時其為北平按察副使攜一童往至則遣還每夜孤燈一榻讀書不輟至五更則衣冠起坐待旦值北平兵革之後招徠逋逃慰安反側惟務寬厚以存大體尤慎刑威之用遇小人憸狡輒先事防制溫顔巽詞而見者凜然及致仕而歸益自謙下問學之功老而彌篤與人言未嘗及官政嵗歉其姻族之人不能自養者輒周給之嵩􅤬歷中外尤以文學受知於上其為文雅粹為詩有唐人風韻所著有北平八府志東逰録嶺南録及詩文十八卷藏於家又有職方集行於世侍郎陳思道陳思道字執中浙江山陰人父谷深居鑑湖濱且耕且讀教授鄉之子弟生四子思道最幼負竒氣穎悟出倫日記數千言見者每以公輔竒之及對人言曰吾必為吾父償書債洪武三年開科取士遂領鄉薦登乙丑進士授刑部主事執法不回二十年朝廷知其賢驟銓兵部右侍郎益勵風節雖至戚信友不敢干以私繇是名譽日彰寵遇日盛二十一年轉禮部左侍郎二十二年三疏乞歸養家居不植生業儼然居官之日郡邑長令非有劇政造廬請議不得一見與鄉人則恂恂且善屬詩文時推正直有行義必以為稱首云侍郎張衡張衡字子平江西萬安人洪武乙丑進士授禮科給事中疏奏剴切二十年擢禮部右侍郎有才幹二十二年轉左侍郎奏定洪武禮制定式㑹嵗行郊祀選百官行最者十三人登壇分獻衡與焉太祖屢嘉其清慎以其事載大誥每宣召輒呼為瘦張而不名二十二年九月諭衡同左都御史詹徽等曰有司供宴擾民今後支與官鈔布政司一千貫以下令詳議以聞十月衡等奏行遵守凡遇正旦聖節冬至分宴錢於本處官錢內支給無府州縣都司衛所移附近有司關用每節布政司一千貫在城都司衛所附郭大小衙門官吏師生耆民俱赴本司筵宴府有都司七百貫以下各有差州有衛五百貫縣有衛四百貫以下有差無有司衛四百貫所一百五十貫後又議有司官朝覲每員給盤費鈔一百貫在任嵗支柴炭鈔五十貫又定引錢為堂食費未幾以言事忤㫖卒於官侍郎凌漢凌漢字斗南河南開封人洪武十七年以舉秀才擢司經局正字未幾出知㑹稽以事逮繫浙江按察司獄上知漢無罪獄為按察使陶晟所淹命械晟還釋漢與俱來既至拜監察御史巡按陜西奏陜西民病數事二十一年又以不受私遺升右副都御史尋升右都御史時詹徽為左都御史論議數不合每面折徽徽銜之奏遣按事蘇松還朝以失職為監察御史桂滿所劾左遷刑部侍郎二十四年命署吏部數月改禮部右侍郎又數月上以漢年老令歸鄉里漢叩頭曰臣願生居京都死葬京土上許之命居於私第侍郎黃觀黃觀字伯瀾池州貴池人父贅於邑城許氏生觀遂從母家姓明尚書補邑諸生受業於元翰林待制黃哻哻死王事觀益砥礪以忠義自許洪武甲子貢入太學是嵗領鄉薦罹外艱起復仍入監造詣日益深同舍推服嘗繪父母墓為圖攜以自隨閲之淚輒下辛未㑹試廷試皆第一拜翰林院修撰日侍御前敷奏明爽上甚愛重每賜顧問命編寫省貪等録上以其有政事才凡法司諸榜文令觀撰成即書之又令清理軍職貼黃兼管注銷諸司案牘侍東宫講論纍遷尚寶司卿禮部右侍郎乃奏復其姓㑹更官制進本部侍中壬午五月往上遊諸郡徴兵至安慶聞內難已平慟哭謂人曰吾妻素有志節必不肯受辱明日家僮自京逃來言將執家屬夫人翁氏出通濟門先擠二女於河即自沈焉觀遂招魂葬之江上舟次李陽河乃朝服東向再拜於羅剎磯湍急處紿舟人奮棹佯為溲解投水死時年三十九都察院右都御史陳瑛言觀及周是修等不順天命請加追僇文皇帝曰彼食其祿自盡其心爾竟不問永樂末詔觀親黨有編伍者皆釋之侍郎陳性善陳性善名復初以字行浙江山陰人洪武中以春秋魁鄉試丁丑㑹試列名上第臚唱時上見其凝重屬目久之謂侍臣曰向唱名陳性善者君子人也授行人司副已而改翰林院檢討初誠意伯劉基卒上遣御史李鐸往取其遺書基子璉即出觀象玩占於石室中鐸詣闕上之上簡精楷書者數人入便殿翻録性善預焉上天威嚴重進見者皆惶汗甚或掣肘不成一字惟性善動止安雅既竣書法端妍上嘉悅命賜以酒是時威譴叵測性善淹留竟日家人以為必死既出莫不大驚久之超拜禮部左侍郎薦達流人薛正言輩前雲南右布政使韓宜可方隸謫籍亦以性善言起為副都御史自建文君在東宫時己熟性善名及即位一日退朝獨留性善賜之坐問以治天下之要且使書於紙以是性善感知遇盡所欲言朝廷悉從之然施行未竟輒為權奸所攻性善朝見曰陛下不以臣愚猥承顧問臣既僭塵上聽許臣必行今而詔書云然所謂為法自戾陛下無以信天下矣未幾成廟入靖內難上命性善監李景隆軍大戰白溝河敗績性善與大理寺丞彭與明欽天監副劉伯元指揮王賚等皆被執以去文廟悉縱遣之性善朝服躍馬入於河以死內難平詔加追戮徙其家屬於邊後悉赦還侍郎董倫董倫字安常故山東恩縣人世居燕之宛平自處山林間布褐藜藿己懷憂世之志學者多從之逰以所居貝州因稱貝州先生元末徴辟不出世髙其行國初擢用單縣儒士張以寧以倫薦徴為春坊贊善大夫賜冠帶事懿文皇太子陳說多長厚語太祖髙皇帝聞善之繇右春坊右贊善升左春坊大學士賜文綺六匹鈔五十錠㑹東宫宴駕二十五年出為河南左參議盡心民事名其退食思政之堂曰後樂方孝孺為之記嘗草封事數千言無一不當上心者又上書薦肇州吏目諸葛伯衡太祖遽擢為陜西右參議三十年以詿誤免官典教滇南東宫憐其老賜以白金若干鎰倫行至成都蜀獻王深寵之賦詩八章以道行至滇凡作養成就用夏變夷漸摩膏煦皆出於仁義道德故雖蠻童夷竪皆知向方建文帝即位眷念東宫舊臣屢詢及之左右亦多言倫可用召至京師慰勞備至拜嘉議大夫禮部右侍郎兼翰林院學士與方孝孺同入內閣侍經筵御書怡老堂及髹几玉鳩杖各一賜之初監察御史解縉以權臣讐嫉譖之謫河州衛吏縉與倫書祈援嵗餘倫為之言乃召縉還以為翰林待詔其汲引人才類如此倫為人質直敦厚富文學為時所重建文間屢懇言當務親睦不聼文皇即位時倫年八十餘有㫖令致仕出京悒悒成疾數日卒侍郎宋禮宋禮字大本河南永寧縣人幼穎悟知讀書稍長益有志於學期將以自見繇是鄉校以明經充貢禮部補太學生以才能選者皆待以不次嵗庚午遂擢山西僉事持法嚴峻鋤奸剔蠧無少貸郡縣百司素貪戾為掊尅者皆側足屏息相戒莫敢犯禮於善惡之數苗薅髮櫛無所私三晉之間率皆想望其風采以有所庇依癸酉以考滿上天官改除户部山西司主事遂日治簿書㑹計之務惟允愈益有聲己卯復除為陜西按察司僉事其施於政者皆如在山西時而關右所仰望倚賴之者亦若三晉之民焉未幾復入為刑部員外郎值成祖即位之初命署禮部事是時詔敕號令封拜朝覲㑹同宴饗賞賚之事皆出禮官禮酬對捷給咸克稱㫖遂擢禮部右侍郎踰月轉左永樂三年升工部尚書侍郎楊砥楊砥字大用山西澤州人洪武甲戌進士授行人司右司副上疏言漢揚雄仕莽為大夫劇秦美新之論取譏萬世董仲舒三策及正誼明道之言足以扶翼世教今孔子廟從祀有雄而無仲舒臣愚以為退雄進仲舒庶合萬世公論太祖髙皇帝從之升湖廣左參議建文時遣李景隆等攻圍北平城砥上言帝堯之德始於親九族今當務惇睦不宜加兵自翦其附枝附枝盡而根本蹶矣為齊黃輩所忌斥罷之成祖即位起為鴻臚寺卿喪父廬墓側者三年服闋升禮部左侍郎坐巡河渠失職降工部主事改禮部永樂十年命簡閲北京郡縣馬升太僕寺卿明年兼苑馬寺卿砥率勵僚屬凡孳牧之法與民之利病悉條奏行之馬大蕃息母喪賜鈔千錠命護喪歸葬哀毁致疾未至家而卒上悼惜之遣官賜祭砥剛介勤敏居官有操其孝行尤為人所稱侍郎王彰王彰字文明河南鄭州人初為太學生奉命往山東催糧益兵儲同行者受賄慢事彰數讓之不從竟坐賄敗彰遂以廉勤知名擢為吏部源士踰年革源士改給事中升都給事中再升刑部員外郎遂升山西布政司參政永樂五年召拜禮部右侍郎時四方萬國奉玉帛重譯以朝覲賓貢者肩背相望於京師賞賚燕享無虛日與尚書鄭公賜同德協恭奉職惟謹明年以父喪去服闋改戶部右侍郎奉命祀西嶽還言陜州及新安民有鬻男女償負租者遂下詔蠲所負租官為贖還所鬻改都察院右副都御史從車駕巡狩北京時其母年八十特命歸省且諭之曰君子守官不忘親居家不忘君凡所過民之安否吏之賢不肖汝宜用意歸悉以聞既還奏上嘉悅升右都御史明年復命省母是嵗河南水災民多流亡而長吏不恤遂奏黜其貪尅百餘人罷不急之徴十餘事招復流民發廪賑貸多所濟活遇惡必去強寇敓道路及妖尼煽惑為亂悉捕誅之彰為人恂恂而謙恭莊重人莫敢千以私但用法過刻其母屢以為言彰不能改時劉觀為左都御史人云彰公而不恕觀私而不刻衆以為確論侍郎儀智儀智髙密人溫重端慤繇教官歷髙郵知州寶慶知府所至寬厚得民升通政司右通政兼左春坊中允數月升湖廣布政使簡易凝重得藩臣體後坐纍被謫湖廣都指揮使龔忠入見上問湖湘間老儒宜有存者對曰臣愚不能盡識以臣所識儀智固老儒也然坐小纍斥矣即日召之既至以為禮部左侍郎遇事是是非非不肯附㑹嘗正旦日食上命禮部尚書吕震議免賀禮震心以為宜賀智力為震言不可毋貽後悔上聞智言曰是朕心也竟免賀上命吏部翰林院簡求老儒授皇太孫經同以智薦上喜曰得之智侍皇太孫數年啓迪匡益克盡其誠年八十乞致仕賜敕奬諭遣歸以永樂十九年四月卒洪熙元年上思先朝舊勞贈太子少師諡文簡侍郎吾紳吾紳字叔縉浙江衢州人擢永樂甲申進士選為庶吉士入翰林讀書因同列言理刑事成祖聞之遂俱擢刑部主事治獄寬平有名尋升郎中超拜禮部右侍郎上謂尚書吕震曰吾紳出自翰林可佐卿典禮矣既而為震所擠出為廣東右參政尋復職改南京刑部奉命考察兩廣福建方面官有參政素貪墨結權要且以紳為故僚友紳竟黜之時稱其公還朝復禮部卒於官紳性率直於人短長無所較視榮辱若不以介意初拜侍郎時衣冠畢賀而一室蕭然了無供具有誚之曰拜官不祀先㑹客乎紳笑唯而已侍郎郭敦郭敦字仲厚山東堂邑人洪武中以太學生擢戶部主事嵗餘升衢州府知府咨訪民隱革弊興利郡俗貧死不能葬皆焚尸棄江敦相郊外得隙地百餘畝榜曰義阡令葬貧者又為條約教民患難相助民利賴之禁止淫祠同官有私取民財敦雖不面斥而義形於色其人悔謝改過亦改容待之屬邑吏皆爭自濯磨敦舍內蠶箔嘗有叢絲類織成鞶帶修廣合度郡人謂其仁政之應在衢七年操守甚嚴一志愛民永樂初坐纍徴入京師耆老數十人伏闕乞留不可皆涕泣去後廷臣有薦敦廉正不阿以為監察御史尋升河南布政司左參政無幾調陜西以公務留京師成祖皇帝聞敦有大臣體召見升禮部右侍郎兼太僕寺卿洪熙中進户部左侍郎兼詹事府少詹事宣德二年升戶部尚書陜西旱民困命隆平侯張信及敦往撫之敦至悉革宿弊奏請蠲逋負賑貧乏實邊儲考黜貪吏罷不急之務凡十數事上悉從之嵗餘召還敦忘身愛國知無不言及得疾上聞之命御醫往視竟卒年六十有二上悼惜之賜祭命有司治葬敦性純厚事親孝閨門肅然於人不茍合公暇手不釋卷氷蘖之操無遜古人雖位列六卿而泊然布素身沒之後家無餘資侍郎鄒師顔鄒師顔湖廣宜都縣人洪武間以國子生擢兵部主事升工部員外郎又升江西布政司左參政永樂初坐事升監察御史後升大理寺丞仁宗皇帝嗣位升禮部右侍郎未幾告歸省墓既還至通州病疽卒訃聞遣官賜祭令有司治葬行在禮部尚書吕震言師顔家貧不能歸喪上曰朕聞其人清慎其卒可惜遂命給官舟載歸因謂左右臣曰為官而貧可嘉今豈獨鄒師顔但朕未悉知耳自今京官終於位者皆倣此例師顔小心謹畏廉介自持蒞事周密人不敢干以私而議者頗譏其近刻云侍郎張瑛張瑛字子玉順德府邢臺縣人洪武丙子鄉舉授陜西寧州訓導調武德衛再調宿遷縣永樂戊子秩滿九載特擢吏科給事中宣宗皇帝時為皇太孫始親學遴選儒臣俾司伴讀瑛與焉仁宗皇帝踐祚升春坊中允未幾升諭德尋改洗馬宣宗皇帝繼統之初録瑛舊勞升行在禮部右侍郎宣德改元遷左侍郎兼華蓋殿大學士入與內閣機務丁未升尚書仍兼職預修成祖仁宗皇帝實録為總裁官既而調南京禮部甲寅丁外艱詔復起之賜御製詩十餘軸楮萬緡年六十有二卒訃聞遣官葬祭瑛儀觀魁梧持己莊重剔歷兩京無所建白文章政事皆非所長云侍郎李嘉李嘉字允堅宛平縣人初事成祖文皇帝於藩邸為奉祀所禮生丁父憂哀毁動人終喪不飲酒食肉而盡誠養母文皇帝靖內難預效守城勞初授鴻臚寺序班升通政司參議後坐纍左遷鴻臚寺丞仁宗皇帝臨御升左通政又坐纍左遷未行宣宗皇帝嗣大統復通政使改北京工部侍郎又改禮部侍郎嘉雖老日勉強職事未嘗少閒再嵗以疾聞賜敕命致仕數月卒年七十遣官賜祭命有司治喪葬嘉持身端謹一介不茍取豫治家整肅教子孫必務學然胸中狹隘蒞事瑣碎無大臣體侍郎李琦李琦真定府元氏縣人洪武末年以文學授滄州訓導坐事謫戍雲南革除中以經明行修再薦擢監察御史尋遷大理寺副復坐事謫雲南永樂元年上書陳情召試御史㑹交南侵廣西地命琦往琦以書喻援引趙他吕嘉逆順禍福之理并道路遼遠炎涼俱不足恃凛然可懼安南感悟遂歸侵地還奏稱㫖實授廣西道監察御史宣德元年升行在禮部右侍郎後占城與安南交惡復命琦往喻之兩國遂和自是西洋諸畨有事悉令往焉所至無不款服四年改湖廣布政使琦簡易有識量而善談論故數奉使遠夷及在湖廣政譽靡聞以朝覲至京吏部言其老不任事遂令致仕侍郎蔣驥蔣驥字良夫浙江錢塘人第洪武庚辰進士擢行人永樂初詔文學之臣纂修髙廟實録驥預焉書成升翰林檢討修永樂大典為副總裁前翰林學士解公縉出為交趾參議以事逮獄坐連纍拘幽者十餘載中扃坦然以書史自娛未始有幾微怨懟仁宗即位宥復前官踰月升左春坊左司直郎宣宗嗣統之初以宫僚恩遷翰林院侍講宣德紀元奉命祀東鎮洎大禹南宋諸帝陵歸朝與修兩朝實録書成賜白金文綺升侍講學士尋升禮部右侍郎視事幾二旬得疾遽卒遣官賜祭命有司治葬驥天性孝友嘗迎父就養京師朝夕起居侍養備至兄弟三人友愛無間言素善筆札奉命書烈女傳特被褒賞禮部㑹試兩為同考試官時推其公為人美丰儀善談論尤喜客所居軒楹清曠几席整潔佳花異卉雜植前後客來詠歌觴酌歡如也其雅懷灑落蓋如此年五十有三所為詩文總六卷前後所録多手筆云侍郎章敞章敞字尚文浙江㑹稽人永樂癸未領鄉書首薦明年登進士選入翰林為庶吉士與修永樂大典授刑部主事時西山有劫盜詔捕之急捕者掩執行路數百人以聞命刑部覆訊之敞辨其枉惟一人實盜以故升本部員外郎尋遷郎中起復改吏部宣德庚戌擢行在禮部右侍郎奉詔往安南命黎利權署國事暨宣詔利遣人白相見禮敞語之曰吾奉詔命至爾蓋小國一酋長能盡禮於使者即所以尊敬朝廷何以白為利聞即趨拜坐於下令所親給侍左右數為巧媚辭欲眩以聲色敞正色待之終不為動及還餽贐珍異一無所受利死復奉命令利子麟權署國事却所贐如初英宗嗣位之初平陽王復封留王以故護衛官軍田廬為請敞受命往理之至則較其軍數量以田廬與之餘給於民還奏上嘉之未幾遷左侍郎敞蒞政思慮精審防範周密以國家統理天下既久典禮品式有因革輕重之殊事或隨時損益有先後矛盾之異而吏胥亦稍緣此為奸於是白尚書胡公濙取國初至今凡所行條格集記之付四司使得參酌而行事獲適宜奸弊頓革嘗有黠吏嗜酒怠事且增損公牘即置於法羣吏自是悚息不敢為非太醫院每舉醫者人往往假以復怨及徴至多不諳醫敞察知之遂偕尚書奏革其弊比嵗僧道嵗給度牒輒以千計乃與尚書請依洪武例三嵗一給凡僧道出家及舉為僧道官者止於所居封內不容越籍冒濫四夷貢使日給廪餼庖人每侵尅之敞聞之曰小人為口腹計而使朝廷薄柔遠人之禮可不禁乎即令有司具日給之數付通事者或給不如數乃從而督治自是遠人以為朝廷待之加厚焉正統丁巳卒年六十二上嗟悼之遣官諭祭命有司營葬事敞在禮部時尚書胡濙政尚寬大敞以嚴肅佐之於吏欺雖小不恕遇事不肯媕阿依隨士林多服其剛毅云侍郎王士嘉王士嘉字道亨山東武城縣人永樂初繇監生擢山陰知縣在任有廉明之稱尋升陜西按察司僉事未幾改工部員外郎久之升北京工部郎中宣德七年升陜西右參政所至清譽著聞正統元年召為禮部右侍郎七年以老致仕卒年八十七訃聞遣官諭祭士嘉儀觀魁偉性度開爽為人狷介不茍歷仕五十餘年家無餘資士林髙其行子平登進士為翰林檢討升河南按察司副使怒撻教官反為所屈疽發背面卒士嘉知玉性剛躁乃居近侍恆以為憂及聞外補喜曰吾家無纍矣工部尚書吳中同學友也士嘉薄其不慎名檢中每見之不覺自失焉禮部志稿卷五十五
