body:
  text: 禮部志稿卷九十七明俞汝楫編擬典備考建文陵廟及景泰廟號疏萬歷二十年禮科都給事中萬象春題為修舉陵廟曠儀以光先德以垂典制事切惟國家之事莫大於祀典祀典之起實繇於人心故質之人心而有不容已皆祀之不可廢而聖哲之所必舉者也矧事關陵廟情屬親親在列聖容有欲為之志而陛下當有善繼之圖者乎臣所議於今日有二一曰革除之陵廟宜復二曰景帝之廟號宜尊洪惟太祖開基成祖定鼎列聖神功巍巍莫尚矣然自太祖以後成祖以前其間君臨天下者不有建文君在乎既緣靖難兵至避位自焚延迄於今祭享無聞陵園不治行道之人欷歔嘆息臣嘗倣往牒當建文君沒成祖駐營龍江發哀命有司治喪葬以天子之禮遣官致祭當其時固未嘗不陵不祭也乃今令甲所載止孝陵及懿文太子陵而建文君不與焉茲何以故豈成祖許之於先而所司顧廢之後耶國家修明典禮凡前代帝王有功德於民者除嵗廟時祭外間遣官祀於其陵而矧稱帝建號按臨臣民至四五年首為一代嗣統之正者乎又如革除死事諸臣我皇上登極之初首發明詔令得祀於其鄉邇又允言官之奏凡諸臣墳墓苗裔咸蒙修治恤録而為之君者反不得一壞之土一勺之水宜天下人心惋然而深悲也似宜勑下所司即其原葬處所立為陵廟嵗時一體祭祀仍乞上尊諡以表追報之隆復年號以正君臨之體此非臣等今日私議也當在成祖時既葬以天子之禮必宜享天子之祭既享天子之祭自當復其有天子之號詎特天下之心固亦成祖之心也而何顧忌之有與至於景帝之事則又異矣土木之變國家岌岌乎幾不可保景皇帝奉太后命進登寶位鎮安人心倚任忠良克戡禍亂卒至鑾輿反正宗社寧謐聖子神孫所以晏安坐享全盛之業者景帝之力豈可誣哉逮升遐之日諡號葬祭率從貶損蓋一時軒輊之勢則然而實非人心之公與國典之正也以是至憲宗純皇帝時特允廷臣建議復其帝號祭以帝禮先靈顯赫亦既足以述先志而昭往烈矣然而廟號未加陵制有儉生有安天下之功而崇報不稱沒宜享天下之號而物故未彰其於國制終屬缺典臣等待罪該科每見太常寺嵗祭題請祭祀其遣官行禮諸陵皆同固未有隆殺也即如前嵗駕幸山陵行春祀禮臣忝扈從之列見我皇上於景帝陵躬為致祭誠重之矣乃其祭與諸陵同而其制與諸陵異雖致祭於陵而不得祔祭於廟仰窺聖衷當必有缺然於茲者矣似宜遵照典制備加尊諡仍恭上廟號昭示無疆其陵制隘陋尤須亟為恢改如似逼近恭讓皇后陵勢難展拓第就其殿廡門垣等項稍加穹廣仍量陪寶城增建明樓以稱帝者藏衣冠之地至於恭讓太后陵亦宜一體修治俾得鬱然相望如此庶足以慰在天之靈而彰沒世之德其於陛下繼述之孝制作之隆皆有先矣景廟議成化二年五月湖廣荆門州學訓導髙瑶上言正統己巳之變先帝既已北狩皇上方在東宫冦騎薄於都城宗社危如一髮使非郕王繼統國有長君則禍亂何繇而平黠冦何繇而服鑾輿何繇而還六七年間海宇寧謐年榖屢豐元元樂業其功不小逮夫先帝復辟其貪天之功以為己力者遂加厚誣使不得正其終節惠隮祀未稱典禮人心猶鬱天意可知昔周公有身代武王之功及三叔流言避位居東致天動威以彰周公之德成王警悟遂親迎之出郊反風感應如響今者災異迭興無乃天之動威亦以彰郕王之功與伏望皇上特勑禮官集議追加廟號以盡親親之恩則倫紀以厚而天心可回矣事下禮部議之禮部等衙門㑹議訓導髙瑶所奏追加景泰廟號事僉謂郕王繼位六七年間行事具在實録其廟號非臣下所敢輕議請自上裁左春坊左庶子黎淳奏曰正統十四年八月册立陛下為皇太子至九月羣臣又奉郕王即帝位改元景泰緣陛下為皇太子在前郕王即帝位在後事理有礙至天順元年正月英宗睿皇帝復位欽遵聖烈慈夀皇太后聖㫖仍復景泰為郕王詔告天下永為遵守然後人倫正天理得名正言順而事成矣髙瑶建言乃欲加郕王廟號臣惟朝廷既立皇太子則異時居天子之位乃皇太子也曽未半月羣臣又立一親王為天子則前時所立之皇太子將何為哉此景泰三年皇太子之廢有繇然也在當時雖曰主少國疑四方多事然周成王之時姬旦實有功之叔父何不遂取天位雖曰神器久虛不可無人然共和之際周召皆王國之懿親何不共分姬室特以君臣有定分而不敢耳凡若此者皇太子為君親王為臣天經地義民彛物則截然一定固不待智者而後知之今多官㑹議依違茍簡略無定見猶欲煩瀆聖聽取自上裁豈臣愚之所能喻哉先帝明並於日月此事處置已久人心已定今若誤聽髙瑶之言一加郕王廟號必將祭告太廟改易舊制而行祔廟承祧之禮焉必將遷啓梓宫改造山陵而加珠𥜗玉匣之典焉必將追贈皇太后皇后之稱焉必當盡復當時所用之人所行之政焉且髙瑶此言有死罪二一誣先帝為不明一陷陛下於不孝古之聖賢經史具在魯隱公內不承國於先君上不禀命於天子諸大夫扳已以立而遂立焉是與爭亂造端故春秋首書元年春王正月而削公即位正大倫也郕王之即位內承國於何君上禀命於何王不過羣臣扳已而立為遂立爾律之隱公允合無異為人君父而不通春秋之義者必蒙首惡之名是故昌邑王既廢未聞復為漢某帝更始既廢未聞復為漢某王誠不敢悖逆春秋移不明之過加於先君而欲全孝道於子孫也陛下昔為皇太子名正言順誰得私議郕王乃敢廢之易以己子至使先帝久遭幽閉此非郕王所自為也當時館閣大臣陳循等貪圖富貴密運姦謀從㬰為之也至於天順元年郕王有疾陳循自合迎請先帝復位却乃率領羣臣進本奏乞早選元良正位東宫當時皇太子見在欲選何人以臣愚見若非南城迎駕之功先帝終無出路矣但此迎駕之人又皆貪圖富貴之小人既效微勞氣盈志滿驕奢淫佚靡所不為是故髙爵厚祿封公封侯所以尊顯於元年者賞其迎駕之功也嚴刑峻法或斬或流所以誅於後來者罰其驕矜之罪也今流言國中必曰先帝怒此諸人迎駕而罪之則萬無此理而不足信矣陛下即位之初首罪羣邪寒心破膽及見取回商輅仍復舊職內閣辦事然後欣然自以為得計又皆私竊效慕希求進用矣彼小人者但欲得官於已豈顧貽患於人臣以謂髙瑶此舉非欲尊禮郕王也特為羣邪進用之階也必有小人主使之者不然彼草茅疏逺安敢妄言上誣先帝之明使後世觀之以為口實而今之議者亦豈可不察乎此隱忍曲從而猶欲煩陛下之聽哉疏入上曰景泰已往過失朕不介意豈臣下所當言顯是獻諂希恩俱不必行請復建文年號立景泰實録疏禮部尚書沈鯉題為循史職修缺典以昭祖宗心事以隆繼述大孝事該國子監司業王祖嫡奏稱建文年號已奉革除景泰事蹟仍為附録均於信史真要乞聖衷裁斷復建文位號仍將四年事蹟修輯為録景泰則自為一録削去郕戾舊名各一節奉聖㫖禮部知道欽此臣等看得人君有位號則有紀年有政令則有實録此春秋不易之法自古及今無有以興亡隆替而因革豫奪其間者我朝自太祖開基列聖相承金匱玉室之藏具在乃建文以革除而槩稱洪武景泰以分附而並系英宗則皆為我朝闕典矣臣等請先述二事大略而後及所以當正之故為皇上陳之我太祖髙皇帝在位懿文太子先薨洪武三十一年太孫嗣位改元建文建文者太祖之嫡孫也在位四年成祖文皇帝靖難登極乃削去建文年號仍以洪武紀年及重修髙廟實録遂將四年寶歷附作洪武虛數此則革除之大略也正統十四年北敵入犯英宗睿皇帝躬馭六師自行天討至土木北狩景皇帝時為郕王奉皇太后命監國旋正大位次年八月恭遇英廟回鑾後七年復辟是為天順元年其時奸臣石亨輩奏將景皇帝廢為郕王加諡曰戾成化元年修英廟實録遂以景泰七年事蹟附於正統之後天順之前注曰郕戾附至成化十一年十二月憲宗純皇帝追體英宗本意始勑廷臣復景帝位號上恭仁康定尊諡改修陵寢無所不用其情惟景泰七年事蹟原附英廟實録者仍稱郕戾王此則附録之大略也嗣是以來朝野公議非不昭然而修遺舉墜獨未之聞者則有繇矣蓋郕戾附録纂修在成化元年位號之復在成化十一年也當時惟以復位號為重而實録之改與不改以為往事歷數十年竟無與言及之者乃因循以至於今非為其不可而遂已之也矣憲廟追尊之舉為帝王盛德之冠乃獨於附録一節不行釐正於推廣德意毋乃有闕乎不知位號既復則實録自當改正許其大不許其細是未體夫憲廟之心而已矣建文年號在成祖登極詔書不過以建文四年為洪武三十五年然猶稱為少主未聞降削位號是在成祖親親之心亦必有不忍絶者而一時宣力歸命諸臣故務張功伐或茍存形迹遂贊成革除之事其亦未達夫成祖之心耳夫成祖奉天靖難再造邦家駿烈宏功纘承髙廟正使年號不除何損萬一而曲為掩諱若此且天下後世各有耳目安可盡泯稗官野史各有紀載安可盡革此不但無益於事適足示人以疑耳故議復革除者非為建文為成祖也議更附録者非為景帝為英宗也方今聖明在上修遺舉墜以𢎞先德正此其時臣等不敢為更張之議惟以附録改正不過將英廟實録於正統以後天順以前摘中間七年事蹟名曰恭仁康定景皇帝實録無相混淆如斯而已至於建文位號詔書中原無降削之文今亦無憑議復亦惟於髙廟實録中摘出洪武三十二年至三十五年事蹟復稱建文元年二年三年四年以存其年號𫝊信萬世如斯而已以我太祖甫定天下即首命儒臣纂修元史又追諡其主為順帝淵哉聖心至公至厚矣成祖英宗之心同符太祖而建文景泰又非勝國之君之比也元主可諡何忍沒其號於建文元史可修何可闕其録於景泰且景帝之位號既可復則建文年號亦可復建文之死事諸臣且蒙我皇上之恤録而況其君乎況其為太祖之𦙍乎慰祖宗在天之靈伸寰海久抑之意彰微顯闡幽之烈寓興滅繼絶之仁斯舉也實聖主德政之第一事也獨可稱昭代之信史而已耶伏候聖明裁定惟復勑下多官虛心㑹議題請定奪等因奉聖㫖景皇帝位號已復實録候纂修改正建文年號罷表章忠義請恤靖難忠臣𢎞治四年兵科給事中吳世忠言太宗皇帝奉天靖難時文臣如方孝孺周是修練子寧黃子澄鄒公瑾魏公冕顔瑰齊泰諸人伏節以死然至今未及褒表似為闕典因言太宗之奉天靖難乃武王之心孝孺諸人之伏節死義則夷齊之志二者固並行而不相背況仁宗皇帝即位之初於孝孺公瑾諸人之事俱嘗明著詔書稱其忠義還其子孫俾不失所後至宣宗皇帝之世凡諸恩義亦以漸推舉今天下之人景仰諸賢之忠義如彼而感嘆三宗之明識逺度如此伏乞賜之爵諡崇以廟祀録其子孫復其族屬以勵士夫之節慰忠義之靈命下其奏於禮部改定歷法改定歷晷刻景泰二年詔更定大統歷晷刻先是天文生馬軾乞改大統歷晝夜時刻命禮部㑹官議欽天監監正許惇等奏正統間監正彭德清於觀象臺測驗以北京較之南京北極出地上髙三度南極入地下低三度冬至晝短三刻夏至晝長三刻逐一考究奏準改入大統歷內永為定式軾起自軍匠不諳厯數妄以己意要改舊制所言難允帝曰歷雖造於京都而太陽出入度數則當以四方之中為準則是以堯命羲和仲叔四人分測驗於四方以定四時之中今京師觀象臺在堯幽都之地太陽出入度數其可以為準乎今後造歷宜悉照洪武永樂間舊式請改歷法成化十七年直𨽻真定縣儒學教論俞正己以上言歷法為禮部尚書周洪謨等所劾命錦衣衛執治之正己言歷象授時乃敬天勤民之急務後世歷法失𫝊漢唐以來造歷者莫有定議愈精愈密而愈多差繇不得古人隨時損益之常法也我朝列聖相繼於前代宿弊一掃無餘但於歷法之差未曾改正臣切以經𫝊所載日月天行之當度本歷元以步算又以隂陽虧盈之理求之以驗今歷謹詳定成化十四年戊戌十一月初一日己丑子正初刻合朔冬至日月與天同㑹於斗宿七度至三十三年丁巳十一月初一日戊辰酉正初刻合朔冬至日月與天復同㑹於斗宿七度所謂氣朔分齊是為一章者也今將一章十有九年七閏之數冬至月朔閏月節氣年月日時逐一開坐編成一册上進請勑該部精加考訂仍行欽天監從宜造歷頒布天下詔以歷法已嘗稽定今奏有差所司其看詳以聞禮部尚書周洪謨等㑹欽天監掌監事太常寺卿童軒集歷科官生與正己參考講論竟日不能决洪謨等因奏正己止據邵子皇極經世書及歷代天文志推算氣朔又祖述前代術家評論嵗差之意言古今歷法俱各有差曾不知歷代以來歷官考之象緯驗之晷影隨時修改以與天合則雖當差而可使無差今正己膠泥所聞輕率妄議請下法司治罪有㫖正己不諳事體妄議歷數錦衣衛其執治之既而軒亦奏云比詣禮部公同正己講論歷法看得所進册內每月俱以大小編排祇有合朔並無弦望之日於本年六月後作閏六月臣等辨論本年若閏六月即今八月當作七月觀數日以來氣候豈七月令乎且其言成化十四年戊戌為章盡之年當閏十月而不置閏故冬至差一十二日則知今歷冬至合朔閏月三者皆差惟歷日乃正朔之書借置閏或差則寒暑反易農桑庶務皆失其候矣我太祖髙皇帝奄有天下肆命監正元統等參考歷代四十四家歷法以洪武十七年甲子為歷元造大統歷頒行天下英宗睿皇帝又置璣衡節儀圭表等器於觀象臺逮今循用已久本監所算日月交食日時方位及所躔宿度觀之於天測之於器未始有不驗者間有刻數先後之殊所食分秒之異蓋繇星土之有南北地形之有髙下故耳使果如正己戊戌年當置閏冬至差一十二日則晦朔弦望既差而遞年本監所算日月交食日時并所躔宿度俱差無疑矣今何為盡驗乎況戊戌置閏遡而上之無不差者又其言天地之間有自然之冬至有自然之朔望有自然之閏月非人力私智所得而損益是又不知天有自然之運而人有自然之數求自然之天則雖千載之日至可坐而致也今正己自以己意創為八十七年之約法每月大小相間編排有合朔而無弦望止是以區區小智強合於天與前之所言自相矛盾矣切見禮部奏詞未曾深言本官妄議歷法之非恐彼心懷不服請勑法司將臣所奏明正其罪以警將來得㫖亦付錦衣衛史臣曰歷法重事人多不講正己所奏援引證據凡數千言雖與歷家不盡合然亦苦心力而為之矣請改定歷法𢎞治十年十二月南京欽天監主簿諸升奏歷法有差乞命大臣為總裁選通曉天文歷理之人改定歷法禮部覆奏國初更定大統歷頒行天下其法至精至密百餘年來凡以推步測候頒朔授時鮮聞有失若必欲更改嵗差求合天度事體重大有非臣下所敢議者況私習天文律有明禁以故通曉歷法者亦未易見又升所奏亦自有訛舛請治其罪上曰歷法事重不必輕易更改諸升姑宥之正德十一年欽天監漏刻博士朱裕請修改歷法上疏曰嵗差之法唐一行以八十三年差一度宋紀七十八年差一度虞喜五十年差一度何承天為不及乃陪其年而反不及劉焯取二家中數七十五年差一度俱為未密至元太史令王恂郭守敬等參考修正以辛巳為授時歷元比漢唐宋歷最為精密但距今二百三十七年歷嵗既久不能無差故推算日月交食五星躔度有差失況回回歷自開皇己未至今九百餘年亦有疏舛連年推算日月交食算多食少算少食多時刻分秒與天不合赤道嵗差一分五十秒距今正德辛巳該差三百一十分黃道嵗差一分三十八秒半今當差三百三十二分四十秒此即損益之數若不量加損益將來愈久愈差乞勑禮部㑹議簡命文職大臣一員督本監堂上官總理其事令本監歷科官生半推古法半推新法兩相較驗奚疏奚密孰是孰非觀象臺測驗黃道赤道度分若干日月五星躔度疏密漏刻科推測昏旦中星調品晝夜壺漏中星正則天運可求分至定則日行可準回回科推驗西域九執歷法仍遣官之南京及浙江諸省候土圭以測今時與至元天道修短若干節氣早晚何如衆途同歸方可成歷則交食可正儀象可驗七政可齊而天道可合事下禮部看詳以為星歷之學必得明天人之理如郭守敬許衡之流斯可以任考驗之責今裕及欽天監官歷法未必皆精難遽委以是任今十月望月食分秒時刻中官正周濂等所推算與古法及裕所奏各不同本部請候至期驗看上請裁定既而濂等言漢劉洪造乾象歷始覺嵗周餘分太強減二十五百為二千四百六十二至晉虞喜宋何承天祖冲之以天為天以嵗為嵗謂嵗當有差因立嵗差法元許衡王恂郭守敬等造授時歷宗而用之其法損嵗餘益天周使嵗餘浸弱天周浸強強弱相減得日躔嵗退之差一分五十秒名曰嵗差非差失之差乃今嵗冬至歷來嵗冬至不及天一分五十秒歷六十六年有竒而日退天一度所謂差也考元至元辛巳嵗前天正冬至氣應五十五日六百分命得己未日丑初一刻日躔赤道箕宿十度黃道箕宿九度二十二分一十七秒為授時歷元推驗之精未有出於此者但用之年久差退移天度太逺致有差失臣考元至正戊子冬至赤道嵗差退天一度五秒黃道嵗差退天九十二分九十八秒永樂乙未冬至赤道嵗差退天一度五秒黃道嵗差退天九十二分八十八秒成化辛丑赤道嵗差退天九十九分黃道嵗差退天九十一分四十二秒今正德乙亥距至元辛巳二百三十五年赤道嵗差當退天三度五十二分五十秒黃道嵗差當退天三度二十五分七十四秒未經改正則推步豈能合於天道臣將嵗差之術參詳較驗考得正德丙子嵗前天正冬至氣應二十七日四百七十五分命得辛卯日丑初初刻日躔赤道箕宿六度四十七分五十秒黃道箕宿五度九十六分四十三秒為歷元不用古法積年别作一算起每一年加一算仍減一用之其中積分數月俱自此始其氣應閏應轉應交應并周天黃道二十八宿十二宫次分界宿度分秒諸類歷法立成悉從嵗差以隨時改正則推步無不合矣授時歷議云歷法疏密驗在交食然推步之術難得其密加時有早晚食有淺深取其密合不容偶然推演加時必本於躔離朓朒考求食分必本於距交逺近茍入氣盈縮入轉遲疾未得其正則合朔不失之先必失之後合朔不失之後必失之先合朔失之先後則虧食時刻其能密乎日月俱東行而日遲月疾月追及日是為一㑹交值之道有陽歷隂歷交㑹之期有中前中後加以地形南北東西之不同人目髙下邪直之各異此食分多寡理不得一者也合朔既正則加時無早晚之差氣刻適中則食分無強弱之失推而上之自詩書春秋及三國以來所載虧食無不合者合於既往則行之悠久自可無弊乞勑禮部堂上官一員并本監堂上官董理其事再選官生二三人與臣等上自至元辛巳為始下至未來戌子為終通計二百四十八年時日月交食用古法與新法逐一推算考驗精密應合於天亦下禮部看詳以濂等所推近是但定歷授時乃朝廷重典未可輕議請今後凡遇日月交食本監官生一依古法推算如或未當暫免參究本監仍於官生內推選精通歷學者四五人同濂等以新法推算彼此參驗至於數年果有定則别為奏請從之嘉靖二年十月欽天監博士朱裕又奏我朝百務皆有成規獨歷法未暇修正雖以大統為名實授時之歷且自先及今二百四十餘年歷嵗既久積數漸差推算連年日月交食分秒已有不合時刻遂至爽忒臣嘗於中官正周濂具奏乞欲增損修改奉欽依今後如遇日月交食遂依古法推算如或未當暫免參究禮部仍於本監官生內選精通歷學者四五員名與周濂朱裕等各以新法推算彼此參驗待日後纍算無差再行具奏臣等仰遵成命參驗分秒時刻委有不協洪武中漏刻博士元統亦言歷法當隨時修改以合天道洪武去元甚近已欲修改今乃嵗差愈多況本監觀象臺晷表尺寸不一難以準測推算歷數用南京日出分秒似相矛盾伏惟皇上圖新治化敬天勤民歷象為急乞勑禮部詳臣所言㑹舉洞達天人精究理學大臣一員總理其事及鑄立銅表考四時日之影仍差通曉歷學官生前往河南陽城察舊立土圭以合今日之晷及分立圭表於山東湖廣陝西大名等處以測四方之影然後將內外舊影新舊歷書錯綜參驗撰成定法庶幾合朔得真交食不謬詔下所司知之嘉靖二年欽天監掌監事光祿寺少卿華湘奏歷代治歷更改不一不數世輒差者繇天周有餘日周不足所致勝國至元辛巳已造授時歷天正冬至嵗差迄今不同是以正德戊寅日食己卯庚辰月食時刻分秒起復方位與本監所推不合乞賜中祕歷書及國朝歷志準臣親督中官正周濂等及選諳曉本業善於推算者及今冬至以前詣觀象臺辰昏晝夜推測日景赤道黃道中星分秒日記月書候至來年冬至以驗二十四氣二至二分日月交食合朔弦望并日躔月離黃赤二道及昏旦夜半中星七政躔度紫氣月孛羅㬋計都等類視元辛巳果否有差備録上之并延訪明歷理善立差法之人令其參列同異重建歷元詳定嵗差以成一代之制下禮部議請如所奏得㫖允其測候訪知祕書罷禮部看詳掌欽天監事光祿寺少卿樂護言歷不可改與少卿華湘所見不同我朝歷因於元經耶律楚材許衡王恂郭守敬諸大儒之手固難議改然推步之法貴隨時考驗以合天運今華湘欲自行測候以定嵗差亦不為無見已經行令測驗請行本監令二臣各盡所見究極異同考求至當歸一之法以合天度從之推廣諡法請善惡皆諡議正統八年癸卯吏科給事中姚䕫言古者諡法之設非但為死者加美號以示恩寵正欲表善惡示勸戒也自宋以前內朝官三品以上例皆得諡四品以下至韋布之士亦間有諡其法掌於太常議於博士達於祠部覆於吏部然後以行所以示至公而取信後世如何曾如許敬宗皆諡曰謬天下莫不快之士大夫亦有所激而思所以自修自諡法未有定規故有應諡而未得諡者如交趾死節臣知州何忠猶不得諡乞勑禮部翰林院㑹議斟酌古制今後大臣無分善惡並依古法加諡其何忠宜準侍制王禕例追諡凡諡太常博士議之翰林院正之吏部奏之務盡至公表善惡以勵風俗事下禮部尚書胡濙等奏諸司職掌第載公侯卒有諡文武大臣卒而功績顯卓者特㫖賜諡今䕫言凡大臣無分善惡概乞賜諡難行其知州何忠已贈廣西南寧同知頒誥命茲欲加諡請自上裁上曰諡法既有定制何忠又已褒贈其俱已之廣諡議隆慶二年禮科給事中徐師曾議曰賞罰者一時之榮辱也諡法者萬世之榮辱也夫賢而賞不肖而罰理之常也然賢者或不幸而罰不肖者或幸而賞則是非之辨不明勸懲之典不著而人主鼓舞天下之術窮矣聖人知其然是以作為諡法以濟之賢者不幸生前罹罰而死後獲美諡則足以為萬世之榮不肖者生前幸賞而死不免惡諡則定以為萬世之辱嗚呼一時之榮辱甚輕萬世之榮辱甚重則人情安肯冒一時之榮而甘萬世之辱哉古者臣子於君稱天以諡且猶不敢狥私故有幽厲桀紂之號況君之於臣乎國朝賞罰當矣間有見稱於生前而不能無議於身後則諡法誠不可緩也太祖初興未遑此務故惟藩王武臣有諡至成祖始諡文臣是後被賜者多然或緣奏請或出內降不由考功不牒太常豫者享美譽不豫者免惡名國家二百年文治隆洽而於此顧有不數數然者思竊怪之豈其别有大焉者而不屑此與抑或吝惜而不與也夫古所謂諡者兼美惡而稱之也是以有榮有辱可勸可懲若豫者享美譽不豫者免惡名則榮幸冒於生前辱不及於身後猶廢諡也諡既廢矣將必專恃刑罰以懲惡可乎愚切謂今在內則府部院寺五品以上在外則方面諸臣皆當有諡或仕或罷沒必申報考功司河南道稽查在任功過評隲人品髙下移文太常撰議奏請然後吏部大臣審定覆題不由閣擬不從中制使天下曉然知賢者雖抑而必伸不肖者雖伸而必抑則勸懲之機風動海內顧有出於刑賞之上者何憚而不為哉或曰古者生無爵死無諡如子之言不幾於濫乎愚應之曰不然古人所謂爵者有二書曰列爵惟五此以公侯伯子男為爵也孟子曰公卿大夫此人爵也此以公卿大夫為爵也況周人稱爵下逮命士豈必分土析圭然後為爵也方今京朝五品以上在外方面諸臣列於大夫非特周之命士而已以應諡法何名為濫安得謬引曲說而沮古今之大典耶廣制科例請欽天監生放科舉𢎞治十五年欽天監掌監事太常寺少卿吳昊言本監所掌天文歷數乃國家為治之先務古昔帝王必命碩學名儒以司其事我太祖髙皇帝選世業子孫讀儒書通藝文者送監肄業期在得人至天順初天文隂陽生奏比醫士醫生等科舉例四十餘年科不乏人曩禮部因給事中趙竑奏革詐冒遂以為此輩科舉不出舊例致令兩監官生子弟繇之沮抑近者給事中葉紳奏欲照童軒等例於內外文臣中訪取學術明通者一二人改命職銜専掌其事亦欲占步得人也今以讀書為他業而禁錮之是與擇人占步之意不合乞勑禮部從公㑹議仍照太醫院例復其科舉以激勵之縱未能中式亦可以為占步之助其天文生隂陽人習業已成有中式者授本監事事子弟能中式者依資格出身中間果有堪習天文歷數者聽本監奏留任用下禮部議謂其事涉紛更已之諸請更制拔山林應科正統二年行在刑部右侍郎何文淵奏學校之典固可得賢然古之賢才不自學校出者亦多乞勑提督學校副使僉事御史按臨郡邑廣詢山林畎畝之中果有勇於進學而孝弟著於家庭信義顯於閭里者試實即令有司復其身俾得力學應科則人皆相觀為善而賢才之出日益盛矣事下行在禮部請如所言從之請去嶽鎮神像正統三年巡按湖廣監察御史陳祚奏南嶽神廟殿宇門廊舊有二百餘間規制廣大年久朽爛頺塌塑像傾壞不稱神靈臣考之典籍山川嶽瀆皆是隂陽氣化所成即非人類肖像可擬宜設壇致祭不當立廟故宋儒張栻曰川流山峙是其形也而人之也何居其氣之流通可相接也而升之也何居欽惟太祖髙皇帝鑑前代之謬凡諸嶽鎮海瀆革去帝王位號惟存本稱如南嶽止稱南嶽衡山之神仍照天下遵守甚盛典也惟前代塑造后妃侍御寢殿朝堂因循未革今坍塌已甚非用工七八萬莫能復舊乞命禮官㑹議因其頺廢之餘革去廟宇像設照依朝廷祭祀山川制度內築壇壝外立㕑庫繚以周垣附以齊堂每遇春秋精嚴祀事則禮制合經神明不瀆奏下禮部尚書胡濙等議稱衡山塑造神像寢殿朝堂歷相因積有年矣國初更制神號不除像設必有明見所言難準宜令有司役民趂農隙採木燒磚買辦顔料并工修理其餘房屋如本山道衆或好善軍民情願修補者聽上從之請較勘孔廟樂圖譜景泰七年直𨽻寧國府儒學教授余鐸奏臣聞樂者感化神人之本其要在乎和而已我朝各府學春秋釋奠先師孔子俱有樂以歌詠功德昭格神貺奈何行之既久聲律節奏不能無謬乞勑翰林院及太常寺官之精通音律者博考古典詳加較正著為圖譜頒賜天下學校事下禮部尚書胡濙等以為樂皆洪武間所較定者烏得有差寢之請復殿額更郊祀議隆慶元年御史張檟等言殿門宜悉復聖祖舊額太監李芳言南北二郊當合祀上俱下禮部㑹官詳議至是議上曰天子正朝之殿所以臨御萬邦其名義實至重我皇帝締造之初名以奉天蓋用明王奉若天道之意先帝因天心示變革故鼎新之餘更曰皇極蓋取洪範皇建其有極之意為義並精所包皆廣至於他殿閣名額先後雖殊意各有當夫皇祖為創業垂統之聖君先帝實中興禮樂之英主凡有制作莫不仰順天心逺稽古訓皆非臣下所敢輕議但竊見我皇上御極以來善繼善述因革得宜凡事關典禮綱常安危治亂遺詔所載者俱次第釐正其遺詔所未及無俟更張者則率循成憲不愆不忘蓋釐正者所以新一時更化之宜而率循者所以存三年無改之義聖明舉措髙出千古若殿門等額遺詔未載關係頗緩今使於先帝山陵甫畢之後一旦舉而盡更之竊恐皇上純孝之心有所未忍臣等以為仍遵舊名為當至於郊祀謹按周禮言圜邱方澤之制甚詳列位燎壇瘞坎禮樂象舞之數亦各有别則知天地分祭之說在成周已然矣秦漢之初去古未逺皆主分祭自是而後則分合靡常而論議不一然大抵主分祀者十之六七主合祀者十之二三程頥朱熹號稱大儒一則曰冬至祭天夏至祭地此不待卜一則曰天下有二大事一是天地不當合祭則分合之當否槩可見矣我太祖髙皇帝定鼎之初一時廷臣斟酌考訂建圜邱於鍾山之陽以冬至祭天建方澤於鍾山之隂以夏至祭地蓋亦倣周禮而為之至洪武十年偶感隂雨始改合祀我世宗皇帝應運中興乃集廷議更定四郊如洪武初年之制當時諸臣未多辨論先帝折衷羣議斷自聖心鋭然舉行非先帝作而為之實遵聖祖初制茲遇皇上嗣登大寶遵奉遺詔凡一應郊社等禮下之廷議令參稽舊典斟酌改正中間如大享之禮祈榖之祭與夫帝社稷之祀原不係祖宗舊典及與古禮不協者俱已釐正惟此四郊二祀原為聖祖成制臣等如舊請行荷聖明俞允此郊之禮又為修舉若復輕議更改臣等未見其可切以為當如初議上曰殿門等門出自皇考欽定郊壇分祀亦皇考議復皇祖初制俱如舊遵行不必更改禮部志稿卷九十七
