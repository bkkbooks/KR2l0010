body:
  text: 禮部志稿卷十六明俞汝楫編儀制司職掌王國禮來朝國初諸王朝覲在朝堂行君臣禮在便殿行家人禮見東宫亦然後不行凡親王來朝洪武六年定親王每嵗朝覲不許一時同至務要一王來朝還國無虞信報到别王方許來朝諸王不拘嵗月自長至㓜以嫡先至嫡者朝畢方及庶者亦分長㓜而至週而復始毋得失序諸王居邊者無警則依期來朝有警則從便不拘朝期凡天子與親王雖有長㓜之分在朝廷必講君臣之禮盖天子之位祖宗之位宜以祖宗所執大圭于上鏤字題曰奉天法祖世世相傳凡遇親王來朝雖長於天子者天子執相傳之圭以受禮盖見此圭如見祖考也凡親王來朝祭祀辦與未辦先常服見天子三叩頭不拜奉先殿見畢不拘何殿樓閣門下天子執大圭王具冕服叙君臣禮行五拜三叩頭見畢諸王係尊長天子係姪孫引王至後便殿王坐東面西天子衣常服叙家人禮行四拜不叩頭王坐受然雖行家人禮君臣之分不可不謹天子居正中南面坐以侍尊長次見東宫行四拜禮如王係尊長東宫答拜凡親王係天子伯叔之類年踰五十則不朝係姪之類年踰六十則不朝俱世子代之凡親王來朝若遇大宴㑹諸王不入筵宴中若欲筵宴于便殿去處精潔茶飰叙家人禮羣臣大㑹宴中王並不入席凡親王每嵗來朝自偹飲膳其隨從官員軍士盤費馬匹草料俱各自偹毋得干預有司恐惹事端凡親王入朝以王子監國其隨侍文武官員馬步旗軍不拘數目若王恐供給繁重斟酌從行者聴其軍士儀衛旗幟甲仗務要鮮明整肅以壯臣民之觀凡親王及嗣子或出逺方或守其國或在京城朝廷或有宣召或差儀賔或駙馬或内官齎持御寶文書并金符前去方許起程詣闕二十九年定親王見天子畢次見東宫引禮官導王由文華門東門入至文華殿前西向立東宫冕服執大圭詹事府等官六員導駕出陞座東宫官左右侍從引禮官引王就拜位賛禮官賛四拜禮東宫坐受畢東宫及王俱衣常服叙家人禮引禮官請王由殿東門入至後殿各王東坐向西東宫面東賛禮官賛禮四拜王坐受時諸王皆東宫叔如東宫與王叙坐東宫正中南面坐各王東西叙坐凡諸王見皇后父母亦行四拜禮皇后父母立受隆慶元年令親王朝覲禮久不行今後不必具奏禮部通行各王府知㑹奏事宗室非機宻重情不得徑奏郡王以下有事非啓親王不敢奏襲爵請名封等事非長史等官啓王不敢類奏儀賔不敢託郡縣主君名陳奏有越關奏擾者罰無赦見宗藩要例凡王府奏事洪武六年定王遣使至朝廷不須經由各衙門直詣御前敢有阻當即是奸臣其王使至午門直門官軍火者速奏聞若不奏聞即係奸臣同黨永樂元年令王府有事發行三司等衙門隨即奏聞必待欽准方許奉行敢有擅行者治罪如遇在京各王出府之日法司即查前例遵行長史知㑹遵守𢎞治五年奏准各王府一城居住者凡有婚喪等事每年春秋二季總啓大府類奏十六年奏准儀賔應奏事情不許假託郡主縣君名目除機宻重情及與親王干涉外合照郡王將軍中尉事例令長史司具啓親王叅詳代奏正徳元年奏准王府除機宻重情及襲王爵外其餘奏請名封選婚等項聴該長史等官叅詳明白啓王知㑹一年春秋両季類奏謝恩等項應本謝及表謝者亦於每年春首類謝一次十一年令各王府差來人員止許㑹同館安歇不許在外潜住事完即回違者照例問發充軍在京有容令住歇及指稱打㸃等項事發各問罪如律嘉靖元年令各王府差來人役有挾帶空本在京填寫者緝事衙門巡視御史拏問追究用印之人從重治罪萬厯十年議准各郡王并將軍中尉齎奏事宜除機宻重情或與親王干涉及郡王分封不在一城居住者許令徑自差人具奏外其餘凡有奏請要務令長史教授備啟親王及另城郡王參詳明白應該奏聞者方許給批差人齎奏𢎞治十三年例若本非機宻本無干涉而揑稱機宻干涉及假以建言為報復之舉者奏詞立案不行仍將本爵叅降祿米差來人役照撥置例問發邊衛永逺充軍輔導等官通行叅究其無籍棍徒詐騙各府財物交通歇家潜住京師打㸃者許緝事衙門訪拿照前例問遣凡越關奏擾嘉靖十一年題准郡王將軍中尉郡縣鄉君夫人等但有越關陳奏情輕者革去爵秩情重者送發高墻萬厯十年議准宗室如有搆訟及請乞婚封祿糧等項合行長史教授啟王轉奏如親郡王不與轉奏許差家人于守巡撫按衙門具告即與行勘輕則啓王議處重則㑹奏請㫖奏内亦要明開曽否經長史教授守巡撫按等官告理抄奏到部查勘明白題請究治不許私自越關來京奏擾如或故違禁例已封者題請降為庶人送發閒宅居住給與口糧飬贍其無名封及花生傳生等項俱徑劄順天府逓回該府収管不送閒宅致冒口糧若宗婦宗女犯者順付公差人等伴送回府已封者題請革去封號仍罪坐夫男削奪封職凡所奏情詞一槩立案不行隨行巡按御史根究同行撥置之人問擬邊衛永逺充軍該府長史教授等官失于防範通候年終類叅每一府而嵗至三起以上者降調一起二起者行巡按御史提問罰治如有需索抑勒失悮應得名封以致本宗不得已而冒禁者勘明之日將輔導官叅究革職祭祀立國有社稷諸侯王有五廟及其風雲雷雨山川旗纛五祀之神亦祀典所不廢俱用王者禮樂今具列之凡王國祀典洪武六年定王國宫城外立宗廟社稷等壇宗廟立于王宫門左與朝廷太廟位置同社稷立于王宫門右與朝廷太社稷位置同風雲雷雨山川神壇立于社稷壇西旗纛廟立于風雲雷雨山川壇西司旗者致祭又定凡祭五祀用豕一祝帛香燭酒果司户之神于宫門左設香案正月初四日門官致祭司竈之神于厨舍設香案四月初一日典膳官致祭中霤之神于宫前丹墀内近東設香案六月土旺戊日承奉司官致祭司門之神于承運門稍東設香案七月初一日門官致祭司井之神于井邊設香案十月初一日典膳官致祭十一年定王府社稷無配位社稱國社之神稷稱國稷之神十八年定王府祭社稷儀一齋戒正祭前四日奉祀所具本啓聞于午後沐浴更衣于齋宫次日為始齋三日凡齋戒之日不飲酒不茹葷不弔䘮問疾不聴樂不行刑不判署刑殺文書不預穢惡事一省牲正祭前一日清晨設香案于宰牲房外導引官四員導王常服詣牲位啓省牲執事者牽牲過香案前訖啓省牲畢遂宰牲以盤盛毛血伺祭瘞之一陳設前期掃除壇塲幙次至期掌祭官率執事陳設籩豆簠簋酒尊等物一正祭其日昧爽王具皮弁服文武官祭服典儀唱樂舞生就位執事官各司其事導引官四員導王詣拜位内賛啓就位典儀唱瘞毛血執事者以毛血瘞于坎内典儀唱迎神典樂舉麾唱迎神樂奏廣清之曲候樂作内賛啓鞠躬四拜興平身樂止典儀唱奠帛行初獻禮典樂舉麾唱初獻樂奏壽清之曲武生舞武功之舞執事者捧帛爵獻于神位前讀祝官取祝跪于神位之左内賛啓跪典儀唱讀祝讀訖内賛啟俯伏興平身樂作通賛同唱百官俯伏興平身樂止典儀唱亞獻禮典樂舉麾唱亞獻樂奏豫清之曲文生舞文徳之舞執事者舉爵進獻如前儀訖樂作典儀唱終獻禮典樂舉麾唱終獻樂奏熙清之曲文生舞文徳之舞執事官進爵如亞獻儀訖樂止典儀唱飲福受胙典膳以福酒及胙自神位前由正門左捧出内賛啓跪搢圭典膳以福酒跪進内賛啓飲福酒訖典膳以胙跪進内賛啓受胙訖啓出圭俯伏興平身内賛啓鞠躬四拜興平身通賛同唱百官四拜典儀唱徹饌典樂舉麾唱徹饌樂奏雍清之曲執事官各詣神位前徹饌訖樂作典儀唱送神典樂舉麾唱送神樂奏安清之曲内賛啓四拜通賛同唱四拜樂止典儀唱讀祝官捧祝掌祭官捧帛各詣瘞位典樂舉麾唱望瘞樂奏時清之曲内賛啓禮畢一祭山川儀與社稷同但不瘞毛血改詣瘞位為燎位及樂歌不同一祭旗纛遣武官戎服行禮儀與山川同但樂用大樂一五祀遣官致祭用大樂行三獻禮不用飲福受胙又定王祭宗廟用冕服文武百官祭服陪祭祭器籩豆八簠簋各二牲用少牢其廟制許立五廟二昭二穆與始祖之廟為五以始封之王為始祖靖江王國則以南昌王為始祖四時之祭皆用王者禮樂宣徳二年令王府祭宗廟用宋朱文公家禮筵宴凡大宴禮儀洪武十八年定其日設王座於存心殿設酒亭於座西南膳亭於東南設文武官四品以上座次于殿内東西相向酒尊食桌于殿外五品以下座次于両廊設細樂于殿内大樂于殿外典儀啓請陞座王服常服出樂作陞座樂止引禮引文武四品以上官及長史詣殿内五品以下詣殿外列班北向賛鞠躬樂作四拜樂止進筵樂作有花則進花進訖樂止色長跪啓一奏喜千春之曲次唱樂作進第一爵酒賛各官跪色長跪唱進酒飲訖樂止賛衆官俯伏興就座執事者進各官桌樂作有花則散花樂止色長跪啓承應畢進第二爵酒色長跪啓二奏永南山之曲各官起立斟酒畢復坐執事者隨斟各官酒色長跪唱進酒飲畢樂止進湯鼓吹響節前導至殿外大樂作各官起立進畢復坐執事者即供各官湯色長跪唱進湯樂作食畢樂止色長跪啓承應畢進第三爵酒色長跪啓三奏桂枝香之曲進酒進湯如前儀色長跪啓承應畢進第四爵酒色長跪啓四奏初春暁之曲進酒進湯如前儀色長跪啓承應畢進第五爵酒色長跪啓五奏乾坤㤗之曲進酒進湯如前儀色長跪啓承應畢進第六爵酒色長跪啓六奏昌運頌之曲進酒進湯如前儀色長跪啓承應畢進第七爵酒色長跪啓七奏㤗道開之曲進酒進湯如前儀畢収爵進湯及大膳如前儀畢収膳色長跪啓承應畢賛徹案自下而上賛起文武官如前列班樂作四拜樂止分東西序立典儀跪啓禮畢樂作引王還宫樂止各官以次出常宴五爵禮儀同凡遇正旦聖節王壽日設宴用花餘宴不用二十五年令僉事係方面官許入殿坐于長史之上樂舊制王國設宗廟樂生及樂工樂器甚備迨後有因而廣置女樂淫佚無度者遂行裁革今許復樂工舊額以存王國之體云凡樂工樂器洪武初定王國宗廟樂生三十六人鐘磬各一瑟二琴八塤箎簫笛各二笙四柷敔各一摶拊二歌工八舞生七十二人文舞三十六人各執羽籥武舞如文舞之數各執干戚中各以二人為引舞又定王府樂工例設二十七户于各王境内撥與供用十五年定樂工樂器冠服之制凡朝賀用大樂樂工二十七人樂器用戱竹二頭管四笛四杖皷十二大皷一花梨木拍板一冠服用紅絹彩畫胸背方花小袖单袍有花皷吹冠錦臂鞲皂靴抹額用紅羅彩畫束腰用紅絹宴禮七奏樂樂工八人樂器用紫竹簫二紫竹笙二􅌙二花梨木拍板一冠服同前迎膳大樂樂工八人樂器用戱竹二笛二杖皷二小皷一花梨木拍板一冠服亦同前其餘樂工冠服用綠絹彩畫胸背方花小袖单袍無花鼓吹冠抹額以紅絹彩畫束腰以紅絹正徳四年奏准王府樂舞生照例將有度牒無過犯道士補充不足于黜退生員内選補禮生取附近相應人户或黜退生員選補不許過額如有富民額外營充謀避差徭者事發問如律嘉靖四十四年議准各王府有廣置女樂滛縱宴樂或因而私娶花生濫封今後各行裁革如遇迎接詔勅拜進表箋朝賀宴享等項即于本府吹鼓手教演充用萬厯十年議准改正樂工凡親王迎接詔勅及朝賀宴享合用樂工合該布政司遵照㑹典所載原額查將先年各府退出數内撥還二十七户聽候供用但不得狎近女樂致有花生冒濫之弊郡王原無撥給樂工不許妄援奏討其另城郡王如遇迎接詔赦等項行禮許有司撥送吹鼓手十二名應用事畢即回原州縣當差萬厯七年例