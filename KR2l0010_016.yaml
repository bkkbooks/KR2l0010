選配子弟某等已令長史教授某查勘明白申呈撫按衙門詳允就便冠帶成婚訖例該請給誥命祿米從人理合按季開列類奏伏乞勅下禮部照例將某縣主郡縣鄉君選配子弟某等授以縣主郡縣鄉君儀賔職事賜給誥命祿米從人等項臣等不勝感戴天恩之至為此具本專差校尉某齎捧謹具奏聞計開某郡王府一某王長子長孫鎮輔奉國將軍某嫡庶第幾女某縣主郡縣鄉君見年若干嵗妃夫淑人某氏于某年月日嫡生如係庶出者云幾妾某氏于某年月日庶生于某年月日具奏請封選婚于某年月日奉禮部某字幾號勘合㑹選到某府州縣某籍某人嫡長次男某見年若干嵗先于某年月日申呈撫按衙門詳允就便冠帶成婚訖凡儀賔恩卹萬厯十年議准儀賔祿米因于郡縣主君丁憂仍全給至亡妻之後截日住支若儀賔先故不分有無子嗣郡縣主君等亦止半給養贍誥命仍許請給其儀賔身後卹典一槩停免至于中尉之女聽從選配不必請授宗女宗婿名色亦不給與婚嫁之資長史教授等官將選配子弟開報巡撫衙門徑行給劄冠帶成婚量免本身雜泛差役仍聽自便不必在府朝叅如有志舉業不願冠帶者聽其與民生一體考選應舉出仕萬厯七年例宗學書院附凡脩明宗範正徳十四年令吏部于各王府長史紀善伴讀教授等官務擇學行優長堪為師範者除授凡世子衆子長子將軍中尉等年未弱冠者各隨資質嚴立課程教養如法不得虚應故事撫按題學等官訪其賢否勤惰以聞萬厯十四年題准凡宗室之子年十嵗以上俱入宗學其師即以本府教授紀善等官選取學行俱優者充之若宗生衆多則分置數師或于宗室中推舉一人為宗正主領其事令各生誦習皇明祖訓孝順事實為善隂隲等書至于四書五經史鑑性理亦相兼講讀俟年至十五許照例請封先給祿米三分之一仍習學五年騐有進益親王方與奏請出學支本等全祿嘉靖四十四年例另城者該府郡王或管理府事者奏請其有放縱不循理守法者學師具啓各該親郡王小則徑自訓責大則叅奏降革凡奏討書院書籍萬厯十年議准宗室中有讀書好禮奏討書籍及以書院請名者禮部俱與題覆請給但不許假借虚名以滋欺罔書籍簿數書院名額俱取自上裁其葢造書院止令自偹工料不得因而干涉有司煩擾百姓違者許撫按官叅治嘉靖四十三年例府第聖祖定邸殿制度俱從儉朴至今守而弗失其後郡王以下故絶者有分撥入官之例凡府第洪武九年命中書省臣作親王宫室務從儉朴不得宫餙朱紅室餙大青綠凡絶府産嘉靖四十四年議准凡郡王故絶府第屯厰暫歸親王掌管待有新封轉給或入官召佃以充祿米之資郡縣主君房屋亦同萬厯七年議准郡王故絶無人管理奉祀者例前官給府第候宫眷終後仍入官變賣以充祿糧十年議准郡王故絶所遺府第屯厰莊田等項教授等官逐一查理明白申呈撫按衙門除嘉靖四十四年例前官給府第聽管理奉祀者承住安奉香火外如有原出親王撥給者仍留宫眷養贍身終之後復歸親王若郡王存日有自置産業量給三分之一與管理奉祀者為四時祭祀之需其餘皆留宫眷養贍身終之後聽有司從公分給親支如無人管理奉祀者其府第别産聽從宫眷變賣養贍内侍凡内官内使洪武間定親王府内官十員承奉司承奉正正六品副從六品典寳所典寳正正六品副從六品典膳所典膳正正六品副從六品典服所典服正正六品副從六品各門官門正正六品副從六品内使十名司冠司衣司佩司履各一名司樂司弓矢各二名正統九年令各王府如有孀居郡縣主君親王量撥老成内使㸔守門户𢎞治九年奏准各王府缺少内官内使司禮監擇其老成讀書者具奏照缺給賜以後有缺奏除其郡王府每府給與内使二名專管宫閫事務及關防門禁凡保陞内官正徳三年令各王府内使不係欽撥者不准乞恩保陞四年議准王府承奉等官并郡王内使俱有定額不許額外濫保及擅立内典膳職名希圖保陞違者罪坐營求之人及輔導等官萬厯十年題准王府承奉等官額設一正一副俱照次序遷轉承奉正副員缺該典寳正副挨補典寳正副員缺該典膳正副挨補典膳正副員缺該典服正副挨補典服正副員缺該門官挨補門官員缺該内使陞補不容一槩濫請其各處無名内使私自浄身人等有托故擅入王府因而撥置害人貽累宗室者撫按官嚴加禁治正徳十六年例若各王府収用私自浄身之人及有違例保陞者聴禮部查叅并將長史等官究治嘉靖四十四年例凡奏討内使萬厯十年議准親王内使如司冠司衣司佩司履司樂司弓矢之屬總數不過十名若果原額缺人具實奏討司禮監擇其老成讀書者量撥四名世子及郡王原未經撥給者各量撥二名其將軍中尉不許違例濫請嘉靖四十四年例至于内使冠帶限以到府年分親王内使須歴十年之上郡王内使須歴十二年之上方許具奏請給年淺者不得朦朧奏討嘉靖八年例其浄身男子平巾查係禮部分撥者方與題請若各王府私収者不准厨役厨役事例詳見精膳司校尉詳見兵部車駕司凡郡王厨役隆慶四年議准各郡王民校民厨不分例前例後每位民校二十名每名徴銀十兩民厨二名每名徴銀八兩其看墳民校有宫眷者准留六名無宫眷者准留三名每名徴銀八兩僉派送用六年議准王府民校原係徭編雇役有奸徒冒充者查革問遣萬厯十年議准郡王厨役止許撥給二名有䕶衛儀衛去處䕶衛儀衛撥給無䕶衛儀衛者有司撥給嘉靖三十一年例其校役不拘郡王舊封新封俱以二十四名為額除原係䕶衛僉撥者仍于本衛僉撥外其不係䕶衛僉撥者有䕶衛去處該衛撥與軍餘十二名民間僉派十二名無䕶衛去處俱于民間僉派嘉靖八年例每名每年于徭編内民厨徴銀十兩民校徴銀十二兩觧赴布政司轉發該府雇人代役原撥民厨民校掣回有司當差不許仍令身當隠蔽差役如有占恡不發者聴撫按官㕘奏其絶封郡王府除另城管理府事者量留民校十名照例徴銀雇役外其餘民校民厨盡數發還有司原係徴銀者免派若革除親王墳所給守墳軍校五名収買凡収買子女物件嘉靖四十四年議准各王府収買子女照依𢎞治年例不過二十人以後俱不准収毋得藉口缺人援引遠年事例夤縁請乞違者將輔導官叅治又議准王府應買物件但于本地収買不許凟奏求徃他處及擅自差人貿易違者事發將本爵罰住祿米承委人員從重問罪奬諭宗室為善者奬諭示勸故有賜勅賜物之例凡旌表節孝正徳八年奏准王府如有節孝及卓異行跡查奏前來禮部照例請勅奬諭但不許奏請建立牌坊嘉靖九年定宗支有孝行實跡等項應旌奬者許親王奏來若係親王則令撫按官奏來仍行勘明寫勅遣官徃諭并賜以銀緞羊酒萬厯十年議准宗室中有孝友兼至及婦女守節貞烈足以激勵風化者各具實跡奏聞以慿覈勘明白或立坊旌表或請勅奬諭或加増封號長史教授官并宗儀人等不許需索抑勒亦不許扶同欺罔有孤恩典過犯凡過犯有重輕輕者治其黨與重者本身發高墻或閒宅子孫降為庶人或俱禁住其後或以慶恩子孫間得開釋云凡宗室過犯洪武六年定親王有過重者遣皇親或内官宣召如三次不至再遣流官同内官召之至京天子親諭以所作之非果有實跡以在京諸皇親及内官陪留十日之間五見天子然後發放雖有大罪亦不加刑重則降為庶人輕則當因來朝面諭其非或遣官諭以禍福使之自新𢎞治九年令親王所行未善長史等官從容諫止至再至三不聽事情重者宻切具奏其郡王所為不合理度者教授勸正如其不聽啟親王宻切戒説如再不聽親王具奏事情輕者降勅切責若干宫壼重事差内官皇親前去體勘至日處治親王有過專罪輔導官郡王有過專治内使教授其親王府輔導官務日請王講讀經史王子亦要讀書習禮各府將軍該府親郡玉自行禁治若互相容隱不行禁治許鎮巡等官將所為不法事㑹本具奏上請區處正徳四年議准宗支罪犯深重降革爵秩者郡王將軍而下不許代為請復違者罪坐輔導官嘉靖十六年奏准宗室有犯事情輕者照常奏請犯該殺死平人及事情重大者從重奏請定奪投充撥置之人查照見行事例問擬四十四年議准郡王以下有非法不道怙惡違訓者俱降為庶人押發高墻居住又議准宗室有罪降革遷發省城内閒宅者子孫不得凟奏倖免凡罪宗萬厯十年議准罪宗庶人止與名糧見户部凡男女婚嫁之資一槩免給其高墻閒宅正犯已故所遺家屬許各該撫按官奏請釋放送回本府居住嘉靖四十四年例仍偹查先年所犯情由如係黨逆干紀罪惡深重者子孫止從寛釋不許濫請名糧若犯該敗倫傷化人命强盗等情見在子孫許其請名嵗各給本色米十二石身終即止其有止犯越關訐奏等項請名之後亦各嵗給本色米十二石日後子孫如之萬厯九年例如止遺母妻無子孫可倚頼者嵗給養贍米各六石終身私収妾媵止許釋放不在養贍之列凡庶人冠帶萬厯十年議准凡罪犯革爵及擅婚濫妾越關過期各庶人准給口糧養贍俾無失所己為恩厚更不許請乞冠帶以濫朝廷名器如違例凟奏一槩立案不行禁例洪武六年令凡王國内除額設諸職事外並不許延攬交結奔競佞巧智謀之士亦不許接受上書陳言如有此等之人王雖容之朝廷必正之以法然不可使王驚疑或有智謀之士獻于朝廷勿留𢎞武十二年議准撫按并三司以下衙門如遇各長史司傳到一切令㫖須㸔詳計議當施行者即為施行若事情重大㑹奏請㫖其長史司官奉王令㫖行事務要停當有窒礙難行者當竭忠諫止如有懷奸倚勢撥置親王以售私情害地方者撫按三司等官㑹同叅奏治罪十三年奏准各處樂工縱容子女擅入王府及容留各府將軍中尉在家行姦併軍民旗校人等與將軍中尉賭博誆哄財物及擅入府内教誘為非者俱問發邊衛充軍該管色長革役十六年令各處軍民人等不得私交王府因而借索財物誘請遊宴撥置為非違者所在官司體訪拏問郡王以下教授等官諫阻不從啟親王奏聞區處正徳四年議准王府如有無籍之徒假以燒丹煉藥等項為由徃來誑惑以致壊事者鎮巡等官從重問發又令王府不許僧尼女冠出入宫禁及私自建立寺觀十六年詔各處無籍奸人遊食術士及無名内使私自浄身人等有托故擅入王府因而撥置害人貽累宗室者撫按官嚴加禁治嘉靖十年題准凡親王名諱今後文武衙門除備抄各王奏詞并各衙門題奏本内不諱外其餘一應文移係各衙門自行出語者止許稱爵不得書名禮部志稿卷十六
