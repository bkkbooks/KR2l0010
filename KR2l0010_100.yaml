body:
  text: 禮部志稿卷一百明俞汝楫編雜行備考俸給諸司職掌一每嵗會計合用俸米數目户部定撥糧長到部送納本部劄付膳部并委官眼同依數交收在倉隨即出給倉鈔付納户收領候齊足出給通闗一様三本交付糧長收領仍將收過米數通咨户部其所收糧米專一放支本部并合屬衙門官吏月俸一本部官吏該支月俸每月初本部通類立案劄付膳部及委官或儀部祠部主客部官一員限同放支膳部主事㕔出給印信俸帖付官吏收執赴倉闗支仍將放過某字號倉糧米數目分豁正米附餘開呈本部判送膳部立案一帶支太常司翰林院等衙門官吏俸給每月預先將合支數目開呈本部立案通類劄付膳部委官照依各衙門齎到印俸帖赴倉依數闗支畢日依數開呈一帶支衙門太常司今為寺光禄司今為寺翰林院春坊儀禮司今為鴻臚寺行人司鑄印局教坊司欽天回回監後革行太常寺翰林院鴻臚寺欽天監行人司各自立倉春坊司經局俱於詹事府帶支紙劄萬厯三十四年署部左侍郎李堂規一刑部紙刑部每年例送主客司本色紙張官價銀二兩七錢四分八釐精膳司本色紙張官價銀六兩七錢二分共銀九兩四錢六分八釐因紙户賠累移咨刑部捐免矣一都察院紙萬厯三十三年起每年折價銀一百四十九兩四錢七分本色本紙八千七百六十八張縁都察院有順天巡按紙贖貯順天府每年支銀如前數給紙户買紙納内閣吏部衙門實用銀一百九十五兩六錢五分是紙户既賠銀四十六兩一錢二分而又費交納苦拘僉故本部願將此項拆抵即一百四十九兩四錢七分准作一百九十五兩六錢五分其餘仍支本紙在本部將價隨宜而買樽節而用而所便畿民多矣詳在部咨及都察院回咨每年合部應支本折數簿存㕔司價有贏餘隨入積貯箱内以備置買修理公費之用官房萬厯三十四年署部左侍郎李堂規二欵一官房一銀八百兩買宅二所修理銀四百兩其一所在龍驤衚衕南三層四十七間為正堂宅其一所在雙塔寺後衚衕北三層三十三間為左堂宅一銀三百九十兩買宅一所三層三十間在李閣老衚衕為儀司宅一銀二百八十兩買宅一所修理銀八十七兩四層二十間在長安街南為祠司宅一銀三百兩買宅一所修理銀十兩四層二十一間在長安街南為客司宅一銀三百兩買宅一所修理七十餘兩四層二十八間在長安街南為膳司宅一銀三百五十兩買宅一所四層二十一間在龍驤衚衕北為司㕔宅一衙門羨金儀制精膳二司每三年有會試羨金儀司多於膳司俱可一頓置官房留些公費不足另處不難花費可惜也若客司工食年年有羨此外又有三堂表袱有缺堂厯價有三季紙價陸續充拓十年之内官皆有房此後則都吏當該等小房亦可以漸而置然後驅而之善其從必輕矣此事印司提督徑自可為不必闗白堂上但置後隨時修理是在前後相成也一四司朝房四司朝房向為人占住四司無處可坐今逐出住人修理已畢其鎖鑰付大堂朝房人帶管以後勿許人住住易逐難一部便了朝房亦然三堂事萬厯三十四年署部左侍郎李定堂規一敏事敏有二義勤也快也如一事今日不了則遲一日明日不了則遲二日弊由此生矣故敏之一字聖門屢言之子路惟恐有聞文子三思聖人謂再斯可皆此意也但日進衙門立刻打發得者便打發該出示者便出示務令案無留牘人無乆需而風清弊絶矣何必革弊哉故本部立意以吾二三同官之勞貽宗室百千萬人之便為宗室百千萬人之便而不暇顧胥史輩一二十人之不便期以仰體徳意少效涓埃此其大凡也一奏抄簿堂上置簿一扇專記奏抄内王府抄尤為要𦂳須常知會冊庫查抄到未抄到立刻查對議擬送批出示自無弊矣一宗室手本既有抄簿以記奏抄而每日升堂有宗室差人逓手本者另設一簿將手本内某府某名登記以便查銷防遺匿其題訖或立案者隨行註明每手本通狀到堂先查成否立案如重來混擾不准仍薄責示戒一玉冊送宗人府先是玉冊到部必類送宗人府致府以違限㕘王官今冊到當日即送刻一條記云宗人府冊隨到隨送不越日承發吏當堂將條記刷來文上本部硃墨發司即送為定規一條例冊籍凡當事須熟看條例慣知冊籍事必獨裁籍能自探惟使書手代勞則可若書手匿不查出立取親查查出必罪書手勿宥如人家田宅租税主人須一一備知若槩付下人㝠然不知田宅何方契劵何篋未有不為下人欺負以敗其家者一先升堂大堂每日進部即升堂先定見堂投文等事省其乆候堂事畢方進火房僉押用印及説堂亦得從容一印信每日堂印候堂上出部印乃出其四司印即掌印官給假印必到司托同司代用務要官印相隨止求敏事便人即一日開封數次不為勞也一急收納以便解户每日投文凡解錢糧當堂當日打發如解館夫工食文到即摽發館即收收訖立刻赴司務㕔領批迴今刻有條記承發吏將來文刷印訖送堂硃㸃即將文付解户赴館收銀該館註收印鈐來文回部其批先用堂印司印發司務㕔以待之人到即領如解厯日紙銀文到即摽送納立喚該監赴司兊收令補收銀印信手本其批文先用印以待之收訖即領如解牲口銀即摽送納其送光禄寺单二紙即於堂上僉押用印并門单手本一起當堂付解户赴寺交納如解茶文到即摽題進該司即與騐進該送納光禄寺者該司立刻發與手本其様茶騐訖郤還該司仍將様茶郤還四字條記刷印批文上與之如解藥材文到即摽送納如折色立喚庫官赴司兊收照厯紙例打發如本色次日提督進庫兊騐收訖即發批如解户次日下不來者拿究以上類項向來費多少轉折等候多日今一切簡省急速以求便民一題差凡各衙門講差本部查題差則例如某差該用某衙門某官例合方許不敢那移紊亂另設簿一扇講者隨註一兩堂上陵紙舊例送神宫監銀四兩為宿食費仍送該監及提督各紙一刀而彼有下程之饋癸卯霜降彼此兩免矣一處傳報㫖意吏工食詳載四司當該帖報吏工食簿一處火房工食三堂火房工食不敷用㑹同館土地祠裁革夫二名仍取三堂直堂每季每堂六錢補之設有三堂火房工食簿然該館未忘恢復恐後有以焚洒掃缺人為禀者提督不可不察也裁革條例萬厯三十四年署部左侍郎李堂規示一季考書役四司書手每四仲月當堂一考其素不守法性行不良不能書者革退一書役犯革書手有犯革役尤須革頂首不但為本犯懲且使同夥明見其重罰而陰被其牽累庶乎有警頂首既革便著下著徑㕘仍防暗貼及私賣一犯一革不少姑容乆之徑㕘漸多頂首亦漸衰減衙門清肅在吾輩留意精勤嚴毅間耳嘗謂書役之衆寡頂首之豐減衙門清濁明暗之候也頃儀司以天字號貼冩羅禮洗補作弊革頂首一千五百兩著下首張鍾徑㕘祠司謝應祖誆詐革頂首二百五十兩著下首童懐廉徑㕘儀司地字號貼冩史成誆詐革頂首一千五百兩著冩本書手任成材徑㕘一逓減頂首及革前件吏員頂首逓減初例二八後例四分因四分所減太重遂致互相容隱并二八例而廢之夫法本乎情必人情相安而後法可行况二規俱經題准者今查出各吏頂首銀數止照二八逓減如一百兩者初減二十兩再減十六兩循此減以至於盡如勒掯者將頂首盡革許下首人徑㕘有扶同容隠者一體究治置簿六扇堂上一扇兩㕔一扇四司各一扇每遇頂㕘新舊吏一齊執簿稟堂逓減註簿内又訪得知印都吏頂首外仍巧立前件名色如新㕘知印送舊知印銀三十四兩四司都吏四人各銀三十兩都吏㕘亦然今革一革積年班役用㑹同館夫三堂各班頭二名棍頭二名轎夫八名共三十六名每年共領兵部工食銀三百六十兩各役多僱替身其班頭即來夾轎而行不管拜望差使等事此三十六人者倚籍三堂指稱常例􅫬騙王府財物就中分為上四下四名色其猾强者分外私得名曰踢已即至貢夷如四王董卜等騐進方物莫不需索本部看得此三十六人每年費兵部銀三百六十兩僱役已剩若干缺堂輪班又剩若干又有包袱厯日蒼术之費舖行地方之免會試進士之索至於王府一節騙財尤多與積書相通仍籍之口實曰三堂左右人都要使費其為衙門之蠧極矣其初固有頂首然或傳二三輩或數十年所得已多其頂補年近者亦有一二不足恤也本部履任年餘訪得前情具有贓証姑不深求祗曉諭革去外今自萬厯三十三年三月初三日起會同館每日撥夫十三名輪流答應本部左堂見任止支一堂工食一年銀一百二十兩内撥九十三兩六錢酬館夫每日十三名之勞餘二十六兩四錢給貼長班守門在本等工食之外以示體恤約束之意葢因前項漸染亦及長班也如三堂俱全一體施行已劄付該館移咨兵部著為定規因書以識之館劄部咨刻於後附移兵部咨文禮部為缺堂工食停支事照得本部三堂每堂原有班頭二名棍頭二名轎夫八名積年宿弊多是替身其正身却潜跡於外􅫬騙銀物本部屢教不改姑不㕘送究追但令散去并本年春季工食于本月初二日已經給領不扣外今本部每日會同館撥夫十三名輪流答應令積役不得托足于衙門書吏不得籍口乎堂役而館夫幾二百名更畨泛散弊端亦無自而生自本年夏季起本部見有一堂止支一堂工食本部就内撥九十三兩六錢以酬館夫每日十三名之勞其餘二十六兩四錢貼給本堂長班以示體恤約束之意已劄付該館官吏合資貴部知會明白如二堂到任一照此規但一堂見任止支一堂工食湏至咨者行會同館劄付禮部為革部役用館夫并議處工食答應事宜以便長乆以肅清衙門事照得本部三堂每堂舊有班頭二名棍頭二名轎夫八名三堂共三十六名每名領兵部工食銀十兩積年積弊多僱替身其正身却於外邊􅫬騙財物所得各王府銀細無筭玷汙衙門乆矣本部屢教不悛姑不㕘送究治但令散去并本年春季工食已經兵部給發外自今以後本部每日取用會同館夫十三名輪流答應其工食本部一堂一年有兵部銀一百二十兩即將此項撥出九十三兩六錢給散館夫每名七兩二錢尚餘銀二十六兩四錢貼給本堂長班其缺堂工食不支明咨兵部着為定例如此則積役不得托迹於衙門書吏不得籍口於堂役而館夫幾二百人更畨泛散弊端無自而生至於所省兵部工食此其小者矣為此劄仰兩館官吏照前事理遵行如正右堂上任一體撥夫工食一例支給須至劄付者一革會試犒賞每科會試中式舉人本部班頭例往討取犒賞初以沿襲既乆但欲禁制多索一日偶問與者幾何人一班頭跪曰方十家然虚得名耳願已之本部忻然嘆賞遂令卻還已與者既細詢乃知進士班皂攘取反多部役人衆所得微薄奔走候伺勞力䘮氣即數日費飯錢已六百文故願損也甲辰科吏禮二部俱無犒今班頭已革仍須臨期禁示一革上本辦官儀祠膳三司上本舊用一辦官每年工食銀十二兩當該吏貼八兩有竒以効勞咨送吏部優處甲辰六月辦官汪天復假稱誆騙事覺革去今上本止用當該實無用辦官也一革後門官後門官為看守也乃常開門出入或引人同住或外人往來益難禁防常見失盜即自盜有之而一月工食六錢費四司之輪給一年准作兩年煩吏部之優選此何為者今後門常用封鎻非要𦂳不開鎻鑰付之火房將住官與添註火房春曹住役一體逐出本官願捐頂首咨選自此永革不宜復收矣禮部志稿卷一百
