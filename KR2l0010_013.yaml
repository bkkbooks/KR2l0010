body:
  text: 禮部志稿卷十三明余汝楫編儀制司職掌耕耤西苑耕歛附皇祖重農元年仲春即行耕田禮列聖相承皆遵用焉至肅皇復行西苑耕歛之禮立帝社稷壇以春秋祈報禮加詳已今西苑禮不行洪武二年定皇帝祀先農畢太常卿奏請詣耕耤位皇帝至位南向立三公以下及應從耕者各就耕位户部尚書北面進耒耜太常卿導引皇帝秉耒三推户部尚書跪受耒太常卿奏請復位南面坐三公五推尚書九推各退就位太常卿奏禮畢太常卿導引皇帝還大次應天府尹及上元江寧兩縣令率庶人終畆是日宴勞百官耆宿於壇所永樂間續定凡祭先農畢駕至耕田所户部尚書捧鞭跪進教坊司官率其屬作樂隨駕行三推禮畢駕至儀門陞座樂作觀三公九卿耕訖教坊司承應用大樂百戲畢跪奏致語駕至殿内陞座進湯進膳俱用樂畢順天府官率耆老人等謝恩樂作禮畢樂止次百官行禮樂作禮畢樂止賜百官酒飯百官復入班行禮樂作禮畢樂止尚膳官進膳樂作進訖樂止百官入席教坊司官奏一奏本太初之曲進酒樂作進訖樂止進膳樂作進訖樂止教坊司官跪奏進湯樂作徹湯樂止二奏仰大明之曲進酒進膳進湯如前儀三奏民初生之曲進酒進膳進湯如前儀徹御案畢樂止百官復入班行禮樂作禮畢樂止鴻臚寺官奏禮畢駕還嘉靖九年續定每嵗仲春上戊祭社稷及先農先二日早順天府官以耒耜及穜稑種進呈少頃内官捧耒耜及種稑種授順天府官捧由午門左門出置綵輿中鼓樂送至耤田所至日祭社稷畢昧爽上具翼善冠黄袍御奉天門太常寺官奏請詣先農壇上陞輦鹵簿導從詣壇所具服殿更衣致祭儀具祠祭司祭畢上還具服殿更翼善冠黄袍少憇百官易便服訖太常卿入奏請詣耕耤位導駕官同太常卿導引上至耕耤位南向立三公以下從耕者各就耕位戸部尚書北向跪進耒耜順天府官北向跪進鞭導駕官同太常卿導引教坊司官率屬作樂歌舞左右贊相上秉耒三推訖户部尚書跪受耒耜順天府官跪受鞭太常卿奏請復位順天府尹捧青箱隨以種播而覆之上御觀耕臺觀三公五推尚書九卿九推訖太常卿奏耕畢從耕官各就班導駕官同太常卿導引上詣齋宫鴻臚寺官俟上陞座奏從耕陪祭官叩頭奏順天府縣官老人叩頭訖順天府率庶人終畆鴻臚寺官贊入班百官序列定致詞云親耕既成禮當慶賀贊五拜三叩頭禮畢賜百官酒飯鴻臚寺官承㫖贊入班百官行一拜三叩頭禮訖尚膳監進膳三品以上官各就殿臺四品以下官臺下御路傍東西相向各賜坐并宴勞耆宿于壇傍教坊司承應用大樂隊舞村田樂雜戲跪奏致語進酒進湯進膳及百官行禮俱奏樂如常儀宴畢鴻臚寺官贊入班百官行一拜三叩頭禮訖駕興還宫隆慶二年耕耤儀同先期一日預告奉先殿是日還宫仍詣奉先殿及𢎞希神霄等殿參謁𢎞治元年奏准順天府率兩縣官耆老謝㤙之後引上中下等農夫各十人穿着本等衣鞋各執農家器具朝見叩頭令其終畆畢人賜布一疋嘉靖九年令以耤田舊地六頃三十五畆九分六釐五毫撥與壇丁耕種嵗出黍稷稻梁芹韭等項餘地四頃八十七畆六分二釐九毫除建神祇壇外其餘九十四畆二分五釐六絲四忽亦撥與壇丁耕種上納子粒俱輸於南郊神廪以供大祭等項粢盛十年户部題准耤田五糓種子每畆合用一斗本部發銀行順天府收買送用以後年分于收穫數内照地存留備用合用農器犂四張四張鍬十把鋤十把􅱾十把扒十把扠十把䥥刀十把掃箒十把簑笠十副磟碡四箇大小麻繩共一百條筐擔十副禮部發銀順天府買造每地一頃合用耕牛四隻禮部發銀順天府收買每日草料行裏牛房照數放支責付耕夫餵養每地一頃用夫十名行順天府於宛大二縣取用俱免本身差役仍行太倉每名支口糧五斗西苑耕歛嘉靖十年上命墾西苑内隙地為田諭禮工二部建帝社帝稷壇每嵗仲春秋行祈報禮儀注見祠祭司于壇東北建殿曰無逸亭曰豳風又建亭曰省耕曰省歛每嵗耕穫上親臨觀以重農事置倉曰恒裕貯田之所入以供祀事視學皇祖視學祭先師不設牲不奏樂憲宗始用牲樂孝宗加幣與太牢世宗以正先師稱號載視學復増設啓聖公祠禮更有加云洪武十五年定前期一日有司灑掃殿堂設御幄于大成門東上南向設御座于彛倫堂至日學官率諸生迎駕于成賢街左駕至學官及諸生俯伏叩頭興駕入􅎉星門止于大成門外上入御幄禮官入奏請具皮弁服次請行禮導引官導上出御幄就御位百官各就位導引官導上詣盥洗位搢圭盥帨出圭詣酒尊所酌酒詣先師神位前再拜百官皆再拜搢圭執事官跪進爵上獻爵授執事官奠于神位前出圭再拜百官皆再拜四配十哲兩廡分獻如常儀導引官導上入御幄易常服陞輿詣學學官率諸生先列于堂下東西上至彛倫堂陞御座贊唱學官諸生行禮五拜叩頭東西序立于堂下三品以上及侍從官以次入堂東西序立贊進講祭酒司業博士助教四人以次陞堂由西門入至堂中贊舉經案于御前禮部官奏請授經于講官祭酒跪受賜講官坐乃以經置講案叩頭就西南隅設几榻坐講賜大臣翰林儒臣坐皆叩頭序坐于東西諸生圜立以聴講畢祭酒叩頭退就本位司業博士助教各以次進講畢出堂門復位贊唱有制學官諸生列班俱北面跪聴宣諭五拜叩頭禮畢學官率諸生出成賢街跪俟駕還明日祭酒率學官上表謝恩成化元年續定前期一日太常寺備祭儀設大成樂器于殿上列樂舞生于階下之東西國子監灑掃殿室内外錦衣衛設御幄于大成門之東上南向設御座于彛倫堂正中鴻臚寺設經案于堂内之左設講案于堂内之西南至日置經于經案錦衣衛設鹵簿駕教坊司設大樂俱于午門外是日早百官免朝先詣國子監門外迎駕分獻陪祀官先詣國子監具祭服伺候行禮駕從東長安門出鹵簿大樂以次前導樂設而不作太常寺先陳設祭儀於各神位前設酒尊爵如常儀執事設上拜位於先師神位前正中是日學官率諸生迎上至大成門外入御幄禮官入奏請具服上具皮弁服訖奏請行禮導引官導上出御幄中道詣大成殿陛上典儀唱執事官各司其事執事官各先斟酒于爵候導上至拜位贊就位百官亦各就拜位四配十哲分獻官各詣殿東西階下兩廡分獻官各詣廡前俱北向立贊迎神樂作樂止奏上鞠躬拜興拜興平身通贊百官行禮同奏搢圭上搢圭執事官跪進爵樂作上受爵獻畢復授執事官奠于神位前樂止奏出圭上出圭四配十哲兩廡分獻官以次詣神位前奠爵訖仍以次出殿門外東西向立典儀唱送神樂作樂止奏上鞠躬拜興拜興平身通贊陪祀官行禮同導引官導上由中道出分獻官以次退上入御幄易常服訖禮官入奏請幸彛倫堂上升輿禮官前導由􅎉星門出從太學門入諸生先分列于堂下東西學官列于諸生前駕至學官諸生跪伺駕過然後起仍前序立百官分列堂外稍上左右侍立上至彛倫堂升御座贊學官諸生行五拜叩頭禮武官都督以上文官三品以上及翰林院學士升堂執事官各以次序立贊進講祭酒司業以次升堂由東西小門入至堂中執事官舉案于御前禮官奏請授經于講官祭酒跪受經受畢上賜講官坐祭酒乃以經置講案叩頭就西南几榻坐講上賜武官都督以上文官三品以上及翰林院學士坐皆叩頭序坐于東西諸生圜立于外以聴祭酒講畢叩頭退就本位司業進講如儀畢出堂門復位贊有制學官諸生列班俱北面跪聴宣諭畢贊行五拜叩頭禮畢學官諸生以次退先從東西小門出列于成賢街之右伺候尚膳監進茶御前上命光禄寺賜各官茶畢各官退列于堂門外叩頭東西序立上起升輿由太學門出升輦鹵簿大樂前導樂作駕出太學門學官諸生伺駕至跪叩頭退百官常服先詣午門外伺候駕還鹵簿大樂止于午門外上御奉天門鳴鞭百官常服行慶賀禮鴻臚寺致詞云恭惟皇上敬禮先師親臨太學増光前烈丕闡鴻猷臣等欣逢盛事禮當慶賀行禮畢鳴鞭駕興還宫百官退明日國子監祭酒率學官諸生上表謝恩上具皮弁服御奉天殿錦衣衛設丹陛駕百官朝服侍班行禮畢上易服御奉天門禮部引奏賜祭酒司業學官及三氏子孫衣服諸生鈔錠畢駕還是日上御奉天門賜宴武官都督以上文官三品以上翰林院學士及祭酒司業學官三氏子孫與宴又明日祭酒司業率學官諸生謝恩上賜勑勉勵師生祭酒捧出師生迎導至太學開讀行禮如常儀再明日祭酒司業率學官諸生復謝恩𢎞治元年定先期致齋一日奠加幣牲用太牢改分獻官為分奠官拜位列于陪祭官之前樂仍設而不作餘如成化間儀嘉靖元年續定駕將至陪祀官武官自都督以上文官三品以上翰林院官七品以上同國子監官具祭服伺候行禮駕至􅎉星門外即降輦步入御幄易常服祭畢仍自御幄步出􅎉星門外升輦次日襲封衍聖公率三氏子孫國子監祭酒率學官諸生上表謝恩是日賜三氏子孫衍聖公等及祭酒司業宴子禮部命本部尚書待餘如成化間儀十二年以先師祀典既正再視學命大臣一員致奠啓聖公祠餘如元年儀樂章視學還導駕奏御鑾歌神歡之曲臣聞古帝王受天命統四方宵衣旰食治道章心一誠敬感昊蒼龍翔鶴舞神心樂康臣民讃時皇萬嵗無彊駕至奉天門升座奏萬嵗樂朝天子之曲與朝賀同還宫奏萬嵗樂與前同萬厯四年續定駕至􅎉星門外降輦禮部官吉服導上入御幄禮部奏請具服上具皮弁服訖禮部官奏請行禮上出御幄太常寺官導上由大成門中道入盥洗詣廟中與嘉靖元年儀稍異餘俱同前儀次日方行慶賀禮襲封衍聖公率三氏子孫祭酒司業率學官諸生各上表謝恩先期設表案于皇極殿簷下東王門外至日早錦衣衛設鹵簿駕百官朝服侍班上具皮弁服御中極殿禮部官及各執事官行禮如常儀鴻臚寺官奏請升殿導駕官前導樂作升殿樂止鳴鞭傳賛排班班齊鴻臚寺官致詞百官行慶賀禮樂作五拜三叩頭訖樂止分班侍立序班引衍聖公三氏等族人國子監師生過中賛鞠躬樂作四拜興平身樂止賛進表樂作執事官舉案由東王門入至簾前置定樂止賛宣表目鴻臚寺堂上官一員隨禮部堂上官捧表目過中内賛賛跪外賛亦賛跪進表官俱跪宣畢賛俯伏樂作興平身傳賛同樂止執事官舉案過東邉賛鞠躬樂作進表官俱四拜興平身樂止各入本班立鴻臚寺官奏禮畢鳴鞭百官退出仍于皇極門朝服侍立上易常服御門鴻臚寺官傳奏事起案執事官舉案置御路中序班引襲封衍聖公等官并族人及國子監祭酒等官諸生上御路賛跪禮部官奏請頒賞承㫖訖賛叩頭衍聖公并祭酒等叩頭起執事官舉案過東邉鴻臚官奏事畢鳴鞭上興還宫百官退是日免宴後二日儀俱同前成化元年令取三氏子孫赴京觀禮又命衍聖公分獻嘉靖十二年題准衍聖公及顔孟二博士禮部先期差行人前去行取及另取孔氏老成族人五人顔孟族人各二人一同馳驛赴京迎駕陪祀前期八日内閣及執事官赴國子監習儀至日習禮公侯伯俱迎駕聴講觀禮跪受宣諭班列于學官之次各衙門辦事監生俱取回迎駕聴講觀禮大射古之射禮有五國朝次第行之詔成均博士弟子及郡縣庠序之士皆使習射以俟貢舉而凡遇郊廟之祭先期命文武官執事行大射之禮其儀具後洪武三年定前期戒射定耦選執事充司正副司正司射司射器請射舉爵收矢執旗樹鵠陳設如儀是日執事者入就位請射者引主射正官及各官貟子弟士民俊秀者各就品位司射器者以弓矢置于各正官及司射前請射者詣正官前圎揖畢引詣司射器前授弓矢畢引復本位司正執算入立于中後請射者詣司射前曰請誘射引司射二人耦進各以三矢搢于腰帶之右以一矢挾于二指之間推年齒相讓年長者為上射年㓜者為下射上射先進詣射位向鵠正立發矢司正書中投算置于中或副司正書中舉旗者舉旗如式上射射畢退立于傍讓下射者詣位發矢書中舉旗如前請射者俱引復位收矢者收矢復于射者司正取所中算請射者次請士民俊秀射次請官貟子弟射次請品卑至髙品者射其就射位發矢取算書中舉旗收矢復位皆如式俱畢司正副司正各持算白中于主射正官舉爵者酌酒授中者如式飲訖請射請屬官以下仍捧弓矢納于司射器還詣主射正官前揖而退射器及執事官工部制虎中鹿中及諸侯卿大夫射侯等器其儀按周禮大司馬之職王大射則合諸侯之耦其屬有射人掌張三侯司弓矢掌六弓八矢之法服不氏賞賛張侯以旌居乏而待獲古大司馬今兵部之職也今以兵部掌之其射鵠有七虎鵠五采天子射用之熊鵠五采皇太子射用之豹鵠五采親王射用之豹鵠四采一品二品文武官射用之糝鵠三采三品至五品文武官射用之孤鵠二采六品至九品文武官射用之布鵠無采文武官子弟及士民俊秀射用之乏又名容凡射時置于鵠右執旗及待獲者以蔽身設幅并韋當射時置于前以齊矢設射中五皮樹中天子大射用之閭中天子宴射用之虎中皇太子親王射通用之兕中一品至五品文武官用之鹿中六品至九品及文武官子弟士民俊秀通用之其職事設司正官二貟掌騐射者品級尊卑人力强弱而定耦其中否則書于算兵部官掌之司射二貟掌先以强弓射鵠誘射以鼔衆氣以武職官充之司射器官二貟掌辦弓力强弱分為三䓁驗人力强弱而授之工部官職之舉爵者二貟掌以馬潼授中者飲光禄寺官職之請射者四貟掌定耦射射畢再請某耦射每鵠用二人侍儀司職之待獲者掌矢納于司射器者以各𨽻僕供其役執旗者六人掌于容後執五色旗如射者中的舉紅旗應之中采舉采旗應之偏西舉白旗偏東舉青旗過于鵠舉黄旗不及鵠舉黑旗以軍士二人掌之設引禮二人掌引文武官進退命侍儀司舍人職䇿士凡士之舉于禮部者國初以三月朔日御殿而親試之謂之殿試後率以三月十五日間以他事更日讀卷傳臚等儀具列于後殿試儀先期一日鴻臚寺官設䇿題案于殿之東光禄寺偹設桌于兩廡至日早禮部官引貢士入至皇極殿丹墀内東西北向序立文武百官各具公服侍立如常儀鴻臚寺官請陞殿上常服御皇極殿鳴鞭文武百官行叩頭禮侍班執事官舉䇿題案于殿中内侍官以䇿題付禮部官置于案上鴻臚寺官引貢士就拜位執事官舉䇿題案由左階降置御道中賛貢士行五拜三叩頭禮各分東西侍立執事官隨舉䇿題案于丹墀東鴻臚寺官奏禮畢鳴鞭駕興文武百官退軍校舉試桌列于丹墀東西北向置定禮部官散題貢士仍列班跪受叩頭就試是日如遇天雨或大風試桌即移設于兩廡讀卷儀殿試後二日早常朝畢駕詣文華殿免日講不用侍班侍衛等項讀卷官各執卷隨至文華門外候上陞座傳讀卷官進各官趨至丹陛行叩頭禮入殿内東西序立傳讀卷官讀卷居首者至御前跪展卷郎讀畢司禮監官接卷置御案本官叩頭興復班其各讀卷官以次進讀如儀讀三卷後臨時候㫖再讀㡬卷如奉㫖免讀各官即執卷同至御前跪司禮監官以次接卷俱置御案各官叩頭興復班傳各官退各讀卷官出至丹陛行叩頭禮畢即出至文華門外候上將試卷裁定御批第一甲第一名第一甲第二名第一甲第三名畢其餘各卷發出内閣官領收上回宫是日各讀卷官先將第二甲第一名以下拆卷填冩黄榜傳臚儀先期一日設黄榜案于中極殿内稍東至期文武百官各具朝服伺候行禮是日早鼓未鳴先開左掖門放讀卷及提調并執事官進入中極殿門外候上具皮弁服陞座各官入行叩頭禮畢進入殿内供事讀卷官拆第一卷奏第一甲第一名某人拆第二卷奏第一甲第二名某人拆第三卷奏第一甲第三名某人填冩黄榜訖尚寳司官用寳完備起鼓執事官整束黄榜翰林院官捧出皇極殿伺候其餘讀卷提調等官俱先退出鴻臚寺官賛執事官行五拜三叩頭禮畢奏請陞殿導上陞座作堂下樂鳴鞭執事官舉案至簾前置定翰林院官捧榜授禮部官接置于案執事官引貢士入拜位賛四拜傳制官跪奏傳制俯伏興由殿左門出至丹陛東立西向執事官舉榜案至丹墀御道中置定傳制官稱有制鳴賛賛跪制曰某年三月十五日䇿試天下貢士第一甲賜進士及第第二甲賜進士出身第三甲賜同進士出身第一甲第一名某人第一甲第二名某人第一甲第三名某人第二甲某人等若千名第三甲某人等若干名傳訖賛俯伏興賛四拜畢進士分東西侍立執事官舉案由皇極門左門出進士隨出觀榜鳴賛賛排班文武百官入班致詞于丹陛中跪致詞曰天開文運賢俊登庸禮當慶賀賛五拜三叩頭禮畢鳴鞭駕興狀元率諸進士上表謝恩儀先期一日鴻臚寺官設表案於皇極殿門之東至日早錦衣衛設鹵簿駕鴻臚寺官引狀元捧表置于案退立丹墀御道稍東其諸進士以次序立上具皮弁服御中極殿執事官行叩頭禮畢鴻臚寺官奏請陞殿導駕官前導上陞座作堂下樂鳴鞭文武百官各具朝服行禮侍班如常儀鴻臚寺官引狀元及進士入班賛四拜賛進表鴻臚寺官舉表案置于殿中賛宣表目禮部官跪宣表目訖俯伏興徹案狀元及進士又四拜禮畢鳴鞭駕興親蠶國初無親蠶禮肅皇帝始勑禮部以每嵗季春皇后親蠶于北郊後改于西苑未乆即罷嘉靖九年定先期欽天監擇日以聞順天府具蠶母名數奏送蠶室内工部具鈎箔筐架及一應養蠶物件給送蠶母順天府將蠶種及鈎筐一副進呈訖捧自西華門出置綵輿中鼓樂送至蠶室蠶母浴種伺蠶生先飼以待先一日蠶宫令丞設皇后採桑位于採桑臺東向執鈎筐者位于稍東設公主及内命婦位于皇后位東設外命婦位于採桑䑓東階之下南北向以西為上至日四更宿衛陳兵衛女樂工備樂司設監備儀仗及重翟車蠶宫令備鈎筐俱候于西華門外内執事女樂生并司贊六尚女官等皆乘車先至壇内候將明内侍詣坤寧宫奏請皇后詣先蠶壇所皇后服常服導引女宫導皇后出宫門乘肩輿侍衛警蹕如常儀公主及内命婦應入壇者各服其服以從至西華門内侍奏請降輿陞重翟車兵衛儀仗女樂前導女官捧鈎筐行于車前皇后至具服殿少憇易禮服祭先蠶儀具祠祭司祭畢更常服司賔引外命婦先詣採桑䑓位南北向女侍執鈎筐者各隨于後尚儀入奏請詣採桑位導引女官導皇后至採桑位東向公主以下各就位南北向執鈎者跪進鈎執筐者跪進筐受桑皇后採桑三條還至壇南儀門坐觀命婦採桑三公命婦以次取鈎採桑五條列侯九卿命婦以次採桑九條採訖各以筐授女侍司賔引内命婦一人詣蠶室尚功帥執鈎筐者從尚功以桑授蠶母蠶母受桑縷切之以授内命婦内食婦食蠶洒一箔訖司賔引内命婦還尚儀前奏採桑禮畢皇后還具服殿侯陞座尚儀奏司賔率蠶母等行叩頭禮訖司贊唱班齊外命婦序列定贊四拜畢賜命婦宴于殿内外并賜蠶母酒食于採桑臺傍公主及内命婦殿内序坐外命婦從採桑者及文武二品以上命婦于殿堂上三品以下于䑓下各序坐尚食進膳司賔引公主及内命婦各就坐教坊司女樂奏樂進酒及進膳進湯如儀宴畢徹案公主以下及外命婦各就班司贊贊四拜尚儀跪奏禮畢皇后興還宫導從如前親蠶壇築于安定門外皇后率公主及内外命婦躬徃採桑而擇内西苑隙地葢造織堂以終蠶事十年以出入不便改築壇于西苑壇髙二尺六寸四出陛廣六尺四寸甃以磚石又為瘞坎于壇右方深取足容物東為採桑臺方一丈四寸髙二尺四寸三出陛鋪甃如壇制臺左右樹以桑壇東為具服殿三間前為間一座俱南向西為神庫神厨各三間右宰牲亭一座壇之北為蠶室五間南向前為門三座髙廣有差左右為廂房各五間之後為從室各十間以居蠶婦設蠶公署于宫左偏置蠶宫令一貟丞二員擇内臣謹恪者為之以督蠶桑等務禮部志稿卷十三
