body:
  text: 禮部志稿卷四十三明俞汝楫編歷官表祠祭司郎中周騤世良順天籍直隸華亭縣人正統十三年進士調儀制司章規字籍見員外下孫洪伯大山東昌邑縣人景泰五年進士李闕于闕黃闕王沂字籍見主事下龍闕林壂世南福建閩縣人成化十四年進士王雲鳳字籍見員外下歷副都御史言行見名臣録程闕許淳字籍見員外下調儀制司宋闕王壽字籍見主事下彭䕫字籍見主事下歷升布政李闕祝鑾字籍見主事下屠應塤字籍見主事下升副使楊應奎文煥山東益都縣人正德六年進士升知府汪必東希會湖廣崇陽縣人正德六年進士畢廷拱敬夫廣東番禺縣人正德六年進士歐陽必達字籍見主事下歷升吏部尚書王煒克新順天固安縣士正德六年進田汝成禾叔浙江錢塘縣人嘉靖五年進士歷升提學副使屠應埈文叔浙江嘉興縣人嘉靖五年進士歷升諭德王汝孝紹甫山東東平州人嘉靖五年進士歷升右副都御史李遂邦良江西豐城縣人嘉靖五年進士歷升南京兵部尚書毛渠世澤山東掖縣人嘉靖五年進士歷升太僕寺卿張鏊字籍見員外下歷升提學副使王希旦福建侯官縣人舉人熊過叔仁四川敘州人嘉靖八年進士夏浚字籍見主事下歷升提學副使易寬栗夫江西安福縣人嘉靖十四年進士歷升提學副使王健偉純浙江永嘉縣人嘉靖十七年進士調儀制司升南京光祿寺少卿張鈇元賜山東冠縣人嘉靖八年進士升參議高簡公敬四川綿州人嘉靖八年進士調吏部文選司張維嶽字籍見員外下張希舉甫卿江西南昌縣人嘉靖二十年進士升提學副使林懋和字籍見員外下調儀制司莫如忠字籍見員外下嘉靖二十九年繇精膳司調任升提學副使張緯字籍見主事下嘉靖三十年繇精膳司調任劉斯潔原靜直隸易州人嘉靖二十六年進士三十二年任升參議升副都御史劉朝佐道卿江西安福縣人嘉靖二十三年進士三十二年任調儀制司余文獻伯初江西德化縣人嘉靖二十三年進士三十三年任升提學副使陳全之字籍見主事下嘉靖二十四年繇精膳司調任升知府田揚廷翰福建晉江縣人嘉靖二十九年進士三十五年任升參議楊豫孫字籍見員外下嘉靖三十五年繇主客司調任歷升副都御史徐學謨字籍見員外下嘉靖三十五年繇精膳司調任歷升副都御史李纘字籍見員外下繇精膳司調任徐文沔可繩浙江開化縣人嘉靖二十六年進士三十九年繇儀制司員外升任調吏部稽勳司雷金科公憲福建建安縣人嘉靖三十二年進士四十年繇精膳司調任何汝健體乾南京留守左衛籍直隸無錫縣人嘉靖三十二年進士四十年繇精膳司調任陸光祖與繩浙江平湖縣人嘉靖三十六年進士四十一年繇南京祠祭司復除歷升大理寺卿張正謨字籍見主事下嘉靖四十二年繇主客司調任調儀制司龎遠惟明直𨽻吳江縣人嘉靖三十二年進士四十二年繇主客司調任調儀制司歷升南京光祿寺卿屠羲英淳卿直隸寧國縣人嘉靖三十五年進士四十三年繇戶部貴州司調任升提學副使歷升南京光祿寺卿柴淶字籍見員外下嘉靖四十四年繇主客司調任歷升布政沈節甫字籍見員外下嘉靖四十四年繇本司員外升任改尚寶司丞常三省希曽直隸泗州人嘉靖三十五年進士繇兵部車駕司調任范惟丕于公直隸華亭縣籍吳江縣人嘉靖三十八年進士四十五年繇主客司調任升光祿寺卿楊俊民伯章山西蒲州人嘉靖四十一年進士隆慶二年繇主客司調任升提學副使歷升太僕寺少卿王續之大卿四川南充縣人嘉靖四十一年進士隆慶三年繇主客司調任歷升參政徐用檢字籍見員外下隆慶三年繇主客司調任調儀制司升提學副使陸光祚與培浙江平湖縣人嘉靖三十八年進士隆慶三年繇精膳司調任調儀制司升提學副使楊汝允懋功江西南昌縣人嘉靖四十一年進士隆慶四年繇主客司調任升知府蔣彬原中直𨽻吳縣人嘉靖三十八年進士隆慶五年繇兵部員外郎升任升知府蔡叔逵于漸河南衛輝府人嘉靖四十一年進士隆慶六年繇主客司調任調儀制司升提學副使王象坤子厚山東新城縣人嘉靖四十四年進士隆慶六年繇精膳司調任升副使劉應麒字籍見員外下萬厯三年繇精膳司任調儀制司張彥字籍見主事下萬厯三年繇主客司員外升任調儀制司鄒學柱國材浙江餘姚縣人隆慶二年進士萬厯五年繇儀制司員外升任升知府錢拱宸恭卿浙江烏程縣人隆慶二年進士萬厯七年繇主客司復任升知府施策萬厯八年繇主客司郎中調任調儀制司李一中字籍見員外下萬厯九年繇本司員外升任趙世卿象賢山東歷城縣人隆慶五年進士繇楚府左長史加升南京兵部武選司郎中致仕起用張之屏憲夫山西沁水縣人甲戌進士萬厯十二年繇主客司郎中調任丁汝謙子益山西吉州人甲戌進士萬厯十三年繇主客司郎中調任張志字籍見主事下萬厯十四年繇主客司郎中調任李同芳濟美直隸崑山縣人庚辰進士萬厯十五年繇精膳司郎中調任陳應芳世龍直隸泰州所籍江西吉水縣人甲戌進士萬厯十七年繇主客司員外升任沈一中字籍見員外下萬厯十八年繇本司員外郎升任馬慥顧甫陜西同州人甲戌進士萬厯十九年繇兵部武選司郎中補任徐即登字籍見員外下萬厯十九年繇主客司郎中調任蔡逢時字籍見主事下萬厯二十年繇精膳司郎中調任張我續字籍見主事下萬厯二十年繇本司員外升任袁一驥字籍見主事下萬厯二十二年繇主客司員外郎升任楊鳳儀虞河南杞縣人癸未進士萬厯二十二年繇儀制司員外升任來三聘任卿浙江蕭山縣人癸未進士萬厯二十二年繇儀制司員外升任洪起睿爾介福建南安縣人壬辰進士萬厯二十五年繇主