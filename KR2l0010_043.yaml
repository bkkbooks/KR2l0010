人丁未進士萬厯四十一年繇無錫縣知縣行取任添注陸完學汝成直隸武進人丁未進士萬厯四十一年繇兵部車駕司調任王時和旭谷北直魏縣人庚戌進士萬厯四十五年繇臨川知縣任虞德隆元起直隸金壇人丁未進士萬厯四十六年繇南京吏部文選司除補陳𤣥藻汝鑑福建莆田人庚戌進士萬厯四十六年繇行取升任張光房石松山西澤州人辛丑進士萬厯四十六年繇中書升任蕭應坤寧宇湖廣江陵人丙辰進士天啓元年繇行人升任周鏘慕乾錦衣衛籍浙江海寧人癸丑進士天啓元年繇行人升任鍾世芳𤣥暢浙江秀水人庚戌進士天啓元年繇甌寧知縣任楊覲光星甫山東招逺人丁未進士天啓元年繇兵部車駕司調未任升精膳司張國柱寧宇山東平原人庚戌進士天啓二年繇户部四川司調任王霖􅝜嵻河南祥符人辛丑進士張𢎞襟象南陜西鄠縣人癸丑進士章嘉禎元禮浙江德清人庚辰進士畢自肅沖陽山東淄川人丙辰進士天啓二年繇定興知縣行取任韓琳管岑陜西涇陽人丙辰進士天啓二年繇户部調任劉康祉𤣥受浙江永嘉籍龍泉人庚戌進士天啓二年繇兵部調任韓萬象字籍見前天啓三年復任孫必顯意白陜西潼關衛籍三原人丙戌進士天啓三年繇户部調任程國祥我旋應天上元人甲辰進士天啓三年繇南京吏部起任丁魁楚光三河南永城人丙辰進士天啓四年繇户部調任李其紀布宸北直清豐人丙辰進士天啓四年繇工部調任孫際可見行浙江奉化人丙辰進士天啓四年繇工部調任附禮部主客清吏司題名記自龍鳥紀瑞依鳥麗躔尚書六屬近古者周職方外惟漢主客秦廢典任吏少府遺四人主發殿中書稱尚書即有令僕射丞下吏左右曹無職事為加官漢武使左右曹吏分平尚書奏事知樞密者始領之及遊宴用閹遂罷此官成帝始置尚書五僕射一常侍二千石民客曹四而客曹主治外國夷狄後二千石分三公光武分南北主客稱六曹則未有禮部先有主客矣魏五曹客位三而二十五子曹仍有南北主客晉六曹客仍三而以二十三郎統三十五曹分左右南北主客而四東晉五曹更有祠部無客而左僕射領殿中主客祠部尚書領祠部儀曹自此客曹下列子曹中康穆朝三十四曹僅有十八猶有主客後與起水二曹同省宋高復增元嘉後省而祠部尚書通職右僕射不並置右攝祠或祠攝右則客祠皆屬左右僕不屬部而客居左矣後魏太和吏部管南北主客祠部管左右主客北齊河清改左主客為主爵南主客為主客掌諸蕃雜客事隋始以儀曹屬殿中主客屬祠部後改司藩時尚未有禮部也唐用六典始以禮部統禮祠膳部主客龍朔又改司藩咸亨復舊而宋始以膳次主客元祐以主客兼膳紹聖主客膳部互置逮金元而有禮部無主客矣秦郎中令屬有五官左右中郎將三署署有中郎侍郎郎中三郎郎中秩比三百石不屬尚書漢武更名光祿勳而中郎郎中滿六嵗爵三級外郎滿六嵗爵二級則今員外郎也光武分六曹命置尚書郎三十四人秩四百石每郎缺從三署選五郎詣尚書臺試箋奏初稱守尚書郎中滿嵗稱尚書郎三嵗稱侍郎因署號而客曹郎主羌胡事劇遷二千石或刺史次為令秩滿自占縣詔書賜錢三萬與三臺祖餞乃若起草明光更直建禮晝枕夕揖握蘭含雞瑜麋一丸赤管雙筆青縑白綾之被帷帳氈褥之給食物湯餅之供執香護衣之選禁斷行人則中丞侍御避車執版拜集都堂則令僕尚書交禮解交五熟果食五日羮食下天子一等則諸曹同之矣魏晉宋齊後魏北齊惟置郎中梁陳兩置隋開皇諱忠不置郎中惟置侍郎六年始置員外郎蓋魏末常侍晉初侍郎皆有員外散騎而尚書省則自隋始而漢復有光祿勳主事察諸郎茂才高第為之秩四百秩後魏量曹置主事郎從六品上隋置主事令史煬帝於主事去令史名每十令史置一主事時用士人子曹侍郎但曰郎二郎省一而升侍郎於六曹各置一人二尚書唐則主客郎中一五品員外郎一六品主事二用流外入流九品俱從上龍朔改客郎為司藩大夫咸亨復舊宋郎中員外郎因之而主事為吏額分案四置吏七然晉省八座令僕均統六曹復有左右司郎中員外郎據子部上以遡秦左右曹之意更華要我太祖罷中書省六部為二品分寄丞相權而裁左右司釐子部為清吏司主客屬禮次仍宋郎中員外各一為正從五品主事二正六品用清流分科三曰四夷曰外國曰賞賜置吏十三一都二令十典外夷職也賞賜何居迎氣東郊還賞公朝布德施仁慶賜遂行春官令也而元成宗元貞間增禮部尚書一員領會同館事今注選一主事提督南北二館則漢南北主客意也鴻臚寺司賓署主簿序班皆館中十三館通事考核差遣屬本司則漢典客并鴻臚意也部堂多出自翰林入直殿閣則宋唐右僕祠書通職意也故禮部稱清曹則自晉宋來選擅高妙望極澄淡而唐置日以六品以上清官兩人待制衙內則郎中員外郎咸與焉御史繇監察而侍御而殿中侍以至中丞或以補闕改拾遺必薦最始得員外郎郎中猶或檢校不真栁子厚以監察御史為禮部員外遂嫌驟顯而膏腴甲族猶不樂仕搏擊卷指烏衣橋承拗項繇來久矣祖制御史滿九年主事刑部法亦如是而邇來部屬改臺省改及副郎猶矜炎夸世使然哉客司舊碑題名嵗久不勝收收起𢎞治前八年號無考因博詢前副郎沈伯甫僅得吕公㦂如吳伯宗以開科第一人擢部員外淹雅若宋文憲濂靖難若齊本兵泰理學若蔡祭酒清皆部主政緣無分司不便托拾因思漢薛歐劉揭馮敬為典客金敞弟岑為使主客唐張中丞巡白左僕射文公居易皆主客郎中董太傅恭惠公晉裴相贄宋陳文惠三子學古曾諫議大夫致堯韓歐集皆以主客員外郎傳而吾學通紀實録諸書何獨不爾豈就韓集如栁子厚為禮部員外郎者為不分司之據而不知此即子部若今儀司也往既不傳而傳既多爽族世父伯清以儀司主政諫武宗南巡逮杖比副本司遂不祿世廟恤助喪葬而碑升河南僉憲何與豫輒不揣存舊礲新刋繁政誤更悉名詎賢達官爵贈諡之所極豈先輩藉此身後名抑士固有志知本無涯善敗直探古初從違決擇微渺亦寧止一片石百餘公之觀摩而守官為道就地證功則即此臚列諸先進是亦當官得失之林也嘉與來兹鏡諸萬厯三十六年戊申嵗夏五馮烶撰禮部志稿卷四十三
