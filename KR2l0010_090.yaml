body:
  text: 禮部志稿卷九十明俞汝楫編朝貢備考夷貢令郤貢中宫方物洪武六年暹羅解國王女兄參烈思寧復遣使奈文𨽻囉進貢方物於中宫禮部尚書牛諒以聞詔仍却之使者賜文綺襲衣遣還議諭朝貢期洪武八年六月甲午安南陳煓遣其通議大夫阮若金等來請朝期上命羣臣議皆曰諸侯之於天子比年一小聘三年一大聘舊邦小國但世見而已於是命中書省臣諭安南髙麗占城等國自今惟三年一來朝貢若其王立但世見而已㑹集朝見洪武十五年敕禮部自今四夷及諸土官入賀正旦者無分逺邇務於畿甸近地㑹集同入京師朝見母使先後不齊有失朝儀也安南朝期貢物洪武二十一年十二月癸丑安南遣其臣阮完等來上表謝所賜敕書及文綺貢象四隻象奴三人上以其來煩數所貢方物往往過侈道路勞擾詔禮部咨諭安南國令三嵗一朝方物隨其所産止許一人進送效其誠敬而已象犀之屬毋或再進以重勞我民加貢馬直永樂元年湖廣四川雲南廣西所𨽻宣慰司楊升等并西北諸夷各遣人朝賀貢馬及方物上以其逺至且定所貢馬直薄命禮部第馬之髙下增給之上馬每匹鈔千貫中馬八百貫下馬五百貫賞貢馬直數永樂元年烏梁海頭目哈喇哈達遣其部屬托果斯等二百三十人來朝貢馬命禮部賜鈔幣襲衣併償其馬直上馬每匹鈔五十錠中馬四十錠下馬三十錠每人仍與綵幣表裏一定貢馬給鈔差等宣德元年上御右順門諭行在禮部尚書胡濙曰昨日御馬監言西番國師喇嘛所進馬各有髙下賞賜亦宜分等第此言亦可採若髙下同價則彼將謂朝廷混然無别所進下者固喜髙者心必不平卿等宜勘酌適中於是禮部定議上馬一給鈔二百五十錠紵絲一匹中馬一鈔二百錠紵絲一匹下馬一鈔八十錠紵絲一匹有疾瘦小不堪者每一馬鈔六十錠絹二匹許以馬市易宣德四年十一月丙寅迤北和寧王阿嚕台遣使阿都齊等貢馬仍以馬求市上諭行在禮部臣曰彼既歸心朝廷聽其市易毋縱下人侵擾違者執而罪之戒珍禽竒獸勿貢宣德七年十一月朝鮮國王李裪遣陪臣趙琠金玉振等貢醃松菌及鷹上諭行在禮部臣曰朝鮮貢獻煩數已非朕所欲今乃獻松菌及鷹菌食物也鷹何所用珍禽竒獸古人所戒可諭其使自今所貢但服食器用之物若鷹犬之類更勿進獻不取琉球貢數外物正統二年二月浙江市舶提舉司提舉王聰奏琉球國中山王遣使朝貢其所載海巴螺殼亦宜具數入官上謂禮部臣曰海巴螺殼夷人所資以貨殖者取之奚用其悉還之仍著為令市茶過多令自運正統八年安定衛國師實喇藏卜等以朝貢至京各市茶二千斤又奏安定王令市茶三千斤回用乞賜車輛糗糧上以茶數過多詔允安定王五百斤官為運去其國二百斤徒衆人一百斤俱令自募人運仍令禮部著為令飭邊臣一槩起送正統八年鎮守陜西都督同知鄭銘右都御史陳鑑奏送孔提谷西吳等族清修禪師宗諸職宜招撫各族來降番人衮楚克藏布等二百三十七名詣京朝貢上命賜綵緞表裏有差因謂禮部臣曰來降番人既多邊將宜諒遣來京今一槩送至沿途軍民供給疲困此銘鑑處置乖方所致其移文今後勿復爾處置夷使供應正統十年大同左參將都督僉事石亨奏比年衛喇特朝貢使臣動二千餘往來接送及延住彌月供牛羊三千餘隻酒三千餘罈米麥一百餘石雞鵝花果諸物不計其數取給官軍不敷每衛助銀完辦其卓凳釡甕之類皆軍民應用畢日所存無幾宰過牛羊等皮亦係折糧之物遞年銷費無存臣近奉命提督切思使人絡繹請求無厭雖朝廷優禮逺人不此之計然非處置有方則亦不免勞費官私今將可行事宜條例以聞一支用酒在先將米麥分派軍民之家貿易擾害請自今領米麥官釀其糟酵養牲以待支用一自正統七年迄今宰過牛羊皮及剪絞羊毛已賣銀三百餘兩貯庫足充自後花果油鹽諸費一卓凳釡甕之類見存者印記收官缺少者官為措辦俱令人收掌應用免致遞年分辦一留住大同使臣軍民日逐挨候供億不敢少離請如京師例三五日一次供送一在先支持委各衛屬官往往畏懼折服莫敢誰何請自今以能幹都指揮一員管領而臣總提督庶易為撙節不致侵欺上謂禮部臣曰亨所言於軍民誠有益宜悉從之其以山西行都司都指揮僉事張淮大同府推官孫濬不妨本職掌領諸事聽亨總督務在上不失朝廷柔逺之意下足使軍民兩便定暹羅番貨價值正統十年八月禮部奏暹羅使臣坤普論直等言所貢碗石一千二百八十斤非本國所産皆往西洋易來其獲亦難乞循正統二年例每斤價鈔二百五十貫續稽得正統九年本國使臣坤沙羣等貢碗石八十斤至京本部以其非貴重之物奏每斤給價鈔五十貫每鈔二百貫折支絹一匹通計絹二千匹請上減半給之今坤普論直乞欲循正統二年例未敢輕定上曰碗石中國素有非奇物也每斤給鈔五十貫自後其免貢之酌處逺近畨價接待正統十四年四川左布政使侯軏等奏比奉敕自今番僧朝貢其逺方者遣人送來其近邊者每次不得過三四人餘則量館待之以禮遣回所進馬與方物上等者送京粗惡之物貯彼官庫中下小馬給彼邊境官軍具數以聞用給酬賚臣等切思各僧生長畨地語言不通止憑通事𫝊譯慮有交結以近作逺無繇稽察况其所進皆不過舍利佛像氆氌茜草等物中下羸弱等馬其意蓋假進貢之名潜帶金銀候回日市買私茶等貨以此沿途多用船車人力運送連年纍月絡繹道路所司非惟疲於供億抑且罹其凌虐乞敕今後畨僧進貢雖稱逺方者亦如近邊者例量發數人送其貢物上馬赴京其餘方物馬匹悉收官庫及撥邊軍騎標餘人悉禮待遣回候年終本司類進原貯方物其該給賞賜者轉達該部關領回司行取原遣番僧到司領給事下禮部尚書胡濙等議以為番僧逺近不同難以一槩遣回其方物例該御前奏進不宜收貯外庫軏等所言難允上然之日本番僧價值景泰三年禮部奏日本國王有附進物及使臣自進附進物俱例應給直考之宣德八年賜例當時所貢以斤計者硫黃僅二萬二千蘇木僅一萬六百生紅銅僅四千三百以把計者衮刀僅二腰刀僅三十五十耳今所貢硫黃三十六萬四千有竒蘇木一十萬六千生紅銅一十五萬二千有奇衮刀四百一十七腰刀九千四百八十五其餘紙扇箱盒等物比舊俱增數倍蓋緣舊日獲利而去故今倍數而來若如前例給直除折絹布外其銅錢總二十一萬七千七百三十二貫一百文時值銀二十一萬七千七百二十二兩有奇矣計其貢物時值甚亷給之太厚雖曰厚往薄來然民間供納有限况今北邊及各處進貢者衆正宜撙節財用議令有司估時值給之已得㫖從議有司言時直生紅銅每斤六分蘇木大者銀八分小者五分硫黃熟者銀五分生者三分臣等議蘇木不分大小銀俱七分硫黃不拘生熟俱五分生紅銅六分共銀三萬四千七百九十兩值銅錢三萬四千七百九十貫刀劍今每把給鈔六貫鎗每條二貫抹金銚每個四貫漆器皿每個六百文硯匣每副一貫五百文通計折鈔絹二百二十九匹折鈔布四十五十九匹錢五萬一百一十八貫其馬二匹如瓦刺下等馬例給紵絲一匹絹九匹悉從之進貢少遣人者厚賜景泰三年衛喇特額森使臣知院哈濟等言奉㫖令進貢少遣人故今使臣甚少伏乞朝廷厚賜為幸禮部議上年使臣三千二百餘人今使臣一千一百四十三人不及上年之半也先正副使二人一等原賜六表裏宜量加二表裏嗄程每人羊一隻也先母并弟四人及長男遣來使臣庫庫等七人二等原賜二表裏宜量加一表裏從之貢夷私茶禁天順二年命禮部移文四川布政司今後烏思藏地方該賞食茶於碉門茶馬司支給仍行湖廣布政按察二司如有番僧經過不許官員軍民人等將茶私自賣與沿途官私把隘去處務要收檢若有夾帶私茶通追入官就將各犯依律問罪從四川按察使僉事劉福奏請也議哈密貢成化元年禮部尚書姚夔㑹太保㑹昌侯孫繼宗議哈密乃西域諸番之要路祖宗待之特為優厚然朝貢有期遣使有數近年為竒木嘉色稜殘破其國人民潰散無所棲止不時來貢動以千百將損瘦駝馬數匹名為進貢實則貪叨宴賜朝廷保小懷逺之仁固不恤此然道路疲於遞接府庫竭於賞賜合酌量事體哈密使臣嵗一入朝不得過二百人竒木嘉色稜五十人其土魯番額爾巴拉等或三年五年入貢經哈密者依期同來不得過十人宜敕陕西甘肅等處鎮守總兵巡撫巡按三司等官撫諭番民嚴加防範及敕哈密王毋遵達實哩收集流散保守境土依時朝貢全朝廷始終優厚之意從之勑勿獻珍異成化二年敕諭朝鮮國毋獻珍異先是朝鮮國王李瑈纍以海青白鵲遣使來貢禮部言先有詔禁天下貢獻而朝鮮三進異鳥雖曰小國效順然逺途勞費亦多矣請止絶之以彰不寶逺物之盛德上深以為然至是其陪臣崔景禮趙瑾等陛辭乃錫之敕令諭瑈請禮番僧成化四年禮部欲清理番僧及中國冒充者法王嘉木巴嘉勒燦引永樂年間事例陳請詔曰中國人先冒番經有度牒者已之無度牒者清出今後中國人不許冒番教非僧官食米者皆住支禁違例朝貢成化四年禮部奏長河西魚通寧逺等處頭目喇嘛番僧納木喀并烏思藏蘭教主遣喇嘛里瑪戩等違例朝貢巡撫四川右副都御史汪浩失於禁止宜降敕切責及責都布按三司罪狀以後烏思藏番僧人等進貢務遵原定三年一次限期額數審有番王印信文憑方許存留起送其國師禪師關文不得狥情濫收所進方物仍須封記及長河西魚通寧逺處亦須量數放入務在撫馭開諭得宜毋得因而激變生患從之日本使臣違犯成化四年十一月日本國使臣麻答二郎於市買物使酒手創傷人禮部奏其强橫行凶宜加懲治上以逺夷免下獄付其國正使清啓治之啓奏欲依臣俗事例處治但在禮義之地不敢妄為俟臣還國依法治之且引伏不能鈐束罪上皆有之既而所傷者死禮部覆奏麻答二郎行凶傷人致死雖免問罪宜依律追銀拾兩給死者之家埋葬仍省諭各番使知朝廷寬宥懷柔之意從之日本貢物酬直成化五年正月丙子禮部奏日本國所貢刀劒之屬例以錢絹酬其直自來皆酌時宜以增損其數况近時錢鈔價直貴賤相逺今㑹議所償之銀以兩計之已至三萬八千有餘不為不多矣而使臣清啓猶援例爭論不已時則雖傾府庫之貯亦難滿其溪壑之欲宜裁節以抑其貪上是之仍令通事諭之使勿復然違例朝貢不給賜成化五年禮部奏陕西都司送到哈密等地面使臣哈昭等各來朝貢例應給賜但正統年間哈密使臣每年許朝一次不過二百人額爾巴拉等處使臣三年或五年一朝每處不過十人已敕所在官司及省諭其國王知㑹今違例來朝不當給賜然既到京宜量為處置以慰其心請敕賜其國王并行陜西鎮守等官一體禁約從之土司朝貢過期減賜成化五年廣西鎮安府等衙門遣官族黃鐸等來朝貢馬過期禮部請照例減半給賜從之貢使乞違禁物成化五年迤西蘇勒坦阿里王及達爾罕妻各奏求海青鞍馬蟒龍衣綵緞器用等物禮部奏以違禁之物與非土産者難允其請其餘惟上所命因命各賜之緞帛有差處烏思藏貢成化五年七月四川都司奏烏思藏贊善王等遣舍人阿巴等率各寺寨僧畨一百三十二起不依年例入貢兼無畨王正印文書今已量留十數名在彼守視方物餘皆遣回乞定議令各照年例進貢或令各具印信文書㑹同進貢禮部言烏思藏地方廣逺畨王數多若令各照年進貢則往來頻煩驛遞不息若令㑹同進貢則地方有逺近難以齊一宜令各王各具印信文書於應貢年分陸續來貢不許人數過多仍請敕各畨王知㑹令其永逺遵守所貢方物既至宜令四川三司遣人省諭准作成化六年分進貢起送赴京或以禮發遣令其依限前來務在處置得宜以盡懷柔之意從之土司慶賀表箋違例成化元年禮部奏廣西思明府上思州遣頭目韋聰齊俸慶賀成化四年至六年萬夀聖節并冬至正旦表箋俱不赴本布政司類進事屬違例宜行廣西巡按御史逮治韋聰及本州官吏上曰本州正官姑宥之餘如奏定烏思藏貢期成化六年工部奏四夷朝貢人數日增嵗造衣帛賞賚不敷上命禮部宜減各夷入貢之數尚書鄒幹等具例以聞上曰其移文各邊令以所定年數入貢不得違越幹等以烏思藏原無定立則例議請烏思藏贊善闡教闡化輔教四王三年一貢每至遣使百人多不過百五十人繇四川路入國師以下不許貢其長河西董卜韓胡二處一年一貢或二年一貢遣人不許過百松茂州地方住坐番僧每年亦許三五十人來貢其附近烏思藏地方入貢年例如烏思藏亦不許過五六十人乞行四川鎮守等官俱要委官審辨有印信文字者方許放入仍乞降敕各畨王諭以畨僧入貢定數至期各王將僧人姓名及所貢方物各具印信畨文以憑驗入從之畨人冒入過多成化七年衛喇特平章拜繅勒噶差頭目哈喇哈斯同哈密王母所差頭目瑪哈穆特來朝貢哈喇哈斯至京奏甘肅蔣總兵及通事索其賄而稽留踰嵗且箠罵之事下禮部蔣總兵者定西侯蔣琬也禮部移文詰之琬奏兩國男婦二百餘人到邊有㫖令遣十之一赴京衛喇特頭目不肯從固留之彼甚忿怨故誣辭以奏實未賞索賄且箠罵之也蓋回回人有仕中國者每嵗與彼交誘其乞茶營利且唆其誣辭妄奏宜嚴禁之禮部覆奏請移文甘肅巡撫等官今後各番入貢必須遇之以禮禁約在邊軍民不許交通漏泄事情仍令琬譯寫畨文曉示哈密王毋凡遣使可使老成之人戒約而來不許混以他種畨人冒入果係傳報邊情止可數人不必過多從之貢夷入籍成化八年福建三司官奏琉球夷人先因進貢潛居內地遂成家業年久不還本國者乞盡遣之事下禮部集議如其人曽承户部勘合許令入籍者仍舊餘如所奏從之戒飭多容貢畨成化八年禮部言今年陜西岷洮等衛所奏送各簇畨人共四千二百有奇除給與馬直不計凡賞綵段八千五百二十四表裏生絹八千五百二十餘匹鈔二十九萬八千三百餘錠濫費無已正統天順間各畨進貢嵗不過三五百人成化初年因岷洮等處濫以熟畨作生畨冒送已立定例生番許二年一貢每大簇四五人小簇一二人赴京餘悉令回成化六年因按察司副使鄧本端妄自招撫來貢又復冒濫本部復申例約束今副使吳玘等不能嚴飭武備以守邊方惟通畨人以紓近患宜降敕切責俾遵前例若番情難以阻抑亦須别白往時何以來少之故奏聞裁處詔可成化十年烏思藏如來大寶法王噶瑪拉巴勒奏成化五年分遣人朝貢䝉回賜綵段表裏等物過厚欲遣其徒進貢謝恩禮部議擬取㫖詔許遣四五人來京降敕省諭朝貢成化十一年四月琉球國使臣奏乞如常例嵗一朝貢禮部言去年彼國使臣至福建殺死縣民焚劫肆凶宜降敕省諭并定以朝貢之期上乃敕其王尚圖追究肆惡之徒依法懲治自後定為例二年一貢所遣使臣止許百人多不過更加五人除國王正貢外不得私附貨物并途次騷擾有纍國王忠順之意琉球二年一貢成化十四年禮部奏琉球國已准二年一貢今其國王尚圖既故而其世子尚真乃奏欲一年一貢輒引先朝之事妄以控制諸夷為言原其實情不過欲圖市易而已况近年都御史奏其使臣多係福建逋逃之徒狡詐百端殺人放火亦欲貿中國之貨以專外夷之利難從其請命止依前敕二年一貢給土官隂陽符成化十六年雲南大候州土官知州奉吉利法等乞仍降陽文信符禮部言大候州在雲南極邊一萬二千餘里原降與陽文信符二面三年進貢以符繳換成化六年本州遣人進貢繳符本部因其曠貢一十五年又不具每年差發銀兩足否以故止給與隂文符一面經今十年方來進貢乃奏稱因陽文存留不降致缺差貢夷人譎詐恐自後因此得以藉口宜從舊制給與陽文信符齎回責以催辦銀兩依期奉從之給勘合驗放成化十一年給烏思藏諸畨王及長河西魚通寧逺等宣慰司敕書勘合禮部奏烏思藏地方在長河西之西長河西在松潘越嶲之南三處地界相連易於混淆難以辨别烏思藏大乘法王闡教闡化輔教贊善畨王舊例三年差人一朝貢彼因道險少來而長河西畨僧往往僞作印信畨書以冒賞賜乞定為定制除大乘法王無地土外闡教等四王人各賜敕一道勘合二十道該貢之年道經四川陕西比號既同仍有王印奏本方許放入其長河西魚通寧逺等處朵干及董卜韓胡諸宣慰司亦各給勘合六十道其入貢道經四川比號驗放一如例若該貢之年偶值道梗不通後不許補貢其四川松茂州土著畨僧來朝者邊官亦照例驗放不許過多從之請封請襲過多成化十八年二月禮部奏烏思藏法王進貢定期必以三年定數僧不過一百五十近贊王連二次已差僧四百十三人今又以請封請襲差一千五百五十七人俱非例宜盡阻回但念化外逺夷乞量准其請封請襲各一百五十人仍准其三百人為成化二十年并二十三年兩貢之數毋得再至所司亦宜以禮省諭其退回者從之不允琉球國違敕奏擾成化十八年琉球中山王尚真復乞不時進貢不許尚真屢上疏至是復請稱以小事大如子事父禮部言其意實假進貢以規市販之利宜不聽其所請上賜敕諭之曰朝廷定爾國二年一貢之例事已具前敇兹不再言但臣事君遵君之敕可也屢遣敕奏擾可乎子之事父奉父之命可也屢方命陳瀆可乎所以固拒者非為惜費二年一貢正合中制朕所以恤小之意實在此王其欽遵之毋事紛更給畨王勘合成化二十年時近邊畨簇多詭稱烏思藏各畨王進貢賜豫不資真僞莫辨禮部給畨王勘合二十道貢時填為左驗以革其弊且請委西寧河洲洮洲分遣畨僧齎送勘合歸日與升賞至是索諾木巴勒以送贊善王勘合回禮部謂其陟厯險阻杜邊人冒貢之姦省府庫無窮之費宜申前升賞之命從之遇荒停貢成化二十一年陕西布按二司以屬地連年旱荒公私窘乏條陳備邊救荒十事內一事請暫停各夷并鎮守等官年例貢獻候豐嵗舉行禮部以各夷進貢誠所當停然而鎮守年例進貢惟上裁處詔鎮守等官暫停今一年酌處土司補貢成化二十二年禮部臣奏長河西魚通寧逺等處宣慰司以黎州大渡河冦發連年不能進貢至是來補三貢貢內開有新招撫名色緣補貢無例番方亦無新招撫此四川都布按三司等官失於查究阻回今已覺舉奏聞宜宥其罪而三貢方物俱宜受之以俯順夷情其各賞賜别當斟酌請給從之既而擬奏正賞并折衣絹通減四匹各畨復奏乞加賞有㫖人加生熟絹各一匹今後令彼務依年數定例來貢毋得違越申飭勘合限制𢎞治元年禮部言成化中以烏思藏畨僧入貢煩數勞費中國其中又多有近邊畨人冒名來貢者本部嘗奏准請給闡化輔教等王勘合各二十道俾三年一貢每貢不許過百五十人俱從四川正路赴布政司比號相同方許入貢今所差國師綽斯戩藏布等從四川路來者係年例該貢之數併其所稱新招撫塞主五十人俱准來貢其别差畨僧也舍星吉等從洮州路來者乃冒詐之徒例不可許從之裁抑琉球貢𢎞治元年琉球國使臣皮揚那等自浙江來貢禮部言與二年一貢例限不合且路不當繇浙江而來請却之至是皮揚那等復齎上本國移禮部咨言成化二十一年本國正議大夫程鵬等進貢回國報知皇太子冊妃乃遣使者表賀并具方物進貢禮部復言琉球入貢雖於例限不合然逺夷之情可念况箋文方物已至京難於終却謂宜暫賜容納繼後仍以舊例裁之或因福建風水不便取路自浙江來者亦令審實奏請方得起送今次所給正副使綵段等物宜如舊例獨於畨伴從人減半以示裁抑之意從之貢畨犯法者不許起送𢎞治二年禮部奏迤西各處貢使該貿易之物俱有成例定數今土畨及哈密使者各違例收買食茶箭竹等物過多請准潼關盤驗事例俱沒官仍令大通事曉諭在館諸畨各遵守禁例如違俱照此例行之其未給賞者即遞減其賞并各守邊官員凡外畨來貢曾犯法者再不許起送著為令從之逮治起送𢎞治二年禮部以陜西行都司起送土魯畨進貢使臣斬阿沙等四百十四人違例過多其該齎驗馬勘合并青冊又過期不至無憑擬賞致使臣久留京館請逮治其罪從之烏思藏區處𢎞治三年議處烏思藏等處番僧三年一貢令四川布政司比號相同并有畨王印信畨字奏啓方許其法王卒止用本處僧徒襲職不繇廷授至是輔教王遣畨僧舒巴勒保送大乘法王襲職入貢乃欲自洮州而入洮州守備官據例阻回以其事聞下禮部議謂有前例宜行洮州守備官於舒巴勒內令四五人齎執勘合前往四川布政司比號果係原降輔教王處勘合字號相同本司宜即差人具奏并給與印信文書仍令回至洮州守備官再行審驗其大乘法王處所差者許令入貢然不許其奏請襲若輔教王處所差者准作𢎞治三年一貢沿途量起人夫護送方物至京如其字號不同及有詐冒别情宜從四川鎮巡官并洮州守備官經自奏聞以憑區處從之定貢使入關入朝𢎞治三年先是有㫖令迤北及衛喇特進貢使臣人等迤北許一千一百名入關四百名入朝衛喇特許四百名入關一百五十名入朝既而迤北使人呼喇呼等二十九人去而復來懇求皆入大同守臣以聞命禮部看詳禮部言呼喇呼等情詞懇迫許來無害但先次阻回者無慮二千人若探知此二十九人者得入亦援例以請則難於再阻宜暫給口糧姑令境外不准作入關之數俟其使還日挾與俱回從之申嚴畨情禁約𢎞治三年太傅兼太子太師英國公張懋陳禁革處置畨情事宜謂京城原設兩㑹同館各有東西前後九照廂房專以止宿各外國使人及王府公差內外官員但此館有宴㕔後堂以為待宴之所而南館無之每賜宴止在東西兩照房分待褊迫不稱乞敕工部將近日拆卸永昌等寺木料改造宴㕔於南館仍葺兩館頽壞墻屋至設宴之日該宴者諭令依次序坐未該預宴者勿令近前混擾又各處使臣多習巧詐往往交通館夫及市人不待禮部開市之期預將違禁貨物私賣近哈密等國畨人帶來玉石等貨又為姦人賒賣久不還價畨人延住經年或出外飲酒為非通事纍促起程亦被撥置奏害雖有榜禁漫不知畏乞敕禮部申嚴禁約令緝事官等訪捕如弊在通事及館夫人等則治以重罪如弊在畨人亦宜沒入違禁貨物俾知懲戒又永樂間創立四夷館內分八館俱取諳曉畨字語言教師并選各國子弟同國子監年幼監生送館習學各授官職以通各國畨情後亦取在京官民子弟教習成效授職辦事比來各館缺官既無教師訓誨又無子弟學習提督官曽以為言未得處分乞敕禮部查例舉行禮部覆奏從之覆琉球二議𢎞治三年禮部覆議琉球國中山王尚真所奏一謂本國來貢人員近止許二十五人赴京物多人少恐致踈失宜更增五人以順其情一謂本國貢船抵岸所在有司止給口糧百五十名其餘多未得給亦宜增給二十名議上從之處貢使冒濫𢎞治三年禮部言陜西行都司起送賽瑪爾堪等處貢使數多在邊則虧耗軍儲沿途則騷擾驛遞到京則㑹同館無安歇之所光祿寺患供應之難恐因循日久濫冒愈甚請令巡按監察御史查究守邊撫夷官及起送者之罪仍敕甘肅鎮巡等官今後夷人進貢須審實放入若時月人數有違舊例者諭之使回從之著為例處迤北小王子𢎞治四年正月兵部言迤北小王子比遣使來貢至大同守臣以其畨書非真不許入關續差正副使千五百人易真書復來仍乞朝廷與彼通使又言彼國有盜吾邊馬者其盜已得今以馬還意亦可嘉請候彼使還賜敕嘉其誠意并示以不可遣使往彼之故使彼等愈知感慕具奏乞比舊加賜表并貨買弓鍋鞍子織金漆襴之類宜令禮部查例覆請上從其議命五百人入京餘留於關以俟給賞一赴扣作二貢𢎞治四年五月烏思藏闡教王遣畨僧來貢一從洮州路一從四川路禮部議謂烏思藏例該三年一貢今來自洮州者是𢎞治四年該貢之數其來自四川者請准作七年貢數至七年免來其回賜王綵段表裏及給賜二起畨僧貯絲食茶等物并請如例從之定貢物應否起送𢎞治四年辛酉初迤西使臣舍音莽蘇爾奏蘇勒坦阿里瑪王另進方物詔令違禁者進收給價其餘聽其自便而莽蘇爾堅以俱進為言禮部謂宜俯順其情通將方物進入數內舊有賞例者照例給價無例者宜從內府估價給與仍諭甘肅等邊官員今後如遇迤西進貢起送之時須將上進物件儘數辨驗開批內細軟者見數印封粗重者開數通行造冊付畨使齎來以憑題進給賞庶事體歸一且免畨人奏擾從之議處畨船違礙𢎞治四年三月兩廣總督都御史閔圭奏廣東沿海地方多私通畨舶絡繹不絶不待比號先行貨賣備倭官軍為張勢越次申報有司供億糜費不資事宜禁止况畨情譎詐恐有意外之虞宜照原定各畨來貢年限事例揭榜懷逺驛令其依期來貢凡畨舶抵岸備倭官軍押赴布政司比對勘合相同貢期不違方轉與呈提督市舶太監及巡按等官具奏起送如有違礙捕獲送問下禮部議據圭所奏則病畨舶之多為有司供煩之苦據本部所見則自𢎞治元年以來畨舶自廣東入貢者惟占城暹羅各一次意者私舶以禁馳而轉多畨舶以禁嚴而不至今欲揭榜禁約無乃益阻向化之心而反資私舶之利今後畨舶至廣審無違礙即以禮館待速與奏聞如有違礙即阻回而治交通者罪送迎有節則諸番咸有所勸而偕來私舶復有所懲而不敢至柔逺足國之道於是乎在從之㑹議貢使禁約事宜𢎞治十三年㑹議禁約事宜一今後進貢使人到邊鎮巡等官收其兵器不許藏帶仍選差通事伴送務要謹慎約束不許撥置各畨生事及索取有司財物到京之後伴送人員與同通事俱要用心鈐束其禮部原委主事遵依原擬職掌事宜逐一舉行大通事每五日一次到館戒諭使人各令守分所有禮部等衙門各年事例㑹議斟酌逐一開陳一兵部委官㸃押夫牌戒諭伴送仍巡察一應姦弊工部委官㸃視器用房屋毋致損失一今後但遇貢使筵宴光祿寺堂上官提調務在豐潔整齊其朔望見辭酒飯行該日侍班監察御史巡視但有菲薄聽其舉奏一今後畨人進貢到京軍民人等敢有在街聚觀嬉戲拋擲瓦礫打傷畨人者枷責示衆一禮部主事令専一在館提督凡遇畨人到館務俾舍止得宜出入有節鈴束下人無致侵盜貿遷日期估計時價無令姦詐之徒巧取畨人財物一今後有違例將軍器貨與畨人者問擬斬罪在京在外軍民人等與朝貢使人私通往來投托賣買及撥置害人因而透漏事情者俱發邊衛充軍軍職調邊衛通事伴送人等有犯係軍職者如例係文職除名一畨人朝貢到京例許貿易五日有司拘集鋪行令將帶不係違禁貨物兩平交易若原來伴送及館夫通事人等引領各畨潛入人家私相交易者沒入價值私貨畨人未給賞者量為遞減通行守邊官員不許將曽經違犯畨人起送若夫牌鋪行人等違例私相賣買枷號示衆一在京及沿途官吏一應人等敢有將引畨人收買違禁之物及引誘宿娼禮兵二部各委官盤㸃行李驗無夾帶違禁之物方許起程議入上命通行榜諭禁約違者重責不宥約八月初旬驗放𢎞治十三年禮部以哈密及土魯畨使臣入貢太頻恐耗中國請行令陕西鎮巡等官今後遇有各處使臣入貢者俱約至八月初旬方許驗放入關每年止許一次亦不許人數過多違者治罪從之處分提督官及通事等𢎞治十四年提督㑹同館禮部主事劉綱言舊例各處外畨朝貢到館五日一次放出餘日不得擅自出入惟朝鮮琉球二國使臣則聽其出入貿易不在五日之數近者刑部等衙門奏行新例乃一槩革去二國使臣頗觖望又舊例貢使領賞之後若欲貿易聽鋪行人等持貨入館開市五日兩平交易而新例凡遇貢使開市日宛平大興二縣委官選送鋪户入館鋪户畨人兩不相投凡所賣者多非畨人所欲之物乞俱仍舊為便又新例貢使到館凡有違錯不分輕重輒參問提督主事及通事伴送人等且主事在館提督不過總其大綱與通事伴送專職者不同今一體參問情既無辜且不足以示體統於四方乞量為處分禮部議謂前二事宜如綱奏貢使到館如有殺人重事仍參問提督官其餘事情止參問通事伴送人等從之通事伴送習語例𢎞治十年禮部題覆部院應詔陳言內一欵曰禁通事除遼東近處仍差通事伴送餘如安南琉球等國各有原來通事止照日本國事例差行人一員伴送不必再差通事通事原習某國之語不許更改他國違例貢人留邊正德三年禮部言烏思藏襲封闡化王阿咱爾旺舒卜扎實扎木巴勒嘉勒燦藏布及襲職翁格都指揮諾爾節藏布進貢方物及遣人數多出於例外意圖厚賞今宜准其多者為次年貢數如例給賞指揮無年貢者裁其賞賚之半其陜西河州衛指揮使王錦等違例起送今當究治詔從之仍令今後違例進貢畨人俱拘留在邊不許濫放違者治罪土司山民無貢例正德五年廣西欎林州陸閉山山人韋觀敬赴京奏祖韋本聰等係七賢峒盤瓠子孫先年採辦土産降香蜂蜜進貢緣本州無應付腳力嵗久廢貢乞如例應付進貢禮部議以流官地方山總山老舊無貢例觀敬邊方山民宜省諭遣還毋指進貢為繇科擾其舉仍行廣西有司隨宜撫馭從之土官朝貢五事嘉靖元年禮部議處土官朝覲五事條奏一曰定賞例請自今土官遣人至京若弟姪及男進馬四匹以上及方物重者賞鈔帛以衙門品級髙下為差其進馬一二匹及方物輕者與雜職同賞若通事把事頭目人等止以馬匹方物多寡為差凡進香茶黃蠟每扛五十五斤繇布政司𫝊送者所賞生絹照數遞加違例者罷其賞二曰革宿弊言近年各土官宣撫司等差來人數太多皆非舊額所齎降香重不過七八斤而冒廪餼及絹鈔之賞至有僞造印信私增批文者自今請申明故事凡違例者所在有司遏使勿入其非布政司真印批文沿途不得資給即越赴京師皆還其貢物罷其賞賜廩餼或倚民附和為奸者以重論三曰處進馬言先朝土官進馬就所在布政司辨驗易銀貯庫以備買馬今容美宣撫司等貢馬至京往來騷擾亦非舊制自今有犯者皆罷絶之四曰明進收言頃者湖廣忠建宣撫司等土官遣把事進香鴻臚寺據引赴內府交收即有違例禁得給賞自今土官遣人至京鴻臚寺既引見上其奏仍赴本部驗進方物庶有稽考五曰防欺僞言各土官執事原有等級間或詐得賞賜歸則以恐喝夷衆中國自有紀綱不可墮其欺侮宜令吏兵二部將已襲授土官職名查報本部未襲者行巡撫亟為奏補以安畨民上皆允而行之申定限制禁約嘉靖二年禮部言賽瑪爾堪等使臣在途遷延隔嵗在京者等候同賞驛遞光祿供應不資乞行禁約限制凡夷使到館已經譯審者給與之欽賜下程待給賞後住支其見到待譯與賞後延住者與常例下程應給賞賜本部題准即行該庫給發毋得稽遲仍行該撫按官查照成化間事例於各夷回還但有與沿途軍民交市延住一日之上者該驛住支廪給軍民枷號問罪再行甘肅巡撫查核伴送人員有在途通作等弊不行鈐束催儧者從重治罪又言達思蠻長官司差來進貢并慶賀登極人員多至四百餘名乞行限制禁約每貢限百人多者革去賞賜并究起送官治罪詔可定土司朝貢例嘉靖七年湖廣容美宣撫司龍潭宣撫司朝貢夷率皆千餘所過擾害巡撫鳳陽都御史唐龍以聞於是禮部申明舊例言天下諸夷朝貢俱有定例額數腹外者邊官驗放腹裏者都布二司起送是以貢物有稱盤檢辨之詳人數有阻回存留之則惟湖廣土人來往自繇止執本土官批文驀越前來驛遞村店悉被其害今宜申嚴前例每嵗萬夀聖節止宣慰宣撫安撫司襲授職事者差人慶賀每司不過三人三嵗一覲之期自土官以下每司二人大約連宣慰等司多不過百人起送赴京不過二百餘人皆存留本政司聽賞並聽都布二司㑹驗貢馬就彼易銀貯庫方物驗中如數并具人名物數給與批咨開文遣官伴送至京物不中貢及人過其額即為阻回定以限期聖旦以節前朝覲以嵗終本部查其奏鈔與都布二司咨批相同方與賞賜應付無咨批者下法司論罪順天府給引照回仍行鎮巡官令有司刻木榜懸之所過驛遞巡司等衙門嚴加稽察雖有本土官文而無都布二司明文者即係越度執送所在官司究問解回擅與應付及不覺察者罪之詔如議行議究貢夷弊源嘉靖七年四月巡撫甘肅都御史唐澤言哈密等處進貢夷人每沿途寄住販易謀利經年不歸甚有前貢者復充後貢人數更改冒進起送者騷擾驛路有留者耗費月糧殊非中國邊防之體乞為議處禮部尚書李時覆言欲革其弊當清其源四夷入貢惟利是圖而導之為奸則伴送通事諸人是也今宜令肅州兵備及鎮巡諸司每遇貢使入關必驗其方物之數併籍諸夷年貌委官押送入京計程定限踰期者罪之及貢還則禮兵二部各委一官查核賞賜諸物有夾帶别物者俱為禁革仍令序班送至甘州驗放出關如是則禮法兼盡弊端可革而撫順柔逺之道得矣詔如議行議取西域諸夷貢嘉靖十一年土魯畨蘇勒坦阿里瑪等天方國蘇勒坦扎拉丹等賽瑪爾堪當布沙津等哈密衛襲職都督珠勒瑪齊默齊默克及額濟格依喀三等各遣使入貢謝恩共四百人以上禮部言哈密貢期故與諾延三衛相同祖宗定制皆許其一年一貢每貢不過三百人三衛皆許入京哈密則十人起送二人存留八人在邊今西域諸夷逺在萬里素非屬國難比三衛貢期而諸國遣來夷使人數過倍畨文二百餘通皆以取討牙木蘭為詞中間求索賞賜數且不資似是假托窺伺以覘朝廷處分邊臣不遵明例一槩起送有乖體法至於額濟格依喀三乃韃靼回回舊來入貢今亦遣五十餘人疑皆土魯畨部落所假請下都撫諸臣以後哈密衛合當如近例驗放土魯畨夷入貢之年分别存留起送仍出半印勘合給付使臣入京比對仍敕諸臣無得避害目前貽禍異日貪納欵之虛名失禦夷之上策庶使逺人敬憚國勢常尊上可其奏核詭冒更通事二議嘉靖十六年禮部覆甘肅巡撫趙載所議二事一言西域土魯畨天方賽瑪爾堪各國稱王者百五十餘皆非本朝封爵又額濟格依喀三原非入貢畨夷蓋西域賈胡詭立名色以徼賚豫今宜譯審酋長列使臣名數及查西夷一切事宜定為限制冒濫稱王者責令改正違例入貢者以禮阻回每國分為等第每十人許二人赴京餘留在邊聽賞一言外夷通事者以色目人為之往往視彼為親視我為疏在京則教其分外求討伴回則令其潛買禁物且諸夷之中回夷最黠其通事宜以漢人毋令交通以生夷心詔如議覆處貢夷諸議嘉靖二十四年巡撫甘肅都御史楊博疏陳議處貢夷諸事禮部議覆一㑹典及條例迤西諸夷惟哈密許每年一貢每貢三百人每十人起送一人至京其哈喇哈三土魯畨天方國賽瑪爾堪等路經哈密來者或三年五年一貢起送不過三五十人其賞賜存留一以哈密為例後每十人許起送一人亦共不得過三五十人則是於存留中多送數名其於大數固未嘗增也頃來濫放非事例之不明特奉行之未至近議和卓阿克力等起送五十人又各夷告求寬假量准再留一百人最為適中宜行邊臣自後各夷五年來朝務遵此例有因循濫放者從重論罪仍俟各夷出關省諭使知遵守一人臣無外交今邊臣取賂於外夷外夷致訟於中國悖理甚矣自今貢夷訐奏不法等事譯審明白除重大者題請差官體勘其餘俱行巡撫官從公查審問擬如律若係虛揑即坐本夷輕則戒諭重奪賞賜仍行邊官有過夷人毋許再入撫巡重臣尤宜督勵所屬以杜私交其有納賄不悛者參奏處治詔如議行議奏處日本貢嘉靖二十四年日本國貢使周良等六百餘人駕海舟百餘艘入浙江界求詣闕朝貢巡撫朱紈以聞禮部言倭夷入貢舊例以十年為期來者無踰百人舟無得踰三艘乃良等先期求貢舟人皆數倍於前蟠結海濱情實叵測但其表辭恭順且云貢期不逺若槩加拒絶則航海重譯之勞可憫若猥務含容則宗設宋素卿之事可鑒宜令紈循十八年例起送五十人赴京餘皆留嘉賓館量加賞犒省令回國至於互市防守事宜俱聽斟酌處置務期上遵國法下得夷情以永彌邊報可議處貢夷八事嘉靖二十四年十月瑪哈穆特蘇勒坦赴關欵納土魯畨夷使和卓阿克力等八百餘人因而叩關總兵官仇鸞都御史傅鳳翔不能阻回盡驗入安插於甘州故事夷人五年一貢貢夷入關半留肅州半留甘州及都御史楊博代鳳翔諸夷固欲先期起送且不願分住肅州博省諭止之仍半分其肅州住至是有詔議處博乃條上八事下禮部議覆一諸夷入關雖早今及五年之期請行起送一例當起送五十存留二百阻回五百有奇今諸夷以候久乞哀請於阻回數內更留百人減半給賞不為例一哈蜜夷使止九十三人馬止七十八匹並無夾帶請分進存起送如例一諸夷馬例止二百四十五匹令已驗收九百八十六匹當退還者七百四十一匹業已給軍給驛請償其值一方物驗退者聽於甘肅開市一貢既應期廩給五十口糧二百聽支如例所增百人亦量給口糧一各夷畨本三百餘道先令邊臣審問不合理法者退還勿奏一阻回諸夷口糧俱已住支今告稱歸途恐衛喇特部遮擊之願候貢夷與同出關住久生事端請徑自督發議入上曰貢夷事宜如議行先撫鎮官濫收入關新巡撫官不即參論並當究治鳳翔鸞姑奪俸各三月博一月兵備參將官等兩月如再失處重治不貸日本勘合給繳嘉靖二十八年日本國王源義晴差正使周良等來朝貢方物賜宴賚有差以白金錦幣報賜其王及妃初日本入貢卒以十年為期載在㑹典嘉靖二年宋素卿宗設爭貢相仇殺因閉不與通十八年復來求貢納之與約以後入貢舟無過三艘夷使無過百人送五十人入京師至是良等不及貢期以六百人來舟駕四艘部議非正額者皆罷遣之而浙江巡撫朱紈力陳不便狀禮部欲賞其百人如例非正額者皆罷勿賞良因自陳貢舟髙大勢須五百人中國商舶入夷中往往藏匿海島為寇故增一艘者護貢舟也非故違明制禮部不得已請百人之外各量加賞犒百人之制彼國勢難遵行請相其貢舟斟酌之又曰本國有𢎞治正德入貢勘合朝廷令以故勘合納還始豫新者至是良等持𢎞治勘合十五道言其餘七十五道為宋素卿子宋一所盜捕之不得正德勘合留五十道為信以待新者而以四十道來還禮部覆其簿籍脫落故勘合多未繳請勿與新者令異時入貢持所留正德勘合四十道但許存十道為信始以新者豫之而宋一所盜者令捕索以獻之報曰可疏琉球冊封事嘉靖三十八年上遣給事中郭汝霖行人李際春往琉球冊封至福建風阻未行㑹其國遣陪臣正議大夫蔡廷㑹以謝恩入貢至因稱受其世子命以海中風濤叵測倭夷不時出沒恐使者有他虞獲罪上國請如正德中封占城國故事遣人代進方物表文而身自同本國長梁炫等齎回詔冊不煩遣使巡按福建御史樊獻科以聞上下禮部議言琉球在海中諸國頗稱守禮故纍朝以來待之優異每國王嗣立必遣侍從之臣奉命服節冊以往今使者未至乃欲遙授冊命則是委君貺於草莽其不可一也廷㑹奉表入貢乃求遣官代進昧小國事大之禮而棄世子専遣之命其不可二也昔正德中流賊為梗使臣至淮安撫按官暫為留住館伴俟事寧即遣貢闕下占城國王為安南所侵竄居他所故令使者齎回敕命乃一時權宜且此失國之君也造無稽之辭欺天朝援失國之君以擬其主其不可三也梯航通道柔服之禮彼所藉口者特倭夷之警風濤之險耳不知宗賨之輸納夷使之往來果何繇而得無患也其不可四也當時占城雖領回詔勑然其王沙古卜落猶懇請遣使為蠻夷光重且廷㑹非世子面命又無印信文移若遽輕信其言萬一世子以遣使為至榮謂遙拜為非禮不敢受封復上書請使占城將誰任其咎哉其不可五也乞令福建守臣以前詔從事便至於未受封而先謝恩亦非故典宜令聽其入貢方物其謝恩表文候世子受封之後然後遣使上進庶中國大體以前而四夷觀望可肅上從部議詳審入貢名種殊常嘉靖十一年十月禮部題該總制都御史唐龍題准甘肅鎮巡等官趙載等㑹查得正德十三年有北山喀三王差使臣都爾蘇等通路進貢今日喀三即前日喀三彼時稱北山則方禺也今稱額濟格依則地名也即此而論則額濟格依喀三雖非原進貢畨夷已於正德十三年進貢一次乞敕該部再加酌議合無准令照依賽瑪爾堪等事例量于來使之中起送數名以示柔逺人之意若以名稱尚殊詐冒難免亦行鎮巡官以禮遣回給過軍人馬匹仍要平償其價酌於夷情參於事例通行奏請取自聖裁等因抄呈到部看得總制都御史唐龍題稱據甘肅撫夷百户沙文等譯審得喀三王差來正副使實喇烏蘇等供稱本夷原係賽瑪爾堪地面人分在北山地名額濟格依寄住先曽已經進貢意欲照例量行起送臣等檢閲堂官當年畨文所稱喀三王差來使臣都爾蘇等實未嘗到京今據其詞未可輕信若許其入貢則賽瑪爾堪載在㑹典見今已行照例起送夷使和卓瑪哈穆特等在途并存留男婦共一百六名豈有一國而二王一次而兩起進貢之理况既譯審係賽瑪爾堪地面人分在北山寄住緣何不將賽瑪爾堪進貢夷使對審明白既稱寄住北山則即賽瑪爾堪部落豈可擅自稱王擅求入貢倘因容貢之後他日與賽瑪爾堪抗衡爭長兵連禍結責將誰歸但係該邊守臣失於稽查覺察遂將所進馬匹已行給軍騎操今守候日久似難遣回合無暫照依賽瑪爾堪事例量行起送數人進京其餘存留在邊聽候給賞以全朝廷柔逺之道往後入貢年分止許附搭賽瑪爾堪同來不許别稱王爵自分國土有違國典再照鎮巡等官先因諸夷入貢名種殊常畨文煩叠便當加詳譯審研究來厯􅊀稽國典遵照事例處分為是今既失策於前事遂難處於後既不能深察夷情又不肯力扶國體則邊方重寄所賴何人合行鎮巡官今後務要慎重邊防保全大體毋或好大喜功召侮啓釁斯為禦戎上策仍乞申勑總制官重加省諭庶夷人知警事出萬全夷裔畏服而中國常尊矣題奉聖㫖這夷人既守候日久今次暫准照例起送數人入貢以後但只著附搭賽瑪爾堪進貢不許别稱王爵有違國典還說與總制并鎮巡官員今後遇有諸夷人貢務要詳加譯審遵照事例處分勿得輕易許納致虧國體欽此議覆北部請乞隆慶六年總督尚書王崇古為北部順義王諳達請乞四事其一請給王印如先朝封忠順王例其二請許貢使入京比於三衛每官酋貢使二人都督大酋四人諳達十人總六十人貢馬三十匹其三請給鐵鍋議廣鍋十斤煉鐵攙半尚未可為兵潞鍋生粗煉之倍折每十斤得鐵三斤宜可給與令其以壞易新其四請撫賞國中親屬不過每部草人給紬段二匹布十匹米一石又春貢時部給布段百匹米豆一二百石散所部窮夷塞上仍許不時小市布帛米豆等物疏入兵科給事中梁問孟等以為彼中食用必資於鍋即與之互市固無害顧撫賞之論不宜輕許人衆費多靡有止極彼習以為常將謂嵗例異時議增不可得減必有轉輸之患且彼數十萬人中國豈能盡衣食之禮科給事中陸樹德亦言貢使入貢之京有五不可凌虐驛遞一也爭忿啓釁二也京師之內館穀濶略酋如不逞損威傷重三也窺伺動靜四也今來雖少後必漸多如水穿竇勢難即塞五也且彼獨要賞賚耳當足其欲雖不入衛何怨其欲未厭即限之數無益夫以酋來王而使道路增防京師多事豈得策哉宜如近事代為之進便吏科都給事中雒遵等亦皆以為不可許兵部因㑹户禮二部共議乃覆言順義王印宜如崇古鑄給凡表章俱用印恭進其貢使入京僉謂不可苐故事夷人入京必欽賜筵宴簡命勳臣以待且厚其賞今順義王使至邊宜遣光祿署丞賫賞物就給令本鎮具欽賜宴筵總兵待之如禮其議廣潞二鍋雖有精粗之别而均犯出禁之罪無已則銅鍋代之昔見肅酋皆以銅鍋炊夜則用之司警宜令總督市給其諳達親屬及窮夷之賞以有限供無窮非處之得宜不可以久宜令總督審畫一之法勿靳勿濫如各鎮原議撫賞銀不足令以減哨及原給公費賞功銀充之仍聽每鎮更支客餉萬兩上從之禮部志稿卷九十
