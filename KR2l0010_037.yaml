body:
  text: 禮部志稿卷三十七明俞汝楫編主客司職掌給賜賜在京文武官員人等公差附登極賜凡皇上登極賜在京文臣羣臣及軍民人等銀絹布鈔宣德十年公銀六十兩侯伯駙馬五十兩一品二品四十兩三品二十兩四品至五品遞減五兩六品至八品遞減二兩九品四兩雜職三兩故侯伯之家及未承襲者各十兩將軍校尉軍匠人等各二兩優給幼官并紀録幼軍各照本等例減半辦事官監生生員人材吏典隂陽醫士樂人各絹一匹在京廂民工匠厨役僧道人等各布一匹營造山陵軍人鈔一百貫乾魚三斤聽選公差及四夷朝貢人員各賜鈔有差𢎞治十八年公侯駙馬伯銀二十兩一品二品十五兩三品十兩四品八兩五品六兩六品七品五兩八品九品四兩雜職三兩操備及營操官員皆同故侯伯之家及未承襲者各五兩優給幼官及鰥寡老疾軍官一品二品銀六兩三品四兩四品五品三兩六品以下二兩雜職一兩優養軍官母妻見存者各銀二兩將軍旗校軍匠馴象養馬人等及操備等項旗軍其軍各銀二兩紀録幼軍各銀一兩辦事官監生生員天文生樂舞生醫生各絹一匹在京吏典知印承差坊廂里老民匠厨役樂人各布一匹聽選公差官員人等各賜鈔有差正德十六年公侯駙馬伯銀三十兩一品二品二十五兩三品十五兩四品十二兩五品及七品遞減二兩八品九品四兩雜職三兩優給幼官及鰥寡老疾軍官一品二品銀八兩三品五兩四品四兩五品三兩六品以下二兩雜職一兩故侯伯家及優養軍官母妻以下俱準𢎞治十八年例會試中式舉人各絹一匹隆慶元年公侯駙馬伯紵絲四表裡文官一品至九品各給與應得誥敕先已給領者與進應得勳階一等品同職銜不同者照見任改給署職者與實授試御史試中書候實授庶吉士候授官之日各補給其有願移封者聽若先已移封今給與本等誥敕武官一品二品三表裡三品二表裡四品一表裡五品六品各紵絲一匹雜職絹一匹試鎮撫百戶各絹四匹史館官生禮部鑄印局儒士順天府學生四夷館譯字生錦衣衛聽差并營操舍人欽天監天文生太常寺樂舞生太醫院醫士武學官生每名絹一匹優給優養官一品二品銀五兩三品四兩四品五品三兩六品以下二兩優養軍官母妻每口銀二兩將軍旗較力士軍匠馴象養馬及操備等項旗軍勇士并營操家丁每名銀二兩紀録旗較力士幼軍每名銀一兩修理山陵官軍官照前給與表裡絹匹軍每名二兩其已支領者不許重支各衙門歷事監生正歷免二箇月雜歷免一箇月長差三箇月見在監者先造册送吏部候撥歷到部之日照數減免各衙門辦事官免辦一箇月知印并各當該吏三箇月承差并辦事吏二箇月周嵗辦事吏一個月罰班官吏每一年減一箇月其見在聽撥當該辦事者吏部各造册案候著役之日照數減免隂陽人醫生順天府坊廂里老各衙門民匠及厨子樂工每名綿布一匹各邉軍每名銀二兩差官往各鎮頒給六年賞如元年例內增雜職并太常寺冠帶協律郎等官每員絹二匹東宫帶刀舍人賞同東宫各衛侍衛舍人應襲并書寫應舍每名絹一匹翰林院習字生員三大營侯伯應襲舍人及內官監冠帶匠役賞同織染局種藍軍匠每名銀一兩纂修賜凡修實録永樂元年賜監修官銀一百兩綵幣六表裡織金紗衣一套鞍馬一副總裁官銀八十兩綵幣四表裡紗衣一套催纂兼謄寫官銀三十兩綵幣二表裏紗衣一套催纂官銀二十五兩綵幣二表裏紗衣一套謄寫監生生員儒士各銀十兩鈔三十錠綵幣一表裏謄寫吏各銀八兩鈔三十錠綵幣一表裏催督謄寫官鈔二十錠絹二匹辦事吏各鈔二十錠絹一匹𢎞治四年賜監修官總裁官各銀八十兩綵幣四表裏羅衣一套鞍馬一副副總裁官銀八十兩綵幣四表裏羅衣一套纂修官銀三十兩綵幣四表裏羅衣一套催纂官銀二十兩綵幣二表裏羅衣一套謄録官銀十五兩綵幣二表裏羅衣一套收掌文籍官銀十兩綵幣二表裏謄録監生銀五兩綵幣一表裏辦吏事典鈔二十錠絹一匹各色人匠鈔二十錠布一匹官升擢事故去任及監生事故去者久近不一賞賚有差嘉靖四年賞如𢎞治四年例惟纂修官收掌文籍官各減一表裏續添謄録官賞如監生萬厯二年賞如嘉靖四年例其羅衣一套折衣羅三匹收掌官賞銀十五兩綵幣二表裏折衣羅三匹史館謄録官銀十兩綵幣一表裏譯字官生生員掌如監生史館官吏及較尉賞如辦事吏典貼寫官吏賞如各色人匠五年增稽考參對官內侍郎賞如纂修官修撰等官賞如收掌官凡修玉牒萬厯四年賜內閣元輔銀四十兩大紅紵絲四表裏新鈔五千貫次輔各銀三十兩大紅紵絲三表裏新鈔三千貫修較官各銀二十兩大紅紵絲一表裏新鈔二千貫查對官銀十五兩謄録官各銀十兩俱大紅紵絲一表裏新鈔一千貫經筵賜凡經筵初開知經筵同知經筵并侍班官各賜銀五十兩綵幣四表裏鈔五千貫通政大理侍班官并講書官各銀三十兩綵幣二表裏鈔三千貫展書官各銀二十兩綵幣一表裏侍儀并寫講章官各銀十兩紵絲一表裏俱鈔一千貫大漢將軍各絹一匹仍時賜閣臣蠎衣一襲日講官各大紅織金羅衣一襲或冠帶無常視學賜成化元年駕幸太學後三日賜襲封衍聖大紅織金麒麟紵絲衣一套犀帶一條紗帽一頂顔孟二博士青織金雲鷺紵絲衣一套玳瑁帶一條紗帽一頂三氏族人俱素紵絲衣一套講官祭酒司業各照官品大紅織金紵絲衣一套羅衣一套監丞以下各青織金紵織衣一套監生鈔各五錠吏典二錠後俱如例耕藉賜𢎞治元年賜終畝農人各布一匹萬厯八年賜三公九卿紵絲一表裏牽牛老人六名各布二匹從耕老人三十六名各布一匹教坊司官五員各銀一兩念禾詞官人二十二員名各銀五錢執旗俳色長三百一十三名各銀三錢大閲賜遣閲營操附隆慶三年大閲前三日賞軍士銀每名三錢閲射分四等其一等馬步箭全中者官賞銀十兩銀牌一面紵絲二匹折銀五兩內平日無過有薦者仍紀録起用軍賞銀一兩紅布三匹折銀一兩馬全中步中四五箭者官賞銀五兩銀牌一面色段二匹折銀三兩內無過者亦紀録敘用軍賞銀一兩紅布一匹折銀三錢馬步二箭至三箭者官賞銀三兩銀牌一面色紗一匹折銀一兩軍賞銀一兩二等馬二箭三箭步一箭者官賞銀一兩五錢銀牌一面軍賞銀四錢其三等馬中而步不中或步中而馬不中官準策勵供職軍免責治若馬不中步中三四箭以上者賞如二等其四等馬步俱不中公侯伯等罰住祿米三箇月錦衣衛并各衛願射官罰俸三箇月營中將領等官罰俸半年內有過者革任軍照例決打若係教師家丁仍革支月糧一石軍士放火器舞刀鎗鈎鐮亦分四等賞罰頒賞之日仍賞總協戎政大臣各銀二十兩紵絲三表裏巡視京營科道各銀十兩一表裏凡遣官閲視團營官軍嘉靖二年令馬步中箭一等者俱賞鈔三百貫劣等罰俸凡團營操演步射火銃俱懸銀牌每一面三錢中即賞之册立賜𢎞治五年册立東宫文武官各分五等一等賜紵絲二表裏二等至四等一表裏五等一匹南京同公差等項官亦同京衛外衛見操官軍及侍衛帶刀直宿錦衣府軍等衛御馬監并武驤左等四衛官舍將軍旗軍勇士午門等門并正陽等九門官軍各銀一兩錦衣等衛所官各絹一匹力士旗較軍奴并監局軍匠各米一石內府軍厨民匠太常光祿寺厨役各米七斗節令賜時鮮附洪武十六年令在京文武官吏人等正旦元宵節錢支與胡椒斤兩不等十七年令冬至節錢支鈔不等二十二年重定賞例公侯伯鈔十錠武職一品二品七錠三品至八品五錠文職二品至六品六錠七品至九品三錠未入流官二錠監生一錠俳色長一錠樂工二貫樂舞生二貫各寺首座住持一錠衆僧一貫二十六年令聖節在京官吏監生軍民僧道並賜鈔近例惟閣臣及日講官吏特賜銀幣有差永樂二十二年令皇親過節令照例賜鈔若大臣不預宴公侯伯都督尚書賜鈔一千貫侍郎五百貫宣德正統以後遇節令文武官及外夷人員并國師以下除有宴外其餘官吏人等俱照例關支節錢官并監生鈔一錠儒士知印吏典僧道樂工二貫若奉旨免宴關與節錢大小官員各鈔一錠遂為定例嘉靖七年賜文武官制錢當鈔公侯并一品二百文內閣衍聖公張真人同二品三品一百文四品至六品九十文七品至九品七十文其餘及朝覲官吏錢鈔中半鈔一貫折錢二十一文凡端午節文武百官俱賜鈔并五綵夀絲縷大臣及日講經筵官或别賜牙邉扇并綵縧艾虎等物各以品級為等嘉靖中內閣輔臣吏禮二部尚書及日講官講衍義官又别賜川扇有差凡各處嵗進時鮮如鰣魚笋藕枇杷楊梅之類賜文武大臣及日講官各以品級為等慶賀賜凡各王府差來進表箋人員每人賜盤纒鈔一錠南京并在外三司官及諸司差來人員各五錠各王府差來進禮物人員二十錠其王府內外官員每員內府别給綵段一表裏鳳陽等處皇陵祠祭署官員社長土民陵民女戶人等朝貢到京鈔十錠南京并三司官進表回辭朝别賜鈔出自特恩扈從賜凡聖駕初祭南郊賜陪祀官大紅織金紵絲衣物謁陵大閲賜內閣蠎衣等服色及鸞帶金銀瓢繡袋無常文武大臣日講官侍從供事宜綵幣鸞帶等物有差以後不賜若閣臣初次不預後扈從者補賜特恩賜凡文武大臣考滿有賜羊酒錠鈔者以品級為等或賜宴及敕諭者出自特恩凡文武大臣患病有賜羊酒米蔬等物文職大臣致仕有賜敕及銀物等項者皆出特恩給假賜凡日講官以省親省墓等項給假例賜白金綵幣鈔錠其在京官員給假省親賜路費鈔一品二品五千貫三品四千貫四品三千貫五品二千貫六七品一千貫八九品并雜職五百貫公差賜凡總兵鎮守提督巡撫等官辭朝例賜銀幣寶鈔等物各以事之輕重為等凡文武大臣奉旨勘事回還及督工選軍審囚等項事畢賜鈔幣羊酒等物各以事之輕重為等賞功賜各處獲功鎮巡總兵等官俱從兵部咨開欽賞數目到部銀兩行司禮監表裏行內承運庫關出付公差人員齎給其官旗軍舍人等亦從兵部奏定加賞給賞量賞詳在武選司移咨到部仍查各地方賞格關出付公差人員齎給各巡撫衙門造册奏繳仍咨禮部查考嘉靖四年題準功賞數少付公差人員順齎遇有數百兩以上綵段數百匹以上本部照例委官一員齎去交割各處巡撫官仍將領過賞賜年終造册類報隆慶二年題準欽賞銀兩表裏等件通發各該總督巡撫衙門投驗給散除總兵官具疏謝恩外三司將佐等官將領過賞賜申報督撫衙門造册類奏其赴部領賞員役驗有彼處真正批文方準給發將原批上填寫數目用印鈐蓋各該督撫衙門年終將給散過各官數目姓名類册奏報仍咨禮部以慿查考受賞人員或以事到京許親告領仍取領狀附卷若升去新任地方聽督撫官轉齎新任處督撫衙門一體查給類册奏報每年三月終通將前一年賞賜無回報者咨行各該督撫稽查未到者即拘原役究問仍通將已到未到偹咨禮部查考萬厯六年題準功賞銀年逺無人關領者交還內庫雜給賜凡王府求討書籍藥材等物及書院樓堂等名皆請自上裁大臣亦間有賜者俱屬祠祭司掌行几親王為本府承奉請給服色查其年久勤勞有功請自上裁年勞不及者不與凡欽天監觀象臺官生𢎞治元年奏定每二年一次給與禦寒毛襖冬初具題行工部關領凡大漢將軍襯甲服色舊例五七年一次換給正德十三年令三年一給每四員名共大紅紵絲五表裏紗羅同凡在京軍民家選中侍女進入內廷者嘉靖二十六年準收充女戶食糧免差仍各