body:
  text: 禮部志稿卷二十八明俞汝楫編祠祭司職掌薦諡號永樂元年上太祖髙皇帝髙皇后諡號儀前期三日齋戒遣官祭告天地宗廟社稷鴻臚寺設册寶輿及香案于奉天殿是日早內侍先以册寶置于殿太常寺先設册寶案于太廟門外丹陛上皇考皇妣神御前各設册寶案鴻臚寺設册寶輿于奉天門外御道上錦衣衛設鹵簿教坊司設中和韶樂大樂如常儀文武百官具祭服詣太廟門外立俟執事官并宣册寶官先從太廟右門以序立于殿右上具冕御華蓋殿捧册寶官四員各具祭服于奉天殿東西序立鴻臚寺奏請行禮導駕官導上出奉天殿册寶案前捧册寶官各捧寶册前行導駕官導上行至奉天殿丹陛上捧册寶官各以册寶置綵輿內鹵簿大樂前導上乘輿隨綵輿後行至午門外降輿升輅至太廟門文武百官皆跪俟綵輿過興上降輅隨綵輿至太廟中門外置綵輿于中道捧册寶官各于綵輿內取册寶前行上隨行至丹陛上捧册寶置于案典儀唱樂舞生就位執事官各司其事內贊奏就位導引官導上就拜位典儀奏迎神奏樂樂止內贊奏上四拜百官同典儀奏進册寶捧册寶官以次捧册寶前行導引官導上行由左門入至廟中捧册寶官序立于執事官及宣册寶官之前導引官導上詣皇考妣神御前奏跪奏搢圭奏進册捧册官以册跪進於上左上受册以册授執事官置於案左奏出圭贊宣册宣册官跪宣于上左訖奏搢圭奏進寶捧寶官以寶跪進於上左上受寶以寶授執事官置於案右奏出圭贊宣寶宣寶官跪宣于上右訖上復位奏四拜文武百官皆四拜興行祭禮如常儀次日頒詔嘉靖十七年上成祖文皇帝睿宗獻皇帝廟號儀是嵗上肇舉明堂大享禮奉皇考配帝乃告于郊廟社稷以九月十一日尊太宗廟號為成祖諡曰啓天𢎞道髙明肇運聖武神功純仁至孝文皇帝尊皇考廟號為睿宗諡曰知天守道洪德淵仁寬穆純聖恭儉敬文獻皇帝同日異時行禮先期四日太常寺奏致齋太常卿同光祿卿奏省牲如常儀次日司設監設大次于南郊外壝神路之東又次日上常服御奉天門錦衣衛備隨朝駕上至南郊即大次易服詣圜丘奏告文武官例該陪祀者具祭服于南天門外陪拜其原遣北郊太廟成祖廟昭羣廟穆羣廟睿宗廟社稷壇祭告官以是日具祭服行禮先期一日內侍官設册寶案四于奉天殿册東寶西設册寶綵輿四于丹墀內設香亭于册寶輿前教坊司設中和韶樂及大樂錦衣衛設鹵簿大駕并舉輿亭官校司設監及太常寺官設册寶案于成祖廟睿宗廟各神座前設上拜位于二廟殿內正中設具服御幄于二廟戟門左是日早免朝鳴鐘文武百官具朝服于金水橋南東西向序立文官五品以上武官四品以上六科都給事中皇親指揮以下千百戶等官各具祭服于廟街門內北向序立上冕服御華蓋殿鴻臚寺官奏請行禮導駕官導上隨行至丹陛下鴻臚寺堂上官捧册寶各置於輿內上出奉天門降轎升輅侍衛鼓吹如儀導駕官退册寶輿至金水橋南文武百官皆跪候過興隨至廟街門退册寶輿入廟街門陪祀官皆跪候過興上至太廟門降輅册寶輿至二廟門外太常寺堂上官四員捧册寶由中門入至神御前東西向立册東寶西陪祀官先赴成祖廟丹墀內東西序立太常寺導引官導上至成祖廟左門由殿左門入寢殿左門請主出正殿奉安安訖典儀唱樂舞生就位執事官各司其事內贊奏就位上就位迎主上香奏四拜俟上至册寶案前內贊奏進册寶捧册官以册跪進于上右上受册獻訖仍授捧册官置于案捧寶官以寶跪進于上左上受寶獻訖仍授捧寶官置于案內贊奏宣册太常寺官取册跪于上右宣訖置於案內贊奏宣寶太常寺官取寶跪于上左宣訖置于案俯伏興復位奠帛行初獻禮以後俱如常儀禮畢上捧主太常寺官捧册寶先行詣寢殿奉安訖導引官導上出太廟門東乘板橋詣睿宗廟上至廟門外降轎至戟門外太常寺導引官導上由左門入上册寶如成廟儀畢太常卿跪奏請睿宗獻皇帝謁祖祔享遣官捧神主降座升輿祔享于太廟儀具升祔下祝文維嘉靖某年嵗次某月某朔某日孝玄孫嗣皇帝某敢昭告于成祖啓天𢎞道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明莊獻配天齊聖文皇后曰適玄孫躬率羣臣加上聖號既畢宣奏之禮用申燕賀之情惟我皇祖永歆孝念尚享樂章迎神泰和之曲天眷不遲誕降我皇祖夙秉文德聿昭聖武壤除姦凶戢寧寰宇維典章未備繄孝孫是補大號鴻名卓絶千古寶册攸躋精禋斯舉將降休兮聖靈騰爐煙兮燎炬尚來格來歆以篤天之祜舉册寶熙和之曲於穆文祖貽我丕基昊天罔極永言孝思爰薦徽稱以協民彛勒賁琬琰昭哉厥辭以詔于萬世神其聽之初獻夀和之曲制帛孔純滌牲腯肥黍稷醴饈蠲潔芬馡穆穆孝孫敬德淵微獻享初存仰威顔其靡違亞獻豫和之曲于戚武成於昭神功文致太平沕穆皇風樂舞既遷禮儀肅雍奠獻再將致其孚顒願申佑我孝孫萬福攸同終獻康和之曲三爵既登禮秩斯成駿奔就列虎拜盈庭匪臣工之虔孝孫之德孔明鍚皇釐于普天奠邦家兮永寧徹饌永和之曲古禮之經有儀有節將享既終登歌以徹祀事初成神人胥悅維孝孫之𠂻情猶纒綿其糾結送神安和之曲髙皇謨烈我祖是成誕垂裕于後昆孝孫是徵稽古酌今恭薦兹尊稱奕奕閟宫嵗事有恆子子孫孫百世其承之睿廟樂章迎神泰和之曲於皇烈考濬發虔源欽明宣哲敦德允元克昌厥祚以釐我子孫筮薦徽稱惟大德是尊惟烈考鑒兹臨享如存舉册寶熙和之曲月吉兮辰良薦鴻號兮受命漙將日星赫奕兮玉册輝煌啓中興兮七葉頌貞符兮萬方初獻夀和之曲載清酤兮犧尊瑟笙喤喤兮鐘鼓於論樂一奏兮爵一獻靈來享兮鑒兹熏熏亞獻豫和之曲瑶觴濯兮玄酒登懷明德兮薦椒馨繄昭考兮陟降在庭顧孝享兮靈心載寧終獻康和之曲三獻畢陳八音舉百辟相豫祀事毖愛敬極兮揚名始冀皇考兮綏孝子徹饌永和之曲笙鏞止豆籩徹禮莫愆孝靡竭神具醉兮以莫不懌賚我思成兮純嘏是鍚降座安和之曲神之來思天路修神之去思路寢幽幽既安既妥兮靡淹留奠宗祊兮永鍚洪庥改題成祖睿宗神主儀先期司設監設香案于成祖睿宗二廟寢殿神龕前設題主案于東置淨水刷子粉盞筆墨于上又設盥盆帨巾于東是日早免朝鳴鐘文武三品以上武官公侯駙馬伯皇親指揮各具吉服于廟街門北向序立候駕至陪拜上具翼善冠黃袍乘板輿至太廟門右降輿導引官導入成祖廟左門由殿左門入寢殿上就位上香一拜叩頭畢至神牀前跪太常卿跪奏請成祖文皇帝神主恭用奉題上神主前捧主安于東案上上復就拜位北向立內侍官冼去舊字别塗以粉中書官書寫題主官盥手西向奉題訖上奉安于座跪太常寺卿跪奏請成祖文皇帝神靈上神主降殿奉享上捧神主導引官導出正殿奉安于神座上就拜位典儀唱迎神導引官導上至香案前三上香訖奏復位內贊奏四拜傳贊同典儀唱奠帛行初獻禮上至神御前奠獻訖詣讀祝位讀祝官讀訖奏俯伏興平身傳贊同奏復位典儀唱行亞獻禮儀同初獻惟不讀祝唱行終獻禮儀同亞獻太常寺卿詣神御前跪奏禮畢請還宫內贊奏四拜興平身傳贊同典儀唱捧祝捧帛各詣燎位內贊奏禮畢上捧主詣寢殿奉安訖導引官導出太廟門東乘板轎至睿宗廟門降轎導引官導上由廟左門入行禮如成廟儀禮畢上還宫祝文維嘉靖某年嵗次某月朔某日孝玄孫嗣皇帝某敢昭告于成祖啓天𢎞道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明莊獻配天齊聖文皇后曰爰用是辰恭題神主更書御號奉慰安神仰惟我祖萬􅑤永依玄孫無任瞻仰之至謹告睿宗祝文同改孝玄孫為孝子我祖為我考嘉靖十七年加上太祖髙皇帝髙皇后諡號儀是嵗上既尊皇天上帝泰號遂以其日加上皇祖諡號曰太祖開天行道肇紀立極大聖至神仁文義武俊德成功髙皇帝髙皇后諡號曰孝慈貞化哲順仁徽成天育聖至德髙皇后恭上册寶于太廟先期上親奏告于皇天上帝分命大臣告于北郊太社稷帝社稷翰林院撰祭告文太常寺辦牲醴如時祫儀命捧册捧列聖主大臣八員司設監設册寶案四于奉天殿册東寶西設册寶綵輿四于丹陛上設香亭于册寶輿前教坊司設中和樂大樂錦衣衛設鹵簿大駕并舉輿亭官校司設監及太常寺官設册寶案于太廟神座前設上拜位于殿內正中至日上捧皇祖主中宫捧髙皇后主助行亞獻文官四品以上武官三品以上命婦隨班列東西近兩廡稍北障以帷幕俱先期由東安門入太廟候親王功臣設位兩廡用酒果脯醢不奠獻是日文武百官先具朝服于金水橋南東西向立其陪祀文武等官各具祭服于廟街門北向立上冕服御華蓋殿鴻臚卿奏請行禮導駕官導上出至奉天殿內侍官捧各册寶置于案鴻臚寺官舉案由殿中門出導駕官導上隨行至丹陛鴻臚寺官捧册寶各置于輿內錦衣衛官督舉輿上乘板轎出奉天門降轎升輅侍衛鼓吹如儀導駕官退册寶輿至金水橋南文武百官皆跪候過興隨至廟街門退册寶輿入廟街門內陪祀官皆跪候過興上至太廟門降輅册寶輿至丹陛下太常寺堂上官二員捧皇祖册寶內侍官二員捧髙皇后册寶由中門入至神御前東西向立太常寺導引官導上由殿左門至寢殿上捧皇祖主中宫捧髙皇后主出正殿升座捧主官捧列聖主去匱東西向立典儀唱樂舞生就位執事官各司其事內贊奏就位典儀唱迎神樂作內贊對引官導上至香案前三上香訖復位四拜傳贊百官同典儀唱舉册寶樂作奏跪傳贊同樂暫止捧册官以皇祖册跪進于上右上受册獻訖仍授捧册官捧册官以髙皇后册跪進于上左上受册獻訖仍授捧册官捧寶官以皇祖寶跪進于上右上受寶獻訖仍授捧寶官捧寶官以髙皇后寶跪進于上左上受寶獻訖仍授捧寶官典儀唱宣册宣册官二員以次跪宣訖置于案唱宣寶宣寶官以次跪宣訖樂復作內贊奏俯伏興平身傳贊同捧主官各恭捧列聖主升座典儀唱奠帛行初獻禮樂作內贊對引官導上至神御前奏獻帛獻爵訖奏復位捧主官詣各廟上香獻帛獻爵訖奏跪傳贊同贊讀祝讀祝官讀祝樂作奏俯伏興平身傳同贊樂止典儀唱行亞獻禮樂作女官奏禮中宫獻太廟爵皇妃八氏獻八廟爵儀同初獻惟不讀祝樂止典儀唱行終獻禮樂作儀同亞獻樂止太常卿唱賜福胙上飲福受胙訖俯伏興復位奏四拜傳贊同典儀唱徹饌太常卿詣神位前奏禮畢請還宫內贊奏四拜傳贊同捧祝捧帛各詣燎位樂作樂止俱如常禮畢上捧皇祖主中宫捧髙皇后主太常并內侍官捧册寶詣寢殿奉安捧主官捧列聖主各詣寢殿奉安訖上還宫大樂鼓吹振作祝文維嘉靖某年嵗次某月朔某日孝玄孫嗣皇帝某敢昭告于皇祖太祖開天行道肇紀立極大聖至神仁文義武俊德成功髙皇帝孝慈貞化哲順仁徽成天育聖至德髙皇后曰適尊聖諡宣獻既成奉列聖帝后來賀玄孫躬率婦皇后方氏暨文武羣臣偕其命婦敬申祭慶之情惟冀聖神之鑒永享尊稱大膺洪號玄孫某無任激切率籲之至尚享樂章迎神泰和之曲繄中夏之遘艱兮冦為羣皇天厭亂兮眷求大君降錫元命兮挺生聖神惟我太祖兮首出人倫一戎衣奄四海兮為帝王真舉册寶鴻和之曲皇祖受命兮闢乾坤翦滅羣雄兮定中原陳常時夏兮佑我元元克配彼天兮功髙業尊寅薦册寶兮鑒我曾孫初獻崇和之曲苾彼玉瓉兮酌黃流敬而將之兮冕凝旒有赫在上兮右享羊牛保我子孫兮永荷鴻庥亞獻豫和之曲於皇祖兮帝中華廊清氛祲兮一統為家