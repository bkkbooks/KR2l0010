body:
  text: 禮部志稿卷十一明俞汝楫編儀制司職掌册立册立有中宫有東宫有親王及妃嬪公主歷朝儀各不一今詳書之而附皇子女誕生命名之儀於後皇后册立儀册后之禮洪武初不預祭告不特頒詔永樂始舉行而嘉靖又詳謁廟之儀至隆慶大備已洪武初定遣使册立前期一日內使監設御座於奉天殿如常儀尚寶卿設御寶案於御座前侍儀司設册寶案於御寶案之南册東寶西設奉節官位於册案之東設掌節者位於奉節官之左稍退俱西向設承制官位於奉節官之南西向設奉册奉寶官位於册寶案之西東又設副使受制位於橫街之南北向東上設承制官宣制位於副使受制位之北西向設奉節官奉册奉寶官位於副使東北西向又設副使受册寶褥位於受制位之北北向典儀二人位於丹陛上之南贊禮二人位於副使受制位之北知班二人位於贊禮之南俱東西相向設文武百官侍立位於文武樓之北文武侍從班位於殿上之左右引文武班舍四人位於文武官之北稍後引禮二人位於副使之北拱衛司宣徽院官對立位於受天殿門之左右俱東西相向將軍二人位於殿上簾前將軍六人位於奉天門之左右又將軍四人位於丹陛上之四隅又將軍六人位於奉天殿門之左右俱東西相向鳴鞭四人位於丹陛上北向是日金吾衛陳設甲士儀仗於午門外之東西拱衛司陳設儀仗於丹陛丹墀之東西和聲郎設樂位於丹墀之南禮部設龍亭儀仗大樂於奉天門外正中以俟迎送册寶至中宫質明鼓初嚴催班舍人催百官具朝服導駕官侍從官入迎車駕次嚴引班舍人引文武百官入就侍立位引禮引副使具朝服入就丹墀受制位諸執事者各就位三嚴侍儀奏外辦御用監奏請皇帝服衮冕御輿以出尚寶卿前導侍從警蹕如常儀皇帝將出仗動大樂鼓吹振作至奉天殿升御座樂正尚寶卿以寶置於案捲簾鳴鞭報時雞唱訖禮部官捧册寶各置於案奉節官奉制官奉册奉寶官各掌節者各入就殿上位西向立定舉册寶案四人入立於奉册奉寶官之後典儀唱鞠躬樂作四拜平身樂止承制官進詣御座前跪奏請發皇后册寶承制訖繇中門出中陛降至宣制位稱有制典儀唱跪副使跪承制官宣制曰册妃某氏為皇后命卿等持節展禮宣訖繇殿西門入復位贊禮唱俯伏興奉册奉寶官率執事者舉册寶案繇中門出中陛降奉節官率執節者前導至副使受册寶褥位以案置於褥位之北册東寶西掌節者脫節衣以節授奉節官奉節官搢笏受節以授册使册使搢笏跪受以授掌節者掌節者跪受興立於册使之左奉節官出笏退引禮引册使詣受册褥位立定奉册官搢笏就案取册以授册使册使搢笏跪受册復置於案奉册官及册使皆出笏退復位引禮引副使詣寶褥位奉寶官搢笏就案取寶以授副使副使搢笏跪受寶興復置於案副使及奉寶官皆出笏退復位典儀唱鞠躬樂作四拜興平身樂止引禮引册使押册副使押寶掌節者前導舉案者次之初行樂作出奉天門樂止掌節者加節衣奉册寶官皆搢笏詣案取册寶安置龍亭中奉册寶官退執事者舉案退儀仗大樂迎龍亭以行執節者行於龍亭之前副使行於龍亭之後迎送至中宫門外初册寶將出門侍儀跪奏禮畢皇帝興樂作還宫樂止引班引文武官以次出受册受賀前一日內使監官陳設皇帝御座於中宫殿上如常儀設香案於殿庭之正中設權置册寶案於香案之前册東寶西設皇后受册寶位於册寶案前北向設司言司寶二人位於皇后位之北設奉册寶內官位於册寶案之南設讀册寶內官位於奉册寶內官之南設內外命婦賀位於殿中北向尚儀二人位於皇后拜位之北司贊內官二人位於內外命婦立位之北俱東西相向又設權置册寶案於中宫門外設內使監令位於案之東西向設奉册奉寶內官位於內使監令之左右稍退俱西向副使位於案南北向引禮二人位於副使之前東西相向掌節者位於册使之後其日所司設儀仗於殿庭之東西擎執於殿上之左右樂工陳樂於殿庭之南册寶將至中宫門尚儀奏請皇后首飾褘衣出閣樂作至殿上南向立樂止司言司寶立於後及册寶至宫門副使於龍亭中取册寶權置於門外所設案上引禮引副使及內使監令俱就位立定次引册使於內使監令前稱册禮使臣某副使臣某奉制授皇后册寶退復位內使監令入詣皇后殿躬言訖出復位引禮引內外命婦俱入就位讀册寶內官及司贊內官俱就位引禮引册使取册授內使監令內使監令跪受以授奉册內官册使退復位引禮又引副使取寶授內使監令內使監令跪受以授奉寶內官副使退復位以俟宫中行禮內使監令率奉册奉寶官各奉册寶以次入詣皇后受册位前以册寶各置於案册東寶西尚儀引皇后降詣庭中受册位立定侍從如常儀司言司寶各就位內使監令率奉册奉寶內官取册寶以次立於皇后之東西向內使監令稱有制尚儀奏拜興樂作皇后四拜興樂止內使監令宣制訖奉册內官就案取册授讀册內官讀册訖跪以授內使監令內使監令跪以册授皇后皇后跪受訖以授司言司寶內官就案取寶以授讀寶內官讀寶訖以授內使監令內使監令跪以寶授皇后皇后跪受訖以授司寶尚儀奏拜興樂作皇后四拜興樂止內使監令出詣副使前稱皇后受册禮畢副使退詣奉天殿橫街南北面西上立給事中立於册使東北西向副使再拜復命曰奉制册命皇后禮畢又冉拜平身給事中奏聞乃退初皇后受册寶訖尚儀引皇后升座引禮引內命婦班首一人詣殿中賀位初行樂作至位樂止司贊唱拜興樂作班首再拜興樂止跪致詞曰兹遇皇后殿下膺受册寶正位中宫妾等不勝歡慶謹奉賀司贊唱拜興樂作班首再拜興樂止引禮引班首退復位引禮又引外命婦班首一人入就殿上賀位其行禮並如內命婦儀司贊唱禮畢引禮引內外命婦出初行樂作出門樂止尚儀奏禮畢引皇后降座樂作還閣樂止百官稱賀上表皇后受册禮畢至晚內使監於奉天殿陳設御座香案尚寶司設寶案於香案之北侍儀司設表案位於香案之南又設表箋案位於丹墀北之正中設文官起居位於丹墀之東南西向武官起居位於丹墀之西南東向文官拜位於丹墀中之東北每等異位重行北向西上武官拜位於丹墀中之西北每等異位重行北向東上殿前班諸執事起居位於武官起居位之北東向侍從班諸執事起居位于文官起居位之北西向殿前班指揮司官三員侍立位於丹陛上之西東向宣徽院官三員侍立位於丹陛上之東西向侍從班文官立位於殿上之東侍從班武官立位於殿上之西拱衛司官二員侍立位於殿中門之左右典收官二員侍立位於仗馬之前東西相向受表箋內使監官一員位於丹墀表箋案之東西向宣表官一員展表官二員位於丹墀表箋案之西東向糾儀御史二員位於展表官之南典儀二人位於丹陛上之南知班二人位於文武官拜位之北俱東西相向通贊贊禮二人位於知班之北通贊在西贊禮在東引文武班舍人四人位於文武官拜位之北稍後東西相向引殿前班舍人二人位於引武班之南東向舉表案舍人二人位於引文班之南西向宿衛鎮撫二人位於丹陛東西階下護衛百户二十四人位於宿衛鎮撫之南稍後俱東西相向護衛千户八人位於殿東西門之左右將軍二人位於殿上簾前將軍六人位於殿門之前將軍四人位於丹陛上四隅將軍六人位於奉天門俱東西相向鳴鞭四人位於丹陛上之南北向其日金吾衛陳軍丈於午門外之東西陳旗仗於奉天門外之東西拱衛司陳儀仗於丹陛之東西及丹墀之東西陳車輅於丹墀之南典持官陳仗馬於文武樓南之東西虎豹於奉天門之東西和聲郎陳樂於丹墀文武官拜位之南內使監官擎執於御座之左右侍儀司舍人舉表案入就殿上案位舍人二人舉表案候於午門外文武官具朝服迎表至雲集橋舍人引殿前班司贊贊禮內贊宿衛鎮撫護衛鳴鞭各入就位侍儀侍從入迎車駕皇帝御謹身殿侍儀版奏中嚴御用監官奏請皇帝服兖冕文武官迎表至午門前置龍亭於道中禮部官取表函置於案舍人舉案禮部宣表官展表官押表案引丞相行文武官分班俱繇西門入至丹墀中禮部官押表案置於丹墀正中各就位文武官各入就起居位侍儀奏外辦導引皇帝御輿以出仗動鼓吹振作尚寶卿捧寶前導侍衛如常儀皇帝升御座樂止尚寶卿捧寶置於案將軍捲簾鳴鞭報時雞唱訖諸侍從官殿前班拱衛司官繇西階降引班引同宣表官受表官受箋內官俱入起居位東西相向立定通贊唱某衛指揮使臣某以下起居引班唱鞠躬平身引班東西分列至丹墀中拜位北面立贊禮唱鞠躬樂作指揮以下皆再拜興樂止贊禮唱指揮使稍前指揮使前立贊禮唱鞠躬指揮使以下皆鞠躬贊禮唱聖躬萬福唱平身指揮使以下皆平身唱復位指揮使復位唱鞠躬樂作指揮使以下皆再拜樂止通班唱各供事引班引指揮使以下各就位通班唱其丞相衛臣某以下起居引班唱鞠躬平身文武官相向鞠躬平身引班東西分引入丹墀中拜位丞相初行樂作至位樂止知班唱班齊贊禮唱鞠躬樂作文武官皆四拜樂止贊禮唱進表箋引班引丞相平章詣表箋案前丞相跪捧表興平章跪奉箋進於受箋官受箋內使監官接箋入中宫啓聞平章興引班引復位丞相捧表與宣表官展表官繇丹墀西陛升西門入至殿中丞相跪進表於案退立於殿南正中內贊唱跪贊禮唱跪丹墀百官皆跪內贊唱宣表宣表官詣案取表跪讀於殿西展表官同跪展表宣表官宣訖俯伏興展表官以表置於案訖內贊與贊禮同唱俯伏興平身丞相與丹墀百官皆俯伏興平身與宣表展表官繇殿西門出西階降復位贊禮唱鞠躬樂作百官皆四拜興平身樂止贊禮唱搢笏三舞蹈跪山呼萬嵗者三出笏俯伏興樂作四拜平身樂止贊禮唱禮畢侍儀奏禮畢鳴鞭皇帝興樂作導引還謹身殿樂止舍人舉表案出引班引文武官以次出謁廟皇后將謁太廟皇帝先遣官用牲牢行事告以皇后將祗見之意其儀與時饗同祝文臨時撰定遣官之日皇帝降香告官捧香至太廟告畢皇后親行謁見前期皇后齋三日內外命婦及執事內官各齋一日前一日執事官灑掃廟庭內外設皇后拜位於廟門外又設拜位於廟中香案前俱北向設內命婦陪祀拜位於廟庭之南北向設外命婦陪祀拜位於內命婦之南司贊位於皇后拜位之東西司賔位於內命婦之北東西相向司香位於香案之右設盥洗位於庭階之東司盥洗官位於位所各廟皆如前儀其日清晨宿衛陳兵衛樂工備樂尚儀備儀仗及重翟車於中宫外門之外陪祀外命婦各具翟衣集於中宫內門之外內使監官奏中嚴皇后服首飾九龍四鳯冠褘衣尚儀奏外辦導引皇后出內宫門司贊奏升輿皇后升輿至外門之外司贊奏降輿皇后降輿司贊奏升車皇后升車宿衛兵仗前導鼓吹設而不鳴次尚儀陳儀衛次外命婦次內命婦皆乘車前導次皇后重翟車內使監人員扈從宿衛復陳兵仗於後皇后至廟門司賔引內外命婦先入就殿庭東西侍立司賓奏請降車皇后降車司贊引自左門入就位北面立司賓引內外命婦各就位北向立司贊司賓各贊拜皇后及內外命婦皆再拜興司贊奏請行事請詣盥洗位引皇后至盥洗位奏盥洗司盥洗者酌水皇后盥手訖奏帨手司巾以巾進皇后帨手訖司贊奏請詣神位前引皇后繇東階升至神位前北向立司贊奏上香者三司香奉香進於皇后之右皇后三上香訖司贊引皇后復位司贊司賓各贊拜興皇后及內外命婦皆再拜興司贊奏禮畢引皇后出自廟之左門司賓