body:
  text: 禮部志稿卷七十九明俞汝楫編宗藩備考藩鑑宗室過犯皇明祖訓凡親王有過重者遣王親或内官宣召如三次不至再遣流官同内官召之至京天子親諭以所作之非果有實跡以在京諸王親及内官陪留十日其十日之間五見天子然後發放雖有大罪亦不加刑重則降為庶人輕則當因來朝靣諭其非或遣官諭以禍福使之自新𢎞治九年令各王府長史紀善伴讀教授吏部務訪有學行儒官除授若親王所行未善長史等官從容諫正至再至三不聽事情重者密切具奏其郡王所為不合禮度者教授勸正如其不聽具啓親王密切戒勉如再不聽親王具奏事情輕者降勅切責若干宫閫重事差内官王親前去體勘至日虚治親王有過專罪輔導官郡王有過專治内使教授其親王府輔導官務日請王講讀經史王子王孫亦要讀書習禮各府將軍該府親郡王互相容隠不行禁治許鎮巡等官將所為不法事會本具奏上請區處𢎞治五年八月司禮監左少監髙鳳題先該都察院題前事節該奉孝宗皇帝聖㫖是恩鑡恩錍等不遵祖訓招集無籍兇徒恣肆為惡毒害良家便冩出差内官去恩鑡等累犯不悛降庶人各連的親家口取送鳳陽居住欽此外據恩錍告稱伊男寵潓已䝉請封輔國將軍等因到部查得恩錍未降庶人之先寵潓已經奏請前職因未出閣故隨文發遣等因覆題奉孝宗皇帝聖㫖是寵潓既授封在前着太監黄觀差委的當人員送囬湖廣該府居住欽此𢎞治六年九月司禮監太監韋太傳奉孝宗皇帝聖㫖荆王見瀟罪大惡極難奉國祀已降為庶人禮部便備查遼庶人降革後一應事例來説欽此本部備查正統四年節奉英宗皇帝聖㫖遼庶人貴烚㓕絶天理黷亂人倫已遵祖訓降為庻人特封遼簡王第四子貴燰為遼王以奉國祀欽此及查貴烚降革之時長子豪㙷年方九歲天順元年四月節奉英宗皇帝聖㫖特封為輔國將軍次子豪坨特封為奉國中尉等因覆題奉孝宗皇帝聖㫖見潚并其子祐柄等已降為庶人荆靖王次嫡孫都梁祐橺宜進封荆王以奉國祀恁禮部先行擇日告知奉先殿冊寳待後差官授封頒給欽此正徳十五年刑部擬議寧王宸濠謀叛大逆并領兵隨行宗室拱栟等監國督守者拱樤等十四名武宗皇帝駐蹕通州傳奉欽依勒令自盡焚棄身屍覲鍾等十三名身属使令相應末减奉㫖降為庶人送鳳陽髙墻居住削去世封玉牒革去一應官員人等家財籍没罷其伊父寧王廟祭嘉靖五年五月岷庶人彦泥該犯故違祖訓不忠不道通苗刼財打死人命呪咀魘魅强搶良家子女奪占軍民財産招匿憸邪奸滛内亂横行極惡擾害地方大傷國體不服鈐束等因奉勅革去王爵降為庻人押發髙墻居住續該都察院左都御史顔題稱彦泥李氏情罪深重俱奉欽依送發髙墻其未封子女未審應否隨住原給冊寳仗服色應否追奪及查曽經㑹勘彦泥嚇騙吏民財物累算三萬餘兩係入官之數及其他財物應否聽其帶往髙墻自用等因奉聖㫖冊寳等項着追奪多餘財不該給主入官的准帶去未封子女譽栐等應否隨住禮部查處來説欽此該本部議得庶人彦泥未封子女實為未革爵前所生年未長成俱係無罪之人查得本部先年題准事例未經降革以前所生子女俱該請封則譽栐等似應存留在府候其成婚之日岷府照例備查先年犯罪輕重革降縁由具實奏聞取自聖裁其押送鳳陽髙墻之後所生子女又有庶人事例不許請封止是量給婚嫁之資而已合候命下本部仍咨都察院轉行湖廣鎮巡等官將彦泥并李氏遵照勅㫖押送髙墻居住其未封子女譽栐等存留在府居住責令相應親屬照管仍乞天語明諭彦汰於彦泥等雖為有怨扵譽栐等猶為至親須要恩養撫恤得所候年嵗長成照例備查伊父犯罪縁由奏請奉聖㫖是譽栐等着存留在府責令相應親屬照管務在得所欽此嘉靖十六年奏准宗室有犯事情輕者照常奏請犯該殺死平人及事情重大者從重奏請定奪投充撥置之人查照見行事例問擬各該軍衛有司官員俱不許擅撥青衣人夫城操人役跟用及私相交結徃來㑹飲因而聽其囑托公事屈法害人其軍民人等若有投充撥置生事害人夥聚毆打平人侵奪民利容留奸滛等弊許地方隣佑諸人指實首告所在官司嚴訪挐照例問遣長史司各教授仍密切訪察各宗室有無前項等情年終各另類造手冊送撫按衙門稽察守巡官巡歴所至亦要嚴加訪禁都察院通行各該宗室地方刋刻榜文嚴加曉諭嘉靖二十四年楚王顯榕暴薨法司查勘世子英燿殺父縁由題奉聖㫖押送來京告廟斬首焚棄身屍欽此嘉靖二十七年七月慶府𢎞農王台泙并本府鎮輔奉國等將軍􅕔奉乞将慶庶人台浤先復王爵等因奉聖㫖朝廷封爵襲替自有典法台泙等輒敢市恩狥私率衆凟奏禮部庶人台浤原犯事情併各奏通行參㸔了來說欽此行准陜西道手本粘送犯人毛偉招案前来内開慶王台浤阿事寘鐇助送金銀紵絲等物寘鐇事寧奉有欽依台浤革䘵米三分之一併革去䕶衛不許文武官結交往來及邪說之人在府出入致生奸弊行令欽遵外又行准刑部陜西司手本粘送犯人李昕等招案前來内開慶王台浤因巡撫都御史張濬等将伊府中撥置人顧錦等挐問充軍又因奏討樂舞生并原革䕶衛奏行張濬查例未與又因義官張通等各許告本府事情將銀饋送鎮守太監李昕總兵官种勛希圖解釋不從俱各嗔怪輙聽信指揮包錦等撥謀欲行殺害三堂據寕夏鎮事發各㕘奏情由已該欽差太監扶安都察院右副都御史王時中錦衣衛指揮僉事劉宗武會勘眀白㕘奉聖㫖便會多官從長議擬來說欽此隨該刑部㑹同多官議擬㕘處慶王台浤居尊横肆臨下貪殘况地極邉陲人多鷙悍伏望皇上將慶王台浤量加懲削以消其釁等因奉聖㫖你毎既議冝念地方將慶王台浤重加懲削以消其釁又恐地極邉陲人多鷙悍易於招呼則懲削之後必生怨望益難關防不可不慮還再會多官上𦂳從長定議停當來說欽此隨該刑部等衙門會議題奉聖㫖是你們既會議停當台浤革去王爵降做庶人論法本當遷發安置姑從寛着本府隨任養贍米每年給與三百石還寫勅戒諭責令改過自新遵法守分不許交通外人稔惡為非欽此又於本部案卷内查得嘉靖十一年十一月内該題准刑部咨該欽差司禮監左監丞宋興題臣奉勅諭前去該府會勘得嘉靖九年十一月内台浤聽信第三子􅕔檟將􅕔櫍打罵不與飯吃􅕔櫍飢餓走出在官校尉王美引見鞏昌王領引府内因要謀害台浤乗機揑作口號令􅕔櫍記熟及具申各衙門訖等情及照台浤溺愛少子殘辱長男情意乖離釁隙易作難以同處一府及􅕔櫍年已長成欲定封代理府事以一國統等因奉聖㫖台浤遷發并􅕔櫍冊封一應事情禮部會官從長計議奏請定奪欽此本部議得本朝令典凢親王薨故必待世子服制已終方行遣官冊立所以尊體統别嫌㣲也照得庶人台浤雖經革爵迄今見存若預將伊子􅕔櫍冊立為王典禮無稽名分未順似難遽議但稱台浤稔惡不悛謀害冢子及稱寧夏係極邉重鎮迄要遷發以絶厲階合無俯從所情将台浤遷至陜西省城居住長子􅕔櫍准令封為世子管理府事等因節奉聖㫖這該府事情你毎既會議停當台浤着司禮監差官照例遷置陜西省城居住􅕔櫍准封世子還寫勅與他管理府事一應事務要恪守禮法用盖父愆其餘多依擬行欽此又查得嘉靖十五年閏十二月十二日詔書内一欵慶王台浤因事遷居省城日久着令囬府冠帶閒住欽此俱經欽遵外今該前因通查案呈到部為照庶人台浤始而黨助逆藩既而謀殺撫鎮又殘害冢子迹其兇滛無道罪貫已盈是以懲創之後輒因勘官所請業已立世子管理府事待其終身承襲王爵而台浤復爵之意已絶其後日之想矣豈有世子中逝因乏𦙍嗣又使罪廢之人繼世而王之理合無将各奏為首台泙􅕔枋􅕔㮿􅕔樲􅕔栐俱各量加罰治仍乞天語將台泙等并奏内附名将軍􅕔等通行切責及將庶人台浤一併戒諭務要省愆安分勿再忘圖各該府教授等官不能諫正内官張鉞齎捧各王等奏合行巡按御史通提到官問罪再照慶世子薨逝絶嗣一應本府事務不可缺人管理合行撫按官員會官推舉能賢素著倫序相應可俟承襲者一位保奏前來照依世子􅕔櫍事例先行題請勅令管理本府一應事務并鈐束一應宫眷旗校人等仍候台浤身終之日另行具奏冊封奉聖㫖台浤犯罪深重朝廷已從寛處不行守分却又要衆奏保忘圖復爵且姑着令省改毋蹈國憲台泙等掠市私恩肆行瀆擾本當重治姑從寛為首的台泙并􅕔枋􅕔櫍􅕔㮿􅕔樲􅕔栐各罰住禄米三箇月其餘免究輔導官并張鉞着巡按御史提了問管理府事依擬行撫按官即便查舉倫序相應的具奏欽此嘉靖二十八年崇陽王顯休同奉國將軍榮湑與已故奉國將軍顯桍鬭毆以致顯桍身故伊男英申奏三法司臨省㑹勘叅照顯休位雖郡王尊卑有序但顯休毆死小功之兄尤為重悪之首致命諸傷多出其鉄尺之慘誠當重處其奉國將軍榮湑為緦麻之叔鎮國中尉顯櫸顯蘽皆無服之兄同謀共毆均難寛縱奉聖㫖顯休設謀毆死從兄背違祖訓罪惡深重你們既會議明白着撫按該府官會同勒令自盡榮湑顯櫸顯蘽黨惡敗倫姑從輕送髙墻禁住欽此嘉靖二十八年晉府方山王府奉國將軍知知謀殺小功兄知刑部㕘題奉聖㫖知知同謀殺死從兄肆行兇殘背違祖訓情犯深重你們既議擬明當照例着撫按該府官㑹同勒令自盡欽此嘉靖三十年三月巡按山西監察御史姚一元㕘該本部㸔得秦府鎮國中尉秉槣先該秦王㕘其打攪倉塲嚇騙財物貽害地方背違祖訓累行禁諭執迷不改乞革職禄以為驕横者之戒今據都察院咨勘前情是實相應重治合無將秉槣革去職秩以為重戒奉聖㫖秉槣嚇騙財物貽害地方本當重處姑從輕着革去䘵米一半再犯不饒欽此嘉靖三十二年十月靈丘王㕘奏鎮國中尉充等毆死堂伯俊檞身居親䘮包奸樂婦開場賭博本部㕘題轉行山西巡按監察御史將充充蕉充熡拘禁究問議擬去後嘉靖三十三年五月内該南京守備魏國公題稱靈丘王府鎮國中尉充私至南京已經送囬又該靈丘王參奏充充蕉充熡懼罪脫迯私出禁城乞要議罪嘉靖三十三年七月二十一日靈丘王府鎮國中尉充越闗赴京奏擾該本部㕘照充等先該靈丘王具奏本部㕘題將充等止住䘵米啓王拘禁聽勘乃敢不遵明㫖輒復脫迯故違嚴例私至留都既該南京守備差官送囬又復越闗赴京奏擾恣意逞兇欺罔國法莫此為甚合無將充充蕉充熡俱革為庶人差官伴囬啓王拘禁仍行巡按御史作速查勘明白并將充越闗情罪一併㕘奏前來等因奉聖㫖是充充熡充蕉都着革為庶人欽此嘉靖三十三年潞城王府革爵庻人俊㭓該犯拍棺罵父持刀刺兄并奸盗重情該都察院㑹議㕘題奉聖㫖俊㭓稔惡無忌罵父刺兄姦滛搶盗好生敗倫違法大違祖訓便送發髙墻居住欽此嘉靖三十五年六月本部題為逆黨豪軍撥置親王乞恩急救生命事該錦衣衛題徽王被諸惡引誘欺蔽惡延一省害遍小民等因節奉聖㫖徽王年不甚㓜這等聽信撥置虐害小民豈敕戒之例乎禮部㑹同三法司㸔議具奏欽此欽遵該本部尚書吳等㑹同刑部等衙門尚書等官臣何鰲等㸔議徽王載埨心懐欺罔性恣兇殘強奪衆民室女侵尅百姓資財及奉欽依挐解諸犯却又縱容承奉不即解官使其女子尚存而占恡不發則抗違明㫖之罪難逃設或别有隠謀而身屍無証則致死人命之辜莫逭律以國章允宜重究伏乞將徽王革去爵禄以警宗藩再照游朝等已經奉㫖處治外但其間黨惡不止数人合行彼處撫按衙門將平昔在府撥置引誘之人通行挐問仍將耿安并小迎各查究有無致死根因從重問擬一併具奏奉聖㫖你毎說的是載埨性恣兇殘大違祖訓負朕恩眷且姑革去禄米三分之二着令省改小迎并各原奏人耿安着撫按官查究下落作急具奏平昔在府撥置之人都着訪挐重治欽此續該巡撫都御史潘恩巡按監察御史孫昭㑹題徽王并本府人役違法情由奉聖㫖這奏内載埨所犯事情禮部會同三法司㕘㸔了來說其餘各犯法司詳議具奏欽此欽遵㑹同刑部等衙門尚書等官何鰲等㕘㸔得徽王載埨恣肆無忌僣竊屢形如修盖萬嵗山私剏行宫此豈藩服之所宜有杖殺本府庫官擅授親倖冠服此豈臣下之敢專挾帶宫女擅至南京則是僣萌窺視敢蹈無將之戒演武習船探聼京師則是包藏異志漸稱不軌之謀凡若此類撥置或出於羣奸而造意必由於主使專擅僣竊罪不容誅律以憲典冝不止於革去爵禄免為庶人而已伏乞特賜宸斷寘之重典以為藩王恣肆干紀者之戒奉㫖載埨稔惡恣肆包藏異心大違祖訓情罪深重你們既㕘㸔明白着㑹同多官議罪來說欽此欽遵臣等㑹同公侯駙馬伯五府各部通政使司六科十三道等官㸔議淂載埨僣擬朝制忘肆覬覦專擅威福潜懐悖二原情委蹈乎無將據法難逃乎首惡若止罰及其身未足永垂鑒戒臣等查得節年事例凢宗室有犯不法重情該彼處撫按官㑹勘明白㕘奏前來㑹同三法司各堂上官議擬奏聞取自上裁或送發髙墻或勒令自盡令照載埨罪状已明委應重處伏乞特賜宸斷將載埨送發髙墻禁住仍削除國害革其世封以泄神人之憤惟復别有定奪均乞聖裁奉聖㫖載埨稔惡懐送僣擬窺視罪狀已明本當處以重典姑革了爵降做庶人押發髙墻好生禁錮削除世封冊寳章服財産籍沒違造諸屋亭等項盡行毁撤仍告宗廟冩書與各王府知悉欽此嘉靖三十五年十一月該司禮監太監王臻題稱會同河南撫按題稱庻人載埨本宫眷屬除正犯沈氏併親倖宫人金氏等先被庻人逼令自縊身死其見在宫眷郝王璜等俱押送赴京及查府内别居尚有簡王妃張氏生有子新昌王厚燇等稱年七十五嵗係庻人祖母恭王現在妾耿氏生有子載塛陳氏生有子載叚氏生有子載俱係庶人庶母已薨五城王未封妃張氏係庶人親嫂其庶人已封長子安陽王翊錡次子萬善王翊鈁未封第三子翊鉞第四子翊鏼未請名第五子第六子第七子并未婚女三人各未出府原未開載難以處分伏乞勅下該部備加議擬其强搶良女或令結親完聚仍令押送赴京等因奉聖㫖該部㸔了來說欽此臣等為庶人載埨兇殘成性生死不悛先逼縊其妻妾乃復狠扵自盡所有遺下别居祖母簡王妃張氏有子厚燇封新昌王庶母恭王妾耿氏有子載塛封徳平王陳氏有子載段氏有子載俱合行聽其母子相依隨住其載載俱未封母子俱合暫依徳平王居住待封爵之日另行分處其親嫂已故五城王未封妃張氏合隨庶姑耿氏依住再照載埨已奉㫖削除世封所生已封第一子安陽王翊錡第二子萬善王翊鈁應革封號追奪冊印儀仗冠服并未封三子翊鉞四子翊鏼未名五子六子七子俱為庶人及未婚女三人俱行原差左少監王臻押送省城撥給房屋安挿仍請勅一道賫赴周王鈐束以後不許混請婚封及照宫眷郝玉璜等俱無所出并强搶良女小長女等查無押𤼵赴京事例合照先年南渭王府庶人膺䥯家眷人口踈放事例着令有司給親完聚所據新昌王等府并宗儀人等頗多合行查照原題事理推舉賢能郡王一位前來請勅管理府事通候命下移咨都察院轉行河南撫按官并原差左少監王臻遵奉施行奉聖㫖郝玉璜等原事府内的收京民間強入的還家欽此嘉靖三十六年二月十五日禮科抄出巡撫河南都御史潘恩題稱追奪庶人載埨冊寳章服藉没金銀珠玉寳石器皿首飾紵絲紗羅絹布衣物等項俱封完固選委開封府同知李充善等解領進等因奉聖㫖該部知道欽此該本部覆題候命下移文原差左少監王臻照數送赴内府該庫交收等因奉聖㫖是欽此嘉靖三十五年代王參奏鎮國中尉俊夤夜偷盗財物該本部參題有玷宗藩奉聖㫖是俊着為庶人欽此儀賔過犯𢎞治十七年十一月寧王奏據瑞昌恭僖王孫女吉水郡君啓夫吳元壽縁事革職為民乞要比例復職等因本部查議得吳元壽朦朧支俸犯該行止有虧題孝宗皇帝聖㫖吳元壽准復職欽此𢎞治十八年十二月寜王奏據湓城郡君啓稱臣夫儀賔顧官祥因臣弟庶人宸浮宸潤不和訐奏節奉欽依杖罪納米還職該刑部㕘係撥置王府題奉欽依打四十革為民乞要比照吳元壽事例復職等因本部題奉孝宗皇帝聖㫖顧官祥准復職欽此正徳三年四月荆府都昌惠靖王次女石陽縣主奏夫張勲先該犯不孝貪滛謀故親弟等事革職閒住乞要比照顧官祥等事例復職等因本部復題奉武宗皇帝聖㫖張勲情犯比衆不同不准復職再來奏擾不饒欽此正徳四年該本部議得張勲放逸為非法難輕貸今後但有犯該張勲等情罪輒敢夤縁比例請乞復職者聽本部㕘奏治罪庶人人知所警矣等因奉武宗皇帝聖㫖是欽此宗藩訐奏嘉靖十七年二月内該建安王覲鋉奏稱弋陽王拱樻以旁支郡王賄理府事該本部尚書嚴嵩議得拱樻官理府事先年本部題奉欽依不以親踈倫序為言以宸濠前後有無相干行勘節經江西鎮巡等衙門會勘本部會同五府九卿等官議得建安王樂安王前後相干終有嫌疑弋陽王拱樻素行在人别無訾議及與宸濠前後無干題奉欽依着管理府事今經一十六年成命有歸宗親所服覲鋉何乃復有此議若不戒飭將來釁端無已伏望皇上將覲鋉拱樻天語嚴加戒飭各宜安靜毋得輕信撥置妄生事端致傷國體再照王府奏事人役潜住京師内外探聽事機不由王意輒用空印黄本自冩封進因此奏凟委為積弊雖經本部具題禁革日久人心玩肆罔知懲戒伏乞特勅緝事衙門嚴加緝訪如有此等人役潜住京城即時挐送法司從重問擬則奸人畏法而宗室爭競之風可息矣奉聖㫖你們説的是拱樻管理府事已有成命主祭原未准行覲鋉如何畧次妄奏大肆妄言本當查究且饒這遭其餘依擬欽此嘉靖二十九年五月鄭府盟津恭懿王長子冠帶管理府事祐橲奏鄭王厚烷極悪䟦扈之行四十條奉聖㫖這所奏事情禮部會同都察院㕘㸔了來說欽此該本部尚書徐階等㑹同都察院左副都御史屠僑左副都御史梁尚德查得先年但遇王府事情重大者俱勅差司禮監太監駙馬法司錦衣衛堂上官各一員勘問囬奏今該前因臣等㕘㸔得祐橏開奏鄭王厚烷前項事情如曰咒詛曰􅏺訕則干犯乗輿曰煽惑人心曰講演兵機則闗係宗社曰廣置私黨則違延攪交結之禁曰貪滛酷虐則昧謹守藩輔之理曰䧟害宗枝則不但張聲勢而䧟害良善曰凌辱有司曰致死人命則敢作非為而不守法皆祖訓所謂重過所謂大罪而在朝廷不容以親貸者也但事在彼中未絰勘問一面之詞遽難施行合無照例請勅差司禮監太監駙馬法司并錦衣衛堂上官各一員前去該府㑹同撫按官查提奏内有名人犯并一應干審人員將所奏事情逐一勘問明實具由奏請定奪則罪狀白而國憲伸宸斷彰而衆心服矣奉聖㫖是依擬差官前去㑹同撫按官查勘明實具奏欽此本年十月續該欽差太監賈堪等題稱查勘得鄭王厚烷禮應稱臣者而不稱臣任情驕悖事應請命者而不請命恣意擅專既已身叢衆惡有何體國之誠乃故掇拾蕪辭假為忠告之獻及照盟津恭懿王長子冠帶管理府事祐橏文飾父過而妄意圖王遲報母喪而私加封號開條訐奏事故多有所因挟憤増情辭不免於過實等因奉聖㫖三法司㸔議來說欽此欽遵隨該三法司會㸔得鄭王厚烷過犯昭彰大違祖訓再照盟津恭懿王長子冠帶管理府事祐橏稔惡㤑終通乞聖明裁處奉聖㫖這事情既經勘問明白厚烷悖逆肆惡滛放驕傲既不稱臣暗有不臣之志百凢擅已畜不軌之謀掇拾朕躬親親何在三次辯䟽全無引咎欺慢自尊崇信妖術奪占人妻無禮不道大背違於祖訓本當重處姑降做庶人送發髙墻收管其奏討退灘地土追奪還官私剏亭館店房等項都着拆毁祐橏擅稱長子名號僣繋玉帶債逼小民滛惡昭彰但舉發逆䝉姑着冠帶不許管理府事及又占恡人犯好生抗違還行與撫按官嚴提究問厚烱祐橯姑革禄米三分之一其各犯監候處决發遣發落并各項事理多依擬欽此嘉靖三十年正月襄垣王成鍨奉本府輔國將軍成銳係滛樂花生越闗等事又該襄垣王府輔國將軍成銳等奏為强藩違訓蒸滛内亂該本部㸔得襄垣王成鍨與本府輔國將軍成銳等屢相訐奏彼則指成銳為花生此則指成鍨多内亂詞各一偏情多瞹眛難以輕信所奏抄詞節經本部立案外今成鋭乃復聽信王周等撥置夥衆出城赴京奏擾委於前項嚴㫖有違相應㕘究合無遵照前㫖將成鋭等送發髙墻居住聦瀑等量行降罰奉聖㫖成鍨屢次訐奏故違眀㫖好生玩法姑革了職送發髙墻居住聰瀑降為庶人聰濩等各罸住俸未一年其餘依擬欽此嘉靖三十一年六月准刑部咨該韓府襄陵王融焚等各連名令旭楦越闗訐奏韓王融燧廣地據險打死人命不孝違法貪滛等事及該韓王題恭襄陵王融焚將軍旭梓等不服鈐束結黨斂財營求遷移敗倫傷化刼財殺人雕刻假印誹䧟親王懇乞禁戒等事俱在彼中遽難定擬合行彼處撫按將奏内一干人証通提到官勘問明白另行奏處其旭楦旭棕旭越闗奏擾合咨禮部㕘題定奪該本部㕘㸔得韓府襄陵王鎮國中尉尉旭楦旭棕旭縱與韓王有干止合差人具奏乃敢故違訓例越闗奏擾本應重究但訐奏事情既經刑部行勘所據越闗合無暫賜寛假伴送囬府轉發勘問一併參奏處治等因奉聖㫖是欽此嘉靖三十二年四月准刑部咨該内官監太監張朝會同陜西巡撫都御史賈應春等會勘韓王訐奏縁由該本部尚書何鰲議稱襄陵王府鎮國中尉旭楦謀滛妻弟永室之婚倡議越闗誣訐親王欲從重併論奉國將軍旭棕鎮國中尉旭朋比扛幇抗違勅㫖誹䧟親王俱應重處及鎮輔奏國将軍中尉偕澳等二百六十四位依違附和黨惡興詞亦應量行戒飭其襄陵王融焚首謀搆訟蔑視親王國體所闗似應酌處韓王融燧受人投獻地土并勒要財物致使婚配愆期人心嗟怨罪本難辭但其占種官民地土既久議令給主還官已足示罰伏乞聖慈憫其懿親過未已甚特賜天語叮嚀俾各省改本部移咨禮部請勅省諭韓王洗心滌慮正已率人務期舉動得宜羣心歸服勿蹈往轍自啓釁端再乞勅切責襄陵王併戒諭諸宗室各務謹守法度拱聽鈐束母懐私忿盡改前非襄陵王仍再加减革以警將來等因奉聖㫖這事情既勘問明白旭棢旭楦革了爵送發髙墻居住旭棕旭旭楠降為庶人融焌等偕澳等各罰住禄未三分融焚本當治罪姑革住禄米三分之二韓王着改過守法管束宗室還冩勅省諭欽此嘉靖三十一年九月紹興王厚爀訐奏淮王將母繼妃周氏不得祔𦵏於父莊王之墓嘉靖三十二年三月淮王厚燾奏辯繼妃周氏安𦵏俱出紹興王厚爀自行卜地今乃聽信撥置誣奏親兄俱行查勘去後隨該巡按江西御史蕭端䝉奏稱紹興王母妃周氏不得祔𦵏於荘王之墓係是淮王過信祖母妃傳氏之言别無撥置離間該本部議照厚爀之訐奏淮王盖縁情切為母而不知事由於祖妃厚燾之聽周氏别𦵏止因命由祖母而不知有違於明㫖今該御史蕭端䝉勘稱莊王墳右尚有隙地可以啓遷祔𦵏别無撥置離間之情𠫭之情理委為詳盡合將繼妃周氏行令改遷祔𦵏於淮莊王墓右長史等官問擬應得罪名照例發落仍乞天語戒諭淮王紹興王各冝捐棄小忿以全大義等因奉聖㫖是周氏着改遷祔𦵏厚燾厚爀各要親睦不得再行爭擾欽此嘉靖三十一年十二月晉府寧化王府鎮國中尉表越闗奏稱晉王及寧化王悖逆祖訓僣踰横行等情該本部𠫭㸔得表所奏累数千言極其詆毁然中間多非干已之事又無迫切不容已之情乃敢故違明禁越關奏擾例當送發但未經行勘無以折服其心伏乞暫賜寛宥差官送囬轉行巡按御史查勘等因奉聖㫖是欽此嘉靖三十二年三月晉王𠫭奏寧化王府鎮國中尉表嚇騙官民不服鈐束違法多端本部議照中尉表所奏已經𠫭行巡按御史查勘今據晉王𠫭奏表兇惡肆逆敗倫傷化致死人命等情則其自知違法先肆詆毁以塞親王之究詰情狀甚明而又再犯越闗凟上擾民若不嚴加懲罰窃恐倣傚成風親王鈐束之令不行而朝廷禁防之法浸弛所據表晉王奏内所㕘事情合行巡按御史查題勘問明實從重𠫭奏等因奉聖㫖這事情巡按御史從公勘明具奏欽此嘉靖三十二年十月巡按山西監察御史李一瀚題稱晉王與中尉表互奏情詞干連人衆事干宫閫乞差内官并法司官各一員前去勘處該本部㸔得宗室訐奏必宫閫大變人証俱存事有左騐者方得請差内臣又必犯在大逆干連地方非撫按所能勘問者方得請差法司今表所奏尚氏私通承奉張堂之事理所必無晉王所奏表奸滛兄嫂之事則迹屬指奸俱不必查勘其餘情節則俱非撫按所不能勘者但據稱表手持利刄挾制勘官抗違勅㫖毁罵親王占恡人犯不容問理則表之素行兇悖有非勘官遽能追究可知先將表革去官職安置嚴密處所委官防守吊提人卷隔别勘問再照宗室之中亦有縱惡逞兇蔑棄法紀敗倫傷化樂於誘引者一被親王鈐束遂至揑奏親王一被撫按查究遂至揑奏撫按已而委官勘問乃復逆探問官意向多方羅織挾持揺撼或親自出名或佐使他人掇拾危言設計誣奏務令勘官畏縮牽制不敢追問前項刁風實不可長今後凡各宗室有互相訐奏行勘未結而輒誣奏勘官及將不干已事揑奏撫按者不論事情輕重一槩立按不行仍將賫奏人員從重究問等因奉聖㫖是欽此嘉靖三十三年五月續該巡按山西監察御史黄季瑞題稱參㸔得寜化王府鎮國中尉表欺毆布政官員阻撓藩王鈐束已䝉部議送𤼵委於公論難容鎮國中尉表柔㓕棄禮法恣意擅婚揆之祖訓内屬有違及㸔得晉王新㙉誤聽羣小致怨宗親及知知瞅秩禄例該减革如䝉勅下該部再加詳議上請特定奪等因奉聖㫖該部知道欽此欽遵本部議照表鼓煽宗室多立黨與欺歐職官阻撓鈐束是中尉之惡未有如表之甚者既該御史黄季瑞勘實㕘題委應送發别難議擬及照表柔恣肆擅婚冐請封號亦應重罰所生子女合照例革去封晉王新㙉誤聽羣小奉法過嚴以致宗親懐忿别無重情相應戒諭再照左長史劉繼祖守門内官邢大本典仗桑福書辦官張錦或縱容吏書擅追紙價或妄聽人言激王啓釁俱屬有罪亦應提究合候命下行移司禮監差官一員將表押送髙墻居住以為宗室恣肆玩法者之戒將表柔重加罰治其長子知次子知瞅革去封號查照擅婚事例給與冠帶口粮仍乞天語叮嚀戒諭晉王鈐束宗室務盡敦睦無聽羣小之言有乖親親之義本部仍咨都察院轉行巡按山西御史將長史等官馮繼祖等嚴行提問照例問罪發落等因奉聖㫖表肆行兇悖違法多端既經勘實着革了職送發髙墻居住表柔罰住禄米一年知知瞅革去封禄給與冠帶口粮晉王着敦守禮法鈐束宗室馮繼祖等巡按御史提了問欽此嘉靖三十二年十二月周府奉國将軍安淚先該周王𠫭其持刀戕兄打死人命藏刀入府毁辱親王等情已經𠫭題勘問去後續該巡按御史奏稱先將撥置犯人問罪發落及𠫭安涙相應送發髙墻該本部𠫭㸔得安涙滛人妻而捶死其夫配其女而調戯其母持刀害兄脫褲罵殿并屢次揑奏親王罵辱問官抗違明㫖打死二命是其毒若虎狼心同狗彘罪惡貫盈背違祖訓宗室之中未有比倫合將安涙押送鳳陽髙墻居住以為宗室不孝不悌欺肆玩法者戒奉聖㫖安涙情罪深重背違祖訓着送發髙墻居住欽此儀賔訐奏嘉靖三十一年三月楚府劉銳郭寘王邦用何彥清原被儀賔汪若泉等奏依冐籍違例等項情弊今據湖廣布政司勘稱劉銳郭寘王邦用各無違碍除劉銳已經冠帶郭寘王邦用各賜冠帶外其何彥清不曽明開被奏之後查勘果無冐籍情弊及汪若泉等前項訐奏失實情由相應再行勘問已經備行欽遵去後今該巡按湖廣御史胡宗憲題稱楚府儀賔汪若泉等揑奏子弟劉銳郭寘王邦用何彦清違例冐籍王灂芄鄧文各附㑹許争通屬有違法應㕘究該本部議照汪若泉等肆譎行私王灂葛芄鄧文附㑹許奏委應懲究但勘無脅財情弊又王邦用何彥清等冊内原因行欵不同以致彼此疑搆事出有因合無將汪若泉重行革罰王灂等量加罰治惟復俯賜矜宥移文啓王嚴行究責等因奉聖㫖汪若泉併王灂等都着本部嚴加究責欽此越闗奏擾成化十八年五月靈丘王府有將軍三人擅出平陽府城於佛寺止宿言欲赴京奏事巡撫山東右副都御史何喬新等以聞禮部覆議靈丘王既不鈐束又不舉奏宜降勅切責本府教授及守城官亦宜治罪上曰宗室擅出王府朝廷累有明禁將軍輩乃故犯之若諸府效尤何可復制其本府教授及守城官令巡按御史究治其罪以戒其餘欽此𢎞治十八年令将郡縣主君等凡有奏請除干渉本府與機密重情差人賫奏外其餘事照例具啓參詳但有驀越來京本部奏差相應官伴送囬府嚴加管束所過止許驛逓照闗應付不許需求有司供給帶來人役法司提問設謀撥置之人及郡縣主君大男并該府教授府州衛所正官守門巡捕及本境經過巡司人員一體𠫭究治罪奏詞立案不行𢎞治十八年十二月晋府慶成王南海郡君儀賔李實以攬包銀粮獲罪郡君私入京擊鼓訟寃禮部遣中使送囬仍勅王約束并治教授守城等官罪上以郡君出城訴訟有乖禮法命㑹法司㑹議慶成王亦奏郡君及将軍奇滔奇浙表桄表根表梗表槆諸不法於是禮部會法司議請申明禁令凡越例私奏者俱寢其事上曰將軍中尉及郡縣主君等多入京奏訴近已成風騷擾道路貽辱室室其即移文各王府省諭禁約敢有仍前故違者併治之正徳十二年令宗室有事不啓王代奏私自赴京奏擾及私赴省城陳訴者原詞立案不行仍將禄米量行减革以示懲戒其冩本撥置之人俱治以重罪嘉靖元年議准宗室有越闗來京奏擾者差官伴送囬府驛遞止給口粮脚力不許需索轎馬奏詞立案不行仍酌量輕重輕者勅親王切責量减禄米及從議處置重者聽撫按官從實奏聞取自上裁痛加懲戒嘉靖十一年十一月本部議淂郡王將軍中尉及郡縣鄉君夫人等俱以宗室懿親徃徃越闗赴奏合行各該有王府地方刋刻板榜禁諭宗室但有應奏事件照例啓王轉奏無得違訓玩法擅離封域自取卑辱若不行悔改仍蹈故轍者聴本部參題情輕者革去爵秩情重者送發髙墻郡縣鄉君夫人等犯者将應得禄米减革一半仍罪坐夫男照例題請削除爵秩奏詞立案不行等因奉聖㫖是都依擬行欽此嘉靖二十年二月靈丘王府鎮國中尉俊楇來京奏擾該本部㕘題節奉聖㫖近來各宗室徃徃潜自來京好生不遵祖訓已屢有嚴㫖令該府親王約束竟不守法今後再有私自來京的不拘事情輕重即發送髙墻居住决不輕貸欽此嘉靖二十五年題准有引誘宗室同行潜往京城内外探聴消息者行巡城御史密切訪挐究問及行經過地方一併盤詰拘禁申奏處治嘉靖二十五年七月秦府前輔國將軍秉柃奏為豪官用勢結交當道䧟害職禄該本部㕘照庶人秉柃先年罪犯深重發禁髙墻續遇寛恩釋放囬府顧乃仍蹈覆轍越闗奏擾出故違法難輕貸合照前㫖将秉柃送發髙墻居住惟復俯從寛宥差官伴囬奉聖㫖秉柃怙終不悛着押發髙墻居住欽此嘉靖二十五年十二月禮科都給事中李給題該本部議得今後各王府如有因内外自相結搆及請乞婚封禄粮等事合行該府長史教授啓王應處分者徑自處分應奏聞者具實轉奏不得故意刁難或其長史教授不與轉啓親郡王不與轉奏許差家人於守巡撫按等衙門具告即與行勘輕則啓王議處重則㑹奏請㫖奏内亦要明開曽否經長史教授守巡撫按等官告理抄奏到部容本部酌量輕重行該省官員查勘仍具實作速囬報本部題請究治其未經前項各官告明不理者亦不得輕自具奏若宗室不先行啓王又不差人具告又復故違法例私自越闗來京者顯是抗違明訓合遵前㫖嚴加罰治送發髙墻等因奉聖㫖是都依擬行欽此嘉靖三十三年六月瀋府輔國中尉恬㶷越闗奏稱祖母張氏年已七十貧無養贍乞要以禮優待并乞賞賜該本部㸔得宗室有所陳乞合啓親王轉奏不許擅離封域且淑人年老以禮優待中尉貧難别加賞賜節年俱無事例恬㶷假以貧難之故敢揑無例之詞驀越赴京凟肆奏擾若不嚴加究治誠恐倣傚成風合將恬㶷送發髙墻居住以為玩法妄奏者之戒但稱祖母年老情似有間惟復量賜革罰差官伴囬等因奉聖㫖恬㶷姑罰住禄米半年欽此嘉靖三十三年九月晉府奉國将軍表櫬越闗奏擾該本部議得自今以後各宗室有越闗來京者已是悖違祖訓不遵明㫖合先革為庶人差人伴囬然後将所奏事情應行查者轉行巡按衙門查勘如果情出真切事非得已曽啓親王轉奏而輔導官刁難曽具告守巡等衙門而各衙門阻抑則罪當歸於刁難阻抑之人而出城越闗之罪猶有可原合與題請叙復爵秩仍行沿途巡按備查經過府州縣驛遞衙門若有需索折乾挾去馬匹舖陳等情爵秩雖復禄米仍須减半以示懲戒如或情非迫切事本得已既不啓王轉奏又不具告撫按守巡輒便聽信撥置驀越赴京或犯有别項情罪應合降革送發髙墻等項悉照節年題准事例施行及照表襯所奏明是擅婚所生之子既不啓親王轉奏又不具告撫按妄引事例冐請名封合将表襯革為庶人差官伴囬等因奉聖㫖是表襯革為庶人欽此嘉靖三十二年十一月南京魏國公徐鵬舉奏靖江王府革禄奉國中尉經茜私赴南京欲照知灰事例差差官送囬廣西識認該本部尚書歐陽徳議照國家之待宗室極其優厚然各該宗室聴信撥置徃徃揑奏赴京絡繹道路規利財物無所不為前此本部欲請送發髙墻但念廣西七八千里之外差官取押往復騷擾民甚不堪况鳳陽守臣又數告髙墻供給缺乏以此數次止請革為庶人使圖省改不意其稔惡不悛以為朝廷之法止於如此益加恣肆重為民毒今照廣西委係猺獞出沒之地恐將來事出不測如代府充灼俊桐等之謀投降趙府載墱等之謀從賊者難保必無合行南京兵部将經茜查照知灰事例差人押送廣西并咨都察院備行撫按衙門轉行該府輔導官啓王知㑹識認果是經茜即查照本部題准出城赴京近例革為庶人仍遵奉嘉靖十五年欽奉勅諭内事理將經茜經排經賮邦先行拘禁及行三司官㑹議於該省城内擇空閒寛厰一處盖造閒宅一區其中多分院落多造房屋及一應合用井竈家火四周繚以髙垣外設縂門嚴為扄鑰啓王将經茜及經排經賮邦移家安住其中王府差委内官校尉有司差委的當官員防禁仍封閉宅門五日一啓巡風人役晝夜守獲不許私自出入交通外人日用飯食查照本部題准庶人口粮事例支給無令失所若能悔罪省愆改過自新輔導官啓王及呈撫按衙門備行守巡府縣官審問果能去惡從善事有証騐㑹本奏請釋於此外如有不服鈐束或刼掠財物打搶平民假借奏事越闗私行等項一應背違祖訓罪犯頗重如經茜等所為者聴王及撫按官㕘題前來本部覆請照經茜等事例送住閒宅都察院通行有王府去處撫按官行各輔導官啓王一體欽遵㑹議盖造施行南京守備衙門此後如有盤獲自稱王府名色來京者一面具題一面送兵部差人伴押囬府交割并行該省撫按官查明𠫭奏照例處治奉聖㫖是欽此嘉靖三十二年十一月該本部尚書歐陽徳等題㸔得往年差去伴送宗室多用軍職或辦事官員委的漫無顧藉教誘生事因而慿藉需索凌虐騷擾辱官害民無所不為委應議處合行南京兵部無得仍差軍職及辦事等官須專委屬官一員送至前途府分交割守取囬文前途府分逐府坐委佐貳官一員接送交割守取囬文無致踈虞兼防侵害如有光棍跟隨作為家人名色即行挐問呈詳發遣無得騷擾地方等因題奉聖㫖是欽此嘉靖三十三年四月趙府奉國將軍載墱令内助李氏越闗奏夫被害縁由該本部㸔得載墱所犯事情已經行勘自合聴候乃敢復令内助越闗奏辯相應罪坐夫男但查載墱見係收禁聴勘人數李氏又係内助無有禄米可减及其奏詞又經都察院併勘别難議擬合将李氏查付公差内使伴囬等因奉聖㫖是欽此誣衊部臣嘉靖十九年二月本部尚書嚴題為宗室不遵明㫖駕揑虗情傾䧟大臣乞賜究治事先該嘉靖十八年十一月魯府鄒平王長孫觀爁奏請襲封及輔國將軍徤柯亦奏争襲等因本部備查節年㑹勘過案卷見得觀爁應該承襲祖爵徤柯累次争襲奏擾請乞戒飭題奉聖㫖是徤柯不許仍前奏擾欽此欽遵徤柯又令伊男觀炩出名揑詞奏擾於都察院門首貼有觀炩奏詞一道内開觀爁不該承襲王爵伊祖母丁氏原封繼妃已經削奪要得復還封號重給金冊明圖爭襲又稱觀爁差人向伊抱本人王朝卿說稱夏閣老受俺銀五千兩嚴尚書二千兩劉郎中一千五百兩王該俺襲等語臣聞此不勝驚異切惟觀爁承襲縁由本部都察院前後案卷可查當潩事情先經親王勘報廷臣㑹議又經欽差内臣法司及在外撫按三司重臣查勘明白朝廷冩書與各王府知㑹又經題奉欽依觀爁封為長孫聴繼王爵已定臣等據有成案方與覆題請封徤柯明知倫序不得稱嫡承襲伊祖母原封削奪已久輒敗故違明㫖妄肆奏擾汚及大臣今宗室此等事情甚多若一槩效尤横加汚衊將來一應事務本部愈難定處欲避謗停寢則以刁難而生怨欲據理題覆又以偏重而受誣事皆掣肘動必招尤刁惡之風實不可長訪得該府已問𤼵充軍當凉壻儀賔劉廷爵等一向潜住京師為其营幹爭擾無已伏望勅下厰衛緝事衙門於五城地方緝挐徤柯差來奏事人犯劉廷爵王朝卿及本内詐稱家婆楊氏賫奏俱追挐到官究問要見何人主謀揑冩本詞依律問擬發遣奉聖㫖是觀爁倫序應襲祖爵先朝勘議明白處斷停當徤柯累次争襲又曽降勅戒諭乃敢故違成命妄肆奏擾及又造揑虚詞誣衊大臣好生不遵祖訓劉廷爵王朝卿楊氏及該府在京潜住营幹的錦衣衛便差的當官校緝挐送都察院三法司務要根究主使教誘之人追問明白來說欽此續該都察院㑹同具題奉聖㫖這事情既㑹問明白徤柯故違祖訓謀奪王爵揑詞奏擾煩凟累朝節經降勅戒諭及㑹官奉㫖處斷恬不省改畏忌觀炩踵父所為信用羣小設謀誣謗大臣都好生不遵朝廷法度徤柯本當重處姑從寛革去禄米觀炩罰住俸米一年劉廷爵王朝卿撥置宗室累犯不悛着押發極邉衛分永逺充軍其餘依擬欽此凌逼撫臣嘉靖二十一年正月巡撫河南右僉都御史魏有本題稱本年十一月十五日節該周府永寧汝陽鎮平鄢陵遂平内鄉等府鎮輔國中尉安淄睦等二百餘位擁聚布政司攔絶逼要加添禄銀不從又約五百餘位擁入本院攘閙逼令批司取劄方散有傷政體乞要申勅周王將安淄等嚴加切責戒諭本部議照王府宗室一切應行事務例該長史教授移文轉達所司衙門酌處而行𠫭照安淄等故違勅戒聚衆擁入巡撫衙門大肆喧嚷凌逼風憲大臣又至藩司辱詈官僚迫脅行事若不嚴加戒飭恐漸不可長將來官司何以展布相應議處安淄睦係首倡聚衆攘亂恭請皇上乾斷嚴行罰治其餘五百餘位立候命下本部移咨都察院轉行河南布政司備行該府長史司具啓周王知㑹通行嚴加切責今後務要安分守法如有應行事情照例具啓移文轉達不許擅自聚衆輕詣所司瀆亂及照該府教授不能以理勸阻亦合有罪仍行巡按御史提問如律照例發落等因奉聖㫖宗室擁衆凌逼撫臣所司好生不守朝廷法度本當通行究治但罪重首倡安淄着革為庶人其餘依擬行該府遵照勅㫖嚴加約束各府教授都提了問欽此擁噪藩司嘉靖二十一年五月河南巡撫都御史魏有本題稱儀賔牛振羅江等慿恃宗婚輕蔑藩省主率郡縣主君喧嚷司堂公座事出異常欲乞將首倡儀賔牛振羅江重加懲治及周府承奉李進陳阮靳用長史劉元嗣依違坐視亦乞切責本照㕘照儀賔牛振羅江等主率郡縣主君混入藩司攘亂故違戒勅重傷國體據法通合𠫭究其牛振羅江倡率為首情罪尤重及照長史劉元嗣職專輔導承奉李進陳阮靳用各明知縣主君不合擅出宫閫不行啓王禁止罪實難辭合候命下本部移咨都察院轉行河南巡按監察御史將儀賔牛振羅江等及長史劉元嗣各行提到官從重問擬照例奏請發落其承奉李進陳阮靳用及郡縣主君本部仍行河南布政司備行該府長史司具啓周王知㑹將李進等嚴加切責郡縣主君各加戒飭以後不許再肆輕出以凟國典等因奉聖㫖是欽此械辱知府宣徳六年十一月伊王私怨河南府知府李驥以冬至行禮來遲械繫於獄而屈辱之事聞上謂左都御史顧佐等曰朝臣遇節於大廷行賀禮亦皆於昧爽之際未嘗以四更此必王府䜛邪小人教王辱知府之計朕於王府官每禮待之未嘗厲色盖以親親之故也縱令知府有過王當以聞朕自有處置豈可輒加威福此皆長史典儀承奉之過致書伊王宜謹守祖法勿信䜛枉下承奉長史典議悉械送京師治之欽此正宗室强娶成化三年四月襄垣王㙺等三子奪人妹為妾且稱為次妃上降勅諭襄垣王曰王府娶婦自當奏請妻妾名稱各有等第今王之子强娶人女為妾擅名次妃揆扵禮法寧無礙乎此皆不能嚴束所致王其切責之令還其女庶無後悔正宗室假子成化十六年十月晉府故鎮國將軍鍾鏕無嗣謀收其夫人張氏弟婦之有娠者入府生子以為已子方山王鍾錠為扶同奏請賜名已而得封至是為人發其事且及王近狎樂婦杖死無辜等罪命内外官勘報不誣上降勅切責鍾錠曰髙皇帝封建藩屏政欲子孫相承永享富貴柰何爾身居王位貪滛酷暴又甘與異姓為骨肉得罪祖宗貽羞宗室廷議僉謂紊亂宗支難以輕宥茲特革爾王爵禄米爾其怨天乎尤人乎尚其悔悟之成化十四年十月韓府漢隂王徵鍉無子臨薨時其妃父周恂教以托言宫中有將育者至期密取他姓子女養宫中王母妃平氏亦與聞其事既請封為恂姻家所發恂凌遲處死冐封男女及平氏周氏俱賜自盡追降徵鍉為庶人上乃貽書各王府曰朕惟徵鍉乃韓憲王曽孫憲王實太祖髙皇帝之子髙皇帝奄有天下封建諸王藩屏國家以為千萬世不㧞之基豈意徵鍉祗因乏嗣顧戀房闈私愛輕信外人邪謀致使其母暨妃下挹汙池之流上溷天潢之派其得罪於祖宗豈小小哉身雖淪亡咎難容貸已革其封爵削其謚號追廢為庶人用彰朝廷大法用慰祖宗靈明以為將來警戒嗚呼莒人滅鄫春秋所誅而徵鍉忍心害理一至於此祖宗以來所未有也夫人聞之莫不忿怒况於朕乎况於宗室乎尚恐合宗室親王未知其詳特命所司抄詞并書徧告親藩尚其亮之正宗室襲封成化元年二月廣昌安僖王美堅生母劉氏奏王生時嘗以從兄雲丘王第二子鍾䥏為嗣今王薨逝無嗣請以鍾䥏襲封王爵上曰過繼子封王無例鍾䥏仍准本封為鎮國將軍承廣昌王祀成化十五年閏十月衡山恭惠王妃陳氏乞以衡陽荘和王次子鎮國將軍豪邽為繼嗣且欲進襲王爵上曰祖宗舊制王爵至重前此未有以從子襲爵者朕何敢專且豪邽既係衡山王姪同氣至親只以將軍承繼宗祀管理府事何不可乎若從其請則是衡陽之子有二王矣違祖訓而狥私情朕不為也其已之成化十七年正月慶懐王薨弟岐陽王邃塀襲爵邃垿以其父秩熒乃慶靖王長子奏乞查處扵是懐王母妃孟氏奏邃垿紊亂宗派謀奪封爵事下禮部言靖王子康王秩煃雖云第四係嫡出真寧莊惠王秩熒雖居長乃庶生當時一日同受封爵及各子承襲已定正統四年莊惠王奏奪封襲英宗睿王帝已嘗降勅切責乞遣勅諭王宜遵祖宗定規永保禄位上是其言既而邃垿復奏前事禮部乞下所司轉行該府敎授啓王遵奉先勅母再覬覦非分詔如所議行未至而邃垿又奏岐陽王冒伯作父不無背義於是禮部言自康王論之則岐陽以子繼父自懐王論之則岐陽以弟繼兄揆之於義皆無不可上以康王傳序已定而真寜王累次奏擾降勅切責削禄米三分之一以教授不行諫止命巡按御史逮問之成化十七年六月晉王鍾鉉奏廣昌安僖王長孫奇澢年已長成且故王原賜儀仗印冊尚在乞襲封王爵禮部覆奏安僖王無子妃劉氏奏以兄子鍾䥏為嗣乞封王爵以無例止封鍾䥏為鎮國將軍管王府事令其子奇澢止應封輔國將軍上諭晉王曰承襲王爵宜遵祖宗成憲母再煩擾廣昌王印其即遣人賫送來京欽此革爵争襲正德八年九月魯府鄒平王陽鎕子當涼既革王爵猶與當潩争襲奏訴不已復命司禮太監頼義刑部侍郎黄珂錦衣指揮陸宣往勘還奏當潩當凉皆庻子而當潩為長禮部尚書費宏等前議以當潩襲封革當涼封號其事已明法已正矣而當涼争猶未已者由其父陽鎕狥私溺愛為其母子請封魯王陽鑄亦依違為之代奏而先任禮部尚書周洪謨倪岳等皆為所惑不能據禮以折之皆使淂冐長云繼妃之封已二十餘年故當涼得藉以為辭羣下包慶等利其復立實從㬰之請置慶等於法逮問長史審理紀善以下魯王及洪謨岳等已物故者惟上裁之詔曰當凉累䟽强辯有違祖訓當重治姑從輕令以齊民巾服習禮滿三載以聞仍奪其母原封金冊魯王既引咎舉正停禄兩月洪謨岳已故者宥之長史審理紀善以下俱逮治謫慶等五人戍邉欽此私收净身𢎞治十七年三月晉王奏岢嵐州興縣净身民人郝縉自成化十八年曽祖莊王取入宫中養用𢎞治六年父兄俱䘮送入臣宫與臣作伴乞賜臣府役用該本部查得净身人傅慶等一十八名先經題准發囬原籍衙門收管造冊部去後今郝縉係先年本府私收檢舉改正奉有欽依各發原籍人數本部未敢擅便等因奉孝宗皇帝聖㫖郝縉准留與王使用欽此𢎞治十七年崇王奏要將本府私收净身人髙宣革退但念累嵗微勞等因本部查照成化二十二年本部為各王府非奉朝廷明文撥去擅收净身之人題奉憲宗皇帝聖㫖都逐囬原籍收管不許投托在外王府容隱潜住事發重罪不饒欽此欽遵等因覆題奉孝宗皇帝聖㫖髙宣准與王使用今後有違例投托的各王府俱不許容留欽此正徳二年十月晉王奏河中王啓稱本府内外早晩隨侍出入㸔守宫門等項查得臣祖晉莊王存日將净身民石唆面賜臣父河中悼懷王撫養後遵例囬籍乞賜臣㸔守宫門等因本部查無事例覆題奉武宗皇帝聖㫖不准着山西鎮守等官提送來京欽此正徳三年六月寧王奏宜春王奏稱内使唐仁胡潤在府年深乞賜冠帶本部覆題奉武宗皇帝聖㫖唐仁胡潤原係本府私收不准今後但不係欽撥去的乞恩保陞都不准如有妄奏長史教授治罪不饒恁部裏還行文去各王府知道欽此正徳四年該本部議得歴年遵奉禁約私自净身之人及投托王府事例已經反覆申明再四其郝縉高宣准留該府使用係一時特恩乃敢更希保陞如唐仁胡潤之徒法難輕貸今後如有王府收用私自净身之人聽本處鎮巡等官奏聞區處其違例保陞者聽本部查參治以重罪等因奉武宗皇帝聖㫖欽此正徳十六年詔各處無名内使私自净身人等有托故擅入王府因而撥置害人貽累宗室者撫按嚴加治罪𢎞治五年八月秦王奏稱各王府將軍議賔官員軍民人等私放錢債等因本部議行各王府如遇婚喪等項事情有不得已者止扵本府宗室借貸無得加倍取利若彼此親愛以債還亦不淂過三分其餘儀賔官員軍民之家並不許似前貪利於債覆題奉孝宗皇帝聖㫖准議欽此𢎞治十六年十二月兵科給事中戴銑題稱各處親郡王及将軍中尉等官今後務要恪遵祖訓無從匪彛其軍民人等敢有私交王府因而借索錢物邀請遊宴一切撥置誘導為非者許所在官司體訪挐問等因本部議得准其所奏特降勅者省諭各府親王俾令戒諭違者許教授等官極言諫阻如或不從具啓親王轉奏請自上裁仍行各王府地方官貟軍民之家通行曉諭禁約覆題奉孝宗皇帝聖㫖是欽此正徳四年該本部議得結交王府及違例放債撥置為非其害甚大所當深懲而痛絶之者也本部雖節行奏准禁約去後中間恐有無籍之徒猶縱玩不悛合再申明永為遵守等因奉武宗皇帝聖㫖是欽此嘉靖三十二年十一月㸔得兵部咨稱巡按直𨽻監察御史蔡朴題稱代府宗室驕縱不檢聴信撥置濫放錢債非刑逼取致傷民命乞勅代王鈐束參究該本部議照代府分封嵗次宗室繁衍其恪守祖訓樂善好禮乃其自求多福却乃驕滛縱肆蔑棄禮法廣放私債收息違例逼取無償輒用酷刑甚将有隙之家無故扳引准折肆行致鬻男女慘毒不可勝言民命深為可惜而被告法司復爾窩占拒捕法守不振士民含寃誠有御史蔡朴之所奏者竊惟大同密爾强敵居民多占軍伍特封親王於此地者盖欲其鈐束宗室國家建屏翰也宗室之中不知自愛者親王當訓教而鈐束之教之不從當據實而參究之必使其畏法守分乃於祖訓無違若因强宗室肆拒逞刁揑奏之故遂并其當為防檢者一槩寛縱萬一民不堪命因而别有踈虞其為國家之害當何如哉所據御史蔡朴具題前因無非保愛宗室以全國體之意委應議處合候命下行移翰林院請勅一道賫赴代王令其戒諭各該郡王宗室儀賔今後務要仰體聖心恪遵祖訓追訟既徃之愆以求自新之實如有仍前濫放私債酷刑逼追准折子女扳引傍人等項許被害之人具告按察使一面啓王從實𠫭奏處治不得狥情故縱一靣呈撫按官咨呈都察院查究其撥置之人都察院轉行彼處撫按衙門嚴加挐問照例發遣各該宗室敢復有窩藏占恡即是抗違國法許撫按官指名㕘究將本爵本職禄米停革俟罪人既得之後果與宗室無干奏請闗支等因奉聖㫖是欽此蓄養異姓正徳二年十月懐仁王奏臣祖先年買到小厮二名乳養長成乞行山西布政司行令臣府隨侍出入該本部查無事例覆題奉武宗皇帝聖㫖既無例罷欽此正徳四年該本部議得宫閫之内豈容濫收外人乳養恐後别生事端為惡非細合無行移各府長史啓王知㑹嚴加禁約如違𠫭奏輔導官員從重治罪等因奉武宗皇帝聖㫖是欽此乞恩宥罪𢎞治十八年四月内荆庶人祐柄奏稱早荷先朝洪恩冊封世子後父所犯與臣並無干係乞要宥放蘄州㸔守祖陵等因本部㸔得荆庶人祐柄先該刑部議稱阻格勘官不肯更改雖是本於父命頗亦同惡相濟題奉欽斷遷發武昌城内居住擅難議擬覆題奉孝宗皇帝聖㫖罷欽此嘉靖十七年十一月内該本部題為開讀事伏讀詔書内一欵鳳陽髙墻庶人因父祖得罪遷發并遺下妻妾人等久罹禁錮誠可矜憫着司禮監官一員禮部侍郎一員前去議奏定奪欽此欽遵臣等查得左侍郎張璧右侍郎蔡昻俱在任伏乞簡命一員其司禮監官該監奏請欽命俱候命下行移翰林院各請勅前去㑹同鳳陽太監王徳并撫按等官督同中都留守司及鳳陽府衛官親詣將見在禁錮庶人遺下妻妾人等遵照恩詔事理逐一查審分别輕重議奏定奪等因奉聖㫖是着蔡昻去欽此萬厯十八年九月内守備鳳陽等處太監王徳節奉勅諭鳳陽守備撫按官今命内官監左承張奉等前去將髙墻内人口共四十五名放出分送陜西等處各該王府隨住有續生名口應分送者爾守備官同差去官逐一查明照例分送其宸潜宸泬宸涖宸澐宸漣宸沂大哥多燦拱柁等俱係逆黨親屬難以輕釋原来妻妾配育子女候宸潜等九名身故之後爾等比照今例陸續奏請釋放送囬庶幾情法兩盡爾等其欽承之故勅欽此嘉靖二十三年九月該守備鳳陽等處御用監太監張信等遵勅具奏庶人宸潜已故乞要将遺下妻妾陳氏男紹祖等釋放囬府居住等因該本部覆題奉聖㫖是欽此嘉靖二十七年四月内岷王奏稱鎮國將軍譽栐為父彦泥久病將危自願棄禄米入髙墻事父身終乞要特垂恤典釋彦泥生還或准令譽栐入墻事父以全子孝等因該本部議照彦泥彥汰先年訐奏情由俱各罪惡深重而彦汰止是革爵彦泥謫𤼵髙墻當時譴斤固已不同其後彦汰奉詔復爵又出特恩今譽栐援此節行奏擾雖為乞貰子情可矜而原情正法父過難宥投身終事又無事例伏乞聖裁奉聖㫖彦泥所犯罪重難准釋放欽此嘉靖三十四年四月該守備鳳陽等處内侍官張奉等遵勅具奏庶人宸漣已故乞要將遺下男大哥男婦劉氏等釋放送囬府照例給與房屋柴米養瞻等因該本部查照宸潜事例覆題奉聖㫖是欽此嘉靖三十四年九月内該巡按直𨽻監察御史金淛陶承學奏稱鳳陽一府我聖祖肇基之地外有皇陵之重内無城郭可依髙墻五座散處其間前年師尚詔肆亂既獲招有搶挾髙墻之謀合無勅下禮部刑部㑹議除見在罪重正身不敢輕議外其餘情有可原者發囬本處王府居住仍將各墻并入一二處以便防守等因奉聖㫖兵部知道欽此備咨到部移咨都察院轉行彼處撫按㑹同守備查勘三十六年三月内續准巡撫鳳陽都御史陳儒咨稱所據各庶雖審口詞在官中間恐有隠匿情遽難盡信必須移咨該部㑹同法司㕘酌應禁應釋㑹議題請等因到部該本部尚書吳等㑹同刑部尚書歐陽必進都察院左都御史周延除将守備撫按會議知㸎等三十三起及刑部都察院查議聰漝旭楦鼒材共三起情罪深重禁錮未久者不敢議擬釋放外會議得見存庶人聰㵞聰湤觀燱秉柃英穫禾火等四起俱違例越闗禁錮年久情有可原已故庶人宇淙一起及表檑聰沂俊檴惟熇惟燔顯蘽顯櫸成銳七起俱止越闗刼財等事比與反逆者不同其遺下家屬俱合議處釋放合行司禮監奉差内官請勅前去會同守備撫按等官將各庶人并家屬等送囬原府居住仍咨都察院轉行各省撫按啓王知㑹如遇聰湫等到彼照依髙墻庶人事例給與房屋柴米養瞻其髙墻五座仍行鳳陽撫按守備酌量可歸併者歸併不必拘定二處務要内以全其倫理外以便于防守徑自題覆施行今将會議過各庶人犯罪縁由開坐上請等因奉聖㫖是欽此戒飭狂病𢎞治十二年二月鎮守廣西太監張瑄題稱靖江王染病風邪任意晝夜出入恐有不虞等因本部㸔得靖江王不能以正自持惑於異端致生心疾合無請勅前去省諭覆題奉孝宗皇帝聖㫖是靖江王并本府内外官員便冩勅去戒諭欽此嘉靖三十二年十月荆王奏稱都昌王載塎悖戾𦍕狂乞要議處該本部尚書歐陽徳題備查先奉欽依載塎父死不顧婚利是圖事母不孝逼索嚢橐打死閽使抉人眼目有違祖訓又稱本王殺人敗倫神天共憤不敢顯言其過以傷親情則本王素行原是未易化誨之人臣等切思王果風病則難諭之以禮非㢲言之所能入若是𦍕狂則當制之以法使邪念不得自逞且前此解慰省諭至再而及今悖戾愈甚又似非盡出風病今不禁制誠恐後來禍出不測合行湖廣撫按衙門行令都布按三司㑹同荆府承奉長史等官前去宣諭載塎無再悖違祖訓𦍕狂自恣其第一子亦無得藉父風狂相助為非就於本府内擇嚴密宫院一所安置本王令妃妾宫人伴守外鎻宫門使不得放縱去内傷人器械使不得逞兇其府第大門荆王府差内外官校闗閉䕶守無得縱容奏内所稱買刀人等私自出入其一應䕶守事宜及傳通内外言語接遞本王服膳俱要處置得宜務令安便無致窘迫所貴足以制本王狂悖之行而亦不失朝廷親睦之恩其該府教授官宜令加意輔導長子飭躬勵行用盖父愆等因奉聖㫖是欽此宗女過犯𢎞治十六年二月秦昭王庶長子惟焯奏稱鎮國中尉秉根秉櫻各啓稱奉國將軍誠潯二女淳化鄉君新年鄉君因父打罵畏避出府在於寡婦梁氏鄭氏家送入伊兄秉根秉櫻二府潜住欲要選婚等因本部㸔得淳化鄉君新年鄉君既年長成已授封號却因懼打罵私自迯出及照誠潯不思慈愛訓誨致令迯出伊兄秉根秉櫻不避嫌疑擅自收住合行秦府省令誠潯即將二女娶囬然後照例具奏選婚覆題奉孝宗皇帝聖㫖是欽此正徳四年該本部議得誠潯不思撫育打罵二女為父固不慈矣然二女擅自迯出二兄徑行收住俱屬非禮除已往外今後但有如前所為者本部行移彼處鎮巡等官務要查究所由若本女自因别故懼父脫迯者不許請封選婚有玷宗室等因奉武宗皇帝聖㫖是欽此𢎞治十八年十一月内准刑部咨開送晉府慶成王府南海郡君親自赴京奏理縁由本部會同太子太保刑部尚書閔珪等議得近來王府郡縣王君多有聽人撥置赴京奏擾等因題奉聖㫖是近來将軍中尉及郡縣主君等多有不遵禮法輒擅出郭來京騷擾路途貽玷宗室便通行各王府好生省諭禁約敢有仍前故違的一體依擬究治不饒欽此嘉靖三十二年五月隰州王府管理府事輔國將軍俊樚𠫭奏儀賔栁廷鳳宿娼賭博夤夜歌飲以致廣望縣君被不知籍貫逰唱子弟王進賢王佩夤夜誘引去訖要行移山西撫按通行各處地方挨訪得獲明正其罪該本部㕘㸔得儀賔桞廷鳳縱肆酗滛帷薄不修以致縣君相背被誘私奔大壊風化有玷宗藩既該管理府事將軍俊樚㕘奏前來又該禮科𠫭稱前因委應重究合無將栁廷鳳革去儀賔職事廣望縣君革去封號誥命冠服俱行追奪候命下之日本部移咨都察院轉行山西撫按衙門將奏内有名人犯查題到官嚴究根由從重問擬及作速差人分投尋訪追獲囬府具由𠫭奏以慿題請定奪及照俊樚叨膺管理之任不能約束宗儀怠玩法職罪亦難辭伏乞天語叮嚀嚴行切責仍將輔導等官行彼處巡按御史提問照例發落以為鈐束不嚴之戒本部尚書歐陽徳等具題奉聖㫖是栁廷鳳併縣君都革去封號追奪誥命冠服其餘人犯并輔導官都着撫按官查題究問俊樚姑免究欽此禮部志稿卷七十九
