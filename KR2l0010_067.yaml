body:
  text: 禮部志稿卷六十七眀俞汝楫編聖學備考聖覽進覽大學衍義𢎞治十五年江科給事中陶諧言經史繁多難於遍覽惟宋儒真德秀大學衍義一書簡而明約而盡乃治道之指南請以是書一置經筵以備進讀一置宫禁以備退覽庶益𢎞盛德大業於無窮有㫖令禮部看議以聞禮部言衍義一書已命儒臣於經筵進講今諧復以為言誠以治天下之大本大端莫要於此伏乞聖明俯納其言益勤聖學不獨外而經筵雖內而宫禁亦置一編用備觀覽則聖德愈宏治道益隆矣納之推行聖學𢎞治十一年禮部覆奏部院大臣所言內一事曰推行聖學者請因今日所講之書驗古人已行之事獨運於心以謹用人之道上曰推行聖學朕自體行其餘俱從所議經筵儀初定經筵儀正統元年禮部尚書胡濙等進經筵儀注先是少傅兵部尚書兼翰林大學士楊士竒少傅工部尚書兼謹身殿大學士楊榮禮部尚書兼翰林院學士楊溥言伏惟皇上肇登寶位上以繼承列聖下以統御萬邦其根本在致力於聖學自古聖賢之君未有不由講學而能致治者也書曰王人求多聞時惟建事學於古訓乃有獲又曰僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣繇是言之凡經筵講讀之官左右侍從之人必皆選正人用之君德庶有成也於是上命太師英國公張輔等推舉講讀官以聞上賜敕諭以輔知經筵事士竒榮溥同知經筵事少詹事兼侍讀學士王直少詹事兼侍講學士王英侍讀學士李時勉錢習禮侍講學士陳循侍讀苗衷侍講髙榖修撰馬愈曹鼐兼經筵官翰林院春坊等衙門儒臣分直侍講又以太子太保成國公朱勇少保兼工部尚書吳中吏部尚書郭璡禮部尚書胡濙兵部尚書王驥刑部尚書魏源都察院右都御史顧佐侍班至是禮部進儀注一每月初二十二二十二會講每日止用講讀官四員學士輪流侍班不用侍衛侍儀執事等官侍班講讀等官入見行叩頭禮東西分立先讀書次讀經或讀史每伴讀十數遍後講官直說大義惟在明白易曉講讀後侍書官侍上習書畢各官叩頭退經筵會講禮儀嘉靖改元七月該本部題為經筵事欽奉敕諭禮部朕惟講學修德乃帝王首務兹欲於八月初二日御經筵爾禮部其具儀并合行事宜來聞故諭欽此欽遵㑹同華蓋殿大學士楊廷和議得筵官經筵會講禮儀開坐上請節奉聖㫖是欽此初御經筵禮儀先期講讀官撰四書經書講義各一篇務要明白簡當切於正道各豫置於所講書會講禮儀每月初二十二二十二會講先期司禮監官陳設御案如前至期候上御文華殿侍衛侍儀執事進講禮同但各官止行叩頭禮是日各官俱青素衣服供事侍班官內閣六部都通大詹事府翰林院國子監光祿寺五府錦衣衛鴻臚寺六科舊例禮科轉行各科太常寺遇講讀之初例該祭講書官兩班輪流詹事祭酒學士諭德侍讀編修展書官兩班輪流翰林院修撰編檢等官八員寫講章並起止官兩班輪流中書等官八員執事官鴻臚寺堂上官一員錦衣衛堂上官一員侍儀御史二員給事官二員鳴贊序班八員侍衛將軍二十員嘉靖九年三月該兵部咨稱駙馬都尉塢景和係是管領大漢將軍侍衛帶刀人員例該經筵侍班該本部覆題奉聖㫖是欽此罷雜流官侍班成化四年二月六科給事中十三道監察御史皆言掌太常寺禮部尚書李希安發身道士不宜令預經筵上曰經筵之設所以講明道學關係甚重故侍從皆用文學之臣希安既非儒流可罷侍班但令供禮官之職經筵進講洪武朝進講髙皇帝干戈未戢文德先陳軍旅之際延召名儒如戊戌之春即召儒士許元葉瓚玉胡翰汪仲山李公常金信徐孽童冀吳履張啓敬孫履㑹食寧越行中書省日令二人進講經史敷陳王道即位之後大開講筵靡間寒暑時發宏議覃為訏謨有老師聞人所不能窺一班者如洪武三年二月御東閣翰林學士宋濂待制王褘等進講大學傳之有土有人章上曰人者國之本德者身之本人主有德則人歸之如就父母有土有財自然之理德不足以懷衆雖有財何用哉十六年六月御謹身殿東閣大學士吳沈等講周書國則罔有立政用憸人上曰國家不可有小人有小人必敗君子故唐虞任禹稷必去四凶魯用仲尼必去少正卯不幸有小人如畜毒藥不急去之必為身患小人巧於悅上忍於賊下人君若喜其順適任其所為而不問以為怨將在彼譬如犬馬傷人人不怨畜犬馬者乎沈曰小人中懷奸邪而其所言甚似忠信不可不察上曰然小人善於逢迎彼知人君所樂不顧非義乃傅㑹曰是可為知人主不樂為者不顧天下國家亦傅會曰是不可為自古知人為難知言亦不易也十八年五月御華蓋殿大學士朱善進讀心針畢上曰人心道心有倚伏之機蓋仁愛之心生則忮害之心息正直之心存則邪詖之心消羞惡之心形則貪鄙之心絶忠慤之心萌則巧僞之心伏故人常持此心不為情欲所蔽則至公無私自無物我之纍九月命大學士朱善講周易至家人上曰齊家治國其理無二使家長幼內外各盡其分事事循理則一家治矣達之一國天下舉而措之朕觀其要祇在誠實而威嚴誠則篤親愛之恩嚴則無閨門之失二十年五月御華蓋殿侍臣進講因論人之善惡感召不得其常上曰為惡或免禍然無可為之惡為善或未䝉福然無不可為之善人惟修其在已禍福聽天彼不然者時未至耳二十六年秋七月選秀才張宗濬等俾隨詹事府左右春坊官分班入直文華殿侍講畢進說民間利害田里稼穡等事間陳古今孝弟忠信文學材藝諸故事日以為常二十八年十二月侍臣進講尚書無逸上曰國家以勤興以逸廢勤與逸理亂所繫成王時天下宴然周公作是書上自天命下至生民閭里怨詛莫不具載朕每反覆詳味求古今之用心書於殿壁朝夕省閲以為鑒戒今日聞之愈益警惕永樂朝進講文皇表章經學時抒藻思永樂二年八月大學士解縉等進大學正心章講義上覽之至再曰人心不可有所好樂一有好樂泥而不返則欲必勝理若心能靜虛事來則應事去如明鏡止水自然純是天理朕每朝退默坐未嘗不思管束此心又思為人君者但於宫室車馬服食玩好無所增加則天下自然無事宣德後歷朝進講列聖相承崇師重道宣皇寫竟簡編丕降著述細旃之談流為琬琰宣德二年三月御文華殿儒臣講孟子上曰伯夷太公皆歸文王武王伐紂太公佐之伯夷扣馬見何不同太公心在當時伯夷心在萬世無非為天下計也二年冬十月御文華殿儒臣進講易觀大象畢上曰古者帝王巡狩禮後世何以不行亦世勢不同也舜時五載一巡狩二月東嶽五月南嶽八月西嶽十一月北嶽一年遍天下五年又去後世人君一出千乘萬騎百姓供億不亦難乎成周十二年一巡已與虞時不同况後世乎豫以為治貴實效誠如古帝王選任賢良撫養百姓崇德報功畢協至公不患制度不一民風不振若以後世侍衛之衆征求之廣欲行時巡之制難矣二年十二月侍臣進講貞觀政要上曰唐太宗致治之美庶幾成康實本乎此豫謂安天下必先正其身未有身正而影曲上理而下亂者治國如栽樹本不搖枝葉茂盛君道清靜則百姓安樂皆要語也三年二月御文華殿儒臣講舜典畢上曰觀二典三謨則知萬世君臣為治之道不出乎此以閏月定四時天道以明奠髙山大川分别九州任土作貢地道以成克明峻德協和萬邦人道以建九官十二牧後世建官不同不出乎此當時君臣都俞吁咈更相告戒用圖治功氣象藹然何後世之不及也十月儒臣進講春秋畢上曰聖人匡世之功憂世之心備見此書當時先王禮樂法度日廢亂臣賊子接迹而起有此書而後天下皆知尊周又曰孔子以尊周為本孟子乃以王天下勸齊梁何也聖賢之心無非為天下計孟子時不有王者興何以解生民之塗炭遂賜講官坐命左右賜果茗六年三月御便殿命翰林儒臣進講大學平天下章畢上曰治天下不可無財用如生之者衆四語不必征暴橫斂而國用有餘矣又曰秦誓曲盡君子小人情狀人君審此則好惡用舍當矣漢唐中葉小人幸位妨賢病國卒為厲階聖賢之言萬世龜鑑九年十二月翰林侍臣講周書畢上因論周之王業及成康治效曰當時皆以周之不造及成王定奄平淮東土始寧繼得罪人又大雷電以風王迎周公歸遷殷頑民而王室以安自是刑措四十餘年歷代八百則知始之震撼正天以維持鞏固之也譬如人之身不幸有疾加意調治所以培固元氣克臻夀考天之所定豈偶然哉孝皇虛懷聽納天語叮嚀惟恐不盡𢎞治十七年九月召大學士劉健等至暖閣諭曰昨令李榮諭日講官陳善閉邪陳字當作敷陳又言他字未當不若啓沃之然不必深忌須直言無諱道理皆書中本有非是自撰若不說盡終無進益論思輔導皆所當言可諭講官不必顧忌昨似有顧忌耳是日天顔甚悅恐因此有所觀望故特示詳悉如此十八年三月張元禎上疏勸經筵講太極圖西銘性理諸書上嘉納之索太極圖一觀曰天生此人以開朕也世皇鋭意典謨既以無逸名殿時灑宸章刋為注疏四年十一月上謂無逸一篇聖祖御序洪範均治天下之法因命輔臣撰序刋布已復再注尚書名曰三要六年六月上諭內閣令翰林講官日輪一員將經書通鑑撮其有關君德政事與修省之道者直𨽻其義以贊所未曉庶心得其㫖而理自通大學士楊一清等言自古經史大義盡具宋儒真德秀所撰大學衍義一書中請修先朝故事日令儒臣進講上曰大學衍義可令直解參以時事以開朕學若日逐進覽恐不得精冝五日一進不以寒暑廢庶得探索精研不徒勞精神虛延日月一清等復請於經筵講官內與日講官各分為兩班每逢三八日以次輪講臣等仍日輪一員侍班至於春秋月日和煦涼爽之時經筵日講俱照舊規惟三八日專講大學衍義上曰講學為治之首君道當先朕虛懷以受卿等及講官盡心講說開誠啓沃以資朕學卿一清等侍班賈詠等日輪一員如有召論不在此例至於春秋之時不必於三八日可以該朝兩宫之日既免日講只於午後進講衍義庶並行而無廢乃命侍郎溫仁和桂萼張璁詹事董玘侍讀學士徐縉祭酒嚴嵩庶子穆孔暉諭德顧鼎臣張璧許成名洗馬張瀚贊善謝丕更直進講十月上以日講論語曽子有疾章諭諸臣無忌還當補講又以講官董玘行立無讓之體令輔臣諭之玘自是見上屛息上謂其知改令供職既侍讀汪佃講洪範九疇不稱㫖上親講解其義謂輔臣曰人君盡倫理於上萬姓化於下倫序明而道大備福將自至以佃講讀遲鈍令吏部改調外任因命內閣選擇翰林諸臣稱職者留用不稱者量材除他官三月御經筵國子監祭酒陸深奏講章為內閣所改上曰此故事也汝有所見當别疏具聞若任巳意必有雜說以亂理學十年四月上幸西苑御無逸殿命大學士李時翟鑾坐講時進講書無逸篇鑾進講詩豳風七月之章武定侯郭勛及九卿大臣皆侍講畢上御豳風亭賜輔臣并勛等及翰林儒臣宴亭下退而勛等奏謝上曰朕以無逸殿豳風亭雖觀耕之所亦勤學所寓昨舉落成之禮因命輔臣進講賜卿等宴卿等當協心匡輔以躋太和十一年九月講官侍讀學士吳惠郭維藩進講既退上諭輔臣李時等曰講官惠言省無益之費停得已之役維藩言去操切更張之弊務淳厚博大之體者云何卿等以朕意問之有可補救時冝者令條列以對於是惠疏言方今民窮財盡而宫殿興作不已採木燒磚大為川廣蘇常之患此宜停罷各省嵗辦物料宜敕有司准以折色解京從冝置辦毋使民困於徵解之苦此宜節省且謂自鹽法阻壞糧草改折諸邊積貯空虛宜減價惠商疏通餘鹽其輸邊糧草可仍復本色以為足國經久之計維藩疏言今者士風漸漓一切好更張以取聲譽以譸張為變通安靜為迂腐嚴急為才幹寬厚為無能好惡任情不以為恥如此則俗薄而政龎非細故也宜申飭臣工崇本實修職業乞於各衙門條陳之㫖擇其籌慮深長事可經久者方賜施行毋徇操切之論求人過甚立法太嚴庶幾養成惇大之俗且請復庶吉士之選以育人才停選貢之例以疏壅滯疏上各報聞二臣頗有所指切上亦不罪也十二年十月禮部尚書夏言以學士進講上製聞過篇賜之講日講儀正統元年二月定日講儀上御文華殿內閣學士侍班不用侍衛侍儀等官凡日講官或四或六開讀初吉服五拜三稽首後常服止一拜三稽首先一日進講義其日講讀官先入直房候駕出內官傳宣入文華殿閣臣於屏左右講官於東西暖閣門南各東西立少選閣臣進屛內講官進屛南仍東西立候上口宣先生來同承㫖入稽首東西立讀書者先至御前一揖向左盤旋二步至案展書壓金尺或壓兩旁或直或監執牙籖讀五過掩書一揖退讀經者亦如之以次進講進退之節皆如讀儀講畢壓金尺盤旋二步一揖退文華殿賜茶文華門賜酒飯一拜三叩首酒飯後俟進字畢進講史書如前儀講畢一拜三叩首一揖候上出案舉手北向一揖時上日御文華殿誦書講學至午後還宫𢎞治間孝宗皇帝每日講二次𢎞治十八年十月武宗皇帝即位大學士劉健等言伏覩先帝初年日講常至嵗暮不輟臣等擬於十一月初二日為始伏乞聖明遵照先朝事例每日御文華殿暖閣令臣等兩次進講則聖學可成太平可致實宗社萬年無疆之慶除經筵事冝俟明春别請今將日講儀注條上一伏覩皇上在春宫講讀論語尚書各未終卷今合於每日接續講讀先讀論語五遍次讀尚書五遍講官各隨即講明講畢各官皆退一講讀後皇上裁决政務有暇即看字體隨聖意寫字一幅不拘多寡俟午講時臣等恭看進呈一近午初時講大學衍義歷代通鑑纂要講畢各退一每日各官講讀畢或聖心於書義有疑即問臣等再用直解務求明白上曰朕以哀疚故久輟講今聞卿等述先帝顧命知講學誠不可緩其如期舉行正德元年九月司禮監𫝊示欲免午講閣臣劉健等疏陳不可經書固聖賢大道通鑑乃古人事跡請如舊每日進講二次上曰已知之嘉靖六年每月之三日八日用日講官二人講大學衍義閣臣一人侍賜茶酒飯如日講儀隆慶六年每日早閣臣及講官講畢各退上進暖閣少憩司禮監將章奏進覽閣臣等進西房候上咨問即召至御前敷陳疏中事情已乃率領正字官恭侍上還宫隆慶間每日視朝畢即御講筵萬厯後以三六九日視朝不講餘日冬夏不輟萬厯九年閣臣請章奏重大事情先進後殿面陳及講祖宗訓録出仍同講官進講史書儲宫備考儲教上洪武元年正月以李善長為太子少師兼詹事馮勝兼少詹事楊憲傅瓛兼府丞徐達兼太子少傅常遇春兼太子少保鄧愈湯和兼諭德章溢兼贊善劉基兼率更令三月以劉基為御史中丞兼太子贊善十月以梁貞王儀為太子賓客秦鏞盧德明張昌為太子諭德上曰朕命卿等輔導太子必先養其德性使進於髙明然後於帝王之道禮樂之教及往古成敗民間稼穡朝夕論說日聞讜言使無非僻之干積久以化他日為政自然合道卿等勉之十一月命諸儒作鍾山龍蟠賦置酒歡甚御製時雪賦東宫官各賜袍服二年十一月建大本堂取古今圖書充其中延四方名儒教太子諸王分畨夜直選才俊之士充伴讀上時賜宴賜詩商榷古今評論文字無虛日三年四月命博士孔克仁等授諸子經定東宫官屬之制上召東宫官屬及王府官屬諭之曰輔導之臣猶法度之器先正已而後正人蓋德義者正人之法度善惡者修身之衡鑑汝觀之梓匠雖有材木必加繩削乃能成器太子諸王必得賢輔開導贊助乃能成德古人已行之事可為鑒戒者採托編次朝夕觀覽以廣知識亦有助於輔導羣臣頓首謝復顧謂劉基曰古賢聖之君不忘修省冨貴易驕必至於荒縱未有不覆基頓首曰陛下此言萬世之福也五年十二月復以宋濂為太子贊善六年七月以儒士桂彥良為太子正字九月命諸司常事啓皇太子重事乃奏聞上謂皇太子曰人君統天下人情物理必先周知然後臨事不惑吾自起田里至於今日凡治軍旅理民事無不盡心恆慮故嘗深念古人為治必廣視聽凡言之善者即行之不善者雖不行亦思繹至再果不可然後置之夫慮事貴明處事貴斷庶幾不眩汝生長宫掖未涉世故若局於見聞則視聽不廣且目雖能視不踰於閾耳雖能聽不越於庭而欲天下之務一一當理難矣汝冝親賢樂善以廣聰明逆耳必求其善順言必審其非汝其敬之七年正月上召太子宫臣諭之曰汝知重器乎對曰商彛周鼎上曰非也太子天下重器人有彛鼎尚知寶愛太子主器之重寶愛之者必擇端人為輔朝夕與俱使熟聞善言不邇詖行以成其德若委之便嬖近習是委重器於塗矣汝等日輔太子講論誦說必導之以正使其道明德立才器充廣庶幾他日克勝重任以副朕望九年正月太子諸王侍上曰汝等聞修德進賢之道乎太子對曰儒臣講說知其略矣未領其要上曰藻率雜佩為身之容恭遜溫良為德之容見於外者可以知內古之君子趨蹌有節升降有數周旋跬步不違矩度者其德充也已德既修足以服人賢者彚進不肖者自去天下國家未有不治不知務此鮮不敗矣夫貨財聲色戕德之斧斤讒佞諂諛杜賢之荆棘當拒之如虎狼避之如蛇虺溺於所好必為其所陷汝等慎之十年十二月上諭李善長等曰人君聰明雖是天性然物理必察識而後知人情必諳練而後熟若臨事不熟驟然斷决恐未盡善既行之後覺其非而欲改之妨事已多前者令皇太子射奏朝臣啓事練習國政恐聽覽之際處置未當自今政事啓於東宫者卿等二三大臣更為參决可否十二年三月上御華蓋殿皇太子侍上曰比讀何書對曰商周之書上曰讀書亦知古君道否君道以事天愛民為重其本在敬身人君一言一行上通於天下繫於民敬以將之而後無不善善天必鑒之不善天亦鑒之一言善四海䝉福一行不謹四海罹殃可不敬乎二十五年九月以馮勝傅友德李景隆藍玉詹徽茹瑺任亨泰杜澤楚樟康鐸楊靖皆兼東宫師傅等官二十六年正月上御文樓太子侍上問近講經史何事對曰昨講漢書七國叛漢上曰孰曲孰直對曰曲在七國上曰此講官一偏之說冝言景帝為太子時常投博局殺吳王世子以激其怒及為帝又聽鼂錯之說輕意黜削諸侯土地七國之變實由於此若為諸子講此則當言藩王必上尊天子下撫百姓無撓公法如此則為太子者知隆親親之恩為諸子者知盡君臣之義嘉靖三十二年二月上諭大學士嚴嵩等曰二王講讀朕聞昨秋止將尚書過口二三豈成學業自書入經先讀大學熟記徹講續以中庸卿導㸃字若何昔仰荷皇考恩教子至慈之中朕不用力今日何事克善不令力學又誤矣嵩等對曰皇上追念皇考訓思令二王殿下力學臣等不勝欽仰先書入經乃聖賢教人次第臣等去秋所進書程據舊儀以大學與尚書每日並讀並講當導諭行儲教下請諭教太子𢎞治十年禮科給事中葉紳等言古帝王之有天下未嘗不以儲二為重教諭為急故早建太子以繫天下之心預選宫僚以輔太子之德所以享國長安率由兹道陛下以社稷為重四海為心既早建太子以定大計矣今皇太子春秋漸盛新命加冠諭教之道不容或緩宜令諭德等官量授經書教以誦讀正字等官量書字帖教以倣習庶習與智長化與心成實社稷萬年無疆之休也章下禮部覆奏紳等所言教諭太子實朝廷重大本之事乞賜採納詔待明年春暖以聞皇儲四事𢎞治十六年吏科給事中吳舜上疏言輔養皇儲四事一乞敕宫僚弗辭寒暑竭力供事而其所以為教必以仁孝禮義為本一乞專設東宫師傅一二員求德望素協如尚書吳寬侍郎謝鐸者今以舊官供事俟其功蹟顯著然後加以師傅之銜至如詹事庶子下至校書正字等官亦必求中正之士出自進士正途者用之一乞敕皇太子延訪宫僚朝夕與處講求古之帝王言行以為法戒仍以大小宫僚輪直進言務引當道一乞求正直素聞善於開導者三四人以充司直清紀司諫之職仍敕皇太子虛已受言以為他日納諫之地疏入上命禮部同吏部議處以聞尚書張升等言舜以太子天下之本必賴師傅輔弼之官朝夕啓沃宜賜施行其欲擇師傅并選補司直清紀司諫等官則非臣等所敢擅議乞敕內閣大臣同各衙門堂上官議擬具奏上命姑已之博選鴻儒充宫僚嘉靖十五年監察御史余光言今者聖嗣誕生異日正位東宫統臨大寶宗廟社稷天地生靈所關非小而其本則在於蚤諭教而已祖宗設東宫官屬如詹事府左右春坊司經局等官皆為輔導而置請博選鴻儒充師保賓客之任以立教於豫禮部議覆皇儲為天下本當慎䝉養請以光言下吏部預訪人材俟冊立舉行報可東宫出閣講學五事嘉靖二十三年南京禮科給事中游震得奏請東宫出閣講學因條陳五事一大明集禮皇太子加元服參用周文王成王冠禮之年近則十二逺則十五若出閣講學則年八嵗則猶未及元服也今東宫出閣未及冠期宜加便服以從安適俟年十二以上始行冠禮則講學不至過時一出閣講學之後宜習宫庭朝參之禮及臨見羣臣參决機務等事一皇太子始出就學禮文冝從簡便令講讀儒臣更畨陪侍隨事納忠不必盡拘講筵之禮庶可使之好學不倦一國初所定皇太子答拜禮非人臣所敢當宜聘有德望大臣致仕年七十以上者使為賓客不煩以職事優之拜禮乃為得宜一仁宗宣宗在東宫皆監國視事故備諸官屬及憲宗睿宗皆八九齡故司直以下皆不備官今皇太子猶沖年講讀之外似不必備設宜漸簡正士儲之翰林察其德業修舉者以次推補事下禮部部言請俟出閣之日備查纍朝舊典參酌諸事宜以聞上然之集議儲養要務隆慶四年南京禮科給事中張崇倫等以東宫出閣届期上言五事一崇孝敬以事君父二敦齒讓以賓耆舊三謹服器以養儉德四勤接見以資輔導五慎選用以備官屬南京貴州道御史楊邦憲等亦請擇簡講讀儒臣務略去禮文令其以經史諸書及國朝訓典從容勸講凡坊閒一切蕪雜之書悉屛去之內直之司必用老成質實者使隨事納規啓發尤易皇上尤當克謹身教以敬天勤民敦仁尚儉之事親為解說訓飭之斯儲養元良之要務章下禮部知之禮科給事中張國彥四川道監察御史李采菲南京禮科給事中張崇儉貴州道監察御史楊邦憲等以東宫出閣各疏陳輔導事冝章下禮部尚書潘晟等覆言諸臣獻議雖殊大意有十曰慎選宫僚曰久任輔導曰精擇近侍曰親近師友曰內崇孝敬曰外崇齒讓曰仁體天地曰儉法祖宗曰欽崇正訓曰躬垂聖教宫僚在閣臣吏部遴選得人上請久任左右近習在司禮監審擇質疑問難親接儒臣一切孝敬仁儉有關儲教者在皇太子遵修古誼以光睿德至於燕閒之際質問所業時加訓迪則惟皇上加意議上報可禮部覆都給事中雒遵等奏東宫輟講之日除宫中溫習外冝於朔望日令輔導講讀等官恭詣文華殿啓請半月內課程疑義庶養正之功緝熙無間上是之皇太子出閣讀書天順二年禮部請皇太子出閣讀書上命吏部禮部㑹翰林院定擬講讀等官及講讀以聞禮部進皇太子出講學儀注一欽天監選擇四月初八日乙丑巳時吉一是日早鴻臚寺報事官於文華後殿行四拜禮鴻臚寺官請東宫升文華殿執事官導引至殿升座三師三少并宫僚以次序立於丹陛上行四拜禮畢各官以次退出內侍官導東宫至後殿升座以書案進每日侍班侍講讀官入分班東西立內侍展書侍讀講官以次進讀叩頭而退每日讀講常儀一每日早朝退後東宫出閣升座內侍以書案進不用侍衛侍儀執事等官惟侍班侍讀講官入行叩頭禮畢分班東西向立內侍展書先讀四書則東班侍讀官向前伴讀數十遍退復原班次讀經書或史書則西班侍讀官向前伴讀亦然務要字音正當句讀分明讀畢叩頭而退一每日已時侍班侍讀講及侍書官俟東宫升座畢入照東西向立侍班內侍展書先講早所讀四書則東班侍講官向前進講一遍退復原班次講早所讀經史書則西班侍講官向前進講亦然務要直言解說明白易曉講畢內侍收書訖侍書官向前侍習寫字務要開說筆法㸃畫端楷寫畢各官叩頭而退一午膳後從容遊息或習騎射一每日晚讀本日所授書各十數遍至熟而止一凡讀書三日後一溫須背誦成熟遇溫書之日免授新書講官通講須曉大義一凡寫字春夏秋月每日寫一百字冬月每日寫五十字一凡遇朔望及大風雨雪隆寒盛暑暫停講讀寫字一每日合用侍班官二員侍讀講官四員侍書官一員吏部禮部㑹翰林院選擬皇太子出閣侍班講讀等官以聞侍班官則吏部尚書兼學士李賢日侍不更太常寺少卿兼學士彭時翰林院學士吕原每人更侍一日詹事府詹事陳文少詹事劉鉉日侍不更翰林院學士林文李絡劉定之侍讀學士錢溥每人更侍一日講讀官翰林院學士倪謙尚寶司卿兼侍講黃練尚寶司司丞兼編修萬安尚寶司司丞兼編修李泰左春坊左中允孫賢右春坊右中允劉翊左春坊左贊善牛綸右春坊右贊善司馬恂八人更畨四人一日侍書官太常寺少卿黃采中書舍人兼正字吳謙二人更侍一日上悉從之東宫冠讀嘉靖二十四年二月上諭禮部朕皇太子當冠并習講讀一應合行禮儀查照祖宗時舊例一一舉行即各擬至當不必續奏已復奉聖諭東宫冠讀禮朕復思二三子各當行此各節次祖宗舊典俱在卿嵩㑹讀璧寀承恩查擬一一舉行禮部尚書費寀等言東宫冠讀儀節繁多一時未易盡習考之周制文王年十二而冠成王十五而冠大明集禮參用文成冠禮之年近則十二逺則十五則在今日東宫殿下加冠似為太早乞將冠禮暫敕停止先以童服出就講讀則事為有序而禮不難行又會勳輔大臣言皇太子既不便出閣乞命司禮監慎選老成端厚知書內伴恭伴讀書習字兼演習禮儀俟睿性漸開禮節日熟然後出閣講讀疏入上乃諭輔臣嚴嵩等曰朕先與卿等計定東宫冠讀遵祖宗法制舉行既而禮官引文成之年歲不同纍朝之令典謂為未可卿等從而同之今只令輔臣該部挨當行之年具奏行禮嵩等因言皇太子數歲而冠原無定期不必盡泥文成之年伏乞俯從原定吉期或移取通利之辰遵奉舉行得㫖覽奏足見敬畏朕知已嵩復言東宫殿下時已十嵗今冠讀之諭一下中外欣傳合無是日稍減繁儀止取成禮此外或可頻接外臣漸廣視聽如冠禮暫輟或以童服出就儒臣時習講讀久之則睿性益開而知所嚴重矣得㫖冠乃成人之禮太子繼體承命之重必典禮具備方可行既而復諭嵩東宫冠讀已聞中外只可移取通利之辰不宜暫罷問冠禮內儀物有絲巾何為嵩言彼在束髮乃婚禮內物不用為當又問廟見童服當是何服色嵩言今日之見係在內殿家人禮也比與宗廟大禮不同似應照常所用吉服行禮已奉諭東宫廟見等儀非一節即今將入夏令恐難勉行俟秋爽舉未遲選宫僚永樂二年夏四月命僧録司左善世道衍為太子少師復其姓姚賜名廣孝賜敕諭曰卿秉性篤實學行老成今建儲嗣簡求賢輔以卿舊人特授太子少師夫太子天下之本必賴啓迪匡正輔成德器尚勉盡厥職副朕眷倚之重又命禮部尚書李至剛兼左春坊大學士升翰林院侍讀學士解縉為本院學士兼右春坊大學士翰林院侍讀黃淮為左庶子胡廣右庶子胡儼左諭德皆仍兼侍讀翰林院侍講楊榮右諭德仍兼侍講以翰林院侍講楊士竒兼左春坊左中允改北京刑部主事尹昌隆為左中允升翰林院修撰李實右春坊右中允仍兼修撰命吏部左侍郎許思溫兼左春坊贊善升翰林院編修陳仲完左贊善仍兼編修檢討王汝玉為右春坊右贊善仍兼檢討升國子監博士徐善述監察御史王子沂俱為左春坊左司直郎國子監助教朝鑄刑科給事中王文貴俱為右春坊右司直郎刑部司務楊正為左春坊清紀郎國子博士楊斌右春坊右清紀郎教授程僖教諭黃貫俱左春坊司諫教諭張詳梁善俱右春坊司諫升翰林院編修楊溥中書舍人姚友直俱為司經局洗馬溥仍兼編修戶科給事中吳牧兼司經局較書吏科給事中梁質兼司經局正字升教諭劉真為較書訓導王雅為正字天順二年三月吏部禮部㑹翰林院選擬皇太子出閣侍班講讀等官以聞侍班官則吏部尚書兼學士李賢日侍不更太常寺少卿兼學士彭時翰林院學士吕原更侍詹事府詹事陳文少詹事劉欽日侍不更翰林院學士林文李紹劉定之侍讀學士錢溥更侍講讀官翰林院學士倪謙尚寶司卿兼侍講黃諫尚寶司司丞兼編修萬安尚寶司司丞兼編修李泰左春坊左中允孫賢右春坊右中允劉翊左春坊左贊善牛綸右春坊右贊善司馬恂八人更侍四人一日侍書官太常寺少卿黃采中書舍人兼正字吳謙二人更侍成化十四年二月皇太子出閣講學命大學士萬安户部尚書劉翊禮部尚書劉吉提調講讀翰林院學士王獻詹事府少詹事黎淳翰林院學士謝一䕫右庶子汪諧洗馬鄭環羅璟更番侍班學士彭華侍讀學士江朝宗左庶子劉健左諭德程敏政侍讀周經修撰陸鈛張升張頥更番講讀經改左中允升改左贊善修撰傅瀚兼較書太常寺少卿謝宇禮部員外郎凌暉兼正字通事舍人選除二員翌日改鴻臚寺序班耿寧紀本為之𢎞治十一年二月大學士徐溥等以皇太子將出閣講學請以太常寺卿兼翰林院侍讀學士程敏政侍讀學士楊守址左春坊諭德李旻司經局洗馬梁儲充侍班官太常寺少卿兼侍讀學士李傑太常寺少卿兼侍講學士焦芳侍讀學士兼左諭德王鏊右諭德王華洗馬楊傑侍讀劉機江瀾白鈛侍讀武衛左中允楊廷和右中允張天瑞左贊善費寵充講讀官編修兼較書吳儼靳貴禮部員外郎兼正字周文通大理寺右寺副兼正字劉棨俱更直供事又請改敏政為詹事兼學士升鏊為少詹事兼侍讀學士上俱從之仍命溥及大學士劉健李東陽謝遷提調各官講讀嘉靖三十一年八月命翰林院編修髙拱檢討陳以勤充裕王講讀官伴讀改國子監助教尹樂舜鄭守德俱翰林院待詔侍書中書舍人吳昂吳應鳯隆慶六年二月以東宫出閣講學命禮部尚書髙儀吏部侍郎張四維洗馬余有丁贊善陳棟充侍班官少詹事馬自强陶大臨編修陳經邦何洛文檢討沈鯉張秩充講讀官檢討沈淵許國充較書官制敕房辦事大理寺左寺正馬繼文徐繼申充侍書官先是大學士髙拱等請選東宫輔導官僚㑹同吏部推舉上曰東宫官冝加慎選不必備員於是拱等疏名以聞上從之仍諭拱居正提調各官講讀冊立議隆慶冊立隆慶二年正月禮部尚書髙儀等復上疏請立東宫其略言自古明王圖治忠臣謀國莫不以建儲為重所以定國本安人心也恭惟皇上篤生元嗣已踰六齡主器得人臣民歡戴早建豫養冝在此時臣伏覩宣德𢎞治中皇子皆二齡而冊立成化中皇太子六齡而冊立具在國史今皇子雖在冲年而舊典可據且竒表秀發睿質異常必冊立之儀既行則教養之道可舉惟皇上早從衆心擇日行禮實宗社萬世無疆之休疏入上乃許之曰卿等請建皇儲至於再三瀝誠彌切陳義甚正特允所請其擇日具儀以聞三月辛酉上御皇極殿傳制冊立皇子為皇太子命成國公朱希忠為正使持節大學士徐階為副使捧冊寶詣文華殿行禮故事冊立東宫次日百官上表稱賀即詣文華殿上箋賀皇太子典璽官陳設太子座於殿中自嘉靖十五年殿易瓦及上御經筵已設寶座正中於是禮部以皇太子受賀不當復設座殿內乃請上裁上命設於文華殿東廊西嚮受朝儀東宫未出閣受朝儀隆慶五年正月大學士李春芳等言先朝故事東宫未出閣時閣臣以朔望次日行謁見禮即今春和乞命臣等舉行如例不惟臣等獲遂仰瞻之私而東宫殿下亦可間習禮儀養成儲德且今歲來朝官員咸願一覩睿容請於二月上旬之吉許臣等率諸臣於文華門朝見以慰天下臣民之心上許之命以二月二日謁見於是禮部奏上儀注一前期一日內侍官設東宫座於文華左門外西向至日錦衣衛設儀仗於門外東西一是日文武百官及天下來朝官員各具常服詣文華門外北向序立俟東宫具常服出升座文武百官先入班贊鞠躬四拜禮畢分班序立鴻臚寺官引來朝官員詣前北向立本寺致詞贊鞠躬四拜禮畢皇太子還宫稱禮定臣下名稱洪武三年命禮部考定百官及內官於皇太子前所稱禮并諸王前禮部尚書崔亮等㑹議百官及內使監官於皇太子諸王前稱殿下自稱名東宫官及本宫內使於皇太子前稱殿下自稱臣王府官及本位承奉司官於親王前稱殿下自稱臣百官在上前稱皇太子稱親王曰某王從之啓事東宫稱臣洪武十四年十月給事中鄭相同言國初之制凡啓事東宫惟東宫官屬稱臣朝臣則否蓋尊無二上之意今一體稱臣於禮未安詔下羣臣議翰林編修吳沈等奏曰東宫國之大本所以繼聖體而承天位者也臣子尊敬之禮何得有異相同之言非是請凡啓事東宫者稱臣如故從之皇長孫讀書永樂五年夏四月皇長孫出閣就學上召太子少師姚廣孝翰林院待詔魯瑄鄭禮等諭之曰人於學問常以先入之言為主朕長孫天資明睿爾等冝盡心開導凡經史所載孝弟仁義與夫帝王大訓可以經綸天下者日與講說浸漬久涵養深則德性純而器識廣他日所資甚大不必如儒生繹章句工文辭為能也廣孝等稽首受命賜金織羅衣各一襲命大官給旦暮酒饌又召前禮部儀制司郎中兼右春坊右贊善李繼鼎至復以為右贊善命侍皇長孫說書附親王讀書書堂在皇極門右廂講官以部臣或進士改翰林官充之二王講讀嘉靖四十年禮部奉欽定二王講讀禮儀欽天監擇吉日時出閣內侍官先一日設椅子二把於北第一間書堂內坐西面東是日早輔臣三員率領各講讀侍書官共十二員伺候二王殿下同入北書堂內序坐定講臣等同各官進入行四拜禮畢各退於館外北廊拱候各官行禮畢裕王殿下就於本書堂裏間就坐景王殿下入南書堂裏間就坐輔臣三人各率該講讀侍書官分投進入授書講書其日內侍官捧書展於案上就案左立講讀官以次進立於案前授書各十遍訖令㫖先生每吃酒飯內侍官答應各官出酒飯畢時再入侍書官進至座前看寫字寫畢講讀以次進講讀畢各官行一拜禮退臣等各看所寫字照例圈注於旁以備勸益次日以後每日早二王殿下分詣各書堂各官分投進見行一拜禮其授書講書看寫字並如前儀輔臣三員止侍書三日三日後各講讀侍書官皆知規矩已定徑自如儀授書講書看寫字輔臣皆不預至寫字畢二書堂每日總輪一內侍官捧各倣紙來內閣輔臣照例圈注二王殿下每日所讀書大學一本書經一本授書務要字樣真正講書直說大意務要通曉三日一溫書就溫講仍進講章寫字先用影本以後寫熟對帖自寫闕各官酒飯止是初入書堂時令㫖說一次以後日不必再說只於講書罷令㫖與先生每茶吃內侍官答應嵗率為常每年假日聖節前後通九日千秋節十日正旦初一至二十日花朝一日清明一日端陽前後通三日七夕一日中秋一日重九前後通三日冬至前後通五日臘八一日除夕前五日每月朔望各一日遇大風雨暫免遇大寒大暑該住歇時請㫖定奪凡講讀侍書官俱於右順門南廊給與酒飯先期一日各該內外執事官俱赴書堂演禮此儀本部行內閣題請萬厯六年定諸王講讀儀循此小有增易嘉靖三十二年禮部言二王講讀舊規開以二月八月初旬輟以五月十一月初旬今以閏三月請以四月輟講不為例內侍書官每日啓王溫肄仍舊書百字送內閣圈注講讀等官每半月恭詣各府起居如王更欲授書進講及質問疑義字法各官亦得以自效詔可禮部志稿卷六十七
