body:
  text: 禮部志稿卷九十九明俞汝楫編詔條備考登極恩詔嘉靖改元恩詔例節録五條以明年為嘉靖元年大赦天下與民更始一王府册封朝廷大禮今後該部務照舊例一年一次舉行一各王府應得祿米有缺少者各處巡撫都御史督率所屬查催完納一各處郡王將軍府子女有應請名請封選婚者本府即與保勘奏請承奉長史等官不許刁蹬其有年已長成未曾婚配貧難無力者所在官司量為助給一各處郡王將軍中尉有因事革減祿米者除毆殺人命敗倫傷化外其餘自詔書到日為始俱照舊支給儀賓有因成婚年逺不曾赴京謝恩參奏者悉皆宥免癸未敕諭禮部朕即位之初重念守邊官軍勤勞冝加賞賚自遼東至甘肅緣邊一帶官軍每人賞銀二兩差給事中御史分投前去會同鎮巡等官取助勘數公同唱名給散不許頭目人等總領侵欺恁禮部便會同兵部查核見在各邊官軍實數還會同户部查詔書于內庫抄沒銀兩內關運支給如敕奉行既而查核遼東薊州宣府大同山西陜西寧夏延綏甘肅諸鎮官軍共三十七萬一千九百六員名給賞銀七十四萬三千八百一十二兩頒在京恩詔隆慶元年以登極敕諭文武羣臣軍民人等曰朕恭膺天命嗣承大寶已推覃恩及宇內顧惟在京文武羣臣軍民人等昔奉我先帝今事朕躬效勞尤多宜加特賚乃分别等第給賞公侯駙馬伯每員紵絲四表裏文官一品至九品各給與應得誥命內先已給領者進應得勳階一等如品同而職銜不同照見任改給署職者與實授試御史試中書實授庶吉士候授官之日各補給其有願移封者聽若先已移封今給與本等誥敕雜職員絹二匹武官一品二品每員紵絲三表裏三品二表裏四品一表裏五品六品紵絲一匹署鎮撫百户各絹二匹優給優養官一品二品銀五兩三品四兩四品五品三兩以下優養軍官母妻女每口銀二兩將軍旗校力士軍匠馴象養馬及操備等項旗軍勇士并京營家丁修理山陵官軍各銀二兩紀録旗校力士幼軍各一兩歷事監生辦事官吏知印承差等各減免月日史館官禮部儒士順天府學四夷館譯字生錦衣衛聽差營操舍人欽天監天文生太常寺樂舞生太醫院醫士武學官生陰陽生醫生坊廂里老各衙門民匠及厨子樂工各賞絹布有差頒臣民恩詔隆慶元年詔內欵開非關本部者不録一郊社等禮及祔葬祔享遵奉遺詔各稽祖宗舊典斟酌改正禮部會官查議舊禮某項當復新禮某項當罷某禮當行於某處某禮當舉於某時并陵葬廟享當祔之正逐一開具奏請一自正德十六年四月以後至嘉靖四十五年十二月以前建言得罪諸臣遵奉遺詔存者召用殁者恤録吏禮兵部作速查開職名議擬具奏一方士人等遵奉遺詔查照情罪各正刑章王金陶倣申世文劉文彬髙守中陶世恩妄進藥物致損聖躬著錦衣衛拿送法司從重究問唐秩章冕等各以符法濫叨恩賞著押發原籍為民書造局真人府官道禮部查係在京宫觀取用者發還原宫觀係在外龍虎等山取來者遣回本處焚修其所受太常寺官職及真人髙士名號盡行革去一齋醮工作遵奉遺詔悉皆停止其原建齋醮之所今應作何處置禮部逐一查議題請工部料價并竹木等兩京內府各衙門段匹器皿香蠟柴炭匠役等光祿寺品物酒飰等但有因齋醮工作加派者該部通行查奏停革一內府各衙門供應錢糧朕加意節省用自有餘該部務查照𢎞治年間及嘉靖初年舊額酌量徵派其以後年分加添者盡行革除將革過數目奏知仍造册送科備照如各衙門假以缺少為繇行文加派及該部阿奉準準行者科道官即時參奏治以重罪一犯罪發髙墻宗室除叛逆及內亂強盜人命不宥外其情罪有可矜疑及身故而下妻妾無依者撫按衙門查明原犯情繇開具奏請一近年病故大臣有應得恤典而未得亦有不應得而得者科道官舉奏定奪一凡慶賀謝恩等疏非舊所有者俱各停免其一應題奏亦要明白簡直不許以繁詞及鄙褻之言瀆擾萬厯元年詔內欵開非關本部不録一宗室節年因事減革祿米者除敗倫傷化姦盜人命重情外其餘詔書到日全革者準支三分減去一分二分者準全支以資飬贍一宗室子女奏請名封選婚者近年每以過期參駁停閣或因錯誤行查立案積久多致失所今後應奏請者該府即與保勘具奏承奉長史等官不許抑勒致令失期共自隆慶六年六月初十日以前各王府有曽經奏報請名請封及奉有勘合選婚各過期者并節因錯誤行查復回到部者該部一體勘無違礙即與題覆施行一鳯陽髙墻庶人已故所遺子孫妻妾無罪拘繫未及放回者撫按官即與查明奏請釋放其節年越關赴京遞回拘禁問宅者一體分别原犯情繇具奏定奪一自嘉靖四十五年十二月以後至隆慶六年五月以前建言罪廢諸臣吏部備查中間如果情非挾私才力堪用者擬議具奏起用其以言事及各衙門官因公事住俸罰俸者即與開支降俸者與復原俸一先年加派光祿寺厨料銀兩已經户部議改濟邊今雖急用但前項錢糧原係額外豈可重纍小民詔書到日除已徵在官者仍解部外以後年分悉行停止不許朦朧派徵一鰥寡孤獨及篤廢殘疾之人有司依例存恤弗令失所見在養濟院者各給米三斗布二匹肉二斤其在京各色人匠陰陽醫士厨役等項年七十以上悉皆放免應僉補者照舊僉補內外各衛所軍人年六十以上果有疾病不能應役聽其依親仍行原籍勾丁補役為事發邊逺終身充軍充吏及充繕夫遞運所夫年七十以上及有篤疾者悉放回為民一各處儒學生員有食糧年深挨貢不前者遂成終棄今計於額貢之外順天府應天府每學各添貢二名在外府州縣學各添貢一名俱於年深廩膳數內挨次考選以示疏通止行一年後不為例其有年老不能待貢願告冠帶給與一武官誥敕朝廷所以報功礪世近年所司刁掯以致各官不敢續黃兵部便行文天下軍衛衙門逐一清查果有年久未續者許本衛所保勘明白準與續黃以後襲替必須親齎誥敕與黃選查對相同方準選授一朝廷政事得失天下軍民利病許諸人直言無隱上徽號恩詔頒內外臣民萬厯元年上兩宫徽號詔內欵開非關本部不録一親王生母封為繼妃郡王生母封為次妃舊例止於請敕知會不給誥命今自隆慶六年七月以前凡親郡王生母已受封者俱準特給誥命又親王庶子受封後其生母例封夫人將軍中尉受封後其生母例封淑恭宜安人者果年踰七十其子孝行著聞亦許奏勘無礙特給誥命後皆不為例一親郡王之子有年幼未及請封其奉敕管理府事者果能保護盡心翊贊有道迄王受封不虧令名許本生及撫按官奏聞降敇旌奬一宗室有名位者年七十以上各賜米十石絹十匹凡一應禮儀或衰病不能自行許其子代行以示優老之意其為庶人者量給三分之一一兩京文職官員未及三年考滿者俱與應得誥命如品同而職銜不同照見任改給署職者與實授有願移封者聽若先已移封今給與本等誥敕一文官五品以上以禮致仕者各進本品階一級其二品以上大臣年及八十者有司備綵帛羊酒問勞九十以上者具奏遣使存問一各王府官有年老願致仕者進散官一階其歷俸三年以上父母見存該授封者給與應得誥敕不為例一天下儒學生員有因親老無人侍養願告侍親者聽親終仍許復學其在學纍舉不第年五十以上者許告衣巾終身有德行著聞者給與冠帶榮身一山林隱逸之士如有懷才抱德卓然可為時用及武略出衆膽力過人可備將帥之選者該撫按官具實奏聞該部再加核勘酌量録用一天下祀典神祗有司務在誠敬奉祀壇廟損壞即宜修理各處名賢墳墓禁民採樵以昭尊崇之典一革除間被罪諸臣忠於所事甘蹈刑戮有死無二皆我太祖髙皇帝所儲養忠臣義士我成祖文皇帝當時亦有練子寧若在朕猶當用之之語是諸臣罪雖不赦心實可原朕今仰遵我聖祖遺意褒表忠魂激勵臣節詔書到日各地方有司官查諸臣生長鄉邑或特為建祠或即祔本處名賢忠節祠嵗時以禮致祭其墳墓苗裔倘有存厚加恤録一孝順節義乃風化所關近來有司官皆視為末務往往有窮鄉僻邑終身湮沒無聞者而富勢有力之家小有一行即為之文飾張大其事或其子孫貴顯自為陳乞甚有姦偽生徒積年猾棍裝揑行實希圖規避者皆略不體勘輒與具奏使虛偽者反見表異而獨行者壅於上聞殊非朝廷彰善闡幽之意今後各地方有孝子順孫義夫節婦查係貧難孤苦之人有司官亟與核實奏聞旌表不許詭竊虛濫致亂名實亦不許子孫居官自行陳乞其已經旌表年及六十者孝子給與冠帶榮身節婦給賜絹布米肉禁令備考通禁申官民器服禁洪武三年詔中書省申禁官民器服不得用黃色為飾及彩畫古先帝王后妃聖賢人物故事日月龍鳯獅子麒麟犀象之形如舊有者限百日毁之房屋禁令一在京功臣宅舍地勢寬者住宅後許留空地十丈住宅左邊右邊各許留空地五丈若見住舊居所在地勢窄隘已有年矣左右前後皆是軍民所居止仍舊居不許那移軍民以留地一京城係人煙輳集去處其地有限設使官員之家往往窺覷住宅左右前後空地日侵月占圍在墻內作園種植蔬菜及為逰玩處所甚妨軍民居住且京城官員不下數千若一槩倣效京城內地多為菜園百千萬軍民何處居住今後官員住宅照依前定丈尺不許多留空地如有過此即便退出與軍民居住令子孫赴官告給園地另於城外量撥一在京文職官員所居房屋臨時奏請量撥居住凡公侯內外文武四品以上官不得令子孫家人奴僕於市肆開張鋪店生放錢債及出外行商中鹽興販物貨有有頭匹器物之數遣人於外賣買以給家用不係商賈取利者不在禁例一古先哲王之制大邑不過三國之一中五之一小九之一且如國王所居之城九里公侯所居之城止得三里伯止得一里二百八十步子男止得一里古人尊卑之分如此今已往功臣之家不守分限往往於住宅前後左右多占地文蓋造亭館或開掘池塘以為逰玩似此越禮犯分所以不得保守前功共享太平之福一古人於地有王氣之處往往埋金以厭之或井其地以泄之前代帝王如此用心今京城已故各官多有不諳道理於住宅內自行開挑池塘養魚種蓮以為玩好非惟泄斷地脈實於本家不利以致身亡家破今後京城內官員宅院不許開挑池塘亦不得於內取土築墻掘成坑坎禁用畨香貨洪武二十六年甲寅禁民間用畨香畨貨先是上以海外諸夷多詐絶其往來惟琉球真臘暹羅許入貢而緣海之人往往私下諸畨貿易香貨因誘蠻夷為盜命禮部嚴禁絶之敢有私下諸畨互市者必置之重法凡畨香畨貨皆不許販鬻其見有者限以三月消盡民間禱祀止用松柏楓桃諸香違者重罪之其兩廣所産香木聽土人自用亦不許越嶺貨賣蓋慮其雜市畨香故并及之宥房屋違禁永樂五年十月通政司言紹興民告其鄉人居室違禁上曰未可偏聽南方僻逺之處未經兵革宋元屋室往往有之豈當一槩罪以違禁其令巡按御史驗視但是本朝禁令之後造者抵罪在禁令前所造雖違法不問通禁奢僣𢎞治十二年五月南京國子監監丞楊文奏今天下節儉之風浸微婚喪燕享驕奢無度屠宰之類動及千數肥美之味恆致百品凡靡麗之物難以悉舉上下同風逺近同俗轉移之機在於一人臣願陛下寡欲養心躬履儉素非但封拜賜豫婚喪燕享之有制而飲食服御尤宜量為節損如前代令主常膳不求兼味常服不辭再洗著為定制以節天下之財自宗支宫壼戚畹公侯伯以至卿大夫庶人一視朝家為凖奪踰制之田宅禁厮養之輿馬宫室田園僕妾綺羅金珠之屬悉皆次第降殺務從儉約有不如制並從科道官紏舉庶人心尚古風俗返朴天下之事可從而理也命下其言於禮部服􅎖禁例正德元年六月先是有旨民間男女服飾并諸奢僣事禁未盡者禮部仍會都察院備查議處以聞于是尚書張升都御史張敷等上十三事一舊例庶民居舍不得過三間五架及用斗拱彩繪近來務為髙大且過粉飾除已造不動自今仍違式者罪之拆毁入官一舊制庶民男女衣服不許僣用金繡首飾耳鐶各用金一事近來愈加僣侈自今遵永樂間例軍民僧道常服禁用紵絲綾羅紗錦綵繡婦女衣服帳幔禁用渾金首飾鐲釧禁用寶石娼妓禁用金首􅎖銀鐲釧違者罪其家長并製造工匠一民間範銅為佛像貨鬻取利僧道化緣造佛俱鍍金及軍民器物僣用銷金泥金創金以故耗金甚多而其價翔貴亦宜并禁違者俱重罪一成化間例冠婚之家酒席從儉近嵗過豐暴殄天物自今臣民一切燕會毋得用糖纒餅錠簇盤插花粘果及鋪造違者俱重罪一近來民間婚嫁競為豐盛帳幔被褥僣用大紅銷金器用金銀緣此貧乏宜加嚴禁違者重罪一近年京城軍民之家喪事甚違禮制初喪扮戲唱詞名為伴喪及出殯剪製紗羅人物幡幢之類排列塞途兼用鼓樂戲舞導送及墓陳設葷酒飲啖至醉又有揚幢設壇修齋追薦糜費銀物不可勝記宜并禁革違者喪主親賓僧道人等各治以罪一天下寺觀庵廟舊額外不許私創􅎖以金碧違者罪如律仍拆毁入官一古禮士不衣狐白况凡民乎今後商販吏僕婦女娼優皆不許輒服貂裘一馬之鞍轡品級髙下有等今後商販吏卒軍匠僕從道人等不許僣用盛􅎖橫行市陌一舊例兩京文職四品以上及五府等管事并內外鎮守守備公侯伯都督不分老少皆不許乘轎自餘軍職若上馬用交牀出入擡小轎者罪之宜申其禁其武職有用上馬杌者尤宜禁之一舊例皇親族屬姻黨家人往來河道吹響器張旗號需索人夫酒食車船者除真犯死罪外徒罪以上俱于所犯地方枷號一月發邊衛充軍若被害之人赴所在官司告訴不即受理問斷舉奏者各治以罪一軍民婦女近來用珠結蓋額謬稱纓絡或綴衣緣履官員之家結成補子甚違法制自今敢有犯者罪坐其夫違禁之物入官一舊制官民禁用金酒爵凡金銀磁碇等器禁用龍鳯紋其椅桌木器之類禁用硃紅金飾近雖軍民之家輒踰分僣用今後一遵定制軍民之家惟酒盞用銀壺尊器及髹漆器用硃紅用金飾者治罪上曰風俗近來奢僣漸不可長其即出榜申禁仍有故違者所司緝捕究治違式房屋之類赦前犯者令改正否者並治之不宥申禁中外奢僣嘉靖七年三月禮部覆御史周襗所奏風俗壞於奢侈法令當行自近今都城之中衣輕乘肥非貴戚之臧獲即貂鐺之僕夫詰問則根據城社縱釋乃橫行街衢以致逺近效尤恬不畏法乞嚴敕內府勳戚府部大臣令其檢飭家徒不得縱恣中外民人有服食宫室喪葬宴會過盛踰制者嚴為禁格上從其言令都察院申禁榜示中外所司不奉行士庶不遵改者悉論如法禁奢僣嘉靖二十四年該禮科給事中查秉彛題為申明禮制崇節儉以厚風俗事內開乞要明敕該部通示內外文武勳戚之家第宅服用務從節約以為民望一應違制過侈器物民間不得造作其四方無籍流聚之徒盡行驅逐不得久住惑誘善良仍行浙江湖廣等處一應不急工役非時取辦無故之擾不節之費嚴加禁革停止等因該本部覆題奉聖旨著都察院出榜曉諭仍通行在外一體禁約欽此嘉靖二十七年該禮科給事中薑良翰題為懇乞申明禮制禁奢侈以正民風以𢎞聖治事內開乞敕該部申明皇上先年明旨并節言刋布榜文凡民間飲食宴會服舍輿馬器用之類逐事列為等第悉令遵照祖宗欽定成規不得私相踰越以干國法仍乞更敕都察院通行南北直𨽻十三省務令一體遵行永為定守等因該本部覆題奉聖旨是著都察院出榜禁約仍通行在外一體遵守欽此計開一民間豪富之家蓋造大房不守三間五架之制僣用斗拱大青大緑綵色裝畫糜費無度合行禁革一庶民之家僣用織金錦繡僕御娼優僣服紵絲紗羅綾錦婦人首􅎖僣用金珠寶石及生儒人等擅制梁冠詭名凌雲與忠靜冠比美及東坡角深衣雲履恣意僣擬合行禁革一公私宴會動輒鋪張大席羅列珍羞歌舞作樂糜費無益合行禁革一婚嫁衣裝擅用織錦裝花珠冠腰帶喪葬揚幡設醮僧道誦經男女混雜合行禁革一罷間官吏逃逋罪人把持公門譏刺時政流言惑衆恃強嚇騙賭博酗酒以致流為盜賊合行禁革嘉靖三十六年該刑科給事中魏元吉題為考察之後乞正士風以隆聖治事本部覆題議得奏內乞要崇節儉一節合行各該衙門堂上官嚴諭各屬毋得踵襲前弊仍備行都察院刻榜曉諭并行五城御史緝事衙門嚴加緝訪如有士夫之家仍前違例張設簇花糖餅大席饋送豬羊節禮招集無賴子弟搬演戲文長夜酣飲及容留居住者一體訪拿參究造賣糖餅之家模式俱要追毁其生儒吏員人等違例穿戴忠靖冠服及凌雲方巾大袖深衣雲頭履鞋等項通行拿究若士夫不遵明禁再有違犯者聽科道官指實奏聞重加罷斥等因奉聖旨近年京師俗尚奢侈委的傷費民財這所言都察院便通行出榜申明禁約五城御史即時嚴禁錦衣衛巡捕官校著實訪拿外境子弟不許容留潛住鋪户造賣大樣糖餅模式該衛追出入官劈毁再有違犯的重治不饒欽此禮禁優戲以古先聖賢洪武五年詔禮部申嚴禁教坊司及天下樂人毋得以古先聖賢明王忠臣義士為優戲違者罪之先是前元之俗往往以先聖賢衣冠為人笑侮之飾以侑燕樂甚為瀆慢故命禁之頒行參酌禁條洪武五年禮部言禮以辨上下定民治國家混一以來申明典章敦尚朴素官民服用皆有定擬頒行天下近者官民漸生奢侈踰越定制恐習以成風有乖上下之分詔申禁之凡前所下禁條有未備者仍參酌漢唐以來制度頒行遵守凡服色職官一品二品用雜色文綺綾羅綵繡帽頂帽珠用玉三品至五品用雜色文綺綾羅帽頂用金帽珠除玉外隨所用六品至九品用雜色文綺綾羅帽頂用銀帽珠瑪瑙水晶香木庶民用紬絹紗布巾環不得用金玉瑪瑙珊瑚琥珀掾史令史書吏宣使奏差凡未入流品者並同庶民帽不用頂帽珠許用水晶香木較尉只絲束帶幞頭靴鞋刻期雕刻雜花象牙絛環外餘同庶民官自一品至六品穿四爪龍以金繡為之者聽其勳舊之家應合繼襲嫡長之人止不得用紗帽束帶餘照品服級用庶子弟姪並降嫡子二等其服用酒器傘蓋床塌帳幕舟楫鞍轡房舍之類俱有等第除一品至五品酒盞用金其餘器皿俱不得抹金描金并雕刻龍鳯粧飾金玉珠翠及硃紅黃色綵畫古先帝王后妃聖賢人物宫禁故事日月龍鳯獅子麒麟犀象等形御賜者許用既敝不許托此再造其官員紗帽束帶命婦冠服及民間男女之服悉如舊制者罪之申明禮制榜例正德元年有旨文武職官禮儀等級各有舊制禮部即查先年榜例申明禁約至是右侍郎劉機等言纍朝制度損益因時今即長安左右門懸布舊榜參之禮儀定式以衣冠服色房舍傘蓋鞍轡器皿牀帳帽靴朝參筵宴公座公聚儀從及乘轎用扇諸品級等差類開上請裁處出榜申明禁約務使文武職官一體遵守又據大明集禮有公卿大臣得乘安車之制亦并及之得旨纍朝榜例既查明爾禮部即申曉諭令一體遵守京城內安車傘蓋既年久不行已之轎扇并筵宴位次俱如例服色特賜者不在此限既而錦衣衛掌衛事都指揮葉廣等奏本衛官曾屢賜蠎衣飛魚等服其從人亦與諸司不同乞仍舊服用隨從許之禮禁自京師貴戚始嘉靖二十四年禮科給事中薑良翰奏天下之患在於吏治之不清豪強之玩法農民之失業而其原皆自風俗侈縱始請申明禮制以章示下民凡飲食燕會服舍輿馬器用之類悉差為等第令不復踰越然後塞兼并之源嚴貪墨之戒驅逰惰之民復生養之業使法令一而習俗同禮節崇而民志定庶太平之基可望也然京師者諸夏之本貴戚者士民之望作法懼涼澄源力易兹欲使禮教大行風教四訖當自京師始疏下禮部議是詔都察院出榜禁例仍通行在外一體遵行統屬備考太常寺例主議裁革員役隆慶三年禮部議革太常寺協律郎等官四十八員存者二十九員行該寺定議執事或兼攝或參用樂舞生不得守師宗記所奏事例濫設冗員寺卿陳慶以禮部疏引宗記為喻疑有刺譏又以祠司移文不署名謂為輕已乃上疏固爭以為郊壇典禮繁重今槩議裁革未免缺人廢事請下禮部熟計部議復持前説上報可於是吏部奏革協律郎等官悉如禮部奏慶既議革內益不能平乃上疏請申明部寺職掌謂本寺非部所屬何得擅主裁革司官公移安得不署名因指禮部護短飾説無師師相讓之風禮部亦言國家設六部分理天下諸務為政事根底今以本部理太常寺之事為侵擾則户部之於錢糧兵部之於士馬皆為侵擾矣此説行其紊亂綱紀為害不細惟聖明獨斷以一政體疏並下吏部覆言太常所掌乃祠部中一事固不可槩謂部屬亦難謂全無統屬其公移往來宜各仍舊上從之太常光祿同屬𢎞治十二年户科給事中叢蘭言我朝建立衙門惟六部都察院通政使大理寺各分一職不相統屬太常寺光祿寺則屬禮部太僕寺則屬兵部國初至今行移往來名分已定今太常卿崔志端自恃道流能事乃纍次奏辨不係禮部統屬變亂舊章宜置於理下所司知之光祿寺例裁光祿寺增添供用𢎞治十四年光祿寺奏供應牲口不敷乞令禮部議處豬羊銀三萬二千八百餘兩給還行户禮部覆奏近屢得旨不許本寺再借太倉官銀蓋太倉銀本以備各邊之用今邊情正急户部方欲補還原借之數豈宜再借惟願皇上特敕本寺一切用度悉減元年以後增添之數則供應自然有餘而行户價銀亦可以漸而償矣從之五月巡視光祿寺户科給事中王蓋等奏本寺賖欠行户豬羊價銀雖先嘗奉旨督解各府州縣豈能一時皆到又十三年以前原欠銀僅一萬六百六十兩就使解到亦未能補所欠三之一乞敕該部别議給之禮部議謂本寺二次欠行户銀共四萬九百三十餘兩計以催完逋負補之尚欠三萬二百七十餘兩請借今年各處鈔關春季分課銀暫補其數且言本寺每年額辦牲數不下十萬而近來屢以供應不敷為言大抵天下之物産有限額外之費出無已以十萬牲口而各處每年解不及期則生民之窮可見又牲口已至十萬而每年用多踰額則供應之繁可見如是年復一年則踰額之補將何紀極民生之窮其患將有不可勝言者伏願皇上崇恭儉之德存朴素之風講求今日財匱之故稽法先朝節用之實裁近幸之宴賞使悉如元年之舊章無名之冗費使無復近日之濫則財用自然有餘豈但將來供應可免借之行户哉上曰節省供應朝廷自有處置禮部又議覆户科都給事中童瑞等所言崇儉約之奏謂光祿寺所供齋醮茶飯果桌攢盤之類自𢎞治元年以後增加太多致勞民匱財請如瑞等及給事中倪議所奏量行樽節定為中制以裕財用上是之命今後光祿寺供應仍照𢎞治元年例纍年增加者悉從減省議處御膳進素𢎞治十五年有旨自正月初一日至十二月二十七日但遇御膳進素日期俱令光祿寺禁屠宰户科給事中徐昻等因言今一嵗之中禁屠斷宰者凡一百一十一日此旨惟光祿寺知之在京諸司尚未有知者乞申諭各衙門今後凡遇禁屠日期自御膳以至宴賜之類俱依齋戒事例悉用素食禮部議謂光祿寺各項供應上有兩宫之奉養下有四夷之宴賜今凡遇禁宰屠日期一切以素食從事揆諸事體殊為不便且進素日期在祖宗朝無故事惟皇上好生之德出自天性故愛惜物命至於如此但其間又有不容已於言者邇者復聞有旨令進素之日所用膳內豬羊雞鵝時價銀數各藏寄庫臣等未敢仰窺聖意所在伏願明詔光祿寺凡寄庫銀兩就以補助供應缺乏今後一切供應俱令隨事撙節則益廣而聖德益崇矣上納之令光祿寺貯其銀以俟供用議裁光祿日費正德元年七月時國用不足户科都給事中張文等疏宜節用户部集議謂文等所言冗食冗費宜令光祿寺查算每年所徴厨料并內外近侍官員每日所費酒饌有不急之用悉從裁省得旨準行於是該寺會計膳羞供應視𢎞治元年日增一倍禮部言日費如此嵗費益多宜仍令該寺詳悉開具凡昔無而今有者去之昔少而今增者減之必如舊規庶儲蓄充而民力舒矣上是之覆光祿寺嵗費嘉靖三十七年命都察院嵗差御史一員查刷光祿寺錢糧每月一具揭帖進覽時光祿寺嵗用銀以三十六萬計上以為多疑該寺必有乾沒其中者下禮部問狀乃諭內閣曰朕問光祿寺之費非視細務無論祖宗時即今兩宫大分盡省妃嬪僅十餘宫中罷宴設二十年矣朕所日用膳品悉下料無堪御者十壇供品不當一次茶飯費朕不省此三十餘萬安所用也靡費滋廣當由侵欺者多前該寺火或由此也大學士嚴嵩與禮部臣對該寺錢糧冒費多端大者有四一傳取錢糧原無印記止慿手票取討莫敢問其真偽一內外各衙門支酒飯或一人而支數分者或其事已完而酒飯尚支者一門禁不嚴下人侵盜無算一每嵗增買磁器數多自今須令該寺將節年嵗用之數冒濫物件明白開具回奏悉加釐正則弊以革而費可省矣既而光祿寺卿盧宗哲等總括一嵗中費出之欵具籍上之內列上分青膳及皇壇齋事供品二條上復諭內閣光祿寺以所費來聞內無細開之數皇壇之併日辨品物另是朕前銀兩豈在該寺錢糧額內侵冒明矣查往誰能盡心今後只令將逐日支費每月具一揭帖進覽可焉嵩對臣查得會典光祿寺內一欵凡本寺供應物件每月差監察御史一員照例具奏聖明所處正與此同又一欵內府尚膳監刋刻花欄印票遇有上用諸物開寫某日於光祿寺取某物若干用印鈐蓋照數支領進用本寺仍置文簿登記嵗終會計稽查夫此二例不知何年停罷今宜令禮部申明舉行上乃降旨詰宗哲等上狀含糊及其經費無章之罪而貰之命添差御史一員月籍該寺支費進覽隆慶元年光祿寺少卿李鍵條陳議處供應十事一傳帖用印信以防姦欺一申明宴享規制一服制未及大祥乞罷張飲設樂一寶坻縣魚鮮每年止辨一次薦新一清理器皿一查革冒支工食一畜飼獅羊靡費無益宜停止一革回內差常數之外𨽻籍本寺者一夷人朝貢事畢趣令出境一庫銀見存不及二十萬乞加意樽節下禮部覆議皆如其言得旨獅子除已貢者今後勿令再進壽羊除隆慶元年以前盡數發出餘悉依擬行人司例洪武十三年置行人司正九品衙門設行人左右行人職專奉使後改行人為司正左右行人為司副更設行人三百四十五員二十七年升正七品衙門嘉靖中存三十七員萬厯九年革五員今為三十二員其出使禮儀詳見禮部儀制司兹不載凡差文武大臣住各王府持節行册封禮本司官例充副使凡開讀詔赦奉使四夷諭勞賞賜賑濟徴聘賢才整點大軍及軍務祭祀等事例該本衙門官差遣不許别衙門侵奪如臨時乏人方許别官無差嘉靖十七年題準今後除册封宗藩照例於翰林六科等衙門行取相兼上請點用外其餘一應差遣先儘行人如行人不敷然後訪取各衙門空間官量情借差凡原有專職衙門并辦事進士通行禁革其行人出差照原定地方水程嚴立限期亦不許枉道過家遷延久住二十四年令出使外國官務選儀度修偉不許一槩輪差或所用非人著該科糾舉凡行人公差在外洪武間定如遇旦節慶賀有職者隨品序例若係齎詔敕賜臣則於月臺上先行五拜三叩頭禮畢凡行人奉旨公差在外洪武間定與本處官東西坐行人居東如在州縣則居中靠東坐非特旨差使齎各衙門印信公文止許投下公文隨即入館不許在廳與在職官列坐凡審論罪囚洪武三十年置政平訟理二幡除武臣死罪上親鞫問其餘法司以所犯具奏後引罪囚至承天門本官官持訟理幡傳旨諭之其無罪應釋者持政平幡宣德意遣之後不行凡刑部都察院問過充軍犯人送五軍都督府編發者每五日各開報本司本司歷事監生填寫精微文簿填滿繳進內府凡本司官出使外國俱賜給品服凡本司合用紙劄于刑部關用印色于順天府買用定行人差遣正統六年行人司行人劉浣言朝廷設官分職各有所掌臣下奉行而不敢違者以有成憲故也本司額設行人三十三員職專齎捧詔敕出使四夷及賞賚祭祀禁茶等事已有定例近占城國使臣回還應遣行人伴送禮部郎中葉蓁輒遣進士錢森伴送侵奪職掌顯有受囑之情且大同甘肅衛喇特哈密邊逺處專遣行人南方腹裏通舟楫處專遣進士如此差遣不一實為變亂成法上命禮部定議尚書胡濙等言往年暹羅瓜哇占城等國使臣朝貢回還俱遣郎中主事進士官伴送何嘗專遣行人至於定遣之際該司官吏呈堂公同計議非郎中所得擅行何從受囑往年大同衛喇特等處使臣朝貢回還本部或遣員外郎或主事或進士亦不專係行人職掌豈為變亂成法上又命都察院令的當御史考洪武永樂年間例陜西道監察御史曹泰言考得洪武二十七年五月行人陳升等奏準凡開讀詔赦賞賜諭勞奉使四夷祭祀賑濟軍務徵聘賢才整點大軍之類俱遣行人奉特旨者不拘此例又户部文案內考得遞年送哈密榜葛剌瓜哇等國使臣遣郎中員外郎主事行人署丞監事鳴讃序班進士辦事官事體不一乞敕禮部遵守洪武年間例凡遇遣使凡儘行人如行人不足方遣進士如此庶行人職事歸一人有所守而不敢紛爭矣至如昨者行人見有十餘員在司而郎中葉蓁不行取遣行人劉浣妄奏變亂成法等詞俱請送法司治罪上曰俱宥之今後遣使宜遵舊制鑄印局例選補局官凡兩京鑄印局儒士辦事三年滿日授以本局大使副使無缺授以各府檢較本部鑄印局額設大使一員副使二員食糧儒士四名候糧儒士四名大使員缺副使升補副使員缺食糧辦事三年儒士選補除若有糧滿儒士本局無缺願告外選者除府檢較有告願守候本局員缺者咨送吏部題給冠帶仍咨回本部候缺如本局一時缺官查無糧滿儒士於內儘其糧深者咨送吏部題授署職候糧滿實授凡儒士補糧本局據鑄印局申某人糧缺查照先年題準考定候糧儒士名次挨補仍題請旨然後劄付本局收補食糧𢎞治八年本局缺副使查無糧滿人數題將食糧二年儒士李康安署職候三年滿日實授轉咨吏部覆題以後俱照此例嘉靖十一年儒士陳德昌等辦事三年滿日因本局無缺告乞外選咨送吏部授承天等府檢校嘉靖二十七年儒士薑啓亨舒傑鄭申之錢訓各役滿告乞冠帶守缺本部查有先年潘幹事例題準咨送吏部冠帶南京鑄印局洪武間額設大使副使各一員永樂末年查革止留副使一員儒士一名在局辦理有缺咨本部題補凡遇考補食糧候糧俱由南京禮部會同吏部公同考選楷篆精通者咨送本部題請命下仍咨回南京禮部欽遵施行𢎞治三年南京鑄印局儒士潘幹役滿不願外任奏要仍舊在局辦事本部題準咨送吏部給與冠帶候缺嘉靖二十四年六月南京儒士梅一寧告稱南京禮部缺少人多情願棄南就北聽考纂修以圖補報據南京禮部咨本部查無舊例咨回南京不準收考儒士鑄印局儒士三年一次考收其或文華等殿及史館纂修缺人書辦奉旨取用暫準在外人役收考不拘常例嘉靖二十八年七月內該本部題為查參曠役醫士乞賜究治以懲姦惰以清夙弊事奉聖旨近年禮部違例擅收各項人役數多大壞政體你每便將醫士并儒士通事俱係未經題請考試假以訪保習學名色及犯罪有過之人收役的通行查明具奏定奪欽此本部查得鑄印局儒士舊例三年一次考補自嘉靖十六年題請考收儒士宋密等二十名送局肄業杭夢陽等一十八名量收作養及嘉靖十九年收送遇例納銀龍子壽等四十名之後於嘉靖二十二等年陸續將石同堅等二十六名暫收劄局習學委俱未經題請考試今除原已題請考收見在儒士麻惟賢等五名遇例納銀見在儒士王體坤等二十九名及內因依親丁憂給假私逃等項節該本部照例行文革役儒士王問臣等七名俱不開外謹將嘉靖二十二年起至二十七年止暫收在局習學未將考試儒士石同堅等二十六名通查開坐具奏伏乞聖明定奪又查得未經考試儒士王顒連年假以給假浪逰四方罔修行檢委屬過犯合究治以示懲戒奉聖旨石同堅等不由題請考試輒自夤緣假以暫收習學名色收用生姦故違明例著革了役發回原籍為民王顒既稱犯有罪過著巡按御史提了問先年堂官并該司承行官朦朧聽收劄局本堂查究但事往日久且多免究欽此嘉靖二十九年四月內該文華殿中書房提督司禮監太監王某等題稱本房缺少書辦人員事奉聖旨禮部知道欽此本部查照嘉靖二十年等考選事例將吏部等衙門聽選歷事并國子監監生本部及各處起送儒士人等揀選年嵗相應者共五十一名取具印信保結令各自備試卷本部彌封印鈐當堂嚴加考試遵奉欽依內名數取足一十五卷印封進呈御覽欽賜裁定奉聖旨麻惟賢趙旻沈詔徐封顧從義王體坤著送文華殿中書房書辦欽此南京禮部鑄印局但遇儒士有缺照依先年事例本部題行南直𨽻應天等府及浙江等布政司訪保良家通篆子弟南京禮部會同吏部堂上官考選堪中收局移咨本部題奉欽依挨補食糧儒士納例嘉靖十九年禮工二部為大工方殷費用不資會同題準恩例開納儒士四十名每名納銀二百五十兩又奉大工奏行事例許鑄印局聽缺食糧儒士納銀一百二十兩咨送吏部冠帶辦事半年照依本等資格選用嘉靖三十五年户部為推廣事例以便開納以濟邊儲事題準開納儒士八十名每名納銀三百兩嘉靖三十五年户部題稱兩京鑄印局儒士納銀冠帶則例如食糧未及一年者納銀一百二十兩一年已上者納銀一百兩二年以上者納銀八十兩其聽缺習學未食祿者各照舊例納銀一百五十兩完日免考咨送吏部冠帶其食糧者就與聽選聽缺習學者仍回局辦事半年滿日起送吏部各照本等資格選用在局習學儒士不係楷篆未通纍試無進之人許納二百兩完日送吏部冠帶仍回局肄業嘉靖三十六年户部題開先年援納兩京鑄印局儒士願改監生者比照附學名目補納銀八十兩完日行查明白準送兩京國子監肄業若有情願在局終業許照前推廣事例納銀二百兩冠帶回局肄業定以二年滿日起送吏部照本等資格選用查革曠役凡儒士私逃回籍及給假公差違限一年以上者俱本部徑行查革嘉靖十九等年儒士黃爐私逃回籍至四月以上王政因差違曠至二年以上俱行文各布政司查革嘉靖二十八年七月內本部鑄印局呈稱儒士王問臣賈躍韓偉俱丁憂違限五年以上茅思溫魯化李如同俱告病依親違限五年以上曾汸私逃回籍久不到肄業俱應查革本部行文各司府照例查革為民造印匠役事例凡軍民人等投充匠役本司帖下鑄印局從公結勘委係習學鑿字手藝堪以投充取具官吏并合局匠役不誣結狀到司案照然後劄付本局著落當該官吏收局習學鑄造候三月之後精通申部考試收糧如無進益仍行斥退永樂四年閏四月該本部將鑄印赤水宣府司印於左順門至看欽奉太宗皇帝聖旨這印如何有鑄造得好時有鑄造得不好時欽此本部官回奏各色人匠是輪班的初來不諳鑄造及至才會却又更替了以致鑄造有好時有不好時奉太宗皇帝聖旨今後這選髙手人匠連家小在京住坐專一鑄造印信不當别差這等才方慣熟鑄得好欽此正德六年四月本部據鑄印局呈稱本局人役近年各該官司不遵舊例仍拘應當甲役有誤工作該本部題稱各役優免事例再行申明止許專一在局鑄印不當别差但不許影射分門别户之人如果同門一户人丁雖多亦免充當總甲本部出給印信文帖收照若地方再行勾擾聽本部參奏提問奉聖旨是欽此部官提督正訛嘉靖七年禮部鑄印局儒士諸應瑞奏言天下文移印篆多有訛舛如沔陽州沔字訛篆為泛字如此類者未有可枚舉乞敕禮部擇委屬官精通六書者提督考正上嘉應瑞能查舉差訛留心本業命禮部專委主事一人提督本局關議備考議節省裁本部所屬諸冗費正統元年初上即位有敕凡事皆從減省行在禮部尚書胡濙等議欽天監厯日五十萬九千七百餘本省為十一萬九千五百餘本太醫院藥材九萬八千一百餘斤省為五萬五千四百餘斤光祿寺糖蜜果品減舊數之二其添造醃臘雞鵝豬羊二萬七千隻子鵝二千隻酥油四千斤盡行革罷厨役六千四百餘名揀選老疾者悉皆放回湖廣江西等處薦新茶芽七千五百餘斤省為四千斤在京各寺法王國師喇嘛六百九十餘名減數存留餘者令回原寺住坐放回雲南阿吒力朵弓薄五十餘名取回木邦等處催辦金銀內官革去會同館辦事官南北兩監監生入監年淺者放回依親讀書嵗貢生員自正統元年為始府學一年一貢州學二年一貢縣學三年一貢上悉從所議裁省法王供費正統元年行在禮部尚書胡濙等奏比奉敕旨省冗費以安養軍民今京師諸寺法王國師畨僧尚有四五百人其供費浩煩宜量存留餘悉遣回本土上以為然令俟來嵗議行減京寺畨僧正統二年減在京諸寺畨僧先是畨僧數等曰大慈法王曰西天佛子曰大國師曰國師曰禪師曰都網曰喇嘛俱係光祿寺支待有日支酒饌一次二次三次又支廩餼者有但支廩餼者上即位之初敕凡事皆從減省禮部尚書胡濙等議已減去六百九十一人相繼回還本處其餘未去者命待正統二年再奏至是濙等備疏慈恩隆善能仁寶慶四寺畨僧當減去者四百五十人以聞上命大慈法王西天佛子二等不動其餘願回者聽不願回者其酒饌令光祿寺定數與之減省所屬事欵宣德十年二月上初即位有敕凡事皆從減省行在禮部尚書胡濙等議欽天監厯日五十萬九千七百餘本省為十一萬九千五百餘本太醫院藥材九萬八千一百餘斤省為五萬五千四百餘斤光祿寺糖蜜果品減舊數三之二添造醃臘雞鵝豬羊二萬七千隻子鵝二千隻酥油四千斤盡行革罷厨役六千四百餘名揀選老疾者悉皆放回湖廣江西等處薦新芽茶七千五百餘斤省為四千斤在京各寺法王國師喇嘛六百九十餘名減數存留餘者令回原寺住坐放回雲南阿吒力朵弓薄五十餘名取回木邦等處催辦金銀內官革去會同館辦事官南北兩監監生入監年淺者放回依親讀書嵗貢生員自正統元年為始府學一年一貢縣學三年一貢上悉從所議減省供應𢎞治三年六月禮部覆奏户科給事中鄭宗仁等所陳節供應一事謂四時節令宴賞及齋醮等費日增於前冝從節省命尚膳監光祿寺供應止照𢎞治元年例行以後增加者悉從減省乞却貢獅𢎞治四年土魯番地面遣使臣賽音莽蘇爾等進獅子上納之留其夷人四名分班調養禮科都給事中林元甫上言西旅貢獒而召公以為終纍大德穆王受白狼白鹿而荒服自是不至是人君之好尚政事之治忽人心之向背係之誠不可不謹也彼獅子番方之猛獸耳陳之廟堂不可以備儀衛列之軍旅不可以禦外患矧其性不草食惟嗜羊肉奈何以有用之牲飼無用之獸乎乞却之便命下其言於禮部議停罷停減貢獻𢎞治元年八月巡撫甘肅都御史羅明言甘肅鎮守分守內外官近有傳奉不次之擢競尚貢獻各遣人於所屬邊衛派取方物名以採辦其實扣除軍士月糧馬價或巧取番人大馬珍竒等物以充又起膳乳等房僉派厨役造辦酥油等物及起運之時沿途騷擾不可勝言皇上嗣登大寶已有停免之詔奈何守臣不體聖心仍蹈舊轍兼年例進貢未蒙停免乞一切罷之以蘇邊困上曰甘肅邊地艱難進貢事俱遵詔例停免禮部移文使知之停罷守臣貢獻正德十年禮部尚書劉春以廣東左布政使羅榮按察使陳雍及安慶知府馬文來朝各陳言守臣進貢之害因覆奏奉纍朝停免貢獻詔旨且言召公之告成王曰珍禽竒獸不育於國又曰不寶逺物則逺人格唐太宗嘉李太亮不獻名鷹明皇納倪若水罷採鵁鶄德宗聽李德裕停造銀盝於裝具織綾前史載之至今以為美談今四方水旱頻仍盜賊充斥軍士苦於調發百姓困於轉輸厪聖慮時敕守臣蠲租減稅加以撫綏為守臣者正宜仰體德意深恤民艱而乃輒稱舊例採取珍禽竒獸苛索軍民騷擾道路貢於上者甚微而害於下者實大乞一切停免如違例進貢聽撫按官勘奏其司府曲意奉承者一體參問報曰此事自能酌處議止擾害及進獻隆慶元年禮部覆户科左給事中何起鳴言往時西畨進獅子光祿寺日飼一羊損上供之費以養無用又南京進鮮馬快船承天府增進香米等物擾害地方俱當詔罷太常寺嵗用牲三千有餘例以行户上納價未及領而上納之費已數倍當令科道官會同該寺給散牲價及稽察姦弊得旨進新船騷擾及太常寺一切宿弊如議禁革承天府香米等物及外夷珍禽異獸即行停止不許進獻禮部志稿卷九十九
