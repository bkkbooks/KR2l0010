body:
  text: 禮部志稿卷三十明俞汝楫編祠祭司職掌旗纛洪武元年詔定親征遣將諸禮儀以為古者天子親征則類于上帝造于祖宜于社禡于所征之地祭所過山川若遣將出師亦告于廟社禡祭旗纛而後行于是諸儒議上具載大明集禮中今牙旗六纛藏之內府其廟在山川壇每歲仲秋祭山川日遣官祭于旗纛廟霜降日又祭于教場至歲暮享太廟日又祭于承天門外俱旗手衛指揮行禮永樂後别有神旗之祭專祭火雷之神每月朔望神機營提督官請祭于教場今係總督京營戎政官奏請祭畢復命禡祭一齋戒皇帝清齋一日大將陪祭官以下皆如之一省牲前期二日設皇帝大次于廟庭之東省牲位于南門外前一日導駕官同太常寺卿導駕詣大次皇帝服通天冠絳紗𫀆至省牲位廪犧令率其屬牽牲自東西行過御前省訖牽詣神厨太常卿奏請詣神厨視鼎鑊滌溉訖遂烹牲駕還大次一陳設前一日執事設神案于廟殿中之北軍牙東立纛位西設籩十有二于神位東三行西上豆十有二于神位西三行東上簠簋二于籩豆間簠東簋西鉶三登三于籩豆前俎三于登鉶前香案于俎前爵坫于香案前沙池于爵坫前設酒尊所于廟庭東幣篚位于酒尊北爵洗位于尊南御洗位于爵洗南瘞坎于神位西北設席于坎位前上置酒并碗五雄雞五以伺酬神設御位于廟庭之南正中北向大將及陪祭官從後異等重行文東武西皆北向一正祭是日清晨建牙旗六纛于神位後旗東纛西皇帝服武辨服導駕官同太常寺卿導皇帝自左南門入就位贊禮唱迎神大樂作太常卿奏請詣盥洗位皇帝至盥洗位搢圭盥帨訖出圭請詣爵洗位搢圭執爵官以爵進受爵滌爵拭爵訖以授執爵官再進爵亦如之出圭請詣酒尊所搢圭執爵官以爵進受爵司尊者舉羃酌醴齊訖以授執爵官再進爵亦如之出圭請詣軍牙神位前爵幣前行皇帝升廟壇樂作至神位前奏跪搢圭三上香奠幣三祭酒奠爵出圭樂止讀祝官跪讀祝于神右訖太常卿奏俯伏興樂作奏拜興拜興平身樂止請詣六纛神位前禮同復位亞獻終獻不奠帛讀祝餘皆如之訖贊禮唱飲福受胙太常卿奏詣飲福位奏鞠躬樂作奏拜興拜興平身樂止復位贊禮唱徹豆樂作掌祭官各徹豆樂止太常卿奏皇帝飲福受胙免拜贊禮唱陪祭官皆再拜傳贊訖贊禮唱送神太常卿奏鞠躬樂作奏拜興拜興平身樂止傳贊同贊禮唱望燎讀祝官取祝捧幣官取幣掌祭官取饌詣燎所太常卿奏詣望燎位燎舉執事殺雞刺血于酒碗中酬神燎半太常卿奏禮畢仍同導駕官引還大次內設爵洗位滌爵拭爵上香祭酒神前再拜賜胙免拜等儀後並省祭所過山川儀右與禡祭同但嶽鎮海瀆則用太牢其次用少牢又次用特牲行速止用酒脯仍設籩豆各一籩實鹿脯豆實鹿臡贊以禮官不用太常奠帛行酌獻禮無亞獻終獻祭畢望瘞不用雞酒仲秋祭儀洪武二十六年定霜降同一齋戒二日一省牲牛一羊一豕一一陳設神七位南向旗頭大將六纛大將五方旗神主宰戰船正神金鼓角銃炮之神弓弩飛鎗飛石之神陳前陳後神祇五昌等衆犢一羊一豕一登一鉶二籩豆各十簠簋各二帛七黑二白五禮神制帛共設酒尊三爵三酒盞三十篚一于壇東南西向祝文案一于壇西一正祭贊引引獻官至盥洗所盥洗教坊司奏樂典儀唱執事官各司其事贊引贊就位典儀唱迎神樂作樂止贊引贊四拜陪祭官同典儀唱奠帛行初獻禮奏細樂執事捧帛爵進贊引引獻官詣神位前奠獻訖贊詣讀祝位贊跪樂止讀祝訖奏樂贊俯伏興平身贊復位樂止典儀唱行亞獻禮奏樂執事官捧爵贊引引獻官詣神位前獻訖樂止典儀唱行終獻禮儀同亞獻唱飲福受胙以下如常儀一祝文維某年某月某日皇帝遣具官某致祭于旗頭大將六纛大將五方旗神主宰戰船正神金鼓角銃炮之神弓弩飛鎗飛炮之神陳前陳後神祇五昌等衆維神欽天命而無私助揚威武有功國家兹當仲秋謹遵常典特以牲醴遣官致祭神其鑒之尚享歲暮祭儀一陳設羊一豕一果五爵三帛一一祝文維某年某月某日皇帝遣具官某致祭于旗纛之神維神之靈實壯威武適當歲暮禮宜時祀敬陳牲醴神其鑒之尚享朔望日祭神旗儀一陳設羊一豕一無帛一正祭贊引引獻官就位贊四拜贊初獻禮贊跪贊讀祝訖贊俯伏興平身贊亞獻禮贊終獻禮贊四拜贊訖焚祝所訖贊禮畢一祝文維某年某月某日皇帝遣具官某致祭于天威神機火雷無敵大將軍之神維神威勇猛厲剛徑精強訇雷掣電歘火奔風護國庀民厥功顯著肅靖凶暴寧謐封疆遇有征討惟神是賴驅鋒遣鏑端直竒妙萬發萬中疊貫連穿破敵致勝如拉枯朽無堅不摧無悍不滅神其蓄鋭育靈用之則應特以牲品致祭神其享之五祀舊制每歲孟春遣內官祭司戶之神于宫門外道左南向孟夏遣內官祭司竈之神于內府大庖厨前中道南向季夏遣司禮監官祭中霤之神于文樓前西向孟秋遣守門內官祭司門之神于午門前西角樓東向孟冬遣內官祭司井之神于內府大庖厨井前南向俱羊一豕一果品五禮神制帛一歲暮合祭于太廟丹墀之西羊五豕五果品五禮神制帛五遣太常寺少卿行禮今改以時享太廟日祭司户司竈司門司井之神而祭中霤并合祭日期及各遣官儀物並如舊一正祭贊引引獻官詣盥洗所洗訖出笏就位贊四拜贊行初獻禮贊詣神位前搢笏奠帛獻爵如素祭獻茶出笏復位贊跪讀祝訖俯伏興平身贊行亞獻終獻禮俱執事者捧爵自跪獻于神位前訖贊四拜贊焚祝帛贊詣焚祝所贊禮畢分祭祝文維某年某月某曰皇帝遣具官某致祭于司戶之神曰職司于戶謹出入之行藏晝開暮闔衛護無私時維孟春謹以牲醴致祭神其鑒知尚享司竈之神曰日用飲食必資于竈爨有常所神實司之時維孟夏謹以特醴致祭神其鑒知尚享中霤之神曰室之中霤神司其職居中向明照察無私時維季夏謹以牲醴致祭神其鑒知尚享司門之神曰職司于門謹出入之行藏晝開暮闔衛護無私時維孟秋謹以特醴致祭神其鑒知尚享司井之神曰神司兹井源泉清潔其用日新以供飲食時維孟冬謹以牲醴致祭神其鑒知尚享合祭祝文曰維神安養護衛各著厥功兹當歲暮特以牲醴報祭神其鑒知尚享京都祀典按職掌載南京十一廟皆在雞鳴山之陽後層漢壽亭侯又于都城增京都太倉天妃凡三廟今先京師諸廟而在南京者以類列焉京師北極佑聖宫即真武廟開國靖難神多效靈故祀之每歲元旦聖旦三月三日九月九日每月朔望日俱用素饈遣太常寺堂上官行禮國有大事則告東嶽泰山廟洪武三年春秋合祀于山川壇二十一年後春附祭于郊秋祭仍舊今罷惟每歲聖旦及三月二十八日用牛一羊一豕一果品五帛一遣太常寺堂上官祭于其廟都城隍廟舊從祀于郊壇聖旦及五月十一日遣太常寺官祭于其廟嘉靖九年罷從祀增廟祭一壇每歲仲祭神祇日用犢一羊一豕一鉶二簠簋各二籩豆各十帛一遣官詣廟致祭國有大事則告京都大倉神廟洪武初建于南京永樂後京師祭如之每歲春秋仲月擇日用羊一豕一餅饊果品饅頭糕各五帛一遣户部堂上官祭司馬馬祖先牧神廟國初築壇于南京後湖並祀今立廟如之每歲二八月中旬擇日遣太僕寺官祭𢎞濟神祠西海子源出西山繞甕山後東入都城南出玉河入于大通漕渠嘉靖十五年建金海神祠于大內西苑湧泉亭以祀宣靈𢎞濟之神水府之神司舟之神二十二年改今名每歲仲春秋上壬日用羊一豕一鉶二簠簋二籩豆各六帛七遣太常卿行禮靈濟宫福州閩縣原建宫祀南唐徐知證知諤兄弟永樂十五年上寢疾藥罔效禱之即瘳于是建宫京師封金闕玉闕真人十六年改封真君每歲元旦冬至二真君仙妃生辰用帛素羞遣太常寺堂上官行禮每月朔望本宫住持行禮國有大事則告而福州舊例每六年挂袍太常寺遣官齎送萬厯四年奏罷遣官止預行本省如式織造即令布政司堂上官祭告挂換元世祖廟洪武初年建每歲二八月中旬擇日遣順天府祭嘉靖二十四年罷漢前將軍漢壽亭侯關公廟舊稱壽亭侯嘉靖十年始正今稱每歲五月十三日以侯生辰用牛一羊一豕一果品五帛一遣太常寺堂上官行禮國有大事則告宋文丞相祠永樂六年建每歲春秋仲月用羊一豕一果品五帛一遣順天府尹行禮榮國恭靖公姚廣孝祠舊配享于太廟嘉靖九年移祀大興隆寺後寺燬移崇國寺每歲春秋用羊一豕一果品五帛一遣太常寺堂上官行禮南京北極真武廟每歲三月三日九月九日用素羞遣南京太常寺官祭都城隍廟洪武二年封京都城隍祀之三年正城隍號命從祀于山川壇二十年改建廟二十一年後春附祭于郊秋祭仍舊今罷惟每歲八月祭帝王後一日遣南京太常寺官祭京都太倉神廟每歲二八月十五日遣南京户部官祭天妃宫宫在龍江關永樂五年建每歲以正月十五日二月二十三日遣南京太常寺官致祭五顯靈順廟每歲四月八日九月二十八日遣南京太常寺官祭道林真覺普濟禪師廟即寶志公洪武初建塔廟于雞鳴山上每歲三月十八日用素羞遣南京太常寺官祭祠山廣惠廟祀張渤每歲二月十八日遣南京太常寺官祭漢前將軍漢壽亭侯關公廟洪武二十七年自玄津橋改建于雞鳴山與真武城隍五顯祠山及蔣卞曹劉衛國共稱十廟每歲四孟及歲暮遣應天府官祭五月十三日又遣南京太常寺官祭漢秣陵尉蔣忠烈廟晉成陽卞忠貞公廟宋濟陽曹武惠王廟南唐劉忠肅王廟元衛國忠肅公廟五廟祀漢蔣子文晉卞壼宋曹彬南唐劉仁瞻元福壽俱洪武二十年改建歲以四孟朔及除日遣應天府官祭永樂七年進封子文忠烈武順昭靈嘉佑王忠烈舊廟四月二十八日以生辰加一祭功臣廟洪武二年建每四孟歲暮遣勳戚大臣祭殿中正位中山武寧王徐達開平忠武王常遇春岐陽武靖王李文忠寧和武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英東序西向都指揮使馮國用郢國公僉都督耿再成西海武莊公僉都督丁德興濟國公都督同知張德勝蔡國忠毅公靖海侯吳禎海國襄毅公平章康茂才蘄國武義公副使茅成東海郡公西序東向參政胡大海越國武莊公都督同知趙德勝梁國公廣德侯華髙巢國武莊公都督同知俞通海虢國忠烈公江隂侯吳良江國襄烈公宣寧侯曹良臣安國忠烈公安陸侯吳復黔國威毅公副使孫興祖燕山忠愍侯兩廡各設牌一總書故功臣指揮千百戶衛所鎮撫之靈又大功坊中山王家廟永樂三年令每歲正旦清明中元十月朔冬至遣太常寺官祭以少牢有司祀典上舊典雜列各處山川土神古今聖賢忠臣烈士能禦大災能捍大患以勞定國以死勤事或奉特勑建廟賜額或沿前代降勑護持者皆著祀典秩在有司不可勝列惟嶽鎮海瀆及歷代帝王陵寢凡遇登極必遣官分投祭告特重其禮故備列之嶽鎮海瀆東嶽泰山山東泰安州祭西嶽華山陜西華隂縣祭中嶽嵩山河南河南府祭南嶽衡山湖廣衡州府祭北嶽恆山直𨽻真定府祭東鎮沂山山東青州府祭西鎮吳山陜西隴州祭中鎮霍山山西平陽府祭南鎮會稽山浙江紹興府祭北鎮醫巫閭山遼東祭東海山東萊州府祭西海山西蒲州祭南海廣東廣州府祭北海懷慶府祭江瀆四川成都府祭河瀆山西蒲州祭淮瀆河南南陽府祭濟瀆河南懷慶府祭帝王陵寢伏羲氏河南陳州祭媧皇氏山西趙城縣祭神農氏湖廣酃縣祭軒轅氏陜西延安府祭少昊氏山東曲阜縣祭高陽氏高辛氏直𨽻滑縣祭堯帝山東東平州祭舜帝湖廣寧逺縣祭夏禹王浙江會稽縣祭商湯王山西榮河