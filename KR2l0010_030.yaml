某人等百家聯名于此置備羮飯肴物祭于本里無祀鬼神等衆靈其不昧依期來享凡我一里之中百家之內儻有忤逆不孝以下並同前祭厲文但無我等合府官吏至一體昭報一款如此則鬼神有鑒察之明我民無諂諛之祭靈其無私永垂昭格尚享祭告城隍文某府某縣某鄉某村某里里長某人率領某里人民某人等聯名謹具狀告于本縣城隍之神今來某等承奉縣官裁旨遵依上司所行為祭祀本鄉無祀鬼神事該欽奉皇帝聖旨以下文與前告城隍同但省無杞鬼神至作為妖怪一段為有等不在典祀之神不得血食之鬼魂無所依私顯靈怪四句又省凡遇人間六句依時享祭下加鄉村里社一年三祭八字命本處城隍改仍命以禮請本處城隍生為凶惡生字改素字神當達于所司屏之四裔改神必屏之四裔此外並同今某等不敢有違欽依于某年某月某日就本里設壇謹備羮飯肴物祭享于本鄉無祀鬼神等衆然幽明異境人力難為必資神力庶得感通今特虔誠告于神先期分遣諸將遍歷所在招集本里鬼靈等衆至日悉赴壇所受祭神當欽承勑命鎮控壇場鑒察善惡無私昭報為此謹具狀告于本縣城隍之神俯垂昭鑒謹狀凡在外祀典雜例洪武六年定天下十三省山川皆各省自祭舊合祭京師及四夷山川悉罷之各城隍之神祭日春用三月三日秋用九月九日七年奏定天下府州縣社稷之神正配位各用羊一豕一十一年令在外府州縣祭祀典神祇中祀俱用帛小祀俱只用牲醴十四年令在外祭山川等神以文職長官一員行禮武官不預如軍民指揮使司則從本司行之十八年議準先師孔子及社稷山川等祀凡縣附府者罷縣祭二十九年令在外未入流官陪祭俱用祭服宣德八年定新官到任以羊豕各一總祀應祀神祇于城隍廟正統二年令應天府建社稷壇春秋祈報以守臣行事品官家廟國初品官廟制未定大明集禮權倣宋儒家禮祠堂之制奉高曽祖禰四世之主亦以四仲之月祭之又加臘月忌日之祭夫歲時俗節之薦享至若庶人得奉其祖父母父母之祀已有著令而其時享于寢之禮大槩與品官略同祠堂制度祠堂三間外為中門中門外為兩階皆三級東曰東階西曰西階階下隨地廣狹以屋覆之令可容家衆敘立又為遺書衣物祭器庫及神厨于其東繚以周垣别為外門常加扄閉祠堂之內以近北一架為四龕每龕內置一桌高祖居西曽祖次之祖次之父次之神主皆藏于櫝中置于桌上南面龕外各垂小簾簾外設香桌于堂中置香爐香合于其上兩階之間又設香桌亦如之若家貧地狹則止為一間不立厨庫而東西壁下置立兩匱西藏遺書衣物東藏祭器亦可地狹則於廳事之東亦可時祭儀節卜日凡四時之祭用仲月並于孟月下旬之首擇仲月三旬各一日或丁或亥主祭盛服率兄弟子孫立于祠堂階下北面置桌子于主祭之前設香爐香合杯策于其上主祭以下皆再拜訖主祭焚香薰策祝曰某將以來月上旬某日祗薦歲事于祖考即以策擲於地以一俯一仰為吉不吉再卜中旬之日又不吉則不復卜而直用下旬之日既得日乃復位再拜而退若臘日忌日俗節之薦享則不必卜齋戒前期三日主祭率衆丈夫致齋于外主婦率衆婦女致齋于內浴沐更衣飲酒不得致亂食肉不得茹葷不弔喪不聽樂凡凶穢之事皆不得預陳設前一日主祭率子弟及執事灑掃正寢洗拭桌椅務令蠲淨設高祖考妣位于堂西北壁下南向考西妣東各用一椅一桌而合之曽祖考妣祖考妣考妣以次而東皆如高祖之位世各為位不相連屬别設傍親無後及卑幼先亡者附食位于東西壁下凡伯叔祖考妣伯叔考妣兄弟嫂妻弟婦子姪子姪婦之屬皆右男子左婦女東西相向以北為上凡屋不問何向但以前為南後為北左為東右為西設香案于堂中置香爐香合于其上束茅聚沙于香案前及逐位前地上設酒案于東階上别置桌子于東設酒注一酹酒盞一鹽楪醋瓶于其上火爐湯瓶香匙火箸于西階上别置桌子于西設祝版于其上設盥盆帨巾各二于阼階下之東又設陳饌大牀于東省饌前一日主祭率衆丈夫省牲涖殺主婦率衆婦女滌濯祭器潔釜鼎具祭饌每位果六品菜蔬及脯醢各三品肉魚饅頭糕各一盤羮飯各一碗肝各一串肉各一串務令清潔未祭之前勿令人先食及為貓犬蟲鼠所汚行事祭之日質明主祭以下各具服主祭者見居官則唐巾束帶婦人曽受封者則花叉翟衣士人未為官者則幅巾深衣庶人則巾衫結縧婦人則大襖長裙首飾如制主祭以下具服訖盥手帨手詣正寢神位前設菜果酒饌設果楪于桌子上南端蔬果脯醢相間次之設盞柈醋楪于北端盞西楪東匙箸居中設酒瓶于架上熾炭于爐主婦炊暖祭饌皆令極熱以合盛出置東階下大牀上次詣祠堂前階下序立主祭位于東兄弟以下位于主祭之東少進子孫及外執事以次重行列于主祭之後主婦位于西兄嫂弟婦姊妹位于主婦之西少退女子子婦及內執事亦以次重行列于主婦之後皆北向有伯叔父母位次並居主祭主婦位稍前主祭有母則特位于主婦之前敘立訖主祭升自阼階焚香告曰孝孫某今以仲春之月夏秋冬同有事于顯高祖考某官府君顯高祖妣某封某氏顯曽祖考某官府君顯曽祖妣某封某氏顯祖考某官府君顯祖妣某封某氏顯考某官府君顯妣某封某氏以某親某官府君某親某封某氏祔食敢請神主出就正寢恭申奠獻告訖斂櫝正位附位各置一笥各以執事者一人捧之主祭者導主婦以下皆從至正寢置于西階桌子上主祭啓櫝奉諸考神主出就位主婦奉諸妣神主就位其祔位則各用子弟一人奉之既畢主祭以下皆降復位參神主祭以下敘立如祠堂之儀立定俱拜若尊長老疾者則休于他所降神主祭升詣香案前焚香少退立執事者一人實酒于注一人取東階桌子上盤盞立于主祭之左一人執注立于主祭之右主祭跪捧盤盞者亦跪進盤盞主祭受之執注者亦跪斟酒于盞主祭者左手執盤右手執盞灌于茅上以盤盞授執事者俯伏興再拜降復位進饌主祭升主婦從之執事者一人以盤奉魚肉一人以盤奉米麵食一人以盤奉羮飯從陛至髙祖位前主祭奉肉奠于盤盞之南主婦奉麵食奠于肉西主祭奉魚于醋楪之南主婦奉米食奠于魚東主祭奉羮奠于醋楪之東主婦奉飯奠于盤盞之西以次設詣諸正位使子弟婦女各設祔位皆畢主祭以下皆降復位酌獻主祭升詣高祖位前執事者一人執酒注于其右冬月先暖之主祭奉高祖考盤盞位前東向立執事者以西向斟酒于盞內主祭奉之奠于故處次奉髙祖妣盤盞亦如之奠訖位前北向立執事者二人舉髙祖考妣盤盞立于主祭之左右主祭跪執事者亦跪主祭受高祖考盤盞右手取盞祭之茅上以盤盞授執事者反之故處受高祖妣盤盞亦如之俯伏興少退立執事者炙肝于爐以楪盛之兄弟之長一人奉之奠于高祖考妣前匙箸之南祝取版立于主祭之左跪讀曰某年某月某朔某日孝玄孫某官某敢昭告于顯高祖考某官府君顯高祖妣某封某氏氣序流易時維仲春追感歲時不勝永慕敢以潔牲柔毛粢盛醴齊祇薦歲事以某親某官府君某親某封某氏祔食尚享畢興主祭再拜退詣諸位獻祝如初每逐位讀祝畢即兄弟衆男之不為亞終獻者以次分詣本位所祔之位酌獻如儀但不讀祝獻畢皆降復位執事者以他器徹酒及肝置盞于故處曽祖前稱孝曽孫祖前稱孝孫考前稱孝子改不勝永慕為昊天罔極凡祔者伯叔祖父祔于高祖伯叔父祔于曽祖兄弟祔于祖子孫祔于考餘皆倣此如本位無即不言以某親祔食亞獻則主婦為之諸婦女奉炙肉及分獻如初獻儀但不讀祝終獻則兄弟之長或長男或親賔為之衆子弟奉炙肉及分獻如亞獻禮侑食主祭者升執注就斟諸位之酒皆滿立于香案之東南主婦升扱匙飯中西柄正箸立于香案之西南皆北向再拜降復位闔門主祭以下皆出祝闔門無門處即降簾可也主祭立于門東西向衆丈夫在其後主婦立于門西東向衆婦女在其後如有尊長則少休于他所此所謂厭也啓門祝聲三噫歆乃啓門主祭以下皆入其尊長先休于他所者亦入就位主祭主婦奉茶分進于考妣之前祔位使諸子弟婦女進之受胙執事者設席于香案前主祭就席北面祝詣高祖考前舉酒盤盞詣主祭之右主祭跪祝亦跪主祭受盤盞祭酒啐酒祝取匙并盤抄取諸位之飯各少許奉以詣主祭之左嘏于主祭曰祖考命工祝承致多福于汝孝孫使汝受祿于天宜稼于田眉壽永年勿替引之主祭置酒于席前俯伏興再拜跪受飯嘗之實于左袂挂袂于季指取酒卒飲執事者受盞自右置注旁受飯亦如之主祭俯伏興立于東階上西向祝立于西階上東向告利成降復位與在位者皆再拜主祭不拜降復位辭主主祭以下皆再拜納主主祭者與主婦皆升各奉主納于櫝主祭以笥斂櫝奉歸祠堂如來儀徹主祭婦還監徹酒之在盞注他器中者皆入于瓶緘封之所謂福酒果蔬肉食並傳之燕器主婦監滌祭器而藏之餕是日設席男女異處尊行自為一列南面自堂中東西分首若止一人則當中而坐其餘以次相對分東西向就位行酒薦食酒饌不足則以他酒饌益之將罷主祭頒胙于內外執事者遍及微賤其日皆盡禮部志稿卷三十
