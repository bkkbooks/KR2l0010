body:
  text: 禮部志稿卷三十六明俞汝楫編主客司職掌土官湖廣廣西四川雲南貴州腹裏土官遇三年朝覲差人進貢一次俱本布政司給文起送限本年十二月終到京慶賀限聖節以前謝恩無常期貢物不等洪武間朝貢土官四川烏蒙軍民府烏撒軍民府芒部軍民府金築安撫司後屬貴州布政司盧山長官司後屬貴州宣慰司慕役長官司後屬貴州永寧州大華長官司西堡長官司後屬貴州安順府寧谷寨長官司後屬貴州安順府頂營長官司後屬貴州永寧府十二營長官司後屬貴州鎮寧府安順州後屬貴州布政司貴州宣慰司後屬貴州布政司平茶洞長官司播州宣慰司程番長官司後為府設留官屬貴州布政司龍州後為宣撫司永寧州後屬貴州布政司鎮寧州後屬貴州布政司康佐長官司後屬貴州鎮寧州建昌衛禮州柏興州酉陽宣撫司建安州方番長官司後屬貴州宣慰司本瓜長官司後屬貴州金築安撫司黎州卭部軍民府德昌府普安軍民府東川軍民府長沙西天全六番招討司占藏先結簇長官司阿昔簇長官司蛒匝簇長官司北定簇長官司阿昔洞簇長官司祁命簇長官司勒都簇長官司班班簇長官司者多簇長官司麥匝簇長官司石砫宣慰司泥溪長官司雷坡長官司沐川長官司平夷長官司蠻夷長官司馬湖府後改設流官嶽希蓬長官司隴木頭長官司靜州長官司里州建昌府闊州中縣碧舍縣會川府武安州永昌州隆州薑州黎溪州麻龍縣會理州威龍州昌州普濟州廣西龍英州江州龍州思明府陀陵縣養利州上下凍州思陵州萬承州太平州後設太平府流官統本州及龍溪羅陽等州縣安平州都結州羅陽縣思城州結倫州鎮逺州左州後改設流官崇善縣茗盈州南丹州結安州永康縣思同州東蘭州那地州全茗州利州鎮安府田州府後改田寧府設流官泗城州奉議州雲南姚安軍民府後改設流官姚州後改設流官元江府廣通縣平緬宣慰司車里軍民宣慰司八百宣慰司麗江府景東府楚雄府後改設流官鶴慶府後改設流官尋甸府後改設流官鄧川州海東土官賓居土官小雲南土官臨安府嶍峩縣大理府後改設流官湖廣施南宣慰司忠建安撫司思南宣慰司後改思南府設流官屬貴州布政司永順宣慰司保靜宣慰司臻部六洞黃坡等處長官司曲靖軍民府後改設流官屬雲南布政司萬厯初朝貢土官四川烏蒙軍民府烏撒軍民府播州宣慰司蠻夷長官司靜州長官司嶽希蓬長官司泥溪長官司平夷長官司沐川長官司隴木頭長官司石砫宣撫司天全六播招討司酉陽宣撫司祁命簇長官司蛒匝簇長官司阿昔洞簇長官司者多簇長官司北定簇長官司勒都簇長官司麥匝簇長官司疊溪鬱即二長官司寧戎巡檢司鎮雄府寒水巡檢司永寧宣撫司九姓長官司長寧縣下寧逺鄉萬里箐寨阿角簇按撫司思曩兒簇長官司太平長官司貴州金築安撫司貴州宣慰司程番長官司木瓜長官司方番長官司盧山長官司以上舊隸四川清平衛覬里安撫司養龍抵塞乖西水東西長官司白納小平伐二長官司青山中曹龍里劄佐四長官司都勻府歸化上下二牌頭卧龍小龍大龍韋番四長官司盧番洪番金石三長官司羅番上馬小程三長官司平伐麻嚮貴竹三長官司廣西龍英州江州果化州歸德州向武州歸順州憑祥州都康州湖廣桑植安撫司添平千戶所凡土官差人到京鴻臚寺即與引見并投進實封奏本其方物赴禮部驗進嘉靖元年議準聖節止許各宣慰宣撫安撫官具方物差人赴京其餘佐二官以下及把事頭目護印舍人止許朝覲年入貢每司量起的當通犯三二人齎執方物多者給與本册咨批少者給與咨批各給關文應付馬匹就彼變賣銀兩貯庫降香黃蠟茶葉等物要實重五十五斤為一扛每扛賞濶生絹二匹照扛遞加其不由本布政司起送或斤重不足差人過多不待朝覲之年擅自起貢禮部不與進收責諭遣回賞賜應付通行停止二年議準前數項及過限一月俱屬違例止減半給賞若違例多端者不賞七年議準湖廣土官襲授宣慰宣撫安撫職事者差人慶賀每司不許過三人其三年朝覲每司止許二人大約各司共不過百人起送到京者不過二十人餘俱存留本布政司聽賞所司辨驗方物造册給劄差官拌押到京禮部驗批相同方與賞賜應付貢物馬象犀角孔雀尾象牙象鈎象鞍象腳盤蚺蛇膽金銀器皿玉石青紅寶石圍帳金絨索各色絨綿各色布手巾花藤席降香黃蠟檳榔朝貢通例凡朝貢方物洪武二十六年定凡諸番國及四夷土官人等或三年一朝或每年朝貢者所貢之物會同館呈報到部主客司官赴館點檢見數遇有表箋移付儀司其方物分豁進貢上位若干殿下若干開寫奏本發落人夫管領先具手本關領內府勘合依數填寫及開報門單於次日早朝照進內府或於奉天門或奉天殿丹陛或華蓋殿及文華殿前陳設本部正官奏啓進納若遇慶賀聖節正旦貢獻之物初到即以數目具本奏聞物候至日通進內府陳設交收凡進馬騾到於會同館即令典牧所差醫獸辨驗兒騍騸及毛色齒歲明白備寫手本交收及令本館放支草喂養仍撥人夫管領至期進內府行列于墀東伺候御前牽過同手本交付御馬監官收領凡進象駝到於會同館令本館喂飼次日早進內府御前奏進如候聖節正旦冬至陳設進收日逺先行奏聞象送馴象所駝送御馬監收養至期令進內府陳設凡進虎豹禽鳥之類到於會同館就令畜養之人喂養具數奏聞送所司收領至期進內府丹墀內陳設凡進金銀器皿珍寶段匹之類須同貢獻之人驗視明白具寫奏本仍以器具裝盛或黃袱封裹分撥館夫一同貢獻之人收管先期一日關填勘合開報門單次日早照進內府于殿前丹墀等處陳設一一交付長隨內使收管凡進蘇木胡椒香蠟藥材等物萬數以上者船至福建廣東等處所在布政司隨即會同都司按察司官檢視物貨封完密聽候先將番使起送赴京呈報數目除國王進貢外番使人伴附搭買賣物貨官給價鈔收買然後布政司仍同各衙門官將貨稱盤見數分豁原報附餘數目差人起解前來禮部香官及行戶部都察院委官會同差督人夫運進承運庫稱盤入庫禮部先期開寫各庫該收貨物手本於午門關領各門勘合填寫照進并出給長單入該庫寫實收數目回部備照後續定凡外國朝貢惟朝鮮國所進方物陳設奏進其餘俱該司驗過具題得旨開具手本送右順門即歸極門內府合該衙門交收今朝鮮國貢物亦不陳設止具題開送歸極門內使交收凡進馬惟朝鮮國先行面奏引過御馬監交收其餘俱該司驗過送鴻臚寺隨本引進遇慶賀禮部先行請旨行御馬監至期陳設今朝鮮國進馬亦不面奏止具題送御馬監交收凡進象駝虎豹禽鳥之類俱不陳設惟具題送內府各衙門交收凡進到獅象禮部題請量留原來送伴四人與同馴象所軍奴到于御馬監調養待後馴習發回光祿寺日給養贍仍行兵部給與牌面懸帶以便西安門出入凡安南國進金銀器皿之類引奏進獻其餘俱具題送歸極門交收凡進藥材等物徑從禮部具題送歸極門交收蘇木胡椒硫黃近多解南京禮部交收凡各處夷人貢到方物例不給價朝鮮國常貢馬匹亦不給價凡勘合號簿洪武十六年始給暹羅國以後漸入諸國每國勘合二百道號簿四扇如暹羅國暹字號勘合一百道及暹羅字號底簿各一扇俱送內府羅字勘合一百道及暹字號簿一扇發本國收填羅字號簿一扇發廣東布政司收比餘國亦如之每改元則更造換給計有勘合國分暹羅日本占城瓜哇滿剌加真臘蘇祿國東王蘇祿國洞王柯枝浡泥錫蘭王古里蘇門答剌木麻剌凡信符金牌永樂二年始置以給雲南徼外土官其制銅鑄信符五面內隂文者一面上有文行忠信四字與四面各編某字一號至一百號批文勘合底簿其字號如車里以車字為號緬甸以緬字為號隂文信文勘合俱付土官底簿付雲南布政司其陽文信符四面及批文一百道藏之內府凡朝廷遣使則齎陽文信符及批文各一至布政司比同底簿方遣人送使者以往土官比同隂文信符及勘合即如命奉行信符之發一次以文字號二次行字次忠次信周而復始又置紅牌鏤金字敕書諭之凡有調發及當辨諸事須憑信符乃行如越次及比字號不同或有信符而無批文有批文而無信符者即是詐偽許擒之赴京治以死罪又編勘合一百道付各衙門勘合底簿一扇付布政司凡有軍民疾苦及奉信符辦過事務進貢方物之類俱於勘合內填寫遣人齎至布政司比號寫底簿布政司都司遣官同齎所填勘合奏聞若邊境聲息及土人詞訟從都司布政司按察司官會同計議行之其事已行及承行原由並填寫勘合奏聞如總兵官鎮守遇有前事總兵官亦會三司計議仍用都司或布政司印信文書寫總兵官處分之語方許奉行亦填寫勘合具奏若朝廷命總兵官挂將軍印征討調遣軍馬不待三司文移即時發遣亦填勘合差人奏聞填寫勘合或字書錯誤明白圈注以本司印信鈐蓋凡所收底簿及勘合用之將盡具奏再班遇改元則更換造給舊簿勘合隨貢繳部貯庫或總兵官都司布政司等官新除官到任及遇時節不許齎禮物相慶仍以紙寫禁約一道付之或有貪婪無藉凌害者不待填寫勘合止具本遣人齎所賜敕不經總兵官及三司徑赴京陳奏治以重罪計有敕符勘合土官衙門軍里木邦緬甸麓川平緬八百大甸老撾六宣慰司十崖大候里馬茶馬四長官司潞江安慰司孟艮孟定灣甸鎮康等府其後又有孟養等宣慰司威逺等州亦給勘合凡畨部誥敕初哈密等七衛俱有如諾延海西諸衛例後乃沒於土魯番而烏斯藏長河西等處闡教闡化輔教贊善護教五王大乘大寶二法王各處國師俱誥命禪師敕命都綱喇嘛都指揮指揮等俱敕諭其闡教闡化輔教贊善仍給勘合護教自稱原有勘合燬於火纍年請給未與二法王及長河西朵甘斯董卜韓胡俱不給勘合其金川雜谷等處止齎印信番文亦無勘合嘉靖二十八年題準各處番僧到京襲職進貢禮部置立文簿一扇各僧齎到舊給誥敕所載師僧職名頒給年月及見今襲替僧徒名字住坐地方分别已未領有新誥新敕逐一登記備行布政司照式置造以後如遇應貢年分將文册查對如係襲職久逺果有退老病故情節方許照例起送承襲其有已襲而未領新誥敕者照已賞未襲職例許起送一二人如有揑作入番行教在番病故者不許濫放如違聽本部通將三司等官參究冶罪各番應領誥敕新者既給與舊者即令銷繳其新給誥敕俱要開載住坐地方如隨護教王進貢襲職者即稱係護教王地方住坐某師某名其餘地方準此計有誥敕部落番僧諾延衛福餘衛泰寧衛烏斯藏長河西等處凡使人入關嘉靖十二年令邊方一應該管官員務要盤驗明白方許放進若敕書內有洗改詐偽字樣即便省諭阻回不許一概朦朧驗放凡進奏番本嘉靖二十六年題準該邊官審明封進如於理法不通即省諭退還不必瀆奏到京後若有番本不係邊官封奏者不與準理凡畨使往回嘉靖二十六年令經該巡撫衙門給與印信文簿事畢回還者禮部給與印信文簿令所過驛遞將夷使名數并應付馬驢車輛廩給口糧各數目初到及起身各日時逐一登記就用本驛遞條記鈐蓋仍付伴送人員齎往前路驛遞一體填寫事完之日伴送人員將前簿在內送本部在邊送巡撫衙門稽考禮部仍咨各該巡撫凡伴送畨人務選平昔畏法諳熟畨情者差遣不得濫委擾害地方凡譯待畨使成化間題準迤北小王子來貢禮部差該司官一員前往大同會同鎮巡等官將差來使臣逐一譯審分豁使臣若干隨來男婦若干赴京若干存留若干使臣自進并帶進某頭目下馬騾方物皮張數目俱要辨别毛齒等第編成字號填寫勘合用印鈐蓋給付各使臣收照仍著落山西行都司備造黃册奏繳青册先行送部以慿給賞其在彼茶飯并沿途供應及榆河驛湯飯一聽本官提督凡貢使限制成化十九年題準烏斯藏長河西朵甘斯等處國師禪師在本地方住坐者與各寺寨輪流進貢湊滿每年百人之數不許各另差人如有退老事故許令的親兒徒因襲職赴京進貢國師起送一百人禪師都指揮五十人已賞未襲職者再來襲職止許一二人其都綱指揮以下來襲職者止本身隨同年例貢使赴京二十一年奏準各處招撫生番進貢行本處鎮巡等官止許寨首一人前來如五寨五人十寨十人不許過多嘉靖二十六年題準賽瑪爾堪并土魯番天方國魯爾額濟格依等朝貢查照舊例每十人起送二人扣該起送赴京五十人其存留甘肅聽賞者除舊二百名外量增一百名各給口糧照應貢人數減半給賞餘俱阻回自進并帶進馬匹合例者聽候領賞其該退還而先已給軍給驛者量給價銀今後所進方物該邊官看驗果係堪中物件方與收載册內除正額外多餘者悉退還各夷聽其貨賣預先省諭各畨不許將退還之物仍帶來京揑稱自進加進色名奏擾希賞二十八年題準都綱喇嘛指揮人等亦準帶二十五人隆慶三年議準國師禪師都指揮等襲職差人總在年例數內不許另外增加襲職之後亦不許假以謝恩差人另貢方物各地方遇番僧進貢務將各番所齎原給誥敕勘合及印信番本逐一查驗明白果無冒偽影射情弊方許具本起送各番地方逺近不齊貢期不必拘以三年但未及三年不許來貢不願者不強凡諸番貢不如期及年例外多貢者參作下次例貢之外凡使病故如係陪臣未到京者本部題請翰林院撰祭文所在布政司備祭品遣本司堂上官致祭仍置地營葬立石封識到京病故者行順天府給棺祠祭司諭祭兵部應付車輛人夫各該賞衣服綵段俱付同來使臣領回頒給嘉靖八年題準在館未經領賞病故者行順天府轉行宛大二縣預解無礙官銀三十兩發館每名給與棺木銀五錢支盡之日造册繳部再行取用領賞以後病故聽其自行葬埋凡投降人到館譯審明白兵部題請到部關給來降賞賜畢日著去該都督府差委官舍伴送兩廣軍門轉發缺少頭目衛分安插仍給房屋牀榻配與妻室查點舊例養贍凡朝鮮國漂流夷人至會同館即行該館通事序班譯審明白日給薪米養贍兵部委官伴送沿途應付至遼東鎮巡衙門另差人員轉送歸國通行國王知會如該國使臣在館即令帶回一體給賞應付凡差官伴送嘉靖二十七年題準兵部立與批限候回京之日查違限逺近一年之外武官調衛文官罷職不敘沿途生事殘害居民者許所在官司開申撫按轉達本部參送問罪凡交通禁令各處畨人朝貢領賞之後許令會同館開市三日或五日惟朝鮮琉球不拘期限俱主客司出給告示于館門首張挂禁戢收買史書及玄黃紫皂大花西番蓮段匹并一應違禁器物各鋪行人等將入館內兩平交易染作布絹等項立限交還如賖買及故意拖欠騙勒畨人久候不得起程并私相交易者問罪仍於館前枷號一箇月若各畨故違潛入人家交易者私貨入官未給賞者量為遞減通行守邊官員不許將曽經違犯畨人起送赴京凡會同館內外四鄰軍民人等代替畨人收買違禁貨物者問罪枷號一箇月發邊衛充軍𢎞治十一年令迤北小王子等使人朝貢赴京官員軍民人等交易止許光素紵絲絹布衣服等件不許將一應兵器并違禁銅鐵等物有違犯者處以極刑又奏準私將應禁軍器賣與畨人圖利者比依將軍器出境因而走泄事情者律各斬為首者仍梟首示衆又令在京在外軍民人等與朝貢畨人私通往來投托管顧撥置害人因而泄漏事情者俱問發邊衛充軍軍職有犯調邊衛帶俸差操通事併伴送人等係軍職者照軍職例係文職有贓者革職為民十三年奏準甘肅西寧等處遇有番人到來本部司委官關防提督聽與軍民人等兩平交易若勢豪之家主使弟男子姪家人頭目人等將畨人好馬奇貨包收逼令減價以賤易貴及將粗貨物并瘦損頭畜拘收取覔用錢方許買賣者聽使之人問發附近衛分充軍干礙勢豪及委官知而不舉通同分利者參問治罪嘉靖三年奏準夷人貢船未曽報官盤驗先行接買番貨者比照私自下海收買番貨至十斤以上事例邊衛充軍其交結畨人誆騙惹釁及教誘為亂者比照川廣雲貴陜西等處事例邊衛永逺充軍一應代替畨人收買違禁貨物者比照會同館內外軍民事例發遣包攬打造違式海舟賣與畨人圖利者比照私賣應禁軍器事例處斬二十六年題準西域各地面退還貨物其在邊開市之處差委的當官員嚴行監察不得與漢人交通别生事端隆慶三年議準西番烏斯藏等寺若有近邊姦民出外勾引希圖冒賞者聽撫按等衙門訪拿治以交通外夷重罪凡貢回定限萬厯七年議準分為三等朝鮮國諾延福餘等衛限一箇月零十日安南琉球暹羅各國陜西大崇教大能仁崇隆惠濟扯巴等寺岷洮及莊浪等處四川金川寺加渴瓦寺長河西雜谷長寧達思蠻等處各番僧番族限一箇月零二十日四川烏斯藏番王董卜韓胡番僧寨官人等陜西贊善王𢎞化淨寧等寺番僧土魯番天方國魯迷哈密等及罕都等衛限兩箇月賓客會同館舊設南北兩會同館接待番部使客遇有各處貢夷到京主客司員外郎主事輪赴會同館點視方物譏防出入貢使去復回部視事𢎞治五年各部來貢者衆始添設會同館主事一員専一在館提督事務凡貢使至館洪武二十六年定凡四夷歸化人員及朝使客初至會同館主客司官隨即到彼點視正從定其髙下房舍鋪陳一切處分安妥仍加撫綏使知朝廷恩澤一下程分豁正從人數劄付繕部五日一次照例支送酒食茶麵飲食之物一管待量其來人重輕合與茶飯者定擬食品桌數劄付繕部造辦主客司官一員或主席或分左右隨其髙下序坐以禮管待仍令坊司供應凡番王至京洪武二年令禮部官於會同館禮待永樂以後外畨來朝貢者欽命中官與文武大臣或學士等官待宴不拘員數成化初北狄東夷西番以武職大臣待朝鮮安南日本等國并土官以禮部官待嘉靖三十九年朝鮮國陪臣到京禮部題請待宴官命禮部尚書待又泰寧等各部頭目命總督戎政勳臣待自待夷使到京俱照例凡會同館醫士遇使人及伴送人等有疾即與醫藥年終具用藥若干活人若干開送提督主事處核實呈部以稽勤惰考滿升授仍留本館辦事其藥材太醫院關給凡兩館事務夫役嘉靖十年令俱屬提督官管理兵部該司不許侵撓干預其大使等官及别衙門敢有占用夫役及脫逃負欠情弊都聽提督官查究四夷館通事洪武永樂以來設立御前答應大通事有都督都指揮指揮等官統屬一十八處小通事總理來貢畨人并來降畨人及走回人口凡有一應畨情譯審奏聞嘉靖初革去大通事其小通事悉屬提督官凡在館鈐束畨人入貢引領回還伴送皆通事専職凡通事額員成化五年奏定小通事額數總不過六十名遇有病故及為事等項革去職役者照缺選補若事繁去處丁憂有過三名者量補一名計外畨一十八處額設通事六十員名朝鮮國五員名日本國四員名琉球國二員名安南國二員名真臘國一員名成化二十年添一名後以空間俱不補暹羅國三員名占城國三員名瓜哇國二員名後俱不補蘇門答剌國一員名後不補滿刺加國一員名韃靼七員名成化十九年添一名回回七員名成化十九年添一名尼嚕罕七員名成化十九年添二名輝和爾二員名西番五員名成化十九年添一名河西一員名成化二十年添一名後俱不補緬甸一員名後不補雲南百夷等處六員名凡食糧資給成化七年奏準通事戴頭巾三年滿日送部考中頂補正缺者準支米添設者雖經考中仍作不支米辦事待有正缺方準支米十八年定通事辦事三年滿日本部考中支米又辦事三年滿日考中送吏部冠帶又三年滿日考中實授序班欠通者許習學半年再考𢎞治六年申明額外添設待缺通事雖滿三年六年考中不許支米其滿九年未得食糧者準其食糧協同辦事九年奏準通事食糧辦事三年滿日考送吏部冠帶如畨語欠通及有過名誤事者徑發原籍為民凡收充候缺𢎞治八年奏準各國世業并土官人子孫情願告充候缺通事或邊方訪保生儒人等該本部考得畨語精通勘無詐冒者劄送鴻臚寺收充候缺通事土官土人子孫給與養贍食米一石極邊訪保者給食米五斗通候有缺之日再考題補其出身資格仍照舊例凡各處歸順土官子孫告充通事補缺三年奏準給與冠帶辦事仍候三年考滿銓選嘉靖二十九年題準通事遇有各館正額名缺將候缺通事查係類考居一等方與照依到館名次挨補其考居二等及季終考雖居一等者不許槩稱到館在先援比求進凡訪保成化十八年奏準各國通事止一名者訪保一名不支米辦事嘉靖元年奏準通事丁憂緣事未結俱不作缺其有見缺十人以上及一國全缺者照舊行各邊鎮巡官訪保精通畨語身家無過人物齊整字畫端楷語音洪亮者每缺起送二人前來補考十九年議準通事見缺訪保送部收考轉送該寺教習者俱不得過正額之半若本國正額止一名者許收候缺一名凡遇候缺既盡正額有缺許鴻臚寺呈部奏請訪保照例考滿不必拘見缺十人及一國全缺之例凡考試教習嘉靖二十五年題準禮部會同吏部將在館通事序班人員通行考試分為三等題請一等照舊在館供事二等量加罰治姑容習學三等黜退為民其未經授職通事人等本部仍各選委年深通事序班題請照舊教習每日書寫番漢字語一張每月朔望責令該館序班考校月終提督主事考校季終本部通將各館官員通事人等參錯出題嚴加考核如一年三次考居三等通事人等本部即時量責序班等官年終類題罰治以後通事食糧冠帶授職等項仍各案候俱以三六九年為期通將各館官生人等一併嚴加隔别考試其畨語通曉者許照例遷轉留用不通者徑自黜退為民不許照常扣日挨資求進二十八年題準各館中掄選年深通事曉畨語者一人立為教師不分有無畨人每日黎明時進館提率各館通事人等演説畨語中有未能通曉者遇有該邊原來伴送通事許令教師詢訪務求通曉音字如三年之中習有成效候類考之時具名奏請擢用本部仍置卯簿一扇行令提督主事每五日令各館官生畫卯如有不到者明書於各名之下每月朔望教師引領生徒將所習音字抽試數字畨語演説一遍季終提督官將卯簿封呈本部以憑季考兼論其勤惰歲終備開考語封呈本部以待三年通考其廉汚季考及三年通考之時必合字與音相兼考校凡考滿成化十八年奏準通事序班等官三六九年滿俱禮部考過畨語精熟查訪無過量出考語咨送吏部六年考察京官之日亦從本部查訪備開揭帖徑送考功司嘉靖二十六年奏請通事官生三六九年考滿該鴻臚寺起送到部者查無違礙仍舊取官對考如果畨語精通準令給由若譯語欠熟發回習學候三箇月再考又不稱者徑自黜退為民萬厯四年奏準通事序班官給由或遇公差或發回習學補考或候對考官每遇季終不拘人數多寡禮部查明類考咨送吏部其緣前各項不能盡如俸滿之期者須明注咨內凡出差𢎞治九年奏準通事出差違限半年照例送問雖有公文不與準理違限一年及養病服闋二年之上作缺待其守京俱令守缺不許作協同辦事名色十一年奏準南方海外諸國不必差官送還如果原來通事别有事故畨人奏討不已者禮部奏請定奪嘉靖二十九年題準番僧貢回差通事序班給批定限送至四川巡撫衙門交割止許在省守候批文不許跟同前去三十三年題準暹羅國使臣告稱驛遞艱難差通事序班給批定限送至福建布政司交割三十八年題準尼嚕罕人貢回還差通事序班押送出境十三年題準通事故縱畨人詐害驛遞改行兵部差指揮等官伴送萬厯四年題準兵部差官不諳畨語致各畨沿途生事益甚仍差通事序班押送但有不自檢飭不能鈐束畨譯許所在官司申呈參革凡通事違犯成化十九年題準通事有犯贓私照吏典例𢎞治九年奏準各國戴頭巾通事不許遇例上納糧草及一應經商買賣曠廢職業違者奏問革役嘉靖十七年奏準在館通事序班辦歷勤謹譯語精熟者該寺具奏量加俸秩如有恣肆曠廢唆誘畨人為非受賄作弊抗違該司提督官者俱聽禮部指名參究二十九年題準通事分撥各館之後不許寅緣告改别館違者本部參究三十年題準通事今後有患病至一年給假違限至六箇月托病不考至三次及不赴畫卯至三箇月者官聽本部參革冠帶通事以下聽本部徑自參革萬厯七年議準各館通事員役指稱引領交易替代使用名色科斂貢使財物者禮部悉心體訪責令提督主事不時呈報輕則徑自處治重則具奏論罪禮部志稿卷三十六
