body:
  text: 禮部志稿卷九明俞汝楫編儀制司朝賀國初朝賀等儀多仍前代之舊後乃斟酌繁簡定為中制以頒示天下具見諸司職掌至嘉靖間稍加更定今備列之首儀注次樂章而附沿革事例於後正旦冬至百官朝賀儀洪武二十六年定凡正旦冬至前一日尚寶司陳御座於奉天殿及寶案於御座之東設香案於丹陛之南教坊司設中和韶樂於殿內之東西北向其日清晨錦衣衛陳鹵簿儀仗於丹陛及丹墀之東西設朋扇於殿內東西列車輅步輦於丹墀東西相向鳴鞭四人左右北向教坊司陳大樂於丹陛之東西北向儀禮司設同文玉帛案於丹陛之東金吾衛設護衛官於殿內及丹陛之東西陳甲士於午門外奉天門外及丹墀東西錦衣衛設將軍於奉天門外丹陛丹墀及奉天門列旗幟於奉天門外東西典牧官陳仗馬犀象於文武樓南東西相向欽天監設司晨郎報時位於內道東近北立糾儀御史二人於丹墀北東西相向內贊二人於殿內外贊二人於丹墀北東西相向設傳制宣表等官位於殿內東西相向鼓初嚴文武官具朝服齊班於午門外鼓次嚴引禮引百官繇左右掖門入詣丹墀東西北向立鼓三嚴執事官詣華蓋殿伺候內官跪奏皇帝具衮冕升座鐘聲止儀禮司官跪奏各執事官行禮贊五拜禮畢贊供事執事官各就位儀禮司官跪奏請升殿駕興中和韶樂奏聖安之曲尚寶官捧寶前行導駕官前導扇開簾捲尚寶官置寶於案樂止鳴鞭報時雞唱曉對贊唱排班班齊贊禮唱鞠躬大樂作贊四拜平身樂止典儀唱進表樂作給事中二人詣同文案前導引序班舉案繇東門入置殿中樂止內贊唱宣表目宣表目官跪宣訖俯伏興唱宣表展表官取表宣表官至簾前外贊唱衆官跪宣表訖內外皆唱俯伏興平身序班即舉表案於殿東外贊唱衆官皆跪代致詞官跪於丹陛中致詞云具官臣某等兹遇正旦則云三陽開泰萬物咸新冬至則云律應黃鍾日當長至恭惟皇帝陛下膺乾納祐奉天永昌賀訖外贊唱衆官皆俯伏興樂作四拜興平身樂止傳制官詣御前跪奏傳制俯伏興繇東門靠東出至丹陛之東西向立稱有制贊禮唱跪百官皆跪宣制正旦則云履端之慶冬至則云履長之慶與卿等同之贊禮唱俯伏興平身樂止贊執笏鞠躬三舞蹈贊跪唱山呼百官拱手加額曰萬歲唱山呼曰萬歲唱再山呼曰萬萬歲凡呼萬嵗樂工軍校齊聲應之贊出笏俯伏興大樂作贊四拜平身樂止儀禮司官跪奏禮畢中和樂作奏定安之曲駕興尚寶官捧寶導駕官前導至華蓋殿樂止引禮官引百官以次出洪武三十年更定同文案玉帛案俱繇殿東門舉進安於殿中宣表訖舉同文玉帛案俱安於寶案之內嘉靖十六年更定前一日尚寶司設寶案於奉天殿寶座之東鴻臚寺設表案二於殿東中門外禮部主客司設番國貢方物案八於丹陛中道左右欽天監設定時鼓於文樓之上教坊司設中和韶樂於奉天殿內東西設大樂於奉天門內東西俱北向至期錦衣衛陳鹵簿儀仗於丹陛及丹墀東西設朋扇於殿內東西陳車輅步輦於奉天門丹墀中道北向金吾等衛列甲士軍仗於午門外奉天門外及丹墀東西旗手衛設金鼓於午門外列旗幟於奉天門外御馬監設仗馬錦衣衛設馴象於文武樓南東西相向欽天監設報時位於丹陛之東鼓初嚴百官具朝服齊班於午門外鼓次嚴引班官引百官并進表人員及四夷人等次第繇左右掖門入詣丹墀序立欽天監雞唱官司晨一員於文樓下西向錦衣衛將軍六員於殿內之南北向將軍四員於丹陛四隅東西相向其餘侍衛將軍各分立於殿陛等處如儀鳴鞭四人於丹陛中道左右北向金吾等衛護衛官二十四員於丹陛之南六員於丹墀之北俱東西相向陳設方物鴻臚寺司賓署丞一員徹方物案鴻臚寺序班十六員於丹陛中道左右外贊鴻臚寺鳴贊等官十二員於丹陛及丹墀東西糾儀御史十二員於丹墀之東西殿前侍班錦衣衛千戶六員光祿寺署官四員序班二員傳呼鳴鞭錦衣衛百户四員俱於殿中門外東西相向導表六科都給事中二員序班二員於表案左右掌領侍衛官三員於殿內東西相向錦衣衛正直指揮一員於簾右東向百户二員於簾下左右相向捲簾畢即趨出殿門外各豫立以俟鼓三嚴執事禮部堂上官并內贊鳴贊一員陳設表案并舉案序班五員典儀鴻臚寺司儀署丞一員捧表禮部儀制司官四員展表六部都察院通政司大理寺堂上官二員宣表致詞并傳制等項鴻臚寺堂上官五員捧寶尚寶司官二員導駕六科給事中十員殿內侍班翰林院官四員中書官四員紏儀御史四員序班二員及各遣祭官俱詣華蓋殿外候上具衮冕升座鍾聲止入序立違祭官以次復命訖各趨入丹墀班禮部堂上官跪奏方物并請上位看馬候得旨復位鴻臚寺卿跪奏執事官行禮贊五拜叩頭畢贊各供事鴻臚卿跪請升殿駕興導駕官前導尚寶官捧寶前行中和樂作奏聖安之曲上御奉天殿升座導駕官立於殿內柱下東西相向侍班翰林官立於東導駕官之後中書官立於西導駕官之後紏儀御史序班分立於侍班官之下尚寶官置寶於案分立於導駕官之上樂止鳴鞭報時雞唱訖外贊唱排班班齊鞠躬大樂作四拜興平身樂止內贊贊進表大樂作導表官導表案至殿東中門止序班舉案入置於殿中退立於東西柱下樂止贊宣表目禮部堂上官并宣表目官詣殿中跪宣畢各叩頭退贊宣表展表官取表同宣表官詣殿中跪外贊贊跪衆官皆跪宣畢展表官分東西先退內外皆贊俯伏大樂作興平身樂止宣表官退序班舉案置殿東外贊贊跪衆官皆跪代致詞官跪於丹陛中道致詞云公侯駙馬伯文武百官某官臣某等詞與洪武間所定同賀訖外贊贊俯伏官皆俯伏大樂作四拜興平身樂止傳制官詣御前跪奏傳制俯伏興繇東門靠東出至丹陛之東西向立稱有制外贊贊跪衆官皆跪宣制制與洪武間所定同宣訖外贊贊俯伏大樂作興平身樂止贊搢笏鞠躬三舞蹈贊跪唱山呼百官拱手加額曰萬嵗唱山呼曰萬嵗唱再山呼曰萬萬嵗贊出笏俯伏大樂作四拜興平身樂止鴻臚卿詣御前跪奏禮畢鳴鞭中和樂作奏定安之曲駕興尚寶官捧寶導駕官前導至華蓋殿樂止引班官引百官人等以次出序班徹方物案所司設黃幄於丹陛上陳王府及勳臣總兵官外夷所進馬匹於丹陛內禮部并鴻臚寺官立於丹墀東候上易便服御黃幄甲士行禮畢禮部官詣御道中跪奏御馬過奏畢復位候御馬過詣御道中跪奏馬過畢駕還宫嘉靖四十一年更名奉天殿曰皇極殿門曰皇極門華蓋殿曰中極殿後具儀俱用新名舊制冬至日即行賀禮嘉靖九年分祀二郊以冬至大報是日行慶成禮次日行冬至朝賀禮畢舉慶成宴本年再定次日上詣內殿行節祭禮又詣母后前行賀禮畢始御奉天殿受百官賀冬至大祀慶成儀嘉靖七年定上大祀禮成駕還百官具朝服於承天門外橋南立迎駕隨至奉天殿丹墀內侍立執事官先至華蓋殿前東西拱立候上御華蓋殿具衮冕服升座鴻臚寺堂上官跪奏執事官行禮鳴贊贊入班鞠躬五拜叩頭興平身各供事鴻臚寺堂上官跪奏請升殿教坊司樂作上御奉天殿升座樂止錦衣衛官傳鳴鞭鴻臚寺堂上官傳排班鳴贊贊排班班齊鞠躬四拜興平身贊跪鴻臚寺堂上官於丹陛中道跪致詞曰公侯駙馬伯文武百官某官臣某等恭惟圜丘大報載成禮當慶賀致詞畢繇殿東門入殿內侍立鳴贊贊俯伏興鞠躬樂作四拜興平身樂止鴻臚寺堂上官於殿內跪奏禮畢傳贊禮畢錦衣衛官傳鳴鞭上還宫百官退萬壽聖節百官朝賀儀洪武二十六年定儀與正旦冬至同但致詞云恭惟皇帝陛下萬壽令節至三十年改令節為聖節臣某等誠歡誠忭敬祝萬萬嵗壽嘉靖年定儀亦與正旦冬至同但鴻臚寺加設玉帛案二於殿內簾前致詞詞與洪武年間所定同朝賀樂洪武間定以後樂俱同殿內中和韶樂樂器麾一簫十二笙十二排簫四橫笛十二塤四箎四琴十瑟四編鍾二編磬二應鼓二柷一敔一搏拊一樂章升殿奏聖安之曲乾坤日月明八方四海慶太平龍樓鳳閣中扇開簾捲帝王興聖感天地靈保萬壽洪福增祥光王氣生升寶座永康寧公卿入門奏治安之曲後不用忠良為股肱昊天之德承主恩森羅拱北辰御爐香繞奉天門江山社稷興安天下軍與民龍虎會風雲賀萬壽聖明君丹陛大樂樂器麾一戲竹二簫十二笙十二笛十二頭管十二􅌙八琵琶八二十絃八方響二鼓二拍板八杖鼓十二樂章百官行禮奏萬嵗樂朝天子之曲雨順風調升平世萬萬年山河社稷八方四靣干戈息慶龍虎風雲會右萬嵗樂聖德聖威洪福齊天地御階前文武兩班齊擺列在丹墀內舞蹈揚塵山呼萬嵗統山河壯帝畿禮儀讃稽慶龍虎風雲會右朝天子還宫奏定安之曲九五飛聖龍千邦萬國敬依從鳴鞭三下同公卿環珮響玎掌扇護御容中和樂音呂濃翡翠錦繡擁還華蓋赴龍宫歷朝事例洪武元年令正旦冬至及壽日各衙門不許於寺觀行香其萬嵗牌不許復設二十二年令凡遇大朝賀除已習儀及具服官員許入班其餘便服人員止於午門外行禮執事官於華蓋殿行禮排甲帶刀侍衛之人免拜五府六部等官於殿內侍立今皆入班奏事止於華蓋殿永樂六年令帝王生日先於宗廟具禮致祭然後序家人禮百官慶賀禮畢筵宴嘉靖七年奏準凡遇萬壽聖節正旦冬至大朝賀先令承天門端門及左右闕門守門內外官員嚴禁雜人行走鼓初嚴執事官并侍衛官軍先入次皇親公侯駙馬伯次在京文武品官次來朝品官次內外雜職次生儒次外國四夷人至奉天殿下文武百官依品級序立毋得攙越亂班禮畢外國四夷先出次生儒次雜職次文武品官次侍衛官軍及儀從人等俱盡象馬方行其金水橋東西角門各添設序班凡有攙越者御史序班糾舉拏奏若有市井姦人假借儒吏衣巾冒入殿庭錦衣衛官校緝拏又令凡正旦冬至聖節百官俱於先期之三日及二日習儀正旦冬至於朝天宫聖節於靈濟宫九年更定郊祀冬至習儀於先期之七日及六日二十一年令聖節正旦冬至俱赴朝天宫習儀凡正旦節自十二月二十八日起至正月二十日止百官俱吉服通政司不奏事冬至前三日後三日聖節前三日後三日俱吉服通政司亦不奏事凡朝賀班首致詞官例用勳臣有缺則禮部題請欽定凡進賀表目親王各一通各處挂印總兵官各一通朝鮮國王一通南京禮部等衙門一通浙江等布政司按察司直𨽻府州等衙門各一通南京中軍等都督府一通中都留守司浙江等都司直𨽻衛所等衙門各一通凡大朝賀先期禮部移文各衙門取具執事等官職名并陳設儀衛等項數目榜揭習儀處所以便供事隆慶二年題準丹墀糾儀序班添二員萬厯七年諭衍聖公以萬壽入賀朝廷待以賔禮不在文武職官之列不必朝參九年題準衍聖公及顔曾孟三氏子孫只許三年一次入賀於朝覲年行中宫正旦冬至命婦朝賀儀洪武二十六年定凡正旦冬至前期一日女官陳設御座於宫中設香案於丹墀之南其日內官陳設儀仗於丹陛之東西及丹墀東西女官擎執者立於御座之左右陳女樂於丹陛東西北向設箋案於殿東門外設班首拜位於中道之東西設命婦拜位於丹墀北向設司贊位於丹墀東西設司賔位於北東西相向設內贊二人位於殿內東西命婦至宫門外司賓引命婦入就拜位女官具服侍班如常儀尚宫尚儀等官詣內奉迎尚儀奏請升座皇后具服出導從如常儀樂作升座樂止司贊唱班齊樂作贊四拜樂止內贊唱進箋引箋案女官前導舉箋案女官二人舉案繇殿東門入樂作至殿中樂止贊衆命婦跪內