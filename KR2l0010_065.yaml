body:
  text: 禮部志稿卷六十五明俞汝楫編頒令備考𫝊制𫝊制儀凡大祀前三日陳設如常儀文武官各具朝服詣丹墀拜位鐘聲止儀禮司跪奏請陞殿樂作皇帝御華葢殿具皮弁服出陞座樂止鳴鞭訖贊四拜𫝊制官詣御前跪𫝊制由東門出至𫝊制位稱有制贊跪宣制云洪武某年正月某日大祀天地於南郊爾文武百官自某日為始致齋三日當敬慎之𫝊訖贊俯伏興樂作又四拜平身樂止奏禮畢凡遣官祭祀前一日陳設如常儀次日各官具服於丹墀北向立皇帝御華葢殿具皮弁服鐘聲止執事官行一拜三叩頭禮訖儀禮司跪奏請陞殿樂作陞座樂止捲簾鳴鞭訖唱排班班齊百官一拜叩頭畢分東西立引禮引獻官詣拜位贊四拜平身𫝊制官詣御前跪奏𫝊制俯伏興由東門靠東出至丹陛東西向立稱有制唱跪宣制祭孔子則曰某年月日祭先師孔子大成至聖文宣王祭帝王則曰先聖歴代帝王命卿行禮贊俯伏興樂作四拜樂止禮畢凡𫝊制遣官代祀歴代帝王并旗纛孔子等廟前一日沐浴更衣處於齋宫次日還宫洪武二十九年凡𫝊制遣使持節俱由東階左行𫝊制樂與朝賀同樂章典祀之曲氤氲滿殿香八音絲竹弄笙簧金石音韻彰匏土革木度鏗鏘髙捧降明香吾皇誠念詣神方不佞禍淫福善理之常頒詔頒詔諸蕃皇帝服通天冠絳紗袍出御奉天殿樂作陞座禮部官捧詔書於寶案前用寶中書省官禮部官同捧至御前呈奏以黄金袱裹置盤中置於案引禮導使者就丹墀拜位典儀贊拜樂作使者四拜興樂止承制官由中門出至丹陛上曰有制使者跪承制官宣制曰皇帝勅使爾某奉詔往諭某國爾宜恭承朕命宣制訖使者俯伏興樂作四拜樂止禮部官詣案捧詔降自中陛以授使者大樂振作使者捧詔至午門外置龍亭中侍儀奏禮畢皇帝還宫各司正官一員送詔書出國門外其賜蕃國印綬則曰皇帝勅使爾某國王印爾其恭承朕命如有賜物則併宣之湔除頒行湔除詔每年十二月二十五日欽奉勅書一道湔除在京及南京見在任文武羣臣除贓罪外自本年十二月日以前所犯罪名紀錄在官者悉與湔除除謄黄通行外将原奉勅書次日面繳如遇免朝止将勅書随本繳進本日黎明本部堂上官并儀制司官會同三法司官俱到左順門候司禮監官到各官行一拜三叩頭禮跪翰林官以勅立授禮部官各官復叩頭禮畢禮部官以勅付儀制司郎中前行各官随後由午門左門出俱到本部設香案於露臺上各官望闕行一拜三叩頭禮至川堂開勅謄黄頒行各衙門勅湔除成化元年勅禮部三法司曰新正在邇萬物咸亨在京文武羣臣除贓罪外自天順八年十二月二十五日以前所犯罪名紀錄在官者悉與湔除俾圖自新仍命有司行文於天下諸司纂修備考纂修官例修實錄官太祖實錄永樂初命曹國公李景隆監修户部尚書夏原吉學士解縉禮部尚書李至剛總裁再命原吉及太子少師姚廣孝監修學士胡廣楊榮總裁太宗仁宗實録英國公張輔少師蹇義少保夏原吉監修少傅楊士奇太子少傅楊榮太子少保金幼孜總裁太常卿楊溥為副總裁大學士陳山張瑛續總裁宣宗實錄英國公張輔監修少傅楊士竒楊榮尚書楊溥總裁少詹事王直王英為副總裁英宗實錄會昌侯孫繼宗監修少保李賢尚書陳文彭時總裁少卿劉定之吳節為副總裁憲宗實錄英國公張懋監修少傅劉吉尚書徐溥侍郎劉健總裁尚書邱濬少詹事汪諧為副總裁孝宗實錄初命少師劉健李東陽少傅謝遷總裁吏部侍郎張元禎詹事楊廷和學士劉忠為副再命東陽少傅焦芳王鏊少保楊廷和總裁尚書梁儲為副而監修則仍公懋武宗實錄則定國公徐光祚監修少師楊廷和少傅蒋冕毛紀少保費宏總裁後廷和冕紀皆去申命宏及少師楊一清少保石珤賈詠而尚書毛澄侍郎羅欽順為副後增侍郎吳一鵬獻皇帝實錄定國公徐光祚尚書席書監修少師費宏楊一清太保石珤尚書賈詠總裁嘉靖實錄官隆慶元年勅諭太師兼太子太師成國公等曰兹者恭修皇考世宗肅皇帝實錄已勅禮部采取事績命爾希忠為監修官大學士階春芳朴以勤居正為總裁官禮部尚書兼翰林院學士髙儀為副總裁左春坊左諭徳兼翰林院侍讀姜金和等為纂修官於元年六月初一日開館朕惟我皇考臨御天下四十有五年功徳巍巍如天之大固未易以名言然其政令賞罰之施制作文章之盛言為典謨動成規範其事布之天下其文具在有司可得而稱述兹命爾等稽古義例纂緝成編以佑後人貽萬世其一時吏職之稱否臣下之媺惡亦得附見以垂鍳戒爾等宜悉心綜理夙夜勤事毋忽以致遺毋誇以失實毋偏以廢公毋怠以玩歳殫乃心力用昭一代之令典以覲揚我皇考之耿光稱朕意焉欽哉隆慶實錄官萬厯元年勅諭太師兼太子太師成國公等曰朕惟帝王繼世而興纘承大業莫不有功徳之實敷布天下亦莫不有紀載之書垂示於後世典謨𫝊紀班班可考祖宗列聖代有實錄藏之天府洪惟我皇考穆宗莊皇帝淵毅夙成寛仁内植動符天心徳洽民心北狄南夷欵關獻馘外寧内戢遠至邇安雖臨御僅六載而功烈邁軼百王非有紀述不足以彰盛美而播休光爾禮部其遵祖宗故事通行諸司采輯事實送翰林院纂修實錄其以太師兼太子太師成國公朱希忠為監修少師兼太子太師吏部尚書建極殿大學士張居正太子少保禮部尚書兼武英殿大學士吕調陽為總裁禮部尚書兼翰林院學士陸樹聲吏部右侍郎兼翰林院侍讀學士諸大綬禮部左侍郎兼翰林院侍讀學士王希烈詹事府掌府事禮部左侍郎兼翰林院侍讀學士馬自強禮部右侍郎兼翰林院侍讀學士陶大臨太常寺卿兼翰林院侍讀學士掌院事丁士美左春坊左諭德兼翰林院侍讀申時行右春坊右諭徳兼翰林院侍讀王錫爵為副總裁右春坊右諭徳兼翰林院侍讀余有丁等為纂修官一應合行事宜悉照例舉行欽哉故諭謹按永樂中詔重修髙廟實錄布衣陳濟與學士解縉等為總裁而禮部尚書李至剛及講讀以下僅為纂修官又按國朝修實錄例以内閣大臣總裁而元勲上公一人監修獨髙廟實錄初以曹國公李景隆監修户部尚書夏原吉副之後睿宗實錄復用禮部尚書席公書吏部尚書廖公紀葢特典也又按勲臣三世各再監修國史者英國公張輔子懋曾孫溶文臣再監修國史者夏原吉再總裁國史者三楊劉健張居正纂修事例遣官詣郡縣求志永樂十六年六月乙酉詔纂修天下郡縣志書命行在户部尚書夏原吉翰林院學士兼右春坊右庶子楊榮翰林院學士兼右春坊右諭徳金幼孜總之仍命禮部遣官徧詣郡縣博採事蹟及舊志書慎重修牒正徳元年大學士劉健等言玉牒所以紀載宗支乃朝廷重事也今又及十年續修之期乞勅宗人府禮部查照所收文案明白送院續修但宗支日繁所司開送名爵諡號嫡庶行次婚配生卒年月類多闕漏不詳或相牴牾雖參互考訂終恐不得其真謂宜定著其式移文各王府長史司子女己未請名受封婚嫁薨故之類如式造冊奏繳務令考據詳審謄冩真正如有茍簡錯誤及視常怠玩者所司參究庶幾無誤修葺從之更定進玉牒儀正徳元年故事進王牒於文華殿行禮如常儀太常寺少卿兼侍讀學士楊時暢以為玉牒所載甚重宜於奉天殿進呈庶盡尊祖敬宗之義上命内閣大學士劉健等與禮部議從其言乃更定儀註行之玉牒事宜圖説嘉靖二十四年九月初一日内閣題玉牒事宜禮部尚書嚴嵩等為照玉牒紀載宗支以垂萬世係朝廷重事其制不敢不倍加詳慎其舊牒内有事當釐改者理合開具上請臣等看得第一冊内例有總圖備載天潢世系於首所以表帝王之統合同氣之親也切因世代未遠人數未多有紙一面列書代氏而以硃線各係所出之子孫於下但近年以來宗派蕃衍已倍於前其數不下累萬兹仍用前制不惟紙狹不足備載而字跡微眇硃線紛亂難以尋檢不無遺漏混淆之弊况將來天支萬代愈難增續臣等竊意略倣古史世表之法以横格分代數而列書其名氏於上其各派所出子孫則從而逓書於各派之下庶世次不紊一覽可見仍餘下方以俟後來增入臣等又思得玉牒之脩當以帝系爲宗統其中雖有係長出但不有天命位在藩封如懿文太子秦晉二王不敢以加於成祖之前又有雖係長出但既殤而追受封號如悼恭太子岳懐王哀沖太子雖當以冊内載之不敢列於圖之前俱所以尊帝統也其無所妨如頴傷等王則仍書之又夀春王熙祖之長子仁祖之兄也南昌諸王仁祖之長子太祖之兄也俱在太祖有天下之後追封為王今靖江王則南昌王之後也以太祖之聖子神孫視之則有堂從之分舊圖以列於帝系之前今移置本支之後亦所以尊帝統也以上諸事皆因舊圖而少加釐改謹著為帝王世系總表一冊上進奉御批卑不可先尊亡不可先存着照今擬用令提學官採輯隆慶元年禮部奏纂修世宗實錄事蹟令各省提學官採輯編彚賫送史館免差官採訪從之纂修恩例定實錄賞格永樂元年上以太祖皇帝實錄将成命禮部預定賞格尚書李至剛以修元史賞例進上覽之曰此述前代興亡之跡今朕紀皇考神功聖徳貽範萬世豈可比而同之爾擬議非倫矣遂親定監修官銀百兩綵幣六表裏織金紗衣一襲鞍馬一副纂修官各銀五十兩綵幣四表裏紗衣一襲催纂兼謄寫官銀三十兩綵幣二表裏紗衣一襲催纂官銀二十五兩綵幣二表裏紗衣一襲謄寫監生生員儒士各銀十兩鈔三十錠綵幣一表裏謄寫吏各銀八兩鈔三十錠綵幣一表裏催督謄寫者鈔二十錠絹二疋辦事吏各鈔二十錠絹一疋謹按錄成監修官總裁官以下與纂修官例有白金綵幣或羅衣鞍馬之賜此外有催纂官謄寫官催督官收掌文籍官賞賚有差在局謄寫監生生員儒士謄寫吏典辦事吏典各色人匠皆及之又按錄成之後例有遷官其監修總裁加秩則始自正統五年前固無之又纂修官事故去任及監生事故去久近不一陞擢賞賚有差議事備考會議覆奏會議事理𢎞治二年刑科給事中胡金言我祖宗成憲或會舉官員或會問刑獄或會議政事此固良法美意然而所會舉之人所會問之刑容有未能悉當者姑以會議一事言之陛下即位以來用賢納善出於天性故凢内外臣工交章累疏莫不欲罄一得之愚圖報萬一言雖未當亦䝉優納中間或有勅多官會議者然章下該部必緩至數旬積至數章累至數事然後報於該議者至臨議之際誦者不過槩論大畧聽者或不能周知其詳疏條浩繁坐起疲倦類多遷就莫可致詰或云此見行條例或云此泛言難准甚至以人微而棄其言以勢重而附其説謂之會議而乃至於如此豈不有孤陛下采納之盛心哉乞勅該部此後凢會議章疏須預令會議衙門俱得遍閲事由無拘章疏多寡俱在五日内會議從容論辨各盡所長何者為可行何者為未當不以人廢言不以言徇勢庶所采者公論而所行者良法下禮部覆奏以為會議舊有成規有半年一議者有半月一議者亦有五日内即議者大要酌事勢緩急而為次第也有會一二衙門議者有兼會公侯伯都督并翰林院詹事府國子監十三道御史議者亦因事勢輕重而欲各伸所見也况今天下之廣建言者無日無之而諸司政務日不暇給若不拘章疏多寡事理巨細俱於五日内議得無講説太煩有妨政務乎上曰今後有要務關民情者半月内議之若利弊諸事果應急議者限五日議聞會議先𫝊告節畧正徳六年八月監察御史江萬實言朝廷凢大事必令會官議擬正欲合衆論之公以求事理之當然非素有一定之見豈能決擇於立談之間况竊聽於旁者每如堵墻機宻重務不免𫝊泄自今凡有會議先具揭帖送與議者至期乃議若事急者本日将議之先亦宜𫝊告節畧仍禁諸人不得竊聼庶盡羣見而機事亦宻禮部議從之會議建言凡天下官吏軍民人等建言民情每嵗本部議定可否俱赴御前奏過其間可行者移咨該衙門施行若泛言不切立案不行至於天下巡撫官各陳地方利弊則從各部會議具奏定奪凡朝廷有大事當會議者該部奏請各部都察院通政司大理寺堂上官或掌科掌道官若合會武臣則五府管事官皆預合會儒臣則翰林院詹事春坊司經局及國子監皆預嘉靖三十一年十一月内該本部題為申明會議建言事查得大明會典内一欵凡天下官吏軍民人等建言民情每嵗本部會官議定可否俱赴御前奏過其間可行者移咨該衙門施行若泛言不切立案不行又一𣢾洪武二十四年令在京衙門奉㫖為格為例及重事須會多官計議然後施行又一欵景泰四年令建言者該衙門詳細參看果有利國利民可行則行有假以言事報復讐怨者具奏治罪欽此參詳例意前後互𤼵凡事體重大及應該議擬裁斷著為格例施行者然後多官集議凡建言民情亦須各衙門參詳應該會議之事然後本部會官定議非不論小事一該會議及未經各衙門詳看而輒會議也近來各處建言有稱撫按見行要得久遠遵守者則不待議有須行撫按勘報及知的確者則不能遽議有累經題奏欽依著之令甲難以變更者則不當復議若槩行會議似涉泛濫與先後例意不合又照洪武年間有直陳得失無事繁文之式永樂年間有驀越合干上司徑赴朝廷干冒之禁合無今後凡有建言民情本部即行各該衙門參詳撫按查勘不能遽議者徑行勘覈累經題著令格不當更改或中間稍有損益者徑自題覆違式違禁挾讐報怨者径參治罪其事體重大應該議擬裁為格例而一向未經題定或雖曾題定而時異勢殊應得更革者然後囘報本部年終會議取自上裁其各該衙門參詳過径行径題徑參等項事件亦随報本部年終具節畧開坐題知庶㡬會議不濫事體可久等因奉聖旨是欽此會議應與官正綂十年五月禮部言天下諸司官吏軍民建言例會廷臣議行竊見宣徳中尚書蹇義夏原吉已解職務特詔與議正統初學士楊士竒楊榮楊溥輪畨會議今士竒榮已故惟溥尚在請學士陳循曺鼐馬愉參之上以溥老禮宜優間令循等與議建言禁建言假公營私永樂元年癸丑禮部尚書李至剛上言以為論道經邦必求賢才興利除害必開言路昔太祖髙皇帝勵精圖治聽納無遺三十年間化行俗美皇上即位以來悉遵成憲廣開言路博采羣謀凡有可行無不聽納然無知小人往往假此為名或搜求細事拑制諸司或懐挟私讐陷害良善或妄稱奏疏躱避差徭或馳騁小才希求進用甚者無稽泛言煩瀆聖聴雖稱興利除害其實假公營私誠宜榜示天下果有益國便民之事雖百工技藝之人皆許具實陳奏若官吏人等貪汚顛倒曲直酷虐良善及婚姻田土軍民役等事必令自下而上陳告若有假以實封建言驀越上司径赴朝廷干冒者治以重罪上可之寛宥建言得罪正統元年直𨽻六安州英山縣知縣賀完言書曰嘉言罔攸伏萬邦咸寧切見各處官吏人等先有上書陳言者本為開張治道及軍民利病一時詞語鯁直犯冒天威遷降遠方及發充軍為民以此人多畏罪保祿不肯進言乞取囘量才擢用或仍復舊職庶使下情得以上達上命行在禮部議行參詳建言嘉靖三十三年禮部覆通政司議自今凡建言民情本部即行各衙門參詳撫按見行小民稱便者径行查照遵守應該撫按查勘不能遽議者径行勘覈累經題著令格不當更改或中間稍有損益者径自題覆違式違禁挾仇報怨者径參治罪其事體重大應該議擬裁為格例而一向未經題定而時異勢殊應議更革者囘報本部嵗終會議取自上裁其径行径覆径參者亦報部嵗終開具節畧奏聞報可旌表備考旌表總例旌表節孝諸司職掌本部據各處申來孝子順孫義夫節婦理當旌表之人直𨽻府州咨都察院差委監察御史覈實各布政司所屬從按察司覈實着落州府縣官同里甲親隣保勘相同然後明白奏聞旌表大明令凡民間寡婦三十以前夫亡守志五十以後不改節者旌表門閭除免本家差役大明會典洪武間詔申明孝道凡割股或致傷生卧氷或致凍死自古不稱為孝若為旌表恐其倣效通行禁約不許旌表嘉靖二年奏准今後天下文武衙門凡文職除進士舉人係貢舉賢能已經竪坊表宅及婦人已受勅詔封為命婦者仍照前例不准旌表外其餘生員吏典一應人等中間孝子順孫義夫節婦志行卓異足以激勵風化表正鄉閭者官司仍具實跡以聞一體旌表又奏准今後節婦但係風憲官覈實本部雖有病故者亦奏准類奏旌表嘉靖四年二月内禮部題為旌表事查得節年卷内凡節婦該有司具奏到部行勘覈實案候類奏旌表間有覈實到部者或病故不與旌表緣查節婦必須年三十以下守節至五十以上者志行已定方許有司具奏但中間行勘竝風憲官覈實往返經年加之官吏里胥刁蹬又不可以嵗月計也所以一經行勘之後囘文未及到部遂致抱節而死者容或有之此其平生志行堅定不獲表彰良可矜恤况奉明詔訪求特加旌表無非激勸風俗之盛典也合無今後節婦但係風憲官覈實到部者雖已病故應同見在亦准類奏旌表等因題奉欽依准議行欽此除欽遵外伏覩嘉靖三年四月十九日貞烈詔書内一欵孝子順孫義夫節婦有司開具實跡奏聞以憑旌表不許里書人等掯勒刁難致令無由上達若守節年久果有貞烈實跡例該旌表而身故者一體奏聞舉行欽此欽遵今照各處有司援此将遠年已故孝子節婦一槩具奏乞要旌表今若不拘久近則自洪武永樂年間已故孝子節婦皆來奏擾有礙舊例相應再為酌處覆奉欽依今後除正徳十六年以前身故者為舊例所拘仍舊不准旌表其嘉靖元年以後民間果有孝子順孫義夫節婦未經有司具奏病故者遵照詔書内事理許其一體奏聞舉行照例旌表嘉靖十年十月内禮部題為旌表節孝事查得本部節年稿簿内開凡民間孝子順孫義夫節婦等項見行事例先據有司具奏到部仍行有司覆勘囘文至日復行彼處風憲衙門覈實取具結狀到部案候類奏旌表中間多有六七十嵗以上年已衰邁而文移勘覆動經數年寵光未沐已先朝露葢有抱節操行終身不獲表異之榮者臣等看得旌表節孝事例實為朝廷激勵風俗之盛典所以必行再三覆勘者恐有偽為無非欲考其實耳然至於文移輾轉動淹嵗月吏緣為奸恩不下究亦不可不為之所也覆奉欽依今後凡民間孝子順孫義夫節婦等項但係有司勘實具奏者免其覆勘徑行風憲官覈實若風憲官覈實具奏者免其再覈候每季終類奏旌表一次凡節婦等項必係撫按衙門保奏方與覆題旌表其司府州縣衛所舉奏者俱咨都察院行彼處撫按衙門覈勘取結囘部方與類題其已經奏過應該旌表者付精膳司類給勘合行各該原籍官司照例給與無碍官銀三十兩令本家自行起葢牌坊除已故不優免外見在者仍照例優免二丁侍養身終之日子孫仍舊當差類表節孝正徳八年二月山東巡按御史張璿奏山東賊所過州縣有子救父婦衛夫而死者凡百有十九人宜皆旌表禮部議以人多費廣宜準山西例於所在旌善亭側立石牌二各聯書姓名籍貫併疏其孝義貞烈大畧於下仍官給殯殮費他凡被賊處有奏至者皆如例行詔下所司類表貞烈正徳十年二月旌表定遠居民方淳妻丁氏等俱不受賊汚而死有司具實以聞禮部議定遠兵燹之餘公私匱竭立坊於門恐人衆不能遍及宜如近例刻石於旌善亭以彰貞烈人給銀三兩以助殮塟詔可旌孝定旌表孝行例洪武二十七年青州府日照縣民江伯兒以母病割脇肉食之不愈乃禱於岱嶽祠誓云母病愈則殺子以祀神既而母病愈竟殺其三嵗子以祭有司以聞上怒曰父子天倫至重禮父為長子三年服今百姓無知賊殺其子絶滅倫理宜亟捕治之勿使傷壊風化遂逮伯兒杖一百謫戍海南因命禮部定議旌表孝行事例行於天下禮部議曰人子之事其親居則致其敬養則致其樂有疾則託之良醫投之以善藥至於呼天告神斯又懇切之至此為人子所當然也卧氷割股前古無聞雖出後世亦是間見至若割肝殘害尤甚且如父母止有一子割肝刲股或至喪生卧氷或至凍死使父母無依宗祀永絶反為不孝之大者原其所自皆愚昧之徒務為詭異以驚世駭俗希求旌表以規避徭役割股不已至於割肝割肝不已至於殺子違道傷生莫此為甚自今人子遇父母有疾醫治弗愈無所控訴不得已而割股卧氷亦聴其所為但不在旌表之例詔從之宣徳元年六月旌表孝子權謹等孝行上諭行在禮部尚書胡濙曰孝者人道當然賢智之人不待勸勉中人以下須激勵乃能為善旌表之意正如此若權謹則朕所知謹質實人也宜旌之使人人見而思奮其於治道豈不有益例外旌奨嘉靖三十年二月該巡撫宣府右僉都御史劉闕直隸巡按御史胡宗憲各題稱開平衛軍人萬國正因母董氏病危割肝救療母愈身亡乞要旌表本部查有會典不許旌表前例難以題請移咨都察院轉行該管衙門径自以禮表異優恤例外不准旌表宣徳元年五月行在禮部奏錦衣衛總旗衡整女母病篤刲肝煮液飲之而痊宜旌表上曰為孝有道孔子曰身體髮膚受之父母不敢毁傷剖腹刲肝此豈是孝若致殺身其罪尤大况太祖皇帝已有禁令今若旌表使愚人效之豈不大壊風俗女子無知不必加罪所奏不允旌節守節未旌而沒𢎞治十六年十一月掌國子監事禮部右侍郎謝鐸奏臣祖母趙氏守節四十餘年未䝉旌表而殁請以本身應得誥命移為旌表之恩禮部覆奏上曰趙氏准與旌表鐸應得誥命仍給之貞節已故追旌𢎞治十七年旌表直隸太倉州民顧鉞妻俞氏貞節舊制節婦已故者不與旌表之列中書舍人顧守元奏臣父鉞棄背時母俞氏年僅二十四嵗遺腹有臣甫及三月臣既生復嬰險疾每見臣疾勢危迫輒欲自縊保䕶成立又教誨之臣竊科第以有今日皆母氏力也有司舉臣母守節艱苦之狀禮部行勘得實例當旌表類奏之際臣母不幸卒於官邸禮部拘例不為覆奏使臣母一生苦節冺滅無聞實為可憫伏乞一體旌表則臣母雖死猶生而臣之志願亦永畢矣禮部覆奏許之姑婦同旌成化二十一年十二月福建武平縣奏本縣民王宗安妻鍾一娘夫亡守節年已八十有九其子英妻鍾妙賢亦守節三十八年禮部奏一娘已老恐以例覆勘而先婦死終不能沾恩乞先旌之妙賢則仍待覈實上以姑婦一節可嘉命俱旌之不必覆勘表四節之門成化二十三年二月桐城縣陶氏有婦三世四人夫亡皆守節無二志有司以事聞上曰朝廷旌表節義所以激勵風俗然通都大邑有司僅舉一二雖所遺者多而亦可見全節之難也今陶氏一家之内三世四婦相繼守節葢有所視法而然誠天下所罕有者其即旌表為四節之門不必如例覆勘旌未嫁節宣徳元年九月監察御史尹崇髙奏諸暨縣孟氏女藴許嫁縣學生員蒋文朂未嫁文朂充貢入監為御史病卒藴年纔二十號哭歸蒋氏執喪三年甘守苦節年已六十乞旌表其門上謂行在禮部臣曰夫死婦守節世恒有之此女但許嫁能執婦禮守志不二可謂貞女人所難能者宜旌表以勵風化例外旌奨嘉靖二十九年十二月該浙江東陽縣知縣鄭綺奏稱本縣民人趙惟機妻郭氏事姑至孝乞要旌表本部查無旌表孝婦事例移咨都察院轉行巡按衙門許有司量行旌表以勵風化命婦表貞烈例隆慶二年旌表山西石州生員喬芝母蘇氏及其女車同軌妻喬氏為貞烈之門蘇氏者副使喬應光妻也隆慶元年九月十三日北兵攻陷州城蘇氏義不受辱攜其女喬氏入井其同居王氏等十人亦相繼赴井死事聞禮部言蘇氏雖業已受封而貞烈異常又能率居民等同時殉節宜一體旌表詔從之禮教備考鄉飲酒禮申明鄕飲酒禁𢎞治元年國子監生張裕言天下有司行鄉飲酒禮齒徳不稱者或濫與賔席有齒徳者或終身不與况酒食太豐非敦本化俗之意乞命所司禁止禮部會議宜申明禁約上如議舉行鄉飲酒洪武五年詔天下舉行鄉飲酒禮上以海内宴安思化民俗以復於古乃詔有司舉行鄉飲於是禮部奏取儀禮及唐宋之制又采周官屬讀法之旨參定其儀在内應天府及直隸府州縣每嵗孟春正月孟冬十月有司與學官率士大夫之老者行之於學校在外行省所屬府州縣亦皆取法於京師其民間里社以百家為一會粮長或里長主之百人内以年最長者為正賔餘以齒序坐毎季行之於里中大率皆本於正齒位之説而賔興賢能春秋習射亦可通行焉所用酒肴母至奢靡若讀律令則以刑部所編申明戒諭書兼讀之其武職衙門在内各衛親軍指揮使司及指揮使司凡鎮守軍官每月朔日亦以大都督府所編戒諭書率僚佐讀之如此則衆皆知所儆而不犯法矣制曰可附考邱濬曰按先儒謂鄉飲有四一則三年賔興賢能二則鄉大夫飲國中賢者三則州長習射四則黨正蜡祭黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位今世所行惟存一鄉大夫飲國中賢者耳又按鄉飲之名始於成周漢唐以來亦間行之然無定制我太祖御製大誥有云鄉飲酒禮叙長幼論賢良别姦頑異罪人其坐席間年髙有徳者居於上年髙淳篤者並之以次序齒而列其有曾違條犯法者列於外坐不許干于善良之席主者若不分别致使貴賤混淆察知或坐中人發覺主者坐以違制奸頑不繇其主紊亂正席全家移出化外大哉王言其垂世警俗之意深矣謹按秦漢而下行此禮者一見於東平永平之郡學再見於晉武太和之辟雍三見於唐貞觀之鄉校習射申明生員習射正統二年江西樂安縣教諭鄭顒奏舊制生員學書習射皆有成規葢欲文事武備不可偏廢近年以來専習文辭不嫻書射有負作養上命行在禮部申明舊制行之徳政備考恤養給育孳生永樂元年禮部言鄱陽縣民張公受妻徐氏一産三男宜循舊制賜鈔十錠米五石其所産子令兩家無子者代育每家月給米五斗事故罷給從之禮部又言直隸上海縣許安孫妻沈氏一産三男命循例優給京城恤養成化二年十二月禮部尚書姚䕫等言今京城街市多有疲癃殘疾之人扶老攜幼呻吟悲號非徒足以干天地之和而四夷朝使見之亦将為其所議乞勅五城御史拘審其有家者責令收管無家者收養上曰無問老小男女有家無家及外來者順天府盡數收入養濟院記名養贍無令失所恤療惠民藥局永樂四年十二月上與侍臣語知京師之人多有疾不能醫藥者歎曰内貯藥材廣而不能濟人於闕門之外徒貯何為命太醫院如方製藥或為湯液或丸或膏随病所宜用於京城内外散施仍訪朝臣中有通於醫者俾分任其事又曰朕一衣一食不忘下人之艱猶於咫尺不能有濟何况遠外遂命禮部申明恵民藥局之令必有實局勿徒為文具而已振刷恵民藥局嘉靖二十一年禮部左侍郎孫承恩上言邇者盛夏炎鬱散為疾厲都城内外之民僵仆相繼臣考之周禮醫師之屬有疾醫以掌萬民之疾病凡以惠元元重民命也乞命太醫院及順天府恵民藥局依按方術預備藥餌於都門居民輻輳之處招諭散給庶阽危貧困之人得以有濟雖有厲氣不為灾矣上曰頃聞疫氣流行民多札瘥朕甚憫焉其令太醫院差官順天府措置藥物設法給恵上親撿方書製為濟疫小飲子方頒下所司遵用濟民仍命禮部刊行推廣給藥上遣官施藥於朝天宫畢諭禮部曰朕祗承𤣥祐仰體生徳命官施藥濟民昨侍郎孫承恩等奏邊方軍民亦宜拯濟况今疲於征伐之後豈免疾灾兹一體施濟即遣錦衣衛千户同道錄司官一員齎赴宣大山西等處會同撫按官立法給散俾務均霑𤣥恵以廣同仁之義遣官施藥治療嘉靖三十八年上諭禮部近因春冷人多生疾令太醫院依方修藥随病治療差官同錦衣衛官於九門分布給散立夏日止掩骼瘞流骸宣徳元年五月陜西淳化縣丞吳整言自京師通州至河南兩岸多漂流骸骨乞官為瘞之上諭行在禮部尚書吕震曰文王仁及枯骨丞所言當從之其即施行勿緩建言給山地為義塚正統十三年浙江左布政使孫原貞言杭州嘉興等府在城軍民多無祖塋凡有物故悉從火化棄骨水中非其故違法律良由山地各有業主故雖孝子慈孫亦莫能盡其安𦵏之心考之前代有漏澤園義塚之設乞勅該部會議行文各府縣查勘官民山地置立義塚繚以垣墻令彼悉得安厝免致暴棄事下禮部議之閹禁逮杖自宫成化十年十一月辛未有自宫者三百一十四人先已奉旨謫戍皆逃至京師復希進用禮部以聞上曰錦衣衛其逮至重杖而訊之今後似此輩者所司無得擅收具奏仍嚴加禁約錦衣衛官奏執自宫者五十四人命枷項於禮部前併各大市街示衆前此自宫者甚衆日赴禮部喧訴求進尚書鄒幹等以為言有旨錦衣衛執之已而皆逃匿五十四人者猶喧訴不已因執以聞乃有是命嚴行禁處自宫成化十一年禮部奏近有不逞之徒往往自宫及其弟男子姪以希進用聚至四五百人告乞奏收羣衆閧然阻遏無計奏入有旨此輩逆天悖理自絶其類且又羣聚喧擾宜治以重罪但遇赦宥錦衣衛執而杖之人五十仍押送户部如例編發海户當差是後有再犯者本身處死全家𤼵邊遠充軍禮部仍移文天下禁約成化二十二年禮部以自宫求進者累有處斬事例而往往不遵雖發充軍為民到彼即逃近復千百成羣在部告擾乞行禁處上謂此輩相效成風不畏明憲命巡城御史同錦衣衛坐城官嚴督五城兵馬司官并其所主之家俱逮送錦衣衛自宫者痛杖五十不分新舊充軍為民悉逓原籍還家仍令所司羈管毋容外出所主之家法司議罪以聞自宫希用王府𢎞治三年正月襄陽之隣境頻年旱荒民有自宫者王俊等十六人襄王見淑奏乞畱府應用禮部言俊等故違禁例長史不能諫王請并治以罪命逮問俊等罪訖仍發原籍為民長史姑宥之查奪閹人濫賞正徳元年禮部以大學士劉健等言南海子閹人選入千餘蟒龍玉帶之賞太濫覆議謂私閹累有禁例其潛住京城者宜力加斥逐蟒衣玉帶之濫賞者請命司禮監查究追奪上是之私閹令通查舊例申明禁約而嚴治其敢犯者禮部志稿卷六十五
