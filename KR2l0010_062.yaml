body:
  text: 禮部志稿卷六十二明俞汝楫編稱號備考誕生皇子生請詔告成化五年皇子生賢妃柏氏出也禮部奏春秋子同始生即書於册重國嗣也皇上即位六年於兹天下臣民宗藩親王仰期聖嗣非一日矣國家根本端在於此宜詔告天下用慰人心上然之皇長女誕生嘉靖十五年上諭禮部曰朕第一女匝月已近內監以皇祖考時例有宴但禮在三月今世俗用一月併可宴否及命名剪髮定期來聞於是禮部擬從儀注一命名剪髮古禮在三月之末今擬從時用九月十五日匝月之吉一皇女淑名與皇子字擬不同伏乞聖明特命一前期上擇內夫人之敬慎者以奉皇女剪髮是日早保姆抱皇女於寢宫剪髮為鬌留羈如禮一至期上具常服御乾清宫升御座皇后率端妃各服其服朝見行四拜禮畢皇后侍立東面端妃後保姆抱皇女出自寢由西至殿內授皇女於皇后內贊奏曰皇后率端妃曹氏祗見皇女上降座執皇女之右手而賜其名皇后復率端妃承旨遂左還授皇女於保姆還寢皇后復率端妃四拜畢各還宫一是日皇女剪髮命名禮畢內監設筵宴宫中照例舉行宴禮詔如擬名稱定玉牒擬名洪武二十八年上以子孫蕃衆命名之際慮有重復乃於東宫諸王世系各擬二十字每一字為一世以某字為命名之首其下一字則臨時取義以為二名編入玉牒至二十世後復擬續增皇子命名嘉靖十二年九月召禮部考皇子廟見命名諸義因諭曰皇子命名本朝皆有敕諭夫方未一嵗尚不知事而賜之敕是虛文也藉令向後識之得以顧名思義未如待其知事後教之又禮曰父命之名朕又思之必當告於祖考然後可以命子禮部尚書夏言覆言臣等初以纍朝故事及禮記欽有帥記有成二語為命名之詞今反覆內則篇三月之末擇日剪髮以下二節乃知欽有帥為夫對妻之語令敬教子循善道也記有成為妻對夫之語謂記識夫言訓子成德也原非命子之詞兹奉聖諭誠大哉大聖人之言非三代後帝王所及臣謹遵議擬命名之日倣古人見子之儀特發一二天語而賜之名不用降敕至於告祖考而後命子亦宜創制以備一代典禮垂法萬世俟皇太子出閣然後降敕斯古人所以為教也上報曰覽奏見執禮從古之正朕意所同其即具儀以聞儀見職掌皇子命名差等嘉靖十六年禮部以皇第三子生上命名剪髮儀注上謂命名儀視元子當有差令再議以聞及是尚書嚴嵩等言今皇第四子生亦將及三月請一時並舉乃具上其儀一行欽天監擇皇子剪髮吉日上請一欽命皇第三子皇第四子雙名該用載字行下字用土邊傍字樣先敕內閣擬上請聖明簡定一是日上以命皇第三子皇第四子名告皇祖於太廟皇考於獻皇帝廟遣官分告七廟先期太常寺備帛香脯鹽酒果翰林院具祝文一是日上以命皇第三子皇第四子名遣使聞於昭聖恭安康惠慈夀皇太后章聖慈仁康靜貞壽皇太后一前期上擇內夫人之敬慎者二人使為傅母以奉皇子剪髮是日早傅母各抱皇子於寢宫剪髮為鬌留角如禮一是日命皇子名上具服御乾清宫升座皇后率康妃靜嬪各具朝服見行四拜禮畢皇后侍立東面康妃靜嬪並中立傅母各抱皇子出自寢由西至殿內授皇第三子於康妃皇第四子於靜嬪內贊奏曰康妃杜氏靜嬪盧氏敢用吉日祗見皇子上降座撫皇第三子之首咳而賜之名康妃承旨畢左還授皇子於傅母立康妃後次撫皇第四子之首咳而賜之名靜嬪承旨畢左還授子於傅母立靜嬪後皇后率康妃靜嬪再四拜禮畢傅母抱皇子隨各還宫一次日上御奉天門降手敕以皇子睿名傳諭禮部行移宗人府上籍玉牒制曰可命名告諭隆慶元年正月賜皇子名上親告奉先殿大行皇帝几筵而命皇子以辭曰朕兹恭請命於祖考賜爾名曰天鈞者聖王制馭天下猶制器者之轉鈞也其為義大矣爾其念之哉敕禮部曰朕元子已恭請命於皇祖皇考名曰某其令所司登識之是日辰時上御宣治門降手敕以皇子睿名傳諭禮部行宗人府登識玉牒皇子命名儀至是年始詳封稱公主等封稱洪武四年詔省部議公主駙馬等封稱禮部奏按唐宋㑹要皇姑姊妹皇女皆稱公主其夫稱駙馬若王以下女止稱郡主其夫止稱所授官若皇姑稱大長公主皇姊妹稱長公主皇女稱公主其夫皆稱駙馬秩從一品親王女稱郡主夫皆稱所授官秩從二品親王生女稱縣主夫亦稱所授官秩從三品尊號徽號天順上徽號天順元年十二月上問內閣臣李賢曰朕惟母后恩深無以為報朕南宫七年危疑之際實賴保護今定策禁中俾朕復位欲倣前代徽號少伸孝情何如賢等擬號曰聖烈慈壽從之二年正月己卯上率文武羣臣奉册寶尊皇太后為聖烈慈壽皇太后嘉靖上徽號嘉靖元年二月禮部擬上聖母昭聖慈壽皇太后皇嫂莊肅皇后壽安皇太后興獻皇太后尊號儀四宫同日恐聖躬勞勩擬三月初十日行禮於仁壽宫十二日行禮於清寧宫前後殿又武廟服未闋莊肅皇后請免朝賀上從之七年六月敕諭禮部曰朕承天命入纘祖宗丕基嗣統初祖母壽安皇太后方萬福宜加上太皇太后尊號當時禮官昧於正禮止加稱皇太后朕亦不明於禮念此不安今宜追上為太皇太后尊諡如故又仰思我皇考罔極之恩雖追尊天子用天子禮樂而尊諡止於二字無異藩王今宜加數字以盡追慕聖母章聖皇太后誕育渺躬恩德深厚徽號太簡宜加二字以申愛敬其具儀聞七月已卯追上壽安皇太后為孝惠康肅溫仁懿順協天佑聖太皇太后追加恭穆獻皇帝尊諡曰恭睿淵仁寬穆純聖獻皇帝加聖母為章聖慈壽皇太后太后坐清寧宮皇上躬上册寶如儀躬詣奉先殿奉慈殿崇先殿行謝禮如儀太后仍御宮服燕居服莊肅皇后皇后武廟皇妃皇妃公主六尚等官併宫人禮服八拜慶賀百官宫門外上表命婦進表賀如儀十五年十一月上諭禮部尚書夏言兩宫皇太后未隆徽稱朕心未安既而閣臣復傳聖諭兩宫徽稱字數宜一體昭聖康惠慈壽皇太后先六字宜加二字聖母章聖慈仁皇太后先四字宜加四字上曰兩宫行輩相等非姑婦也皇伯母原皇兄所上六字今以多卿等以為並用八字如擬行於是閠十二月甲寅尊上昭聖為昭聖恭安康惠慈壽皇太后戊午上章聖為章聖慈仁康靜貞夀皇太后其謁謝暨慶賀俱如儀謹按尊號自洪熙始也天子奉母后或母妃為皇太后則上尊號徽號自天順始也加稱二字或四字為徽號其後儀略同凡上徽號致詞而上尊號則用册寶憲宗尊錢太后為慈懿周太后為聖慈仁壽武宗尊王太皇太后為慈聖康壽張太后為慈壽世宗尊張太后為昭聖康惠慈壽祖母邵太后為壽安興國太后為章聖慈仁神宗尊陳太后為懿安康靜李太后為宣文明肅册立備考册立皇后册立册寶洪武元年定册用金册金字二片每片依周尺長一尺二寸濶五寸厚二分五釐字則依數分行鐫刻真書每片側邊上下有竅用紅絛聯貫開闔如今書帙之狀背各用紅綿嵌護藉以紅綿小褥册盝以木為之飾以渾金瀝粉蟠龍用紅紵絲襯裏內以紅羅銷金小袱裹册外以紅羅銷金夾袱裹之五色小絛縈於匣外寶用金龜紐朱綬文用篆書曰皇后之寶依周尺方五寸九分厚一寸七分寶池用金濶取用寶寶匣二副每副三重外匣用木飾以渾金瀝粉蟠龍紅紵絲襯裏中匣用金鈒造蟠龍內小匣仍用木飾以渾金瀝粉蟠龍紅紵絲襯裏小匣內置以寶座四角雕蟠龍飾以渾金座上用小錦褥褥上一置寶一置寶池用銷金紅羅小夾袱裹寶其匣外各用紅羅銷金大夾袱覆之臨册之日册寶俱置於紅漆輿案案頂有紅羅瀝水用擔床二舉之洪武册立皇后禮洪武元年正月命左相國李善長奉册寶立妃馬氏為皇后定册立皇后儀先期祭告圜丘方丘宗廟行一獻禮先一日內使監設御座於奉天殿尚寶卿設御寶案侍儀司設册寶於其南册用金二片長一尺二寸濶五寸厚五分紅絛聯貫開闔如帙盝飾渾金瀝粉蟠龍册文曰天眷我家啓運興王出自衡門奄有四海為君為后可不慎與君以仁政慎於在位撫黎庶而統萬邦后以懿德慎於治內表六宮而母天下長久之道也爾馬氏同勤勞於開創之時由家成國內助良多今以金册金寶立爾為皇后其敬乃職耿光後世於戲慎戒之寶用金龜紐方五寸九分厚一寸七分篆曰皇后之寶匣用渾金瀝粉蟠龍嘉靖册立繼后禮嘉靖十三年八月上諭禮部曰朕承天眷嗣祖丕基坤宫不可無繼主母不可缺人相祀宗祧承歡慈極時已聞於聖母以德嬪方氏性資端慎名冠九良宜立為皇后僖嬪沈氏稟資淑敏朕所特嘉宜進封為宸妃麗嬪閻氏曾協熊夢宜有加恩兹進封為麗妃便擇日具儀以聞翼日禮臣具儀如故事有謁告內殿儀無謁告太廟世廟之禮上命㑹翰林院議於是禮部上言天子立三宫以共承宗廟之祀在禮經有廟見之文我皇上天縱聖明稽古正義遵祖制見廟之儀正內殿相沿之禮甚盛典也臣等謹考據禮經參稽集禮櫽括節文以上儀見職掌册立妃嬪册妃禮洪武三年五月册孫氏為貴妃吳氏為充妃郭氏為惠妃郭氏為寧妃達氏為定妃胡氏為順妃其儀皇妃服九翬四鳯冠翟衣九等車輅印用金龜紐其尺寸與諸王寶同文曰皇妃之印匣皆飾以蟠鳯宣德元年五月甲午朔以賜貴妃孫氏寶命禮部定儀擇日以聞上諭行在禮部臣曰貴妃恭肅小心事皇太后孝敬奉順皇后皇后屢請褒異之禮部尚書胡濙等曰貴妃后之副二賢淑如此宜授以寶以昭其德上是之已亥御奉天門遣使傳制授册授寶並如永樂册妃儀嘉靖二十年二月封德妃張氏是時妃將就室上諭禮部尚書嚴嵩以二十七日命官告廟發册嵩㑹閣臣議上方靜理若御殿傳制致詞稱賀恐勞聖躬又妃方在祥謁告內殿逺涉車輿恐非所宜當從奉天門發節妃具服迎送節册及謝恩行禮皆如大儀上從之命翊國公郭勛祭告內殿成國公朱希忠為正使持節大學士翟鑾為副使捧册行禮詔勛等行禮發册仍於奉天殿册嬪禮嘉靖十年二月上諭大學士張璁曰朕奉章聖慈仁皇太后慈訓於淑女三十人內擇九人以充九嬪其諭禮官具儀於是禮部尚書李時等言皇上以宗祀之重擇貞淑備九嬪宜定典禮以示天下然㑹典諸書惟載后妃禮儀嬪御以下皆缺及考唐制貴妃淑妃德妃賢妃正一品昭儀昭容昭媛修儀修容修媛充儀充容充媛九嬪正二品皆遣使册命則唐以前九嬪之禮甚重本朝無册嬪儀禮始今日竊擬册妃儀注量為降殺先期內府造九翟冠鞠衣如皇妃制圭用次玉穀文銀册少殺於皇妃四分之一以金飾之正副使各二前一日鴻臚寺設節册案於奉天殿節左册右設綵輿設中和韶樂及大樂設儀仗如朔望儀是日內官設九嬪受册位於宫內至期上具衮冕服以告太廟世廟如儀易皮辨服升殿文武百官紅錦繡入班正副使具公服其傳制并舉節册至九嬪宫中九嬪出迎於宫門外隨至拜位女官宣册九嬪受册先後八拜送節出宫門復命併如册妃儀是日九嬪各具服候皇后率詣奉先殿奉慈殿崇先殿行謁告禮謁內殿畢詣昭聖康惠慈壽皇太后前章聖慈仁皇太后前莊肅皇后前俱八拜候上服皮辨服皇后亦具服各升座九嬪八拜還宫上曰告廟用香帛脯醢果酒捧主官如故正副使并執事官令具服行禮百官公服侍班餘如擬三月初二日册淑女方氏為德嬪鄭氏為賢嬪王氏為莊嬪閻氏為麗嬪韋氏為惠嬪沈氏為安嬪盧氏為和嬪沈氏為僖嬪杜氏為康嬪册立東宮洪武册立儀洪武元年正月乙亥命左相國宣國公李善長奉册寶立世子標為皇太子册曰國家建儲禮從長嫡天下之本在焉朕起自田野與羣雄角逐戡定禍亂就功於多難之際今基業已成命爾標為皇太子於戲爾生王宮為首嗣天意所屬兹正位東宫其敬天惟謹且撫軍監國爾之職也六師兆民宜以仁信恩威懷服其心用永固於邦家尚慎戒之皇太子服衮冕九章乘金輅册與皇后同寶曰皇太子之寶禮部奏上儀內云皇太子受册之日朝謝中宫諸王賀東宫諸王賀中宮百官進箋賀東宫內外命婦賀中宫上覽奏曰禮太繁况是日祭告天地宗廟趨事不暇其賀中宫與東宫宜省節之册立親王洪武册立儀洪武三年夏四月禮部造諸王册寶册寶皆用金寶方五寸二分厚一寸五分篆文曰某王之寶寶匣寶座雕螭餘同皇太子制嘉靖册立儀嘉靖三十二年十二月禮部以嵗終當遣官册封宗室而畿甸災傷驛遞艱阻請移來年四月應古孟夏封諸侯之禮詔可著為令册立王妃天順册立儀天順四年册立王妃舊制與册立皇太子妃儀同凡節册案一張黃傘一是日以二上曰是出自何年主之何人錦衣衛以儀制司對於是尚書蕭暄儀制司郎中俞欽等各引罪詔下欽獄禮部志稿卷六十二
