body:
  text: 禮部志稿卷八十二明俞汝楫編郊祀備考郊祀洪武二年上以每嵗祀天地社稷嶽鎮海瀆靈星諸神皆設壇祭有定期然祭之日或為風雨所飄頓而升降出入之際奔走百執事之人冠服沾濕非惟不便於行事又因以䙝神因諭禮官考求前代有于壇為殿屋蔽風雨便於行事者至是禮部尚書崔亮奏考宋祥符九年議南郊壇祀昊天上帝或值雨雪則就太尉齊㕔望祭元經世大典載社稷壇壝外垣之內北垣之下亦嘗建屋七間南望二壇以備風雨曰望祀堂請依此制于圜丘方丘壇南皆建殿九間社稷壇北建殿七間為望祭之所遇風雨則于此望祭焉上從之亮又奏靈星夀星司中司命司民司祿諸神即周禮幽禜之祭也漢嘗立靈星祠以祀之然星之祭所以壇而不屋者將以通天地風雨霜露之氣也屋而祭之似乖于禮故唐宋不用然諸壇既為殿屋則靈星諸祀亦為殿望祀為便上曰風雨星辰之神其氣流通其神無所不在且祭壇有屋所以棲神氣風雨便於行事何不可也靈星諸神其准漢制于城南為壇屋以祭亮又奏太常議夀星于聖夀日致祭同日祭司中司命司民司祿示與民同受其福也八月望日則祀靈星皆遣官行禮以為常制從之郊前祭告百神洪武二年二月禮部尚書崔亮奏按禮運曰禮行于郊則百神受職沈括援唐制曰凡有事上帝則百神皆預遣使祭告惟太廟則皇帝親行祭告今擬圜丘方澤大祀前期上親告太廟仍遣使預告百神如祀圜丘則曰某年月日皇帝有事于圜丘咨爾百神以相祀事方丘亦如之仍增天下神祇壇于圜丘之東方澤之西其神主皆題曰天下神祇詔從之郊祭用陶器洪武二年八月丁􅕀禮部奏按禮記郊特牲曰郊之祭也器用陶匏瓦器尚質故也周禮籩人凡祭祀供簠簋之實疏曰外祀用瓦簋今祭祀用磁已合古意惟盤盂之屬與古之簠簋登豆制異今擬凡祭器用磁其式皆倣古之簠簋登豆惟籩以竹詔從之木輅祀天吳元年丙午夏四月乙卯上閲古車制至周禮五輅曰玉輅太侈何若止用木輅詹同對曰昔顔淵問為邦孔子答以乘殷之輅即木輅是也孔子以其朴素渾堅質而得中故取焉上曰以玉飾車考之古禮亦惟祀天用之若常乘之車只宜用孔子所謂殷輅然祀天之際玉輅或未備木輅亦未為不可參政張昶對曰木輅戎輅也不可以祀天上曰孔子萬世帝王之師其斟酌四代禮樂實為萬世之法乘木輅何損於祭祀事在誠敬不在儀文也昶頓首謝初定郊壇吳元年秋七月癸丑圜丘方丘及社稷壇成圜丘在京城東南正陽門外鍾山之陽倣漢制為壇二成第一成廣七丈髙八尺一寸四出陛正南陛九級廣九尺五寸東西北陛亦九級皆廣八尺一寸壇面及趾甃以琉璃磚四面琉璃闌干環之第二成周圍壇面皆廣二丈五尺髙八尺一寸正南陛九級廣一丈二尺五寸東西北陛九級皆廣一丈一尺九寸五分壇南趾及闌干如上成之制壝去壇一十五丈髙八尺一寸甃以磚四面為靈星門南為門三中門廣一丈二尺五寸左門一丈一尺五分右門九尺五寸東西北各為門一各廣九尺五寸去壝一十五丈四面為靈星門南為門三中門廣一丈九尺五寸左門一丈二尺五寸右門一丈一尺九寸五分東西北為門各一各廣一丈一尺九寸五分四面直門外各為甬道其廣皆如門為天庫五間在外墻北靈星門外南向厨房五間西向庫五間南向宰牲房三間天池二所俱在外墻東靈星門外東北隅牌樓二在外墻靈星門外橫甬道東西燎壇在內壝外東南丙地髙九尺濶七尺開上南出戶方丘在太平門外鍾山之北為壇二成第一成廣六丈髙六尺四出陛各廣一丈八級第二成四面各廣二丈四尺髙六尺四出陛南面陛廣一丈二尺八級東西北面陛各廣一丈八級壝去壇一十五丈髙六尺四面為靈星門正南為門三中門廣一丈二尺六寸左門一丈一尺四寸右門一丈六寸東西北為門各一各廣一丈四寸周圍為外墻四面各六十四丈皆為靈星門正南為門三中門廣一丈六尺四寸左門一丈二尺四寸右門一丈二尺二寸東西北為門各一各廣一丈二尺四寸庫五間在外墻北靈星門外南向厨房五間宰牲房三間皆南向天池一所在外墻西靈星門外西南隅瘞坎在內壝外壬地社稷壇在京城之西南皆北向社東稷西各廣五丈髙五尺四出陛每陛五級壇用五色土色各隨方上以黃土覆之壇相去五丈壇南各栽松樹二壇同一壝壝方廣三十丈髙五丈甃以磚四方有門各廣一丈東飾以青西飾以白南飾以赤北飾以黑瘞坎在稷壇西南磚砌之廣深各四尺周圍築壇開四門南為靈星門三北㦸門五東西㦸門各三東西北門皆列二十四㦸神厨三間在墻外西北方宰牲池在神厨西社主用石髙五尺闊二尺上微鋭立于壇上半在土中近南北向稷不用主定朝日夕月禮洪武三年正月禮部奏定朝日夕月禮按周禮大宗伯以實柴祀日月星辰玉人之事圭璧五寸以祀日月星辰禮記曰王宫祭日也夜明祭月也祭日於壇祭月於坎以别幽明以制上下考之古者祀日月其禮有六郊特牲曰郊之祭大報天而主日配以月一也玉藻曰朝日於東門之外祭義曰祭日於東郊祭月於西郊二也大宗伯肆類於四郊兆日於東郊兆月於西郊三也月令孟冬祈來年於天宗天宗日月之類四也覲禮拜日於東門之外及祀方明禮日於南門之外禮月於北門之外五也霜雪風雨之不時則禜日月六也說者謂因郊䄍而祀之者非正祀也類禜而祀之與覲諸侯而禮之非常祀也惟春分朝之於東門之外秋分夕之於西門之外者祀之正與常者也蓋天地至尊故用其始而祭以二至日月次天地春分陽氣方永秋分隂氣向長故祭以二分為得隂陽之義若其次則大次小次重帟重案其牲體則實柴其服則𤣥冕𤣥端其圭之繅藉則大采小采禮之之玉則一圭邸璧祀之之樂則奏黃鍾歌大吕舞雲門凡見于周禮者如此秦祭八神六曰月主七曰日主雍又有日月廟漢郊太乙朝日夕月改周法常以郊泰畤質明出行宫東向揖日西向揖月又於殿下東西拜日月宣帝于神山祠日萊山祠月魏明帝始朝日東郊夕月西郊唐以二分日朝日夕月於國城東西宋以春分朝日秋分夕月為大祀元于郊壇以日月從祀其二分朝日夕月皇慶中議建立而不見施行今既以日月從祀於郊壇制朝日壇宜築於城東門外髙八尺夕月壇宜築於城西門外髙八尺俱方廣四丈兩壝壝各二十五步燎壇方八尺髙一丈開上南出户方三尺神位以松柏為之長二尺五寸濶五寸趺髙五寸朱漆金字朝日以春分日夕月以秋分日星辰則祔祭于月壇從之圜丘從祀簡當洪武三年上諭中書省參政陳亮侯至善曰司天臺言朔日以來日中有黑子其占多端朕觀存心録以為祭天不慎所致今郊壇從祀禮文太簡宜命禮部太常司詳議圜丘方丘增以十二月將旗纛之神于是禮部尚書崔亮奏成周祭天惟祀帝與日月漢祭天有列星一千五百十四位唐宋及元損益不同國朝前議圜丘從祀之禮以漢唐為煩瀆元止祀日月星辰太嵗為簡而當郊祀陳圗籍洪武三年癸酉太常少卿陳昧奏按周禮孟冬祀司民司祿而獻民數榖數則受而藏之蓋民食皆命於天故民數有拜受之禮今圜丘郊祀宜以户口錢糧之籍陳於臺下禮畢藏之內府以見拜受民數榖數于天之義亦聖朝一代之制也於是上命中書省臣凡行郊祀禮以天下戶口錢糧之籍陳於臺下祭畢收入內庫藏之其天下城池山川地理形勝亦皆圗以成書藏之內庫以垂久逺朝日夕月祝文洪武五年二月丁亥朝日儀與四年九月祭星辰同迎神執事者不斟酒亞獻終獻各執事者以爵受酒奠於神位之前其祝文曰混沌之初兩儀無象神光未著乃穹壤既立神光運行照臨下土萬象昭明形影俱分四時序而天地位民物䝉恩凡有國者咸修祀事今年仲春式遵古典謹以玉帛牲齊用伸祭告八月夕月儀八月夕月儀與朝日同祝文曰維神鍾隂之精配陽之德歷代相承祭以秋夕今兹時以秋分特備牲醴祭奠伏惟神鑒增列郊壇從祀洪武三年禮部奏大明夜明星辰太嵗既從祀於圜丘而五嶽四海五鎮四瀆亦既從祀於方丘矣獨風雲雷雨及天下山川不得以類從祀非通敬於神明者也宜增列於圜丘方丘從祀之次上從之遂命于圜丘壇下壝內增設壇從祭風雲雷雨之神於方丘壇下壝內增設壇從祭天下山川之神其禮如太嵗嶽鎮夕月祀儀洪武三年八月己卯夕月於西郊附祭周天星辰三獻禮俱先詣夜明神位前次詣星辰神位前儀並同朝日但夜明犢用白星辰犢用純帛俱白色其祝文夜明曰惟神太隂所鍾承光于日配陽之德麗於穹碧維此秋夕雲斂氣清仰瞻素輝神馭以升夜明有壇用申報祭惟神鍳臨萬古不昧星辰曰惟神羅列周天耿耿其輝既瞻月馭衆象以微上之所躔不必有應爰遵古典用伸報稱仲秋禮記設壇既崇神其歆格鑒此寸衷其樂迎神奏凝和之曲徹豆奏夀和之曲送神奏豫和之曲望燎奏熙和之曲其樂章迎神曰吉日良辰祀典式陳太隂夜明以及星辰濯濯厥靈昭鍳我心以候以迎來格來歆餘並同朝日别設星辰壇洪武三年九月天夀聖節祭太廟上謂中書省臣曰日月既皆設壇專祭而星辰乃祔祭於月壇非禮也宜别設壇專祭周天星辰於是禮部議于城南諸神享祭壇正南向增造屋九間朝日夕月祭周天星辰俱于是行禮其朝日夕月仍以春秋分祭星辰則于天夀聖節前三日致祭從之初祀圜丘洪武元年十一月庚子冬至祀昊天上帝于圜丘正壇第一成設上帝位南向玉用蒼璧帛用蒼色牲用蒼犢籩豆簠簋視宗廟登一實以太羮爵三壇上設大尊二著尊犧尊山罍各一壇下設大尊一山罍二實以五齊三酒祝一同玉帛設于壇西第二成設大明位在東星辰位次之夜明位在西太嵗位次之位用純犢一幣各一大明用赤夜明星辰太嵗皆用白籩豆各十籩視上帝則減糗餌粉餈豆則減􅓞食糝食簠簋及登同上帝東西各設著尊二犧尊二實醴齊盎齊事酒儀見職掌初祀方澤洪武二年夏至祭皇地祇於方丘正壇第一成設皇地祇位正中南向玉用黃琮幣用黃色第二成設五嶽位在東四海位次之五鎮位在西四瀆位次之位用純犢一五嶽五鎮帛各五四海四瀆帛各隨其方色散齊之日皇帝備法駕至天下神祇壇祭告其正祭儀物禮樂並與圜丘同但改望燎為望瘞其望瘞儀與社稷同祝文曰臣荷眷佑戡定區宇為億兆主今當夏至萬物咸亨敬以玉帛犧齊粢盛庶品備兹禋瘞用伸昭告其樂章迎神曲曰坤德博厚物資以生承天時行光大且寧穆穆皇祇功化順成來御方丘嚴恭奉迎奠玉帛云地有四維大琮以方土有正色制幣以黃敬存于中是薦是將奠之几筵臨鍳洋洋進俎云奉時純牡其牡童犢烹飪既嚴俎豆維肅升壇昭薦神光下燭眷佑邦家報效惟篤初獻云午為盛陽隂德初萌天地相遇品物光榮吉日令辰明祀攸行進以醇醴展其潔清亞獻云至廣無邊道全持載山嶽所憑海瀆咸賴民資水土既安且泰酌酒揭䖍功德維大終獻云庸眇之資有此疆宇匪臣所能仰承祐助恩崇父母臣歡鼓舞八音宣揚疊佑明醑徹豆云牲牷在俎籩豆有實臨之肹蠁匪惟飲食登歌乃徹薦獻爰畢執事奉承一其嚴栗送神云神化無方妙用難量其功顯融其祀悠長颷輪云旋龍控鸞翔拜送稽首瞻禮餘光望瘞云牲醴制幣餕饌惟馨瘞之於坎以達神靈奉神于隂典禮是程企而望之厚壤寬平禮成駕還率百官詣太廟以牲齊告祭還御奉天殿百官行慶成禮更定圜丘方澤從祀儀洪武七年秋七月議增圜丘方丘從祀更定其儀並圜丘壇第一成設昊天正位仁祖淳皇帝配位如舊第二成東設大明位西設夜明位內壝之內東西各三壇星辰二壇分設于東西星辰之次東則太嵗及五嶽壇西則風雲雷雨及五鎮壇內壝之外東西各二壇東四海壇西四瀆壇天下神祇二壇分設于海瀆之次正配位共設酒尊六於壇西大明夜明位各設酒尊三星辰牛一羊豕各三太嵗牛羊豕各一餘悉如舊儀風雲雷雨帛四白色嶽鎮海瀆帛與二年夏至祭方丘同餘並同太嵗壇天下神祇帛四白色牲用羊豕各五籩豆各八籩視大明夜明則減白餅黑餅豆減脾析豚胉簠簋三鉶三壝內東西各設酒尊三帛篚三壝外東西各設酒尊三帛篚二每位爵各三方丘壇第一成設皇地祇正位仁祖配位設如圜丘第二成東設五嶽位西設五鎮位內壝之內東西各二壇東四海壇西四瀆壇天下山川壇二復分設于海瀆之次內壝之外東西各設天下神祇壇一其陳設正配位如圜丘嶽鎮海瀆與二年夏至同但嶽鎮各設酒尊三天下山川壇牛一羊豕各三餘與嶽鎮海瀆同天下神祇與圜丘同壝內東西各設酒尊三帛篚二壝外東西各設酒尊三帛篚一每位爵各三前期皇帝齊三日前祀之四日百官於奉天門觀視戒牌是日太常卿至天下神祇壇奠告中書丞相詣京都城隍發咨次日皇帝詣仁祖廟請配享其樂舞之制圜丘方丘樂各用編鐘十六編磬十六琴十瑟四搏拊二敔一柷一塤六六簫八橫笛四笙八應鼓一籥四鳳笙四協律郎一人服祭服手執麾幡樂生七十三人舞武舞舞文舞各引舞二人執羽節武舞生六十二人各執干戚文舞生六十二人各執羽籥其樂章並與元年冬至二年夏至同改建合祀洪武十年詔改建圜丘于南郊初圜丘在鍾山之陽方丘在鍾山之隂上以分祭天地揆之人情有所未安至是欲舉合祀之典乃命即圜丘舊址為壇而以屋覆之名曰大祀殿𠡠太師韓國公李善長等董上丁亥冬至始合天地于奉天殿祝文曰禮以義起貴乎情文兩盡曩者建國之初遵依古制分祀天地於南北郊周旋九年於心未安誠以人君者父母天地仰覆載生成之恩一也及其嚴奉禋祀則有南北之異揆以人事人子事親曷敢異處竊惟典禮其分祀者禮之文也其合祀者禮之情也徒泥其文而情不安不可謂禮方改建祀殿功未就緒今朝堂適成時當冬至合祀于殿庭自今以春夏合祀于南郊永為定禮謹奉皇考仁祖淳皇帝配惟上帝皇地祇鍳之十一年大祀殿成殿十二楹中四楹飾以金餘施三采正中作石臺設上帝皇祇神座于其上每嵗正月初旬擇日合祭上具冕服行禮奉仁祖淳皇帝配享殿中殿前為東西廡三十二楹正南為大祀門六楹節以步廊與殿廡通殿後為庫六楹以貯神御之物名曰天庫皆覆以黃琉璃瓦設厨庫於殿東少北設宰牲亭井於厨東又少北皆以步廊甬道殿兩廡後繚以周墻至南為石門三洞以達大祀門內謂之內壇外周垣九里三十步石門南為甬道三中曰神道左曰御道右曰王道道之兩傍稍低為從官之道齊宫在外垣內之西南東向於是勑太常曰近命三公率工部役梓人於京城之南創大祀殿以合祀皇天后土冬十月告功已成特命禮部去前代之祭期以嵗正一祀古人祀天于南郊蓋以義起耳故曰南郊祀天以其陽生之月北郊祭地以其隂生之月孰知至陽祭之於隂月至隂祭之於陽月於理可疑且掃地而祭其來甚逺蓋言祀地尚實而不尚華後世執古而不變遂使天地之享反不及人之享亦執古而不變則當汙尊而壞飲茹毛而飲血巢居而穴處也以今言之世果可行乎斯不必然也今命太常每嵗合祭天地於春首正三陽交泰之時人事之始也其後大祀殿復易以青琉璃瓦云大祀殿禮成洪武十二年正月己卯合祀天地於南郊大祀殿命魏國公徐達及公侯等分獻日月星辰嶽鎮海瀆山川諸神凡一十七壇正殿三壇昊天上帝皇地祇壇俱南向仁祖配位壇西向丹墀之東為壇曰大明西向其西為壇曰夜明東向兩廡為壇各六星辰之壇分設於東西日月之次東則太嵗次五嶽次四海西則風雲雷雨次五鎮次四瀆天下山川神祇為壇二分設于海瀆之次各壇陳設仍舊儀但仁祖配位玉用蒼璧太嵗風雲雷雨盞各十東西廡各共設酒尊三爵一十八于壇之南前期皇帝致齊五日前祭二日太常司同光祿司官詣壇省牲至日奠玉帛進俎三獻酒俱先詣上帝神位前次詣皇地祇神位前次詣仁宗淳皇帝神位前餘悉仍舊儀其祝文云嗣天子臣敢昭告于昊天上帝后土皇地祇時維孟春三陽交泰敬率臣僚以玉帛犧牲粢盛庶品恭祀于大祀殿備兹燎瘞皇考仁祖淳皇帝配神禮畢詰旦駕還御奉天殿百官行慶成禮宴羣臣于奉天殿是祭也自齊誓百官至將祭之夕天宇澄清升壇星緯昭煥祥飈慶雲光彩輝煜上甚悅禮成敕中書省臣胡惟庸等曰立綱陳紀治世馭民斯由上古之君立至今相承而法則焉凡有國者必以祀事為先祀事之禮起於古先聖王其周旋上下進退奠獻莫不有儀然儀必貴誠而人心叵測至誠者少不至誠者多暫誠者或有之若借禮設儀文飾太過使禮煩人倦而神厭享非禮也故孔子曰禘自既灌而往者吾不欲觀之矣朕周旋祀事十有一年見其儀太煩乃以義起更其儀式合祀社稷既祀神乃觀今十二年春始合天地大祀而上下恱若有蠁答于朕心爾中書下翰林令儒臣紀其事以彰上帝皇祇之昭格而錫黔黎之福朕與卿等尚夙夜無怠以答神明之休佑焉社稷祀改建社稷壇洪武十年命改建社稷壇先是上既改建太廟于雉門之左而以社稷國初所建未盡合禮又以大社大稷分祭配祀皆因前代之制欲更建之為一代之典遂命中書下禮部詳議其制至是禮部尚書張籌奏曰臣等奉詔考社稷配祀合祭分祭之制及社主之設謹按通典顓頊祀共工氏子勾龍為后土后土為社烈山氏子柱為稷稷田正也髙辛唐虞夏皆因之周棄亦為稷自商以來祀之此社稷之祀所由始也商湯以旱而遷社以后稷代柱欲遷勾龍無可繼者故止然王肅謂社祭勾龍稷祭后稷皆人鬼非地神而陳氏禮書又謂社所以祭五土之祇稷所以祭五榖之神鄭康成亦謂社為五土總神稷為原隰之神勾龍以有平水土之功故配社祀之稷有播種之功故配稷祀之二說為不同漢元始五年以夏禹配食官社后稷配食官稷唐宋及元則又以勾龍配社周棄配稷蓋本鄭氏之說此配社之法緣於古昔初無一定之論也至于社稷分合之義書召誥言社于新邑孔氏注曰社稷共牢又封人掌設王之社壝注云不言稷者舉社則稷從之如是則當時社與稷固已合而一之矣陳氏禮書曰稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利而養人也而山堂考索則曰土爰稼穡其本一也社為九土之尊稷為五榖之長稷生于土則社與稷固不岐而二之矣又曰祭主乎誠而已誠茍不至分祭何益是則社稷之祭合而一之於古自有有徴也至于壇位則考之周制小宗伯掌建國之神位右社稷左宗廟起大事動大衆必先告于社而後出其制在中門之外外門之內尊而親之與先祖等漢建官大社大稷光武立大社稷于洛陽在宗廟之右唐因隋制建于含光門之右大扺皆本成周左祖右社之意社主之說周禮大司徒設其社稷之壝而樹之主各以野之所宜木名其社小宗伯立軍社鄭注之社主用石為之蓋以石者土地所生最為堅實故也論語哀公門社於宰我宰我對曰夏后氏以松殷人以柏周人以栗朱子云觀古人意正以樹為主如今人稱神樹之類又曰社有主而稷無主此不可曉恐不可以己意增添唐神龍中議立社韋叔夏引鄭𤣥議以為社主用石韓詩外傳云天子社主長五尺方二尺剡其上以象物生方其下以象地體埋其半以象根在土中而本末均也宋初祭社稷正配位用神位版大社又以石為主其形如鐘長五尺方二尺剡其上培其下半其中植槐是則木主石主前代蓋兼用矣今擬社稷合祭共為一壇皆設木主而丹漆之祭則設于壇上祭畢收藏仍用石主埋壇之中如唐宋之制至于以勾龍配社以棄配稷棄雖唐虞農官而勾龍共工氏之子也祀之無義商湯欲遷之而未果漢嘗易以夏禹而夏禹今以列祀帝王之次棄稷亦配享先農請罷勾龍與棄配位謹奉仁祖淳皇帝配享大社大稷以成一代之盛典以明祖社尊而親之之道上覽奏稱善遂命改作社稷壇于午門之右其制社稷共為一壇壇成上廣五尺下如上之數而加三尺崇五尺四尺陛築以五色土色如其方而覆以黃土壇四面皆甃以甓石主崇五尺埋壇之中微露其末外壝墻崇五尺東西十九丈二尺五寸南北如之設靈星門於四面壝墻各飾以方色東青西白南赤北黑外為周垣東西廣六十六丈七尺五寸南北廣八十六丈六尺五寸垣皆飾以紅覆以黃璃璃垣之北向設靈星門三門之外為祭殿以禦風雨凡六楹深五丈九尺五寸連延十丈九尺五寸祭殿之北為拜殿六楹深三丈九尺五寸連延十丈九尺五寸拜殿之外復設靈星門三垣之東西南三向設靈星門各一西靈星門之內近南為神厨六楹深二丈九尺五寸連延七丈九尺五寸又其南為神庫六楹深廣如神厨西靈星門之外為宰牲房四楹中為滌牲池一井一冬十月朔新建社稷壇成先是禮部尚書張籌奏天地社稷宗廟崇敬之禮一也故書稱成湯顧諟天之明命以承上下神祇社稷宗廟罔不祇肅後世列為中祀失所以崇祀之意至唐升為上祀國朝之初仍列中祀而􅎔祭之期衣服或具通天冠絳紗袍或以皮辨行禮制有未定今既考用古制右社稷左宗廟有事社稷則奉仁祖皇帝配其禮重矣宜升為上祀具冕服以祭上是之至是行奉安禮上冕服乘輅百官具祭服詣舊壇以遷主告祭行獻禮畢執事起石主舁之具儀衛作樂百官前導上乘輅至新壇執事奏安石主於壇上别設木主於神位具牲醴庶品行奉安禮升為上祀奉仁祖淳皇帝配祭大社稷儀物祝文洪武十年二月戊子祭大社大稷前祭二日詣奉先殿告仁祖淳皇帝配神祭日陳設太社在東太稷在西俱北向仁祖淳皇帝在東西向太社太稷位各用犢一羊一豕一登一鉶二籩豆各十二簠簋各二玉用二圭有邸帛一黑色仁祖配位同不同玉共設酒尊三於壇之西北東向爵九玉帛篚二帛篚一祝文一祝文曰惟神贊輔皇祇發生嘉榖粒我蒸民萬世永賴時當仲春禮嚴告祀謹以玉帛牲齊粢盛庶品備兹瘞祭以皇考仁祖淳皇帝配神其樂章迎神云余惟土榖兮造化功為民立命兮當報崇民歌且舞兮候迓迎想聖來兮祥風生欽當稽首兮告年豐初獻云氤氲合兮物遂䝉民之立命兮荷隂功余將玉帛兮獻微衷初斟醴薦兮民福洪亞獻云余令樂舞兮再奉觴願神昭格兮君民康思必穆穆兮靈洋洋感厚恩兮拜祥光終獻云干羽飛旋兮酒三行香煙繚繞兮雲旌􅓚余今稽首兮欣且惶神顔恱兮霞彩彰徹饌云初陳微禮兮神喜將琅然絲竹兮樂舞揚願祥普降兮遐邇方蒸民率土兮盡安康送神云氤氲氤氲兮祥光張龍車鳳輦兮駕飛揚遙瞻稽首兮去何方民福留兮時雨𤾉望瘞云奉肴羞兮詣瘞方鳴鸞率舞兮聲鏗鏘思神納兮民福昻余今稽首兮謝恩光定諸神祈報告祭禮洪武六年禮部尚書牛諒奏定太嵗風雲雷雨嶽鎮海瀆山川城隍諸神祈報告祭神位春秋祈報凡一十五壇中太嵗風雲雷雨五嶽五鎮四海凡五壇東西各五壇東則四瀆京畿山川春秋二季月將京都各府城隍西則鍾山甘肅山川夏冬二季月將旗纛戰船等神若有事告祭則設神位凡二十八壇中五壇與祈報同東四瀆京畿湖廣山東河南北平廣西四川甘肅等處山川夏冬二季月將京都城隍凡一十二壇西鍾山江西浙江福建山西陜西廣東遼東山川春秋二季月將旗纛戰船等神凡一十一壇若親祀則每壇牲用犢一羊一豕一籩豆各十簠簋各二登一鉶二酒盞三十帛太嵗一風雲雷雨四鍾山一京畿山川四甘肅山川二春夏秋冬四季月將各三京都各府城隍共二俱白色帛嶽五鎮各五四海四各隨方色四瀆四黑色旗纛戰船等神共七黑色二白色五共用酒尊一十三祝一其祝文曰惟神主司民物參贊天地化機發育有功考于古典歷代有春告之禮今當一嵗之初農事將興謹以牲醴庶品用伸祭告所兾風雨以時年嵗豐稔民物咸遂軍民皆安秋報曰今農事告成謹以牲帛醴齊粢盛庶品用伸報祭餘同春祈又命樂章迎神篇曰吉日良辰祀典式陳太嵗尊神雷雨風雲嶽鎮海瀆山川城隍內而中國外及四方濯濯厥靈昭鍳我心以候以迎來格來歆自奠帛以下則皆如舊文大社大稷祝文洪武二年定大社大稷祝文大社曰惟神德深造化贊輔皇祇世物賴生所當告祀遵依古典行仲春禮謹以牲幣醴齊粢盛庶品式陳瘞祭以后土勾龍氏配神作主大稷曰惟神嘉種生成明粢惟首帝命率育立我蒸民謹以牲幣醴齊粢盛庶品式陳瘞祭以后稷配神作主后土曰爰兹仲春遵依古典薦于大社惟神水土平治永賴其功謹以牲幣醴齊粢盛庶品陳于表位作主侑神后稷曰爰兹仲春遵依古典薦于大稷維神勤農務本政成稼穡生民立命萬世之功謹以牲幣醴齊粢盛庶品陳于表位作主侑神親祭大社稷洪武九年上親祭大社大稷大社設正位在東配以后土西向大稷設正位在西配以后稷東向太社大稷位各用玉兩邸幣黑色牲用犢一羊一豕一籩豆各十籩實以形鹽薧魚棗栗蓁菱芡鹿脯白餅黑餅豆實以韭葅醯醢菁葅鹿醢芹葅兔醢笋葅魚醢脾析豚胉簠簋各二實以黍稷稻粱鉶三實以和羮后土后稷位並同但不用土大社壇正配位共設酒尊于壇東西向實以泛齊盎齊祝二共設于壇西東向大稷壇正配位共設酒尊三於壇西東向祝二共設於壇西向各壇爵六同設于酒尊所先期皇帝散齊四日致齊三日陪祭執事官同改正奉祖配社嘉靖九年正月上諭禮部朕每以祭太社太稷奉我太祖太宗配竊有疑焉夫天地至尊次則宗廟又次則社稷此序尊殺之理也奉祖配天則正矣又奉祖配社豈不失其序歟或謂以祖配社乃親親之道也此我皇祖時禮官之失也又謂后土勾龍氏乃共工之子祭之無義夫勾龍氏有水土之功故取之配社猶以后稷配稷同也未嘗論其人況父不善而可惡及其子乎至如奉祖配社尤為勿當屈其所尊義實不安宜如我皇祖髙皇帝之制大社以后土勾龍氏配大稷以后稷氏配詳議具奏禮部言祀事重典請集多官㑹議上曰尊祖配天具載禮制並無奉祖配社之文卿等亦曰未聞其他異論之徒不足為較苐宜求之人心可與否耳夫人心未有不同不過是昔非今破亂吾事卿等既恐持論不一其亟集廷臣議同者列名具疏異者自疏以聞於是大學士張璁翟鑾等議皆與上意合上遂命先期擇日躬告太廟及社稷禮卿時告后土勾龍氏及后稷氏壇行禮其神牌即行成造具儀以聞禮部志稿卷八十二
