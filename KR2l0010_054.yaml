body:
  text: 禮部志稿卷五十四明俞汝楫編列傳尚書李時李時河間任邱人舉𢎞治壬戌進士改翰林院庶吉士授編修武廟初為經筵講官以孝宗實録成陞侍讀尋陞右諭徳上即位充日講官預修武宗實録陞侍讀學士累陞禮部侍郎尚書賛上分建四郊成累加太子太保進武英殿大學士尋改吏部尚書是嵗彗星見時陳言三事曰務安静惜人才慎刑罰頗及大禮大獄諸臣上日御便殿章奏軍國重事必召時面决及人才賢否民間利病悉以諮訪甲午加少保皇史宬成加太子太師尋加少傅進謹身殿九廟成加太子太師進華盖殿上數幸山陵時嘗扈從命直宿行殿側以便召對眷遇隆厚尋卒上深悼之賜祭塟如例贈太傅諡文康時以謙和得士心恪慎稱上意秉政數年雖無大匡弼而議論嘗在寛平天下稱為長者尚書黄綰黄綰字宗賢浙江黄巖人正徳中以祖廕授後軍都督府都事嘉靖改元為南京都察院經歴以議大禮與張桂合遷南京工部員外郎謝病免歸未幾復起為光禄寺少卿與修明倫大典尋陞大理少卿改詹事府少詹兼侍講學士充經筵講官大典成進詹事乆之進南京禮部右侍郎轉禮部左時大同軍亂後反側子猶攘臂彭嘯人心詾詾代王請大臣安集上命綰往綰撫輯流亡分别善惡悉索其倡亂黨與誅之還奏稱㫖毋憂服闋即其家拜禮部尚書兼翰林院學士撫諭安南未行落職閒住卒于家綰有文學明習國家故事慱辯㨗給吏幹亦敏贍故雖起家任子致位八座人不以為忝然其傾狡善變不專一節初以講學取聲譽比議禮見舉朝不悦復首䑕避去事定乃復揚揚自負力附張桂鋤所憎忘嘗上書以隠語撼大學士楊一清公論惡之及夏言有寵復附言而非張孚敬迹其終始真傾危之士也尚書張璧張璧湖廣石首人中正徳辛未進士改翰林院庶吉士授編修乾清宫災上言修徳勤政講學三事上即位璧侍講筵武廟實録成陞春坊諭徳管理誥勅陞太常寺卿兼侍讀學士掌院事戊戍獻皇帝實録成陞禮部右侍郎南京禮部尚書改禮部尚書兼翰林院學士尋兼東閣大學士入閣辦事明年加太子太保卒于官璧性醇實周慎卿行甚篤侍上講幄最乆多所禆益而輔政不逾數月故勲業無聞焉訃聞命尚書宷諭祭于邸舎贈少保諡文簡遣官䕶櫬還詔有司營塟尚書費宷費宷字子和江西鉛山人正徳辛未進士改翰林院庶吉士授編修時寧庶人宸濠潜蓄異志求復䕶衛宷與從兄大學士宏極言其不可予遂忤權倖意褫職罷歸上御極用薦復還舊職尋充經筵官與修武廟實録成陞左春坊左賛善遷南京尚寳司卿尋改左庶子兼侍講掌南京翰林院事累陞禮部侍郎兼學士掌院事踰年進尚書掌詹事府事尋命回部自是舉大典禮儀朝政咸盡力焉以太廟成加太子少保滿三嵗考秩進太子太保復加少保疾作卒于官賜祭塟如例諡文通尚書孫承恩孫承恩直𨽻華亭人正徳辛未進士改翰林院庶吉士授編修嘗奏進歴代帝王詩賛賜名鍳古韻語奉使安南與脩明倫大典成擢左春坊中允充經筵講官主考两宫鄉試陞侍讀學士掌南院召為少詹事兼侍讀學士已進禮部右侍郎經筵日講轉吏部左侍郎掌詹事府事乙巳大察為言官所論上特留之丁未㑹試主考擢禮部尚書仍掌詹事府已回部管事以病疏乞致仕明年上思之召還故任加太子少保供撰𤣥文疏請皇子講讀不報癸丑二月復乞致仕賜馳驛歸尋卒賜祭塟如例贈太子太保諡文簡尚書徐階徐階字子昇直𨽻華亭人年二十一登嘉靖癸未進士殿試第三人授翰林院編修首揆張孚敬縁上意請正孔廟祀抑詘王號下儒臣議相顧攝讋毋敢異同者階獨條具其三不必五不可状甚晰疏上得㫖外補添註延平府推官遷黄州府同知陞浙江僉事提督學校尋改督學江西陞副使皇太子出閣陞司經局洗馬兼翰林院侍讀進國子祭酒乆之擢禮部右侍郎遂遷吏部未幾改兼翰林院學士教習庶吉士踰年掌翰林院事復充㑹典副總裁尋擢禮部尚書學士如故禮部之為政者乆好以寛大逺弊至階而肅然更始凢王國爵封秩諡併文武大臣陳乞祭塟皆衷之以請報可著為令莊敬皇太子薨階議䘮禮以上及百官皆朞服百官仍詣門哭上不懌謂天子絶朞不制服其百官服可無詣門哭臨禮着詣停柩所輔臣遂欲以青衣角帶往階曰未有哭臨而不衰服者定議以齊衰服臨上是之令宫中仍服衰遂命為莊敬冊諡副使己命題主上察階慎勤召入直無逸殿廬給供饌如例尋賜飛魚服遂連上疏請立皇太子不報盖次當繼莊敬而立者裕王是為穆宗而景王與同嵗差少中外未測上㫖恐有釣竒者故請之亟云最後當冠及婚禮開講皆請以齒叙先裕而後景復不允無何詔二王婚俱出就外邸疏諫又留中萬夀節推恩加太子太保冦薄都城請赦諸邉将在獄者詣行營自効報可復疏請上還大内及召羣臣面計兵事上褒其忠愛適有從敵歸者以敵求貢書聞上以示階及輔臣嵩等且召對便殿上顧謂當何處分階曰請計緩之遣譯者至營而詰之以無畨文故且徴其情實實則令暫出邉用先酋長例貢馬行賞互市往返少日我城中之備完而援兵日益集敵且退不退我從而拒之可十全上稱善者再出而㑹廷臣議階言貢不可許遂兼酌以請㑹酋飽去乃下階疏不許貢上又宻諮階善後事階疏上上皆虚以聴焉太宰缺廷推階當補上不允謂方侍朕左右何輙擬外遷無何孝烈祔廟之議起初孝烈皇后崩上欲祔之廟而念壓于先孝潔皇后又睿宗入太廟非中外公論恐千秋萬嵗後所祧主非仁宗而睿考遂下部議欲以孝烈先祔階議以為女后無先入廟者上大怒令再議階不獲已乃小婉其詞請于太廟奉先殿各増二室而升祔孝烈皇后則仁宗不必祧而孝烈可速祔上愈怒從更議祧仁宗祔孝烈階雖不獲守前説然天下信其為正大帥仇鸞驟有寵利諾延之弱欲掩之以為功請征之下階與兵部議階不可遂弗果征尋以薊帥獲間功上手註加少保乆之命兼東閣大學士叅預機務仍掌禮部事候代者服除而後解階疏辭不允歴少師兼太子太師建極殿大學士隆慶三年致仕歸萬厯十年卒年八十一贈太師諡文貞尚書歐陽徳歐陽徳字崇一江西泰和人嘉靖癸未進士初知陸安州遷南京刑部員外郎㑹上擇諸臣有文行者列侍從改翰林院編脩充經筵官稍遷南京國子監司業歴南京尚寳司卿太僕寺少卿南京鴻臚太常寺卿尋以太常寺卿掌國子監事數月擢禮部左侍郎改吏部左侍郎兼翰林院學士掌詹事府事充㑹典總裁教習庶吉士明年主考庚戍㑹試以母喪歸從服中起禮部尚書兼翰林院學士直無逸殿尋卒晉太子少保祭塟褒卹如例諡文莊徳宇度宏粹孳孳講學務以真知實踐為主接引後進如恐不及其才具敏贍施于有政率當事理恊人情措畫所及即可傳之永乆在禮部嘗議建儲議二王婚禮雖時與上意忤然上察其持正卒優容之尚書袁煒袁煒浙江慈谿人嘉靖戊戍進士及第授翰林院編修遷侍讀尋撰𤣥文甚稱上㫖自是眷遇日隆後以次遷掌南京翰林院事煒疏願留上悦擢侍講學士甫數月手詔進禮部右侍郎尋加太子賔客兼學士賜一品服㑹日食隂雲不見煒言不宜行救䕶禮禮卿吳山不從竟循例救䕶上以是不悦山而以煒為尊上山既罷即晉煒太子少保禮部尚書數日召入直南郊禮成疏請祈雪雪降上益悦加太子太保户部尚書武英殿大學士入閣輔政尋加少保復進少傅兼太子太傅建極殿大學士前後恩賜廷臣中鮮有其比者尋引疾歸行至安山卒訃聞賜祭塟贈少師諡文榮尚書嚴訥嚴訥字敏卿南直常熟人登嘉靖辛丑進士選為翰林庶吉士授編脩九載遷侍讀上日坐行宫為祠釐自大相以下皆應制有所撰述不給乃悉以翰林諸臣名覆之金甌而探之得二人訥與焉遂下制當撰述訥惶恐拜命旦夕恪恭其事以是得上心賞賚屢下俄為學士視院篆進太常少卿主己未㑹試遂進禮部左侍郎事其長恭有所禆賛皆絶不以語人尋改吏部遂進禮部尚書禮部所治多藩國封繼䘮塟之事一切為吏賄藪訥委其屬精覈之事取故典不輕為難易以是肅然亡敢挾賄進者知壬戍貢舉尋吏部以尚書闕請上即詔用訥訥自學士以至天官凢六轉皆不繇廷推俄召直西苑特加太子太保尋特勅進武英殿大學士仍視吏部事俟代者服除而後解始訥為學士時官五品上特賜鶴袍謂此一品服服之重祠釐而其後遂益賜之麒麟飛魚服以至繡蟒他尚方什器珎饌兼金楮幣之屬無虚月然素小心及居大位過自抑愈于庶僚時無何以賜直舎稍庳而近濕遂成中滿疾畏上嚴不敢亟請告首輔階為上言其病状始聽馳驛歸乆之卒賜祭塟如例諡文靖尚書陸樹聲陸樹聲字與吉直𨽻華亭人嘉靖庚子魁于郷明年辛丑舉㑹試第一廷對二甲第四選翰林院庶吉士壬寅歸省三載始北上授編脩庚戌廷試充掌卷官壬子丁父憂服闋乆之不出丁巳即家拜南京國子監司業一就職即請告歸辛酉起左春坊左諭徳掌留院篆旋召還坊不赴乙丑進太常寺卿管南京國子監祭酒事立教務持大體畧去煩苛先本實而後藝文其年秋進吏部右侍郎引疾不就穆廟即位特㫖起原官又屢疏辭己巳再起原官兼翰林院學士掌詹事府教習庶吉士赴召抵淮復請告返壬申即家拜禮部尚書兼學士疏辭不允時神廟初嗣位以碩徳清莭首膺簡召中外相賀遂以是冬詣闕蒞部率正僚屬引經誼以裁典禮操持凛凜無敢干以私北酋邀増嵗幣樞臣将許之樹聲以職力争不可樞臣竟不能奪時江陵當國樹聲以先進執禮不少屈尋抗疏乞歸温㫖勉留遣中使問賚及門請去益决疏五上乃得賜告乗傳歸瀕行疏陳十事皆關大計而辨宫府抑戚倖斥貂璫尤觸時忌江陵敗臺諫奉詔舉海内耆徳三十七人以之為首自是薦剡無虚嵗而髙卧彌堅終無世念戊子年八十詔撫按官奉彩幣羊酒及門存問已復加太子少保嵗給廪米輿夫戊戌年九十壬寅皇太子立凢兩遣官存問大臣三奉恩詔亦故事所未覩也尋卒享年九十有七訃聞上震悼立詔所司治塟賜祭贈太子太保諡文定樹聲為人脩長峭岸氣骨稜稜神襟遒朗舉止端凝終日燕居衣冠危坐不見跛倚之容持正深堅議論皆有根柢無少唯阿而寛容樂善常依長者不忍有所刻核登科六十餘年而家居者十之七始終一節士論髙之尚書萬士和萬士和字思節直𨽻宜興人嘉靖庚子舉于鄉明年成進士選讀中秘書屬分宜柄政絀之當署諫垣力請得儀制主事改南為兵禮二部郎中晉江西按察僉事遷副使督貴州學政歴叅政按察使左右布政使應天府尹道拜都察院右副都御史督南畿餉已遷户部右侍郎總督倉塲改禮部尋遷左㑹華亭罷相起新鄭遂引疾疏四上乃得予告歸神宗即位特詔以南少宗伯攝大司成事從民望也已大宗伯陸公樹聲致政去江陵欲傅公論收士譽遂召為禮部尚書士和見民間服用無度矍然曰轂下乃爾何以觀四方因條上崇儉數事㑹菑祲雜襲又奏杜倖門容戅直汰冗員抑干請以回天意語多切至觸時忌有方士倚大璫謀得官江陵主之士和持不可成國公薨江陵欲贈之王士和又力持不可於是江陵嗛之有阿陵意者劾其羸懦宜罷遂力求去竟賜傳歸江陵敗復起之南禮部而再疏引年特加資政大夫正治上卿致仕士和禔身嚴不錯寸趾蒞官不為赫赫名其當事蹇蹇有壁立萬仭之操其殁也天子為輟朝一日諭祭塟如例贈太子太保諡文恭尚書余繼登余繼登字世用直𨽻交河人嘉靖甲子以詩舉京兆萬厯丁丑成進士選庶吉士授檢討癸未分校禮闈是嵗纂修㑹典越五年書成進脩撰己丑充經筵講官旋擢右春坊右中允兼編脩簡直日講辛夘典試留都壬辰陞右諭徳兼侍讀癸巳轉左庶子甲午進少詹事兼侍讀學士充正史副總裁旋擢詹事掌翰林院事丙申拜禮部右侍郎戊戌知貢舉尋轉左郊廟大禮攝正卿以行時禮卿闕且二年廷臣所推舉無慮數十上皆留不下及再始以繼登名上名又在後上竟用焉在位執法守政夙夜勤恪遇天地大菑時政闕失抗事力諫無少規随戊戌嵗終舉奏四方所報地震雷火及西寧鐘自鳴紹興地出血二氣舛錯古所未有今郡國元元苦征調酤𣙜織造開採抑欝無聊易動難安幸上心惟天心圗謝過之實疏入報㫖惕然明年九月太白經天狄道山崩湧出山五復上言方今星躔失度水旱為沴鑿山開礦地藏空虚不能固脉山崩川竭陵谷變遷閭閻窮困郡邑蕭條戾氣凝而不散怨毒結而成形甚可憂也臣子不能動君父言愈數愈厭陛下為天之子天以非常譴告尚可恬然數日不報繼登見士習文體日趨浮詭深用為憂上言今俗不遵聖經倡為異説竊佛氏諸言爚亂耳目謂經籍傳註皆為糟粕倫理法度皆為虗幻惟一了此心則踰閑蕩檢無害性真後學小生轉相崇尚雜入制義名為新説甚悖理傷化宜絶其端勿使進奉㫖挈為功令下學官釐正焉公自署部時請元子冠婚疏凢九上及正卿席並請建儲又至八疏病甚猶伏枕視草乆之上意感動勅所司為具将行大禮而竟以疾卒于位訃聞上深嗟悼詔贈太子少保諡文恪賜祭塟如例遣使䕶其喪歸禮部志稿卷五十四
