body:
  text: 禮部志稿卷六十四明俞汝楫編章服備考文武冠服初定冠服志洪武元年禮官議上冕服以下制并及羣臣公侯以下朝祭冠服周制公侯伯以下朝祭皆用冕服燕居則用玄端服公侯伯子男朝天子則執圭以合瑞明帝時公卿列侯朝覲皆玄端絳衣其助祭三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇履玄衣纁裳冕皆廣七寸長一尺二寸前圎後方朱緑裏玄表前垂四寸後垂三寸繫玉珠為九旒以其綬采色為組纓三公諸侯青玉珠卿大夫五旒黑玉珠皆有前無後郊天地祀明堂則服之唐羣臣助祭一品衮冕二品鷩冕三品毳冕四品繡冕五品玄冕六品至九品爵辨其朝服陪祭朝會大事則服之公服朔望朝謁見皇太子則服之辨冕尋常公事服之武官常服平巾幘袴褶笏三品以上前屈後直五品以上上挫下方用竹木宋羣臣助祭親王中書門下服九旒冕九卿七旒冕四品五品五旒冕為獻官則服之大祝奉禮服平冕無旒其朝服用梁冠一品二品侍祠朝會五梁冠諸司三品御史臺四品兩省五品三梁冠四品五品兩梁冠中書門下則五梁冠加籠巾貂蟬御史大夫中丞三梁冠加獬豸衣有中單六品以下兩梁冠無中單去劎佩綬常朝公務一品至三品服紫玉帶四品五品服緋金帶六品七品服緑銀帶八品服鍮石帶元豐制去青服紫者佩金魚服緋者佩銀魚今斟酌唐宋凡朝賀辭謝等禮皆朝服用赤羅衣白紗中單皆用皂飾領緣裳與衣同皂緣蔽膝同裳色大帶用赤白二色革帶佩綬白襪黑履梁冠一品公侯三師及左右丞相左右大都督左右御史大夫冠八梁國公加籠巾貂蟬從一品平章同知都督七梁其帶用玉鉤䚢錦綬上用緑黃赤紫四色絲織成雲鳯花樣下結青絲網小綬用玉環二二品冠六梁革帶用犀鉤䚢小綬用犀環綬同一品從二品冠五梁革帶用金鉤䚢錦綬用黃緑赤紫四色絲織成雲鶴花樣小綬用金環二三品冠四梁革帶綬環俱同四品五品冠三梁革帶用鍍金鉤䚢錦綬用黃緑二色絲織成鸂鶒花樣小綬二用銅鐶二其笏五品以上用象九品以上用槐木其陪祀祭服制與朝服同惟衣色用青加方心曲領朔望朝見及拜詔降香侍班有司拜表朝覲則用公服皆赤色一品服大獨科花直徑五寸玉帶二品小獨科花直徑三寸花犀帶三品散答花直徑二寸金帶鏤葵花一蟬八四品小雜花直徑一寸五分金帶鏤葵花一蟬六五品花同四品金帶葵花一蟬四六品七品花同五品直徑一寸銀帶六品鍍金葵花一蟬三七品鍍金葵花一蟬二八品九品無花通用光素銀帶笏同前制幞頭靴並如宋元常服用烏紗帽金繡盤領衫文官大袖濶一尺武官弓袋窄袖紵絲綾羅隨用束帶一品以玉二品犀三品金鈒花四品素金五品銀鈒花六品七品素銀八品九品角命婦冠服周制追師為外內命婦之首服鄭玄云外內命婦衣鞠衣袒衣者服編衣褖衣者服次內司服辨內外命婦之服鄭玄云內命婦九嬪鞠衣世婦展衣女御褖衣外命婦其夫孤也服鞠衣其夫卿大夫也則服展衣其夫士也則服褖衣三夫人及公之妻其服闕翟以下乎侯伯之夫人褕翟子男之夫人亦闕翟二王之後褘衣漢制朝會公卿列侯二千石夫人首飾紺繒幗簪珥服用蠶衣唐首飾兩博鬢飾以寶鈿服用翟衣一品花叉九樹翟九等二品花叉八樹翟八等三品花叉七樹翟七等四品花叉六樹翟六等五品花叉五樹翟五等寶鈿視花叉之數翟衣青質繡翟編次於衣及裳一品翟九等二品翟八等三品翟七等四品翟六等五品翟五等並青紗中單黼領朱縠褾襈裾蔽膝隨裳色以緅為緣領加文繡重雉為章二等大帶衣色青衣革帶青襪舄佩綬宋制青織羅為衣繡為翟編次於衣及裳素紗中單今擬依唐宋制度惟色不用青隨其夫與子之服色唐宋命婦一品至五品今制一品至七品其六品七品母妻既命於朝冠服亦當一體六品兩博鬢花叉四樹翟四等寶鈿如花叉之數七品兩博鬢花叉三樹翟三等寶鈿如花叉之數餘同前製諸命婦私居服并八品九品未命之婦並用團衫繫腰不許仍用異俗服兩截短衣議定以聞上覽之曰卿等所擬殊合朕意但公爵最尊而朝祭冠服無異侯伯以下於禮未安今公冠八梁侯及左右丞相左右大都督左右御史大夫七梁俱加籠巾貂蟬餘從所議尋命朝服衣裳中單領緣俱用青祭服領緣仍用皂其公服一品至四品赤色五品至七品青色八品以下及未入流雜職俱緑色大帶一品用玉二品花犀三品四品用金以荔枝為花五品以下用銀八品以下用角官員家屬冠服洪武元年十二月癸未詔定官員親屬冠服之制禮部尚書崔亮等議凡內外官員父兄伯叔子孫弟姪用烏紗帽軟腳垂帶圎領衣烏角帶在外閽者員領衣烏角帶帽四角稍垂內外衙門𨽻卒烏紗平頂巾雙環圎領衣用紬絹布繫腰黑革帶銅鐵骨角束子軍士隨軍裝擩手與𨽻卒曽經委用間良官員用烏紗帽軟腳垂帶員領衣烏角束帶從之初製朝服公服洪武三年命省部官會太史令劉基參考歷代朝服公服之制凡大朝會上衮冕御殿則服朝服見皇太子則服公服仍命制朝服公服以賜百官朝臣服色依品級洪武三年給賜朝臣袍帶凡二千八百一十三人先是禮部言各官有先授散官與見任職事髙下不一者如監察御史董希哲前授朝列大夫灃州知州而任七品職事右師郎中宋冕前授亞中大夫開封知府給事中李仁前授亞中大夫黃州知府而並任五品職事散官與見任之職不同故其服色亦不能無異乞定其制乃詔省部臣定議於是禮部奏唐制服色皆以散官為準元制散官職事各從其髙者故服色亦因之國朝初服色並依所授散官蓋與唐制同上曰自今服色宜準所授散官不當計見任之職於是所賜袍帶皆從原授散官給之命婦霞帔洪武五年詔中書省臣及禮部所擬文武官命婦服飾用大衣霞帔既合古制霞帔以金繡之文為等第若民間婦人禮服惟以素染色絁不用文繡外命婦冠服洪武四年五月定外命婦朝服之制先是上以古者天子諸侯服衮冕后與夫人褘翟今羣臣既以梁冠絳衣為朝服不敢用冕則外命婦亦不當服翟衣以朝命禮部議之至是禮部奏外命婦以山松特髻假鬢花鈿真紅大袖衣珠翠蹙金霞帔為朝見之服以珠翠角冠金珠花叉濶袖雜色綵緣為燕居之服洪武五年十一月定命婦團衫之制以紅羅為之繡重雉為等第一品九等二品八等三品七等四品六等五品五等六品四等七品三等其餘不用繡雉品官家用服洪武六年詔定品官家用祭服公服上諭禮部臣曰古者士大夫祭宗廟亦有祭服其見私親尊長亦必有公服其議制度等殺以聞於是定議品官之家私尊長而用朝君公服於理未安宜别製梁冠絳衣絳裳革帶大帶白襪烏舄佩綬其衣裳去緣襈三品以上用佩綬三品以下不用其祭服三品以上去方心曲領三品以下并去佩綬從之仍令如式制祭服賜公侯各一襲以為祭家廟之用使外國服色成化七年戶科都給事中邱𢎞行人韓文奏凡使外國者例賜侯服色自備鈒花金帶至其國則繫之今臣等奉使琉球欲從衆則事涉擅専欲遵制則官止七品服色不稱乞賜鍍金花帶以壯國威事下禮部尚書鄒幹等覆奏以為無例而止忠靜冠服嘉靖七年上既製燕辨服諭張璁曰古尚儉今尚華古玄端通於上下兹為等威辨之卿其承朕志璁言古玄端用廣達於上下今品官燕居競為竒服以亂典章乞如玄端别為簡易制以昭布天下上因製忠靜冠服併以圖册示禮部敕諭曰我祖宗稽古定式凡享祀郊廟視朔視朝辨冕裳服至於品官朝祭服公服常服各有等級不可變比年以來衣服詭異達官顯士與市井同走卒役厮與儒流並上下無辨民志何定禮曰衣服在躬不知其名曰罔又曰不學雜服不能安禮朕制曰燕辨善與人同令從君出故欲警於有位因復酌古玄端制更名曰忠靜庶幾乎進思盡忠退思補過也夫君子大復古重變古非泥古也因時制宜各有法象意義宜令如式製造在京許七品以上官及八品以下翰林院國子監行人在外許方面官及府堂官州縣正官儒學教官服之武官止都督以上許服其餘不得濫服至於詭異之服悉行禁革夫衣裳在笥所以尚賢車服以庸所以昭德爾羣臣尚當稽名見義期成峩峩之譽無侈楚楚之容如敕行保和冠服嘉靖七年十月甲子遼府光澤王寵滚奏聖製燕辨忠靜冠服中外臣工受賜得服者咸以為榮乞并賜宗親官屬章下禮部議上曰俟别製頒行十二月上諭禮部朕惟帝王制禮推已及人施自親始朕以王道在謹獨故酌古玄端之制命之曰忠靜冠服錫於有位朕已嘗及宗室諸王其制尚未備欲圖之未遑今光澤王所請有獲朕心朕因酌燕辨及忠靜冠之制為之製式使之上無所僣下無所逼其載圖説名之曰保和冠服夫上下之分猶天地之不可易各知其分然後能相保而國家治安令自郡王長子以上其製式開載已明鎮國將軍輔國將軍奉國將軍鎮國中尉輔國中尉奉國中尉以及左右長史審理正副紀善教授伴讀等官俱宜照忠靜冠服以品官之制服之其郡縣鄉君儀賔雖各有品級然非儒官比不得概服其餘各官不許服以防過濫於戲親欲貴也愛欲富也故禮制宜從敦崇名以命之器以别之故品節不容假借夫忠靜冠服品式之不同者尊賢之等也保和冠服品式之不同者親親之殺也等殺既明名分攸定庶幾知所保矣保斯和和斯安此錫名之義也孟軻氏曰樂天者保天下畏天者保其國禮部以其説頒布諸王府如敕遵行禮部隨以圖册刋刻進呈上覽之分諸王府頒布天下品官祭服洪武元年定凡上親郊廟社稷文武官分獻陪祀則服祭服與朝服同惟衣色尚青加方心曲領品官朝祭服嘉靖八年十二月丁丑上親定百官朝祭服圖式詔禮部摹板繪采頒行中外初章服定制載在會典及內祕圖沿久而訛衣襲乎裳無上下之辨帶綴於鞞無繚約之制環有金玉等級槩織於綬略似環形綬隨品級花樣但取華美任意粧飾裳之襞積煩簡不同佩惟玉璧銅鋚雜用每遇朝賀祭祀服人人殊及上更制衮冕百官承訛如故會聖旦給事中戴儒請明降定式以便習儀禮官按祕圖會典酌以今上所定冕服説草上圖注不稱旨上乃諭內閣親定公服所用革帶照舊朝祭服大帶表俱素兩耳及下垂緣以緑色就以蔽膝佩玉更復古制裳并三齊如禮官所言且令議方心曲領名義於是禮官言方心曲領始於隋時非古也上曰方心曲領古制不傳况始自隋豈可襲用宜革之餘如圖注通行中外職官遵行毋得違越仍會議各王府一體更正朝官履洪武六年二月命朝官製常服禮鞋先是百官入朝遇雨皆用釘靴進趨之間聲達殿陛侍儀司官以為不肅請禁之上曰古者朝臣入朝有履自唐以來始用靴行之已久不可猝變宜令各官為軟底皮鞋籠於靴外出朝則釋之內使冠衣洪武元年十二月定內使冠服制凡內使冠服烏紗描金曲角帽衣用背花圑衫窄袖衫烏角束帶靴用紅扇面黑下樁外人不許相同洪武三年冬十月壬戌重定內使服飾之制上諭宰臣凡內使監未有職名者當别製冠以别監官禮部定擬內使監凡遇朝會依品具朝服公服行禮其常服葵花胸背團衫不拘顔色烏角束帶烏紗帽犀角帶其內使無品從者常服團領衫無胸背花不拘顔色烏角束帶烏紗帽垂軟帶年十五以下者惟戴烏紗小帽從之宫人冠服洪武四年定宫人衣用紫色團領窄袖遍刺折枝小葵花以金圈之珠珞縫金束帶紅裙弓樣鞋上刺小金花烏紗帽飾以花帽額綴團珠結珠鬢梳垂耳飾外國陪臣冠服宣德三年冬十月賜朝鮮國世子六梁冠一先是朝鮮國王李祹奏洪武中蒙賜國王冕服九章陪臣冠服比朝臣遞降二等蓋陪臣一等比朝臣第三等得五梁冠服永樂初先臣芳逺遣世子禔入朝蒙賜五梁冠服臣切惟世子冠服乃同陪臣一等乞為定制上從之故有是命雜流冠服侍儀等冠服洪武二年詔定侍儀舍人及校尉刻期冠服禮官議曰古者朝覲必有儐相之職公西華端章甫者儐相之服也漢唐以下置謁者凡朝會掌引導行禮漢用玄冠絳衣唐用武辨絳公服宋謂之禮直官用公服元謂之侍儀舍人用展腳幞頭窄袖紫衫塗金帶皂靴其校尉即周官太僕𨽻僕掌王之出入警蹕者其服制禮書不傳漢晉衛士有朱衣絳袍黑袴褶之制唐執伏之士首服有武辨平巾幘錦帽金鵝帽花腳幞頭黃絁巾抹額其服有朱色繡袍大袖勒帛諸色繡兩襠大口袴銀帶繡戎服諸色繡寶相花衫革帶碧衫抹金銅帶錦螣蛇宋執仗之士大略與唐同元執仗士首服用交腳幞頭鏤金額交腳幞頭五服絁巾展腳幞頭鳯翅唐巾其服有紫梅花羅窄袖衫塗金束帶白錦汗袴緋繡寶相花窄袖衫生色寶相花袍勒帛雲龍靴佩寶刀紫羅辮線襖今擬侍儀舍人導禮依元制用展腳幞頭窄袖紫衫塗金束帶皂紋靴常服烏紗帽盤領衫校尉執仗亦依元制首用金額交腳幞頭諸色辟邪寶相花裙襖銅葵花束帶皂紋靴刻期冠方頂巾衣胸背鷹鷂花腰線襖諸色濶匾絲絛象牙雕花環行縢八帶鞋制曰可侍儀服洪武四年二月乙卯朔侍儀司言文武百官朝服各從品級侍儀舍人引班執事宜有定制乃命中書省定擬侍儀舍人并御史臺知班引禮執事冠進賢冠無梁服絳色衣其蔽膝及履襪革帶大帶槐笏與九品同惟不用中單從之齋郎舞生冠服洪武五年十月己丑命擬齋郎樂生文武舞生冠服之制齋郎黑介幘漆布為之無花樣服紅絹窄袖衫紅生絹為裏皂皮四縫靴黑角帶文武舞生及樂生黑介幘漆巾為之上加描金蟬服紅羅絹大袖袍胸背畫纒枝方葵花紅生絹裏加錦臂鞲二皂皮四縫靴黑角帶武舞生武辨以漆布為之上加描金蟬服飾靴帶並同文舞生雜流官冠服洪武四年冬十月甲午定未入流冠服凡在外諸處提控案牘及吏目典史稅課司閘壩等官冠服皆準侍儀舍人冠無梁服赤羅服青緣飾赤羅蔽膝烏角帶紅白大帶槐木笏白襪黑履不用中單去佩綬未入流官用公服洪武二十四年浙江按察使司僉事解敏言舊制凡各處未入流官遇朝賀進表用烏紗帽紅圎領衫黑角帶陪班行禮今制在京一品而下至雜職俱用公服而在外未入流官仍如舊制於禮未宜請得如在京例上可其奏詔在京在外未入流官凡遇行禮皆具公服在外未入流品官祭服洪武二十九年六月丙子詔在外未入流官陪祭俱用祭服先是淮安鹽城縣儒學教諭王孟上言公服以朝祭服以祀今在外凡祀山川諸神流官具祭服未入流官具公服然公服既於朝賀迎接諸禮用之而又服以祀神理有未宜且未入流官公服之制自八品以下皆同則祭服亦宜與之同上是其言詔自今未入流官凡祭皆用祭服與九品同士庶冠服四方平定巾洪武三年命製四方平定巾式頒行天下初上既即位更制度凡官民男女衣冠服飾悉復中國之制至是又以士民所服四帶巾未盡善復製四方平定巾頒行天下令士人吏民咸如式製服之皂𨽻伶人如初所定以異其制生員巾服洪武二十四年上以學校為國儲材而士子巾服無異吏胥宜有以甄别之命工部製式以進上親視必求典雅凡三易其製始定自是士子衣冠綽有古風軍士服色洪武二十一年九月戊寅定中外衛所步軍士服色惟駕前旗手一衛用黃旗軍士力士俱紅袢襖凡袢襖長齊膝窄袖內實以棉花旗幟各分記號用青藍為邉玄黃黑白間色俱不得用凡為旗幟衣裝布絹綿花蘇木棗木之類皆官給之毋令軍士自備僧道服色洪武十五年十二月乙酉定天下僧道服色凡僧有三曰禪曰講曰教禪僧茶褐常服青條玉色伽裟講僧玉色常服深紅絛淺紅袈裟教僧皂常服黑絛淺紅袈裟僧官如之惟僧録司官袈裟緣文及環皆飾以金道士常服青法服朝衣皆用赤色道官亦如之惟道録司官法朝服衣緣文飾金凡在京道官紅道衣金襴木簡在外道官紅道衣木簡不用金襴道士青道服木簡冠服禁令服色禁制洪武二十三年三月甲子定官民服飾先是上見朝臣衣服日就短窄有乖古制乃命禮部尚書李原名國子司業龔斆參酌時宜俾存古意原名等議定文官衣長自領至裔去地一寸袖長過手復回至肘袖樁廣一尺袖口九寸公侯駙馬與文職同耆民儒士生員同文職惟袖過手復回不及肘三寸庶民衣長去地九寸袖長過手六寸袖樁廣一尺袖口僅出拳軍人衣長去地七寸袖長過手五寸袖樁廣不過一尺窄不過七寸袖口僅出拳從之頒示中外洪武二十二年十二月申嚴巾帽之禁凡文武官除本等紗帽外遇雨許戴雨帽公差出外許戴帽子入城不許其公差人外出外者亦如之將軍力士校尉旗軍常戴頭巾或榼腦官下舍人并儒生吏員民人常戴本等頭巾鄉村農夫許戴斗笠蒲笠出入市井不禁不親農桑者不許景泰四年令錦衣衛指揮侍衛者得衣麒麟服色從錦衣衛指揮同知畢旺授永樂中例請也天順二年令官民人等衣服勿用蟒龍飛魚斗牛大鵬像生獅子四寶相花大西番蓮大雲花樣并玄黃紫及玄色樣黑緑栁黃薑黃明黃等色成化三年令官民人等勿僭用服色花樣𢎞治元年正月禮部覆左副都御史邉鏞言乞禁內外官僭乞蟒衣按國朝品官服色無蟒衣之制考之爾雅韻書蓋蟒乃蛇屬非龍類蟒無角足龍則角足具焉今織蟒為龍形請如鏞言凡內外官無間新舊悉令盡繳不許織造上是之命原受賜者聽其服用餘悉令還官此後不許再乞嘉靖六年令在京在外官民人等不得濫服五彩粧花織造違禁顔色及將蟒龍造女衣夷人不許擅買違式衣服十六年令在京在外文武官員其大紅紵絲紗羅服惟四品以上官及在京九卿翰林院詹事府春坊司經局尚寶司光祿寺鴻臚寺五品堂上官經筵講官得服其餘俱青緑錦繡遇吉禮紅布䘬褐洪武三十年令致仕官服色與見任同若遇朝賀及謝恩見辭具服行禮凡年老致仕及侍親辭間官員許用紗帽束帶若為事黜降者服與庶人同凡官民服色冠帶貴賤有等上可兼下下不可僭上官員致仕與見任同其祖父有官身殁非犯除名子孫許居父祖房舍衣服車馬比祖父同職官一品至四品帽頂帽珠繫腰用金玉珠寶粧飾五品六品帽頂許用金玉帽珠用珊瑚琥珀繫腰用金銀犀角帶七品至九品帽頂許用銀或鍍金帽珠用水晶琥珀繫腰用銀減鐵以上帽子帽花許用製造字樣及龍鳯文靴子通用金綿花樣申明靴禁洪武二十四年七月壬申申明靴禁先是常禁民間製靴不許裁為花樣及以金線裝飾而富商大賈姦民猾胥末技賤工及軍中無賴少年往往冒犯恣為淫巧裁為花樣嵌以金線藍條蔑敦朴之風亂貴賤之等甚者詐為公侯大臣家子姪出入市中為姦利事聞詔禮部嚴禁之惟文武百官并同籍父兄伯叔弟姪子壻及儒士生員吏典知印承差欽天監天文生太醫院士瑜珈僧正一道士將軍散騎舍人帶刀之人正伍馬軍總小旗教讀大誥師生許穿靴同其北平山西山東陕西河南并直𨽻徐州地寒人民許穿牛皮直縫靴出外不許其庶民商賈技藝步軍及軍下餘丁管步軍總小旗官下家人火者皂𨽻伴當在外醫卜隂陽人皆不許止許穿皮扎䩺鞋違者罪之題禁詭異巾服嘉靖十四年四月內禮部題該提學御史寶一桂題為禁革詭異冠服以昭聖製以齊風俗事奏詭異巾服自嘉靖七年三月二十七日特敕禮部分别以其圖説頒布天下嚴禁異服天下之人風俗丕變無敢為詭異冠服者夫何邇來有犯禁諭私家慕效製東坡巾著雲履及各色異樣巾服者其巾或有紵絲羅絹甚至以氊為之不惟舉人監生生員儒士凡市井屠販一切庸賤之徒間亦戴之此所謂詭異之服也今見輦轂之下縱橫衢路漫無畏忌在京如此在外可知矣乞敕都察院嚴行禁革等因題奉聖旨這本説的是比年冠服詭異已有旨禁革生儒人等乃敢違禁製用好生不畏法度都察院便出榜曉諭但有巾服異樣并製賣的著緝事衙門及五城兵馬即時拿送法司問罪仍通行南京都察院及各處巡按御史一體嚴加禁約該衙門知道欽此申明官員服色限制嘉靖十六年三月內禮部題欽遵聖訓慎法制以嚴禁僭肆事該本部欽奉聖旨欽遵之議得在京在外文武官員除本等品級服色及賜者外不許僣分自恣擅用蟒衣飛魚斗牛等項違禁華異服色及大紅紵絲紗羅服惟四品以上官及在京九卿翰林院詹事府春坊司經局尚寶司光祿寺鴻臚寺五品堂上官經筵講官其餘皆穿緑青錦繡遇有吉禮止許穿紅布絨褐其品官花樣仍照品級公侯駙馬伯麒麟白澤文官一品仙鶴二品錦雞三品孔雀四品雲鴈五品白鷴六品鷺鷥七品鸂鶒八品黃麗九品鵪鶉雜職練鵲風憲獬豸武官一品二品獅子三品四品虎豹五品熊羆六品七品彪八品犀牛九品海馬不許混同錦衣衛指揮侍衛者得穿麒麟服色其餘帶俸及不係侍衛者俱不許僣用其軍民人等除官應用之家許令織造其私下與不應用之物不許製造及擅用違禁華異服色若有仍前僣用者在京聽科道及緝事衙門在外聽巡按等官照依律例參究題奉聖旨是依擬便出榜文嚴加禁約欽此印制備考給印換給印記凡內外各衙門印信年久篆文平乏不堪用使具奏鑄換候領新印然後以舊印繳凡司府州縣奏換印記本部積收奏抄或三顆或五顆類奏其有火盜遺失例該特奏者單題先年題凡新鑄印記本部置印模簿一扇將鑄完印記照顆用使存照仍令置南京印模簿一扇候每年終咨送南京禮部轉行該局收貯備照凡各處奏繳舊印俱赴通政司驗進其申呈批文并舊印赴本部投納隨發鑄印局驗封鎖有無完固封印新印文是否真正中間恐有差人私拆官封盜用情弊𢎞治十四年議準在外大小衙門印記年久印面平乏篆文糢糊者方許申知上司驗實具奏鑄換新印其舊印送上司付公差人員繳部仍發鑄印局看驗若印記新降未久捏奏煩擾雖已鑄換仍將申奏官治罪嘉靖二十九年閏六月湖廣布政司咨批差承差劉啓爵繳送沙湖驛記一顆到司查無該衙門新記封鎖審據本役回稱係通政司經厯司開拆該本部題奉看得近年各處差來繳印人員不遵舊例將舊印混送通政司經厯司自行開拆另封前來以致稽查不便難以防杜姦弊以後如遇奏繳舊印除奏本經厯司驗收封進外其舊印有混送到司者就便責付本役送部查繳不必先行拆動以防弊端奉聖旨是欽此請給關防凡差委官員請給關防本部如查有繳部見在者即題請給發如無見在請乞欽定字樣另行鑄造給發用使凡審録各項關防俱係內府印綬監經收如遇各部差官取用本司即具手本差司官一員齎赴本監領出給發如係本司新鑄關防亦差官送本監挂號然後給發凡各衙門繳進關防本部差司官一員齎赴內府印綬監收貯嘉靖二十九年九月該贊理京營軍務兵部左侍郎王邦瑞題稱欽命贊理經營務原無印信掌管似應比照各鎮總官挂印及巡撫給與關防事例鑄給關防一顆以便行事該本部題奉聖旨關防不必用事總於一京中外不同外面總都官只名總督京營戎政某官不得名總兵字樣欽此嘉靖三十五年六月該巡撫應天右僉都御史張景賢題稱欽降關防篆文係巡撫蘇松等處關防八字要政作應天等府字面奉聖旨禮部知道欽此本部看得前事查無舊例蓋順天應天皆為京府輦轂所臨非列郡可比故纍朝欽降關防其巡撫順天地方止云巡撫薊州等處而無順天等府字樣則應天可以例推臣等不敢擅擬改給覆題奉聖旨是欽此嘉靖三十五年六月該南京守備掌中府事撫寧侯朱嶽等奏乞要比照內守備操江衙門事例頒給關防用使本部查照南京守備廳衙門自設立以來並無鑄給關防等事例但留都實國家根本重地守備尤地方責任專官見今東南多警文移旁午軍務所關允宜專一所據朱嶽等奏請事宜委應鑄造以便行事伏乞欽定字樣本部鑄給用使等因覆題奉聖旨與做南京守備關防欽此奏給印記嘉靖三十二年五月該裕王府承奉正韓保景王府承奉正黨霖俱奏給承奉印信本部查得舊例衡王𢎞治五年之國十二年該王奏討本府承奉司印信榮王𢎞治十二年之國十六年該王奏討本府承奉司印信俱該本部覆題鑄給今看得裕王等府承奉正韓保等奏乞印信遵依查照衡府榮府舊例待王之國之後具本題請照例鑄給行使奉聖旨是欽此嘉靖三十二年十一月該瑞王昌榮安王孫輔國將軍拱奏稱臣父鎮國將軍宸滁於嘉靖四年請乞教授蒙準除一員又於嘉靖八年奏討教授印信亦蒙準給今臣父故所有前項印信臣與父職爵不同奏乞鑄換等因奉聖旨禮部知道欽此本部查照瑞昌等府鎮國等將軍教授印信之給先因宸濠亂後宗室數多而弋陽王初屬統攝事未歸一是以題請鑄給今各將軍分附各府管束則一應事務自當屬於分附府分輔導之官况郡王子孫官職世降輔國將軍以下原無設教授之例印信豈得一概鑄給所據二府將軍教授印信應并查革及移咨吏部將瑞昌宜春二府教授查有見在行令於原府帶俸聽侯改選以後裁革不必推補其印信作速奏繳一應事務照依三十一年題準得奉欽依事理悉聽分管郡王管理并附該府教授承行等因覆題奉聖旨是欽此造印造辦各印凡鑄真人金印在內各衙門銀印在外各布政司都司銀印俱照定例行一具手本四本差辦事官齎赴內府關領銀兩送赴六科廊鑄造其銀即係內府所差長隨經收一具手本三本差辦事官齎送內府司禮監稟請內官一員公同本部委官監督鑄印局官儒匠役鑄造一合用池匣袱褥縧銷等件咨工部造辦一合用木炭等項物料劄順天府轉屬於無礙官銀內支給買完送部應用仍將支過并餘剩還官銀兩數目開報戶部知會一每印一顆合用木炭五百斤烏梅四斤黃蠟一斤松香二斤硼砂一斤熖砂一斤明二斤潞州大貫四個一金銀分兩數目欽賜真人金印用金二百五十兩王府鍍金銀印用銀一百五十兩內閣銀印用銀九十兩征西鎮朔平羌平蠻等將軍銀印九十兩宗人府五軍都督府銀印用銀一百兩六部都察院并在外各都司銀印用銀九十兩衍聖公張真人中尉留守司并各布政司銀印用銀九十兩順天府應天府銀印用銀九十兩印例繳印收銷凡遇王府繳進金印銀印本部先期題知候命下差司官一員齎赴內府六科廊鑄印長隨轉送內府內承運庫收銷其各布政司等衙門奏繳銀印亦照例行一送手本三本二本送司禮監知會一本送承運庫知會遺失印記嘉靖二十九年十月該上林苑監佐監丞王𢎞久等題稱良牧署署丞陳讓被劫賊殺傷搶去印信一節奉聖旨該部知道欽此該本部覆題行查續經勘明題準免究其印信鑄造給發所失舊印尋訪獲日奏繳等因具題奉聖旨是欽此牘式備考奏牘風憲官寫奏題本成化二年禮部奏監察御史趙敔言內外風憲等衙門官出巡行事遇有機密事情及糾劾姦邪自書奏題本多有不熟韻體不免倩人代筆往往因而泄漏有誤事機請自今重事仍依韻式寫奏常事從便書寫許用題本今議得在外衙門宜一體具奏如舊制其京官公差在外者應行事務照例依韻書寫奏本若是緊急密切事恐有泄漏許寫題本務要字畫真楷不許草率從之題疏稱藩王諱嘉靖十年楚王榮㳦以諸司疏文直書親王名諱殊乖體統乞禁止之下禮部議請自今凡備録諸王奏疏及所司題奏疏內一切不諱以遵君前臣名之義其諸勘合劄付等項類止許稱爵不得書名報可王府奏疏稱式嘉靖十一年禮部奏王府慶賀奏稱纍朝皆有體式凡皇帝表文例稱聖旦奏疏稱萬壽聖節皇太后壓於太皇太后表文例稱令旦不壓於太皇太后亦稱聖旦奏疏稱令節今諸王府所奏諸辭徽稱有乖名分請以徽稱體式申諭諸王以後不許違錯報可建議章疏體嘉靖四十四年禮科都給事中辛自修言人臣祗慎而後朝廷之體尊邇來題奏章疏競為縟艷不惟九重清覽難於遍詳而事體處分反以文晦甚者以伺察為能至以鄙褻醜穢之語載之牘中尤非對君之體乞敕禮部轉行內外百司自後一應章奏須言簡事核務持大體不許仍前瑣屑沉冗如違聽該科參治上深然之乃詔以後章奏俱務簡明質實有如前欺肆者科臣以聞定表賀疏謝格隆慶元年南京戶部尚書馬森以升秩具疏謝上報聞因命禮部查官員升遷并一應謝疏當停免者俱酌議遵守至是禮部議在京文武百官凡遇册立等太禮合進一箋表及聖節正旦冬至等節止於丹殿前致賀一應升遷賞賜既經面恩或謝者俱不得治本稱謝南京并在外五品以上衙門及各總兵官凡遇三大節進表慶賀俱照常例行或值册立等大禮例該慶賀者須待本部題允方許撰表齎進其總督撫按俱不得違例進表稱賀南京五府掌印官六部都察院堂上官大理寺正官及各處總督巡撫官皆係重臣一應升遷及經論劾慰留其或軍功受賜邉鎮給賞等項既不得廷謝仍許具疏三司將佐等官一同受賞者總兵督撫即與併謝不得另具奏疏其疏務明白簡直不得牽合四六之體務為浮靡之辭有不遵守者聽本部及該科指實參奏詔如議行朝覲即齎進表文隆慶元年禮部覆都給事中何起鳴奏隆慶二年天下來朝官即齎進萬壽聖節表文不必别委自從朝覲年悉遵此例從之奏疏便省覽隆慶三年禮部覆給事中王之恆御史趙焞奉請上御便殿令九卿科道官有大事皆得面奏取自宸斷其疏中語言字畫務便省覽得旨今後諸司章奏務詞語簡明字畫楷大如嘉初年式便殿面奏候旨行表箋箋文勿用虛詞洪武元年春正月辛丑上謂中書省臣曰古人祝頌其君皆寓警戒之意邇觀羣下所進箋表頌美之辭過多規戒之言未見殊非古者君臣相告以誠之道今後箋文只令文章平實勿以虛辭為美也重定進賀表箋儀洪武十四年重定進賀表箋禮儀凡萬壽聖節正旦冬至在外各衙門先期拜表稱賀至期前一日文武官於本衙門內齋沐宿歇至日於所在大衙門內會同文武官具服告天祝壽禮其天壽聖節在外五品以上衙門止進表文一道正旦冬至加中宫皇太子箋文各一通王府布政司按察司直𨽻府州表箋俱差官齎進禮部在外則州進於府府進於布政司凡五品衙門𨽻布政司者亦進於布政司類進禮部各都司及直𨽻衛所差官齎進五軍都督府各處守禦指揮使司千戶所進於都指揮使司差官類進五軍都督府至日禮部以各處表箋自通類奏啓其表箋文詞不得用駢儷務在典雅其有御名廟諱依古禮二名不偏諱嫌名不諱凡凶惡字樣俱用回避仍以硃筆圈點句讀用黃紙箋紅紙為函頒表箋文式洪武二十九年秋七月頒表箋文式於天下先是天下諸司所進表箋詞體駢儷上厭之命翰林院學士劉三吾右春坊右贊善王俊華撰慶賀謝恩表箋成式頒於天下諸司凡遇慶賀謝恩如式録進更改表箋式宣德元年行在禮部奏洪武中降表箋式於天下中有御名依古二字不偏諱之例今各處録進或以他字代之不成文理請與翰林院計議更改使天下遵守從之申明進賀表箋儀宣德四年令在外慶賀如洪武初舞蹈山呼十四拜凡進賀表自親王各一總兵各一朝鮮國王南京禮部等衙門一浙江等布政司按察司直𨽻府州等衙門各一南京中軍等都督府一中都留守司浙江府都司直𨽻衛所等各一定進表宫例正統二年定天下諸司進表例先是行在禮科給事中李性等劾奏山西等處都布按三司等衙門官員不躬進表請治其罪上姑宥之命禮部議為定例於是尚書胡濙等請自今惟聖節表令堂上官躬進正旦冬至節遣首領官及所屬佑二官代行查參表箋凡天下各衙門齎到表箋本部先期行國子監取監生四名參看除土官衙門不究外其餘各衙門表箋中間有違式及汚漬漏印錯落字樣并過期不到等項參出送司呈部除將齎到表箋類進隨行參治候命下本部移咨都察院轉行各該巡按御史通行查提到官問擬應得罪名照例發落過期不到表箋通行補進其極邉地方照例免究開坐題請定奪嘉靖二十九年九月該福建行都司署都指揮僉事顧邦重進萬壽表文順帶屯牛文册該工科參本官奏報文册既違限期且入賀大典豈容兼理他務難逃不敬等因本部覆題合咨送法司問擬應得罪名奉聖旨是欽此嘉靖三十二年南京禮部等衙門差大理寺評事張淑名齎捧元旦表文旦後方進慶賀本奉聖旨這賀本過期方到禮部參看了來説欽此本部看得評事張淑名既承差委其原領奏本自合同日赴通政司投進今表進於元旦之先本進於元旦之後事屬稽違法當參究合將本官咨送法司問擬應得罪名照例發落以為將事稽違者之戒覆題奉聖旨張淑名依擬還罰奉兩個月欽此進表箋官嘉靖二十六年九月該陕西巡按御史胡彥奏稱馬政不修乞免差行太僕苑馬二寺堂上官進表奉聖旨該部看了來説本部查得正德七年二月該遼東苑馬寺卿夏翟奏稱本寺與遼東都司全無干涉而各節賀慶表箋轉附代齎殊非忠敬之意乞要自行差官徑進木部議得該寺既與都司無干其表箋委難類進合無準其所奏通行太僕苑馬寺一體遵守施行等因奉武宗皇帝聖旨依擬行欽此今看得御史胡彥所奏相應議處合候命下本部移咨都察院轉行陕西撫按衙門行令二寺今後凡遇萬壽聖節表文照舊差堂上官員齎進如果地方事有各官俱有差占許先期申請撫按衙門差委該寺首領或所屬官一員代齎仍一面具實奏行本部以憑查考其堂上官往回亦不許在途遷延及枉道回籍以致虛曠誤事如違聽巡御史參究奉聖旨是欽此揭帖春坊揭帖禮部尚書某今將某年某月某日早吏部兵部引奏請旨事件開列於後一吏部奏引選大小官員進士人等某人等共若干名請旨又奏各衙門辦事進士厯事監生共若干箇請旨又奏考驗過三考役滿吏典若知印及上銀實撥當該免考吏某人等共若干名請旨司禮監請選官印子一兵部奏後面跪的若干名是某等衛所某等官舍內若干名告替職若干名告襲職又有若干名告優飬若干名告優給是幼男婦女見在門外伺候又有若干名此告優養優給在衛所聽候俱有官吏保結明白查照黃選相同於例都該替職襲職優飬優給請旨又奏後面跪的若干名是某等衛所某等官他父兄等項患風癱等病俱在原衛令他男弟等項前來替職俱有官吏人等保結是實查照黃選相同緣各官俱年未六十嵗查得舊例這等告的果有殘疾也準他替如今他們所告殘疾是實請旨又奏先以欽準襲職優給官員具奏附選司禮監請選官印子書牘定書劄式洪武三年上諭中書省臣曰今日於書劄多稱頓首載拜百拜皆非實禮其定為儀式令人遵又小民不知避忌取先聖先賢漢唐國寶等字以為名字宜禁革之於是禮部定議凡致書於尊者稱端肅奉書答則稱端肅奉覆敵巳者稱奉書奉復上之與下稱書寄書答卑幼與尊長則曰家書敬覆尊長與卑幼則云書付某人其名字有天國君臣聖神堯舜禹湯文武周漢晉唐等國號相犯者悉令更之皇太子與諸王式洪武十二年六月壬申翰林儒臣議皇太子與諸王書則曰記問答諸王書曰記答諸王奉書皇太子則曰謹啓上改皇太子與諸王書曰記諭餘從之文移諸司文移式洪武十五年閏二月甲申命禮部定諸司文移式先是以六部轄各布政使司都察院轄各按察司五軍都督府轄各都司衛所惟今吾等十二衛指揮使司係親軍王府長史司及護衛俱無統屬文移未定其式至是定議六部及親軍諸衛欲移文護衛皆由都督府行於本國境內都指揮使司轉達若五軍都督府及親軍并在京各衛欲移文長使司者皆由六部行於本國境內布政使司轉達其護衛及長使司申文亦如之其六部及京衛文移在外都指揮使司并直𨽻衛所由五軍都督府行之五軍都督府於各布政司并直𨽻府州由六部行之其於按察司皆內都察院行之著為令洪武十六年七月五軍都督府有事於都察院令經厯司呈院如行六部則經厯司於主事廳互牒其在京秩三品者與本院平行仍故牒在京四品在外按察司帖下在京五品以下衙門行移文本院俱稱具呈惟太理審刑磨勘司與本院經厯司行移各道監察御史止由本院與諸司無行禮部志稿卷六十四
