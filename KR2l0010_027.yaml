衣冠牀幔儀物隨宜收貯焚化英宗以下神位以次遞遷升祔永樂二十二年太宗文皇帝祔廟儀卒哭之明日太常寺陳設醴饌于太廟如常享儀樂設而不作設儀衛繖扇于午門外內侍官設皇帝拜位于几筵殿上進御輦于殿前丹陛上內導引官導皇帝哀服詣拜位贊四拜舉哀興哀止立于拜位之東西向內侍詣靈座前跪奏請太宗文皇帝神主降座陛輦詣太廟祔享奏訖內侍捧神主安奉于御輦繖扇侍衛如儀至思善門外皇帝易祭服升輅後隨至太廟南門之外降輅導引官導皇帝詣玉輦前贊跪皇帝跪太常卿跪于左奏請太宗文皇帝神主降輦詣太廟祔享奏訖贊俯伏興皇帝俯伏興導引官導皇帝捧神主由左門入典儀唱樂舞生就位執事官各司其事至丹陛典儀唱太宗文皇帝謁廟內贊奏請詣神位前每至一廟前內侍捧神主至褥位朝北皇帝于神主後行八拜禮各廟俱八拜禮畢太常卿立壇東西向唱賜座皇帝搢圭內侍捧神主進于皇帝皇帝捧神主安于座導引官導皇帝詣拜位行祭禮如特享儀文官五品以上武官四品以上隨班行禮禮畢仍奉神主還几筵儀具大喪禮下至大祥前一日遣宫祭告太廟至日上祭告几筵殿奉安神主神座儀物于太廟成化二十三年憲宗純皇帝祔廟儀卒哭之明日奉神主祔太廟前期三日齋戒前一日遣官以祔享祭告太廟至日太常寺官設牲醴于太廟如時享之儀樂設而不作設憲宗純皇帝御座于宣廟御座之次錦衣衛設儀衛于午門外是日早內執事官設酒饌于几筵設憲宗純皇帝衣冠于几筵前進神主輦于殿前設衣冠輿于丹陛上設上拜位于几筵殿上正中設親王拜位于殿前丹陛上上哀服內導引官導引詣拜位親王各哀服詣拜位奏四拜舉哀哀止各王于拜位之東西向內侍官詣靈座前奏請憲宗純皇帝神主降座升輦詣太廟祔享上捧神主由殿中門出奉安于輦內執事官捧衣冠置于輿後隨內侍擎繖扇如儀至思善門外親王退上于右順門具祭服升輅後隨至太廟南門外儀衛俱分列左右上降輅太常寺官導上詣輦前跪太常寺官奏請憲宗純皇帝神主降輦詣太廟祔享上俯伏興搢圭詣輦捧神主由左門入內侍官捧衣冠隨入贊禮樂舞生就位執事官各司其事贊迎神神主至丹陛上贊禮贊憲宗純皇帝謁廟內侍官捧衣冠立憲宗純皇帝御座之下引贊贊詣神位前至一廟上捧神主置褥位立神主後出圭行四拜禮以次詣八廟禮俱同謁廟畢上搢圭捧神主北向立太常寺官唱賜座內侍官捧衣冠安于座內上捧神主安于衣冠前出圭立于傍導引官導上詣拜位行祭禮如時享之儀文官五品以上武官四品以上各祭服隨班行禮禮畢奉神主還几筵至大祥後二日奉神主安于太廟前期三日齋戒前一日遣官詣太廟行祭告禮用祝文至日侵晨設酒果于几筵殿設神主輦一册寶亭二于殿前丹陛上上服淺淡服行祭告禮畢司禮監官詣几筵殿前跪奏請神主升輦詣太廟奉安奏訖內侍捧神主册寶俱由殿中門出安奉于輦及册寶亭內侍擎執繖扇侍衛如儀上隨行至右順門上易祭服升輅後隨至午門外儀衛繖扇導至廟街門內外列于太廟南門外之左右上降輅司禮監官導上詣神主輦前贊跪上跪司禮監官跪于上左奏請神主奉安太廟奏訖贊俯伏興上俯伏興導引官前導內侍捧神主册寶前行上隨後繇中門入至寢殿奉安訖上叩頭興導引官導上由殿東門出至丹陛祭祀如時祭儀用祝文文武官具祭服隨班行禮嘉靖十七年睿宗獻皇帝祔廟儀先期一日太常寺設牲醴于太廟如時祫禮祭日司設監官設睿宗獻皇帝神座衣冠於孝宗敬皇帝位之次至日恭上册寶于睿廟畢遣官捧睿宗主降座升輿徐行上先入詣太廟寢捧太祖主遣官捧各廟主各奉安于太廟睿宗主輿至丹陛下太常卿跪奏請降輿遣官捧主至丹陛初登典儀唱樂舞生就位執事官各司其事至丹陛上門外唱迎神樂作此樂歌二遍唱睿宗獻皇帝謁廟上捧主入就拜褥上內贊奏跪太常卿跪奏孝玄孫嗣皇帝某躬奉皇考睿宗知天守道洪德淵仁寬穆純聖恭儉敬文獻皇帝參拜內贊奏興拜五拜三叩頭禮畢捧主朝上立太常卿進立于東北西向唱賜座安主于座訖內贊奏四拜傳贊陪祝官同典儀唱奠帛行初獻禮樂作導引官導上至太祖神主前奏搢圭奏獻帛獻訖奏獻爵獻訖奏出圭奏復位各廟捧主官捧帛爵詣各廟獻訖奏詣讀祝位內贊奏跪奏讀祝讀祝官讀訖奏俯伏興平身傳贊同奏復位樂止典儀唱行亞獻禮樂作儀同初獻惟不獻帛讀祝樂止典儀唱行終獻禮樂作儀同亞獻樂止太常寺卿進立西向唱賜福胙內贊奏跪奏搢圭光祿寺官以福酒跪進內贊奏飲福酒上飲訖光祿寺官以福胙跪進內贊奏受胙上受訖奏出圭俯伏興平身奏四拜傳贊百官同典儀唱徹饌樂作執事官徹饌訖樂止太常寺卿詣神主前跪奏禮畢請還宫樂作內贊奏四拜傳贊同樂止典儀唱讀祝官捧祝進帛官捧帛各詣燎位樂復作內贊奏禮畢樂止上捧太祖主遣官捧各廟主捧睿宗主各詣寢殿奉安上易服還宫大樂鼓吹振作祝文維嘉靖某年某月某日孝玄孫嗣皇帝某敢昭告于太祖髙皇帝孝慈髙皇后成祖文皇帝仁孝文皇后仁宗昭皇帝誠孝昭皇后皇髙祖考宣宗章皇帝皇髙祖妣孝恭章皇后皇曾祖考英宗睿皇帝皇曾祖妣孝莊睿皇后皇祖考憲宗純皇帝皇祖妣孝貞純皇后皇伯考孝宗敬皇帝皇伯妣孝康敬皇后皇兄武宗毅皇帝皇嫂孝靜毅皇后日兹者恭上皇考廟號尊諡禮成爰奉神主謁祖祔祭迎延列聖同賜鑒歆謹此躬祭之誠以申合享之禮尚享樂章迎神太和之曲太室巍巍九廟肇祀皇聖居歆惟昭考假只昭假維何欣天倫攸敘宗祏有嚴開萬祀伊始初獻夀和之曲酌彼鬱鬯玉瓉是將敬哉捧盈有飶其香儼皇祖在上八聖在旁合享交欣天容洋洋亞獻豫和之曲樂奏既和禮嚴再獻黃流再觴玉露斯湛蒸俾祖考式衎以宴神其醉止用嘉我明薦終獻寧和之曲玉齊維醑萬舞盈庭尊祖享親樂奏禮行式序式和祀事孔明於赫聖靈兮賚我思成徹饌雍和之曲籩豆有踐兮敬徹不遑禮儀卒度兮既敕既匡神之聽之兮昭格洋洋保我子孫兮惠賜無疆送神安和之曲靈輿肅肅兮靈駕歸閟宫侐兮瞻依我其夙夜兮敬無敢違願言顧歆兮俎豆光輝東安門入各就拜位東西近兩廡稍北障以帷幕駕至太廟南門各廟遣官捧列聖帝后主以次奉安上降輅詣輿前跪太常寺官奏請慈孝獻皇后神主降輿上晉圭捧神主出輿由中門入內侍官捧衣冠隨入至廟丹陛上典儀唱樂舞生就位執事官各司其事唱迎神樂作典儀奏慈孝獻皇后謁廟上捧神主入內侍官捧衣冠隨入內贊奏就位上捧神主就位安于拜褥上太常寺卿奏孝玄孫嗣皇帝某躬奉皇妣慈孝獻皇后祔廟恭拜內贊奏五拜三叩頭禮上捧主朝上立太常寺卿唱賜座上捧主安于睿宗廟神座出圭復位導引官導上至香案前上香如儀復位奏四拜傳贊陪祀官同典儀唱奠帛行初獻禮上至太祖神位前獻帛獻爵訖復詣髙皇后神位前獻爵復位各廟俱捧主官捧帛爵獻訖內贊奏讀祝讀訖俯伏興復位行亞獻禮女官奏中宫獻太廟爵皇妃八氏獻八廟爵儀同初獻上復行終獻如初獻禮畢飲福受胙以至徹饌送神樂作樂止俱如儀禮畢上捧太祖主各捧主官捧各廟主奉安于寢殿捧睿宗主官同內侍官捧慈孝獻皇后主奉安子睿宗廟禮畢上還宫祝文維嘉靖某年某月某日孝玄孫嗣皇帝某敢昭告于祖宗列聖帝后曰兹奉皇妣慈孝貞順仁敬誠一安天誕聖獻皇后神主升祔廟享恭申祗謁謹以牲牢醴齊粢盛庶品致祭伏惟尚享樂章迎神太和之曲肅肅清廟駿奔在焉奉我母慈升祔告虔百禮有任八音在宣惟列聖降靈臨享一筵初獻夀和之曲清酤載酌篚帛既陳肴核惟旅有飶其芬玉瓉初舉翼翼欽欽以衎我祖考庶幾格歆亞獻豫和之曲苾彼黃流酌言至再以蒸以享必敬必戒惟九聖在天景福是介伊嘏考妣俾式昌以大終獻寧和之曲爵獻既終鏞鼓有奕濟濟蹌蹌率我百辟於皇聖神既歆既懌惠我無疆保子孫千億徹饌雍和之曲享禮既備豆徹敢遲終事有嚴敬而將之肇祀孔明式永我孝思送神安和之曲瞻雲駕兮翩翩神洋洋兮在天清廟兮肅肅奉蒸嘗兮於萬斯年隆慶元年孝潔肅皇后祔廟儀先期內府該衙門恭製太廟及廟寢內孝潔肅皇后合用神座儀物等項先一日遣官以升祔世宗肅皇后告于太廟即以孝潔肅皇祔享同告是日執事官設酒饌于奉先殿西夾室內侍官設神主輿衣冠輿于奉先殿左門外至期遣官以祔享告于西夾室行禮如常儀告畢內侍官跪奏請孝潔肅皇后詣太廟祔享奏訖恭捧神主及內侍官捧衣冠俱由左門出奉安于輿執事者擎執繖扇如儀至午門內候世宗肅皇帝神主至以次迎至太廟南門外太常寺官跪奏請孝潔肅皇后神主降輿詣太廟祔享內侍官恭捧隨世宗肅皇帝神主由左門入又內侍官捧衣冠隨入立于世宗肅皇帝衣冠之次捧世宗肅皇帝神主置于褥位之左內侍官捧孝潔肅皇后神主隨置于褥位之右內侍官退其謁廟賜座等禮儀俱與世宗肅皇帝同行祭畢世宗肅皇帝神主還几筵內侍官捧孝潔肅皇后神主奉安于廟寢其衣冠同世宗肅皇帝衣冠奉安于太廟俱第九室大禘今罷嘉靖十年定前期上告廟如常儀太常寺奏致齋三日備香帛牲醴如時享儀錦衣衛設儀衛侍從太常寺卿奏請皇初祖神牌太祖神位于太廟正殿安設是日早上具翼善冠黃袍御奉天門太常卿跪奏請聖駕詣太廟上至太廟門外降轎導引官導上入御幄具祭服出由殿左門入典儀唱樂舞生就位執事官各司其事內贊奏就位典儀唱迎神樂作內贊奏四拜傳贊百官同奏上香導上至皇初祖太祖前俱三上香訖奏復位樂止典儀唱奠帛行初獻禮樂作內贊導上至皇初祖前儀同典獻爵復導至太祖前儀同典儀唱讀祝奏跪傳贊衆官皆跪樂暫止內贊贊讀祝讀訖樂作內贊奏俯伏興平身傳贊百官同樂止典儀唱行亞獻禮樂作樂止復唱行終獻禮樂作樂止太常卿進立于皇初祖前西向唱賜福胙上飲福受胙興奏四拜傳贊百官同典儀唱徹饌唱送神內贊四拜傳贊百官同典儀唱捧祝捧帛詣燎位唱望燎俱如儀太常卿捧皇初祖神牌詣燎所內贊奏禮畢樂止上由殿左門出至太廟門外導引官導上入御幄易常服還宫祝文維嘉靖某年某月某日孝玄孫嗣皇帝某敢昭告于皇初祖帝神曰仰惟先祖肇我厥初發祥鍾靈啓我列聖追慕德源敬兹報祭願來格斯奉皇祖太祖髙皇帝配侑上享樂章迎神元和之曲於惟皇祖肇創丕基鍾祥有自曰本先之奄有萬方作之君師追報宜隆以申孝思瞻望稽首介我休禧初獻夀和之曲木有本兮水有源人本祖兮物本天思報德兮禮莫先仰希鑒兮敢弗虔亞獻仁和之曲中觴載升于此瑶觥小孫奉前願歆其誠樂舞在列庶職在庭祖鑒孔昭鍚佑攸享終獻德和之曲於維兮先祖延慶兮深髙追報兮曷能三進兮香醪徹饌太和之曲芬兮豆籩潔兮黍粢祖垂歆享徹乎敢遲禮云告備以訖陳辭永裕後人億世丕而送神永和之曲禘祀兮具張佳氣兮鬱昂皇靈鍚納兮喜將一誠通兮萬載昌祈鑒佑兮天下康仰源仁浩德兮曷以量小孫頓首兮以望遙瞻冉冉兮聖靈皇皇禮部志稿卷二十七
