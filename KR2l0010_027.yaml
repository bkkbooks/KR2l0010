body:
  text: 禮部志稿卷二十七明俞汝楫編祠祭司職掌廟祀國初於闕左建四廟德祖廟居中懿祖東第一廟熙祖西第一廟仁祖東第二廟與主皆南向洪武元年定以四時孟月及嵗除凡五享二年重定時享春以清明夏以端午秋以中元冬以冬至惟嵗除如舊三年又定時享仍用四孟月孟春特享于各廟各具禮樂餘時俱奉三祖神主合享于德祖之廟德祖仍南向三祖以次東西向初獻各奏本廟樂亞獻終獻徹饌還宫同奏德廟樂九年始改建太廟其制前為正殿後為寢殿俱翼以兩廡寢殿九間以一間為一室中一室奉安德祖帝后神主懿祖東第一室熙祖西第一室仁祖東第二室主皆南向几席牀榻衾褥楎椸篋笥帷幔器皿之屬皆如事生之儀及時享于正殿則設德祖帝后神座居中南向懿祖神座左第一位西向熙祖神座右第一位東向仁祖神座左第二位西向凡座止設衣冠而不奉主又以親王配享于東壁功臣配享于西壁孟春擇上旬吉日孟夏孟秋孟冬俱用朔日嵗暮用除日俱行合享之禮奏德廟樂罷特享禮及各廟樂三十一年奉袝太祖神主于寢殿西第二室南向正殿神座右第二位東向永樂中定都北京建廟一如南京之制洪熙元年奉袝太宗神主于寢殿東第三室南向正殿神座左第三位西向宣德元年奉袝仁宗神主于寢殿西第三室南向正殿神座右第三位東向十年奉袝宣宗神主于寢殿東第四室南向正殿神座左第四位西向天順八年奉袝英宗神主于寢殿西第四室南向正殿神座右第四位東向成化二十三年憲宗將升袝而九室已備始奉祧懿祖熙祖而下皆以次奉遷乃奉祧憲宗神主于寢殿西第四室南向正殿神座右第四位東向𢎞治初始即嵗除日行祫祭禮十八年奉祧熙祖仁祖而下皆以次奉遷乃袝孝宗神主于寢殿西第四室南向正殿神座右第四位東向正德十六年奉祧仁祖太祖而下皆以次奉遷乃奉袝武宗神主于寢殿西第四室南向正殿神座右第四位東向嘉靖十年寢諭禮部以太祖髙皇帝重闢宇宙肇運開基四時享祭壓于德祖不得正南面之位命祧德祖而奉太祖神主居寢殿中一室為不遷之祖太宗而下皆以次奉遷每嵗孟春特享夏秋冬合享改擇季冬中旬大祫而以嵗除為節祭歸之奉先殿特享則奉太祖居中太宗而下以次居左右各設一幄南向奉主于神座設冠服及寫于座之左右祭畢藏之合享則奉太祖居中南向太宗而下以次東西向大祫則奉德祖于太廟居中南向懿祖而下皆以次東西向其親王功臣移配食于兩廡又以丙辛年孟夏行大禘禮于太廟奉皇初祖南向太祖西向配享十四年更建世室及昭穆羣廟于太廟之左右其廟制正殿五間寢殿三間各有門垣以次而南統于都宫太廟専奉太祖居之世室在左三昭之上奉太宗居之題曰太宗廟仁祖昭第一廟曰仁廟宣宗穆第一廟曰宣廟英宗昭第二廟曰英廟憲宗穆第二廟曰憲廟孝宗昭第三廟曰孝廟武宗穆第三廟曰武廟以立春日行特享禮于各廟立夏立秋立冬日行時祫禮于太廟奉太祖南向太宗居東西向稍近上仁宗而下東西序列相向季冬大祫則德祖居中懿祖熙祖仁祖太祖以次居于左右俱南向太宗而下如時祫之序十七年改上太宗廟號曰成祖加上皇考獻皇帝廟號曰睿宗先是特建世廟以祀皇考後改建獻皇帝廟又改題曰睿宗廟特享則于本廟行禮時祫則奉主合享于太廟二十四年重建太廟成奉睿宗升袝而罷睿宗廟祭寢殿神主則太祖居中成祖宣宗憲宗睿宗序于左仁宗英宗孝宗武宗序于右皆南向時享于正殿則太祖仍居中南向成祖而下以序東西相向孟春仍于上旬擇日孟夏孟秋孟冬仍用朔日俱合享祫祭仍以嵗除日凡節俱如舊大禘禮亦罷二十八年奉孝烈皇后祔享太廟藏主獻皇后之側遇享居本次止設位品而祝不及二十九年奉祧仁宗宣宗而下皆以次奉遷乃奉袝孝烈皇后神主于寢殿西第四室南向正殿神座右第四位東向祝仍不及隆慶元年世宗升祔禮部議廟享惟一帝一后后必元配乃奉孝潔皇后祔享而遷孝烈皇后神主于别殿六年奉祧宣宗英宗而下皆以次奉遷乃奉祔穆宗神主于寢殿西第四室南向正殿神座右第四位東向廟號洪武元年上髙祖考尊諡曰玄皇帝廟號德祖妣曰玄皇后曽祖考尊諡曰恆皇帝廟號懿祖妣曰恆皇后祖考尊諡曰裕皇帝廟號熙祖妣曰裕皇后考尊諡曰淳皇帝廟號仁祖妣陳氏曰淳皇后永樂元年上髙廟尊諡曰聖神文武欽明啓運俊德成功統天大孝髙皇帝廟號太祖后馬氏曰孝慈昭憲至仁文德承天順聖髙皇后嘉靖十七年加上髙廟尊諡曰太祖開天行道肇紀立極大聖至神仁文義武俊德成功髙皇帝髙皇后曰孝慈貞化哲順仁徽成天育聖至德髙皇后永樂二十二年上文廟尊諡曰體天𢎞道髙明廣運聖武神功純仁至孝文皇帝廟號太宗后徐氏曰仁孝慈懿誠明莊獻配天齊聖文皇后嘉靖十七年加上文廟尊諡曰啓天𢎞道髙明肇運聖武神功純仁至孝文皇帝廟號成祖洪熙元年上仁廟尊諡曰敬天體道純誠至德𢎞文欽武章聖達孝昭皇帝廟號仁宗正統七年上后張氏曰誠孝恭肅明德𢎞仁順天啓聖昭皇后宣德十年上宣廟尊諡曰憲天崇道英明神聖欽文昭武寬仁純孝章皇帝廟號宣宗天順六年上后孫氏曰孝恭懿憲慈仁莊烈齊天配聖章皇后天順八年上英廟尊諡曰法天立道仁明誠敬昭文憲武至德廣孝睿皇帝廟號英宗成化四年上后錢氏曰孝莊憲穆𢎞惠顯仁恭天欽聖睿皇后成化二十三年上憲廟尊諡曰繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝廟號憲宗正德十三年上后王氏曰孝貞莊懿恭靖仁慈欽天輔聖純皇后𢎞治十八年上孝廟尊諡曰建天明道誠純中正聖文神武至仁大德敬皇帝廟號孝宗嘉靖二十年上后張氏曰孝康靖肅莊慈哲懿翊天贊聖敬皇后正德十六年上武廟尊諡曰承天達道英肅睿哲昭德顯功宏文思孝毅皇帝廟號武宗嘉靖十四年上后夏氏曰孝靜莊惠安肅溫誠順天偕聖毅皇后嘉靖三年上獻皇帝尊諡曰恭穆獻皇帝七年加上曰恭睿淵仁寬穆純聖恭儉敬文獻皇帝十七年加上曰知天守道洪德淵仁寬穆純聖恭儉敬文獻皇帝廟號睿宗嘉靖十八年上后蔣氏曰慈孝貞順仁敬誠一安天誕聖獻皇后隆慶元年上世廟尊諡曰欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝廟號世宗后陳氏曰孝潔恭懿慈睿孝莊相天翊聖肅皇后隆慶六年上穆廟尊諡曰契天隆道淵懿寬仁顯文光武純德𢎞孝莊皇帝廟號穆宗后李氏曰孝懿貞惠順哲恭仁儷天襄莊皇后時享洪武二十六年初定儀一齋戒前一日太常司官宿於本司次日具本奏致齋三日次日進銅人一省牲牛九羊八山羊十豕十九鹿一兔十三祫祭犢十九北羊十八豕三十五兔十五山羊鹿不加正祭前二日太常司官奏明日與光祿司官省牲至次日省牲畢同復命一陳設皇髙祖前犢一羊一豕一登二鉶二籩豆各十二簠簋各二帛二白色奉先制帛皇曾祖陳設同皇祖陳設同皇考陳設同共設酒尊三金爵八瓷爵十六篚四於殿東祝文案一於殿西後奉祧四祖太祖而下諸廟陳設並同嘉靖二十九年奉祧仁宗升祔孝烈皇后后前止設金爵一瓷爵二通設酒尊九金爵十七瓷爵三十四篚九祫祭則尊加五金爵加十瓷爵加二十篚加五親王配享四壇共二十一位第一壇夀春王配妃劉氏犢一羊一豕一登二鉶二籩豆各十簠簋各二爵六帛二展親制帛第二壇霍丘王妃翟氏下蔡王安豐王妃趙氏南昌王犢一羊一豕一登六鉶六籩豆各十簠簋各二爵十八帛六展親制帛第三壇蒙城王妃田氏盱眙王妃唐氏臨淮王妃劉氏陳設與二壇同第四壇寶應王六安王來安王都梁王英山王山陽王昭信王犢一羊一豕一登七鉶七籩豆各十簠簋各二爵二十一帛七展親制帛共設酒尊三篚四於殿東南北向功臣配享十壇今十七壇中山武寧王徐逹開平忠武王常遇春岐陽武靖王李文忠寧河武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英虢國忠烈公俞通海蔡國忠毅公張德勝越國武莊公胡大海梁國武桓公趙德勝泗國武莊公耿再成永義侯桑世傑河間忠武王張玉以下四壇俱洪熙元年增東平武烈王朱能寧國忠莊公王真榮國恭靖公姚廣孝嘉靖九年遷於大隆興寺誠意伯劉基嘉靖十年增榮國威襄公郭英嘉靖十六年增每壇羊一豕一鉶一籩豆各二簠簋各一帛一報功制帛爵三篚一共設酒尊三於殿西南北向一正祭典儀唱樂舞生就位執事官各司其事導引官導引皇帝至御拜位內贊奏就位典儀唱迎神奏樂樂止內贊奏四拜百官同典儀唱奠帛行初獻禮奏樂執事官各捧帛金爵受酒獻於神御前讀祝官取祝跪於神御右內贊奏跪典儀唱讀祝讀訖奉安於神御前內贊奏俯伏興平身百官同樂止典儀唱行亞獻禮執事官各以瓷爵受酒獻於神御前樂止典儀唱行終獻禮儀同亞獻樂止太常寺卿進立殿東西向唱賜福胙光祿寺官捧福酒胙自神御前中門左出至皇帝前內贊奏跪搢圭光祿寺官以福酒跪進內贊奏飲福酒光祿寺官以胙跪進內贊奏受胙出圭俯伏興平身內贊奏四拜百官同典儀唱徹饌奏樂執事官徹饌樂止太常卿詣神御前跪奏禮畢請還宫奏樂內贊奏四拜百官同樂止典儀唱讀祝官捧祝進帛官捧帛各詣燎位奏樂內贊奏禮畢一祝文維洪武某年嵗次某月某朔某日孝玄孫皇帝敢昭告于髙曾祖考四廟太皇太后時維孟春夏秋冬禮嚴祭祀謹以牲醴庶品用申追慕之情尚享嘉靖間稱六廟皇祖考妣太皇帝后皇伯孝孝宗敬皇帝皇伯妣孝康敬皇后皇考睿宗獻皇帝皇妣慈孝皇后皇兄武宗毅皇帝孝敬毅皇后萬厯七年以槩稱幾廟祖妣未明更定祝文通列九廟帝后聖號一樂章迎神中和之曲慶源發祥世德惟崇致我眇躬今云維我祖宗開基建功京都之內親廟在東維我子孫永懷祖宗氣體則同呼吸相通來格來崇皇靈顯融初獻夀和之曲武功之舞思皇先祖耀靈于天源衍慶流繇髙逮玄玄孫受命追逺其先明禋世崇億萬斯年亞獻豫和之曲文德之舞對越至親儼然如生其氣昭明感格在庭如見其形如聞其聲愛而敬之發乎中情終獻熙和之曲文德之舞承前人之德化家為國母曰豫小子基命成績今云惟前人之功肇膺天厯延及豫小子爰受方國欲報其德昊天罔極殷勤三獻我心悅懌徹饌雍和之曲樂奏儀肅神其燕娛告成于祖亦祐皇妣敬徹不遲以終祀禮祥光焕揚鍚以嘉祉還宫安和之曲顯兮幽兮神運無迹鸞馭逍遙安其所適其靈在天其主在室子子孫孫孝思無斁嘉靖十年定孟春特享儀後罷一前期二日太常寺卿同光祿寺卿面奏省牲如常儀次日復命太常寺陳設如圖儀一正祭日上乘輿由廟街門入至靈星門西降輿導引官導上由靈星左門入上至戟門東帷幕具祭服出導引官導上由戟門左門入至寢殿同捧主官帝主以大臣恭捧后主以內臣恭捧出主升太廟至太祖室安主次至太宗以下昭廟安主次至仁宗以下穆廟安主訖典儀唱樂舞生就位執事官各司其事導引官導上至御拜位內贊奏就位典儀唱迎神樂作樂止內贊奏四拜平身傳贊百官同典儀唱奠帛行初獻禮樂作內贊導上至太祖前奏跪奏搢圭奏上香司香官捧香跪于上左上三上香訖執事者捧帛跪於上右跪獻帛上獻帛執事者捧爵跪于上右奏獻爵上獻太祖前奏爵出圭上出圭致恭訖奏搢圭捧爵者跪于上左奏獻爵上獻髙后前爵奏出圭奏詣讀祝位上至中宣讀祝位樂暫止奏跪傳贊衆官皆跪內贊贊讀祝讀祝官跪讀訖樂復作奏俯伏興