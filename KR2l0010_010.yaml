body:
  text: 禮部志稿卷十明俞汝楫編儀制司職掌朝儀國初所定朝儀略具諸司職掌纍朝以漸而詳其增定見行者有朔望儀常朝儀午朝諸儀而班次出入各有禁例具列於後朔望朝儀洪武三年定凡朔望日上皮辨服御奉天殿百官公服於丹墀東西對立俟引班引合班北靣立再拜班首詣前同百官鞠躬唱某官臣某起居贊禮唱聖躬萬福班首平身復位同百官皆再拜引班引百官分班仍對立省府臺部官諸衙門有事奏者繇西階升殿奏事畢降自西階引班引百官以次出如無事奏則侍儀繇西階升殿跪奏如之俟侍儀降階引班導百官出十四年定凡朔望日文武百官各具朝服俟鼓三嚴公侯一品二品官入東西角門俟其餘三品以下先於丹墀內班橫行序立鍾三鳴公侯一品二品以次入班序立鍾鳴畢儀禮司奏外辦導駕官導上位升御座鳴鞭訖鳴贊唱班齊通贊詣中道班首臣某等起居聖躬萬福畢百官行五拜禮儀禮司奏禮畢而退十七年令百官凡遇朔望免行起居禮後更定朔望日上御奉天殿百官各具公服行禮常朝官序立於丹墀東西相向謝恩見辭官序立於奉天門外北向候上升座鳴鞭鴻臚寺贊排班樂作常朝官行一拜三叩頭禮畢樂止復班鴻臚寺奏謝恩見辭於奉天門外行五拜三叩頭禮畢鳴鞭駕興常朝御殿儀國初常朝或御殿今不行洪武初定凡早朝文官自左掖門入武官自右掖門入如華蓋殿朝至鹿頂外東西序立鳴鞭訖守衛官至鹿頂內行禮訖就侍立位各衙門官以次行禮訖有事奏者入奏無事奏者四品以上及應升殿者入殿內侍立五品以下官出至鹿頂外列班北向立候鳴鞭以次出如奉天殿朝俱於華蓋殿行禮奏事畢五品以下官詣丹墀依品級列班重行北向立四品以上及翰林院官給事中監察御史等官於中左中右門伺候鳴鞭各詣殿內序立候朝退捲班以次出如先於奉天殿朝後却奏事者文武官於丹墀內依品級重行北向立候鳴鞭行禮訖四品以上及翰林院官給事中監察御史等官升殿侍立五品以下仍前序立候謝恩見辭人員行禮訖鳴鞭捲班退有事奏者於奉天門或華蓋殿進奏無事奏者以次出二十二年令奉天殿常朝五府六部都察院通政司大理寺錦衣衛等官於殿內侍立奏事止於華蓋殿二十四年定侍班官員凡文武官除分詣文華殿啓事外如遇升殿各用履鞋照依品級侍班有違越失儀者從監察御史儀禮司糾劾東班則六部堂上官各於部掌印官都察院堂上官十三道掌印御史通政司大理寺太常寺太僕寺應天府翰林院春坊光祿寺欽天監尚寶司太醫院五軍斷事官及京縣官西班則五軍都督及首領官錦衣衛指揮各衛掌印指揮給事中中書舍人二十六年令凡文武百官於奉天華蓋武英等殿奏事必須穿著履鞋方許入殿違者從糾儀御史禮部儀禮司官紏劾送法司如律問罪常朝御門儀洪武初定凡早朝文官自左掖門入武官自右掖門入如奉天門朝至金水橋南各依品級東西序立候鳴鞭訖以次隨行至丹墀內東西相向序立守衛官先行禮畢東西序立文武官入班行禮有事者以次進奏無事奏者隨即入班朝退捲班分東西出近儀凡早朝鼓起文武官各於左右掖門外序立候鍾鳴開門各以次進過金水橋至皇極門丹墀東西相向立候上御寶座鳴鞭鴻臚寺官贊入班文武官俱入班行一拜三叩頭禮分班侍立鴻臚寺官宣念謝恩見辭人員傳贊午門外行禮畢鴻臚寺官唱奏事各衙門應奏事件以次奏訖御史序班糾儀無失儀官則一躬而退鴻臚寺官跪奏奏事畢鳴鞭駕興百官以次出隆慶六年定以三六九日視朝凡朝班序立洪武二十四年令禮部置百官朝班序牌大書品級列丹墀左右木柵之上文武百官照品序立侍班二十六年令公侯序於文武班首次駙馬次伯自一品而下各照品級文東武西依次序立風憲紏儀官居下朝北給事官居文武第一班之後稍近上便於觀聽不許攙越如有奏事須要從班末行至御前跪奏不許於班內橫過奏畢即便入班序立永樂初令內閣官員侍朝立在金臺東錦衣衛在西後移下貼御道東西對立景泰三年令師保兼官品同者立班以衙門為次天順三年奏准凡方靣官入朝遞降京官一班序立嘉靖九年令常朝官叩頭畢內閣官於東陛錦衣衛官於西陛各以次升立於寶座之東西錦衣衛官在司禮監官之南遇有欽差官及四夷人等領敕翰林院詹事府左右春坊司經局堂上官輪流一人捧敕立於內閣官之後稍上候領敕官面辭捧敕官下立於御前候承㫖訖繇左陛而下循御道邊行授與領敕官仍回至本班立萬厯三年題准常朝該日記注起居史官四員列於東班各科給事中之上稍前以便觀聽四年議准五府都督官常朝班次不當入侯伯班仍照殿班立於錦衣衛官之後稍上待錦衣衛堂上官詣金臺邊北司官於臺下各侍立仍與南北司無執事官同班而序於其上凡入朝次第洪武二十四年令朝參將軍先入近侍官員次之公侯駙馬伯又次之五府六部又次之應天府及在京雜職官員又次之成化十四年令朝參官員遇鼓起時俱於左右掖門外拱候東西班次照依衙門品級序其進士各照辦事衙門次序立於見任官後凡糾舉失儀洪武初令百官有未間禮儀新任及諸武臣聽侍儀司官每日於午門外演習御史二員監視有不如儀者紏舉百官入朝失儀者亦紏舉如律又令朝班每日都察院輪委監察御史二員侍班紏察失儀𢎞治十二年令朝班內或言語喧譁及吐唾在地者許序班拿送御前請處該奏請者具本奏請十四年令早朝遇雨門上奏事紏舉失儀人員序班一員拿住一員門上面奏嘉靖元年奏准失儀官員應面紏者御史照舊先紏若御史不紏許序班紏但不許越次六年令凡奉天門早朝畢聖駕下階南行兩班官員不許輒便退班與御轎並行亦不許吐唾語話序班往來巡視有違犯者堂上官具奏其餘即時拿赴御前治罪十年題准六科每月給事中二員凡遇閘朝與紏儀御史及鴻臚寺官同行查㸃十一年令朝參官不遵禮法者三品以上具奏處治其餘即時拿奏鴻臚寺官通同不行紏舉一體治罪萬厯四年議准於左右掖門內各設序班分立東西與原設催促入班序班二員一同紏察有喧譁說話者即時記認候奏事畢一併紏舉十一年令於金水橋邊增設序班三員北向站立俟東西兩班站定各於班末熟視有回顧耳語咳嗽吐唾者即時糾舉其京堂四品以上翰林院學士及領敕官俱不面紏十二年議令吉服朝參日期除祭祀齊戒不面紏外其餘照常糾儀又令參將見朝在京營者照京官儀不贊跪在外者照外官儀贊跪失儀俱面糾午朝儀景泰初定凡午朝上御左順門先期內官設御座於左順門之北設案稍南文武執事奏事等項官員俱於左掖門內伺候駕出視朝各官照班次序立內閣并五府六部奏事官六科侍班官俱於案西序立侍班御史二員序班二員將軍四員俱於案南面北立鴻臚寺鳴贊一員於案東面西立錦衣衛鴻臚寺堂上官於奏事官班以次面東立管將軍官并侍衛官立於將軍之西五府六部等衙門官照依衙門次第出班奏事通政司官照依常例引人奏事三法司官遇有奏事俱隨班其常日答應內刑部大理寺郎中等官各一員答應都察院侍班御史答應其餘衙門官有事者分管答應鴻臚寺官贊奏事畢徹案各官退各衙門如有機密重事許赴御前具奏二年令午朝翰林院先奏事萬厯三年題准午朝該日記注起居史官四員列於御座西稍南忌辰朝儀凡遇各廟忌辰上服淺淡服御奉天門視事不鳴鍾鼓百官各服淺淡服黑角帶朝參其謝恩見辭官具公服如常儀永樂元年奏定前二日上服淺淡服御西角門視事宣德十年仍改奉天門視事不鳴鍾鼓不行賞罰不舉音樂禁屠宰文武百官各具淺淡服黑角帶朝參二年令今後輟朝誦經等事不必行宣德三年令凡遇忌辰通政司禮部兵馬司免引囚奏事五年敕淳皇帝淳皇后忌日官員朝參輟奏事高皇帝髙皇后文皇帝文皇后昭皇帝忌辰悉輟朝參正統三年正月初三日恭遇宣宗章皇帝忌辰令升殿朝參如常儀𢎞治十四年令遇忌辰朝參官不許服紵絲紗羅恭仁康定景皇帝恭讓章皇后忌辰如遇節令服青緑花樣宣宗章皇帝忌辰如遇奏祭祀許服紅嘉靖元年奏准正月初三日宣宗章皇帝忌辰二月十九日恭仁康定景皇帝忌辰十一月初五日恭讓章皇后忌辰許穿青紵絲隆慶元年題准凡遇忌辰文武百官不問內外班行謝恩見辭俱淺淡色服烏紗帽黑角帶不許用公服輟朝儀凡聞皇妃喪輟朝三日發引下葬各免朝一日親王喪輟朝三日公主喪及下葬各輟朝一日羣王及文武大臣喪年終類輟朝一日先期禮部具奏仍出告示於長安左右門至日早朝不鳴鍾鼓不鳴鞭不設儀仗文武百官各服淺淡服黑角帶於奉天門朝參其謝恩見辭官員亦不許公服如常朝官服色諸王朝見儀洪武二十六年定凡各王大朝行八拜禮常朝一拜叩頭禮凡伯叔兄見天子在朝行君臣禮於便殿內行家人禮伯叔兄坐東面西坐受天子四拜伯叔兄就於受禮位坐天子居正中南面坐以尚親親之義存君臣之禮外戚朝見儀洪武二十六年定皇后父見上行君臣禮后見父母行家人禮皇太子見皇后父母皇后父母立於東西向皇太子立於西東向行四拜禮皇后父母立受兩拜答兩拜百官朝見儀出入等儀附凡百官朝見洪武二十六年定稽首頓首五拜乃臣下見君上之禮先拜手稽首四拜後一拜叩頭成禮稽首四拜者百官見東宫親王之禮其見父母亦行四拜禮其餘官長及親戚朋友相見止行兩拜禮凡謝恩見朝洪武二年令在京文武官有故告假及出使皆奉辭還皆奉見而奉特㫖授官及除授內外百職皆即時謝恩到任之日仍望闕行禮省選者亦到任日望闕行禮或除郡縣官給賜銀物聽宣諭者皆總行謝禮俱五拜三叩頭其應合謝恩見辭及應免者詳見鴻臚寺又令凡早朝謝恩見辭人員都察院輪委監察御史二員侍班凡謝恩者居先見者次之辭者又次之俱行五拜三叩頭禮凡內外諸司文武官員已入流者謝恩見辭必具公服行禮凡朝覲進表箋官員見辭謝恩俱用公服如面除而不及具服即時謝恩者勿拘其或常服見者綴班後如以軍務遠來及承制使還即時引見者不在此例凡在外諸司遣人來朝及朝使還京者俱先朝見後詣所司否者以違制論永樂六年奏准在外軍民官司及各王府公差人員在京公侯駙馬伯都督及內官出使隨帶人員并各衛所等衙門公差人等到京除例該引見者照例外其不在常例者俱赴鴻臚寺報名謝恩見辭本寺將各人姓名附簿仍將各起總數每日早另具題本進呈及引各人於承天門外行叩頭禮今在午門前行禮二十二年令凡方面大臣來朝鴻臚寺即皆引見宣德九年令在外各衙門官吏人等該謝恩者許在本處望闕謝恩其有事赴京朝見待有明文方許成化間奏准凡謝恩見辭應該鴻臚寺報名官員俱用報單或親自赴寺或差人遞報各從其便凡病痊官員舊例免見以後惟文武四品以上及翰林院學士尚寶司六科都給事中武官公侯伯都督及駙馬儀賔錦衣衛指揮等官患病過三日者俱公服於午門外行朝見禮若大臣曾䝉遣醫調治并賜物慰問者行禮後仍面謝大臣考滿有賜者同凡出入洪武二十六年定文武百官出入朝門各照品級第加遜敬如一品以下官遇公侯駙馬加敬禮立則旁立行則後從三品四品官遇一品官加敬禮行立俱後從五品以下官倣此俱不許攙越失儀如有宣召不在此限又定官員入朝門須要拱手端行威儀整肅不許私揖及吐唾不敬又令入朝行立坐食去處不許談笑喧譁指畫窺望凡行走洪武初令百官早朝入班行禮及朝退捲班俱分文東武西不許徑越御道東西行走如在奉天門朝其有事東西往來者出至金水橋南行過二十六年令大小官員隨從上位行丹墀身常朝北不許南向或左或右環轉隨侍如上位升奉天門及丹陛其隨從官員不得徑行中道并正道如有㫖令行方許於側邉隨行又令官員人等入內府合行門道須從邉行不得當中如東門近東邊行西門近西邊行其門東西相向者近南邊行如遇雨雪免朝有事奏者不拘此限又令奉天殿丹陛中三道階級并奉天門中三道階級皆不許人行百官繇東西階行傳制遣使持節進表等儀皆繇東階出入隨駕傘扇儀仗繇正門中道兩旁出入又令朝廷頒降詔書冊命從中道中門出近東而行其內外官員齎捧御製文字及御用之物進呈不許直行中道或左右取便以行至御前正中跪進御膳等物亦不可當中道直行許正道邉左以進凡御座處即為正道如上御奉天門則於正門邉東入將至御前正中供具膳畢而出亦如之若上常所往來處其奉御內侍捧執御用之物聽使令者皆須近後取便左右行不許隨後徑馳中道凡聽諭洪武二十六年令百官朝參遇有聖諭教戒須要專心致意拱聽分明省身克己不許放肆二十九年令凡有聖諭大小百官於丹陛前或奉天門各照品級序立候上御座跪聽凡受賜洪武三年令以所賜物先置奉天門內乃引其人入見聽宣諭然後給之就令謝恩而去八年令朝官受賜於御前跪受如衣則服以拜賜皆五拜叩頭在官受賜者初行四拜受賜後四拜凡賜座洪武初令凡朝退燕閒及行幸處文職三品以上武職二品以上及勳舊文學之臣賜座其餘非奉特㫖不許輒坐二十六年令文武官御前侍坐遇有大小官員奏事必須起立候奏事畢復坐不許倨坐失儀如有特㫖賜坐則復坐又令凡賜坐不許推讓坐後遇有顧問初時跪對畢即坐若復有所問坐朝上對不必更起同列侍坐或被顧問一人奏對餘皆靜聽毋攙言勦說如各有所見候其人言畢方許前陳又令執政大臣年高者取自特㫖免朝倘有顧問於便殿賜坐凡雜儀洪武初令百官既具朝服公服之後毋舉笏行私禮又令朝參近侍病嗽者許即退班或一時眩暈及感疾不能侍立者許同官掖出又令百官入朝遇雨雪許服雨衣又令文武官除本等紗帽外遇雨雪許戴雨帽公差出外許戴帽子入城不許其公差人員出外者亦如之成化十三年奏准文武官員入朝大臣常川許帶官吏頭目每人二名若遇隂雨大臣添一人小官許帶一人各執雨具近例朝覲外官及舉監人等不許擅戴暖耳入朝諸司奏事儀凡早朝奏事洪武二十九年定凡上御奉天門百官行叩頭禮畢分東西班序立儀禮司依次贊某衙門奏事奏畢復入班候諸司奏完儀禮司贊奏事畢退出其奏事次第一都督府二十二衛三通政司四刑部五都察院六監察御史七斷事司八吏部等五部九應天府十兵馬司十一太常寺十二欽天監若太常寺奏祭祀則在各衙門之先又定凡上御奉天華蓋謹身殿奏事百官行叩頭禮畢近侍官及監察御史升殿侍班其奏事官俱升殿分東西班立儀禮司依次贊某衙門奏事奏畢各官依次退出其餘官員不升殿者俱於中左中右門外兩廊伺候奏事官出則皆出若於文華殿啓事則詹事府在先餘依奏事次第永樂七年令大寒早朝上御奉天門百官行叩頭禮侍班俟鴻臚寺官引謝恩見辭人員行禮畢駕興御右順門內便殿百官有事奏者以次入奏無事者退治職務正統七年令凡看牲及遣祭官遇聖駕升殿俱於殿中復命若御奉天門視事亦於百官未行禮之先復命成化元年令每日早朝各衙門并公差官員具本面奏及通政司類進本狀各具手本備開所奏事件送禮科收照次日將收到奏目并各衙門送到奏題本狀通具奏目送司禮監交收以候類進凡晚朝奏事洪武二十九年定凡晚朝惟通政司六科給事中守衛官奏事各衙門有軍情重事許奏餘皆不許永樂四年令六部及近侍官有事當商確者皆於晚朝陳奏凡奏啓事目洪武二十八年定五軍都督府合奏啓軍情機密守衛門禁等事修築城池改設衛所賞賜馬匹關換轉銷等項提問軍職整㸃大軍官員房屋調撥官軍及升調隊伍內外軍官奔喪遷葬祭祀旗軍併鎗升用月報為事軍官官軍有弟姪兒男為事充軍告完聚關領軍器給配為奴人口告給聚提取邉境恩軍查理軍士回話軍官替職未及六十嵗者各都司年終回銷未完勘合官吏還鄉老幼軍屬首告收藏軍器知在原告患病在逃病故五軍所屬在京衛分凡奏啓事務除軍中機密事情及守衛門禁關防等事不分官旗軍人許令徑奏其餘合行事務俱繇該府具奏施行吏部合奏啓除授官員升調改除黜陟開設革併衙門襲爵封贈誥敕散官土官承襲致仕官員貼黃給由起復考核給假官員監生問事吏員書寫告出仕放回事故人材秀才官員人等告侍親殘疾送問五品以上官員起取人材秀才官員復姓更名官員告極刑吏告重役京官并問事書寫人告丁憂進人材秀才册户部合奏啓嵗奏㑹計稅糧馬草改撥糧儲賑濟饑民賞賜水旱災傷拋荒田土除豁稅糧儹運邊方糧儲調撥官軍屯種為事官軍告免追該扣俸糧給散煎鹽工本預備糧儲提問在外五品以上官員在京官員原告病故拖缺并侵盜錢糧追徵無納歸并州縣㸃閘户口欽給官民房屋田地各處盤㸃糧斛禮部合奏啓賞賜軍官祭祀建言表箋灾異旌表科舉四夷進貢鑄降印信罷閒事故生員雨澤日月交食歷日館待賓客侍親遣官祭祀為格為例冠婚喪祭外國請求考察禮儀制度厨役告事故下程鈔錠僧道度牒兵部合奏啓選用軍職升調襲替除降等項軍務誥敕封贈馬政送收關換整㸃調撥優給貼黃符驗升用總小旗整㸃大軍開設衙門優給軍役等項調撥官軍整理驛傳投充力士較尉軍職官員家人投軍軍官軍人告給正軍垜集首報查理軍士旗軍勘合由帖給賞軍官復姓更名原告逃故護衛軍旗及邊衛恩軍有犯提取提問軍職并在京文職及在外文職五品以上官刑部合奏啓追問黨逆處决重囚犯法軍官送問并申欣回話等項首黨逆原告實引賞發落犯人涉虛抵罪踈放被誣者提問軍職并在京文職及在外五品以上官各衙門盤獲犯屬提邉遠恩軍病故原告并被問軍官追贓不足家屬綁縳民害等項得實引賞原告發落犯人抄劄入官馬騾編發恩軍工役囚人進册工部合奏啓水利水害修築河岸橋道在外修理城池衙門公廨倉厫等項營造支用官物差撥軍民人匠在京在外衛所營造及修理􅊑隻關支一應物料成造軍器軍裝關支軍器賞賜收買牛隻農具各處差人解納銅鐵等項顔料門上稱折起差均工人夫提到工役故囚補役户丁告單丁田糧重大老疾及有充軍在京住坐倉腳夫老疾告回原籍都察院合奏啓處决重囚追贓不足家屬追問并申訴回話追問黨逆病故原告及軍官相視抄劄等項入官馬騾賞賜犯法軍官㸃差御史提取邊軍提問軍職并在外文職五品以上官在京官員大理寺合奏啓引奏軍官日奏審過刑名月奏囚數軍官應合襲廕子孫并授封祖父母父母妻有犯駕前將軍力士較尉有犯重罪并二次犯罪者文職官類奏逐日先將發審奏本奏送該科公文立案回報該衙門先將其餘人數依律發落有司入流官員類奏覆奏重刑各衙門二次番異三次擬罪不當或將易於歸結事理淹禁日久致令原告并平人身死及問事顛倒是非并發審奏本不如式等項送問原問官吏五軍斷事官合奏啓後革斷事官追問黨逆送問并申訴回話軍官原告患病及病故提問軍職并在外文職五品以上官在內京官抄劄等項入官馬騾給賞犯法軍官提取邊軍處决重囚追贓不足家屬十二衛合奏啓內除軍中機密事情及守衛門禁關防等不分官旗軍人許令徑奏其餘合行事務自下而上俱繇本衛具奏軍中機密事情守衛門禁等事整㸃大軍馬匹關撥轉銷等項關支一應賞賜官員房屋調撥官軍隊伍官員奔喪遷葬祭祀關領軍器還鄉老幼屬旗軍併鎗升用首告收藏軍器月報官軍馬騾給配家小凡不合奏啓止呈該衙門施行軍官替職勾補逃亡事故等項軍士病故軍職官員老病不堪應役無丁旗軍還官賞賜鹽糧倒死馬騾驢肉臟軍官缺員貼黃給誥出姓更名缺首領官吏幼軍收充正軍老軍代役收受倉糧草料放支等項錢糧文卷差錯遺漏送法司奸盜詐僞人命鬭毆相爭一切詞訟連狀送斷事官理問如有干礙軍情斷事官具奏提問凡奏事儀節洪武三年定凡百官奏事皆跪有㫖令起即起進退皆以次毋得攙越凡諸儒臣於御前奏事或進呈文字恐有口氣體氣須退立二三步毋輒近御案立須於東西隅不得直前凡上位行立去處諸人不得輒便奏事跪拜必候坐定方許奏事行禮俱要取便北向二十六年令凡百官御前奏對務必從實知則為知不許妄對凡奏啓限制洪武二十五年令凡差使人員除王府并軍前差到及要緊軍務奏聞外其各衙門催辦公事勾軍提人等項復命人員如有事務不完等項該科批寫緣由送各該衙門整理及各衙門一應編號手本送該科皆不必煩奏二十九年令朝班奏啓事務除五府六部都察院通政司斷事官十二衛照依定例具本奏啓其餘官員軍民人等若有事奏儀禮司打㸃六科給事中各一員每日於午門外照依該管事務總收奏狀入奏監察御史一員公同看視其有不經繇各該官員將自己瑣碎事務徑自奏啓紊煩者罪之三十年令通政司許早晚朝奏事及有軍情重事不時入奏其各衙門凡有一應事務止於早朝大班內奏啓不許朝退又將瑣碎事務於右順門題奏永樂八年令各衙門行過事件誤違舊制者許其改正具本送該科不必面奏凡題本覆奏永樂二十二年令諸司有急切機務不得即面陳者許具題本封進其餘大小公私之事並於公朝陳奏成化元年令一應奏題本有㫖意者六部都察院等衙門抄出即明白覆奏發落不許稽緩若過五日不覆奏者該科以聞凡在京文武衙門奏題本謹封完備俱差屬官捧入左順門進呈諸司朝覲儀凡天下諸司朝覲官自十二月十六日為始鴻臚寺官陸續引見二十五日以後每日常朝方面官入至奉天門前隨班行禮畢於文班內序立視常朝官品級各降一等知府知州知縣及諸司首領官吏土官衙門把事土吏人等俱於午門外行禮畢東西分班序立正月初一日大朝㑹以後方面官於奉天殿前隨班序立知府以下奉天門金水橋南仍分東西序立其行禮俱如常朝儀萬厯五年定五欵凡朝覲兩京府尹行太僕寺苑馬寺卿布按二司俱於十二月十六日朝見外班行禮畢繇右掖門至御前鴻臚寺官以次引見其鹽運司及府州縣有司官吏浙江江西十七日山東山西十八日河南陜西十九日湖廣南直𨽻二十日福建四川二十一日廣東廣西二十二日雲南貴州二十三日北直𨽻二十四日各朝見外班行禮畢仍至御前鴻臚寺官引見如遇是日免朝各官止於外班行禮候御朝之日仍補行引見禮二十五日以後例該常朝除兩京府尹照京官品級一體行禮序立外其行太僕寺苑馬寺卿布按二司入至皇極門前隨班行禮畢於文班內序立於京官之下各以次遞降一等知府知州知縣及諸司首領官吏土官衙門把事土吏人等午門外行禮畢東西分班序立正旦朝賀各官俱入殿前行禮其餘升殿日期行太僕寺苑馬寺卿布按二司仍於殿前隨班各降一等序立鹽運司知府以下于金水橋北東西序立其行禮俱如常儀凡朝覲官見辭謝恩不論己未入流各具公服行禮正旦朝賀各具朝服但不許僭著朱履凡遇常期俱穿本等錦繡服色凡奬賞廉能先期內官設御座於會極門之北設賞案稍東文武執事奏事等項官員各具吉服并序班引廉能官員各具青錦繡服至期俱於左掖門內斜廊面北序立管將軍官侍衛官俱於會極門礓䃰下立候駕出上升御座聽傳呼內閣并執事奏事等項官員繇大礓䃰下序班引廉能官繇斜廊行至東廊小礓䃰下面東立候管將軍官并侍衛官鴻臚寺掌印官以次立於御座南北向各立定內閣并執事奏事等項官員至大礓䃰上鴻臚寺掌印官贊入班各官照班次序立鳴贊贊鞠躬行一拜三叩頭禮畢內閣并吏部都察院堂上官禮部錦衣衛掌印官吏科都給事中掌河南道御史禮部郎中俱於御座西面東序立侍班御史二員序班二員俱於御座南面北立執事序班四員於賞案稍南面西立鴻臚寺掌印官贊奏事贊起案序班舉賞案置於御前稍南贊引廉能官序班引廉能官立於案南照班次序立鳴贊贊跪廉能官跪鴻臚寺掌印官贊吏部等衙門過吏部都察院吏科都給事中掌河南道御史過中跪吏部堂上官奏後面跪的是廉能官見在應朝某省某等官某等若干員奉㫖引來聽候奬賞奏知奏畢起身一躬入班鳴贊贊叩頭廉能官叩頭候天語奬諭承㫖叩頭上說與他每賞賜還與酒飯喫鴻臚寺掌印官并禮部郎中承㫖畢鳴贊贊叩頭廉能官叩頭畢起身一揖一躬序班引下鴻臚寺掌印官贊起案序班舉案置於原所吏部都察院堂上官吏科都給事中掌河南道御史過中跪致詞仰惟皇上留心吏治澤被生民臣等不勝慶忭叩首稱賀鳴贊贊叩頭吏部等官叩頭畢起身一揖一躬入班鴻臚寺掌印官過中跪奏奏事畢候駕興各官退凡大班紏劾朝覲官考察存留者鴻臚寺官引上御道跪法司及科道官各露草紏劾怠職之罪朝覲官俱俯伏免冠待罪候㫖如奉㫖免宥隨即加冠叩頭連呼萬嵗次日謝恩仍前朝參凡朝覲官事完辭朝兩京府尹行太僕寺苑馬寺卿布按二司外班行禮畢仍照前引見面辭鹽運司知府以下等官止於外班行禮萬厯七年諭張真人方外之流無民社寄其朝覲免行入朝門禁洪武十一年詔朝參文武官給領牙牌懸帶出入無牌者依律論罪借者及借與者罪同在外來朝官於各門附名出入又令守門指揮千百户日一更代士卒三日一更代凡內官內使出入皆用號牌若有以兵器雜藥進者論如律守門軍士失於覺察者罪如之若奉駕出入則以御史一員臨門察視二十一年令朝參官員門籍各衙門自置景泰三年令官員人等至皇城四門下馬牌邊橫過俱下馬其順行不係橫過不在禁例成化間令文武官員公差患病等項呈堂出印信手本填注門籍候病痊及公差回還之日仍用手本開注又令文武大小官員入朝跟隨辦事官吏人等照出午門例於長安左右門承天門端門各下小木牌進入出則收回嘉靖九年題准各文武衙門公差官員奉有敕書責限完事及公所窵逺不便趨朝者方許於門籍注差仍開奉何敕書公所係在何處以便查考其患病若止係咳嗽等小疾於朝儀有礙者量許注門籍五日若病非旦夕可愈者必須堂上官印信手本開寫明白其有纍月不朝及全司稱病者文官聽吏科武官聽兵科每月將門籍查出紏舉其屢經紏劾文官至三次武官至五次吏兵二部徑自奏聞區處東宫朝儀洪武間定凡朔望日文武百官退朝詣文華殿門外分東西侍立俟皇太子升殿樂作百官行一拜禮其謝恩見辭官員人等亦隨班行禮禮畢以次出十四年令啓事東宫者皆稱臣永樂二年令文武官員常朝行叩頭禮三師三少詹事府官左右春坊司經局官翰林院官鴻臚寺官六科給事中錦衣衛官左右序立於文華殿門之外鴻臚寺序班通事舍人引文武百官於丹陛下丹墀內東西序立照依衙門資次啓事監察御史二員司直郎清紀郎日輪二員北向侍立紏儀啓事畢百官齊退遇有召問亦須前項官員一同進出如獨進并獨員留後者許監察御史鴻臚寺官司直郎清紀郎紏劾合啓事務在京衙門止用奏本在外衙門務要奏本一本啓本一本其詹事府主簿録事同春坊司直郎清紀郎司諫分為六科於司禮監共關揭帖開寫逐日啓過本內事件略節緣繇及令㫖所發落大略六科給事中亦具題帖各另奏進詹事府主簿録事同左右春坊司直郎清紀郎司諫等官遇啓事各紀皇太子令㫖如所啓事或差訛隨即紏劾啓事畢同詹事府詳審事之可否可行者令該司批所得令㫖或事不可行及啓本內與說帖不同不問事之大小悉以奏聞登極儀國初登極禮儀吳元年所定用王禮頗略故不載至洪武元年高皇正大位其儀始詳昭皇以儲宫嗣立稍有所更定纍朝因之惟肅皇自藩國入繼大統與嗣皇異其儀各備載於後云高皇帝登極儀洪武元年圜丘告祭禮成較尉設金椅於郊壇前之東南向設冕服案於金椅前候望瘞畢丞相諸大臣率百官於望瘞位跪奏曰告祭禮成請即皇帝位羣臣扶擁至金椅上坐百官先排班執事官舉冕服案寶案至前丞相諸大臣奉衮冕跪進置於案上丞相等就取衮冕加於聖躬丞相等入班通贊唱排班班齊鞠躬樂作拜興拜興拜興拜興平身樂止百官拜興如之通贊唱班首詣前引禮引丞相至上位前通贊唱跪搢笏丞相跪搢笏承傳唱衆官皆跪百官跪捧寶官開盝取玉寶跪授丞相丞相捧寶上言皇帝進登大位臣等謹上御寶尚寶卿受寶收入盝內通贊唱就位拜興平身百官拜興如之通贊唱復位引禮官引丞相自西降復位通贊唱鞠躬拜興拜興平身搢笏鞠躬三舞蹈跪左膝三叩頭山呼山呼再山呼跪右膝出笏贊俯伏興平身鞠躬拜興拜興拜興拜興平身皇上解嚴通贊唱捲班百官退禮畢具鹵簿導從詣太廟奉上册寶追尊四代考妣仍告祀社稷還具衮冕御奉天殿百官上表稱賀前期侍儀司設表案於丹墀中內道之西北設丞相以下百官拜位於內道上下之東西每等異位重行北面捧表官宣表官展表官位於表案之西東向糾儀御史二人位於表案之南東西相向宿衛鎮撫二人位於東西陛下護衛百户二十四人位於宿衛鎮撫之南稍後知班二人位於文武官拜位之北東西相向通贊贊禮二人位於知班之北通贊在西贊禮在東引文武班四人位於文武官拜位之北稍後皆東西相向引殿前班二人位於引武班之南舉表案二人位於引武班之北舉殿上表案二人位於西階之下東向其丹陛上設殿前班指揮司官三員侍立位於陛上之西東向宣徽院官三員侍立位於陛上之東西向儀鸞司官位於殿中門之左右護衛千户八人位於殿東西門之左右俱東西相向鳴鞭四人列於殿前班之南北向將軍六人位於殿門之左右天武將軍四人位於陛上之四隅皆東西相向殿上尚寶司設寶案於正中侍儀司設表案於寶案之南文官侍從班起居注給事中殿中侍御史尚寶卿位於殿上之東西向武官侍從班懸刀指揮位於殿上之西東向受表官位於文官侍從班之南西向內贊二人位於受表官之南捲簾將軍二人位於簾前俱東西相向是日清晨拱衛司陳設鹵簿列甲士於午門外之東西列旗仗於奉天門外之東西龍旗十二分左右用甲士十二人北斗旗一纛一居前豹尾一居後俱用甲士三人虎豹各二馴象六分左右左右布旗六十四門旗日旗月旗青龍白虎旗風雲雷雨江河淮濟旗天馬天祿白澤朱雀𤣥武等旗木火土金水五星五嶽旗熊旗鸞旗及二十八宿旗各六行每旗用甲士五人一人執旗四人執弓弩設五輅於奉天門外玉輅居中左金輅次革輅右象輅次木輅俱並列丹墀左右布黃麾仗黃蓋華蓋曲蓋紫方傘紅方傘雉扇朱團扇羽葆幢豹尾龍頭竿信幡傳教幡告止幡絳引幡戟氅戈氅儀鍠氅等各三行丹陛左右陳幢節響節金節燭籠青龍白虎幢班劍五杖立瓜卧瓜儀刀鎧杖㦸骨朵朱雀𤣥武幢等各三行殿門左右設圓蓋一金交椅金腳踏水盆水罐團黃扇紅扇皆較尉擎執侍儀舍人二人舉表案入就殿上鼓初嚴百官具朝服次嚴各依品級齊班於午門外以北為上東西相向通班贊禮及宿衛鎮撫等官入就位諸侍衛官各服其器服及尚寶卿侍從官入鼓三嚴丞相以下文武官以次入各就位皇帝衮冕升御座大樂鼓吹振作樂止將軍捲簾尚寶卿以寶置於案拱衛司鳴鞭引班引文武百官入丹墀拜位北面立初行樂作至位樂止知班唱班齊贊禮唱鞠躬拜樂作四拜興平身樂止捧表以下官繇殿西門入內贊唱進表捧表官捧表跪進於案前受表官搢笏跪於案東受表置於案出笏興退立於殿內之西東向內贊唱宣表宣表官詣案前搢笏取表跪宣於殿內之西展表官搢笏同跪展宣訖展表官出笏一人以表復置於案俱退立於位宣表官俯伏興同捧表以下官出殿西門降自西階復位贊禮唱鞠躬樂作四拜樂止唱搢笏鞠躬三舞蹈唱跪唱山呼各拱手加額呼萬嵗者三樂工軍較齊聲鼓應之唱出笏俯伏興樂作四拜賀畢遂遣官冊皇后冊立皇太子以即位詔告天下昭皇帝登極儀宣德以後同永樂二十二年七月公侯駙馬伯文武百官及軍民耆老等上箋勸進者三令㫖俞允乃命禮部擇日具儀先期司設監等衙門於華蓋殿陳御座於中仍於奉天殿設寶座欽天監設定時鼓尚寶司設寶案於奉天殿鴻臚寺設表案於丹陛上教坊司設中和韶樂設而不作鴻臚寺設詔案及錦衣衛設雲蓋雲盤於奉天殿內東别設雲蓋於承天門上設雲輿於午門外設宣讀案於承天門上西南向是日早遣官祇告天地宗廟社稷上具孝服設酒果親詣大行皇帝几筵前祇告受命畢即於奉天殿前設香案酒果等物具冕服行告天地禮隨赴奉先殿謁告祖宗畢仍具衮冕詣大行皇帝几筵前行五拜三叩頭禮畢詣母后前行五拜三叩頭禮畢詣奉天殿即位是日早鳴鍾鼓錦衣衛設鹵簿大駕上服衮冕御華蓋殿文武百官各具朝服入丹墀內候鴻臚寺引執事官進至華蓋殿行禮畢贊各供事奏請升殿上繇中門出升寶座錦衣衛鳴鞭文武百官上表稱賀上命百官免賀免宣表止行五拜三叩頭禮成化以後執事官進至華蓋殿將行禮時即傳㫖百官免賀百官出至承天門外候翰林院官齎詔書用寶訖鴻臚寺官請頒詔翰林院官捧詔授禮部官繇奉天殿左門出錦衣衛於午門前候捧詔置雲蓋中導引至承天門開讀行禮如常儀肅皇帝登極儀正德十六年三月十四日奉武宗皇帝遺詔迎上入承大統次日皇親駙馬司禮監太監內閣大學士禮部尚書等官齎捧詔諭金符馳詣安陸藩府奉迎內官監工部蓋行殿於宣武門外南向司設監設帷幄御座於中尚衣監備翼善冠服錦衣衛備鹵簿大駕以候四月二十一日早文武百官出郊各具青緑錦繡服迎駕入行殿朝見行四拜禮明日即皇帝位先期司設監設御座於華蓋殿設寶座於奉天殿欽天監設定時鼓錦衣衛設鹵簿大駕尚寶司設寶案於奉天殿鴻臚寺設表案於丹陛上教坊司設中和韶樂設而不作鴻臚寺設詔案錦衣衛設雲蓋雲盤於奉天殿內之東别設雲蓋於承天門設雲輿於午門外設宣讀案於承天門上西南向至日遣官祭告天地宗廟社稷駕繇大明門入至文華殿省定詔草欽改年號畢設酒果於大行皇帝几筵前上具素服謁告畢設香案酒果等物於奉天殿丹陛上上具衮冕服行告天地禮畢詣奉先殿奉慈殿謁告畢仍詣大行皇帝几筵前行禮畢詣慈壽皇太后莊肅皇后前各行禮畢上御華蓋殿文武百官各具朝服入丹墀內序立鴻臚寺引執事官進至華蓋殿傳㫖百官免賀止行五拜三叩頭禮傳畢贊執事官行禮贊各供事鴻臚寺正官跪奏請升殿上繇中門出升寶座錦衣衛鳴鞭欽天監報時鴻臚寺贊行五拜三叩頭禮訖百官出至承天門外俟翰林院官齎詔用寶訖鴻臚寺官奏請頒詔翰林院官捧詔授禮部官繇奉天殿左門出錦衣衛於午門前候捧詔置雲蓋雲盤中導雲輿至承天門開讀行禮如常儀禮部志稿卷十
