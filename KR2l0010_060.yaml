body:
  text: 禮部志稿卷六十明俞汝楫編宴饗備考宴儀設事饌供事洪武二年禮部言光祿寺卿職御膳今宰相儒臣侍食亦卿供之於禮未安宜設直長四員遇百官賜食御前者則令供事從事宴官禁限洪武六年禮部言文武官犯杖罪三次者賜宴不得上殿及內廷從之宴夷使班次洪武二十四年禮部言明年正旦朝賀及筵宴其髙麗國權國事王瑤子奭班次宜列於六部尚書之次其從臣於中左門序坐凡諸畨國使臣悉以此為序從之萬夀宴百官定位永樂元年禮部以萬夀聖節宴百官預定其位次進呈上命駙馬儀賓及隨侍各王來朝官宴於三公府四品以上文武官諸學士及在京僧道官大龍興寺住持侍宴奉天殿在京各衙門堂上六品以上官近侍官修史官宴於中左門在外進表官四夷朝貢土官宴於中右門餘文武官宴於丹墀內慶成簪花禮部儀制司每年大祀慶成如遇辦事准精膳清吏司手本開具數目偹辦宴花本司行工部都水清吏司如數造辦預先送司分派至期進朝簪戴殿上官東七員西七員俱司㕔四司中左門進士八員中右門進士八員丹墀東丹陛下之東稍北進士四員丹陛下之東稍南進士四員丹墀西丹墀下之南進士并副使四員是日俱穿履鞋殿上東一班至六班共若干員翠花若干監生儒士辦事當該官吏八名殿上西一班至六班共若干員翠花若干監生儒士辦事官吏七名東西大小花各二箱每箱若干枝在東者置於殿內東第一門之墻下在西者置於殿內西第一門候駕至每人手執十枝以備取用取訖復取以事完為度殿內與宴官承㫖官侍班官俱各親簪錦衣衛侍班官分官一員簪帶光祿寺鴻臚寺執事屬官監生送與令其自相簪帶金甲將軍明盔內官送與手接殿外錦衣衛侍班官鴻臚寺𫝊讚官俱先送羅花若干枝金甲將軍先總付一頭領之教坊司官彼自來領辦事吏一名中左門一班至六班若干員翠花若干羅花若干監生儒士當該吏五名中右門一班至五班共若干員翠花若干監生儒士當該吏五名每邊花五箱每箱若干枝在東者置於西欄杆下在西者置於東欄杆下候宴桌將齊先催光祿寺擺饅頭照紅帖每饅頭一分插花一枝臨時彼自取帶丹墀東丹陛下之東稍北一班至二班共若干員翠花若干羅花若干監生儒士當該辦事官五名三班至四班共若干員翠花若干羅花若干五班至六班共若干員翠花若干羅花若干監生儒士當該辦事官吏五名丹陛下之東稍南一班至二班三班至四班共若干員翠花若干羅花若干監生儒士當該辦事官吏五名五班至六班共若干員羅花若干監生儒士四名東丹墀花一箱若干枝專散與金甲將軍等項當該辦事吏一名一班至二班共若干員羅花若干監生儒士當該辦事官吏五名三班至四班共若干員羅花若干儒士當該辦事官吏六名五班至六班共若干員羅花若干儒士當該辦事吏六名每邊花六箱每箱若干枝先照班次置次置定各於饅頭插完俱送至文武樓姜擦下數入二箱留一箱百十餘枝候臨時取用其一箱送至殿內聼侯如無不拘糾儀御史序班巡綽錦衣衛千百戶尚膳監千百户光祿寺官俱先送與儒士辦事吏二名翠花若干羅花若干西丹墀花一箱若干枝専散與大漢將軍等項辦事吏一名以上監生儒士辦事官先一日早赴司領花次日五更俱赴午門外取齊宴例罷百官朝參宴洪武二十八年禮部臣言百官朝參賜食實出厚恩緣職事衆多供億為難請罷賜從之先是每旦視朝奏事畢賜百官食上御奉天門或華蓋武英等殿公侯一品侍坐於門內二品至四品及翰林院等官坐於門外其餘五品以下官於丹墀內文東武西重行例位贊禮贊拜叩頭然後就坐光祿司進膳案然後以次設饌食罷百官乃拜叩頭而退率以為常至是始罷之節錢鈔成化元年禮部奏冬至節例賜百官宴請命光祿寺治具上命給以節錢鈔免宴祖宗以來凡遇聖節正旦冬至皆賜羣臣宴官卑祿薄者給以鈔免宴謂之節錢俾均惠其家屬自正統以來內臣用事者畏侍宴久立遂罷宴皆給以鈔因而成例午節賜廷臣宴嘉靖十五年五月朔上諭大學士李時曰端午節候朕奉兩宫賞節昨有慈諭罷免朕惟宴樂一節不可少不可過少則不見交欣之情過則有傷耽樂之好若夫君臣一賞足寓交泰之意卿其會勳言一計之已復諭曰宴禮必得樂歌今教坊司不知備否其語俚俗我太祖太宗屢有宴賜其樂儀今存否可同一會議禮官擬上其儀朕裁擇焉於是禮部尚書夏言等言皇上欲以端陽之節舉君臣宴賞以見交歡之情甚盛典也蓋君臣之禮以嚴敬為主然一於嚴敬則情或不通而無以盡忠告之益此有周盛時所以有君歌鹿鳴臣歌天保之詩先儒謂太和元氣在成周宇宙間良以是也臣等謹擇儀注以上與是年進寶訓實録賜宴儀同見職掌乞舉行宴禮嘉靖二年上以四方災傷重大令暫免明年慶成宴翰林院修撰唐皋及兵科給事中裴紹宗各言祭祝之禮莫重於郊丘君臣之情必通於宴享往以國戚兩廢大禮今且從吉宜即舉行豈可以災傷之故復免章下禮部議復言災傷免宴仰見皇上恤災之心今各官復有所請乞仍賜舉行從之災異不免宴隆慶三年以嵗多災異年谷不豐諭禮部暫免慶成宴於是禮部言慶成大宴乃郊禋盛典上以昭成帝祉下以惠浹羣工國家雖有災變不得己者也且皇上登極以來彞章首舉費不甚繁輟而不行是謂缺典惟上仍賜舉行以從羣望不允禮科都給事中王之垣等復以為請得㫖待明年行大樂備考設樂朝賀樂吳元年癸酉命自今凡朝賀不用女樂設樂閲試吳元年秋七月乙亥朔先是命選道童俊秀者充樂武生至是始集上御㦸門召樂士朱升及范權領樂武生入見設雅樂閲試之上親擊石磬命升辨識五音升不能審以宫音為徵音上曰升每言能審音至辨石音何以宫作徵耶起居注熊鼎對曰八音之中石聲最難和古惟后蘷能和磬聲故書曰豫擊石拊石百獸率舞上曰石聲固難和然樂以人聲為主人聲和即八音諧和矣因命樂生發歌一曲上復嘆曰古者作樂以和民聲格神人而與天地同其和近世儒者鮮知音律之學欲樂和顧不難耶鼎復對曰樂音不在外求實在人君一心君心和則天地之氣亦和天地之氣和則樂亦無不和矣上深然之定樂舞吳元年十月癸亥定樂舞之制樂生用道童如故舞生以軍民俊秀子弟為之文武各六十四人文生唐帽紫大袖袍執羽籥武生唐帽絳大袖袍執干戚俱革帶皂靴尋改用幞頭緋紫袍靴帶仍舊考宫縣樂洪武二年九月癸丑命考宫縣樂制詔有司訪求能通律音者送京師定宴享九奏樂章洪武四年吏部尚書詹同禮部尚書陶凱製宴享九奏樂章成上之其曲一曰本大初二曰仰大明三曰民初生四曰品物亨五曰御六龍六曰泰階平七曰君德成八曰聖道成九曰樂清寧先是上厭前代樂章率用諛詞以為容悅甚者鄙陋不稱乃命凱等製其詞既成上命協音律者歌之謂侍臣曰禮以道敬樂以宣和不敬不和何以為治元時古樂俱廢惟淫詞艷曲更唱迭和又使噍殺之聲與正音相雜甚者以古先帝王祀典神祇飾為舞隊諧戲殿廷殊非所以導中和崇治體也令所製樂章頗協音律有和平廣大之意自今一切流俗喧譊淫䙝之樂悉屏去之太和鐘制洪武六年鑄太和鐘成其制倣宋景鍾以九九為數髙八尺一寸拱以九龍植以龍簴建樓於圜丘齊宫之東北懸之每郊祀俟駕動則鐘聲作既升壇鐘聲止則衆音作禮畢升輦又擊之俟導駕樂作則止然未有以名之禮官奏曰昔黃帝有五鐘其一曰景鐘景大也惟功大者其鐘大故宋之鐘亦緣以為名請名之曰景鐘上曰古鐘名宜更之遂取周易保合太和之義更名之曰太和鐘樂章寓規諫洪武七年八月乙卯翰林院奏進回鑾樂歌先是上以祭祀還宫宜用樂舞前導命翰林儒臣撰樂章以致敬慎監戒之意諭之曰古人詩歌辭曲皆寓諷諫之意後世樂章惟聞頌美無復古意夫常聞諷諫則使人惕然有警若頌美之辭使人聞之意怠而自恃之心生蓋自恃者日驕自警者日强朕意如此卿等其撰述毋有所避至是上所撰神降祥神貺酣酒色荒禽荒等曲凡三十九章曰回鑾樂歌其辭皆陳規諫其舞分為三隊隊皆八人禮部圖其制以上命樂工肄習之請設特鐘特磬嘉靖十四年太常寺卿張鶚請設特鐘特磬以為樂節復宫縣以備古制候元氣以定鍾律禮部言特鐘特磬所謂金聲玉振之也羣廟行禮奏樂必得此為節而後可舉誠宜特設也樂縣之制夏商以前無聞見於周官則有宫縣軒縣判縣特縣之别天子宫縣四面以象四方體十二時列十二律特鐘特磬各居其中編鐘編磬各分其列四隅四正各有序配然猶屬器數之末廟庭之中周旋未便不得更制也惟候氣以定鍾律則自古作樂之本無易此故黃鍾為聲氣之元候氣之法實求中氣以定中氣最為作樂本原其說若重室墐戶截管實灰復緹按厯氣至則吹灰動素證以纍黍具有成法依所奏築室於圜丘外垣隙地選天文生知厯候者往相其役待有次第本部委官考驗從之已乃詔取山西長子縣羊頭山黍大小中三等各五斗以偹候氣定律用樂進膳免樂洪武三年禮部尚書陶凱等言古者人主進膳日舉樂今擬上御謹身殿早膳侍衛指揮使布列甲士兩行光祿卿具服率其屬以黃紗罩所進膳由中道入儀鑾使具服率其屬以黃蓋復之以金盆罐隨入教坊司官奏樂內使監率內使執香爐香盒唾盂唾壺拂子諸物侍左右上御東西耳房及兩廡進膳則免樂上曰古之帝王功德隆盛治洽生民上下之間熙然太和雖日一舉樂未為過也今天下雖定人民未蘇北征將士尚在暴露之中此朕宵旰憂勤之不暇豈可忘將士之勞而自為佚樂哉俟大兵凱還士卒無戰伐之勞人民罷轉輸之苦然後以樂侑膳未晚也改定樂章成化元年國子監助教劉翔奏今日郊廟樂章皆太祖髙皇帝祀仁祖淳皇帝配天時享之事皇上奉列聖配天時享郊廟樂章别當有作章下禮部會內閣並羣臣集議言我朝郊祀樂章歌頌報稱可萬世通行享廟迎神樂章有曰助我眇躬開基建功終獻樂章有曰承前人之德化家為國毋曰豫小子基命成績乃是創業之事仁廟初已易助我眇躬為致我祖宗又易後四句為惟前人功德肇膺天位延及豫小子奄受方國于詞于義皆當其餘亦皆推原祖宗積慶發祥衍及無窮之意可萬世通行不須别有改作從之雩祀樂奏嘉靖十二年禮部尚書夏言按古者大雩之祀命樂正習盛樂舞皇舞蓋假之聲容之和以宣暢陰陽之氣雨必陰陽和而始降也然上世之禮無考而後代之制不同臣等參酌古今為之會通一切奠獻樂歌且如常儀惟盛樂皇舞之說宜稍遵古禮定為聖制三獻禮成之後九奏樂止之時燎揚將舉贊者宜贊樂奏雲門之舞樂舉乃贊禮畢仍命儒臣櫽括雲漢詩辭别製雲門一曲使文武舞士並舞而合歌之雲門者乃帝堯之樂周官大司樂以祀天神之舞取其雲出天氣雨出地氣也仍於神樂觀增設鼓吹數畨選教舞童百人青衣執扇繞壇周旋歌雲門之曲而舞曲凡九成其舞節樂數宜下太常會本部議奏因其儀言大雩乃祀天禱雨之祭如遇一嵗天氣亢暵則於季春之末禮部具奏請行擬雩祀用盛樂嘉靖十六年禮部言古者龍見而雩與啓蟄而郊之意同宜用盛樂通典曰禜於南郊之旁命樂正習盛樂舞皇舞蓋樂舞者所以震蕩聲容宣暢和氣詔告天地感通神明兾隂陽和而雨澤降也先本部議擬雩壇祈禱禮儀神樂觀正樂外增設鼓吹選教舞童青衣執雨扇繞壇周旋歌雲門之曲而舞已經選有樂章而儀物未備宜命所司造舞衣羽旄等物選見在樂舞生年幼質秀者百人教習歌舞充雩壇用庶巨典靡闕得㫖報罷審樂審樂音吳元年甲寅命協律郎冷謙協樂章聲譜令樂生肄習之考正四廟雅樂吳元年十月戊午考正四廟雅樂令協律郎冷謙校定音律及編鐘編磬等器請敕儒臣審定雅樂景泰元年國子監助教劉翔言祖宗以來禮樂之文制作寖備惟慶成之宴視樂之儀釋奠之祭雅樂未作臣以為宜敕儒臣推演道德教化之意君臣相與之樂作為詩章協之律吕如古之靈臺辟雍清廟湛露之樂以備一代之典至於春秋監學之祭太常典司禮樂而贊相之際過於急促殊無從容悠緩之意首唱升壇亦甚無謂夫既有廟宇則非壇墠矣又所設樂器悉列於露臺之上使堂上堂下之樂混於舞列甚乖禮制乞下禮官從宜改正庶首善之地禮序樂和足為四方之式史氏曰前此幸學釋奠皆不設樂慶成宴惟用教坊供應春秋所奏大成雅樂數密淺短倏然而鳴詘然而止殊不成聲大率如樂終之亂故翔槩及之時以襲用既久竟莫之改訪名儒以正雅樂𢎞治十五年禮部覆吏尚馬文升議我太祖髙皇帝常命儒臣考正八音修造樂器重定樂章其樂歌之詞多自裁定但迄今百三十餘年樂音不復校正中間容有舛訛當釐正者近聞皇上命太常寺知音官於內府造大祀樂器以純金為鐘以西玉為磬夫自堯舜作樂以來鐘必用青銅磬必用靈璧石若用純金西玉為鐘磬恐其聲不可合衆音不足以感格神明且今太常之官恐亦不足以當製器協律之任請敕禮部移文天下諸司博求中外臣工及山林畎畝有精曉音律者禮送赴京本部仍會太常寺再加講論以求至當然後相與造樂器正樂音庶聖祖所定之樂可復於今日可𫝊於後世矣上嘉納之應詔考定聲樂嘉靖八年初禮部以上釐正郊典謂當考定雅樂疏請令吏部及科道求精曉音律如宋之胡瑗李照者吏科都給事中夏言遂以致仕甘肅行太僕寺丞張鶚應詔上令吏部趣召之鶚至即定元聲復古樂大樂之正必先定元聲元聲起自冥罔既覺之時亥子相乘之際積絲成毫積毫成釐積釐成分一時三十分一日十二時故聲生於日律起於辰氣在聲先聲在氣後若拘於器以求氣則氣不能致器而反受制於器何以定黃鍾起厯元故莫若用蔡元定多截竹以擬黃鍾之律長短每差一分冬至日按律而候依法而取如衆管中先飛灰者即得元氣驗其時如在子初二刻即子初一刻移於初二刻矣如在正二刻即子正一刻移於正二刻矣願命欽天監知厯官一人同臣參考元聲庶幾可得又言編鍾十六古人非徒示觀美蓋為旋宫而設其下八鍾黃鍾大吕太簇夾鍾姑洗仲吕㽔賔林鍾是已其上八鍾夷則南吕無射應鍾黃鍾大吕太簇夾鍾是已近世止用黃鍾一均而不遍具十六鍾則古人立樂之方已失况太常止以五凡工尺上一四六勾合字眼譜之去古益遠且兩律兼一字如黃鍾為黃合似矣又以大吕為下四太簇為髙四夾鍾為下一姑洗為髙一夷則為下工南吕為髙工之類何以旋宫取律所以止於黃鍾一均而已且黃鍾大吕太簇夾鍾為上四清聲何也蓋黃鍾為君尊上無比黃鍾為官則十一律皆受制焉臣民事物無敢凌越也至於夾鍾為宫則下生無射為徵無射上生仲吕為商仲吕下生黃鍾為羽然黃鍾正律之聲長非仲吕為商三分去一之次所以用黃鍾為羽也子聲即上黃六之清聲正為不敢用黃鍾全聲而用其半矣姑洗以下之均率若此四清聲之所由立也編鍾十六其理亦然宋胡瑗知此故以四清聲皆小其圍徑以就之黃鍾太簇二聲雖合大吕夾鍾二聲又非遂使十二律五聲皆不得正李照范鎮上用十二律不用四清聲其合於三分損益者則和矣至於夷則以降其臣民事物又何能尊卑有辨不相凌犯耶臣又考周禮圜鍾函鍾黃鍾天地人三宫之說有薦神之樂有降神之樂所謂薦神之樂乃奏黃鍾歌大吕子丑合也舞雲門以祀天神乃奏太簇歌應鍾寅亥合也舞咸池以祀地祇乃奏姑洗歌南吕辰酉合也舞大韶以祭四望乃奏㽔賔歌林鍾午未合也舞大夏以祭山川乃奏夷則歌小吕己申合也舞大武以享先祖舞大濩以享先妣所謂降神之樂冬至祀天南郊之圜丘則以圜鍾為宫黃鍾為角太簇為徵姑洗為羽是三者陽律之相繼相繼者天之道也夏至祭地於澤之方丘則以函鍾為宫夾鍾為角姑洗為徵南吕為羽是三者陰吕之相生相生者地之宫也祭宗廟以黃鍾為宫大吕為角太簇為徵夾鍾為羽是三者律吕之相合相合者人之情也且圜鍾夾鍾也生於房心之氣為天地之明堂祀天從此起宫在琴中角絃第十徽卯位也函鍾林鍾也生於坤位之氣在井東輿鬼之外主地祇祭從此起宫在琴中徵絃第五徽未位也黃鍾生於虛危之氣為宗廟祭人鬼從此起宫在琴中宫絃第三徽子位也至若六變而天神降八變而地祇格九變而人鬼享非有難易之分蓋陽數起子而終於少陰之申陰數起午而終於少陽之寅圜鍾在卯自卯至申六數故六變而天神降函鍾在未自未至寅八數故八變而地祇格黃鍾在子自子至申九數故九變而人鬼享此皆以本元之聲召本位之神故感通之理速也或者乃謂自漢以來天地鬼神聞新聲習矣何必改作不知自人觀天地則由漢迄今誠千七百年矣自天地觀人亦頃刻間耳自今正之猶可及也併進所著樂書二部其一曰大成樂舞圖譜自琴瑟以下諸樂逐字作譜其一曰古雅心談列十二圖以象十二律圖各有說又以琴為正聲樂之宗系凡郊廟大樂分注琴絃定徽各有歸旨且自謂心所獨契斷輪之妙有非口所能言者疏下禮部議復謂音律久廢即今太常協律等官不過循習工尺等字譜不復知有黃鍾等調臣等近奉詔演習新定郊祀樂章間舉古人遺制為問茫無以對今鶚奏謂四清聲所以為旋宫謂取琴聲不當接徽蓋已深識近樂之弊至欲取欽天監知厯者以互相參考尤為探本窮源之論似非目前司樂諸官所及上乃授鶚太常寺寺丞令詣太和殿較定舞鶚遂上言臣常閲周禮有郊祀之樂有宗祀之樂尊親分殊聲律自别臣伏聽世廟樂章律起林鍾均殊太廟臣竊異之蓋世廟與太廟同禮而林鍾與黃鍾異樂函鍾主地祇也位寓坤方星分井鬼樂奏八變以報資生之功故用林鍾起調林鍾畢調也黃鍾主宗廟也位分子也星隸虛危樂奏九成以報本源之德故用黃鍾起調黃鍾畢調也理義各有歸旨聲數默相感通况天地者父母之象大君者宗子之稱今以祀母之樂奏以祀子恐世廟在天之靈必不能安且享矣不知譜是樂者何所見也臣觀舊譜樂章字用黃鍾聲同太廟但審聽七聲中少一律今更補正暫依奏格則祖孫一氣相為流通函黃二宫不失均調尊親之分兩得神人之心胥悅矣乞敕禮官速改正之詔下禮部尚書李時等復奏曰鶚所言與臣等所聞於律吕諸書者深有所合蓋黃鍾一調以黃鍾為宫太簇為商姑洗為角㽔賔為變徵林鍾為徵南宫為羽應鍾為變宫舊章用合用四用一用尺用工去㽔賔之勾而越次用再生黃鍾之六此舊樂章之失也若林鍾一調則以林鍾為宫南吕為商應鍾為角大吕之半聲為變徵太簇之半聲為徵姑洗之半聲為羽㽔賔之半聲為變宫邇者沈居敬更協樂章用尺用合用四用一用工用六夫合黃鍾也四太簇之正聲也六黃鍾之子聲也以林鍾為宫而所用為角徵羽者皆非其一均之聲則謬甚矣况林鍾一調不宜用於宗廟而太廟與世廟不宜異調所見尤真自今宜用舊協音律惟加以㽔賔勾聲去再聲黃鍾之六改用應鍾之凡以成黃鍾一均庶於我皇上感格之誠深有所補上曰樂音即為更定勿誤廟享之用奏進樂書乞與正樂議嘉靖二十四年初禮部尚書嚴嵩覆奏本部於禮科抄出新選山西遼州同知李文察奏云臣聞諸周禮奏黃鍾歌大吕舞雲門以祀天神奏太簇歌應鍾舞咸池以祭地祇奏夷則歌小吕舞大濩以享先妣奏無射歌夾鍾舞大武以享先祖聞諸詩肅雍和鳴先祖是聽聞諸書舜命䕫典樂教胄子自古聖帝明王未有舍是而能以化成於天下者矣陛下之聖德復古樂於今日正所急之先務也故敢將順其美於樂記而有補說之作以足陳澔集說之意所以明樂理也於律吕新書而有補注之作以發蔡元定之藴所以明樂聲也於伏羲卦圖文王卦圖夏禹九疇圖箕子洪範圖而有解說之作所以明樂理之原也於興樂而有要論之作所以明古樂必可興於今日也不揣愚賤冒瀆奉獻以為興樂採擇之備覽且四聖圖中非徒寓乎樂理體無不具用無不周有養身之術焉有正心之方焉有修身之要焉有行政之道焉故臣又作四圖用說第一圖用說所以保聖躬也第二圖用說所以明聖心也第三圖用說所以一聖動也第四圖用說所以直聖政也為此將臣所撰四聖圖解二卷樂記補說二卷律吕新書補注一卷興樂要論三卷共二帙親齎謹具奏聞等因奉聖旨禮部看了來說臣等竊惟我太祖髙皇帝定鼎之後拳拳以復古樂為念但時當草創欽為未就仰惟皇上以羲黃堯舜之德際重熙纍洽之運期值百年聖兼述作既制大禮以定天下之式必作大樂以平天下之情但樂之道廣大微妙非惟情義難明而其所謂制度者亦失𫝊久矣西漢去聖未遠樂家有制氏世在樂官但能記其鏗鏘鼓舞而不能言其義况數千載之後乎今遼州同知李文察奏進樂書乞與正樂一節臣等看得其所進樂記補說補注等書所以明樂聲樂理之原亦有前人所未發者其議於人聲中考定五音以為制律候氣之本其法似為直截昔宋人楊傑議曰八音皆不能無失惟人稟中和之氣而有中和之聲八音律吕宜皆以人聲為度且人言人志詠以為歌五聲隨歌是為依永律吕協奏是為和聲此皆取之虞書者也李文察所議似與此合惟我皇上聖德居位懋建中和之極實秉制作之權則考定元聲興作雅樂今日實惟其時也宜令文察及太常知音律者選能歌樂舞生百餘人協同肄習本部及該寺正官以時按試候聲律諧協吹律候氣咸有應驗更議擢用詔授文察太常寺典簿與該寺官協同肄樂習樂奏演習大樂成化二十一年禮部言今教坊司樂工奏中和韶樂者多不諧協而善彈瑟及箜篌擊鐘磬者殊少恐因循失傳漸致大樂不備宜令樂官選其中子弟於本司演習每奏樂二十一色通用八十四人人加以四人共選三百三十六人如此數大樂不至廢弛制可預行選擇樂工演習嘉靖元年禮科給事中李錫言南郊耕藉國之大禮而教坊承應閧然喧笑殊為瀆褻古者伶官賤工亦有因事納中之義請自今凡遇慶成等宴例用教坊皆預行選擇演習必使事關國體可為監戒庶於戲謔之中亦遇針規之益下所司知之禮部志稿卷六十
