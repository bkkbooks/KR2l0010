body:
  text: 禮部志稿卷九十一明俞汝楫編朝貢備考頒貢夷禮定蕃王朝貢禮洪武二年定蕃王朝貢禮禮官奏言先王脩文德以來遠人而夷狄朝覲其來尚矣殷湯之時氐羗遠夷來享來王太戊之時重譯來朝者七十六國周武王克商大㑹諸侯及四夷作王㑹周禮秋官象胥氏掌蠻夷閩貊戎狄之國使而諭説焉漢設典客及譯官令丞以領四夷朝貢及設典屬國及九譯武帝元鼎六年夜郎入朝自後外夷朝貢不絶丼露元年呼韓邪單于來朝三年呼韓邪單于稽居㹪來朝並見于甘泉宫河平元年四夷來朝領于大鴻臚四年匈奴單于來朝正月引見於白虎殿元壽二年單于來朝舍之上林苑蒲萄宫順帝永和元年倭奴王來朝皆具宴享賜子之制唐設主客郎中掌諸蕃來朝其接待之事有四曰迎勞曰戒見曰蕃王奉見曰宴蕃國主其儀為詳貞觀三年東蠻酋長謝元深等及突厥突利可汗來朝皆宴饗以樂之宋朝奉貢者四十餘國皆止遣使入貢雖蕃王未嘗親入朝見而接見之禮見於禮書者與唐畧同元太祖五年畏吾兒國王奕都䕶朝世祖至元元年勑髙麗國王植脩世見之禮六月植來朝上都其後蕃國來朝俟正旦聖節大朝㑹之日而行禮焉今定其儀儀見職掌定安南國髙麗山川祀典洪武二年十二月上謂中書省及禮官曰今安南髙麗皆臣附其國内山川宜與中國一體致祭於是禮部考其山川安南之山二十有一曰佛跡曰徹圍曰武寧曰仙遊曰普頼曰萬刼曰傑特曰安子曰地覲曰天養曰神投曰龍岱曰文塲曰安獲曰卞曰立石曰香象曰崇曰都隆曰測曰分其江有六曰川瀘曰富良曰大黄曰大歴曰蘇歴曰三帶其水有六曰安石淵曰石龍門曰兹廉曰浪泊曰越裳宛曰九德宛髙麗之山有三曰魯陽曰嵩曰葦其水有四曰禮成川曰鹽難水曰浿水曰馬訾水即鴨緑江也遂命著之祀典設位以祭畨國朝貢儀洪武二十六年更定畨國朝貢儀是時四夷朝貢東有朝鮮日本南有暹羅琉球占城真臘安南𤓰哇西洋𤨏里三佛齊渤泥百花覽邦彭亨淡巴須文達那凡十七國其西南夷𨽻四川者軍民府各六烏䝉烏撒芒部卭部普安東川安撫司一曰金筑宣撫司二曰酉陽宣慰司三曰貴州播州石柱招討司四曰天全六畨長河西長官司凡三十盧山慕役西堡大華寧谷寨項營十二營平茶程畨康佐木𤓰方畨阿昔亦簇占藏先結簇蠟匝簇比定簇祁命簇阿昔洞簇勒都簇班班簇者多簇麥匝簇泥溪雷坡沐川平夷蠻夷岳希蓬隴木頭靜州府四徳昌馬湖建昌㑹川州十九安順龍永寧鎮寧建安禮栢興黎里闊武安永昌隆姜黎溪㑹理威龍昌普濟衛一曰建昌縣三中碧舍麻龍其𨽻廣西者府三田州思明鎮南州二十五龍英江龍養利上下凍思陵萬承安平太平都結思城結倫鎮逺左茗盈南丹結安思同東蘭那地全茗利泗城奉議縣四陀羅陽崇善永康𨽻雲南者軍民府一曰姚安州八元江麗江景東楚雄鶴慶尋甸大理臨安宣慰使司三平緬車里八百州二姚鄧土官三海東賔居小雲南縣二廣通習峩𨽻湖廣者宣慰使司四施南思南永順保靖安撫司一忠建長官司三臻部六洞黄波等處軍民府一曲靖西域之部七西天泥八剌國朶甘沙州烏思藏撤立輝和爾撤來賽瑪爾堪上以舊儀頗煩故復命更定之凡畨國王來朝先遣禮部官勞於㑹舘明日各服其國服如嘗賜朝服者則服朝服於奉天殿朝見行八拜禮畢即詣文華殿朝皇太子行四拜禮見親王亦如之親王立受後答二拜其從官隨畨王班後行禮凡遇宴㑹畨王班次居侯伯之下其畨國使臣及土官朝貢皆如常儀頒安南王冠服𢎞治十四年己亥先是上賜安南國王黎暉皮弁冠服及常服陪臣劉孝興等復奏稱本國王既受王爵之封而所賜常服猶有烏紗帽等件與臣下無辨似有未稱乞改賜王爵常服禮部議謂安南僻處遐荒素慕文教我祖宗朝以其能守臣節仍封其主為安南國王葢使之統制一方藩屏中國耳然名為王實則臣也是以前後相承百有餘年其名位衣冠之品式朝貢燕賚之禮儀俱有定制凡彼國王有故乞恩嗣立朝廷俯念逺人遣使詔封諭祭并賜王者弁服一副使不失君主一國之榮又賜一品常服一襲使不忘臣服中國之敬蓋恩禮兼隆名分不紊今陪臣劉孝興等不諳大體欲將欽賜國王常服通易王爵冠服使得異于其臣是不知彼國之王其名分亦為臣而朝廷之制其名器固有在也然此非孝興等實為之乃彼國通事范懐瑾飾詐懐姦倡為此奏請並加究問以警將來上曰范懐瑾劉孝興等本當究治姑不問仍命禮部省諭之改東北夷正旦朝賀嘉靖十年二月改東北夷正旦朝賀於冬至諭禮部曰恭惟我聖祖髙皇帝混一區宇奄有萬方華夷蠻貊㒺不在籍今朕遵聖祖之制於每歲冬至祇行大祀之禮禮成慶宴此時無爾朝鮮國及大寧等衛使臣在故今歲未得與宴爾禮部便行文與朝鮮國等處如彼克遵故典可每歲元旦之貢移于冬至之前入賀庶不有負我聖祖柔逺待夷之意典禮頒及朝鮮嘉靖十六年翰林院修撰龔用卿户科給事中呉希孟使朝鮮還言朝鮮素稱恭順較之諸夷不同而國家禮遇其國亦未嘗以夷禮待之邇者齎詔至彼其王李懌又能恪遵典禮敬事不違良可嘉尚請自今凡詔誥勅諭事關禮制者宜使之一體知悉不必遣官但因其朝貢陪臣即令賫囬庶以見朝廷殖有禮懐逺人之意禮部覆如其議詔可貢夷請乞安南受錫受爵洪武二年壬午安南國王陳日煃遣其少中大夫同時敏正大夫段悌黎安世等來朝貢方物因請封爵詔遣翰林侍讀學士張以寧典簿牛諒往使其國封日煃為安南國王賜以駝紐塗金銀印髙麗請祭服制洪武二年髙麗國王王顓遣其總部尚書成惟得千牛衛大將軍金甲兩上表貢方物謝恩并賀天壽聖節中宫及皇太子皆有獻就請祭服制度上命工部製賜之朝鮮請冕服書籍永樂元年辛未朝鮮國王李芳逺遣陪臣石璘李原等奉表謝賜樂并貢馬及方物且請冕服書籍上嘉其能慕中國禮文悉從之命禮部具九章冕服五經四書并鈔及綵幣表裏俟使還賜之哈宻請賜爵永樂二年封哈宻恩克特穆爾為忠順王時恩克特穆爾遣使來朝表請賜爵上命禮部尚書李至剛㑹太子太傅成國公朱能等議至剛等議奏恩克特穆爾兄固納實哩元封威武王改封肅王固納實哩卒恩克特穆爾繼為肅王今既内屬宜仍王爵而改封之上曰前代王爵不足再論今但取其能歸心朝廷而封之使守其地綏撫其民可也遂封為忠順王遣指揮使霍阿嚕圖等賫冊封之并賜之綵幣乞再賜廟社樂器及陪臣祭服永樂二年朝鮮國王李芳逺遣陪臣許應等奉表貢馬及方物謝立世子恩芳逺復奏洪武中蒙賜廟社樂器及陪臣祭服年乆損敝乞再頒賜上命工部製樂器之祭服令本國自製禮部言樂器原賜編鐘編磬各十六琴瑟笙簫各二今議琴瑟各倍之庶恊和音律從之封夷國鎮山永樂二年賜滿剌加國鎮國山碑銘時其國使者言其王慕義願同中國屬郡歲效職貢請封其山為一國之鎮上嘉之諭禮部臣曰先王封山川奠疆域分寶玉賜藩鎮所以寵異遠人示無外也可封其國之西山為鎮國之山立碑其地乞冠服并大統厯正統二年六月琉球國中山王尚巴志奏本國各官冠服皆國初所賜年乆弊壞乞賜新者又奏本國遵奉正朔而海道險阻受厯之使或半載一載方返事下行在禮部覆奏上以冠服可令本國依原降者造用大統厯其命福建布政司給與之奏乞遣使成化元年二月禮部言迤北酋長奏欲朝廷遣使查無前比宜令通事再諭來使還語其酋曰皇帝新登寶位凡事法祖宗順天道祖宗時不曽遣使今不敢違越上是其奏復書諭之許市牛及農具成化二年朶顔㤗寧二衛欲於邊市牛及農具鞍轡等物禮部奏惟許市牛及農具從之諾延遣使奏求成化二年九月諾延衛右都督多羅干遣使臣傳報邊情且奏求印信帳房并不限朝貢人數上乃賜之勑曰爾三衛皆我祖宗所立授以官職衛我邊境爾之前人歲時朝貢無有貳心爾等正當繼前人之志感恩圖報却乃隨從摩囉歡為非抑不思昔有從額森作歹者今安在哉爾等年年來朝受賞賜陞官職誰與爾耶今既改悔差人來朝并奏報事情特從寛貸仍賜表裏以答爾意并准爾所奏歲時差人朝貢每衛許放百人須以本衛印信文書為照爾等今後宜以額森等為戒以爾前人為法各守境土防䕶邊疆勉於為善竭誠報國庶幾永享太平之福禁貢夷擾害成化五年山東濟寧州考人李巘奏外夷朝貢經過有司驛逓被其擾害乞勑該部計議遣官伴送之人用心管束并行沿途官司嚴加禁約違者治罪如律從之不許海外國乞詔成化十一年琉球國使臣梁應等因立皇太子奏乞如朝鮮安南國例賜詔賫回禮部以琉球與日本占城皆海外國例不頒詔上是之命降勑并以文錦綵段付使臣歸賜其王及妃壬戍命禮部員外趙繕為副使冊封乞結婚財禮𢎞治四年十月哈宻忠順王沙巴爾既襲封歸國與伊濟格哷勒圖卜布哈塔布之女結婚其隣部伊哷森王額布勒津王率其頭目雙和爾塔布平章孟克知院左右之各遣人奏其事因乞結婚財禮并賞賜甘肅守臣亦為之請禮兵二部覆議朝廷興滅繼絶既冊沙巴爾為王亦須使其有室有家方可為保障乆計宜大賚以結其心乞賞銀百兩仍用一品官婚禮定數賜紵絲綾羅各八疋絹三十二疋大紅羅二疋脚紗二疋外加青紅緑布百疋以助之伊哷森王額布勒津王及圖卜布哈塔布三人各賜綵段四表裏雙和爾塔布孟克知院各綵段二表裏議上從之請誥命及設茶正德十年保安寺大德法王吹戬斡齊爾本烏思藏使也上留之得幸至是欲遣其徒琳沁綽爾濟吹古扎實為正副使還居烏思藏比大乗法王例入貢且為兩人請國師誥命及入畨鰲設廣茶下禮部尚書劉春議不可且謂阻壞茶法騷擾道路有㫖令復議春執奏烏思藏逺在西方性極頑獷雖設四王輔化而其來貢必為之節制務令各安其所不為邊患而已若遣僧賫茶以往給之誥勑萬一假上㫖以誘羗胡妄有所請求因欲以自利不從便為失異俗意從之則無益事興其害有不可勝言者詔仍與誥命而罷設茶勑處烏思請乞正德十年禮部尚書毛紀言頃者烏思藏大寶法王違例差大國師索諾木嘉勒燦巴勒藏布進貢蒙恩不加深究量減賞賜本夷􅔵望又求全賞及求五綵佛軸等物復俱賜給今又奉特㫖遣人齎送畨供大寶法王一畨僧耳何乃上厪寵遇之隆如此且聞自京至烏思藏約三萬餘里往返動經三五年供應煩費不可勝言及聞自四川雅州出境過長河西迤西至烏思藏約有數月程皆黄毛野人等之地無州縣驛逓亦無市鎮村落一切供應錢粮䕶送車馬俱四川都布二司并各土官衙門出辦差撥四川連年用兵即今流賊稍平而西蠻賊復起其財用之乏軍民之困比之他處尤甚若重加此累恐生意外之變咎將誰歸伏望皇上軫念四川重地追寢成命將畨供物等照例請勑付原差大國師領還生民之福也不報髙麗請改正逆蹟正德十四年二月詔令㑹典内改正髙麗逆蹟初髙麗國王王氏洪武間遇賊而絶陪臣李仁人擅立偽姓凡幾易矣國人得王氏裔瑶立之瑶復昏亂衆推門下侍郎李成桂立國事且請於朝鮮詔許之改名旦令徙居漢城更號朝成桂與仁人本異族永樂間降祭海嶽祝文稱成桂為仁人嗣而祖訓條章亦載仁人及子成桂今名旦者成桂子芳逺奏辯太宗許令改正近所修大明㑹典復注祖訓於朝鮮國下且云李氏連弑四王貢使市以歸國王李懌上疏備陳世系本末及言始終無弑逆蹟乞為改正下禮部議以㑹典一書詳載我朝制度其事關外國是非嫌疑之間皆在所畧况成桂之得國出皇祖之命其不繫仁人後又有太宗明詔可徴宜從其請詔可且嘉其誠孝賜勑諭之賜夷遣使賫詔往賜洪武十年乙酉暹羅斛國王遣其子昭禄羣膺奉金葉表貢象及象牙胡椒蘇木之屬已而上命禮部員外郎王恒賫詔及印綬往賜之以中書省宣使蔡時敏為之副賜琉球冠服永樂元年琉球國山北王攀安知遣使苦住古耶等奉表朝賀貢方物賜鈔及襲衣文綺善住古耶致攀安知之言丐賜冠帶衣服以變國俗上嘉之命禮部賜其王暨陪臣冠服定朝貢賞物永樂元年河州洮州畨族朝貢命禮部定賞物禮部議奏河州衛必里千户所千户每員銀六十兩綵幣六表裡鈔百錠曽授金符頭目親來朝貢者銀五十兩綵幣五表裏鈔七十錠紵絲一襲遣人朝貢者銀四十兩綵幣四表裏鈔五十錠中途死者官歸其䘮賞賜付撫按官給之所遣使每人銀十兩綵幣二表裏鈔三十錠未授金符頭目親來朝貢者銀四十兩綵幣四表裏鈔五十錠紵絲衣一襲附貢者銀三十兩綵幣三表裏鈔四十錠付撫按官給賜其撫安千户每員賞鈔七十錠綵幣四表裏旗軍人等賞鈔五十錠綵幣二表裏定宻實勒賜例正統五年禮部言宻實勒等處地方極逺今初來朝貢未有賜例先是賽瑪爾堪地面初來貢時賜例過厚今宜視其例少損之賜王蘓勒坦阿爾斯蘭汗綵幣十表裏紗羅各三疋白氁絲布白將樂布各五疋洗白布二十疋王妻綵幣視減十之六紗羅減三之一白氁絲布將樂布減五之二白布減其半使臣一如賽瑪爾堪使臣例哈喇地舊時朝貢止賜其使今宜視宻實勒例又損之賜其頭目阿拉克烏蘭巴圖爾綵幣紗羅諸布一如宻實勒王妻例使臣視舊少損之賜綵幣六表裏印花絹四疋折鈔絹五疋其餘地面到京使臣并存留甘州達爾罕舍人人等俱各如其例賜上從之宻實勒即宻思兒哈喇即哈烈畨語轉而然也土官加賜衣服景㤗元年禮部奏雲南八百大甸軍民宣慰使司宣慰使刀板雅者遣頭目雷内等貢象馬方物至京已循例賞訖而内等又乞賜土官衣服然故事土官無加賜衣服者詔加賜土官錦二段紵絲紗羅各四疋土官妻紵絲紗羅各三疋改賜鈔錠成化元年禮部奏皇上嗣登大寶之初各處夷人朝貢集于闕下者咸鼓舞欣忭以為慶幸而舊例有鈔錠之賜臣等議得鈔錠非夷人之便請量賜段匹絹布使逺夷均霑實惠從之給賜畨僧成化四年禮部奏西寧遊僧巴沁衮里瑪吹戬藏布等齎勑往烏思藏闡教王等處開諭囬還賜畨僧衣綵段靴襪以酬其勞其隨去徒衆貢馬亦宜如例給賜從之折絹折茶例成化六年禮部言烏思藏等處畨僧進貢至者數多賞賜綵段動數千計官庫所貯不敷關用今議得烏思藏等處進貢人員其赴京者如例給與其存留者人該給一表裏宜折與生絹四疋仍將數内二疋折與茶三十斤四川松潘雜谷安撫司等處進貢人等其赴京者如例給與其存留者人該三表裏宜給與本色一表裏折與生絹四疋一表裏折與茶一百斤如夷人情偏事有窒礙臨期另行斟酌具奏上從之賞賜檢㸃給散成化六年禮部奏長河西地面來貢畨使等以所領段疋衣服有截短者延至臨行來告無從追問自後凡遇夷人來貢其賞賜衣服綵段等㑹同通事等官逐一檢㸃唱名給㪚仍令通事省諭各夷如有衣服綵段截短者即時具吿毋得退後方言從之陪臣進慰喪表給賜成化八年朝鮮國王李娎以悼恭太子之䘮遣陪臣李原效奉慰䘮表并進香禮物及祭文上命禮部以祭文詣太子墳所燎之賜原效衣服綵段等物賜衣絹増減成化十一年畨僧戒巴僧革等一百三十七名貢馬及方物禮部奏准依例人賞鈔二十錠絹二疋折衣紵絲一表裏絹二疋每馬價鈔三百錠紵絲一疋各僧言本地與岷州西固城等處俱是生畨今賜例不及于彼乞各増一表裏減絹二疋禮部覆奏從之冊立詔賜成化十一年以冊立皇太子遣户部郎中祁順禮部郎中樂章為正使行人司左司副張瑾行人張廷綱為副使賫詔往朝鮮安南國開讀賜其國王及妃綵段文錦各有差革賞賚偽冒成化十七年禮部奏自今諸夷朝貢乞令大小通事審譯精當方與賞賚以革偽妄報可給賞不得減削太甚成化十八年禮部奏琉球國進貢舊例到京少則四五十人多則六七十人俱給賞有差邇因各夷進貢率多姦弊每國止許五七人不過十五人到京餘俱留邊以俟今福建以例止容正議大夫梁應等十五人赴京既已給賞餘六十七十俱留之布政司宜發官帑以次均給庶不減削太甚失柔逺之意從之賞例歲乆難從成化十九年賽瑪爾堪貢使帕爾滿等以進獅子乞如永樂間賞例事下吏部覆奏蘓勅坦阿哈瑪特遣使來貢猛獸誠有可嘉宜如正統四年賞例有㫖加賞綵段五表裏既而使臣堅執必欲如永樂賞例禮部奏以為歲乆難從宜于見賞例外加賜以酬其勞有㫖正副使再加二表裏其餘人加一表裏裁省貢夷留邊之賞成化二十二年禮部奏四川起送烏思藏如來大寶法王國師并牛耳寨寨官進貢謝恩招撫襲替各項共一千四百七十員名除囬賜國王等官并到京畨僧外其存留在邊者若一例賞之共該綵段一千四百七十表裏紵絲僧衣二千九百二十二襲件折絹一萬一百六十四疋鈔一十萬七十錠食茶八萬二百觔其數太濫除法王國師及正貢來京者照例給賞其餘在邊一千八名欲量以該賞衣二件共折綵段一表裏與之食茶令四川茶馬司照數給㪚從之進貢無印信勘合者量賞成化二十二年禮部奏蘇門答剌國遣使進貢廣東布政司因無印信勘合奏准將本國所進表文寄貯廣東官庫省令各役回還内借撥畨人斤蕩等三名管送貢物來京每人量賞生絹一疋棉布二疋胖襖及鞋以酧其勞從之特賜加賜例𢎞治四年辛酉初哈宻衛及土魯番賽瑪爾堪等處進貢賞賜俱有例後以土魯番侵占哈宻哈宻夷衆寄居苦峪並量減賞賜以示薄責與激勵之意至是土魯番阿哈瑪特既獻還城池金印哈宻夷衆亦回居原衛於是阿哈瑪特遣使臣賽音莽蘓爾等及哈宻多阿克巴拉并使臣賽音和斯等俱進貢而賽瑪爾堪等番王亦遣頭目與之俱來兵部㑹禮部議奏謂今次賜各使臣綵段衣服等物自一等至五等者宜如舊例全給之其阿哈瑪特使臣賽音莽蘇爾等悔過效順情欵可嘉請特賜加賜以慰其心其沙呼實等十四人奉使往回績效尤著請别加優賜以旌其勤從之過期減半賜𢎞治十三年四川烏撒軍民府土官知府安得遣小土官沙也等以歲例來貢禮部以沙也等過期始至請如例減賞賜之半從之覆實賞物𢎞治十五年禮部覆奏户科給事中王蓋所言重賞典事謂各處夷人入貢例賜綵段衣服等物近年官庫等匠工作弊多端或丈尺短少或製造窄小夷人怨恨頗有後言請移所司凡進納綵段務令足數成造衣服務令依式違者治罪從之查覈賜夷段疋嘉靖十一年九月内禮部照得我朝輿圖一統四夷來賔厚往薄來各有定制頃自正德年間以來貪官猾胥縁此為市所收段疋布絹稀鬆紕薄不堪服用夷人往往投逓畨文鳴號不平輙稱先朝賞賜甚厚今日賞賜太薄雖節年經本部題請行移工部并該監局衙門查處去後但所賞者仍舊不堪無以厭服夷心尊重國體所係甚大題奉欽依勑令工部遵照前勑申明轉行各該織造地方廵按衙門應解段疋時節行委的當官員㸔騐務要經緯堅緻堪以進用者方許起解若各處解到者仍覆稀鬆紕薄即行退回經該官匠定行提問收納之際經該衙門不許勒指常例貽害小民凡遇各夷到舘奉㫖給賞關領該監毋得推調淹滯以致夷人乆住致生嗟怨稱賀非例亦受賜隆慶元年朝鮮國王李峘遣部臣李榮賢等上表貢獻方物賀世宗肅皇帝尊諡禮部議尊諡廟號故事無稱賀禮然不當槩以律逺夷特受之制可給賞綵幣有差賞賚貢夷隆慶元年十一月朝鮮國權國事李昖遣臣沈銓入謝表貢馬疋方物因歸我被倭掠去人民陳滿等二十餘人上曰李昖署國之初即效忠順其賜勑諭以旌之仍賜白金百兩錦綺四疋紵幣十二表裏其獲功人等賞金帛有差隆慶三年十二月琉球國中山王尚元遣其臣守備繇必都等歸我被虜人口守臣以聞上嘉尚元屢效忠順賞銀五十兩綵段四表裏仍賜勑奬勵繇必都等各給銀幣有差禮部志稿卷九十一
