body:
  text: 禮部志稿卷六十一明俞汝楫編冠婚備考加冠命掌冠禮官成化十四年三月甲子皇太子行冠禮詔以少傅兼太子太師英國公張懋持節兼掌冠禮禮部尚書鄒幹贊冠太子少保户部尚書兼翰林院學士萬安宣敕戒於文華殿行禮皇太孫冠禮永樂九年皇太孫冠時命定國公徐景昌持節掌冠户部尚書夏原吉贊之禮部尚書呂震宣敕戒親王冠禮景泰四年沂王濙王冠詔免告廟以大學士陳循兵部尚書于謙持節掌冠吏部尚書何文淵兵部尚書儀銘贊冠左春坊大學士商輅宣敕戒皇子冠禮成化二十三年五皇子冠至日早上告奉天殿皮辨服御奉天殿傳制遣官持節行禮冠所在奉天門前東廡左順門之北持節官以英國公張懋保國公朱永襄城伯李瑾慶雲伯周壽新寧伯談祐其宣敕宣戒官以內閣臣萬安劉吉尹直持節官即命以掌冠所謂賓也禮畢謁見聖慈仁壽皇太后皇上皇后次謁皇妃東宫及妃四拜用樂次日上常服升金臺百官常服稱賀皇太子各詣奉天門東廡序座百官常服四拜簡婚諭定選婚地方正統五年太皇太后敕諭禮部尚書胡濙等曰皇帝婚期已邇皇后之位必在得賢蓋以上配宸嚴祗奉宗廟表正六宫母儀天下而隆國家萬世之本也爾禮部其榜諭北京直𨽻南京鳯陽淮安徐州河南山東山西陜西於大小官員民庶有德之家用誠簡求務擇其父母克修仁義家法齊肅女子年十三至十五容貌端潔性資純美言動恭和咸中禮度者有司以禮令其父母親送赴京吾將親閲焉皇太子選婚天順七年敕諭禮部尚書姚夔等曰去年皇太子選求婚配至今未有相應者今再出榜曉諭在京并北直𨽻南京應天淮安揚州山東等地方大小文武官員庶民良善之家女子年十八容貌端莊性資純美者盡數報官如本家隱匿不報親鄰人等首報待遣選擇奉誥諭簡婚嘉靖改元慈壽皇太后誥諭禮部皇帝年及婚期宜慎簡賢淑以為之配爾禮部其榜諭北京直𨽻南京鳯陽淮安徐州河南山東於大小官員庶民良善之家預先用心選求務擇其父母行止端莊家法齊整女子年十四十五容貌端潔性資純美言動法恭咸中禮度者報名在官待遣去官員再行訪選堪中者有司以禮令其父母親送赴京欽哉故諭册婚使正德七年英宗納皇后錢氏以英國公張輔為正使大學士楊士竒為副使持節行納采問名禮成國公朱勇為正使大學士楊溥吏部尚書郭璡為副使持節行納吉納徴告期禮又張輔為正使楊士竒暨戶部尚書王佐為副使持節行發册奉迎禮共詣中軍都督同知錢貴宅行禮天順八年憲宗聘皇后吳氏以會昌侯孫繼宗為正使大學士李賢為副使持節納采問名懷寧侯孫鏜為正使吏部尚書王翺兵部尚書馬昂為副使持節行納徴納吉告期禮又繼宗正使賢暨禮部尚書姚夔副使行發册奉迎禮共詣中軍都督府都督同知吳俊卿宅行禮正德元年七月納皇后夏氏命英國公張懋為正使大學士劉健為副使持節納采問名保國公朱暉為正使尚書李東陽謝遷為副使納吉納徴告期八月以懋為正使劉健禮部尚書張升為副使奉册寶奉迎至都督同知夏儒宅行禮嘉靖元年納皇后陳氏命定國公徐光祚為正使大學士楊廷和為副使持節行納采問名武定侯郭勛為正使大學士蔣冕費宏為副使納吉納徴告期成國公朱輔為正使廷和暨大學士毛紀為副使奉册寶奉迎詣鴻臚卿陳萬言宅行禮俱如儀皇太子婚禮納妃洪武元年十二月禮部奏定皇太子納妃儀上曰贄禮不用笄用金盤古禮有親迎執綏御輪今既用轎則揭簾是矣其合卺依古制用匏鴈以玉為之妃朝見入宫中乘小車以帷蔽之謁廟則皇太子俱往禮成後三日乃宴羣臣命婦餘如所定儀洪武四年夏四月以皇太子將行婚禮先期告四廟各用犢一祝文曰深荷祖宗積德福延後嗣今長子標年已長成謹擇今月二十六日與開平忠武王常遇春女常氏為婚敢用祭告册寶俱用金與皇太子同寶篆文曰皇太子妃之寶册文真書鐫刻之曰昔君天下者必重後嗣為蒸民主皆選勳德之家貞良子女以嫓之朕子標年已長成以爾常氏實朕功臣開平忠武王長女今吉日在期先正其名特以册寶命爾為皇太子妃尚其思爾父勳敬闕其一曰往迎爾相承我宗事為承宗者言也其一曰往迎爾相用承厥家為承家者言也今留京所以承宗封國所以承家戒命之辭伏俟聖裁廟見古以三月內世以三日蓋先告祖考而親迎合卺成其為妻明日夫率以見舅姑又明日盥饋于舅姑成其為婦又明日率以見祖考先後之序如此纍朝率與合卺同日至成化中東宫納妃始改從古宜以改定者為正朝見盥饋先朝有太皇太后有皇太后有中宫儀文各異今二王率妃詣上前行禮後宜于各母妃前行禮以章婦順又會典東宫不回門親王不回門然未有定期今宜待之國前一月擇日行餘如舊上覽之不悅曰既曰王禮自依典制何不同之有第速降敕册立太子分别成婚任爾等為之勿以煩朕於是禮部遂擇日具册立儀以請上以問大學士嚴嵩嵩對所司豈敢不遵前奉聖諭俟明命處分上乃詔部臣曰其遵朕初諭上曰諭禮部二王親迎受醮戒於文華殿賜爵如冠儀東向賜坐飲訖跪輔臣捧授戒命不宣用金龍箋書於是禮官具儀先一日內監設制案於文華殿中捧戒命置於案設香案制案之南設王拜位於香案前設醮席於西東設幕次于殿之東廂房教坊司設大樂錦衣衛設儀仗俱於丹陛之東西內官光祿寺官設酒果金爵案於殿內西南隅東向是日內侍導王先入幕次具衮冕服禮部鴻臚寺官啓受醮戒王出幕次導繇殿東門入詣拜位嗚贊贊鞠躬樂作四拜興樂止贊行醮禮禮部鴻臚寺官導王就醮席樂作坐定樂止執事官舉酒果金爵案置于前光祿寺官醮酒鳴贊贊搢圭王搢圭樂作禮部官舉爵進王王受爵飲訖奠爵於案樂止執事官撤案鳴贊贊出圭禮部鴻臚寺官啓就受戒命位王降席導詣拜位鳴贊贊王跪輔臣捧戒命授王王受以授內侍內侍跪受訖鳴贊贊俯伏興樂作四拜興樂止贊禮畢引禮導王出至承天門外幕次釋衮冕具皮辨服行親迎禮詔可捧制命元輔嵩王納繼妃嘉靖三十七年八月該御馬監左少監高某傳奉聖諭裕王繼妃婚禮禮部便開具事宜來看合用冠服等件通行各該衙門整理欽此傳奉到部除欽遵合用冠服等件即行各該衙門整理外隨據欽天監擇各項吉日題奉欽依臣等謹將裕王殿下繼妃婚禮應行納徴發册等項斟酌舊儀逐一開坐上請其受醮戒一節臣等查得先年裕王殿下已於文華殿奉有戒命今次似不必舉及朝見盥饋舊皆詣王母妃前行禮今亦宜省又成婚次日文武官員詣府賀禮先年奉有聖諭且免行俱不敢開具外所有納徴發册合用大臣二員充正副使前一日遣官告奉先殿合用大臣一員共用大臣三員伏乞欽定等因節奉聖旨告奉先殿遣駙馬詔行禮納徴發册公張溶尚書吳山充正副使其餘依擬行欽此納次妃洪武八年十一月遣吏部侍郎張度為正使工部侍郎孫敏為副使徴衛國公鄧愈女為秦王次妃不傳制不發册不親迎度等行納徴禮是日上御奉天門正副使入就拜位儀禮司奏曰吏部侍郎張度工部侍郎孫敏欽依詣衛國公鄧愈家行禮五拜畢出至次妃第正使捧玉帛副使捧玄纁至正廳其冠服擬唐宋二品之制九翬二鳯冠儀仗比王正妃減半遣女官詣妃家迎妃內使擎執儀仗前導繇御橋西板橋至右順門王皮辨服導妃謁奉先殿禮用羊豕王東稍前妃西稍後行禮如常儀禮畢入宮王與正妃正坐次妃詣王前四拜詣正妃前四拜次妃東坐宴飲成禮次日王常服上中宫常服升座王及妃詣上前王在東稍前妃西稍後贊八拜又詣中宫前八拜不用棗栗腵修王至妃家引禮導王入正廳王立於東西向妃母立於西東向王四拜妃母立受二拜答二拜妃入中堂行家人禮公主婚禮壻家六禮洪武二十六年重定公主婚禮納采問名壻家備禮儀表文於家庭望闕再拜掌婚者奉至東華門次行納采問名禮納吉壻家既卜吉備禮儀表文陳於庭望闕再拜掌婚者奉至東華門納徴壻家具玄纁玉馬表文及他儀掌婚者奉至東華門請期壻家具禮儀表文詣東華門以後有受册誥儀受册誥前期告奉先殿用祝帛羊豕謁廟受册皇帝制曰古之君天下者有女必封爾次女今已成人未有封號特以某郡為爾之號配某官某之子彼為駙馬爾為公主既入某官之門恪遵婦道以奉舅姑閨門整肅內助佳美毋纍父母生身之恩爾惟敬哉其日駙馬受誥如儀誥曰夫婦之道人之大倫婚姻以時禮之所重帝女下嫁必擇勳舊為姻此古今通義也朕今命爾為駙馬都尉當堅夫道毋寵毋慢永肅其家以稱親親之意恪遵朕言毋怠𢎞治下嫁儀𢎞治二年十月長公主婚禮儀注公主具禮服奉先殿辭畢詣太皇太后四拜受爵女官贊戒恭聽戒命命之曰敬之戒之夙夜無違爾閨門之禮公主聽受興四拜禮畢詣皇太后上位皇后前受戒命行禮亦如之下嫁如洪武儀入府設公主駙馬拜位同拜天地行八拜禮堂內設公主座於東西向駙馬拜位於西東向贊引二人導公主升座駙馬行四拜禮公主坐受兩拜答兩拜駙馬出便服女使於室中設公主座於室西設駙馬座行合卺禮如洪武儀至十日具冠服女官導公主謁奉先殿詣太皇太后皇太后上位皇后謝恩俱行八拜禮賜宴於宫中駙馬具公服於早朝大班內謝恩仍具公服於午門外直房俟司禮監官導至左順門內詣太皇太后便殿行五拜禮詣皇太后皇后行禮如儀復導至午門外釋公服俟上位常服出御便殿賜宴行四拜禮就席坐席向東宴畢行五拜三叩首禮畢次日見舅姑舅姑立於東西向公主立於西東向行四拜禮舅姑答兩拜宮闈備考正后位遵成命正后位成化元年上御奉天殿以册立皇后詔告天下詔曰帝王為治莫先於正家正家之道必自大婚始惟先帝臨御之日常為朕簡求賢淑已定王氏育於别宫以待期矣逮至憑几顧命猶以婚期責成有司朕於時報禮彌甚未敢遽從矧敢與知其事不意內臣牛玉偏徇已私朦朧奏請皇太后將已退吳氏復選册立禮成之後朕觀吳氏德不稱位因察其實始知非預定者夫既遵先帝之命以成禮而乃違命立非其人何以表宫闈而相祭祀興言及此內疚於心用是不得已請命母后明正牛玉之罪廢黜吳氏不敢以嵗月緩自念與其拜位非人寧虛厥位而在庭文武羣臣再三陳請謂中宫不可久虛義正詞切朕難固拒今勉從所請仍遵先帝成命册立王氏為皇后於戲自古人倫有常變變而得正何憚勿為兹朕此舉非獨正家抑恐上負先帝選授之命於心有不安焉誕告多方使明知朕意備內職宫官女職洪武五年命禮部議宫官女職之制禮部具陳周制後宫設內官以贊內治漢制設內官一十四等凡數百人唐制設六局二十四司官凡一百九十人女使五十餘人皆選良家子女以充之上以為古者所設過多宜防女寵垂法將來乃命重加裁定設六局一司局曰尚宫曰尚儀曰尚服曰尚食曰尚寢曰尚功司曰宫正俱正六品尚宫局總行六尚之事凡出納文籍皆印署之時六局徴取於在外諸司尚宫領旨署牒用印付內史監內史監受牒行移在外諸司尚宫二人掌導引中宮總司紀司言司簿司闈之事司紀二人掌印宫內諸司出入簿司文字司言二人掌傳宣奏啓之事司簿二人掌宫人名籍廩賜之事司闈四人掌宫闈管鑰之事女史六人通掌文案尚儀局尚儀一人掌禮儀起居總司籍司樂司賓司贊四司之事司籍二人掌經籍圖書教授之事司樂二人掌音樂之事司賓四人掌朝見宴會之事司贊四人掌朝會贊襄之事女使三人通掌文案尚服局尚服一人掌宫內服用總司寶司衣司仗司飾四司之事司寶二人掌寶璽符契司衣二人掌衣服首飾司仗二人掌羽儀仗衛司飾二人掌巾櫛梳洗女史二人通掌文案尚食局尚食一人掌供內膳總司饌司醞司藥司供四司之事司饌四人掌烹炮調和飲膳之事凡進飲食先嘗之司醞二人掌酒醴司藥二人掌醫藥司供二人掌給宮人廩餼薪炭之事女史二人通掌文案尚寢局尚寢一人掌宴寢總司設司輿司苑司燈四司之事司設四人掌帷帳裀褥灑掃鋪設司輿二人掌輿輦司苑二人掌種植蔬果之事司燈四人掌燈燭女史二人通掌文案尚功局尚功一人掌督女工總司製司珍司綵司計四司之事司製四人掌裁衣服司珍二人掌珍玉寶貨司綵二人掌段匹司計二人掌尚功局度支衣服飲食薪炭之事女史二人通掌文案宫正司宫正二人掌戒令責罰之事女史二人通掌文案凡官七十五人女史十八人比古減一百四十人內命婦冠服洪武五年定內命婦冠服制先是外命婦冠服之制已定惟內命婦未有其制至是復詔議之禮部言唐制貴妃一品昭儀二品婕妤三品美人四品才人五品冠服并用花叉翟衣寶林六品御女七品采女八品冠服同尚宫等並鈿叉禮衣宋內命婦貴妃一品太儀二品婕妤三品美人四品才人五品貴人無視品冠並用花叉翟衣自國夫人縣君及充司簿司賓者並賜冠帔今內命婦增設貴人一等才人二等參酌唐宋之制自三品以上宜用花叉翟衣貴人視四品才人視五品並同尚宫等用山鬆特髻大衫以為禮服於是詔以貴人為三品以皇妃燕居冠及大衫霞帔為朝會禮服珠翠慶雲冠鞠衣褙子緣襈襖裙為常服選教六尚嘉靖四十年上諭禮部曰祖宗之制宫中設六尚皆預教讀書習於禮法今缺久矣其選民間子女三百人入宫選淑女進獻淑女嘉靖十四年十一月該本部題為欽奉聖諭事先該本部為選補三嬪以廣皇儲以圖天下大本事欽奉明旨於京城內外慎選淑女間有河南開封府延津縣軍籍李拱辰通狀告稱有女年一十七歲容貌端莊堪以選用等因該本部尚書夏言奏奉聖諭卿以有民人狀告有女欲上之此不係大臣獻納可令從所願赴京入內無害欽此該部題奉聖旨這淑女既伊親自行送到正此亨通時殆天意者不必送館擇日十九日宴成自東華門入內著光祿寺供飲饌伊親且便賞銀五兩假一表裏欽此嘉靖二十四年九月內李拱辰子李應時奏獻次女本部覆題應否準令選進奉聖旨著查照前例進入欽此隨該本部題請進送吉期恭候明旨未下節該李應時等屢次奏稱進獻本部查照先前明旨著候旨事理至嘉靖二十五年十一月十五日又該李拱辰未奉明旨自造黃旗二面大紅段一幅上書屢奉聖旨九次等字同伊男李應時李應龍親執赴部當堂告稱即欲於是月二十日冬至節日照前例進獻該本部題查先年選取貞淑事例必纍經內外揀取多中擇選年貌相應者然後引進當時尚以未稱為懼今次李拱辰所奏淑女未經看選臣等倍加敬慎惟恭候明旨不敢輕易上瀆今李拱辰乃節次奉請又必欲於冬至日進獻誠恐臨期不能阻止理合題請明旨或容令即於是日伊父母送至東華門命內夫人引入大內惟復行令欽天監另擇吉期往送內夫人女官禁內揀選堪中然後演習禮數以俟御前引見臣等不敢擅擬等因奉聖旨準於冬至慶宴日著自東華門入供饌賞賜俱照前例行欽此再廣選取嘉靖十四年十一月上以前所選淑女不足詔南京禮部同五城御史選進仍遣禮部主事張鏊邊侁兵部主事高進賢賈士元分選南北直𨽻河南山東仍諭禮部曰選貞淑以備列御所以廣求嗣緒上承宗祀所遣諸臣不許驚擾百姓乘此妄為違者令被害人訴告處治不貸選宮人選取宫女條欵嘉靖二十六年二月十六日內閣抄出節奉聖諭朕宫中應役宫女數少又多半皆六十以上者將來二子四女之國出府必撥隨用須各以等差王用三十之餘公主二十之餘此祖宗家制也不預教數年何以取用卿等會宷一計來聞欽此本部覆題奉聖旨是這備用宮女便差官於京城內外并順天等八府州縣地方選取三百人送進限年十一嵗以上十四以下欽此咨都察院行五城并直𨽻御史通行所在一體欽遵劄付本部委官照依欽依事理會同五城御史督令兵馬司於京城內外大小官員士民之家選擇開報本司帖下五城兵馬司著落當該官戶即行掌印官總督各該地方官員分管地方排門選擇年嵗相應性資敏慧即將生年月日并父母姓氏從實開報候本官委官按臨該管官吏引領伊親父母兄送選如果相應取該城本管官員及父母里鄰親結類齊送司行錦衣衛經歷司呈堂知會給榜文張挂曉諭咨都察院轉行各該巡按御史責令所屬府州縣掌印官將有女之家先行密切查訪開報在官候本部委官到日會同巡按御史揀選劄付順天等八府行各該官員作速開造各女生時并父母姓氏籍貫文册一樣二本并承行職名先送委官及巡關御史按臨同選完日總册申部本部差官順天等四府一員真定等四府一員合用廩給夫馬應付并護送兵快人員俱咨兵部施行給榜二張前去各該地方張挂曉諭行欽天監選擇吉日本部將五城年貌相應女子題請赴諸王館候內夫人女官選擇行司禮監奏請內夫人知會帖下五城兵馬司先一日行令各該地方女子之家知會於是日五更各具潔淨衣服將轎送至東華門令其父母引赴諸王館擺列聽選是日司禮監請內夫人出諸王館合用擺列旗校馬匹等項行錦衣衛差撥聽用行順天府轉行宛大二縣拘帶穩婆於是日寅時赴館聽用行欽天監差撥隂陽人赴館聽候諸王館送女子合用轎婦名數行順天府備辦本部委官差往外府選回女子應行應奏事宜俱照前議行宫女選入內廷本部照例題請將各父母收充女户係軍衛者隨衛食糧係民户者行錦衣衛食糧俱各免差仍付主客司各關賞銀伍兩段一匹隆慶選例隆慶三年諭禮部祖制宫中設六尚皆預教以讀書使知禮法兹已缺少可照例選民間女子年十一以上十六以下者三百人進入禮部尚書高儀請差官選取京城內外并順天等八府州縣得旨各府太逺止於京城內外選取辛卯禮部選進宫女三百人禮部志稿卷六十一
