body:
  text: 禮部志稿卷六十六明俞汝楫編臣禮備考辨儀等官儀尚左吳元年十月丙午命百官禮儀俱尚左改右相國為左相國左相國為右相國餘官如之給事御史爭坐次景泰元年給事中李侃與御史朱瑄同事會坐侃坐瑄左十三道監察御史陳述等連章劾侃六科給事中李實等又奏欲坐御史左命禮部會官議尚書胡濙等言先奉宣宗皇帝聖旨御史給事中照品級坐從之已久給事中張讓等奏近因御史朱瑄給事李侃爭論坐次命廷臣會議議者言六科十三道俱係朝廷近侍風憲官今後在內則先近而後遠給事坐御史左在外則先正而後從御史坐給事左奏藁已成都察院左都御史陳鎰獨不肯署務令改議臣竊惟六科十三道係朝廷近侍風憲官言責所係國家治否所關今上皇播遷未返天象垂戒方嚴百姓流移四時旱潦苗蠻猖獗黠猾凶頑為臣子者自宜同心協力以𢎞濟為心獻忠效謀以宗社為事其朱瑄李侃所奏已付之廷議自有公論為御史者當俟聖斷奈何於先啓爭端之朱瑄則回護不言後辨曲直之李侃則痛加參奏同惡相濟假公營私鎰叨總臺憲自當推原理法之重大彰無我之公却乃阻抑近侍挾制多官會議罪實在鎰并御史陳述等俱當明正其罪帝曰今多事之時為臣者正當同心協力護國保民御史給事中俱近侍官乃常以私忿攪擾朝廷禮部其會官議以聞尚書胡濙言已奉聖斷只依品級序坐今張讓所奏無容别議從之內閣近侍官班次景泰二年户部尚書兼翰林院學士陳循奏內閣係掌制誥機密重務衙門近侍之職莫先於此永樂初年本閣官員凡遇聖上視朝立在金臺東錦衣衛在西後因不便移下貼御道東西對立已為定例近日因兩衙門官俱上奉天門奏事五府官雖品髙皆立西簷柱外獨六卿序立東簷柱內遂使內閣官無地可立此係朝廷不可不辨者昔孔子在宗廟朝廷一便言誠以禮法所在政事所出之處不可不明辨也又臣等叨䝉皇上擢任同知經筵事會講之日班或列於六卿之下恐識者笑玷辱此職自臣等始也又每午朝進近御榻奏事臣所奏俱係制誥機密重務不宜在五府六部奏雜事後孔子曰君子無所爭必也射乎古人大射之禮尚且如此况於聖明禮樂文物之朝內閣經筵神明制作之所可以茍乎下禮部議覆詔常朝內閣學士與錦衣衛官東西對立經筵日同知經筵官序於尚書都御史上午朝翰林院先奏事官員拜禮洪武二十年冬十月重訂官員拜禮其一凡朝見稽首頓首五拜乃臣下見君上之禮先稽首頓首四拜後一拜叩頭成禮稽首四拜者百官見東宫親王之禮其見父母亦四拜其餘官長親戚朋友相見止許行兩拜禮申飭官儀違越隆慶四年都察院左都御史葛守禮等言我朝設官分職品制截然具在乃人情務於好上法制廢於因循沿至於今遂成陵替官名九品混若一途綱紀紊矣輦轂之下奢僣無節法守亂矣監司守令體統倒置士庶倣效悖逆成俗矣臣以為宜申明禮制自朝儀始嚴令大小臣工各安名分守禮節以綱紀四方敢有違越者許各衙門長官并臣等及該科參究吏部仍察訪别處挽回陵替之風章下禮部請申明禁約從之公侯伯駙馬朝參𢎞治十五年舊例公侯伯駙馬朝參不置門籍至是㸃朝而無籍可稽錦衣衛請置門籍英國公張𢡟等奏勳戚大臣自祖宗定朝儀以來皆與文武品官事體不同宜如舊禮部覆奏命公侯伯駙馬朝參如舊不許逸惰南京官儀二議嘉靖十六年南京禮部尚書霍韜言元旦冬至萬夀聖節臣下拜賀皆行十二拜禮惟南京行八拜禮不宜獨簡出制帛文武百官俱吉服騎導於郭門之外拱立路隅帛過乃退而一嵗兩送或失之煩乞一嵗一行六科遇部院三品以上大臣引馬遜避臣前具奏奉有明旨而抗違不遵如故殊失大小相臨之禮疏下禮部覆言三大節在京有宣表致詞及𫝊制俱舞蹈山呼行十二拜禮導送郊外至日止行八拜禮此祖宗舊制非臣下敢自為隆殺似難輕改其送制帛儀雖無舊典無非敬事郊廟之儀每年二次舉行無容别議且六科遇部院大臣引馬避遜既有明旨自當遵守得旨慶賀制帛禮儀俱照舊六科道路遜避照在京一體遵行定部院謁見禮嘉靖四十四年以部爭禮儀奏令禮部會同禮科詳議部院謁見禮儀以聞禮部尚書髙儀等覆奏憲臺職司綱紀其威儀體貌係百僚具瞻不當因人隆殺選郎雖居要路然品秩班行亦六曹儔侣豈宜獨示優崇祗緣事權所在莫敢誰何故節年禮儀遞相引重甚至大臣仰揖司官訛以𫝊訛非所以一體統而崇遜讓也自今考滿官見都察院一如見部禮以杜紛爭其九卿翰林等官由吏部後門者亦不得遍揖四司報可勳胄乘轎禁例嘉靖三十六年禮部題該給事中黎良題稱伏覩孝宗皇帝欽准條例內一欵在京堂上文職四品以下及五府管事在京在外鎮守守備等項公侯伯都督等官不分老少俱不許乘轎違者參問其餘軍職若上馬拏交床出入抬小轎者先將服役之人問罪指揮以下參問京衛調外衛外衛調邊衛俱帶俸差操欽此近見在京公侯等官乘轎者多亦不知何所據依而倡為此風也臣又疑英國公張懋在先朝亦常乘轎蓋聞先朝任其才而優其老亦人惟求舊杖於鄉杖於國之意耳乃出於一時之特恩要不可援以為例也夫何近年以來無分老少不辨公侯厭馬弗乘乘轎相競其罪有不可逭焉者伏望陛下俯賜綸音責令乘轎公侯伯等官從實具奏回話務見朝廷曾否錫豫法制有無違礙如果故違憲章擅作威福各加法制其有隱情不行具奏認罪者許科道官備訪指名劾奏仍敕禮部再行申明舊例以後公侯伯等官如有仍前違制乘轎者見任者革去管事帶俸者量減俸米各永不推用等因題奉聖旨這本說的是今後兩京五府及在外鎮守守備等項公侯伯都督等官皇親駙馬在京四品以下文職在外除巡撫都御史其都布按三司以下官員俱不許乘轎兵部尚書下營之日也只許乘馬其餘軍職不許上馬拏交床出入乘小轎但有違的在內聼科道在外聼巡按御史糾劾從重罰治應參問降調的照例行該衙門知道定班行駙馬班次洪武三年命定駙馬都尉班次禮部奏按宋制駙馬班次出入皆依官品今駙馬官職當依百官由西門出入其班次品級當在百官之上如一品在一品之上二品在二品之上從之朝參官員坐次洪武十六年詔定朝參官員坐次凡奉天門賜坐公侯至都督僉事坐於門內守衛指揮坐於都督僉事之後稍南六部尚書及署都督府事官坐於門外皆東西相向六部侍郎十衛指揮應天府尹國子祭酒翰林院官僉都御史坐於西角門內若華蓋殿則公侯及都督僉事坐於殿內尚書及署都督府事官坐於鹿頂內皆東西相向六部侍郎及十衛指揮應天府尹國子祭酒翰林院官諫官僉都御史坐於鹿頂外東西相向侍班官員洪武二十三年詔更定侍班官員禮部奏定今後文武官除分詣文華殿啓事外凡遇升殿各用禮鞋照依品級侍班如有違越失儀者從監察御史儀禮司糾劾東班則六部堂上官各司部掌印官都察院堂上官十三道掌印御史通政使司大理寺太常寺應天府正佐官翰林院侍讀侍講學士修撰編修春坊學士光祿寺欽天監正佐官尚寶司太醫院官五軍斷事官及京縣正佐官西班則五軍都督及首領官錦衣衛指揮各衛掌印指揮給事中中書舍人三司奏本序次天順七年七月福建三司官以賊情事聞其奏本先布按二司後都司上謂都察院官曰三司品有定制今失序如此其行事可知其禁約各處三司奏本序次悉如品級若都布二司有犯該按察司核之者送巡按御史鞠問違者重罪之南京會議坐次成化五年閏二月禮部右侍郎葉盛言在京法司凡遇審録俱於承天門東西分為四行列坐公侯駙馬伯東班前行都督等官後行尚書都御史侍郎等官西班前行通政司大理寺佐二官并六科掌科給事中後行及禮部會議民情俱於闕左門東直房中序坐尚書左右都御史等官坐於上侍郎副都御史等坐於下通政司參議大理寺寺丞等官東傍六科掌科都給事中西傍俱有次序南京乞如北京坐次從之南京公侯班首嘉靖三十四年八月該南京魏國公徐鵬舉撫寧侯朱嶽因習儀互爭班首訐奏該本部尚書王賔覆看得徐鵬舉朱嶽一則以革任未革爵又有奉祀之命謂公當先於侯一則以守備南京坐府掌事欲以侯而先乎公臣等謂照朝廷班序以爵之大小為先後而事權非所論故守備之任可以公亦可以侯而班爵之制公為先侯次之魏國公徐鵬舉以元勳世臣爵列上公雖因言官論列奉旨革任緣有奉祀之命爵祿固存非若文臣罷閒遂不得有列於朝之比撫寧侯朱嶽守備南京事權為重然慶賀祝願臣子同情天威在上不違咫尺固未有朝廷之上可以不於其爵而於事權者又况徐鵬舉原係欽定班首先後之間亦自較然惟是二臣以世勳大臣之貴當廣衆森嚴之地互相忿爭大失體統鴻臚寺鳴贊閻曲序班王汝徵職掌朝儀不能據禮糾正反為阿曲均屬有罪合候命下移咨南京禮部行令今後一應習儀序班致詞稱賀俱以徐鵬舉為首表賀僉名朱嶽先之伏乞天語嚴加警戒俾各安分守毋得妄爭其鳴贊閻曲序班王汝徵似應量加罰治以警其餘奉聖㫖是著徐鵬舉充班首官今後不許妄爭閻曲王汝徵各罰俸一個月欽此申飭南京公聚儀節嘉靖十五年南京禮部尚書霍韜言禮儀定式京官三品以上乘轎官員相遇回避有等制甚明也邇者南京文武官無論品秩崇卑皆用肩輿或乘女轎街衢相遇卑不避尊舊年給事中曾鈞騎馬徑衝尚書劉龍潘珍兩轎之間鈞尋與龍互相訐奏臣禮官也乞申明禮制俾臣有所遵守詔下禮部都察院會看以聞時禮科都給事中李充濁等給事中謝廷蒞等及南京給事中曹邁等各抗章謂近侍之臣不當回避又雜舉公會案次得與尚書同列以證之章俱下所司既而韜謂禮部尚書夏言指使充濁言引避不與議左都御史王廷相乃與禮部侍郎黃宗明張璧議覆曰臣等按大明會典京官常朝儀條內公侯序於文武班首次駙馬次伯一品以下文東武西依次序立其班列之定體如此又大宴儀條內云公侯駙馬伯文職四品以上及學士升殿東西侍坐六科都給事中中左門序坐六科給事中丹墀東西坐其宴之定體如此又公聚序坐條內云在京法司會官審囚俱於承天門外東西兩行列位公侯駙馬伯列於東班督府等官列於西班通政司大理寺佐二官并六科給事中列於西班後行禮部會議民情俱於闕左門東直房序次尚書左右都御史等官上坐侍郎副都御史對坐通政司參議大理寺寺丞等官列於東旁六科都給事中列西旁南京文武衙門公事會集聚坐亦如之其會議序坐之定體如此又官員相遇回避條內云七品遇四品以上引馬回避五品引馬側立遇六品趨右讓道而行其回避之定體如此又觀給事中教場比試與五府侯伯大臣并坐選官賜酒飯與吏部尚書對坐與兵部尚書侍郎並坐此皆會典之所不載夫尚書侍郎一也在吏部則對坐在兵部則並坐亦非定體矣但與大臣一時同事禮體之變又如此必欲從變推類衡決常禮亦所不可今六科給事中朝參宴會遵常達變咸循理制其途遇九卿大臣亦皆引馬回避成規具在其南京六科給事中途遇九卿大臣立馬拱手不知所始禮典既不該載事例亦無可查且皇明一王之制萬國同文豈以南北殊俗異政兩京文職四品以下不許乘轎已有定制其用蔽幃女轎出入皆違犯典章所宜禁止請敕南京諸臣四品以下遵制乘馬毋得輒用肩輿其六科途遇部院大臣亦如在京引馬遜避違者聼禮部都察院及科道糾正上從其議仍詔已後有故犯者必參治其罪明職守太常用儒臣正統八年翰林侍講劉球言十事內一欵曰選禮臣以隆祀典今之太常即古之秩宗必得清慎習禮儒臣為之然後可交於神明故舜命伯夷以惟清意正在此今太常卿與少卿俱缺久無儒雅之臣考禮正儀於其間祀享寧無未䖍禮度寧無少乖宜選用諸儒臣為之庶祀典克修命部院大臣集議覆球所言惟太常寺官當從之分别司寺職掌嘉靖十一年七月內禮部題該鴻臚寺卿王道中等題為申舊例請宸斷以便遵守事又該通政使陳經等題為明職掌以正體統事奉聖旨該部一併看了來說欽此通抄到部查得大明會典開載通政司職掌一欵本司官職専出納帝命通達下情關防諸司出入公文奏報四方臣民實封建言陳情伸訴及軍情聲息災異等事又一欵凡天下臣民實封入遞或人齎到司須於公㕔眼同開拆仔細檢看事干軍情機密調撥軍馬及外夷來降進貢方物急缺官員提問軍職有司官員并請旨定奪事務即於底簿內謄寫略節緣繇當將原來實封御前陳奏畢就於奏本後批寫旨意送該科給事中收轉該衙門抄出施行其進繳稅糧文冊勘合通關起解軍囚等項附簿明白止送該科收不須入奏又一欵凡在京大小衙門但係奏出不分公事私事并在外鎮守等項內陳情已事巡撫都御史巡按等項御史總兵副參及分守守備備倭等項武職宣慰宣撫招討等司及府州縣等衙門一應錢糧軍馬刑名乞恩認罪繳敕等項本册俱赴本司投進又查得鴻臚寺職掌一欵凡謝恩見辭官員人等先於本寺報名該見辭及領敕繳敕或賜酒飯者預先日具本題知次日早俱於午門外行禮畢本寺官仍引赴御前叩頭又一欵凡公差給繇官吏將文册投下明日引入又一欵凡王府并鎮守守備備倭等官外夷宣慰宣撫招討等司進貢賫本人員天下諸司朝覲給繇官員并奏繳軍職文憑稽考公文完銷勘合及總兵等官會奏聲息等項本冊俱赴本寺引奏又一欵凡在外總兵等官奏報捷音本寺官引差來人於御前宣奏又一欵凡復命朝見人員繳敕進題本及四夷朝貢人員進畨字文書俱本寺官接至西陛授內官捧進及查得嘉靖十一年正月該鴻臚寺卿王道中題為朝儀事仰惟聖體違和暫免朝參數日即今早臻勿藥獲遂康寧視朝之初誠恐面見面辭人員旬日所積會於一旦未免起數大多纍動綸音久勞聖體合無以後凡遇免朝之日一應面見面辭官員午門外行禮該繳敕者本寺官員引領進繳其復命當引等項人員各令具本奏知庶幾聖明視朝之初起數減少不至於過勞等因奉聖旨是欽此臣等看得我朝分建百司以釐庶務而於章奏之復送案牒之往來又該通政司以總之紀其時日而考其出入名為喉舌之司以防壅隔之弊也至於鴻臚寺之職止於整肅朝儀𫝊宣制命引領進奏人員於各衙門文案奏疏全不相干其各處王府及在外大小衙門差來進貢賫本人員及朝覲給繇官吏并在京在外復命謝恩赴任等項人員例該面進見辭者先期赴本寺報名本寺即將朝見緣繇具本題知次日皇上御朝之時本寺官次第引見其間或有繳敕領敕封進圖本及外夷畨字文書者俱從本寺官當御前引奏接遞進呈非如通政司之實封可以開拆公文必須編號也其職掌之詳載在會典條目甚明但近來在外官員人等多有不明司寺職掌徑將實封本册赴該寺投遞該寺亦或間與封進相承日久因以為例非舊制也合無今後除在京衙門題本係有印信及官吏連名僉署者俱遵照舊規於左順門徑自投進外其餘一應職行奏本并在外衙門題奏等本俱從通政司投遞類封進覽其面辭面見人員應該繳敕領敕投遞圖本文書者俱從該寺先期題知臨朝引入面奏進呈不得擅將本冊收受封進仍進前項同寺職掌通行天下王府及大小衙門知會以便遵守再照得鴻臚寺先因聖體違和視朝之時誠恐起數太多有勞宣命題稱今後凡遇免朝一應面見面辭官員應該領敕繳敕者俱於左順門領繳復命等項人員俱從本寺具本奏知此蓋一時權宜之䇿耳今遂沿以為例凡遇免朝即謂不須陛見徑將敕書領繳非祖宗之制也况今皇上勵精圖治視朝臨政鮮有暇日正宜延見羣臣以宣德意其領敕在外公幹事完回還人員正宜面奉天顔親進奏疏以通下情所據前事相應遵復照常舉行合無今後應該面見面辭及領繳敕復命等項人員雖遇皇上暫時免朝仍候視朝之日於奉天門奏見庶使中外臣工皆知尊君之禮而於祖宗立法防範壅隔之意益嚴矣奉聖旨免朝日期領敕繳敕等項不係重大事情照該寺題准事例行其餘依擬欽此受賞賜定頒賜受賜禮洪武三年九月上諭禮臣近頒賜之禮失序今後當以所賜物先置奉天門內引人入見聼宣諭後給若物在後與貢獻何異洪武八年二月重定頒賜及迎接詔告儀凡朝官受賜於御前跪受衣則服以拜賜皆五拜禮在官受賜者初四拜既受賜復四拜止賞賜辭免虛文嘉靖十一年十一月內禮部題該巡按貴州監察御史周奏為欽䝉恩賞乞容辭免事云云等因本部看得御史周奏要辭免賞賜一節固見本官處心廉讓不敢自有其功之意但查有前項勞績已經兵部議擬題奏欽依給賞乃係國家彞典似難准辭再照近來各處受賞官員不以誠體陛下褒功至意往往循習故事輒具疏辭免煩瀆天聼且差人賫進往返道路糜費供億非惟辭涉不情抑且有乖大體合無通行各該地方撫按等官除有誤恩濫及應該辭免者自合照例辭外其餘有功人員既經核實該部題奏欽依禮所當受者今後止許具本稱謝毋得輒復辭免以示虛文違者許禮科參究其今次御史周辭免賞賜合無行令祗領惟復聼其辭免奉聖旨周襗已賞了不准辭近來受賞官員往往具辭委的煩擾依擬行各該地方撫按等官今後有功人員該賞的止許具本稱謝不必辭擾欽此儀從武官公使人數洪武三十年上以武官多私役軍卒踰法制命禮部考定其從人額數於是禮部議指揮及同知六人僉事及千百户衛所鎮撫四人皆於正軍伍內取用輪畨更直每三日一易下直則歸隊伍操練凡衛所直廳六人守門二人守監四人守庫一人止選老軍充役每月一更直洪武三年十二月詔定公侯儀從禮部尚書陶凱等考定以唐宋之制為準於是賜功臣魏國公徐達以下儀從各有差洪武十年八月壬申定官員儀從及公使人數初丞相大都督准侯例儀從用十五人從一品十三人正從二品九人三品七人四品五人五品四人六品四人七品三人八品九品二人至是議自從五品以上仍前例六品至九品比前例各減一人其各司聼差公使人數中書省御史臺各二十六人六部各十人斷事司察院各八人應天府十五人上元江寧二縣各十人洪武十三年三月癸巳詔以京衛軍士充公侯儀仗户韓國公李善長魏國公徐達皆二十户曹國公李文忠等皆十九户侯皆十五户先是以京民充之近因善長以老疾辭儀從故命易以軍士仍給之凡官員鞍轡馬頷下纓并鞦轡俱黑色不得用紅纓及描金嵌金天青硃紅裝飾公侯及一品二品銀鋄鐵事件描銀䩞三品至五品銀鋄鐵事件油畫䩞六品至九品擺錫事件油畫䩞一軍民用鐵事件黑緑油䩞凡官員傘蓋不得用金繡硃紅裝飾公侯及一品二品銀葫蘆頂黑色茶褐羅表青絹裏三簷雨傘油絹三品四品黑葫蘿頂餘同二品五品黑葫蘿頂青羅表青絹裏兩簷雨傘油絹六品至九品黑葫蘿頂青絹表青絹裏兩簷雨傘油紙軍民不得用羅絹涼傘止用油紙雨傘在朝公卿大臣乘安車肩輿景泰間在京文職官自三品以上乘肩輿正統後因太監汪直奏革部覆得旨如景泰時行𢎞治間河南等道監察御史奏禁約八人擡部議兩京及在外文武官員應乘轎者乘轎應乘馬者不得乘轎得㫖八人轎嚴加禁約官司備考公儀郡縣禮生儀從洪武二十年定郡縣禮生及儀從人先是命郡縣籍民充儀從及選民生資質祥雅者為禮生遇迎接詔赦進賀表箋及春秋祭祀則令贊禮供事而郡縣富民夤緣有司假此為名影蔽差役或因以為姦至是事聞命罷之遇迎接詔赦之類以儒學生員贊禮畢仍令肄業儀從則以弓兵皂𨽻之徒為之都布二司慶賀序秩洪武十五年廣東布政司使請於禮部曰本司秩從二品都指揮使司正二品正旦等節慶賀行禮請定著衙門禮部以聞上命行禮宜於布政司班列則以秩為序軍衛與有司行禮永樂元年壬申巡按福建監察御史周新言朝廷設立軍民諸司彼此頡頑兩非統屬今福建都司所轄各衛官每府官過衛門或道路相遇怒府官不下馬甚至鞭辱僕隸及各衛千户所遇有公務不申本衛徑令有司理辦少或不從輒訶責吏典有乖治體請自今府官以公事至衛者行正道平禮相見道途相遇分道而行遇聖節正旦冬至衛官悉於府治行禮其千户所遇有公務不許徑移文府縣亦不許凌辱有司官吏又開讀詔書乃各布政司職掌既已差人於各府開讀衛所官一同行禮而都司又差人下衛所開讀科斂軍士筵晏餽送擾衆非一請今以後開讀詔書除附近府縣衛所一同行禮外抄謄遵守其邊海衛所亦從布政司差人開讀為宜上悉從之命禮部行諸司遵守慶祝拜禮宣德四年八月直隸安慶府潛山縣知縣俞益言洪武初凡遇正旦等節在外大小衙門慶賀禮儀俱行舞蹈山呼十四拜禮後來惟五品以上衙門進表之日行此禮至節日止於露臺上設香案告天祝夀行九拜禮固是定制緣五品以下不進表者尚多亦止行九拜禮臣下之心皆有未安宜仍舊行舞蹈山呼十四拜禮庶展臣子至敬之心從之到任祭牲數宣德七年直隸廬州府英山縣知縣賀完奏洪武中定新官到任儀注凡新官到任父老人等導引入城遍謁神祠如儀致祭其儀物皆出於官若山川城隍等神俱用二牲其餘忠臣烈士用一牲今在外各衙門新官到任有用二牲遍謁祭告者有用二牲於城隍廟設壇總祭者其禮不一宜有定規命行在禮部議令羊豕各一總祀應祀神祇於城隍祠從之憲司與衛進表行禮正統六年山東濟南衛指揮同知鄧鑑奏按察司與衛俱三品衙門舊例行文平關正統初年以來按察司始劄付各衛經歷司比者山東按察司進表之日令衛官赴司隨班行禮有違洪武禮制乞敕該部申明舊例行文平關進表行禮各於本衙門為當上命禮部議尚書胡濙等言各衛與按察司平關未可從其進表行禮宜各於本衙門從之京衛赴京行禮景泰六年南京守備平江伯陳豫言江北和陽六衛統隸督府凡拜表慶賀一切禮儀例應赴京行禮但諸衛分守江外所寄甚重一遇時節傾城官屬盡數渡江或值風濤甚至旬日不能還衛城池管鑰委付無所實非所宜禮部言六衛雖為京衛實為外衛無别關防不可不嚴且遠隔江濤往復不便今後請但令各衛長官一人及首領官一人入京行禮餘悉留衛治事從之致仕與有司班次成化十一年正月國子監祭酒周洪謨言時節行禮宜令致仕官與有司官依品髙下序列班次事下所司議禮部覆奏所言致仕與見任同乞通行天下遵守及受封官亦與致仕者同官民相見揖拜禮洪武五年三月辛亥命重定官民相見禮先是元俗官僚相見跪一足為禮拜則叩首既拜復跪一足屬官下人見上司官長即引手於後退却若避之然上甚厭之至是復定為儀凡內外諸官每旦會公堂肅揖就坐幕官先揖長官退就幕署其屬官見上官必序立堂陛之上躬揖上官隨坐隨立拱手答禮幕官答拜如初見及以事出而還見上官再拜見幕官亦然上官拱手幕官答拜品秩等者互揖凡內外掾吏令史書吏宣使奏差人等晨謁長官階下一揖長官不答幕官拱手如節序及公參或差遣辭見俱兩拜長官不答幕官答凡典吏見幕官亦序立階下肅揖幕官不答如時節公參差遣辭見兩拜幕官拱手凡子孫於祖父母每旦肅揖若遠出旬日及節序慶賀皆四拜餘尊長亦然若尊長之疏遠出旬日及節序慶賀兩拜都御史與御史體式𢎞治十七年十月巡撫遼東都御史張鼐言臣竊惟都御史之於御史名器不無上下之别今巡按御史余濂批語皆以上臨下之詞且臣若果恣意變法濂自當指實劾奏豈可不顧名分有失大體乞將臣放歸田里仍命大臣及科道官辨别是非復斟酌巡撫巡按公會禮儀及移文體式通行遵守上下其章於刑部仍命與禮兵二部議濂亦上疏自辨以為臣所謂不許擅變成法者乃為都司衛所而言鼐因臣劾奏乃捃托他詞欲致誣害且巡撫巡按事有關涉行令所司轉達亦事體因襲之舊於是禮兵刑三部議今後巡撫巡按公會文移宜各遵禮制都察院正坐御史傍坐都御史劄付御史御史則具呈都御史或有各屬相關事情應轉行者則抄案轉行其有事干軍馬糧餉彼此相關仍行知會申明一城衙門共開讀景泰六年十一月參贊延綏軍務大理寺少卿曹璉言舊制凡朝廷頒降詔敕各衙門通行迎接於大衙門開讀以次衙門謄黃遵奉今往往不遵此例各别差人賫捧一城之內至開讀至五七次者且如綏德一城有鎮守衙門官有衛有州而州所部衙門復無慮五六既賫至鎮守等官處矣復頒之於衛衛又頒之於州州又遍頒於所部非惟煩䙝不敬抑且賫來人使往來重叠供給饋送不勝其擾乞敕所司申明舊制重行禁約從之榜令申明亭書罪犯洪武十五年上諭禮部臣曰天下郡邑申明亭本以書記犯罪者姓名照示鄉里以勸善懲惡使有所警戒今有司槩以百姓雜犯小罪書之使良善一時過誤者為終身之纍雖欲改過自新其路無由爾禮部詳議來言於是禮部上自今犯十惡奸盜詐僞干名犯義有傷風俗及犯贓至徒者書於亭以示懲戒其餘雖雜公私過誤非干風化者一切除之以開良民自新之路其自私毁亭舍除所懸法令及塗沒姓名者監察御史按察司官以時按視罪如律制可旌善申明二亭紀録洪武十七年壬寅命禮部録有司官善政著聞者揭於其鄉之旌善亭刑部録內外諸司官之犯法罪狀明著者揭於申明亭以示勸戒振飭申明旌善亭正統三年户部廣西司主事張清言洪武間設立申明旌善二亭所以勸懲善惡也近年有司視為文具廢弛不舉將何以示勸懲廣西樂平府知府唐復亦以為言行在禮部會議宜行天下府州縣修葺二亭復置板榜於內如有為善為惡之人備寫事跡揭於亭以勵風俗上命有司行之禮部志稿卷六十六
