而除軍民男女止素服十三日一各王府及在外文武衙門俱免進香一成服後三日在京文職七品以上武職三品以上衙門陸續赴思善門外進香每日鴻臚寺朝退後由西華門引入思善門前行禮司禮監官捧進几筵前一梓宫未發南京堂上官及朝鮮差陪臣進香服制雖滿仍衰服行禮鴻臚寺引從西華門入陪臣衰服工部製給一册諡及發引以下與大喪同但八虞九虞俱於宫中遣內官行禮永樂五年仁孝文皇后册諡儀前期禮部奏行祭告禮及請命頒册寶等官是日上躬告天地於奉天殿丹陛上宫中先設册寶案於几筵殿設香案於册寶案前上御華蓋殿文武百官於奉天殿前丹墀內分班序立引禮引頒册寶官至華蓋殿拜位序班舉册寶案置殿中鴻臚寺官奏頒册寶官行禮引禮贊四拜畢贊跪傳制官傳制曰永樂五年十月十四日册諡大行皇后命卿行禮引禮贊俯伏興四拜畢序班舉册寶案出至奉天殿丹陛上以册寶置綵輿中由中道出頒册寶官隨至右順門外北向立內官舁綵輿由正門入至几筵殿以册寶置於案退俟殿外尚儀女官詣香案前跪進曰皇帝遣某官某某官某册諡大行皇后謹告奏畢興贊宣册女官捧册立宣於几筵之右訖置册於案贊宣寶女官捧寶立宣於几筵之右置寶於案尚儀女官一員復詣香案前跪奏禮畢女官以册寶案置於几筵之左內官出報頒册寶官禮畢頒册寶官復命嘉靖二十七年孝烈皇后册諡儀先期遣官告於太廟用牲醴祝文如常儀是日上常服御奉天門樂設而不作正副使常服百官淺色服黑角帶入班行叩頭禮畢左右侍班正副使入就拜位贊四拜禮序班舉節册案於正中置定正副使行五拜三叩頭禮畢序班舉案行正副使後隨鴻臚寺奏禮畢上還百官詣思善門外侍立節册至右順門正副使捧由正門入至殿陛上置於案內贊奏就位上香贊宣册太常寺官取册立宣訖復置於案贊禮畢贊百官行四拜禮退正副使持節復命隆慶元年孝潔肅皇后遷祔永陵儀孝恪皇后同尊諡册寶先遣官即陵園行禮訖敕命奉遷官一員詣陵供事啓欑先一日遣官以祔葬告天地宗廟社稷用祝文祭告行禮如常儀司禮監禮部錦衣衛官提督執事者設大升祝俯伏興亞獻終獻復贊四拜焚帛祝禮畢皇后皇子以下以次入拜行謁見四拜禮凡皇太后皇后喪內朝賀祭祀等禮洪武十六年正旦以髙皇后喪服親王及文武衙門進到表箋先期三日捧進是日皇帝詣几筵殿祭祀畢常服御奉天殿百官常服行五拜三叩頭禮永樂六年正旦文皇后喪服皇帝常服御殿錦衣衛設丹陛駕教坊司陳大樂而不作百官行禮如洪武例立春百官俱淺淡服於奉天門行禮𢎞治十七年敬皇帝萬夀聖節以孝肅太皇太后山陵襄事奏准文武百官服錦繡於奉天門行五拜三叩頭禮是年冬至節免賀十八年上聖祖母及聖母尊號以太皇太后服制未滿百官並命婦俱照成化二十三年例免賀嘉靖二年肅皇帝萬夀聖節以孝惠皇太后服制未滿先期免習儀至日早於奉先殿行孝慈髙皇后忌辰祭禮畢上服黃袍御奉天殿錦衣衛設鹵簿駕如常儀鳴鐘鼓鳴鞭教坊司作樂文武百官具服朝先行四拜禮致詞又四拜免雞唱山呼舞蹈等禮表文彩段免宣讀陳設送內府交收十七年章聖皇太后服既除上常服俱墨布至喪次仍喪服百官俱青色冠服郊有事吉服作樂廟有事淺色服不作樂十八年正旦以章聖皇太后未南祔上具翼善冠黃袍御奉天門鳴鐘鼓奏堂下樂鳴鞭百官具公服行禮八月萬嵗聖節以南祔未久行禮如正旦儀九月小祥上同后妃謁几筵致祭公侯駙馬伯文官三品以上大臣各具青服陪拜顯陵遣勳戚大臣一員捧祀帛往祭大祥同二十年以昭聖皇太后喪服令太享齊戒服吉正祭用樂時祫齊戒權用青緑花樣至日樂暫設而不作二十六年以孝烈皇后喪服題准嵗暮大夾來嵗孟春時享各齊戒權用青緑花樣樂設而不作其啓蟄祈穀齊戒吉服用樂二十七年梓宫未發題准夏至大祭地於方澤照祈穀例齊戒服吉用樂皇妃喪禮永樂十八年昭獻貴妃王氏喪禮一聞喪輟朝五日一初喪上祭一壇皇后祭一壇皇妃祭一壇皇太子祭一壇親王共祭一壇公主共祭一壇一贈諡册文行焚黃禮一七七百日周年二周年每次祭祀壇數與初喪同一開塋域遣官祀后土一行內外衙門造辦喪儀銘旌冥器等項一發引前期辭靈祭祀壇數與喪同惟增六尚司祭一壇內官內使祭一壇一啓奠祖奠遣奠各遣祭一壇一發引日文武百官各素服烏紗帽黑角帶送至路祭處所皇親駙馬共一壇公侯伯文武衙門共一壇外命婦共一壇一過門祭祀內門遣內官外門遣太常寺官行禮一下葬遷奠遣祭一壇一掩壙遣官祀后土一迎靈轎至享堂行安神禮遣祭一壇天順七年初喪七七百日周年二周年辭靈各增祭一壇嘉靖二十九年皇貴妃王氏喪禮一初喪增六尚司祭一壇內官內使共祭一壇一行翰林院撰諡册文及各祭文壙志文一焚黃用黃絹裝褙如册樣兩葉寫册文是日陳設祭儀以祝文及册文置於靈前遣司禮監官行禮獻爵讀祝訖女官宣册禮畢焚祝及册一靈柩前儀仗內使女樂三十二人並花幡雪栁女隊子二十八人女將軍二十四人一靈柩至墳園奉安御前一壇遣護喪內官行禮其餘各祭俱同前一墳園內各壇路祭並靈柩頓歇處所行工部預為搭蓋席殿其挽歌執翣人等該用孝巾孝帶俱工部轉行內府該衙門製造嘉靖二十九年未封皇妃喪禮聞喪賜封號輟朝一日御祭一壇皇妃以下各祭一壇俱遣內官行禮光祿寺陪祭翰林院撰册文祝文壙志文擇日行焚黃禮七七百日周年二周年每次御祭一壇皇妃共祭一壇開塋域祀后土及辭靈祭祀壇數與初喪同俱遣內官行禮祭引以後合行事宜同前凡未封妃喪葬禮儀隆殺不等俱禮部開座題請施行皇太子喪禮洪武二十五年懿文太子喪禮皇帝以日易月服齊衰十二日祭畢釋之在內文武百官即日於公署齊宿翼日素服入臨文華殿給散麻服越三日成服詣春和門會哭明日素服行奉慰禮其當祭祀及送葬者仍衰絰以行在京停大小祀事及樂至復土日而止停嫁娶六十日在外文武百官聞喪易服於公署發哀次日成服行禮停大小祀事及樂十三日停嫁娶三十日嘉靖二十八年莊敬太子喪禮一聞喪第四日成服皇上遣祭一壇母妃祭一壇裕王景王共祭一壇公主共祭一壇內官內使共祭一壇東宫六局官共祭一壇一文武百官自聞喪次日為始具素服烏紗帽黑角帶於本衙門宿歇至第四日早具齊衰服不杖赴南城明德宫候大殮畢舉哀行四拜禮仍共舉祭一壇一每七百日皇上遣祭一壇母妃祭一壇裕王景王共祭一壇一自聞喪次日為始輟朝不鳴鐘鼓十日止一聞喪第五日百官具素服烏紗帽黑角帶詣西角門行奉慰禮退易布裹紗帽絰帶麻履於各衙門辦事通前成服日為始十二日而除在京軍民人等各素服十二日禁屠宰五日聽選辦事官吏監生僧道耆老人等俱於成服日赴順天府舉哀行四拜禮官具衰服監生人等具素服一翰林院撰祭文光祿寺辦祭物一各王府直𨽻各布政司等處禮部請敕差官訃告一諸王及世子王妃郡主以下聞訃次日具素冠服舉哀行四拜禮畢服十二日而除一在外文武官員人等聞訃次日各具衰服舉哀行四拜禮畢易素冠服絰帶麻履十二日而除其各王府及天下文武衙門俱免進香一諡册先期題請欽定大臣二員充正副使行翰林院擬請諡號撰諡册文諡寶文壙志文祭告文並各該衙門造辦諡册諡寶壙志欽天監擇吉先期一日遣大臣告於太廟寢內侍官設節册寶案於皇太子靈柩前至日早鴻臚寺設節册寶案於奉天門稍東百官青衣黑角帶侍班正副使各就拜位候序班舉節册案至丹墀中道置定鳴贊贊行五拜三叩頭禮畢序班舉案正副使後隨繇左順中門至明德宫內侍預設𤣥饈於皇太子靈柩前正副使捧節册寶置於案就位上香贊宣册寶太常寺堂上官立宣訖復置於案贊禮畢正副使捧節復命次日敕諭禮部以賜諡頒示天下照例差官齎捧一安葬先期擇地擇日遣工部堂上官祭告啓土一發引先期命大臣一員護喪一員題主各衙門堂上官題請各一員照例率領所屬送喪欽天監差官二員前去候時工部搭蓋各處席殿前一日起禁屠宰三日遣官一員以葬期告於太廟寢內命婦告於孝烈皇后几筵及遣官祭告經過各門橋司禮監錦衣衛官提督執事者設靈輿諡册寶輿並真亭儀仗於明德宫門外設方相冥器於北安門外以俟是晚皇上遣祭一壇母妃祭一壇皇妃共祭一壇裕王景王共祭一壇公主共祭一壇俱遣內官行禮至日文武百官布裹紗帽素服絰帶麻履候於北安門外步送至西直門外祭畢即回其分送入山官員俱免辭朝步送至西直門騎送至墳所還日朝見護喪官並各執事冠服同啓奠遣奠靈輿至墳所皇上皆遣祭一壇護喪官行禮路祭文武官等衙門共祭一壇皇親駙馬共祭一壇俱西直門外廣殿行禮祭畢而回其護喪官並墳所執事官待葬畢回凡回還官員俱易烏紗帽青衣黑角帶次日以後常服辦事一下葬皇上遣祭一壇母妃以下祭同前俱內侍官於將葬時行禮葬畢行贈禮如儀掩壙後皇上遣祭一壇俱護喪官行禮掩壙畢題主官題主護喪官獻酒贊讀祝禮畢安神皇上遣祭一壇葬畢祀后土遣工部堂上官行禮一百日期年每次皇上遣祭一壇母妃以下祭同前隆慶元年加諡憲懷太子靖悼王儀蓬萊太和二公主追封同前期一日鴻臚寺官設節案內侍官設册輿二並香亭於皇極門東是日早遣官以册諡告奉先殿上具素翼善冠麻布袍腰絰親告世宗肅皇帝几筵各用祝文祭品如常儀至期上仍具前冠服御皇極門百官俱照常烏紗帽素服黑角帶入班行叩頭禮畢左右侍班遣官就拜位序班舉節案置於中贊五拜三叩頭禮畢序班舉節內侍官舉册輿香亭俱繇左階降公主册繇右鴻臚寺奏禮畢上還錦衣衛官校接節册輿香亭繇午門等左門出公主册繇右遣官隨行至墳園行禮太常寺先於墳園陳設祭品如常儀鴻臚寺設節案於享殿內正中册案二於左右設香案於節案前內侍官設主案二于殿東制净水刷子粉盞筆硯盥盆帨巾等物候節册輿至墳園繇中門進至享殿前捧節册官捧繇殿中門入各置於案導引官引遣官至香案前上香贊宣册宣册宫取憲懷太子册立宣訖仍置於案贊宣册宣册官取靖悼王册立宣訖仍置於案執事官隨舉主案於香亭前稍東西向題主官進至主案前東立西向內侍官二員分詣神牀前跪啓謹請憲懷太子神主敬用奉題謹請靖悼王神主敬用奉題內侍官各盥手捧主案於案上洗磨舊字别塗以粉中書官重寫題主官盥手各奉題訖內侍官奉主各安於神座跪啓謹請憲懷太子神靈上神主謹請靖悼王神靈上神主內贊贊遣官奠獻讀祝行禮如常儀禮畢內侍官啓匱覆主奉安於神座訖次日遣官捧節復命親王喪禮喪聞上輟朝三日禮部奏差官掌行喪祭禮翰林院撰祭文諡册文壙志文工部造銘旌差官造墳又欽天監取官一員前去卜葬國子監取監生八名報訃各王府御祭一壇牲用牛犢羊豕餘祭止用羊豕太皇太后皇太后東宫各一壇在京文武衙門各一壇七七下葬百日周年二周年除服御祭各一壇下葬以前凡御祭及東宫文武衙門二祭總差侯伯一員行禮周年以後三御祭各差行人一員行禮太皇太后皇太后二祭遣本府內官行禮其祭物本布政司轉屬買辦冥器喪儀本處各該衙門成造其初喪本國內禁屠宰三日禁音樂嫁娶至葬畢乃止其封內文武衙門各祭一壇非封內者不吊祭發引在城軍民會送其大小殮七七百日遷柩祖奠發引下葬題主虞禮本府俱自有祭祀其服制王妃世子衆子及郡王郡主下至宫人俱衰服三年封內文武官員齊衰三日哭臨五日而除在城軍民俱素服五日郡王衆子郡主為兄及伯叔父服齊衰期年郡王妃服小功五月凡親王因事革爵後復原爵者例遣官祭仍給葬凡世子喪禮聞喪御祭一壇東宫祭一壇七七百日下葬周年二周年除服御祭各一壇俱遣本布政司官行禮翰林院撰祭文諡册壙志文工部造銘旌國子監取監生報訃各王府本布政司委官造墳安葬世子墳價隆慶三年議革轉屬買辦祭物冥器喪儀等本處各該衙門成造凡世孫喪禮聞喪御祭一壇東宫祭一壇下葬百日周年除服御祭各一壇翰林院撰祭文布政司造墳安葬今革轉屬買辦祭物親王妃喪禮郡王妃世子世孫妃附聞喪御祭一壇太皇太后皇太后中宫東宫公主各祭一壇俱遣本府內官行禮翰林院撰祭文壙志文工部造銘旌行布政司委官開壙合葬今准差欽天監官及轉屬買辦祭祀品物祭用羊豕國子監取監生報訃各王府其冥器喪儀本處該衙門成造繼妃次妃祭禮同其夫人則御祭一壇俱造壙祔葬今次妃止一祭夫人俱革凡親王革爵其妃未奪封號者准給祭葬郡王妃喪禮與親王妃同惟聞喪無公主祭一壇郡王繼妃次妃喪禮與正妃同親郡王生母追封次妃未葬者與祭一壇造壙祔葬嘉靖四十四年議萬厯九年更議親郡王生母封次妃者各與祭一壇葬革凡世子妃世孫妃喪禮俱與郡王妃同公主喪禮喪聞上輟朝一日御祭一壇皇太后中宫東宫各祭一壇各公主共祭一壇翰林院撰祭文壙志文户部給齊糧一百石工部造銘旌神主魂帛棺槨墳壙志石冥器儀仗順天府買辦麻布一百匹及真亭綵桌長明燈油等物欽天監差官選地擇日國子監取監生報訃各王府孝服花冠等件內府內官監等衙門成造其七七百日周年二周年除服御祭各一壇下葬輟朝一日上位皇太后中宫東宫公主各祭一壇皇親命婦共一壇公侯伯都督命婦共一壇六部等衙門四品以上官命婦共一壇都指揮指揮命婦共一壇其啓土遷柩祖奠過門過橋掩壙題主奉安神主虞祭各祭物俱光祿寺備辦嘉靖二十三年未封公主喪禮喪聞賜封御祭一壇皇妃共祭一壇裕王景王共祭一壇公主共祭一壇涇簡王妃祭一壇俱用素饈遣內官行禮欽天監差官擇地並選出殯等項日期工部差屬官一員造墳享堂等項破土祀后土遣大臣行禮發引御祭一壇皇妃以下祭同前俱用素饈遣內官行禮靈柩繇東上南門東上北門北中門北安門出各祭一壇內官行禮西直門祭一壇太常寺官行禮工部內監官於墳所安設享堂各用儀物俱行內府該衙門預行製造錦衣衛撥旗校擺路教坊司撥女樂三撥並樂人三百員名送至墳所靈柩至墳及下葬各御祭一壇用素饈遣內官行禮掩土後祀后土並題神主安神各祭俱遣大臣行禮百日周年二周年每次御祭一壇皇妃以下祭數同前俱用素饈遣內官行禮聞喪下葬俱免輟朝郡王喪禮長子附喪聞上輟朝一日翰林院撰祭文諡册壙志文工部造銘旌行人司差官掌喪禮本處隂陽生一名卜葬國子監取監生報訃各王府御祭一壇東宫一壇在京文武衙門各一壇七七百日下葬周年二周年除服御祭各一壇下葬以前諸祭總遣行人一員行禮周年以後遣布政司官行禮本布政司委官造墳安葬今減半給價轉屬買辦祭物祭用羊豕冥器喪儀等本處各該衙門成造郡王及妃已經奏准襲封未及册封而故者給祭葬與已册封同但免輟朝報訃並差官行禮其革爵後復原爵者與妃未奪封號者亦如之革管府事者與祿米革三分之一者比郡王例減半其革爵戴平頭巾閒住者止與祭一壇撥地安葬凡長子喪禮聞喪御祭一壇下葬百日周年除服御祭各一壇自長子至中尉諸祭俱遣本府長史等官行禮翰林院撰祭文本布政司造墳安葬今革轉屬買辦祭祀品物長子夫人已經奏准封妃未及册封而故者例與妃同凡郡王嫡長孫故與祭三壇嫡曽長孫故與祭一壇凡郡主喪禮與郡王妃同惟無壙志文凡鎮國將軍喪禮與世孫同凡輔國將軍喪禮無周年除服二祭餘與鎮國將軍同鎮國將軍革爵復冠帶者給祭如輔國將軍例凡奉國將軍喪禮無下葬百日周年除服四祭餘與輔國將軍同凡鎮國輔國奉國中尉御祭各一壇鎮輔二中尉有司造墳安葬奉國中尉有司量與造墳造墳今並革凡鎮國將軍夫人至中尉安人俱御祭一壇造壙合葬葬畢凡將軍生母追封夫人者與祭一壇今革凡縣主郡君縣君喪禮御祭中宫祭俱一壇造墳安葬葬革凡鄉君喪禮止御祭一壇自王妃至鄉君諸祭俱遣本府內官行禮凡儀賓恤典嘉靖四十四年議定係親郡王府者照例賜祭不給葬價係將軍以下者祭葬俱革萬厯七年更定親郡王儀賓祭葬一體並革凡郡王將軍中尉郡縣主君墳價嘉靖四十四年議定俱免給萬厯七年更定郡王墳價量給一半若係帝孫者照舊全給其將軍以下並免凡親郡王將軍等葬俱世長子一人送至墳所當日即回凡王葬妃及將軍等葬其妻得親至墳所看視一次當日即回凡將軍病故無嗣者其葬許弟一人送至墳所當日即回凡妃夫人病故無嗣者其葬許侄一人送至墳所當日即回凡親郡王將軍受封之後止許出城祭掃一次當日即回凡宗室庶人並母妻喪所在官司會同該府教授等官於本處空閒相應地面造墳安葬今革凡宗室為事送發髙牆病故安葬在彼其女及壻願留供祀者鳳陽府月給衣糧三石凡王府奏討墳户嘉靖三年准撥附近民人三名看守萬厯九年議准親王每墳撥給軍校五名郡王不許一槩濫給凡親王致祭舊例遣侯伯給敕行嘉靖四十四年議罷止差卿等五品以上官或禮部司官前去照行人差至郡王府給精微批不必請敕萬厯三年議准各王府奉差官不許擅為題請寬限違者罪其輔導官禮部志稿卷三十二
