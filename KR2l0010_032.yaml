body:
  text: 禮部志稿卷三十二明俞汝楫編祠祭司職掌皇太后喪禮正統七年誠孝皇太后喪禮遺詔喪服以日易月二十七日而除哭臨三日即止君臣皆同皇帝成服三日後即聽政天地宗廟社稷及百神之祀皆勿停宗室諸王但遣官進香不必送喪在外大小文武衙門並免進香臣民之家勿禁音樂嫁娶部議一自聞喪日為始不鳴鼓鐘一諸王世子郡王及王妃郡主以下聞訃皆哭盡哀行五拜三叩頭禮畢易素服第四日始衰服二十七日而除一在京文武官聞喪素服烏紗帽黑角帶自明日始至第三日每旦詣思善門外哭退於本衙門宿歇不飲酒食肉第四日具斬衰服至思善門外朝夕哭臨三日各十五舉聲止凡入朝及在外衙門視事用布裹紗帽素服腰絰麻鞋退即服衰服通前二十七日而除一文武官一品至四品命婦麻布大袖圓領長衫蓋頭清晨繇西華門入至思善門外哭臨三日悉去金銀首飾仍素服二十七日而除一在京以聞喪日為始禁屠宰十三日一軍民素服婦人素服不籹飾俱以聞喪日為始二十七日而除一外國四夷使臣行哭臨禮工部造與孝服隨朝官哭臨及行祭禮一在京文武官非朝參官及聽選辦事官監生吏典耆老僧道聞喪即易素服自次日至第三日每旦赴順天府朝闕設香案哭臨至第四日官各具斬衰服監生人等素服朝夕哭臨三日各十五舉聲止仍各素服通前二十七日而除一遺詔到日在外文武官員人等素服烏紗帽黑角帶行四拜禮跪聽宣讀訖舉哀再行四拜禮畢各置斬衰服于衙門內望闕設香案朝夕哭臨三日各十五舉聲止自是素服通計二十七日而除一在外官員命婦聞喪素服舉哀三日各十五舉聲素服通前二十七日而除軍民男女各素服十三日一南京文職二品武職三品以上衙門在外中都留守司布政司按察司及總兵官差人進香其餘衙門皆免嘉靖十七年上章聖皇太后慈諡儀前期四日太常寺奏齊戒三日至日遣官奏告天地宗廟社稷用祝文香帛酒果酺醢如常儀是日早告几筵設册寶案於几筵前册東寶西設祝案於御拜位右祭前一日內侍官置册寶輿香亭於奉天門捧册寶各置輿中是日上素冠服御奉天門內侍官舉輿外導駕官導上隨册寶輿後降階升輅外導駕官退百官素服於金水橋南北向立册寶輿將至百官皆跪册寶輿過興隨至慈寧宫門外北向立太常寺導引官導上至慈寧宫門外降輅册寶輿繇中門進至几筵前丹陛上導引官導上繇左門入至丹墀內贊唱執事官各司其事導引官導上至丹墀上拜位太常寺官于册寶輿內捧册寶繇殿中門入至几筵前左右北向立內贊奏四拜禮外鴻臚寺官傳唱百官皆行四拜禮畢導引官導上繇殿左門入至梓宫前跪奏傳贊百官皆跪奏進册捧册官以册跪進于上右上受册獻畢以授捧册官置于案奏進寶捧寶官以寶跪進於上左上受寶獻畢以授捧寶官置于案奏宣册寶訖奏俯伏興平身傳贊百官同奏復位導引官導上至几筵前唱初獻禮奏跪傳贊百官皆跪奏獻帛奠酒贊讀祝讀祝官跪于右讀訖唱亞獻禮終獻禮奏俯伏興平身傳贊百官同奏復位導引官導上繇殿左門出至拜位奏四拜傳贊百官同導引官導上由左門入至梓宫前以册寶授太常寺官捧入內導引官導上入內安册寶行叩頭禮導引官導上繇左門出至丹陛上奏禮畢遂頒詔如常儀嘉靖十八年章聖皇太后梓宫南祔儀一先期敕命勳戚重臣一員充奠獻使并護行武職大臣一員管領官軍扈侍梓宫行禮部堂上官一員監禮扈行題主大臣一員護喪內侍官並入皇堂內官內使匠作太常少卿一員執事官十人鴻臚寺少卿一員屬官等十人光祿寺少卿一員四署官四人錦衣衛指揮一員千百户四人各供事給事中御史各二員監視糾察欽天監官一員率博士一員安葬候時五府九卿等衙門分官奉送梓宫俱照欽點職名各送至張家灣水次恭祭而回工部委官會同內官監先期于通州及張家灣水次二處搭蓋奉安梓宫席殿及朝陽門至通州各處祭所席棚及行文沿途府州縣各該有司預于水次搭蓋祭所席棚一前期二日百官及皇親命婦文武官三品以上命婦俱衰服每日早詣慈寧宫門外哭臨命婦設祭一壇免朝禁屠宰音樂至神主回京日止一前期六日以皇妣祔葬顯陵祭告太廟睿宗廟遣官分告列聖羣廟越二日上吉服告天神地祇壇祭品行禮俱如常儀百官陪拜又二日上預告几筵內侍官陳設牲醴如常儀上具衰服內導引官導上詣拜位奏四拜奠帛三奠酒讀祝俯伏舉哀哀止奏四拜興焚祝帛禮畢一設奠辭靈昭聖皇太后遣祭一壇武廟皇妃一壇皇后一壇皇妃皇嬪各一壇皇太子一壇裕皇景王仁和大長宫主等一壇涇簡王妃一壇內官內使共一壇是日遣官祭告各門及諸神廟慈寧門思善門右順門午門端門承天門御橋大明門俱遣內官行禮玉河橋朝陽門並橋關王廟顯靈宫靈濟宫城隍廟東嶽廟真武廟俱遣太常寺官行禮祭用酒果脯醢香帛司禮監禮部錦衣衛提督執事者設大升輿于午門外至大明門外一啓奠內侍官陳設酒饌拜位如常儀內導引官導上具衰服詣拜位奏拜奠讀祝舉哀禮畢內侍官跪奏請慈孝顯皇后梓宫升龍輴內侍官先捧諡册寶繇殿中門出置輿內次捧桑主繇中門出奉安輿內次香亭安置訖內侍官捧銘旌繇中門出梓宫降殿執事官奉登龍輴訖以綵色帷幕障飾梓宫執翣者分列左右內使擎執繖扇侍衛如常儀儀仗用存日所御者諡册寶輿香亭銘旌以次先行上至梓宫前跪內侍官跪奏謹請皇妣靈駕進發上繇殿左門出宫眷皆哭後隨至午門內侍官跪奏請靈駕安止安定行祖奠禮一祖奠內侍官陳設酒饌拜位如常儀內導引官導上衰服拜奠讀祝舉哀畢內侍官跪奏請靈駕進發執事者進大升輿奉安訖遂行上率宫眷隨至端門外行朝祖禮一朝祖欽定捧主官九員俱具青服恭捧各廟主詣太廟奉安訖太常寺陳設脯醢酒果於列聖位前不奠獻執事官先設褥位於太廟丹陛正中梓宫至端門外上具青服太常寺導引官導上詣桑主輿前跪太常寺卿跪于上之左奏請慈孝獻皇后朝祖上捧桑主繇太廟中門入至太廟丹陛上立典儀唱迎神各捧主官上香退典儀唱行朝祖禮太常卿進立於殿中北向內贊奏跪上捧桑主跪奉于褥位內贊奏謁辭太常卿跪奏曰孝𤣥孫嗣皇帝某謹奉慈孝獻皇后謁辭訖內贊奏四拜禮興平身上跪捧桑主起立太常卿跪奏曰禮畢請還宫捧主官納主還各廟上捧桑主退至陛東西面立隨列聖主後出安亭內行辭奠禮一辭奠先期太常寺官于承天門內陳設牲醴如奠儀內侍官設上拜位設宫眷帷幕于近西桑主朝行禮畢上易衰服太常寺導引官導上詣拜位內贊奏上香奏二拜典儀唱奠帛三獻讀祝俯伏舉哀哀止奏二拜焚帛祝禮畢上退宫眷入拜哭盡哀止太常寺官跪奏請靈駕進發上攀送而還宫眷俱還司禮監禮部錦衣衛官提督輿亭儀衛等以次前行梓宫出承天門大明門轉東繇朝陽門出大樂鼓吹前導設而不作一遣奠先期太常寺執事官于朝陽門外陳設牲醴如常儀梓宫至太常寺導引官引奠獻使詣拜位行四拜禮奠帛奠酒讀祝俯伏舉哀哀止贊四拜興焚祝帛禮畢太常寺官詣梓宫前跪奏請一路祭公侯伯五府九卿等衙門官員耆老人等共祭一壇朝陽關外五里僧道官共一壇通州皇親及駙馬共祭一壇各衙門奉送梓宫官員一壇俱張家灣一京城至張家灣沿途市巷軍民男婦遇梓宫至皆跪俯伏舉哀候梓宫過興一大升輿行沿途校尉舁送選委內官同錦衣衛官專一提督務要起止有節行步安穩送葬官員人等不許逼近儀仗失次喧嚷有失禮儀者聽糾儀官舉奏一題主前期內侍官設神座香案于通州席殿內靈駕至奉安訖奠獻使行上食禮畢退執事官陳設祭品設題主案于香案前西向奉桑主置案上奠獻使具青服百官俱釋衰具青服陪拜太常寺官引使就拜位贊三上香訖贊四拜興退百官分侍左右題主官盥手西向立恭題訖內侍官捧主奉安神座命官青服行降神禮一降神典儀唱執事官各司其事贊就位贊上香復位贊四拜百官同唱奠帛行初獻禮獻爵讀祝亞獻終獻贊四拜焚祝帛禮畢太常寺官跪奏請慈孝獻皇后神主降座升輿命官捧主升輿還京內侍官捧桑主用白韜匱靈駕行內執事官焚楮駕凶儀於野一次日神主回京內執事官備儀衛教坊司大樂鼓吹前導至道中行饗神禮命官具青緑錦繡服色百官同典儀唱執事官各司其事贊就位贊上香復位贊四拜百官同唱奠帛行初獻禮獻爵讀祝亞獻終獻贊四拜焚祝帛禮畢神主輿行至朝陽門命官具吉服隨行百官同至午門外儀衛等退內導引官導神主入上具常服率皇后宫眷等迎神主于慈寧宫門外武廟皇妃公主涇簡王妃等迎于宫內俱吉服神主至几筵殿內上立於殿東稍南西向皇后皇妃以下序立於殿西稍南東向內侍官詣靈輿前跪奏請慈孝獻皇后神主降輿升座畢上捧神主奉安于靈座訖行安神禮內執事官陳設牲醴如常儀內導引官導上詣拜位奏拜奠讀祝禮畢后妃以下入行四拜禮鴻臚寺官引百官于慈寧宫門外隨班行禮傳贊如儀一神主輿行奠獻使等官行叩頭禮上食畢太常寺官跪奏奉請梓宫啓行至張家灣奉梓宫登舟奉安訖行祭告禮太常寺官陳設奠獻使行禮如常儀各衙門奉送官俱陪拜祭畢舟發沿途每日三上食奠獻等官俱素冠服詣梓宫前行叩頭禮如常儀神宫監尚膳監恭辦上食饌五樣蔬果酒膳一經過有王府去處許王素服出迎致祭該府官預陳設祭物於水次席殿其附近王府許遣輔導官致祭行禮一南京守備文武衙門各處鎮巡三司官梓宫舟經及附及去處俱致祭舉哀與王府遣官同所轄有司大小官員通許陪拜致祭品物簇盤一座豕一羊一果五盤點心五盤􅓞煠五盤俱用顔色紙花案酒五樣菜五碟粉湯五碗飯五碗帛一匹酒三爵香燭紙陳設如儀一梓宫自通州登舟抵承天府張家灣祭潞河之神天津祭海口之神安平鎮祭龍王之神徐州吕梁二處祭洪神淮河口祭淮瀆之神儀真南京祭大江之神彭澤祭小孤山之神九江之神漢江之神所過大川俱用牲醴致祭俱勳臣具青服行禮其各處應祀水府之神開載未備者臨期斟酌致祭顯陵合葬儀一先期遣官祭告顯陵光祿寺官陳設牲醴百官陪拜如儀一舟至承天府太常寺官陳設祭告牲醴如儀百官俱衰服奉迎梓宫升席殿奉安訖奠獻使行祭告禮師生耆老人等俱隨班拜奠獻使先詣睿宗舊寢所行禮畢奉遷睿宗梓宫安于祾恩殿復詣聖母梓宫前候發執事官先陳龍輴于祾恩殿門外候大升輿至太常官詣前跪奏請靈駕降輿升龍輴詣祾恩殿執事官奉梓宫升龍輴由中門入奠獻使由左門入詣祾恩殿奉安訖諡册寶輿仍設于前一安神執事官陳設酒饌如常儀設奠獻使拜位于二聖梓宫前內侍官引奠獻使詣拜位行禮執事撫按等官陪拜一以合葬祭告后土並純德山之神陳設牲醴如常儀一遷奠執事官陳設酒饌如常儀奠獻使詣拜位舉哀行禮退後掩𤣥宫時至太常官引詣二聖梓宫前跪太常官奏請靈駕赴𤣥宫奠獻使俯伏興執事官升奉遷二聖梓宫進皇堂奉安訖太常官同內侍官奉諡册寶置于前陳列冥器等畢行贈禮一贈禮內執事官陳設酒饌于皇堂門外奉玉帛置于案奠獻使詣拜位贊四拜奠酒受玉帛獻畢以授內執事捧入皇堂安置訖俯伏興贊四拜舉哀興贊贈事畢遂掩𤣥宫行享禮執事官陳牲醴于𤣥宫前如常儀太常官引使詣拜位行禮百官陪拜一掩𤣥宫畢太常寺官同內侍官恭拜桑主並魂帛