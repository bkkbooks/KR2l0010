body:
  text: 禮部志稿卷七十五明俞汝楫編宗藩備考藩爵初定庶長子請名例宣德元年戊午慶成王濟炫奏正妃唐氏已薨無子有庶長子今年十九請授以長子名稱上以祖訓未有定例命行在禮部集大臣議于是少師吏部尚書蹇義等議郡王之子稽之祖訓無長子之文今慶成王既無嫡子将來庶長當嗣宜先與一品官服帶俟襲爵之日行冊命之禮從之輔國将軍不准進封郡王天順七年十二月楚府江夏王孟炬奏岳陽恭僖王無嗣惟母弟鎮國将軍季嫡長子均鍠見封輔國将軍為岳陽悼惠王嫡長孫乞令嗣封以奉恭僖王之祀禮部言稽考近制惟親王無嗣有以郡王進封者郡王無嗣有以鎮國將軍進封者無輔國將軍進封郡王例事遂止儆飭謀奪封襲成化十七年乙未降𠡠切責真寧王邃垿削禄米三之一仍罪其府教授先是慶懐王薨弟岐陽王邃塀襲爵邃垿以其父秩熒乃慶靖王長子奏乞查勘處置于是懐王母妃孟氏奏邃垿紊亂宗派謀奪爵等情事下禮部言靖王子康王秩煃雖云第四係嫡出真寧荘惠王秩熒雖居長乃庶生當時一日同受封爵及各子承襲已定正統四年荘惠王奏奪封襲英宗睿皇帝已嘗降𠡠切責乞遣𠡠諭王宜遵祖宗定規永保禄位上是其言既而邃垿復奏前事禮部乞行所司轉行該府教授啟王遵奉先次𠡠諭毋再陳奏覬覦非分詔如所議行之未至而邃垿又奏岐陽冒作伯父不無背義于是禮部言自康王論之則岐陽王以子繼父自懐王論之則岐陽王以弟繼兄揆之于義皆無不可奏入上以康王傳序已定而真寧王累次奏擾故有是命其教授不行諫止命巡按御史逮問世孫長孫給冠服成化十七年安化王秩炵奏臣曾孫台濎台溍年及成人乞如例授職及賜冠服事下禮部議謂親王長孫舊無授封事例近奉詔書内開親王有長孫者授以世孫給一品冠服郡王有長孫者授以長孫給二品官服今安化王曾孫台溍既該封為奉國将軍其長曾孫台濎宜如世孫長孫事例降等定與冠服通行各王以為定式從之庶長子生母封例成化二十一年封徽王見沛庶長子祐檯生母劉氏為夫人給與誥命故事王府庶子必十嵗受封後始封生母為夫人例不給誥命冠服時祐檯甫五嵗未封王奏乞封其生母及賜誥命冠服禮部查例以請上重違王奏特與封夫人誥命冠服已之輔國将軍乞襲封王爵𢎞治三年楚府輔國将軍均鍠奏言臣祖岳陽悼惠王三子長季境襲爵薨無子次季墀臣父也與叔季坡俱封鎮國将軍卒僉謂臣以序以嫡以長皆當襲爵因檢寧府石城樂安二王及韓府樂平王故事以請下禮部尚書耿裕等議謂均鍠自天順成化間奏乞襲封者累矣顧以輔國将軍無進封王爵例故英宗皇帝憲宗皇帝輙寝其奏今日臣下知守法而己未敢輕議于是上命㑹官再議且令備查永樂以來事例以聞裕等又議謂臣等歴考舊章在永樂時各王分封未久尚未有封輔國将軍者其後宗室蕃衍始有輔國将軍之封然郡王薨逝亦未有自輔國将軍進封者至成化十一年以來遼府豪㙷始以輔國将軍襲封長陽王其後寧府石城王宸浮樂安王宸湔韓府樂平王㣲錏亦各因以輔國将軍襲封臣等伏覩皇明祖訓親王之子皆封郡王郡王次子授鎮國将軍孫授輔國将軍曾孫授奉國将軍𤣥孫以下遞授鎮國輔國奉國中尉聖祖之意正以親疎近逺降殺封爵誠萬世不易之令典也故臣等議謂若遵祖訓則輔國将軍不可以襲封郡王若援近例則長陽王以子而繼父石城等王以孫而繼祖其義猶為有據今均鍠則實欲以姪而繼伯爾亦安得援各王之例以為比哉況今宗室益蕃百爾請求事多窒礙連章累牘難以奉行伏乞聖明特賜裁處惟上合祖訓下愜人心著為定制永可遵行萬世幸甚上曰此事體重大爾等仍㑹多官詳體祖訓聖意議處以聞禮部復集議謂均鍠奏襲之事原不載于祖訓之内其所援例又頗不同終非臣下所敢擅擬上曰均鍠以姪繼伯與石城等王不同其已之今後請封類此者只從此例蜀府宫人請封𢎞治四年蜀定王次妃王氏因其子蜀王申鑿繼妃王氏卒具奏為宫人何氏請封繼妃或次妃下禮部議謂祖宗舊例各王府繼妃止許封一人今蜀府繼妃梁氏已卒何氏不得再封又王氏封次妃時其子蜀王已襲爵母以子貴理當宜然何氏乃宫人且無子亦不得援王氏例議上從之命封何氏為夫人不為例罪詣闕請封𢎞治四年晉府慶成王府革職鎮國将軍竒澗之子表樈等詣闕請封禮部言革職将軍子女無授封例且故違祖訓擅自來京請如例應付遣回仍𠡠晉王及慶成王約束之并逮問其輔導等官及本處守成官軍并所過闗津之失察者從之遼府革爵後所封𢎞治四年上以荆王見潚既革爵命禮部檢遼庶人革爵後事例以聞禮部因按遼王貴烚降為庶人後朝廷特封其弟貴煖為遼王以請上曰見潚并其子祐柄等已降為庶人荆靖王次嫡孫都梁王祐襇宜進封荆王以奉國祀郡王二次傳庶𢎞治十四年秦府郃陽温穆王無嫡子庶子七人俱封鎮國将軍王既薨庶長子誠泓襲封誠泓薨無嗣庶弟二子誠汾乞襲封命未下而卒誠汾長子輔國将軍秉橘亦乞襲封上不允命温穆庶弟三子誠澮襲封而進封其夫人馮氏為王妃将授冊誠澮又卒諡曰悼安至是其嫡長子輔國将軍秉檄奏乞襲封下所司議禮部㑹官議謂自温穆薨逝之後已經二次傳庶今難再及悼安生雖未受冊封然誠命以下諡典復加則其名號已正矣如今子襲父封則於事體為宜而争端亦可息從之趙府非例襲封𢎞治十五年趙王祐採襲封初各王府親王薨逝其子孫有俟終服制乃奏請襲封者亦有服制未終奏請襲封者至于趙王見灂薨左長史李實等奏請令王庶長子清流王祐採襲封王爵禮科給事中徐仁上疏論之以為不可禮部覆奏亦請如仁所言令清流王待服制将終始奏請襲封仍行各王府自後親王郡王請封者俱准此禮行有㫖祐採即襲封趙王庶子不再傳襲𢎞治十五年壬午初秦府保安王誠潢無嗣其次弟昭和王誠渌襲封亦無嗣鎮國将軍誠漖第五弟也既奉命掌理府事復請襲封命禮部議處尚書張昇等議謂祖訓有云親王未有嫡子其庶子止為郡王郡王子孫止授以本等官職今誠潢誠渌係保安荘簡王嫡庶所生已經二次傳襲難以再及誠漖上命㑹多官議處并查郡王襲封事例明白以聞昇等兩集文武大臣㑹議終以為郡王襲封載在祖訓未有庶子襲封之文先年雖間有庶子傳襲者然俱止襲封一次與祖訓之意不合況誠漖乃庶第五子未可援例請止今以本等官職奉保安王宗祀從之将軍不得乞封生母𢎞治十年寧府樂安昭定王之子鎮國将軍覲鋌乞封生母王氏為夫人援文武職官及懐仁王子鎮國将軍仕塠封生母之例以請禮部議謂諸司職掌凡諸子應封父母嫡母在所生之母不得封嫡母亡得並封若所生之母未封贈不得先封其妻此文武職官封贈之典自與宗室制度不同我朝宗室之制郡王出府止封一妃鎮國将軍輔國将軍各止封一夫人奉國将軍止封一淑人鎮國中尉止封一恭人輔國中尉止封一宜人奉國中尉封一安人别無妾媵受封之典祖宗親睦九族逺超前代何獨推封一事反厚于職官而薄于宗室是必有深意存焉非臣下所敢議也惟是親王之妾生子已封郡王者親王乞恩奏請例封夫人然猶不給冠服間有特恩給賜亦不為例其郡王請封妾媵雖懐仁王曾有之然出于一時特恩至于鎮國将軍乞封生母未有得請者葢此例一開則天下王府鎮國将軍以下凡有生母者孰不援例陳乞今日既得誥封他日将求冠服生時見授封號沒後便應祭葬希求太濫勞費益多且人之欲孝其親心雖無窮而分則有限何必強求分外之恩開冐濫之路而後為孝哉上曰既例不應封已之議覆藩封二事𢎞治十年禮部題覆部院衙門應詔陳言内二欵一議授封除親王嫡長子嫡次子庶子親王所生女及郡王嫡長子長孫俱照祖訓及憲宗皇帝詔書事例年及十嵗即與請封其餘子孫止該誥封鎮國等将軍及中尉者及各郡王及将軍及中尉所生女俱照天順四年英宗皇帝聖㫖事例俟年一十五嵗方與請封後即與行造冠服及給與禄米房屋等項擇選婚配日惜名器凡𢎞治年以來傳奉乞恩官員許吏部通查具奏黜革一定冊封欲依先年事例每年一次遣官赴各王府冊封每次于八月内造完于九月内遣官不許遲違其行移造辦務依日月先後不許任意遲速請封祖母正德元年代王奏進請封祖母夫人王氏為代惠王次妃禮部覆議著令但有子為生母請封而無孫為祖母請者詔特許之郡王例外襲封正德元年准秦府保安王府鎮國将軍誠漖襲封為王誠漖保安荘簡王之庶第五子也初荘簡王嫡長子榮穆王誠潢襲爵薨無嗣庶第三子昭和王誠淥繼襲昭和王薨無嗣誠漖攝府事乞襲禮部言祖訓不載郡王庶子襲封且保安傳庶已再不可復許孝宗皇帝是廷議寝封至是母妃陳氏復請上命多官集議尚書張昇等執奏如前詔特許之乞追復父爵正德三年復蜀府故庶人申鍷華陽王爵申鍷在憲廟時與鎮國将軍申䤧訐奏各褫爵職至是其子濱泟襲封援代府武邑王聰􅞜例乞追贈諡其父母禮部議宜勿與覆奉㫖㑹議于是㑹禮部尚書許進等上議奏謂祖宗以義訓宗室故凡有縱欲敗度者必革爵以示懲列聖以孝治天下故凡有為親祈恩者亦原情而加宥申鍷與聰􅞜事不同科贈諡誠不宜與但賓泟之請情有可惻葢以身為郡王而父無封爵春秋祭奠稱謂無據宜原情酌禮量與封爵便于廟享庶幾君恩國法可並行而不悖矣上復申鍷爵而已其諡郡王庶不得承襲議正德五年禮部㑹府部等衙門議朝廷宗支各有爵職其品第之髙卑視支派之疏戚故襲封之典載于祖訓惟親王之子不分嫡庶郡王言嫡而不言庶者祖宗立法之意固有在也其後郡王無嫡者亦得襲封至于兄終弟及係出一時特恩宗室之中援此為例故凡族屬疎逺者妄圗承襲累煩廷議以致逆瑾得以假借納賂變成法示私恩而秉舉秉檄誠漖例不該襲皆許襲封至于敗倫傷化革爵如鍾鍑者亦復原爵今已奉㫖改正後各藩襲封親王郡王俱以嫡繼無嫡以庶如果無庶許應奉祀者以本職奉祀其諸弟姪不得逺引祖父先爵為詞及不許親屬撥置徑行奏請如有仍前朦朧奏擾者奏詞宜格不行賫奏人治罪内外輔導官叅奏究治庶宗派明而法制定矣議上詔以封爵重事自今郡王無庶子許次及者以原職奉祀不許弟姪冐請封襲有朦朧奏擾者内外輔導官治罪保安王誠漖永興王秉櫸皆應查革但有成命姑仍舊封以後子孫并已故郃陽王秉檄子孫悉如議鍾鍑斁傷倫理情罪深重仍革爵降為庶人革正鄒平府襲封正德六年魯府鄒平恭懿王陽鎕妃張氏薨無嗣妾周氏生二子當潩當淎未幾復納丁氏為内助生當涼王愛之奏封為嫡長子復奏封丁氏為繼妃禮部不知其妄遂得受封者二十餘年至是當潩與當涼争襲封魯王及鎮巡官具實以聞下禮部議尚書費宏謂當潩宜襲并請改革當涼長子及丁氏繼妃封號有㫖復令㑹多官詳議宏乃㑹公侯駙馬伯府部大臣議曰舊例宗室正妃已故有嫡庶子者止許選娶内助不授繼妃之封今丁氏為内助不授繼妃之封今丁氏為内助與周氏無嫡妾之分則當潩與當涼皆為庶子當以長㓜為序以妾為妻丁氏之封既已誤于始以少陵長當涼之封不宜再誤于今請從禮部議庶人倫正國法明而宗室無紛争之弊矣議上乃以當潩襲封鄒平王而革當涼長子封號丁氏業已封妃已之進封者不得追封父正德六年十一月鄭王祐襗奏臣先以郡王進封為王乞追封故父東垣端惠王為親王并請入廟嵗祀禮部議鄭王進位葢以上紹康王之封東垣雖親有不得而子之禮乃不允旁支進襲者勿請加封正德八年初交城榮惠王薨無嗣姪表㭄襲爵得追封本生父竒滽為王至是管府事鎮國将軍竒洢請加封竒滽之女太平郡君為縣主下禮部議尚書劉春言加封事例施于世次應襲王爵而未得者若世次不應襲其子雖進襲王爵惟以繼嗣為不得加封至于子女尤所勿論所以正統緒定名分也交城王表㭄以姪繼伯追封其父已為過分乃又欲加封其女不可許且請申諭各王府今後有旁支進襲王爵者不得奏請加封父母及其父母所生之子女違者坐罪輔導官上是之命著為例旁支繼爵請追封正德九年八月先是鄭康王祐枔薨無嗣其從弟祐擇襲封為鄭王嘗為其父奏請追封入廟凡三上疏禮部屢覆以旁支入繼親王不得顧其私親詔如議至是復以為請下禮部議以鄭王懇疏雖出于孝然非以禮事其親者執議如初詔曰既于禮有悖其已之頒示宗室加封進禄例嘉靖五年禮部尚書桂蕚等言各王府進封襲封王爵者以後子女照今封號遞加其追封者所生子女封號加否不一難以遵行今查得𢎞治中樂安王宸湔襲封郡王追封其父覲鎰為樂安温隠王母夫人黄氏請加封本部議准加封為妃不遣官冊其餘子女原從從鎮國将軍所生俱不准追封以後各王府悉照此例施行今陳乞紛紜詔㫖數易莫知遵守臣請以覲鎰事著為令報可示頒命諸王知之飭引弊事具奏嘉靖十六年先是唐王宇温以文城王襲爵得追封父恭靖王為唐恭王已而復請加封其弟鎮國将軍為郡王妹縣主為郡主下禮部議部臣言追封親王子女祖訓條章無加封例第正德中周晉二府嘗請得之故王以近例請耳上以加封非祖宗舊制不許仍飭禮部自今陳乞者皆不得濫引弊事依違具奏冊服等儀順齎嘉靖二十二年禮部言每嵗封王妃冊服冠帔即令使臣齎賜玉榖等圭往往以成造後期待其奏請㑹闗非禮部以後冊封王妃玉器諸儀得與冊服同賜以全禮制從之飭冊封使臣嘉靖二十二年禮部言國家冊封宗藩所以惇叙九族乃正使武臣多從人役需索驛傳既久遲迴不發以要厚餽王府苦之今宜𠡠戒請使臣各奉法将命上曰冊封大禮禮部命官各宜仰體朝廷親親至意遵守禮法約束從人所過不得騷擾驛傳事畢還報不得遷延違者聽巡按御史舉奏申明郡王得改封長子嘉靖二十三年禮部言郡王之請封長子猶親王之請封世子均之欲正名分以俟承襲也親王與妃年五十未有嫡子得立庶子子為世子載在祖訓在郡王自可例推若郡王長子不改封非一視宗親預為正名之意也且庶子已封将軍者例有嵗禄既改封長子則禄米住支是在宗藩非有規圗利益之私也誠恐繼襲之分未定而争奪之禍由起耳自今乞聽郡王之請亦得改封詔如嘉靖元年例准改封著為令冊封遣官禁限嘉靖二十四年禮部覆御史吳相議冊封宗藩遣官務求端重老成者如侯伯數缺即于國戚都指揮内簡用侍衛團營侯伯不得圗差各爵在任空閒曾奉差一次者必隔二三年然後再差其隨從止帶一人如有騷擾濫受者聽長史及有司申呈巡按御史叅奏罰治詔可公舉冊封使嘉靖二十八年禮部疏言冊封之典嵗一舉行而持節行禮首以勳臣充之所以專命使重藩封也近嵗慣習營差之輩與夫新襲封爵少不更事者類皆以此為殖貨之門奉使而出恣肆驛騷需索餽遺致損國體請以後冊封之期本部移文中府等府掌印官㑹同公舉其鑚求需索及連年奉使三次以上者不得濫與如帶俸勳爵不敷即與僉書叅用違者聽部科糾奏報可庶輩封爵歸長嘉靖二十八年以秦府永夀恭和王秉欓庶長孫懐墡襲封永夀王初恭和王正妃湯氏無子宫人張氏生第一子惟燿内助邵氏生惟燱内助因進封為妃惟燿封鎮國将軍先恭和卒有子曰懐墡號王長孫王薨懐墡主䘮王妃邵氏因奏臣進封為妃惟燱封鎮國将軍惟燱固嫡子也惟燿校尉女所生較尉女選配有禁惟燿不當封援吳江例為請懐㷽亦援鄒平例奏争前後十年不決已而秦王懐埢覆奏懐墡恭和長孫今攝府事惟燱雖稱妃出然牒明開庶生且邵氏已生子方封俱下九卿議言郡王妃卒但有庶子止得選娶内助所生亦為庶子此累朝定制惟燿之生既在邵氏入府之前邵氏封妃出一時特恩則惟燿惟燱俱當稱庶俱庶則當歸長秦王等言是疏上上曰懐墡既稱長當封准承襲以後郡王王妃故後不得封繼妃著為令奏停夤緣封例嘉靖四十年禮部言王世子已故追封王爵者其次嫡庶子止封鎮國将軍不得有王封此𢎞治間例也至武廟時則有晉世子竒源之子表槏表掬者俱夤緣封郡王自是遂成兩例奏請紛紜行止靡一請酌示所宜著之令甲以便遵守上命照𢎞治間例行定冊封不等遣官嘉靖四十三年禮部覆議御史顔鯨奏請自今冊封親王妃擬勳戚中老成端謹者一人為正使以翰林院坊局六科尚寳及卿寺五品以上官副之世子郡王及各妃則以翰林坊局六科尚寳及卿寺五品以上官為正使以部寺屬官中書行人等官副之其致祭親王改差五品以上官或本部司官仍如舊例以四月初旬傳制遣官冊封正副使一體定限違者叅究著為例奏可嘉靖四十四年三月詔更定冊封遣使除親王正使仍用勳爵外其世子郡王正使止用翰林坊局六科尚寳司官副使止用行人行人不足則以中書充之若差多人少就近併差不得槩用各卿寺及部屬官其致祭親王亦止用尚寳司等官部寺各屬毋有所與時冊封新例多用文臣充使各衙門争欲得之禮部以其人求自便恐妨職守乃建議更止從之肅府請承襲隆慶二年肅定王妃吳氏奏以孫肅懐王無嗣請令定王姪管府事輔國将軍縉􅖷承襲王爵仍賜給丁土以供祭膳禮部覆言宗藩封爵莫重于親王往者縉􅖷請封先帝神斷謂越世無相繼之理成命昭然孰敢違越宜令縉􅖷安分守職毋得輙假王妃名再三凟請上曰皇考神斷倫理明正縉􅖷不准繼襲但将該府衛所等項一切裁革同于犯罪國除恐非先帝意且惇睦之道不如此其再議以請于是禮部又言縉􅖷既為将軍則與親王體統自别衛所所以衛親王也不容僣踰肅王及世子金寳非将軍所宜用自當奏繳或量摘衛丁以資耕牧田土之用而王妃所受金冊容其身終繳則朝廷惇睦之仁裁制之義庶幾乎兩盡從之肅王例外襲封隆慶四年命肅府奉國将軍縉􅖷襲封為王仍支輔國将軍禄先是縉􅖷以屢請襲封不許乃令延長王真滰等代奏以為親太宗統不當絶其封爵遞降品秩益卑内不足以鈐束宗支而外無以鎮邊方杜畨夷窺伺惟上幸許襲封以昭興滅繼絶之仁事下禮部覆言宗藩襲封莫重于親王萬世遵守莫嚴于君命縉􅖷以懐王從父例不得繼襲此先帝獨斷皇上親裁成命赫然孰敢違越而縉􅖷復使延長等王列名陳請是條例不足慿而明㫖不足信也其謂親王統不當絶則髙皇帝之子潭趙湘安郢五王憲宗皇帝之子岐雍夀汝涇五王皆以無嗣國除當時未嘗繼統豈非為天下後世長久之慮哉惟陛下念祖宗之深意修先帝之明法堅賜宸斷杜其請求以定經制上以極邊重地必須用王鎮䕶特令縉􅖷襲封為王于是禮部執奏宗藩條例一書乃廷臣集議先帝臨決勒成令典以抑冐濫萬世不可易之成憲也縉􅖷奏請襲封自先帝及皇上皆報罷此萬世當守之明㫖也以故本部奉行宗藩帖服而縉􅖷蔑成憲玩明㫖肆然凟奏若復聽之則宗室效尤人人欲行其私事事欲更其制豈聖世所宜有哉且肅府始封甘州今徙蘭州在内地不得稱極邊即選擇諸郡王賢者使理府事自足鎮䕶不必變更條例皇上即欲聽許宜下廷臣雜議之使朝廷大信可全宗藩大分不越然後可上曰已有㫖不必阻撓既以禮部請封縉􅖷為郡王他宗藩如縉􅖷者率以此令從事上不許竟封為肅王都給事中周詩等御史劉良弼等争之皆不聽葢太監陳洪入其賄故力主之部議不能奪也旁支不許襲爵隆慶三年新定各王府旁支不許襲封之例于是秦府隆德王敬鎔襄府安福王載堯俱以先世冒封法當革職禮部以為請得㫖敬鎔載堯伊父既以前承繼並准襲封藩給請給冠服正統十四年令親王有長孫者授以世孫給一品冠服郡王有長孫者授以長孫給二品官服親王冠服𢎞治十四年四月徽王奏稱原賜冕服并服衮龍袍服等件年久不堪穿用該本部覆題奉孝宗皇帝聖㫖准與王冕弁服各一套衮龍袍服罷欽此正德四年該本部議得王府奏討冠服等項除郡王無例難准外其在親王必須有關禮制不可缺用者方許具奏不許例外請乞煩凟聖聴等因奉武宗皇帝聖㫖是欽此嘉靖十二年十二月衡王祐楎奏稱先賜衮冕皮弁冠服經今年久顔色脫落不堪服用乞要製造該本部查例具題奉聖㫖准他欽此嘉靖十六年九月伊王奏稱先年䝉賜章服經今年久破綻服用不堪乞照衡王事例賜給該本部查例具題奉聖㫖准給欽此郡王冠服正德二年十一月唐王奏三城王啟稱欽賜制服經歴年久短窄不堪着用乞要易賜該本部查無事例覆題奉武宗皇帝聖㫖既無例罷欽此嘉靖三十四年九月唐王奏稱新野王先已病故今䝉遣官冊封乞将冊服𠡠令原遣官員遵照成命賜給該府収受該本部查照魯府新蔡王妃事例覆題奉聖㫖是既有成命冊服准給與欽此嘉靖三十六年二月靖江王奏稱原䝉頒賜冕服及皮弁等服多年日就破綻不堪服着乞要賜給該本部查例具題奉聖㫖准換給欽此王妃册封嘉靖二十九年三月魯王奏繳新蔡王妃孫氏册服等件前來該本部看得新蔡王妃孫氏既已先期病故原領冊服等件理合造繳但魯王奏稱成命在先乞要討此册服以先後世本部查無事例難以擅擬覆題奉聖㫖既有成命册服准給與欽此世孫冠服𢎞治十三年二月晉王奏世子世孫俱逝有世曾孫知烊欲令代臣管理習學緣無翼善冠服該本部議得知烊年雖㓜弱係應襲王爵合行請𠡠令其代為行禮習學所據給賜翼善冠服查無事例覆題奉孝宗皇帝聖㫖是知烊准給與世子冠服欽此正德二年十二月魯王奏稱先因足疾奏令世子當漎代為行禮今當漎病故乞要比例将世孫健栻賜以世子冠服代為行禮該本部查得晉府世曾孫知烊事例係出特恩覆題奉武宗皇帝聖㫖是健栻准給與世子冠服欽此嘉靖十三年九月周王奏稱世子勤熄病故遺有世孫朝堈未有翼善冠服乞要比照魯世孫賜給等因詼本部覆題奉聖㫖准照例與他欽此嘉靖二十八年十二月趙王奏稱庶長子載培封獲嘉王病故遺有長孫翊錙荷䝉聖恩封為趙世孫未有翼善冠服乞要比照周世孫賜給該本部查照前例覆題奉聖㫖是欽此郡王冠服𢎞治十三年四月蜀王奏稱曾祖姑名山郡主嫁儀賓盧旭後孀居四十五年夀躋九十為世所稀先䝉朝廷頒賜冠服穿戴年久乞要再賜榮身本部查無事例題奉孝宗皇帝聖㫖准給與冠服不為例欽此奏討内史皇明祖訓親王府承奉司承奉正正六品承奉副從六品典寳所典寳正正六品典寳副從六品典膳所典膳正正六品典膳副從六品典服所典服正正六品典服副從六品各門官門正正六品門副從六品以上俱内官其有員缺則以次第陞不得超越内使十名司冠一名司衣一名司珮一名司履一名司樂一名司弓矢二名以上俱内使其有奏討本部行司禮監照缺給𤼵天順八年六月晉王鍾鉉保陞承奉副張㤗等二十員為承奉正等官預定其職以聞上以書戒王曰得奏欲以承奉副等官張泰等二十員陞授承奉正等職既已定擬職名復何奏請且陞除王府内官出自朝廷若遇員缺只宜具實并開相應者奏知以慿陞補王乃擅自定職泛濫陞除是何理也此必下人撥置今皆不准亦不究問特書戒王王宜自省今後行事當遵祖宗法度毋得任情妄為庶可保全令名王其戒之慎之𢎞治九年兵部尚書馬文昇題稱乞𠡠各王府缺少内官内使者明白具奏若干員司禮監擇其老成讀書者具奏照缺給賜前去以後有缺具奏除補合用衣服飲食等項本照例闗給其郡王府每府給與内使二名專管宫闈事務及闗防門禁藩王有過專罪輔導官郡王有過專罪内使教授等因奉孝宗皇帝聖㫖是該衙門知道欽此嘉靖三十二年九月浄身男子江寧等奏乞收用該本部議将年力稍壯男子侯景等送南海子收管候各王府奏討查撥等因奉聖㫖是欽此嘉靖三十六年三月内唐王奏承休王宇淵乞討内使四名鎮國将軍宇洋乞討内使二名該本部尚書吳闕等議照親郡王撥給内使将以充宫闈門禁之役國家自有定制不容僣請伏覩皇明祖訓其裁定親王内使如司冠司衣司珮司履司樂司弓矢之屬総數不過十名並不及于郡王至𢎞治九年兵部尚書馬文昇題議郡王各給内使二名于是郡王始得乞請若夫将軍中尉累朝並無撥給事例止因嘉靖十五年該净身男子顧昇等奏乞收用本部憫念其情槩行題覆自後襲為常例然出一時權宜實非祖宗定制方今宗室蕃衍以天下王府将軍計之不下二千餘位紛紜乞請日益煩𤨏且将軍乞請不已必繼之以中尉南海子寄養有限異日何以應之今據承休王宇淵乞請内使合照前例行司禮監查撥二名前去該府供役其衛輝王府鎮國将軍宇洋所請祖訓不載似難一槩准給合行河南布政司轉行該府長史司啟王知㑹行令宇洋恪遵祖訓不得再行奏擾以後本部惟遵祖訓及𢎞治九年事例題覆凡親王乞請内使若原額缺人量撥四名郡王乞請内使查係未經撥給量撥二名其将軍中尉如有濫請者将該府長史教授承奉等官叅奏究治仍通行各王府俱要一體遵奉祖訓明例不許朦朧濫請有乖國體等因奉聖㫖是欽此嘉靖三十七年本部纂修儀司職掌照得親郡王奏討内使者不一而足以其額外濫乞重違祖訓司禮監奉㫖檢發未嘗查照缺之有無此皆出朝廷一時特恩不可為例者今並不録保陞内官成化二年七月慶王奏保内使白環等該本部查照皇明祖訓額設王府内官員數題覆奉憲宗皇帝聖㫖祖訓原定王府官員止是一正一副子孫正當遵守這保的只依正額除補其餘的罷今後不許額外濫保通行各王府知道欽此𢎞治十二年十二月吉王奏保内官李獻等乞陞典寳正等職事該本部查得近該吉王奏保承奉等官陳碧等陞用題奉孝宗皇帝聖㫖准王奏承奉副陳碧轉承奉正典寳正王保承奉副典寳副吳顯典寳正典膳副吉爽典膳正門副楊付門正寫書與王欽此今該府典寳正等官俱各方纔保陞見在不缺係是額外濫保有礙祖訓及奉有憲宗皇帝聖㫖難以施行及查得各王府奏保内使冠帶俱議明開何年月日撥賜人數本部查看年深方敢覆奏今陳林張廉俱不明白開奏亦難議等因題奉孝宗皇帝聖㫖陳碧等既轉陞了李獻等罷欽此正德三年令各王府内使不係欽撥者不准乞恩保陞妄奏者罪坐長史教授正德三年六月崇王奏典寳副梁洪轉陞承奉正職事本部覆題奉武宗皇帝聖㫖各府祖訓額設舊例承奉正副二員今崇王見有濫保承奉正副七員又行保舉梁洪顯是這厮求謀撥置本當究治但念親親且饒這遭欽此本月十七日該禮科給事中潘鐸等題稱徽府奏保内官髙成等奔競陞職等因奉武宗皇帝聖㫖你此說的是王府設官自有定制今徽府䑃朧奏保官員過額數多有違祖訓成規承奉長史不行諫阻髙成等夤緣撥置懐事多端本當查究裁革但念親親且饒這遭如又似這等必罪不饒今後待有缺方許承奉長史啟王保舉禮部還行與各王府知道該衙門知道欽此正德三年八月永和王奏稱内使郭彪到府年久乞要賜給内典膳職名等因本部查無事例覆題奉武宗皇帝聖㫖既無例罷欽此正德四年該本部議准王府承奉等官并郡王内使俱有定額其員缺并數少者許乞陞補不許額外濫保及擅立内典膳職名希圗保陞違者罪坐營求之人及輔導等官奉武宗皇帝聖㫖是欽此正德四年七月瀋王奏永平王府内使黄珍胡綱管理䘮儀誠可嘉奨乞賜㡌戴本部查得胡綱撥去年淺等因覆題奉武宗皇帝聖㫖黄珍胡綱都不准該府奏保内使如何說管理䘮儀誠可嘉奨恁意裏還行長史司啟王知道欽此正德四年九月鎮守河南太監廖堂題本部議得𢎞治九年奏行事例天下各親王府額設承奉正副各一員以理一國之政其郡王府各有内使二名專理宫闈及闗防門禁親王有過專罪承奉長史郡王有過專罪内使教授今奏前因本部合行各處鎮巡各官通查各親郡王府承奉内使如有僣言是非者具實奏聞區處覆題奉武宗皇帝聖㫖是欽此嘉靖三十四年五月蜀王奏稱本府承奉正陶宣周琦典寳典膳典服門正副等官張輔等啟各老疾事故員缺乞要将谷睿頂補承奉正陶宣寗文頂補承奉正周琦司誠頂轉陞承奉副谷睿谷茂頂補典寳正司誠瓛頂補典寳副張輔潘澄頂補典膳正石瑜周文慶頂補典膳副馮榮吳成頂補典服正谷茂谷逵頂補典服副江蘭杜廷鑑李嚴金良褒崇頂補門正韋忠等員缺劉成胡驤司義潘源頂補門副方英等員缺各一節為照谷睿等既該親王具奏員缺明白合無照缺轉補等因奉聖㫖准王奏谷睿等各照缺陞補寫書與王欽此嘉靖三十五年十一月周王奏稱典寶正武進員缺乞要将典寳副栁昇陞補典寳副員缺将典膳正尚昇陞補典膳正員缺将典膳副劉逵陞補典膳副員缺将典服正李還陞補典膳正員缺将典服副申玉陞補典服副員缺将内官賈朝陞補各一節既該親王具奏員缺明白似應陞補内查賈朝係内官奏内不開入府年月似難陞補其餘員缺俱次第相應等因奉聖㫖栁昇等都照缺陞補寫書與王欽此嘉靖三十七年本部纂職掌議照宦竪之流其欲無厭親郡王昵于褻近易為請乞自非朝廷為之裁抑則其求無已觀之訓典昭然可見邇年法久懈弛額外濫保之奏越次乞陞之請無日無之茍漫不查究而槩為題覆将來之弊有不可勝言者宜思所以限之内使冠服嘉靖八年二月該本部議照冠帶乃朝廷名器使不分可否一槩給賜誠恐名器過濫合無斟酌立為定例今後但有奏討内使冠帶者俱各限以到府年分親王内使須至十年之上郡王内使須歴十二年之上方許具奏等因奉聖㫖是冠帶朝廷名器年淺的難以濫授今後只照這例行欽此嘉靖三十三年五月德王奏内使張岳張宗海趙宜安馬德鄭昇焦臣戴賓俞朋張撥常敬戚朝耿斌王順穆臣蔡仲孫保楊保胡鳳紀綱韓楨馬守道韓用劉朝許茂楊朝劉良張祥張忠門成劉永俱于嘉靖二十四年欽撥到府乞給官帶榮身該禮科叅本部議照親王内使請給冠帶止限以到府年分原無定擬名數今據張岳等供事十年雖與前例相合然一請三十名委為過多似應酌處合無先将張岳等二十二名給與冠帶其劉朝等八名仍候該府另奏賜給等因奉聖㫖准王奏張岳等二十二名各給與冠帶其劉朝等罷寫書與王欽此嘉靖三十七年本部纂職掌議照内使請乞冠帶陞官其到府年分淺深是否欽撥人數先年事例俱本部查明題覆法禁昭然邇年漫委司禮監掌行不加稽覈雖為簡便恐非祖宗法制且于朝廷名器太濫今不敢録以為例内使復姓嘉靖二十八年三月肅王奏将承奉副辛朝改復本姓劉朝内官劉寳改復本姓楊寳該本部覆題奉聖㫖是欽此嘉靖二十九年七月内秦王奏據承奉副趙賢等啟稱賢自㓜浄身父母俱故賢等無依賢隨定興縣民劉順家改名劉賢王覲改為郭安周欽改名陳欽馬隆改名劉隆李朝改名閆朝強大用改名周大用馬端改名房端胡智改名李名俱為義子恩養成人嘉靖六年𠡠撥到府乞賜改正該本都照得劉賢等八員名乞要更正姓名既該親王具奏相應題請合行司禮監将劉賢等各查照更正施行等因奉聖㫖是欽此嘉靖三十四年二汝王奏稱承奉副趙全因父卓強母趙氏俱各早故隨舅氏撫養成人乞要改復原姓卓全該部看得趙全既該親王具奏前來似應隨從合行司禮監将趙全改為卓全及行該府啟王知㑹施行等因奉聖㫖是欽此内使養親𢎞治十三年七月夀王奏據典寳副趙良啟稱有父趙恕母任氏見今在京年皆八十乞要比例養親等因本部查無在外王府奏放承奉典寳等官養親事例今夀王所援衡王汝王各奏准承奉典寳等官覃海等養病係是未曾出府之時俱難比照等因奉孝宗皇帝聖㫖趙良不准回京欽此收買子女𢎞治五年五月内吉王奏前事本部查得天下各王府如果宫内缺人使用例該先行奏奉欽依方纔自備財禮于情願之家兩平收買不許過多今吉王未曽具奏輙便收買子女數多叅題奉孝宗皇帝聖㫖你每說的是但這起子女王既用價收買今又自行認罪還准留十嵗以下的三十口與王使喚欽此𢎞治十一年七月内准王奏要收買㓜女本部查得該府先曾奏准收買二十人去後覆題奉孝宗皇帝聖㫖既曾買收二十人了罷欽此𢎞治十六年五月内徽王奏稱缺少多人使用乞准自備價銀收買等因本部備查先該徽王奏買多人三次奉聖㫖罷欽此今奏稱前因覆題奉孝宗皇帝聖㫖且罷欽此正德三年五月内衡王奏稱府中缺少使喚乞要自行用價收買子女等因覆題奉武宗皇帝聖㫖王既奏缺人使用准買十五人係是府中用的還着鎮守太監看驗十二三嵗的着承奉長史也要眼同看可的方用欽此正德四年該本部議各王府奏買子女但收買一次以後必須年久事故數多委果缺少使用方許再行乞恩仍行鎮巡輔導等官保勘奏請兩平收買其名數取自上裁嘉靖三十一年四月内吉王奏嘉靖十六年臣父吉定王奏乞遴選淑女已䝉聖恩准選五人後臣父因疾不果選用至今缺人應用欲行照例收買二三十口以充應用該本部照得吉定王既經奏奉欽依收買女子五名因疾未及收買薨逝今吉王乏人使用合令遵照先奉欽定數目收買充役等因奉聖㫖是欽此庶人赴京請給正統十一年九月遼庶人貴烚長子擅離其先塋欲赴京自訴遼府及防守荆州衛官以聞上命湖廣三司及巡按御史體之至是御史蒋誠等官言長子自以其男女年及成人居第狹隘貧無以卒日欲陳訴乞恩郡主乞粧奩成化十八年十月德王見潾為其郡主乞粧奩上曰郡主婚配例止給與冠服儀仗今王奏乞粧奩朕念親親之恩非惜此小費也但今宗支蕃衍内府營造供應之物日不暇給若復開此例各王将比照陳請何辭以郤之府庫財物所入有限又将何取以應之乎其已之造王府遵祖制𢎞治八年十月禮部尚書倪岳等言永樂宣德間造各王府規制儉約近來務極宏麗傷財害民乞整内官監今後凡造王府悉遵永樂宣德間式様畫圗務從儉約以恤民困上曰既永樂宣德間王府規制皆祖宗所定誠宜遵奉所司其備查以聞酌議庶人口粮嘉靖三十二年禮部㑹議王府庶人口粮如成化十三年例則過多如嘉靖四年等例則過少今當視中尉嵗米減三之一嵗給米七十石妻妾子女及使女皆衣食其中不必計口更給庶人口粮既定則擅婚者減庶人三之一得五十石傳生者減庶人之半得三十五石増損適中矣至于妾媵之數宜如律年四十以上無子者乃聽娶妾有子則否議者又謂限其妾媵不若限其子女竊以為限其人數又不若限其口粮今宜備查現在庶人傳生等食粮名數自今為始除子女未出㓜者從父及女将出嫁者給家資從夫養贍外其子應請口粮者查其父生子多寡三子以上者無論長子衆子並與半給若止一子二子供與合給傳世以後半給者如故全給者仍查其父生子多寡定擬如前庶幾下有一定之制上無難繼之恩通行各王府著為例此後有違例妄請者坐之報可議處藩録嘉靖四十年十月監察御史林潤言今天下之事極弊而可大慮者莫甚于宗藩然莫有一定不易之策懼拂宗室之心而重違祖訓也顧時有所必變勢有所必通國初支庶不繁定制因畧今麟趾螽斯其麗不億視昔時數百倍矣臣觀嘉靖初議者言洪武中河南開封惟一周府今郡王已增三十九府将軍至五百餘中尉儀賓不可勝計舉一府而天下可知也今距嘉靖初又四十餘年矣所増之數又可推也故天下財賦嵗供京師粮四百萬石而各處王府禄米凡八百五十三萬石不啻倍之即如山西存留米一百五十二萬石而禄米三百一十二萬石河南存留米八十四萬三千石而禄米一百九十二萬石是二省之粮借令全輸不足供禄米之半況吏禄軍餉皆出其中乎故自郡王以上猶得厚享将軍以下至不能自存饑寒困辱勢所必至常呼號道路聚而詬有司守土之臣不惟懼辱且懼生變故官司困于難供宗藩病于不給天下無可增賦之理而宗室蕃衍無休時是可不為寒心哉今議者或言當今天下親王皆如國初遼韓伊岷肅諸王之制禄皆二千石或郡王而下定中半折支如京朝官例儀賓而下如外有司例或云親王袒免而下則從庶人之例月支米三石或云不宜遽削于今日而惟定制于方來或云定子女之數以杜詐冐或云開應舉之途弛商賈之禁言人人殊臣以為宜令大臣科道集議于朝仍頒諭諸王示以勢窮弊極不得不通之意令户部㑹計賦額以十年為准大約兵荒蠲免存留費用幾何王府增封幾何禄米及諸費幾何令宗藩曉然知賦入有限費出不經共陳善後之䇿然後通集衆論斷自宸衷以垂萬世不易之規疏下禮部議覆從之禮部志稿卷七十五
